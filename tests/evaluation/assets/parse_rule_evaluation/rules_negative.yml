rules:
- id: configsource-return-type-v1beta1
  message: Function return type pipelinev1beta1.ConfigSource should use RefSource
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(...) *pipelinev1beta1.ConfigSource { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: resolver-source-method-implementation
  message: Source() method implementation should be renamed to RefSource()
  severity: WARNING
  languages:
  - go
  pattern: 'func ($REC $TYPE) Source() *$RETURN { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: configsource-in-comment-api
  message: Comment referencing ConfigSource should use RefSource instead
  severity: INFO
  languages:
  - go
  pattern-regex: //.*ConfigSource.*identifies
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: configsource-provenance-comment
