    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: detect-plotting-utilities-submodule
  message: Plotting utilities submodule exists (utilities reorganization applied)
  severity: INFO
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
