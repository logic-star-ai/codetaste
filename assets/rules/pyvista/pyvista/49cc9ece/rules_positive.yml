  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from vtkmodules.vtkFiltersCore import $X
    - pattern: from vtkmodules.vtkFiltersGeneral import $X
    - pattern: from vtkmodules.vtkFiltersExtraction import $X
    - pattern: from vtkmodules.vtkFiltersGeometry import $X
