    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - pyvista/core/_vtk_core.py
- id: detect-typing-annotations-in-core-typing
  message: Type aliases defined in core._typing_core (type organization)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: '$TYPE = $ALIAS

        '
    - pattern: 'from typing import $X

        '
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - pyvista/core/_typing_core.py
