  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from vtkmodules.vtkCommonCore import $X
    - pattern: from vtkmodules.vtkCommonDataModel import $X
    - pattern: from vtkmodules.vtkFiltersCore import $X
    - pattern: from vtkmodules.vtkFiltersGeneral import $X
