rules:
- id: function-definition-in-core-utilities
  message: 'Refactoring detected: Function definitions in core.utilities modules'
  severity: INFO
  languages:
  - python
  pattern: "def $FUNC(...):\n  ...\n"
  metadata:
    nr_refactored_patterns: 284
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/utilities/**/*.py'
- id: plotter-module-has-method-definitions
  message: 'Refactoring detected: Method definitions in plotter.py module'
  severity: INFO
  languages:
  - python
  pattern: "def $METHOD(self, ...):\n  ...\n"
  metadata:
    nr_refactored_patterns: 200
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plotting/plotter.py'
- id: no-direct-utilities-import-pattern
  message: 'Refactoring verified: Using specific core/plotting utilities instead of
    generic utilities'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $PKG.core.utilities.$SUB import $X
    - pattern: from $PKG.plotting.utilities.$SUB import $Y
  - pattern-not-inside: 'from $PKG.utilities import $Z

      ...

      '
  - metavariable-regex:
      metavariable: $SUB
      regex: ^[a-zA-Z_][a-zA-Z0-9_]*$
  metadata:
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
- id: class-definition-in-core-utilities
  message: 'Refactoring detected: Class definitions in core.utilities modules'
  severity: INFO
  languages:
  - python
  pattern: "class $CLS(...):\n  ...\n"
  metadata:
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/utilities/**/*.py'
- id: function-definition-in-plotting-utilities
