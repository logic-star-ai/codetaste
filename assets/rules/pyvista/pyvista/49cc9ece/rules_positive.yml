rules:
- id: detect-texture-file-location-moved
  message: Texture file exists in plotting, not in core (file moved)
  severity: INFO
  languages:
  - python
  pattern-regex: .*texture.*
  metadata:
    category: structural
    nr_refactored_patterns: 106
    nr_legacy_patterns: 0
  paths:
    include:
    - pyvista/plotting/texture.py
    exclude:
    - pyvista/core/texture.py
- id: detect-utilities-import-from-both-locations
  message: Import utilities from new split locations (core or plotting)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from pyvista.core.utilities import $X
    - pattern: from pyvista.plotting.utilities import $Y
  metadata:
    category: structural
    nr_refactored_patterns: 78
    nr_legacy_patterns: 0
- id: detect-import-from-core-utilities-misc
  message: Import from pyvista.core.utilities.misc (utilities reorganization)
  severity: INFO
  languages:
  - python
  pattern: from pyvista.core.utilities.misc import $X
  metadata:
    category: structural
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: detect-import-from-core-vtk-core-v2
  message: Import from new pyvista.core._vtk_core module detected (VTK split refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from pyvista.core._vtk_core import $X
    - pattern: from pyvista.core import _vtk_core
    - pattern: import pyvista.core._vtk_core
    - pattern: import pyvista.core._vtk_core as $ALIAS
  metadata:
    category: structural
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: detect-import-pyvista-vtk-core-alias
  message: Import core._vtk_core (potentially aliased as _vtk)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from pyvista.core import _vtk_core as _vtk
    - pattern: from pyvista.core import _vtk_core
  metadata:
    category: structural
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: detect-no-circular-import-utilities-core
  message: Core imports from core.utilities not old utilities (no circular deps)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-not: from pyvista.utilities import $X
  - pattern: from pyvista.core.utilities.$MODULE import $X
  metadata:
    category: dependency
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  paths:
    include:
    - pyvista/core/*.py
    - pyvista/core/**/*.py
- id: detect-old-utilities-not-imported-in-core
  message: Core modules import from core.utilities not old utilities (clean dep)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-not: from pyvista.utilities import $X
  - pattern: from pyvista.core.utilities.$MODULE import $X
  metadata:
    category: dependency
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  paths:
    include:
    - pyvista/core/*.py
    - pyvista/core/filters/*.py
- id: detect-import-from-core-utilities-arrays
  message: Import from pyvista.core.utilities.arrays (utilities reorganization)
  severity: INFO
  languages:
  - python
  pattern: from pyvista.core.utilities.arrays import $X
  metadata:
    category: structural
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: detect-tests-updated-for-new-structure
  message: Tests updated to use new import structure
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from pyvista.core.utilities.$MOD import $X
    - pattern: from pyvista.plotting.utilities.$MOD import $X
    - pattern: from pyvista.plotting import Texture
    - pattern: from pyvista.plotting.plotter import $CLASS
  metadata:
    category: config
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/**/*.py
- id: detect-test-import-from-core-utilities
  message: Test imports from pyvista.core.utilities (refactored structure)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from pyvista.core.utilities.$MODULE import $X
    - pattern: import pyvista.core.utilities.$MODULE
  metadata:
    category: structural
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/**/*.py
- id: detect-import-core-vtk-in-core-modules
  message: Core modules import from _vtk_core (proper modularization)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from pyvista.core._vtk_core import $X
    - pattern: from pyvista.core import _vtk_core
  metadata:
    category: dependency
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - pyvista/core/*.py
    - pyvista/core/**/*.py
    exclude:
    - pyvista/core/_vtk_core.py
- id: detect-core-utilities-submodule
  message: Core utilities submodule exists (utilities reorganization applied)
  severity: INFO
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - pyvista/core/utilities/*.py
