- id: star-import-pattern-not-intentional
  message: Star imports should be eliminated except for intentional cases (core, plotting,
    utilities at top level).
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from $MOD import *
  - pattern-not: from pyvista.core import *
  - pattern-not: from pyvista.plotting import *
  - pattern-not: from pyvista.utilities import *
  - pattern-not-inside: "def $FUNC(...):\n  ...\n"
  - metavariable-regex:
      metavariable: $MOD
      regex: ^pyvista\.
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-typing-import-from-root
  message: Type hints were reorganized. Core types moved to pyvista.core._typing_core,
    plotting types in pyvista.plotting._typing.
  severity: WARNING
  languages:
  - python
  pattern: from pyvista._typing import $TYPE
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
