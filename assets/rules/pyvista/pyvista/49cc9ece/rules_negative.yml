rules:
- id: utilities-attribute-access
  message: Direct access to pyvista.utilities attributes. The utilities module was
    deprecated and split into core.utilities and plotting.utilities.
  severity: WARNING
  languages:
  - python
  pattern: pyvista.utilities.$ATTR
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 308
- id: utilities-function-call-via-old-path
  message: Function call via deprecated pyvista.utilities path. Use pyvista.core.utilities
    or pyvista.plotting.utilities.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: pyvista.utilities.$MOD.$FUNC(...)
  - metavariable-regex:
      metavariable: $MOD
      regex: ^[a-z_]+$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 219
- id: old-utilities-submodule-chain-call
  message: Chained call via deprecated utilities submodule. Update to pyvista.core.utilities.$MOD1.$MOD2(...).
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: pyvista.utilities.$MOD1.$MOD2(...)
  - metavariable-regex:
      metavariable: $MOD1
      regex: ^(helpers|misc|arrays|cells|fileio|transformations)$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 153
- id: utilities-string-literal
  message: String literal referencing deprecated pyvista.utilities module. Update
    to new structure.
  severity: INFO
  languages:
  - python
  pattern-regex: (pyvista\.utilities\.[a-z_]+)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 106
- id: utilities-misc-attribute-access
  message: Misc utilities attribute access via old path. Use pyvista.core.utilities.misc.$ATTR.
  severity: WARNING
  languages:
  - python
  pattern: pyvista.utilities.misc.$ATTR
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: old-utilities-root-import
  message: Direct import from deprecated pyvista.utilities. Use 'pyvista.core.utilities.*'
    or 'pyvista.plotting.utilities.*'.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from pyvista.utilities import $FUNC
  - pattern-not: from pyvista.utilities import deprecated
  - pattern-not-inside: 'pyvista/utilities/...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 80
- id: old-utilities-module-in-docstring
  message: Documentation references old pyvista.utilities path. Update to pyvista.core.utilities
    or pyvista.plotting.utilities.
  severity: INFO
  languages:
  - python
  pattern-regex: pyvista\.utilities\.(helpers|misc|arrays|cells|fileio|transformations|algorithms|errors)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 75
- id: utilities-import-without-core-prefix
  message: Import from deprecated pyvista.utilities. Most utilities moved to pyvista.core.utilities
    or pyvista.plotting.utilities.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from pyvista.utilities.$MOD import $FUNC
    - pattern: import pyvista.utilities.$MOD
  - pattern-not: from pyvista.utilities.deprecated import $FUNC
  - pattern-not: import pyvista.utilities.deprecated
  - pattern-not-inside: 'pyvista/utilities/...

      '
  - metavariable-regex:
      metavariable: $MOD
      regex: ^(helpers|arrays|cells|fileio|transformations|misc|algorithms|errors|wrappers|regression|sphinx_gallery|docs|cell_type_helper)$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 59
- id: old-utilities-import-any-submodule
  message: Importing from deprecated pyvista.utilities submodule. Update to use pyvista.core.utilities
    or pyvista.plotting.utilities.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from pyvista.utilities.$SUBMOD import $X
    - pattern: import pyvista.utilities.$SUBMOD as $ALIAS
  - pattern-not: from pyvista.utilities.deprecated import $X
  - pattern-not: import pyvista.utilities.deprecated as $ALIAS
  - pattern-not-inside: 'pyvista/utilities/...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 54
- id: utilities-helpers-attribute-access
  message: Attribute access on monolithic helpers module. Helpers was split into focused
    submodules.
  severity: WARNING
  languages:
