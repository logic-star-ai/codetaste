rules:
- id: fl-qualified-all-members-pattern
  message: Detected qualified FL enum member (comprehensive pattern)
  severity: INFO
  languages:
  - generic
  pattern-regex: FL\.(unde|const_|oper|func|data|reg|pseudo|auto_|fast|para|extern_|code|block|udata|cs|switch_|fltreg|offset|datseg|ctor|dtor|regsave|asm_|ndp|fardata|csdata|localsize|tlsdata|bprel|framehandler|blockoff|allocatmp|stack|dsymbol|got|gotoff|funcarg|max)
  metadata:
    category: basic
    nr_refactored_patterns: 1197
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.d'
- id: fl-qualified-in-comma-expression
  message: Detected FL enum member after comma (function argument or list)
  severity: INFO
  languages:
  - generic
  pattern-regex: ',\s*FL\.\w+'
  metadata:
    category: basic
    nr_refactored_patterns: 405
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.d'
- id: fl-assignment-with-qualified-member
