- id: import-db-with-db-and-other-types
  message: 'DB interface and other types imported from old ''src/db''. Separate imports:
    DB from ''src/schema'', table types from ''src/schema/tables/*.table'''
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { DB, $OTHER } from 'src/db'
    - pattern: import { $OTHER, DB } from 'src/db'
    - pattern: import { DB, $OTHER, ... } from 'src/db'
    - pattern: import { $OTHER, ..., DB } from 'src/db'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: import-db-with-db-and-table-types
