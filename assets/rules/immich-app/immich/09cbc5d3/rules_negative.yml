rules:
- id: module-augmentation-with-db-from-old-import
  message: Module augmentation in file with DB import from old location. Review if
    DB should be imported from 'src/schema'
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "declare module $MOD {\n  ...\n}\n"
  - pattern-inside: 'import { DB } from ''src/db''

      ...

      '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5226
- id: generic-constraint-db-from-old-import
  message: Generic constraint using DB from old location. Import DB from 'src/schema'
    instead
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'function $FUNC<$T extends $TYPE<DB>>(...) { ... }

      '
  - pattern-inside: 'import { DB } from ''src/db''

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 523
- id: optional-parameter-db-type-from-old-import
