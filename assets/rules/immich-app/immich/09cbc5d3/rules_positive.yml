rules:
- id: refactor-import-db-from-schema
  message: Detected DB interface imported from new location 'src/schema' - refactoring
    applied
  severity: INFO
  languages:
  - typescript
  pattern: import { ..., DB, ... } from 'src/schema'
  metadata:
    category: structural
    nr_refactored_patterns: 53
    nr_legacy_patterns: 0
- id: refactor-import-db-only-from-schema
  message: Detected DB interface imported from 'src/schema' - refactoring applied
  severity: INFO
  languages:
  - typescript
  pattern: import { DB } from 'src/schema'
  metadata:
    category: structural
    nr_refactored_patterns: 53
    nr_legacy_patterns: 0
- id: refactor-regular-db-import-from-schema-index
  message: DB imported from src/schema (regular import) - refactoring applied
  severity: INFO
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*\bDB\b[^}]*\}\s+from\s+['"]src/schema['"]
  metadata:
    category: structural
    nr_refactored_patterns: 53
    nr_legacy_patterns: 0
- id: refactor-import-db-from-schema-repositories-pattern
  message: Repository imports DB from src/schema - refactoring applied
  severity: INFO
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*\bDB\b[^}]*\}\s+from\s+['"]src/schema['"]
  metadata:
    category: structural
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
    include:
    - server/src/repositories/**/*.ts
- id: refactor-import-db-in-any-repository
  message: DB type imported from schema in repository - refactoring applied
  severity: INFO
  languages:
  - typescript
  pattern-regex: \bDB\b.*from\s+['"]src/schema['"]
  metadata:
    category: structural
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
    include:
    - server/src/repositories/*.ts
- id: refactor-generic-repositories-import-schema
  message: Repository file imports from src/schema - refactoring applied
  severity: INFO
  languages:
  - typescript
  pattern-regex: import.*from ['"]src/schema['"]
  metadata:
    category: structural
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  paths:
    include:
    - server/src/repositories/*.repository.ts
- id: refactor-db-interface-comprehensive-fields
  message: DB interface has comprehensive table field mappings - refactoring applied
  severity: INFO
  languages:
  - typescript
  pattern-regex: (activity|albums|assets|person|libraries|partners|memories|sessions|notifications|shared_links|exif|audit|tags|users):\s*\w+
  metadata:
    category: architecture
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - server/src/schema/index.ts
- id: refactor-import-db-in-any-test
  message: DB type imported from schema in test - refactoring applied
  severity: INFO
  languages:
  - typescript
  pattern-regex: \bDB\b.*from\s+['"]src/schema['"]
  metadata:
    category: structural
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - server/test/**/*.ts
