rules:
- id: test-import-newconfigrepositorymock
  message: Test imports newConfigRepositoryMock. Use newTestService() utility instead
    of importing individual mock factories.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: newConfigRepositoryMock
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
  paths:
    include:
    - '*.spec.ts'
