rules:
- id: service-extends-baseservice-without-inject-imports
  message: Service extends BaseService without importing Inject decorator (refactoring
    applied)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "export class $SERVICE extends BaseService {\n  ...\n}\n"
  - pattern-not-inside: 'import { ..., Inject, ... } from ''@nestjs/common'';

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.service.ts'
    exclude:
    - '*.spec.ts'
    - base.service.ts
- id: test-uses-new-test-service-utility
  message: Test uses newTestService utility (refactoring pattern detected)
  severity: INFO
  languages:
  - typescript
  pattern: '$VAR = newTestService($SERVICE)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-calls-newtestservice-with-class
  message: Test calls newTestService with service class (refactoring applied)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: newTestService($CLASS)
  - metavariable-pattern:
      metavariable: $CLASS
      pattern-regex: .*Service$
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-file-with-newtestservice-call
  message: Test uses newTestService function (refactoring applied)
  severity: INFO
  languages:
  - typescript
  pattern: newTestService($X)
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-imports-from-utils
  message: Test imports from test/utils (refactoring may include new test utilities)
  severity: INFO
  languages:
  - typescript
  pattern: 'import { ..., $UTIL, ... } from ''test/utils''

    '
  metadata:
    category: config
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-beforeeach-calls-newtestservice
  message: Test beforeEach calls newTestService (refactoring applied)
  severity: INFO
  languages:
  - typescript
  pattern: "beforeEach(() => {\n  ...\n  newTestService($X);\n  ...\n})\n"
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-uses-newtestservice-instead-of-direct-instantiation
  message: Test uses newTestService instead of direct instantiation (refactoring applied)
  severity: INFO
  languages:
  - typescript
  pattern: newTestService($SERVICE)
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-spec-file-simplified-mock-setup
  message: Test uses simplified mock setup with newTestService (refactoring applied)
  severity: INFO
  languages:
  - typescript
  pattern-regex: newTestService\([A-Z]\w+Service\)
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-file-no-manual-repository-mock-instantiation
  message: Test uses newTestService without manual repository mock instantiation (refactoring
    applied)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: newTestService($CLASS)
  - pattern-not: newAlbumRepositoryMock()
  - pattern-not: newAssetRepositoryMock()
  - pattern-not: newAccessRepositoryMock()
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-imports-newtestservice-utility
  message: Test imports newTestService utility function (refactoring applied)
  severity: INFO
  languages:
  - typescript
  pattern: 'import { newTestService } from ''test/utils''

    '
  metadata:
    category: config
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-describes-service-with-newtestservice
  message: Test describe block uses newTestService (refactoring applied)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "describe($NAME, () => {\n  ...\n  newTestService($SERVICE);\n  ...\n\
      })\n"
  - metavariable-pattern:
      metavariable: $SERVICE
      pattern-regex: .*Service$
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-no-longer-needs-repository-mock-imports
  message: Test uses newTestService without importing repository mocks (refactoring
    applied)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: newTestService($SERVICE)
  - pattern-not-inside: 'import { ..., new$REPOMock, ... } from ''$PATH'';

      ...

      '
  - metavariable-pattern:
      metavariable: $SERVICE
      pattern-regex: .*Service$
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-sut-instantiation-simplified
  message: Test sut instantiation simplified with newTestService (refactoring applied)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: '$VAR = newTestService($SERVICE)

      '
  - metavariable-pattern:
      metavariable: $VAR
      pattern-regex: .*sut.*
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-spec-reduced-boilerplate-setup
  message: Test beforeEach has reduced boilerplate using newTestService (refactoring
    applied)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "beforeEach(() => {\n  $ASSIGN = newTestService($SERVICE);\n})\n"
  - metavariable-pattern:
      metavariable: $SERVICE
      pattern-regex: .*Service$
  metadata:
    category: basic
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
- id: test-destructures-multiple-mocks
  message: Test destructures sut and multiple mocks (refactoring applied)
  severity: INFO
  languages:
  - typescript
  pattern-regex: \{\s*sut,\s*\w+,\s*\w+,\s*\w+[^}]*\}\s*=
  metadata:
    category: basic
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.spec.ts'
