rules:
- id: user-import-updateuserdto
  message: Import of UpdateUserDto detected. Should use UserUpdateMeDto for self-updates
    or UserAdminUpdateDto for admin updates
  severity: WARNING
  languages:
  - typescript
  pattern: import { ..., UpdateUserDto, ... } from 'src/dtos/user.dto'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: user-mobile-api-getmyuserinfo
  message: Mobile app using getMyUserInfo() API call. Should use getMyUser() for consistency
  severity: WARNING
  languages:
  - dart
  - kotlin
  - swift
  - java
  pattern-regex: (getMyUserInfo|user\.getMyInfo)\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/mobile/**'
    - '**/*.dart'
    - '**/*.kt'
    - '**/*.swift'
- id: user-import-old-create-user-dto
  message: Import of old CreateUserDto detected. Should import CreateUserAdminDto
    for admin operations
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'import { ..., CreateUserDto, ... } from ''$PATH''

      '
  - pattern-not: 'import { ..., CreateUserAdminDto, ... } from ''$PATH''

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: .*user.*dto.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: user-api-client-deleteuser-call
  message: API client call to deleteUser() detected. Should use deleteUserAdmin()
    for admin user deletion under /admin/users endpoint
  severity: WARNING
  languages:
  - typescript
  pattern: deleteUser($ID, $DTO)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/api/**'
    - '**/client/**'
    - '**/*-client.ts'
    - '**/*-sdk.ts'
    - '**/sdk/**'
- id: user-import-createuserdto
  message: Import of CreateUserDto detected. Should use CreateUserAdminDto for admin
    user creation
  severity: WARNING
  languages:
  - typescript
  pattern: import { ..., CreateUserDto, ... } from 'src/dtos/user.dto'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: user-e2e-deleteuser-api-call
  message: E2E test using deleteUser() API call. Should use deleteUserAdmin() for
    admin user deletion under /admin/users
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: $API.deleteUser($ID, $DTO)
  - pattern: deleteUser($ID, $DTO)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/e2e/**'
    - '**/*.e2e-spec.ts'
    - '**/*.spec.ts'
- id: user-import-old-delete-user-dto
  message: Import of old DeleteUserDto detected. Should import UserAdminDeleteDto
    for admin operations
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'import { ..., DeleteUserDto, ... } from ''$PATH''

      '
  - pattern-not: 'import { ..., UserAdminDeleteDto, ... } from ''$PATH''

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: .*user.*dto.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: user-import-deleteuserdto
  message: Import of DeleteUserDto detected. Should use UserAdminDeleteDto for admin
    user deletion
  severity: WARNING
  languages:
  - typescript
  pattern: import { ..., DeleteUserDto, ... } from 'src/dtos/user.dto'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: user-mobile-api-updateuser
  message: Mobile app using updateUser() API call. Should use updateMyUser() for self-updates
    or updateUserAdmin() for admin updates
  severity: WARNING
  languages:
  - dart
  - kotlin
  - swift
  - java
  pattern-regex: (updateUser|user\.update)\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/mobile/**'
    - '**/*.dart'
    - '**/*.kt'
    - '**/*.swift'
- id: user-variable-declaration-updateuserdto
  message: Variable declaration with UpdateUserDto type. Should use UserUpdateMeDto
    for self-updates or UserAdminUpdateDto for admin updates
  severity: WARNING
  languages:
  - typescript
  pattern: 'const $VAR: UpdateUserDto = $VALUE

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: user-import-statement-all-old-dtos
  message: Import of all old DTO names detected. Should import CreateUserAdminDto,
    UserAdminDeleteDto, UserUpdateMeDto/UserAdminUpdateDto, and UserAdminResponseDto
    for admin operations
  severity: WARNING
  languages:
  - typescript
  pattern: 'import { CreateUserDto, DeleteUserDto, UpdateUserDto, UserResponseDto
    } from ''src/dtos/user.dto''

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: user-endpoint-old-create-user-route
  message: Old admin user creation endpoint detected. Should be moved to @Post() in
    AdminUserController with createUserAdmin() method under /admin/users route
  severity: WARNING
  languages:
  - typescript
  pattern: '@Post()

    @Authenticated({ admin: true })

    createUser(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-endpoint-old-delete-user-route
  message: Old admin user deletion endpoint detected. Should be moved to @Delete(':id')
    in AdminUserController with deleteUserAdmin() method under /admin/users route
  severity: WARNING
  languages:
  - typescript
  pattern: '@Delete('':id'')

    @Authenticated({ admin: true })

    deleteUser(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-endpoint-old-restore-user-route
  message: Old admin user restore endpoint detected. Should be moved to @Post(':id/restore')
    in AdminUserController with restoreUserAdmin() method under /admin/users route
  severity: WARNING
  languages:
  - typescript
  pattern: '@Post('':id/restore'')

    @Authenticated({ admin: true })

    restoreUser(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-endpoint-old-get-all-users-admin
  message: 'Old getAllUsers endpoint detected. Should be split: regular users use
    searchUsers() returning UserResponseDto, admins use searchUsersAdmin() returning
    UserAdminResponseDto'
  severity: WARNING
  languages:
  - typescript
  pattern: '@Get()

    @Authenticated()

    getAllUsers($AUTH, $ISALL: boolean) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-endpoint-old-update-user-without-me
  message: 'Old updateUser endpoint detected. Should be split: self-update uses @Put(''/me'')
    updateMyUser() with UserUpdateMeDto, admin update uses @Put('':id'') updateUserAdmin()
    with UserAdminUpdateDto'
  severity: WARNING
  languages:
  - typescript
  pattern: '@Put()

    @Authenticated()

    updateUser($AUTH, $DTO: UpdateUserDto) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-dto-old-create-user-dto-name
  message: Old CreateUserDto detected. Should be renamed to CreateUserAdminDto for
    admin user creation
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'export class CreateUserDto { ... }

      '
  - pattern-not-inside: 'export class CreateUserAdminDto { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-dto-old-delete-user-dto-name
  message: Old DeleteUserDto detected. Should be renamed to UserAdminDeleteDto for
    admin user deletion
  severity: WARNING
  languages:
  - typescript
  pattern: 'export class DeleteUserDto { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-service-admin-create-in-userservice
  message: Admin create() method found in UserService. Should be moved to createUserAdmin()
    in UserAdminService
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "class UserService {\n  ...\n  async create($DTO: CreateUserDto) { ...\
      \ }\n  ...\n}\n"
  - pattern-not-inside: 'class UserAdminService { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-service-admin-delete-in-userservice
  message: Admin delete() method found in UserService. Should be moved to deleteUserAdmin()
    in UserAdminService
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "class UserService {\n  ...\n  async delete($AUTH, $ID, $DTO: DeleteUserDto)\
      \ { ... }\n  ...\n}\n"
  - pattern-not-inside: 'class UserAdminService { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-service-admin-restore-in-userservice
  message: Admin restore() method found in UserService. Should be moved to restoreUserAdmin()
    in UserAdminService
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "class UserService {\n  ...\n  async restore($AUTH, $ID) { ... }\n  ...\n\
      }\n"
  - pattern-not-inside: 'class UserAdminService { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-dto-update-with-id-field
  message: UpdateUserDto with 'id' field detected. Self-update DTOs (UserUpdateMeDto)
    should not have id field; admin update DTOs should be renamed to UserAdminUpdateDto
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "class UpdateUserDto {\n  ...\n  id: $TYPE\n  ...\n}\n"
  - pattern-not-inside: 'class UserAdminUpdateDto { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-dto-update-with-isadmin-field
  message: UpdateUserDto with 'isAdmin' field detected. Only admin update DTO (UserAdminUpdateDto)
    should allow modifying isAdmin field
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "class UpdateUserDto {\n  ...\n  isAdmin: $TYPE\n  ...\n}\n"
  - pattern-not-inside: 'class UserAdminUpdateDto { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-dto-update-with-shouldchangepassword
  message: UpdateUserDto with 'shouldChangePassword' field detected. Only admin update
    DTO (UserAdminUpdateDto) should allow modifying shouldChangePassword
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "class UpdateUserDto {\n  ...\n  shouldChangePassword: $TYPE\n  ...\n\
      }\n"
  - pattern-not-inside: 'class UserAdminUpdateDto { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-dto-update-with-password-field
  message: UpdateUserDto with 'password' field should be split into UserUpdateMeDto
    (self-update) and UserAdminUpdateDto (admin-update)
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "class UpdateUserDto {\n  ...\n  password: $TYPE\n  ...\n}\n"
  - pattern-not-inside: 'class UserAdminUpdateDto { ... }

      '
  - pattern-not-inside: 'class UserUpdateMeDto { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-response-dto-with-shouldchangepassword
  message: 'UserResponseDto with sensitive field ''shouldChangePassword'' detected.
    Should be split: UserResponseDto (limited) vs UserAdminResponseDto (with sensitive
    fields)'
  severity: WARNING
  languages:
  - typescript
  pattern: "class UserResponseDto {\n  ...\n  shouldChangePassword: $TYPE\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-response-dto-with-quotausageinbytes
  message: 'UserResponseDto with sensitive field ''quotaUsageInBytes'' detected. Should
    be split: UserResponseDto (limited) vs UserAdminResponseDto (with sensitive fields)'
  severity: WARNING
  languages:
  - typescript
  pattern: "class UserResponseDto {\n  ...\n  quotaUsageInBytes: $TYPE\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-method-createuser-in-controller
  message: Old createUser() controller method detected. Should be renamed to createUserAdmin()
    and use userAdminService.createUserAdmin()
  severity: WARNING
  languages:
  - typescript
  pattern: "createUser($DTO) {\n  return this.service.create($DTO);\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-method-updateuser-in-controller
  message: 'Old updateUser() controller method detected. Should be split: updateMyUser()
    for self-updates or updateUserAdmin() for admin updates'
  severity: WARNING
  languages:
  - typescript
  pattern: "updateUser($AUTH, $DTO) {\n  return this.service.update($AUTH, $DTO);\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-method-getallusers-in-controller
  message: 'Old getAllUsers() controller method detected. Should be split: searchUsers()
    for non-admin or searchUsersAdmin() for admin with full details'
  severity: WARNING
  languages:
  - typescript
  pattern: "getAllUsers($AUTH, $PARAM) {\n  return this.service.getAll($AUTH, $PARAM);\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-method-getmyuserinfo-in-controller
  message: Old getMyUserInfo() controller method detected. Should be renamed to getMyUser()
    for consistency
  severity: WARNING
  languages:
  - typescript
  pattern: "getMyUserInfo($AUTH) {\n  return this.service.getMe($AUTH);\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-method-getuserbyid-in-controller
  message: 'Old getUserById() controller method detected. Should be renamed: getUser()
    for non-admin or getUserAdmin() for admin with full details'
  severity: WARNING
  languages:
  - typescript
  pattern: "getUserById($PARAM) {\n  return this.service.get($ID);\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-decorator-post-createuser-admin
  message: Admin createUser endpoint in UserController detected. Should be moved to
    AdminUserController with @Post() under /admin/users route and renamed to createUserAdmin()
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "@Post()\n@Authenticated({ admin: true })\ncreateUser($PARAM) {\n  $BODY\n\
      }\n"
  - pattern-inside: '@Controller(Route.USER)

      class $CONTROLLER { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-decorator-delete-deleteuser-admin
  message: Admin deleteUser endpoint in UserController detected. Should be moved to
    AdminUserController with @Delete(':id') under /admin/users route and renamed to
    deleteUserAdmin()
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "@Delete('$ID')\n@Authenticated({ admin: true })\ndeleteUser($A, $B,\
      \ $C) {\n  $BODY\n}\n"
  - pattern-inside: '@Controller(Route.USER)

      class $CONTROLLER { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-decorator-post-restoreuser-admin
  message: Admin restoreUser endpoint in UserController detected. Should be moved
    to AdminUserController with @Post(':id/restore') under /admin/users route and
    renamed to restoreUserAdmin()
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "@Post('$ID')\n@Authenticated({ admin: true })\nrestoreUser($A, $B) {\n\
      \  $BODY\n}\n"
  - pattern-inside: '@Controller(Route.USER)

      class $CONTROLLER { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-decorator-put-updateuser-unified
  message: 'Unified updateUser endpoint detected. Should be split: @Put(''me'') updateMyUser()
    for self-updates (UserUpdateMeDto) or moved to AdminUserController as @Put('':id'')
    updateUserAdmin() for admin updates (UserAdminUpdateDto)'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "@Put()\n@Authenticated()\nupdateUser($AUTH, $DTO) {\n  $BODY\n}\n"
  - pattern-inside: '@Controller(Route.USER)

      class $CONTROLLER { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-decorator-get-getallusers
  message: 'getAllUsers endpoint detected. Should be split: searchUsers() returning
    UserResponseDto[] in UserController for non-admin, and searchUsersAdmin() returning
    UserAdminResponseDto[] in AdminUserController for admin with withDeleted param'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "@Get()\n@Authenticated()\ngetAllUsers($AUTH, $ISALL) {\n  $BODY\n}\n"
  - pattern-inside: '@Controller(Route.USER)

      class $CONTROLLER { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-decorator-get-getmyuserinfo
  message: getMyUserInfo method name detected. Should be renamed to getMyUser() for
    consistency
  severity: WARNING
  languages:
  - typescript
  pattern: "@Get('me')\n@Authenticated()\ngetMyUserInfo($AUTH) {\n  $BODY\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-decorator-get-getuserbyid
  message: 'getUserById method name detected. Should be renamed: getUser() for non-admin
    (limited UserResponseDto) or getUserAdmin() for admin (full UserAdminResponseDto)
    in AdminUserController'
  severity: WARNING
  languages:
  - typescript
  pattern: "@Get('$ID')\n@Authenticated()\ngetUserById($PARAM) {\n  $BODY\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-service-getall-with-isall-param
  message: 'getAll() method with isAll boolean parameter detected. Should be split:
    searchUsers() for non-admin (limited fields) and searchUsersAdmin() for admin
    with withDeleted query param'
  severity: WARNING
  languages:
  - typescript
  pattern: "getAll($AUTH, $ISALL) {\n  ...\n  this.userRepository.getList({ withDeleted:\
    \ !$ISALL })\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-service-update-with-id-in-dto
  message: 'update() method accessing DTO.id detected. Should be split: updateMyUser()
    using auth.user.id (no id in DTO) for self-updates, or updateUserAdmin(id, dto)
    with id as separate parameter for admin updates'
  severity: WARNING
  languages:
  - typescript
  pattern: "update($AUTH, $DTO) {\n  ...\n  this.findOrFail($DTO.id, ...)\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: user-controller-admin-auth-decorator
  message: Admin-only method detected in UserController. Admin endpoints should be
    moved to AdminUserController under /admin/users route
  severity: WARNING
  languages:
  - typescript
  pattern: '@Authenticated({ admin: true })

    $METHOD($PARAMS) { $BODY }

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/controllers/user.controller.ts'
- id: user-dto-createuser-name
  message: CreateUserDto class detected. Should be renamed to CreateUserAdminDto to
    clearly indicate it's for admin user creation
  severity: WARNING
  languages:
  - typescript
  pattern: "class CreateUserDto {\n  $FIELDS\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/dtos/user.dto.ts'
- id: user-dto-deleteuser-name
  message: DeleteUserDto class detected. Should be renamed to UserAdminDeleteDto to
    clearly indicate it's for admin user deletion
  severity: WARNING
  languages:
  - typescript
  pattern: "class DeleteUserDto {\n  $FIELDS\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/dtos/user.dto.ts'
- id: user-dto-updateuser-id-field-present
  message: 'UpdateUserDto with id field detected. Should be split: UserUpdateMeDto
    (no id, for self-updates) and UserAdminUpdateDto (with id or separate param, for
    admin updates)'
  severity: WARNING
  languages:
  - typescript
  pattern: "class UpdateUserDto {\n  ...\n  id: string\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/dtos/user.dto.ts'
- id: user-dto-updateuser-isadmin-field-present
  message: UpdateUserDto with isAdmin field detected. Only admin update DTO (UserAdminUpdateDto)
    should allow modifying isAdmin field
  severity: WARNING
  languages:
  - typescript
  pattern: "class UpdateUserDto {\n  ...\n  isAdmin: $TYPE\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/dtos/user.dto.ts'
- id: user-dto-updateuser-shouldchangepassword-present
  message: UpdateUserDto with shouldChangePassword field detected. Only admin update
    DTO (UserAdminUpdateDto) should allow modifying shouldChangePassword field
  severity: WARNING
  languages:
  - typescript
  pattern: "class UpdateUserDto {\n  ...\n  shouldChangePassword: $TYPE\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/dtos/user.dto.ts'
- id: user-dto-responsedto-shouldchangepassword-field
  message: 'UserResponseDto with sensitive shouldChangePassword field detected. Should
    be split: UserResponseDto (limited fields) and UserAdminResponseDto (full fields
    including shouldChangePassword)'
  severity: WARNING
  languages:
  - typescript
  pattern: "class UserResponseDto {\n  ...\n  shouldChangePassword: $TYPE\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/dtos/user.dto.ts'
- id: user-dto-responsedto-quotausageinbytes-field
  message: 'UserResponseDto with sensitive quotaUsageInBytes field detected. Should
    be split: UserResponseDto (limited fields) and UserAdminResponseDto (full fields
    including quotaUsageInBytes)'
  severity: WARNING
  languages:
  - typescript
  pattern: "class UserResponseDto {\n  ...\n  quotaUsageInBytes: $TYPE\n  ...\n}\n"
  metadata:
    category: api
