rules:
- id: circle-icon-button-variable-reference
  message: Reference to CircleIconButton should be updated to IconButton from @immich/ui
  severity: WARNING
  languages:
  - generic
  pattern-regex: \bCircleIconButton\b(?!\.svelte)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 185
- id: circle-icon-button-opening-tag
  message: CircleIconButton opening tag should be migrated to IconButton from @immich/ui
  severity: WARNING
  languages:
  - generic
  pattern-regex: <CircleIconButton[^>]*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 113
- id: circle-icon-button-usage-any-context
  message: Any CircleIconButton tag should be migrated to IconButton from @immich/ui
  severity: WARNING
  languages:
  - generic
  pattern-regex: <CircleIconButton[^>]*(?:/>|>)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 113
- id: circle-icon-button-onclick-handler
