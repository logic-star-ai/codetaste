rules:
- id: detect-decorator-folder-reference
  message: Reference to old decorator folder structure detected. Decorators have been
    consolidated or moved
  severity: WARNING
  languages:
  - typescript
  pattern-regex: decorators/(authenticated|auth-user|validate-uuid|use-validation)\.decorator
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 65
- id: detect-dot-dot-decorators-import
  message: Relative import from ../decorators detected. Decorators have been consolidated
    or moved
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \.\./decorators/(authenticated|auth-user|validate-uuid|use-validation)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 52
- id: detect-import-from-auth-user-decorator
  message: Import from old 'decorators/auth-user.decorator' detected. Should import
    AuthUser, GetLoginDetails, AuthRequest from consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+.*\s+from\s+['"].*decorators/auth-user\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: detect-mixed-auth-user-imports
  message: Import of auth user components from old path detected. Should import from
    consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*(AuthUser|GetLoginDetails|AuthRequest|AuthUserDto)[^}]*\}\s+from\s+['"].*\/decorators\/auth-user\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: detect-authuser-import-old-path
  message: Import of AuthUser from old decorator path detected. Should import from
    consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*AuthUser[^}]*\}\s+from\s+['"].*decorators/auth-user\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: detect-import-from-authenticated-decorator
  message: Import from old 'decorators/authenticated.decorator' detected. Should import
    Authenticated, PublicRoute, SharedLinkRoute, AdminRoute, Metadata from consolidated
    app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+.*\s+from\s+['"].*decorators/authenticated\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-export-authuserdto-from-decorator
  message: AuthUserDto export found in old decorator file. This file should be removed
  severity: WARNING
  languages:
  - typescript
  pattern: 'export { AuthUserDto } from ''@app/domain'';

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - server/src/immich/decorators/auth-user.decorator.ts
- id: detect-multiple-decorator-imports-from-old-paths
  message: Multiple imports from old decorator paths detected. All decorators should
    be consolidated
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]+\}\s+from\s+['"].*decorators/(authenticated|auth-user|validate-uuid|use-validation)\.decorator['"];\s*import\s+\{[^}]+\}\s+from\s+['"].*decorators/(authenticated|auth-user|validate-uuid|use-validation)\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-mixed-auth-decorators-import
  message: Import of auth decorators from old path detected. All auth decorators should
    be imported from consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*(Authenticated|PublicRoute|SharedLinkRoute|AdminRoute)[^}]*\}\s+from\s+['"].*\/decorators\/authenticated\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-import-from-use-validation-decorator
  message: Import from old 'decorators/use-validation.decorator' detected. Should
    import UseValidation from app.utils.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+.*\s+from\s+['"].*decorators/use-validation\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-authenticated-decorator-old-path-relative
  message: Relative import of Authenticated decorator from old path detected. Should
    import from app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*Authenticated[^}]*\}\s+from\s+['"]\.\.\/decorators\/authenticated\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-use-validation-relative-import
  message: Import of UseValidation from old decorator path detected. Should import
    from app.utils.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*UseValidation[^}]*\}\s+from\s+['"]\.\.\/decorators/use-validation\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-utils-folder-reference
  message: Reference to old utils folder structure detected. Utilities have been moved
    to domain.util.ts or app.utils.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: utils/(transform|path-form-data)\.util
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-nested-immich-decorator-import
  message: Import from nested immich/decorators path detected. Decorators have been
    consolidated
  severity: WARNING
  languages:
  - typescript
  pattern-regex: from\s+['"].*\/immich\/decorators\/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-authuserdto-import-from-decorator
  message: Import of AuthUserDto from decorator path detected. Should be exported
    from domain layer
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*AuthUserDto[^}]*\}\s+from\s+['"].*decorators/auth-user\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-app-immich-decorator-path
  message: Import from @app/immich/decorators path detected. Decorators have been
    consolidated into app.guard.ts or moved to appropriate locations
  severity: WARNING
  languages:
  - typescript
  pattern-regex: from\s+['"]@app\/immich\/decorators\/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-any-immich-decorator-import
  message: Import from @app/immich/decorators detected. Decorators have been consolidated
    or moved
  severity: WARNING
  languages:
  - typescript
  pattern-regex: '@app/immich/decorators/'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-import-from-validate-uuid-decorator
  message: Import from old 'decorators/validate-uuid.decorator' detected. Should import
    ValidateUUID from domain.util.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+.*\s+from\s+['"].*decorators/validate-uuid\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-import-from-transform-util
  message: Import from old 'utils/transform.util' detected. Should import toBoolean,
    toEmail, toSanitized from domain.util.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+.*\s+from\s+['"].*utils/transform\.util['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-validate-uuid-relative-import
  message: Import of ValidateUUID from immich decorators detected. Should import from
    domain.util.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*ValidateUUID[^}]*\}\s+from\s+['"].*immich/decorators/validate-uuid\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-validate-uuid-import-immich-path
  message: Import of ValidateUUID from @app/immich path detected. Should import from
    domain.util.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*ValidateUUID[^}]*\}\s+from\s+['"]@app/immich/decorators/validate-uuid\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-dot-dot-utils-import
  message: Relative import from ../utils detected. Utilities have been moved to domain.util.ts
    or app.utils.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \.\./utils/(transform|path-form-data)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-authguard-reference
  message: Reference to AuthGuard detected. Class has been renamed to AppGuard in
    refactoring
  severity: WARNING
  languages:
  - typescript
  pattern-regex: AuthGuard(?!\.)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-authrequest-import-old-path
  message: Import of AuthRequest interface from old decorator path detected. Should
    import from consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*AuthRequest[^}]*\}\s+from\s+['"].*decorators/auth-user\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-transform-utils-immich-path
  message: Import of transform utilities from @app/immich path detected. Should import
    from domain.util.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*(toBoolean|toEmail|toSanitized)[^}]*\}\s+from\s+['"]@app/immich/utils/transform\.util['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-transform-util-relative-import
  message: Import of transform utilities from immich utils detected. Should import
    from domain.util.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*(toBoolean|toEmail|toSanitized)[^}]*\}\s+from\s+['"].*immich/utils/transform\.util['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-app-immich-utils-path
  message: Import from @app/immich/utils path detected. Utilities have been moved
    to domain.util.ts or app.utils.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: from\s+['"]@app\/immich\/utils\/(transform|path-form-data)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-nested-immich-utils-import
  message: Import from nested immich/utils path detected. Utilities have been moved
  severity: WARNING
  languages:
  - typescript
  pattern-regex: from\s+['"].*\/immich\/utils\/(transform|path-form-data)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-public-route-decorator-old-path
  message: Import of PublicRoute from old decorator path detected. Should import from
    consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*PublicRoute[^}]*\}\s+from\s+['"].*decorators/authenticated\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-shared-link-route-decorator-old-path
  message: Import of SharedLinkRoute from old decorator path detected. Should import
    from consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*SharedLinkRoute[^}]*\}\s+from\s+['"].*decorators/authenticated\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-apidecorators-in-authenticated
  message: API decorators in old authenticated.decorator.ts. File should be removed
    and consolidated into app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: ApiBearerAuth()
  - pattern: ApiCookieAuth()
  - pattern: ApiSecurity($KEY)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - server/src/immich/decorators/authenticated.decorator.ts
- id: detect-applydecorators-in-authenticated-file
  message: applyDecorators usage in old authenticated.decorator.ts. File should be
    removed and consolidated
  severity: WARNING
  languages:
  - typescript
  pattern: 'applyDecorators(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - server/src/immich/decorators/authenticated.decorator.ts
- id: detect-authguard-logger-warn
  message: Logger usage in old auth.guard.ts. File should be removed and merged into
    app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern: 'this.logger.warn(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - server/src/immich/middlewares/auth.guard.ts
- id: detect-import-from-path-form-data-util
  message: Import from old 'utils/path-form-data.util' detected. Should import patchFormData
    from app.utils.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+.*\s+from\s+['"].*utils/path-form-data\.util['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-import-from-auth-guard-middleware
  message: Import from old 'middlewares/auth.guard' detected. AuthGuard has been renamed
    to AppGuard and moved to app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+.*\s+from\s+['"].*middlewares/auth\.guard['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-admin-route-decorator-old-path
  message: Import of AdminRoute from old decorator path detected. Should import from
    consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*AdminRoute[^}]*\}\s+from\s+['"].*decorators/authenticated\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-getlogindetails-import-old-path
  message: Import of GetLoginDetails from old decorator path detected. Should import
    from consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*GetLoginDetails[^}]*\}\s+from\s+['"].*decorators/auth-user\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-metadata-enum-import-old-path
  message: Import of Metadata enum from old decorator path detected. Should import
    from consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*Metadata[^}]*\}\s+from\s+['"].*decorators/authenticated\.decorator['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-patchformdata-relative-import
  message: Import of patchFormData from old utils path detected. Should import from
    app.utils.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*patchFormData[^}]*\}\s+from\s+['"]\.\.\/utils/path-form-data\.util['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-middleware-auth-guard-reference
  message: Reference to old middlewares/auth.guard detected. AuthGuard has been renamed
    to AppGuard in app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: middlewares/auth\.guard
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-setmetadata-auth-route
  message: SetMetadata usage in old authenticated.decorator.ts. File should be removed
    and consolidated into app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern: 'SetMetadata(Metadata.AUTH_ROUTE, $VAL)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - server/src/immich/decorators/authenticated.decorator.ts
- id: detect-patchformdata-usage-with-old-import
  message: patchFormData function used with import from old path. Import should be
    from app.utils.ts
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'patchFormData($ARG)

      '
  - pattern-inside: 'import { patchFormData } from ''../utils/path-form-data.util'';

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-authguard-denied-access-log
  message: Access denial logging in old auth.guard.ts. Should be in AppGuard in app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: Denied\s+access\s+to\s+(authenticated|admin|non-shared)\s+route
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - server/src/immich/middlewares/auth.guard.ts
- id: detect-old-authguard-class-name
  message: Old AuthGuard class name detected. Should be renamed to AppGuard in the
    consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern: 'class AuthGuard { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-authguard-logger-name
  message: Logger using AuthGuard.name detected. Should use AppGuard.name after renaming
  severity: WARNING
  languages:
  - typescript
  pattern: 'new Logger(AuthGuard.name)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-authguard-useexisting-provider
  message: Provider using AuthGuard detected. Should use AppGuard after renaming
  severity: WARNING
  languages:
  - typescript
  pattern: '{ provide: APP_GUARD, useExisting: AuthGuard }

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-authguard-relative-import
  message: Import of AuthGuard from middlewares path detected. Should import AppGuard
    from app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*AuthGuard[^}]*\}\s+from\s+['"]\.\/middlewares/auth\.guard['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-old-authenticated-decorator-file-exists
  message: Old authenticated.decorator.ts file still exists. Should be removed as
    part of consolidation
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - server/src/immich/decorators/authenticated.decorator.ts
- id: detect-old-auth-user-decorator-file-exists
  message: Old auth-user.decorator.ts file still exists. Should be removed as part
    of consolidation
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - server/src/immich/decorators/auth-user.decorator.ts
- id: detect-old-validate-uuid-decorator-file-exists
  message: Old validate-uuid.decorator.ts file still exists. Should be removed and
    moved to domain.util.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - server/src/immich/decorators/validate-uuid.decorator.ts
- id: detect-old-use-validation-decorator-file-exists
  message: Old use-validation.decorator.ts file still exists. Should be removed and
    moved to app.utils.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - server/src/immich/decorators/use-validation.decorator.ts
- id: detect-old-transform-util-file-exists
  message: Old transform.util.ts file still exists. Should be removed and utilities
    moved to domain.util.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - server/src/immich/utils/transform.util.ts
- id: detect-old-path-form-data-util-file-exists
  message: Old path-form-data.util.ts file still exists. Should be removed and patchFormData
    moved to app.utils.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - server/src/immich/utils/path-form-data.util.ts
- id: detect-old-auth-guard-file-exists
  message: Old auth.guard.ts file still exists. Should be removed and AuthGuard renamed
    to AppGuard in app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - server/src/immich/middlewares/auth.guard.ts
- id: detect-authuser-decorator-old-location
  message: AuthUser decorator found in old file. Should be in consolidated app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern: 'export const AuthUser = createParamDecorator(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - server/src/immich/decorators/auth-user.decorator.ts
- id: detect-getlogindetails-decorator-old-location
  message: GetLoginDetails decorator found in old file. Should be in consolidated
    app.guard.ts
  severity: WARNING
  languages:
  - typescript
  pattern: 'export const GetLoginDetails = createParamDecorator(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - server/src/immich/decorators/auth-user.decorator.ts
- id: detect-validateuuid-decorator-old-location
  message: ValidateUUID decorator found in old file. Should be moved to domain.util.ts
  severity: WARNING
  languages:
  - typescript
  pattern: "export function ValidateUUID(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - server/src/immich/decorators/validate-uuid.decorator.ts
- id: detect-toboolean-function-old-location
  message: toBoolean function found in old file. Should be moved to domain.util.ts
  severity: WARNING
  languages:
  - typescript
