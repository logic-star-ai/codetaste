  - pattern: import { UseValidation } from './app.utils'
  - pattern: import { ..., UseValidation, ... } from '../app.utils'
  - pattern: import { UseValidation } from '../app.utils'
  metadata:
    category: dependency
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: controller-imports-authenticated-from-app-guard
