rules:
- id: multiple-decorators-in-app-guard
  message: Auth decorators consolidated in app.guard.ts
  severity: INFO
  languages:
  - typescript
  pattern-regex: (Authenticated|PublicRoute|AdminRoute|SharedLinkRoute|AuthUser|GetLoginDetails|export)
  metadata:
    category: api
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/app.guard.ts'
- id: any-import-from-app-guard
  message: Import statement from consolidated app.guard.ts detected
  severity: INFO
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*\}\s+from\s+['"](@app/immich/app\.guard|\./app\.guard|\.\./app\.guard)['"]
  metadata:
    category: api
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: import-authenticated-from-new-location
  message: Authenticated decorator imported from consolidated app.guard.ts
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: import { ..., Authenticated, ... } from '@app/immich/app.guard'
  - pattern: import { Authenticated } from '@app/immich/app.guard'
  - pattern: import { ..., Authenticated, ... } from './app.guard'
  - pattern: import { Authenticated } from './app.guard'
  - pattern: import { ..., Authenticated, ... } from '../app.guard'
  - pattern: import { Authenticated } from '../app.guard'
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: import-usevalidation-from-new-app-utils
