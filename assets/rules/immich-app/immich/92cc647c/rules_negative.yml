rules:
- id: import-from-domain-util-old-path
  message: Import from old 'src/domain/domain.util' path detected. Update to import
    from 'src/utils.ts', 'src/validation.ts', or 'src/decorators.ts' depending on
    what's being imported.
  severity: WARNING
  languages:
  - typescript
  pattern: import { ... } from 'src/domain/domain.util'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 75
- id: reference-domain-util-in-comment
  message: Reference to old 'domain.util' path found in comment or string. Update
    references to point to 'src/utils.ts', 'src/validation.ts', or 'src/decorators.ts'.
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: (domain\.util|domain/domain\.util)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 75
  paths:
    include:
    - '*.ts'
    - '*.js'
- id: import-multiple-validators-from-domain-util
  message: Multiple validation functions imported from old 'src/domain/domain.util'.
    Update to import from 'src/validation.ts'.
  severity: WARNING
  languages:
  - typescript
  pattern: import { ..., $VALIDATOR1, ..., $VALIDATOR2, ... } from 'src/domain/domain.util'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: dto-file-imports-from-domain-util
  message: DTO file imports from old 'src/domain/domain.util'. Update DTO imports
    to use 'src/validation.ts' for validators or 'src/utils.ts' for utilities.
  severity: WARNING
  languages:
  - typescript
  pattern: import { ... } from 'src/domain/domain.util'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - '**/dto/*.ts'
- id: import-validate-boolean-from-domain-util
  message: Import of ValidateBoolean from old 'src/domain/domain.util' path detected.
    Update to import from 'src/validation.ts'.
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: import { ..., ValidateBoolean, ... } from 'src/domain/domain.util'
  - pattern: import { ValidateBoolean } from 'src/domain/domain.util'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: import-optional-from-domain-util
