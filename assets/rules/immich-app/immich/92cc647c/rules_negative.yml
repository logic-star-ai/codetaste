  - pattern: import { Optional } from 'src/domain/domain.util'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: import-three-items-from-domain-util
  message: Three items imported from old 'src/domain/domain.util'. Update to import
    from consolidated modules.
  severity: WARNING
  languages:
  - typescript
  pattern: import { $ITEM1, $ITEM2, $ITEM3 } from 'src/domain/domain.util'
