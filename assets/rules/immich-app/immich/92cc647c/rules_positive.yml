- id: decorators-module-has-word-characters
  message: Decorators module has identifiers
  severity: INFO
  languages:
  - typescript
  pattern-regex: \w+
  metadata:
    nr_refactored_patterns: 507
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/decorators.ts'
- id: validation-module-has-word-characters
