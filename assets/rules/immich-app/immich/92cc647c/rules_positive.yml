rules:
- id: export-validation-decorator
  message: 'Refactoring detected: Validation decorator exported from new module'
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: export const $NAME = ...
  - pattern: export function $NAME(...$ARGS) { ... }
  - pattern: export class $NAME { ... }
  - pattern: export default class $NAME { ... }
  - pattern: export { $NAME }
  metadata:
    nr_refactored_patterns: 110
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/validation.ts'
- id: export-decorator
  message: 'Refactoring detected: Decorator exported from new decorators module'
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: export const $NAME = ...
  - pattern: export function $NAME(...$ARGS) { ... }
  - pattern: export class $NAME { ... }
  - pattern: export { $NAME }
  metadata:
    nr_refactored_patterns: 71
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/decorators.ts'
- id: import-from-new-validation-module
  message: 'Refactoring detected: Import from new consolidated validation module'
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., $IMPORT, ... } from '$PATH'
    - pattern: import * as $ALIAS from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: ^(src/validation|@/validation|\./validation|\.\./validation)$
  metadata:
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
- id: export-config
  message: 'Refactoring detected: Configuration exported from new config module'
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: export const $NAME = ...
  - pattern: export function $NAME(...$ARGS) { ... }
  - pattern: export { $NAME }
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/config.ts'
- id: utils-import-in-domain-services
  message: 'Refactoring detected: Utils module imported in domain services'
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: import { ..., $ITEM, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: ^(src/utils|@/utils|\./utils|\.\./utils|\.\./.*/utils)$
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/domain/**/*.ts'
- id: number-literal-in-decorators
