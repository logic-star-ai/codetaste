    - pattern: import { ..., $VALIDATOR, ... } from '$PATH'
    - pattern: import { $VALIDATOR } from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: ^src/validation$
  - metavariable-regex:
      metavariable: $VALIDATOR
      regex: (?i).*(validate|validator|optional|pipe|dto|transform).*
