rules:
- id: java-refactor-immutable-class-prefix-in-top-level
  message: Immutable* classes should be defined in 'immutable/' or 'lite/' subdirectories
    after refactoring
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: ^\s*class\s+Immutable\w+(Generator|Factory)\s*[:{]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
  paths:
    include:
    - src/google/protobuf/compiler/java/*.h
    - src/google/protobuf/compiler/java/*.cc
    exclude:
    - src/google/protobuf/compiler/java/immutable/**
    - src/google/protobuf/compiler/java/lite/**
    - src/google/protobuf/compiler/java/generator_factory.h
    - src/google/protobuf/compiler/java/field.h
- id: java-refactor-include-old-field
  message: Include 'field.h' should be replaced with 'field_common.h', 'generator_common.h',
    or specific field generator headers after refactoring
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: ^\s*#include\s+"google/protobuf/compiler/java/field\.h"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: java-refactor-concrete-field-generator-instantiation
  message: Concrete field generator instantiation should be in factory functions in
    'immutable/' or 'lite/' directories after refactoring
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: new\s+Immutable(Primitive|String|Message|Enum|Map)Field(Lite)?Generator\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - src/google/protobuf/compiler/java/field.cc
- id: java-refactor-include-old-extension
  message: Include 'extension.h' should reference 'immutable/extension.h' after refactoring
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: ^\s*#include\s+"google/protobuf/compiler/java/extension\.h"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: java-refactor-include-old-enum
  message: Include 'enum.h' should reference 'immutable/enum.h' after refactoring
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: ^\s*#include\s+"google/protobuf/compiler/java/enum\.h"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: java-refactor-old-field-generator-classes-combined
  message: Field generator classes should be in 'immutable/' subdirectory after refactoring
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: ^\s*class\s+(ImmutablePrimitiveFieldGenerator|ImmutableStringFieldGenerator|ImmutableMessageFieldGenerator|ImmutableEnumFieldGenerator|ImmutableMapFieldGenerator)\s*[:{]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - src/google/protobuf/compiler/java/primitive_field.h
    - src/google/protobuf/compiler/java/string_field.h
    - src/google/protobuf/compiler/java/message_field.h
    - src/google/protobuf/compiler/java/enum_field.h
    - src/google/protobuf/compiler/java/map_field.h
- id: java-refactor-old-field-lite-generator-classes-combined
  message: Field generator lite classes should be in 'lite/' subdirectory after refactoring
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: ^\s*class\s+(ImmutablePrimitiveFieldLiteGenerator|ImmutableStringFieldLiteGenerator|ImmutableMessageFieldLiteGenerator|ImmutableEnumFieldLiteGenerator|ImmutableMapFieldLiteGenerator)\s*[:{]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - src/google/protobuf/compiler/java/primitive_field_lite.h
    - src/google/protobuf/compiler/java/string_field_lite.h
    - src/google/protobuf/compiler/java/message_field_lite.h
    - src/google/protobuf/compiler/java/enum_field_lite.h
    - src/google/protobuf/compiler/java/map_field_lite.h
- id: java-refactor-inline-generator-instantiation
  message: Generator instantiation should use factory functions and return unique_ptr
    after refactoring
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: return\s+new\s+Immutable(Message|Extension|Service|Enum)(Lite)?Generator
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - src/google/protobuf/compiler/java/generator_factory.cc
- id: java-refactor-all-field-types-in-one-source
  message: Multiple field type handling should be distributed across separate files
    in 'immutable/' or 'lite/' after refactoring
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: (primitive_field|string_field|message_field|enum_field|map_field)[\s\S]{0,100}(string_field|message_field|enum_field|map_field|primitive_field)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - src/google/protobuf/compiler/java/field.cc
- id: java-refactor-include-old-message
  message: Include 'message.h' should reference 'immutable/message.h' after refactoring
