rules:
- id: java-generator-old-field-include
  message: Old include path for field.h detected. After refactoring, field.h should
    be split into field_common.h, generator_common.h, and internal_helpers.h, or use
    immutable/field_generator.h or lite/field_generator.h
  severity: WARNING
  languages:
  - cpp
  pattern: '#include "google/protobuf/compiler/java/field.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: java-generator-old-extension-include
  message: Old include path for extension.h detected. After refactoring, use immutable/extension.h
    or lite/extension.h
  severity: WARNING
  languages:
  - cpp
  pattern: '#include "google/protobuf/compiler/java/extension.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: java-generator-switch-getjavatype-pattern
  message: Switch on GetJavaType in field.cc detected. After refactoring, this logic
    should be in immutable/make_field_generators.cc or lite/make_field_generators.cc
  severity: WARNING
  languages:
  - cpp
  pattern: "switch (GetJavaType($FIELD)) {\n  case JAVATYPE_MESSAGE:\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - src/google/protobuf/compiler/java/field.cc
- id: java-generator-old-enum-include
  message: Old include path for enum.h detected. After refactoring, use immutable/enum.h
    or lite/enum.h
  severity: WARNING
  languages:
  - cpp
  pattern: '#include "google/protobuf/compiler/java/enum.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: java-generator-cmake-old-file-paths
  message: CMake file references old flat structure paths. After refactoring, paths
    should point to immutable/ or lite/ subdirectories
  severity: WARNING
  languages:
  - generic
  pattern-regex: compiler/java/(enum|message|extension|service|field)\.cc
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/*.cmake'
    - '**/file_lists.cmake'
- id: java-generator-old-message-include
  message: Old include path for message.h detected. After refactoring, use immutable/message.h
    or lite/message.h
  severity: WARNING
  languages:
  - cpp
  pattern: '#include "google/protobuf/compiler/java/message.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: java-generator-fieldgenerator-base-in-flat-namespace
  message: ImmutableFieldGenerator or ImmutableFieldLiteGenerator pointer usage in
    flat directory. After refactoring, implementations should be in immutable/ or
    lite/ subdirectories
  severity: WARNING
  languages:
  - cpp
  pattern-regex: (ImmutableFieldGenerator|ImmutableFieldLiteGenerator)\s*\*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - src/google/protobuf/compiler/java/*.cc
    exclude:
    - src/google/protobuf/compiler/java/immutable/*.cc
    - src/google/protobuf/compiler/java/lite/*.cc
    - src/google/protobuf/compiler/java/field_common.cc
    - src/google/protobuf/compiler/java/internal_helpers.cc
