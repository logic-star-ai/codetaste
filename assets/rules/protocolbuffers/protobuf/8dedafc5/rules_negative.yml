- id: java-generator-field-cc-exists
  message: Monolithic field.cc file still exists. This should be deleted and split
    into field_common.cc, internal_helpers.cc, and separated into immutable/make_field_generators.cc
    and lite/make_field_generators.cc
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
