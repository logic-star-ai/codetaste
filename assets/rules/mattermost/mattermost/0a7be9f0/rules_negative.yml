rules:
- id: custom-button-hover-with-background-gradient
  message: Custom button hover state with gradient background. Standardized btn-*
    classes provide proper hover effects.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \.[a-zA-Z][a-zA-Z0-9_-]*[Bb]utton[a-zA-Z0-9_-]*\s*\{[^}]*&:hover[^}]*background:\s*linear-gradient
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: button-linear-gradient-hover
  message: Custom button hover with linear-gradient. Standardized btn classes provide
    proper hover effects without gradients.
  severity: WARNING
  languages:
  - generic
  pattern-regex: '&:hover[^}]*background:\s*linear-gradient\([^)]*rgba\(var\(--sys-center-channel-color-rgb\)'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: hover-linear-gradient-rgba-center-channel
  message: Hover state with linear-gradient rgba 0.16 overlay. Standardized btn-primary
    provides proper hover without custom gradients.
  severity: WARNING
  languages:
  - generic
  pattern-regex: :hover[^}]*\{[^}]*background:\s*linear-gradient\([^)]*rgba\(var\(--sys-center-channel-color-rgb\),\s*0\.16\)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: active-linear-gradient-rgba-032
  message: Active state with linear-gradient rgba 0.32 overlay. Standardized btn classes
    provide proper active states.
  severity: WARNING
  languages:
  - generic
  pattern-regex: :active[^}]*\{[^}]*background:\s*linear-gradient\([^)]*rgba\(var\(--sys-center-channel-color-rgb\),\s*0\.32\)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: focus-box-shadow-sidebar-text-active-border
  message: Focus state with custom inset box-shadow. Standardized btn classes handle
    focus indicators.
  severity: WARNING
  languages:
  - generic
  pattern-regex: :focus[^}]*\{[^}]*box-shadow:\s*inset\s+0\s+0\s+0\s+2px\s+var\(--sys-sidebar-text-active-border\)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: disabled-rgba-008-background
  message: Disabled state with rgba 0.08 background. Standardized btn classes provide
    proper disabled styling.
  severity: WARNING
  languages:
  - generic
  pattern-regex: '&\.disabled[^}]*\{[^}]*background:\s*rgba\(var\(--sys-center-channel-color-rgb\),\s*0\.08\)'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: disabled-rgba-032-color
  message: Disabled state with rgba 0.32 text color. Standardized btn classes handle
    disabled text color.
  severity: WARNING
  languages:
  - generic
  pattern-regex: '&\.disabled[^}]*\{[^}]*color:\s*rgba\(var\(--sys-center-channel-color-rgb\),\s*0\.32\)'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: button-hover-rgba-016-overlay
  message: Hover state with rgba 0.16 overlay on button background. Standardized btn-primary
    provides proper hover effects.
  severity: WARNING
  languages:
  - generic
  pattern-regex: :hover[^}]*\{[^}]*background.*rgba\(var\(--[^)]+\),\s*0\.16\)[^}]*var\(--sys-button-bg\)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: button-active-rgba-032-overlay
  message: Active state with rgba 0.32 overlay on button background. Standardized
    btn-primary provides proper active effects.
  severity: WARNING
  languages:
  - generic
  pattern-regex: :active[^}]*\{[^}]*background.*rgba\(var\(--[^)]+\),\s*0\.32\)[^}]*var\(--sys-button-bg\)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: span-margin-font-size-font-weight-line-height
  message: Span element with multiple text styling properties. Standardized btn classes
    handle text styling with gap property.
  severity: INFO
  languages:
  - generic
  pattern-regex: '>\s*span\s*\{[^}]*margin-left:[^}]*font-size:[^}]*font-weight:[^}]*line-height:'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: component-specific-button-scss-files
  message: Component-specific button SCSS file detected. These should be removed in
    favor of standardized button classes.
  severity: ERROR
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/contact_us.scss'
    - '**/custom_button.scss'
    - '**/custom_btn.scss'
- id: contact-us-scss-file-should-be-removed
  message: contact_us.scss file detected. This file should be removed entirely as
    buttons should use standardized btn-* classes.
  severity: ERROR
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/contact_sales/contact_us.scss'
    - '**/announcement_bar/contact_us.scss'
- id: tsx-import-contact-us-scss
  message: Import of contact_us.scss detected. This file should be removed; use standardized
    btn classes instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import.*['"].*contact_us\.scss['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.tsx'
    - '*.ts'
    - '*.jsx'
    - '*.js'
- id: contact-sales-component-scss
  message: SCSS file in contact_sales directory. Verify buttons use standardized btn-*
    classes without custom styling.
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/contact_sales/*.scss'
- id: seats-calculator-button-custom
  message: Seats calculator button custom class. Use btn-primary for add seats actions.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \.seats.*calculator.*button|\.add.*seats.*button
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.scss'
    - '*.css'
- id: button-i-font-size-18-line-height-21
  message: Button icon with font-size 18px and line-height 21px. Standardized btn
    classes handle icon sizing.
  severity: INFO
  languages:
  - generic
  pattern-regex: '>\s*i\s*\{[^}]*font-size:\s*18px[^}]*line-height:\s*21px'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: button-span-margin-left-font-size-font-weight
  message: Button span with margin-left 6px, font-size 14px, font-weight 600. Use
    standardized btn class with gap property.
  severity: WARNING
  languages:
  - generic
  pattern-regex: '>\s*span\s*\{[^}]*margin-left:\s*6px[^}]*font-size:\s*14px[^}]*font-weight:\s*600'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
- id: button-display-width-align-justify-padding-border-radius
  message: Button with full combination of display flex, width 100%, center alignment,
    padding, and border-radius. Use standardized btn classes.
  severity: WARNING
  languages:
  - generic
  pattern-regex: 'display:\s*flex;[^}]{0,200}width:\s*100%;[^}]{0,200}align-items:\s*center;[^}]{0,200}justify-content:\s*center;[^}]{0,200}padding:[^}]{0,200}border-radius:'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.scss'
    - '*.css'
    exclude:
    - '**/sass/components/_buttons.scss'
