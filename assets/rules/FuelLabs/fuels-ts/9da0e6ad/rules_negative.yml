  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \bNativeAssetId\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 227
- id: detect-nativeassetid-simple-usage
  message: NativeAssetId identifier should be renamed to BaseAssetId
  severity: WARNING
  languages:
  - typescript
  - javascript
