rules:
- id: nextjs-contentlayer-generated-types
  message: Contentlayer data in getStaticProps is a Pages Router pattern. In App Router,
    use Server Components to access data directly.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { allPosts } from ''@contentlayer/generated''

        '
    - pattern: 'import { allDocs } from ''@contentlayer/generated''

        '
    - pattern: 'import type { Post } from ''@contentlayer/generated''

        '
    - pattern: 'import type { Doc } from ''@contentlayer/generated''

        '
  - pattern-inside: "export async function getStaticProps(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
- id: nextjs-head-component-usage
  message: Next Head component is for Pages Router. In App Router, use metadata exports
    or generateMetadata function.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: <Head>...</Head>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: nextjs-head-component-import
  message: Next Head component is for Pages Router. In App Router, use metadata exports
    or generateMetadata function.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import Head from ''next/head''

        '
    - pattern: 'import { Head } from ''next/head''

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: nextjs-old-pagewrapper-jsx-usage
  message: PageWrapper component was removed during App Router migration. Use app/layout.tsx
    instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: <PageWrapper>...</PageWrapper>
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: nextjs-pagewrapper-import-in-landing
  message: PageWrapper component was removed during App Router migration. Use app/layout.tsx
    instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import PageWrapper from ''~/components/PageWrapper''

        '
    - pattern: 'import { PageWrapper } from ''~/components/PageWrapper''

        '
    - pattern: 'import PageWrapper from ''../components/PageWrapper''

        '
    - pattern: 'import { PageWrapper } from ''../components/PageWrapper''

        '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: nextjs-head-with-meta-description
  message: Head component with meta description is a Pages Router pattern. In App
    Router, export metadata object with description field.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "<Head>\n  ...\n  <meta name=\"description\" content={...} />\n  ...\n\
    </Head>\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: nextjs-export-default-page-component
  message: Page component wrapped in PageWrapper is a Pages Router pattern. In App
    Router, use app/layout.tsx for common layout.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export default function $PAGE(...) {\n  ...\n}\n"
  - pattern: "return (\n  <PageWrapper>\n    ...\n  </PageWrapper>\n)\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: nextjs-old-drizzle-orm-import
  message: drizzle-orm was removed during the App Router migration. Remove this import.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { ..., $X, ... } from ''drizzle-orm''

        '
    - pattern: 'import $X from ''drizzle-orm''

        '
    - pattern: 'import * as $X from ''drizzle-orm''

        '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: nextjs-return-props-in-get-static-props
  message: Returning props in getStaticProps is a Pages Router pattern. In App Router,
    use Server Components that directly access data.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "return {\n  props: {\n    ...\n  }\n};\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: nextjs-head-with-author
  message: Head component with author is a Pages Router pattern. In App Router, export
    metadata object with authors field.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "<Head>\n  ...\n  <meta name=\"author\" content={...} />\n  ...\n</Head>\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: nextjs-head-with-og-image
  message: Head component with og:image is a Pages Router pattern. In App Router,
    export metadata object with openGraph.images field.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "<Head>\n  ...\n  <meta property=\"og:image\" content={...} />\n  ...\n\
    </Head>\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: nextjs-page-component-function-name
  message: Page component in pages/ directory should be migrated to app/ directory
    for App Router.
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: "export default function $PAGE() {\n  return (\n    <PageWrapper>\n\
        \      ...\n    </PageWrapper>\n  )\n}\n"
    - pattern: 'export default function TeamPage() { ... }

        '
    - pattern: 'export default function PostPage(...) { ... }

        '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/pages/**/*.tsx'
    - '**/pages/**/*.jsx'
- id: nextjs-get-static-props-function
  message: getStaticProps is a Pages Router API. In App Router, use Server Components
    or generateStaticParams instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'export async function getStaticProps(...) { ... }

        '
    - pattern: 'export const getStaticProps = async (...) => { ... }

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-get-static-paths-function
  message: getStaticPaths is a Pages Router API. In App Router, use generateStaticParams
    instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'export async function getStaticPaths(...) { ... }

        '
    - pattern: 'export const getStaticPaths = async (...) => { ... }

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-paths-fallback-in-get-static-paths
  message: Returning paths and fallback in getStaticPaths is a Pages Router pattern.
    In App Router, use generateStaticParams instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "return {\n  paths: $PATHS,\n  fallback: $FALLBACK\n};\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-params-in-get-static-props
  message: getStaticProps with params is a Pages Router API. In App Router, use Server
    Components with params prop.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "export async function getStaticProps({ params }: { params: $TYPE }) {\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-head-with-og-title
  message: Head component with og:title is a Pages Router pattern. In App Router,
    export metadata object with openGraph.title field.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "<Head>\n  ...\n  <meta property=\"og:title\" content={...} />\n  ...\n\
    </Head>\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-head-with-keywords
  message: Head component with keywords is a Pages Router pattern. In App Router,
    export metadata object with keywords field.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "<Head>\n  ...\n  <meta name=\"keywords\" content={...} />\n  ...\n</Head>\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-old-component-mdx-usage
  message: MDX rendering in PageWrapper is a Pages Router pattern. In App Router,
    create dedicated layout and page structure.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '<MDXContent components={$COMPONENTS} />

      '
  - pattern-inside: "return (\n  <PageWrapper>\n    ...\n  </PageWrapper>\n)\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-old-docslayout-component
  message: DocsLayout imported as component suggests Pages Router pattern. In App
    Router, use app/docs/layout.tsx for docs-specific layout.
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import DocsLayout from ''~/components/DocsLayout''

        '
    - pattern: 'import { DocsLayout } from ''~/components/DocsLayout''

        '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-docslayout-wrapper-usage
  message: DocsLayout wrapper is a Pages Router pattern. In App Router, use app/docs/layout.tsx
    for docs-specific layout.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "<DocsLayout ...>\n  ...\n</DocsLayout>\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-og-description-meta-in-head
  message: OpenGraph description in Head component is a Pages Router pattern. In App
    Router, export metadata with openGraph.description.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "<Head>\n  ...\n  <meta property=\"og:description\" content={...} />\n\
    \  ...\n</Head>\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-fallback-false-in-getstatic
  message: 'Returning fallback: false in getStaticPaths is a Pages Router pattern.
    In App Router, use dynamicParams = false.'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "return {\n  paths: $PATHS,\n  fallback: false\n};\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-contentlayer-url-property
  message: Mapping documents to url in getStaticPaths is a Pages Router pattern. In
    App Router, use generateStaticParams to return params objects.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export async function getStaticPaths() {\n  ...\n}\n"
  - pattern: '$DOCS.map(($DOC) => $DOC.url)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-find-doc-by-slug-in-getstatic
  message: Finding document by slug in getStaticProps is a Pages Router pattern. In
    App Router, use Server Components to access data directly.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export async function getStaticProps(...) {\n  ...\n}\n"
  - pattern: '$DOCS.find(($DOC) => $DOC.slug === $SLUG)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-find-post-by-slug-in-getstatic
  message: Finding post by slug in getStaticProps is a Pages Router pattern. In App
    Router, use Server Components to access data directly.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export async function getStaticProps(...) {\n  ...\n}\n"
  - pattern: '$POSTS.find(($POST) => $POST.slug === $SLUG)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-return-notfound-true-in-props
  message: 'Returning notFound: true in getStaticProps is a Pages Router pattern.
    In App Router, use notFound() function from ''next/navigation''.'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export async function getStaticProps(...) {\n  ...\n}\n"
  - pattern: "return {\n  notFound: true\n};\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-doc-section-category-navigation
  message: Building navigation structure in getStaticProps is a Pages Router pattern.
    In App Router, use Server Components to prepare navigation.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export async function getStaticProps(...) {\n  ...\n}\n"
  - pattern: "$NAV\n  .find(($SEC) => $SEC.slug == $DOC.section)\n  ?.categories.find(...)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-doc-section-find-in-getstatic
  message: Finding doc section in getStaticProps is a Pages Router pattern. In App
    Router, use Server Components.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export async function getStaticProps(...) {\n  ...\n}\n"
  - pattern: '$NAV.find(($SEC) => $SEC.slug == $DOC.section)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nextjs-post-description-meta-tag
  message: Dynamic og:description in Head is a Pages Router pattern. In App Router,
