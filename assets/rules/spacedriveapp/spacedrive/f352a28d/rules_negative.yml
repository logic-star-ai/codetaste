    App Router.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/pages/_app.tsx'
    - '**/pages/_app.ts'
    - '**/pages/_app.jsx'
    - '**/pages/_app.js'
