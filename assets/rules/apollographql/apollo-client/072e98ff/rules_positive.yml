rules:
- id: refactor-link-any-reference-excluding-fixtures
  message: Detected reference to @apollo/client/link path excluding fixtures (was
    /link/core)
  severity: INFO
  languages:
  - typescript
  - javascript
  - json
  pattern-regex: '@apollo/client/link["\x27](?!/(batch|http|error|context|retry|schema|ws|subscriptions|utils|persisted-queries|remove-typename))'
  metadata:
    category: api
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
  paths:
    exclude:
    - eslint-local-rules/**
- id: refactor-link-string-literal-excluding-fixtures
  message: Detected string literal reference to @apollo/client/link excluding fixtures
    (was /link/core)
  severity: INFO
  languages:
  - typescript
  - javascript
  - json
  pattern-regex: '["'']@apollo/client/link["''](?!/(batch|http|error|context|retry|schema|ws|subscriptions|utils|persisted-queries|remove-typename))'
  metadata:
    category: api
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
  paths:
    exclude:
    - eslint-local-rules/**
- id: refactor-link-double-quote-path
