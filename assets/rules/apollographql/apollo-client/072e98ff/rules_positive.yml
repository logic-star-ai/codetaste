  languages:
  - typescript
  pattern-regex: import\s+(type\s+)?\{[^}]+\}\s+from\s+['""]@apollo/client/link['""]
  metadata:
    category: api
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
