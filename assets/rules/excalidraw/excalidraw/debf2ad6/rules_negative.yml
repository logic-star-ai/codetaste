  - typescript
  - javascript
  pattern: Scene.getScene($ARG)?.$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: scene-getscene-then-method-call
  message: 'Deprecated: Code pattern suggests Scene.getScene() usage. Pass scene explicitly
    as parameter.'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'Scene.getScene($E)

    ...

    $VAR.$METHOD(...)

