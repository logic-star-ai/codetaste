rules:
- id: mutate-element-old-signature-two-args
  message: mutateElement signature changed. Use scene.mutateElement(element, updates)
    or excalidrawAPI.mutateElement(element, updates) for re-render, or mutateElement(element,
    elementsMap, updates) for direct mutation.
  severity: ERROR
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: mutateElement($ELEMENT, $UPDATES)
  - pattern-not: mutateElement($ELEMENT, $ELEMENTSMAP, $UPDATES, ...)
  - pattern-not: mutateElement($ELEMENT, $UPDATES, $INFORM_MUTATION, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 96
- id: mutate-element-semicolon-statement
  message: mutateElement should use scene.mutateElement() or excalidrawAPI.mutateElement()
    for automatic re-render, or pass elementsMap for manual control
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: mutateElement($ELEMENT, $UPDATES);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 96
- id: mutate-element-newline-separated
  message: mutateElement with 2 parameters (multiline) should use scene.mutateElement()
    or pass elementsMap
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "mutateElement(\n  $ELEMENT,\n  $UPDATES\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 96
- id: mutate-element-explicit-param-names
  message: mutateElement(element, updates) is deprecated. Use scene.mutateElement(element,
    updates), excalidrawAPI.mutateElement(element, updates), or mutateElement(element,
    elementsMap, updates)
  severity: ERROR
  languages:
  - typescript
  - javascript
  pattern: mutateElement($ELEMENT, $UPDATES)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 96
- id: mutate-element-empty-object
  message: mutateElement with empty updates should use scene.mutateElement() or pass
    elementsMap parameter
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: mutateElement($ELEMENT, {})
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 90
- id: mutate-element-with-false-inform
  message: mutateElement(element, updates, false) should be replaced with mutateElement(element,
    elementsMap, updates) or use scene.mutateElement()
  severity: ERROR
  languages:
  - typescript
  - javascript
  pattern: mutateElement($ELEMENT, $UPDATES, false)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: mutate-element-conditional-return
  message: mutateElement should use scene.mutateElement() or pass elementsMap parameter
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "if ($COND) {\n  mutateElement($ELEMENT, $UPDATES);\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: mutate-element-nested-in-condition
  message: mutateElement in inline if should use scene.mutateElement() or pass elementsMap
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'if ($COND) mutateElement($ELEMENT, $UPDATES);

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: mutate-element-single-property
  message: mutateElement should use scene.mutateElement() or pass elementsMap parameter
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: mutateElement($ELEMENT, { $PROP })
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: mutate-element-callback
  message: mutateElement in callback should use scene.mutateElement() or pass elementsMap
    parameter
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "$FUNC((...) => {\n  ...\n  mutateElement($ELEMENT, $UPDATES);\n  ...\n\
    })\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: mutate-element-after-element-lookup
  message: 'mutateElement after elementsMap.get should pass elementsMap: mutateElement(elem,
    elementsMap, updates)'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const $ELEM = $ELEMENTSMAP.get($ID);

    ...

    mutateElement($ELEM, $UPDATES);

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: scene-getscene-deprecated-call
  message: 'Deprecated: Scene.getScene() should not be used. Pass scene explicitly
    as a parameter instead.'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: Scene.getScene($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: scene-getscene-with-optional-chaining
  message: 'Deprecated: Scene.getScene() with optional chaining should be replaced
    with explicit scene parameter.'
