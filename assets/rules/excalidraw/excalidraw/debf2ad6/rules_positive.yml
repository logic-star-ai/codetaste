rules:
- id: mutate-element-with-elements-map-arg
  message: Detected mutateElement call with elementsMap as second argument - refactored
    signature
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: mutateElement($ELEM, $MAP, {...})
  - metavariable-pattern:
      metavariable: $MAP
      pattern: $X
  - pattern-not: mutateElement($ELEM, {...}, {...})
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: linear-element-editor-with-scene
  message: Detected LinearElementEditor method call with scene parameter - refactored
    API
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: LinearElementEditor.$METHOD(..., scene, ...)
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: linear-editor-any-method-with-scene
  message: Detected LinearElementEditor method with scene parameter without Scene.getScene
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: LinearElementEditor.$METHOD(..., scene, ...)
  - pattern-not-inside: Scene.getScene(...)
  metadata:
    category: dependency
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: function-calling-linear-editor-with-scene
  message: Detected function passing scene to LinearElementEditor method - refactored
    threading
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "$FUNC(..., scene, ...) {\n  ...\n  LinearElementEditor.$METHOD(...,\
      \ scene, ...)\n  ...\n}\n"
  - pattern-not: "$FUNC(..., scene, ...) {\n  ...\n  Scene.getScene(...)\n  ...\n\
      }\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: arrow-function-declaring-scene-and-using-it
  message: Detected arrow function declaring scene param and using it without Scene.getScene
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "const $FUNC = ($A, $B, scene) => {\n  ...\n  scene.$METHOD(...)\n  ...\n\
      }\n"
  - pattern-not: "const $FUNC = ($A, $B, scene) => {\n  ...\n  Scene.getScene(...)\n\
      \  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: arrow-func-three-params-with-scene-using-methods
  message: Detected arrow function with three params including scene - refactored
    pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "const $FUNC = ($A, $B, scene) => {\n  ...\n  scene.$METHOD(...)\n  ...\n\
      }\n"
  - pattern-not: "const $FUNC = ($A, $B, scene) => {\n  ...\n  Scene.getScene(...)\n\
      \  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: arrow-func-five-params-with-scene-using-methods
  message: Detected arrow function with five params including scene using methods
    - refactored
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "const $FUNC = ($A, $B, $C, $D, scene) => {\n  ...\n  scene.$METHOD(...)\n\
      \  ...\n}\n"
  - pattern-not: "const $FUNC = ($A, $B, $C, $D, scene) => {\n  ...\n  Scene.getScene(...)\n\
      \  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: exported-function-in-text-element-file-with-scene
  message: Detected exported function in textElement.ts with scene - refactored text
    API
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "export const $FUNC = (..., scene, ...) => {\n  ...\n}\n"
  - pattern-not: "export const $FUNC = (..., scene, ...) => {\n  ...\n  Scene.getScene(...)\n\
      \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/element/src/textElement.ts
- id: scene-instance-mutate-element-method
  message: Detected Scene class with instance mutateElement method - new API added
    after refactoring
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: "class Scene {\n  ...\n  mutateElement(...) {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: update-bound-elements-in-function-with-scene-param
  message: Detected updateBoundElements called in function with scene param but no
    Scene.getScene - refactored
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "$FUNC(..., scene, ...) {\n  ...\n  updateBoundElements(...)\n  ...\n\
      }\n"
  - pattern-not: "$FUNC(..., scene, ...) {\n  ...\n  Scene.getScene(...)\n  ...\n\
      }\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: redraw-text-in-function-with-scene-param
  message: Detected redrawTextBoundingBox called in function with scene param without
    Scene.getScene
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "$FUNC(..., scene, ...) {\n  ...\n  redrawTextBoundingBox(...)\n  ...\n\
      }\n"
  - pattern-not: "$FUNC(..., scene, ...) {\n  ...\n  Scene.getScene(...)\n  ...\n\
      }\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: regular-function-two-params-with-scene
  message: Detected regular function with scene param using scene methods - refactored
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "function $FUNC($A, scene) {\n  ...\n  scene.$METHOD(...)\n  ...\n}\n"
  - pattern-not: "function $FUNC($A, scene) {\n  ...\n  Scene.getScene(...)\n  ...\n\
      }\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: scene-class-method-calling-mutate-element
  message: Detected Scene class method calling mutateElement - refactored Scene with
    instance methods
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: "class Scene {\n  ...\n  $METHOD(...) {\n    ...\n    mutateElement(...)\n\
    \    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
