rules:
- id: scene-method-mutate-element-call
  message: 'Refactoring detected: Using scene.mutateElement() instead of static method'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $OBJ.mutateElement($ELEM, ...)
  - metavariable-regex:
      metavariable: $OBJ
      regex: (?i).*(scene|scn|sceneref).*
  - pattern-not: Scene.mutateElement(...)
  metadata:
    nr_refactored_patterns: 130
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: scene-from-param-get-map-new-files
  message: 'Refactoring detected: Getting elementsMap from scene parameter in new
    contexts'
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $S
    - pattern-inside: '$F = (..., $S: Scene, ...) => { ... }

        '
  pattern-sinks:
  - patterns:
    - pattern: $SINK.getNonDeletedElementsMap()
    - pattern-not-inside: 'class Scene { ... }

        '
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/align.ts'
    - '**/dragElements.ts'
    - '**/Scene.ts'
  options:
    symbolic_propagation: true
- id: mutate-element-three-params-non-boolean
  message: 'Refactoring detected: mutateElement with elementsMap as second parameter'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: mutateElement($ELEM, $PARAM2, $UPDATES)
  - metavariable-regex:
      metavariable: $PARAM2
      regex: (?i).*(map|elements).*
  - pattern-not: mutateElement($ELEM, $UPDATES, true)
  - pattern-not: mutateElement($ELEM, $UPDATES, false)
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/tests/**'
    - '**/*.test.*'
  options:
    symbolic_propagation: true
- id: mutate-element-with-explicit-map-param
  message: 'Refactoring detected: mutateElement called with explicit elementsMap'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'mutateElement($E, $MAP, { ... })

      '
  - metavariable-regex:
      metavariable: $MAP
      regex: (?i).*(elementsmap|elements_map|map).*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: no-scene-getscene-in-mutate-element
  message: 'Refactoring detected: mutateElement.ts no longer uses Scene.getScene()'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: Scene\.getScene
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/mutateElement.ts'
- id: text-functions-accept-scene
  message: 'Refactoring detected: Text handling functions now accept scene parameter'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'export const $F = (..., $S: Scene) => { ... }

        '
    - pattern: 'export function $F(..., $S: Scene) { ... }

        '
  - metavariable-regex:
      metavariable: $F
      regex: (?i).*(text|bound|container).*
  - pattern-not-inside: 'class Scene { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/Scene.ts'
  options:
    symbolic_propagation: true
- id: scene-passed-to-align-function
  message: 'Refactoring detected: Scene passed to alignment function'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'alignElements($ELEMS, $OPTS, $SCENE)

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: scene-instance-method-added
  message: 'Refactoring detected: Scene class has mutateElement instance method'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "class Scene {\n  ...\n  mutateElement(...) { ... }\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Scene.ts'
- id: no-static-scene-method-definitions
  message: 'Refactoring detected: Scene class no longer has static getScene method'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: static\s+getScene
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Scene.ts'
- id: layerui-no-static-scene-getscene
  message: 'Refactoring detected: LayerUI.tsx no longer uses Scene.getScene()'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: Scene\.getScene\s*\(
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/LayerUI.tsx'
- id: textwysiwyg-no-static-scene-getscene
  message: 'Refactoring detected: textWysiwyg.tsx no longer uses Scene.getScene()'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: Scene\.getScene\s*\(
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/textWysiwyg.tsx'
- id: lineareditor-no-static-scene-getscene
  message: 'Refactoring detected: linearElementEditor.ts no longer uses Scene.getScene()'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: Scene\.getScene\s*\(
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/linearElementEditor.ts'
- id: binding-file-exports-with-scene
  message: 'Refactoring detected: binding.ts exports functions with scene parameter'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: export\s+const\s+\w+\s*=\s*\([^)]*scene[^)]*\)\s*=>
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/binding.ts'
