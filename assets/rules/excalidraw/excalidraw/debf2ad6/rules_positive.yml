rules:
- id: scene-instance-method-mutate
  message: Detected instance method mutateElement being called on scene object
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $OBJ.mutateElement($ELEM, $UPDATES)
  - metavariable-regex:
      metavariable: $OBJ
      regex: ^(scene|this\.scene|app\.scene|this)$
  metadata:
    category: refactoring
    nr_refactored_patterns: 90
    nr_legacy_patterns: 0
- id: scene-method-on-instance
  message: Detected method call on scene instance variable
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: scene.mutateElement(...)
  metadata:
    category: refactoring
    nr_refactored_patterns: 62
    nr_legacy_patterns: 0
- id: import-scene-type-from-element
  message: Detected Scene import type from element package path
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import type { ..., Scene, ... } from "$PATH"
    - pattern: import type Scene from "$PATH"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*@excalidraw/element.*
  metadata:
    category: refactoring
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: redraw-function-call-with-scene
  message: Detected redraw function called with scene parameter
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $FN(..., $SCENE)
  - metavariable-regex:
      metavariable: $FN
      regex: (?i)^redraw.*
  - metavariable-regex:
      metavariable: $SCENE
      regex: ^(scene|this\.scene|app\.scene)$
  metadata:
    category: refactoring
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: mutate-with-elementsmap-variable
  message: Detected mutateElement called with elementsMap variable
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: mutateElement($ELEM, elementsMap, ...)
  metadata:
    category: refactoring
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: mutate-without-inform-flag
  message: Detected mutateElement without informMutation flag (removed pattern)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: mutateElement($ELEM, $MAP, {...})
  - pattern-not: mutateElement($ELEM, {...})
  - pattern-not: mutateElement($ELEM, {...}, true)
  - pattern-not: mutateElement($ELEM, {...}, false)
  metadata:
    category: refactoring
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: scene-not-imported-from-excalidraw
  message: Detected Scene NOT imported from excalidraw/scene package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import type Scene from "$PATH"
  - metavariable-regex:
      metavariable: $PATH
      regex: ^(?!.*excalidraw/scene).*$
  metadata:
    category: refactoring
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/element/**/*.ts'
- id: redrawtext-function-with-scene-def
  message: Detected redrawTextBoundingBox definition with scene param
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export const $FN = (...) => {...}
  - metavariable-regex:
      metavariable: $FN
      regex: ^redraw[Tt]ext.*
  - pattern-regex: .*scene.*
  metadata:
    category: refactoring
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/element/**/*.ts'
- id: handletext-function-with-scene-def
  message: Detected handleBindTextResize definition with scene param
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export const $FN = (...) => {...}
  - metavariable-regex:
      metavariable: $FN
      regex: ^handle[Bb]ind[Tt]ext.*
  - pattern-regex: .*scene.*
  metadata:
    category: refactoring
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/element/**/*.ts'
- id: getnondeletedelementsmap-before-mutate
  message: Detected getNonDeletedElementsMap() result used with mutateElement
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '$MAP = $SCENE.getNonDeletedElementsMap()

        ...

        mutateElement(..., $MAP, ...)

        '
    - pattern: 'const $MAP = $SCENE.getNonDeletedElementsMap()

        ...

        mutateElement(..., $MAP, ...)

        '
  metadata:
    category: refactoring
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: elementsmap-get-before-mutate-three-param
  message: Detected elementsMap.get() before 3-param mutateElement
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '$MAP.get(...)

      ...

      mutateElement($E, $MAP, $U)

      '
  metadata:
    category: refactoring
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: scene-variable-explicit-pass
  message: Detected scene variable explicitly passed as function argument
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const scene = $EXPR

      ...

      $FN(..., scene, ...)

      '
  metadata:
    category: refactoring
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: scene-passed-to-update-operation
  message: Detected scene passed to update operation
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $FN(..., scene)
  - metavariable-regex:
      metavariable: $FN
      regex: (?i).*(update|modify).*[Ee]lement.*
  metadata:
    category: refactoring
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: scene-removed-from-excalidraw-scene-pkg
  message: Detected files in element package not importing from excalidraw/scene
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: .*from\s+["\x27].*excalidraw/scene.*
  metadata:
    category: refactoring
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/element/src/binding.ts'
    - '**/packages/element/src/align.ts'
- id: api-with-mutate-method
  message: Detected mutateElement method on API object - new public API
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: "$API = {\n  ...,\n  mutateElement: $FN,\n  ...\n}\n"
    - pattern: '$API.mutateElement = $FN

        '
  - metavariable-regex:
      metavariable: $API
      regex: (?i).*(api|excalidraw|interface).*
  metadata:
    category: refactoring
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: alignelements-three-params-exact
  message: Detected alignElements with 3 parameters (elements, elementsMap, alignment)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: alignElements($ELEMS, $MAP, $ALIGN)
  - pattern-not: alignElements($ELEMS, $ALIGN)
  metadata:
    category: refactoring
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: align-function-with-elementsmap-def
  message: Detected alignElements definition with elementsMap param
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export const alignElements = ($ELEMS, $MAP, $ALIGN) => {...}
  metadata:
    category: refactoring
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/element/**/*.ts'
- id: mutate-element-without-scene-trigger
  message: Detected mutateElement that doesn't call Scene.getScene for trigger
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export const mutateElement = (...) => {...}
  - pattern-not-regex: .*Scene\.getScene.*triggerUpdate.*
  metadata:
    category: refactoring
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/mutateElement.ts'
- id: scene-moved-to-element-package
  message: Detected Scene.ts file in element package
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: refactoring
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/element/**/Scene.ts'
- id: scene-class-in-element-src
  message: Detected Scene class definition in element/src package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "class Scene {\n  ...\n}\n"
  metadata:
    category: refactoring
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/element/src/**/*.ts'
- id: no-scene-static-in-mutate
  message: Detected mutateElement without Scene.getScene().triggerUpdate()
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: .*Scene\.getScene\([^)]*\)\?\.triggerUpdate\(\).*
  metadata:
    category: refactoring
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/element/src/mutateElement.ts'
