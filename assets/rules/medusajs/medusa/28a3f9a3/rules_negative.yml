rules:
- id: medusa-core-utils-import-named
  message: Import from deprecated 'medusa-core-utils' package detected. Move utilities
    to '@medusajs/utils' or '@medusajs/medusa/dist/utils/graceful-shutdown-server'
  severity: ERROR
  languages:
  - typescript
  - javascript
  pattern: 'import { ... } from "medusa-core-utils"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: medusa-core-utils-side-effect-import
  message: Side-effect import from deprecated 'medusa-core-utils' package detected.
    This package should no longer be used
  severity: ERROR
  languages:
  - typescript
  - javascript
  pattern: 'import "medusa-core-utils"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: medusa-core-utils-import-typed-as-type
  message: Type-only import of MedusaContainer from deprecated 'medusa-core-utils'.
    Import from '@medusajs/utils' instead
  severity: ERROR
  languages:
  - typescript
  pattern: 'import { type MedusaContainer } from "medusa-core-utils"

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: medusa-core-utils-import-medusa-error
  message: MedusaError should be imported from '@medusajs/utils' instead of deprecated
    'medusa-core-utils'
  severity: ERROR
  languages:
  - typescript
  - javascript
  pattern: 'import { ..., MedusaError, ... } from "medusa-core-utils"

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: medusa-core-utils-single-import-medusa-error
  message: MedusaError import from deprecated 'medusa-core-utils' detected. Import
    from '@medusajs/utils' instead
  severity: ERROR
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: 'import { MedusaError } from "medusa-core-utils"

      '
  - pattern: 'const { MedusaError } = require("medusa-core-utils")

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: medusa-core-utils-import-is-defined
  message: isDefined should be imported from '@medusajs/utils' instead of deprecated
    'medusa-core-utils'
  severity: ERROR
  languages:
  - typescript
  - javascript
  pattern: 'import { ..., isDefined, ... } from "medusa-core-utils"

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: medusa-core-utils-single-import-is-defined
  message: isDefined import from deprecated 'medusa-core-utils' detected. Import from
    '@medusajs/utils' instead
  severity: ERROR
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: 'import { isDefined } from "medusa-core-utils"

      '
  - pattern: 'const { isDefined } = require("medusa-core-utils")

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: medusa-core-utils-import-with-as-alias
  message: Aliased import from deprecated 'medusa-core-utils' package detected. Import
    from '@medusajs/utils' or '@medusajs/medusa' instead
  severity: ERROR
  languages:
  - typescript
  - javascript
  pattern: 'import { $NAME as $ALIAS } from "medusa-core-utils"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: medusa-core-utils-package-json-scripts-reference
  message: Package.json contains reference to 'medusa-core-utils' in scripts or other
    fields. Remove as package should be deleted
  severity: WARNING
  languages:
  - json
  pattern-regex: medusa-core-utils
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/package.json'
