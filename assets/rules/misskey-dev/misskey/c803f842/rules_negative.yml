  message: Path segment '/use/use-' detected - should be '/composables/use-'
  severity: WARNING
  languages:
  - generic
  pattern-regex: /use/use-
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
  paths:
    include:
    - '*.vue'
    - '*.ts'
    - '*.js'
- id: import-with-semicolon-use-directory
  message: Import statement from old '@/use/' directory detected
  severity: WARNING
  languages:
  - generic
  pattern-regex: from\s+['"]@/use/[^'"]+['"];?
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
  paths:
    include:
    - '*.vue'
    - '*.ts'
