rules:
- id: generic-use-directory-reference
  message: Reference to old '@/use/' directory - change to '@/composables/'
  severity: WARNING
  languages:
  - generic
  pattern-regex: '[''"]@/use/[a-z-]+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
  paths:
    include:
    - '*.vue'
    - '*.ts'
    - '*.js'
- id: import-keyword-followed-by-use-path
  message: Import statement using old '@/use/' path - change to '@/composables/'
  severity: WARNING
  languages:
  - generic
  pattern-regex: import.+@/use/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
  paths:
    include:
    - '*.vue'
    - '*.ts'
    - '*.js'
- id: from-keyword-with-use-directory
  message: '''from'' statement references old ''@/use/'' directory - change to ''@/composables/'''
  severity: WARNING
  languages:
  - generic
  pattern-regex: \bfrom\s+['"]@/use/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
  paths:
    include:
    - '*.vue'
    - '*.ts'
    - '*.js'
- id: any-use-hyphen-pattern-in-path
  message: Reference to old '@/use/use-*' pattern - all should be changed to '@/composables/use-*'
  severity: WARNING
  languages:
  - generic
  pattern-regex: '@/use/use-[a-z-]+(?:\.js)?'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
  paths:
    include:
    - '*.vue'
    - '*.ts'
    - '*.js'
