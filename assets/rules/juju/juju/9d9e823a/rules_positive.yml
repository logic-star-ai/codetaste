  severity: INFO
  languages:
  - go
  pattern-regex: errors\.Errorf\([^)]+\)\.Add\(coreerrors\.BadRequest\)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: add-method-badrequest
  message: Using .Add(coreerrors.BadRequest) error annotation
  severity: INFO
  languages:
  - go
  pattern-regex: \.Add\(coreerrors\.BadRequest\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: errors-errorf-add-badrequest-v2
  message: Using errors.Errorf().Add(coreerrors.BadRequest) refactored pattern
  severity: INFO
  languages:
  - go
  pattern-regex: errors\.Errorf\([^)]+\)\.Add\(\s*coreerrors\.BadRequest\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: errors-new-with-add-method-generic
  message: Using errors.New().Add(coreerrors.*) pattern (new API)
  severity: INFO
  languages:
  - go
  pattern-regex: errors\.New\([^)]+\)\.Add\(coreerrors\.\w+\)
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
