    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: errors-new-with-add-chaining
  message: Returning errors.New().Add() chain (new error construction)
  severity: INFO
  languages:
  - go
  pattern-regex: return\s+errors\.New\([^)]+\)\.Add\(coreerrors\.
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: return-errors-new-add-coreerrors
  message: Returning errors.New().Add(coreerrors.*) chain
  severity: INFO
  languages:
  - go
  pattern-regex: return\s+[^,\n]*errors\.New\([^)]+\)\.Add\(coreerrors\.\w+\)
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
