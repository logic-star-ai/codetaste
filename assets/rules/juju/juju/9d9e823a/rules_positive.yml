rules:
- id: coreerrors-constant-any-usage
  message: Using coreerrors BadRequest/Forbidden/QuotaLimitExceeded constants
  severity: INFO
  languages:
  - go
  pattern-regex: coreerrors\.(BadRequest|Forbidden|QuotaLimitExceeded)\b
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: coreerrors-badrequest-forbidden-quotalimit
  message: Using coreerrors BadRequest/Forbidden/QuotaLimitExceeded (new constants)
  severity: INFO
  languages:
  - go
  pattern-regex: coreerrors\.(BadRequest|Forbidden|QuotaLimitExceeded)
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: coreerrors-three-new-constants
