  severity: INFO
  languages:
  - go
  pattern-regex: coreerrors\.(BadRequest|Forbidden|QuotaLimitExceeded)\s*[,\)]
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: coreerrors-quotalimitexceeded-constant-usage
