rules:
- id: no-hide-in-error-construction
  message: Error construction without Hide() - refactored pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.Errorf($FMT, ..., coreerrors.$CONST)
    - pattern: $PKG.New($MSG).Add(coreerrors.$CONST)
  - pattern-not: $X.Hide(...)
  - pattern-not-inside: '$Y.Hide(...)

      ...

      '
  metadata:
    nr_refactored_patterns: 142
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/**/*.go'
    exclude:
    - '**/*_test.go'
    - '**/vendor/**'
- id: migrated-from-notvalidf-pattern
  message: Pattern migrated from errors.NotValidf() to Errorf with NotValid
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.Errorf($FMT, ..., coreerrors.NotValid)
    - pattern: $PKG.Errorf(...).Add(coreerrors.NotValid)
  - pattern-not-inside: 'import jujuerrors "github.com/juju/errors"

      ...

      '
  metadata:
    nr_refactored_patterns: 124
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/**/*.go'
    - '**/apiserver/**/*.go'
    - '**/cmd/**/*.go'
    exclude:
    - '**/*_test.go'
    - '**/vendor/**'
    - '**/core/agentbinary/**'
    - '**/domain/credential/**'
  options:
    symbolic_propagation: true
- id: notvalid-add-without-hide
  message: NotValid with .Add() - no Hide() - refactored
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $ERR.Add(coreerrors.NotValid)
  - pattern-not-inside: '$X.Hide(...)

      ...

      '
  - pattern-not-inside: 'import jujuerrors "github.com/juju/errors"

      ...

      '
  metadata:
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
    - '**/core/agentbinary/**'
    - '**/domain/credential/**'
  options:
    symbolic_propagation: true
- id: new-add-coreerrors-chain
  message: errors.New().Add(coreerrors.X) - new error construction pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.New($MSG).Add(coreerrors.$CONST)
  - pattern-not-inside: 'import jujuerrors "github.com/juju/errors"

      ...

      '
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: detect-coreerrors-quotalimitexceeded-usage
  message: Detected use of coreerrors.QuotaLimitExceeded - new error constant
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.QuotaLimitExceeded
  - metavariable-regex:
      metavariable: $PKG
      regex: ^coreerrors$
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-coreerrors-badrequest-usage
  message: Detected use of coreerrors.BadRequest - new error constant
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.BadRequest
  - metavariable-regex:
      metavariable: $PKG
      regex: ^coreerrors$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-coreerrors-forbidden-usage
  message: Detected use of coreerrors.Forbidden - new error constant
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.Forbidden
  - metavariable-regex:
      metavariable: $PKG
      regex: ^coreerrors$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
