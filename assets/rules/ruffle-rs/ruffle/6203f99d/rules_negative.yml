rules:
- id: old-read-call-on-class-variable
  message: Calling .read() on a class variable. After Class wrapper introduction,
    many methods are available directly without .read().
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $CLASS.read()
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^(class|super_class|type_class|parent_class|target_class|param|application|type_object|c)$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: old-param-read-name
  message: Accessing name() via .read() on type parameter. After Class wrapper, use
    $PARAM.name() directly.
  severity: WARNING
  languages:
  - rust
  pattern: $PARAM.read().name()
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
  paths:
    include:
    - '**/avm2/**/*.rs'
- id: old-inner-class-definition-read-chain
  message: Chaining .read() after inner_class_definition(). After refactor, inner_class_definition()
    returns Class wrapper, call .$METHOD(...) directly.
  severity: WARNING
  languages:
  - rust
  pattern: $OBJ.inner_class_definition().read().$METHOD(...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - '**/avm2/**/*.rs'
- id: old-class-definition-unwrap-read
  message: Chaining .read() after inner_class_definition(). Use methods directly on
    Class wrapper.
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.inner_class_definition().read().$METHOD(...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - '**/avm2/**/*.rs'
- id: old-class-ptr-eq-in-condition
  message: Using GcCell::ptr_eq in if condition for class comparison. After refactor,
    use if $A == $B.
  severity: WARNING
  languages:
  - rust
  pattern: "if GcCell::ptr_eq($A, $B) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - '**/avm2/**/*.rs'
- id: old-inner-class-definition-read-name
