- id: class-wrapper-with-gccell-field
  message: Detected new Class wrapper type containing GcCell field
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: 'pub struct $WRAPPER<''gc>($INNER<''gc, $DATA<''gc>>);

      '
  - metavariable-regex:
      metavariable: $WRAPPER
      regex: ^(?!.*Data)(?i)class$
  - metavariable-regex:
      metavariable: $INNER
      regex: (?i)gc.*cell
  - metavariable-regex:
      metavariable: $DATA
      regex: (?i).*class.*data.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/**/*.rs'
