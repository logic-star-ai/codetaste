- id: gccell-read-on-class
  message: GcCell read() call on Class wrapper
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: $C.0.read()
  - metavariable-regex:
      metavariable: $C
      regex: (?i)(this|self)
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/class.rs'
