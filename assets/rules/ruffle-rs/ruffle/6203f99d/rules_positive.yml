rules:
- id: class-field-in-struct
  message: Class field in struct definition
  severity: INFO
  languages:
  - rust
  pattern-regex: \w+:\s*Class<'[a-z]+>
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: option-some-class
  message: Option<Class> type annotation
  severity: INFO
  languages:
  - rust
  pattern-regex: Option<Class<'[a-z]+>>
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: fn-returning-class
  message: Function returning Class type
  severity: INFO
  languages:
  - rust
  pattern-regex: ->\s*Class<'[a-z]+>
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: param-class-type-concrete
  message: Function parameter with Class type
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+\w+\s*\([^)]*:\s*Class<'[a-z]+>[^)]*\)
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: class-equality-taint
  message: Class value flowing to equality comparison without ptr_eq
  severity: INFO
  languages:
  - rust
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $CLASS
    - metavariable-type:
        metavariable: $CLASS
        types:
        - Class<'$L>
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: $A == $SINK
      - pattern: $SINK == $A
      - pattern: $A != $SINK
      - pattern: $SINK != $A
    - pattern-not-inside: GcCell::ptr_eq($X, $Y)
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: class-param-in-impl
  message: Class parameter in impl method
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: "impl $TRAIT for $TYPE {\n  ...\n  fn $METHOD(..., $PARAM: $PTYPE, ...)\
      \ {\n    ...\n  }\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PTYPE
      regex: ^Class<'[a-z]+>$
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: classdata-import
  message: Import or reference to ClassData
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-regex: ClassData
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: class-name-direct-access
  message: Direct name() call on class
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: $C.name()
  - pattern-not: $X.read().name()
  - metavariable-regex:
      metavariable: $C
      regex: ^(class|cls|klass|super_class|parent|base)$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/*.rs'
  options:
    symbolic_propagation: true
- id: instance-traits-direct
  message: instance_traits() called directly
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: $C.instance_traits()
  - pattern-not: $X.read().instance_traits()
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/**/*.rs'
  options:
    symbolic_propagation: true
- id: class-in-result-type
  message: Class type in Result return
  severity: INFO
  languages:
  - rust
  pattern-regex: Result<Class<'[a-z]+>,\s*\w+
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: classdata-in-comments
  message: ClassData reference in code
  severity: INFO
  languages:
  - rust
  pattern-regex: ClassData<'[a-z]+>
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: vec-class-field
  message: Vec<Class> field type
  severity: INFO
  languages:
  - rust
  pattern-regex: Vec<Class<'[a-z]+>>
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: propertymap-class-type
  message: PropertyMap with Class
  severity: INFO
  languages:
  - rust
  pattern-regex: PropertyMap<'[a-z]+,\s*Class<'[a-z]+>>
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/domain.rs'
- id: classkey-wraps-class
  message: ClassKey wrapping Class<'gc> instead of GcCell
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: 'struct ClassKey<''$L>($T<''$L>)

        '
    - pattern: 'struct $NAME<''$L>(Class<''$L>)

        '
  - metavariable-regex:
      metavariable: $NAME
      regex: (?i).*(key|id|ref)$
  - pattern-not: struct $N<$L>(GcCell<$G>)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: class-wrapper-tuple-struct
  message: Class wrapper as tuple struct wrapping GcCell
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: 'pub struct Class<''$L>(GcCell<''$L, $INNER<''$L>>);

      '
  - metavariable-regex:
      metavariable: $INNER
      regex: ^ClassData$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: try-name-method
  message: try_name() method call on class
  severity: INFO
  languages:
  - rust
  pattern: $CLASS.try_name()
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: class-sealed-direct-access
  message: Direct is_sealed() call
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: $C.is_sealed()
  - pattern-not: $X.read().is_sealed()
  - metavariable-regex:
      metavariable: $C
      regex: ^(class|cls|klass)$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/*.rs'
  options:
    symbolic_propagation: true
- id: class-final-direct-access
  message: Direct is_final() call
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: $C.is_final()
  - pattern-not: $X.read().is_final()
  - metavariable-regex:
      metavariable: $C
      regex: ^(class|cls|klass)$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/*.rs'
  options:
    symbolic_propagation: true
- id: impl-trait-class-bound
  message: impl Trait with Class
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s+\w+.*Class<
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/**/*.rs'
- id: hashmap-class-value
  message: HashMap with Class as value
  severity: INFO
  languages:
  - rust
  pattern-regex: HashMap<[^,]+,\s*Class<'[a-z]+>>
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/**/*.rs'
