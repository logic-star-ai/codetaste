rules:
- id: class-0-access-in-impl
  message: Detected self.0 access in Class impl (tuple struct field)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: self.0
  - pattern-inside: 'impl<''gc> Class<''gc> { ... }

      '
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*class*.rs'
- id: fn-param-class-not-gccell
  message: Detected function parameter with Class<'gc> type
  severity: INFO
  languages:
  - rust
  pattern-regex: \w+:\s*Class<'gc>
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/**/*.rs'
- id: return-type-class-wrapper
  message: Detected function returning Class wrapper instead of GcCell
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: 'fn $FUNC(...) -> $TYPE<''gc> { ... }

        '
    - pattern: 'pub fn $FUNC(...) -> $TYPE<''gc> { ... }

        '
    - pattern: 'fn $FUNC(...) -> Option<$TYPE<''gc>> { ... }

        '
    - pattern: 'pub fn $FUNC(...) -> Option<$TYPE<''gc>> { ... }

        '
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^Class$
  - pattern-not: 'fn $FUNC(...) -> GcCell<''gc, $X<''gc>> { ... }

      '
  - pattern-not: 'pub fn $FUNC(...) -> GcCell<''gc, $X<''gc>> { ... }

      '
  - pattern-not: 'fn $FUNC(...) -> Option<GcCell<''gc, $X<''gc>>> { ... }

      '
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/avm2/**/*.rs'
