rules:
- id: vuetify-inline-props-in-generic-component-v2
  message: Component uses inline props object instead of props factory function. Extract
    props to makeV*Props() factory using propsFactory().
  severity: WARNING
  languages:
  - typescript
  pattern: "genericComponent()({\n  ...,\n  props: {\n    ...,\n    $PROP: $TYPE,\n\
    \    ...\n  },\n  ...\n})\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 80
  paths:
    exclude:
    - '**/VField.tsx'
    - '**/VOverlay.tsx'
    - '**/createTransition.ts'
    - '**/createSimpleFunctional.ts'
- id: vuetify-props-with-inline-object-properties
  message: Component '$NAME' uses inline prop object definitions. Extract to makeV*Props()
    factory using propsFactory().
  severity: WARNING
  languages:
  - typescript
  pattern: "export const $COMP = genericComponent()({\n  name: '$NAME',\n  props:\
    \ {\n    $PROP: {\n      type: $TYPE,\n      ...\n    },\n    ...\n  },\n  ...\n\
    })\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
