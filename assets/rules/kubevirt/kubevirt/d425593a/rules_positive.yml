rules:
- id: any-line-migration-tests
  message: Detected any line in migration tests
  severity: INFO
  languages:
  - go
  pattern-regex: .*
  metadata:
    nr_refactored_patterns: 7744
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/migration/*.go
- id: any-line-libmigration
  message: Detected any line in libmigration
  severity: INFO
  languages:
  - go
  pattern-regex: .*
  metadata:
    nr_refactored_patterns: 910
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/libmigration/*.go
- id: pointer-field-access-migration
  message: Detected pointer field access in migration
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PTR.$FIELD
  metadata:
    nr_refactored_patterns: 432
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/libmigration/*.go
- id: migration-helper-call-from-libmigration
  message: Detected call to migration helper function from libmigration package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.$FUNC(...)
    - pattern: $PKG.$FUNC
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i)^libmigration$
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(expect|run|confirm|migration|network|metric|succeed|abort|complete).*
  metadata:
    nr_refactored_patterns: 286
    nr_legacy_patterns: 0
- id: migration-test-function-with-libmigration-call
  message: Detected test function calling libmigration helper
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: libmigration.$FUNC(...)
  - pattern-not-inside: 'package libmigration

      ...

      '
  metadata:
    nr_refactored_patterns: 146
    nr_legacy_patterns: 0
- id: vmi-migration-state-access
  message: Detected VMI migration state access in helpers
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $VMI.Status.MigrationState
    - pattern: $VMI.Status.MigrationState.$FIELD
  metadata:
    nr_refactored_patterns: 84
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/libmigration/*.go
- id: migration-struct-field-access-chain
  message: Detected migration struct field access chain
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $M.Status.MigrationState.$F1.$F2
    - pattern: $M.Status.$F1
