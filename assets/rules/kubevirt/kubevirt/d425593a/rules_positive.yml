  message: Detected By() statement in migration helper functions
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'By($MSG)

      '
  - metavariable-regex:
      metavariable: $MSG
      regex: (?i).*(migration|migrate|wait|complet|success|expect|verify).*
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/libmigration/*.go
