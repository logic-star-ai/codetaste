    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/libmigration/*.go
- id: any-variable-declaration-libmigration
  message: Detected variable declaration in libmigration
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: var $VAR $TYPE
    - pattern: var $VAR = $EXPR
    - pattern: $VAR := $EXPR
  metadata:
    nr_refactored_patterns: 58
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/libmigration/*.go
