rules:
- id: tests-package-import-for-migration-helpers
  message: Migration helper should be imported from 'kubevirt.io/kubevirt/tests/libmigration'
    package, not 'tests' package
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: 'tests.RunMigration(...)

      '
  - pattern: 'tests.RunMigrationAndExpectCompletion(...)

      '
  - pattern: 'tests.ExpectMigrationSuccess(...)

      '
  - pattern: 'tests.ConfirmVMIPostMigration(...)

      '
  - pattern: 'tests.ConfirmVMIPostMigrationAborted(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 113
- id: tests-migration-wait-time-constant
  message: Migration constant 'MigrationWaitTime' should be imported from 'kubevirt.io/kubevirt/tests/libmigration'
    package
  severity: WARNING
  languages:
  - go
  pattern: tests.MigrationWaitTime
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
- id: tests-call-run-migration-and-expect-completion
  message: Migration helper 'RunMigrationAndExpectCompletion' should be imported from
    'kubevirt.io/kubevirt/tests/libmigration' package
  severity: WARNING
  languages:
  - go
  pattern: tests.RunMigrationAndExpectCompletion(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 61
- id: expect-with-migration-wait-time-timeout
  message: Migration helpers and constants should use libmigration package
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: tests.RunMigrationAndExpectCompletion($VIRTCLIENT, $MIGRATION, tests.MigrationWaitTime)
  - pattern: tests.ExpectMigrationSuccess($VIRTCLIENT, $MIGRATION, tests.MigrationWaitTime)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 57
