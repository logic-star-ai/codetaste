rules:
- id: setonce-variable-assignment
  message: Detected variable assignment with new SetOnce instantiation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$VAR = new SetOnce<>()

      '
  - pattern-not-inside: 'import org.apache.lucene.util.SetOnce;

      ...

      '
  metadata:
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: setonce-get-method-call
  message: Detected get() method call on SetOnce instance (new implementation)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $VAR.get()
  - pattern-inside: 'SetOnce<$TYPE> $VAR = ...;

      ...

      '
  - pattern-not-inside: 'import org.apache.lucene.util.SetOnce;

      ...

      '
  metadata:
    nr_refactored_patterns: 100
    nr_legacy_patterns: 0
- id: setonce-opensearch-assignment
  message: Assignment of new SetOnce from OpenSearch
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'import org.opensearch.common.SetOnce;

      ...

      $VAR = new SetOnce<>();'
  metadata:
    nr_refactored_patterns: 73
    nr_legacy_patterns: 0
- id: import-opensearch-setonce-common
  message: Detected import of new OpenSearch SetOnce utility from org.opensearch.common
    package
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import $PKG.SetOnce;
  - metavariable-regex:
      metavariable: $PKG
      regex: ^org\.opensearch\.common$
  metadata:
    nr_refactored_patterns: 71
    nr_legacy_patterns: 0
- id: setonce-set-method-call
  message: Detected set() method call on SetOnce instance (new implementation)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $VAR.set($ARG)
  - pattern-inside: 'SetOnce<$TYPE> $VAR = ...;

      ...

      '
  - pattern-not-inside: 'import org.apache.lucene.util.SetOnce;

      ...

      '
  metadata:
    nr_refactored_patterns: 70
    nr_legacy_patterns: 0
- id: setonce-field-in-inner-class
  message: SetOnce field detected in inner class context
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: SetOnce<$TYPE> $VAR = ...;
  - pattern-inside: "class $OUTER {\n  ...\n  class $INNER {\n    ...\n  }\n}\n"
  - pattern-not-inside: 'import org.apache.lucene.util.SetOnce;

      ...

      '
  metadata:
    nr_refactored_patterns: 62
    nr_legacy_patterns: 0
- id: setonce-opensearch-with-set-call
  message: SetOnce from OpenSearch with set() call
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'import org.opensearch.common.SetOnce;

      ...

      $VAR.set($ARG);

      '
  metadata:
    nr_refactored_patterns: 62
    nr_legacy_patterns: 0
- id: new-setonce-local-variable
  message: Detected local variable with new SetOnce instantiation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'final SetOnce<$TYPE> $VAR = new SetOnce<>();

      '
  - pattern-not-inside: 'import org.apache.lucene.util.SetOnce;

      ...

      '
  metadata:
    nr_refactored_patterns: 61
    nr_legacy_patterns: 0
- id: setonce-in-constructor-body
  message: SetOnce instantiation in constructor body
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "$CLASS(...) {\n  ...\n  $VAR = new SetOnce<>();\n  ...\n}\n"
  - pattern-not-inside: 'import org.apache.lucene.util.SetOnce;

      ...

      '
  metadata:
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
- id: opensearch-setonce-in-server-module
  message: Usage of new SetOnce in server module (not Lucene)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import $PKG.SetOnce;
  - metavariable-regex:
      metavariable: $PKG
      regex: ^org\.opensearch\.(common|core).*
  metadata:
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/server/src/**/*.java'
- id: setonce-assignment-in-method
  message: SetOnce assignment detected in method body
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "$RET $METHOD(...) {\n  ...\n  $VAR = new SetOnce<>();\n  ...\n}\n"
  - pattern-not-inside: 'import org.apache.lucene.util.SetOnce;

      ...

      '
  metadata:
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
