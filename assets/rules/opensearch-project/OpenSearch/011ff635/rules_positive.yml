rules:
- id: setonce-opensearch-import-no-lucene
  message: 'Refactoring detected: File imports OpenSearch SetOnce not Lucene'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'import org.opensearch.common.SetOnce;

      ...

      '
  - pattern-not: import org.apache.lucene.util.SetOnce;
  metadata:
    nr_refactored_patterns: 2966
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: setonce-get-method-dataflow
  message: 'Refactoring detected: Data flow from OpenSearch SetOnce get method'
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $OBJ.get()
    - pattern-inside: 'import org.opensearch.common.SetOnce;

        ...

        '
  pattern-sinks:
  - pattern: $SINK
  metadata:
    nr_refactored_patterns: 1297
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: setonce-set-method-dataflow
  message: 'Refactoring detected: SetOnce set method called with OpenSearch import'
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: $VALUE
  pattern-sinks:
  - patterns:
    - pattern: $OBJ.set($SINK)
    - pattern-inside: 'import org.opensearch.common.SetOnce;

        ...

        '
  metadata:
    nr_refactored_patterns: 240
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: setonce-instantiation-with-opensearch-import
  message: 'Refactoring detected: SetOnce instantiation with new import context'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: new SetOnce<$TYPE>()
    - pattern: new SetOnce<>()
    - pattern: $VAR = new SetOnce<$T>();
  - pattern-inside: 'import org.opensearch.common.SetOnce;

      ...

      '
  metadata:
    nr_refactored_patterns: 113
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: opensearch-common-package-import-variant
  message: 'Refactoring detected: Using OpenSearch common utilities'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: import org.opensearch.common.SetOnce;
    - pattern: import org.opensearch.common.*;
  - pattern-not: import org.apache.lucene.util.SetOnce;
  metadata:
    nr_refactored_patterns: 73
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: opensearch-setonce-import-detected
  message: 'Refactoring detected: Import from org.opensearch.common package instead
    of Lucene'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import org.opensearch.common.$CLASS;
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^SetOnce$
  - pattern-not-inside: 'import org.apache.lucene.util.$X;

      ...

      '
  metadata:
    nr_refactored_patterns: 59
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: opensearch-common-setonce-in-class
  message: 'Refactoring detected: Class using OpenSearch SetOnce'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-inside: "import org.opensearch.common.SetOnce;\n...\nclass $CLASS {\n\
      \  ...\n}\n"
  - pattern-either:
    - pattern: SetOnce<$T> $FIELD;
    - pattern: new SetOnce<$T>();
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: setonce-core-module-location
  message: 'Refactoring detected: SetOnce in core module'
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/libs/core/**/*SetOnce*.java'
- id: setonce-opensearch-source-file
  message: 'Refactoring detected: SetOnce source file in opensearch package'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: package org.opensearch.common;
    - pattern: import $X;
  - pattern-inside: 'package org.opensearch.common;

      ...

      class SetOnce<$T> { ... }

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: opensearch-setonce-file-existence
  message: 'Refactoring detected: New SetOnce class file exists in OpenSearch common
    package'
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/libs/core/src/main/java/org/opensearch/common/SetOnce.java'
- id: opensearch-setonce-package-declaration
  message: 'Refactoring detected: SetOnce source file with correct package'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: package org.opensearch.common;
  - pattern-inside: 'package org.opensearch.common;

      ...

      class SetOnce<$T> { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: opensearch-setonce-test-file-existence
  message: 'Refactoring detected: SetOnce test file exists'
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/libs/core/src/test/**/SetOnceTests.java'
- id: opensearch-package-setonce-class-def
  message: 'Refactoring detected: SetOnce class definition in OpenSearch package'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class SetOnce<$T> {\n  ...\n}\n"
  - pattern-inside: 'package org.opensearch.common;

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: setonce-test-class-definition
  message: 'Refactoring detected: SetOnce test class exists'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: .*SetOnce.*Test.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SetOnceTests.java'
