  languages:
  - java
  patterns:
  - pattern: "import org.opensearch.common.SetOnce;\n...\nclass $CLASS {\n  ...\n\
      \  $RET $METHOD(...) {\n    ...\n    SetOnce<$TYPE> $VAR = ...;\n    ...\n \
      \ }\n}\n"
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
