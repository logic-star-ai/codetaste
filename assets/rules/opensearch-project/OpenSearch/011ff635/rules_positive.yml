rules:
- id: setonce-usage-without-lucene-import
  message: 'Migration detected: SetOnce used without Lucene import'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: SetOnce<$T> $VAR = ...;
    - pattern: SetOnce $VAR = ...;
  - pattern-not-inside: 'import org.apache.lucene.util.SetOnce;

      ...

      '
  metadata:
    nr_refactored_patterns: 107
    nr_legacy_patterns: 0
- id: opensearch-setonce-import-detected
  message: 'Migration detected: SetOnce imported from org.opensearch.common package'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import org.opensearch.common.SetOnce;
  metadata:
    nr_refactored_patterns: 73
    nr_legacy_patterns: 0
- id: setonce-asterisk-in-file
  message: 'Migration detected: Asterisk in SetOnce file'
  severity: INFO
  languages:
  - java
  pattern-regex: \*
  metadata:
    nr_refactored_patterns: 69
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SetOnce.java'
- id: setonce-comment-start
  message: 'Migration detected: Comment start in SetOnce'
  severity: INFO
  languages:
  - java
  pattern-regex: /\*
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SetOnce.java'
- id: setonce-comment-end
  message: 'Migration detected: Comment end in SetOnce'
  severity: INFO
  languages:
  - java
  pattern-regex: \*/
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SetOnce.java'
- id: setonce-javadoc-class-comment
  message: 'Migration detected: Javadoc for SetOnce class'
  severity: INFO
  languages:
  - java
  pattern-regex: /\*\*[\s\S]*?\*/
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SetOnce.java'
- id: setonce-under-license-comment
  message: 'Migration detected: Under the License comment in SetOnce'
  severity: INFO
  languages:
  - java
  pattern-regex: '[Uu]nder.*[Ll]icense'
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SetOnce.java'
- id: setonce-copyright-notice
  message: 'Migration detected: Copyright notice in SetOnce'
  severity: INFO
  languages:
  - java
  pattern-regex: OpenSearch Contributors
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SetOnce.java'
- id: setonce-utility-class-comment
  message: 'Migration detected: Utility class comment in SetOnce'
  severity: INFO
  languages:
  - java
  pattern-regex: (?i)util
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SetOnce.java'
- id: new-setonce-class-in-opensearch-package
  message: 'Migration detected: SetOnce class defined in opensearch common package'
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/org/opensearch/common/SetOnce.java'
- id: new-setonce-tests-in-opensearch
  message: 'Migration detected: SetOnce test class exists'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-inside: 'import org.apache.lucene.util.SetOnce;

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SetOnceTests.java'
- id: setonce-opensearch-class-definition
  message: 'Migration detected: SetOnce class definition in opensearch'
  severity: INFO
  languages:
  - java
  pattern: "public class SetOnce<$T> {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/org/opensearch/**/SetOnce.java'
