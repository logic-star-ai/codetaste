rules:
- id: old-single-record-action-hook-type-reference
  message: Reference to old SingleRecordActionHook type family. Should use new ActionHook
    type.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: SingleRecordActionHook(?:With(?:out)?ObjectMetadataItem)?
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 74
  paths:
    include:
    - '*.ts'
    - '*.tsx'
- id: register-method-name-pattern
  message: Registration method name pattern from old implementation. Should use config-based
    registration.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: registerExport(?:Multiple|View.*No.*Selection)RecordsAction|registerDelete(?:Multiple)RecordsAction
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - '**/hooks/*.ts'
    - '**/hooks/*.tsx'
- id: old-single-record-action-hook-type-import
  message: The type 'SingleRecordActionHook' should be renamed to 'ActionHook' as
    part of the refactoring. Update the import to use the new ActionHook type.
  severity: WARNING
  languages:
  - typescript
  pattern: import { $TYPE } from '@/action-menu/actions/types/SingleRecordActionHook'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: workflow-action-hooks-with-recordid
  message: Workflow action hooks should not receive recordId parameter. Extract recordId
    from context using useSelectedRecordIdOrThrow().
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: '$HOOK({ recordId, $...REST })

      '
  - pattern: "$HOOK({\n  recordId: $ID,\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/workflow-actions/**/*.ts'
    - '**/workflow-actions/**/*.tsx'
    - '**/workflow-run-actions/**/*.ts'
    - '**/workflow-run-actions/**/*.tsx'
    - '**/workflow-version-actions/**/*.ts'
    - '**/workflow-version-actions/**/*.tsx'
- id: unregister-method-name-pattern
  message: Unregistration method name pattern from old implementation. Should use
    config-based registration.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: unregisterExport(?:Multiple|View.*No.*Selection)RecordsAction|unregisterDelete(?:Multiple)RecordsAction
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/hooks/*.ts'
    - '**/hooks/*.tsx'
- id: old-single-record-action-hook-without-metadata-type-annotation
  message: Type annotation uses old 'SingleRecordActionHookWithoutObjectMetadataItem'
    type. Should be updated to use the new ActionHook type.
  severity: WARNING
  languages:
  - typescript
  pattern: 'export const $HOOK: SingleRecordActionHookWithoutObjectMetadataItem =
    ...

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: old-single-record-action-hook-without-object-metadata-import
  message: Import of 'SingleRecordActionHookWithoutObjectMetadataItem' should be replaced
    with new 'ActionHook' type.
  severity: WARNING
  languages:
  - typescript
  pattern: import { SingleRecordActionHookWithoutObjectMetadataItem } from '@/action-menu/actions/types/SingleRecordActionHook'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: workflow-action-hook-with-recordid-signature
  message: Workflow action hook with recordId parameter. Should extract recordId from
    context using useSelectedRecordIdOrThrow().
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'export const $HOOK: $TYPE = ({ recordId }) => { ... }

      '
  - metavariable-regex:
      metavariable: $HOOK
      regex: use.*Workflow.*Action
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: old-single-record-action-hook-with-metadata-type-annotation
  message: Type annotation uses old 'SingleRecordActionHookWithObjectMetadataItem'
    type. Should be updated to use the new ActionHook type.
  severity: WARNING
  languages:
  - typescript
  pattern: 'export const $HOOK: SingleRecordActionHookWithObjectMetadataItem = ...

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: old-single-record-action-hook-with-object-metadata-import
  message: Import of 'SingleRecordActionHookWithObjectMetadataItem' should be replaced
    with new 'ActionHook' type.
  severity: WARNING
  languages:
  - typescript
  pattern: import { SingleRecordActionHookWithObjectMetadataItem } from '@/action-menu/actions/types/SingleRecordActionHook'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: record-action-menu-entries-setter-non-refactored
  message: Usage of old ActionMenuEntrySetter component. Should use RegisterRecordActionEffect.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: '<$COMPONENT objectMetadataItem={$OBJ} />

      '
  - metavariable-regex:
      metavariable: $COMPONENT
      regex: (Multiple|NoSelection|Single).*ActionMenuEntrySetter.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: use-add-to-favorites-single-record-action-with-recordid
  message: useAddToFavoritesSingleRecordAction should not receive recordId parameter.
    It should extract recordId from context.
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: 'useAddToFavoritesSingleRecordAction({ recordId, $...REST })

      '
  - pattern: "useAddToFavoritesSingleRecordAction({\n  recordId: $ID,\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: use-remove-from-favorites-single-record-action-with-recordid
  message: useRemoveFromFavoritesSingleRecordAction should not receive recordId parameter.
    It should extract recordId from context.
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: 'useRemoveFromFavoritesSingleRecordAction({ recordId, $...REST })

      '
  - pattern: "useRemoveFromFavoritesSingleRecordAction({\n  recordId: $ID,\n  ...\n\
      })\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: import-from-no-selection-hooks-directory
  message: Import from no-selection hooks directory. These hooks should be refactored
    or removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: from '@/action-menu/actions/record-actions/no-selection/hooks/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: use-export-view-no-selection-record-action-call
  message: Call to useExportViewNoSelectionRecordAction. This hook should be removed
    per the refactoring.
  severity: WARNING
  languages:
  - typescript
  pattern: 'useExportViewNoSelectionRecordAction({ objectMetadataItem: $OBJ })

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: action-hook-position-parameter-pattern
  message: Position parameter in action registration. This is characteristic of the
    old pattern.
  severity: INFO
  languages:
  - typescript
  pattern-regex: position:\s*number
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/multiple-records/**/*.ts'
    - '**/multiple-records/**/*.tsx'
    - '**/no-selection/**/*.ts'
    - '**/no-selection/**/*.tsx'
- id: workflow-action-config-with-old-type
  message: Workflow action config imports old SingleRecordActionHook type. Should
    use ActionHook.
  severity: WARNING
  languages:
  - typescript
  pattern: import { SingleRecordActionHook } from '@/action-menu/actions/types/SingleRecordActionHook'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/workflow*/*Config*.ts'
    - '**/workflow-actions/**/*.ts'
    - '**/workflow-run-actions/**/*.ts'
    - '**/workflow-version-actions/**/*.ts'
- id: action-menu-entry-setter-effect-in-file-name
  message: File name contains ActionMenuEntrySetterEffect pattern. These files should
    be removed or refactored to use RegisterRecordActionEffect.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/*ActionMenuEntrySetterEffect.tsx'
    - '**/*ActionMenuEntrySetterEffect.ts'
- id: action-hook-calling-use-action-menu-entries
  message: Action hook calls useActionMenuEntries. This suggests old pattern. Use
    config-based registration.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'const { addActionMenuEntry, removeActionMenuEntry } = useActionMenuEntries();

      '
  - pattern-inside: 'export const $HOOK = $IMPL

      '
  - metavariable-regex:
      metavariable: $HOOK
      regex: use(Delete|Export).*Action
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: unregister-action-method-calling-remove
  message: Unregister method calling removeActionMenuEntry. This is the old pattern.
    Use config-based registration.
  severity: WARNING
  languages:
  - typescript
  pattern: "const $UNREGISTER = () => {\n  removeActionMenuEntry($KEY);\n};\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-single-record-action-menu-entry-setter-usage
