rules:
- id: detect-use-selected-record-id-or-throw-hook
  message: Detected useSelectedRecordIdOrThrow() hook to extract recordId from context
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: 'export const useSelectedRecordIdOrThrow = () => { ... }

      '
  - pattern: 'const useSelectedRecordIdOrThrow = () => { ... }

      '
  - pattern: 'const $RECORD_ID = useSelectedRecordIdOrThrow();

      '
  - pattern: 'const $RECORD_ID = useSelectedRecordIdOrThrow()

      '
  metadata:
    category: api
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: detect-record-id-variable-from-use-selected-record-id-or-throw
  message: Detected recordId being assigned from useSelectedRecordIdOrThrow()
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'const recordId = useSelectedRecordIdOrThrow();

      '
  - pattern-not-inside: 'export const useSelectedRecordIdOrThrow = () => { ... };

      '
  metadata:
    category: api
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: detect-action-hook-without-recordid-parameter-generic
  message: Detected action hook without recordId parameter, using useSelectedRecordIdOrThrow
    instead
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: "export const $HOOK: ActionHookWithObjectMetadataItem = ({\n  objectMetadataItem,\n\
        }) => {\n  ...\n  const $ID = useSelectedRecordIdOrThrow();\n  ...\n};\n"
    - pattern: "export const $HOOK: ActionHookWithoutObjectMetadataItem = () => {\n\
        \  ...\n  const $ID = useSelectedRecordIdOrThrow();\n  ...\n};\n"
  - metavariable-regex:
      metavariable: $HOOK
      regex: use.*Action
  metadata:
    category: api
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: detect-any-use-selected-record-id-or-throw-call
  message: Detected useSelectedRecordIdOrThrow() call
  severity: INFO
  languages:
  - typescript
  pattern: useSelectedRecordIdOrThrow()
  metadata:
    category: api
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: detect-selected-record-id-throw-in-any-action-hook
