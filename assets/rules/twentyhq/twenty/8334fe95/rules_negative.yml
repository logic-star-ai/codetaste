    modal state should be removed. Use isModalOpenedComponentState with modalId instead.'
  severity: WARNING
  languages:
  - typescript
  pattern: 'import { isRemoveSortingModalOpenState } from ''$PATH''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: modal-createportal-with-isopen
  message: 'Old pattern: createPortal with ConfirmationModal using isOpen prop. Refactor
    to use modalId and useModal hook.'
  severity: WARNING
  languages:
  - typescript
  pattern: "createPortal(\n  <ConfirmationModal\n    isOpen={$ISOPEN}\n    ...\n \
    \ />,\n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: modal-state-variable-declaration
  message: 'Old pattern: Declaring modal state with useRecoilState/useState. Refactor
    to use useModal hook with modalId.'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'const [$ISOPEN, $SETISOPEN] = $HOOK($STATE);

      '
  - metavariable-regex:
      metavariable: $ISOPEN
      regex: ^(isOpen|is.*[Mm]odal[Oo]pen|is.*[Mm]odal[Vv]isible|open.*[Mm]odal.*)$
  - metavariable-pattern:
      metavariable: $HOOK
      pattern-either:
      - pattern: useRecoilState
      - pattern: useState
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/*Modal*.tsx'
- id: modal-import-isremovesortingmodalopen-direct
  message: 'Old pattern: Direct import of isRemoveSortingModalOpenState. This state
