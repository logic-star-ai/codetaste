rules:
- id: modal-confirmation-modal-with-isopen-setisopen
  message: 'Old pattern: ConfirmationModal using isOpen/setIsOpen props. Refactor
    to use modalId prop and useModal hook with imperative methods (openModal/closeModal).'
  severity: WARNING
  languages:
  - typescript
  pattern: "<ConfirmationModal\n  isOpen={$ISOPEN}\n  setIsOpen={$SETISOPEN}\n  ...\n\
    />\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: modal-confirmationmodal-with-title-subtitle
  message: 'Old pattern: ConfirmationModal with full props including isOpen/setIsOpen.
    Refactor to use modalId and useModal hook.'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "<ConfirmationModal\n  isOpen={$ISOPEN}\n  setIsOpen={$SETISOPEN}\n \
      \ title={$TITLE}\n  subtitle={$SUBTITLE}\n  onConfirmClick={$HANDLER}\n  ...\n\
      />\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: modal-confirmationmodal-onconfirmclick-prop
  message: 'Old pattern: ConfirmationModal with isOpen, setIsOpen, and onConfirmClick.
    Refactor to use modalId and useModal hook.'
  severity: WARNING
  languages:
