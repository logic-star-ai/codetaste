rules:
- id: detect-board-states-directory-exists
  message: State files in ui/layout/board/states should be moved to ui/object/record-board/states
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - front/src/modules/ui/layout/board/states/*.ts
- id: detect-board-hooks-directory-exists
