rules:
- id: detect-use-scoped-hotkeys-call
  message: Replace useScopedHotkeys() with useHotkeysOnFocusedElement() for focus
    stack API
  severity: WARNING
  languages:
  - typescript
  pattern: useScopedHotkeys(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-scoped-hotkeys-with-scope-param
  message: Replace useScopedHotkeys(..., scope) with useHotkeysOnFocusedElement for
    focus stack API
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'useScopedHotkeys($KEY, $HANDLER, $SCOPE, ...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-scoped-hotkeys-with-callback-ref
  message: Replace useScopedHotkeys callback reference with useHotkeysOnFocusedElement
  severity: WARNING
  languages:
  - typescript
  pattern: 'useScopedHotkeys($KEY, $CALLBACK, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-scoped-hotkeys-any-scope-parameter
  message: Replace useScopedHotkeys with explicit scope with useHotkeysOnFocusedElement
    (scope not needed)
  severity: WARNING
  languages:
  - typescript
  pattern: 'useScopedHotkeys($KEY, $HANDLER, $ANY_SCOPE, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-use-hotkeys-on-focused-element-import-missing
  message: Import useHotkeysOnFocusedElement to replace useScopedHotkeys
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: useScopedHotkeys(...)
  - pattern-not-inside: 'import { ..., useHotkeysOnFocusedElement, ... } from $PKG;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: detect-use-scoped-hotkeys-import
  message: Replace useScopedHotkeys import with useHotkeysOnFocusedElement from focus
    stack API
  severity: WARNING
  languages:
  - typescript
  pattern: import { ..., useScopedHotkeys, ... } from $PKG
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-scoped-hotkeys-file-reference
  message: Replace useScopedHotkeys module path with useHotkeysOnFocusedElement
  severity: WARNING
  languages:
  - typescript
  pattern-regex: '@/ui/utilities/hotkey/hooks/useScopedHotkeys'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-scoped-hotkeys-import-full
  message: Replace useScopedHotkeys import with useHotkeysOnFocusedElement
  severity: WARNING
  languages:
  - typescript
  pattern: 'import { useScopedHotkeys } from $PATH

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-scoped-hotkeys-import-statement
  message: Replace useScopedHotkeys import with useHotkeysOnFocusedElement
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import.*useScopedHotkeys.*from
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-use-scoped-hotkeys-in-component-body
  message: Component should use useHotkeysOnFocusedElement instead of useScopedHotkeys
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "export const $COMPONENT = (...) => {\n  ...\n  useScopedHotkeys(...);\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-scoped-hotkeys-multiple-keys
  message: Replace useScopedHotkeys with multiple keys with useHotkeysOnFocusedElement
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'useScopedHotkeys([$KEY1, $KEY2, ...], ...)

        '
    - pattern: 'useScopedHotkeys([$KEY, ...], ...)

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-scoped-hotkeys-three-params
  message: Replace useScopedHotkeys with useHotkeysOnFocusedElement (scope parameter
    not needed)
  severity: WARNING
  languages:
  - typescript
  pattern: 'useScopedHotkeys($KEY, $HANDLER, $SCOPE)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-form-field-input-container-without-instance-id
  message: FormFieldInputInnerContainer requires formFieldInputInstanceId prop
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "<FormFieldInputInnerContainer>\n  ...\n</FormFieldInputInnerContainer>\n"
  - pattern-not: "<FormFieldInputInnerContainer formFieldInputInstanceId={...}>\n\
      \  ...\n</FormFieldInputInnerContainer>\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-set-hotkey-scope-method-call
  message: Replace setHotkeyScope method call with resetFocusStackToFocusItem
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: '$VAR($SCOPE);

      '
  - pattern-inside: 'const $VAR = useSetHotkeyScope();

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-set-hotkey-scope-variable-usage
  message: Replace setHotkeyScope variable usage with resetFocusStackToFocusItem
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: '$VAR($ANYTHING);

      '
  - pattern-inside: 'const $VAR = useSetHotkeyScope();

      ...

      $VAR($ANYTHING);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-scoped-hotkeys-with-dependencies
  message: Replace useScopedHotkeys with useHotkeysOnFocusedElement(..., dependencies)
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'useScopedHotkeys($KEY, $HANDLER, $SCOPE, $DEPS)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-scoped-hotkeys-four-params
  message: Replace useScopedHotkeys with useHotkeysOnFocusedElement(..., dependencies)
  severity: WARNING
  languages:
  - typescript
  pattern: 'useScopedHotkeys($KEY, $HANDLER, $SCOPE, $DEPS)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-record-index-focus-id-constant
  message: Replace RECORD_INDEX_FOCUS_ID constant with PageFocusId.RecordIndex enum
