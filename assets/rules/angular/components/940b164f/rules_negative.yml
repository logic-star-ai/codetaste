rules:
- id: angular-material-typeof-base-extended-excl
  message: Remove typeof base class from type annotation - use inline class definition
  severity: WARNING
  languages:
  - typescript
  pattern-regex: typeof\s+(Mat\w+Base|Mdc\w+Base)\s*=
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
  paths:
    exclude:
    - '**/mdc-chips/chip-grid.ts'
    - '**/mdc-chips/chip-set.ts'
    - '**/mdc-chips/chip-icons.ts'
    - '**/mdc-slider/slider.ts'
- id: angular-material-const-mixin-regex-excl-slider
  message: Remove explicit Ctor type from mixin base constant - use type inference
  severity: WARNING
  languages:
  - typescript
  pattern-regex: const\s+_Mat\w+MixinBase\s*:\s*\w+Ctor
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
  paths:
    exclude:
    - '**/public-api.ts'
    - '**/mdc-chips/**'
    - '**/mdc-slider/**'
- id: angular-material-mixin-typeof-base-excl-chips
  message: Remove explicit type annotation with typeof BaseClass - use inline class
    definition and rely on type inference
  severity: WARNING
  languages:
  - typescript
  pattern-regex: const\s+_\w+MixinBase\s*:\s*.*&\s*typeof\s+\w+Base\s*=
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
  paths:
    exclude:
    - '**/mdc-chips/chip-grid.ts'
    - '**/mdc-chips/chip-set.ts'
- id: angular-material-import-candisablector
  message: Remove CanDisableCtor import - this interface is deprecated and no longer
    needed
  severity: WARNING
  languages:
  - typescript
  pattern: 'import { ..., CanDisableCtor, ... } from ''@angular/material/core''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    exclude:
    - '**/public-api.ts'
    - '**/mdc-core/public-api.ts'
- id: angular-material-mixin-multiple-ctor-in-import
  message: Remove multiple Ctor interface imports - TypeScript now infers mixin types
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'import { ..., $CTOR1, ..., $CTOR2, ... } from ''@angular/material/core''

      '
  - metavariable-pattern:
      metavariable: $CTOR1
      pattern-regex: ^\w+Ctor$
  - metavariable-pattern:
      metavariable: $CTOR2
      pattern-regex: ^\w+Ctor$
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    exclude:
    - '**/public-api.ts'
    - '**/mdc-core/public-api.ts'
    - '**/mdc-slider/slider.ts'
