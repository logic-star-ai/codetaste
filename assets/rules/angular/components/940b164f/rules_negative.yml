  message: Use inline class definition instead of named base class in mixinDisabled
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: mixinDisabled($CLASS)
  - metavariable-pattern:
      metavariable: $CLASS
      pattern-regex: ^Mat\w+Base$|^Mdc\w+Base$
  - pattern-not: mixinDisabled(class { ... })
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
