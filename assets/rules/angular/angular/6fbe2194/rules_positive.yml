rules:
- id: any-import-statement-from-renderer-dom
  message: Import statement from renderer_dom.ts detected anywhere in codebase
  severity: INFO
  languages:
  - typescript
  pattern-regex: import\s+.*\s+from\s+['"].*renderer_dom['"]
  metadata:
    category: structural
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: any-file-imports-renderer-dom-relative
  message: Relative import from renderer_dom.ts detected - file extraction successful
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ... } from './renderer_dom'
    - pattern: import { ... } from '../renderer_dom'
    - pattern: import { ... } from './interfaces/renderer_dom'
    - pattern: import { ... } from '../interfaces/renderer_dom'
    - pattern: import { ... } from '../../interfaces/renderer_dom'
  metadata:
    category: structural
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
- id: import-from-renderer-dom
  message: Import from new renderer_dom.ts file detected - DOM types extraction refactoring
    applied
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., $IMPORT, ... } from './renderer_dom'
    - pattern: import { ..., $IMPORT, ... } from '../renderer_dom'
    - pattern: import { ..., $IMPORT, ... } from '../../interfaces/renderer_dom'
    - pattern: import { ..., $IMPORT, ... } from '../interfaces/renderer_dom'
    - pattern: import { ..., $IMPORT, ... } from '@angular/core/src/render3/interfaces/renderer_dom'
  metadata:
    category: structural
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: import-renderer-dom-multiple-files
  message: Import DOM types from renderer_dom.ts detected - DOM type extraction refactoring
    applied
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., $TYPE, ... } from './interfaces/renderer_dom'
    - pattern: import { ..., $TYPE, ... } from '../interfaces/renderer_dom'
    - pattern: import { ..., $TYPE, ... } from '../../render3/interfaces/renderer_dom'
  - metavariable-pattern:
      metavariable: $TYPE
      pattern-either:
      - pattern: RNode
      - pattern: RElement
      - pattern: RText
      - pattern: RComment
      - pattern: RCssStyleDeclaration
  metadata:
    category: structural
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: import-relement-from-renderer-dom
  message: RElement imported from renderer_dom.ts - DOM type successfully extracted
  severity: INFO
  languages:
  - typescript
  patterns:
