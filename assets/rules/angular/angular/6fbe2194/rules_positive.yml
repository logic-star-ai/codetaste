    - pattern: import { RElement } from './renderer_dom'
    - pattern: import { RElement } from '../renderer_dom'
    - pattern: import { RElement } from '../interfaces/renderer_dom'
    - pattern: import { ..., RElement, ... } from './renderer_dom'
    - pattern: import { ..., RElement, ... } from '../renderer_dom'
    - pattern: import { ..., RElement, ... } from '../interfaces/renderer_dom'
  metadata:
    category: structural
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
