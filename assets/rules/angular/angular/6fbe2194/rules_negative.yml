- id: errors-file-imports-stringifyForError-from-misc-utils
  message: errors.ts importing stringifyForError from misc_utils creates circular
    dependency - extract to stringify_utils.ts
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: import { $IMPORTS } from './util/misc_utils'
  - metavariable-regex:
      metavariable: $IMPORTS
      regex: .*stringifyForError.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/core/src/render3/errors.ts
- id: di-ts-file-imports-from-render3-errors
  message: DI files should import DI errors from render3/errors_di.ts instead of errors.ts
