    nr_legacy_patterns: 2
  paths:
    include:
    - packages/core/src/render3/util/misc_utils.ts
- id: di-specific-error-comment-in-errors-ts
  message: Comments about DI errors indicate these functions should be extracted to
    errors_di.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: (Called when directives inject each other|when a token is not found
    in DI)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/core/src/render3/errors.ts
- id: misc-utils-file-has-render-stringify-function
  message: renderStringify references in misc_utils.ts indicate it should be extracted
