rules:
- id: render3-files-import-stringify-from-misc-utils-directly
  message: Stringify functions should be imported from render3/util/stringify_utils.ts
    instead of misc_utils.ts
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { stringifyForError } from '../util/misc_utils'
    - pattern: import { renderStringify } from '../util/misc_utils'
    - pattern: import { stringifyForError } from './util/misc_utils'
    - pattern: import { renderStringify } from './util/misc_utils'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - packages/core/src/render3/**
- id: import-stringifyForError-from-misc-utils-not-stringify-utils
  message: stringifyForError should be imported from render3/util/stringify_utils.ts
    instead of misc_utils.ts
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., stringifyForError, ... } from './misc_utils'
    - pattern: import { stringifyForError } from './misc_utils'
    - pattern: import { ..., stringifyForError, ... } from '../util/misc_utils'
    - pattern: import { stringifyForError } from '../util/misc_utils'
    - pattern: import { ..., stringifyForError, ... } from './util/misc_utils'
    - pattern: import { stringifyForError } from './util/misc_utils'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: render3-definition-file-has-factoryfn-reference
  message: FactoryFn references in definition.ts indicate it should be extracted to
    definition_factory.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: FactoryFn
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - packages/core/src/render3/definition.ts
- id: import-throwProviderNotFoundError-from-errors-not-errors-di
  message: throwProviderNotFoundError should be imported from render3/errors_di.ts
    instead of errors.ts
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., throwProviderNotFoundError, ... } from './errors'
    - pattern: import { throwProviderNotFoundError } from './errors'
    - pattern: import { ..., throwProviderNotFoundError, ... } from '../errors'
    - pattern: import { throwProviderNotFoundError } from '../errors'
    - pattern: import { ..., throwProviderNotFoundError, ... } from './render3/errors'
    - pattern: import { throwProviderNotFoundError } from './render3/errors'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: import-renderStringify-from-misc-utils-not-stringify-utils
  message: renderStringify should be imported from render3/util/stringify_utils.ts
    instead of misc_utils.ts
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., renderStringify, ... } from './misc_utils'
    - pattern: import { renderStringify } from './misc_utils'
    - pattern: import { ..., renderStringify, ... } from '../util/misc_utils'
    - pattern: import { renderStringify } from '../util/misc_utils'
    - pattern: import { ..., renderStringify, ... } from './util/misc_utils'
    - pattern: import { renderStringify } from './util/misc_utils'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: import-di-error-provider-relative-path-errors
  message: throwProviderNotFoundError import from ./errors should use ./errors_di
    to break circular dependencies
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { throwProviderNotFoundError, ... } from './errors'
    - pattern: import { ..., throwProviderNotFoundError } from './errors'
    - pattern: import { ..., throwProviderNotFoundError, ... } from './errors'
  - pattern-not: import { ... } from './errors_di'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - packages/core/src/render3/**
    - packages/core/src/di/**
- id: render3-definition-exports-getFactoryDef
  message: getFactoryDef function should be extracted to render3/definition_factory.ts
    to break circular dependencies
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export\s+function\s+getFactoryDef
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - packages/core/src/render3/definition.ts
    - packages/core/src/render3/interfaces/definition.ts
- id: definition-contains-getFactoryDef-implementation
  message: getFactoryDef function should be in definition_factory.ts to break circular
    dependencies with DI
  severity: WARNING
  languages:
  - typescript
  pattern-regex: function\s+getFactoryDef<T>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - packages/core/src/render3/definition.ts
    - packages/core/src/render3/interfaces/definition.ts
- id: getFactoryDef-not-in-dedicated-file
  message: getFactoryDef function should be in dedicated definition_factory.ts file
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export\s+function\s+getFactoryDef<T>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - packages/core/src/render3/definition.ts
    - packages/core/src/render3/interfaces/definition.ts
- id: render3-definition-file-has-getfactorydef-reference
  message: getFactoryDef references in definition.ts indicate it should be extracted
    to definition_factory.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: getFactoryDef
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - packages/core/src/render3/definition.ts
- id: factoryfn-export-in-definition-file
  message: Export of FactoryFn from definition.ts should be from definition_factory.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export.*FactoryFn
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - packages/core/src/render3/definition.ts
- id: getfactorydef-export-in-definition-file
  message: Export of getFactoryDef from definition.ts should be from definition_factory.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export.*getFactoryDef
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - packages/core/src/render3/definition.ts
- id: di-r3-injector-imports-from-render3-definition
  message: di/r3_injector importing from render3/definition creates circular dependency
    - extract factory definitions
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { $X } from './render3/definition'
    - pattern: import { $X } from '../render3/definition'
    - pattern: import { $X } from './render3/interfaces/definition'
    - pattern: import { $X } from '../render3/interfaces/definition'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/core/src/di/r3_injector.ts
    - packages/core/src/di/injector.ts
- id: r3-injector-imports-from-definition
  message: r3_injector importing FactoryFn or getFactoryDef from definition creates
    circular dependency - extract to definition_factory.ts
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { $X } from '../render3/definition'
    - pattern: import { $X } from '../render3/interfaces/definition'
  - metavariable-pattern:
      metavariable: $X
      patterns:
      - pattern-either:
        - pattern: FactoryFn
        - pattern: getFactoryDef
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/core/src/di/r3_injector.ts
- id: stringify-utils-functions-still-in-misc-utils-file
  message: Stringify functions (stringifyForError, renderStringify) should be extracted
    to stringify_utils.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export\s+function\s+(stringifyForError|renderStringify)\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/core/src/render3/util/misc_utils.ts
- id: misc-utils-contains-stringify-functions
  message: Stringify utility functions should be extracted to stringify_utils.ts to
    reduce dependencies
