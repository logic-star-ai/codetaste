rules:
- id: reference-web-workers-directory-in-paths
  message: References to platform-browser/src/web_workers should be updated to platform-webworker
    package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: platform-browser/src/web_workers
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
- id: comment-reference-platform-browser-worker-api
  message: Comments/docs referencing worker APIs should use '@angular/platform-webworker'
    or '@angular/platform-webworker-dynamic'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: '@angular/platform-browser.*worker'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - '**/*.ts'
- id: web-workers-directory-in-platform-browser
  message: Web workers code should be moved to platform-webworker package, not remain
    in platform-browser
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
  paths:
    include:
    - '**/platform-browser/src/web_workers/**/*.ts'
- id: import-multiple-worker-symbols-from-platform-browser
  message: Worker-related API '$WORKER_API' should be imported from '@angular/platform-webworker'
    instead of '@angular/platform-browser'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'import { ..., $WORKER_API, ... } from ''@angular/platform-browser''

        '
  - metavariable-pattern:
      metavariable: $WORKER_API
      patterns:
      - pattern-either:
        - pattern: platformWorkerApp
        - pattern: platformWorkerUi
        - pattern: WorkerAppModule
        - pattern: WORKER_SCRIPT
        - pattern: ClientMessageBroker
        - pattern: ServiceMessageBroker
        - pattern: MessageBus
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: import-worker-dynamic-from-platform-browser-dynamic
  message: Worker-related API '$WORKER_API' should be imported from '@angular/platform-webworker-dynamic'
    instead of '@angular/platform-browser-dynamic'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'import { ..., $WORKER_API, ... } from ''@angular/platform-browser-dynamic''

        '
  - metavariable-pattern:
      metavariable: $WORKER_API
      patterns:
      - pattern-either:
        - pattern: platformWorkerAppDynamic
        - pattern: bootstrapWorkerUi
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: import-worker-related-api-playground-background-index
  message: Worker APIs in playground examples should use new platform-webworker packages
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'import {WorkerAppModule} from ''@angular/platform-browser''

        '
    - pattern: 'import {platformWorkerAppDynamic} from ''@angular/platform-browser-dynamic''

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '**/playground/**/background_index.ts'
- id: webworker-tests-in-platform-browser
  message: Web worker tests should be moved to platform-webworker package
