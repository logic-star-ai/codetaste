rules:
- id: polars-export-re-export-pattern
  message: Remove re-export of 'polars_core::export::$MOD'. Dependencies should be
    explicit in each crate.
  severity: WARNING
  languages:
  - rust
  pattern: pub use polars_core::export::$MOD
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 79
- id: polars-export-pub-use-nested
  message: Remove re-export of 'polars_core::export::$MOD::$ITEM'. Import from '$MOD::$ITEM'
    directly.
  severity: WARNING
  languages:
  - rust
  pattern: pub use polars_core::export::$MOD::$ITEM
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 70
- id: polars-export-qualified-generic
  message: Use direct dependency imports instead of 'polars_core::export'. Add explicit
    dependencies to Cargo.toml.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bpolars_core::export::[a-zA-Z_][a-zA-Z0-9_]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: polars-export-qualified-short-path
  message: Use direct dependency imports instead of 'polars_core::export'. Add explicit
    dependencies to Cargo.toml.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bpolars_core::export::[a-z_]+\b
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: polars-export-any-import-variation
  message: Import dependencies directly instead of using 'polars_core::export'. Add
    explicit dependencies to Cargo.toml.
  severity: WARNING
  languages:
  - rust
  pattern-regex: '(?:use|pub\s+use)\s+.*polars_core::export::'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
- id: polars-export-from-polars-crate
  message: The 'polars::export' module has been removed. Import dependencies directly
    and add them to Cargo.toml.
  severity: WARNING
  languages:
  - rust
  pattern: use polars::export
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: polars-export-from-polars-crate-nested
  message: The 'polars::export' module has been removed. Import dependencies directly
    and add them to Cargo.toml.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use polars::export::$ITEM
  - metavariable-regex:
      metavariable: $ITEM
      regex: .+
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: polars-export-num-import
  message: Use 'num_traits' directly instead of 'polars_core::export::num'. Add num-traits
