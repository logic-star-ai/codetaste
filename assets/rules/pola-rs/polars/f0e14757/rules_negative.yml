rules:
- id: detect-file-options-row-index-access
  message: Accessing file_options.row_index. Verify this is on UnifiedScanArgs, not
    FileScanOptions.
  severity: INFO
  languages:
  - rust
  pattern: 'file_options.row_index

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: detect-file-options-pre-slice-access
  message: Accessing file_options.pre_slice. Verify this uses Option<Slice>, not Option<(i64,
    usize)>.
  severity: INFO
  languages:
  - rust
  pattern: 'file_options.pre_slice

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-file-options-hive-options-access
