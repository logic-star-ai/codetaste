  - rust
  pattern: 'file_options.include_file_paths

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-filescanopt-pattern-match
  message: Function parameter uses &FileScanOptions. Should use &UnifiedScanArgs.
  severity: WARNING
  languages:
  - rust
  pattern: "fn $FUNC(..., file_options: &FileScanOptions, ...) -> $RET {\n    $...BODY\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-filescanopt-regex-ref-type
  message: Reference type '&FileScanOptions' found. Should use '&UnifiedScanArgs'.
  severity: WARNING
  languages:
  - rust
  pattern-regex: '&\s*FileScanOptions\b'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-filescanopt-regex-arrow-type
  message: Parameter type '&FileScanOptions' found. Should use '&UnifiedScanArgs'.
  severity: WARNING
  languages:
  - rust
  pattern-regex: :\s*&FileScanOptions\b
