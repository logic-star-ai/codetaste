    not FileScanOptions.
  severity: INFO
  languages:
  - rust
  pattern: 'file_options.hive_options

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-dsl-filescanopt
  message: DSL module references 'FileScanOptions'. Should use 'UnifiedScanArgs'.
  severity: WARNING
  languages:
  - rust
  pattern-regex: FileScanOptions
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*/polars-plan/src/dsl/*'
