  languages:
  - rust
  pattern-regex: '#\[cfg\(not\(target_family\s*=\s*"wasm"\)\)\]\s*pub\s+use\s+::\{[^}]*(anyhow|nix|lazy_static|regex|vte|signal_hook|interprocess|async_std|libc|termwiz|uuid|clap|humantime|isahc|miette|notify_debouncer_full|tempfile|url|async_channel)[^}]*\};'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - zellij-utils/src/lib.rs
