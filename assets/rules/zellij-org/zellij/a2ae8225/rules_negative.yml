rules:
- id: remove-notify-debouncer-full-reexport-imports
  message: Replace 'use zellij_utils::notify_debouncer_full' with direct 'use notify_debouncer_full'.
    Add notify-debouncer-full to the crate's Cargo.toml.
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: use zellij_utils::notify_debouncer_full;
  - pattern: use zellij_utils::notify_debouncer_full::$ITEM;
  - pattern: use zellij_utils::notify_debouncer_full::{$...ITEMS};
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: remove-vte-reexport-imports
