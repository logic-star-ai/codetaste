- id: detect-mixed-utils-foreign-import-pattern1
  message: Foreign crate imports through zellij_utils detected. Import external crates
    directly and add them to Cargo.toml.
  severity: WARNING
  languages:
  - rust
  pattern-regex: use\s+zellij_utils::\{[^}]*(anyhow|nix|lazy_static|regex|vte|signal_hook|interprocess|async_std|libc|termwiz|uuid|async_channel|prost|isahc|notify_debouncer_full)[^}]*\};
