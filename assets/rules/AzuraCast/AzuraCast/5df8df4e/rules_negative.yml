rules:
- id: vuelidate-v-dollar-value-ref
  message: Reference to 'v$.value' detected. Replace 'v$' with 'r$' for Regle migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: v\$\.value
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: vuelidate-nested-field-validation
  message: Nested field validation 'v$.field.subfield' detected. Replace 'v$' with
    'r$' for Regle migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: v\$\.[a-zA-Z_][a-zA-Z0-9_]*\.[a-zA-Z_$]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: vuelidate-package-reference
  message: Reference to 'vuelidate' detected. Ensure all Vuelidate references are
    migrated to Regle.
  severity: INFO
  languages:
  - typescript
  - javascript
  - vue
  - json
  pattern-regex: vuelidate
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: vuelidate-import-from-core
  message: Reference to '@vuelidate/core' package detected. Replace with '@regle/core'
    for Regle migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: '@vuelidate/core'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: vuelidate-type-validation-interface
  message: Type reference to Vuelidate validation detected. Update to use Regle types.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: Validation.*vuelidate
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: vuelidate-const-v-dollar-equals
  message: Constant declaration 'const v$ =' detected. Replace 'v$' with 'r$' for
    Regle migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: const\s+v\$\s*=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: vuelidate-import-use-vuelidate
  message: Import of 'useVuelidate' detected. Replace with 'useRegle' from @regle/core
    or 'useAppRegle' from app utilities.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: import.*useVuelidate.*from
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: vuelidate-function-call-use-vuelidate
  message: Call to 'useVuelidate' detected. Replace with 'useRegle' or 'useAppRegle'
    for Regle migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: useVuelidate\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: vuelidate-space-v-dollar-space
  message: Reference to 'v$' in expression detected. Replace 'v$' with 'r$' for Regle
    migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: \s+v\$\s+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
