rules:
- id: detect-version-constraint-in-setup-cfg
  message: Dependency version constraint in setup.cfg. Migrate to pyproject.toml dependencies
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s+[\w\-]+[><=!].*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 62
  paths:
    include:
    - setup.cfg
- id: detect-comment-in-setup-cfg-extras
  message: Comment found in setup.cfg. Comments are supported in TOML format in pyproject.toml
  severity: INFO
  languages:
  - generic
  pattern-regex: ^\s+#.*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - setup.cfg
- id: detect-setup-cfg-ini-syntax
  message: INI-style section headers in setup.cfg. All configuration should be in
    TOML format in pyproject.toml
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^\[.*\]$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - setup.cfg
- id: detect-setup-cfg-reference-in-dockerfile
  message: Reference to setup.cfg found in Dockerfile. Update to reference pyproject.toml
    instead
  severity: WARNING
  languages:
  - generic
  pattern-regex: .*setup\.cfg.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - Dockerfile
    - Dockerfile.*
    - '*.dockerfile'
- id: detect-setup-py-reference-in-dockerfile
  message: Reference to setup.py found in Dockerfile. Update to use modern build tools
  severity: WARNING
  languages:
  - generic
  pattern-regex: .*setup\.py.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - Dockerfile
    - Dockerfile.*
    - '*.dockerfile'
- id: detect-old-extras-syntax-generic
  message: Old extras interpolation syntax '%(...)s' found. Use recursive package
    references
  severity: ERROR
  languages:
  - generic
  pattern-regex: .*%\([a-zA-Z0-9_-]+\)s.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - setup.cfg
    - setup.py
- id: detect-add-setup-cfg-in-dockerfile
  message: Dockerfile ADD command includes setup.cfg. Update to include pyproject.toml
    only
  severity: ERROR
  languages:
  - generic
  pattern-regex: .*ADD.*setup\.cfg.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - Dockerfile
    - Dockerfile.*
    - '*.dockerfile'
- id: detect-add-setup-py-in-dockerfile
  message: Dockerfile ADD command includes setup.py. Update to include pyproject.toml
    only
  severity: ERROR
  languages:
  - generic
  pattern-regex: .*ADD.*setup\.py.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - Dockerfile
    - Dockerfile.*
    - '*.dockerfile'
- id: detect-bin-localstack-in-scripts
  message: Script paths in setup.cfg scripts field. Migrate to [project.scripts] in
    pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*bin/localstack.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - setup.cfg
- id: detect-topic-classifier-setup-cfg
  message: Topic classifier in setup.cfg. Migrate classifiers to [project.classifiers]
    in pyproject.toml
  severity: INFO
  languages:
  - generic
  pattern-regex: .*Topic ::.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - setup.cfg
- id: detect-setup-cfg-reference-in-makefile
  message: Reference to setup.cfg found in Makefile. Update to reference pyproject.toml
    instead
  severity: WARNING
  languages:
  - generic
  pattern-regex: .*setup\.cfg.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - Makefile
    - '*.mk'
    - makefile
- id: detect-setup-py-reference-in-makefile
  message: Reference to setup.py found in Makefile. Update to use modern build tools
  severity: WARNING
  languages:
  - generic
  pattern-regex: .*setup\.py.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - Makefile
    - '*.mk'
    - makefile
- id: detect-author-in-setup-cfg
  message: author metadata found in setup.cfg. Migrate to [project.authors] in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*author(_email)?\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - setup.cfg
- id: detect-setup-cfg-in-dockerfile-s3
  message: Dockerfile.s3 references setup.cfg. Update to reference pyproject.toml
    instead
  severity: WARNING
  languages:
  - generic
  pattern-regex: .*setup\.cfg.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - Dockerfile.s3
- id: detect-setup-py-in-dockerfile-s3
  message: Dockerfile.s3 references setup.py. Update to use modern build tools
  severity: WARNING
  languages:
  - generic
  pattern-regex: .*setup\.py.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - Dockerfile.s3
- id: detect-apache-license-setup-cfg
  message: License information in setup.cfg. Migrate to [project.license] in pyproject.toml
  severity: INFO
  languages:
  - generic
  pattern-regex: .*Apache.*License.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - setup.cfg
- id: detect-localstack-in-package-name-setup-cfg
  message: localstack package reference in setup.cfg. Update dependency references
    for pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s+localstack[\w-]*[><=!].*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - setup.cfg
- id: detect-dnspython-dependency-in-setup-cfg
  message: dnspython dependency in setup.cfg. Migrate to [project.dependencies] in
    pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s+dnspython[><=!].*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - setup.cfg
- id: detect-pyopenssl-dependency-in-setup-cfg
  message: pyopenssl dependency in setup.cfg. Migrate to [project.optional-dependencies]
    in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s+pyopenssl[><=!].*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - setup.cfg
- id: detect-jsonpath-dependency-in-setup-cfg
  message: jsonpath library dependency in setup.cfg. Migrate to [project.optional-dependencies]
    in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s+jsonpath-(ng|rw)[><=!].*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - setup.cfg
- id: detect-tests-exclude-in-setup-cfg
  message: tests directory exclusion in setup.cfg. Migrate to [tool.setuptools.packages.find.exclude]
    in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s+tests(\.\*)?\s*$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - setup.cfg
- id: detect-setup-cfg-file-exists
  message: setup.cfg file still exists. It should be removed and migrated to pyproject.toml
  severity: ERROR
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-old-build-command-sdist
  message: Old build command 'setup.py sdist/bdist_wheel' found. Use 'python -m build'
    instead
  severity: ERROR
  languages:
  - generic
  pattern-regex: .*setup\.py\s+(sdist|bdist_wheel).*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-python-setup-py-command
  message: Direct invocation of setup.py found. Use 'python -m build' or pip install
    instead
  severity: WARNING
  languages:
  - generic
  pattern-regex: .*python\s+setup\.py.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-old-extras-syntax-base-runtime
  message: Old extras syntax '%(base-runtime)s' found. Use recursive package references
    like 'localstack-ext[base-runtime]'
  severity: ERROR
  languages:
  - generic
  pattern-regex: .*%\(base-runtime\)s.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
    - setup.py
- id: detect-old-extras-syntax-runtime
  message: Old extras syntax '%(runtime)s' found. Use recursive package references
    like 'localstack-ext[runtime]'
  severity: ERROR
  languages:
  - generic
  pattern-regex: .*%\(runtime\)s.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
    - setup.py
- id: detect-old-extras-syntax-test
  message: Old extras syntax '%(test)s' found. Use recursive package references
  severity: ERROR
  languages:
  - generic
  pattern-regex: .*%\(test\)s.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
    - setup.py
- id: detect-old-extras-syntax-dev
  message: Old extras syntax '%(dev)s' found. Use recursive package references
  severity: ERROR
  languages:
  - generic
  pattern-regex: .*%\(dev\)s.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
    - setup.py
- id: detect-setup-py-import-in-python
  message: setup.py file imports setuptools/distutils. Migrate to pyproject.toml
  severity: ERROR
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from setuptools import setup
    - pattern: import setuptools
    - pattern: from distutils.core import setup
    - pattern: import distutils.core
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.py
- id: detect-setup-function-call
  message: setup() function call found. This indicates setup.py is still being used.
    Migrate to pyproject.toml
  severity: ERROR
  languages:
  - python
  pattern: setup(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.py
- id: detect-metadata-section-in-setup-cfg
  message: '[metadata] section found in setup.cfg. Migrate metadata to [project] section
    in pyproject.toml'
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^\[metadata\]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-options-section-in-setup-cfg
  message: '[options] section found in setup.cfg. Migrate options to [project] and
    [tool.*] sections in pyproject.toml'
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^\[options\]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-extras-require-section
  message: '[options.extras_require] section found. Migrate to [project.optional-dependencies]
    in pyproject.toml'
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^\[options\.extras_require\]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-packages-find-section
  message: '[options.packages.find] section found. Configure package discovery in
    pyproject.toml'
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^\[options\.packages\.find\]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-setup-cfg-attr-version
  message: Dynamic version using 'attr:' found in setup.cfg. Use [tool.setuptools.dynamic]
    in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: version\s*=\s*attr:\s*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-install-requires-in-setup-cfg
  message: install_requires found in setup.cfg. Migrate to [project.dependencies]
    in pyproject.toml
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^\s*install_requires\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-python-requires-in-setup-cfg
  message: python_requires found in setup.cfg. Migrate to [project] requires-python
    in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*python_requires\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-twine-with-setup-py-build
  message: Twine command used with setup.py. Use 'python -m build' before twine upload
  severity: ERROR
  languages:
  - generic
  pattern-regex: .*twine.*setup\.py.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-setuptools-install-in-python
  message: Direct setuptools.setup() call found. Migrate configuration to pyproject.toml
  severity: ERROR
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: setuptools.setup(...)
    - pattern: setup.setup(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-package-data-in-setup-cfg
  message: '[options.package_data] section found. Migrate to [tool.setuptools.package-data]
    in pyproject.toml'
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^\[options\.package_data\]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-scripts-in-setup-cfg
  message: scripts field found in setup.cfg. Migrate to [project.scripts] in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*scripts\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-zip-safe-in-setup-cfg
  message: zip_safe option found in setup.cfg. Migrate to [tool.setuptools] in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*zip_safe\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-test-suite-in-setup-cfg
  message: test_suite option found in setup.cfg. Modern projects use pytest configuration
    in pyproject.toml
  severity: INFO
  languages:
  - generic
  pattern-regex: ^\s*test_suite\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-classifiers-in-setup-cfg
  message: classifiers found in setup.cfg. Migrate to [project.classifiers] in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*classifiers\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-description-in-setup-cfg
  message: description field found in setup.cfg. Migrate to [project.description]
    in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*description\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-url-in-setup-cfg
  message: url field found in setup.cfg. Migrate to [project.urls] in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*url\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-license-in-setup-cfg
  message: license field found in setup.cfg. Migrate to [project.license] in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*license\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-name-in-setup-cfg
  message: name field found in setup.cfg. Migrate to [project.name] in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*name\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-packages-find-in-setup-cfg
  message: 'packages=find: found in setup.cfg. Configure in [tool.setuptools.packages.find]
    in pyproject.toml'
  severity: WARNING
  languages:
  - generic
  pattern-regex: '^\s*packages\s*=\s*find:'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-base-runtime-extra-section
  message: base-runtime extra section found in setup.cfg. Migrate to [project.optional-dependencies]
    in pyproject.toml
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^base-runtime\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-runtime-extra-section
  message: runtime extra section found in setup.cfg. Migrate to [project.optional-dependencies]
    in pyproject.toml
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^runtime\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-test-extra-section
  message: test extra section found in setup.cfg. Migrate to [project.optional-dependencies]
    in pyproject.toml
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^test\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-dev-extra-section
  message: dev extra section found in setup.cfg. Migrate to [project.optional-dependencies]
    in pyproject.toml
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^dev\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-typehint-extra-section
  message: typehint extra section found in setup.cfg. Migrate to [project.optional-dependencies]
    in pyproject.toml
  severity: ERROR
  languages:
  - generic
  pattern-regex: ^typehint\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-venv-activate-depends-on-setup-files
  message: Virtual environment target depends on setup.py or setup.cfg. Update to
    depend on pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: .*\$\(VENV_ACTIVATE\).*:.*setup\.(py|cfg).*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - Makefile
    - '*.mk'
- id: detect-exclude-in-packages-find
  message: exclude option in [options.packages.find]. Migrate to [tool.setuptools.packages.find]
    in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*exclude\s*=
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-pkginfo-setup
  message: setuptools import outside tests. After migration, direct setuptools usage
    should be minimal
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from setuptools import $X
    - pattern: import setuptools
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - '**/tests/**'
    - '**/test_*.py'
- id: detect-attrs-version-in-setup-cfg
  message: 'Dynamic version with attr: syntax. Use [tool.setuptools.dynamic] version
    in pyproject.toml'
  severity: WARNING
  languages:
  - generic
  pattern-regex: .*attr:\s*\w+\.__version__
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-find-colon-syntax
  message: 'packages=find: syntax in setup.cfg. Configure package discovery in pyproject.toml'
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*packages\s*=\s*find:\s*$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-wildcard-package-data
  message: Wildcard package data configuration. Migrate to [tool.setuptools.package-data]
    in pyproject.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\*\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.cfg
- id: detect-dependency-with-brackets-in-setup-cfg
  message: Dependency with extras (brackets) in setup.cfg. Migrate to [project.dependencies]
    or [project.optional-dependencies] in pyproject.toml
  severity: WARNING
  languages:
  - generic
