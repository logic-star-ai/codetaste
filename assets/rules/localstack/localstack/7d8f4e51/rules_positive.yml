- id: dockerfile-no-setup-cfg-reference
  message: Verified Dockerfile no longer references setup.cfg
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*setup\.cfg)[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - Dockerfile
