rules:
- id: pyproject-toml-has-project-section
  message: Detected [project] section in pyproject.toml indicating successful metadata
    migration
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*\[project\]
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: pyproject-toml-has-project-name
  message: Detected project name defined in pyproject.toml [project] section
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*\[project\][\s\S]*name\s*=\s*"localstack-core"
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: pyproject-toml-has-project-dependencies
  message: Detected dependencies defined in pyproject.toml [project] section
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*\[project\][\s\S]*dependencies\s*=
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
