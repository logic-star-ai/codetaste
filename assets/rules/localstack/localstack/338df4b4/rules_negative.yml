    - tests/**
- id: lambda-v1-legacy-import-from-aws-models-lambda-specific
  message: Import of Lambda-specific AWS models from old location detected. After
    refactoring, these should be imported from localstack.services.lambda_.legacy.aws_models
    instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from localstack.utils.aws.aws_models import $IMPORT
  - metavariable-pattern:
      metavariable: $IMPORT
      patterns:
      - pattern-either:
        - pattern: LambdaFunction
        - pattern: LambdaEventSourceMapping
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
