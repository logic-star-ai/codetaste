rules:
- id: lambda-v1-legacy-reference-lambda-api-module-direct
  message: Direct reference to lambda_api module detected. After refactoring, this
    should reference localstack.services.lambda_.legacy.lambda_api instead.
  severity: WARNING
  languages:
  - python
  pattern: localstack.services.lambda_.lambda_api.$ATTR
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 117
- id: lambda-v1-legacy-reference-lambda-executors-module-direct
  message: Direct reference to lambda_executors module detected. After refactoring,
    this should reference localstack.services.lambda_.legacy.lambda_executors instead.
  severity: WARNING
  languages:
  - python
  pattern: localstack.services.lambda_.lambda_executors.$ATTR
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: lambda-v1-legacy-import-lambda-api-module
  message: Import of old lambda_api module detected. After refactoring, this should
    import from localstack.services.lambda_.legacy.lambda_api instead.
  severity: WARNING
  languages:
  - python
  pattern: import localstack.services.lambda_.lambda_api
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: lambda-v1-legacy-import-lambda-api-direct
  message: Import from old lambda_api location detected. After refactoring, this should
    import from localstack.services.lambda_.legacy.lambda_api instead.
  severity: WARNING
  languages:
  - python
  pattern: from localstack.services.lambda_.lambda_api import $IMPORT
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: lambda-v1-legacy-import-lambda-runtime-constants
  message: Import of Lambda runtime constant from lambda_utils detected. After refactoring,
    deprecated runtime constants should be replaced with proper runtime identifiers
    from the API models.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from localstack.services.lambda_.lambda_utils import $RUNTIME
  - metavariable-regex:
      metavariable: $RUNTIME
      regex: ^LAMBDA_RUNTIME_
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: lambda-v1-legacy-import-lambda-runtime-python39
  message: Import of LAMBDA_RUNTIME_PYTHON39 from lambda_utils detected. After refactoring,
    this deprecated runtime constant should be replaced with proper API runtime identifiers.
  severity: WARNING
  languages:
  - python
  pattern: from localstack.services.lambda_.lambda_utils import LAMBDA_RUNTIME_PYTHON39
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: lambda-v1-legacy-import-lambda-executors-module
  message: Import of old lambda_executors module detected. After refactoring, this
    should import from localstack.services.lambda_.legacy.lambda_executors instead.
  severity: WARNING
  languages:
  - python
  pattern: import localstack.services.lambda_.lambda_executors
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
