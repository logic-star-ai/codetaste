  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: "namespace hex {\n  ...\n  EVENT_DEF($EVENT, ...);\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $EVENT
