rules:
- id: detect-event-definition-without-category-comment
  message: Event definitions in monolithic file lack category organization - split
    into categorized files with proper documentation
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^\s*EVENT_DEF
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 69
  paths:
    include:
    - '**/event_manager.hpp'
- id: detect-all-event-def-in-single-file
  message: Event definitions should be split into categorized files under hex/api/events/
    directory, not kept in monolithic event_manager.hpp
  severity: ERROR
  languages:
  - cpp
  pattern-regex: ^\s*EVENT_DEF(_NO_LOG)?\s*\(\s*Event
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
  paths:
    include:
    - '**/api/event_manager.hpp'
    exclude:
    - '**/api/events/*.hpp'
- id: detect-namespace-hex-with-many-events
  message: Multiple EVENT_DEF declarations in single namespace - should be split across
    categorized files
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern-inside: "namespace hex {\n  ...\n}\n"
  - pattern: EVENT_DEF($NAME, ...);
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
  paths:
    include:
    - '**/event_manager.hpp'
- id: detect-all-request-def-in-single-file
  message: Request definitions should be split into categorized files under hex/api/events/
    directory, not kept in monolithic event_manager.hpp
  severity: ERROR
  languages:
  - cpp
  pattern-regex: ^\s*EVENT_DEF(_NO_LOG)?\s*\(\s*Request
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
  paths:
    include:
    - '**/api/event_manager.hpp'
    exclude:
    - '**/api/events/*.hpp'
- id: detect-event-manager-in-plugin-code
  message: Plugin files should include only the specific event categories they need,
    not the monolithic event_manager.hpp
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: '#include <hex/api/event_manager.hpp>'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - '**/plugins/**/*.cpp'
    - '**/plugins/**/*.hpp'
- id: detect-multiple-provider-events-together
  message: Provider-related events should be consolidated in events_provider.hpp
  severity: ERROR
  languages:
  - cpp
  pattern-regex: EventProvider(Created|Opened|Closed|Changed|Closing|Deleted|Saved|DataModified|DataInserted|DataRemoved|Dirtied)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - '**/event_manager.hpp'
    exclude:
    - '**/events/events_provider.hpp'
- id: detect-event-manager-in-builtin-plugin
  message: Builtin plugin files should use specific event category includes instead
    of monolithic event_manager.hpp
  severity: WARNING
  languages:
  - cpp
  pattern: '#include <hex/api/event_manager.hpp>'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '**/plugins/builtin/**/*.cpp'
- id: detect-multiple-gui-events-together
  message: GUI-related events should be consolidated in events_gui.hpp
  severity: ERROR
  languages:
  - cpp
  pattern-regex: Event(Window(Closing|Initialized|Deinitializing|Focused)|Frame(Begin|End)|DPIChanged|ViewOpened|ImGuiElementRendered|SetTaskBarIconState|Achievement)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '**/event_manager.hpp'
    exclude:
    - '**/events/events_gui.hpp'
- id: detect-multiple-interaction-events-together
  message: Interaction-related events should be consolidated in events_interaction.hpp
  severity: ERROR
  languages:
  - cpp
  pattern-regex: Event(RegionSelected|File(Dropped|Dragged|Loaded)|Highlighting|Bookmark|Pattern(Evaluating|Executed|EditorChanged)|PatchCreated|SearchBoxClicked)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '**/event_manager.hpp'
    exclude:
    - '**/events/events_interaction.hpp'
- id: detect-multiple-lifecycle-events-together
  message: Lifecycle-related events should be consolidated in events_lifecycle.hpp
  severity: ERROR
  languages:
  - cpp
  pattern-regex: Event(ImHex(StartupFinished|Closing|Updated)|FirstLaunch|CrashRecovered|ProjectOpened|AbnormalTermination|StoreContent)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/event_manager.hpp'
    exclude:
    - '**/events/events_lifecycle.hpp'
- id: detect-multiple-interaction-requests-together
  message: Interaction-related requests should be consolidated in requests_interaction.hpp
  severity: ERROR
  languages:
  - cpp
  pattern-regex: Request(HexEditorSelectionChange|PatternEditorSelectionChange|JumpToPattern|(Add|Remove)Bookmark|SetPatternLanguageCode|LoadPatternLanguageFile|SavePatternLanguageFile|OpenFile)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/event_manager.hpp'
    exclude:
    - '**/events/requests_interaction.hpp'
- id: detect-event-manager-in-main-cpp
  message: Main application files should use specific event category includes instead
    of monolithic event_manager.hpp
  severity: WARNING
  languages:
  - cpp
  pattern: '#include <hex/api/event_manager.hpp>'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '**/main/**/*.cpp'
- id: detect-event-manager-include-in-provider
  message: Provider files should use events_provider.hpp and requests_provider.hpp
    instead of monolithic event_manager.hpp
  severity: WARNING
  languages:
  - cpp
  patterns:
