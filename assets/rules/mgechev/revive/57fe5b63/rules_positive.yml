  - go
  patterns:
  - pattern-regex: \blint\.FailureCategory
  - pattern-not-regex: \blint\.FailureCategory\s+string
  metadata:
    category: dependency
    nr_refactored_patterns: 100
    nr_legacy_patterns: 0
  paths:
    include:
    - rule/
