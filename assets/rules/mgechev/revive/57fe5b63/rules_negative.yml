rules:
- id: revive-category-field-in-struct-literal-generic
  message: Replace raw category string with corresponding FailureCategory typed constant
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'Category: $STR

      '
  - metavariable-regex:
      metavariable: $STR
      regex: ^"(style|naming|logic|bad practice|comments|errors|imports|maintenance|complexity|code-style|optimization|time|type-inference|unary-op|content|arg-order|unexported-type-in-api|zero-value)"$
  - pattern-inside: 'lint.Failure{...}

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 85
  paths:
    exclude:
    - testdata/
- id: revive-failure-with-category-first-exclude-tests
  message: Use FailureCategory typed constant for Category field
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'lint.Failure{Category: $CAT, ...}

      '
  - metavariable-regex:
      metavariable: $CAT
      regex: ^"[a-z -]+"$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 85
  paths:
    exclude:
    - testdata/
    - '**/*_test.go'
- id: revive-failure-with-specific-cat-patterns-1
  message: Use FailureCategory typed constant for Category field
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
