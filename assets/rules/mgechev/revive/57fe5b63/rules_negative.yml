        '
    - pattern: 'lint.Failure{Node: $N, Confidence: $C, Category: $CAT, Failure: $M}

        '
    - pattern: 'lint.Failure{Failure: $M, Category: $CAT, Node: $N, Confidence: $C}

        '
  - metavariable-regex:
      metavariable: $CAT
      regex: ^"[a-z -]+"$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
  paths:
    exclude:
    - testdata/
