  severity: WARNING
  languages:
  - c
  pattern-regex: \bBT_AUDIO_CODEC_QOS_UNFRAMED\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
