rules:
- id: detect-bt-audio-codec-qos-macro-concat
  message: Macro starting with 'BT_AUDIO_CODEC_QOS_' should use 'BT_BAP_QOS_CFG_'
    prefix
  severity: WARNING
  languages:
  - c
  pattern-regex: BT_AUDIO_CODEC_QOS_[A-Z_]*\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 111
- id: detect-bt-audio-codec-qos-identifier
  message: Identifier 'bt_audio_codec_qos' should be renamed to 'bt_bap_qos_cfg'
  severity: WARNING
  languages:
  - c
  pattern-regex: \bbt_audio_codec_qos\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 78
