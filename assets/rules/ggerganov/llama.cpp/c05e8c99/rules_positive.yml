rules:
- id: detect-any-vocab-function-regex
  message: 'Refactoring detected: any llama_vocab_* function call'
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern-regex: llama_vocab_(bos|eos|eot|cls|sep|nl|pad|n_tokens|is_eog|is_control|get_add_bos|get_add_eos|get_text|get_score|get_attr|fim_pre|fim_suf|fim_mid|fim_pad|fim_rep|fim_sep)\s*\(
  metadata:
    nr_refactored_patterns: 218
    nr_legacy_patterns: 0
- id: detect-new-api-anywhere
  message: 'Refactoring detected: new API usage anywhere in codebase'
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern-regex: \b(llama_vocab_bos|llama_vocab_eos|llama_vocab_n_tokens|llama_model_get_vocab|llama_init_from_model|llama_model_n_ctx_train|llama_model_n_embd)\s*\(
  metadata:
    nr_refactored_patterns: 183
    nr_legacy_patterns: 0
- id: detect-llama-model-get-vocab-call
  message: 'Refactoring detected: call to new llama_model_get_vocab accessor'
  severity: INFO
  languages:
  - c
  - cpp
  pattern: llama_model_get_vocab($MODEL)
  metadata:
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
- id: detect-any-model-n-function-regex
  message: 'Refactoring detected: any llama_model_n_* function call'
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern-regex: llama_model_n_(ctx_train|embd|layer|head|vocab)\s*\(
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: detect-llama-vocab-function-in-if-condition
  message: 'Refactoring detected: llama_vocab_* function call in if condition'
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: 'if ($COND) { ... }

      '
  - metavariable-pattern:
      metavariable: $COND
      patterns:
      - pattern-either:
        - pattern: llama_vocab_bos($VOCAB)
        - pattern: llama_vocab_eos($VOCAB)
        - pattern: llama_vocab_get_add_bos($VOCAB)
        - pattern: llama_vocab_get_add_eos($VOCAB)
        - pattern: llama_vocab_is_eog($VOCAB, ...)
        - pattern: llama_vocab_is_control($VOCAB, ...)
  metadata:
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
