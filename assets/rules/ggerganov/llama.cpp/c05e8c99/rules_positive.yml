rules:
- id: vocab-param-passed-to-function
  message: Detected vocab parameter passed to another function
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: '$VOCAB = llama_model_get_vocab(...);

      ...

      $FUNC(..., $VOCAB, ...);

      '
  metadata:
    nr_refactored_patterns: 113
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: model-get-vocab-in-function-call
  message: Detected llama_model_get_vocab passed directly to function
  severity: INFO
  languages:
  - c
  - cpp
  pattern: $FUNC(..., llama_model_get_vocab(...), ...)
  metadata:
    nr_refactored_patterns: 98
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
