rules:
- id: detect-0370-version-reference
  message: 'Refactoring needed: Version 0.37.0 reference should be removed or updated
    after deprecations are applied'
  severity: WARNING
  languages:
  - python
  pattern-regex: 0\.37\.0
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - sktime/detection/base/_base.py
    - sktime/forecasting/compose/_hierarchy_ensemble.py
- id: detect-fitted-list-property-call
  message: 'Refactoring needed: Usage of fitted_list property should be changed to
    fitted_list_ attribute or get_fitted_params()'
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.fitted_list
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-annotation-module-files
  message: 'Refactoring needed: Files in deprecated ''annotation'' module should be
    removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - sktime/annotation/*.py
- id: detect-fitted-list-in-test
  message: 'Refactoring needed: Test accessing fitted_list should use fitted_list_
    instead'
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.fitted_list
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/test_hierarchy_ensemble.py'
- id: detect-fitted-list-test-reference
  message: 'Refactoring needed: Test reference to fitted_list (without underscore)
    should use fitted_list_ instead'
  severity: WARNING
  languages:
  - python
  pattern-regex: fitted_list(?!_)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/test_*.py'
    - '**/*_test.py'
- id: detect-baseseriesannotator-string-reference
  message: 'Refactoring needed: String reference to BaseSeriesAnnotator should be
    removed or changed to BaseDetector'
  severity: WARNING
  languages:
  - python
  pattern-regex: BaseSeriesAnnotator
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-Y-in-warning-string
  message: 'Refactoring needed: Warning message text about the Y parameter should
    be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: the Y parameter
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-annotation-module-all-files
  message: 'Refactoring needed: __init__.py files in annotation module should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - sktime/annotation/**/__init__.py
- id: detect-annotation-hmm-learn-files
  message: 'Refactoring needed: Files in deprecated ''annotation/hmm_learn'' subdirectory
    should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - sktime/annotation/hmm_learn/*.py
- id: detect-Y-in-basedetector-file
  message: 'Refactoring needed: Y parameter default in BaseDetector file should be
    removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: ',\s*Y\s*=\s*None'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - sktime/detection/base/_base.py
- id: detect-use-y-instead-of-Y-message
  message: 'Refactoring needed: Message about using y instead of Y should be removed
    after Y parameter removal'
  severity: WARNING
  languages:
  - python
  pattern-regex: use.*y.*instead|replace.*with.*y
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - sktime/detection/base/_base.py
- id: detect-Y-not-none-check
  message: 'Refactoring needed: Check for Y is not None should be removed along with
    Y parameter'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: Y is not None
  - pattern-inside: "def $FUNC(..., Y=None, ...):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-Y-warning-will-be-removed
  message: 'Refactoring needed: Message about removal in 0.37.0 should be removed
    after deprecation is applied'
  severity: WARNING
  languages:
  - python
  pattern-regex: will be removed in the 0\.37\.0
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - sktime/detection/**/*.py
- id: detect-Y-parameter-argument-in-signature
  message: 'Refactoring needed: Method with both y and Y parameters should have Y
    removed'
  severity: WARNING
  languages:
  - python
  pattern: "def $FUNC(self, X, y=None, Y=None, $...ARGS):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-sktime-annotation-submodule-import
  message: 'Refactoring needed: Import from deprecated ''sktime.annotation.$SUBMODULE''
    should be changed to ''sktime.detection.$SUBMODULE'''
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from sktime.annotation.$SUBMODULE import $...IMPORTS
    - pattern: import sktime.annotation.$SUBMODULE
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-baseseriesannotator-in-all-export
  message: 'Refactoring needed: BaseSeriesAnnotator should be removed from __all__
    exports'
  severity: WARNING
  languages:
  - python
  pattern: __all__ = [..., "BaseSeriesAnnotator", ...]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-baseseriesannotator-all-list
  message: 'Refactoring needed: BaseSeriesAnnotator should be removed from __all__
    list'
  severity: WARNING
  languages:
  - python
  pattern-regex: __all__\s*=\s*\[.*BaseSeriesAnnotator.*\]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-todo-comment-remove-Y
  message: 'Refactoring needed: TODO comment about removing Y parameter at 0.37.0
    should be actioned'
  severity: WARNING
  languages:
  - python
  pattern-regex: todo.*0\.37\.0.*remove.*Y
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-detection-annotation-comment
  message: 'Refactoring needed: Comment referencing detection/annotation algorithms
    should be simplified to detection'
  severity: WARNING
  languages:
  - python
  pattern-regex: detection/annotation.*algorithm
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-until-0370-release
  message: 'Refactoring needed: Message about behavior until 0.37.0 release should
    be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: Until the 0\.37\.0 release
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-users-should-use-y-parameter
  message: 'Refactoring needed: Message instructing users to use y parameter should
    be removed after Y removal'
  severity: WARNING
  languages:
  - python
  pattern-regex: Users should use the y parameter
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-ensuring-backwards-compatibility
  message: 'Refactoring needed: Message about ensuring backwards compatibility for
    Y parameter should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: ensuring backwards compatibility
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - sktime/detection/base/_base.py
- id: detect-todo-remove-Y-parameter-handling
  message: 'Refactoring needed: TODO about removing Y parameter handling should be
    completed'
  severity: WARNING
  languages:
  - python
  pattern-regex: todo.*0\.37\.0.*Y.*handling|todo.*0\.37\.0.*remove.*Y
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-annotation-algorithms-warning
  message: 'Refactoring needed: Reference to detection/annotation algorithms should
    be simplified to detection'
  severity: WARNING
  languages:
  - python
  pattern-regex: detection/annotation algorithms
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-sktime-annotation-import
  message: 'Refactoring needed: Import of deprecated ''sktime.annotation'' module
    should be changed to ''sktime.detection'''
  severity: WARNING
  languages:
  - python
  pattern: import sktime.annotation
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-annotation-plotting-files
  message: 'Refactoring needed: Files in deprecated ''annotation/plotting'' subdirectory
    should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - sktime/annotation/plotting/*.py
- id: detect-Y-parameter-check-not-none
  message: 'Refactoring needed: Y parameter handling code should be removed'
  severity: WARNING
  languages:
  - python
  pattern: "if Y is not None:\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-if-method-has-arg-Y-branch
  message: 'Refactoring needed: elif branch checking for uppercase Y parameter should
    be removed'
  severity: WARNING
  languages:
  - python
  pattern: "if _method_has_arg($OBJ, \"y\"):\n    ...\nelif _method_has_arg($OBJ,\
    \ \"Y\"):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-Y-parameter-if-not-none-warn
  message: 'Refactoring needed: Conditional Y parameter warning should be removed'
  severity: WARNING
  languages:
  - python
  pattern: "if Y is not None:\n    warn(...)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-y-equals-Y-fallback
  message: 'Refactoring needed: Assignment y = Y for backwards compatibility should
    be removed'
  severity: WARNING
  languages:
  - python
  pattern: 'y = Y

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-Y-parameter-if-check-warn
  message: 'Refactoring needed: Y parameter check with warning should be removed'
  severity: WARNING
  languages:
  - python
  pattern: "if Y is not None:\n    warn($MSG, $...ARGS)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-annotation-from-sktime-detection
  message: 'Refactoring needed: Import of BaseSeriesAnnotator from detection module
    should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: from sktime\.detection.*BaseSeriesAnnotator
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-basedetector-instead-of-baseseriesannotator
  message: 'Refactoring needed: Message about using BaseDetector instead of BaseSeriesAnnotator
    should be removed after deletion'
  severity: WARNING
  languages:
  - python
  pattern-regex: BaseDetector instead.*BaseSeriesAnnotator|use BaseDetector
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-Y-capitalized-in-conditional
  message: 'Refactoring needed: Usage of uppercase Y variable should be removed'
  severity: WARNING
  languages:
  - python
  pattern: "if $COND:\n    ...\n    Y\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - sktime/detection/base/_base.py
- id: detect-Y-parameter-stacklevel
  message: 'Refactoring needed: Warning with stacklevel inside Y parameter check should
    be removed'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: 'warn(..., stacklevel=2)

      '
  - pattern-inside: "if Y is not None:\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-annotation-module-file-existence
  message: 'Refactoring needed: The deprecated ''annotation'' module directory should
    be deleted'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - sktime/annotation/__init__.py
- id: detect-annotation-base-files
  message: 'Refactoring needed: Files in deprecated ''annotation/base'' subdirectory
    should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - sktime/annotation/base/*.py
- id: detect-annotation-adapters-files
  message: 'Refactoring needed: Files in deprecated ''annotation/adapters'' subdirectory
    should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - sktime/annotation/adapters/*.py
- id: detect-annotation-compose-files
  message: 'Refactoring needed: Files in deprecated ''annotation/compose'' subdirectory
    should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - sktime/annotation/compose/*.py
- id: detect-basedetector-fit-Y-parameter
  message: 'Refactoring needed: Y parameter in fit() method should be removed, use
    lowercase y instead'
  severity: WARNING
  languages:
  - python
  pattern: "def fit(self, $X, $...ARGS, Y=$DEFAULT, $...MORE):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-basedetector-update-Y-parameter
  message: 'Refactoring needed: Y parameter in update() method should be removed,
    use lowercase y instead'
  severity: WARNING
  languages:
  - python
  pattern: "def update(self, $X, $...ARGS, Y=$DEFAULT, $...MORE):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-basedetector-fit-predict-Y-parameter
  message: 'Refactoring needed: Y parameter in fit_predict() method should be removed,
    use lowercase y instead'
  severity: WARNING
  languages:
  - python
  pattern: "def fit_predict(self, $X, $...ARGS, Y=$DEFAULT, $...MORE):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-basedetector-fit-transform-Y-parameter
  message: 'Refactoring needed: Y parameter in fit_transform() method should be removed,
    use lowercase y instead'
  severity: WARNING
  languages:
  - python
  pattern: "def fit_transform(self, $X, $...ARGS, Y=$DEFAULT, $...MORE):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-Y-parameter-conditional-assignment
  message: 'Refactoring needed: Y to y parameter fallback logic should be removed'
  severity: WARNING
  languages:
  - python
  pattern: "if Y is not None and $VAR is None:\n    $VAR = Y\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-uppercase-Y-in-fit-call
  message: 'Refactoring needed: Uppercase Y parameter in _fit() call should be changed
    to lowercase y'
  severity: WARNING
  languages:
  - python
  pattern: 'self._fit($...ARGS, Y=$VAL, $...MORE)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-uppercase-Y-in-update-call
  message: 'Refactoring needed: Uppercase Y parameter in _update() call should be
    changed to lowercase y'
  severity: WARNING
  languages:
  - python
  pattern: 'self._update($...ARGS, Y=$VAL, $...MORE)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-fitted-list-property
  message: 'Refactoring needed: fitted_list property should be removed from HierarchyEnsembleForecaster,
    use fitted_list_ attribute or get_fitted_params() instead'
  severity: WARNING
  languages:
  - python
  pattern: "@property\ndef fitted_list(self):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-todo-037-remove-Y-parameter
  message: 'Refactoring needed: TODO 0.37.0 comment about removing Y parameter should
    be addressed and removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: '#\s*todo\s+0\.37\.0.*[Rr]emove.*Y\s+parameter'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-todo-037-remove-baseseriesannotator
  message: 'Refactoring needed: TODO 0.37.0 comment about removing BaseSeriesAnnotator
    should be addressed'
  severity: WARNING
  languages:
  - python
  pattern-regex: '#\s*todo\s+0\.37\.0.*[Rr]emove.*BaseSeriesAnnotator'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-todo-037-remove-fitted-list
  message: 'Refactoring needed: TODO 0.37.0 comment about removing fitted_list property
    should be addressed'
  severity: WARNING
  languages:
  - python
  pattern-regex: TODO\s+0\.37\.0.*[Rr]emove.*property
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-return-fitted-list-underscore
  message: 'Refactoring needed: fitted_list property returning fitted_list_ should
    be removed'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "@property\ndef fitted_list(self):\n    ...\n    return self.fitted_list_\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-method-has-arg-Y-check
  message: 'Refactoring needed: Check for uppercase Y parameter in _fit should be
    removed'
  severity: WARNING
  languages:
  - python
  pattern: _method_has_arg(self._fit, "Y")
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-method-has-arg-Y-update-check
  message: 'Refactoring needed: Check for uppercase Y parameter in _update should
    be removed'
  severity: WARNING
  languages:
  - python
  pattern: _method_has_arg(self._update, "Y")
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-annotation-in-documentation
  message: 'Refactoring needed: Documentation references to sktime.annotation should
    be changed to sktime.detection'
  severity: WARNING
  languages:
  - generic
  pattern-regex: sktime\.annotation
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - docs/**/*.rst
- id: detect-pyod-annotator-import-in-docs
  message: 'Refactoring needed: Documentation import of PyODAnnotator from annotation.adapters
    should use detection.adapters'
  severity: WARNING
  languages:
  - generic
  pattern-regex: from\s+sktime\.annotation\.adapters\s+import\s+PyODAnnotator
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-annotation-directory-test-imports
  message: 'Refactoring needed: Test imports from sktime.annotation should be updated
    to sktime.detection'
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: from sktime.annotation.$MODULE import $...IMPORTS
  - pattern: import sktime.annotation.$MODULE
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/test_*.py'
- id: detect-fitted-list-return-statement
  message: 'Refactoring needed: Return of fitted_list_ in fitted_list property should
    be removed along with the property'
  severity: WARNING
  languages:
  - python
  pattern: 'return self.fitted_list_

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/hierarchy_ensemble.py'
    - '**/_hierarchy_ensemble.py'
- id: detect-Y-none-conditional
  message: 'Refactoring needed: Backwards compatibility handling for Y parameter should
    be removed'
  severity: WARNING
  languages:
  - python
  pattern: "if Y is not None and y is None:\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-fitted-list-property-decorator
  message: 'Refactoring needed: fitted_list property with deprecation warning should
    be removed'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "@property\ndef fitted_list($SELF):\n    ...\n    warnings.warn(...)\n\
      \    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-fitted-list-docstring
  message: 'Refactoring needed: Docstring for deprecated fitted_list property should
    be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: fitted_list.*property.*[Dd]eprecated
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-annotation-specific-files
  message: 'Refactoring needed: Annotation module file eagglo.py should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - sktime/annotation/eagglo.py
- id: detect-annotation-igts-file
  message: 'Refactoring needed: Annotation module file igts.py should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - sktime/annotation/igts.py
- id: detect-annotation-stray-file
  message: 'Refactoring needed: Annotation module file stray.py should be removed'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
