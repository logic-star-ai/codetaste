rules:
- id: helper-import-taint-tracking
  message: Detected data flow from helpers directory import to test usage
  severity: INFO
  languages:
  - javascript
  - typescript
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: require($PATH)
    - metavariable-regex:
        metavariable: $PATH
        regex: .*helpers.*
  pattern-sinks:
  - pattern: $FUNC($SINK)
  metadata:
    nr_refactored_patterns: 439
    nr_legacy_patterns: 0
  paths:
    include:
    - test/**/*.js
  options:
    symbolic_propagation: true
- id: parent-relative-import-in-application-dir
  message: Detected parent directory imports in test/application subdirectory
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: require('../..')
    - pattern: require("../..")
    - pattern: require('../../$MOD')
    - pattern: require("../../$MOD")
  metadata:
    nr_refactored_patterns: 67
    nr_legacy_patterns: 0
  paths:
    include:
    - test/application/*.js
  options:
    symbolic_propagation: true
- id: not-old-context-import-pattern
  message: Detected import that is NOT using old '../context' pattern from test subdirectories
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: $VAR = require($PATH)
    - pattern: const $VAR = require($PATH)
    - pattern: var $VAR = require($PATH)
    - pattern: let $VAR = require($PATH)
  - pattern-not: $VAR = require('../context')
  - pattern-not: const $VAR = require('../context')
  - pattern-not: var $VAR = require('../context')
  - pattern-not: let $VAR = require('../context')
  - metavariable-regex:
      metavariable: $PATH
      regex: .*helpers.*
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
  paths:
    include:
    - test/*/*.js
  options:
    symbolic_propagation: true
- id: application-subdir-describe-blocks
  message: Detected describe blocks in test/application subdirectory files
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: "describe($NAME, function() {\n  ...\n})"
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
    include:
    - test/application/*.js
    exclude:
    - test/application.js
  options:
    symbolic_propagation: true
- id: require-statements-in-application-subdirs
  message: Detected require statements in new application test subdirectories
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: const $VAR = require($PATH)
  - pattern: var $VAR = require($PATH)
  - pattern: let $VAR = require($PATH)
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    include:
    - test/application/*.js
    exclude:
    - test/application.js
  options:
    symbolic_propagation: true
- id: use-strict-in-application-subdirs
  message: Detected 'use strict' directive in new application subdirectory test files
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: '''use strict'';

    '
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - test/application/*.js
    exclude:
    - test/application.js
  options:
    symbolic_propagation: true
- id: test-console-stderr-require
  message: Detected test-console stderr require in split tests
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: const $VAR = require($MOD).stderr
    - pattern: const $VAR = require($MOD).$PROP
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - test/application/*.js
    exclude:
    - test/application.js
  options:
    symbolic_propagation: true
- id: test-application-index-file-exists
  message: Detected new test/application/index.js file exists (core app behavior tests)
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
