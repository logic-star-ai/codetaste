rules:
- id: detect-generator-function
  message: Detected generator function in application test file - generator middleware
    tests modularized
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: "function *($NEXT) {\n  ...\n}\n"
    - pattern: "function *() {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 155
    nr_legacy_patterns: 0
  paths:
    include:
    - test/application/*.js
- id: detect-koa-constructor-call
  message: Detected koa constructor call in application test file - modularized tests
    create app instances
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'const $APP = koa()

        '
    - pattern: 'var $APP = koa()

        '
    - pattern: 'const $APP = $KOA()

        '
    - pattern: 'var $APP = $KOA()

        '
  metadata:
    category: basic
    nr_refactored_patterns: 96
    nr_legacy_patterns: 0
  paths:
    include:
    - test/application/*.js
