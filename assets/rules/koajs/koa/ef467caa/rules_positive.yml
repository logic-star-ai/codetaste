- id: makefile-application-wildcard-pattern
  message: Detected Makefile updated with test/application/* wildcard pattern
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: test/application/\*
  - pattern-not-regex: test/application\s*\\
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - Makefile
    - makefile
    - '*.mk'
  options:
    symbolic_propagation: true
