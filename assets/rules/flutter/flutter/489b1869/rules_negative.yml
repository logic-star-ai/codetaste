rules:
- id: nested-enum-in-display-list-dir
  message: Display list code uses old nested enum types from DlCanvas, replace with
    standalone enums (DlClipOp, DlPointMode, DlSrcRectConstraint)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: DlCanvas\s*::\s*(ClipOp|PointMode|SrcRectConstraint)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 148
  paths:
    include:
    - '**/display_list/**'
    exclude:
    - '**/dl_canvas.h'
- id: dlcanvas-nested-clipop-type-reference
  message: Replace nested enum 'DlCanvas::ClipOp' with standalone enum 'DlClipOp'
  severity: WARNING
  languages:
  - cpp
