  message: X-Pack metricbeat module assigns logger from base.Logger().Named() - successful
    refactoring
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $VAR := base.Logger().Named($NAME)
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/metricbeat/module/**/*.go
