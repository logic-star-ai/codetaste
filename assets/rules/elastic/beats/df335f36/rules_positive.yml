rules:
- id: xpack-metricbeat-logger-named-calls
  message: Metricbeat uses base.Logger().Named() - successful refactoring
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: base.Logger().Named($STR)
  - pattern: $VAR := base.Logger().Named($STR)
  - pattern: $VAR = base.Logger().Named($STR)
  metadata:
    category: api
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/metricbeat/module/**/*.go
