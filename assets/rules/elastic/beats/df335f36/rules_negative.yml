rules:
- id: logp-newlogger-without-using-parent
  message: Standalone logp.NewLogger() call should be replaced with logger instance
    passed from parent context.
  severity: WARNING
  languages:
  - go
  pattern: logp.NewLogger($NAME)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - filebeat/config/*.go
    - filebeat/registrar/*.go
    - filebeat/fileset/*.go
    - filebeat/harvester/*.go
- id: logp-usage-in-loop-filebeat
  message: Loop uses global logp.$METHOD(). Use logger instance passed as parameter
    or from struct field.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "for ... {\n  ...\n  logp.$METHOD(...)\n  ...\n}\n"
    - pattern: "for $VAR := range $ITER {\n  ...\n  logp.$METHOD(...)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(Info|Err|Debug|Warn|Error)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - filebeat/config/*.go
    - filebeat/registrar/*.go
    - filebeat/fileset/*.go
    - filebeat/input/file/*.go
    - filebeat/harvester/*.go
- id: filebeat-harvester-function-missing-logger-param
  message: Function in filebeat/harvester uses global logp.$METHOD() but doesn't have
    logger parameter. Add logger parameter and use logger.$METHOD() instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(...) $RET {\n  ...\n  logp.$METHOD(...)\n  ...\n}\n"
  - pattern-not: "func $FUNC(..., $LOGGER *logp.Logger, ...) $RET {\n  ...\n  logp.$METHOD(...)\n\
      \  ...\n}\n"
  - pattern-not: "func $FUNC(..., logger *logp.Logger, ...) $RET {\n  ...\n  logp.$METHOD(...)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(Info|Err|Debug|Warn|Error|Critical)$
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - filebeat/harvester/*.go
- id: function-with-specific-logp-debug-selector
  message: Global logp.Debug() with selector should be replaced with logger.Named().Debugf().
    Pass logger instance as parameter.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: logp.Debug("input", $MSG, ...)
    - pattern: logp.Debug("state", $MSG, ...)
    - pattern: logp.Debug("fileset", $MSG, ...)
    - pattern: logp.Debug("registrar", $MSG, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - filebeat/**/*.go
