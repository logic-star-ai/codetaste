rules:
- id: x-pack-metricbeat-logger-param-excluding-billing
  message: Detected logger parameter in x-pack metricbeat module (excluding pre-existing)
  severity: INFO
  languages:
  - go
  pattern-regex: ', logger \*logp\.Logger\)'
  metadata:
    category: dependency
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/metricbeat/module/**/*.go
    exclude:
    - x-pack/metricbeat/module/azure/billing/data.go
- id: azure-logger-param-in-constructor
  message: Detected Azure constructor function with logger parameter
  severity: INFO
  languages:
  - go
  pattern-regex: func New[A-Z][a-zA-Z]*\([^)]+logger \*logp\.Logger[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/metricbeat/module/azure/**/*.go
- id: azure-module-new-constructor-logger
  message: Detected Azure New constructor with Config and logger parameters
  severity: INFO
  languages:
  - go
  pattern-regex: func New[A-Z][a-zA-Z]*\([^)]*Config[^)]*logger \*logp\.Logger\)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/metricbeat/module/azure/**/*.go
- id: libbeat-reader-logger-param-pattern
  message: Detected logger parameter in libbeat reader
  severity: INFO
  languages:
  - go
  pattern-regex: ', logger \*logp\.Logger'
  metadata:
    category: dependency
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - libbeat/reader/**/*.go
- id: libbeat-reader-logger-in-function-sig
  message: Detected logger parameter closing parenthesis in libbeat reader
  severity: INFO
  languages:
  - go
  pattern-regex: ', logger \*logp\.Logger\)'
  metadata:
    category: dependency
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - libbeat/reader/**/*.go
- id: json-reader-new-with-logger
  message: Detected JSON reader constructor with logger
  severity: INFO
  languages:
  - go
  pattern-regex: func New[A-Z][a-zA-Z]*\([^)]+logger \*logp\.Logger\)
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - libbeat/reader/readjson/**/*.go
- id: aws-s3-input-logger-parameter
  message: Detected AWS S3 input function with logger parameter
  severity: INFO
  languages:
  - go
  pattern-regex: ', logger \*logp\.Logger'
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/filebeat/input/awss3/*.go
- id: meraki-module-logger-parameter
  message: Detected Meraki module function with logger parameter
  severity: INFO
  languages:
  - go
  pattern-regex: ', logger \*logp\.Logger'
  metadata:
    category: dependency
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/metricbeat/module/meraki/**/*.go
- id: registry-logger-from-parameter
  message: Detected gzipRegistry() accepting logger parameter - refactoring successfully
    applied
  severity: INFO
  languages:
  - go
  pattern: "func gzipRegistry($LOGGER *logp.Logger) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: gzip-registry-with-logger-param-filebeat
  message: Detected gzipRegistry() with logger parameter in diagnostics.go - refactoring
    successfully applied
  severity: INFO
  languages:
  - go
  pattern: "func gzipRegistry($LOGGER *logp.Logger) $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - filebeat/beater/diagnostics.go
- id: azure-app-insights-client-with-logger
  message: Detected Azure App Insights client constructor with logger parameter -
    refactoring successfully applied
  severity: INFO
  languages:
  - go
  pattern: "func $FUNC(..., logger *logp.Logger) (*Client, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/metricbeat/module/azure/app_insights/*.go
- id: azure-monitor-service-logger
  message: Detected Azure monitor service with logger parameter - refactoring successfully
    applied
  severity: INFO
  languages:
  - go
  pattern: "func $FUNC(..., $LOGGER *logp.Logger) (*$SERVICE, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/metricbeat/module/azure/*_service.go
- id: named-logger-diagnostic-component
  message: Detected diagnostic component using Named logger - refactoring successfully
    applied
  severity: INFO
  languages:
  - go
  pattern: 'logger.Named("diagnostics")

    '
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: logger-passed-to-gzip-file
  message: Detected gzipFile called with logger parameter - refactoring successfully
    applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'gzipFile($LOGGER, $SRC, $DST)

      '
  - metavariable-type:
      metavariable: $LOGGER
      types:
      - '*logp.Logger'
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - filebeat/beater/diagnostics.go
- id: logger-passed-to-tar-folder
  message: Detected tarFolder called with logger parameter - refactoring successfully
    applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'tarFolder($LOGGER, $SRC, $DST)

      '
  - metavariable-type:
      metavariable: $LOGGER
      types:
      - '*logp.Logger'
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - filebeat/beater/diagnostics.go
- id: gzipregistry-func-exists-with-logger-param
  message: Detected gzipRegistry function signature with logger parameter
  severity: INFO
  languages:
  - go
  pattern-regex: func gzipRegistry\(.*\*logp\.Logger.*\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - filebeat/beater/diagnostics.go
- id: azure-monitor-service-logger-param-func
  message: Detected Azure monitor service constructor with logger
  severity: INFO
  languages:
  - go
  pattern-regex: func New.*\(.*logger \*logp\.Logger.*\) \(\*.*Service
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/metricbeat/module/azure/monitor_service.go
- id: syslog-reader-new-with-logger
  message: Detected syslog reader with logger parameter
  severity: INFO
  languages:
  - go
  pattern-regex: func New.*\(.*logger \*logp\.Logger\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - libbeat/reader/syslog/syslog.go
- id: gzipregistry-accepts-logger-parameter
  message: Detected gzipRegistry function accepting logger parameter
  severity: INFO
  languages:
  - go
  pattern-regex: gzipRegistry\(logger \*logp\.Logger\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: iis-module-logger-parameter
  message: Detected IIS module function with logger parameter
  severity: INFO
  languages:
  - go
  pattern-regex: ', logger \*logp\.Logger'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - x-pack/metricbeat/module/iis/**/*.go
