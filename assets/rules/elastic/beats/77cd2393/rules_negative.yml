rules:
- id: logger-newlogger-in-x-pack-metricbeat-modules
  message: X-Pack metricbeat module should accept logger parameter instead of creating
    global logger
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: logp.NewLogger($LOGNAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - '*x-pack/metricbeat/module/*/*.go'
    - '*x-pack/metricbeat/module/*/*/*.go'
    exclude:
    - '*_test.go'
- id: logger-newlogger-in-azure-files
  message: Azure module should accept logger parameter instead of creating global
    logger
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: logp.NewLogger($NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '*/module/azure/*.go'
    - '*/module/azure/*/*.go'
    exclude:
    - '*_test.go'
- id: logger-newlogger-in-any-processor-struct
  message: Processor structs should use passed logger parameter instead of logp.NewLogger()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "&$PROCESSOR{\n  ...,\n  $FIELD: logp.NewLogger($NAME),\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FIELD
      regex: ^(log|logger)$
  - metavariable-pattern:
      metavariable: $NAME
      patterns:
      - pattern-not: '""'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*/processors/*/*.go'
    exclude:
    - '*_test.go'
    - '*/processors/processor.go'
- id: logger-with-method-new-in-struct-init
  message: 'Replace ''log: logp.NewLogger()'' with passed logger using logger.Named()'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'log: logp.NewLogger($NAME)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*/processors/*/*.go'
    - '*/reader/*/*.go'
    exclude:
    - '*_test.go'
- id: logger-struct-literal-without-pointer
  message: Struct should use passed logger parameter instead of logp.NewLogger()
  severity: WARNING
  languages:
  - go
  patterns:
