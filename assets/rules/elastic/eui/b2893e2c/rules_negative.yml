rules:
- id: eui-steps-sass-ampersand-selector
  message: Using Sass ampersand (&) for nesting. Should be converted to Emotion CSS-in-JS
    structure.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*&[^\s{]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-sass-variable-euisize-usage
  message: Using Sass variable $euiSize. Should be converted to euiTheme.size.base
    in Emotion styles.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \$euiSize(?!XS|XXS|XL|XXL|XXXL|L|M|S)\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - src/components/steps/*.scss
    - src/themes/**/steps*.scss
- id: eui-steps-sass-top-bottom-left-right
  message: Using positional properties (top/bottom/left/right) in Sass. Should use
    logical properties in Emotion.
  severity: WARNING
  languages:
  - generic
  pattern-regex: (?:top|bottom|left|right):\s*[0-9$-]
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-scss-include-mixin
  message: Using @include for mixins in Sass. Should call JS functions in Emotion
    styles.
  severity: WARNING
  languages:
  - generic
  pattern-regex: '@include'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-sass-color-property
  message: Using color property with Sass variable. Should use theme colors in Emotion.
  severity: WARNING
  languages:
  - generic
  pattern-regex: color:\s*\$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-sass-division-operator
  message: Using Sass division for step calculations. Should use mathWithUnits or
    JS division in Emotion styles.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \$euiStep[A-Za-z]+\s*/\s*2
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-scss-class-selector-euistep
  message: Using CSS class selector in Sass. Should be converted to Emotion style
    functions.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \.euiStep(?:Number|Horizontal|sHorizontal)?(?:\s|{|:)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-scss-modifier-class
  message: Using BEM modifier class with Sass. Should be converted to status-based
    Emotion styles.
  severity: WARNING
  languages:
  - generic
  pattern-regex: '&--(?:small|incomplete|disabled|loading|warning|danger|complete)'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-sass-component-element-selector
  message: Using BEM element selector in Sass. Should be converted to Emotion style
    functions.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \.euiStep(?:Number)?__(?:number|icon|loader|content|circle|titleWrapper)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-sass-adjacent-sibling-selector
  message: Using adjacent sibling selector in Sass. Should be converted to Emotion
    selector syntax.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \s+\+\s+
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-sass-import-with-at-rule
  message: Using @import in Sass file. Sass files should be removed and replaced with
    Emotion .styles.ts files.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^@import\s+['"](?:variables|mixins|step_number|steps|sub_steps|steps_horizontal)['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-sass-before-pseudo-element
  message: Using ::before pseudo-element in Sass. Should be converted to Emotion pseudo-element
