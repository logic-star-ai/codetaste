  severity: WARNING
  languages:
  - generic
  pattern-regex: ::?before
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - src/components/steps/*.scss
- id: eui-steps-sass-background-color-property
  message: Using background-color with Sass variable. Should use theme colors in Emotion.
