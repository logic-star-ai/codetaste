rules:
- id: import-emotion-types
  message: Detected import of Emotion types
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import type { $TYPE } from '@emotion/react'
    - pattern: import { type $TYPE } from '@emotion/react'
  metadata:
    nr_refactored_patterns: 98
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.styles.ts'
- id: eui-theme-size-access
  message: Detected euiTheme.size property access
  severity: INFO
  languages:
  - typescript
  pattern: $THEME.size.$PROP
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.styles.ts'
  options:
    symbolic_propagation: true
- id: eui-theme-border-access
  message: Detected euiTheme.border property access
  severity: INFO
  languages:
  - typescript
  pattern: $THEME.border.$PROP
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.styles.ts'
  options:
    symbolic_propagation: true
- id: theme-value-to-css-taint
  message: Detected theme value being used in CSS property
  severity: INFO
  languages:
  - typescript
  mode: taint
  pattern-sources:
  - pattern: $THEME.$PROP
  pattern-sinks:
  - pattern: '{ ..., $KEY: $SINK, ... }

      '
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.styles.ts'
  options:
    symbolic_propagation: true
- id: css-prop-applied-to-component
  message: Detected css prop being applied to component element
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: <$TAG ... css={$STYLES} ... />
  - metavariable-regex:
      metavariable: $TAG
      regex: ^[a-z].*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.tsx'
    exclude:
    - '**/*.test.tsx'
    - '**/*.spec.tsx'
  options:
    symbolic_propagation: true
- id: style-function-export
  message: Detected exported style function
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'export const $FUNC = ($THEME) => { ... }

        '
    - pattern: 'export const $FUNC = ($THEME, ...) => { ... }

        '
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.styles.ts'
- id: eui-button-fill-color-for-status
  message: Detected euiButtonFillColor usage for mapping step statuses to colors
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: euiButtonFillColor($THEME, $STATUS)
    - pattern: euiButtonFillColor($THEME, ...)
  - pattern-not-inside: 'import { ... } from ''...''

      '
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.styles.ts'
  options:
    symbolic_propagation: true
- id: eui-theme-colors-access
  message: Detected euiTheme.colors property access
  severity: INFO
  languages:
  - typescript
  pattern: $THEME.colors.$PROP
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.styles.ts'
  options:
    symbolic_propagation: true
- id: math-with-units-helper-usage
  message: Detected mathWithUnits helper for CSS calculations
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: mathWithUnits($X, $OP, $Y)
    - pattern: mathWithUnits([$X, ...], $OP)
  - pattern-not-inside: 'import { ... } from ''...''

      '
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.styles.ts'
  options:
    symbolic_propagation: true
- id: should-render-custom-styles-test
  message: Detected shouldRenderCustomStyles test for component
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: shouldRenderCustomStyles(<$COMPONENT ... />)
    - pattern: shouldRenderCustomStyles(<$COMPONENT />)
    - pattern: "it('...', () => {\n  ...\n  shouldRenderCustomStyles(...)\n  ...\n\
        })\n"
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.test.tsx'
    - '**/steps/*.test.ts'
- id: tsx-example-files-conversion
  message: Detected example file converted to TypeScript
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/views/steps/*.tsx'
    exclude:
    - '**/*.test.tsx'
    - '**/*.spec.tsx'
- id: eui-step-variables-helper
  message: Detected euiStepVariables helper function for consistent sizing
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'const $VARS = euiStepVariables($THEME)

        '
    - pattern: 'const { ..., $VAR, ... } = euiStepVariables($THEME)

        '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.styles.ts'
  options:
    symbolic_propagation: true
- id: import-from-styles-file
  message: Detected import from new .styles.ts file
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., $STYLE, ... } from '$PATH'
    - pattern: import * as $STYLES from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: .*\.styles.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.tsx'
    - '**/steps/*.ts'
    exclude:
    - '**/*.styles.ts'
    - '**/*.test.tsx'
    - '**/*.spec.tsx'
  options:
    symbolic_propagation: true
- id: use-eui-theme-hook-in-step-components
  message: Detected useEuiTheme hook usage in step component
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'const { $THEME } = useEuiTheme()

        '
    - pattern: 'const $THEME = useEuiTheme()

        '
  - pattern-not-inside: 'describe(...) { ... }

      '
  - pattern-not-inside: 'it(...) { ... }

      '
  - pattern-not-inside: 'test(...) { ... }

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.tsx'
    - '**/steps/*.ts'
    exclude:
    - '**/*.test.tsx'
    - '**/*.spec.tsx'
    - '**/*.test.ts'
    - '**/*.spec.ts'
  options:
    symbolic_propagation: true
- id: eui-theme-import-in-component
  message: Detected import of useEuiTheme in step component
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., useEuiTheme, ... } from '$PATH'
    - pattern: import { useEuiTheme } from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: .*services.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.tsx'
    exclude:
    - '**/*.test.tsx'
    - '**/*.spec.tsx'
- id: emotion-styles-file-created-step
  message: Detected new Emotion styles file for step component
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/step.styles.ts'
- id: emotion-styles-file-created-step-number
  message: Detected new Emotion styles file for step number component
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/step_number.styles.ts'
- id: emotion-styles-file-created-step-horizontal
  message: Detected new Emotion styles file for horizontal step component
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/step_horizontal.styles.ts'
- id: emotion-styles-file-created-steps-horizontal
  message: Detected new Emotion styles file for horizontal steps component
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/steps_horizontal.styles.ts'
- id: emotion-styles-file-created-sub-steps
  message: Detected new Emotion styles file for sub steps component
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/sub_steps.styles.ts'
