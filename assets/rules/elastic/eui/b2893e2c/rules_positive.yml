rules:
- id: space-in-styles
  message: Spaces in styles - formatting
  severity: INFO
  languages:
  - typescript
  pattern-regex: ' '
  metadata:
    nr_refactored_patterns: 2946
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/step.styles.ts'
    - '**/steps/step_number.styles.ts'
    - '**/steps/step_horizontal.styles.ts'
    - '**/steps/steps_horizontal.styles.ts'
    - '**/steps/sub_steps.styles.ts'
