- id: jsx-element-with-css-prop
  message: JSX element with css prop - emotion styling applied
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "<$TAG\n  ...\n  css={...}\n  ...\n/>\n"
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.tsx'
- id: style-function-returns-cssproperties
  message: Style function returns CSS properties - emotion typing pattern
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "export const $FUNC = (...) => {\n  ...\n  return { ..., $PROP: $VAL,\
      \ ... }\n}\n"
  - pattern-not-inside: '// $COMMENT

      ...

      '
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*step*.styles.ts'
- id: euistep-component-in-jsx
  message: EuiStep component used in JSX - component usage
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: <$COMP ... />
    - pattern: <$COMP ...>...</$COMP>
  - metavariable-regex:
      metavariable: $COMP
      regex: ^Eui.*[Ss]tep.*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/views/steps/*.tsx'
- id: style-function-call-with-theme-object
  message: Style function called with theme object - emotion pattern
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: const $STYLES = $FUNC($THEME)
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(style|styles).*
  - metavariable-regex:
      metavariable: $STYLES
      regex: (?i).*(style|styles).*
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.tsx'
- id: styles-array-concatenation
  message: Styles array with multiple entries - composable styles
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: const $VAR = [$STYLE1, $STYLE2, ...]
  - metavariable-regex:
      metavariable: $VAR
      regex: (?i).*(css.*style|style).*
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.tsx'
- id: dot-notation-style-access
  message: Dot notation style access - named style variant
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: $STYLES.$VARIANT
  - metavariable-regex:
      metavariable: $STYLES
      regex: ^styles$
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/steps/*.tsx'
- id: theme-size-base-accessed
  message: Theme size base accessed - Sass size variable replaced
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: $THEME.size.base
    - pattern: $THEME.size[$SIZE]
  - metavariable-regex:
      metavariable: $THEME
      regex: (?i).*theme.*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*step*.styles.ts'
- id: example-file-converted-to-tsx
  message: Example file exists as tsx - converted from js
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
