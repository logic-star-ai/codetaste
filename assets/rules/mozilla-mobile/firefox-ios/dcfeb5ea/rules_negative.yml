- id: print-in-actor
  message: Remove print() from actor - should use Logger infrastructure
  severity: WARNING
  languages:
  - swift
  patterns:
  - pattern-inside: "actor $ACTOR {\n  ...\n}\n"
  - pattern: print(...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
  paths:
    exclude:
    - '**/Tests/**'
    - Client/Assets/Search/**
