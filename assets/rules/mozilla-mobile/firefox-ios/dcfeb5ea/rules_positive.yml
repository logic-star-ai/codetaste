rules:
- id: logger-with-warning-level-new-categories
  message: Detected warning level with new categories in specific files - refactoring
    applied
  severity: INFO
  languages:
  - swift
  patterns:
  - pattern: 'logger.log($MSG, level: .warning, category: $CAT)

      '
  - metavariable-regex:
      metavariable: $CAT
      regex: \.(?:telemetry|sync|library)
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/FxATelemetry.swift'
    - '**/Authenticator.swift'
    - '**/DownloadsPanel.swift'
    - '**/FxAWebViewModel.swift'
