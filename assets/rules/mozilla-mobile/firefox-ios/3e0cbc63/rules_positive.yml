rules:
- id: thememanager-protocol-window-param-windowuuid
  message: ThemeManager protocol method uses WindowUUID parameter type
  severity: INFO
  languages:
  - swift
  pattern-regex: for\s+window:\s*WindowUUID[),?]
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - BrowserKit/Sources/Common/Theming/ThemeManager.swift
- id: thememanager-protocol-window-parameter
  message: ThemeManager protocol uses WindowUUID for window parameters
  severity: INFO
  languages:
  - swift
