    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: struct-with-windowuuid-uuid
  message: Struct with windowUUID property should use WindowUUID type instead of UUID
  severity: WARNING
  languages:
  - swift
  patterns:
  - pattern: "struct $STRUCT {\n  ...\n  let windowUUID: UUID\n  ...\n}\n"
  metadata:
