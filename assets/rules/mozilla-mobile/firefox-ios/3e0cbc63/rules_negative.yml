rules:
- id: any-func-windowuuid-uuid-exclude-tests
  message: Function with windowUUID parameter should use WindowUUID type instead of
    UUID
  severity: WARNING
  languages:
  - swift
  pattern: "func $FUNC(..., windowUUID: UUID, ...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    exclude:
    - BrowserKit/Tests/**
    - '**/*Tests.swift'
    - '**/*Test.swift'
- id: extension-method-windowuuid-uuid
  message: Extension method with windowUUID parameter should use WindowUUID type
  severity: WARNING
  languages:
  - swift
  patterns:
  - pattern: "extension $TYPE {\n  ...\n  func $METHOD(..., windowUUID: UUID, ...)\
      \ {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    exclude:
    - BrowserKit/Tests/**
- id: any-init-windowuuid-uuid-exclude-tests
  message: Initializer with windowUUID parameter should use WindowUUID type instead
    of UUID
  severity: WARNING
  languages:
  - swift
  pattern: "init(..., windowUUID: UUID, ...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    exclude:
    - BrowserKit/Tests/**
    - '**/*Tests.swift'
    - '**/*Test.swift'
- id: class-init-many-params-windowuuid
  message: Class init with windowUUID parameter should use WindowUUID type
  severity: WARNING
  languages:
  - swift
  patterns:
  - pattern: "init(..., windowUUID: UUID, ...) {\n  ...\n}\n"
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    exclude:
    - BrowserKit/Tests/**
    - '**/*Test*.swift'
- id: struct-init-windowuuid-uuid
  message: Struct init with windowUUID parameter should use WindowUUID type
  severity: WARNING
  languages:
  - swift
  patterns:
  - pattern: "init(..., windowUUID: UUID, ...) {\n  ...\n}\n"
  - pattern-inside: "struct $STRUCT {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    exclude:
    - BrowserKit/Tests/**
- id: extension-init-windowuuid-uuid
  message: Extension init with windowUUID parameter should use WindowUUID type
  severity: WARNING
  languages:
  - swift
  patterns:
  - pattern: "extension $TYPE {\n  ...\n  init(..., windowUUID: UUID, ...) {\n   \
      \ ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    exclude:
    - BrowserKit/Tests/**
- id: action-subclass-uuid-init-exclude-tests
  message: Action subclass init should use WindowUUID instead of UUID for windowUUID
    parameter
  severity: WARNING
  languages:
  - swift
  patterns:
  - pattern: "init(..., windowUUID: UUID, actionType: $TYPE) {\n  ...\n  super.init(windowUUID:\
      \ windowUUID, actionType: actionType)\n}\n"
  - pattern-inside: "class $CLASS: Action {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    exclude:
    - BrowserKit/Tests/**
    - '**/*Tests.swift'
    - '**/*Test.swift'
- id: parameter-named-windowuuid-typed-uuid
  message: Function parameter named windowUUID should use WindowUUID type instead
    of UUID
  severity: WARNING
  languages:
  - swift
  pattern: "func $FUNC($PARAM: ..., windowUUID: UUID, $REST: ...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: middleware-action-uuid-parameter
  message: Middleware action should use WindowUUID instead of UUID
  severity: WARNING
  languages:
  - swift
  patterns:
  - pattern: "init(..., windowUUID: UUID, actionType: $TYPE) {\n  ...\n}\n"
  - pattern-inside: "class $CLASS: Action {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $CLASS
      pattern-regex: .*MiddlewareAction
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: action-optional-params-uuid-init
  message: Action init with optional parameter should use WindowUUID type
  severity: WARNING
  languages:
  - swift
  pattern: "init($P1: $T1? = nil, windowUUID: UUID, actionType: ActionType) {\n  self.$P1\
    \ = $P1\n  super.init(windowUUID: windowUUID, actionType: actionType)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    exclude:
    - BrowserKit/Tests/**
- id: action-three-optional-params-uuid
  message: Action init with three optional parameters should use WindowUUID type
  severity: WARNING
  languages:
  - swift
  pattern: "init($P1: $T1? = nil, $P2: $T2? = nil, $P3: $T3? = nil, windowUUID: UUID,\
    \ actionType: ActionType) {\n  ...\n  super.init(windowUUID: windowUUID, actionType:\
    \ actionType)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    exclude:
    - BrowserKit/Tests/**
- id: action-one-param-windowuuid-uuid
  message: Action init with one parameter should use WindowUUID type
  severity: WARNING
  languages:
  - swift
  pattern: "init($P1: $T1, windowUUID: UUID, actionType: ActionType) {\n  self.$P1\
    \ = $P1\n  super.init(windowUUID: windowUUID, actionType: actionType)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    exclude:
    - BrowserKit/Tests/**
- id: action-mixed-three-params-uuid
  message: Action init with mixed three parameters should use WindowUUID type
  severity: WARNING
  languages:
  - swift
  pattern: "init($P1: $T1, $P2: $T2? = nil, $P3: $T3? = nil, windowUUID: UUID, actionType:\
    \ ActionType) {\n  ...\n  super.init(windowUUID: windowUUID, actionType: actionType)\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    exclude:
    - BrowserKit/Tests/**
- id: property-windowuuid-uuid-type
  message: Property windowUUID should use WindowUUID type instead of UUID
  severity: WARNING
  languages:
  - swift
  pattern: 'let windowUUID: UUID

    '
  metadata:
