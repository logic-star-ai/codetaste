    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: public-extension-windowuuid
  message: WindowUUID extension should be in Common module, not Client
  severity: WARNING
  languages:
  - swift
  patterns:
  - pattern: "public extension WindowUUID {\n  ...\n}\n"
  - pattern-inside: 'import Foundation

      ...

