      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - firefox-ios/Client/**
- id: extension-windowuuid-with-typealias
  message: WindowUUID extension in Client module should be moved to Common
  severity: WARNING
  languages:
  - swift
  patterns:
  - pattern: "extension WindowUUID {\n  ...\n}\n"
  - pattern-inside: 'typealias WindowUUID = UUID

      ...

      '
