rules:
- id: detect-large-test-function-in-backbones
  message: Test function for specific backbone architecture should be in dedicated
    test_backbones/test_<architecture>.py file
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def $TEST($...ARGS):\n    ...\n"
  - metavariable-pattern:
      metavariable: $TEST
      patterns:
      - pattern-regex: ^test_(resnet|resnext|res2net|resnest|regnet|hourglass|trident)_
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - tests/test_models/test_backbones.py
- id: detect-large-test-function-in-heads
  message: Test function for specific head type should be in dedicated test_dense_heads/
    or test_roi_heads/ file
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def $TEST($...ARGS):\n    ...\n"
  - metavariable-pattern:
      metavariable: $TEST
      patterns:
      - pattern-regex: ^test_(fcos|anchor|corner|bbox|mask|sabl|yolact|transformer|paa|vfnet|fsaf|ga_anchor)_
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - tests/test_models/test_heads.py
- id: detect-mmcv-config-import-in-root-test-config
  message: test_config.py should be moved to test_runtime/test_config.py
  severity: WARNING
  languages:
  - python
  pattern: 'from mmcv import Config

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - tests/test_config.py
- id: detect-assigner-import-in-root
  message: test_assigner.py should be moved to test_utils/test_assigner.py
  severity: WARNING
  languages:
