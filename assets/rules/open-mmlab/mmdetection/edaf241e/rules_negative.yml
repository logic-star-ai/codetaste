    - tests/test_assigner.py
- id: detect-old-test-dataset-location
  message: Old test_dataset.py should be split into test_datasets/*.py (test_common.py,
    test_custom_dataset.py, test_dataset_wrapper.py, test_xml_dataset.py)
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tests/test_data/test_dataset.py
- id: detect-old-test-backbones-monolithic
  message: Monolithic test_backbones.py should be split into test_backbones/*.py per
