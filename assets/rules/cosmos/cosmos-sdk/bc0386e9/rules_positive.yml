rules:
- id: msgtypeurl-in-noopmsg-excluding-existing
  message: 'Detected refactoring: sdk.MsgTypeURL() flows into NoOpMsg in newly refactored
    modules'
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $SDK.MsgTypeURL($MSG)
  pattern-sinks:
  - pattern: $SIM.NoOpMsg($MOD, $SINK, $REASON)
  metadata:
    nr_refactored_patterns: 97
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/simulation/*.go'
    exclude:
    - '**/x/authz/simulation/*.go'
    - '**/x/nft/simulation/*.go'
- id: legacymsg-interface-check-fixed-final
  message: 'Detected refactoring: LegacyMsg interface checks without Type/Route'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: var _ $PKG.LegacyMsg = &$STRUCT{}
    - pattern: var _ $PKG.LegacyMsg = (*$STRUCT)(nil)
  - metavariable-regex:
      metavariable: $STRUCT
      regex: ^Msg.*
  - pattern-not-inside: 'func ($X $Y) Type() string { return $Z }

      ...

      '
  metadata:
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/x/*/types/*.go'
    - '**/x/*/*.go'
    exclude:
    - '**/x/consensus/**'
    - '**/x/upgrade/types/msgs.go'
    - '**/x/authz/**'
    - '**/x/feegrant/**'
- id: validatebasic-exists-without-type-route
  message: 'Detected refactoring: ValidateBasic exists but Type() and Route() removed'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($MSG $STRUCT) ValidateBasic() error {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $STRUCT
      regex: ^Msg[A-Z].*
  - pattern-not-inside: 'func ($X $Y) Type() string { ... }

      ...

      '
  - pattern-not-inside: 'func ($X $Y) Route() string { ... }

      ...

      '
  metadata:
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/x/*/types/*.go'
    exclude:
    - '**/*_test.go'
