- id: refactor-type-method-removed-from-file
  message: Detected file with no Type() method implementations
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: (?s)func\s+\(\w+\s+\*?\w+\)\s+Type\(\)\s+string\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
