- id: slashing-sim-ops-with-sdk-msgtypeurl
  message: Detected slashing simulation using sdk.MsgTypeURL (refactoring applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: sdk.MsgTypeURL($MSG)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/x/slashing/simulation/operations.go'
- id: get-module-name-from-typeurl-call
  message: Detected call to GetModuleNameFromTypeURL() utility (refactoring applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FN($URL)
  - metavariable-regex:
      metavariable: $FN
      regex: (?i).*module.*type.*url.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: get-module-name-from-typeurl-function
  message: Detected GetModuleNameFromTypeURL() utility function (refactoring applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $FN($URL string) string { ... }
    - pattern: func $FN($URL string) (string, error) { ... }
  - metavariable-regex:
      metavariable: $FN
      regex: (?i).*module.*type.*url.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: sdk-msgtypeurl-comparison
  message: Detected sdk.MsgTypeURL() in comparison operation (refactoring applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $SDK.MsgTypeURL($MSG) == $VAR
    - pattern: $VAR == $SDK.MsgTypeURL($MSG)
    - pattern: $SDK.MsgTypeURL($MSG) != $VAR
    - pattern: $VAR != $SDK.MsgTypeURL($MSG)
  - metavariable-regex:
      metavariable: $SDK
      regex: ^sdk$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
