    nr_legacy_patterns: 0
  paths:
    include:
    - '**/x/staking/simulation/operations.go'
- id: distribution-sim-ops-with-sdk-msgtypeurl
  message: Detected distribution simulation using sdk.MsgTypeURL (refactoring applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: sdk.MsgTypeURL($MSG)
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
