- id: refactor-genanddelivertx-using-modulename-only
  message: Detected GenAndDeliverTxWithRandFees using sdk.MsgTypeURL() (refactored)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'return simtypes.NoOpMsg($MODULE, $MSGTYPE, $MSG), nil, err

      '
  - pattern-inside: "func GenAndDeliverTxWithRandFees($INPUT OperationInput) (...)\
      \ {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $MSGTYPE
      patterns:
      - pattern: sdk.MsgTypeURL($X)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - x/simulation/util.go
