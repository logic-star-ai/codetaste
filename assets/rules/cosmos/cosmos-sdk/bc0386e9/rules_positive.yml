rules:
- id: noopmsg-error-return-pattern
  message: Detected NoOpMsg with nil, err return (refactoring applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: return $PKG.NoOpMsg($MOD, $SDK.MsgTypeURL($MSG), $STR), nil, $ERR
  - metavariable-regex:
      metavariable: $SDK
      regex: ^sdk$
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i).*sim.*
  metadata:
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/simulation/*.go'
    exclude:
    - '**/x/authz/simulation/*.go'
    - '**/x/nft/simulation/*.go'
- id: msgtypeurl-replaces-msgtype-in-noop
  message: Detected sdk.MsgTypeURL() replacing msg.Type() in NoOpMsg call (refactoring
    applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: return $PKG.NoOpMsg($MODULE, $SDK.MsgTypeURL($MSG), $COMMENT), $ERR1,
      $ERR2
  - metavariable-regex:
      metavariable: $SDK
      regex: ^sdk$
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i).*(simtypes|sim).*
  metadata:
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/simulation/operations.go'
    exclude:
    - '**/x/authz/simulation/operations.go'
    - '**/x/nft/simulation/operations.go'
- id: noopmsg-unable-to-generate
  message: Detected NoOpMsg with "unable to generate" pattern (refactoring applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: return $PKG.NoOpMsg($MOD, $SDK.MsgTypeURL($MSG), $STR), nil, $ERR
  - metavariable-regex:
      metavariable: $SDK
      regex: ^sdk$
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i).*sim.*
  - metavariable-regex:
      metavariable: $STR
      regex: .*unable.*
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/simulation/*.go'
    exclude:
    - '**/x/authz/simulation/*.go'
    - '**/x/nft/simulation/*.go'
- id: noopmsg-unable-to-deliver
  message: Detected NoOpMsg with "unable to deliver tx" comment using MsgTypeURL (refactoring
    applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: return $PKG.NoOpMsg($MOD, $SDK.MsgTypeURL($MSG), "unable to deliver tx"),
      nil, $ERR
  - metavariable-regex:
      metavariable: $SDK
      regex: ^sdk$
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i).*sim.*
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/simulation/*.go'
    exclude:
    - '**/x/authz/simulation/*.go'
    - '**/x/nft/simulation/*.go'
- id: test-equal-msgtypeurl-to-msgtypeurl
  message: Detected test comparing two sdk.MsgTypeURL() results (refactoring applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $REQUIRE.Equal($SDK.MsgTypeURL($A), $SDK.MsgTypeURL($B))
  - metavariable-regex:
      metavariable: $SDK
      regex: ^sdk$
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: bank-sim-ops-with-sdk-msgtypeurl
  message: Detected bank simulation using sdk.MsgTypeURL (refactoring applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: sdk.MsgTypeURL($MSG)
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/x/bank/simulation/operations.go'
- id: staking-sim-ops-with-sdk-msgtypeurl
  message: Detected staking simulation using sdk.MsgTypeURL (refactoring applied)
