- id: refactor-module-name-extraction-utility
  message: Detected utility function to extract module name from type URL
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func GetModuleNameFromTypeURL($URL string) string {\n  ...\n}\n"
    - pattern: "func $FUNC($URL string) string {\n  ...\n  strings.Split($X, \".\"\
        )\n  ...\n  return $RESULT\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: .*[Mm]odule.*[Nn]ame.*
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
