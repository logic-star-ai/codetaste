rules:
- id: msgtypeurl-taint-to-noopmsg-refactored
  message: 'Refactoring detected: sdk.MsgTypeURL flows to NoOpMsg in refactored modules'
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: sdk.MsgTypeURL($MSG)
  pattern-sinks:
  - pattern: $PKG.NoOpMsg($MODULE, $SINK, ...)
  metadata:
    nr_refactored_patterns: 97
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/simulation/*.go'
    exclude:
    - '**/x/authz/**'
    - '**/x/nft/**'
  options:
    symbolic_propagation: true
- id: noopmsg-with-msgtypeurl-refactored
  message: 'Refactoring detected: NoOpMsg using sdk.MsgTypeURL() in refactored modules'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.NoOpMsg($MODULE, sdk.MsgTypeURL($MSG), ...)
  metadata:
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/simulation/operations.go'
    exclude:
    - '**/x/authz/**'
    - '**/x/nft/**'
  options:
    symbolic_propagation: true
- id: validatebasic-without-type-in-refactored-modules
  message: 'Refactoring detected: ValidateBasic exists without Type() in refactored
    modules'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($M $MSG) ValidateBasic() error {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $MSG
      regex: (?i)^msg[A-Z].*
  - pattern-not-inside: 'func ($M $MSG) Type() string { ... }

      ...

      func ($M $MSG) ValidateBasic() error { ... }

      '
  - pattern-not-inside: 'func ($M $MSG) ValidateBasic() error { ... }

      ...

      func ($M $MSG) Type() string { ... }

      '
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/msgs.go'
    - '**/types/msg.go'
    exclude:
    - '**/x/bank/types/msgs.go'
- id: getsignbytes-without-type-in-refactored-modules
  message: 'Refactoring detected: GetSignBytes exists without Type() in refactored
    modules'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($M $MSG) GetSignBytes() []byte {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $MSG
      regex: (?i)^msg[A-Z].*
  - pattern-not-inside: 'func ($M $MSG) Type() string { ... }

      ...

      func ($M $MSG) GetSignBytes() []byte { ... }

      '
  - pattern-not-inside: 'func ($M $MSG) GetSignBytes() []byte { ... }

      ...

      func ($M $MSG) Type() string { ... }

      '
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/msgs.go'
    - '**/types/msg.go'
    exclude:
    - '**/x/auth/types/msgs.go'
    - '**/x/bank/types/msgs.go'
    - '**/x/mint/types/msgs.go'
    - '**/x/slashing/types/msg.go'
- id: msgtypeurl-taint-to-variable-in-simulation
  message: 'Refactoring detected: sdk.MsgTypeURL assigned to variable in simulation'
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: sdk.MsgTypeURL($MSG)
  pattern-sinks:
  - pattern: $VAR := $SINK
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/x/staking/simulation/*.go'
    - '**/x/gov/simulation/*.go'
    - '**/x/distribution/simulation/*.go'
    - '**/x/slashing/simulation/*.go'
  options:
    symbolic_propagation: true
- id: msgtypeurl-in-bank-simulation
  message: 'Refactoring detected: sdk.MsgTypeURL in bank simulation'
  severity: INFO
  languages:
  - go
  pattern: sdk.MsgTypeURL($MSG)
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/x/bank/simulation/operations.go'
  options:
    symbolic_propagation: true
- id: simulation-test-msgtypeurl
  message: 'Refactoring detected: Simulation test uses sdk.MsgTypeURL'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: sdk.MsgTypeURL($MSG)
  - pattern-inside: "func $TESTFUNC($T *testing.T) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/simulation/*_test.go'
  options:
    symbolic_propagation: true
- id: msg-methods-trio-without-type-route
  message: 'Refactoring detected: GetSignBytes, GetSigners, ValidateBasic without
    Type/Route'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func ($M $MSG) GetSignBytes() []byte { ... }

      ...

      func ($M $MSG) GetSigners() []$T { ... }

      ...

      func ($M $MSG) ValidateBasic() error { ... }

      '
  - metavariable-regex:
      metavariable: $MSG
      regex: (?i)^msg[A-Z].*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/msgs.go'
    - '**/types/msg.go'
    exclude:
    - '**/x/bank/**'
    - '**/x/consensus/**'
- id: getmodulenamefromtypeurl-function-call
  message: 'Refactoring detected: GetModuleNameFromTypeURL() function being called'
  severity: INFO
  languages:
  - go
  pattern: $PKG.GetModuleNameFromTypeURL($ARG)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: msgtypeurl-string-comparison
  message: 'Refactoring detected: sdk.MsgTypeURL result used in string comparison'
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: sdk.MsgTypeURL($MSG) == $STR
  - pattern: $STR == sdk.MsgTypeURL($MSG)
  - pattern: sdk.MsgTypeURL($MSG) != $STR
  - pattern: $STR != sdk.MsgTypeURL($MSG)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: crisis-msg-without-type-method
  message: 'Refactoring detected: Crisis module message without Type() method'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: (?s).*func\s+\([^\)]+\)\s+Type\(\)\s+string.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/x/crisis/types/msgs.go'
