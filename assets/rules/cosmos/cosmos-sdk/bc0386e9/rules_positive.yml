rules:
- id: refactor-noopmsg-with-msgtypeurl-return
  message: Detected NoOpMsg return with sdk.MsgTypeURL() usage
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'return simtypes.NoOpMsg($MOD, sdk.MsgTypeURL($MSG), $COMMENT), $X, $ERR

      '
  metadata:
    category: api
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - x/*/simulation/operations.go
    exclude:
    - x/authz/simulation/operations.go
    - x/nft/simulation/operations.go
- id: refactor-noopmsg-with-constant-and-msgtypeurl
  message: Detected NoOpMsg using sdk.MsgTypeURL() in return statement
  severity: INFO
  languages:
  - go
  pattern: 'return simtypes.NoOpMsg($MODULE, sdk.MsgTypeURL($MSG), $COMMENT), $A,
    $B

    '
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - x/bank/simulation/operations.go
    - x/distribution/simulation/operations.go
    - x/gov/simulation/operations.go
    - x/staking/simulation/operations.go
    exclude:
    - x/authz/**
    - x/nft/**
- id: refactor-removed-type-const-usage-in-tests
  message: Detected test using sdk.MsgTypeURL() in Equal assertion
  severity: INFO
  languages:
  - go
  pattern: '$REQUIRE.Equal(sdk.MsgTypeURL($MSG), $Y)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - x/*/simulation/*_test.go
    - x/*/*_test.go
- id: refactor-removed-route-const-usage-in-tests
  message: Detected test using sdk.MsgTypeURL() in Equal assertion (reverse order)
  severity: INFO
  languages:
  - go
  pattern: '$REQUIRE.Equal($X, sdk.MsgTypeURL($MSG))

    '
  metadata:
    category: basic
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - x/*/simulation/*_test.go
    - x/*/*_test.go
