  - pattern: "type LegacyMsg interface {\n  sdk.Msg\n  GetSignBytes() []byte\n}\n"
  - pattern-not-inside: "type LegacyMsg interface {\n  sdk.Msg\n  GetSignBytes() []byte\n\
      \  Route() string\n  ...\n}\n"
  - pattern-not-inside: "type LegacyMsg interface {\n  sdk.Msg\n  GetSignBytes() []byte\n\
