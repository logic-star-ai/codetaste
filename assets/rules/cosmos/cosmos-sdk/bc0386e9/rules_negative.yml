rules:
- id: simulation-type-constant-usage
  message: Replace types.$CONST with sdk.MsgTypeURL() for message type identification
    in simulation
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: types.$CONST
  - metavariable-regex:
      metavariable: $CONST
      regex: ^TypeMsg\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 89
  paths:
    include:
    - '**/simulation/**'
- id: msg-type-method-call-in-simulation
  message: Replace $MSG.Type() with sdk.MsgTypeURL($MSG) in simulation code
  severity: WARNING
  languages:
  - go
  pattern: $MSG.Type()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 67
  paths:
    include:
    - '**/simulation/**'
- id: noop-msg-with-type-constant
  message: Replace types.$CONST with sdk.MsgTypeURL() or module name in NoOpMsg call
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: simtypes.NoOpMsg($MODULE, types.$CONST, ...)
  - metavariable-regex:
      metavariable: $CONST
      regex: ^TypeMsg\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 61
- id: legacy-msg-type-method-in-msgs-file
  message: Remove deprecated Type() method from message type. Use sdk.MsgTypeURL()
    instead.
  severity: WARNING
  languages:
  - go
  pattern: 'func ($MSG $MSGTYPE) Type() string { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
  paths:
    include:
    - '**/types/msg*.go'
    - '**/types/msgs.go'
    - '**/msg*.go'
    exclude:
    - '**/evidence/**'
- id: legacy-msg-route-method-in-msgs-file
  message: Remove deprecated Route() method from message type. Use sdk.MsgTypeURL()
    instead.
  severity: WARNING
  languages:
  - go
  pattern: 'func ($MSG $MSGTYPE) Route() string { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
  paths:
    include:
    - '**/types/msg*.go'
    - '**/types/msgs.go'
    - '**/msg*.go'
    exclude:
    - '**/evidence/**'
- id: msg-type-method-any-msg
  message: Remove deprecated Type() method from message type. Use sdk.MsgTypeURL()
    instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'func ($R $T) Type() string { return $VAL }

      '
  - metavariable-regex:
      metavariable: $T
      regex: ^Msg[A-Z]\w*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
  paths:
    include:
    - '**/types/**'
    exclude:
    - '**/evidence/**'
    - '**/auth/types/credentials.go'
- id: msg-route-method-any-msg
  message: Remove deprecated Route() method from message type. Use sdk.MsgTypeURL()
    instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'func ($R $T) Route() string { return $VAL }

      '
  - metavariable-regex:
      metavariable: $T
      regex: ^Msg[A-Z]\w*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
  paths:
    include:
    - '**/types/**'
    exclude:
    - '**/evidence/**'
- id: msg-type-in-error-message
  message: Replace $MSG.Type() with sdk.MsgTypeURL($MSG) in NoOpMsg call
  severity: WARNING
  languages:
  - go
  pattern: 'simtypes.NoOpMsg($MODULE, $MSG.Type(), ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: msg-route-method-call-in-simulation
  message: Replace $MSG.Route() with sdk.MsgTypeURL($MSG) in simulation code
  severity: WARNING
  languages:
  - go
  pattern: $MSG.Route()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
  paths:
    include:
    - '**/simulation/**'
- id: router-key-usage-in-route
  message: Remove deprecated Route() method. Module routing should use sdk.MsgTypeURL()
    instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'func ($MSG $T) Route() string { return $KEY }

      '
  - metavariable-pattern:
      metavariable: $KEY
      patterns:
      - pattern-either:
        - pattern: RouterKey
        - pattern: ModuleName
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - '**/x/**/types/**'
    exclude:
    - '**/evidence/**'
- id: legacy-msg-type-method-comment
  message: Remove comment for deprecated Type() method implementation
  severity: INFO
  languages:
  - go
  pattern-regex: // Type Implements (Msg|LegacyMsg)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: legacy-msg-route-method-comment
  message: Remove comment for deprecated Route() method implementation
  severity: INFO
  languages:
  - go
  pattern-regex: // Route Implements (Msg|LegacyMsg)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: msg-route-return-routerkey
  message: Remove deprecated Route() method that returns RouterKey. Use sdk.MsgTypeURL()
    instead.
  severity: WARNING
  languages:
  - go
  pattern: 'func ($MSG $MSGTYPE) Route() string { return RouterKey }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/types/**'
    exclude:
    - '**/evidence/**'
- id: msg-route-method-docstring
  message: Remove docstring for deprecated Route() method
  severity: INFO
  languages:
  - go
  pattern-regex: ^\s*//.*Route.*returns.*route
  metadata:
