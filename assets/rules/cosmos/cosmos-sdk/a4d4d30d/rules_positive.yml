    - pattern: "func $FUNC($STORE storetypes.KVStore, $PREFIX []byte) {\n  ...\n}\n"
    - pattern: "func $FUNC($STORE storetypes.KVStore, $PREFIX []byte, ...) {\n  ...\n\
        }\n"
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/store/**'
  options:
    symbolic_propagation: true
