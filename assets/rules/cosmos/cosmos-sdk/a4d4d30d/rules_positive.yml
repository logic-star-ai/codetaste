    - pattern: "func ($RECV $TYPE) $METHOD($STORE storetypes.KVStore) {\n  ...\n}\n"
    - pattern: "func ($RECV *$TYPE) $METHOD($STORE storetypes.KVStore) {\n  ...\n\
        }\n"
    - pattern: "func ($RECV $TYPE) $METHOD($STORE storetypes.KVStore) $RET {\n  ...\n\
        }\n"
    - pattern: "func ($RECV *$TYPE) $METHOD($STORE storetypes.KVStore) $RET {\n  ...\n\
