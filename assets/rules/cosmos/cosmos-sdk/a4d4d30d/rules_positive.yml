rules:
- id: storetypes-newkvstorekey-migrated
  message: 'Refactoring detected: Using storetypes.NewKVStoreKey() instead of sdk'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $ALIAS.NewKVStoreKey(...)
  - metavariable-regex:
      metavariable: $ALIAS
      regex: ^storetypes$
  metadata:
    nr_refactored_patterns: 133
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/runtime/module.go'
