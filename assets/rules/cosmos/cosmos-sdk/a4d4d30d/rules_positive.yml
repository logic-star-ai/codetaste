  metadata:
    category: api
    nr_refactored_patterns: 321
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.go'
    - '**/*.go'
    exclude:
    - types/store.go
    - types/context.go
    - store/types/*
    - runtime/*
    - server/mock/store.go
    - x/capability/keeper/keeper.go
    - x/capability/capability_test.go
    - x/group/internal/orm/testsupport.go
