rules:
- id: storetypes-newkvstorekey-direct-call
  message: Detected direct NewKVStoreKey call from storetypes
  severity: INFO
  languages:
  - go
  pattern: storetypes.NewKVStoreKey($NAME)
  metadata:
    nr_refactored_patterns: 129
    nr_legacy_patterns: 0
  paths:
    include:
    - x/**/*.go
    - simapp/**/*.go
    - baseapp/**/*.go
    - server/**/*.go
- id: storetypes-newkvstorekey-assignment
  message: Detected NewKVStoreKey assignment from storetypes
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$VAR := $ALIAS.NewKVStoreKey($NAME)

      '
  - pattern-not: '$VAR := sdk.NewKVStoreKey($NAME)

      '
  - metavariable-regex:
      metavariable: $ALIAS
      regex: ^(?!sdk$).*types.*$
  metadata:
    nr_refactored_patterns: 98
    nr_legacy_patterns: 0
  paths:
    include:
    - x/**/*.go
    - simapp/*.go
    - baseapp/*.go
