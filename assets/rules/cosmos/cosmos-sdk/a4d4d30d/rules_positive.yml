rules:
- id: storetypes-all-test-files
  message: 'Refactoring detected: Test files using storetypes'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: storetypes.NewKVStoreKey($N)
    - pattern: storetypes.NewInfiniteGasMeter()
    - pattern: storetypes.NewGasMeter($L)
    - pattern: storetypes.NewTransientStoreKey($N)
    - pattern: "func $F($S storetypes.KVStore, ...) $R {\n  ...\n}"
  metadata:
    nr_refactored_patterns: 234
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
    exclude:
    - '**/store/**'
    - '**/x/staking/migrations/v4/migrations_test.go'
  options:
    symbolic_propagation: true
- id: storetypes-import-with-kvstorekey-usage
  message: 'Refactoring detected: File imports storetypes and uses it for KVStoreKey'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: storetypes.NewKVStoreKey($NAME)
  metadata:
    nr_refactored_patterns: 133
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/store/**'
    - '**/runtime/**'
  options:
    symbolic_propagation: true
- id: storetypes-import-with-transient-key-usage
  message: 'Refactoring detected: File uses storetypes for TransientStoreKey'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: storetypes.NewTransientStoreKey($NAME)
  metadata:
    nr_refactored_patterns: 89
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/store/**'
    - '**/runtime/**'
  options:
    symbolic_propagation: true
- id: storetypes-import-with-iterator-usage
  message: 'Refactoring detected: File uses storetypes for iterator functions'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: storetypes.KVStorePrefixIterator($STORE, $PREFIX)
    - pattern: storetypes.KVStoreReversePrefixIterator($STORE, $PREFIX)
  metadata:
    nr_refactored_patterns: 65
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/store/**'
    - '**/types/store.go'
  options:
    symbolic_propagation: true
- id: storetypes-any-method-kvstore-param
  message: 'Refactoring detected: Any method with storetypes.KVStore param'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R $T) $M($S storetypes.KVStore, ...) $RET {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/store/**'
  options:
    symbolic_propagation: true
- id: storetypes-gasmeter-usage-exclude-context
  message: 'Refactoring detected: storetypes GasMeter usage'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: storetypes.NewGasMeter($LIMIT)
    - pattern: storetypes.NewInfiniteGasMeter()
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/store/**'
    - '**/runtime/**'
    - '**/types/context.go'
  options:
    symbolic_propagation: true
- id: storetypes-iterator-return-type
  message: 'Refactoring detected: Function returns storetypes.Iterator'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func $FUNC(...) storetypes.Iterator {\n  ...\n}\n"
    - pattern: "func ($RECV) $METHOD(...) storetypes.Iterator {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/store/**'
  options:
    symbolic_propagation: true
- id: storetypes-kvstore-return-type
  message: 'Refactoring detected: Function returns storetypes.KVStore'
