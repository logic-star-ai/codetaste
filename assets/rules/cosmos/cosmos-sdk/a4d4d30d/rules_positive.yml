- id: storetypes-infinite-gasmeter-assignment-not-sdk
  message: 'Refactoring detected: NewInfiniteGasMeter from storetypes, not sdk'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $VAR = $ALIAS.NewInfiniteGasMeter()
  - metavariable-regex:
      metavariable: $ALIAS
      regex: ^(?!sdk$)[a-zA-Z_][a-zA-Z0-9_]*$
  - pattern-not-inside: 'import sdk "github.com/cosmos/cosmos-sdk/types"

      ...

      $VAR = sdk.NewInfiniteGasMeter()

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
