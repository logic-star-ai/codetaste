rules:
- id: refactor-storetypes-function-call-excluding-existing
  message: Detected storetypes function call - refactoring applied
  severity: INFO
  languages:
  - go
  pattern: storetypes.$FUNC(...)
  metadata:
    category: api
    nr_refactored_patterns: 321
    nr_legacy_patterns: 0
  paths:
    exclude:
    - types/store.go
    - types/context.go
    - store/types/*
    - runtime/*
    - server/mock/store.go
    - x/capability/keeper/keeper.go
    - x/capability/capability_test.go
    - x/group/internal/orm/testsupport.go
- id: refactor-storetypes-all-function-calls
