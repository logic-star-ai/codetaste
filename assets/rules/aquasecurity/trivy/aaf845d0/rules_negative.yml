  severity: WARNING
  languages:
  - go
  pattern: types.SecurityCheckVulnerability
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: detect-securitycheck-constant-ref-config
  message: Constant reference 'types.SecurityCheckConfig' should be 'types.MisconfigScanner'
