rules:
- id: detect-securitycheck-in-function-docs
  message: Reference to 'SecurityCheck' type in comments should be updated to 'Scanner'
  severity: WARNING
  languages:
  - go
  pattern-regex: SecurityCheck[^s]
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 133
- id: detect-securitycheck-constants-usage
  message: Reference to types.SecurityCheck* constant should use new types.*Scanner
    constant
  severity: WARNING
  languages:
  - go
  pattern-regex: types\.SecurityCheck(Unknown|Vulnerability|Config|Secret|Rbac|License)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: detect-security-checks-in-markdown-flag
  message: Flag '--security-checks' in documentation should be updated to '--scanners'
  severity: WARNING
  languages:
  - generic
  pattern-regex: --security-checks
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
  paths:
    include:
    - '*.md'
- id: detect-securitycheck-array-literal-multiple
  message: String slice containing SecurityCheck constants should use new Scanner
    constants
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: '[]string{types.SecurityCheckVulnerability, ...}

      '
  - pattern: '[]string{types.SecurityCheckConfig, ...}

      '
  - pattern: '[]string{types.SecurityCheckSecret, ...}

      '
  - pattern: '[]string{types.SecurityCheckRbac, ...}

      '
  - pattern: '[]string{types.SecurityCheckLicense, ...}

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: detect-securitychecks-field-access
  message: Field access '.SecurityChecks' should be updated to '.Scanners'
  severity: WARNING
  languages:
  - go
  pattern: $OBJ.SecurityChecks
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: detect-securitycheck-constant-ref-vuln
