rules:
- id: vulnerability-scanner-usage
  message: Detected VulnerabilityScanner usage (refactored from SecurityCheckVulnerability)
  severity: INFO
  languages:
  - go
  pattern-regex: VulnerabilityScanner
  metadata:
    category: basic
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
- id: scanners-cli-flag-usage
  message: Detected --scanners flag in CLI usage example (refactored from --security-checks)
  severity: INFO
  languages:
  - generic
  pattern-regex: --scanners\s+(vuln|config|secret|rbac|license)
  metadata:
    category: api
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
- id: misconfig-scanner-usage
  message: Detected MisconfigScanner usage (refactored from SecurityCheckConfig)
  severity: INFO
  languages:
  - go
  pattern-regex: MisconfigScanner
  metadata:
    category: basic
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
- id: scanners-flag-with-values
  message: Detected --scanners flag with specific values (refactored from --security-checks)
  severity: INFO
  languages:
  - generic
  pattern-regex: --scanners\s+(vuln|config|secret|license|rbac)(?:,\s*(?:vuln|config|secret|license|rbac))*
  metadata:
    category: api
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
- id: scanners-option-field-access
  message: Detected access to Scanners field (refactored from SecurityChecks)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.Scanners
  - pattern-not-inside: "type $TYPE struct {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
- id: scanner-slice-comparison
  message: Detected slices.Contains with Scanner constant (refactored from SecurityCheck)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'if slices.Contains($SCANNERS, types.$SCANNER) { ... }

        '
    - pattern: 'slices.Contains($SCANNERS, types.$SCANNER)

        '
  - metavariable-pattern:
      metavariable: $SCANNER
      pattern-regex: (Vulnerability|Misconfig|Secret|License|Rbac)?Scanner
  metadata:
    category: basic
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: scanners-comparison-in-slice
  message: Detected slice contains check on scanners (refactored from securityChecks)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: slices.Contains($SCANNERS, $VALUE)
  - metavariable-pattern:
      metavariable: $SCANNERS
      pattern-regex: '[Ss]canners?'
  metadata:
    category: basic
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: scanners-variable-in-function-call
  message: Detected Scanners field passed to function (refactored from SecurityChecks)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $FUNC(..., $VAR.Scanners, ...)
  metadata:
    category: basic
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: scanners-cli-example
  message: Detected trivy command with --scanners flag (refactored from --security-checks)
  severity: INFO
  languages:
  - generic
  pattern-regex: trivy\s+\w+\s+--scanners
  metadata:
    category: other
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: scanners-option-return
