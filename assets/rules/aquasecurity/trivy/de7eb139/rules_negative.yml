rules:
- id: scanner-scanner-return-type
  message: Return type 'scanner.Scanner' should be changed to 'scan.Service'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $FUNC(...) scanner.Scanner { ... }
    - pattern: func $FUNC(...) (scanner.Scanner, ...) { ... }
    - pattern: func ($RECV $TYPE) $FUNC(...) scanner.Scanner { ... }
    - pattern: func ($RECV $TYPE) $FUNC(...) (scanner.Scanner, ...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: scanner-scanner-composite-literal
  message: Composite literal 'scanner.Scanner{...}' should use 'scan.Service{...}'
    instead
  severity: WARNING
  languages:
  - go
  pattern: scanner.Scanner{...}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: scanner-scanner-named-return
  message: Named return 'scanner.Scanner' should be changed to 'scan.Service'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $FUNC(...) (scanner scanner.Scanner) { ... }
    - pattern: func $FUNC(...) (scanner scanner.Scanner, ...) { ... }
    - pattern: func ($RECV $TYPE) $FUNC(...) (scanner scanner.Scanner) { ... }
    - pattern: func ($RECV $TYPE) $FUNC(...) (scanner scanner.Scanner, ...) { ...
        }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: scanner-scanner-zero-value-return
  message: Return of zero value 'scanner.Scanner{}' should be changed to 'scan.Service{}'
  severity: WARNING
  languages:
  - go
  pattern: return scanner.Scanner{}, ...
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: initialize-scanner-function-name
  message: Function name should be changed from 'initialize*Scanner' to 'initialize*ScanService'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-regex: func (initialize\w*Scanner)\(
  - pattern-not-regex: func initialize\w*ScanService\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: local-scanner-method-receiver
  message: Method receiver 'Scanner' in local package should be renamed to 'Service'
  severity: WARNING
  languages:
  - go
  pattern: func ($RECV Scanner) $METHOD(...) $RET { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - pkg/scanner/local/scan.go
- id: client-scanneroption-param-type
  message: Parameter type 'client.ScannerOption' should be changed to 'client.ServiceOption'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $FUNC(..., $PARAM client.ScannerOption, ...) $RET { ... }
    - pattern: func ($RECV $TYPE) $FUNC(..., $PARAM client.ScannerOption, ...) $RET
        { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: scanner-scan-method-call-local
  message: Method call 'Scan' in local package - ensure scanner type is renamed from
    Scanner to Service
  severity: WARNING
  languages:
  - go
  pattern: $SCANNER.Scan(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - pkg/scanner/local/*.go
- id: local-scanner-composite-literal
  message: Composite literal 'local.Scanner{...}' should use 'local.Service{...}'
    instead
  severity: WARNING
  languages:
  - go
  pattern: local.Scanner{...}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: wire-bind-with-driver-type
  message: Wire binding uses old 'Driver' type, should use 'Backend' type
  severity: WARNING
  languages:
  - go
  pattern: wire.Bind(new(Driver), ...)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - pkg/scanner/scan.go
- id: package-scanner-declaration
  message: Package 'scanner' should be renamed to 'scan' and moved to pkg/scan/
  severity: WARNING
  languages:
  - go
  pattern-regex: \Apackage scanner\s
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - pkg/scanner/*.go
