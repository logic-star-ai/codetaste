    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: tracee-refactor-string-ops-in-common-tests
  message: Test file references string utility functions that should be in common/stringutil
    package.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: TrimTrailingNUL(...)
    - pattern: ReverseString(...)
  - pattern-inside: 'package common

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - common/*_test.go
