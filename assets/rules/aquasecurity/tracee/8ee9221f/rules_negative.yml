rules:
- id: tracee-refactor-qualified-common-call-patterns
  message: Functions called via 'common' package should be migrated to specific packages
    (bitwise, hash, stringutil, timeutil, etc.).
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.HasBit(...)
    - pattern: $PKG.ClearBit(...)
    - pattern: $PKG.SetBit(...)
    - pattern: $PKG.ClearBits(...)
    - pattern: $PKG.HashTaskID(...)
    - pattern: $PKG.TrimTrailingNUL(...)
    - pattern: $PKG.ReverseString(...)
    - pattern: $PKG.Min(...)
    - pattern: $PKG.Max(...)
    - pattern: $PKG.GenerateRandomDuration(...)
    - pattern: $PKG.RoundToClosestN(...)
  - metavariable-pattern:
      metavariable: $PKG
      pattern: common
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 67
- id: tracee-refactor-common-hashtaskid-usage
  message: HashTaskID should be moved from 'common' to 'hash' package. Use 'hash.HashTaskID'
    instead.
  severity: WARNING
  languages:
  - go
  pattern: common.HashTaskID(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: tracee-refactor-hash-assignment
  message: 'HashTaskID should use ''hash'' package. Change to: hash.HashTaskID($ARG1,
    $ARG2)'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$VAR = common.HashTaskID($ARG1, $ARG2)

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: tracee-refactor-bitwise-ops-multi-line
  message: Bitwise operations should use 'bitwise' package. Change common.* to bitwise.*
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "common.SetBit(\n  $VAR,\n  $OFFSET,\n)\n"
    - pattern: "common.ClearBit(\n  $VAR,\n  $OFFSET,\n)\n"
    - pattern: "common.HasBit(\n  $VAR,\n  $OFFSET,\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: tracee-refactor-hash-in-struct-field-assignment
  message: 'HashTaskID should use ''hash'' package in struct field assignments. Change
    to: hash.HashTaskID($ARG1, $ARG2)'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$STRUCT.$FIELD = common.HashTaskID($ARG1, $ARG2)

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: tracee-refactor-hashtaskid-uint32-cast
  message: 'HashTaskID should use ''hash'' package. Change to: hash.HashTaskID(uint32($ARG1),
    $ARG2)'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: common.HashTaskID(uint32($ARG1), $ARG2)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: tracee-refactor-hashtaskid-feed-fields
  message: 'HashTaskID assignment to feed hash fields should use ''hash'' package.
    Change to: hash.HashTaskID(...)'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $FEED.ParentHash = common.HashTaskID($PID, $TIME)
    - pattern: $FEED.LeaderHash = common.HashTaskID($PID, $TIME)
    - pattern: $FEED.ChildHash = common.HashTaskID($PID, $TIME)
    - pattern: $FEED.TaskHash = common.HashTaskID($PID, $TIME)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: tracee-refactor-common-clearbit-usage
  message: ClearBit should be moved from 'common' to 'bitwise' package. Use 'bitwise.ClearBit'
    instead.
  severity: WARNING
  languages:
  - go
  pattern: common.ClearBit(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: tracee-refactor-common-setbit-usage
  message: SetBit should be moved from 'common' to 'bitwise' package. Use 'bitwise.SetBit'
    instead.
  severity: WARNING
  languages:
  - go
  pattern: common.SetBit(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: tracee-refactor-common-trimtrailingnul-usage
  message: TrimTrailingNUL should be moved from 'common' to 'stringutil' package.
    Use 'stringutil.TrimTrailingNUL' instead.
  severity: WARNING
  languages:
  - go
  pattern: common.TrimTrailingNUL(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: tracee-refactor-string-conversion-trimtrailingnul
  message: 'TrimTrailingNUL should use ''stringutil'' package. Change to: string(stringutil.TrimTrailingNUL($DATA))'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'string(common.TrimTrailingNUL($DATA))

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: tracee-refactor-common-hasbit-usage
  message: HasBit should be moved from 'common' to 'bitwise' package. Use 'bitwise.HasBit'
    instead.
  severity: WARNING
  languages:
  - go
  pattern: common.HasBit(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: tracee-refactor-hash-inline-usage
  message: 'HashTaskID should use ''hash'' package. Change to: hash.HashTaskID($ARG1,
    $ARG2)'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$VAR := common.HashTaskID($ARG1, $ARG2)

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: tracee-refactor-environment-kernelsymbols-getsymbolbyname
  message: KernelSymbolTable methods should use 'symbols' package from pkg/symbols
    instead of 'environment'.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $OBJ.GetSymbolByName(...)
  - pattern-inside: "import (\n  ...\n  \"github.com/aquasecurity/tracee/common/environment\"\
      \n  ...\n)\n...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: tracee-refactor-kernelsymboltable-atomic-store
  message: Atomic operations with KernelSymbolTable should use pkg/symbols package
    instead of 'environment'.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $OBJ.Store($VAR)
  - pattern-inside: "import (\n  ...\n  \"github.com/aquasecurity/tracee/common/environment\"\
      \n  ...\n)\n...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: tracee-refactor-hashtaskid-threadorprocessentityid
  message: 'HashTaskID assignment to entity ID fields should use ''hash'' package.
    Change to: hash.HashTaskID(...)'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $EVT.ThreadEntityId = common.HashTaskID($TID, $TIME)
    - pattern: $EVT.ProcessEntityId = common.HashTaskID($PID, $TIME)
    - pattern: $EVT.ParentEntityId = common.HashTaskID($PPID, $TIME)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: tracee-refactor-kernelsymboltable-param
  message: KernelSymbolTable parameters should use 'symbols' package from pkg/symbols
    instead of 'environment'.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func $FUNC(..., $PARAM *environment.KernelSymbolTable, ...) $RET {\n\
        \  ...\n}\n"
    - pattern: "func $FUNC(..., $PARAM environment.KernelSymbolTable, ...) $RET {\n\
        \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: tracee-refactor-min-max-assignment
  message: Min/Max should be moved to a more specific package or use standard library
    alternatives.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '$VAR = common.Min($X, $Y)

        '
    - pattern: '$VAR = common.Max($X, $Y)

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: tracee-refactor-setbit-uint-cast
  message: 'SetBit should use ''bitwise'' package. Change to: bitwise.SetBit($VAR,
    uint($OFFSET))'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: common.SetBit($VAR, uint($OFFSET))
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: tracee-refactor-hashtaskid-uint64-cast
  message: 'HashTaskID should use ''hash'' package. Change to: hash.HashTaskID($ARG1,
    uint64($ARG2))'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: common.HashTaskID($ARG1, uint64($ARG2))
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: tracee-refactor-common-package-doc-comment
  message: Package documentation in common.go references functions that should be
    in separate packages (bitwise, hash, stringutil).
  severity: INFO
  languages:
  - go
  pattern-regex: ^// Package common.*bitwise|hash|string
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - common/common.go
- id: tracee-refactor-hasbit-with-mask-constant
  message: 'HasBit with constant should use ''bitwise'' package. Change to: bitwise.HasBit($VAR,
    $CONST)'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: common.HasBit($VAR, $CONST)
  - metavariable-pattern:
      metavariable: $CONST
      pattern-regex: ^[A-Z_0-9]+$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: tracee-refactor-common-generaterandomduration-usage
