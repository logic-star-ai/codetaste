rules:
- id: symbols-any-code-line
  message: Detected any code line in pkg/symbols package
  severity: INFO
  languages:
  - go
  pattern-regex: (?m)^\s*[a-zA-Z_].*$
  metadata:
    nr_refactored_patterns: 459
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/symbols/*.go'
    exclude:
    - '**/common/**'
- id: symbols-package-comment
  message: Detected package comment for symbols package
  severity: INFO
  languages:
  - go
  pattern-regex: (?i)(package symbols|kernel.*symbol|symbol.*table)
  metadata:
    nr_refactored_patterns: 97
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/symbols/*.go'
- id: hash-dataflow-to-log
  message: Detected hash result flowing to logging
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $PKG.HashTaskID(...)
    - pattern-not: common.HashTaskID(...)
  pattern-sinks:
  - pattern: $LOG.$METHOD(..., $SINK, ...)
  metadata:
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
- id: multiple-new-package-imports
  message: Detected file importing multiple new packages from refactoring
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: import "$PKG1"
  - metavariable-regex:
      metavariable: $PKG1
      regex: .*github\.com/aquasecurity/tracee/common/(bitwise|hash|stringutil|interfaces|fileutil).*
  - pattern-inside: 'import "$PKG2"

      ...

      '
  - metavariable-regex:
      metavariable: $PKG2
      regex: .*github\.com/aquasecurity/tracee/common/(bitwise|hash|stringutil|interfaces|fileutil).*
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
- id: hash-taskid-dataflow-to-variable
  message: Detected data flow from HashTaskID to variable assignment
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $PKG.HashTaskID(...)
    - pattern-not: common.HashTaskID(...)
  pattern-sinks:
  - pattern: $VAR = $SINK
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: hash-hashtaskid-usage
  message: Detected usage of HashTaskID from hash package indicating refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.HashTaskID(...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(?!common$).*$
  - pattern-not: common.HashTaskID(...)
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: fileutil-package-comment
  message: Detected package comment for fileutil package
  severity: INFO
  languages:
  - go
  pattern-regex: (?i)(package fileutil|file.*util|protected.*reader)
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/common/fileutil/*.go'
- id: import-interfaces-package
  message: Detected import from new common/interfaces package indicating refactoring
    applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*github\.com/aquasecurity/tracee/common/interfaces.*
