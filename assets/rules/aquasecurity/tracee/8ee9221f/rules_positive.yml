  message: Detected fileutil package with reader functionality merged from read package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC(...) $RET { ... }
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^NewProtectedReader$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/common/fileutil/**/*.go'
    exclude:
    - '**/vendor/**'
    - '**/common/read/**'
- id: fileutil-test-file-with-merged-content
  message: Detected test file for fileutil package with merged functionality
