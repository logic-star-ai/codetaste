  pattern: package $PKG
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/common/stringutil/*.go'
    exclude:
    - '**/vendor/**'
- id: stringutil-go-file-exists
  message: Detected Go file in stringutil package directory
  severity: INFO
  languages:
