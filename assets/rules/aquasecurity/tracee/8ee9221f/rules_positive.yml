- id: protected-reader-type-usage
  message: Detected protectedReader type usage in fileutil
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: type $NAME struct { ... }
    - pattern: func ($RECV $TYPE) $METHOD(...) $RET { ... }
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*protected.*reader.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
