rules:
- id: hash-dataflow-to-variable
  message: Detected hash function result stored in variable from refactored package
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $PKG.$FUNC(...)
    - metavariable-regex:
        metavariable: $FUNC
        regex: ^(Hash|Murmur).*$
    - metavariable-regex:
        metavariable: $PKG
        regex: ^(?!common$)[a-z]+$
  pattern-sinks:
  - pattern: $VAR = $SINK
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: hash-function-call-pattern
  message: Detected hash function call from refactored package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(?!common$)[a-z]+$
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(HashTaskID|HashU32AndU64|Murmur32)$
  - pattern-not: common.$FUNC(...)
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: bitwise-function-call-pattern
  message: Detected bitwise function call from refactored package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(?!common$)[a-z]+$
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(HasBit|ClearBit|ClearBits|SetBit)$
  - pattern-not: common.$FUNC(...)
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: import-statement-new-interfaces
  message: Detected import statement for new interfaces package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'import "$PATH"

        '
    - pattern: "import (\n  ...\n  \"$PATH\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/tracee/common/interfaces$
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
- id: stringutil-package-comment
  message: Detected package comment for stringutil package
  severity: INFO
  languages:
  - go
  pattern-regex: ^//.*
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/common/stringutil/*.go'
    exclude:
    - '**/vendor/**'
- id: string-trim-function-refactored
  message: Detected string manipulation function from refactored package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC($ARG)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(?!common$)[a-z]+$
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(TrimTrailingNUL|ReverseString)$
  - pattern-not: common.$FUNC(...)
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: import-statement-new-bitwise
  message: Detected import statement for new bitwise package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'import "$PATH"

        '
    - pattern: "import (\n  ...\n  \"$PATH\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/tracee/common/bitwise$
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
- id: symbols-kernel-symbol-table-in-pkg
  message: Detected KernelSymbolTable in pkg/symbols location
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: type KernelSymbolTable struct { ... }
    - pattern: func $FUNC(...) *KernelSymbolTable { ... }
    - pattern: func ($RECV *KernelSymbolTable) $METHOD(...) $RET { ... }
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/symbols/**/*.go'
    exclude:
    - '**/vendor/**'
    - '**/common/environment/**'
- id: fileutil-import-statement
  message: Detected import from fileutil package with merged functionality
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: import "$PATH"
    - pattern: "import (\n  ...\n  \"$PATH\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/common/fileutil$
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
- id: import-statement-new-hash
  message: Detected import statement for new hash package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'import "$PATH"

        '
    - pattern: "import (\n  ...\n  \"$PATH\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/tracee/common/hash$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
- id: import-pkg-symbols-base
  message: Detected import from pkg/symbols base path
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: import "$PATH"
    - pattern: "import (\n  ...\n  \"$PATH\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/pkg/symbols$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
- id: function-call-chain-with-hash
  message: Detected function call chain with hash function from refactored package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.$METHOD(..., $PKG.$FUNC(...), ...)
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(Hash|Murmur).*$
  - pattern-not: $OBJ.$METHOD(..., common.$FUNC(...), ...)
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: import-statement-new-stringutil
  message: Detected import statement for new stringutil package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'import "$PATH"

        '
    - pattern: "import (\n  ...\n  \"$PATH\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/tracee/common/stringutil$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
- id: multiple-new-package-imports
  message: Detected multiple imports from new refactored package structure
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "import (\n  ...\n  \"$PKG1\"\n  ...\n  \"$PKG2\"\n  ...\n)\n"
    - pattern: 'import "$PKG1"

        ...

        import "$PKG2"

        '
  - metavariable-regex:
      metavariable: $PKG1
      regex: .*/common/(bitwise|hash|interfaces|stringutil)$
  - metavariable-regex:
      metavariable: $PKG2
      regex: .*/common/(bitwise|hash|interfaces|stringutil)$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
- id: symbols-package-in-pkg-dir
  message: Detected symbols package moved to pkg directory
  severity: INFO
  languages:
  - go
  pattern: package $PKG
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/symbols/**/*.go'
    exclude:
    - '**/vendor/**'
    - '**/common/environment/**'
- id: bitwise-function-definition-in-package
  message: Detected bit manipulation function defined in bitwise package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func HasBit($N uint64, $OFF uint) bool { ... }

        '
    - pattern: 'func SetBit($N *uint64, $OFF uint) { ... }

        '
    - pattern: 'func ClearBit($N *uint64, $OFF uint) { ... }

        '
    - pattern: 'func ClearBits($N *uint64, $M uint64) { ... }

        '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/common/bitwise/*.go'
    exclude:
    - '**/vendor/**'
    - '**/common/common.go'
- id: symbols-go-file-in-pkg
  message: Detected Go file in pkg/symbols directory
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/symbols/*.go'
    exclude:
    - '**/vendor/**'
    - '**/common/environment/kernel_symbols.go'
- id: bitwise-package-comment
  message: Detected package comment for bitwise package
  severity: INFO
  languages:
  - go
  pattern-regex: ^//.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
