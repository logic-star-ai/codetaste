    - '**/pkg/symbols/*.go'
    exclude:
    - '**/common/**'
- id: bitwise-function-definitions
  message: Detected bit manipulation function definitions in bitwise package
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: func $FUNC($N uint64, $OFFSET uint) bool { ... }
  - pattern: func $FUNC($N *uint64, $OFFSET uint) { ... }
  - pattern: func $FUNC($N *uint64, $MASK uint64) { ... }
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/common/bitwise/*.go'
- id: symbols-file-in-pkg-symbols-dir
