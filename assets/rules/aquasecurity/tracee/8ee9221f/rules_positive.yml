- id: symbols-pointer-type-param
  message: Detected symbols package type as function parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC(..., $PARAM *$PKG.$TYPE, ...) $RET { ... }
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(?!environment$).*$
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(symbol|ksym).*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: hash-dataflow-to-return
  message: Detected data flow from hash function to return statement
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $PKG.HashTaskID(...)
    - pattern-not: common.HashTaskID(...)
  pattern-sinks:
  - pattern: return $SINK
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: symbols-package-declaration
  message: Detected package declaration for symbols package in pkg/
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: package $PKG
  - metavariable-regex:
      metavariable: $PKG
      regex: ^symbols$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
