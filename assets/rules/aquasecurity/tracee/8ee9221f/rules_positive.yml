    - '**/common/interfaces/*.go'
    exclude:
    - '**/vendor/**'
- id: interface-iterator-from-new-package
  message: Detected Iterator interface usage from refactored interfaces package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $TYPE interface {\n  ...\n  HasNext() bool\n  ...\n  Next() $RET\n\
      \  ...\n}\n"
  - pattern-not-inside: 'package common

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
    - '**/common/common.go'
- id: fileutil-protected-reader-usage
  message: Detected NewProtectedReader from fileutil package indicating read package
    merged
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.NewProtectedReader(...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(?!read$).*util.*$
  - pattern-not: read.NewProtectedReader(...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: bitwise-package-declaration
  message: Detected package declaration for new bitwise package
  severity: INFO
  languages:
  - go
  pattern: package $PKG
