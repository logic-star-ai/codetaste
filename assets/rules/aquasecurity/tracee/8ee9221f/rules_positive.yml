    - '**/common/fileutil/*.go'
    exclude:
    - '**/vendor/**'
    - '**/common/read/**'
- id: symbols-type-usage-from-pkg
  message: Detected KernelSymbol type usage from pkg/symbols package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: var $VAR *$PKG.$TYPE
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(?!environment$)[a-z]+$
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^KernelSymbol.*$
  - pattern-not: var $VAR *environment.$TYPE
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
    - '**/common/environment/**'
- id: stringutil-function-definition-in-package
  message: Detected string utility function defined in stringutil package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func TrimTrailingNUL($B []byte) []byte { ... }

        '
    - pattern: 'func ReverseString($S string) string { ... }

        '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/common/stringutil/*.go'
    exclude:
    - '**/vendor/**'
    - '**/common/common.go'
- id: protected-reader-in-fileutil
  message: Detected ProtectedReader functionality in fileutil package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: type protectedReader struct { ... }
    - pattern: func NewProtectedReader($DATA []byte) $RET { ... }
