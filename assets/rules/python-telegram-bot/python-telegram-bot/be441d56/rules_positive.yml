- id: basepersistence-new-with-multiple-assignments
  message: BasePersistence __new__ has multiple setattr calls before return (refactoring
    applied)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "def __new__(cls, *args, **kwargs):\n    ...\n"
  - pattern: 'setattr(instance, $M1, $F1)

      ...

      setattr(instance, $M2, $F2)

      ...

      return instance

      '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
