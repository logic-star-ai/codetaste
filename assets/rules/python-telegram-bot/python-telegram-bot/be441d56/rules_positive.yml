rules:
- id: basepersistence-assigns-multiple-methods
  message: BasePersistence __new__ assigns multiple methods via setattr (refactoring
    applied)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "class BasePersistence(...):\n    ...\n    def __new__($CLS, ...):\n\
      \        ...\n"
  - pattern: 'setattr($INST, $METHOD1, $FUNC1)

      ...

      setattr($INST, $METHOD2, $FUNC2)

      '
  metadata:
    category: api
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - telegram/ext/basepersistence.py
- id: basepersistence-eight-setattr-calls
  message: BasePersistence __new__ has multiple setattr calls (refactoring applied)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "def __new__(cls, ...):\n    ...\n"
  - pattern: 'setattr($INST, $M1, $F1)

      ...

      setattr($INST, $M2, $F2)

      ...

      setattr($INST, $M3, $F3)

      ...

      setattr($INST, $M4, $F4)

      '
  metadata:
    category: api
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - telegram/ext/basepersistence.py
- id: basepersistence-uses-setattr-not-object-setattr
  message: BasePersistence __new__ uses setattr instead of object.__setattr__ (refactoring
    applied)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "class BasePersistence(...):\n    ...\n"
  - pattern-inside: "def __new__(...):\n    ...\n"
  - pattern: setattr($INSTANCE, $ATTR, $VALUE)
  - pattern-not: object.__setattr__($INSTANCE, $ATTR, $VALUE)
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: basepersistence-setattr-on-instance
  message: BasePersistence __new__ uses setattr to replace methods on instance (refactoring
    applied)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "class BasePersistence(...):\n    ...\n    def __new__($CLS, ...):\n\
      \        ...\n"
  - pattern: setattr($INSTANCE, $METHOD_NAME, $FUNC)
  - metavariable-regex:
      metavariable: $METHOD_NAME
      regex: ^['"]((get|update)_(user|chat|bot)_data|get_callback_data|update_callback_data)['"]$
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: basepersistence-setattr-in-new
  message: BasePersistence __new__ uses setattr on instance (refactoring applied)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "def __new__(cls, ...):\n    ...\n"
  - pattern: setattr(instance, $METHOD, $FUNC)
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: basepersistence-all-method-assignments
  message: BasePersistence assigns wrapped methods via setattr (refactoring applied)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "def __new__(cls, *args, **kwargs):\n    ...\n"
  - pattern: setattr(instance, $METHOD, $WRAPPER)
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - telegram/ext/basepersistence.py
