    - pattern: setattr($INST, 'get_chat_data', $FUNC)
    - pattern: setattr($INST, 'get_bot_data', $FUNC)
    - pattern: setattr($INST, 'update_user_data', $FUNC)
    - pattern: setattr($INST, 'update_chat_data', $FUNC)
    - pattern: setattr($INST, 'update_bot_data', $FUNC)
