- id: slots-dict-only-tuple
  message: Remove __slots__ = ('__dict__',) - use specific attribute slots instead
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: '__slots__ = (''__dict__'',)

        '
    - pattern: '__slots__ = ("__dict__",)

        '
  - pattern-not-inside: "class BasePersistence:\n  ...\n"
  - pattern-not-inside: "class Dispatcher:\n  ...\n"
  - pattern-not-inside: "class CallbackContext:\n  ...\n"
