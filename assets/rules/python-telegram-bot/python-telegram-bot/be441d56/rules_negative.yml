rules:
- id: slots-with-id-attrs-generic-regex
  message: Remove '_id_attrs' from __slots__ in subclasses - inherited from TelegramObject
  severity: WARNING
  languages:
  - python
  pattern-regex: __slots__\s*=\s*\([^)]*['"]_id_attrs['"][^)]*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 71
  paths:
    exclude:
    - telegram/base.py
- id: any-id-attrs-root-telegram-module
  message: Remove '_id_attrs' from __slots__ in telegram root module classes - inherited
    from TelegramObject
  severity: WARNING
  languages:
  - python
  pattern-regex: __slots__\s*=\s*\([^)]*['"]_id_attrs['"][^)]*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - telegram/*.py
    exclude:
    - telegram/base.py
- id: set-new-attribute-deprecated-usage
  message: Remove usage of set_new_attribute_deprecated - this deprecation system
    has been removed
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: set_new_attribute_deprecated($OBJ, $KEY, $VALUE)
  - pattern: 'from telegram.utils.deprecate import set_new_attribute_deprecated

      '
  - pattern: 'from telegram.utils.deprecate import $...IMPORTS, set_new_attribute_deprecated,
      $...MORE

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: setattr-with-deprecate-call-any
  message: Remove __setattr__ method that calls set_new_attribute_deprecated
  severity: WARNING
  languages:
  - python
  pattern: "def __setattr__($SELF, $KEY, $VALUE):\n  ...\n  set_new_attribute_deprecated($...ARGS)\n\
    \  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
