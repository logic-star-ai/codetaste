    - pattern: import "$PATH"
    - pattern: "import (\n  ...\n  \"$PATH\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PATH
      regex: ^github\.com/hashicorp/consul/troubleshoot/(validate|proxy).*$
