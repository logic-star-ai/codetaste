rules:
- id: any-line-in-troubleshoot-go-mod
  message: Detected any line in troubleshoot go.mod
  severity: INFO
  languages:
  - generic
  pattern-regex: .*
  metadata:
    nr_refactored_patterns: 102
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/troubleshoot/go.mod'
- id: multiline-require-in-go-mod
  message: Detected multi-line require block content in new go.mod
  severity: INFO
  languages:
  - generic
  pattern-regex: ^\t
  metadata:
    nr_refactored_patterns: 71
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/go.mod'
    - '**/troubleshoot/go.mod'
- id: github-com-in-go-mod-require
  message: Detected github.com dependency in new go.mod
  severity: INFO
  languages:
  - generic
  pattern-regex: github\.com/
  metadata:
    nr_refactored_patterns: 64
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/go.mod'
    - '**/troubleshoot/go.mod'
- id: comment-in-new-xdscommon
  message: Detected comment in new xdscommon location
  severity: INFO
  languages:
  - go
  pattern-regex: //.*
  metadata:
    nr_refactored_patterns: 63
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/xdscommon/*.go'
    exclude:
    - '**/agent/xds/xdscommon/**'
    - '**/agent/xds/proxysupport/**'
- id: indirect-comment-in-go-mod
  message: Detected indirect comment in go.mod dependencies
  severity: INFO
  languages:
  - generic
  pattern-regex: // indirect
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/go.mod'
    - '**/troubleshoot/go.mod'
- id: import-statement-count-increase
  message: Detected file importing from new module paths
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"$PATH\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PATH
      regex: github\.com/hashicorp/consul/(envoyextensions|troubleshoot)/.*
  metadata:
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: type-conversion-in-new-modules
  message: Detected type conversion in new modules
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TYPE($VAL)
  metadata:
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/**/*.go'
    exclude:
    - '**/agent/envoyextensions/**'
    - '**/vendor/**'
- id: import-from-new-xdscommon-module
  message: Detected import from new envoyextensions/xdscommon module path
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PATH"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/envoyextensions/xdscommon.*
  - pattern-not: import "github.com/hashicorp/consul/agent/xds/xdscommon"
  - pattern-not: import "github.com/hashicorp/consul/agent/envoyextensions/xdscommon"
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: file-moved-to-troubleshoot-validate
  message: Detected file content pattern in troubleshoot/validate (moved from agent)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func $FUNC(...) {\n  ...\n}\n"
    - pattern: "type $TYPE struct {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/troubleshoot/validate/*.go'
    exclude:
    - '**/agent/envoyextensions/builtin/validate/**'
- id: import-from-new-extensioncommon-module
  message: Detected import from new envoyextensions/extensioncommon module path
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PATH"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/envoyextensions/extensioncommon.*
  - pattern-not: import "github.com/hashicorp/consul/agent/envoyextensions/extensioncommon"
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: circleci-envoyextensions-module-lint
  message: Detected CircleCI lint configuration for envoyextensions module
  severity: INFO
  languages:
  - yaml
  patterns:
  - pattern: '$KEY: $VAL

      '
  - metavariable-regex:
      metavariable: $VAL
      regex: (?i).*(envoyextensions|envoy.*extensions).*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/.circleci/*.yml'
    - '**/.circleci/*.yaml'
  options:
    symbolic_propagation: true
- id: circleci-troubleshoot-module-test
  message: Detected CircleCI test configuration for troubleshoot module
  severity: INFO
  languages:
  - yaml
  patterns:
  - pattern: '$KEY: $VAL

      '
  - metavariable-regex:
      metavariable: $VAL
      regex: (?i).*(troubleshoot).*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/.circleci/*.yml'
    - '**/.circleci/*.yaml'
  options:
    symbolic_propagation: true
- id: file-in-new-envoyextensions-xdscommon-path
  message: Detected Go file in new envoyextensions/xdscommon directory
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/xdscommon/**/*.go'
    exclude:
    - '**/agent/xds/xdscommon/**'
    - '**/agent/envoyextensions/xdscommon/**'
    - '**/vendor/**'
- id: package-declaration-in-new-xdscommon
  message: Detected package declaration in new envoyextensions/xdscommon path
  severity: INFO
  languages:
  - go
  pattern: package $PKG
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/xdscommon/*.go'
    exclude:
    - '**/agent/xds/xdscommon/**'
    - '**/vendor/**'
- id: closing-paren-in-go-mod-require
  message: Detected closing parenthesis of require block in new go.mod
  severity: INFO
  languages:
  - generic
  pattern-regex: ^\)
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/go.mod'
    - '**/troubleshoot/go.mod'
- id: file-in-new-envoyextensions-extensioncommon-path
  message: Detected Go file in new envoyextensions/extensioncommon directory
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/extensioncommon/**/*.go'
    exclude:
    - '**/agent/envoyextensions/extensioncommon/**'
    - '**/vendor/**'
- id: struct-composite-literal-with-pointer-upstream
  message: Detected composite literal assignment with pointer to UpstreamData
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "$VAR := $TYPE{\n  ...,\n  $FIELD: map[$KEY]*$UPTYPE{...},\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $UPTYPE
      regex: (?i).*upstream.*data.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: go-mod-require-block-start
  message: Detected require block in new module go.mod
  severity: INFO
  languages:
  - generic
  pattern-regex: ^require \(
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/go.mod'
    - '**/troubleshoot/go.mod'
- id: make-map-with-pointer-upstreamdata
  message: Detected make() call creating map with pointer UpstreamData values
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: make(map[$KEY]*$TYPE)
    - pattern: make(map[$KEY]*$TYPE, $SIZE)
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*upstream.*data.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: pointer-upstreamdata-map-assignment
  message: Detected map with pointer to UpstreamData values in assignment
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$MAP[$KEY] = &$VAL

      '
  - metavariable-regex:
      metavariable: $VAL
      regex: (?i).*upstream.*data.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: file-in-new-troubleshoot-validate-path
  message: Detected Go file in new troubleshoot/validate directory
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/troubleshoot/validate/**/*.go'
    exclude:
    - '**/agent/envoyextensions/builtin/validate/**'
    - '**/vendor/**'
- id: go-version-in-new-module-go-mod
  message: Detected go version specification in new module go.mod
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: go\s+\d+\.\d+
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/go.mod'
    - '**/troubleshoot/go.mod'
- id: combined-import-envoyextensions-and-troubleshoot
  message: Detected combined import of both envoyextensions and troubleshoot
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "import (\n  ...\n  \"$PATH1\"\n  ...\n  \"$PATH2\"\n  ...\n)\n"
    - pattern: 'import "$PATH1"

        ...

        import "$PATH2"

        '
  - metavariable-regex:
      metavariable: $PATH1
      regex: .*/envoyextensions/.*
  - metavariable-regex:
      metavariable: $PATH2
      regex: .*/troubleshoot/.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: empty-line-in-go-mod
  message: Detected formatting in new go.mod files
  severity: INFO
  languages:
  - generic
  pattern-regex: ^\s*$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/go.mod'
    - '**/troubleshoot/go.mod'
- id: new-troubleshoot-module-go-mod
  message: Detected new go.mod file in troubleshoot directory, indicating successful
    conversion to standalone module
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/troubleshoot/go.mod'
    exclude:
    - '**/vendor/**'
    - '**/node_modules/**'
- id: new-envoyextensions-module-go-mod
  message: Detected new go.mod file in envoyextensions directory, indicating successful
    creation of shared module
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/go.mod'
    exclude:
    - '**/vendor/**'
    - '**/node_modules/**'
- id: import-from-troubleshoot-validate
  message: Detected import from new troubleshoot/validate path
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PATH"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/troubleshoot/validate.*
  - pattern-not: import "github.com/hashicorp/consul/agent/envoyextensions/builtin/validate"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: upstreamdata-pointer-in-struct-field
  message: Detected struct field with map of pointer to UpstreamData
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $STRUCT struct {\n  ...\n  $FIELD map[$KEY]*$TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*upstream.*data.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: file-in-troubleshoot-root-go-mod
  message: Detected go.mod module declaration for troubleshoot
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: module\s+.*/troubleshoot
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/troubleshoot/go.mod'
- id: file-in-envoyextensions-root-go-mod
  message: Detected go.mod module declaration for envoyextensions
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: module\s+.*/envoyextensions
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/go.mod'
- id: replace-directive-for-envoyextensions
  message: Detected replace directive for envoyextensions in go.mod
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: replace\s+.*envoyextensions.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/go.mod'
- id: test-file-moved-validateupstream-test
  message: Detected test file in agent/xds/validateupstream-test location
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $TEST(t *testing.T) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/agent/xds/validateupstream-test/*.go'
- id: package-validateupstream-test-in-agent-xds
  message: Detected package declaration in validateupstream-test directory
  severity: INFO
  languages:
  - go
  pattern: package $PKG
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/agent/xds/validateupstream-test/*.go'
