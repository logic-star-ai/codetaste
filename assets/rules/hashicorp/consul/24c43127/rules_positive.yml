rules:
- id: xdscommon-package-usage-without-agent-path
  message: Detected xdscommon package reference from non-agent path import
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: xdscommon.$FUNC
    - pattern: xdscommon.$TYPE
  - pattern-not-inside: 'import "github.com/hashicorp/consul/agent/xds/xdscommon"

      ...

      '
  metadata:
    nr_refactored_patterns: 236
    nr_legacy_patterns: 0
- id: import-envoyextensions-xdscommon-single
  message: Detected import from new envoyextensions/xdscommon module
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PATH"
  - metavariable-regex:
      metavariable: $PATH
      regex: ^.*/consul/envoyextensions/xdscommon$
  - pattern-not: import "github.com/hashicorp/consul/agent/xds/xdscommon"
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: upstreamdata-pointer-in-map-initialization
  message: Detected UpstreamData pointer initialization in map literal
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: map[$KEY]*$TYPE{ ... }
    - pattern: $VAR := map[$KEY]*$TYPE{ ... }
    - pattern: $VAR = map[$KEY]*$TYPE{ ... }
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^.*upstream.*data.*$
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: import-envoyextensions-extensioncommon-single
  message: Detected import from new envoyextensions/extensioncommon module
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PATH"
  - metavariable-regex:
      metavariable: $PATH
      regex: ^.*/consul/envoyextensions/extensioncommon$
  - pattern-not: import "github.com/hashicorp/consul/agent/envoyextensions/extensioncommon"
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: proxy-files-in-troubleshoot
  message: Detected proxy-related files organized under troubleshoot/proxy
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/troubleshoot/proxy/*.go'
    exclude:
    - '**/command/**'
- id: xdscommon-files-in-envoyextensions
  message: Detected xdscommon files moved to envoyextensions directory
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/xdscommon/*.go'
    exclude:
    - '**/agent/**'
- id: extensioncommon-files-in-envoyextensions
  message: Detected extensioncommon files moved to envoyextensions directory
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/extensioncommon/*.go'
    exclude:
    - '**/agent/**'
- id: circleci-config-for-envoyextensions-module
  message: Detected CircleCI configuration for envoyextensions module
  severity: INFO
  languages:
  - yaml
  patterns:
  - pattern-regex: (?i).*envoyextensions.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/.circleci/**'
    - '**/circleci/**'
    - '**/.github/workflows/**'
- id: circleci-config-for-troubleshoot-module
  message: Detected CircleCI configuration for troubleshoot module
  severity: INFO
  languages:
  - yaml
  patterns:
  - pattern-regex: (?i).*troubleshoot.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/.circleci/**'
    - '**/circleci/**'
    - '**/.github/workflows/**'
- id: import-troubleshoot-proxy-single
  message: Detected import from new troubleshoot/proxy module
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PATH"
  - metavariable-regex:
      metavariable: $PATH
      regex: ^.*/consul/troubleshoot/proxy$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: validate-files-in-troubleshoot
  message: Detected validate files moved to troubleshoot directory
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/troubleshoot/validate/*.go'
    exclude:
    - '**/agent/**'
- id: new-envoyextensions-module-exists
  message: Detected new go.mod file in envoyextensions directory indicating standalone
    module creation
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/envoyextensions/go.mod'
    exclude:
    - '**/agent/envoyextensions/**'
- id: new-troubleshoot-module-exists
  message: Detected new go.mod file in troubleshoot directory indicating standalone
    module creation
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/troubleshoot/go.mod'
    exclude:
    - '**/command/troubleshoot/**'
- id: validateupstream-test-moved-to-agent-xds
  message: Detected validateupstream tests moved to agent/xds directory
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/agent/xds/validateupstream-test/**'
    - '**/agent/xds/*validateupstream*test*.go'
