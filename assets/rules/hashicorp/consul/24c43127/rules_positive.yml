  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: (?s)package\s+\w+
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - envoyextensions/xdscommon/**/*.go
- id: regex-var-declaration-in-troubleshoot-proxy-dir
