rules:
- id: old-import-agent-xds-xdscommon
  message: 'Old import path detected: ''agent/xds/xdscommon'' should be moved to ''envoyextensions/xdscommon''
    in the refactored module structure'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/xds/xdscommon"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: old-path-in-comment-agent-xds-xdscommon
  message: Reference to old path 'agent/xds/xdscommon' found - should be updated to
    'envoyextensions/xdscommon'
  severity: INFO
  languages:
  - go
  pattern-regex: agent/xds/xdscommon
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: old-xdscommon-import-in-xds-package
  message: XDS package importing old xdscommon path from same parent - should use
    'envoyextensions/xdscommon'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/xds/xdscommon"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - agent/xds/*.go
    exclude:
    - agent/xds/xdscommon/*.go
- id: old-import-agent-xds-proxysupport
  message: 'Old import path detected: ''agent/xds/proxysupport'' should be merged
    into ''envoyextensions/xdscommon'' in the refactored module structure'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/xds/proxysupport"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: old-path-in-comment-agent-xds-proxysupport
  message: Reference to old path 'agent/xds/proxysupport' found - should be merged
    into 'envoyextensions/xdscommon'
  severity: INFO
  languages:
  - go
  pattern-regex: agent/xds/proxysupport
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: old-import-agent-envoyextensions-extensioncommon
  message: 'Old import path detected: ''agent/envoyextensions/extensioncommon'' should
    be moved to ''envoyextensions/extensioncommon'' in the refactored module structure'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/envoyextensions/extensioncommon"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: upstreamdata-composite-literal-non-pointer
  message: 'UpstreamData map literal should use pointer values: ''map[...]*UpstreamData{...}'''
  severity: WARNING
  languages:
  - go
  pattern: 'map[$KEY]extensioncommon.UpstreamData{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: old-path-in-comment-agent-envoyextensions-extensioncommon
  message: Reference to old path 'agent/envoyextensions/extensioncommon' found - should
    be updated to 'envoyextensions/extensioncommon'
  severity: INFO
  languages:
  - go
  pattern-regex: agent/envoyextensions/extensioncommon
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: test-import-old-xdscommon
  message: Test importing old path 'agent/xds/xdscommon' - should be updated to 'envoyextensions/xdscommon'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/xds/xdscommon"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/*_test.go'
- id: test-import-old-proxysupport
  message: Test importing old path 'agent/xds/proxysupport' - should be updated to
    'envoyextensions/xdscommon'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/xds/proxysupport"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/*_test.go'
- id: old-extensioncommon-import-in-envoyextensions-module
  message: envoyextensions module should not import old agent/envoyextensions/extensioncommon
    path - use local package
  severity: ERROR
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/envoyextensions/extensioncommon"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - envoyextensions/**/*.go
- id: old-proxysupport-import-in-xds-package
  message: XDS package importing old proxysupport path - should use 'envoyextensions/xdscommon'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/xds/proxysupport"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - agent/xds/*.go
    exclude:
    - agent/xds/proxysupport/*.go
- id: old-extensioncommon-import-in-builtin-extensions
  message: Builtin extension importing old extensioncommon path - should use 'envoyextensions/extensioncommon'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/envoyextensions/extensioncommon"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - agent/envoyextensions/builtin/**/*.go
- id: import-agent-xds-in-troubleshoot
  message: Troubleshoot module should not import agent/xds - tests with such dependencies
    should be in 'agent/xds/validateupstream-test/'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/xds"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - troubleshoot/**/*.go
    exclude:
    - agent/xds/validateupstream-test/**/*.go
- id: old-file-location-agent-envoyextensions-extensioncommon
  message: 'File in old location: ''agent/envoyextensions/extensioncommon/'' should
    be moved to ''envoyextensions/extensioncommon/'''
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - agent/envoyextensions/extensioncommon/*.go
- id: old-package-reference-proxysupport
  message: Reference to proxysupport package - this should be merged into 'envoyextensions/xdscommon'
  severity: WARNING
  languages:
  - go
  pattern: 'proxysupport.$FUNC(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/*.go'
- id: package-extensioncommon-in-old-location
  message: Package extensioncommon in old location 'agent/envoyextensions/extensioncommon'
    - should be moved to 'envoyextensions/extensioncommon'
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package extensioncommon
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - agent/envoyextensions/extensioncommon/*.go
- id: test-import-old-extensioncommon
  message: Test importing old path 'agent/envoyextensions/extensioncommon' - should
    be updated to 'envoyextensions/extensioncommon'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/envoyextensions/extensioncommon"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/*_test.go'
- id: old-file-location-agent-xds-xdscommon
  message: 'File in old location: ''agent/xds/xdscommon/'' should be moved to ''envoyextensions/xdscommon/'''
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - agent/xds/xdscommon/*.go
- id: package-xdscommon-in-old-location
  message: Package xdscommon in old location 'agent/xds/xdscommon' - should be moved
    to 'envoyextensions/xdscommon'
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package xdscommon
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - agent/xds/xdscommon/*.go
- id: old-file-location-agent-xds-proxysupport
  message: 'File in old location: ''agent/xds/proxysupport/'' should be merged into
    ''envoyextensions/xdscommon/'''
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - agent/xds/proxysupport/*.go
- id: old-file-location-agent-envoyextensions-builtin-validate
  message: 'File in old location: ''agent/envoyextensions/builtin/validate/'' should
    be moved to ''troubleshoot/validate/'''
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - agent/envoyextensions/builtin/validate/*.go
- id: upstreamdata-value-assignment-to-map
  message: 'UpstreamData should be assigned as pointer: use ''&extensioncommon.UpstreamData{...}''
    instead'
  severity: WARNING
  languages:
  - go
  pattern: '$MAP[$KEY] = extensioncommon.UpstreamData{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: import-proxycfg-in-troubleshoot
  message: Troubleshoot module should not import proxycfg - tests with such dependencies
    should be in 'agent/xds/validateupstream-test/'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/proxycfg"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - troubleshoot/**/*.go
    exclude:
    - agent/xds/validateupstream-test/**/*.go
- id: import-agent-structs-in-troubleshoot
  message: Troubleshoot module importing agent/structs - verify this doesn't create
    circular dependency with consul module
  severity: INFO
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/structs"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - troubleshoot/**/*.go
    exclude:
    - agent/xds/validateupstream-test/**/*.go
- id: old-xdscommon-import-in-envoyextensions-module
  message: envoyextensions module should not import old agent/xds/xdscommon path -
    use local package
  severity: ERROR
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/xds/xdscommon"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - envoyextensions/**/*.go
- id: package-proxysupport-in-old-location
  message: Package proxysupport in old location 'agent/xds/proxysupport' - should
    be merged into 'envoyextensions/xdscommon'
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package proxysupport
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - agent/xds/proxysupport/*.go
- id: package-validate-in-old-location
  message: Package validate in old location 'agent/envoyextensions/builtin/validate'
    - should be moved to 'troubleshoot/validate'
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package validate
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - agent/envoyextensions/builtin/validate/*.go
- id: old-import-in-command-package
  message: Command package importing old proxysupport path - should use 'envoyextensions/xdscommon'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/xds/proxysupport"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - command/**/*.go
- id: old-proxysupport-import-in-agent-package
  message: Agent package importing old proxysupport path - should use 'envoyextensions/xdscommon'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/xds/proxysupport"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - agent/*.go
    exclude:
    - agent/xds/**/*.go
- id: old-extensioncommon-import-in-extensionruntime
  message: Extension runtime importing old extensioncommon path - should use 'envoyextensions/extensioncommon'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/envoyextensions/extensioncommon"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - agent/xds/extensionruntime/*.go
- id: validateupstream-tests-with-old-imports
  message: Validateupstream test importing old paths - should use new module paths
    or be moved to validateupstream-test
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: 'import "github.com/hashicorp/consul/agent/xds/xdscommon"

      '
  - pattern: 'import "github.com/hashicorp/consul/agent/xds/proxysupport"

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - troubleshoot/validateupstream/*_test.go
- id: old-import-agent-envoyextensions-builtin-validate
  message: 'Old import path detected: ''agent/envoyextensions/builtin/validate'' should
    be moved to ''troubleshoot/validate'' in the refactored module structure'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/hashicorp/consul/agent/envoyextensions/builtin/validate"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: upstreamdata-make-non-pointer-map
  message: 'UpstreamData map should use pointer values: ''make(map[...]*UpstreamData)''
    instead of ''make(map[...]UpstreamData)'''
  severity: WARNING
  languages:
  - go
  pattern: 'make(map[$KEY]extensioncommon.UpstreamData)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-path-in-comment-agent-envoyextensions-builtin-validate
  message: Reference to old path 'agent/envoyextensions/builtin/validate' found -
    should be updated to 'troubleshoot/validate'
  severity: INFO
  languages:
  - go
  pattern-regex: agent/envoyextensions/builtin/validate
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: xdscommon-test-files-in-old-location
  message: Test file in old location 'agent/xds/xdscommon/*_test.go' - should be moved
    to 'envoyextensions/xdscommon/'
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - agent/xds/xdscommon/*_test.go
- id: proxysupport-test-files-in-old-location
  message: Test file in old location 'agent/xds/proxysupport/*_test.go' - should be
    moved/merged into 'envoyextensions/xdscommon/'
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - agent/xds/proxysupport/*_test.go
- id: extensioncommon-test-files-in-old-location
  message: Test file in old location 'agent/envoyextensions/extensioncommon/*_test.go'
    - should be moved to 'envoyextensions/extensioncommon/'
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - agent/envoyextensions/extensioncommon/*_test.go
- id: validate-test-files-in-old-location
  message: Test file in old location 'agent/envoyextensions/builtin/validate/*_test.go'
    - should be moved to 'troubleshoot/validate/'
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - agent/envoyextensions/builtin/validate/*_test.go
- id: troubleshoot-test-importing-proxycfg-grouped
  message: Troubleshoot test importing proxycfg - should be moved to 'agent/xds/validateupstream-test/'
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/hashicorp/consul/agent/proxycfg\"\n  ...\n\
    )\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - troubleshoot/**/*_test.go
    exclude:
    - agent/xds/validateupstream-test/**/*.go
- id: troubleshoot-importing-consul-acl
  message: Troubleshoot importing consul/acl - verify this doesn't pull in unwanted
    consul dependencies
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: 'import "github.com/hashicorp/consul/acl"

      '
  - pattern: "import (\n  ...\n  \"github.com/hashicorp/consul/acl\"\n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - troubleshoot/**/*.go
    exclude:
    - agent/xds/validateupstream-test/**/*.go
- id: validateupstream-tests-with-old-proxysupport-grouped
  message: Validateupstream test has old proxysupport import - should use new module
    paths
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/hashicorp/consul/agent/xds/proxysupport\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - troubleshoot/validateupstream/*_test.go
