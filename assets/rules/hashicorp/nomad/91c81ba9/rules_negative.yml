- id: detect-error-message-secure-variable
  message: Error message or string contains 'secure variable' which should be changed
    to 'variable'
  severity: WARNING
  languages:
  - go
  pattern-regex: secure[_\s-]variable
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 232
- id: detect-svop-constant
  message: Constant or identifier 'SVOp*' should be renamed to 'VarOp*'
  severity: WARNING
  languages:
  - go
  pattern-regex: \bSVOp[A-Z][A-Za-z]*\b
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: detect-secure-variables-policy-string
  message: Policy name 'secure_variables' should be renamed to 'variables'
