rules:
- id: framework-resource-modifyplan-settagsall-call
  message: Resource ModifyPlan contains SetTagsAll call - this should be removed as
    tagging is now handled by the framework wrapper
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  ...\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
    \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: framework-resource-settagsall-at-end-of-modifyplan
  message: Resource ModifyPlan ends with SetTagsAll call - this should be removed
    as tagging is now handled by the framework wrapper
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  ...\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: settagsall-call-with-any-receiver
  message: Call to SetTagsAll should be removed - tagging is now handled transparently
    by framework wrapper
  severity: WARNING
  languages:
  - go
  pattern: '$R.SetTagsAll($CTX, $REQ, $RESP)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: settagsall-direct-call
  message: Direct call to SetTagsAll detected - this should be removed as tagging
    is handled by framework wrapper
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: 'SetTagsAll($CTX, $REQ, $RESP)

      '
  - pattern: '$_.SetTagsAll($CTX, $REQ, $RESP)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: modifyplan-calling-method-with-settagsall-name
  message: ModifyPlan calling SetTagsAll method - this should be removed as tagging
    is now transparent
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  ...\n  $R.SetTagsAll(...)\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: resource-with-tags-annotation-and-modifyplan
  message: Resource with @Tags annotation should not have ModifyPlan with SetTagsAll
    - tagging is transparent
  severity: WARNING
  languages:
  - go
  pattern: "// @Tags(...)\nfunc $FUNC(...) (...) {\n  ...\n}\n...\nfunc ($R *$RES)\
    \ ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest, $RESP *resource.ModifyPlanResponse)\
    \ {\n  $R.SetTagsAll(...)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: settagsall-in-service-package
  message: SetTagsAll call found in service package - should be removed as tagging
    is handled by framework wrapper
  severity: WARNING
  languages:
  - go
  pattern: '$R.SetTagsAll($CTX, $REQ, $RESP)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
  paths:
    include:
    - internal/service/**/*.go
- id: settagsall-with-variadic-args
  message: SetTagsAll call detected - should be removed as tagging is handled transparently
    by wrapper
  severity: WARNING
  languages:
  - go
  pattern: '$_.SetTagsAll(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: settagsall-call-anywhere-in-modifyplan
  message: SetTagsAll call inside ModifyPlan should be removed - tagging is now handled
    by wrapper
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
      \ $RESP *resource.ModifyPlanResponse) {\n  ...\n}\n"
  - pattern: '$R.SetTagsAll(...)

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: modifyplan-with-settagsall-last-line
  message: ModifyPlan ends with SetTagsAll - this call should be removed
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  ...\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: settagsall-in-plugin-framework-resources
  message: Plugin Framework resource calls SetTagsAll in ModifyPlan - should be removed
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$R.SetTagsAll($_, $_, $_)

      '
  - pattern-inside: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
      \ $RESP *resource.ModifyPlanResponse) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
  paths:
    include:
    - internal/service/**/*.go
- id: settagsall-comment-in-code
  message: Reference to SetTagsAll found in service code - verify if this should be
    removed
  severity: INFO
  languages:
  - go
  pattern-regex: SetTagsAll
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
  paths:
    include:
    - internal/service/**/*.go
- id: settagsall-function-call-pattern
  message: SetTagsAll method call detected - should be removed as tagging is handled
    by wrapper
  severity: WARNING
  languages:
  - go
  pattern: '$OBJ.SetTagsAll($A, $B, $C)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: service-resource-settagsall-usage
  message: Usage of SetTagsAll method in service code - verify if needed or should
    be removed
  severity: INFO
  languages:
  - go
  pattern-regex: \.SetTagsAll\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
  paths:
    include:
    - internal/service/**/*.go
- id: settagsall-in-transparent-tagging-context
  message: SetTagsAll call in service code outside method definition - should be removed
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$_.SetTagsAll($_, $_, $_)

      '
  - pattern-not-inside: "func ($_ *$_) SetTagsAll($_, $_, $_) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
  paths:
    include:
    - internal/service/**/*.go
- id: framework-resource-settagsall-at-start-of-modifyplan
  message: Resource ModifyPlan starts with SetTagsAll call - this should be removed
    as tagging is now handled by the framework wrapper
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
    \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 95
- id: modifyplan-with-settagsall-first-line
  message: ModifyPlan starts with SetTagsAll - this call should be removed
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
    \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 95
- id: aws-service-resource-modifyplan
  message: AWS service resource has ModifyPlan with SetTagsAll pattern - should be
    removed
  severity: WARNING
  languages:
  - generic
  pattern-regex: func \(\w+ \*\w+\) ModifyPlan\(\w+ context\.Context, \w+ resource\.ModifyPlanRequest,
    \w+ \*resource\.ModifyPlanResponse\) \{[\s\n]*\w+\.SetTagsAll\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 95
  paths:
    include:
    - internal/service/**/*.go
- id: framework-resource-modifyplan-with-settagsall-only
  message: Resource implements ModifyPlan that only calls SetTagsAll - this should
    be removed as tagging is now handled by the framework wrapper
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: framework-resource-modifyplan-with-comment-and-settagsall
  message: Resource ModifyPlan with comment and SetTagsAll should be removed - tagging
    is handled by framework wrapper
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  // $COMMENT\n  $R.SetTagsAll($CTX,\
    \ $REQ, $RESP)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: framework-resource-with-only-modifyplan-for-tags
  message: Resource has ModifyPlan only for tags - entire method should be removed
    as tagging is now transparent
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
      \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
      }\n"
  - pattern-not-inside: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ\
      \ resource.ModifyPlanRequest, $RESP *resource.ModifyPlanResponse) {\n  ...\n\
      \  $OTHER_CALL(...)\n  ...\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-only-for-transparent-tagging
  message: ModifyPlan implementation exists solely for transparent tagging - should
    be removed entirely
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
      \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
      }\n"
  - pattern-not-inside: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ\
      \ resource.ModifyPlanRequest, $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX,\
      \ $REQ, $RESP)\n  $STMT\n  ...\n}\n"
  - pattern-not-inside: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ\
      \ resource.ModifyPlanRequest, $RESP *resource.ModifyPlanResponse) {\n  ...\n\
      \  $STMT\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-empty-except-settagsall
  message: ModifyPlan contains only SetTagsAll call - entire method should be deleted
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-with-settagsall-and-no-other-logic
  message: ModifyPlan implementation appears to only call SetTagsAll - should be removed
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
      \ $RESP *resource.ModifyPlanResponse) {\n  ...\n}\n"
  - pattern-inside: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
      \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
      }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-with-just-settagsall-lowercase-ctx
  message: ModifyPlan with only SetTagsAll should be removed - tagging is transparent
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan(ctx context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll(ctx, $REQ, $RESP)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-signature-with-settagsall-body
  message: ModifyPlan with SetTagsAll pattern detected - should be removed for transparent
    tagging resources
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$T) ModifyPlan($A context.Context, $B resource.ModifyPlanRequest,\
    \ $C *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($A, $B, $C)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-function-in-service-package
  message: Service resource has ModifyPlan calling SetTagsAll - should be removed
    for transparent tagging
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
      \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
      }\n"
  - pattern: "func ($R *$RESOURCE) ModifyPlan(ctx context.Context, request resource.ModifyPlanRequest,\
      \ response *resource.ModifyPlanResponse) {\n  $R.SetTagsAll(ctx, request, response)\n\
      }\n"
  - pattern: "func ($R *$RESOURCE) ModifyPlan(ctx context.Context, req resource.ModifyPlanRequest,\
      \ resp *resource.ModifyPlanResponse) {\n  $R.SetTagsAll(ctx, req, resp)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
  paths:
    include:
    - internal/service/**/*.go
- id: modifyplan-with-ctx-and-settagsall
  message: ModifyPlan with lowercase ctx and SetTagsAll - should be removed
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan(ctx context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll(ctx, $REQ, $RESP)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: resource-modifyplan-transparent-tagging-boilerplate
  message: Transparent tagging boilerplate detected - entire ModifyPlan should be
    removed
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
        \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
        }\n"
    - pattern: "func ($R *$RESOURCE) ModifyPlan(ctx context.Context, request resource.ModifyPlanRequest,\
        \ response *resource.ModifyPlanResponse) {\n  $R.SetTagsAll(ctx, request,\
        \ response)\n}\n"
    - pattern: "func ($R *$RESOURCE) ModifyPlan(ctx context.Context, req resource.ModifyPlanRequest,\
        \ resp *resource.ModifyPlanResponse) {\n  $R.SetTagsAll(ctx, req, resp)\n\
        }\n"
  - pattern-not-inside: "func ($R *$RESOURCE) ModifyPlan($A context.Context, $B resource.ModifyPlanRequest,\
      \ $C *resource.ModifyPlanResponse) {\n  $STMT1\n  ...\n  $R.SetTagsAll($A, $B,\
      \ $C)\n  ...\n  $STMT2\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-receiver-name-r-settagsall
  message: ModifyPlan with receiver 'r' calling SetTagsAll - should be removed
  severity: WARNING
  languages:
  - go
  pattern: "func (r *$TYPE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  r.SetTagsAll($CTX, $REQ, $RESP)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-with-blank-lines-and-settagsall
  message: ModifyPlan with blank lines and SetTagsAll - entire method should be removed
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-with-inline-comment
  message: ModifyPlan with inline comment and SetTagsAll - entire method should be
    removed
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP) //\
    \ $COMMENT\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: any-receiver-modifyplan-with-settagsall
  message: Any resource ModifyPlan calling SetTagsAll should be removed for transparent
    tagging
  severity: WARNING
  languages:
  - go
  pattern: "func ($_ *$_) ModifyPlan($_ context.Context, $_ resource.ModifyPlanRequest,\
    \ $_ *resource.ModifyPlanResponse) {\n  $_.SetTagsAll($_, $_, $_)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-implementation-in-service-dirs
  message: Service package has ModifyPlan calling SetTagsAll - should be removed
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$_) ModifyPlan($_ context.Context, $_ resource.ModifyPlanRequest,\
    \ $_ *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($_, $_, $_)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
  paths:
    include:
    - internal/service/**/*.go
- id: transparent-tagging-modifyplan-boilerplate
  message: Transparent tagging ModifyPlan boilerplate detected - entire method should
    be removed
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-with-settagsall-simple
  message: Simple ModifyPlan + SetTagsAll pattern - remove entire method
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$T) ModifyPlan($A context.Context, $B resource.ModifyPlanRequest,\
    \ $C *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($A, $B, $C)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: plugin-framework-modifyplan-tags
  message: Plugin Framework resource has ModifyPlan for tagging - should be removed
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "func ($_ *$_) ModifyPlan($_ context.Context, $_ resource.ModifyPlanRequest,\
      \ $_ *resource.ModifyPlanResponse) {\n  $_.SetTagsAll($_, $_, $_)\n}\n"
  - pattern: "func ($R *$_) ModifyPlan(ctx context.Context, request resource.ModifyPlanRequest,\
      \ response *resource.ModifyPlanResponse) {\n  $R.SetTagsAll(ctx, request, response)\n\
      }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
  paths:
    include:
    - internal/service/**/*.go
- id: modifyplan-receiver-any-name
  message: ModifyPlan with any receiver name calling SetTagsAll - should be removed
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  $RECV.SetTagsAll($CTX, $REQ, $RESP)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-single-statement-settagsall
  message: ModifyPlan with single SetTagsAll statement - entire method should be removed
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
      \ $RESP *resource.ModifyPlanResponse) {\n  $SINGLE_STMT\n}\n"
  - metavariable-pattern:
      metavariable: $SINGLE_STMT
      pattern: '$R.SetTagsAll($CTX, $REQ, $RESP)

        '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: modifyplan-method-transparent-tagging
  message: Service resource ModifyPlan with transparent tagging pattern - should be
    removed
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECEIVER *$TYPE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
    \ $RESP *resource.ModifyPlanResponse) {\n  $RECEIVER.SetTagsAll($CTX, $REQ, $RESP)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
  paths:
    include:
    - internal/service/**/*.go
- id: framework-resource-modifyplan-tags-only
  message: Framework resource ModifyPlan implementation for tags only - should be
    completely removed
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "func ($R *$RESOURCE) ModifyPlan($A context.Context, $B resource.ModifyPlanRequest,\
      \ $C *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($A, $B, $C)\n}\n"
  - pattern: "func (r *$RESOURCE) ModifyPlan(ctx context.Context, request resource.ModifyPlanRequest,\
      \ response *resource.ModifyPlanResponse) {\n  r.SetTagsAll(ctx, request, response)\n\
      }\n"
  - pattern: "func (r *$RESOURCE) ModifyPlan(ctx context.Context, req resource.ModifyPlanRequest,\
      \ resp *resource.ModifyPlanResponse) {\n  r.SetTagsAll(ctx, req, resp)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 94
- id: framework-resource-implements-modifyplan-interface
  message: Framework resource embedding ResourceWithConfigure should not implement
    ModifyPlan for tagging only
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "type $RESOURCE struct {\n  framework.ResourceWithConfigure\n  ...\n\
      }\n...\nfunc ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
      \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
      }\n"
  - pattern: "type $RESOURCE struct {\n  ...\n  framework.ResourceWithConfigure\n\
      \  ...\n}\n...\nfunc ($R *$RESOURCE) ModifyPlan($CTX context.Context, $REQ resource.ModifyPlanRequest,\
      \ $RESP *resource.ModifyPlanResponse) {\n  $R.SetTagsAll($CTX, $REQ, $RESP)\n\
      }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 85
- id: settagsall-called-with-explicit-params
  message: SetTagsAll call with explicit parameters should be removed - tagging is
    handled by wrapper
  severity: WARNING
  languages:
