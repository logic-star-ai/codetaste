rules:
- id: aws-tags-generate-directive-skip-types-imp
  message: Remove -SkipTypesImp flag from go:generate directive - this flag is obsolete
    after SDK v1 removal
  severity: ERROR
  languages:
  - go
  pattern-regex: //go:generate\s+.*\s+-SkipTypesImp\b
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 89
  paths:
    include:
    - internal/service/*/generate.go
- id: aws-tags-v2-body-template-reference
  message: Update v2 template body reference - should use templates package without
    v2 subdirectory
  severity: ERROR
  languages:
  - go
  pattern-either:
  - pattern: 'v2.GetTagBody

      '
  - pattern: 'v2.HeaderBody

      '
  - pattern: 'v2.ListTagsBody

      '
  - pattern: 'v2.ServiceTagsMapBody

      '
  - pattern: 'v2.ServiceTagsValueMapBody

      '
  - pattern: 'v2.ServiceTagsSliceBody

      '
  - pattern: 'v2.UpdateTagsBody

      '
  - pattern: 'v2.WaitTagsPropagatedBody

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: aws-tags-template-v2-package-reference
  message: Update v2 template package reference - templates should be used from templates/
    without version subdirectory
  severity: ERROR
  languages:
  - go
  pattern-regex: \bv2\.
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - internal/generate/tags/main.go
- id: aws-tags-skip-flags-in-comment
  message: Remove references to Skip flags in comments - these flags are obsolete
    after SDK v1 removal
  severity: WARNING
  languages:
  - go
  pattern-regex: SkipAWSImp|SkipServiceImp|SkipTypesImp|SkipNamesImp
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - internal/generate/tags/**
- id: aws-tags-generate-directive-skip-service-imp
  message: Remove -SkipAWSServiceImp flag from go:generate directive - this flag is
    obsolete after SDK v1 removal
  severity: ERROR
  languages:
  - go
  pattern-regex: //go:generate\s+.*\s+-SkipAWSServiceImp\b
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - internal/service/*/generate.go
- id: aws-tags-v1-body-template-reference
  message: Remove v1 template body reference - SDK v1 templates have been removed
  severity: ERROR
  languages:
  - go
  pattern-either:
  - pattern: 'v1.GetTagBody

      '
  - pattern: 'v1.HeaderBody

      '
  - pattern: 'v1.ListTagsBody

      '
  - pattern: 'v1.ServiceTagsMapBody

      '
  - pattern: 'v1.ServiceTagsSliceBody

      '
  - pattern: 'v1.UpdateTagsBody

      '
  - pattern: 'v1.WaitTagsPropagatedBody

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: aws-tags-sdk-version-flag-reference
  message: Remove sdkVersion flag reference - only SDK v2 is supported
  severity: ERROR
  languages:
  - go
  pattern: '*sdkVersion

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/generate/tags/main.go
- id: aws-tags-template-v1-package-reference
  message: Remove v1 template package reference - templates should be used from templates/
    without version subdirectory
  severity: ERROR
  languages:
  - go
  pattern-regex: \bv1\.
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/generate/tags/main.go
- id: aws-tags-sdk-version-comment-v1
  message: Remove SDK v1 references from comments - only SDK v2 is supported
  severity: WARNING
  languages:
  - go
  pattern-regex: SDK\s*v1|sdkV1|AWS\s+SDK\s+for\s+Go\s+v1
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - internal/generate/tags/**
- id: aws-tags-generate-directive-string-bool-list-tags-value-slice
  message: Convert -ListTagsInIDNeedValueSlice flag to boolean format (use -ListTagsInIDNeedValueSlice
    without =yes/=true)
  severity: ERROR
  languages:
  - go
  pattern-regex: //go:generate\s+.*\s+-?-ListTagsInIDNeedValueSlice\s*=\s*(yes|true|"yes"|"true")
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - internal/service/*/generate.go
- id: aws-tags-sdkv1-identifier-reference
  message: Remove sdkV1 constant reference - SDK v1 support has been removed
  severity: ERROR
  languages:
  - go
  pattern: sdkV1
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - internal/generate/tags/main.go
- id: aws-tags-sdk-version-flag-usage
  message: Remove sdkVersion flag usage - only SDK v2 is supported
  severity: ERROR
  languages:
  - go
  pattern-either:
  - pattern: 'flag.Parse()

      ...

      *sdkVersion

      '
  - pattern: "if $COND {\n  ...\n  *sdkVersion\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - internal/generate/tags/main.go
- id: aws-tags-generate-directive-string-bool-tag-value-slice
  message: Convert -TagInIDNeedValueSlice flag to boolean format (use -TagInIDNeedValueSlice
    without =yes/=true)
  severity: ERROR
  languages:
  - go
  pattern-regex: //go:generate\s+.*\s+-?-TagInIDNeedValueSlice\s*=\s*(yes|true|"yes"|"true")
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - internal/service/*/generate.go
- id: aws-tags-sdk-version-comparison
  message: Remove SDK version comparison - only SDK v2 is now supported
  severity: ERROR
  languages:
  - go
  pattern-either:
  - pattern: 'if $VAR == sdkV1 { ... }

      '
  - pattern: 'if $VAR == sdkV2 { ... }

      '
  - pattern: '$VAR == sdkV1

      '
  - pattern: '$VAR == sdkV2

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: aws-tags-sdkv2-identifier-reference
  message: Remove sdkV2 constant reference - no version switching needed, SDK v2 is
    always used
  severity: ERROR
  languages:
  - go
  pattern: sdkV2
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - internal/generate/tags/main.go
- id: aws-tags-header-imports-struct-skip-fields
  message: Remove Skip field assignments - these fields are obsolete after SDK v1
    removal
  severity: ERROR
  languages:
  - go
  pattern-either:
  - pattern: 'SkipAWSImp: *skipAWSImp

      '
  - pattern: 'SkipServiceImp: *skipServiceImp

      '
  - pattern: 'SkipTypesImp: *skipTypesImp

      '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: aws-tags-header-body-conditional-import
  message: Remove conditional AWS import from header template - SDK v2 imports are
    always included
  severity: ERROR
  languages:
  - generic
  pattern-regex: '{{-?\s*if\s+.*\.SkipAWSImp\s*}}'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - internal/generate/tags/templates/**
- id: aws-tags-header-body-conditional-service-import
  message: Remove conditional service import from header template - imports are no
    longer conditional
  severity: ERROR
  languages:
  - generic
  pattern-regex: '{{-?\s*if\s+.*\.SkipServiceImp\s*}}'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - internal/generate/tags/templates/**
- id: aws-tags-header-body-conditional-names-import
  message: Simplify names import in header template - no longer conditionally imported
  severity: WARNING
  languages:
  - generic
  pattern-regex: '{{-?\s*if\s+.*\.NamesPkg\s*}}'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - internal/generate/tags/templates/**
