rules:
- id: aws-request-retryable-modification
  message: Request.Retryable modified in handler. Custom retry logic should be in
    service package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $REQUEST.Retryable = $VAL
  - pattern-inside: 'func(r *request.Request) { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
  paths:
    include:
    - internal/conns/config.go
- id: request-retryable-set-true
  message: Request.Retryable set in handler. Retry logic should be in service package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $R.Retryable = aws.Bool(true)
  - pattern-inside: 'func($R *request.Request) { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - internal/conns/config.go
- id: many-service-imports-in-config
  message: AWS service import in config.go. Services should be self-contained in service
    packages
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-regex: github\.com/aws/aws-sdk-go/service/
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    include:
    - internal/conns/config.go
- id: multiple-aws-configs-in-config-method
  message: Multiple AWS configs created in config method. Service configs should be
    in service packages
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$CFG1 := &aws.Config{...}

      ...

      $CFG2 := &aws.Config{...}

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - internal/conns/config.go
- id: client-customization-in-conns-package
  message: Client customization (retry handlers, etc.) in conns package should be
    moved to service package CustomizeConn() method
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$CONN.Handlers.$HANDLER.PushBack(...)

      '
  - pattern-inside: 'func $FUNC(...) { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: client-retry-customization-in-conns
  message: Retry handler customization in conns package should be moved to service
    package CustomizeConn() method
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$CONN.Handlers.Retry.PushBack(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: retry-handler-pushback-in-config
  message: Retry handler added in config. Should be moved to service package CustomizeConn()
    method
  severity: WARNING
  languages:
  - go
  pattern: $VAR.Handlers.Retry.PushBack(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: service-handler-pushback
  message: Handler customization in config. Should be moved to service package CustomizeConn()
    method
  severity: WARNING
  languages:
  - go
  pattern: $VAR.Handlers.$HANDLER.PushBack(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: conn-field-with-handlers-modification
  message: Handler modification on connection field '$CONNFIELD'. Should be moved
    to service package CustomizeConn()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CLIENT.$CONNFIELD.Handlers.$HANDLER.PushBack(...)
  - metavariable-regex:
      metavariable: $CONNFIELD
      regex: .*Conn$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: request-handler-function-in-config
  message: Request handler function in config. Should be moved to service package
    CustomizeConn()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func(r *request.Request) {\n  ...\n}\n"
  - pattern-inside: '$CLIENT.$CONN.Handlers.$HANDLER.PushBack(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: client-field-accessed-directly-for-customization
  message: Direct access to client field handlers. Client customization should be
    in service package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CLIENT.$FIELD.Handlers
  - metavariable-regex:
      metavariable: $FIELD
      regex: ^[a-z][a-zA-Z0-9]*Conn$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: client-with-custom-retry-logic
  message: Custom retry logic in config. Should be encapsulated in service package
    CustomizeConn()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "$CONN.Handlers.Retry.PushBack(func(r *request.Request) {\n  ...\n  if\
      \ $COND {\n    r.Retryable = $VAL\n  }\n  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: handler-retry-pushback-pattern
  message: Retry handler modification in config.go. Should be in service package CustomizeConn()
  severity: WARNING
  languages:
  - go
  pattern: $X.Handlers.Retry.PushBack(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: handler-pushback-with-anonymous-func
  message: Handler with anonymous function in config. Should be in service package
    CustomizeConn()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "$CONN.Handlers.$HANDLER.PushBack(func($REQ *request.Request) {\n  ...\n\
      })\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: aws-request-type-in-handler
  message: Request handler function in config. Should be in service package CustomizeConn()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: func($R *request.Request) { ... }
  - pattern-inside: '$CONN.Handlers.$HANDLER.PushBack(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: handler-list-access-pattern
  message: Direct handlers access on connection field. Client customization should
    be in service package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CLIENT.$CONN.Handlers
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - internal/conns/config.go
- id: sequential-conn-assignments
  message: Sequential connection assignments. Use lazy loading to create clients on-demand
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$CLIENT.$CONN1 = $PKG1.New(...)

      ...

      $CLIENT.$CONN2 = $PKG2.New(...)

      ...

      $CLIENT.$CONN3 = $PKG3.New(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - internal/conns/config.go
- id: aws-client-direct-field-assignment
  message: Direct client field assignment detected. Use lazy loading with maps and
    accessor methods instead
  severity: WARNING
  languages:
  - go
  pattern: '$CLIENT.$FIELD = $SERVICE.New(...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/*.go
- id: aws-client-eager-initialization-in-config
  message: Eager client initialization detected in config. Clients should be lazily
    initialized on-demand
  severity: WARNING
  languages:
  - go
  pattern: 'client.$CONN = $PKG.New(...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: aws-session-used-for-client-creation-in-conns
  message: Direct AWS SDK client creation in conns package. Should be moved to service
    package NewConn() method
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$PKG.New($SESSION)

      '
  - pattern-inside: 'func $FUNC(...) { ... }

      '
  - metavariable-pattern:
      metavariable: $SESSION
      patterns:
      - pattern-either:
        - pattern: session
        - pattern: $X.Session
        - pattern: sess
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: client-field-assignment-with-session-copy
  message: Client field '$FIELD' assigned directly in config.go. Should use lazy loading
    via service package factory methods
  severity: WARNING
  languages:
  - go
  pattern: $CLIENT.$FIELD = $PKG.New(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: session-copy-for-client-config
  message: Session.Copy() used for client configuration. Custom config should be in
    service package NewConn() method
  severity: WARNING
  languages:
  - go
  pattern: $SESSION.Copy($CONFIG)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: aws-config-struct-for-client-customization
  message: AWS Config customization in Config method. Should be moved to service package
    NewConn()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$VAR := &aws.Config{...}

      '
  - pattern-inside: 'func (c *Config) $FUNC(...) { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: client-assignment-to-awsclient-field
  message: Direct assignment to client connection field. Use lazy loading with maps
    instead
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CLIENT.$CONNFIELD = $EXPR
  - metavariable-regex:
      metavariable: $CONNFIELD
      regex: .*[Cc]onn$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: any-service-conn-field-assignment-pattern
  message: Service connection field '$FIELD' directly assigned. Should use lazy loading
    via maps
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CLIENT.$FIELD = $PKG.New(...)
  - metavariable-regex:
      metavariable: $FIELD
      regex: ^[a-z][a-zA-Z0-9]*Conn$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: aws-session-new-call-for-service
  message: Client created with sess.Copy(). Service-specific configuration should
    be in service package NewConn()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $PKG.New(sess.Copy(...))
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: service-new-with-session-copy-pattern
  message: Service client created with sess.Copy(). Should use lazy loading via service
    package NewConn()
  severity: WARNING
  languages:
  - go
  pattern: $PKG.New(sess.Copy(...))
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: client-struct-field-assignment-with-new
  message: Client field assignment with New(). Should use lazy loading pattern
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $C.$F = $P.New(...)
  - metavariable-regex:
      metavariable: $F
      regex: ^[a-z].*[Cc]onn$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: config-copy-before-new
  message: Config created then passed to New(). Service config should be in service
    package NewConn()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$CFG := &aws.Config{...}

      ...

      $PKG.New(sess.Copy($CFG))

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: service-conn-field-naming-pattern
  message: Service connection field '$SERVICENAMECONN' assigned. Should use lazy loading
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CLIENT.$SERVICENAMECONN = $EXPR
  - metavariable-regex:
      metavariable: $SERVICENAMECONN
      regex: ^[a-z][a-z0-9]+Conn$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: service-new-call-assigned-to-field
  message: Service client assigned to field. Use lazy loading with maps instead of
    direct assignment
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CLIENT.$FIELD = $SERVICE.New(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: sess-copy-call-pattern
  message: sess.Copy() called in config. Custom session handling should be in service
