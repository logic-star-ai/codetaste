  severity: WARNING
  languages:
  - go
  pattern: sess.Copy(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - internal/conns/config.go
- id: five-or-more-new-calls-in-client
  message: Multiple New() calls indicate eager initialization. Use lazy loading pattern
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$PKG1.New(...)

      ...

      $PKG2.New(...)

      ...

      $PKG3.New(...)

      ...

      $PKG4.New(...)

      ...

      $PKG5.New(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - internal/conns/config.go
- id: multiple-service-clients-initialized-sequentially
  message: Multiple clients initialized sequentially. Use lazy loading to only create
    clients when needed
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$CLIENT.$FIELD1 = $PKG1.New(...)

      $CLIENT.$FIELD2 = $PKG2.New(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - internal/conns/config.go
- id: request-retryable-set-false
  message: Request.Retryable set in handler. Retry logic should be in service package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $R.Retryable = aws.Bool(false)
  - pattern-inside: 'func($R *request.Request) { ... }

      '
  metadata:
