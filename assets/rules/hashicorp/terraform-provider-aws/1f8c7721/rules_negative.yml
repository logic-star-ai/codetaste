  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $PKG.New($SESSION, ...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(s3|ec2|rds|iam|lambda|dynamodb|ecs|eks|route53|cloudwatch|sns|sqs)$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
