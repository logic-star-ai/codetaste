rules:
- id: setid-call-with-error-handling-pattern
  message: Detected setID call with error handling - refactoring successfully applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "$ID, $ERR := $MODEL.setID()\nif $ERR != nil {\n  ...\n}\n"
    - pattern: "if $ID, $ERR := $MODEL.setID(); $ERR != nil {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - internal/service/**/*.go
    exclude:
    - internal/service/**/*_test.go
    - internal/service/**/sweep.go
- id: types-stringvalue-from-error-checked-setid
  message: Detected types.StringValue from error-checked setID result - refactoring
    successfully applied
  severity: INFO
  languages:
  - go
  pattern: "$ID, $ERR := $MODEL.setID()\nif $ERR != nil {\n  ...\n}\n$DATA.ID = types.StringValue($ID)\n"
  metadata:
    category: basic
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - internal/service/**/*.go
    exclude:
    - internal/service/**/*_test.go
    - internal/service/**/sweep.go
- id: setid-call-then-stringvalue-assignment
  message: Detected setID call followed by types.StringValue assignment after error
    check - refactoring successfully applied
  severity: INFO
  languages:
  - go
  pattern: "$ID, $ERR := $DATA.setID()\nif $ERR != nil {\n  ...\n  return\n}\n$DATA.ID\
    \ = types.StringValue($ID)\n"
  metadata:
    category: basic
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - internal/service/**/*.go
    exclude:
    - internal/service/**/*_test.go
    - internal/service/**/sweep.go
