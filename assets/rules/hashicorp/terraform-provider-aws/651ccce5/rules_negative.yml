- id: avoid-errs-must-in-service-packages
  message: Replace errs.Must() with explicit error handling to avoid runtime panics
    in service packages
  severity: ERROR
  languages:
  - go
  pattern: errs.Must(...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
  paths:
    include:
    - internal/service/*/*.go
    exclude:
    - internal/service/*/*_test.go
    - internal/service/*/sweep.go
