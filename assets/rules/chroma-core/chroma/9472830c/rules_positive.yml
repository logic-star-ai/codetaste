  severity: INFO
  languages:
  - rust
  pattern-regex: 'use\s+chroma_(blockstore|cache|config|error|storage|types)::'
  metadata:
    category: dependency
    nr_refactored_patterns: 165
    nr_legacy_patterns: 0
  paths:
    include:
    - rust/worker/src/**/*.rs
