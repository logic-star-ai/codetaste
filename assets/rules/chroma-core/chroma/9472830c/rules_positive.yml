rules:
- id: cfg-test-attribute-workspace
  message: 'Refactor detected: cfg(test) attribute in workspace crate'
  severity: INFO
  languages:
  - rust
  pattern: '#[cfg(test)]'
  metadata:
    nr_refactored_patterns: 4787
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/blockstore/src/**/*.rs'
    - '**/cache/src/**/*.rs'
    - '**/config/src/**/*.rs'
    - '**/error/src/**/*.rs'
    - '**/storage/src/**/*.rs'
    - '**/types/src/**/*.rs'
  options:
    symbolic_propagation: true
- id: pub-fn-in-workspace-crate
  message: 'Refactor detected: Public function in workspace crate'
  severity: INFO
  languages:
  - rust
  pattern: "pub fn $NAME(...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 570
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/blockstore/src/**/*.rs'
    - '**/cache/src/**/*.rs'
    - '**/config/src/**/*.rs'
    - '**/error/src/**/*.rs'
    - '**/storage/src/**/*.rs'
    - '**/types/src/**/*.rs'
  options:
    symbolic_propagation: true
- id: from-trait-impl-workspace
  message: 'Refactor detected: From trait implementation for workspace type'
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: "impl From<$T1> for $T2 {\n  ...\n}\n"
    - pattern: "impl<$GENERIC> From<$T1> for $T2 {\n  ...\n}\n"
  - pattern-inside: 'use $CRATE::$ANY;

      ...

      '
  - metavariable-regex:
      metavariable: $CRATE
      regex: ^chroma_[a-z_]+$
  metadata:
    nr_refactored_patterns: 343
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: result-type-with-workspace-error
  message: 'Refactor detected: Result type with workspace error'
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: "fn $FUNC(...) -> Result<$OK, Box<dyn $ERROR>> {\n  ...\n}\n"
    - pattern: "fn $FUNC(...) -> Result<$OK, $ERROR> {\n  ...\n}\n"
  - pattern-inside: 'use chroma_error::$ANY;

      ...

      '
  metadata:
    nr_refactored_patterns: 265
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-from-chroma-types
