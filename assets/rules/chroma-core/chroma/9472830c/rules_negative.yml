rules:
- id: detect-old-types-import-simple
  message: 'Old import pattern detected: should use ''use chroma_types'' instead of
    ''use crate::types'''
  severity: WARNING
  languages:
  - rust
  pattern: use crate::types
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 121
- id: detect-pub-crate-in-blockstore
  message: pub(crate) visibility in blockstore module - may need to be 'pub' after
    extraction to separate crate
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\(crate\)\s+(struct|enum|fn|trait|type)
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
  paths:
    include:
    - rust/worker/src/blockstore/
- id: detect-crate-types-in-type-annotation
