rules:
- id: throw-responsehelper-namespace-error
  message: Import error class directly from '@/errors/response-errors/' instead of
    using ResponseHelper namespace
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: throw new ResponseHelper.$ERROR(...)
    - pattern: throw ResponseHelper.$ERROR
  - metavariable-regex:
      metavariable: $ERROR
      regex: (BadRequest|Auth|Unauthorized|NotFound|Conflict|UnprocessableRequest|InternalServer|ServiceUnavailable)Error
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 208
- id: error-instantiation-in-controller-old-import
  message: Controller using error from old ResponseHelper import - update to '@/errors/response-errors/'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: new $ERROR(...)
  - metavariable-regex:
      metavariable: $ERROR
      regex: (BadRequest|Auth|Unauthorized|NotFound|Conflict|UnprocessableRequest|InternalServer|ServiceUnavailable)Error
  - pattern-inside: 'import { ..., $ERROR, ... } from ''@/ResponseHelper''

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 108
  paths:
    include:
    - '**/controllers/**'
- id: new-badrequest-from-responsehelper-import
  message: BadRequestError instantiation using old import from ResponseHelper - update
    import to '@/errors/response-errors/bad-request.error'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: new BadRequestError(...)
  - pattern-inside: 'import { ..., BadRequestError, ... } from ''@/ResponseHelper''

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: if-throw-responsehelper-error-pattern
  message: If statement throwing error from old ResponseHelper import - update to
    '@/errors/response-errors/'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'if ($COND) throw new BadRequestError(...)

        '
    - pattern: 'if ($COND) throw new NotFoundError(...)

        '
    - pattern: 'if ($COND) throw new InternalServerError(...)

        '
  - pattern-inside: 'import { ..., $ERROR, ... } from ''@/ResponseHelper''

      ...

      '
  - metavariable-regex:
      metavariable: $ERROR
      regex: (BadRequest|NotFound|InternalServer)Error
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: async-throw-responsehelper-error
  message: Async function throwing BadRequestError from old ResponseHelper import
    - update to '@/errors/response-errors/'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: "async function $FUNC(...) {\n  ...\n  throw new BadRequestError(...)\n\
        \  ...\n}\n"
    - pattern: "async ($ARGS) => {\n  ...\n  throw new BadRequestError(...)\n  ...\n\
        }\n"
  - pattern-inside: 'import { ..., BadRequestError, ... } from ''@/ResponseHelper''

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: multiple-error-classes-in-single-file
  message: Multiple error classes should be extracted to dedicated error files
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'class $ERROR1 extends $BASE1 { ... }

      ...

      class $ERROR2 extends $BASE2 { ... }

      '
  - metavariable-regex:
      metavariable: $ERROR1
      regex: .*Error$
  - metavariable-regex:
      metavariable: $ERROR2
      regex: .*Error$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
  paths:
    include:
    - '**/ResponseHelper.ts'
    - '**/variables.service.ee.ts'
    - '**/workflowHistory.service.ee.ts'
- id: responsehelper-error-with-relative-import-pattern
  message: Import error class from '@/errors/response-errors/' instead of ResponseHelper
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: import { ..., $ERROR, ... } from $PATH
  - metavariable-regex:
      metavariable: $ERROR
      regex: (BadRequest|Auth|Unauthorized|NotFound|Conflict|UnprocessableRequest|InternalServer|ServiceUnavailable)Error
  - metavariable-regex:
      metavariable: $PATH
      regex: .*ResponseHelper.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: try-catch-rethrow-responsehelper-error
  message: Try-catch rethrowing error from old ResponseHelper import - update to '@/errors/response-errors/'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "try {\n  ...\n} catch ($E) {\n  ...\n  throw new $ERROR(...)\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $ERROR
      regex: (BadRequest|Auth|NotFound|InternalServer)Error
  - pattern-inside: 'import { ..., $ERROR, ... } from ''@/ResponseHelper''

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
