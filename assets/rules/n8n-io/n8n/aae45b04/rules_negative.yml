rules:
- id: import-from-expression-error-root-file
  message: ExpressionError should be imported from /errors directory, not from root
    ExpressionError.ts file
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ... } from './ExpressionError'
    - pattern: import { ... } from "../ExpressionError"
    - pattern: import { ... } from '../../ExpressionError'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: old-execution-metadata-validation-error-usage
  message: Use InvalidExecutionMetadataError instead of ExecutionMetadataValidationError
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: new ExecutionMetadataValidationError(...)
    - pattern: 'throw new ExecutionMetadataValidationError(...)

        '
    - pattern: '$X instanceof ExecutionMetadataValidationError

        '
  - pattern-not-inside: 'class ExecutionMetadataValidationError extends $BASE { ...
      }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-node-errors-file-import
  message: NodeErrors.ts should be split into separate error files in /errors directory
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ... } from './NodeErrors'
    - pattern: import { ... } from "./NodeErrors"
    - pattern: import { ... } from 'n8n-workflow/NodeErrors'
    - pattern: import { ... } from "n8n-workflow/NodeErrors"
    - pattern: import { ... } from '../NodeErrors'
    - pattern: import { ... } from "../NodeErrors"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: import-from-node-errors-file
  message: NodeErrors.ts should be split into separate error files in /errors directory
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., NodeSSLError, ... } from './NodeErrors'
    - pattern: import { ..., NodeSSLError, ... } from "../NodeErrors"
    - pattern: import { ..., NodeApiError, ... } from './NodeErrors'
    - pattern: import { ..., NodeOperationError, ... } from './NodeErrors'
    - pattern: import { ..., NodeError, ... } from './NodeErrors'
    - pattern: import { ..., ExecutionBaseError, ... } from './NodeErrors'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: export-errors-from-workflow-index-old-way
  message: Errors should be exported from /errors directory structure, not from individual
    root files
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: export * from './NodeErrors'
    - pattern: export * from './WorkflowErrors'
    - pattern: export * from './WorkflowActivationError'
    - pattern: export * from './ExpressionError'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: export-star-from-old-error-files
  message: Export errors from /errors directory instead of individual root files
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: export * from './NodeErrors'
    - pattern: export * from './WorkflowErrors'
    - pattern: export * from './WorkflowActivationError'
    - pattern: export * from './ExpressionError'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-webhook-path-already-taken-error-usage
  message: Use WebhookPathTakenError instead of WebhookPathAlreadyTakenError
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: new WebhookPathAlreadyTakenError(...)
    - pattern: 'throw new WebhookPathAlreadyTakenError(...)

        '
    - pattern: '$X instanceof WebhookPathAlreadyTakenError

        '
  - pattern-not-inside: 'class WebhookPathAlreadyTakenError extends $BASE { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: throw-old-error-names-execution-metadata-validation
  message: Use InvalidExecutionMetadataError instead of ExecutionMetadataValidationError
  severity: WARNING
  languages:
  - typescript
  pattern: throw new ExecutionMetadataValidationError(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: new-execution-metadata-validation-instantiation
  message: Use InvalidExecutionMetadataError instead of ExecutionMetadataValidationError
