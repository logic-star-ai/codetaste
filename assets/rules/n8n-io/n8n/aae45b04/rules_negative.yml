  - pattern-not-inside: 'class ExecutionMetadataValidationError extends $BASE { ...
      }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: import-expression-errors-from-root
  message: ExpressionError should be imported from /errors directory
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., ExpressionError, ... } from './ExpressionError'
