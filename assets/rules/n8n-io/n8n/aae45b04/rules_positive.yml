rules:
- id: error-file-naming-pattern-kebab-case
  message: Error file uses kebab-case naming convention
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/workflow/src/errors/*-*.error.ts
    - packages/core/src/errors/*-*.error.ts
- id: import-application-error-from-errors
  message: ApplicationError imported from errors module
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: 'import { ApplicationError } from ''./errors''

      '
  - pattern: 'import { ApplicationError } from ''./errors/index''

      '
  - pattern: 'import { ApplicationError } from ''../errors''

      '
  - pattern: 'import { ApplicationError } from ''@/errors''

      '
  - pattern: 'import { ApplicationError } from ''n8n-workflow''

      '
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: abstract-error-file-in-abstract-dir
  message: Abstract error file in abstract directory
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/workflow/src/errors/abstract/*.error.ts
    - packages/core/src/errors/abstract/*.error.ts
- id: throw-invalid-execution-metadata-error
