rules:
- id: imports-from-types-db-path
  message: Import from @/types-db detected (refactoring applied)
  severity: INFO
  languages:
  - typescript
  pattern-regex: from\s+['"]@/types-db['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: import-statement-with-types-db-path
  message: Import statement using @/types-db path
  severity: INFO
  languages:
  - typescript
  pattern-regex: ^import\s+(type\s+)?\{[^}]+\}\s+from\s+['"]@/types-db['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: generic-import-from-types-db
  message: Generic import from @/types-db (refactoring applied)
  severity: INFO
  languages:
  - typescript
  pattern-regex: import.*from\s+['"]@/types-db['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: type-only-import-from-types-db
  message: Type-only import from @/types-db
  severity: INFO
  languages:
  - typescript
  pattern-regex: import\s+type\s*\{.*\}\s+from\s+['"]@/types-db['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: types-db-conditional-type-pattern
  message: types-db.ts uses conditional/optional type patterns
  severity: INFO
  languages:
  - typescript
  pattern-regex: \?\s*:\s*(null|undefined|\w+)
  metadata:
    category: structural
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/cli/src/types-db.ts
- id: test-files-imports-types-db
  message: Test file imports from @/types-db
  severity: INFO
  languages:
  - typescript
  pattern-regex: from\s+['"]@/types-db['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/cli/src/**/*.test.ts
    - packages/cli/test/**/*.ts
- id: types-db-has-many-exports
  message: types-db.ts has type/interface export
  severity: INFO
  languages:
  - typescript
  pattern-regex: export\s+(interface|type)\s+\w+
  metadata:
    category: structural
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/cli/src/types-db.ts
- id: types-db-export-statement-pattern
