  severity: INFO
  languages:
  - typescript
  pattern-regex: ^export\s+(type|interface)\s+(IWorkflowDb|ICredentialsDb|ICredentialsBase|IExecutionBase|IExecutionResponse|PublicUser|IPersonalizationSurveyAnswers|ITagDb|ITagBase|IAnnotationTagDb|UserSettings|SlimProject|UsageCount|WorkflowWithSharingsAndCredentials|WorkflowWithSharingsMetaDataAndCredentials|CredentialUsedByWorkflow)\b
  metadata:
    category: structural
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/cli/src/types-db.ts
- id: imports-types-db-execution-related
  message: Execution-related database types imported from @/types-db
  severity: INFO
  languages:
  - typescript
  pattern-regex: \b(IExecutionBase|IExecutionResponse|IExecutionDb)\b.*from\s+['"]@/types-db['"]|from\s+['"]@/types-db['"].*\b(IExecutionBase|IExecutionResponse|IExecutionDb)
