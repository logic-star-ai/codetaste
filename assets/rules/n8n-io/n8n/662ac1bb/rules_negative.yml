    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*.store.ts'
    - '**/stores/**/*.ts'
- id: detect-async-function-returning-itemplatescollection
  message: Function returning Promise with ITemplatesCollection should use type from
    '@n8n/rest-api-client'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: async\s+function[^(]*\([^)]*\):\s*Promise<.*ITemplatesCollection
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/frontend/editor-ui/**/*.ts
- id: detect-function-parameter-iworkflowdata
