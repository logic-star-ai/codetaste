    nr_legacy_patterns: 2
  paths:
    include:
    - packages/frontend/editor-ui/**/*.ts
    - packages/frontend/editor-ui/**/*.vue
- id: detect-old-templates-api-import-from-editor-ui
  message: Template API methods should be imported from '@n8n/rest-api-client' package,
    not from '@/api/templates'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'import { ... } from ''@/api/templates''

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-old-templates-file-existence
  message: Old templates.ts file should be deleted - templates API moved to @n8n/rest-api-client
