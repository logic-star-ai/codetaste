    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-interface-types-in-test-files
  message: Test files should import types from '@n8n/rest-api-client'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+type\s*\{[^}]*(IWorkflowTemplate|ITemplatesCollection|ITemplatesCategory|ITemplatesQuery|ITemplatesWorkflow|ITag|IWorkflowData|IWorkflowDataCreate|IWorkflowDataUpdate)[^}]*\}\s+from\s+['"]@/Interface['"]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/*.test.ts'
    - '**/*.spec.ts'
- id: detect-iworkflowdatacreate-type-annotation
  message: IWorkflowDataCreate (now WorkflowDataCreate) should be from '@n8n/rest-api-client'
  severity: WARNING
  languages:
  - typescript
