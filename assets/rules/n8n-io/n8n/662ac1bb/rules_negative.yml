rules:
- id: detect-mixed-import-with-interface-templates
  message: Template types should be imported from '@n8n/rest-api-client' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+(type\s+)?\{[^}]*(IWorkflowTemplate|ITemplatesCollection|ITemplatesCategory|ITemplatesQuery|ITemplatesWorkflow|ITemplatesWorkflowResponse|ITemplatesCollectionResponse|ITemplatesNode|IWorkflowTemplateNode|IWorkflowTemplateNodeCredentials)[^}]*\}\s+from\s+['"]@/Interface['"]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-multi-line-import-from-interface-with-templates
  message: Multi-line import of template types from @/Interface should be from '@n8n/rest-api-client'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+type\s*\{[\s\S]{0,200}(IWorkflowTemplate|ITemplatesCollection|ITemplatesCategory|ITemplatesQuery|ITemplatesWorkflow|ITemplatesCollectionResponse|ITemplatesWorkflowResponse|TemplateSearchFacet|ITemplatesNode|IWorkflowTemplateNode)[\s\S]{0,200}\}\s+from\s+['"]@/Interface['"]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-iworkflowtemplate-in-interface-import
  message: IWorkflowTemplate should be imported from '@n8n/rest-api-client' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+type\s*\{[^}]*IWorkflowTemplate[^}]*\}\s+from\s+['"]@/Interface['"]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-iworkflowdataupdate-type-annotation
  message: IWorkflowDataUpdate (now WorkflowDataUpdate) should be from '@n8n/rest-api-client'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: :\s*IWorkflowDataUpdate\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - packages/frontend/editor-ui/**/*.ts
    - packages/frontend/editor-ui/**/*.vue
- id: detect-as-iworkflowdata-cast
  message: IWorkflowData type cast should use WorkflowData from '@n8n/rest-api-client'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: as\s+IWorkflowData\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - packages/frontend/editor-ui/**/*.ts
    - packages/frontend/editor-ui/**/*.vue
- id: detect-multi-line-import-from-interface-with-workflow-types
  message: Multi-line import of workflow types from @/Interface should be from '@n8n/rest-api-client'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+type\s*\{[\s\S]{0,200}\b(IWorkflowData|IWorkflowDataCreate|IWorkflowDataUpdate)\b[\s\S]{0,200}\}\s+from\s+['"]@/Interface['"]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-itag-in-interface-import
  message: ITag should be imported from '@n8n/rest-api-client/api/tags'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+type\s*\{[^}]*\bITag\b[^}]*\}\s+from\s+['"]@/Interface['"]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-iworkflowtemplatenode-in-interface-import
  message: IWorkflowTemplateNode should be imported from '@n8n/rest-api-client' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+type\s*\{[^}]*IWorkflowTemplateNode[^}]*\}\s+from\s+['"]@/Interface['"]
