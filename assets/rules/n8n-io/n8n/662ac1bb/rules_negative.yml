  pattern-regex: function[^(]*\([^)]*:\s*IWorkflowData\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/frontend/editor-ui/**/*.ts
- id: detect-union-type-with-iworkflowdata
  message: Union type with IWorkflowData should use WorkflowData from '@n8n/rest-api-client'
