rules:
- id: missing-workflow-activation-modal-composable
  message: WorkflowActivationModal composable is missing. Should be created for workflow
    activation dialog handling.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/testing/playwright/composables/WorkflowActivationModal.ts
- id: missing-workflow-settings-modal-composable
  message: WorkflowSettingsModal composable is missing. Should be created for workflow
    settings dialog handling.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/testing/playwright/composables/WorkflowSettingsModal.ts
- id: missing-production-checklist-composable
  message: ProductionChecklist composable is missing. Should be created for production
    checklist functionality.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/testing/playwright/composables/ProductionChecklist.ts
- id: workflow-composer-uses-timestamp
  message: WorkflowComposer uses Date.now() for unique IDs. Should be refactored to
    use nanoid for better test isolation.
  severity: WARNING
  languages:
  - typescript
  pattern: Date.now()
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/testing/playwright/composables/WorkflowComposer.ts
- id: missing-workflow-activation-modal-composable-file
  message: WorkflowActivationModal composable file is missing. Should be created for
