rules:
- id: vue-locale-dollar-sign-usage
  message: Replace $locale global property with i18n composable. Import with 'import
    { useI18n } from "@/composables/useI18n"' and initialize with 'const i18n = useI18n()'
    in the setup section
  severity: WARNING
  languages:
  - generic
  pattern-regex: \$locale
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 358
  paths:
    include:
    - packages/editor-ui/src/**/*.vue
