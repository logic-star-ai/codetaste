rules:
- id: any-expression-in-new-files
  message: Detected expressions in new permission files
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $EXPR
  metadata:
    nr_refactored_patterns: 1146
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/src/utilities/**/*.ts'
    - '**/packages/@n8n/permissions/src/roles/**/*.ts'
- id: broad-permission-usage-pattern
  message: Detected permission function usage
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: hasGlobalScope($A, $B)
    - pattern: getRoleScopes($A)
    - pattern: rolesWithScope($A, $B)
    - pattern: getGlobalScopes($A)
  metadata:
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/cli/**/*.ts'
    exclude:
    - '**/*.test.ts'
    - '**/*.spec.ts'
  options:
    symbolic_propagation: true
- id: describe-blocks-in-new-tests
  message: Detected describe blocks in new tests
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: describe(...)
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/test/**/*.ts'
    - '**/packages/@n8n/permissions/**/*.test.ts'
    exclude:
    - '**/packages/@n8n/permissions/test/hasScope.test.ts'
- id: hasglobalscope-call-with-user-parameter
  message: Detected hasGlobalScope called with user as first parameter
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: hasGlobalScope($USER, $SCOPE, ...)
  - pattern-not-inside: "class $C {\n  ...\n  hasGlobalScope(...) { ... }\n  ...\n\
      }\n"
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: roleswithscope-namespace-parameter
  message: Detected rolesWithScope called with namespace parameter
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: rolesWithScope($NAMESPACE, ...)
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: project-role-import-not-from-api-types
  message: Detected ProjectRole import NOT from @n8n/api-types
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $ROLE, ... } from '$PKG'
  - metavariable-regex:
      metavariable: $ROLE
      regex: ^ProjectRole$
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(?!.*api-types).*permissions.*$
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: const-declarations-in-utilities
  message: Detected const declarations in utilities
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const $VAR = ...
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/src/utilities/**/*.ts'
- id: import-from-permissions-in-new-context
  message: Detected import from permissions in new context
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { $UTIL, ... } from '@n8n/permissions'
  - metavariable-regex:
      metavariable: $UTIL
      regex: (?i)^(hasGlobalScope|getRoleScopes|rolesWithScope|getGlobalScopes)$
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/packages/cli/src/controllers/project.controller.ts'
    - '**/packages/cli/src/services/role.service.ts'
- id: jsdoc-for-permission-utilities
  message: Detected JSDoc documentation for permission utilities
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: "/**\n * ...\n */\nexport function $FUNC(...) {\n  ...\n}\n"
    - pattern: "/**\n * ...\n */\nfunction $FUNC(...) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(scope|role|permission|access).*
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/src/utilities/*.ts'
- id: any-permissions-file-in-utilities
  message: Detected any file in permissions utilities directory
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/src/utilities/**/*.ts'
- id: import-role-types-from-permissions
  message: Detected import of role types from @n8n/permissions (refactoring applied)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $TYPE, ... } from '@n8n/permissions'
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(sharing.*role|role.*sharing|credential.*role|workflow.*role).*
  - pattern-not: import { ... } from '@n8n/db'
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: scope-definitions-in-separate-files
  message: Detected scope definitions in dedicated scope files
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: export const $SCOPES = [...]
    - pattern: export const $SCOPE_VAR = $VALUE
  - metavariable-regex:
      metavariable: $SCOPES
      regex: (?i).*(scopes?|permissions?).*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/**/*scopes*.ts'
- id: new-test-files-in-permissions
  message: Detected new test files in permissions
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/test/**/*.ts'
    - '**/packages/@n8n/permissions/**/*.test.ts'
    exclude:
    - '**/packages/@n8n/permissions/test/hasScope.test.ts'
- id: object-literals-in-roles
  message: Detected object literals in roles
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '{ ... }'
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/src/roles/**/*.ts'
- id: export-role-schema-from-permissions
  message: Detected export of role schema from @n8n/permissions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: export { ..., $SCHEMA, ... }
    - pattern: export const $SCHEMA = ...
  - metavariable-regex:
      metavariable: $SCHEMA
      regex: (?i).*(role.*schema|schema.*role).*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/**/*.ts'
  options:
    symbolic_propagation: true
- id: import-roleswithscope-from-permissions
  message: Detected import of rolesWithScope utility from @n8n/permissions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., rolesWithScope, ... } from '@n8n/permissions'
    - pattern: import { rolesWithScope } from '@n8n/permissions'
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: permissions-package-utilities-directory
  message: Detected file in @n8n/permissions /utilities directory
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/src/utilities/*.ts'
- id: schema-validation-test-for-roles
  message: Detected schema validation test for role types
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $SCHEMA.parse(...)
    - pattern: $SCHEMA.safeParse(...)
  - metavariable-regex:
      metavariable: $SCHEMA
      regex: (?i).*(role.*schema|schema.*role).*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/**/*.test.ts'
- id: permission-checking-in-service
  message: Detected permission checking in service using new utilities
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: hasGlobalScope(...)
    - pattern: getRoleScopes(...)
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/cli/src/services/*.ts'
  options:
    symbolic_propagation: true
- id: roles-with-scope-utility-usage
  message: Detected usage of rolesWithScope utility
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'import { ..., rolesWithScope, ... } from ''@n8n/permissions''

      ...

      rolesWithScope(...)

      '
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: permission-jsdoc-with-params
  message: Detected JSDoc with @param for permission functions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (?s)/\*\*.*@param.*\*/
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/src/utilities/*.ts'
- id: roles-directory-exists
  message: Detected roles directory in permissions
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/src/roles/**'
- id: getrolescopes-assigned-to-variable
  message: Detected getRoleScopes result assigned to variable
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const $VAR = getRoleScopes(...)
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-getrolescopes-from-permissions
  message: Detected import of getRoleScopes utility from @n8n/permissions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., getRoleScopes, ... } from '@n8n/permissions'
    - pattern: import { getRoleScopes } from '@n8n/permissions'
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: resource-parameter-in-getrolescopes
  message: Detected getRoleScopes with optional resource filter parameter
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: getRoleScopes($ROLE, $FILTERS)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/node_modules/**'
  options:
    symbolic_propagation: true
- id: scope-checking-without-user-method
  message: Detected scope checking using standalone function instead of user method
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { hasGlobalScope } from ''@n8n/permissions''

        ...

        hasGlobalScope($USER, ...)

        '
    - pattern: 'import { ..., hasGlobalScope, ... } from ''@n8n/permissions''

        ...

        hasGlobalScope($USER, ...)

        '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: api-key-scope-type-test
  message: Detected type-level test for ApiKeyScope
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (?i).*apikeyscope.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/**/*.test.ts'
- id: import-all-roles-constant
  message: Detected import of ALL_ROLES constant
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., $CONST, ... } from '@n8n/permissions'
    - pattern: import { $CONST } from '@n8n/permissions'
  - metavariable-regex:
      metavariable: $CONST
      regex: (?i).*all.*roles?.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: credential-sharing-role-type-in-permissions
  message: Detected CredentialSharingRole type in permissions package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (?s).*CredentialSharingRole.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/**/*.ts'
    exclude:
    - '**/packages/@n8n/db/**'
- id: role-scopes-utility-usage
  message: Detected usage of getRoleScopes utility
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'import { ..., getRoleScopes, ... } from ''@n8n/permissions''

      ...

      getRoleScopes(...)

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: permissions-package-roles-directory
  message: Detected file in @n8n/permissions /roles directory
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/src/roles/*.ts'
- id: role-scope-constant-export
  message: Detected export of role scope constants
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: export const $CONST = [...]
    - pattern: export const $CONST = $VALUE
  - metavariable-regex:
      metavariable: $CONST
      regex: (?i).*(role.*scope|scope.*role).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/**/*.ts'
- id: import-zod-in-permissions
  message: Detected zod import in permissions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ... } from 'zod'
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/**/*.ts'
- id: import-role-schema-from-permissions
  message: Detected import of role schema from @n8n/permissions package (refactoring
    applied)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $SCHEMA, ... } from '@n8n/permissions'
  - metavariable-regex:
      metavariable: $SCHEMA
      regex: (?i).*(role.*schema|schema.*role).*
  - pattern-not-inside: 'import { ... } from ''@n8n/api-types''

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-hasglobalscope-from-permissions
  message: Detected import of hasGlobalScope from @n8n/permissions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., hasGlobalScope, ... } from '@n8n/permissions'
    - pattern: import { hasGlobalScope } from '@n8n/permissions'
  - pattern-not-inside: 'import { ... } from ''@n8n/db''

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-authprincipal-type
  message: Detected import of AuthPrincipal interface from @n8n/permissions
