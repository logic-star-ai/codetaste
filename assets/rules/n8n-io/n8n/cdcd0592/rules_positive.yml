- id: hasglobalscope-test-file
  message: Detected hasGlobalScope test file
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/@n8n/permissions/test/*hasglobalscope*.ts'
    - '**/packages/@n8n/permissions/**/*has-global-scope*.test.ts'
