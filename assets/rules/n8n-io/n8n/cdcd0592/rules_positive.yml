- id: test-case-for-roleswithscope
  message: Detected specific test case for rolesWithScope
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: test('$NAME', ...)
    - pattern: it('$NAME', ...)
  - metavariable-regex:
