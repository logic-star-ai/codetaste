- id: rbac-refactor-import-multiple-utilities
  message: Detected import of multiple RBAC utilities from @n8n/permissions
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: import { $A, $B, ... } from '@n8n/permissions'
  - metavariable-pattern:
      metavariable: $A
      patterns:
      - pattern-either:
        - pattern: hasGlobalScope
        - pattern: getGlobalScopes
        - pattern: getRoleScopes
        - pattern: rolesWithScope
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
