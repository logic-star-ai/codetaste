  - pattern: import { $A, $B, ... } from '@n8n/permissions'
  - metavariable-pattern:
      metavariable: $A
      patterns:
      - pattern-either:
        - pattern: CredentialSharingRole
        - pattern: WorkflowSharingRole
        - pattern: ProjectRole
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
