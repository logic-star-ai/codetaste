    - '**/packages/@n8n/permissions/**/role-maps*.ts'
- id: test-for-combineScopes
  message: Detected test for combineScopes utility
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: describe('$NAME', ...)
    - pattern: test('$NAME', ...)
    - pattern: it('$NAME', ...)
  - metavariable-regex:
      metavariable: $NAME
      regex: (?i).*(combine.*scope|combineScope).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
