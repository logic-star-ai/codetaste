rules:
- id: this-role-service-roles-with-scope
  message: Consider replacing this.roleService.rolesWithScope() with rolesWithScope()
    utility from '@n8n/permissions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: this.roleService.rolesWithScope(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: this-role-service-get-role-scopes
  message: Consider replacing this.roleService.getRoleScopes() with getRoleScopes()
    utility from '@n8n/permissions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: this.roleService.getRoleScopes(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: roleservice-roles-with-scope-project
  message: Replace this.roleService.rolesWithScope() with rolesWithScope() utility
    from '@n8n/permissions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'this.roleService.rolesWithScope(''project'', $SCOPES)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: import-workflow-sharing-role-from-db
  message: WorkflowSharingRole should be imported from '@n8n/permissions' instead
    of '@n8n/db'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'import { ..., WorkflowSharingRole, ... } from ''@n8n/db''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: import-credential-sharing-role-from-db
  message: CredentialSharingRole should be imported from '@n8n/permissions' instead
    of '@n8n/db'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'import { ..., CredentialSharingRole, ... } from ''@n8n/db''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: roleservice-get-role-scopes-user-role
  message: Replace this.roleService.getRoleScopes() with getRoleScopes() utility from
    '@n8n/permissions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'this.roleService.getRoleScopes(req.user.role)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: roleservice-roles-with-scope-credential
  message: Replace this.roleService.rolesWithScope() with rolesWithScope() utility
    from '@n8n/permissions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'this.roleService.rolesWithScope(''credential'', $SCOPES)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: roleservice-roles-with-scope-workflow
  message: Replace this.roleService.rolesWithScope() with rolesWithScope() utility
    from '@n8n/permissions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'this.roleService.rolesWithScope(''workflow'', $SCOPES)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: this-role-service-is-role-licensed
  message: Role metadata should be accessed from '@n8n/permissions' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: this.roleService.isRoleLicensed(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: scope-map-in-role-service
  message: Scope mappings should be consolidated in '@n8n/permissions' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: (GLOBAL|PROJECT|CREDENTIALS|WORKFLOW)_SCOPE_MAP:\s*Record<
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/cli/src/services/role.service.ts
- id: user-global-scopes-in-variable
  message: Replace user.globalScopes with getGlobalScopes(user) from '@n8n/permissions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '$VAR = $USER.globalScopes

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: role-service-get-roles-call
  message: Role metadata should be accessed from '@n8n/permissions' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $SERVICE.getRoles()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: role-service-get-role-name
  message: Role metadata should be accessed from '@n8n/permissions' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $SERVICE.getRoleName(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: static-scope-map-definition
  message: Static role-to-scope mappings should be imported from '@n8n/permissions'
    instead of being defined locally
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const STATIC_SCOPE_MAP: Record<$ROLE, Scope[]> = { ... }

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: credential-sharing-role-type-definition-in-db
  message: CredentialSharingRole type should be defined in '@n8n/permissions', not
    '@n8n/db'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: type CredentialSharingRole = ['"]credential:(owner|user)['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/@n8n/db/
- id: workflow-sharing-role-type-definition-in-db
  message: WorkflowSharingRole type should be defined in '@n8n/permissions', not '@n8n/db'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: type WorkflowSharingRole = ['"]workflow:(owner|editor)['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/@n8n/db/
- id: project-role-schema-in-api-types
  message: projectRoleSchema should be moved to '@n8n/permissions' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: projectRoleSchema\s*=\s*z\.enum
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/@n8n/api-types/
- id: user-entity-has-global-scope-method
  message: hasGlobalScope method should be removed from User entity and replaced with
    utility from '@n8n/permissions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "hasGlobalScope($SCOPE, $OPTIONS?) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/@n8n/db/src/entities/user.ts
- id: static-scope-map-in-user-entity
  message: Scope mappings should be imported from '@n8n/permissions' instead of being
    defined in User entity
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: STATIC_SCOPE_MAP:\s*Record<GlobalRole,\s*Scope\[\]>
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/@n8n/db/src/entities/user.ts
- id: role-names-map-in-service
  message: Role metadata (names) should be in '@n8n/permissions' ALL_ROLES map
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: ROLE_NAMES:\s*Record<
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/cli/src/services/role.service.ts
- id: combined-map-in-role-service
  message: Combined role-to-scope mappings should be in '@n8n/permissions' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: COMBINED_MAP\s*=\s*Object\.fromEntries
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/cli/src/services/role.service.ts
- id: all-maps-definition-in-service
  message: Role maps should be consolidated in '@n8n/permissions' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: ALL_MAPS:\s*(AllMaps|\{)
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/cli/src/services/role.service.ts
- id: role-namespace-type
  message: Role namespace types should be consolidated in '@n8n/permissions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: type RoleNamespace = ['"]global['"] \| ['"]project['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/cli/src/services/role.service.ts
- id: all-role-types-union-in-service
  message: Role type unions should be in '@n8n/permissions' package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: 'export type AllRoleTypes = '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/cli/src/services/role.service.ts
- id: in-roleservice-roles-with-scope
  message: Replace this.roleService.rolesWithScope() with rolesWithScope() utility
    from '@n8n/permissions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'role: In(this.roleService.rolesWithScope(...))

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
