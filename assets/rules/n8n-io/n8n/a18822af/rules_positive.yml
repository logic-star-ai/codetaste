  severity: INFO
  languages:
  - typescript
  pattern-regex: import\s+.*\s+from\s+['"]@n8n/rest-api-client['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 53
    nr_legacy_patterns: 0
