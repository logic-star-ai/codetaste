  message: Detected import of utility functions from @n8n/rest-api-client package
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., $FUNC, ... } from '@n8n/rest-api-client'
    - pattern: import * as $VAR from '@n8n/rest-api-client'
  - metavariable-pattern:
      metavariable: $FUNC
      patterns:
      - pattern-either:
        - pattern: makeRestApiRequest
        - pattern: getFullApiResponse
        - pattern: request
        - pattern: get
        - pattern: post
        - pattern: patch
        - pattern: streamRequest
  metadata:
    category: dependency
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
