  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "import {\n  ...\n} from '@/databases/repositories/workflow.repository'\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 77
