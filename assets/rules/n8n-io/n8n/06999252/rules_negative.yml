rules:
- id: workflow-repository-listquery-type-in-workflow-repo
  message: ListQuery type import in WorkflowRepository file indicates repository hasn't
    been moved yet
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: import type { ListQuery } from '@/requests'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 277
  paths:
    include:
    - packages/cli/src/databases/repositories/workflow.repository.ts
- id: workflow-repository-old-import-named
  message: WorkflowRepository should be imported from '@n8n/db' instead of '@/databases/repositories/workflow.repository'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { $IMPORTS } from '@/databases/repositories/workflow.repository'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 77
- id: workflow-repository-old-import-multiline-named
