rules:
- id: old-runners-directory-exists
  message: File in old 'runners/' directory detected. Directory should be renamed
    to 'task-runners/'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
  paths:
    include:
    - '**/src/runners/**'
    exclude:
    - '**/src/task-runners/**'
- id: old-runners-directory-test-path
  message: Import from old '@/runners/' directory detected. Should be '@/task-runners/'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: from\s+['"]@/runners/
  - pattern-not-regex: from\s+['"]@/task-runners/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: old-runner-shared-utils-import
  message: Import from old '@/runners/' path detected. Should use '@/task-runners/'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: from\s+['"]@/runners/[\w-]+['"]
  - pattern-not-regex: from\s+['"]@/task-runners/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: old-runner-unit-test-path
  message: Test file in old 'runners/__tests__/' path detected. Should be in 'task-runners/__tests__/'
  severity: WARNING
