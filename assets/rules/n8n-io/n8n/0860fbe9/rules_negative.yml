    to 'TaskRunnerLifecycleEvents'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { RunnerLifecycleEvents } from $PATH
    - pattern: import { ..., RunnerLifecycleEvents, ... } from $PATH
    - pattern: import { RunnerLifecycleEvents as $ALIAS } from $PATH
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
