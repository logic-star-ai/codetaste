  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: import\s+.*\s+from\s+['"].*/(task-managers/)?task-manager['"];?
  - pattern-not-regex: import\s+.*\s+from\s+['"].*task-requester['"];?
