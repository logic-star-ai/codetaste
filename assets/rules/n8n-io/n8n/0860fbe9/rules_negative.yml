    'task-runner-ws-server'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: import\s+.*\s+from\s+['"](.*/)runner-ws-server['"];?
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-runner-lifecycle-events-import-pattern
