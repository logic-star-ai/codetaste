rules:
- id: interface-from-n8n-workflow-exclude-mixins
  message: Interface imports from 'n8n-workflow' should use 'import type' syntax
  severity: WARNING
  languages:
  - typescript
  pattern-regex: ^\s*import\s+\{\s*I[A-Z][\w,\s]+\}\s+from\s+['"]n8n-workflow['"];?\s*$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
  paths:
    include:
    - packages/editor-ui/
    exclude:
    - packages/editor-ui/src/mixins/
