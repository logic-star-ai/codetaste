    - pattern: import { $X } from '@/auth/jwt'
    - pattern: import { ..., $X, ... } from '@/auth/jwt'
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: controller-method-with-request-response
