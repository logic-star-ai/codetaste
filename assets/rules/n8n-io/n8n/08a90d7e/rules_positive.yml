      regex: ^(Get|Post|Patch|Delete|Put)$
  metadata:
    category: refactoring
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: controller-method-accessing-req-user
  message: Decorated controller method accessing request user
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "@$DECORATOR(...)\n$METHOD($REQ, ...) {\n  ...\n  $REQ.user\n  ...\n\
      }\n"
  - metavariable-regex:
