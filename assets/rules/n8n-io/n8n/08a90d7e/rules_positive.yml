rules:
- id: jwt-import-from-auth-directory
  message: Import JWT utilities from auth directory (not UserManagement/auth)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., $FUNC, ... } from '@/auth/jwt'
    - pattern: import { ..., $FUNC, ... } from '@/auth/$FILE'
  - pattern-not-regex: .*UserManagement.*
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: controller-multiple-imports-from-helpers
  message: Controller imports multiple helper functions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { $FUNC1, ..., $FUNC2, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: .*(Helper|helper).*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.controller.ts'
    exclude:
    - '**/UserManagement/**'
  options:
    symbolic_propagation: true
- id: http-get-decorator-on-method
  message: Detected @Get decorator on controller method
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - pattern-either:
    - pattern-regex: ^\s*@Get\s*\([^)]*\)\s*$
    - pattern-regex: ^\s*@GET\s*\([^)]*\)\s*$
  - metavariable-regex:
      metavariable: $CLASS
      regex: .*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/UserManagement/routes/**'
  options:
    symbolic_propagation: true
- id: register-controller-function-call
  message: Detected registerController() call for new controller registration
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: registerController($APP, $CONFIG, ...)
    - pattern: registerController($APP, ...)
  - pattern-not-inside: "function registerController(...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/UserManagement/routes/**'
  options:
    symbolic_propagation: true
- id: controller-class-export
  message: Detected controller class being exported
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: "export class $CLASS {\n  ...\n}\n"
    - pattern: "class $CLASS {\n  ...\n}\n...\nexport { $CLASS }\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*[Cc]ontroller.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/UserManagement/routes/**'
  options:
    symbolic_propagation: true
- id: import-validate-password-from-helper
  message: Import validatePassword from helper
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., validatePassword, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: .*(helper|Helper).*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/UserManagement/**'
  options:
    symbolic_propagation: true
- id: register-controller-import
  message: Import registerController function
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., registerController, ... } from '$PATH'
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: controller-import-publicuser-type
  message: Controller imports PublicUser type
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { ..., PublicUser, ... } from '$PATH'
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
