- id: http-patch-decorator-on-method
  message: Detected @Patch decorator on controller method
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - pattern-either:
    - pattern-regex: ^\s*@Patch\s*\([^)]*\)\s*$
    - pattern-regex: ^\s*@PATCH\s*\([^)]*\)\s*$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/UserManagement/routes/**'
  options:
    symbolic_propagation: true
- id: http-delete-decorator-on-method
  message: Detected @Delete decorator on controller method
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - pattern-either:
    - pattern-regex: ^\s*@Delete\s*\([^)]*\)\s*$
    - pattern-regex: ^\s*@DELETE\s*\([^)]*\)\s*$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/UserManagement/routes/**'
  options:
    symbolic_propagation: true
- id: setup-auth-middlewares-call
  message: setupAuthMiddlewares function is called
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: setupAuthMiddlewares(...)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-setup-auth-middlewares
  message: Import setupAuthMiddlewares function
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { ..., setupAuthMiddlewares, ... } from '$PATH'
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: export-register-controller-function
  message: Export registerController function
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: export function registerController(...) { ... }
    - pattern: export const registerController = ...
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-multiple-controllers
  message: Import multiple controller classes
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { $CTRL1, ..., $CTRL2, ... } from '$PATH'
