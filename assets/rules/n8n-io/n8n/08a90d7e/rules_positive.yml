      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/controllers/**'
- id: import-typeorm-in-controller
  message: TypeORM imported in controller
  severity: INFO
  languages:
