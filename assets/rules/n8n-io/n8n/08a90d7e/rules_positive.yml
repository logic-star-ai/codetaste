rules:
- id: controller-method-async-handler
  message: Async method with route decorator detected
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '@$DECORATOR(...)

      async $METHOD(...) { ... }

      '
  - metavariable-regex:
      metavariable: $DECORATOR
      regex: ^(Get|Post|Patch|Delete|Put)$
  metadata:
    category: refactoring
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: controller-method-with-hooks-and-return
  message: Controller method with hooks call and return
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "@$DECORATOR(...)\nasync $METHOD(...) {\n  ...\n  await this.$HOOKS.$EMIT(...)\n\
      \  ...\n  return $RET\n}\n"
  - metavariable-regex:
      metavariable: $DECORATOR
      regex: ^(Get|Post|Patch|Delete|Put)$
  metadata:
    category: refactoring
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: controller-method-with-error-throw
  message: Controller method throwing errors
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "@$DECORATOR(...)\n$METHOD(...) {\n  ...\n  throw $ERR\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $DECORATOR
      regex: ^(Get|Post|Patch|Delete|Put)$
  metadata:
    category: refactoring
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: controller-method-with-id-field-access
  message: Controller method accessing id field
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "@$DECORATOR(...)\n$METHOD(...) {\n  ...\n  $OBJ.id\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $DECORATOR
      regex: ^(Get|Post|Patch|Delete|Put)$
  metadata:
    category: refactoring
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: decorated-method-with-single-param
  message: Decorated method with single request parameter
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '@$DECORATOR(...)

      $METHOD($REQ) { ... }

      '
  - metavariable-regex:
