rules:
- id: semicolon-at-end-controllers
  message: Semicolon usage in controllers
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: ;$
  metadata:
    nr_refactored_patterns: 446
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/controllers/**'
- id: regex-literal-in-controllers
  message: Regex literal in controllers
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: /[^/]+/
  metadata:
    nr_refactored_patterns: 95
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/controllers/**'
- id: const-declaration-in-controllers
  message: Const declaration in controllers
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: const $VAR = ...;
  metadata:
    nr_refactored_patterns: 79
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/controllers/**'
    exclude:
    - '**/databases/**'
- id: new-controller-instantiation-pattern
  message: New controller instantiation with object parameter
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: new $CTRL({ ... })
  - metavariable-regex:
      metavariable: $CTRL
      regex: .*[Cc]ontroller$
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/UserManagement/routes/**'
    - '**/node_modules/**'
- id: decorator-rest-controller-class-detected
  message: Detected decorator-based controller class - refactoring applied
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '@$DECORATOR(...)

        class $CLASS { ... }

        '
    - pattern: '@$DECORATOR

        class $CLASS { ... }

        '
  - metavariable-regex:
      metavariable: $DECORATOR
      regex: (?i).*(rest|route|controller|api|endpoint).*
  - pattern-not-inside: 'export function $FUNC(...) { ... }

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/UserManagement/routes/**'
    - '**/node_modules/**'
    - '**/test/**'
- id: register-controller-function-call
  message: Detected registerController call - new controller registration pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $FUNC($APP, $CONFIG, new $CONTROLLER(...))
    - pattern: $FUNC($APP, $CONFIG, new $CONTROLLER({ ... }))
    - pattern: $FUNC(..., new $CONTROLLER(...), ...)
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(register|mount|add|attach|use|setup|init).*[Cc]ontroller.*
  - pattern-not: $FUNC.apply($THIS)
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/UserManagement/routes/**'
    - '**/node_modules/**'
- id: controller-file-exists-in-controllers-dir
  message: Detected controller file in controllers directory - refactoring applied
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/controllers/*.controller.ts'
    - '**/src/controllers/*.controller.ts'
- id: import-express-types-in-controller
  message: Express types imported in controller
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., Request, ... } from 'express'
    - pattern: import { ..., Response, ... } from 'express'
  - pattern-inside: '$CODE

      ...

      export class $CLASS { ... }

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/controllers/**'
    exclude:
    - '**/UserManagement/**'
- id: controller-import-from-requests-module
  message: Controller importing from requests module
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $TYPE, ... } from '@/requests'
  - pattern-inside: '$IMPORTS

      ...

      export class $CLASS { ... }

      '
  - metavariable-regex:
      metavariable: $CLASS
      regex: .*[Cc]ontroller.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/controllers/**'
- id: controller-with-user-entity-import
  message: Controller importing User entity
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., User, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: .*entities.*
  - pattern-inside: '$IMPORTS

      ...

      export class $CLASS { ... }

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/controllers/**'
- id: controller-importing-validator
  message: Controller importing validator
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import validator from 'validator'
  - pattern-inside: '$IMPORTS

      ...

