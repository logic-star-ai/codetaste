    system
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., Get, ... } from $PKG
    - pattern: import { ..., Post, ... } from $PKG
    - pattern: import { ..., Patch, ... } from $PKG
    - pattern: import { ..., Delete, ... } from $PKG
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
