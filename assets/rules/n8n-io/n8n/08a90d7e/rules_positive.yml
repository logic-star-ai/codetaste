rules:
- id: decorator-with-root-slash-path
  message: HTTP decorator with root-relative path - controller routing pattern
  severity: INFO
  languages:
  - typescript
  pattern-regex: '@(Get|Post|Patch|Delete)\([''"]\/[^''"\)]*[''"\)]'
  metadata:
    category: api
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: controller-throw-response-helper-error
  message: Controller throwing ResponseHelper error - error handling in controller
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "@$DECORATOR($PATH)\nasync $METHOD(...) {\n  ...\n  throw new ResponseHelper.$ERROR(...);\n\
      \  ...\n}\n"
  - metavariable-pattern:
      metavariable: $DECORATOR
      pattern-regex: ^(Get|Post|Patch|Delete)$
  metadata:
    category: basic
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: post-method-decorator
  message: Detected @Post method decorator - indicates decorator-based route handler
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: '@Post($PATH)

      $METHOD(...) { ... }

      '
  - pattern-not-inside: '// @Post(...)

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: post-decorator-any-path
  message: Method with @Post decorator - POST endpoint in controller
  severity: INFO
  languages:
  - typescript
