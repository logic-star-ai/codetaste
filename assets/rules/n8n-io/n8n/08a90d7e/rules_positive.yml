- id: auth-controller-file-exists
  message: auth.controller.ts file exists
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/auth.controller.ts'
    - '**/auth.controller.js'
