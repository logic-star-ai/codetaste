- id: import-controller-for-registration
  message: Controller imported for registration
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { $CTRL } from '$PATH'
    - pattern: import $CTRL from '$PATH'
  - metavariable-regex:
      metavariable: $CTRL
      regex: (?i).*[Cc]ontroller$
  - metavariable-regex:
      metavariable: $PATH
      regex: .*controllers.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/UserManagement/routes/**'
    - '**/node_modules/**'
