      regex: ^(Get|Post|Patch|Delete|Put)$
  metadata:
    category: refactoring
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: controller-method-with-logger-calls
  message: Controller method with logger calls
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "@$DECORATOR(...)\n$METHOD(...) {\n  ...\n  $LOGGER.$LEVEL(...)\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $DECORATOR
      regex: ^(Get|Post|Patch|Delete|Put)$
  - metavariable-regex:
      metavariable: $LEVEL
      regex: .*(info|debug|warn|error|log).*
  metadata:
    category: refactoring
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: decorator-post-method
  message: Detected @Post decorator on method - indicates decorator-based routing
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '@$DECORATOR(...)

      $METHOD(...) { ... }

      '
  - metavariable-regex:
      metavariable: $DECORATOR
      regex: ^Post$
  metadata:
    category: refactoring
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: import-http-decorators
  message: Import of HTTP method decorators from decorators module
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $DECORATOR, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $DECORATOR
      regex: ^(Get|Post|Patch|Delete|Put|RestController|Controller)$
  metadata:
    category: refactoring
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: controller-method-with-find-operations
  message: Controller method with find/findOne database operations
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "@$DECORATOR(...)\nasync $METHOD(...) {\n  ...\n  await $X.$FIND(...)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $DECORATOR
      regex: ^(Get|Post|Patch|Delete|Put)$
  - metavariable-regex:
      metavariable: $FIND
      regex: .*(find|findOne|findOneBy|findOneOrFail).*
  metadata:
    category: refactoring
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: controller-method-with-save-operations
