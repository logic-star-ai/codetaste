- id: multiline-import-in-controller
  message: Multiline import statement in controller
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+\{[^}]+\n[^}]+\}\s+from
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
