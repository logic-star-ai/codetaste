rules:
- id: old-logger-debug-in-namespace
  message: Direct Logger call in namespace function detected. Use injected logger
    in controller.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'Logger.debug($MSG, ...)

      '
  - pattern-inside: 'export function $FUNC(this: N8nApp): $RET { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
