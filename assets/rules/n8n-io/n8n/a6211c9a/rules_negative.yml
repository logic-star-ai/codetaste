rules:
- id: detect-workflow-helpers-mixin-export
  message: Old mixin export pattern detected. Should be refactored to export composable
    function useWorkflowHelpers()
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: export const workflowHelpers = ...
    - pattern: export { workflowHelpers }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 520
  paths:
    include:
    - packages/editor-ui/src/mixins/workflowHelpers.ts
- id: detect-definecomponent-in-workflowhelpers-file
  message: Old workflowHelpers mixin file uses defineComponent (Options API). Should
    be refactored to composable function
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "export default defineComponent({\n  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 519
  paths:
    include:
    - packages/editor-ui/src/mixins/workflowHelpers.ts
- id: detect-iworkflowdata-import-in-mixin
  message: Type imports in old workflowHelpers mixin file. These should be in the
    new composable file
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "import type {\n  ...,\n  IWorkflowData,\n  ...\n} from '@/Interface';\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 519
  paths:
    include:
    - packages/editor-ui/src/mixins/workflowHelpers.ts
- id: detect-ipermissions-import-in-mixin
  message: IPermissions type import in old mixin file. Should be in the new composable
    file
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'import type { IPermissions } from ''@/permissions'';

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 519
  paths:
    include:
    - packages/editor-ui/src/mixins/workflowHelpers.ts
- id: detect-type-imports-from-n8n-workflow-in-mixin
  message: Type imports from n8n-workflow in old mixin file. Should be in the new
    composable
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "import type {\n  ...,\n  INode,\n  ...\n} from 'n8n-workflow';\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 519
  paths:
    include:
    - packages/editor-ui/src/mixins/workflowHelpers.ts
- id: detect-workflowhelpers-type-definitions
  message: Type definitions in old mixin file. These types should be used in the new
    composable
  severity: WARNING
  languages:
  - typescript
  pattern-regex: IWorkflowData|INodeUi|IPermissions|INodeTypesMaxCount
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
  paths:
    include:
    - packages/editor-ui/src/mixins/workflowHelpers.ts
- id: detect-workflowhelpers-in-component-script
  message: Import from @/mixins/workflowHelpers detected. Refactor to import from
    '@/composables/useWorkflowHelpers'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: from\s+['"]@/mixins/workflowHelpers['"]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-stores-imports-in-workflowhelpers
  message: Store imports in old mixin file. Should be in the new composable
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{\s*use\w+Store\s*\}\s+from
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - packages/editor-ui/src/mixins/workflowHelpers.ts
- id: detect-this-getWorkflowDataToSave-call
  message: Direct call to getWorkflowDataToSave via 'this' detected. Refactor to use
    workflowHelpers.getWorkflowDataToSave() from useWorkflowHelpers composable
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: this.getWorkflowDataToSave($...ARGS)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-import-workflowhelpers-from-mixins
  message: 'Import from old workflowHelpers mixin detected. Refactor to use useWorkflowHelpers
    composable: import { useWorkflowHelpers } from ''@/composables/useWorkflowHelpers'''
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+.*workflowHelpers.*\s+from\s+['"]@/mixins/workflowHelpers['"]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-getworkflowdatatosave-expression
  message: Direct call to getWorkflowDataToSave via 'this' detected. Refactor to use
    workflowHelpers.getWorkflowDataToSave() from useWorkflowHelpers composable
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: this\.getWorkflowDataToSave\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-workflowhelpers-mixin-import-named
  message: 'Old workflowHelpers mixin import detected. Refactor to use useWorkflowHelpers
    composable: import { useWorkflowHelpers } from ''@/composables/useWorkflowHelpers'''
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'import { workflowHelpers } from ''@/mixins/workflowHelpers''

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-mixin-single-workflowhelpers
  message: Component still uses workflowHelpers mixin. Refactor to use useWorkflowHelpers()
    composable in setup() hook
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'mixins: [workflowHelpers]

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-workflowhelpers-in-mixins-array
  message: Component uses workflowHelpers in mixins array. Refactor to use useWorkflowHelpers()
    composable in setup() hook
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: ^\s*mixins:\s*\[[^\]]*workflowHelpers[^\]]*\]
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*.vue'
    - '*.ts'
    - '*.js'
- id: detect-named-import-workflowhelpers-mixin
  message: 'Named import of workflowHelpers mixin detected. Refactor to: import {
    useWorkflowHelpers } from ''@/composables/useWorkflowHelpers'''
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'import { workflowHelpers } from ''@/mixins/workflowHelpers'';

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-workflowhelpers-import-in-mixins
  message: Mixin file imports old workflowHelpers mixin. Update to use useWorkflowHelpers
    composable
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+.*workflowHelpers.*\s+from\s+.*['"]@/mixins/workflowHelpers['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - packages/editor-ui/src/mixins/**/*.ts
- id: detect-import-workflowhelpers-curly-braces
  message: 'Named import of workflowHelpers from mixin. Refactor to: import { useWorkflowHelpers
    } from ''@/composables/useWorkflowHelpers'''
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+\{\s*workflowHelpers\s*\}\s+from\s+['"]@/mixins/workflowHelpers['"]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-this-saveCurrentWorkflow-call
  message: Direct call to saveCurrentWorkflow via 'this' detected. Refactor to use
    workflowHelpers.saveCurrentWorkflow() from useWorkflowHelpers composable
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: this.saveCurrentWorkflow($...ARGS)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-await-this-saveCurrentWorkflow
  message: Async call to saveCurrentWorkflow via 'this' detected. Refactor to use
    workflowHelpers.saveCurrentWorkflow() from useWorkflowHelpers composable
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: await this.saveCurrentWorkflow($...ARGS)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-saveCurrentWorkflow-expression
  message: Direct call to saveCurrentWorkflow via 'this' detected. Refactor to use
    workflowHelpers.saveCurrentWorkflow() from useWorkflowHelpers composable
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: this\.saveCurrentWorkflow\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-await-saveCurrentWorkflow-pattern
  message: Async call to saveCurrentWorkflow via 'this' detected. Refactor to use
    workflowHelpers.saveCurrentWorkflow() from useWorkflowHelpers composable
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: await\s+this\.saveCurrentWorkflow\s*\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-getparentmaininputnode-uppercase
  message: getParentMainInputNode function in old mixin file. Should be moved to composable
