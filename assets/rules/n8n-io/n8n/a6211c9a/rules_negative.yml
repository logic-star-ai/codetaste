  languages:
  - typescript
  pattern-regex: getParentMainInputNode\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - packages/editor-ui/src/mixins/workflowHelpers.ts
