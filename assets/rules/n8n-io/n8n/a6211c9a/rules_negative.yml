  pattern: this.updateWorkflow($...ARGS)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-methods-object-in-workflowhelpers
  message: methods object in old workflowHelpers mixin file. Should refactor to exported
    functions in composable
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "methods: {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/editor-ui/src/mixins/workflowHelpers.ts
- id: detect-setup-function-in-workflowhelpers-mixin
  message: setup() function in old mixin file. Should be part of composable pattern
    refactoring
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "setup() {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
