  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: const\s+saved\s*=\s*await\s+this\.saveCurrentWorkflow\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-workflowhelpers-old-mixin-structure
  message: Old mixin export structure detected. Should export composable function
    useWorkflowHelpers() instead
  severity: WARNING
