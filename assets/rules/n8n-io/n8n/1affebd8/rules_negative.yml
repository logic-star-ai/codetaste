rules:
- id: detect-global-role-in-api-response
  message: Response with globalRole property detected - should return role string
    after RBAC refactoring
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '$RESPONSE.globalRole

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: detect-user-global-role-property
  message: user.globalRole property access detected - should use user.role after RBAC
    refactoring
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '$USER.globalRole

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: detect-role-service-method-calls
  message: RoleService method call detected - should be replaced with inline role
    strings after RBAC refactoring
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $SERVICE.$METHOD(...)
  - metavariable-pattern:
      metavariable: $METHOD
      patterns:
      - pattern-either:
        - pattern: findGlobalOwnerRole
        - pattern: findGlobalMemberRole
        - pattern: findGlobalAdminRole
        - pattern: findWorkflowOwnerRole
        - pattern: findCredentialOwnerRole
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: detect-role-service-import-specific
  message: RoleService import detected - should be removed after RBAC refactoring
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'import { RoleService } from ''$PATH''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: detect-role-service-test-import
  message: RoleService test import detected - should be removed after RBAC refactoring
