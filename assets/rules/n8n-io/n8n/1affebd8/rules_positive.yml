    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.ts'
- id: user-role-inequality
  message: Detected user.role inequality comparison
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $USER.role !== $VAL
    - pattern: $USER.role != $VAL
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: shared-workflow-role-owner-comparison
  message: Detected SharedWorkflow.role as string comparison for workflow:owner (refactored
    from shared.role.name)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $SHARED.role === 'workflow:owner'
    - pattern: $SHARED.role == 'workflow:owner'
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: role-string-test-assertion-tobe
  message: Detected test assertion toBe with namespaced role string
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: expect($VAR.role).toBe('global:owner')
    - pattern: expect($VAR.role).toBe('global:admin')
    - pattern: expect($VAR.role).toBe('workflow:owner')
    - pattern: expect($VAR.role).toBe('credential:owner')
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
