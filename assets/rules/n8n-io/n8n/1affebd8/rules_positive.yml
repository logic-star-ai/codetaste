rules:
- id: namespaced-role-in-comparison
  message: Detected namespaced role string pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: (global|workflow|credential):(owner|admin|member|editor|user)
  metadata:
    category: basic
    nr_refactored_patterns: 374
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.ts'
    - '*.js'
- id: role-string-literal-any-namespace
  message: Detected any namespaced role string literal
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: '''(global|workflow|credential):(owner|admin|member|editor|user)'''
  metadata:
    category: basic
    nr_refactored_patterns: 372
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.ts'
    - '*.js'
    exclude:
    - '**/node_modules/**'
