  - javascript
  pattern-regex: global:(owner|admin|member)
  metadata:
    category: basic
    nr_refactored_patterns: 272
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.ts'
    - '*.js'
    exclude:
    - '**/node_modules/**'
- id: role-in-comment-or-string
