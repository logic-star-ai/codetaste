  - javascript
  pattern: '{ ..., role: ''workflow:owner'', ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: destructured-role-from-object
  message: Detected destructuring of role property from object
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: 'const { role } = $OBJ

    '
  metadata:
    category: basic
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: role-in-where-condition-namespaced
  message: Detected where condition using namespaced role string
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'where: { ..., role: $ROLE, ... }

      '
  - metavariable-regex:
      metavariable: $ROLE
      regex: '''(global|workflow|credential):(owner|admin|member|editor|user)'''
  metadata:
    category: structural
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: role-comparison-any-namespaced
  message: Detected comparison with namespaced role string
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $X.role === $Y
    - pattern: $X.role == $Y
  - metavariable-pattern:
      metavariable: $Y
      pattern-regex: '''(global|workflow|credential):(owner|admin|member|editor|user)'''
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: migration-drop-role-mapping
  message: Detected migration to drop role mapping (part of RBAC refactoring)
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: DropRoleMapping|dropRoleMapping|drop.*role.*mapping
  metadata:
    category: architecture
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/migrations/**/*.ts'
- id: role-string-in-error-message
  message: Detected namespaced role string in error/log message
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: (global|workflow|credential):(owner|admin|member|editor|user).*role
  metadata:
    category: other
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.ts'
    - '*.js'
- id: role-parameter-type
  message: Detected role parameter with typed role
  severity: INFO
  languages:
  - typescript
  pattern-regex: role:\s*(GlobalRole|WorkflowSharingRole|CredentialSharingRole)
  metadata:
    category: basic
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.ts'
- id: user-role-equality-check-global-owner
  message: Detected direct role string comparison for global:owner (refactored from
    user.globalRole.name)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $USER.role === 'global:owner'
    - pattern: $USER.role == 'global:owner'
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: role-string-literal-credential-user
