rules:
- id: this-external-hooks-run-call
  message: Replace this.$externalHooks().run(...) with externalHooks.run(...) using
    the useExternalHooks() composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: this.$externalHooks().run(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: this-external-hooks-method-call
  message: Replace this.$externalHooks().$METHOD(...) with externalHooks.$METHOD(...)
    using the useExternalHooks() composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: this.$externalHooks().$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: this-external-hooks-reference
  message: Replace this.$externalHooks() with useExternalHooks() composable. Define
    const externalHooks = useExternalHooks() in setup().
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: this\.\$externalHooks\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: external-hooks-run-without-await-or-void
  message: Migrate to useExternalHooks() composable. Replace this.$externalHooks().run()
    with externalHooks.run().
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: this.$externalHooks().run($EVENT,$...ARGS)
  - pattern-not: void this.$externalHooks().run($EVENT,$...ARGS)
  - pattern-not: await this.$externalHooks().run($EVENT,$...ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: external-hooks-run-variable-event
  message: Migrate to useExternalHooks() composable. Replace this.$externalHooks().run()
    with externalHooks.run().
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: this.$externalHooks().run($EVENT_VAR, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: external-hooks-run-with-two-args
  message: Migrate to useExternalHooks() composable. Replace this.$externalHooks().run()
    with externalHooks.run().
