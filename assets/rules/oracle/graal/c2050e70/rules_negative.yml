rules:
- id: constructor-with-providers-and-snippet-params
  message: Constructor with both Providers and SnippetReflectionProvider parameters.
    Remove SnippetReflectionProvider and use $P.getSnippetReflection().
  severity: WARNING
  languages:
  - java
  pattern: '$CLASS(Providers $P, SnippetReflectionProvider $S, $...REST) { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: method-signature-providers-then-snippetreflection
  message: Method signature has Providers followed by SnippetReflectionProvider. The
    latter can be accessed via the former.
  severity: WARNING
  languages:
  - java
  pattern: '$RET $METHOD(Providers $P, SnippetReflectionProvider $S, $...ARGS) { ...
    }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: method-second-param-snippetreflection-after-providers
  message: Method has Providers as first parameter and SnippetReflectionProvider as
    second. Remove second parameter and use $P.getSnippetReflection().
  severity: WARNING
  languages:
  - java
  pattern: '$RET $METHOD(Providers $P, SnippetReflectionProvider $S, $...REST) { ...
    }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: graphbuildercontext-has-snippetreflection-access
  message: Method has both GraphBuilderContext and SnippetReflectionProvider parameters.
    Use $B.getSnippetReflection() instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$TYPE $METHOD(..., GraphBuilderContext $B, ..., SnippetReflectionProvider
      $SNIPPET, ...) { ... }

      '
  - pattern-not-inside: 'interface $IFACE { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: public-method-providers-snippet-params
  message: Public method with both Providers and SnippetReflectionProvider parameters.
    Remove SnippetReflectionProvider and use $P.getSnippetReflection().
  severity: WARNING
  languages:
  - java
  pattern: 'public $RET $METHOD(Providers $P, SnippetReflectionProvider $S, $...REST)
    { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: method-graphbuildercontext-and-snippet-params
  message: Method has GraphBuilderContext and SnippetReflectionProvider parameters.
    Remove SnippetReflectionProvider and use $B.getSnippetReflection().
  severity: WARNING
  languages:
  - java
  pattern: '$RET $METHOD(GraphBuilderContext $B, $...ARGS, SnippetReflectionProvider
    $S, $...REST) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: method-contains-register-takes-snippet-and-providers
  message: Registration method with Providers and SnippetReflectionProvider. Remove
    SnippetReflectionProvider parameter.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(Providers $P, SnippetReflectionProvider $S, $...REST) {
      ... }

      '
  - metavariable-regex:
      metavariable: $METHOD
      regex: .*[Rr]egister.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: feature-impl-registerinvocationplugins-4params
  message: InternalFeature.registerInvocationPlugins implementation with snippetReflection
    parameter should be refactored to 3 parameters.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'void registerInvocationPlugins($P, $S, $PLUGINS, $REASON) { ... }

      '
  - pattern-inside: 'class $CLASS implements InternalFeature { ... }

      '
  - metavariable-regex:
      metavariable: $S
      regex: ^snippet.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: override-registerinvocationplugins-four-parameters
  message: Override of registerInvocationPlugins with 4 parameters. SnippetReflectionProvider
    parameter should be removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '@Override

      public void registerInvocationPlugins($P, $S, $PLUGINS, $REASON) { ... }

      '
  - metavariable-regex:
      metavariable: $S
      regex: ^snippet.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: registerinvocationplugins-with-snippetreflection-param
  message: Method registerInvocationPlugins should not have SnippetReflectionProvider
    parameter. Access it via Providers.getSnippetReflection() instead.
  severity: WARNING
  languages:
  - java
  pattern: 'void registerInvocationPlugins(Providers $PROVIDERS, SnippetReflectionProvider
    $SNIPPET, Plugins $PLUGINS, ParsingReason $REASON) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: feature-registerinvocationplugins-impl-with-snippetreflection
  message: Implementation of registerInvocationPlugins should not have SnippetReflectionProvider
    parameter. Remove it and use providers.getSnippetReflection().
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'public void registerInvocationPlugins(Providers $PROVIDERS, SnippetReflectionProvider
      $SNIPPET, Plugins $PLUGINS, ParsingReason $REASON) { ... }

      '
  - pattern-inside: 'class $CLASS implements $IFACE { ... }

      '
  - metavariable-pattern:
      metavariable: $IFACE
      patterns:
      - pattern-either:
        - pattern: InternalFeature
        - pattern: Feature
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: internalfeature-method-takes-snippetreflection-before-plugins
  message: InternalFeature method has SnippetReflectionProvider before Plugins. This
    parameter should likely be removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(..., SnippetReflectionProvider $SNIPPET, Plugins $PLUGINS,
      ...) { ... }

      '
  - pattern-inside: 'class $CLASS implements InternalFeature { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: method-contains-create-takes-snippet-and-providers
  message: Creation method with Providers and SnippetReflectionProvider. Remove SnippetReflectionProvider
    parameter.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(Providers $P, SnippetReflectionProvider $S, $...REST) {
      ... }

      '
  - metavariable-regex:
      metavariable: $METHOD
      regex: .*[Cc]reate.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: registergraalphases-with-snippetreflection-param
  message: Method registerGraalPhases should not have SnippetReflectionProvider parameter.
    Access it via Providers.getSnippetReflection() instead.
  severity: WARNING
  languages:
  - java
  pattern: 'void registerGraalPhases(Providers $PROVIDERS, SnippetReflectionProvider
    $SNIPPET, Suites $SUITES, boolean $HOSTED) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: registergraalphases-public-with-snippetreflection
  message: Public registerGraalPhases method should not have SnippetReflectionProvider
    parameter. Remove it from the signature.
  severity: WARNING
  languages:
  - java
  pattern: 'public void registerGraalPhases(Providers $PROVIDERS, SnippetReflectionProvider
    $SNIPPET, Suites $SUITES, boolean $HOSTED) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: feature-registergraalphases-impl-with-snippetreflection
  message: Implementation of registerGraalPhases should not have SnippetReflectionProvider
    parameter. Remove it and use providers.getSnippetReflection().
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'public void registerGraalPhases(Providers $PROVIDERS, SnippetReflectionProvider
      $SNIPPET, Suites $SUITES, boolean $HOSTED) { ... }

      '
  - pattern-inside: 'class $CLASS implements $IFACE { ... }

      '
  - metavariable-pattern:
      metavariable: $IFACE
      patterns:
      - pattern-either:
        - pattern: InternalFeature
        - pattern: Feature
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: providers-parameter-and-snippetreflection-parameter
  message: Method has both Providers and SnippetReflectionProvider parameters. Use
    $P.getSnippetReflection() instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$TYPE $METHOD(..., Providers $P, ..., SnippetReflectionProvider $S,
      ...) { ... }

      '
  - pattern-not-inside: 'interface $IFACE { ... }

      '
  - pattern-not-inside: 'abstract class $CLASS { ... }

      '
  - metavariable-pattern:
      metavariable: $METHOD
      patterns:
      - pattern-not: registerInvocationPlugins
      - pattern-not: registerGraalPhases
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: feature-impl-registergraalphases-4params
  message: InternalFeature.registerGraalPhases implementation with snippetReflection
    parameter should be refactored to 3 parameters.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'void registerGraalPhases($P, $S, $SUITES, $HOSTED) { ... }

      '
  - pattern-inside: 'class $CLASS implements InternalFeature { ... }

      '
  - metavariable-regex:
      metavariable: $S
      regex: ^snippet.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: override-registergraalphases-four-parameters
  message: Override of registerGraalPhases with 4 parameters. SnippetReflectionProvider
    parameter should be removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '@Override

      public void registerGraalPhases($P, $S, $SUITES, $HOSTED) { ... }

      '
  - metavariable-regex:
      metavariable: $S
      regex: ^snippet.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: internalfeature-method-takes-snippetreflection-before-suites
  message: InternalFeature method has SnippetReflectionProvider before Suites. This
    parameter should likely be removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(..., SnippetReflectionProvider $SNIPPET, Suites $SUITES,
      ...) { ... }

      '
  - pattern-inside: 'class $CLASS implements InternalFeature { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: super-call-with-snippetreflection-in-replacements
  message: super() call in Replacements subclass passes snippetReflection. This parameter
    should be removed from parent constructor.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: super(..., $SNIPPET, ...)
  - pattern-inside: 'class $CLASS extends $PARENT { ... }

      '
  - metavariable-regex:
      metavariable: $PARENT
      regex: .*Replacements.*
  - metavariable-regex:
      metavariable: $SNIPPET
      regex: ^snippet.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: feature-registergraalphases-with-snippet-generic
  message: Feature implementation registerGraalPhases with SnippetReflectionProvider
    parameter. Remove this parameter.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'public void registerGraalPhases(Providers $P, SnippetReflectionProvider
      $S, Suites $SUITES, boolean $H) { ... }

      '
  - pattern-inside: 'class $CLASS implements InternalFeature { ... }

      '
  - metavariable-regex:
      metavariable: $CLASS
      regex: .*Feature.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: local-variable-from-providers-snippetreflection
  message: Unnecessary local variable for SnippetReflectionProvider. Use providers.getSnippetReflection().$METHOD(...)
    directly.
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'SnippetReflectionProvider $VAR = $PROVIDERS.getSnippetReflection();

      ...

      $VAR.$METHOD(...);

      '
  - pattern-not: 'SnippetReflectionProvider $VAR = $PROVIDERS.getSnippetReflection();

      ...

      return $VAR;

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: createreplacements-method-with-snippetreflection-param
  message: createReplacements method has SnippetReflectionProvider parameter. This
    should be accessed via Providers.
  severity: WARNING
  languages:
  - java
  pattern: '$TYPE createReplacements(..., SnippetReflectionProvider $SNIPPET, ...)
    { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: cinterfaceinvocationplugin-has-snippetreflection
  message: CInterfaceInvocationPlugin should not have SnippetReflectionProvider field
    or constructor parameter.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: 'class CInterfaceInvocationPlugin { ... }

      '
  - pattern-either:
    - pattern: 'SnippetReflectionProvider $FIELD;

        '
    - pattern: '$CONSTRUCTOR(..., SnippetReflectionProvider $PARAM, ...) { ... }

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: protected-method-providers-snippet-params
  message: Protected method with both Providers and SnippetReflectionProvider parameters.
    Remove SnippetReflectionProvider and use $P.getSnippetReflection().
  severity: WARNING
  languages:
  - java
  pattern: 'protected $RET $METHOD(Providers $P, SnippetReflectionProvider $S, $...REST)
    { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: method-named-createreplacements-with-snippet-param
  message: createReplacements method has SnippetReflectionProvider parameter. This
    should be accessed via Providers parameter.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$RET createReplacements(..., SnippetReflectionProvider $SNIPPET, ...)
      { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: cinterfaceplugin-field-assignment-from-param
  message: CInterface class stores SnippetReflectionProvider in field. Should access
    it via context instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "class $CLASS {\n  ...\n  SnippetReflectionProvider $FIELD;\n  ...\n\
      \  $CLASS(..., SnippetReflectionProvider $PARAM, ...) {\n    ...\n    this.$FIELD\
      \ = $PARAM;\n    ...\n  }\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $CLASS
      pattern-regex: CInterface.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: instrumentphase-subclass-with-snippetreflection-constructor
  message: InstrumentPhase subclass passes SnippetReflectionProvider to super constructor.
    This parameter should be removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "class $CLASS extends InstrumentPhase {\n  ...\n  $CLASS(SnippetReflectionProvider\
      \ $SNIPPET, ...) {\n    super($SNIPPET, ...);\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: instantiate-instrumentphase-with-snippetreflection
  message: Creating InstrumentPhase with SnippetReflectionProvider. Constructor should
    not take this parameter.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new $PHASE($SNIPPET, ...)
  - metavariable-pattern:
      metavariable: $PHASE
      pattern-regex: Instrument.*Phase
  - metavariable-pattern:
      metavariable: $SNIPPET
      patterns:
      - pattern-either:
        - pattern: snippetReflection
        - pattern: $VAR.getSnippetReflection()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: replacementsimpl-constructor-with-snippetreflection-param
  message: ReplacementsImpl subclass constructor takes SnippetReflectionProvider parameter.
    Should access via getProviders().getSnippetReflection().
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "$CLASS(..., SnippetReflectionProvider $SNIPPET, ...) {\n  ...\n}\n"
  - pattern-inside: 'class $CLASS extends ReplacementsImpl { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: feature-registerinvocationplugins-calls-helper-with-snippet
  message: registerInvocationPlugins passes snippetReflection to helper. Helper should
    access it from providers.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public void registerInvocationPlugins(Providers $P, SnippetReflectionProvider\
      \ $S, Plugins $PLUGINS, ParsingReason $R) {\n  ...\n  $HELPER(..., $S, ...);\n\
      \  ...\n}\n"
  - pattern-inside: 'class $CLASS implements InternalFeature { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: javadoc-mentions-snippetreflection-parameter
  message: Javadoc mentions @param snippetReflection which should be removed if parameter
    was removed.
  severity: INFO
  languages:
  - java
  pattern-regex: '@param\s+snippetReflection\s+'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: cinterfaceenumtool-has-snippetreflection
  message: CInterfaceEnumTool should not have SnippetReflectionProvider field or constructor
    parameter.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: 'class CInterfaceEnumTool { ... }

      '
  - pattern-either:
    - pattern: 'SnippetReflectionProvider $FIELD;

        '
    - pattern: '$CONSTRUCTOR(..., SnippetReflectionProvider $PARAM, ...) { ... }

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: method-with-providers-and-snippet-params-called
  message: Method call to $METHOD passes both providers and snippetReflection. Consider
    removing snippetReflection argument.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $OBJ.$METHOD($PROVIDERS, $SNIPPET, $...REST)
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^register.*
  - metavariable-regex:
      metavariable: $SNIPPET
      regex: ^snippet.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: private-method-providers-snippet-params
  message: Private method with both Providers and SnippetReflectionProvider parameters.
    Remove SnippetReflectionProvider and use $P.getSnippetReflection().
  severity: WARNING
  languages:
  - java
  pattern: 'private $RET $METHOD(Providers $P, SnippetReflectionProvider $S, $...REST)
    { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: static-method-providers-snippet-params
  message: Static method with both Providers and SnippetReflectionProvider parameters.
    Remove SnippetReflectionProvider and use $P.getSnippetReflection().
  severity: WARNING
  languages:
  - java
  pattern: 'static $RET $METHOD(Providers $P, SnippetReflectionProvider $S, $...REST)
    { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: interface-method-providers-snippetreflection-params
  message: Interface method with Providers and SnippetReflectionProvider parameters.
    Consider removing SnippetReflectionProvider from interface.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(Providers $P, SnippetReflectionProvider $S, $...REST);

      '
  - pattern-inside: 'interface $IFACE { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: javadoc-param-tag-for-snippetreflection
  message: Javadoc @param tag mentions snippet reflection parameter. Update documentation
    if parameter was removed.
  severity: INFO
  languages:
  - java
  pattern-regex: \* @param (\w*snippet\w*|\w*Snippet\w*)\s+.*reflection
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: substratereplacements-constructor-with-snippetreflection
  message: SubstrateReplacements constructor should not take SnippetReflectionProvider
    parameter. Remove it from constructor call.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new SubstrateReplacements($PROVIDERS, $SNIPPET, ...)
  - metavariable-type:
      metavariable: $SNIPPET
      type: SnippetReflectionProvider
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cinterfaceenumtool-with-snippetreflection-field
  message: CInterfaceEnumTool should not have SnippetReflectionProvider field. Access
    via provided context.
  severity: WARNING
  languages:
  - java
  pattern: "class CInterfaceEnumTool {\n  ...\n  SnippetReflectionProvider $FIELD;\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cinterfaceinvocationplugin-with-snippetreflection-field
  message: CInterfaceInvocationPlugin should not have SnippetReflectionProvider field.
    Use b.getSnippetReflection() instead.
  severity: WARNING
  languages:
  - java
  pattern: "class CInterfaceInvocationPlugin {\n  ...\n  SnippetReflectionProvider\
    \ $FIELD;\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cinterfaceenumtool-constructor-with-snippetreflection
  message: CInterfaceEnumTool constructor should not take SnippetReflectionProvider
    parameter.
  severity: WARNING
  languages:
  - java
  pattern: "CInterfaceEnumTool(..., SnippetReflectionProvider $SNIPPET, ...) {\n \
    \ ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cinterfaceinvocationplugin-constructor-with-snippetreflection
  message: CInterfaceInvocationPlugin constructor should not take SnippetReflectionProvider
    parameter.
  severity: WARNING
  languages:
  - java
  pattern: "CInterfaceInvocationPlugin(..., SnippetReflectionProvider $SNIPPET, ...)\
    \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: call-to-feature-registergraalphases-with-snippet
  message: Call to registerGraalPhases passes SnippetReflectionProvider. This parameter
    should be removed from the API.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $FEATURE.registerGraalPhases($PROVIDERS, $SNIPPET, $SUITES, $HOSTED)
  - metavariable-pattern:
      metavariable: $SNIPPET
      patterns:
      - pattern-either:
        - pattern: snippetReflection
        - pattern: $VAR.getSnippetReflection()
        - pattern: this.snippetReflection
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: reflectionplugins-register-with-snippetreflection
  message: ReflectionPlugins.registerInvocationPlugins should not receive snippetReflection
    parameter. Refactor to use providers.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'ReflectionPlugins.registerInvocationPlugins(..., $SNIPPET, ...)

      '
  - metavariable-pattern:
      metavariable: $SNIPPET
      patterns:
      - pattern-either:
        - pattern: snippetReflection
        - pattern: this.snippetReflection
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: constructor-stores-providers-and-snippetreflection
  message: Constructor stores both Providers and SnippetReflectionProvider. Only store
    Providers and access snippetReflection via getProviders().getSnippetReflection().
  severity: WARNING
  languages:
  - java
  pattern: "$CONSTRUCTOR(..., Providers $P, ..., SnippetReflectionProvider $S, ...)\
    \ {\n  ...\n  this.providers = $P;\n  ...\n  this.snippetReflection = $S;\n  ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: hotspotreplacementsimpl-subclass-constructor-pattern
  message: HotSpotReplacementsImpl subclass passes snippetReflection to super constructor.
    This parameter should be removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "$CLASS(..., SnippetReflectionProvider $SNIPPET, ...) {\n  super(...,\
      \ $SNIPPET, ...);\n  ...\n}\n"
  - pattern-inside: 'class $CLASS extends HotSpotReplacementsImpl { ... }

      '
