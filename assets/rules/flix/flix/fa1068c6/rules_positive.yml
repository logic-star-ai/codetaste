- id: localdef-expr-pattern-in-syntaxtree
  message: LocalDef as Expr case object in SyntaxTree
  severity: INFO
  languages:
  - scala
  pattern-regex: (?m)^\s*case\s+object\s+LocalDef\s+extends\s+Expr\s*$
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SyntaxTree.scala'
- id: parser-localdefexpr-function-body-with-close
  message: localDefExpr() function body contains TreeKind.Expr.LocalDef
  severity: INFO
  languages:
  - scala
  pattern-regex: def\s+localDefExpr[\s\S]{0,1000}TreeKind\.Expr\.LocalDef
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: parser-equal-expect-before-localdef-close
  message: Parser expects Equal token before closing LocalDef
  severity: INFO
  languages:
  - scala
  pattern-regex: expect\s*\(\s*TokenKind\.Equal[\s\S]{0,200}TreeKind\.Expr\.LocalDef
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: localdef-expr-treekind-reference
  message: TreeKind.Expr.LocalDef referenced in parser
  severity: INFO
  languages:
  - scala
  pattern-regex: TreeKind\s*\.\s*Expr\s*\.\s*LocalDef
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: comment-nested-function-localdef
  message: Comment mentions nested function and LocalDef
  severity: INFO
  languages:
  - scala
  pattern-regex: //.*nested\s+function.*LocalDef
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: parser-statement-before-localdef-close
  message: Parser calls statement before closing LocalDef
  severity: INFO
  languages:
  - scala
  pattern-regex: statement\s*\([\s\S]{0,100}close\s*\([^)]*TreeKind\.Expr\.LocalDef
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
