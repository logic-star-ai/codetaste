rules:
- id: comment-avoid-consuming-localdef
  message: Comment about avoiding consumption of LocalDef
  severity: INFO
  languages:
  - scala
  pattern-regex: //.*avoid\s+consuming.*LocalDef
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: localdef-replaces-letrecdef-in-syntaxtree
  message: TreeKind.Expr.LocalDef successfully defined (replacing LetRecDef)
  severity: INFO
  languages:
  - scala
  pattern: 'case object LocalDef extends Expr

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SyntaxTree.scala'
- id: localdefexpr-function-in-parser
  message: localDefExpr() function defined in parser (replacing letRecDefExpr)
  severity: INFO
  languages:
  - scala
  pattern: 'private def localDefExpr()(implicit $S: State): $MARK = { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: comment-localdef-not-letrecdef-in-parser-2
  message: Comment updated to reference LocalDef expression instead of LetRecDef
  severity: INFO
  languages:
  - scala
  pattern-regex: //.*(?i:localdef).*(?i:expression)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: comment-local-def-not-letrec-in-parser-3
  message: Comment references LocalDef instead of LetRecDef
  severity: INFO
  languages:
  - scala
  pattern-regex: //.*would be read as a LocalDef
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: parser-close-localdef-treekind
  message: Parser closes with TreeKind.Expr.LocalDef instead of LetRecDef
  severity: INFO
  languages:
  - scala
  pattern-regex: close\s*\(\s*\w+\s*,\s*TreeKind\.Expr\.LocalDef\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: parser-localdefexpr-function-exists
  message: localDefExpr() function defined (replaces letRecDefExpr())
  severity: INFO
  languages:
  - scala
  pattern-regex: private\s+def\s+localDefExpr\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: parser-match-localdef-not-letrecdef
  message: Pattern match calls localDefExpr() instead of letRecDefExpr()
  severity: INFO
  languages:
  - scala
  pattern-regex: TokenKind\.\w+\s*=>\s*localDefExpr\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: treekind-expr-localdef-defined
  message: TreeKind.Expr.LocalDef defined (replaces LetRecDef)
  severity: INFO
  languages:
  - scala
  pattern-regex: case\s+object\s+LocalDef\s+extends\s+Expr
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SyntaxTree.scala'
- id: parser-localdefexpr-with-implicit-state
  message: localDefExpr() function with implicit State parameter defined
  severity: INFO
  languages:
  - scala
  pattern-regex: def\s+localDefExpr\s*\(\s*\)\s*\(\s*implicit\s+\w+:\s*State\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: treekind-localdef-closed-in-parser
  message: Parser closes with TreeKind.Expr.LocalDef
  severity: INFO
  languages:
  - scala
  pattern-regex: close\s*\(\s*\w+\s*,\s*TreeKind\s*\.\s*Expr\s*\.\s*LocalDef\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: comment-main-read-as-localdef
  message: Comment mentioning main being read as LocalDef
  severity: INFO
  languages:
  - scala
  pattern-regex: //.*main.*read\s+as\s+a.*LocalDef
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: annotation-case-calls-localdefexpr
  message: Annotation case calls localDefExpr()
  severity: INFO
  languages:
  - scala
  pattern-regex: case\s+TokenKind\.Annotation.*=>\s*localDefExpr\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: localdef-case-object-extends-expr
  message: LocalDef case object extends Expr in TreeKind
  severity: INFO
  languages:
  - scala
  pattern-regex: case\s+object\s+LocalDef\s+extends\s+Expr\s*$
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/SyntaxTree.scala'
- id: parser-localdefexpr-mark-closed-return
  message: localDefExpr() returns Mark.Closed
  severity: INFO
  languages:
  - scala
  pattern-regex: def\s+localDefExpr\s*\(\s*\).*:\s*Mark\.Closed
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: comment-letrecdef-replaced-by-localdef-in-example
  message: Comment references KeywordDef and LocalDef together
  severity: INFO
  languages:
  - scala
  pattern-regex: //.*KeywordDef.*LocalDef
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Parser2.scala'
- id: parser-avoid-consuming-following-defs-as-localdef
