  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'from plaso.containers import $MOD1

        ...

        from plaso.containers import $MOD2

        '
    - pattern: 'from plaso.containers import $MOD1, $MOD2

        '
  - metavariable-regex:
      metavariable: $MOD1
      regex: (time_events|windows_events|text_events|file_system_events|plist_event|shell_item_events)
