rules:
- id: plaso-events-multiple-lines-pattern
  message: Import from plaso.events detected - should use plaso.containers
  severity: WARNING
  languages:
  - python
  pattern: 'from plaso.events import $MOD

    ...

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1055
- id: plaso-events-module-import-any
  message: Import from plaso.events module should be changed to plaso.containers
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+plaso\.events\s+import\s+\w+
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 125
- id: plaso-events-general-import-all-files
  message: All imports from plaso.events should be changed to plaso.containers
  severity: WARNING
  languages:
  - python
  pattern: from plaso.events import $MODULE
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 125
- id: plaso-events-generic-cross-module
  message: Cross-module imports from plaso.events should be updated to plaso.containers
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from plaso.events import $MODULE
  - pattern-inside: '$IMPORT

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 125
- id: plaso-events-absolute-import-variant
  message: Absolute import from plaso.events should use plaso.containers
  severity: WARNING
  languages:
  - python
  pattern-regex: ^from\s+plaso\.events\s+import\s+\w+
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 125
- id: plaso-events-anywhere-comprehensive
  message: All imports from plaso.events should be migrated to plaso.containers
  severity: ERROR
  languages:
  - python
  pattern: from plaso.events import $MOD
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 125
- id: plaso-events-direct-usage-pattern
  message: Direct import of event modules from plaso.events - migrate to plaso.containers
  severity: ERROR
  languages:
  - python
  patterns:
  - pattern: from plaso.events import $MODULE
  - metavariable-pattern:
      metavariable: $MODULE
      patterns:
      - pattern-either:
        - pattern: time_events
        - pattern: windows_events
        - pattern: text_events
        - pattern: file_system_events
        - pattern: plist_event
        - pattern: shell_item_events
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 125
- id: plaso-events-import-in-parsers
  message: Parser files should import from plaso.containers instead of plaso.events
  severity: WARNING
  languages:
  - python
  pattern: from plaso.events import $MODULE
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 113
  paths:
    include:
    - plaso/parsers/**/*.py
- id: plaso-events-any-parser-any-plugin
  message: Parser and plugin files should import from plaso.containers instead of
    plaso.events
  severity: WARNING
  languages:
  - python
