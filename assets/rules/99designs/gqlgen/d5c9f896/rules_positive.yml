rules:
- id: make-map-any
  message: 'Refactoring detected: make() with map using ''any'''
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: make(map[$KEY]any, ...)
  metadata:
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/graphql/map.go'
    - '**/codegen/testserver/followschema/resolver.go'
    - '**/codegen/testserver/singlefile/resolver.go'
- id: function-param-any-fixed
  message: 'Refactoring detected: function parameter uses ''any'' type'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC(..., $PARAM any, ...) $RET { ... }
  metadata:
    nr_refactored_patterns: 70
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/graphql/map.go'
    - '**/codegen/testserver/followschema/resolver.go'
    - '**/codegen/testserver/singlefile/resolver.go'
    - '**/codegen/testserver/followschema/ptr_to_any.generated.go'
    - '**/codegen/testserver/singlefile/generated.go'
    - '**/graphql/uuid.go'
- id: make-slice-any
  message: 'Refactoring detected: make() with slice using ''any'''
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: make([]any, ...)
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/graphql/map.go'
    - '**/codegen/testserver/followschema/resolver.go'
    - '**/codegen/testserver/singlefile/resolver.go'
- id: var-decl-any-fixed
  message: 'Refactoring detected: variable declared with ''any'' type'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: var $VAR any
    - pattern: var $VAR any = $INIT
  metadata:
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/graphql/map.go'
    - '**/codegen/testserver/followschema/resolver.go'
    - '**/codegen/testserver/singlefile/resolver.go'
    - '**/codegen/testserver/**/ptr_to_any_test.go'
    - '**/codegen/testserver/**/nulls_test.go'
- id: directive-func-any
  message: 'Refactoring detected: directive function with ''any'' object parameter'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func($CTX $CTXTYPE, $OBJ any, $NEXT $NEXTTYPE, ...) (any, error) { ...
      }
  metadata:
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/graphql/map.go'
    - '**/codegen/testserver/followschema/resolver.go'
    - '**/codegen/testserver/singlefile/resolver.go'
- id: around-fields-resolver-any
  message: 'Refactoring detected: around fields middleware returning ''any'''
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func($CTX $CTXTYPE, $NEXT $NEXTTYPE) ($RES any, $ERR error) { ... }
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/graphql/map.go'
    - '**/codegen/testserver/followschema/resolver.go'
    - '**/codegen/testserver/singlefile/resolver.go'
- id: slice-of-map-any
  message: 'Refactoring detected: slice of maps with ''any'' values'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: var $VAR []map[$KEY]any
    - pattern: $VAR := []map[$KEY]any{...}
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  paths:
