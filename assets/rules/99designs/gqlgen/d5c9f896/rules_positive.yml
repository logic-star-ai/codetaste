  - pattern-either:
    - pattern: var $VAR map[$KEY]any
    - pattern: var $VAR map[$KEY]any = $INIT
    - pattern: $VAR := map[$KEY]any{...}
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
