rules:
- id: func-param-any-v2
  message: 'Refactoring detected: function parameter uses ''any'' instead of ''interface{}'''
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC(..., $PARAM any, ...) { ... }
  - pattern-not: func $FUNC(..., $PARAM interface{}, ...) { ... }
  metadata:
    nr_refactored_patterns: 77
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*.generated.go'
    - '**/uuid.go'
    - '**/apollo_sandbox_playground.go'
    - codegen/testserver/singlefile/generated.go
    - '**/map.go'
    - '**/testserver/followschema/resolver.go'
    - '**/testserver/singlefile/resolver.go'
  options:
    symbolic_propagation: true
- id: make-map-any
  message: 'Refactoring detected: make() creates map with ''any'' type'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: make(map[$KEY]any, ...)
    - pattern: make(map[any]$VAL, ...)
  - pattern-not: make(map[$KEY]interface{}, ...)
  - pattern-not: make(map[interface{}]$VAL, ...)
  metadata:
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/map.go'
    - '**/testserver/followschema/resolver.go'
    - '**/testserver/singlefile/resolver.go'
  options:
    symbolic_propagation: true
- id: func-literal-param-any
  message: 'Refactoring detected: function literal with ''any'' parameter'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func(..., $PARAM any, ...) { ... }
  - pattern-not: func(..., $PARAM interface{}, ...) { ... }
  metadata:
