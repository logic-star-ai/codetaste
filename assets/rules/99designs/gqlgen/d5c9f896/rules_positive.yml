- id: type-alias-any
  message: 'Refactoring detected: type alias or definition using ''any'''
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: type $TYPE any
    - pattern: type $TYPE = any
    - pattern: type $TYPE []any
    - pattern: type $TYPE map[$KEY]any
