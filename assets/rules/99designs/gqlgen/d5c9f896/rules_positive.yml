- id: cache-method-any-value
  message: 'Refactoring detected: cache method with ''any'' value parameter'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($RECV $TYPE) $METHOD(..., $VALUE any) { ... }
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i).*(add|set|put|store|cache|save).*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
