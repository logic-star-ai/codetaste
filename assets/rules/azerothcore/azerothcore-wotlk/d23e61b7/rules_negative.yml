rules:
- id: opvp-constant-assignments-4digit-ids
  message: Constants with 4-digit IDs (2000-2999) in outdoor PvP headers likely represent
    world states and should be in WorldStateDefines.h
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '[A-Z_]{5,}\s*=\s*2[0-9]{3}\s*,'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 75
  paths:
    include:
    - '*/scripts/OutdoorPvP/OutdoorPvPEP.h'
    - '*/scripts/OutdoorPvP/OutdoorPvPHP.h'
    - '*/scripts/OutdoorPvP/OutdoorPvPNA.h'
    - '*/scripts/OutdoorPvP/OutdoorPvPSI.h'
    - '*/scripts/OutdoorPvP/OutdoorPvPTF.h'
    - '*/scripts/OutdoorPvP/OutdoorPvPZM.h'
    - '*/scripts/OutdoorPvP/OutdoorPvPGH.h'
- id: opvp-constants-worldstate-pattern
  message: Outdoor PvP UI/WorldState constants should be moved to WorldStateDefines.h
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: (EP|HP|NA|SI|TF|ZM|GH)_(UI|WORLDSTATE|WS)_\w+\s*=\s*\d+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
  paths:
    include:
    - '*/OutdoorPvP*.h'
