rules:
- id: worldstate-constants-in-cpp-files
  message: CPP files use new standardized world state constants
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: WORLD_STATE_(BATTLEGROUND|BATTLEFIELD|OPVP|ARENA)_\w+
  metadata:
    category: basic
    nr_refactored_patterns: 817
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.cpp'
