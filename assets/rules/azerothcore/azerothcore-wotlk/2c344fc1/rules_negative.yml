rules:
- id: unused-include-chrono-in-game-headers
  message: Unused include <chrono> should be removed from header file
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^\s*#\s*include\s+<chrono>
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/server/game/**/*.h
- id: unused-include-charconv-in-game-headers
  message: Unused include <charconv> should be removed from header file
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^\s*#\s*include\s+<charconv>
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/server/game/**/*.h
- id: unused-include-chrono-specific
  message: 'Remove unused #include <chrono> from header files in src/server/game'
  severity: WARNING
  languages:
  - generic
  pattern-regex: '#include\s+<chrono>'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/server/game/**/*.h
    exclude:
    - src/server/game/**/*Test.h
    - src/server/game/**/*Mock.h
- id: unused-include-charconv-specific
  message: 'Remove unused #include <charconv> from header files in src/server/game'
  severity: WARNING
  languages:
  - generic
  pattern-regex: '#include\s+<charconv>'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/server/game/**/*.h
    exclude:
    - src/server/game/**/*Test.h
- id: unused-vmapmgr2-header
  message: 'Move #include "VMapMgr2.h" from headers to implementation files'
  severity: WARNING
  languages:
  - generic
  pattern-regex: '#include\s+"VMapMgr2\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/server/game/**/*.h
- id: unused-chrono-achievements-headers
  message: 'Remove unused #include <chrono> from Achievements header files'
  severity: WARNING
  languages:
  - generic
  pattern-regex: '#include\s+<chrono>'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/server/game/Achievements/**/*.h
- id: unused-cmath-game-headers-broad
  message: 'Remove unused #include <cmath> from game header files'
  severity: WARNING
  languages:
  - generic
  pattern-regex: '#include\s+<cmath>\s*$'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/server/game/Achievements/*.h
    - src/server/game/Addons/*.h
    - src/server/game/ArenaSpectator/*.h
    - src/server/game/Chat/*.h
    - src/server/game/Combat/*.h
    - src/server/game/Conditions/*.h
    - src/server/game/DataStores/*.h
    - src/server/game/DungeonFinding/*.h
    - src/server/game/Events/*.h
    - src/server/game/Grids/*.h
- id: unused-common-dungeonfinding-headers
  message: 'Remove unused #include "Common.h" from DungeonFinding header files'
