rules:
- id: ruff-pydocstyle-rules
  message: Detected ruff pydocstyle rule codes (D series)
  severity: INFO
  languages:
  - generic
  pattern-regex: '"D\d+"'
  metadata:
    category: config
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: pyproject-toml-tool-ruff-any-config
  message: pyproject.toml contains tool.ruff configuration sections
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff[\.\w]*\]
  metadata:
    category: config
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-D-rules-in-ignore
  message: Multiple D-series (pydocstyle) rules configured in ruff
  severity: INFO
  languages:
  - generic
  pattern-regex: '"D\d+"[\s\S]{0,50},[\s\S]{0,50}"D\d+"'
  metadata:
    category: config
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: git-blame-ignore-revs-updated
  message: Git blame ignore file updated with migration-related comment
  severity: INFO
  languages:
  - generic
  pattern-regex: (?i)(?:consolidat|migrat|ruff|format|lint)
  metadata:
    category: other
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - .git-blame-ignore-revs
- id: ruff-any-lint-subsection
  message: Ruff lint subsection configuration present
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.[a-z]+\]
  metadata:
    category: config
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: git-blame-ruff-related-entry
  message: Git blame ignore file mentions ruff
  severity: INFO
  languages:
  - generic
  pattern-regex: (?i)ruff
  metadata:
    category: other
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - .git-blame-ignore-revs
- id: ruff-config-section-exists
  message: Detected [tool.ruff] configuration section - indicates ruff has been configured
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\]
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-line-length-config
  message: Detected ruff line-length configuration set to 88 (black compatibility)
  severity: INFO
  languages:
  - generic
  pattern-regex: line-length\s*=\s*88
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-format-config-section
  message: Detected [tool.ruff.format] configuration section for ruff formatter
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.format\]
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-import-sorting-config
  message: Detected ruff isort configuration section for import sorting
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.isort\]
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: no-flake8-config-in-tox
  message: Flake8 configuration section removed from tox.ini
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*\[flake8\])[\s\S]*\[tox\][\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - tox.ini
- id: no-isort-config-in-tox
  message: Isort configuration section removed from tox.ini
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*\[isort\])[\s\S]*\[tox\][\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - tox.ini
- id: precommit-ruff-hook
  message: Detected ruff pre-commit hook in .pre-commit-config.yaml
  severity: INFO
  languages:
  - generic
  pattern-regex: repo:\s*https://github\.com/astral-sh/ruff-pre-commit
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: precommit-ruff-format-hook
  message: Detected ruff-format hook in pre-commit configuration
  severity: INFO
  languages:
  - generic
  pattern-regex: id:\s*ruff-format
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: precommit-ruff-with-fix
  message: Detected ruff hook with --fix flag in pre-commit configuration
  severity: INFO
  languages:
  - generic
  pattern-regex: id:\s*ruff\n\s+args:\s*\[.*--fix.*\]
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: no-black-precommit-hook
  message: Black pre-commit hook removed and ruff hook added
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*psf/black)[\s\S]*astral-sh/ruff[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: no-autoflake-precommit-hook
  message: Autoflake pre-commit hook removed and ruff hook added
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*PyCQA/autoflake)[\s\S]*astral-sh/ruff[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: no-pyupgrade-precommit-hook
  message: Pyupgrade pre-commit hook removed and ruff hook added
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*asottile/pyupgrade)[\s\S]*astral-sh/ruff[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: no-flake8-precommit-hook
  message: Flake8 pre-commit hook removed and ruff hook added
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*PyCQA/flake8)[\s\S]*astral-sh/ruff[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: no-isort-precommit-hook
  message: Isort pre-commit hook removed and ruff hook added
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*pycqa/isort)[\s\S]*astral-sh/ruff[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: no-black-badge-in-readme
  message: Black badge removed from README.rst
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*badge/code%20style-black)[\s\S]*\.\. image::[\s\S]*
  metadata:
    category: other
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - README.rst
- id: ruff-select-rules-config
  message: Detected ruff select rules configuration
  severity: INFO
  languages:
  - generic
  pattern-regex: select\s*=\s*\[
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-ignore-rules-config
  message: Detected ruff ignore rules configuration
  severity: INFO
  languages:
  - generic
  pattern-regex: ignore\s*=\s*\[
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-docstring-code-format
  message: Detected ruff docstring code formatting enabled
  severity: INFO
  languages:
  - generic
  pattern-regex: docstring-code-format\s*=\s*true
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-isort-force-single-line
  message: Detected ruff isort force-single-line configuration
  severity: INFO
  languages:
  - generic
  pattern-regex: force-single-line\s*=\s*true
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: git-blame-ignore-ruff-commit
  message: Git blame ignore file updated with ruff migration commit
  severity: INFO
  languages:
  - generic
  pattern-regex: (?i)(ruff|consolidat.*lint.*format|migrat.*ruff)
  metadata:
    category: other
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .git-blame-ignore-revs
- id: ruff-and-no-old-tools-in-precommit
  message: Pre-commit config uses ruff without old tools (black, autoflake, flake8,
    pyupgrade)
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*astral-sh/ruff[\s\S]*(?!psf/black)(?!PyCQA/autoflake)(?!PyCQA/flake8)(?!asottile/pyupgrade)\z
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: pyproject-has-ruff-not-black
  message: pyproject.toml has ruff configuration without black configuration
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*\[tool\.ruff\][\s\S]*(?!\[tool\.black\])[\s\S]*\z
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-lint-select-multiple-categories
  message: Ruff configured with multiple linting rule categories (E/D/F/W/UP)
  severity: INFO
  languages:
  - generic
  pattern-regex: select\s*=\s*\[[^\]]*"[EDFWUP]
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: precommit-ruff-and-ruff-format-both
  message: Both ruff and ruff-format hooks present in pre-commit
  severity: INFO
  languages:
  - generic
  pattern-regex: (?s)id:\s*ruff.*id:\s*ruff-format
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: tox-no-legacy-lint-configs
  message: tox.ini has no flake8 or isort configuration sections
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*\[flake8\])(?![\s\S]*\[isort\])[\s\S]*\[tox\][\s\S]*\z
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - tox.ini
- id: ruff-isort-section-in-config
  message: Ruff configuration includes isort settings section
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.isort\]
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-pydocstyle-section-in-config
  message: Ruff configuration includes pydocstyle settings section
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.pydocstyle\]
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-pycodestyle-section-in-config
  message: Ruff configuration includes pycodestyle settings section
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.pycodestyle\]
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-migration-comment-in-git-blame
  message: Git blame ignore file mentions ruff/consolidation of linting
  severity: INFO
  languages:
  - generic
  pattern-regex: (?i)(?:ruff|consolidat).*(?:format|lint)
  metadata:
    category: other
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .git-blame-ignore-revs
- id: ruff-fix-flag-in-precommit
  message: Ruff pre-commit hook configured with --fix flag for auto-fixing
  severity: INFO
  languages:
  - generic
  pattern-regex: id:\s*ruff\s+args:\s*\[[^\]]*--fix
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: ruff-src-config
  message: Ruff src paths configured
  severity: INFO
  languages:
  - generic
  pattern-regex: src\s*=\s*\[
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: precommit-no-flake8-typing-imports
  message: Pre-commit no longer has flake8-typing-imports (replaced by ruff)
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*flake8-typing-imports)[\s\S]*astral-sh/ruff[\s\S]*\z
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: precommit-no-flake8-docstrings
  message: Pre-commit no longer has flake8-docstrings (replaced by ruff)
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*flake8-docstrings)[\s\S]*astral-sh/ruff[\s\S]*\z
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: ruff-configuration-with-line-length
  message: Ruff configured with line-length setting
  severity: INFO
  languages:
  - generic
  pattern-regex: (?s)\[tool\.ruff\][\s\S]*line-length
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-known-local-folder
  message: Ruff known-local-folder configuration present
  severity: INFO
  languages:
  - generic
  pattern-regex: known-local-folder\s*=\s*\[
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-lines-after-imports
  message: Ruff lines-after-imports setting configured
  severity: INFO
  languages:
  - generic
  pattern-regex: lines-after-imports\s*=\s*\d+
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-combine-as-imports
  message: Ruff combine-as-imports setting configured
  severity: INFO
  languages:
  - generic
  pattern-regex: combine-as-imports\s*=\s*(true|false)
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-convention-setting
  message: Ruff convention setting configured (e.g., google, numpy, pep257)
  severity: INFO
  languages:
  - generic
  pattern-regex: convention\s*=\s*"
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: precommit-migration-multiple-tools-removed
  message: Multiple old linting tools removed from pre-commit (autoflake, flake8)
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*PyCQA/autoflake)(?![\s\S]*PyCQA/flake8)[\s\S]*astral-sh/ruff[\s\S]*\z
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: ruff-known-modules-config
  message: Ruff known-modules configuration present (e.g., known-first-party, known-third-party)
  severity: INFO
  languages:
  - generic
  pattern-regex: known-[a-z\-]+\s*=\s*\[
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-format-docstring-code
  message: Ruff format configuration includes docstring-code setting
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.format\][\s\S]{0,200}docstring-code
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: precommit-astral-sh-org
  message: Pre-commit uses astral-sh organization (ruff maintainers)
  severity: INFO
  languages:
  - generic
  pattern-regex: github\.com/astral-sh/
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: ruff-isort-force-single-line-true
  message: Ruff isort configured with force-single-line = true
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.isort\][\s\S]{0,300}force-single-line\s*=\s*true
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-pydocstyle-convention-set
  message: Ruff pydocstyle configured with convention setting
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.pydocstyle\][\s\S]{0,300}convention\s*=
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: multiple-ruff-sections-in-pyproject
  message: Multiple ruff configuration sections in pyproject.toml
  severity: INFO
  languages:
  - generic
  pattern-regex: (?s)\[tool\.ruff\][\s\S]*\[tool\.ruff\.
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-pycodestyle-ignore-settings
  message: Ruff pycodestyle section with ignore or max settings
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.pycodestyle\][\s\S]{0,300}(ignore|max)
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: precommit-ruff-args-list
  message: Ruff pre-commit hook has args list configured
  severity: INFO
  languages:
  - generic
  pattern-regex: id:\s*ruff\s+args:\s*\[
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: ruff-isort-lines-after-imports-setting
  message: Ruff isort configured with lines-after-imports setting
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.isort\][\s\S]{0,400}lines-after-imports
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-isort-combine-as-imports-setting
  message: Ruff isort configured with combine-as-imports setting
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.isort\][\s\S]{0,400}combine-as-imports
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-with-src-paths
  message: Ruff configured with src paths
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\][\s\S]{0,500}src\s*=\s*\[
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-E-rules-configured
  message: E-series (pycodestyle error) rules configured in ruff
  severity: INFO
  languages:
  - generic
  pattern-regex: '"E[1-9]\d*"'
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: ruff-isort-known-local-folder-setting
  message: Ruff isort configured with known-local-folder
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\.lint\.isort\][\s\S]{0,400}known-local-folder
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pyproject.toml
- id: precommit-no-black-and-has-ruff
  message: Pre-commit no longer references black repo but has ruff
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*repo:\s*https://github\.com/psf/black)[\s\S]*astral-sh/ruff[\s\S]*\z
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: precommit-no-isort-and-has-ruff
  message: Pre-commit no longer references isort repo but has ruff
  severity: INFO
  languages:
  - generic
  pattern-regex: \A(?![\s\S]*repo:\s*https://github\.com/pycqa/isort)[\s\S]*astral-sh/ruff[\s\S]*\z
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - .pre-commit-config.yaml
- id: ruff-tool-config-comprehensive
  message: Comprehensive ruff tool configuration present (substantial config)
  severity: INFO
  languages:
  - generic
  pattern-regex: \[tool\.ruff\][\s\S]{100,}
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
