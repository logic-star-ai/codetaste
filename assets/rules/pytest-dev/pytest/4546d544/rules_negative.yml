rules:
- id: detect-flake8-error-codes-d400-series
  message: flake8 pydocstyle error codes (D4xx) detected. Should be configured in
    ruff [tool.ruff.lint.pydocstyle].
  severity: WARNING
  languages:
  - generic
  pattern-regex: D4[0-1][0-9]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-flake8-error-codes-d100-series
  message: flake8 pydocstyle error codes (D1xx) detected. Should be configured in
    ruff [tool.ruff.lint.pydocstyle].
  severity: WARNING
  languages:
  - generic
  pattern-regex: D10[0-7]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-flake8-error-codes-d200-series
  message: flake8 pydocstyle error codes (D2xx) detected. Should be configured in
    ruff [tool.ruff.lint.pydocstyle].
  severity: WARNING
  languages:
  - generic
  pattern-regex: D20[2-9]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-precommit-repo-pycqa-uppercase
  message: PyCQA repository (flake8/autoflake) detected in pre-commit config. Should
    migrate to ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: repo:\s+https://github\.com/PyCQA/
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-black-precommit-repo
  message: Old black pre-commit repo detected in .pre-commit-config.yaml. Should be
    replaced with ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: repo:\s+https://github\.com/psf/black
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-autoflake-precommit-repo
  message: Old autoflake pre-commit repo detected in .pre-commit-config.yaml. Should
    be replaced with ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: repo:\s+https://github\.com/PyCQA/autoflake
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-flake8-precommit-repo
  message: Old flake8 pre-commit repo detected in .pre-commit-config.yaml. Should
    be replaced with ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: repo:\s+https://github\.com/PyCQA/flake8
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-isort-precommit-repo
  message: Old isort pre-commit repo detected in .pre-commit-config.yaml. Should be
    replaced with ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: repo:\s+https://github\.com/pycqa/isort
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-pyupgrade-precommit-repo
  message: Old pyupgrade pre-commit repo detected in .pre-commit-config.yaml. Should
    be replaced with ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: repo:\s+https://github\.com/asottile/pyupgrade
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-flake8-typing-imports-addon
  message: flake8-typing-imports addon detected. No longer needed with ruff migration.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: flake8-typing-imports
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-flake8-docstrings-addon
  message: flake8-docstrings addon detected. No longer needed with ruff migration.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: flake8-docstrings
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-black-badge-in-readme
  message: Black badge detected in README. Should be removed after migrating to ruff.
  severity: WARNING
  languages:
  - generic
  pattern-regex: img\.shields\.io/badge/code%20style-black
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - README.rst
    - README.md
- id: detect-flake8-config-section
  message: Old [flake8] configuration section detected. Should be replaced with [tool.ruff]
    in pyproject.toml.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[flake8\]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-isort-config-section
  message: Old [isort] configuration section detected. Should be replaced with [tool.ruff]
    in pyproject.toml.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[isort\]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .isort.cfg
- id: detect-flake8-max-line-length-config
  message: flake8 max-line-length configuration detected. Should be moved to ruff
    [tool.ruff.line-length] in pyproject.toml.
  severity: WARNING
  languages:
  - generic
  pattern-regex: max-line-length\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-flake8-extend-ignore-config
  message: flake8 extend-ignore configuration detected. Should be moved to ruff [tool.ruff.lint.ignore]
    in pyproject.toml.
  severity: WARNING
  languages:
  - generic
  pattern-regex: extend-ignore\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-isort-force-single-line-config
  message: isort force_single_line configuration detected. Should be moved to ruff
    [tool.ruff.lint.isort] in pyproject.toml.
  severity: WARNING
  languages:
  - generic
  pattern-regex: force_single_line\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .isort.cfg
- id: detect-isort-known-localfolder-config
  message: isort known_localfolder configuration detected. Should be moved to ruff
    [tool.ruff.lint.isort] in pyproject.toml.
  severity: WARNING
  languages:
  - generic
  pattern-regex: known_localfolder\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .isort.cfg
- id: detect-flake8-error-code-e203
  message: flake8 error code E203 (whitespace before ':') detected. Should be configured
    in ruff ignore list.
  severity: WARNING
  languages:
  - generic
  pattern-regex: E203
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-flake8-error-code-f401
  message: flake8 error code F401 (unused import) detected. Should be configured in
    ruff ignore list.
  severity: WARNING
  languages:
  - generic
  pattern-regex: F401
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-black-hook-with-args-safe-quiet
  message: black hook with --safe and --quiet args detected in pre-commit config.
    Should use ruff-format instead.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: args:.*--safe.*--quiet
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-autoflake-remove-unused-variables-arg
  message: autoflake --remove-unused-variables argument detected. Functionality covered
    by ruff F841 rule.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: --remove-unused-variables
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-autoflake-remove-all-unused-imports-arg
  message: autoflake --remove-all-unused-imports argument detected. Functionality
    covered by ruff F401 rule.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: --remove-all-unused-imports
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-pyupgrade-py38-plus-arg
  message: pyupgrade --py38-plus argument detected. Should configure ruff target-version
    instead.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: --py38-plus
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-isort-force-alphabetical-sort
  message: isort force_alphabetical_sort_within_sections configuration detected. Should
    be configured in ruff [tool.ruff.lint.isort].
  severity: WARNING
  languages:
  - generic
  pattern-regex: force_alphabetical_sort_within_sections
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .isort.cfg
    - pyproject.toml
- id: detect-isort-known-third-party
  message: isort known_third_party configuration detected. Should be configured in
    ruff [tool.ruff.lint.isort].
  severity: WARNING
  languages:
  - generic
  pattern-regex: known_third_party\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .isort.cfg
- id: detect-isort-sections-config
  message: isort sections configuration detected. Should configure in ruff [tool.ruff.lint.isort.sections].
  severity: WARNING
  languages:
  - generic
  pattern-regex: sections\s*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .isort.cfg
- id: detect-flake8-additional-dependencies
  message: flake8 plugins listed as additional dependencies. Should remove after migrating
    to ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: additional_dependencies:[\s\S]*?flake8-
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-isort-args-profile
  message: isort --profile argument detected in pre-commit config. Configure in ruff
    [tool.ruff.lint.isort] instead.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: args:.*--profile
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-isort-args-force-single-line
  message: isort --force-single-line argument detected. Configure in ruff [tool.ruff.lint.isort.force-single-line]
    instead.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: --force-single-line
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-autoflake-in-place-arg
  message: autoflake --in-place argument detected. ruff check --fix provides similar
    functionality.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: --in-place
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-autoflake-files-regex
  message: File pattern for autoflake hook detected. ruff applies to Python files
    by default.
  severity: INFO
  languages:
  - yaml
  pattern-regex: files:.*\\\.py\$
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-black-rev-tag
  message: black version tag detected in pre-commit config. Update to use ruff versions.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: rev:.*2[34]\.\d+\.\d+
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-flake8-rev-tag
  message: flake8 version tag detected in pre-commit config. Should replace with ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: rev:\s*[67]\.\d+\.\d+
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-isort-rev-tag
  message: isort version tag detected in pre-commit config. Should replace with ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: rev:\s*5\.\d+\.\d+
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-pyupgrade-rev-tag
  message: pyupgrade version tag detected in pre-commit config. Should replace with
    ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: rev:\s*v3\.\d+\.\d+
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-autoflake-hook-name
  message: Hook name 'autoflake' detected in pre-commit config. Should update to ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: name:\s*autoflake
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-isort-hook-name
  message: Hook name 'isort' detected in pre-commit config. Should update to ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: name:\s*isort
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-flake8-typing-imports-version
  message: Pinned version of flake8-typing-imports detected. No longer needed with
    ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: flake8-typing-imports==\d+
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-flake8-docstrings-version
  message: Pinned version of flake8-docstrings detected. No longer needed with ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: flake8-docstrings==\d+
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-flake8-docstring-error-d302
  message: flake8 pydocstyle error code D302 detected. Configure in ruff [tool.ruff.lint.pydocstyle]
    if needed.
  severity: WARNING
  languages:
  - generic
  pattern-regex: D302
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-comment-whitespace-before-colon
  message: Comment about 'whitespace before :' E203 detected in flake8 config. Configure
    in ruff if needed.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ;\s*whitespace before
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-comment-missing-docstrings
  message: Comment about 'Missing Docstrings' detected in flake8 config. Configure
    pydocstyle rules in ruff.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ;\s*Missing Docstrings
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-comment-whitespace-issues
  message: Comment about 'Whitespace Issues' detected in flake8 config. Configure
    in ruff if needed.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ;\s*Whitespace Issues
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-comment-quotes-issues
  message: Comment about 'Quotes Issues' detected in flake8 config. Configure in ruff
    if needed.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ;\s*Quotes Issues
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-comment-docstring-content-issues
  message: Comment about 'Docstring Content Issues' detected in flake8 config. Configure
    pydocstyle rules in ruff.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ;\s*Docstring Content Issues
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-comment-unused-imports
  message: Comment about 'Unused imports' F401 detected in flake8 config. Configure
    in ruff if needed.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ;\s*Unused imports
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .flake8
- id: detect-comment-reorder-python-imports
  message: Reference to reorder-python-imports detected. This tool should be replaced
    with ruff.
  severity: WARNING
  languages:
  - generic
  pattern-regex: reorder-python-imports
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .isort.cfg
    - pyproject.toml
- id: detect-tox-flake8-section-header
  message: flake8 section with configuration detected in tox.ini. Migrate to ruff
    in pyproject.toml.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[flake8\][\s\S]{0,500}extend-ignore
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
- id: detect-isort-mimics-comment
  message: Comment about mimicking reorder-python-imports detected. Update for ruff
    migration.
  severity: WARNING
  languages:
  - generic
  pattern-regex: mimics what reorder-python-imports does
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tox.ini
    - setup.cfg
    - .isort.cfg
- id: detect-precommit-repo-pycqa-lowercase
  message: PyCQA repository (flake8/isort) detected in pre-commit config. Should migrate
    to ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: repo:\s+https://github\.com/pycqa/
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
- id: detect-precommit-repo-asottile
  message: asottile repository (pyupgrade/autoflake) detected in pre-commit config.
    Should migrate to ruff.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: repo:\s+https://github\.com/asottile/(pyupgrade|autoflake)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .pre-commit-config.yaml
