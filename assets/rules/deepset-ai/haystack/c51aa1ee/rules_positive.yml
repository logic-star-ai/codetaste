rules:
- id: doc-init-content-exclude-tests
  message: Detected Document with content excluding backward compat tests
  severity: INFO
  languages:
  - python
  pattern: Document(content=$X, ...)
  metadata:
    nr_refactored_patterns: 171
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
    exclude:
    - '**/test_document.py'
- id: doc-init-with-meta-keyword
  message: Detected Document with meta keyword argument
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: Document(..., meta=$VAL, ...)
  metadata:
    nr_refactored_patterns: 125
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: doc-init-meta-general
  message: Detected Document initialization with meta parameter
  severity: INFO
  languages:
  - python
  pattern: Document(..., meta=$X)
  metadata:
    nr_refactored_patterns: 114
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: final-doc-content-access-preview-only
  message: Final doc.content access in preview only
  severity: INFO
  languages:
  - python
  pattern: $D.content
  metadata:
    nr_refactored_patterns: 103
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/haystack/preview/**/*.py'
    - '**/test/preview/**/*.py'
    exclude:
    - '**/azure.py'
    - '**/link_content.py'
    - '**/gpt.py'
    - '**/prompt_builder.py'
    - '**/test_gpt_generator.py'
    - '**/test_chat_message.py'
    - '**/test_streaming_chunk.py'
- id: doc-content-access-exclude-all-false-positives
  message: Detected doc.content access with all exclusions
  severity: INFO
  languages:
  - python
  pattern: $D.content
  metadata:
    nr_refactored_patterns: 81
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/components/**/*.py'
    exclude:
    - '**/azure.py'
    - '**/link_content.py'
    - '**/gpt.py'
    - '**/prompt_builder.py'
    - '**/test_gpt_generator.py'
- id: document-meta-kwarg-in-init
  message: Detected meta as keyword argument in initialization
  severity: INFO
  languages:
  - python
  pattern: $CLASS(meta=$X)
  metadata:
    nr_refactored_patterns: 79
    nr_legacy_patterns: 0
- id: doc-content-comparison-exclude-chat-streaming
  message: Detected comparison with doc.content excluding chat and streaming
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $D.content == $VAL
    - pattern: $D.content != $VAL
  metadata:
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
    exclude:
    - '**/test_chat_message.py'
    - '**/test_streaming_chunk.py'
- id: doc-init-content-only-simple
  message: Detected simple Document with only content parameter
  severity: INFO
  languages:
  - python
  pattern: Document(content=$X)
  metadata:
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/components/**/*.py'
- id: doc-meta-key-bracket-access
  message: Detected doc.meta with bracket key access
  severity: INFO
  languages:
  - python
  pattern: $D.meta[$KEY]
  metadata:
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: doc-init-content-meta-simple
  message: Detected simple Document with content and meta
  severity: INFO
  languages:
  - python
  pattern: Document(content=$C, meta=$M)
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: doc-meta-access-exclude-prompt
  message: Detected doc.meta access excluding prompt builder
  severity: INFO
  languages:
  - python
  pattern: $D.meta
  metadata:
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/components/**/*.py'
    exclude:
    - '**/prompt_builder.py'
- id: doc-init-content-embedding-simple
  message: Detected Document with content and embedding only
  severity: INFO
  languages:
  - python
  pattern: Document(content=$C, embedding=$E)
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: doc-meta-get-method-call
  message: Detected doc.meta.get method call
  severity: INFO
  languages:
  - python
  pattern: $D.meta.get($KEY, ...)
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: doc-meta-key-access-simple
  message: Detected doc.meta key access with brackets
  severity: INFO
  languages:
  - python
  pattern: $D.meta[$KEY]
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/components/**/*.py'
- id: doc-meta-in-check-key
  message: Detected checking key in doc.meta
  severity: INFO
  languages:
  - python
  pattern: $K in $D.meta
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: doc-init-content-meta-embedding
  message: Detected Document with content meta and embedding
  severity: INFO
  languages:
  - python
  pattern: Document(content=$C, meta=$M, embedding=$E, ...)
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: doc-meta-comparison-operators
  message: Detected comparison with doc.meta
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $D.meta == $VAL
    - pattern: $D.meta != $VAL
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: doc-init-content-score-simple
  message: Detected Document with content and score only
  severity: INFO
  languages:
  - python
  pattern: Document(content=$C, score=$S)
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: document-constructor-content-blob
  message: Detected Document with content and blob (new naming)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $CLASS(content=$C, blob=$B, ...)
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^Document$
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: document-str-self-content-access
  message: Detected accessing self.content in str method
  severity: INFO
  languages:
  - python
  pattern: $SELF.content
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/dataclasses/document.py'
- id: doc-content-in-readers
  message: Detected doc.content access in readers
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $D.content
  - pattern-not: $D.text
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/readers/*.py'
- id: doc-meta-access-simple
  message: Detected simple doc.meta field access
  severity: INFO
  languages:
  - python
  pattern: $D.meta
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/components/audio/*.py'
- id: doc-content-method-exclude-gpt
  message: Detected doc.content method call excluding gpt
  severity: INFO
  languages:
  - python
  pattern: $D.content.$METHOD(...)
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
    exclude:
    - '**/gpt.py'
    - '**/test_gpt_generator.py'
- id: doc-init-content-meta-in-audio
  message: Detected Document init with content and meta in audio components
  severity: INFO
  languages:
  - python
  pattern: Document(content=$C, meta=$M, ...)
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/audio/*.py'
- id: doc-init-content-meta-in-preprocessors
  message: Detected Document init with content and meta in preprocessors
  severity: INFO
  languages:
  - python
  pattern: Document(content=$C, meta=$M, ...)
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preprocessors/*.py'
- id: doc-list-comp-content-meta-creation
  message: Detected list comprehension creating docs with content and meta
  severity: INFO
  languages:
  - python
  pattern: '[Document(content=$C, meta=$M) for ... in ...]

    '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/components/**/*.py'
- id: doc-init-content-only-in-converters
  message: Detected Document init with content in file converters
  severity: INFO
  languages:
  - python
  pattern: Document(content=$C)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/file_converters/*.py'
- id: doc-meta-key-access-in-embedders
  message: Detected doc.meta key access in embedders
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $D.meta[$KEY]
  - pattern-not: $D.metadata[$KEY]
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/embedders/*.py'
- id: doc-append-with-meta-param
  message: Detected appending Document with meta parameter
  severity: INFO
  languages:
  - python
  pattern: $LIST.append(Document(..., meta=$X))
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: document-content-or-default
  message: Detected .content field with or default value (new naming convention)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.content or $DEFAULT
  - pattern-not: $OBJ.text or $DEFAULT
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: doc-content-in-samplers
  message: Detected doc.content access in samplers
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $D.content
  - pattern-not: $D.text
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/samplers/*.py'
- id: doc-meta-in-routers
  message: Detected doc.meta access in routers
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $D.meta
  - pattern-not: $D.metadata
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/routers/*.py'
- id: doc-init-content-in-websearch
  message: Detected Document with content in websearch
  severity: INFO
  languages:
  - python
  pattern: Document(content=$VAL, ...)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/websearch/*.py'
- id: doc-content-in-retrievers
  message: Detected doc.content in retrievers
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $D.content
  - pattern-not: $D.text
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/retrievers/*.py'
- id: doc-init-meta-only-simple
  message: Detected simple Document with only meta parameter
  severity: INFO
  languages:
  - python
  pattern: Document(meta=$X)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/components/**/*.py'
- id: doc-content-in-ranker
  message: Detected doc.content in ranker component
  severity: INFO
  languages:
  - python
  pattern: $D.content
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/components/rankers/*.py'
- id: doc-content-not-none-check-broad
  message: Detected doc.content is not None check broadly
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "if $D.content is not None:\n  ...\n"
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/haystack/nodes/**'
    - '**/haystack/document_stores/**'
- id: doc-content-is-none-check-in-loop
  message: Detected doc.content is None check in loop (new naming)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "for $D in $DOCS:\n  ...\n  if $D.content is None:\n    ...\n"
  - pattern-not: "for $D in $DOCS:\n  ...\n  if $D.text is None:\n    ...\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: doc-init-content-in-writers
  message: Detected Document with content in writers
  severity: INFO
  languages:
  - python
  pattern: Document(content=$VAL, ...)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/writers/*.py'
- id: doc-init-id-content-simple
  message: Detected Document with id and content only
  severity: INFO
  languages:
  - python
  pattern: Document(id=$I, content=$C)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: document-content-append-to-list
  message: Detected .content field appended to list (new naming convention)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $LIST.append($OBJ.content)
  - pattern-not: $LIST.append($OBJ.text)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: document-content-field-definition
  message: Detected content field definition in dataclass (new naming)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'content: $TYPE = field(...)

      '
  - pattern-inside: "@dataclass\nclass $CLASS:\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: document-meta-field-definition
  message: Detected meta field definition in dataclass (new naming)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'meta: $TYPE = field(...)

      '
  - pattern-inside: "@dataclass\nclass $CLASS:\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: document-docstring-meta-field
  message: Detected docstring mentioning meta field (new naming)
  severity: INFO
  languages:
  - python
  pattern-regex: '(?s):param\s+meta:'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dataclasses/*.py'
    - '**/document.py'
- id: document-to-dict-meta-key
  message: Detected to_dict with 'meta' key (new naming)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $DICT.pop("meta")
  - pattern-inside: "def to_dict(...):\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: backward-compat-meta-kwarg
  message: Detected backward compatibility handling for meta (new naming)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: kwargs.get("meta")
  - pattern-inside: "class $META(type):\n  ...\n  def __call__(...):\n    ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: document-kwargs-meta-extraction
  message: Detected meta parameter extraction from kwargs (new naming)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: kwargs["meta"] = $VAL
  - pattern-not: kwargs["metadata"] = $VAL
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: document-field-check-content-or-dataframe
  message: Detected check for content or dataframe
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "if $OBJ.content is not None and $OBJ.dataframe is not None:\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: document-create-id-meta-assignment
  message: Detected assigning self.meta in create_id method
  severity: INFO
  languages:
  - python
  pattern: meta = $SELF.meta or $DEFAULT
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/dataclasses/document.py'
- id: document-kwargs-metadata-none-check
  message: Detected checking if kwargs metadata is None
  severity: INFO
  languages:
  - python
  pattern: "if kwargs.get(\"meta\") is None:\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/dataclasses/document.py'
- id: doc-init-content-meta-in-converters
  message: Detected Document init with content and meta in file converters
  severity: INFO
  languages:
  - python
  pattern: Document(content=$C, meta=$M)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/file_converters/*.py'
- id: doc-meta-score-in-samplers
  message: Detected doc.meta score access in samplers
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $D.meta[$FIELD]
  - pattern-not: $D.metadata[$FIELD]
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/samplers/*.py'
