rules:
- id: doc-instantiation-with-meta-kwarg
  message: Detected Document instantiation with meta= kwarg (refactored)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $CLASS(meta=$VAL)
  - pattern-not: $CLASS(metadata=$VAL)
  metadata:
    nr_refactored_patterns: 79
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: doc-meta-method-chain-fixed
  message: Detected method chain on meta (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.meta.$METHOD(...)
  - pattern-not: $OBJ.metadata.$METHOD(...)
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
    exclude:
    - '**/test*.py'
    - '**/builders/prompt_builder.py'
- id: doc-instantiation-content-no-tests
  message: Detected Document instantiation with content= kwarg (refactored)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $CLASS(content=$VAL)
  - pattern-not: $CLASS(text=$VAL)
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
    exclude:
    - '**/test*.py'
    - '**/*test.py'
    - '**/tests/**'
- id: doc-meta-any-call-kwarg
  message: Detected function call with meta= kwarg (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $FUNC(..., meta=$VAL, ...)
  - pattern-not: $FUNC(..., metadata=$VAL, ...)
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/components/**/*.py'
    exclude:
    - '**/test*.py'
- id: doc-meta-in-embedder
  message: Detected 'meta' dict access in embedder (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.meta[$KEY]
  - pattern-not: $OBJ.metadata[$KEY]
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/components/embedders/**/*.py'
    exclude:
    - '**/test*.py'
- id: doc-content-in-preprocessor
  message: Detected 'content' in preprocessor component (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.content
  - pattern-not: $OBJ.text
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/components/preprocessors/**/*.py'
    exclude:
    - '**/test*.py'
- id: doc-content-in-reader
  message: Detected 'content' in reader component (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.content
  - pattern-not: $OBJ.text
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/components/readers/**/*.py'
    exclude:
    - '**/test*.py'
- id: content-or-empty-string
  message: Detected 'content or ""' pattern (refactored from 'text')
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $OBJ.content or ""
    - pattern: $OBJ.content or ''
  - pattern-not: $OBJ.text or ""
  - pattern-not: $OBJ.text or ''
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: doc-content-none-check-in-method
  message: Detected content None check in method (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "if self.content is not None:\n    ...\n"
  - pattern-not: "if self.text is not None:\n    ...\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dataclasses/document.py'
- id: doc-instantiation-content-and-id
  message: Detected Document(..., content=..., ..., id=...) pattern (refactored)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $CLASS(..., content=$C, ..., id=$ID, ...)
  - pattern-not: $CLASS(..., text=$T, ..., id=$ID, ...)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
- id: doc-meta-in-sampler
  message: Detected 'meta' in sampler component (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.meta
  - pattern-not: $OBJ.metadata
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/components/samplers/**/*.py'
    exclude:
    - '**/test*.py'
- id: dataclass-field-content-definition
  message: Detected 'content' field definition in dataclass (refactored from 'text')
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'content: $TYPE = field(...)

        '
    - pattern: 'content: $TYPE = $DEFAULT

        '
    - pattern: 'content: Optional[$TYPE] = field(...)

        '
    - pattern: 'content: Optional[$TYPE] = $DEFAULT

        '
  - pattern-not: 'text: $TYPE = field(...)

      '
  - pattern-not: 'text: $TYPE = $DEFAULT

      '
  - pattern-inside: "@dataclass\nclass $CLASS:\n    ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: doc-meta-field-def-in-document-py
  message: Detected 'meta' field definition in Document dataclass
  severity: INFO
  languages:
  - python
  pattern: 'meta: Dict[str, Any] = field(...)'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dataclasses/document.py'
- id: doc-dict-get-meta-key
  message: Detected dict.get('meta') in document context
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $DICT.get("meta", ...)
  - pattern-not: $DICT.get("metadata", ...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/dataclasses/**/*.py'
    - '**/preview/components/**/*.py'
- id: doc-docstring-meta-field
  message: Detected docstring mentioning 'meta' field (Document refactoring)
  severity: INFO
  languages:
  - python
  pattern-regex: (?s)""".*\bmeta\b.*field.*"""
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/dataclasses/document.py'
- id: doc-content-dataframe-check
  message: Detected content/dataframe combined check (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "if $OBJ.content is not None and $OBJ.dataframe is not None:\n    ...\n"
    - pattern: "if $OBJ.dataframe is not None and $OBJ.content is not None:\n    ...\n"
  - pattern-not: "if $OBJ.text is not None and $OBJ.dataframe is not None:\n    ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: doc-content-in-ranker
  message: Detected 'content' in ranker component (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.content
  - pattern-not: $OBJ.text
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/components/rankers/**/*.py'
    exclude:
    - '**/test*.py'
- id: doc-content-in-list-append
  message: Detected list.append with content (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $LIST.append($OBJ.content)
  - pattern-not: $LIST.append($OBJ.text)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
    exclude:
    - '**/test*.py'
- id: doc-content-enumerate-pattern
  message: Detected enumerate with content access (Document refactoring)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "for $IDX, $DOC in enumerate($DOCS):\n    ...\n    $DOC.content\n   \
      \ ...\n"
  - pattern-not: "for $IDX, $DOC in enumerate($DOCS):\n    ...\n    $DOC.text\n  \
      \  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/preview/**/*.py'
    exclude:
    - '**/test*.py'
