rules:
- id: doc-text-in-str-method
  message: Document __str__ should check self.text.
  severity: WARNING
  languages:
  - python
  pattern-regex: if self\.text is not None
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: new-document-text-field-exists
  message: New Document class should have 'text' field, not 'content'.
  severity: WARNING
  languages:
  - python
  pattern-regex: 'text: Optional\[str\]'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: new-document-metadata-field-exists
  message: New Document class should have 'metadata' field, not 'meta'.
  severity: WARNING
  languages:
  - python
  pattern-regex: 'metadata: Dict\[str, Any\]'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: doc-content-string-type-check
  message: Type check for content parameter in backward compatibility.
  severity: WARNING
  languages:
  - python
  pattern-regex: if isinstance\(content, str\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: doc-dataframe-conversion-from-content
  message: Backward compat converts DataFrame content to dataframe field.
  severity: WARNING
  languages:
  - python
  pattern-regex: elif isinstance\(content, pandas\.DataFrame\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: doc-flatten-metadata-in-to-dict
  message: Document.to_dict flattens metadata when flatten=True.
  severity: WARNING
  languages:
  - python
  pattern-regex: data\.pop\("metadata"\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: doc-text-docstring-param
  message: Document docstring should document 'text' parameter.
  severity: WARNING
  languages:
  - python
  pattern-regex: ':param text: Text of the document'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: doc-metadata-docstring-param
  message: Document docstring should document 'metadata' parameter.
  severity: WARNING
  languages:
  - python
  pattern-regex: ':param metadata: Additional custom metadata'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: doc-text-none-in-create-id
  message: Document._create_id should handle text field.
  severity: WARNING
  languages:
  - python
  pattern-regex: text = self\.text or None
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: doc-metadata-in-create-id
  message: Document._create_id should handle metadata field.
  severity: WARNING
  languages:
  - python
  pattern-regex: metadata = self\.metadata or \{\}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: doc-content-in-kwargs-check
  message: Checking for 'content' in kwargs for backward compatibility.
  severity: WARNING
  languages:
  - python
  pattern-regex: '"content" in kwargs'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: doc-both-text-dataframe-check
  message: Document checks both text and dataframe aren't set together.
  severity: WARNING
  languages:
  - python
  pattern-regex: if self\.text is not None and self\.dataframe is not None
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
- id: doc-metadata-flattening-logic
  message: Document.to_dict should support metadata flattening.
  severity: WARNING
  languages:
  - python
  pattern-regex: flatten.*metadata
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - haystack/preview/dataclasses/document.py
