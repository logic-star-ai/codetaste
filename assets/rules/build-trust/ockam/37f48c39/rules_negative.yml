rules:
- id: rpc-type-with-lifetime-regex
  message: Rpc type uses explicit lifetime parameter. Update to Rpc without lifetime.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Rpc<'[a-z_]+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: rpc-function-parameter-lifetime-regex
  message: Function parameter uses Rpc with explicit lifetime. Update to remove lifetime.
  severity: WARNING
  languages:
  - rust
  pattern-regex: rpc:\s*&(mut\s+)?Rpc<'[a-z_]+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: rpc-function-parameter-borrowed-rpc
  message: Function parameter uses borrowed Rpc<'a>. Update to &Rpc without lifetime.
  severity: WARNING
  languages:
  - rust
  pattern: 'fn $FUNC(..., rpc: &Rpc<''a>, ...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: rpc-async-function-parameter-borrowed-rpc
  message: Async function parameter uses borrowed Rpc<'a>. Update to &Rpc without
    lifetime.
  severity: WARNING
  languages:
  - rust
  pattern: 'async fn $FUNC(..., rpc: &Rpc<''a>, ...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: rpc-function-parameter-with-explicit-lifetime
  message: Function parameter uses Rpc<'a> with explicit lifetime. Update to &mut
    Rpc.
  severity: WARNING
  languages:
  - rust
  pattern: 'fn $FUNC(..., rpc: &mut Rpc<''a>, ...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: rpc-async-function-parameter-with-explicit-lifetime
  message: Async function parameter uses Rpc<'a> with explicit lifetime. Update to
    &mut Rpc.
  severity: WARNING
  languages:
  - rust
  pattern: 'async fn $FUNC(..., rpc: &mut Rpc<''a>, ...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: rpc-lifetime-in-any-file-regex
  message: Code uses &mut Rpc<'a>. Update to &mut Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: '&mut\s+Rpc<''a>'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: rpc-clone-method-call
  message: Rpc uses .clone() instead of .async_try_clone().await
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $RPC.clone()
  - metavariable-pattern:
      metavariable: $RPC
      patterns:
      - pattern: $VAR
      - metavariable-regex:
          metavariable: $VAR
          regex: ^rpc.*$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: rpc-clone-on-rpc-variable
  message: Rpc variable uses .clone(). Update to .async_try_clone().await
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: let $VAR = $RPC.clone();
  - metavariable-regex:
      metavariable: $RPC
      regex: ^rpc$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: rpc-mut-clone-on-rpc-variable
  message: Rpc variable uses .clone(). Update to .async_try_clone().await
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: let mut $VAR = $RPC.clone();
  - metavariable-regex:
      metavariable: $RPC
      regex: ^rpc$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: rpc-variable-clone-assignment
  message: Rpc variable cloned. Update to .async_try_clone().await
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: let $NEW = $OLD.clone();
  - metavariable-regex:
      metavariable: $OLD
      regex: ^rpc_?.*$
  - metavariable-regex:
      metavariable: $NEW
      regex: ^rpc_?.*$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: rpc-mutable-variable-clone-assignment
  message: Mutable Rpc variable cloned. Update to .async_try_clone().await
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: let mut $NEW = $OLD.clone();
  - metavariable-regex:
      metavariable: $OLD
      regex: ^rpc_?.*$
  - metavariable-regex:
      metavariable: $NEW
      regex: ^rpc_?.*$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: rpc-let-mut-rpc-clone-assignment
  message: Assignment uses rpc.clone(). Update to rpc.async_try_clone().await
  severity: WARNING
  languages:
  - rust
  pattern: 'let mut rpc = rpc.clone();

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: rpc-project-utility-functions-regex
  message: Project utility function uses Rpc<'a> with lifetime. Update to &mut Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: (?:pub\s+)?async\s+fn\s+\w*project\w*<'a>\s*\([^)]*rpc:\s*&mut\s+Rpc<'a>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: rpc-tuple-with-rpc-lifetime-regex
  message: Tuple contains Rpc with lifetime. Update to Rpc without lifetime.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \(.*Rpc<'[a-z_]+>.*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: rpc-return-type-with-lifetime
  message: Function returns Rpc<'a> with lifetime. Update to return Rpc.
  severity: WARNING
  languages:
  - rust
  pattern: 'fn $FUNC(...) -> Result<Rpc<''a>> { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: rpc-return-type-lifetime-regex
  message: Function returns Rpc with explicit lifetime. Update to return Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ->\s*Result<Rpc<'[a-z_]+>>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: rpc-result-rpc-lifetime-regex
  message: Result type contains Rpc<'a>. Update to Result<Rpc>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Result<Rpc<'a>>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: rpc-start-service-functions-regex
  message: start_*_service function uses Rpc<'a> with lifetime. Update to &mut Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+async\s+fn\s+start_\w+_service<'a>\s*\(\s*rpc:\s*&mut\s+Rpc<'a>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: rpc-secure-channel-functions-regex
  message: Secure channel function uses Rpc<'a> with lifetime. Update to &mut Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: (?:pub\s+)?async\s+fn\s+\w*secure_channel\w*<'a>\s*\([^)]*rpc:\s*&mut\s+Rpc<'a>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: rpc-async-return-type-with-lifetime
  message: Async function returns Rpc<'a> with lifetime. Update to return Rpc.
  severity: WARNING
  languages:
  - rust
  pattern: 'async fn $FUNC(...) -> Result<Rpc<''a>> { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: rpc-async-function-signature-context-ref-regex
  message: Async function takes borrowed Context and CommandGlobalOpts with lifetimes.
    May need updating.
  severity: WARNING
  languages:
  - rust
  pattern-regex: async\s+fn\s+\w+\s*\([^)]*ctx:\s*&'[a-z_]+\s+Context[^)]*opts:\s*&'[a-z_]+\s+CommandGlobalOpts
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: rpc-mode-type-annotation-with-lifetime-regex
  message: RpcMode field uses lifetime parameter. Update to RpcMode without lifetime.
  severity: WARNING
  languages:
  - rust
  pattern-regex: mode:\s*RpcMode<'[a-z_]+>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: rpc-borrowed-lifetime-in-any-file-regex
  message: Code uses &Rpc<'a>. Update to &Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: '&Rpc<''a>'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: rpc-enroll-functions-regex
  message: Enroll-related function uses Rpc<'a> with lifetime. Update to &mut Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: async\s+fn\s+\w*enroll\w*<'a>\s*\([^)]*rpc:\s*&mut\s+Rpc<'a>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: rpc-space-utility-functions-regex
  message: Space utility function uses Rpc<'a> with lifetime. Update to &mut Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: (?:pub\s+)?async\s+fn\s+\w*space\w*<'a>\s*\([^)]*rpc:\s*&(mut\s+)?Rpc<'a>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: rpc-subscription-functions-regex
  message: Subscription function uses Rpc<'a> with lifetime. Update to &mut Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: (?:pub\s+)?async\s+fn\s+\w*subscr\w*<'a>\s*\([^)]*rpc:\s*&mut\s+Rpc<'a>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: rpc-lifetime-underscore-usage-regex
  message: Rpc uses elided lifetime '_. Update to remove lifetime parameter entirely.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Rpc<'_>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: rpc-struct-with-lifetime-parameter
  message: Rpc struct still uses lifetime parameter 'a'. Remove lifetime and make
    fields owned.
  severity: WARNING
  languages:
  - rust
  pattern: 'pub struct Rpc<''a> { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-impl-with-lifetime-parameter
  message: Rpc impl block still uses lifetime parameter 'a'. Update to impl Rpc.
  severity: WARNING
  languages:
  - rust
  pattern: 'impl<''a> Rpc<''a> { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-builder-struct-exists
  message: RpcBuilder struct should be removed as part of the refactoring.
  severity: WARNING
  languages:
  - rust
  pattern: 'pub struct RpcBuilder<''$LIFETIME> { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-builder-impl-exists
  message: RpcBuilder impl block should be removed as part of the refactoring.
  severity: WARNING
  languages:
  - rust
  pattern: 'impl<''$LIFETIME> RpcBuilder<''$LIFETIME> { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpcmode-background-tcp-none-initialization
  message: RpcMode::Background initialized with struct syntax. Update to tuple variant
    RpcMode::Background(Arc<TcpTransport>).
  severity: WARNING
  languages:
  - rust
  pattern: 'RpcMode::Background { tcp: None }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-embedded-with-borrowed-params
  message: Rpc::embedded() uses borrowed parameters and returns Rpc with lifetime.
    Update to owned parameters.
  severity: WARNING
  languages:
  - rust
  pattern: 'pub async fn embedded(ctx: &''$LIFETIME Context, opts: &''$LIFETIME CommandGlobalOpts)
    -> Result<Rpc<''$LIFETIME>> { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-mode-background-struct-variant
  message: RpcMode::Background uses old struct variant. Update to tuple variant RpcMode::Background(Arc<TcpTransport>).
  severity: WARNING
  languages:
  - rust
  pattern: 'RpcMode::Background { tcp: $VALUE }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-derive-clone-only
  message: Rpc struct should derive AsyncTryClone instead of just Clone
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: '#[derive(..., Clone, ...)]

      struct Rpc<''$L> { ... }

      '
  - pattern-not: '#[derive(..., AsyncTryClone, ...)]

      struct Rpc { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-orchestratorapi-struct-with-lifetime
  message: OrchestratorApi struct uses lifetime parameter. May need updating if it
    contains Rpc field.
  severity: WARNING
  languages:
  - rust
  pattern: 'pub struct OrchestratorApi<''a> { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-impl-method-returning-rpc-with-lifetime
  message: Method returns Rpc<'a> with lifetime. Update to return Rpc.
  severity: WARNING
  languages:
  - rust
  pattern: "impl $STRUCT {\n  ...\n  pub fn $METHOD(...) -> Rpc<'a> { ... }\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-embedded-with-vault-identity-signature
  message: Method signature uses borrowed parameters with lifetime and returns Rpc<'a>.
    Update signatures.
  severity: WARNING
  languages:
  - rust
  pattern: 'pub async fn embedded_with_vault_and_identity(ctx: &''a Context, opts:
    &''a CommandGlobalOpts, ...) -> Result<Rpc<''a>> { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-embedded-with-trust-options-signature
  message: Method signature uses borrowed parameters with lifetime and returns Rpc<'a>.
    Update signatures.
  severity: WARNING
  languages:
  - rust
  pattern: 'pub async fn embedded_with_trust_options(ctx: &''a Context, opts: &''a
    CommandGlobalOpts, ...) -> Result<Rpc<''a>> { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-struct-definition-with-lifetime-regex
  message: Rpc struct defined with lifetime parameter. Remove lifetime and make fields
    owned.
  severity: WARNING
  languages:
  - rust
  pattern-regex: struct\s+Rpc<'[a-z_]+>\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-impl-block-with-lifetime-regex
  message: Rpc impl block uses lifetime parameter. Update to impl Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: impl<'[a-z_]+>\s+Rpc<'[a-z_]+>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpcbuilder-struct-definition-regex
  message: RpcBuilder struct detected. RpcBuilder should be removed entirely.
  severity: WARNING
  languages:
  - rust
  pattern-regex: struct\s+RpcBuilder<'[a-z_]+>\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpcbuilder-impl-block-regex
  message: RpcBuilder impl block detected. RpcBuilder should be removed entirely.
  severity: WARNING
  languages:
  - rust
  pattern-regex: impl<'[a-z_]+>\s+RpcBuilder<'[a-z_]+>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpcmode-enum-with-lifetime-regex
  message: RpcMode enum defined with lifetime parameter. Remove lifetime.
  severity: WARNING
  languages:
  - rust
  pattern-regex: enum\s+RpcMode<'[a-z_]+>\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpcmode-background-struct-syntax-regex
  message: RpcMode::Background uses old struct variant syntax. Update to tuple variant
    RpcMode::Background(Arc<TcpTransport>).
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'RpcMode::Background\s*\{\s*tcp:'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-orchestrator-api-rpc-field-regex
  message: Struct field uses Rpc with lifetime. Update to Rpc without lifetime.
  severity: WARNING
  languages:
  - rust
  pattern-regex: rpc:\s*Rpc<'[a-z_]+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-tcp-transport-option-reference-regex
  message: Field uses Option with borrowed TcpTransport. Update to Arc<TcpTransport>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: tcp:\s*Option<&'[a-z_]+\s+TcpTransport>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: orchestratorapi-struct-lifetime-regex
  message: OrchestratorApi struct uses lifetime parameter. Update if it contains Rpc
    field.
  severity: WARNING
  languages:
  - rust
  pattern-regex: struct\s+OrchestratorApi<'[a-z_]+>\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: orchestratorapi-impl-lifetime-regex
  message: OrchestratorApi impl block uses lifetime parameter. Update if it contains
    Rpc field.
  severity: WARNING
  languages:
  - rust
  pattern-regex: impl<'[a-z_]+>\s+OrchestratorApi<'[a-z_]+>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-embedded-method-def-with-lifetimes
  message: Rpc::embedded() uses borrowed parameters with lifetimes. Update signature
    to owned types.
  severity: WARNING
  languages:
  - rust
  pattern: "pub async fn embedded($CTX: &'a Context, $OPTS: &'a CommandGlobalOpts)\
    \ -> Result<Rpc<'a>> {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-derive-clone-without-asynctryclone-regex
  message: Rpc derives Clone with lifetime. Should derive AsyncTryClone without lifetime.
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[derive\([^)]*Clone[^)]*\)\]\s*(?:pub\s+)?struct\s+Rpc<'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-field-in-struct-with-lifetime
  message: Struct has Rpc field with lifetime. Update to Rpc without lifetime.
  severity: WARNING
  languages:
  - rust
  pattern-regex: (?:pub\s+)?rpc:\s*Rpc<'[a-z_]+>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpcmode-clone-derive-with-lifetime-regex
  message: RpcMode derives Clone with lifetime. Update to remove lifetime.
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[derive\([^)]*Clone[^)]*\)\]\s*(?:pub\s+)?enum\s+RpcMode<'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-struct-fields-with-references
  message: Rpc struct has borrowed ctx field. Update to owned Context.
  severity: WARNING
  languages:
  - rust
  pattern-regex: struct\s+Rpc<'[a-z_]+>\s*\{[^}]*ctx:\s*&'[a-z_]+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-background-method-implementation-regex
  message: Rpc::background() method returns Rpc with lifetime. Should be async and
    return Rpc.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+fn\s+background\s*\([^)]*\)\s*->\s*Result<Rpc<'[a-z_]+>>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-embedded-method-implementation-regex
  message: Rpc::embedded() uses borrowed Context with lifetime. Update to owned parameters.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+async\s+fn\s+embedded\s*\([^)]*&'[a-z_]+\s+Context[^)]*\)\s*->\s*Result<Rpc<'[a-z_]+>>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-embedded-with-vault-and-identity-regex
  message: Rpc::embedded_with_vault_and_identity() uses borrowed Context with lifetime.
    Update signature.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+async\s+fn\s+embedded_with_vault_and_identity\s*\([^)]*&'[a-z_]+\s+Context[^)]*\)\s*->\s*Result<Rpc<'[a-z_]+>>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-embedded-with-trust-options-regex
  message: Rpc::embedded_with_trust_options() uses borrowed Context with lifetime.
    Update signature.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+async\s+fn\s+embedded_with_trust_options\s*\([^)]*&'[a-z_]+\s+Context[^)]*\)\s*->\s*Result<Rpc<'[a-z_]+>>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpcbuilder-to-method-implementation-regex
  message: RpcBuilder::to() method implementation. RpcBuilder should be removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+fn\s+to\s*\(\s*mut\s+self.*\)\s*->\s*Result<Self>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpcbuilder-build-method-implementation-regex
  message: RpcBuilder::build() method returns Rpc with lifetime. RpcBuilder should
    be removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+fn\s+build\s*\(\s*self\s*\)\s*->\s*Rpc<'[a-z_]+>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-route-impl-method-call
