rules:
- id: rpc-background-method-awaited
  message: Detected Rpc::background() being awaited (refactored to async)
  severity: INFO
  languages:
  - rust
  pattern: 'Rpc::background(...).await

    '
  metadata:
    category: api
    nr_refactored_patterns: 57
    nr_legacy_patterns: 0
- id: rpc-background-call-with-await
  message: Detected Rpc::background() call followed by .await (now async)
  severity: INFO
  languages:
  - rust
  pattern-regex: Rpc::background\([^)]*\)\.await
  metadata:
    category: api
    nr_refactored_patterns: 57
    nr_legacy_patterns: 0
- id: rpc-parameter-without-explicit-lifetime
  message: Detected function parameter with Rpc reference but no explicit lifetime
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+\w+.*\([^)]*:\s*(?:&mut\s+|&\s*)Rpc\s*[,\)]
  metadata:
    category: basic
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: rpc-function-signature-without-lifetime
  message: Detected function parameter &mut Rpc without lifetime (refactored from
    &mut Rpc<'_>)
  severity: INFO
  languages:
  - rust
  pattern: "fn $FUNC(..., rpc: &mut Rpc, ...) -> $RET {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: rpc-async-function-signature-without-lifetime
  message: Detected async function parameter &mut Rpc without lifetime (refactored
    from &mut Rpc<'_>)
  severity: INFO
  languages:
  - rust
  pattern: "async fn $FUNC(..., rpc: &mut Rpc, ...) -> $RET {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: rpc-return-type-no-lifetime
  message: Detected function returning Result<Rpc> without lifetime (refactored from
    Result<Rpc<'a>>)
  severity: INFO
  languages:
  - rust
  pattern-either:
  - pattern: 'fn $FUNC(...) -> Result<Rpc> { ... }

      '
  - pattern: 'async fn $FUNC(...) -> Result<Rpc> { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: rpc-type-in-result-no-lifetime
  message: Detected Result<Rpc> without lifetime parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: Result<Rpc>
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: rpc-return-with-owned-fields
  message: 'Detected Ok(Rpc { ctx: ctx, opts: opts, ... }) pattern (owned fields)'
  severity: INFO
  languages:
  - rust
  pattern-regex: (?s)Ok\s*\(\s*Rpc\s*\{[^}]*ctx:\s*ctx[^}]*opts:\s*opts
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/util/mod.rs'
- id: rpc-construction-owned-ctx-opts-together
  message: 'Detected Rpc construction with both ctx: ctx and opts: opts (moving ownership)'
  severity: INFO
  languages:
  - rust
  pattern-regex: (?s)Rpc\s*\{[^}]{0,200}ctx:\s*ctx[^}]{0,100}opts:\s*opts
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/util/mod.rs'
- id: helper-fn-with-rpc-mut-ref-no-lifetime
  message: Detected public async function with &mut Rpc parameter (no lifetime)
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+async\s+fn\s+\w+.*rpc:\s*&mut\s+Rpc\s*[,\)]
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: function-param-rpc-ref-mut-no-tick
  message: 'Detected function parameter ''rpc: &mut Rpc'' without lifetime tick'
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+\w+\([^)]*rpc:\s*&mut\s+Rpc\s*[,\)]
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: async-fn-param-rpc-ref-mut-no-tick
  message: 'Detected async function parameter ''rpc: &mut Rpc'' without lifetime tick'
  severity: INFO
  languages:
  - rust
  pattern-regex: async\s+fn\s+\w+\([^)]*rpc:\s*&mut\s+Rpc\s*[,\)]
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: rpc-impl-without-lifetime-parameter
  message: Detected Rpc impl block without lifetime parameter (refactored from impl<'a>
    Rpc<'a>)
  severity: INFO
  languages:
  - rust
  pattern: "impl Rpc {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/util/mod.rs'
- id: rpc-background-async-fn
  message: Detected async background() method (refactored from synchronous)
  severity: INFO
  languages:
  - rust
  pattern: "pub async fn background(...) -> Result<Rpc> {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/util/mod.rs'
- id: rpc-set-to-method-call
  message: Detected set_to() method call on Rpc (new method added in refactoring)
  severity: INFO
  languages:
  - rust
  pattern: '$RPC.set_to(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: rpc-embedded-return-type-without-lifetime
  message: Detected embedded() method returning Rpc without lifetime (refactored from
    Rpc<'a>)
  severity: INFO
  languages:
  - rust
  pattern: "pub async fn embedded(...) -> Result<Rpc> {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/util/mod.rs'
- id: arc-tcptransport-import
  message: Detected Arc import (likely used for wrapping TcpTransport in RpcMode::Background)
  severity: INFO
  languages:
  - rust
  pattern: 'use std::sync::Arc;

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/util/mod.rs'
- id: rpc-struct-field-owned-ctx
  message: 'Detected ''ctx: Context'' owned field in Rpc struct'
