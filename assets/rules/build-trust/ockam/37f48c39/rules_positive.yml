    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: rpc-struct-no-lifetime-marker
  message: Detected Rpc struct definition without lifetime parameter <'a>
  severity: INFO
  languages:
  - rust
  pattern-regex: (?s)^[^<]*struct\s+Rpc\s*\{
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/util/mod.rs'
- id: rpc-impl-block-no-lifetime-marker
