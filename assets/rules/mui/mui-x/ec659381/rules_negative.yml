rules:
- id: use-field-slots-type-usage-fixed
  message: FieldSlots type should be renamed to UseClearableFieldSlots.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \bFieldSlots\b(?!\.)(?!Props)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    exclude:
    - '**/useField.types.ts'
    - '**/codemod/**'
    - '**/x-codemod/**'
- id: use-field-slot-props-type-usage-fixed
  message: FieldSlotProps type should be renamed to UseClearableFieldSlotProps.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \bFieldSlotProps\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    exclude:
    - '**/useField.types.ts'
    - '**/codemod/**'
    - '**/x-codemod/**'
- id: use-field-response-with-ref-property
  message: Field response uses 'ref' property. Should be 'inputRef' in the new API.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \bref:\s*\w+\s*,\s*(onPaste|onKeyDown|inputMode|readOnly|clearable|onClear)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - '**/*Field*.tsx'
    - '**/*Field*.ts'
- id: manually-passing-inputprops-to-textfield
  message: Manual InputProps and inputProps.ref pattern suggests old API. Use inputRef
    prop directly with new field hooks.
  severity: WARNING
  languages:
  - typescript
  pattern: "<$COMPONENT\n  ...\n  InputProps={$PROCESSED_INPUT}\n  inputProps={{ ref:\
    \ $REF }}\n  ...\n/>\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: text-field-component-inputprops-ref
  message: TextField with InputProps and inputProps.ref pattern suggests old API.
    Use inputRef prop directly.
  severity: WARNING
  languages:
  - typescript
  pattern: "<TextField\n  ...\n  InputProps={$INPUT_PROPS}\n  inputProps={{ ref: $REF,\
    \ ... }}\n/>\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: clearable-field-with-fieldprops-param
  message: useClearableField should accept a single props object, not separate fieldProps
    parameter.
  severity: WARNING
  languages:
  - typescript
  pattern: 'useClearableField({ ..., fieldProps: $FIELD_PROPS, ... })'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: clearable-field-old-destructuring-pattern
  message: useClearableField now returns complete processed props for direct spreading,
    not separate InputProps and fieldProps.
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: 'const { InputProps: $PROCESSED_INPUT, fieldProps: $PROCESSED_FIELD }
      = useClearableField(...)'
  - pattern: 'const { fieldProps: $PROCESSED_FIELD, InputProps: $PROCESSED_INPUT }
      = useClearableField(...)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: external-input-ref-destructuring-for-field-hook
  message: Destructuring inputRef as externalInputRef suggests old pattern of passing
    it separately to field hook.
  severity: WARNING
  languages:
  - typescript
  pattern: 'const { inputRef: externalInputRef, ...$REST } = $PROPS

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: clearable-field-multiple-param-structure
  message: useClearableField old API detected with separate fieldProps and InputProps.
    Should accept single props object.
  severity: WARNING
  languages:
  - typescript
  pattern: "useClearableField({\n  fieldProps: $FIELD,\n  InputProps: $INPUT,\n  ...\n\
    })\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: processed-inputprops-and-fieldprops-destructuring
  message: useClearableField now returns complete props, not separate InputProps and
    fieldProps.
  severity: WARNING
  languages:
  - typescript
  pattern: 'const { InputProps: $PROCESSED, fieldProps: $FIELD } = useClearableField(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: use-clearable-field-type-generic-field-slots
  message: useClearableField generic type uses FieldSlots. Should use UseClearableFieldSlots.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: useClearableField<[^>]*FieldSlots
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: use-clearable-field-type-generic-field-slot-props
  message: useClearableField generic type uses FieldSlotProps. Should use UseClearableFieldSlotProps.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: useClearableField<[^>]*FieldSlotProps
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: clearable-field-with-fieldprops-and-inputprops
  message: useClearableField with separate fieldProps and InputProps. Should accept
    single props object.
  severity: WARNING
  languages:
  - typescript
  pattern: "useClearableField({\n  fieldProps: $FIELD,\n  InputProps: $INPUT,\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: clearable-field-importing-field-slots
  message: FieldSlots should be imported as UseClearableFieldSlots from the updated
    module.
  severity: WARNING
  languages:
  - typescript
  pattern: import { ..., FieldSlots, ... } from '$PKG'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    exclude:
    - '**/x-codemod/**'
- id: clearable-field-importing-field-slot-props
  message: FieldSlotProps should be imported as UseClearableFieldSlotProps from the
    updated module.
  severity: WARNING
  languages:
  - typescript
  pattern: import { ..., FieldSlotProps, ... } from '$PKG'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    exclude:
    - '**/x-codemod/**'
- id: field-component-extracting-inputref
  message: Extracting inputRef as externalInputRef from useSlotProps suggests old
    pattern of passing it separately.
  severity: WARNING
  languages:
  - typescript
  pattern: 'const { inputRef: externalInputRef, ... } = useSlotProps(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: field-slots-component-interface-extends
  message: Interface extending FieldSlots detected. Should extend UseClearableFieldSlots.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: interface\s+\w+Slots\s+extends\s+FieldSlots
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: use-field-params-in-generic-type
  message: Use*FieldParams types have been removed. Field hooks now accept props directly.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: Use(Date|Time|DateTime)FieldParams<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: field-hook-split-internal-forwarded-props
  message: Pattern of passing inputRef separately to useField after splitFieldInternalAndForwardedProps.
    Should be included in props.
  severity: WARNING
  languages:
  - typescript
  pattern: 'const { forwardedProps, internalProps } = splitFieldInternalAndForwardedProps(...)

    ...

    useField({ inputRef: $REF, forwardedProps, internalProps, ... })

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: use-field-with-split-props
  message: useField called with separate inputRef parameter. Should be included in
    props.
  severity: WARNING
  languages:
  - typescript
  pattern: "useField({\n  inputRef: $REF,\n  forwardedProps: $FWD,\n  internalProps:\
    \ $INT,\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: use-field-base-hook-inputref-param
  message: useField base hook called with separate inputRef parameter. Should be included
    in props.
  severity: WARNING
  languages:
  - typescript
  pattern: "useField({\n  inputRef: $REF,\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: split-field-props-before-use-field
  message: Pattern of splitFieldInternalAndForwardedProps followed by useField with
    separate inputRef.
  severity: WARNING
  languages:
  - typescript
  pattern: 'const { forwardedProps, internalProps } = splitFieldInternalAndForwardedProps(...)

    return useField({ inputRef, forwardedProps, internalProps, ... })

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: date-field-hook-old-api-with-props-object
  message: 'useDateField should accept props directly, not wrapped in { props: ...
    } object. Use useDateField($PROPS) instead.'
  severity: WARNING
  languages:
  - typescript
  pattern: 'useDateField({ props: $PROPS, ... })'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: date-field-hook-with-inputref-param
  message: useDateField should not receive inputRef as a separate parameter. Include
    inputRef in the props object and pass props directly.
  severity: WARNING
  languages:
  - typescript
  pattern: 'useDateField({ ..., inputRef: $REF })'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: field-hook-destructuring-ref-property
  message: Field hooks now return 'inputRef' instead of 'ref'. Update destructuring
    to use 'inputRef'.
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: 'const { ref: $REF, ... } = useDateField(...)'
  - pattern: 'const { ref: $REF, ... } = useTimeField(...)'
  - pattern: 'const { ref: $REF, ... } = useDateTimeField(...)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: time-field-hook-old-api-with-props-object
  message: 'useTimeField should accept props directly, not wrapped in { props: ...
    } object. Use useTimeField($PROPS) instead.'
  severity: WARNING
  languages:
  - typescript
  pattern: 'useTimeField({ props: $PROPS, ... })'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: datetime-field-hook-old-api-with-props-object
  message: 'useDateTimeField should accept props directly, not wrapped in { props:
    ... } object. Use useDateTimeField($PROPS) instead.'
  severity: WARNING
  languages:
  - typescript
  pattern: 'useDateTimeField({ props: $PROPS, ... })'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: time-field-hook-with-inputref-param
  message: useTimeField should not receive inputRef as a separate parameter. Include
    inputRef in the props object and pass props directly.
  severity: WARNING
  languages:
  - typescript
  pattern: 'useTimeField({ ..., inputRef: $REF })'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: datetime-field-hook-with-inputref-param
  message: useDateTimeField should not receive inputRef as a separate parameter. Include
    inputRef in the props object and pass props directly.
  severity: WARNING
  languages:
  - typescript
  pattern: 'useDateTimeField({ ..., inputRef: $REF })'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: single-input-date-range-field-old-api
  message: 'useSingleInputDateRangeField should accept props directly, not wrapped
    in { props: ... } object.'
  severity: WARNING
  languages:
  - typescript
  pattern: 'useSingleInputDateRangeField({ props: $PROPS, ... })'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: use-date-field-params-type-reference
  message: UseDateFieldParams type reference detected. This type has been removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \bUseDateFieldParams\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    exclude:
    - '**/x-codemod/**'
- id: use-time-field-params-type-reference
  message: UseTimeFieldParams type reference detected. This type has been removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \bUseTimeFieldParams\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    exclude:
    - '**/x-codemod/**'
- id: use-datetime-field-params-type-reference
  message: UseDateTimeFieldParams type reference detected. This type has been removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \bUseDateTimeFieldParams\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    exclude:
    - '**/x-codemod/**'
- id: field-slots-as-generic-parameter
  message: FieldSlots used as generic type parameter. Should use UseClearableFieldSlots.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: <[^<>]*\bFieldSlots\b[^<>]*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - '**/useField.types.ts'
    - '**/x-codemod/**'
- id: single-input-time-range-field-old-api
  message: 'useSingleInputTimeRangeField should accept props directly, not wrapped
    in { props: ... } object.'
  severity: WARNING
  languages:
  - typescript
  pattern: 'useSingleInputTimeRangeField({ props: $PROPS, ... })'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: single-input-datetime-range-field-old-api
  message: 'useSingleInputDateTimeRangeField should accept props directly, not wrapped
    in { props: ... } object.'
  severity: WARNING
  languages:
  - typescript
  pattern: 'useSingleInputDateTimeRangeField({ props: $PROPS, ... })'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: clearable-field-separate-returns
  message: Returning separate InputProps and fieldProps suggests old useClearableField
    API. Should return merged props.
  severity: WARNING
  languages:
  - typescript
  pattern: 'return { InputProps: $INPUT, fieldProps: $FIELD }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*clearable*'
    - '**/*Clearable*'
- id: use-date-field-params-export
  message: UseDateFieldParams type export detected. This type has been removed in
    the new API.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export\s+(type|interface)\s+UseDateFieldParams
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: use-time-field-params-export
  message: UseTimeFieldParams type export detected. This type has been removed in
    the new API.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export\s+(type|interface)\s+UseTimeFieldParams
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: use-datetime-field-params-export
  message: UseDateTimeFieldParams type export detected. This type has been removed
    in the new API.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export\s+(type|interface)\s+UseDateTimeFieldParams
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: date-field-file-with-params-interface
  message: File exports UseDateFieldParams interface. This interface has been removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*export interface UseDateFieldParams
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*DateField*.types.ts'
- id: time-field-file-with-params-interface
  message: File exports UseTimeFieldParams interface. This interface has been removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*export interface UseTimeFieldParams
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*TimeField*.types.ts'
- id: datetime-field-file-with-params-interface
  message: File exports UseDateTimeFieldParams interface. This interface has been
    removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*export interface UseDateTimeFieldParams
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*DateTimeField*.types.ts'
- id: use-field-hook-returning-object-with-ref
  message: Returning object with 'ref' property in field hook. Should return 'inputRef'
    instead.
  severity: WARNING
  languages:
  - typescript
  pattern: "return {\n  ref: $REF,\n  onPaste: $ON_PASTE,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*Field/use*Field.ts'
- id: use-date-field-params-in-function-return
  message: Function return type or variable type uses UseDateFieldParams. This type
    has been removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: :\s*UseDateFieldParams<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: use-time-field-params-in-function-return
  message: Function return type or variable type uses UseTimeFieldParams. This type
    has been removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: :\s*UseTimeFieldParams<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: use-datetime-field-params-in-function-return
  message: Function return type or variable type uses UseDateTimeFieldParams. This
    type has been removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: :\s*UseDateTimeFieldParams<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
