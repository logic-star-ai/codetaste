rules:
- id: data-grid-comment-mentions-legacy-api
  message: Documentation mentions legacy filter API or V7 suffixes - update to reflect
    new unified API
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: legacy.*filter.*API|getApplyFilterFnV7|getApplyQuickFilterFnV7
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 87
- id: data-grid-filter-operator-with-getApplyFilterFnV7-property
  message: Replace 'getApplyFilterFnV7' property with 'getApplyFilterFn' in filter
    operator definition
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "{\n  ...,\n  getApplyFilterFnV7: $FUNC,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: data-grid-object-method-getApplyFilterFnV7
  message: Rename method 'getApplyFilterFnV7' to 'getApplyFilterFn' - the V7 suffix
    has been removed
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "{\n  ...,\n  getApplyFilterFnV7($PARAMS) { ... },\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: data-grid-coldef-with-getApplyQuickFilterFnV7
  message: Replace 'getApplyQuickFilterFnV7' property with 'getApplyQuickFilterFn'
    in column definition
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "{\n  ...,\n  getApplyQuickFilterFnV7: $FUNC,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: data-grid-import-legacy-conversion-utils
  message: Remove import of legacy conversion utilities - these have been removed
    from the API
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { ..., convertFilterV7ToLegacy, ... } from ''$PATH''

        '
    - pattern: 'import { ..., convertQuickFilterV7ToLegacy, ... } from ''$PATH''

        '
    - pattern: 'import { ..., convertLegacyOperators, ... } from ''$PATH''

        '
    - pattern: 'import { ..., tagInternalFilter, ... } from ''$PATH''

        '
    - pattern: 'import { ..., isInternalFilter, ... } from ''$PATH''

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: data-grid-filter-operator-with-legacy-getApplyFilterFn
  message: Remove legacy 'getApplyFilterFn' and rename 'getApplyFilterFnV7' to 'getApplyFilterFn'
    - dual API support has been removed
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "{\n  ...,\n  getApplyFilterFn: $LEGACY_FUNC,\n  getApplyFilterFnV7: $V7_FUNC,\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: data-grid-coldef-with-dual-quick-filter-api
  message: Remove legacy 'getApplyQuickFilterFn' and rename 'getApplyQuickFilterFnV7'
    to 'getApplyQuickFilterFn' - dual API support has been removed
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "{\n  ...,\n  getApplyQuickFilterFn: $LEGACY_FUNC,\n  getApplyQuickFilterFnV7:\
    \ $V7_FUNC,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: data-grid-property-access-getApplyFilterFnV7
  message: Replace property access 'getApplyFilterFnV7' with 'getApplyFilterFn' -
    the V7 suffix has been removed
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $OBJ.getApplyFilterFnV7
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: data-grid-tagInternalFilter-usage
  message: Remove usage of 'tagInternalFilter' - this internal filter tagging utility
    has been removed
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: tagInternalFilter
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: data-grid-tagInternalFilter-wrapper
  message: Remove tagInternalFilter wrapper - this internal filter tagging utility
    has been removed
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'tagInternalFilter($FUNC)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
