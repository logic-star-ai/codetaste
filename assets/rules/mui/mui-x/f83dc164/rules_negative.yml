- id: data-grid-utils-file-with-legacy-conversion
  message: Review utils file to ensure all legacy conversion functions (convertFilterV7ToLegacy,
    convertQuickFilterV7ToLegacy, convertLegacyOperators, tagInternalFilter, isInternalFilter,
    GLOBAL_API_REF) have been removed
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/colDef/utils.ts'
- id: data-grid-getApplyFilterFn-returning-cellparams-function
  message: getApplyFilterFn returning function with GridCellParams signature is legacy
    - update to return (value, row, column, apiRef) => boolean
  severity: WARNING
  languages:
  - typescript
  pattern: "getApplyFilterFn: (...) => {\n  ...\n  return ($PARAMS: GridCellParams)\
    \ => { ... };\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: data-grid-import-GridCellParams-for-filtering
  message: Import of GridCellParams in file with getApplyFilterFn suggests legacy
    filter signature usage - update to V7 signature
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { ..., GridCellParams, ... } from ''$PATH''

        '
  - pattern-inside: '$FILE

      ...

      getApplyFilterFn

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: data-grid-function-returning-null-or-cellparams-function
  message: Function returning cellParams-based function suggests legacy filter signature
