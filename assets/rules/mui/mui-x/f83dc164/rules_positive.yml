rules:
- id: operator-definition-without-dual-functions
  message: Operator definition has only getApplyFilterFn, not dual V7/legacy functions
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "{\n  value: $OP,\n  getApplyFilterFn: $FN,\n  ...\n}\n"
  - pattern-not: "{\n  value: $OP,\n  getApplyFilterFn: $FN,\n  getApplyFilterFnV7:\
      \ $FN2,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/colDef/grid*Operators.ts'
- id: operator-uses-getapplyfilterfn-not-v7
  message: Operator uses getApplyFilterFn (not getApplyFilterFnV7) as the primary
    property
  severity: INFO
  languages:
  - typescript
  pattern: "{\n  value: $OP,\n  getApplyFilterFn: ($ITEM) => {\n    ...\n  },\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/colDef/grid*Operators.ts'
- id: operator-array-element-with-getapplyfilterfn
  message: Operator object has getApplyFilterFn with InputComponent
  severity: INFO
  languages:
  - typescript
  pattern: "{\n  value: $OP,\n  getApplyFilterFn: ($ITEM) => {\n    ...\n  },\n  InputComponent:\
    \ $COMP,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/colDef/grid*Operators.ts'
- id: operator-with-inputcomponent-getapplyfilterfn
  message: Operator with InputComponent uses getApplyFilterFn (not V7)
  severity: INFO
  languages:
  - typescript
  pattern: "{\n  value: $OP,\n  getApplyFilterFn: $FN,\n  InputComponent: $COMP,\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/colDef/grid*Operators.ts'
- id: operator-with-inputcomponentprops-getapplyfilterfn
  message: Operator with InputComponentProps uses getApplyFilterFn
  severity: INFO
  languages:
  - typescript
  pattern: "{\n  value: $OP,\n  getApplyFilterFn: $FN,\n  InputComponent: $COMP,\n\
    \  InputComponentProps: $PROPS,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/colDef/grid*Operators.ts'
- id: filter-api-getapplyquickfilterfn-type-without-v7
  message: Detected GetApplyQuickFilterFn type (without V7 or Legacy suffix), indicating
    V7 API has been promoted
  severity: INFO
  languages:
  - typescript
  pattern-regex: (GetApplyQuickFilterFn)(?!V7|Legacy)\s*<
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: operator-with-requiresfiltervalue-false
  message: Operator with requiresFilterValue false uses getApplyFilterFn
  severity: INFO
  languages:
  - typescript
  pattern: "{\n  value: $OP,\n  getApplyFilterFn: $FN,\n  requiresFilterValue: false,\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/colDef/grid*Operators.ts'
- id: operator-maps-without-conversion-call
  message: Operator function returns array directly without convertLegacyOperators
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'return [{..., getApplyFilterFn: $FN, ...}, ...]

      '
  - pattern-not: 'return convertLegacyOperators([...])

      '
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/colDef/grid*Operators.ts'
- id: filter-api-getapplyfilterfn-without-v7-type-reference
  message: Detected GetApplyFilterFn type (without V7 or Legacy suffix), indicating
    V7 API has been promoted as default
  severity: INFO
  languages:
  - typescript
  pattern-regex: (GetApplyFilterFn)(?!V7|Legacy)\s*<
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: operator-array-without-legacy-conversion
  message: Operator array returned directly without conversion wrapper
  severity: INFO
  languages:
  - typescript
  pattern-regex: getGrid\w+Operators.*:\s*GridFilterOperator.*\[\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/colDef/grid*Operators.ts'
- id: operator-isEmpty-with-requiresfiltervalue
  message: isEmpty operator with requiresFilterValue false uses getApplyFilterFn
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "{\n  value: 'isEmpty',\n  getApplyFilterFn: $FN,\n  requiresFilterValue:\
