rules:
- id: lens-optionSettings-accessor
  message: Replace 'optionSettings' lens with direct '.settings' field access
  severity: WARNING
  languages:
  - generic
  pattern: optionSettings
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
  paths:
    include:
    - '*.hs'
- id: lens-usage-with-optionSettings-accessor
  message: Replace 'optionSettings' lens accessor with direct '.settings' field
  severity: WARNING
  languages:
  - generic
  pattern-regex: optionSettings
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
  paths:
    include:
    - services/brig/**/*.hs
- id: lens-elasticsearch-accessor
  message: Replace lens accessor 'elasticsearchL' with direct field access
  severity: WARNING
  languages:
  - generic
  pattern: elasticsearchL
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - '*.hs'
- id: underscore-prefixed-field-keyspace
  message: 'Remove underscore prefix from field name: ''_keyspace'' should be ''keyspace'''
  severity: WARNING
  languages:
  - generic
  pattern: _keyspace
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*.hs'
- id: underscore-prefixed-field-filterNodesByDatacentre
  message: 'Remove underscore prefix from field name: ''_filterNodesByDatacentre''
    should be ''filterNodesByDatacentre'''
  severity: WARNING
  languages:
  - generic
  pattern: _filterNodesByDatacentre
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*.hs'
- id: underscore-field-access-port
  message: Replace underscore field access '$X._port' with '$X.port' - remove underscore
    prefix from field name
  severity: WARNING
  languages:
  - generic
  pattern: $X._port
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*.hs'
- id: lens-turnL-accessor
  message: Replace lens accessor 'turnL' with direct field access
  severity: WARNING
  languages:
  - generic
  pattern: turnL
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*.hs'
- id: bilge-rpc-port-with-lens
  message: Replace lens operator in RPC call with native field access
  severity: WARNING
  languages:
  - generic
  patterns:
  - pattern: Bilge.port ($EP ^. $FIELD)
  - metavariable-regex:
      metavariable: $FIELD
      regex: port
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.hs'
- id: cassandra-deriveFromJSON-usage
  message: Replace 'deriveFromJSON toOptionFieldName' with standard FromJSON instance
  severity: WARNING
  languages:
  - generic
  pattern-regex: deriveFromJSON\s+toOptionFieldName
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - libs/cassandra-util/**/*.hs
- id: lens-sftL-accessor
  message: Replace lens accessor 'sftL' with direct field access
  severity: WARNING
  languages:
  - generic
  pattern: sftL
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.hs'
- id: cassandra-options-toOptionFieldName-derivation
  message: Replace deriveFromJSON toOptionFieldName with standard instance
  severity: WARNING
  languages:
  - generic
  pattern-regex: deriveFromJSON\s+toOptionFieldName
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - libs/cassandra-util/src/Cassandra/Options.hs
- id: rpc-implementation-underscore-fields
  message: Replace underscore field access in RPC endpoint usage
  severity: WARNING
  languages:
  - generic
  pattern-regex: ep\._
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - libs/wire-subsystems/src/**/*.hs
- id: control-lens-import-as
  message: Remove Control.Lens import - use native record field access instead
  severity: WARNING
  languages:
  - generic
  pattern: import Control.Lens as $ALIAS
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.hs'
- id: cassandra-makeLenses-endpoint
  message: Remove 'makeLenses ''Endpoint' - use native record field access
  severity: WARNING
  languages:
  - generic
  pattern: makeLenses ''Endpoint
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - libs/cassandra-util/**/*.hs
- id: cassandra-makeLenses-cassandraOpts
  message: Remove 'makeLenses ''CassandraOpts' - use native record field access
  severity: WARNING
  languages:
  - generic
  pattern: makeLenses ''CassandraOpts
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - libs/cassandra-util/**/*.hs
- id: lens-view-to-function
  message: 'Replace lens ''to'' combinator with direct function application: ''$FUNC
    ($X.settings)'''
  severity: WARNING
  languages:
  - generic
  pattern: $X.settings ^. to $FUNC
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.hs'
- id: endpoint-record-underscore-fields
  message: Remove underscore prefixes from Endpoint record fields - use 'host' and
    'port' instead of '_host' and '_port'
  severity: WARNING
  languages:
  - generic
  pattern-regex: data\s+Endpoint\s*=\s*Endpoint\s*\{\s*_\w+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.hs'
- id: cassandraOpts-record-underscore-fields
  message: Remove underscore prefixes from CassandraOpts record fields
  severity: WARNING
  languages:
  - generic
  pattern-regex: data\s+CassandraOpts\s*=\s*CassandraOpts\s*\{\s*_\w+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.hs'
- id: field-definition-underscore-keyspace
  message: 'Remove underscore prefix from field definition: ''_keyspace ::'' should
    be ''keyspace ::'''
  severity: WARNING
  languages:
  - generic
  pattern-regex: '\s+_keyspace\s*::'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.hs'
- id: field-definition-underscore-filterNodesByDatacentre
  message: 'Remove underscore prefix from field definition: ''_filterNodesByDatacentre
    ::'' should be ''filterNodesByDatacentre ::'''
  severity: WARNING
  languages:
  - generic
  pattern-regex: '\s+_filterNodesByDatacentre\s*::'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.hs'
- id: bilge-rpc-host-port-with-lens
  message: Replace lens operator in RPC call with native field access
  severity: WARNING
  languages:
  - generic
  patterns:
  - pattern: Bilge.host (encodeUtf8 ($EP ^. $FIELD))
  - metavariable-regex:
      metavariable: $FIELD
      regex: host
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.hs'
- id: opts-field-optSettings-definition
  message: Rename field 'optSettings' to 'settings' in data type definition
  severity: WARNING
  languages:
  - generic
  pattern-regex: optSettings\s*::\s*!?Settings
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.hs'
- id: stomp-field-should-be-stompOptions
  message: Rename field 'stomp' to 'stompOptions' to avoid field name conflicts
  severity: WARNING
  languages:
  - generic
  patterns:
  - pattern-regex: \s+stomp\s*::\s*.*StompOpts
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.hs'
- id: makeLenses-with-tuples
  message: Remove makeLensesFor call - use native record field access instead
  severity: WARNING
  languages:
  - generic
  pattern-regex: makeLensesFor\s*\[
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.hs'
- id: rpc-endpoint-underscore-host-access
  message: 'Replace underscore field access in RPC: use ''ep.host'' instead of ''ep._host'''
  severity: WARNING
  languages:
  - generic
  patterns:
  - pattern: encodeUtf8 $EP._host
  - metavariable-pattern:
      metavariable: $EP
      pattern-either:
      - pattern: ep
      - pattern: endpoint
      - pattern: $X.endpoint
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - libs/wire-subsystems/**/*.hs
    - services/*/src/**/*.hs
- id: rpc-endpoint-underscore-port-access
  message: 'Replace underscore field access in RPC: use ''ep.port'' instead of ''ep._port'''
  severity: WARNING
  languages:
  - generic
  patterns:
  - pattern: $EP._port
  - metavariable-pattern:
      metavariable: $EP
      pattern-either:
      - pattern: ep
      - pattern: endpoint
      - pattern: $X.endpoint
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - libs/wire-subsystems/**/*.hs
    - services/*/src/**/*.hs
- id: cassandra-options-endpoint-field-underscore
  message: Remove underscore prefixes from Endpoint record fields (in data Endpoint
    definition)
  severity: WARNING
  languages:
  - generic
  pattern-regex: '\{\s*_host\s*::.*,\s*_port\s*::'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - libs/cassandra-util/**/*.hs
- id: deriveFromJSON-endpoint-toOptionFieldName
  message: Remove deriveFromJSON toOptionFieldName for Endpoint - update to use defaultOptions
  severity: WARNING
  languages:
  - generic
  patterns:
  - pattern: deriveFromJSON toOptionFieldName ''Endpoint
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - libs/cassandra-util/**/*.hs
- id: deriveFromJSON-cassandraOpts-toOptionFieldName
  message: Remove deriveFromJSON toOptionFieldName for CassandraOpts - update to use
    defaultOptions
  severity: WARNING
  languages:
  - generic
  patterns:
  - pattern: deriveFromJSON toOptionFieldName ''CassandraOpts
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - libs/cassandra-util/**/*.hs
- id: brig-opts-optSettings-lens
  message: Remove lens definition for optSettings - field should be renamed to 'settings'
  severity: WARNING
  languages:
  - generic
  pattern-regex: \(\s*"optSettings"\s*,\s*"optionSettings"\s*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
