    - services/brig/**/*.hs
- id: lens-import-cassandra-options
  message: Remove Control.Lens import from Cassandra.Options
  severity: WARNING
  languages:
  - generic
  pattern-regex: import\s+Control\.Lens
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - libs/cassandra-util/src/Cassandra/Options.hs
- id: cassandra-import-toOptionFieldName
