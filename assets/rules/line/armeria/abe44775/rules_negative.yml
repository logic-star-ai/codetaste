    httpClientFactory' instead of SessionOptions and Map.
  severity: WARNING
  languages:
  - java
  pattern: "public ClientFactory newFactory(SessionOptions $OPTS, Map<$T, $U> $DEPS)\
    \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
