rules:
- id: detect-sessionoptions-in-javadoc
  message: Replace @link SessionOption in Javadoc with @link ClientFactoryBuilder.
    Update documentation.
  severity: WARNING
  languages:
  - java
  pattern-regex: '@link\s+SessionOption'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 50
- id: detect-sessionoption-qualified-usage
  message: Replace qualified SessionOption usage with ClientFactoryBuilder methods.
    SessionOption has been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: com.linecorp.armeria.client.SessionOption.$FIELD
    - pattern: com.linecorp.armeria.client.SessionOption.valueOf($NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: detect-sessionoptions-javadoc-link
  message: Replace @link SessionOptions in Javadoc with @link ClientFactory or @link
    ClientFactoryBuilder. Update documentation.
  severity: WARNING
  languages:
  - java
  pattern-regex: '@link\s+SessionOptions'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: detect-sessionoption-import
  message: Replace SessionOption import with ClientFactoryBuilder. SessionOption has
    been removed in favor of ClientFactoryBuilder.
  severity: WARNING
  languages:
  - java
  pattern: import com.linecorp.armeria.client.SessionOption;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-sessionoptions-constructor-param
  message: Replace SessionOptions constructor parameter with ClientFactory or use
    ClientFactoryBuilder. SessionOptions has been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "$CTOR(..., SessionOptions $OPTS, ...) {\n  ...\n}\n"
  - pattern-not: "$CTOR(..., ClientFactory $CF, ...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-sessionoption-package-reference
  message: Replace SessionOption package reference with ClientFactoryBuilder. SessionOption
    has been removed.
  severity: WARNING
  languages:
  - java
  pattern-regex: com\.linecorp\.armeria\.client\.SessionOption[^a-zA-Z]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-sessionoption-field-access
  message: Replace SessionOption.$FIELD with ClientFactoryBuilder methods. Use builder
    methods instead of SessionOption constants.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: SessionOption.$FIELD
  - metavariable-regex:
      metavariable: $FIELD
      regex: ^(CONNECT_TIMEOUT|IDLE_TIMEOUT|TRUST_MANAGER_FACTORY|SSL_CONTEXT_CUSTOMIZER|ADDRESS_RESOLVER_GROUP|EVENT_LOOP_GROUP|POOL_HANDLER_DECORATOR|USE_HTTP2_PREFACE|USE_HTTP1_PIPELINING)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-sessionoption-generic-usage
  message: Replace SessionOption<T> usage with ClientFactoryBuilder methods. SessionOption
    has been removed.
  severity: WARNING
  languages:
  - java
  pattern: SessionOption<$T>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-sessionoption-wildcard-generic
  message: Replace SessionOption<?> with ClientFactoryBuilder methods. SessionOption
    has been removed.
  severity: WARNING
  languages:
  - java
  pattern: SessionOption<?>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-sessionoption-static-import
  message: Replace static SessionOption field import with ClientFactoryBuilder methods.
    Use builder methods instead of SessionOption constants.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: import static com.linecorp.armeria.client.SessionOption.$FIELD;
  - metavariable-regex:
      metavariable: $FIELD
      regex: ^(CONNECT_TIMEOUT|IDLE_TIMEOUT|TRUST_MANAGER_FACTORY|SSL_CONTEXT_CUSTOMIZER|ADDRESS_RESOLVER_GROUP|EVENT_LOOP_GROUP|POOL_HANDLER_DECORATOR|USE_HTTP2_PREFACE|USE_HTTP1_PIPELINING)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-sessionoptions-of-method
  message: Replace SessionOptions.of() with ClientFactory.builder(). Use ClientFactoryBuilder
    fluent API instead.
  severity: WARNING
  languages:
  - java
  pattern: SessionOptions.of(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-sessionoptions-pass-to-constructor
  message: Replace SessionOptions constructor parameter with ClientFactory. SessionOptions
    has been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new $CLASS(..., $OPTS, ...)
  - metavariable-regex:
      metavariable: $OPTS
      regex: .*[Ss]ession[Oo]ption.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-sessionoption-constant-field
  message: Replace SessionOption constant field with ClientFactoryBuilder configuration.
    SessionOption has been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'static final SessionOption<$T> $NAME = ...;

      '
  - pattern-not: 'static final ClientFactory $NAME = ...;

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-sessionoption-newvalue-pattern
  message: Replace SessionOption.newValue() with ClientFactoryBuilder method calls.
    Use builder methods instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $FIELD.newValue($VALUE)
  - metavariable-regex:
      metavariable: $FIELD
      regex: ^(CONNECT_TIMEOUT|IDLE_TIMEOUT|TRUST_MANAGER_FACTORY|SSL_CONTEXT_CUSTOMIZER|ADDRESS_RESOLVER_GROUP|EVENT_LOOP_GROUP|POOL_HANDLER_DECORATOR|USE_HTTP2_PREFACE|USE_HTTP1_PIPELINING)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-sessionoption-static-final-field
  message: Replace SessionOption static field with ClientFactoryBuilder configuration.
    SessionOption has been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'static final SessionOption<$T> $NAME = SessionOption.valueOf(...);

        '
    - pattern: 'public static final SessionOption<$T> $NAME = ...;

        '
    - pattern: 'private static final SessionOption<$T> $NAME = ...;

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-sessionoption-in-local-variable
  message: Replace SessionOption local variable with ClientFactoryBuilder methods.
    SessionOption has been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'SessionOption<$T> $VAR = $EXPR;

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-session-option-connect-timeout-constant
  message: Replace CONNECT_TIMEOUT SessionOption constant with ClientFactoryBuilder.connectTimeout().
    SessionOption has been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: CONNECT_TIMEOUT.newValue(...)
    - pattern: CONNECT_TIMEOUT
  - pattern-inside: 'import static com.linecorp.armeria.client.SessionOption.CONNECT_TIMEOUT;

      ...

      '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-session-option-idle-timeout-constant
  message: Replace IDLE_TIMEOUT SessionOption constant with ClientFactoryBuilder.idleTimeout().
    SessionOption has been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: IDLE_TIMEOUT.newValue(...)
    - pattern: IDLE_TIMEOUT
  - pattern-inside: 'import static com.linecorp.armeria.client.SessionOption.IDLE_TIMEOUT;

      ...

      '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-sessionoptions-method-param
  message: Replace SessionOptions method parameter with ClientFactory or use ClientFactoryBuilder.
    SessionOptions has been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(..., SessionOptions $OPTS, ...)

      '
  - pattern-not: '$RET $METHOD(..., ClientFactory $CF, ...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-sessionoptions-return-type
  message: Replace SessionOptions return type with ClientFactory. SessionOptions has
    been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "SessionOptions $METHOD(...) {\n  ...\n}\n"
  - pattern-not: "ClientFactory $METHOD(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-httpclientfactory-instantiation-with-sessionoptions
  message: Replace HttpClientFactory(SessionOptions) with HttpClientFactory(ClientFactory).
    SessionOptions has been removed.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new HttpClientFactory($OPTS, ...)
  - metavariable-regex:
      metavariable: $OPTS
      regex: .*[Ss]ession[Oo]ption.*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-sessionoptions-import
  message: Replace SessionOptions import with ClientFactoryBuilder. SessionOptions
    has been removed in favor of ClientFactoryBuilder.
  severity: WARNING
  languages:
  - java
  pattern: import com.linecorp.armeria.client.SessionOptions;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-sessionoptions-constructor-call
  message: Replace 'new SessionOptions()' with ClientFactory.builder(). Use ClientFactoryBuilder
