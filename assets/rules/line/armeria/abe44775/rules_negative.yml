- id: detect-sessionoptions-builder-pattern
  message: Replace SessionOptions variable with ClientFactory. Use ClientFactory.builder()
    instead of SessionOptions.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'SessionOptions $OPTS = SessionOptions.of(...);

        '
    - pattern: 'SessionOptions $VAR = SessionOptions.DEFAULT;

        '
    - pattern: 'final SessionOptions $VAR = ...;

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-sessionoptions-qualified-usage
  message: Replace qualified SessionOptions usage with ClientFactory.builder(). SessionOptions
