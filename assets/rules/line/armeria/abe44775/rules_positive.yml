  - pattern: '$BUILDER.useHttp2Preface(false)

      '
  - pattern: '$BUILDER.useHttp1Pipelining(true)

      '
  - pattern: '$BUILDER.useHttp1Pipelining(false)

      '
  - pattern: '$BUILDER.useDaemonThreads(true)

      '
  - pattern: '$BUILDER.useDaemonThreads(false)

      '
