rules:
- id: clientfactorybuilder-return-type
  message: Method returning ClientFactoryBuilder detected
  severity: INFO
  languages:
  - java
  pattern: 'ClientFactoryBuilder $METHOD(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: clientfactorybuilder-instantiation-detected
  message: ClientFactoryBuilder instantiation detected - builder pattern is being
    used
  severity: INFO
  languages:
  - java
  pattern: 'new ClientFactoryBuilder(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: clientfactorybuilder-chained-calls
  message: Chained ClientFactoryBuilder method calls detected - fluent API usage
  severity: INFO
  languages:
  - java
  pattern: 'new ClientFactoryBuilder().$METHOD1(...).$METHOD2(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: clientfactorybuilder-multiline-chain
  message: ClientFactoryBuilder with multiline method chain detected
  severity: INFO
  languages:
  - java
  pattern: "new ClientFactoryBuilder()\n    .$METHOD1(...)\n"
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: clientfactorybuilder-method-chaining-return
  message: ClientFactoryBuilder method returning 'this' for chaining detected
  severity: INFO
  languages:
  - java
  pattern: "public ClientFactoryBuilder $METHOD(...) {\n  ...\n  return this;\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: clientfactorybuilder-with-comment
  message: ClientFactoryBuilder usage with comment detected
  severity: INFO
  languages:
  - java
  pattern: '// ...

    new ClientFactoryBuilder()

    '
  metadata:
    category: basic
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: clientfactorybuilder-in-test-code
  message: ClientFactoryBuilder usage in test code detected
  severity: INFO
  languages:
  - java
  pattern: 'new ClientFactoryBuilder()

    '
  metadata:
    category: basic
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/**/*.java'
- id: clientfactorybuilder-boolean-flag-setter
  message: ClientFactoryBuilder boolean flag setter detected
  severity: INFO
  languages:
  - java
