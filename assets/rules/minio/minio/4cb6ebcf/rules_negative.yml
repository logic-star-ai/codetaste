rules:
- id: detect-go-files-any-in-old-lifecycle
  message: Go file still in old pkg/lifecycle location - should be in pkg/bucket/lifecycle
  severity: WARNING
  languages:
  - go
  pattern-regex: .
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33373
  paths:
    include:
    - pkg/lifecycle/*.go
