rules:
- id: type-fest-import-in-transform
  message: Remove type-fest imports. Define proper types with Zod schemas in Content
    Collections.
  severity: WARNING
  languages:
  - typescript
  pattern: import type { $...TYPES } from "type-fest"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 223
  paths:
    include:
    - '**/transform.ts'
- id: invariant-children-undefined
  message: Remove invariant for typedoc output. Content Collections loader should
    handle validation with Zod.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: invariant($CHILDREN !== undefined, $MSG)
  - pattern-regex: typedoc output
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: ternary-cascade-return-type
  message: Replace cascading ternary with component logic. Move type rendering to
    <FunctionReturnType>.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: '$A ? $B : $C ? $D : $E ? $F : $G

      '
  - pattern-inside: "function getReturnType(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: content-map-text-join
  message: Move comment content joining to rendering components. Don't process in
    transform.
  severity: WARNING
  languages:
  - typescript
  pattern: '$CONTENT.map(({ text }) => text).join("")

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: import-data-json-direct
  message: Remove direct import of data.json. Migrate to use Astro Content Collections
    API instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import $VAR from "@/data/data.json"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: transform-project-export
  message: Remove transformProject() export. Replace with Content Collections loader
    using typedocLoader.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "export function transformProject(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: documented-function-type-from-transform
  message: Remove DocumentedFunction type from transform. Define type using Zod schema
    in Content Collections.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: type DocumentedFunction = ReturnType<typeof transformProject>[$ANY]
  - pattern: 'export type DocumentedFunction = ReturnType<typeof transformProject>[$ANY]

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: categorized-uses-transform-project
  message: Remove import of transformProject from centralized transform module. Use
    Content Collections loaders instead.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'import { transformProject } from "$PATH"

      '
  - pattern-not: 'import { transformProject } from "astro:content"

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: inline-return-type-extraction
  message: Extract return type logic to <FunctionReturnType> component instead of
    inline function.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "function getReturnType($TYPE) {\n  ...\n}\n"
  - pattern-not-inside: 'function FunctionReturnType(...) { ... }

      '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: has-tag-function-in-transform
  message: Extract hasTag function to reusable lib/tags.ts utilities. Remove from
    centralized transform.
  severity: WARNING
  languages:
  - typescript
  pattern: "function hasTag($COMMENT, $TAG) {\n  ...\n  blockTags\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: reflection-kind-import-in-transform
  message: Remove direct typedoc ReflectionKind filtering in transforms. Use Content
    Collections loaders for type filtering.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: import { ReflectionKind, ... } from "typedoc"
  - pattern-inside: '$IMPORT

      ...

      kind === ReflectionKind.$KIND

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: manual-category-lookup-creation
  message: Remove manual category lookup creation. Use Content Collections schema
    with Zod to define category relationships.
  severity: WARNING
  languages:
  - typescript
  pattern: "function createCategoriesLookup($CATS) {\n  ...\n  new Map<$KEY, $VALUE>()\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: add-categories-function
  message: Remove addCategories function. Categories should be defined in Content
    Collections schema, not added post-processing.
  severity: WARNING
  languages:
  - typescript
  pattern: "function addCategories($PROJ, $FUNCS) {\n  ...\n  createCategoriesLookup\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pipe-transform-project-pattern
  message: Remove pipe with transformProject. Use Content Collections getCollection()
    to fetch already-transformed data.
  severity: WARNING
  languages:
  - typescript
  pattern: "pipe(\n  $DATA,\n  transformProject,\n  ...\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: group-by-category-manual
  message: Remove manual groupBy for categories. Use Content Collections with proper
    schema to query by category.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "groupBy(\n  ({ category }) => ...,\n)\n"
  - pattern-inside: "pipe(\n  ...,\n  transformProject,\n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: has-comment-type-guard
  message: Remove hasComment type guard. Use Zod schema to enforce required comments
    in Content Collections.
  severity: WARNING
  languages:
  - typescript
  pattern: "function hasComment($ITEM) {\n  return $ITEM.comment !== undefined\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: signatures-with-comments-filter
  message: Remove manual comment filtering. Content Collections schema should only
    load items with required fields.
  severity: WARNING
  languages:
  - typescript
  pattern: '$VAR.filter(hasComment)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: source-url-extraction
  message: Move source URL extraction to Content Collections schema. Don't compute
    in transform.
  severity: WARNING
  languages:
  - typescript
  pattern: 'const $VAR = $SOURCES?.[0]?.url

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: comment-summary-mapping
  message: Remove comment summary transformation from centralized function. Parse
    in components with Content Collections data.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: '$SUMMARY.map(($PART) => transformCommentDisplayPart($PART, ...))

      '
  - pattern-inside: "function transformFunction(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: transform-comment-display-part
  message: Remove transformCommentDisplayPart. Move comment rendering logic to components,
    not centralized transforms.
  severity: WARNING
  languages:
  - typescript
  pattern: "function transformCommentDisplayPart($PART, $NAMES) {\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: function-names-set-creation
  message: Remove manual function names set. Content Collections can query by name
    directly.
  severity: WARNING
  languages:
  - typescript
  pattern: 'const $VAR = new Set($FUNCS.map(({ name }) => name))

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: invariant-categories-undefined
  message: Remove invariant for categories. Define categories in Content Collections
    schema with required validation.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: invariant($CATS !== undefined, $MSG)
  - pattern-regex: Category data
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: get-function-curried-variant
  message: Extract getFunctionCurriedVariant to reusable lib/tags.ts. Remove from
    centralized transform.
  severity: WARNING
  languages:
  - typescript
  pattern: "function getFunctionCurriedVariant($COMMENT) {\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: data-first-tag-check
  message: Move @dataFirst tag checking to reusable tag utility. Don't embed in transform
    logic.
  severity: WARNING
  languages:
  - typescript
  pattern: hasTag($COMMENT, "dataFirst")
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: data-last-tag-check
  message: Move @dataLast tag checking to reusable tag utility. Don't embed in transform
    logic.
  severity: WARNING
  languages:
  - typescript
  pattern: hasTag($COMMENT, "dataLast")
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: transform-function-call
  message: Remove transformFunction() call. Use Content Collections loader to transform
    data during build.
  severity: WARNING
  languages:
  - typescript
  pattern: transformFunction($ARG, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: direct-data-import-type-assertion
  message: Remove direct import of data.json with type assertion. Use Content Collections
    typed API.
  severity: WARNING
  languages:
  - typescript
  pattern: import $DATA from "@/data/data.json"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: children-undefined-assertion
  message: Remove destructuring of children from project. Content Collections loader
    handles structure.
  severity: WARNING
  languages:
  - typescript
  pattern: 'const { children } = $PROJECT

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: get-return-type-function
  message: Extract getReturnType to <FunctionReturnType> component. Remove from centralized
    transform.
  severity: WARNING
  languages:
  - typescript
  pattern: "function getReturnType($TYPE) {\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: intrinsic-type-check
  message: Move type checking logic to component rendering. Don't hardcode in transform
    function.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $TYPE.type === "intrinsic"
  - pattern-inside: "function getReturnType(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: array-type-check
  message: Move array type checking to component rendering. Remove from centralized
    transform.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $TYPE.type === "array"
  - pattern-inside: "function getReturnType(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: predicate-type-check
  message: Move predicate type checking to component rendering. Remove from centralized
    transform.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $TYPE.type === "predicate"
  - pattern-inside: "function getReturnType(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: summary-map-text
  message: Move summary text mapping to rendering components. Remove from centralized
    transform.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: '$SUMMARY.map(({ text }) => text)

      '
  - pattern-inside: "function $FUNC(...) {\n  ...\n  comment\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: function-anchor-link-generation
  message: Move anchor link generation to rendering components. Don't embed in transform
    logic.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: '`[${$TEXT}](#${$NAME})`

      '
  - pattern-inside: "function transformCommentDisplayPart(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: slice-backticks-from-code
  message: Move text slicing logic to rendering components. Don't process in transform.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $TEXT.slice(1, -1)
  - pattern-inside: "function transformCommentDisplayPart(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: v1-data-json-import
  message: Remove v1/data.json import. Migrate to Content Collections with functions-v1
    collection.
  severity: WARNING
  languages:
  - typescript
  pattern: import $VAR from "@/data/v1/data.json"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: categories-result-map-iteration
  message: Remove manual category iteration. Content Collections handles category
    relationships automatically.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "for (const { children, title } of $CATS) {\n  ...\n}\n"
  - pattern-inside: "function createCategoriesLookup(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: children-continue-undefined
  message: Remove undefined checks for children. Content Collections schema ensures
    valid structure.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "if (children === undefined) {\n  continue\n}\n"
  - pattern-inside: "function createCategoriesLookup(...) {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: result-set-id-title
  message: Remove manual Map population for categories. Content Collections provides
    typed queries.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $RESULT.set($ID, $TITLE)
  - pattern-inside: "function createCategoriesLookup(...) {\n  ...\n  const result\
      \ = new Map()\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: id-category-lookup
  message: Remove id-based category lookup. Content Collections entries include category
    in schema.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $LOOKUP.get($ID)
  - pattern-inside: "function addCategories(...) {\n  ...\n  categoriesLookup\n  ...\n\
      }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: map-with-category-spread
  message: Remove manual category addition to functions. Content Collections schema
    includes category.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "$FUNCS.map(({ id, ...$REST }) => ({\n  ...$REST,\n  category: ...\n\
      }))\n"
  - pattern-inside: "function addCategories(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: filter-by-kind-function
  message: Remove manual filtering by ReflectionKind.Function. Content Collections
    loader handles filtering.
  severity: WARNING
  languages:
  - typescript
  pattern: "$CHILDREN.filter(\n  ({ kind }) => kind === ReflectionKind.Function\n\
    )\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: comment-summary-segments
  message: Remove comment summary segment extraction. Content Collections data should
    be pre-processed.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'const $SEGMENTS = $COMMENT?.summary ?? []

      '
  - pattern-inside: "function getParameter(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: segments-length-zero-check
  message: Remove length checks for segments. Content Collections schema handles empty
    values.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $SEGMENTS.length === 0
  - pattern-inside: "function getParameter(...) {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: data-json-declaration-file
  message: Remove TypeScript declaration files for data.json. Use Content Collections
    typed schemas instead.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - src/data/data.d.json.ts
    - docs/src/data/data.d.json.ts
    - src/data/v1/data.d.json.ts
    - docs/src/data/v1/data.d.json.ts
- id: transform-project-in-categorized
  message: Remove transformProject usage. Query Content Collections with getCollection()
    instead.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: transformProject
  - pattern-inside: 'import { transformProject } from "./transform"

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: group-by-in-categorized-file
  message: Remove manual groupBy in categorized.ts. Query Content Collections by category
    directly.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: groupBy(...)
  - pattern-inside: "pipe(\n  ...,\n  transformProject,\n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/categorized.ts'
    - '**/lib/categorized.ts'
- id: entries-call-in-categorized
  message: Remove entries() call. Content Collections provides structured category
    queries.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: entries()
  - pattern-inside: "pipe(\n  ...,\n  transformProject,\n  ...,\n  groupBy(...),\n\
      \  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/categorized.ts'
- id: missing-category-fallback-constant
  message: Remove MISSING_CATEGORY_FALLBACK constant. Zod schema in Content Collections
    enforces required categories.
  severity: WARNING
  languages:
  - typescript
  pattern: const MISSING_CATEGORY_FALLBACK = ...
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: kind-equals-reflection-function
  message: Remove ReflectionKind.Function filtering. Content Collections loader handles
    type filtering.
  severity: WARNING
  languages:
  - typescript
  pattern: kind === ReflectionKind.Function
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: json-output-some-type-undefined
  message: Remove undefined type checks. Define proper Zod schema with defaults in
    Content Collections.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $TYPE === undefined
  - pattern-inside: "function getReturnType($ARG) {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: sources-zero-url
  message: Remove manual source URL extraction. Include sourceUrl in Content Collections
    schema.
  severity: WARNING
  languages:
  - typescript
  pattern: $SOURCES?.[0]?.url
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: summary-length-equals-zero
  message: Remove summary length checks. Content Collections schema handles optional
    descriptions.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $SUMMARY.length === 0
  - pattern-inside: "function transformFunction(...) {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: tag-content-signature-call
  message: Move tagContent calls to reusable tag utilities in lib/tags.ts.
  severity: WARNING
  languages:
  - typescript
  pattern: tagContent($COMMENT, "signature")
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: tag-content-example-call
  message: Move tagContent calls to reusable tag utilities in lib/tags.ts.
  severity: WARNING
  languages:
  - typescript
  pattern: tagContent($COMMENT, "example")
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: tag-content-returns-call
  message: Move tagContent calls to reusable tag utilities in lib/tags.ts.
  severity: WARNING
  languages:
  - typescript
  pattern: tagContent($COMMENT, "returns")
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: content-length-zero-return
  message: Remove content length checks in tagContent. Content Collections schema
    handles empty values.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "if ($CONTENT.length === 0) {\n  return undefined\n}\n"
  - pattern-inside: "function tagContent(...) {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: map-text-property
  message: Move text mapping to rendering components. Don't process in centralized
    transforms.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $ITEMS.map(({ text }) => text)
  - pattern-inside: "function $FUNC(...) {\n  ...\n  comment\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: filter-is-defined-in-transform
  message: Remove isDefined filter in transform. Content Collections loader should
    only return valid items.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: $ITEMS.filter(isDefined)
  - pattern-inside: 'return $EXPR

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/transform.ts'
- id: return-object-with-spread-id
  message: Remove transformFunction return statement. Define data structure in Content
    Collections schema.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'return { id, name, ... }

      '
  - pattern-inside: "function transformFunction(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: return-with-description-methods-source
  message: Remove manual object construction in transformFunction. Use Content Collections
    schema.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'return { $ID, $NAME, description, methods, sourceUrl }

      '
  - pattern-inside: "function transformFunction(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: signature-type-assertion
  message: Remove hasComment type guard. Define required fields in Content Collections
    Zod schema.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: '$ITEM.comment !== undefined

      '
  - pattern-inside: "function hasComment($X) {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
