rules:
- id: dagger-android-injector-import
  message: Remove dagger.android imports - migrate to Hilt annotations (@AndroidEntryPoint,
    @HiltViewModel, etc.)
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern: import dagger.android.$IMPORT
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: contributes-android-injector-activity
  message: Remove @ContributesAndroidInjector - annotate the Activity class with @AndroidEntryPoint
    instead
  severity: WARNING
  languages:
  - kotlin
  pattern: '@ContributesAndroidInjector

    abstract fun $METHOD(): $ACTIVITY

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: contributes-android-injector-service
  message: Remove @ContributesAndroidInjector - annotate the Service class with @AndroidEntryPoint
    instead
  severity: WARNING
  languages:
  - kotlin
  pattern: '@ContributesAndroidInjector

    abstract fun $METHOD(): $SERVICE

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: contributes-android-injector-broadcast-receiver
  message: Remove @ContributesAndroidInjector - annotate the BroadcastReceiver class
    with @AndroidEntryPoint instead
  severity: WARNING
  languages:
  - kotlin
  pattern: '@ContributesAndroidInjector

    abstract fun $METHOD(): $RECEIVER

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: contributes-broadcast-receiver
  message: Remove @ContributesAndroidInjector - use @AndroidEntryPoint on the target
    class
  severity: WARNING
  languages:
  - kotlin
  pattern: '@ContributesAndroidInjector

    abstract fun contribute$NAME(): $TYPE

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: viewmodel-factory-field-injection
  message: Remove custom ViewModelFactory injection - use Hilt's @HiltViewModel instead
  severity: WARNING
  languages:
  - kotlin
  patterns:
  - pattern-either:
    - pattern: '@Inject

        lateinit var viewModelFactory: ViewModelFactory

        '
    - pattern: '@Inject

        lateinit var viewModelFactory: ViewModelProvider.Factory

        '
  - pattern-not-inside: '@AndroidEntryPoint

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: viewmodel-binds-into-map
  message: ViewModel binding with @IntoMap and @ViewModelKey should be removed - use
    @HiltViewModel on the ViewModel class
  severity: WARNING
  languages:
  - kotlin
  pattern: '@Binds

    @IntoMap

    @ViewModelKey($CLASS::class)

    internal abstract fun $METHOD($PARAM: $TYPE): ViewModel

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: abstract-binds-viewmodel
  message: Remove @Binds ViewModel mapping - use @HiltViewModel on the ViewModel class
  severity: WARNING
  languages:
  - kotlin
  pattern: '@Binds

    @IntoMap

    @ViewModelKey($CLASS::class)

    internal abstract fun $METHOD($VM: $TYPE): ViewModel

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: viewmodel-key-kotlin-class
  message: Remove @ViewModelKey annotation usage - use @HiltViewModel instead
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: '@ViewModelKey\([A-Za-z0-9_]+::class\)'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: has-android-injector-import
  message: Remove HasAndroidInjector import - not needed with Hilt
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern: import dagger.android.HasAndroidInjector
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: contributes-multiple-activities
  message: Remove @ContributesAndroidInjector - use @AndroidEntryPoint on the target
    class
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: '@ContributesAndroidInjector\s*\n\s*abstract\s+fun\s+contributes'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: dispatching-android-injector-field
  message: Remove DispatchingAndroidInjector field - Hilt handles injection automatically
  severity: WARNING
  languages:
  - kotlin
  pattern: '@Inject

    lateinit var $FIELD: DispatchingAndroidInjector<$TYPE>

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: dispatching-android-injector-import
  message: Remove DispatchingAndroidInjector import - not needed with Hilt
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern: import dagger.android.DispatchingAndroidInjector
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: component-modules-list
  message: Component modules list suggests old Dagger @Component - migrate to Hilt
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern-regex: modules\s*=\s*\[
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - '**/di/*.kt'
    - '**/di/*.java'
- id: override-android-injector-method
  message: Remove androidInjector() override - not needed with Hilt
  severity: WARNING
  languages:
  - kotlin
  pattern: 'override fun androidInjector() = $FIELD

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: module-includes-fragment-builders
  message: Remove FragmentBuildersModule from module includes - use @AndroidEntryPoint
    on fragments
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: FragmentBuildersModule::class
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: contributes-android-injector-with-fragment-builders
  message: Remove @ContributesAndroidInjector with FragmentBuildersModule - use @AndroidEntryPoint
    on activities and fragments
  severity: WARNING
  languages:
  - kotlin
  pattern: '@ContributesAndroidInjector(modules = [FragmentBuildersModule::class])

    abstract fun $METHOD(): $TYPE

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: kapt-illegal-access-workaround
  message: Remove kapt illegal access workarounds - no longer needed with KSP
  severity: WARNING
  languages:
  - generic
  pattern-regex: add-opens.*jdk\.compiler
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/*.gradle'
    - '**/*.gradle.kts'
- id: android-injection-import
  message: Remove AndroidInjection import - use @AndroidEntryPoint instead
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern: import dagger.android.AndroidInjection
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: contributes-android-injector-import
  message: Remove ContributesAndroidInjector import - use @AndroidEntryPoint instead
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern: import dagger.android.ContributesAndroidInjector
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dagger-module-with-android-injection
  message: Module using ContributesAndroidInjector should be removed - use @AndroidEntryPoint
    on target classes
  severity: WARNING
  languages:
  - kotlin
  patterns:
  - pattern: "@Module\nabstract class $NAME {\n  ...\n}\n"
  - pattern-inside: 'import dagger.android.ContributesAndroidInjector

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: worker-binds-into-map
  message: Worker binding with @IntoMap and @WorkerKey should be removed - use @HiltWorker
    on the Worker class
  severity: WARNING
  languages:
  - kotlin
  pattern: '@Binds

    @IntoMap

    @WorkerKey($CLASS::class)

    internal abstract fun $METHOD(...): ChildWorkerFactory

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: android-support-injection-import
  message: Remove dagger.android.support imports - migrate to Hilt
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern: import dagger.android.support.$IMPORT
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: worker-factory-inner-class
  message: Worker Factory inner class should be removed - use @HiltWorker and @AssistedInject
  severity: WARNING
  languages:
  - kotlin
  pattern: "class Factory @Inject constructor(...) : ChildWorkerFactory {\n  ...\n\
    }\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dagger-multibindings-import
  message: Remove dagger.multibindings import - not needed with Hilt's ViewModel/Worker
    annotations
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern: import dagger.multibindings.$IMPORT
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: android-support-injection-module-reference
  message: Remove AndroidSupportInjectionModule references - not needed with Hilt
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: AndroidSupportInjectionModule
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dagger-map-key-import
  message: Remove MapKey import - not needed with @HiltViewModel and @HiltWorker
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern: import dagger.MapKey
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: abstract-binds-worker
  message: Remove @Binds Worker mapping - use @HiltWorker on the Worker class
  severity: WARNING
  languages:
  - kotlin
  pattern: '@Binds

    @IntoMap

    @WorkerKey($CLASS::class)

    internal abstract fun $METHOD($WORKER: $TYPE): ChildWorkerFactory

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dagger-binds-import
  message: Review @Binds usage - ensure Dagger modules are migrated to Hilt with @InstallIn
  severity: INFO
  languages:
  - kotlin
  - java
  pattern: import dagger.Binds
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: kapt-in-plugins-block
  message: Remove kotlin-kapt plugin from plugins block - use KSP for Hilt
  severity: WARNING
  languages:
  - generic
  pattern-regex: alias\(libs\.plugins\.kotlin\.kapt\)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*.gradle'
    - '**/*.gradle.kts'
- id: worker-key-kotlin-class
  message: Remove @WorkerKey annotation usage - use @HiltWorker instead
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: '@WorkerKey\([A-Za-z0-9_]+::class\)'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: activities-module-reference
  message: Remove ActivitiesModule references - use @AndroidEntryPoint on activities
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: ActivitiesModule
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: services-module-reference
  message: Remove ServicesModule references - use @AndroidEntryPoint on services
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: ServicesModule
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: broadcast-receiver-module-reference
  message: Remove BroadcastReceiverModule references - use @AndroidEntryPoint on receivers
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: BroadcastReceiverModule
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: libs-dagger-bundle
  message: Review dagger bundle dependency - ensure it's compatible with Hilt
  severity: INFO
  languages:
  - generic
  pattern-regex: libs\.bundles\.dagger
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*.gradle'
    - '**/*.gradle.kts'
- id: dagger-activities-module-exists
  message: ActivitiesModule should be removed - use @AndroidEntryPoint on activities
    instead
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/di/ActivitiesModule.kt'
    - '**/di/ActivitiesModule.java'
- id: dagger-fragment-builders-module-exists
  message: FragmentBuildersModule should be removed - use @AndroidEntryPoint on fragments
