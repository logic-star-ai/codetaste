  severity: WARNING
  languages:
  - kotlin
  pattern: "class WorkerFactory @Inject constructor(...) : WorkerFactory() {\n  ...\n\
    }\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: worker-key-map-key-annotation
  message: WorkerKey MapKey annotation should be removed - use @HiltWorker instead
  severity: WARNING
  languages:
  - kotlin
  pattern: '@MapKey

