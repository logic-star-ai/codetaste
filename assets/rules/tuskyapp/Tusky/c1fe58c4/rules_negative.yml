  languages:
  - kotlin
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/di/FragmentBuildersModule.kt'
    - '**/di/FragmentBuildersModule.java'
- id: dagger-services-module-exists
