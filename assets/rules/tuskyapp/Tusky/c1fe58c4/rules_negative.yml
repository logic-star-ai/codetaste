  paths:
    include:
    - '**/di/WorkerModule.kt'
    - '**/di/WorkerModule.java'
- id: dagger-app-component-exists
  message: AppComponent should be removed - Hilt auto-generates DI components
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/di/AppComponent.kt'
    - '**/di/AppComponent.java'
- id: dagger-app-injector-exists
  message: AppInjector should be removed - Hilt handles automatic injection
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/di/AppInjector.kt'
    - '**/di/AppInjector.java'
- id: dagger-injectable-interface-exists
  message: Injectable interface should be removed - use @AndroidEntryPoint instead
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/di/Injectable.kt'
    - '**/di/Injectable.java'
- id: dagger-viewmodel-factory-exists
  message: Custom ViewModelFactory should be removed - use Hilt-generated factory
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/di/ViewModelFactory.kt'
    - '**/di/ViewModelFactory.java'
- id: custom-viewmodel-factory-class
  message: Custom ViewModelFactory should be removed - use Hilt-generated ViewModelProvider.Factory
  severity: WARNING
  languages:
  - kotlin
  pattern: "class ViewModelFactory @Inject constructor(...) : ViewModelProvider.Factory\
    \ {\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
