rules:
- id: detect-lexer-reference-in-string
  message: String literal contains 'lexer' that may need to be updated to 'parser'
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: $STR
  - metavariable-regex:
      metavariable: $STR
      regex: ^['"].*lexer.*['"]$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-path-string
  message: Path string references old lexer directory structure
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: $STR
  - metavariable-regex:
      metavariable: $STR
      regex: ^['"]\./lexer_.*['"]$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: detect-require-dotslash-lexer
  message: Require statement uses old lexer file path
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($STR)
  - metavariable-regex:
      metavariable: $STR
      regex: ^['"]\./lexer_[^'"]*['"]$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: detect-require-lexer-underscore
  message: Require statement uses old lexer directory structure
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*lexer_.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: detect-require-lexer-inline
  message: Import path should use 'parser_inline' instead of 'lexer_inline'
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*lexer_inline.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-state-lexer-property-v2
  message: Property 'lexer' should be renamed to 'parser'
  severity: WARNING
  languages:
  - javascript
  pattern: $STATE.lexer
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    exclude:
    - benchmark/*
- id: detect-require-relative-lexer-inline
  message: Require statement references lexer_inline directory
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($STR)
  - metavariable-regex:
      metavariable: $STR
      regex: ^['"]\.\.?/.*lexer_inline.*['"]$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-lexer-inline-rule-require
  message: Rule import path should use rules_inline directory instead of lexer_inline
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*lexer_inline/[a-z]+.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-comment-lexer-word
  message: Comment contains lexer terminology that should be updated
  severity: INFO
  languages:
  - javascript
  pattern-regex: //.*\b[Ll]exer\b(?!\s*rule)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-inline-dir-path
  message: Path references old lexer_inline directory, should use rules_inline
  severity: WARNING
  languages:
  - javascript
  pattern-regex: lexer_inline/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-require-lexer-block
  message: Import path should use 'parser_block' instead of 'lexer_block'
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*lexer_block.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-require-relative-lexer-block
  message: Require statement references lexer_block directory
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($STR)
  - metavariable-regex:
      metavariable: $STR
      regex: ^['"]\.\.?/.*lexer_block.*['"]$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-lexer-block-directory-files
  message: Files in 'lib/lexer_block/' directory should be moved to 'lib/rules_block/'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - lib/lexer_block/*
- id: detect-lexer-inline-directory-files
  message: Files in 'lib/lexer_inline/' directory should be moved to 'lib/rules_inline/'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - lib/lexer_inline/*
- id: detect-lexer-block-rule-require
  message: Rule import path should use rules_block directory instead of lexer_block
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*lexer_block/[a-z]+.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-prototype-assignment-lexer
  message: Prototype method assignment uses Lexer class name
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: $CLASS.prototype.$METHOD = ...
  - metavariable-regex:
      metavariable: $CLASS
      regex: .*Lexer.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-block-dir-path
  message: Path references old lexer_block directory, should use rules_block
  severity: WARNING
  languages:
  - javascript
  pattern-regex: lexer_block/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-lexer-in-comments-single-line
  message: Comment contains 'lexer' terminology that should be updated to 'parser'
  severity: INFO
  languages:
  - javascript
  pattern-regex: //.*\blexer\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-lexer-inline-substring
  message: LexerInline should be renamed to ParserInline
  severity: WARNING
  languages:
  - javascript
  pattern-regex: LexerInline
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    exclude:
    - benchmark/*
- id: detect-rules-push-lexer-block
  message: Rule require path should use rules_block instead of lexer_block
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: rules.push(require($PATH))
  - metavariable-regex:
      metavariable: $PATH
      regex: .*lexer_block.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-rules-push-lexer-inline
  message: Rule require path should use rules_inline instead of lexer_inline
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: rules.push(require($PATH))
  - metavariable-regex:
      metavariable: $PATH
      regex: .*lexer_inline.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-lexer-inline-word-boundary
  message: LexerInline class name should be renamed to ParserInline
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \bLexerInline\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    exclude:
    - benchmark/*
- id: detect-comment-lexer-lowercase
  message: Comment contains lexer that should be parser
  severity: INFO
  languages:
  - javascript
  pattern-regex: //.*\blexer\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-inline-class-name
  message: Class name 'LexerInline' should be renamed to 'ParserInline'
  severity: WARNING
  languages:
  - javascript
  pattern: LexerInline
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-lexer-block-substring
  message: LexerBlock should be renamed to ParserBlock
  severity: WARNING
  languages:
  - javascript
  pattern-regex: LexerBlock
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-block-word-boundary
  message: LexerBlock class name should be renamed to ParserBlock
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \bLexerBlock\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-block-class-name
  message: Class name 'LexerBlock' should be renamed to 'ParserBlock'
  severity: WARNING
  languages:
  - javascript
  pattern: LexerBlock
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-lexer-rule-error-message
  message: Error message should use 'Parser rule' instead of 'Lexer rule'
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: throw new Error($MSG)
  - metavariable-regex:
      metavariable: $MSG
      regex: .*[Ll]exer rule.*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-lexer-inline-prototype-methods
  message: Class 'LexerInline' in prototype method should be renamed to 'ParserInline'
  severity: WARNING
  languages:
  - javascript
  pattern: LexerInline.prototype.$METHOD = ...
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-lexer-chain-method-call
  message: Property 'lexer' in method chain should be renamed to 'parser'
  severity: WARNING
  languages:
  - javascript
  pattern: $OBJ.lexer.$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-not-found-error
  message: Error message should reference 'Parser' instead of 'Lexer'
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: throw new Error($MSG)
  - metavariable-regex:
      metavariable: $MSG
      regex: .*[Ll]exer.*not found.*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-lexer-error-messages
  message: Error message references lexer and should use parser
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: new Error($MSG)
  - metavariable-regex:
      metavariable: $MSG
      regex: .*[Ll]exer.*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-throw-lexer-error
  message: Thrown error message references lexer and should use parser
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: throw new Error($MSG)
  - metavariable-regex:
      metavariable: $MSG
      regex: .*[Ll]exer.*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-lexer-inline-prototype
  message: LexerInline.prototype references should use ParserInline.prototype
  severity: WARNING
  languages:
  - javascript
  pattern-regex: LexerInline\.prototype
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-in-string-literal
  message: String literal contains Lexer that may need to be Parser
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: $STR
  - metavariable-regex:
      metavariable: $STR
      regex: ^['"].*Lexer.*['"]$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-prototype-methods
  message: Class 'LexerBlock' in prototype method should be renamed to 'ParserBlock'
  severity: WARNING
  languages:
  - javascript
  pattern: LexerBlock.prototype.$METHOD = ...
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-lexer-block-prototype
  message: LexerBlock.prototype references should use ParserBlock.prototype
  severity: WARNING
  languages:
  - javascript
  pattern-regex: LexerBlock\.prototype
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-function-comment
  message: Comment about adding to lexer should reference parser instead
  severity: INFO
  languages:
  - javascript
  pattern-regex: //.*[Aa]dd.*to\s+lexer
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-lexer-chain-comment
  message: Comment about 'lexer chain' should reference 'parser chain'
  severity: INFO
  languages:
  - javascript
  pattern-regex: //.*lexer chain
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-comment-lexer-chain-add
  message: Comment about adding to lexer chain should reference parser
  severity: INFO
  languages:
  - javascript
  pattern-regex: //.*Add.*to.*lexer
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-comment-lexer-uppercase
  message: Comment contains Lexer that should be Parser
  severity: INFO
  languages:
  - javascript
  pattern-regex: //.*Lexer\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    exclude:
    - benchmark/*
- id: detect-this-lexer-property
  message: Property 'this.lexer' should be renamed to 'this.parser'
  severity: WARNING
  languages:
  - javascript
  pattern: this.lexer
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-comment-lexer-class
  message: Comment mentioning lexer class should be updated to parser class
  severity: INFO
  languages:
  - javascript
  pattern-regex: //\s*.*[Ll]exer\s+class
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-lexer-rules-named-access
  message: Property access lexer.rules_named should use parser.rules_named
  severity: WARNING
  languages:
  - javascript
  pattern: $OBJ.lexer.rules_named
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    exclude:
    - benchmark/*
- id: detect-function-param-lexer
  message: Function parameter 'lexer' should be renamed to 'parser'
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: function $FUNC(..., $LEXER, ...) { ... }
  - metavariable-regex:
      metavariable: $LEXER
      regex: ^lexer$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-replace-lexer-function-comment
  message: Comment about replacing lexer function should reference parser instead
  severity: INFO
  languages:
  - javascript
  pattern-regex: //.*[Rr]eplace.*lexer
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-this-lexer-assignment
  message: Assignment to this.lexer should use this.parser
  severity: WARNING
  languages:
  - javascript
  pattern: this.lexer = $VAL
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - benchmark/*
- id: detect-state-inline-import
  message: Import path should use rules_inline instead of lexer_inline
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: var $STATE = require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*lexer_inline/state_inline.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-lexer-in-function-name-regex
  message: Function name contains lexer and should be reviewed for renaming to parser
  severity: WARNING
  languages:
  - javascript
  pattern-regex: function\s+\w*[Ll]exer\w*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-variable-declaration-any
  message: Variable name contains lexer and may need renaming to parser
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: var $LEXER = ...
    - pattern: let $LEXER = ...
    - pattern: const $LEXER = ...
  - metavariable-regex:
      metavariable: $LEXER
      regex: .*[Ll]exer.*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - benchmark/*
- id: detect-new-constructor-lexer
  message: Constructor call uses Lexer class name that should be Parser
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: new $CLASS(...)
  - metavariable-regex:
      metavariable: $CLASS
      regex: .*Lexer.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - benchmark/*
- id: detect-lexer-word-in-multiline-comment
  message: Multi-line comment contains lexer terminology
  severity: INFO
  languages:
  - javascript
  pattern-regex: /\*[\s\S]*?\b[Ll]exer\b[\s\S]*?\*/
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - benchmark/*
- id: detect-module-exports-equals-lexer
  message: Module export references Lexer class
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: module.exports = $VAL
  - metavariable-regex:
      metavariable: $VAL
      regex: .*Lexer.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - benchmark/*
- id: detect-state-lexer-in-constructor
  message: Constructor parameter and property assignment uses lexer
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "function $NAME(..., $PARAM, ...) {\n  ...\n  this.lexer = $PARAM;\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $PARAM
      regex: ^lexer$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-comment-delete-lexer
  message: Comment about deleting lexer should reference parser
  severity: INFO
  languages:
  - javascript
  pattern-regex: //.*[Dd]elete.*lexer
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-comment-replace-delete-lexer
  message: Comment about replace/delete lexer should reference parser
  severity: INFO
  languages:
  - javascript
  pattern-regex: //.*[Rr]eplace.*delete.*lexer
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-comment-lexer-function
  message: Comment about lexer function should reference parser function
  severity: INFO
