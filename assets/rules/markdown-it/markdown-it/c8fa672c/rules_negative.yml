  severity: WARNING
  languages:
  - javascript
  pattern: module.exports = LexerInline
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-lexer-block-filename
  message: File 'lib/lexer_block.js' should be renamed to 'lib/parser_block.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - lib/lexer_block.js
- id: detect-lexer-inline-filename
  message: File 'lib/lexer_inline.js' should be renamed to 'lib/parser_inline.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - lib/lexer_inline.js
- id: detect-parse-ref-filename
  message: File 'lib/parse_ref.js' should be renamed to 'lib/parser_ref.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
