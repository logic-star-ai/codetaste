  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "function $NAME($SRC, lexer, ...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-new-lexer-block-instantiation
  message: Constructor call should use 'ParserBlock' instead of 'LexerBlock'
  severity: WARNING
  languages:
  - javascript
  pattern: new LexerBlock(...)
