- id: cext-sparse-observable-import-accelerate
  message: C extension imports from qiskit_accelerate::sparse_observable should use
    qiskit_quantum_info::sparse_observable
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use qiskit_accelerate::sparse_observable::$ITEM;
  - metavariable-pattern:
      metavariable: $ITEM
      patterns:
      - pattern-either:
        - pattern: ArithmeticError
        - pattern: BitTerm
        - pattern: SparseObservable
        - pattern: SparseTermView
        - pattern: PySparseObservable
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
