    use qiskit_synthesis::euler_one_qubit_decomposer
  severity: WARNING
  languages:
  - rust
  pattern: pub use qiskit_accelerate::euler_one_qubit_decomposer::$ITEM;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: accelerate-two-qubit-decompose-use
  message: Import from old qiskit_accelerate::two_qubit_decompose should be migrated
    to qiskit_synthesis::two_qubit_decompose
  severity: WARNING
  languages:
  - rust
  pattern: use qiskit_accelerate::two_qubit_decompose::$ITEM;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: transpiler-two-qubit-weyl-decomposition
  message: two_qubit_decompose imports should use qiskit_synthesis instead of qiskit_accelerate
  severity: WARNING
  languages:
  - rust
  pattern: use qiskit_accelerate::two_qubit_decompose::$ITEM;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: pub-use-accelerate-two-qubit
  message: Public re-export from qiskit_accelerate::two_qubit_decompose should use
    qiskit_synthesis::two_qubit_decompose
  severity: WARNING
  languages:
  - rust
  pattern: pub use qiskit_accelerate::two_qubit_decompose::$ITEM;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: accelerate-lib-file-contains-moved-modules
  message: Accelerate lib.rs should not contain module declarations for modules moved
    to qiskit-quantum-info or qiskit-synthesis
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-regex: pub mod (sparse_observable|sparse_pauli_op|unitary_compose|convert_2q_block_matrix|euler_one_qubit_decomposer|two_qubit_decompose|cos_sin_decomp|synthesis|quantum_info)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - crates/accelerate/src/lib.rs
- id: transpiler-optimize-1q-gates-decomposition-imports
  message: optimize_1q_gates_decomposition should import from qiskit_synthesis::euler_one_qubit_decomposer
  severity: WARNING
  languages:
  - rust
  pattern: use qiskit_accelerate::euler_one_qubit_decomposer::$ITEM;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - crates/transpiler/src/passes/optimize_1q_gates_decomposition.rs
- id: accelerate-path-in-expression-euler
  message: Method call on qiskit_accelerate::euler_one_qubit_decomposer type should
    use qiskit_synthesis::euler_one_qubit_decomposer
  severity: WARNING
  languages:
  - rust
  pattern: qiskit_accelerate::euler_one_qubit_decomposer::$TYPE::$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: pyext-lib-uses-accelerate-module
  message: Python extension module binding should use qiskit_quantum_info or qiskit_synthesis
    instead of qiskit_accelerate
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: add_submodule(m, ::qiskit_accelerate::$MODULE::$FUNC, $STR)
  - metavariable-pattern:
      metavariable: $MODULE
      patterns:
      - pattern-either:
        - pattern: sparse_observable
        - pattern: sparse_pauli_op
        - pattern: euler_one_qubit_decomposer
        - pattern: two_qubit_decompose
        - pattern: cos_sin_decomp
        - pattern: synthesis
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: accelerate-sparse-observable-use
  message: Import from old qiskit_accelerate::sparse_observable should be migrated
    to qiskit_quantum_info::sparse_observable
  severity: WARNING
  languages:
  - rust
  pattern: use qiskit_accelerate::sparse_observable::$ITEM;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: accelerate-two-qubit-decompose-path-ref
