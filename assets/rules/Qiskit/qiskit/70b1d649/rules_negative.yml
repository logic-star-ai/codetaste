rules:
- id: accelerate-sparse-observable-path-ref
  message: Path reference to old qiskit_accelerate::sparse_observable should be migrated
    to qiskit_quantum_info::sparse_observable
  severity: WARNING
  languages:
  - rust
  pattern: ::qiskit_accelerate::sparse_observable::$ITEM
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: accelerate-euler-decomposer-path-ref
  message: Path reference to old qiskit_accelerate::euler_one_qubit_decomposer should
    be migrated to qiskit_synthesis::euler_one_qubit_decomposer
  severity: WARNING
  languages:
  - rust
  pattern: ::qiskit_accelerate::euler_one_qubit_decomposer::$ITEM
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: accelerate-path-in-expression-two-qubit
  message: Method call on qiskit_accelerate::two_qubit_decompose type should use qiskit_synthesis::two_qubit_decompose
  severity: WARNING
  languages:
  - rust
  pattern: qiskit_accelerate::two_qubit_decompose::$TYPE::$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: accelerate-euler-module-use
  message: Module import of euler_one_qubit_decomposer should use qiskit_synthesis::euler_one_qubit_decomposer
  severity: WARNING
  languages:
  - rust
  pattern: use qiskit_accelerate::euler_one_qubit_decomposer;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: accelerate-euler-decomposer-use
