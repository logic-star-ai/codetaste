    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: accelerate-getenv-use-threads-path-ref
  message: Function getenv_use_multiple_threads moved from qiskit_accelerate to qiskit_circuit
  severity: WARNING
  languages:
  - rust
