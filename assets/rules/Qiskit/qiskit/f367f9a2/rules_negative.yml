rules:
- id: accelerate-crate-still-exports-transpiler-passes
  message: 'Transpiler modules still exported from accelerate: These should be moved
    to qiskit_transpiler crate'
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: pub mod barrier_before_final_measurement
  - pattern: pub mod check_map
  - pattern: pub mod commutation_analysis
  - pattern: pub mod commutation_cancellation
  - pattern: pub mod commutation_checker
  - pattern: pub mod consolidate_blocks
  - pattern: pub mod dense_layout
  - pattern: pub mod elide_permutations
  - pattern: pub mod filter_op_nodes
  - pattern: pub mod gate_direction
  - pattern: pub mod gates_in_basis
  - pattern: pub mod high_level_synthesis
  - pattern: pub mod inverse_cancellation
  - pattern: pub mod remove_diagonal_gates_before_measure
  - pattern: pub mod remove_identity_equiv
  - pattern: pub mod split_2q_unitaries
  - pattern: pub mod star_prerouting
  - pattern: pub mod unitary_synthesis
  - pattern: pub mod vf2_layout
  - pattern: pub mod sabre
  - pattern: pub mod target_transpiler
  - pattern: pub mod equivalence
  - pattern: pub mod circuit_duration
  - pattern: pub mod twirling
  - pattern: pub mod basis
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    include:
    - crates/accelerate/src/lib.rs
- id: pyext-references-old-pass-paths
  message: 'Pyext still references qiskit_accelerate for transpiler modules: should
    use qiskit_transpiler'
  severity: WARNING
  languages:
  - rust
  pattern-regex: qiskit_accelerate::(barrier_before_final_measurement|basis|check_map|commutation_analysis|commutation_cancellation|commutation_checker|consolidate_blocks|dense_layout|elide_permutations|filter_op_nodes|gate_direction|gates_in_basis|high_level_synthesis|inverse_cancellation|remove_diagonal_gates_before_measure|remove_identity_equiv|split_2q_unitaries|star_prerouting|unitary_synthesis|vf2_layout|sabre|target_transpiler|equivalence|circuit_duration|twirling)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    include:
    - crates/pyext/src/lib.rs
- id: accelerate-lib-imports-transpiler-internally
  message: Internal crate imports of transpiler modules within accelerate should be
    removed
  severity: WARNING
  languages:
  - rust
  pattern-regex: use\s+crate::(barrier_before_final_measurement|check_map|commutation_analysis|commutation_cancellation|commutation_checker|consolidate_blocks|dense_layout|elide_permutations|filter_op_nodes|gate_direction|gates_in_basis|high_level_synthesis|inverse_cancellation|remove_diagonal_gates_before_measure|remove_identity_equiv|split_2q_unitaries|star_prerouting|unitary_synthesis|vf2_layout|sabre|target_transpiler|equivalence|circuit_duration|twirling|basis)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - crates/accelerate/src/*.rs
- id: old-equivalence-location-with-content
  message: 'Equivalence code still in accelerate: should be in transpiler crate'
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+(struct|fn|enum)\s+\w+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - crates/accelerate/src/equivalence.rs
- id: old-commutation-checker-location-with-content
  message: 'Commutation checker code still in accelerate: should be in transpiler
    crate'
