- id: basis-translator-files-in-old-location
  message: 'Basis translator files in old location: should be in crates/transpiler/src/basis/'
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - crates/accelerate/src/basis/basis_translator/*.rs
