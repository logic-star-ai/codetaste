rules:
- id: pycore-state-struct-with-multiple-fields-in-subsystem
  message: Complex state structs with multiple fields should be moved to consolidated
    struct headers
  severity: WARNING
  languages:
  - c
  pattern-regex: struct\s+[_A-Za-z0-9]+_state\s*\{[^}]{50,}\}
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - Include/internal/pycore_code.h
    - Include/internal/pycore_function.h
    - Include/internal/pycore_import.h
    - Include/internal/pycore_typeobject.h
    - Include/internal/pycore_unicodeobject.h
    - Include/internal/pycore_warnings.h
- id: pycore-any-struct-in-ceval-state-header
  message: Struct definitions should be moved to consolidated struct headers, not
    defined in pycore_ceval_state.h
  severity: WARNING
  languages:
  - c
  pattern-regex: (typedef\s+)?struct\s+[_A-Za-z0-9]+\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - Include/internal/pycore_ceval_state.h
- id: pycore-any-struct-in-atexit-header
  message: Struct definitions should be moved to consolidated struct headers (pycore_structs.h
    or pycore_runtime_structs.h), not defined in pycore_atexit.h
  severity: WARNING
  languages:
  - c
  pattern-regex: (typedef\s+)?struct\s+[_A-Za-z0-9]+\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - Include/internal/pycore_atexit.h
- id: pycore-struct-definition-before-consolidation-general
  message: Struct definitions in subsystem headers should be moved to consolidated
    struct headers (pycore_structs.h or pycore_runtime_structs.h)
  severity: WARNING
  languages:
  - c
  pattern-regex: (?:typedef\s+)?struct\s+[_A-Za-z][A-Za-z0-9_]*\s*\{[^}]{20,}\}\s*[A-Za-z0-9_]+\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - Include/internal/pycore_import.h
    - Include/internal/pycore_atexit.h
    - Include/internal/pycore_gc.h
    - Include/internal/pycore_warnings.h
    - Include/internal/pycore_dtoa.h
    - Include/internal/pycore_codecs.h
    - Include/internal/pycore_parser.h
    - Include/internal/pycore_floatobject.h
    - Include/internal/pycore_time.h
- id: pycore-struct-with-mutex-in-subsystem-header
  message: Structs with synchronization primitives should be moved to consolidated
    struct headers
  severity: WARNING
  languages:
  - c
  pattern-regex: struct\s+[_A-Za-z0-9]+\s*\{[^}]*PyMutex\s+[a-z_]+[^}]*\}
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - Include/internal/pycore_atexit.h
    - Include/internal/pycore_import.h
    - Include/internal/pycore_warnings.h
- id: pycore-struct-definition-in-typeobject-multi-field
  message: Type-related struct definitions should be moved to pycore_structs.h or
    pycore_runtime_structs.h
  severity: WARNING
  languages:
  - c
  pattern-regex: struct\s+(type_cache|static_builtin_state|types_state|_types_runtime_state)\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - Include/internal/pycore_typeobject.h
- id: pycore-struct-definition-in-unicode-multi
  message: Unicode struct definitions should be moved to consolidated struct headers
  severity: WARNING
  languages:
  - c
  pattern-regex: struct\s+(_Py_unicode_state|_Py_unicode_runtime_state|_Py_unicode_ids)\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - Include/internal/pycore_unicodeobject.h
- id: pycore-nested-anonymous-struct-in-state
  message: State structs with nested anonymous structs should be refactored and moved
    to consolidated headers
  severity: WARNING
  languages:
  - c
  pattern-regex: struct\s+[_A-Za-z0-9]+_(runtime_)?state\s*\{[^}]*struct\s*\{[^}]*\}[^}]*\}
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - Include/internal/pycore_import.h
    - Include/internal/pycore_atexit.h
    - Include/internal/pycore_ceval_state.h
    - Include/internal/pycore_interp.h
- id: pycore-dtoa-state-in-old-location
  message: _dtoa_state struct definition should be moved to pycore_structs.h, not
