- id: pycore-typedef-callback-in-subsystem-header
  message: Callback typedefs should be moved to pycore_structs.h for consistency and
    to reduce coupling
  severity: WARNING
  languages:
  - c
  pattern-regex: typedef\s+(void|int)\s+\(\*[A-Za-z0-9_]+callback[A-Za-z0-9_]*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - Include/internal/pycore_atexit.h
    - Include/internal/pycore_code.h
    - Include/internal/pycore_function.h
    - Include/internal/pycore_typeobject.h
- id: pycore-callback-typedef-in-atexit
  message: Atexit callback typedefs should be moved to pycore_structs.h alongside
    atexit structs
  severity: WARNING
  languages:
  - c
  pattern-regex: typedef\s+void\s+\(\*atexit[A-Za-z0-9_]*func\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - Include/internal/pycore_atexit.h
- id: pycore-max-watchers-constants-pattern
  message: MAX_WATCHERS constants should be moved alongside their respective state
    structs to pycore_structs.h
  severity: WARNING
  languages:
  - c
  pattern-regex: '#define\s+[A-Z_]+MAX_WATCHERS\s+'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
