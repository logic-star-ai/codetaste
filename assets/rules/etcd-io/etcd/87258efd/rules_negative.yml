rules:
- id: defer-testutil-aftertest-basic
  message: Replace 'defer testutil.AfterTest($T)' with 'testutil.BeforeTest($T)' at
    the beginning of the test function
  severity: WARNING
  languages:
  - go
  pattern: defer testutil.AfterTest($T)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-with-blank-line-after
  message: Replace 'defer $PKG.AfterTest($T)' with '$PKG.BeforeTest($T)' at the beginning
    of the test
  severity: WARNING
  languages:
  - go
  pattern: 'defer $PKG.AfterTest($T)


    $REST

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-in-integration-tests
  message: Integration test still uses old 'defer $PKG.AfterTest($T)' - refactor to
    '$PKG.BeforeTest($T)'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: defer $PKG.AfterTest($T)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 278
  paths:
    include:
    - tests/integration/**/*_test.go
- id: defer-aftertest-first-line
  message: Remove 'defer $PKG.AfterTest(...)' and replace with '$PKG.BeforeTest(...)'
    as first statement
  severity: WARNING
  languages:
  - go
  pattern: "func $TEST(...) {\n  defer $PKG.AfterTest(...)\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 275
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-with-other-statements
  message: Replace 'defer $PKG.AfterTest($T)' with '$PKG.BeforeTest($T)' at function
    start
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func $TEST($T *testing.T) {\n  ...\n  defer $PKG.AfterTest($T)\n\
      \  ...\n  $STMT\n  ...\n}\n"
  - pattern: defer $PKG.AfterTest($T)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 264
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-with-testing-t
  message: Refactor to use 'testutil.BeforeTest($T)' instead of 'defer testutil.AfterTest($T)'
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC($T *testing.T) {\n  defer testutil.AfterTest($T)\n  ...\n}\n"
