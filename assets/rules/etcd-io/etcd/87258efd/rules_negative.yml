  languages:
  - go
  pattern: defer $PKG.AfterTest($T)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    include:
    - '**/*_test.go'
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
