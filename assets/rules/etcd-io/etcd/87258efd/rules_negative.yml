rules:
- id: defer-testutil-aftertest-basic
  message: Replace 'defer testutil.AfterTest($T)' with 'testutil.BeforeTest($T)' at
    the beginning of the test function
  severity: WARNING
  languages:
  - go
  pattern: defer testutil.AfterTest($T)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-in-test-functions-refactored
  message: Replace 'defer $PKG.AfterTest(t)' with '$PKG.BeforeTest(t)' for cleaner
    test structure
  severity: WARNING
  languages:
  - go
  pattern: defer $PKG.AfterTest(t)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-any-alias
  message: Replace 'defer $ALIAS.AfterTest($T)' with '$ALIAS.BeforeTest($T)' to use
    the new test initialization pattern
  severity: WARNING
  languages:
  - go
  pattern: defer $ALIAS.AfterTest($T)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-common-names
  message: Refactor to use testutil.BeforeTest(...) instead of defer testutil.AfterTest(...)
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: 'defer testutil.AfterTest(t)

      '
  - pattern: 'defer testutil.AfterTest(b)

      '
  - pattern: 'defer testutil.AfterTest(tb)

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-in-trun
  message: Subtest uses old 'defer $PKG.AfterTest(t)' - refactor to '$PKG.BeforeTest(t)'
  severity: WARNING
  languages:
  - go
  pattern: defer $PKG.AfterTest(t)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-with-blank-line-after
  message: Replace 'defer $PKG.AfterTest($T)' with '$PKG.BeforeTest($T)' at the beginning
    of the test
  severity: WARNING
  languages:
  - go
  pattern: 'defer $PKG.AfterTest($T)


    $REST

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-in-test-main
  message: TestMain still uses old 'defer $PKG.AfterTest($ARG)' - refactor to '$PKG.BeforeTest($ARG)'
  severity: WARNING
  languages:
  - go
  pattern: defer $PKG.AfterTest($ARG)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-single-arg
  message: Replace 'defer $PKG.AfterTest($ARG)' with '$PKG.BeforeTest($ARG)' to use
    new pattern
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: defer $PKG.AfterTest($ARG)
  - metavariable-pattern:
      metavariable: $ARG
      pattern: $VAR
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-with-no-other-defers
  message: Single defer statement for AfterTest should be replaced with BeforeTest
    call
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  - pattern: defer $PKG.AfterTest($T)
  - pattern-not-inside: "func $FUNC(...) {\n  defer $OTHER(...)\n  ...\n  defer $PKG.AfterTest($T)\n\
      \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
- id: defer-aftertest-generic-pkg
  message: Replace 'defer $PKG.AfterTest($T)' with '$PKG.BeforeTest($T)'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: defer $PKG.AfterTest($T)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^[a-zA-Z_][a-zA-Z0-9_]*$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 300
  paths:
    exclude:
    - client/v3/client_test.go
    - pkg/testutil/leak_test.go
