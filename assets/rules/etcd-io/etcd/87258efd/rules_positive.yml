rules:
- id: detect-beforetest-any-test-function
  message: Detected testutil.BeforeTest call in any function (refactoring applied)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: testutil.BeforeTest($VAR)
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-beforetest-with-different-var-names
  message: Detected BeforeTest call with various variable names (refactoring applied)
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: testutil.BeforeTest(t)
  - pattern: testutil.BeforeTest(tb)
  - pattern: testutil.BeforeTest($T)
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
