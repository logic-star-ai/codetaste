rules:
- id: beforetest-multiple-in-package
  message: 'Refactoring detected: multiple BeforeTest calls in package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.BeforeTest($ARG)
  - metavariable-regex:
      metavariable: $PKG
      regex: .+
  metadata:
    nr_refactored_patterns: 166
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: beforetest-call-in-test-function
  message: 'Refactoring detected: BeforeTest() called in test function'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func $TESTFUNC($T *testing.T) {\n  ...\n}\n"
  - pattern: $PKG.BeforeTest($T)
  - pattern-not-inside: defer $PKG.BeforeTest(...)
  - metavariable-regex:
      metavariable: $TESTFUNC
      regex: ^Test.*
  metadata:
    nr_refactored_patterns: 150
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
    - '**/third_party/**'
  options:
    symbolic_propagation: true
- id: multiple-beforetest-calls
  message: 'Refactoring detected: multiple BeforeTest calls exist'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: BeforeTest($X)
  metadata:
    nr_refactored_patterns: 124
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: beforetest-call-without-package
  message: 'Refactoring detected: BeforeTest called directly'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func $TESTFUNC($T *testing.T) {\n  ...\n}\n"
  - pattern: BeforeTest($T)
  - metavariable-regex:
      metavariable: $TESTFUNC
      regex: ^Test.*
  metadata:
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: beforetestv2-pattern-all-go
  message: 'Refactoring detected: BeforeTestV2 in any Go file'
  severity: INFO
  languages:
  - go
  pattern-regex: BeforeTestV2
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/vendor/**'
- id: beforetest-leak-file-pattern
  message: 'Refactoring detected: BeforeTest in leak file'
  severity: INFO
  languages:
  - go
  pattern-regex: BeforeTest
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/leak.go'
    exclude:
    - '**/vendor/**'
- id: beforetest-testingTB-parameter
  message: 'Refactoring detected: BeforeTest accepts testing.TB interface'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func BeforeTest($PARAM testing.TB) { ... }
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
- id: beforetest-function-definition-with-cleanup
  message: 'Refactoring detected: BeforeTest function defined with t.Cleanup registration'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func BeforeTest($TB testing.TB) {\n  ...\n  $TB.Cleanup(...)\n  ...\n\
      }\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: beforetestv2-function-definition
  message: 'Refactoring detected: BeforeTestV2 function defined for v2 API tests'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func BeforeTestV2($T testing.TB) { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: aftertest-signature-with-testingTB
  message: 'Refactoring detected: AfterTest signature updated to testing.TB'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func AfterTest($PARAM testing.TB) { ... }
  - pattern-not: func AfterTest($PARAM *testing.T) { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
- id: beforetest-in-table-test
  message: 'Refactoring detected: BeforeTest in table-driven test'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "for $I, $TC := range $TESTS {\n  ...\n}\n"
  - pattern-inside: "func $TESTFUNC($T *testing.T) {\n  ...\n}\n"
  - pattern: $PKG.BeforeTest($TVAR)
  - metavariable-regex:
      metavariable: $TESTFUNC
      regex: ^Test.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
