rules:
- id: test-futures-class-reference
  message: Reference to io.lettuce.test.Futures should be updated to TestFutures
  severity: WARNING
  languages:
  - java
  pattern: io.lettuce.test.Futures.$METHOD(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 182
- id: test-futures-await-method
  message: Calling io.lettuce.test.Futures.await() should be updated to TestFutures.await()
  severity: WARNING
  languages:
  - java
  pattern: io.lettuce.test.Futures.await(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 75
- id: test-futures-import
  message: Import of io.lettuce.test.Futures should be changed to TestFutures
  severity: WARNING
  languages:
  - java
  pattern: import io.lettuce.test.Futures;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: promise-aggregator-workflow-pattern
  message: PromiseAggregator workflow (expectMore/arm/add) should be replaced with
    CompletableFuture.allOf()
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: '$AGGREGATOR.expectMore(...);

        ...

        $AGGREGATOR.arm();

        '
    - pattern: '$AGGREGATOR.expectMore(...);

        ...

        $AGGREGATOR.add(...);

        '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: promise-aggregator-expect-more-call
  message: PromiseAggregator.expectMore() should be replaced with CompletableFuture.allOf()
    pattern.
  severity: WARNING
  languages:
  - java
  pattern: $AGGREGATOR.expectMore($COUNT)
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: resource-futures-qualified-reference
  message: Qualified reference to resource.Futures should be changed to PromiseAdapter
  severity: WARNING
  languages:
  - java
  pattern: io.lettuce.core.resource.Futures.$METHOD
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: default-event-loop-group-promise-aggregator-usage
  message: DefaultEventLoopGroupProvider should use internal.Futures.allOf() with
    CompletionStage instead of PromiseAggregator
  severity: WARNING
  languages:
  - java
  pattern: 'Futures.PromiseAggregator<$T, Promise<$T>> $AGGREGATOR = new Futures.PromiseAggregator<>($PROMISE);

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: promise-aggregator-test-creation
  message: Test creating PromiseAggregator should be updated after PromiseAggregator
    removal
  severity: WARNING
  languages:
  - java
  pattern: 'Futures.PromiseAggregator<$T, $F> $SUT = new Futures.PromiseAggregator<>($TARGET);

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: global-event-executor-instance-with-promise
  message: DefaultPromise with GlobalEventExecutor should be replaced with CompletableFuture
    in refactored code
  severity: WARNING
  languages:
  - java
  pattern: new DefaultPromise<$T>(GlobalEventExecutor.INSTANCE)
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: aggregator-expect-more-arm-pattern
  message: PromiseAggregator expectMore/arm pattern should be replaced with CompletableFuture.allOf()
  severity: WARNING
  languages:
  - java
  pattern: '$AGGREGATOR.expectMore($N);

    ...

    $AGGREGATOR.arm();

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: lettuce-assert-state-armed
  message: LettuceAssert checking 'armed' state in Futures class indicates PromiseAggregator
    that should be removed
  severity: WARNING
  languages:
  - java
  pattern: LettuceAssert.assertState($ARMED, ...);
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/resource/Futures.java'
- id: test-futures-await-all-method
  message: Calling io.lettuce.test.Futures.awaitAll() should be updated to TestFutures.awaitAll()
  severity: WARNING
  languages:
  - java
  pattern: io.lettuce.test.Futures.awaitAll(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: resource-futures-import
  message: Import of resource.Futures should be changed to PromiseAdapter
  severity: WARNING
  languages:
  - java
  pattern: import io.lettuce.core.resource.Futures;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: resource-futures-static-import
  message: Static import from resource.Futures should be changed to PromiseAdapter
  severity: WARNING
  languages:
  - java
  pattern: import static io.lettuce.core.resource.Futures.$METHOD;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: static-import-from-resource-futures
  message: Static import from resource.Futures should be updated to PromiseAdapter
    after renaming
  severity: WARNING
  languages:
  - java
  pattern: import static io.lettuce.core.resource.Futures.$FUNC;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: aggregator-add-to-boolean-promise
  message: Pattern using aggregator.add(toBooleanPromise()) should be replaced with
    CompletableFuture.allOf()
  severity: WARNING
  languages:
  - java
  pattern: $AGGREGATOR.add(toBooleanPromise($FUTURE))
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: to-boolean-promise-with-aggregator-add
  message: toBooleanPromise with aggregator pattern should be refactored to use CompletableFuture.allOf()
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $AGGREGATOR.add(toBooleanPromise($SHUTDOWN))
  - pattern-not-inside:
      pattern: import io.lettuce.core.resource.PromiseAdapter;
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: default-promise-for-aggregation
  message: DefaultPromise with PromiseAggregator pattern should be replaced with CompletableFuture.allOf()
  severity: WARNING
  languages:
  - java
  pattern: 'DefaultPromise<$T> $OVERALL = new DefaultPromise<>(...);

    ...

    Futures.PromiseAggregator<$T, $F> $AGGREGATOR = new Futures.PromiseAggregator<>($OVERALL);

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: aggregator-set-success-on-completion
  message: PromiseAggregator pattern with setSuccess should be replaced with CompletableFuture.allOf()
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "public synchronized void operationComplete($F $FUTURE) throws\
      \ Exception {\n  ...\n}\n"
  - pattern: $AGGREGATEPROMISE.setSuccess(null);
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: shutdown-return-to-boolean-promise
  message: shutdown() returning toBooleanPromise should be updated to return CompletionStage
    after refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "public $RT shutdown(...) {\n  ...\n}\n"
  - pattern: return toBooleanPromise($PROMISE);
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: promise-set-success-true
  message: setSuccess(true) pattern in resource/Futures indicates toBooleanPromise
    that should use PromiseAdapter
  severity: WARNING
  languages:
  - java
  pattern: $RESULT.setSuccess(true)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/resource/Futures.java'
- id: promise-set-failure-future-cause
  message: setFailure with future.cause() in resource/Futures indicates old pattern
    before refactoring
  severity: WARNING
  languages:
  - java
  pattern: $RESULT.setFailure($FUTURE.cause())
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/resource/Futures.java'
- id: shutdown-method-with-promise-aggregation
  message: shutdown() method using PromiseAggregator workflow should use internal.Futures.allOf()
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "public $RT shutdown($QUIETPERIOD, $TIMEOUT, $TIMEUNIT) {\n  ...\n\
      }\n"
  - pattern: '$AGGREGATOR.expectMore($COUNT);

      ...

      $AGGREGATOR.arm();

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: shutdown-future-boolean-type
  message: shutdown() returning Future<Boolean> via toBooleanPromise should use CompletionStage
    pattern
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "public Future<Boolean> shutdown(...) {\n  ...\n}\n"
  - pattern: return toBooleanPromise($PROMISE);
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: overall-promise-with-aggregator
  message: Creating 'overall' promise with PromiseAggregator should use CompletableFuture.allOf()
  severity: WARNING
  languages:
  - java
  pattern: '$PROMISE $OVERALL = ...;

    ...

    Futures.PromiseAggregator<$T, $F> $AGGREGATOR = new Futures.PromiseAggregator<>($OVERALL);

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: exception-factory-create-execution-exception
  message: ExceptionFactory usage in awaitAll indicates direct implementation that
    should be in internal.Futures
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: throw ExceptionFactory.createExecutionException($MSG, $CAUSE);
  - pattern-inside: "public static boolean awaitAll(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: aggregator-assert-state-not-armed
  message: Asserting aggregator not armed indicates PromiseAggregator that should
    be removed
  severity: WARNING
  languages:
  - java
  pattern: LettuceAssert.assertState(!$ARMED, ...)
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/resource/Futures.java'
- id: futures-class-package-util
  message: Futures class in resource package should be renamed to PromiseAdapter
  severity: WARNING
  languages:
  - java
  pattern-regex: ^package io\.lettuce\.core\.resource;[\s\S]*class Futures
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: atomic-integer-field-declaration
  message: AtomicInteger field in resource/Futures indicates PromiseAggregator counter
    that should be removed
  severity: WARNING
  languages:
  - java
  pattern: 'private AtomicInteger $VAR = new AtomicInteger();

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/resource/Futures.java'
- id: promise-aggregator-instantiation
  message: PromiseAggregator should be removed. Use CompletableFuture.allOf() instead.
  severity: WARNING
  languages:
  - java
  pattern: new $FUTURES.PromiseAggregator<$T, $F>($PROMISE)
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: promise-aggregator-javadoc-reference
  message: PromiseAggregator javadoc reference should be removed or updated.
  severity: INFO
  languages:
  - java
  pattern-regex: '@link.*PromiseAggregator'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: resource-futures-class-exists
  message: resource/Futures.java should be renamed to PromiseAdapter.java
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/resource/Futures.java'
- id: test-futures-class-not-renamed
  message: test utility Futures.java should be renamed to TestFutures.java to avoid
    naming conflicts
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/test/Futures.java'
- id: default-client-resources-promise-aggregator-usage
  message: DefaultClientResources should use internal.Futures.allOf() with CompletionStage
    instead of PromiseAggregator
  severity: WARNING
  languages:
  - java
  pattern: 'Futures.PromiseAggregator<Boolean, Promise<Boolean>> $AGGREGATOR = new
    Futures.PromiseAggregator<Boolean, Promise<Boolean>>($PROMISE);

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: promise-aggregator-in-shutdown-method
  message: shutdown() method using PromiseAggregator should be refactored to use Futures.allOf()
    with CompletionStage
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "$RT shutdown(...) {\n  ...\n}\n"
  - pattern: new Futures.PromiseAggregator<$T, $F>($PROMISE)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: lettuce-futures-await-all-method-exists
  message: LettuceFutures.awaitAll() should delegate to internal.Futures instead of
    having direct implementation
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "class LettuceFutures {\n  ...\n}\n"
  - pattern: "public static boolean awaitAll($TIMEOUT, $UNIT, Future<?>... $FUTURES)\
      \ {\n  ...\n  for (Future<?> $F : $FUTURES) {\n    ...\n    $F.get(...);\n \
      \   ...\n  }\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: futures-class-in-resource-package
  message: Futures.java in resource package should be renamed to PromiseAdapter.java
  severity: WARNING
  languages:
  - java
  pattern-regex: ^package io\.lettuce\.core\.resource;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/Futures.java'
- id: test-futures-package-declaration
  message: Futures.java in test package should be renamed to TestFutures.java
  severity: WARNING
  languages:
  - java
  pattern-regex: ^package io\.lettuce\.test;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/Futures.java'
- id: shutdown-with-boolean-promise-list
  message: shutdown() using toBooleanPromise and aggregator should use Futures.allOf()
    with CompletionStage
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "$RT shutdown(...) {\n  ...\n}\n"
  - pattern: 'Promise<Boolean> $SHUTDOWN = toBooleanPromise($FUTURE);

      $AGGREGATOR.add($SHUTDOWN);

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: netty-promise-boolean-pattern
  message: toBooleanPromise creating Promise<Boolean> should use CompletableFuture
    pattern after refactoring
  severity: WARNING
  languages:
  - java
  pattern: Promise<Boolean> $VAR = toBooleanPromise($FUTURE);
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: futures-utility-class-javadoc-reference
  message: Javadoc in resource/Futures.java mentioning netty futures indicates this
    should be PromiseAdapter
  severity: INFO
  languages:
  - java
  pattern-regex: ^\s*\*\s+Utility.*netty.*future
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/resource/Futures.java'
- id: promise-aggregator-generic-future-listener
  message: PromiseAggregator class implementing GenericFutureListener should be removed
  severity: WARNING
  languages:
  - java
  pattern: "static class PromiseAggregator<$V, $F extends Future<$V>> implements GenericFutureListener<$F>\
    \ {\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: executor-group-release-with-to-boolean-promise
  message: Pattern using toBooleanPromise(release()) should be refactored to use CompletionStage
  severity: WARNING
  languages:
  - java
  pattern: 'Promise<Boolean> $SHUTDOWN = toBooleanPromise(release($EXECUTOR, ...));

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: aggregator-arm-method-definition
  message: PromiseAggregator.arm() method indicates custom aggregator class that should
    be removed
  severity: WARNING
  languages:
  - java
  pattern: "public void arm() {\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/resource/Futures.java'
- id: aggregator-expect-more-method-definition
  message: PromiseAggregator.expectMore() method indicates custom aggregator class
    that should be removed
  severity: WARNING
  languages:
  - java
  pattern: "public void expectMore(int $COUNT) {\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/resource/Futures.java'
- id: aggregator-add-method-varargs
  message: PromiseAggregator.add() method indicates custom aggregator class that should
    be removed
  severity: WARNING
  languages:
  - java
  pattern: "public final PromiseAggregator<$V, $F> add(Promise<$V>... $PROMISES) {\n\
    \  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: aggregator-operation-complete-implementation
  message: PromiseAggregator.operationComplete() implementation should be removed,
    use CompletableFuture.allOf()
  severity: WARNING
  languages:
  - java
  pattern: "public synchronized void operationComplete($F $FUTURE) throws Exception\
    \ {\n  ...\n  $PENDINGPROMISES.remove($FUTURE);\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: futures-to-boolean-promise-javadoc
  message: Javadoc for toBooleanPromise indicates old Futures class that should be
    renamed to PromiseAdapter
  severity: INFO
  languages:
  - java
  pattern-regex: '@return.*Promise.*Boolean.*value'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/resource/Futures.java'
- id: promise-aggregator-constructor-with-assert
  message: PromiseAggregator constructor indicates custom aggregator class that should
    be removed
  severity: WARNING
  languages:
  - java
  pattern: "public PromiseAggregator(Promise<$V> $AGGREGATEPROMISE) {\n  LettuceAssert.notNull($AGGREGATEPROMISE,\
    \ ...);\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: aggregator-set-failure-propagation
  message: Pattern propagating failure to pending promises in aggregator should be
    replaced with CompletableFuture.allOf()
  severity: WARNING
  languages:
  - java
  pattern: "for (Promise<$V> $PENDINGFUTURE : $PENDINGPROMISES) {\n  $PENDINGFUTURE.setFailure($CAUSE);\n\
    }\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: lettuce-futures-awaitall-catch-timeout
  message: TimeoutException handling in awaitAll shows direct implementation that
    should be in internal.Futures
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "public static boolean awaitAll($TIMEOUT, $UNIT, Future<?>...\
      \ $FUTURES) {\n  ...\n}\n"
  - pattern: "catch (TimeoutException $E) {\n  return false;\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: lettuce-futures-awaitall-catch-execution
  message: ExecutionException handling in awaitAll shows direct implementation that
    should be in internal.Futures
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "public static boolean awaitAll($TIMEOUT, $UNIT, Future<?>...\
      \ $FUTURES) {\n  ...\n}\n"
  - pattern: "catch (ExecutionException $E) {\n  if ($E.getCause() instanceof RedisCommandExecutionException)\
      \ {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: lettuce-futures-awaitall-catch-interrupted
  message: InterruptedException handling in awaitAll shows direct implementation that
    should be in internal.Futures
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "public static boolean awaitAll($TIMEOUT, $UNIT, Future<?>...\
      \ $FUTURES) {\n  ...\n}\n"
  - pattern: "catch (InterruptedException $E) {\n  Thread.currentThread().interrupt();\n\
      \  throw new RedisCommandInterruptedException($E);\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: promise-aggregator-add-listener
  message: Adding listener to promise in PromiseAggregator.add() shows custom aggregator
    that should be removed
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $PROMISE.addListener($LISTENER);
  - pattern-inside: "public final PromiseAggregator<$V, $F> add(Promise<$V>... $PROMISES)\
      \ {\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: promise-aggregator-synchronized-operation-complete
  message: Synchronized operationComplete method in Futures indicates PromiseAggregator
    that should be removed
  severity: WARNING
  languages:
  - java
  pattern: "public synchronized void operationComplete($F $FUTURE) throws Exception\
    \ {\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/resource/Futures.java'
- id: futures-class-with-to-boolean-promise
  message: Futures class with toBooleanPromise method should be renamed to PromiseAdapter
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "class Futures {\n  ...\n}\n"
  - pattern: "static Promise<Boolean> toBooleanPromise(Future<?> $FUTURE) {\n  ...\n\
      }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/resource/Futures.java'
- id: futures-utility-class-comment
  message: Comment 'Utility class to support netty' in resource/Futures indicates
    it should be PromiseAdapter
  severity: INFO
  languages:
  - java
  pattern-regex: ^\s*\*\s+Utility class to support netty
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/resource/Futures.java'
- id: futures-unit-tests-for-promise-aggregator
  message: FuturesUnitTests.java testing PromiseAggregator should be updated after
    removal of PromiseAggregator
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
