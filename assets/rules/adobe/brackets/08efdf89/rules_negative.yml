- id: jquery-on-with-capital-manager
  message: Replace $(Manager).on(...) with Manager.on(...) for non-DOM Manager modules.
    Add EventDispatcher.makeEventDispatcher() to module exports if needed.
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: $($MGR).on(...)
  - metavariable-pattern:
      metavariable: $MGR
      pattern-regex: .*Manager$
  - pattern-not-inside: test/...
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 88
