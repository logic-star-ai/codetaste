rules:
- id: any-event-dispatcher-import-in-src
  message: New EventDispatcher import detected - refactoring applied
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: var $ED = require("utils/EventDispatcher")
  - metavariable-regex:
      metavariable: $ED
      regex: EventDispatcher
  metadata:
    category: dependency
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
  paths:
    include:
    - src/**/*.js
    exclude:
    - src/utils/EventDispatcher.js
    - src/document/Document.js
    - src/document/DocumentManager.js
    - src/utils/DeprecationWarning.js
    - test/**
- id: direct-on-main-view-manager
  message: Direct on() on MainViewManager - refactoring applied
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: MainViewManager.on($EVENT, $HANDLER)
  - pattern-not: $(MainViewManager).on(...)
  metadata:
    category: api
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
