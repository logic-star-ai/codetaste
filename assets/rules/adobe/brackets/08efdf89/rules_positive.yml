- id: direct-trigger-specific-events
  message: Direct trigger call on exports for core events - refactoring applied
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: exports.trigger("commandRegistered", ...)
    - pattern: exports.trigger("beforeExecuteCommand", ...)
    - pattern: exports.trigger("projectOpen", ...)
    - pattern: exports.trigger("projectClose", ...)
    - pattern: exports.trigger("beforeProjectClose", ...)
    - pattern: exports.trigger("projectRefresh", ...)
    - pattern: exports.trigger("beforeAppClose", ...)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
