  - pattern-not: $(CommandManager).on(...)
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: command-trigger-without-jquery
  message: Detected Command event trigger without jQuery wrapper - refactoring applied
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: $CMD.trigger($EVENT, ...)
  - metavariable-pattern:
      metavariable: $EVENT
      patterns:
      - pattern-either:
        - pattern: '"enabledStateChange"'
        - pattern: '''enabledStateChange'''
        - pattern: '"checkedStateChange"'
        - pattern: '''checkedStateChange'''
        - pattern: '"nameChange"'
        - pattern: '''nameChange'''
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
