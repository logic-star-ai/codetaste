    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: ongoing-verifying-mode-usage
  message: Detected usage of OngoingVerifyingMode class
  severity: INFO
  languages:
  - java
  pattern-either:
  - patterns:
    - pattern: $CLASS $VAR = ...;
    - metavariable-regex:
        metavariable: $CLASS
        regex: .*OngoingVerifyingMode.*
  - patterns:
    - pattern: new $CLASS(...)
    - metavariable-regex:
        metavariable: $CLASS
        regex: .*OngoingVerifyingMode.*
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
