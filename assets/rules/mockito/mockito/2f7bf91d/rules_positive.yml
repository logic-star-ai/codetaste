rules:
- id: import-from-new-invocation-package
  message: Detected import from new internal.invocation package structure
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import org.mockito.internal.invocation.$CLASS;
  - pattern-not-inside: 'package org.mockito.internal.invocation;

      ...

      '
  metadata:
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-from-new-state-package
  message: Detected import from new internal.state package structure
