- id: ongoing-verifying-mode-static-method
  message: Detected OngoingVerifyingMode static method usage
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $CLASS.$METHOD(...)
  - metavariable-regex:
      metavariable: $CLASS
      regex: .*OngoingVerifyingMode.*
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: and-throw-method-invocation
  message: Detected andThrow method call
  severity: INFO
  languages:
  - java
  patterns:
