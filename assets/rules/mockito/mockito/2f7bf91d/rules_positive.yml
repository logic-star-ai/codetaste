rules:
- id: new-package-qualified-class-reference
  message: Detected qualified class reference from new packages
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: org.mockito.internal.creation.$CLASS $VAR = ...;
    - pattern: org.mockito.internal.invocation.$CLASS $VAR = ...;
    - pattern: org.mockito.internal.state.$CLASS $VAR = ...;
    - pattern: org.mockito.internal.stubbing.$CLASS $VAR = ...;
    - pattern: org.mockito.internal.verification.$CLASS $VAR = ...;
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: import-from-new-invocation-package
  message: Detected import from new org.mockito.internal.invocation subpackage
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: import $PACKAGE.$CLASS;
    - pattern: import $PACKAGE.*;
  - metavariable-regex:
      metavariable: $PACKAGE
      regex: ^org\.mockito\.internal\.invocation(\..+)?$
  - pattern-not-inside: 'package org.mockito.internal;

      ...

      '
  metadata:
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
- id: ongoing-verifying-mode-class-usage
