    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: generic-type-parameter-in-interface
  message: Generic interface may be one that needs renaming - check if this is MockitoExpectation,
    VoidMethodExpectation, or MethodSelector
  severity: INFO
  languages:
  - java
  pattern: 'public interface $NAME<$T> { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/MockitoExpectation.java'
    - '**/VoidMethodExpectation.java'
    - '**/MethodSelector.java'
