rules:
- id: method-call-andthrows
  message: Method call 'andThrows()' should be updated to 'andThrow()'
  severity: WARNING
  languages:
  - java
  pattern: $OBJ.andThrows($E)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: method-with-andthrows-in-body
  message: Method body contains call to 'andThrows()' which should be 'andThrow()'
  severity: WARNING
  languages:
  - java
  pattern: "$M(...) {\n  ...\n  $X.andThrows($E);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: verifyingmode-in-method-signature
  message: Method parameter 'VerifyingMode' should be changed to 'OngoingVerifyingMode'
  severity: WARNING
  languages:
  - java
  pattern: '$RET $METHOD(..., VerifyingMode $P, ...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: variable-declaration-verifyingmode
  message: Variable type 'VerifyingMode' should be changed to 'OngoingVerifyingMode'
  severity: WARNING
  languages:
  - java
  pattern: 'VerifyingMode $VAR = ...;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: static-method-verifyingmode-times
  message: Static method call 'VerifyingMode.times()' should be updated to 'OngoingVerifyingMode.times()'
  severity: WARNING
  languages:
  - java
  pattern: VerifyingMode.times($COUNT)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: static-method-verifyingmode-atleastonce
