  severity: WARNING
  languages:
  - java
  pattern: VerifyingMode.atLeastOnce()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: public-method-returns-verifyingmode
  message: Public method returning 'VerifyingMode' should return 'OngoingVerifyingMode'
    instead
  severity: WARNING
  languages:
  - java
  pattern: 'public VerifyingMode $M($...ARGS) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
