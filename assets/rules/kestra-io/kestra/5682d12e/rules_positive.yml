    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: pinia-multiple-this-assignments
  message: Detected multiple this assignments in action - direct state mutation pattern
  severity: INFO
  languages:
  - ts
  - js
  pattern: "defineStore($ID, {\n  actions: {\n    $ACTION(...) {\n      ...\n    \
    \  this.$PROP1 = ...\n      ...\n      this.$PROP2 = ...\n      ...\n    }\n \
    \ }\n})\n"
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: pinia-store-typescript-file-with-state
