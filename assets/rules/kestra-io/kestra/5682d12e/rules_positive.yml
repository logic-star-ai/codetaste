    API store
  severity: INFO
  languages:
  - ts
  - js
  - vue
  pattern-either:
  - pattern: import { useApiStore } from '$PATH'
  - pattern: import { useApiStore } from "$PATH"
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: pinia-import-definestore
  message: Detected Pinia defineStore import - indicates Pinia adoption
  severity: INFO
  languages:
  - ts
  - js
  pattern: 'import { defineStore } from ''pinia''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
