  message: Detected Pinia store with state as function - correct Pinia pattern
  severity: INFO
  languages:
  - ts
  - js
  pattern: "defineStore($ID, {\n  state: () => ({\n    ...\n  }),\n  ...\n})\n"
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
