    in Pinia
  severity: INFO
  languages:
  - ts
  - js
  pattern: 'axios.$METHOD($URL, { withCredentials: true, ... })

    '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - ui/src/stores/*.ts
- id: pinia-action-response-data-access
  message: Detected response.data access in Pinia action - HTTP response handling
    pattern
  severity: INFO
  languages:
  - ts
  - js
  pattern: "defineStore($ID, {\n  actions: {\n    $ACTION(...) {\n      return $HTTP.$METHOD(...).then($RESPONSE\
    \ => {\n        ...\n        $RESPONSE.data\n        ...\n      })\n    }\n  }\n\
    })\n"
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: pinia-action-this-in-then
