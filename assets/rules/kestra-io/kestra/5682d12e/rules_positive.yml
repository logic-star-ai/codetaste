    nr_legacy_patterns: 0
- id: pinia-action-direct-this-access
  message: Detected Pinia action using 'this' for state access - Pinia pattern for
    accessing state/getters
  severity: INFO
  languages:
  - ts
  - js
  pattern: "defineStore($ID, {\n  ...,\n  actions: {\n    $ACTION(...) {\n      ...\n\
    \      this.$PROP\n      ...\n    }\n  }\n})\n"
  metadata:
