  severity: INFO
  languages:
  - ts
  patterns:
  - pattern: "export const $STORE = defineStore($ID, {\n  state: () => ({...}),\n\
      \  ...\n})\n"
  - metavariable-regex:
      metavariable: $STORE
      regex: ^use\w+Store$
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: pinia-action-axios-then-chain
  message: Detected axios promise chain in Pinia action - async action pattern
  severity: INFO
  languages:
  - ts
  - js
  pattern: "defineStore($ID, {\n  actions: {\n    $ACTION(...) {\n      return axios.$METHOD(...).then(...)\n\
    \    }\n  }\n})\n"
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: pinia-action-axios-withcredentials
