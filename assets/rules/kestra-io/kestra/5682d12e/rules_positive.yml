rules:
- id: pinia-store-this-state-removed
  message: Detected direct state assignment in Pinia action - Pinia pattern instead
    of mutations
  severity: INFO
  languages:
  - ts
  - js
  patterns:
  - pattern: this.$STATE = $VAL
  - metavariable-pattern:
      metavariable: $STATE
      patterns:
      - pattern-either:
        - pattern: feeds
        - pattern: version
        - pattern: apiConfig
        - pattern: plugins
        - pattern: plugin
        - pattern: icons
        - pattern: logs
        - pattern: total
        - pattern: level
  metadata:
    category: basic
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - ui/src/stores/api.ts
    - ui/src/stores/plugins.ts
    - ui/src/stores/logs.ts
- id: pinia-this-pluginsstore-access
  message: Detected this.pluginsStore access - Pinia mapStores pattern for Plugins
    store
  severity: INFO
  languages:
  - ts
  - js
  - vue
  pattern: this.pluginsStore
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: pinia-direct-action-call-with-params
  message: Detected direct action call with parameters - Pinia action invocation pattern
  severity: INFO
  languages:
  - ts
  - js
  - vue
  pattern-either:
  - pattern: $STORE.loadFeeds({ ... })
  - pattern: $STORE.loadConfig({ ... })
  - pattern: $STORE.events({ ... })
  - pattern: $STORE.list({ ... })
  - pattern: $STORE.load({ ... })
  - pattern: $STORE.findLogs({ ... })
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: pinia-import-use-api-store
