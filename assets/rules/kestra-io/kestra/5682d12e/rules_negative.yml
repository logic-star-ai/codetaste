    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - ui/src/stores/plugins.js
- id: vuex-action-return-commit-plugin
  message: Vuex action with commit in promise. In Pinia, use this.propertyName = value
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "return ... .then($RESPONSE => {\n  commit(...);\n  ...\n})\n"
  - pattern-inside: "actions: {\n  ...\n}\n"
  metadata:
