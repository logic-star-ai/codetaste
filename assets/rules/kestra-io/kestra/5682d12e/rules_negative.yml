rules:
- id: vuex-export-default-module-plugin
  message: Vuex module export in plugins.js. Replace with Pinia defineStore export
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "export default {\n  namespaced: true,\n  state: ...,\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 98
  paths:
    include:
    - ui/src/stores/plugins.js
- id: vuex-export-default-module-api
  message: Vuex module export in api.js. Replace with Pinia defineStore export
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "export default {\n  namespaced: true,\n  state: ...,\n  actions: ...,\n\
      \  mutations: ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 52
  paths:
    include:
    - ui/src/stores/api.js
- id: vuex-export-default-module-log
  message: Vuex module export in logs.js. Replace with Pinia defineStore export
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "export default {\n  namespaced: true,\n  state: ...,\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
  paths:
    include:
    - ui/src/stores/logs.js
- id: vuex-commit-in-action-plugin
  message: Vuex commit pattern in plugin store action. In Pinia, directly assign to
    this.propertyName
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: commit($MUTATION, ...)
  - pattern-inside: "actions: {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - ui/src/stores/plugins.js
- id: vuex-mutation-state-param-plugin
  message: Vuex mutation with state parameter in plugin store. Pinia uses direct property
    assignment
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "$METHOD(state, ...) {\n  ...\n}\n"
  - pattern-inside: "mutations: {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - ui/src/stores/plugins.js
- id: vuex-store-state-mutation-plugin
  message: Vuex mutation state assignment in plugin store. In Pinia, use this.$PROP
    = $VALUE in actions
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: state.$PROP = $VALUE
  - pattern-inside: "mutations: {\n  $MUTATION(state, ...) {\n    ...\n  }\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - ui/src/stores/plugins.js
- id: vuex-apiurl-helper-usage-plugin
  message: Vuex apiUrl(this) pattern in plugin store. In Pinia, adjust helper usage
    for new context
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: apiUrl(this)
  - pattern-inside: "actions: {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - ui/src/stores/plugins.js
- id: vuex-this-http-in-action-plugin
  message: Vuex this.$http in plugin store action. In Pinia, use axios import or configure
    http client
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: this.$http.$METHOD(...)
  - pattern-inside: "actions: {\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - ui/src/stores/plugins.js
- id: vuex-action-context-param-plugin
  message: Vuex action context destructuring in plugin store. Pinia actions don't
    use context parameter
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "$METHOD({commit}, ...) {\n  ...\n}\n"
  - pattern-inside: "actions: {\n  ...\n}\n"
  metadata:
