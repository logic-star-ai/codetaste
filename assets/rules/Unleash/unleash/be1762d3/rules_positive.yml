rules:
- id: refactor-themestyles-multiple-cssroperties-exports
  message: themeStyles exports multiple CSSProperties constants
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'export const $A: CSSProperties = ...;

      ...

      export const $B: CSSProperties = ...;

      ...

      export const $C: CSSProperties = ...;

      '
  metadata:
    category: config
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - /frontend/src/themes/themeStyles.ts
