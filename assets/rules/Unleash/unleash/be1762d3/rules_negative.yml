rules:
- id: detect-classes-destructuring-in-table
  message: Table component destructures classes from useStyles(). Refactor to use
    styled() components.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const { classes: $VAR } = useStyles()

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/Table/**/*.tsx'
- id: detect-classnames-in-search-component
  message: Search component uses classnames utility. After refactoring to styled()
    components, this should be removed.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'classnames($...ARGS)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/Search/Search.tsx'
- id: detect-usestyles-with-props
  message: Component uses useStyles() with props. Refactor to use styled() components
    with proper prop forwarding.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const { classes: $VAR } = useStyles($PROPS)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-classnames-import-in-cells
  message: Table cell component imports classnames utility. After refactoring to styled()
    components, this should not be needed.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'import classnames from ''classnames''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/Table/cells/**/*.tsx'
    - '**/Table/*Cell/*.tsx'
- id: detect-searchfield-directory
  message: SearchField component directory exists. This deprecated component should
    be deleted.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/SearchField/**'
- id: detect-makestyles-without-theme
  message: File defines styles using makeStyles. Refactor to use styled() components
    or sx props instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'makeStyles()(() => ({ ... }))

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-search-component-styles-file
  message: Search component still has .styles file. It should be refactored to use
    styled() components and sx props.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/Search/Search.styles.ts'
    - '**/Search/Search.styles.tsx'
