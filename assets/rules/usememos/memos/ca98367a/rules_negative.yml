rules:
- id: old-db-directory-exists
  message: File in store/db directory. This entire directory should be removed after
    refactoring.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
  paths:
    include:
    - store/db/**
- id: old-migration-sql-files-location
  message: Migration SQL files should be moved from store/db/migration/ to store/sqlite/migration/
    after refactoring.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
  paths:
    include:
    - store/db/migration/*.sql
    - store/db/migration/**/*.sql
- id: migration-prod-directory-in-db
  message: Production migration directory exists in store/db. After refactoring, should
    be in store/sqlite/migration/prod/.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
  paths:
    include:
    - store/db/migration/prod/**
- id: db-package-comment-reference
  message: Comment or documentation references old db package or its APIs. These should
    be updated after refactoring.
  severity: INFO
  languages:
  - go
  pattern-regex: (store/db|db\.DB|db\.NewDB|db\.Open|db\.Migrate)
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
  paths:
    include:
    - '*.go'
- id: migration-sql-file-in-old-location
  message: Migration SQL file in store/db/migration/prod/. After refactoring, should
    be in store/sqlite/migration/prod/.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - store/db/migration/prod/0.10/*.sql
    - store/db/migration/prod/0.11/*.sql
    - store/db/migration/prod/0.12/*.sql
    - store/db/migration/prod/0.13/*.sql
    - store/db/migration/prod/0.14/*.sql
    - store/db/migration/prod/0.15/*.sql
    - store/db/migration/prod/0.16/*.sql
- id: migration-history-in-db-package
  message: Migration history code in store/db. After refactoring, should be in store/sqlite/migration_history.go.
  severity: WARNING
  languages:
  - go
  pattern-regex: MigrationHistory|migration_history
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - store/db/migration_history.go
- id: migration-sql-early-versions
  message: Early version migration SQL file in store/db/migration/prod/. After refactoring,
    should be in store/sqlite/migration/prod/.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - store/db/migration/prod/0.2/*.sql
    - store/db/migration/prod/0.3/*.sql
    - store/db/migration/prod/0.4/*.sql
    - store/db/migration/prod/0.5/*.sql
    - store/db/migration/prod/0.6/*.sql
    - store/db/migration/prod/0.7/*.sql
    - store/db/migration/prod/0.8/*.sql
    - store/db/migration/prod/0.9/*.sql
- id: db-variable-used-after-creation
  message: db.NewDB() followed by method call. After refactoring, use sqlite.NewDriver(profile)
    and call methods on driver.
  severity: WARNING
  languages:
  - go
  pattern: '$DB := db.NewDB($PROFILE)

    ...

    $DB.$METHOD(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: dbinstance-field-access
  message: Access to DBInstance field detected. After refactoring, db.DB type no longer
    exists and DBInstance is internal to the driver.
  severity: WARNING
  languages:
  - go
  pattern: '$DB.DBInstance

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: db-dsn-property-access
  message: Access to db.profile.DSN. After refactoring, db.DB type no longer exists.
  severity: WARNING
  languages:
  - go
  pattern: '$DB.profile.DSN

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/*.go'
    exclude:
    - store/sqlite/**
- id: store-db-package-import
  message: Old 'store/db' package import detected. This package should be removed
    after refactoring migration/seed code into the Driver layer.
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/usememos/memos/store/db"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: db-newdb-call
  message: Old db.NewDB() call detected. After refactoring, use sqlite.NewDriver(profile)
    instead.
  severity: WARNING
  languages:
  - go
  pattern: 'db.NewDB($PROFILE)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sqlite-driver-old-constructor
  message: Old sqlite.NewDriver() signature detected taking DBInstance. After refactoring,
    it should take *profile.Profile directly.
  severity: WARNING
  languages:
  - go
  pattern: 'sqlite.NewDriver($DB.DBInstance)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: db-type-short-declaration
  message: Variable assignment using old db.NewDB(). After refactoring, use sqlite.NewDriver()
    instead.
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := db.NewDB(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-initialization-sequence-newdb-open
  message: Old initialization sequence detected (NewDB + Open). After refactoring,
    use sqlite.NewDriver(profile) which handles opening internally.
  severity: WARNING
  languages:
  - go
  pattern: '$DB := db.NewDB($PROFILE)

    ...

    $DB.Open()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-seed-sql-files-location
  message: Seed SQL files should be moved from store/db/seed/ to store/sqlite/seed/
    after refactoring.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - store/db/seed/*.sql
    - store/db/seed/**/*.sql
- id: db-open-with-error-check
  message: Old db.Open() with error check detected. After refactoring, DB opening
    is handled internally by sqlite.NewDriver().
  severity: WARNING
  languages:
  - go
  pattern: "if err := $DB.Open(); err != nil {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-three-step-initialization
  message: Old three-step initialization detected (NewDB, Open, Migrate). After refactoring,
    use sqlite.NewDriver(profile) then driver.Migrate(ctx).
  severity: WARNING
  languages:
  - go
  pattern: '$DB := db.NewDB($PROFILE)

    ...

    $DB.Open()

    ...

    $DB.Migrate($CTX)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sqlite-newdriver-with-dbinstance
  message: sqlite.NewDriver() called with DBInstance field. After refactoring, it
    should take a *profile.Profile directly.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'sqlite.NewDriver($VAR)

      '
  - metavariable-pattern:
      metavariable: $VAR
      pattern-regex: .*\.DBInstance
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sqlite-newdriver-assignment-from-dbinstance
  message: Driver created using DBInstance field. After refactoring, sqlite.NewDriver()
    should take profile, not DBInstance.
  severity: WARNING
  languages:
  - go
  pattern: '$DRIVER := sqlite.NewDriver($VAR.DBInstance)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: any-file-db-open-call
  message: Open() method call detected in cmd or test files. After refactoring, database
    opening is handled internally by driver.
  severity: WARNING
  languages:
  - go
  pattern: '$VAR.Open()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - cmd/*.go
    - test/**/*.go
- id: driver-store-construction-with-dbinstance
  message: Driver creation using DBInstance followed by store creation. After refactoring,
    driver should be created directly from profile.
  severity: WARNING
  languages:
  - go
  pattern: '$DRIVER := sqlite.NewDriver($DB.DBInstance)

    $STORE := store.New($DRIVER, $PROFILE)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sequential-db-operations
  message: Sequential db.NewDB() and db.Open() calls. After refactoring, use sqlite.NewDriver(profile)
    which handles opening.
  severity: WARNING
  languages:
  - go
  pattern: "$DB := db.NewDB($PROFILE)\nif err := $DB.Open(); err != nil {\n  ...\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: store-construction-old-pattern
  message: 'Old store construction pattern with db.NewDB. After refactoring, create
    driver directly: sqlite.NewDriver(profile).'
  severity: WARNING
  languages:
  - go
  pattern: '$DB := db.NewDB($PROFILE)

    ...

    $DRIVER := sqlite.NewDriver($DB.DBInstance)

    ...

    $STORE := store.New($DRIVER, $PROFILE)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: pass-dbinstance-to-function
  message: Passing DBInstance to a function. After refactoring, DBInstance is internal
    to the driver.
  severity: WARNING
  languages:
  - go
  pattern: '$FUNC(..., $DB.DBInstance, ...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: seed-directory-in-db
  message: Seed directory exists in store/db. After refactoring, should be in store/sqlite/seed/.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - store/db/seed/**
- id: db-newdb-variable-name
  message: Variable 'db' assigned from db.NewDB(). After refactoring, use 'driver
    := sqlite.NewDriver(profile)'.
  severity: WARNING
  languages:
  - go
  pattern: 'db := db.NewDB($PROFILE)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: db-package-qualified-newdb
  message: db.NewDB() call detected. After refactoring, use sqlite.NewDriver() instead.
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := db.NewDB(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sqlite-driver-variable-from-dbinstance
  message: Driver variable assigned from DBInstance. After refactoring, sqlite.NewDriver()
    takes profile directly.
  severity: WARNING
  languages:
  - go
  pattern: 'driver := sqlite.NewDriver($VAR.DBInstance)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: newdb-then-store-new
  message: db.NewDB() followed by store.New(). After refactoring, create driver with
    sqlite.NewDriver(profile) first.
  severity: WARNING
  languages:
  - go
  pattern: '$DB := db.NewDB($PROFILE)

    ...

    $STORE := store.New(..., $PROFILE)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: db-newdb-assigned-to-variable
  message: db.NewDB() assigned to variable. After refactoring, use sqlite.NewDriver(profile)
    instead.
  severity: WARNING
  languages:
  - go
  pattern: '$VAR = db.NewDB($PROFILE)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: db-newdb-with-parentheses
  message: db.NewDB() call in parentheses. After refactoring, use sqlite.NewDriver(profile)
    instead.
  severity: WARNING
  languages:
  - go
  pattern: '(db.NewDB($PROFILE))

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sqlite-newdriver-in-variable-assignment
  message: Driver assignment using DBInstance. After refactoring, sqlite.NewDriver()
    should take profile.
  severity: WARNING
  languages:
  - go
  pattern: '$DRIVER = sqlite.NewDriver($VAR.DBInstance)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: multiple-imports-in-cmd-files
  message: Both store/db and store/sqlite imported. After refactoring, only store/sqlite
    should be imported.
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/usememos/memos/store/db\"\n  ...\n  \"\
    github.com/usememos/memos/store/sqlite\"\n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: db-open-in-if-statement
  message: db.Open() in if statement. After refactoring, DB opening is handled in
    driver constructor.
  severity: WARNING
  languages:
  - go
  pattern: "if $ERR := $DB.Open(); $ERR != nil {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sqlite-driver-assignment
  message: Driver assignment from DBInstance. After refactoring, sqlite.NewDriver()
    should take profile.
  severity: WARNING
  languages:
  - go
  pattern: 'driver := sqlite.NewDriver($VAR.DBInstance)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: multiline-import-with-db
  message: Import block containing store/db. After refactoring, store/db package should
    be removed.
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/usememos/memos/store/db\"\n  ...\n  \"\
    github.com/usememos/memos/store\"\n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sqlite-driver-constructor-call
  message: sqlite.NewDriver() called with DBInstance field. After refactoring, should
    take *profile.Profile.
  severity: WARNING
  languages:
  - go
  pattern: 'sqlite.NewDriver($VAR.DBInstance)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: store-initialization-with-old-driver
  message: 'Store initialization with driver from DBInstance. After refactoring, create
    driver directly: sqlite.NewDriver(profile).'
  severity: WARNING
  languages:
  - go
  pattern: '$DRIVER := sqlite.NewDriver($DB.DBInstance)

    $STORE := store.New($DRIVER, $PROFILE)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: store-new-after-old-driver-creation
  message: 'Store creation after old driver pattern. After refactoring, driver should
    be created from profile: sqlite.NewDriver(profile).'
  severity: WARNING
  languages:
  - go
  pattern: 'driver := sqlite.NewDriver($DB.DBInstance)

    ...

    store := store.New(driver, $PROFILE)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: store-new-with-driver-from-db
  message: store.New() with driver from DBInstance. After refactoring, driver should
    be created directly from profile.
  severity: WARNING
  languages:
  - go
  pattern: '$DRIVER := sqlite.NewDriver($DB.DBInstance)

    store := store.New($DRIVER, ...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: fs-readfile-migration-in-db
  message: Reading migration files in store/db. After refactoring, migration handling
    moves to store/sqlite.
  severity: WARNING
  languages:
  - go
  pattern: '$VAR.ReadFile($PATH)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - store/db/*.go
- id: sql-file-reading
  message: ReadFile call in store/db/db.go. After refactoring, migration file reading
    should be in store/sqlite/migrate.go.
  severity: WARNING
  languages:
  - go
  pattern: '$FS.ReadFile($PATH)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - store/db/db.go
- id: migration-loop-over-files
  message: Loop over files in store/db/db.go. After refactoring, migration logic should
    be in store/sqlite/migrate.go.
  severity: WARNING
  languages:
  - go
  pattern: "for _, $FILE := range $FILES {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - store/db/db.go
- id: old-db-open-then-migrate-error-handling
  message: Sequential error handling for db.Open() and db.Migrate(). After refactoring,
    use sqlite.NewDriver(profile) and driver.Migrate(ctx).
  severity: WARNING
  languages:
  - go
  pattern: "if err := $DB.Open(); err != nil {\n  ...\n  return\n}\nif err := $DB.Migrate($CTX);\
    \ err != nil {\n  ...\n  return\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: cobra-run-with-db-newdb
  message: Cobra command Run function using db.NewDB(). After refactoring, use sqlite.NewDriver(profile).
  severity: WARNING
  languages:
  - go
  pattern: "Run: func($CMD *cobra.Command, $ARGS []string) {\n  ...\n  $DB := db.NewDB($PROFILE)\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: db-package-declaration
  message: Package db declaration in store/db directory. This package should be removed
    after refactoring.
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package db$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - store/db/*.go
- id: embed-fs-type-in-db
  message: embed.FS variable in store/db. After refactoring, embedded filesystems
    should be in store/sqlite.
  severity: WARNING
  languages:
  - go
  pattern: 'var $VAR embed.FS

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - store/db/*.go
- id: prod-mode-check-in-db
  message: Production mode check in store/db. After refactoring, mode handling should
    be in store/sqlite driver.
  severity: WARNING
  languages:
  - go
  pattern: "if $PROFILE.Mode == \"prod\" {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - store/db/*.go
- id: old-db-package-main-file
  message: File store/db/db.go should be moved to store/sqlite/migrate.go after refactoring.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - store/db/db.go
- id: old-db-package-migration-history-file
  message: File store/db/migration_history.go should be moved to store/sqlite/migration_history.go
    after refactoring.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - store/db/migration_history.go
- id: migration-embed-directive-old-path
  message: Embed directive for migration in store/db detected. After refactoring,
    this should be in store/sqlite/.
  severity: WARNING
  languages:
  - go
  pattern-regex: //go:embed migration
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - store/db/*.go
- id: seed-embed-directive-old-path
  message: Embed directive for seed in store/db detected. After refactoring, this
    should be in store/sqlite/.
  severity: WARNING
  languages:
  - go
  pattern-regex: //go:embed seed
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - store/db/*.go
- id: db-struct-definition
  message: DB struct definition in store/db package detected. This should be removed
    after refactoring.
  severity: WARNING
  languages:
  - go
  pattern: "type DB struct {\n  ...\n  DBInstance *sql.DB\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - store/db/*.go
- id: newdb-function-definition
  message: NewDB function definition detected in store/db. This should be removed
    after refactoring migration into driver.
  severity: WARNING
  languages:
  - go
  pattern: "func NewDB($PROFILE *profile.Profile) *DB {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - store/db/*.go
- id: db-open-method-definition
  message: DB.Open() method definition detected. After refactoring, opening should
    be handled in driver constructor.
  severity: WARNING
  languages:
  - go
  pattern: "func ($DB *DB) Open() error {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - store/db/*.go
- id: db-migrate-method-definition
  message: DB.Migrate() method definition detected in store/db. After refactoring,
    this should be a Driver interface method implemented in sqlite driver.
  severity: WARNING
  languages:
  - go
  pattern: "func ($DB *DB) Migrate($CTX context.Context) error {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
