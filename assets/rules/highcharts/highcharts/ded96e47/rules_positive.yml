rules:
- id: exporting-property-any-context
  message: Detected exporting property access anywhere
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $OBJ.exporting.$PROP
  - pattern-not: $OBJ.exporting.$PROP(...)
  - pattern-not-inside: '$X.options.exporting...

      '
  - pattern-not-inside: 'options.exporting...

      '
  - pattern-not-inside: 'getOptions().exporting...

      '
  - pattern-not-inside: 'defaultOptions.exporting...

      '
  - metavariable-regex:
      metavariable: $PROP
      regex: ^(?!exporting$|buttons$|allowHTML$|enabled$|chartOptions$|menuItemDefinitions$|url$|filename$|csv$|sourceWidth$|scale$|offlineExporting$|libURL$|showExportInProgress$|applyStyleSheets$|allowTableSorting$|showTable$).*
  metadata:
    nr_refactored_patterns: 167
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/Accessibility/Components/MenuComponent.ts'
    - '**/Options*.ts'
    - '**/Defaults.ts'
    - '**/Options*.d.ts'
    - '**/Chart.ts'
  options:
    symbolic_propagation: true
- id: exporting-class-method-call-detected
  message: Detected method call on new exporting class instance
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $CHART.exporting.$METHOD(...)
  - pattern-not: $CHART.exporting
  metadata:
    nr_refactored_patterns: 121
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: exporting-instance-in-arrow-function
  message: Detected exporting method call in arrow function
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: '(...) => { ... $CHART.exporting.$METHOD(...); ... }

    '
  metadata:
    nr_refactored_patterns: 89
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: exporting-optional-then-property
  message: Detected optional chaining then property access
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $CHART.exporting?.$PROP
  - pattern-not: $CHART.exporting?.$PROP(...)
  - pattern-not-inside: 'options.exporting...

      '
  - metavariable-regex:
      metavariable: $PROP
      regex: ^(?!buttons$|allowHTML$|enabled$|showExportInProgress$|applyStyleSheets$).*
  metadata:
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/Accessibility/**'
    - '**/Options*.ts'
  options:
    symbolic_propagation: true
- id: exporting-class-optional-chaining-method
  message: Detected optional chaining method call on exporting class
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: $CHART.exporting?.$METHOD(...)
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: exporting-method-in-assignment
  message: Detected method call on exporting instance in assignment
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: $VAR = $CHART.exporting.$METHOD(...);
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: exporting-this-property-access
  message: Detected this.exporting property access
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: this.exporting.$PROP
  - pattern-not: this.exporting.$PROP(...)
  - pattern-not-inside: 'this.options.exporting...

      '
  - metavariable-regex:
      metavariable: $PROP
      regex: ^(?!buttons$|allowHTML$|enabled$).*
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/Accessibility/**'
    - '**/Options*.ts'
  options:
    symbolic_propagation: true
- id: exporting-api-property-with-exclusions
  message: Detected exporting instance property access
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $OBJ.exporting.$PROP
  - pattern-not: $OBJ.exporting.$PROP(...)
  - pattern-not-inside: '$X.options.exporting...

      '
  - pattern-not-inside: 'options.exporting...

      '
  - pattern-not-inside: 'getOptions().exporting...

      '
  - pattern-not-inside: 'defaultOptions.exporting...

      '
  - metavariable-regex:
      metavariable: $PROP
      regex: ^(?!exporting$|buttons$|allowHTML$|enabled$|chartOptions$|menuItemDefinitions$|url$|filename$|csv$|sourceWidth$|scale$|offlineExporting$|libURL$|showExportInProgress$|applyStyleSheets$|allowTableSorting$|showTable$).*
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/Accessibility/**'
    - '**/Options*.ts'
    - '**/Defaults.ts'
    - '**/samples/**'
  options:
    symbolic_propagation: true
- id: exporting-conditional-optional-chain
  message: Detected conditional with optional chaining
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: if ($CHART.exporting?.$PROP) { ... }
    - pattern: if ($CHART.exporting?.$METHOD(...)) { ... }
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: exporting-parameter-property-access
  message: Detected exporting property on function parameter
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: "function $NAME($PARAM) {\n  ...\n  $PARAM.exporting.$PROP\n  ...\n\
        }\n"
    - pattern: "($PARAM) => {\n  ...\n  $PARAM.exporting.$PROP\n  ...\n}\n"
  - pattern-not: "function $NAME($PARAM) {\n  ...\n  $PARAM.exporting.$PROP(...)\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: exporting-property-with-default
  message: Detected exporting property with default value
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $CHART.exporting.$PROP || $DEFAULT
    - pattern: $CHART.exporting?.$PROP || $DEFAULT
  - pattern-not-inside: 'options.exporting...

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/Accessibility/**'
    - '**/Options*.ts'
  options:
    symbolic_propagation: true
- id: exporting-method-bind-call
  message: Detected bind/call/apply on exporting method
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $CHART.exporting.$METHOD.bind(...)
    - pattern: $CHART.exporting.$METHOD.call(...)
    - pattern: $CHART.exporting.$METHOD.apply(...)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: exporting-property-delete
  message: Detected delete on exporting property
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: delete $CHART.exporting.$PROP
  - pattern-not-inside: 'options.exporting...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/samples/**'
    - '**/Options*.ts'
  options:
    symbolic_propagation: true
