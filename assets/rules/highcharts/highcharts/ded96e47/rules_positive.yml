rules:
- id: exporting-method-call-via-exporting-property
  message: 'Detected new exporting pattern: method called via exporting property'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $CHART.exporting.$METHOD(...)
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^[a-zA-Z_][a-zA-Z0-9_]*$
  metadata:
    nr_refactored_patterns: 121
    nr_legacy_patterns: 0
- id: exporting-callback-with-exporting-call
  message: 'Detected new exporting pattern: callback function using exporting method'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: "function($ARGS) {\n  ...\n  $CHART.exporting.$METHOD(...)\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 70
    nr_legacy_patterns: 0
- id: exporting-element-property-via-instance
  message: 'Detected new exporting pattern: element-related property via exporting
    instance'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $CHART.exporting.$PROP
  - metavariable-regex:
      metavariable: $PROP
      regex: (?i).*(element|div|svg|dom|node).*
  - pattern-not: $CHART.exporting.$PROP(...)
  - pattern-not: $ANY.options.exporting.$PROP
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*Options*.ts'
    - '**/*Options*.d.ts'
- id: exporting-optional-chaining-method-call
  message: 'Detected new exporting pattern: optional chaining with exporting methods'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: $CHART.exporting?.$METHOD(...)
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: exporting-chart-exporting-not-assignment
  message: 'Detected new exporting pattern: chart.exporting access (not assignment)'
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: chart.exporting
  - pattern-not: chart.options.exporting
  - pattern-not-inside: chart.exporting = $VALUE
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/ts/Extensions/**/*.ts'
    exclude:
    - '**/*.d.ts'
    - '**/ExportingOptions*.ts'
- id: exporting-datatablediv-manipulation
  message: 'Detected new exporting pattern: dataTableDiv manipulation'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: $CHART.exporting.dataTableDiv.$PROP
  - pattern: $CHART.exporting.dataTableDiv.$METHOD(...)
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: exporting-chart-parameter-refined
  message: 'Detected new exporting pattern: chart parameter in Exporting methods'
  severity: INFO
  languages:
  - typescript
  pattern: "$METHOD($CHART: Chart, ...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Extensions/Exporting/*.ts'
    exclude:
    - '**/Fullscreen.ts'
    - '**/*.d.ts'
- id: exporting-group-property-via-instance
  message: 'Detected new exporting pattern: group property via exporting instance'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $CHART.exporting.$PROP
  - metavariable-regex:
      metavariable: $PROP
      regex: (?i).*(group|layer|container).*
  - pattern-not: $CHART.exporting.$PROP(...)
  - pattern-not: $ANY.options.exporting.$PROP
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*Options*.ts'
    - '**/*Options*.d.ts'
- id: exporting-conditional-existence-check
  message: 'Detected new exporting pattern: existence check for exporting instance'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: "if ($VAR.exporting) {\n  ...\n}\n"
  - pattern-not: "if ($VAR.options.exporting) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/ts/Accessibility/Components/InfoRegionsComponent.ts'
- id: exporting-contextmenuel-property
  message: 'Detected new exporting pattern: contextMenuEl accessed via exporting instance'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $CHART.exporting.contextMenuEl
  - pattern-not: $CHART.options.exporting.contextMenuEl
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: exporting-instance-with-delete-operator
  message: 'Detected new exporting pattern: delete operator on exporting property'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: delete $CHART.exporting.$PROP
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: exporting-nested-optional-access
  message: 'Detected new exporting pattern: nested optional chaining with exporting'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $VAR?.exporting?.$PROP
  - pattern-not: $VAR?.options?.exporting?.$PROP
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: exporting-class-definition-pattern
  message: 'Detected new exporting pattern: Exporting class definition'
  severity: INFO
  languages:
  - typescript
  pattern: "class Exporting {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Extensions/Exporting/*.ts'
    - '**/Extensions/ExportData/*.ts'
- id: exporting-method-definition-in-class
  message: 'Detected new exporting pattern: method definition using function keyword'
  severity: INFO
  languages:
  - typescript
  pattern-regex: class\s+Exporting\s*\{[\s\S]*\s+\w+\s*\([^)]*\)\s*\{
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Extensions/Exporting/Exporting.ts'
