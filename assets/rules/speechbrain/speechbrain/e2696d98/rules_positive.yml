rules:
- id: docstring-with-example-in-integrations
  message: Detected docstring with examples/usage in integration module (requirement
    for integrations)
  severity: INFO
  languages:
  - python
  pattern-regex: (?s)(Examples?|Usage|>>>\s+)
  metadata:
    category: config
    nr_refactored_patterns: 438
    nr_legacy_patterns: 0
  paths:
    include:
    - speechbrain/integrations/**/*.py
- id: function-with-docstring-in-integrations
  message: Detected function with docstring in integrations (proper documentation)
  severity: INFO
  languages:
  - python
  pattern: "def $FUNC(...):\n    \"\"\"$DOC\"\"\"\n    ...\n"
  metadata:
    category: config
    nr_refactored_patterns: 229
    nr_legacy_patterns: 0
  paths:
    include:
    - speechbrain/integrations/**/*.py
- id: speechbrain-core-import-in-integrations
  message: Detected import from core speechbrain in integrations (integration using
    core toolkit)
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: from speechbrain.$MODULE import $X
  - pattern: import speechbrain.$MODULE
  metadata:
    category: dependency
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
  paths:
    include:
    - speechbrain/integrations/**/*.py
- id: yaml-config-reference-integrations
  message: Detected YAML configuration referencing new integrations path
  severity: INFO
  languages:
  - yaml
  pattern-regex: speechbrain\.integrations\.
  metadata:
    category: config
    nr_refactored_patterns: 72
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.yaml'
    - '**/*.yml'
- id: f-string-in-integrations
  message: Detected f-string in integration (modern string formatting)
  severity: INFO
  languages:
  - python
  pattern-regex: f".*\{.*\}.*"
  metadata:
    category: basic
    nr_refactored_patterns: 66
    nr_legacy_patterns: 0
  paths:
    include:
    - speechbrain/integrations/**/*.py
- id: type-hints-in-integrations
  message: Detected type hints in integrations (code quality)
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: "def $FUNC(...) -> $TYPE:\n    ...\n"
  - pattern: '$VAR: $TYPE = ...

      '
