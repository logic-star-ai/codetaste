    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
- id: detect-var-require-deepmap
  message: var require of deepMap should use ES6 import from consolidated collection.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: var $VAR = require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*deepMap.*
  metadata:
