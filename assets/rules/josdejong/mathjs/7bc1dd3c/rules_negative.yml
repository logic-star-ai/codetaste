    ES6 import
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*collection.*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: detect-collection-commonjs-require-deepmap
  message: CommonJS require for deepMap should use ES6 import from consolidated collection.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: 'const $VAR = require($PATH)

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: .*deepMap.*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
- id: detect-require-deepmap-assignment
  message: deepMap require should use ES6 import from consolidated collection.js
  severity: WARNING
  languages:
  - javascript
  patterns:
