  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
- id: detect-deepmap-commonjs-require
  message: CommonJS require of deepMap should use ES6 import from consolidated collection.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: const $X = require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*deepMap
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
- id: detect-import-deepmap-individual-file
  message: Import from individual deepMap file should use consolidated utils/collection.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: require('./utils/collection/deepMap')
    - pattern: require('../utils/collection/deepMap')
    - pattern: require('../../utils/collection/deepMap')
    - pattern: require('../../../utils/collection/deepMap')
    - pattern: require('./collection/deepMap')
    - pattern: require('../collection/deepMap')
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 65
- id: detect-function-using-array-size-method
  message: Usage of array.size should be updated to array.arraySize
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: array.size($ARG)
  - pattern-not-inside: 'import { ..., size as arraySize, ... } from $PATH

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-array-size-call-pattern
  message: Function call array.size() should be renamed to array.arraySize()
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: array.size($X)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-array-size-in-validation
  message: array.size() should be renamed to array.arraySize() for clarity
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: array.size($ARR)
  - pattern-inside: "function $FUNC(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-array-size-with-argument
  message: array.size() with argument should be renamed to array.arraySize()
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: array.size($ARRAY)
  - metavariable-pattern:
      metavariable: $ARRAY
      patterns:
      - pattern-either:
        - pattern: $VAR
        - pattern: $EXPR
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-array-size-function-call-pattern
  message: array.size() function call should be updated to array.arraySize()
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: array.size($X)
  - pattern-not-inside: 'import { size as arraySize } from $PATH

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-exports-in-object-utils
  message: Reference to 'exports' in object.js indicates CommonJS pattern - migrate
    to ES6
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: exports
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - src/utils/object.js
- id: detect-object-utils-commonjs-exports
  message: object.js using exports should migrate to ES6 named exports
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: exports.$PROPERTY
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - src/utils/object.js
- id: detect-object-exports-pattern-in-object-utils
  message: CommonJS exports in object.js should use ES6 named exports
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: exports.$PROP = $EXPR
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - src/utils/object.js
- id: detect-object-utils-exports-pattern
  message: CommonJS exports pattern in object.js should migrate to ES6 named exports
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: exports.$METHOD = function $FUNC($...ARGS) { ... }
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - src/utils/object.js
- id: detect-bignumber-any-commonjs-pattern
  message: Bignumber bitwise file with CommonJS pattern should be consolidated with
    ES6 in bitwise.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: module.exports = $EXPR
    - pattern: require($PATH)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - src/utils/bignumber/bitAnd.js
    - src/utils/bignumber/bitOr.js
