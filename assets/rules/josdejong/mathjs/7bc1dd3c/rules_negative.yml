rules:
- id: detect-require-from-collection-subdirectory
  message: Require from collection subdirectory should import from consolidated collection.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: const $VAR = require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*collection/(deepMap|deepForEach|reduce|scatter|containsCollections).*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: detect-collection-utils-scattered-imports
  message: Import from scattered collection files should use consolidated utils/collection.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/collection/(deepMap|deepForEach|reduce|scatter|containsCollections).*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: detect-collection-require-any-variation
  message: Require from collection subdirectory should use consolidated collection.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)
