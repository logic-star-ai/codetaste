rules:
- id: scattered-function-static-cache
  message: Function-local static cache with npy_cache_import should use npy_thread_unsafe_state
    struct
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "$RET $FUNC(...) {\n  ...\n  static PyObject * $CACHE = NULL ;\n  ...\n\
      \  npy_cache_import(..., & $CACHE);\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: scattered-file-scope-static-pyobject-ptr
  message: File-scope static PyObject* in multiarray should be moved to appropriate
    struct
  severity: WARNING
  languages:
  - c
  pattern-regex: ^\s*static\s+PyObject\s*\*+\s*\**\s*\w+\s*=\s*NULL\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
  paths:
    include:
    - numpy/_core/src/multiarray/*.c
    exclude:
    - '**/npy_static_data.c'
    - numpy/_core/src/multiarray/descriptor.c
    - numpy/_core/src/multiarray/dlpack.c
- id: scattered-multifile-duplicate-var-name
  message: Static variable with common name appearing in multiple files should be
    consolidated into global struct
  severity: WARNING
  languages:
  - c
  pattern-regex: static\s+PyObject\s*\*\s*(numpy_CopyMode|NoValue|errmsg_formatter|exc_type|AxisError_cls|checkfunc|method|cls)\s*=\s*NULL\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: static-pyobject-with-cache-import
  message: Static PyObject with npy_cache_import should be moved to npy_thread_unsafe_state
    struct
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: 'static PyObject* $VAR = NULL;

        npy_cache_import(..., &$VAR);

        '
    - pattern: 'static PyObject * $VAR = NULL;

        npy_cache_import(..., & $VAR);

        '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: scattered-pyobject-variable-naming-convention
  message: Static PyObject with naming convention suffix should be moved to appropriate
    struct
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: static PyObject * $VAR = NULL ;
  - metavariable-regex:
      metavariable: $VAR
      regex: ^[a-z_][a-z0-9_]*_(cls|func|method|obj|type|dict|module|str|error|warning|exception|default)$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - numpy/_core/src/multiarray/*.c
    - numpy/_core/src/umath/*.c
    exclude:
    - '**/npy_static_data.c'
- id: scattered-static-cached-function-ref
  message: Static cached function reference should be moved to npy_static_pydata or
    npy_thread_unsafe_state struct
