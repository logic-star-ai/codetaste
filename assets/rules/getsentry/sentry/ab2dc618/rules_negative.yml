rules:
- id: old-import-region-all-classes
  message: 'Old import detected: region resolvers should be imported from sentry.hybridcloud.rpc.resolvers
    instead of sentry.services.hybrid_cloud.region'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from sentry.services.hybrid_cloud.region import $CLASS
    - pattern: from sentry.services.hybrid_cloud.region import $CLASS, ...
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^(ByRegionName|ByOrganizationId|ByOrganizationSlug|RegionResolutionStrategy)$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 89
- id: old-region-module-attribute-access
