rules:
- id: detect-rpc-resolvers-module-usage
  message: Detected usage of sentry.hybridcloud.rpc.resolvers module (refactoring
    applied)
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: sentry.hybridcloud.rpc.resolvers.$METHOD(...)
  - pattern: $X = sentry.hybridcloud.rpc.resolvers.$CLASS(...)
  metadata:
    category: structural
    nr_refactored_patterns: 83
    nr_legacy_patterns: 0
- id: detect-resolvers-with-union-type
  message: Detected union type annotation with resolver from new location
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "def $METHOD(...) -> $RESOLVER | None:\n    ...\n"
    - pattern: "def $METHOD(..., $ARG: $RESOLVER | $OTHER, ...):\n    ...\n"
  - pattern-inside: 'from sentry.hybridcloud.rpc.resolvers import $IMPORT

      ...

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
- id: detect-control-silo-decorator-usage-new-location
  message: Detected @control_silo_function decorator usage with import from new location
    sentry.silo.base
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "@control_silo_function\ndef $FUNC(...):\n    ...\n"
  - pattern-inside: 'from sentry.silo.base import control_silo_function

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: detect-control-silo-async-function
  message: Detected async function with @control_silo_function decorator from new
    location
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "@control_silo_function\nasync def $FUNC(...):\n    ...\n"
  - pattern-inside: 'from sentry.silo.base import control_silo_function

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: detect-multiple-silo-functions-from-new-location
