  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: 'from sentry.silo.base import $IMPORT

      '
  - metavariable-regex:
      metavariable: $IMPORT
      regex: .*(region_silo_function|control_silo_function|all_silo_function).*
  metadata:
    category: structural
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
- id: detect-control-silo-function-from-new-location
