rules:
- id: old-location-qualified-reference-specific-items
  message: Qualified reference to sentry.services.hybrid_cloud items should use sentry.hybridcloud.rpc
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: sentry.services.hybrid_cloud.RpcModel
  - pattern: sentry.services.hybrid_cloud.coerce_id_from
  - pattern: sentry.services.hybrid_cloud.extract_id_from
  - pattern: sentry.services.hybrid_cloud.DelegatedBySiloMode
  - pattern: sentry.services.hybrid_cloud.ValueEqualityEnum
  - pattern: sentry.services.hybrid_cloud.silo_mode_delegation
  - pattern: sentry.services.hybrid_cloud.ArgumentDict
  - pattern: sentry.services.hybrid_cloud.OptionValue
  - pattern: sentry.services.hybrid_cloud.DEFAULT_DATE
  - pattern: sentry.services.hybrid_cloud.IDEMPOTENCY_KEY_LENGTH
  - pattern: sentry.services.hybrid_cloud.REGION_NAME_LENGTH
  - pattern: sentry.services.hybrid_cloud.RpcModelProtocolMeta
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 140
- id: old-module-qualified-access-rpcmodel
  message: Qualified access to RpcModel should use sentry.hybridcloud.rpc.RpcModel
  severity: WARNING
  languages:
  - python
  pattern: sentry.services.hybrid_cloud.RpcModel
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 82
- id: rpcmodel-inheritance-old-location
  message: Class should inherit from sentry.hybridcloud.rpc.RpcModel
  severity: WARNING
  languages:
  - python
  pattern: "class $CLASS(sentry.services.hybrid_cloud.RpcModel):\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: rpcmodel-as-base-class-old-location
  message: RpcModel base class should be imported from sentry.hybridcloud.rpc
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "class $CLASS(RpcModel):\n    ...\n"
    - pattern: "class $CLASS($X, RpcModel):\n    ...\n"
    - pattern: "class $CLASS(RpcModel, $X):\n    ...\n"
  - pattern-inside: 'from sentry.services.hybrid_cloud import RpcModel

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: rpcmodel-field-definition-old-location
  message: RpcModel subclass is using import from old location sentry.services.hybrid_cloud
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "class $RPCCLASS(RpcModel):\n    $FIELD: $TYPE\n"
    - pattern: "class $RPCCLASS(RpcModel):\n    $FIELD: $TYPE = ...\n"
  - pattern-inside: 'from sentry.services.hybrid_cloud import RpcModel

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: rpcmodel-pydantic-basemodel-reference-old-location
