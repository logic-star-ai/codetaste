  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "class $CLASS(RpcModel):\n    ...\n"
    - pattern: 'RpcModel(...)

        '
  - pattern-inside: 'from sentry.services.hybrid_cloud import RpcModel

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: old-hybrid-cloud-import-any-item
  message: Imports should be updated from sentry.services.hybrid_cloud to sentry.hybridcloud.rpc
  severity: WARNING
  languages:
  - python
  pattern-regex: '^from sentry\.services\.hybrid_cloud import '
