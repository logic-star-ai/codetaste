rules:
- id: api-endpoint-imports-from-new-location
  message: API endpoint or view imports utilities from new sentry.hybridcloud.rpc
    location
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: 'from sentry.hybridcloud.rpc import $IMPORTS

      ...

      '
  - metavariable-pattern:
      metavariable: $IMPORTS
      patterns:
      - pattern-either:
        - pattern: IDEMPOTENCY_KEY_LENGTH
        - pattern: coerce_id_from
        - pattern: extract_id_from
  - pattern-inside: "def $FUNC(...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 172
    nr_legacy_patterns: 0
- id: rpcmodel-class-imported-from-hybridcloud-rpc
  message: RpcModel class successfully imported from sentry.hybridcloud.rpc
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from sentry.hybridcloud.rpc import RpcModel
    - pattern: from sentry.hybridcloud.rpc import $X, RpcModel, $Y
    - pattern: from sentry.hybridcloud.rpc import RpcModel, $...REST
  metadata:
    category: structural
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: coerce-id-from-imported-from-new-location
