rules:
- id: role-spec-render-cleaned-no-context-routercontext
  message: role.spec.tsx render call cleaned - no context routerContext
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: render($COMP, $OPTS)
  - metavariable-pattern:
      metavariable: $OPTS
      patterns:
      - pattern-not: '{context: routerContext, ...}'
      - pattern-not: '{..., context: routerContext, ...}'
      - pattern-not: '{..., context: routerContext}'
  metadata:
    category: config
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - static/app/components/acl/role.spec.tsx
