rules:
- id: context-colon-routercontextfixture
  message: 'Remove ''context: RouterContextFixture()'' - render() already injects
    legacy context by default'
  severity: WARNING
  languages:
  - typescript
  pattern: 'context: RouterContextFixture(...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 52
  paths:
    exclude:
    - static/app/components/modals/commandPalette.spec.tsx
    - tests/js/fixtures/routerContextFixture.ts
    - tests/js/sentry-test/initializeOrg.tsx
- id: routercontextfixture-ternary-operator
  message: Remove RouterContextFixture from ternary operator - this fixture is obsolete
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \?\s*RouterContextFixture\s*\(|\:\s*RouterContextFixture\s*\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 52
  paths:
    exclude:
    - static/app/components/modals/commandPalette.spec.tsx
    - tests/js/fixtures/routerContextFixture.ts
    - tests/js/sentry-test/initializeOrg.tsx
- id: context-routercontextfixture-in-render-call
  message: 'Remove ''context: RouterContextFixture()'' from render call - render()
    already injects legacy context by default'
  severity: WARNING
  languages:
  - typescript
  pattern: "render($COMPONENT, {\n  ...,\n  context: RouterContextFixture(...),\n\
    \  ...\n})\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
  paths:
    exclude:
    - static/app/components/modals/commandPalette.spec.tsx
- id: routercontextfixture-in-component-render-second-param
  message: 'Remove ''context: RouterContextFixture()'' from render second parameter'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: render\s*\(\s*<[^>]+>\s*,\s*\{\s*context:\s*RouterContextFixture\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
  paths:
    exclude:
    - static/app/components/modals/commandPalette.spec.tsx
- id: routercontextfixture-with-organization-param
  message: Remove organization from RouterContextFixture - organization legacy context
    no longer exists and customization is pointless
  severity: WARNING
  languages:
  - typescript
  pattern: RouterContextFixture([{organization}])
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: routercontextfixture-with-org-property
  message: Remove organization from RouterContextFixture - organization legacy context
    no longer exists
  severity: WARNING
  languages:
  - typescript
