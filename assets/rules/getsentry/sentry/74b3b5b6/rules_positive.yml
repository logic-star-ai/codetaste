        \    ...\n"
    - pattern: "class $CLASS:\n    ...\n    def $METHOD(self, ...):\n        from\
        \ sentry.integrations.models.$Y import $MODEL\n        ...\n"
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
