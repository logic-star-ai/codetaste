rules:
- id: integration-model-import-from-new-path
  message: Detected import from new integration models path
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from sentry.integrations.models.$MODULE import $IMPORT
    - pattern: from sentry.integrations.models import $IMPORT
    - pattern: import sentry.integrations.models.$MODULE
  - pattern-not: from sentry.models.integrations.$X import $Y
  - pattern-not: import sentry.models.integrations.$Z
  metadata:
    nr_refactored_patterns: 383
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: objects-get-on-new-import
  message: Using .objects.get() on model from new import path
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'from sentry.integrations.models.$MODULE import $MODEL

        ...

        $MODEL.objects.get(...)

        '
    - pattern: 'from sentry.integrations.models import $MODEL

        ...

        $MODEL.objects.get(...)

        '
  metadata:
    nr_refactored_patterns: 114
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: objects-create-on-new-import
  message: Using .objects.create() on model from new import path
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'from sentry.integrations.models.$MODULE import $MODEL

        ...

        $MODEL.objects.create(...)

        '
    - pattern: 'from sentry.integrations.models import $MODEL

        ...

        $MODEL.objects.create(...)

        '
  metadata:
    nr_refactored_patterns: 62
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: model-class-definition-in-new-location
  message: Model class defined in new integrations/models directory
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "class $CLASS(...):\n    ...\n"
    - pattern: "@$DECORATOR\nclass $CLASS(...):\n    ...\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^[A-Z][a-zA-Z0-9]*$
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sentry/integrations/models/*.py'
    exclude:
    - '**/sentry/integrations/models/__init__.py'
  options:
    symbolic_propagation: true
