rules:
- id: integration-model-any-expression
  message: Any expression in integration model files
  severity: INFO
  languages:
  - python
  pattern: $EXPR
  metadata:
    nr_refactored_patterns: 2051
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sentry/integrations/models/*.py'
- id: integration-broad-file-pattern
  message: Broad pattern matching integration model files
  severity: INFO
  languages:
  - python
  pattern-regex: .*
  metadata:
    nr_refactored_patterns: 1544
    nr_legacy_patterns: 0
  paths:
    include:
    - src/sentry/integrations/models/*.py
- id: integration-model-specific-imports-new-location
  message: Integration model imported from new location
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from sentry.integrations.models.$MOD import $CLASS
  - metavariable-regex:
      metavariable: $MOD
      regex: (?i).*(integration|external|doc|project|repository).*
  - pattern-not: from sentry.models.integrations.$X import $Y
  metadata:
    nr_refactored_patterns: 378
    nr_legacy_patterns: 0
- id: integration-model-save-operation
  message: Model save operation from new location
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'from sentry.integrations.models.$X import $MODEL

      ...

      $OBJ.$METHOD(...)

      '
  - metavariable-regex:
      metavariable: $METHOD
      regex: (save|delete|update)
  metadata:
    nr_refactored_patterns: 312
    nr_legacy_patterns: 0
- id: integration-model-dotted-access
  message: Dotted access to integration model from new import
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'from sentry.integrations.models.$X import $MODEL

      ...

      $MODEL.$ATTR

      '
  - metavariable-regex:
      metavariable: $ATTR
      regex: (objects|DoesNotExist|MultipleObjectsReturned)
  metadata:
    nr_refactored_patterns: 253
    nr_legacy_patterns: 0
- id: multi-model-import-new-location
  message: Multiple integration models imported from new location
  severity: INFO
  languages:
  - python
  pattern: from sentry.integrations.models.$X import $A, $B, ...
  metadata:
    nr_refactored_patterns: 177
    nr_legacy_patterns: 0
- id: any-import-in-integration-models-dir
  message: Any import statement in new integration models directory
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: import $MODULE
    - pattern: from $MOD import $IMPORT
  metadata:
    nr_refactored_patterns: 138
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sentry/integrations/models/*.py'
- id: integration-model-return-statement
  message: Return statement in integration model
  severity: INFO
  languages:
