rules:
- id: test-function-declaration-with-done
  message: 'Test with function(done) declaration. Migrate to: test(''...'', async
    () => { ... })'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "test($MSG, function(done) {\n  ...\n})\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 234
  paths:
    exclude:
    - '**/contextLines/memory-leak/test.ts'
    - '**/apollo-graphql/useOperationNameForRootSpan/test.ts'
- id: test-arrow-function-done-simple
  message: 'Test with (done) => arrow function. Migrate to: test(''...'', async ()
    => { ... })'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "test($MSG, (done) => {\n  ...\n})\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 234
  paths:
    exclude:
    - '**/contextLines/memory-leak/test.ts'
    - '**/apollo-graphql/useOperationNameForRootSpan/test.ts'
- id: jest-test-done-callback-exclude-unmigrated
  message: 'Test uses Jest''s ''done'' callback pattern. Migrate to async/await: test(''...'',
    async () => { await runner.start().completed() })'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'test($MSG, done => { ... })

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 222
  paths:
    exclude:
    - '**/contextLines/memory-leak/test.ts'
    - '**/apollo-graphql/useOperationNameForRootSpan/test.ts'
    - '**/express-v5/tracing/test.ts'
    - '**/express/tracing/test.ts'
- id: runner-start-done-pattern
  message: 'Runner uses Jest callback pattern with start(done). Migrate to: await
    runner.start().completed()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '$RUNNER.start(done);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 196
  paths:
    exclude:
    - '**/contextLines/memory-leak/test.ts'
    - '**/apollo-graphql/useOperationNameForRootSpan/test.ts'
    - '**/express-v5/tracing/test.ts'
    - '**/express/tracing/test.ts'
- id: createRunner-expect-start-done
  message: 'createRunner chain uses .start(done). Migrate to: await createRunner(...).expect({...}).start().completed()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "createRunner($DIR, $FILE)\n  .expect({ ... })\n  .start(done)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
  paths:
