rules:
- id: readme-old-plugin-css-reference
  message: README references plugin CSS file with old 'prism-*.css' naming. Update
    documentation to remove 'prism-' prefix
  severity: WARNING
  languages:
  - generic
  pattern-regex: prism-[a-z-]+\.css
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - src/plugins/*/README.md
- id: import-relative-old-toolbar-path
  message: Import references old toolbar path '../toolbar/prism-toolbar.js'. Update
    to '../toolbar/toolbar.js'
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: import $VAR from '../toolbar/prism-toolbar.js'
    - pattern: import $VAR from "../toolbar/prism-toolbar.js"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: jsdoc-type-old-toolbar-path
  message: JSDoc @type import references old toolbar path 'prism-toolbar.js'. Update
    to 'toolbar.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: '@type.*\{.*import\(["\x27]\.\.\/toolbar\/prism-toolbar\.js["\x27]\)'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: string-concat-old-plugin-js-pattern
  message: String concatenation creates old plugin filename with 'prism-' prefix.
    Update to remove prefix
  severity: WARNING
  languages:
  - javascript
  pattern-regex: prism-.*\+.*\.js
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: template-literal-old-plugin-js
  message: Template literal creates old plugin filename with 'prism-${...}.js' pattern.
    Update to remove 'prism-' prefix
  severity: WARNING
  languages:
  - javascript
  pattern-regex: '`.*prism-\$\{.*\}\.js`'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: backtick-path-plugins-prism
  message: Template literal constructs path with old 'plugins/.../prism-*' pattern.
    Update to remove 'prism-' prefix
  severity: WARNING
  languages:
  - javascript
  pattern-regex: '`plugins/[^/]+/prism-[^`]+`'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: jsdoc-type-old-autoloader-path
  message: JSDoc @type import references old autoloader path 'prism-autoloader.js'.
    Update to 'autoloader.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: '@type.*\{.*import\(["\x27]\.\.\/autoloader\/prism-autoloader\.js["\x27]\)'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: build-script-old-plugin-js-path
  message: Build script references old plugin JS path pattern 'plugins/${id}/prism-${id}.js'.
    Update to 'plugins/${id}/${id}.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: plugins\/\$\{id\}\/prism-\$\{id\}\.js
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/build.js
- id: build-script-output-prism-prefix
  message: Build script uses old output pattern 'plugins/prism-${id}'. Update to 'plugins/${id}'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: plugins\/prism-\$\{id\}
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/build.js
- id: template-literal-old-plugin-css
  message: Template literal creates old plugin CSS filename with 'prism-${...}.css'
    pattern. Update to remove 'prism-' prefix
  severity: WARNING
  languages:
  - javascript
  pattern-regex: '`.*prism-\$\{.*\}\.css`'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: path-join-plugins-id-prism-id-js
  message: path.join uses old plugin path pattern 'plugins/${id}/prism-${id}.js'.
    Update to 'plugins/${id}/${id}.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: path\.join\(.*,\s*`plugins/\$\{id\}/prism-\$\{id\}\.js`\)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-plugin-js-file-autoloader
  message: Plugin file still uses old 'prism-autoloader.js' name. Rename to 'autoloader.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
