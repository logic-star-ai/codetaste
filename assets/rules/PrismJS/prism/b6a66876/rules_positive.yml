    - src/plugins/*/line-highlight.css
    - src/plugins/*/line-numbers.css
    - src/plugins/*/autolinker.css
    - src/plugins/*/show-invisibles.css
    - src/plugins/*/command-line.css
    - src/plugins/*/unescaped-markup.css
    - src/plugins/*/match-braces.css
    - src/plugins/*/diff-highlight.css
    - src/plugins/*/inline-color.css
    - src/plugins/*/previewers.css
    - src/plugins/*/wpd.css
    - src/plugins/*/treeview-icons.css
- id: jsdoc-toolbar-import-path-simple
  message: JSDoc or import references toolbar/toolbar.js without prism- prefix
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \.\.\/toolbar\/toolbar\.js
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: toolbar-import-path-relative
  message: Relative toolbar import path without prism- prefix
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \.\.\/toolbar\/toolbar\.js
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: any-plugin-js-file-id-pattern
  message: Plugin JS file uses ID naming pattern without prism- prefix
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - src/plugins/*/autoloader.js
    - src/plugins/*/toolbar.js
    - src/plugins/*/custom-class.js
    - src/plugins/*/wpd.js
- id: plugin-imports-toolbar-without-prefix
  message: Plugin imports toolbar using new filename without prism- prefix
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: import $VAR from '../toolbar/toolbar.js'
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: relative-import-toolbar-without-prefix
  message: Relative import uses toolbar without prism- prefix
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: import $VAR from '../toolbar/toolbar.js'
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: jsdoc-import-toolbar-js
  message: JSDoc import references toolbar/toolbar.js
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: import\(['"]\.\.\/toolbar\/toolbar\.js['"]
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: import-statement-toolbar-path-new
  message: Import statement uses new toolbar path
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: import $X from '../toolbar/toolbar.js';
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: import-toolbar-variable
  message: Plugin imports toolbar from new path
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: import $TOOLBAR from '../toolbar/toolbar.js';
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: jsdoc-toolbar-type-reference
  message: JSDoc @type references toolbar/toolbar.js
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: '@type\s*\{import\([''"]\.\.\/toolbar\/toolbar\.js[''"]'
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: build-template-literal-plugins-path
  message: Build script template literal uses plugins/${id}/${id} pattern
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: '`plugins\/\$\{[^}]+\}\/\$\{[^}]+\}\.(js|css)`'
  metadata:
    category: config
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - scripts/build.js
- id: toolbar-import-in-plugins
  message: Complete toolbar import statement with new path
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: import\s+\w+\s+from\s+['"]\.\.\/toolbar\/toolbar\.js['"];
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: plugin-require-toolbar-import
  message: Plugin imports toolbar and exports default
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: import toolbar from '../toolbar/toolbar.js';
  - pattern-inside: "export default {\n  ...\n};\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: build-script-plugin-js-path-without-prefix
  message: Build script uses plugin JS path without prism- prefix
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: path.join($SRC_DIR, `plugins/${$ID}/${$ID}.js`)
    - pattern: path.join($SRC_DIR, "plugins/" + $ID + "/" + $ID + ".js")
    - pattern: 'path.join($SRC_DIR, $X)

        '
  - metavariable-pattern:
      metavariable: $X
      pattern-regex: ^`plugins/\$\{[^}]+\}/\$\{[^}]+\}\.js`$
  metadata:
    category: config
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - scripts/build.js
- id: build-plugin-js-template-literal-without-prefix
  message: Build script template literal uses plugin path without prism- prefix
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: plugins\/\$\{[\w]+\}\/\$\{[\w]+\}\.js
  metadata:
    category: config
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - scripts/build.js
- id: build-script-id-id-js-pattern
