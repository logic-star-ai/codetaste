  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'input[`plugins/${$ID}`] = $PATH

        '
    - pattern: 'input[$X] = $PATH

        '
  - metavariable-pattern:
      metavariable: $X
      pattern-regex: ^`plugins/\$\{[^}]+\}`$
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
