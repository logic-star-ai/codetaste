rules:
- id: plugin-js-file-without-prism-prefix
  message: Plugin JS file now uses simplified naming without prism- prefix
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - src/plugins/*/autoloader.js
    - src/plugins/*/toolbar.js
    - src/plugins/*/line-highlight.js
    - src/plugins/*/line-numbers.js
    - src/plugins/*/autolinker.js
    - src/plugins/*/show-language.js
    - src/plugins/*/show-invisibles.js
    - src/plugins/*/copy-to-clipboard.js
    - src/plugins/*/download-button.js
    - src/plugins/*/file-highlight.js
    - src/plugins/*/command-line.js
    - src/plugins/*/normalize-whitespace.js
    - src/plugins/*/keep-markup.js
    - src/plugins/*/unescaped-markup.js
    - src/plugins/*/match-braces.js
- id: plugin-css-file-without-prism-prefix
  message: Plugin CSS file now uses simplified naming without prism- prefix
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
