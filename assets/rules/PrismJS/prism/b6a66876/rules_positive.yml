  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: path.join($SRC_DIR, 'plugins', $ID, `${$ID}.js`)
    - pattern: path.join($SRC_DIR, "plugins", $ID, $ID + ".js")
    - pattern: 'path.join($SRC_DIR, ''plugins'', $ID, $X)

        '
  - metavariable-pattern:
      metavariable: $X
      pattern-regex: ^`\$\{[^}]+\}\.js`$
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
