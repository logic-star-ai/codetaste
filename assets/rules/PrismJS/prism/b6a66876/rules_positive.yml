  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \$\{id\}\/\$\{id\}\.js
  metadata:
    category: config
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - scripts/build.js
- id: build-path-join-src-plugins-id-id-js
  message: Build script uses path.join with plugins/${id}/${id}.js
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: path.join($SRC_DIR, `plugins/${$ID}/${$ID}.js`)
  metadata:
    category: config
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - scripts/build.js
- id: auto-start-imports-autoloader-without-prefix
  message: auto-start.js now imports autoloader without prism- prefix
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: import $AUTOLOADER from './plugins/autoloader/autoloader.js'
  - metavariable-pattern:
      metavariable: $AUTOLOADER
      patterns:
      - pattern-not: prism_autoloader
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/auto-start.js
- id: components-json-plugin-path-without-prefix
  message: components.json now uses simplified plugin path pattern without prism-
    prefix
  severity: INFO
  languages:
  - json
  pattern-regex: '"path":\s*"plugins/\{id\}/\{id\}"'
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/components.json
