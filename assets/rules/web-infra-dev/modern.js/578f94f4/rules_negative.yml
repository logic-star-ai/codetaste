rules:
- id: modernjs-runtime-router-side-effect-import
  message: Side-effect import from @modern-js/utils/runtime/router should use @modern-js/runtime-utils/router
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: import '$PKG'
  - metavariable-regex:
      metavariable: $PKG
      regex: '@modern-js/utils/runtime/router'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
- id: modernjs-runtime-utils-package-path-comment
  message: Comment references old runtime utility paths that should be updated to
    @modern-js/runtime-utils
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: '@modern-js/utils/(runtime|runtime-browser|runtime-node|universal/time)'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 55
