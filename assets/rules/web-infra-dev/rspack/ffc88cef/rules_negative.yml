rules:
- id: build-meta-field-option-type-regex
  message: Field build_meta should be BuildMeta, not Option<BuildMeta>
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*(pub\s+)?build_meta:\s*Option<BuildMeta>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: build-info-field-option-type-regex
  message: Field build_info should be BuildInfo, not Option<BuildInfo>
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*(pub\s+)?build_info:\s*Option<BuildInfo>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: build-info-none-field-init-regex
  message: Initialize build_info with Default::default(), not None
  severity: WARNING
  languages:
  - rust
  pattern-regex: build_info:\s*None\s*[,}]
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: build-meta-none-field-init-regex
  message: Initialize build_meta with Default::default(), not None
  severity: WARNING
  languages:
  - rust
  pattern-regex: build_meta:\s*None\s*[,}]
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: build-info-option-unwrap
  message: build_info() now returns &BuildInfo directly, remove Option handling
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: 'if let Some($VAR) = $MODULE.build_info() { ... }

      '
  - pattern: '$MODULE.build_info().as_ref()

      '
  - pattern: '$MODULE.build_info().unwrap()

      '
  - pattern: '$MODULE.build_info()?

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: build-meta-map-or-pattern
  message: build_meta() now returns &BuildMeta directly, no need for Option mapping
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: $MODULE.build_meta().map_or($DEFAULT, $CLOSURE)
  - pattern: $MODULE.build_meta().map_or_else($DEFAULT_FN, $CLOSURE)
  - pattern: $MODULE.build_meta().map($CLOSURE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: build-info-option-expect
  message: build_info() now returns &BuildInfo directly, no need for .expect()
  severity: WARNING
  languages:
  - rust
  pattern: '$MODULE.build_info().expect($MSG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: build-result-with-default-and-build-fields-regex
  message: BuildResult should not contain build_info/build_meta fields
  severity: WARNING
  languages:
  - rust
  pattern-regex: BuildResult\s*\{[^}]*build_(info|meta):[^}]*\.\.Default::default\(\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
