rules:
- id: refactor-build-result-only-deps-blocks-bailouts
  message: Detected BuildResult with only dependencies, blocks, and optimization_bailouts
    (build_info/build_meta removed)
  severity: INFO
  languages:
  - rust
  pattern: "BuildResult {\n  dependencies: $DEPS,\n  blocks: $BLOCKS,\n  optimization_bailouts:\
    \ $BAIL,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-build-result-three-fields-only
  message: Detected BuildResult constructed with only dependencies, blocks, and optimization_bailouts
  severity: INFO
  languages:
  - rust
  pattern: "Ok(BuildResult {\n  dependencies: $DEPS,\n  blocks: $BLOCKS,\n  optimization_bailouts:\
    \ $BAIL,\n})\n"
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-build-result-creation-three-fields
  message: Detected BuildResult with exactly three fields (dependencies, blocks, optimization_bailouts)
  severity: INFO
  languages:
  - rust
  pattern: "BuildResult {\n  dependencies: $D,\n  blocks: $B,\n  optimization_bailouts:\
    \ $O,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-build-result-ok-three-fields
  message: Detected return of BuildResult with only three fields (new pattern)
  severity: INFO
  languages:
  - rust
  pattern: "return Ok(BuildResult {\n  dependencies: $D,\n  blocks: $B,\n  optimization_bailouts:\
    \ $O,\n})\n"
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-return-ok-build-result-minimal
  message: Detected return of BuildResult with three fields only
  severity: INFO
  languages:
  - rust
  pattern: "return Ok(BuildResult {\n  dependencies: $D,\n  blocks: $B,\n  optimization_bailouts:\
    \ $O,\n});\n"
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-build-result-vec-expr
  message: 'Detected BuildResult with three fields: dependencies, blocks, optimization_bailouts'
  severity: INFO
  languages:
  - rust
  pattern: "BuildResult {\n  dependencies: $D,\n  blocks: $B,\n  optimization_bailouts:\
    \ $O,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-build-result-with-deps-variable
  message: Detected BuildResult construction with three fields (refactored structure)
  severity: INFO
  languages:
  - rust
  pattern: "BuildResult {\n  dependencies: $DEPS,\n  blocks: $BLOCKS,\n  optimization_bailouts:\
    \ $BAIL,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-build-result-ok-return-statement
  message: Detected Ok(BuildResult {...}) with three fields
  severity: INFO
  languages:
  - rust
  pattern: "Ok(BuildResult {\n  dependencies: $D,\n  blocks: $B,\n  optimization_bailouts:\
    \ $O,\n})\n"
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-build-result-no-five-fields
  message: Detected BuildResult with three fields instead of five
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: "BuildResult {\n  dependencies: $D,\n  blocks: $B,\n  optimization_bailouts:\
      \ $O,\n}\n"
  - pattern-not: "BuildResult {\n  build_info: $I,\n  build_meta: $M,\n  dependencies:\
      \ $D,\n  blocks: $B,\n  optimization_bailouts: $O,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-build-result-single-expr
  message: Detected single-line BuildResult expression
  severity: INFO
  languages:
  - rust
  pattern: 'BuildResult { dependencies: $D, blocks: $B, optimization_bailouts: $O
    }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-ok-wrapped-build-result
  message: Detected BuildResult wrapped in Ok with three fields only
  severity: INFO
  languages:
  - rust
