    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-build-result-empty-vec-new
  message: Detected BuildResult construction with vec![] optimization_bailouts
  severity: INFO
  languages:
  - rust
  pattern: "BuildResult {\n  dependencies: $D,\n  blocks: $B,\n  optimization_bailouts:\
    \ vec![],\n}\n"
