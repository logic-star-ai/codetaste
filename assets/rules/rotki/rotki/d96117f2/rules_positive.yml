rules:
- id: use-display-wraps-breakpoint-api
  message: useDisplay wraps Vuetify breakpoint API - refactoring applied
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-inside: "export function useDisplay(...) {\n  ...\n}\n"
  - pattern-either:
    - pattern: $VUETIFY.breakpoint
    - pattern: computed(() => $VUETIFY.breakpoint.$PROP)
  metadata:
    category: api
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: use-display-returns-reactive-properties
  message: useDisplay creates reactive computed properties - refactoring applied
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-inside: "export function useDisplay(...) {\n  ...\n}\n"
  - pattern: 'const $VAR = computed(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
