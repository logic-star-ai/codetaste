  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: return\s*\{[^}]*currentBreakpoint[^}]*\}
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/composables/common.ts'
    - '**/composables/theme.ts'
- id: usetheme-return-with-width-property
  message: Remove width from useTheme() return statement. Move to useDisplay() composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: return\s*\{[^}]*width[^}]*fontStyle[^}]*\}
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/composables/common.ts'
    - '**/composables/theme.ts'
- id: usetheme-appbarcolor-with-breakpoints
  message: useTheme() composable mixing breakpoint and theme logic should be split
    - move breakpoints to useDisplay().
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  const isMobile = computed(()\
      \ => $vuetify.breakpoint.mobile)\n  ...\n  const appBarColor = ...\n  ...\n\
      }\n"
  - pattern: "const appBarColor = computed(() => {\n  ...\n})\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: usetheme-fontstyle-with-breakpoints
  message: useTheme() composable with both breakpoint and font styling should be split
    - move breakpoints to useDisplay().
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  const width = computed(()\
      \ => $vuetify.breakpoint.width)\n  ...\n  const fontStyle = ...\n  ...\n}\n"
  - pattern: "const fontStyle = computed(() => ({\n  ...\n}))\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: usetheme-complete-pattern
  message: useTheme() composable contains breakpoint logic that should be extracted
    to useDisplay() composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "export const useTheme = () => {\n  const { $vuetify } = useProxy()\n\
      \  const isMobile = computed(() => $vuetify.breakpoint.mobile)\n  const theme\
      \ = computed(() => $vuetify.theme)\n  const dark = computed(() => $vuetify.theme.dark)\n\
      \  const breakpoint = computed(() => $vuetify.breakpoint.name)\n  const currentBreakpoint\
      \ = computed(() => $vuetify.breakpoint)\n  const width = computed(() => $vuetify.breakpoint.width)\n\
      \  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: return-object-with-all-breakpoint-props
  message: Return statement includes both theme and breakpoint properties. Split into
    useTheme() and useDisplay() composables.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: return\s*\{[^}]*\$vuetify[^}]*isMobile[^}]*theme[^}]*dark[^}]*breakpoint[^}]*currentBreakpoint[^}]*width[^}]*fontStyle[^}]*appBarColor[^}]*\}
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: usetheme-breakpoint-mobile-access
