    nr_legacy_patterns: 1
- id: usetheme-width-computed
  message: Move width computed property from useTheme() to useDisplay() composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n}\n"
  - pattern: 'const width = computed(() => $vuetify.breakpoint.width)

