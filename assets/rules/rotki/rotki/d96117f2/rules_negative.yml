  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: vuetify-default-export-in-plugin-file
  message: Change vuetify plugin from default export to named export. Use 'export
    const vuetify = new Vuetify(...)' for easier Vuetify 3 migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: export\s+default\s+new\s+Vuetify\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/plugins/vuetify.ts'
    - '**/plugins/vuetify.js'
- id: composable-return-theme-and-breakpoint-mix
