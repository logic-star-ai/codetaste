rules:
- id: composable-exports-vuetify-and-breakpoint
  message: Exporting both $vuetify instance and breakpoint properties indicates need
    to split into separate composables.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  return {\n    $vuetify,\n\
      \    ...,\n    isMobile,\n    ...\n  }\n}\n"
  - pattern: $vuetify
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: usetheme-returns-vuetify-instance
  message: useTheme() returns $vuetify instance along with breakpoint properties.
    Refactor to use specific composables.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  return {\n    ...,\n\
      \    $vuetify,\n    ...,\n    $PROP,\n    ...\n  }\n}\n"
  - metavariable-regex:
      metavariable: $PROP
      regex: (isMobile|breakpoint|currentBreakpoint|width)
  - pattern: $vuetify
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: vuetify-instance-export-with-breakpoint-props
  message: Exporting $vuetify instance along with breakpoint properties. Use specific
    composables instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const $FUNC = () => {\n  ...\n  return {\n    $vuetify,\n\
      \    ...,\n    $PROP,\n    ...\n  }\n}\n"
  - metavariable-regex:
      metavariable: $PROP
      regex: (isMobile|breakpoint|currentBreakpoint|width)
  - pattern: $vuetify
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: usetheme-proxy-with-breakpoint
  message: useTheme() composable accesses $vuetify.breakpoint which should be moved
    to useDisplay() composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  const { $vuetify } = useProxy()\n\
      \  ...\n}\n"
  - pattern-either:
    - pattern: '$vuetify.breakpoint.mobile

        '
    - pattern: '$vuetify.breakpoint.name

        '
    - pattern: '$vuetify.breakpoint.width

        '
    - pattern: '$vuetify.breakpoint

        '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: usetheme-breakpoint-full-access
  message: Accessing $vuetify.breakpoint object in useTheme() composable. Move to
    useDisplay() composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n}\n"
  - pattern: $vuetify.breakpoint
  - pattern-not: $vuetify.breakpoint.mobile
  - pattern-not: $vuetify.breakpoint.name
  - pattern-not: $vuetify.breakpoint.width
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: proxy-access-for-vuetify-breakpoint
  message: useTheme() uses useProxy() to access $vuetify for breakpoint properties.
    Create useDisplay() composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  const { $vuetify } = useProxy()\n\
      \  ...\n}\n"
  - pattern-either:
    - pattern: 'const isMobile = ...

        '
    - pattern: 'const breakpoint = ...

        '
    - pattern: 'const currentBreakpoint = ...

        '
    - pattern: 'const width = ...

        '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: vuetify-breakpoint-in-usetheme-composable
  message: Move breakpoint logic from useTheme() composable to useDisplay() composable
    to match Vuetify 3 structure.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n}\n"
  - pattern-either:
    - pattern: 'const $VAR = computed(() => $vuetify.breakpoint.$PROP)

        '
    - pattern: 'const $VAR = computed(() => $vuetify.breakpoint.$PROP.$SUBPROP)

        '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: breakpoint-computed-in-composable-function
  message: Breakpoint computed property in useTheme(). Move to useDisplay() composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const $VAR = computed(() => $vuetify.breakpoint.$PROP)

      '
  - pattern-inside: "export const useTheme = () => {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: usetheme-exports-ismobile
  message: Remove isMobile from useTheme() composable return statement. It should
    be part of useDisplay() instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  return {\n    ...,\n\
      \    isMobile,\n    ...\n  }\n}\n"
  - pattern: isMobile
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: usetheme-exports-breakpoint
  message: Remove breakpoint from useTheme() composable return statement. It should
    be part of useDisplay() instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  return {\n    ...,\n\
      \    breakpoint,\n    ...\n  }\n}\n"
  - pattern: breakpoint
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: usetheme-exports-currentbreakpoint
  message: Remove currentBreakpoint from useTheme() composable return statement. It
    should be part of useDisplay() instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  return {\n    ...,\n\
      \    currentBreakpoint,\n    ...\n  }\n}\n"
  - pattern: currentBreakpoint
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: usetheme-exports-width
  message: Remove width from useTheme() composable return statement. It should be
    part of useDisplay() instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  return {\n    ...,\n\
      \    width,\n    ...\n  }\n}\n"
  - pattern: width
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: usetheme-eight-return-props
  message: useTheme() returns 8+ properties including breakpoint-related ones. Extract
    breakpoint logic to useDisplay().
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  return {\n    $vuetify,\n\
      \    isMobile,\n    theme,\n    dark,\n    breakpoint,\n    currentBreakpoint,\n\
      \    width,\n    ...,\n    ...\n  }\n}\n"
  - pattern: isMobile
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: usetheme-with-proxy-and-multiple-breakpoints
  message: useTheme() uses useProxy() and exports multiple breakpoint properties.
    Extract to useDisplay() composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  const { $vuetify } = useProxy()\n\
      \  ...\n  return {\n    ...,\n    isMobile,\n    ...,\n    breakpoint,\n   \
      \ ...\n  }\n}\n"
  - pattern: isMobile
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: multiple-breakpoint-returns-in-composable
  message: useTheme() returns multiple breakpoint properties (isMobile, width, etc.).
    Move to useDisplay().
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  return {\n    ...,\n\
      \    isMobile,\n    ...,\n    width,\n    ...\n  }\n}\n"
  - pattern: isMobile
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: usetheme-four-plus-breakpoint-exports
  message: useTheme() exports 4+ breakpoint properties. All should be moved to useDisplay()
    composable.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n  return {\n    ...,\n\
      \    isMobile,\n    ...,\n    breakpoint,\n    ...,\n    currentBreakpoint,\n\
      \    ...,\n    width,\n    ...\n  }\n}\n"
  - pattern: width
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: vuetify-breakpoint-object-computed
  message: Replace computed $vuetify.breakpoint with useDisplay() composable properties
