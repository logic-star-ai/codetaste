  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "export const useTheme = () => {\n  ...\n}\n"
  - pattern: 'const currentBreakpoint = computed(() => $vuetify.breakpoint)

      '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: usetheme-return-with-ismobile-and-theme
  message: Remove breakpoint-related properties (isMobile, breakpoint, etc.) from
    useTheme() return statement.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: return\s*\{[^}]*\$vuetify[^}]*isMobile[^}]*theme[^}]*\}
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/composables/common.ts'
    - '**/composables/theme.ts'
- id: usetheme-return-with-currentbreakpoint
  message: Remove currentBreakpoint from useTheme() return statement. Move to useDisplay()
