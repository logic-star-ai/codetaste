  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const $VAR = computed(() => $vuetify.breakpoint)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: usetheme-ismobile-computed
