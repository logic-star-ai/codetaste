rules:
- id: import-named-from-old-data-package
  message: Named import still uses old package name '@automattic/data'. Update to
    '@automattic/api-core'.
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: import { $IMPORTS } from '@automattic/data'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: import-with-newline-from-old-package-v1
  message: Multi-line import still uses old package name '@automattic/data'. Update
    to '@automattic/api-core'.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "import {\n  $IMPORTS\n} from '@automattic/data'\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: string-literal-old-package-name-import
  message: String literal contains old package name '@automattic/data'. Update to
    '@automattic/api-core'.
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: '["'']@automattic/data["'']'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
  paths:
    include:
    - '**/*.ts'
    - '**/*.tsx'
    - '**/*.js'
    - '**/*.jsx'
    exclude:
    - '**/node_modules/**'
    - '**/*.test.ts'
    - '**/*.test.tsx'
    - '**/*.test.js'
    - '**/*.test.jsx'
