rules:
- id: api-core-es6-import-named
  message: Detected named import from renamed package @automattic/api-core (was @automattic/data)
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { ..., $X, ... } from '@automattic/api-core'
  metadata:
    category: api
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: api-core-single-named-import
  message: Detected single named import from renamed package @automattic/api-core
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { $IMPORT } from '@automattic/api-core'
  metadata:
    category: api
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: api-core-import-all-from-package
  message: Detected multi-line destructured import from @automattic/api-core
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: "import {\n  ...\n} from '@automattic/api-core'\n"
  metadata:
    category: api
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: api-core-import-with-trailing-comma
  message: Detected import with trailing comma from @automattic/api-core
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { $X, } from '@automattic/api-core'
  metadata:
    category: api
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: api-core-import-with-newlines
  message: Detected import statement from @automattic/api-core
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: import.*from\s+['"]@automattic/api-core['"]
  metadata:
    category: api
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: api-core-import-in-ts-file
  message: Detected import from @automattic/api-core in TS file
  severity: INFO
  languages:
  - typescript
  pattern: import { $X } from '@automattic/api-core'
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    exclude:
    - '**/*.tsx'
- id: api-core-directory-exists
  message: Detected renamed package directory packages/api-core/
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/api-core/**
- id: api-core-import-in-packages
  message: Detected import in packages directory from @automattic/api-core
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { $X } from '@automattic/api-core'
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/**
    exclude:
    - packages/api-core/**
- id: api-core-import-in-tsx-file
  message: Detected import from @automattic/api-core in TSX file
  severity: INFO
  languages:
  - typescript
  pattern: import { $X } from '@automattic/api-core'
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tsx'
- id: api-core-src-directory-files
  message: Detected source file in api-core/src directory
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/api-core/src/**/*.ts
- id: api-core-domain-search-pkg-usage
