    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: api-core-string-literal-import
  message: Detected string literal reference to @automattic/api-core
  severity: INFO
  languages:
  - typescript
  - javascript
  - json
  pattern: '''@automattic/api-core'''
  metadata:
    category: config
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: api-core-double-quote-string
  message: Detected double-quoted string reference to @automattic/api-core
  severity: INFO
  languages:
  - typescript
  - javascript
  - json
  pattern: '"@automattic/api-core"'
