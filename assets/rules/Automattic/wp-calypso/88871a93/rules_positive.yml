- id: api-core-multiple-import-items
  message: Detected multiple imports from renamed package @automattic/api-core
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { $A, $B } from '@automattic/api-core'
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: api-core-import-with-type-keyword
  message: Detected mixed import with inline type from renamed @automattic/api-core
  severity: INFO
  languages:
  - typescript
  pattern: import { type $TYPE, $X } from '@automattic/api-core'
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: api-core-import-two-types
