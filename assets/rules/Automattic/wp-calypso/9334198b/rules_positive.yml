rules:
- id: calypso-url-getUrlParts-imported-and-used
  message: Detected getUrlParts function imported from @automattic/calypso-url and
    used (refactoring applied)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-inside: 'import { getUrlParts } from ''@automattic/calypso-url''

      ...

      '
  - pattern: getUrlParts(...)
  metadata:
    category: api
    nr_refactored_patterns: 53
    nr_legacy_patterns: 0
- id: calypso-url-import-with-existing-imports
  message: Detected import of migrated function from new @automattic/calypso-url package
    (refactoring applied)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: import { ..., $F, ... } from '@automattic/calypso-url'
  - metavariable-regex:
      metavariable: $F
      regex: (format|getUrlParts|getUrlFromParts|determineUrlType|URL_TYPE)
  metadata:
    category: api
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
- id: calypso-url-import-with-webpack-comment
