rules:
- id: calypso-url-package-readme
  message: README file in new calypso-url package
  severity: INFO
  languages:
  - generic
  pattern-regex: .*
  metadata:
    nr_refactored_patterns: 152
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/README.md'
- id: url-type-enum-export
  message: URL_TYPE enum exported
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: export { URL_TYPE, ... }
  metadata:
    nr_refactored_patterns: 120
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/*.ts'
- id: typescript-config-for-url-package
  message: TypeScript configuration in new URL package
  severity: INFO
  languages:
  - json
  pattern-regex: .*
  metadata:
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/tsconfig.json'
- id: import-from-automattic-calypso-url-package
  message: Import from new @automattic/calypso-url package detected
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: import { $IMPORTS } from '@automattic/calypso-url'
  - pattern-not: import { $X } from 'calypso/lib/url'
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: multiple-url-functions-imported-together
  message: Multiple URL utility functions imported together from new package
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { $A, $B, ... } from '$PKG'
    - pattern: import { $A, $B } from '$PKG'
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@automattic/.*url.*$
  - pattern-not: import { ... } from 'calypso/lib/url'
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: calypso-url-jest-config
  message: Jest configuration in new package
  severity: INFO
  languages:
  - javascript
  - json
  pattern-regex: .*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/jest.config.*'
- id: calypso-url-src-directory
  message: Source directory in new calypso-url package
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/src/**'
- id: calypso-url-test-directory
  message: Test directory in new calypso-url package
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/test/**'
    - '**/packages/calypso-url/**/test/**'
- id: url-parse-with-new-url
  message: URL parsing with new URL constructor
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: new URL($URL, $BASE)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/*.ts'
- id: any-json-file-in-calypso-url-package
  message: Any JSON file in calypso-url package
  severity: INFO
  languages:
  - json
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/*.json'
- id: package-json-calypso-url-dependency
  message: New calypso-url package dependency detected
  severity: INFO
  languages:
  - json
  patterns:
  - pattern: '{ ... , "@automattic/calypso-url": $VERSION, ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/package.json'
- id: calypso-url-package-index-file
  message: Index file in new calypso-url package
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/index.ts'
    - '**/packages/calypso-url/src/index.ts'
- id: calypso-url-package-format-file
  message: Format function file in extracted package
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/format.ts'
    - '**/packages/calypso-url/src/format.ts'
- id: calypso-url-package-url-type-file
  message: URL type file in extracted package
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/url-type.ts'
    - '**/packages/calypso-url/src/url-type.ts'
- id: calypso-url-package-url-parts-file
  message: URL parts file in extracted package
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/url-parts.ts'
    - '**/packages/calypso-url/src/url-parts.ts'
- id: calypso-url-package-json-file
  message: Package.json for new calypso-url package
  severity: INFO
  languages:
  - json
  patterns:
  - pattern: '{ "name": "@automattic/calypso-url", ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/package.json'
- id: export-named-determine-url-type
  message: determineUrlType exported as named export
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: export function determineUrlType($PARAMS) { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/*.ts'
- id: export-named-get-url-parts
  message: getUrlParts exported as named export
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: export function getUrlParts($PARAMS) { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/*.ts'
- id: calypso-url-test-format
  message: Format test file in new package
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/format.test.*'
    - '**/packages/calypso-url/**/test/format.*'
- id: calypso-url-test-url-parts
  message: URL parts test file in new package
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/url-parts.test.*'
    - '**/packages/calypso-url/**/test/url-parts.*'
- id: calypso-url-test-url-type
  message: URL type test file in new package
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/url-type.test.*'
    - '**/packages/calypso-url/**/test/url-type.*'
- id: any-md-file-in-calypso-url-package
  message: Any markdown file in calypso-url package
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/**/*.md'
- id: format-function-definition
  message: Format function definition
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'export default function format(...) { ... }

        '
    - pattern: 'function format(...) { ... }

        '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/**/format.ts'
- id: tsconfig-in-calypso-url
  message: TypeScript config has compiler options
  severity: INFO
  languages:
  - json
  patterns:
  - pattern: '{ ..., "compilerOptions": $OPTIONS, ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/calypso-url/tsconfig.json'
