rules:
- id: old-import-getUrlParts-from-calypso-lib-url
  message: Import 'getUrlParts' from '@automattic/calypso-url' instead of 'calypso/lib/url'
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: import { ..., getUrlParts, ... } from 'calypso/lib/url'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: old-import-getUrlParts-with-non-migrated-function
  message: Import 'getUrlParts' from '@automattic/calypso-url' (other functions may
    stay in 'calypso/lib/url')
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: import { getUrlParts, $OTHER } from 'calypso/lib/url'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: old-import-getUrlFromParts-from-calypso-lib-url
