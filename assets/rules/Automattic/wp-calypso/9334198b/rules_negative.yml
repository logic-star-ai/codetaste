- id: old-import-relative-four-levels-lib-url
  message: Import URL utilities from '@automattic/calypso-url' instead of relative
    path to lib/url
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., format, ... } from '../../../../lib/url'
    - pattern: import { ..., getUrlParts, ... } from '../../../../lib/url'
    - pattern: import { ..., getUrlFromParts, ... } from '../../../../lib/url'
    - pattern: import { ..., determineUrlType, ... } from '../../../../lib/url'
    - pattern: import { ..., URL_TYPE, ... } from '../../../../lib/url'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
