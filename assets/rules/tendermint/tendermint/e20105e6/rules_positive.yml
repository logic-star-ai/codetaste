  severity: INFO
  languages:
  - go
  pattern-regex: var _ Caller = \(\*RequestBatch\)\(nil\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
