rules:
- id: detect-jsonrpc-types-import-path
  message: Detected new import path rpc/jsonrpc/types (refactored from rpc/lib/types)
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/tendermint/tendermint/rpc/jsonrpc/types
  metadata:
    category: structural
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: detect-types-import-alias
  message: Detected import alias for jsonrpc/types package
  severity: INFO
  languages:
  - go
  pattern-regex: types\s+"github\.com/tendermint/tendermint/rpc/jsonrpc/types"
  metadata:
    category: structural
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: detect-proto-constants
  message: Detected protocol constants in refactored client package
  severity: INFO
  languages:
  - go
  pattern-regex: protoHTTP|protoHTTPS|protoWSS|protoWS|protoTCP
  metadata:
    category: basic
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-import-jsonrpc-in-rpc-core
  message: Detected jsonrpc import in rpc/core (refactored from rpc/lib)
  severity: INFO
  languages:
  - go
  pattern-regex: '"github\.com/tendermint/tendermint/rpc/jsonrpc/'
  metadata:
    category: dependency
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/core/*.go
- id: detect-client-new-call-with-context
  message: Detected any of the new client constructor functions
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: client.New($ADDR)
  - pattern: client.NewWithHTTPClient($ADDR, $CLIENT)
  - pattern: client.NewURI($ADDR)
  - pattern: client.NewWS($ADDR, $ENDPOINT)
  metadata:
    category: api
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: detect-jsonrpc-client-subdir
  message: Detected file in rpc/jsonrpc/client directory (moved from rpc/lib/client)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-jsonrpc-server-subdir
  message: Detected file in rpc/jsonrpc/server directory (moved from rpc/lib/server)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/server/*.go
- id: detect-package-client-declaration
  message: Detected 'package client' declaration in jsonrpc/client (renamed from rpcclient)
  severity: INFO
  languages:
  - go
  pattern-regex: ^package client$
  metadata:
    category: structural
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-package-server-declaration
  message: Detected 'package server' declaration in jsonrpc/server (renamed from rpcserver)
  severity: INFO
  languages:
  - go
  pattern-regex: ^package server$
  metadata:
    category: structural
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/server/*.go
- id: detect-jsonrpc-server-import-path
  message: Detected new import path rpc/jsonrpc/server (refactored from rpc/lib/server)
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/tendermint/tendermint/rpc/jsonrpc/server
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: detect-server-serve-call-variants
  message: Detected server.Serve or server.ServeTLS call (refactored API)
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: server.Serve($LISTENER, $HANDLER, $LOGGER, $CONFIG)
  - pattern: server.ServeTLS($LISTENER, $HANDLER, $CERT, $KEY, $LOGGER, $CONFIG)
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: detect-server-import-alias
  message: Detected import alias for jsonrpc/server package
  severity: INFO
  languages:
  - go
  pattern-regex: server\s+"github\.com/tendermint/tendermint/rpc/jsonrpc/server"
  metadata:
    category: structural
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: detect-server-package-serve-call
  message: Detected server.Serve() call (renamed from rpcserver.StartHTTPServer)
  severity: INFO
  languages:
  - go
  pattern: server.Serve($LISTENER, $HANDLER, $LOGGER, $CONFIG)
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-client-method-receiver
  message: Detected method with *Client receiver (renamed from *JSONRPCClient)
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV *Client) $METHOD(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-requestbatch-method-receiver
  message: Detected method with *RequestBatch receiver (renamed from *JSONRPCRequestBatch)
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV *RequestBatch) $METHOD(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-serve-function-call
  message: Detected server.Serve() function call (renamed from StartHTTPServer)
  severity: INFO
  languages:
  - go
  pattern: server.Serve($LISTENER, $HANDLER, $LOGGER, $CONFIG)
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-client-newws-function
  message: Detected usage of renamed function NewWS() (previously NewWSClient)
  severity: INFO
  languages:
  - go
  pattern: $CLIENT.NewWS($ADDR, ...)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-client-package-newws
  message: Detected client.NewWS() (renamed from rpcclient.NewWSClient)
  severity: INFO
  languages:
  - go
  pattern: client.NewWS($ADDR, $ENDPOINT, ...)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-jsonrpc-client-import-path
  message: Detected new import path rpc/jsonrpc/client (refactored from rpc/lib/client)
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/tendermint/tendermint/rpc/jsonrpc/client
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-client-import-alias
  message: Detected import alias for jsonrpc/client package
  severity: INFO
  languages:
  - go
  pattern-regex: client\s+"github\.com/tendermint/tendermint/rpc/jsonrpc/client"
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-client-test-files
  message: Detected test file in rpc/jsonrpc/client (moved from rpc/lib/client)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*_test.go
- id: detect-server-test-files
  message: Detected test file in rpc/jsonrpc/server (moved from rpc/lib/server)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/server/*_test.go
- id: detect-responsewriterwrapper-lowercase-reference
  message: Detected lowercase responseWriterWrapper reference (unexposed from ResponseWriterWrapper)
  severity: INFO
  languages:
  - go
  pattern-regex: responseWriterWrapper
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/server/*.go
- id: detect-client-newuri-function
  message: Detected usage of renamed function NewURI() (previously NewURIClient)
  severity: INFO
  languages:
  - go
  pattern: $CLIENT.NewURI($ADDR)
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-client-package-newuri
  message: Detected client.NewURI() (renamed from rpcclient.NewURIClient)
  severity: INFO
  languages:
  - go
  pattern: client.NewURI($ADDR)
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-serve-goroutine
  message: Detected server.Serve() in goroutine (renamed from StartHTTPServer)
  severity: INFO
  languages:
  - go
  pattern: 'go server.Serve($LISTENER, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-client-newwithhttpclient-function
  message: Detected usage of renamed function NewWithHTTPClient() (previously NewJSONRPCClientWithHTTPClient)
  severity: INFO
  languages:
  - go
  pattern: $CLIENT.NewWithHTTPClient($ADDR, $HTTP)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-client-package-new-call
  message: Detected client.New() call (renamed from rpcclient.NewJSONRPCClient)
  severity: INFO
  languages:
  - go
  pattern: client.New($ADDR)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-client-package-newwithhttpclient
  message: Detected client.NewWithHTTPClient() (renamed from rpcclient.NewJSONRPCClientWithHTTPClient)
  severity: INFO
  languages:
  - go
  pattern: client.NewWithHTTPClient($ADDR, $HTTP)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-server-package-servetls-call
  message: Detected server.ServeTLS() call (renamed from rpcserver.StartHTTPAndTLSServer)
  severity: INFO
  languages:
  - go
  pattern: server.ServeTLS($LISTENER, $HANDLER, $CERT, $KEY, $LOGGER, $CONFIG)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-jsonrpc-dir-structure
  message: Detected file in new rpc/jsonrpc directory structure (moved from rpc/lib)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/*.go
- id: detect-jsonrpc-types-subdir
  message: Detected file in rpc/jsonrpc/types directory (moved from rpc/lib/types)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/types/*.go
- id: detect-package-types-declaration
  message: Detected 'package types' declaration in jsonrpc/types (renamed from rpctypes)
  severity: INFO
  languages:
  - go
  pattern-regex: ^package types$
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/types/*.go
- id: detect-lowercase-responsewriterwrapper-receiver
  message: Detected method with *responseWriterWrapper receiver (unexposed from *ResponseWriterWrapper)
  severity: INFO
  languages:
  - go
  pattern: "func ($W *responseWriterWrapper) $METHOD(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/server/*.go
- id: detect-client-assignment
  message: Detected assignment from client.New() call
  severity: INFO
  languages:
  - go
  pattern: $VAR := client.New($ADDR)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-servetls-function-call
  message: Detected server.ServeTLS() function call (renamed from StartHTTPAndTLSServer)
  severity: INFO
  languages:
  - go
  pattern: server.ServeTLS($LISTENER, $HANDLER, $CERT, $KEY, $LOGGER, $CONFIG)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-client-newwithhttpclient-call
  message: Detected client.NewWithHTTPClient() call (renamed from NewJSONRPCClientWithHTTPClient)
  severity: INFO
  languages:
  - go
  pattern: client.NewWithHTTPClient($ADDR, $HTTP)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-client-type-declaration
  message: Detected 'type Client' declaration (renamed from JSONRPCClient)
  severity: INFO
  languages:
  - go
  pattern: "type Client struct {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-requestbatch-type-declaration
  message: Detected 'type RequestBatch' declaration (renamed from JSONRPCRequestBatch)
  severity: INFO
  languages:
  - go
  pattern: "type RequestBatch struct {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-caller-interface-declaration
  message: Detected 'type Caller' interface declaration (renamed from JSONRPCCaller)
  severity: INFO
  languages:
  - go
  pattern: "type Caller interface {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-new-function-signature
  message: Detected 'func New()' declaration (renamed from NewJSONRPCClient)
  severity: INFO
  languages:
  - go
  pattern: "func New($REMOTE string) (*Client, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-newwithhttpclient-function-signature
  message: Detected 'func NewWithHTTPClient()' declaration (renamed from NewJSONRPCClientWithHTTPClient)
  severity: INFO
  languages:
  - go
  pattern: "func NewWithHTTPClient($REMOTE string, $CLIENT *http.Client) (*Client,\
    \ error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-newuri-function-signature
  message: Detected 'func NewURI()' declaration (renamed from NewURIClient)
  severity: INFO
  languages:
  - go
  pattern: "func NewURI($REMOTE string) (*URIClient, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-newws-function-signature
  message: Detected 'func NewWS()' declaration (renamed from NewWSClient)
  severity: INFO
  languages:
  - go
  pattern: "func NewWS($ADDR string, $ENDPOINT string, ...) (*WSClient, error) {\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-serve-function-signature
  message: Detected 'func Serve()' declaration (renamed from StartHTTPServer)
  severity: INFO
  languages:
  - go
  pattern: "func Serve($LISTENER net.Listener, ...) error {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/server/*.go
- id: detect-servetls-function-signature
  message: Detected 'func ServeTLS()' declaration (renamed from StartHTTPAndTLSServer)
  severity: INFO
  languages:
  - go
  pattern: "func ServeTLS($LISTENER net.Listener, ...) error {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/server/*.go
- id: detect-lowercase-responsewriterwrapper-type
  message: Detected unexposed 'type responseWriterWrapper' (previously ResponseWriterWrapper)
  severity: INFO
  languages:
  - go
  pattern: "type responseWriterWrapper struct {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/server/*.go
- id: detect-client-field-in-struct
  message: Detected struct field with *Client type (renamed from *JSONRPCClient)
  severity: INFO
  languages:
  - go
  pattern: "type $STRUCT struct {\n  ...\n  client *Client\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-newrequestbatch-method
  message: Detected NewRequestBatch() method returning *RequestBatch (renamed from
    *JSONRPCRequestBatch)
  severity: INFO
  languages:
  - go
  pattern: "func ($C *Client) NewRequestBatch() *RequestBatch {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-caller-interface-implementation-client
  message: Detected Caller interface implementation by Client (renamed from JSONRPCCaller
    and JSONRPCClient)
  severity: INFO
  languages:
  - go
  pattern-regex: var _ Caller = \(\*Client\)\(nil\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - rpc/jsonrpc/client/*.go
- id: detect-caller-interface-implementation-batch
  message: Detected Caller interface implementation by RequestBatch (renamed from
