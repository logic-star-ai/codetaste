    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: jsonrpc-client-method-definition
  message: Type 'JSONRPCClient' in method definition should be renamed to 'Client'
    when in jsonrpc package
  severity: WARNING
  languages:
  - go
  pattern: 'func ($C *JSONRPCClient) $METHOD(...) { ... }

    '
