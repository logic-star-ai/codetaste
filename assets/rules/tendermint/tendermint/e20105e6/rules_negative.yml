  severity: WARNING
  languages:
  - go
  pattern-regex: func\(\*WSClient\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '**/rpc/lib/client/*.go'
- id: rpcserver-package-alias-detected
  message: Package alias 'rpcserver' should be changed to 'server' and import path
