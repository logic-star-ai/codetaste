rules:
- id: rpc-lib-directory-usage-comment
  message: Directory reference 'rpc/lib/' should be updated to 'rpc/jsonrpc/' after
    refactoring
  severity: WARNING
  languages:
  - go
  pattern-regex: rpc/lib/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/rpc/core/doc.go'
- id: lib-folder-in-rpc-context
  message: Import path 'rpc/lib' should be changed to 'rpc/jsonrpc' after refactoring
  severity: WARNING
  languages:
  - go
  pattern-regex: github\.com/tendermint/tendermint/rpc/lib\b
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
  paths:
    include:
    - '**/*.go'
- id: rpc-lib-types-import-no-alias
  message: Import path 'rpc/lib/types' should be changed to 'rpc/jsonrpc/types' after
    refactoring
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/tendermint/tendermint/rpc/lib/types"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: rpctypes-package-alias-detected
  message: Package alias 'rpctypes' should be changed to 'jsonrpc' package and import
    path to 'rpc/jsonrpc/types'
  severity: WARNING
  languages:
  - go
  pattern: 'import rpctypes "github.com/tendermint/tendermint/rpc/lib/types"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: client-type-with-jsonrpc-prefix
  message: Type 'JSONRPCClient' should be renamed to 'Client' when already in jsonrpc
    package context
  severity: WARNING
  languages:
  - go
  pattern-regex: \bJSONRPCClient\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
  paths:
    include:
    - '**/rpc/lib/client/*.go'
- id: jsonrpc-types-in-lib-context
  message: JSONRPC-prefixed types in rpc/lib/types should be reviewed for naming after
    refactoring to jsonrpc package
  severity: WARNING
  languages:
  - go
  pattern-regex: \b(JSONRPCStringID|JSONRPCIntID)\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - '**/rpc/lib/types/*.go'
- id: ws-client-method-receiver
  message: WSClient method definition should be in refactored 'rpc/jsonrpc/client'
    package
  severity: WARNING
  languages:
  - go
  pattern: 'func ($RECV *WSClient) $METHOD(...) $RET { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - '**/rpc/lib/client/*.go'
- id: types-alias-for-lib-types
  message: Import path 'rpc/lib/types' should be changed to 'rpc/jsonrpc/types' after
    refactoring
  severity: WARNING
  languages:
  - go
  pattern: 'import types "github.com/tendermint/tendermint/rpc/lib/types"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: request-batch-with-jsonrpc-prefix
  message: Type 'JSONRPCRequestBatch' should be renamed to 'RequestBatch' when already
    in jsonrpc package context
  severity: WARNING
  languages:
  - go
  pattern-regex: \bJSONRPCRequestBatch\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/rpc/lib/client/*.go'
- id: start-http-server-any-usage
  message: Function 'StartHTTPServer' should be renamed to 'Serve' in the refactored
    jsonrpc/server package
  severity: WARNING
  languages:
  - go
  pattern-regex: \bStartHTTPServer\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/*.go'
- id: package-rpcserver-declaration
  message: Package name 'rpcserver' should be changed to 'server' after refactoring
    to jsonrpc package structure
  severity: WARNING
  languages:
  - go
  pattern: 'package rpcserver

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/rpc/lib/server/*.go'
- id: rpc-lib-import-in-test
  message: Test files should update import paths from 'rpc/lib' to 'rpc/jsonrpc'
  severity: WARNING
  languages:
  - go
  pattern-regex: github\.com/tendermint/tendermint/rpc/lib
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/*_test.go'
- id: write-rpc-response-bytes-function
  message: WriteRPCResponseHTTP function should be in refactored 'rpc/jsonrpc/server'
    package
  severity: WARNING
  languages:
  - go
  pattern-regex: \bWriteRPCResponseHTTP\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/rpc/lib/server/*.go'
- id: new-ws-client-any-usage
  message: Function 'NewWSClient' should be renamed to 'NewWS' in the refactored jsonrpc/client
    package
  severity: WARNING
  languages:
  - go
  pattern-regex: \bNewWSClient\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/*.go'
- id: package-rpcclient-declaration
  message: Package name 'rpcclient' should be changed to 'client' after refactoring
    to jsonrpc package structure
  severity: WARNING
  languages:
  - go
  pattern: 'package rpcclient

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/rpc/lib/client/*.go'
- id: rpc-lib-server-import-no-alias
  message: Import path 'rpc/lib/server' should be changed to 'rpc/jsonrpc/server'
    after refactoring
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/tendermint/tendermint/rpc/lib/server"

    '
  metadata:
