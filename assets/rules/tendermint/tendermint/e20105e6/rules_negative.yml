- id: start-http-server-call-any-params
  message: Function 'StartHTTPServer' should be renamed to 'Serve' in the refactored
    jsonrpc/server package
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: rpcserver.StartHTTPServer(...)
  - pattern: server.StartHTTPServer(...)
  - pattern: rpc.StartHTTPServer(...)
