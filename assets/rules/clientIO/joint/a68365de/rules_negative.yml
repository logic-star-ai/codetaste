rules:
- id: jquery-paper-dollar-background-property
  message: Usage of `paper.$background` property detected. This was removed in jQuery
    removal refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: $PAPER.$background
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: jquery-dollar-background-css
  message: jQuery .css() called on $background property. This property was removed
    in jQuery removal refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: $OBJ.$background.css($...ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: jquery-dollar-selector-children-method
  message: jQuery selector with .children() detected. Replace with element.children
    or querySelectorAll() after jQuery removal.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: $($SEL).children($...ARGS)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: jquery-element-data-method
  message: jQuery .data() method detected. Data storage moved to WeakMap after jQuery
    removal refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: $ELEM.data($...ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: jquery-paper-dollar-properties-access
  message: Access to Paper jQuery properties ($document, $grid, $background) detected.
    These were removed in refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: paper.$document
  - pattern: paper.$grid
  - pattern: paper.$background
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: jquery-paper-dollar-vars-any
  message: jQuery property ($document, $grid, $background) access in Paper file detected.
    These were removed in refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: $OBJ.$document
  - pattern: $OBJ.$grid
  - pattern: $OBJ.$background
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/dia/Paper.mjs'
    - '**/dia/Paper.js'
- id: jquery-import-from-jquery-module
  message: jQuery import detected. jQuery was removed as a runtime dependency. Use
    native DOM APIs instead.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: import $VAR from 'jquery'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: jquery-data-method-getter
  message: jQuery .data() method detected. Data storage moved to WeakMap after jQuery
    removal.
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: $ELEM.data($KEY)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/src/**'
    exclude:
    - '**/test/**'
- id: jquery-paper-dollar-grid-property
  message: Usage of `paper.$grid` property detected. This was removed in jQuery removal
    refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: $PAPER.$grid
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: jquery-paper-dollar-grid-usage
  message: Usage of $grid property in Paper detected. This jQuery-wrapped property
    was removed in refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: $PAPER.$grid
  - pattern: this.$grid
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/*Paper.mjs'
    - '**/*Paper.js'
- id: jquery-paper-dollar-background-usage
  message: Usage of $background property in Paper detected. This jQuery-wrapped property
    was removed in refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: $PAPER.$background
  - pattern: this.$background
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/*Paper.mjs'
    - '**/*Paper.js'
- id: jquery-wrap-element-in-paper
  message: jQuery wrapping in Paper file detected. Replace with native DOM methods
    after jQuery removal.
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: $($VAR)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/dia/Paper.mjs'
    - '**/dia/Paper.js'
- id: jquery-dollar-grid-css
  message: jQuery .css() called on $grid property. This property was removed in jQuery
    removal refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: $OBJ.$grid.css($...ARGS)
  metadata:
