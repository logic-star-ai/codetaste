    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: jquery-grid-css-backgroundImage
  message: jQuery .css('backgroundImage') on $grid detected. This property was removed
    in jQuery removal refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: $OBJ.$grid.css('backgroundImage', $VAL)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: jquery-dollar-background-css-string-prop
  message: jQuery .css() getter on this.$background detected. This property was removed
    in refactoring.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: this.$background.css($STR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
