- id: weakmap-data-storage-usage
  message: Detected WeakMap for data storage instead of jQuery $.data() - jQuery removal
    refactoring applied
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: 'const $MAP = new WeakMap()

      '
  - pattern: 'let $MAP = new WeakMap()

      '
  - pattern: 'var $MAP = new WeakMap()

      '
  - pattern: 'this.$MAP = new WeakMap()

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
