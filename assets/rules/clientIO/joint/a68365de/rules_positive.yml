rules:
- id: style-property-in-paper-file
  message: Direct style property access in Paper.mjs
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: $EL.style.$PROP = $VALUE
    - pattern: $EL.style[$PROP] = $VALUE
  - pattern-not-inside: 'import $ from ''jquery''

      ...

      '
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Paper.mjs'
    exclude:
    - '**/test/**'
    - '**/demo/**'
