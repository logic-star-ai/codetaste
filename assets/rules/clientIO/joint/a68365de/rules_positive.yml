rules:
- id: event-constructor-for-standard-events
  message: Detected Event constructor for standard events - replacing jQuery event
    creation - jQuery removal refactoring applied
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: new Event($EVENTNAME, ...)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: event-initevent-deprecation-avoidance
  message: Detected Event constructor usage (avoiding deprecated initEvent) - modern
    event API replacing jQuery - jQuery removal refactoring applied
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: new\s+Event\([^)]+\)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: findnodes-plural-method-usage
  message: Detected use of findNodes() method (plural variant) - jQuery removal refactoring
    applied
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: $VIEW.findNodes(...)
  - pattern: this.findNodes(...)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
