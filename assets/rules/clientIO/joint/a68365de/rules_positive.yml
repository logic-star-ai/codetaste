rules:
- id: findnode-with-cellview-pattern
  message: 'Refactoring detected: findNode called on view object'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: $VIEW.findNode($ARG)
    - pattern: $VIEW.findNode($ARG1, $ARG2)
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/HighlighterView.mjs'
  options:
    symbolic_propagation: true
- id: innerHTML-usage-any-context
  message: 'Refactoring detected: innerHTML usage increased'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: $ANY.innerHTML = $VAL
    - pattern: $ANY.innerHTML
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.mjs'
    - '**/src/**/*.js'
    exclude:
    - '**/test/**'
    - '**/tests/**'
  options:
    symbolic_propagation: true
- id: multiple-findnode-calls-in-function
  message: 'Refactoring detected: Multiple findNode calls indicating API migration'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: "$FUNC(...) {\n  ...\n  $X.findNode(...);\n  ...\n  $Y.findNode(...);\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/HighlighterView.mjs'
  options:
    symbolic_propagation: true
- id: matches-method-any-context
  message: 'Refactoring detected: matches() method usage increased'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $ANY.matches($SELECTOR)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.mjs'
    - '**/src/**/*.js'
    exclude:
    - '**/test/**'
    - '**/tests/**'
    - '**/mvc/mvcUtils.mjs'
  options:
    symbolic_propagation: true
- id: prepend-native-method-usage
  message: 'Refactoring detected: prepend method usage'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $EL.prepend($CHILD)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.mjs'
    exclude:
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: element-matches-in-conditional
  message: 'Refactoring detected: element.matches() in conditional'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'if ($EL.matches($SELECTOR)) { ... }

        '
    - pattern: 'if (!$EL.matches($SELECTOR)) { ... }

        '
    - pattern: '$EL.matches($SELECTOR) ? $X : $Y

        '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/mvc/mvcUtils.mjs'
  options:
    symbolic_propagation: true
- id: findnodes-plural-method-usage
  message: 'Refactoring detected: Using findNodes() method (plural variant)'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: $OBJ.findNodes($ARG)
    - pattern: $OBJ.findNodes($ARG1, $ARG2)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: queryselector-result-nullcheck
  message: 'Refactoring detected: querySelector result null check'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'if ($EL.querySelector($SEL)) { ... }

        '
    - pattern: 'if (!$EL.querySelector($SEL)) { ... }

        '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.mjs'
    exclude:
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: after-native-method-usage
  message: 'Refactoring detected: after method usage'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $EL.after($SIBLING)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.mjs'
    exclude:
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: stopImmediatePropagation-usage
  message: 'Refactoring detected: stopImmediatePropagation usage'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $EVENT.stopImmediatePropagation()
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.mjs'
    exclude:
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: Event-constructor-usage
  message: 'Refactoring detected: Event constructor usage'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: new Event($NAME, $OPTIONS)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.mjs'
    exclude:
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: removeeventlistener-usage-broad
  message: 'Refactoring detected: removeEventListener usage'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $EL.removeEventListener($EVENT, $HANDLER)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.mjs'
    exclude:
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: event-constructor-new-usage
  message: 'Refactoring detected: new Event usage'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: new Event($NAME)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.mjs'
    exclude:
    - '**/test/**'
  options:
    symbolic_propagation: true
