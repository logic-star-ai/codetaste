rules:
- id: detect-old-pushmodal-string-first-arg
  message: 'Old pushModal API detected. Migrate to Redux Toolkit pattern: pushModal({
    modal: { name: ..., options: ... } })'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: pushModal($NAME, ...)
  - pattern-not: pushModal({ ... }, ...)
  - metavariable-pattern:
      metavariable: $NAME
      patterns:
      - pattern-not: '{ ... }

          '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 112
- id: detect-modal-name-as-string-literal
  message: String literal modal name in pushModal detected. Migrate to new API with
    object payload
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'pushModal($STR, ...)

      '
  - metavariable-regex:
      metavariable: $STR
      regex: ^'[a-z-]+'$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 107
- id: detect-dispatch-pushmodal-non-object
  message: 'Old pushModal dispatch detected. Migrate to: dispatch(pushModal({ modal:
    { name: ..., options: ... } }))'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: dispatch(pushModal($NAME, ...))
  - metavariable-pattern:
      metavariable: $NAME
      patterns:
      - pattern-not: '{ ... }

          '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 100
- id: detect-old-pushmodal-two-args
  message: 'Old pushModal API detected. Migrate to Redux Toolkit pattern: pushModal({
    modal: { name: $NAME, options: $OPTIONS } })'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: pushModal($NAME, $OPTIONS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: detect-pushmodal-with-options-object
  message: 'Old pushModal with options object detected. Migrate to: pushModal({ modal:
    { name: $NAME, options: $OPTIONS } })'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: pushModal($NAME, $OPTIONS)
  - metavariable-pattern:
      metavariable: $NAME
      patterns:
      - pattern-not: '{ ... }

          '
  - metavariable-pattern:
      metavariable: $OPTIONS
      patterns:
      - pattern: '{ ... }

          '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 91
- id: detect-dispatch-old-pushmodal-two-args
  message: 'Old pushModal API detected in dispatch. Migrate to: dispatch(pushModal({
    modal: { name: $NAME, options: $OPTIONS } }))'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: dispatch(pushModal($NAME, $OPTIONS))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 84
- id: detect-import-pushmodal-from-actions
  message: pushModal import from old actions barrel detected. Update to import from
    modalsSlice
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'import { ..., pushModal, ... } from ''loot-core/client/actions''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
- id: detect-dispatch-with-old-pushmodal-var
  message: 'Dispatch with old pushModal pattern detected. Migrate to: dispatch(pushModal({
    modal: { name: ..., options: ... } }))'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $VAR.dispatch(pushModal($NAME, ...))
  - metavariable-pattern:
      metavariable: $NAME
      patterns:
      - pattern-not: '{ ... }

          '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-import-from-old-modals-actions
  message: Import from old modals actions file detected. Update import to use modalsSlice
    from 'loot-core/client/modals/modalsSlice'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., pushModal, ... } from 'loot-core/client/actions/modals'
    - pattern: import { ..., replaceModal, ... } from 'loot-core/client/actions/modals'
    - pattern: import { ..., collapseModals, ... } from 'loot-core/client/actions/modals'
    - pattern: import { ..., openAccountCloseModal, ... } from 'loot-core/client/actions/modals'
    - pattern: import { ..., popModal, ... } from 'loot-core/client/actions/modals'
    - pattern: import { ..., closeModal, ... } from 'loot-core/client/actions/modals'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
