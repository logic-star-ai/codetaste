rules:
- id: configure-store-identifier
  message: configureStore identifier present in code
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: configureStore
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: store-client-path
  message: Reference to client/store path (new structure)
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: client/store
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: configure-store-function-name
  message: configureStore function name present in source
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: configureStore
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.tsx'
    - '**/*.js'
    - '**/*.jsx'
- id: store-default-export-from-configure
  message: Store created with configureStore and exported as default
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const store = configureStore(...)

      '
  - pattern: 'export default store

      '
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: redux-toolkit-configure-store-usage
  message: Using configureStore API instead of legacy createStore
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: 'configureStore({ ... })

    '
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: redux-toolkit-package-import
  message: Import from Redux Toolkit package - new dependency added
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: 'import { ... } from ''@reduxjs/toolkit''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: configure-store-with-reducer
  message: Redux Toolkit configureStore with reducer configuration
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: "configureStore({\n  reducer: $REDUCER,\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: configure-store-function-call
  message: configureStore function from Redux Toolkit used in codebase
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: configureStore
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: configure-store-reducer-option
  message: Reducer configuration object (likely for configureStore)
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: '{ reducer: $REDUCERS, ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: devtools-compose-removed
  message: Redux DevTools compose not needed with configureStore (built-in)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-not: 'window[''__REDUX_DEVTOOLS_EXTENSION_COMPOSE__'']

      '
