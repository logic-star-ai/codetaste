rules:
- id: typed-hooks-import-from-redux-module
  message: Detected import of typed hooks from local redux module
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $HOOK, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: ^\.\.?/.*redux.*$
  - pattern-not: import { ... } from 'react-redux'
  metadata:
    nr_refactored_patterns: 96
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: redux-toolkit-configurestore-usage
  message: Detected usage of configureStore API
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $STORE = configureStore({ ... })
  - pattern-not-inside: 'import { createStore } from ''redux''

      ...

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: redux-toolkit-import-present
  message: Detected @reduxjs/toolkit import
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { ... } from '@reduxjs/toolkit'
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: type-export-from-store
  message: Detected type export from store module
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export type $TYPE = $EXPR
  - pattern-inside: 'const $STORE = configureStore({ ... })

      ...

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: redux-toolkit-configurestore-import
  message: Detected import of configureStore from @reduxjs/toolkit
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: import { ..., configureStore, ... } from '@reduxjs/toolkit'
  - pattern: import { configureStore } from '@reduxjs/toolkit'
  - pattern: import * as $RTK from '@reduxjs/toolkit'
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: typed-appselector-hook-export
  message: Detected export of typed useAppSelector hook
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: export const $HOOK = $SELECTOR.withTypes<$TYPE>()
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: appdispatch-type-export
  message: Detected AppDispatch type export from store
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: export type $NAME = typeof $STORE.dispatch
    - pattern: type $NAME = typeof $STORE.dispatch
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: account-sync-status-object-manipulation
  message: Detected account sync status with object manipulation
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '$OBJ[$KEY] = $VALUE

        '
    - pattern: 'delete $OBJ[$KEY]

        '
  - pattern-inside: "case $ACTION:\n  ...\n"
  - metavariable-regex:
      metavariable: $ACTION
      regex: (?i).*(sync|account).*status.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: redux-provider-without-createstore
  message: Detected Provider usage without createStore import
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: <Provider store={$STORE}>...</Provider>
  - pattern-not-inside: 'import { createStore } from ''redux''

      ...

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: store-ts-file-in-client-package
  message: Detected TypeScript store file in client package
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/client/store/**/*.ts'
  options:
    symbolic_propagation: true
- id: redux-file-structure
  message: Detected redux file structure
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/desktop-client/**/redux/**'
  options:
    symbolic_propagation: true
- id: failedaccounts-plain-object-initialization
  message: Detected failedAccounts as plain object (not Map)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "$VAR = {\n  ...,\n  $FAILED: {},\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FAILED
      regex: (?i).*failed.*account.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: failedaccounts-object-spread-pattern
  message: Detected failedAccounts manipulation as object spread (not Map)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $FAILED = { ...$PREV, ... }
  - metavariable-regex:
      metavariable: $FAILED
      regex: (?i).*failed.*account.*
  - pattern-not: new Map($EXPR)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: failedaccounts-delete-as-object-property
  message: Detected failedAccounts deletion as object property (not Map.delete)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: delete $OBJ[$KEY]
  - metavariable-regex:
      metavariable: $OBJ
      regex: (?i).*failed.*account.*
  - pattern-not-inside: $MAP.delete($KEY)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: redux-index-in-desktop-client
  message: Detected redux index file in desktop-client
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/desktop-client/**/redux/index.ts'
    - '**/desktop-client/**/redux/index.tsx'
  options:
    symbolic_propagation: true
- id: mock-store-in-desktop-client
  message: Detected mock store in desktop-client redux
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/desktop-client/**/redux/mock.*'
  options:
    symbolic_propagation: true
- id: testprovider-moved-location
  message: Detected TestProvider in new location
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: export function TestProvider($PROPS) { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/desktop-client/**/*.tsx'
    - '**/desktop-client/**/*.ts'
    exclude:
    - '**/loot-core/src/mocks/**'
  options:
    symbolic_propagation: true
- id: store-index-file-created
  message: Detected store index file created
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/client/store/index.ts'
    - '**/client/store/index.tsx'
  options:
    symbolic_propagation: true
