rules:
- id: redux-actions-dispatch-type-import
  message: Replace Dispatch type import with AppDispatch from Redux Toolkit
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import type { Dispatch } from './types'
  - pattern-inside: 'async (dispatch: Dispatch) => { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 317
  paths:
    include:
    - '**/actions/**'
- id: redux-actions-getstate-type-import
  message: Replace GetState type import with GetRootState from Redux Toolkit
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import type { GetState } from './types'
  - pattern-inside: 'async ($D, getState: GetState) => { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 100
  paths:
    include:
    - '**/actions/**'
- id: redux-react-redux-usedispatch-import-not-in-redux-file
  message: Import useAppDispatch from '../redux' instead of useDispatch from 'react-redux'
    for proper typing
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: import { useDispatch, ... } from 'react-redux'
  - pattern: import { ..., useDispatch } from 'react-redux'
  - pattern: import { useDispatch } from 'react-redux'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 84
  paths:
    exclude:
    - packages/desktop-client/src/redux/index.ts
    - packages/desktop-client/src/components/admin/UserAccess/UserAccess.tsx
    - packages/desktop-client/src/components/admin/UserDirectory/UserDirectory.tsx
- id: redux-usedispatch-import-react-redux
  message: Import useAppDispatch from '../redux' instead of useDispatch from 'react-redux'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { useDispatch } from 'react-redux';
  metadata:
    category: api
