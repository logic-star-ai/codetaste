rules:
- id: detect-specific-imports-in-manager-subdirs
  message: Manager subdirectory file successfully migrated to specific imports
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: 'import View from ''../../common/View''

      '
  - pattern: 'import Text from ''../../common/Text''

      '
  - pattern: 'import Button from ''../../common/Button''

      '
  metadata:
    category: structural
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/manager/**/*.js'
    - '**/manager/**/*.tsx'
