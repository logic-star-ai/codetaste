  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: import\s+\{[^}]*\b(Text|Input|ExternalLink)\b[^}]*\b(Text|Input|ExternalLink)\b[^}]*\b(Text|Input|ExternalLink)\b[^}]*\}\s+from\s+['"][./]+common['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
