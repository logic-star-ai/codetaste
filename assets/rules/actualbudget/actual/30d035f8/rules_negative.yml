rules:
- id: barrel-import-view-text-flexible
  message: Split barrel import with View and Text into separate imports from their
    respective component files
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: import\s+\{[^}]*\b(View|Text)\b[^}]*\b(Text|View)\b[^}]*\}\s+from\s+['"][./]+common['"]
