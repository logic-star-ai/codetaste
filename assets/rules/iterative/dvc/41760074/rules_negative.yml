rules:
- id: detect-odb-local-access
  message: Access pattern '.odb.local' should be changed to '.cache.local'
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.odb.local
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 176
- id: detect-repo-odb-local-path
  message: Access pattern 'repo.odb.local.path' should be changed to 'repo.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: $REPO.odb.local.path
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 69
- id: detect-dvc-odb-local-path
  message: Access pattern 'dvc.odb.local.path' should be changed to 'dvc.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: $DVC.odb.local.path
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 69
- id: detect-odb-local-method-calls
  message: Access pattern '.odb.local.$METHOD()' should be changed to '.cache.local.$METHOD()'
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.odb.local.$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
- id: detect-remove-odb-path
  message: Function call 'remove(dvc.odb.local.path)' should be changed to 'remove(dvc.cache.local.path)'
  severity: WARNING
  languages:
  - python
  pattern: remove($DVC.odb.local.path)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: detect-odb-local-cache-types
  message: Access pattern '.odb.local.cache_types' should be changed to '.cache.local.cache_types'
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.odb.local.cache_types
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: detect-odbmanager-class-reference
  message: Class reference 'ODBManager' should be renamed to 'CacheManager'
  severity: WARNING
  languages:
  - python
  pattern: ODBManager
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-build-with-odb
  message: Function call 'build(dvc.odb.local, ...)' should be changed to 'build(dvc.cache.local,
    ...)'
  severity: WARNING
  languages:
  - python
  pattern: build($DVC.odb.local, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-odb-local-in-build-call
  message: Function call 'build(repo.odb.local, ...)' should be changed to 'build(repo.cache.local,
    ...)'
  severity: WARNING
  languages:
  - python
  pattern: build($REPO.odb.local, $PATH, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-odbmanager-class-usage
  message: Class 'ODBManager' should be renamed to 'CacheManager'
  severity: WARNING
  languages:
  - python
  pattern: ODBManager(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-odbmanager-instantiation
  message: Instantiation 'ODBManager(repo)' should be changed to 'CacheManager(repo)'
    and assigned to 'cache' not 'odb'
  severity: WARNING
  languages:
  - python
  pattern: '$VAR = ODBManager($REPO)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-underscore-meta-build-odb
  message: Build call with 'dvc.odb.local' should be changed to 'dvc.cache.local'
  severity: WARNING
  languages:
  - python
  pattern: '_, $META, $OBJ = build($DVC.odb.local, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-odb-repo-access
  message: Access pattern '.odb.repo' should be changed to '.cache.repo'
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.odb.repo
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-odb-local-variable-assignment
  message: Assignment from '.odb.local' should be changed to '.cache.local'
  severity: WARNING
  languages:
  - python
  pattern: '$VAR = $OBJ.odb.local

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-odbmanager-class-import
  message: Import 'ODBManager' should be changed to 'from dvc.cachemgr import CacheManager'
  severity: WARNING
  languages:
  - python
  pattern: from dvc.odbmgr import ODBManager
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-import-odbmgr-module
  message: Import 'dvc.odbmgr' should be changed to 'dvc.cachemgr'
  severity: WARNING
  languages:
  - python
  pattern: import dvc.odbmgr
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-test-dvc-odb-instantiation
  message: Test fixture assignment 'dvc.odb = ODBManager()' should be changed to 'dvc.cache
    = CacheManager()'
  severity: WARNING
  languages:
  - python
  pattern: dvc.odb = ODBManager($REPO)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-workspace-test-odb-setup
  message: Test workspace setup 'dvc.odb = ODBManager(dvc)' should use 'dvc.cache
    = CacheManager(dvc)'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: dvc.odb = ODBManager(dvc)
  - pattern-inside: "def $FUNC(...):\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-odb-variable
  message: Variable assignment 'odb = repo.odb.local' should be changed to 'odb =
    repo.cache.local'
  severity: WARNING
  languages:
  - python
  pattern: 'odb = $REPO.odb.local

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-odb-dict-inside-odbmanager
  message: Attribute '_odb' in ODBManager should be renamed to '_cache' in CacheManager
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self._odb
  - pattern-inside: "class ODBManager:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-odb-exists-check
  message: Path check for 'repo.odb.local.path' should be changed to 'repo.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: os.path.exists($REPO.odb.local.path)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-datacloud-repo-odb
  message: Access 'self.repo.odb.local' in DataCloud should be changed to 'self.repo.cache.local'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.repo.odb.local
  - pattern-inside: "class DataCloud:\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-not-assert-odb-path-exists
  message: Negative assertion for 'dvc.odb.local.path' should use 'dvc.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: assert not os.path.exists($DVC.odb.local.path)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-odb-local-exists-call
  message: Method call '.odb.local.exists()' should be changed to '.cache.local.exists()'
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.odb.local.exists(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-test-dir-odb-path
  message: Variable assignment from '.odb.local.path' should use '.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: '$TEST_DIR = $OBJ.odb.local.path

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-cache-odb-kwarg
  message: Keyword argument 'cache_odb=repo.odb.local' should be changed to 'cache_odb=repo.cache.local'
  severity: WARNING
  languages:
  - python
  pattern: '$FUNC(..., cache_odb=$REPO.odb.local, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-local-odb-variable
  message: Variable assignment 'local_odb = dvc.odb.local' should be changed to 'dvc.cache.local'
  severity: WARNING
  languages:
  - python
  pattern: 'local_odb = $DVC.odb.local

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-test-assert-odb-cache-types
  message: Test assertion with '.odb.local.cache_types' should be changed to '.cache.local.cache_types'
  severity: WARNING
  languages:
  - python
  pattern: assert $OBJ.odb.local.cache_types == $VAL
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-odb-attribute-assignment
  message: Attribute 'self.odb' should be renamed to 'self.cache' with 'CacheManager'
    instantiation
  severity: WARNING
  languages:
  - python
  pattern: 'self.odb = ODBManager(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-tmp-dir-odb-access
  message: Access 'tmp_dir.dvc.odb' should be changed to 'tmp_dir.dvc.cache'
  severity: WARNING
  languages:
  - python
  pattern: tmp_dir.dvc.odb
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-subrepo-odb-access
  message: Access 'subrepo.odb' should be changed to 'subrepo.cache'
  severity: WARNING
  languages:
  - python
  pattern: subrepo.odb
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-staging-build-odb
  message: Build call with 'dvc.odb.local' should be changed to 'dvc.cache.local'
  severity: WARNING
  languages:
  - python
  pattern: 'staging, $META, $OBJ = build($DVC.odb.local, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-repo-class-odb-attr
  message: Repo class attribute 'self.odb' should be renamed to 'self.cache' with
    CacheManager
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.odb = ODBManager($SELF)
  - pattern-inside: "class Repo:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-test-assert-odb-path
  message: Test assertion with '.odb.local.path' should be changed to '.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: assert $OBJ.odb.local.path == $VAL
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-tmp-dir-dvc-odb-local
  message: Access 'tmp_dir.dvc.odb.local' should be changed to 'tmp_dir.dvc.cache.local'
  severity: WARNING
  languages:
  - python
  pattern: tmp_dir.dvc.odb.local
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-repo-attr-in-odbmanager
  message: Repo reference '_repo' in ODBManager should be in CacheManager
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self._repo
  - pattern-inside: "class ODBManager:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-init-odb-call
  message: Method call '_init_odb' in ODBManager should be updated in CacheManager
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self._init_odb($SCHEMES)
  - pattern-inside: "class ODBManager:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-with-repo-odb
  message: Context manager pattern with '.odb' access should use '.cache'
  severity: WARNING
  languages:
  - python
  pattern: "with $REPO as $VAR:\n  ...\n  $VAR.odb\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-odb-by-scheme-call
  message: Method call '.odb.by_scheme()' should be changed to '.cache.by_scheme()'
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.odb.by_scheme()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-odb-unprotect-call
  message: Method call 'repo.odb.repo.unprotect()' should be changed to 'repo.cache.repo.unprotect()'
  severity: WARNING
  languages:
  - python
  pattern: $REPO.odb.repo.unprotect(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-odb-local-protect-call
  message: Method call '.odb.local.protect()' should be changed to '.cache.local.protect()'
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.odb.local.protect(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-odb-local-set-exec
  message: Method call '.odb.local.set_exec()' should be changed to '.cache.local.set_exec()'
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.odb.local.set_exec(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-odb-import
  message: Import 'get_odb' from odbmgr should be changed to import from 'cachemgr'
  severity: WARNING
  languages:
  - python
  pattern: from dvc.odbmgr import get_odb
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-odbmanager-cache-dir-constant
  message: Constant 'ODBManager.CACHE_DIR' should be changed to 'CacheManager.CACHE_DIR'
  severity: WARNING
  languages:
  - python
  pattern: ODBManager.CACHE_DIR
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-caches-odb-arg
  message: Function call '_get_caches(repo.odb)' should be changed to '_get_caches(repo.cache)'
  severity: WARNING
  languages:
  - python
  pattern: _get_caches($REPO.odb)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-main-cache-odb-assignment
  message: Assignment from 'dvc.odb.local.path' should be changed to 'dvc.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: 'main_cache = $OBJ.dvc.odb.local.path

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-local-cache-odb-assignment
  message: Assignment from 'dvc.odb.local.path' should be changed to 'dvc.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: 'local_cache = $OBJ.dvc.odb.local.path

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-subrepo-dvc-odb-access
  message: Access 'subrepo.dvc.odb' should be changed to 'subrepo.dvc.cache'
  severity: WARNING
  languages:
  - python
  pattern: subrepo.dvc.odb
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-odbmgr-py-file
  message: File 'dvc/odbmgr.py' should be renamed to 'dvc/cachemgr.py'
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - dvc/odbmgr.py
- id: detect-mkdir-odb-path
  message: Mkdir for 'dvc.odb.local.path' should be changed to 'dvc.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: os.mkdir($OBJ.dvc.odb.local.path)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-odb-url-config
  message: Config dict with 'repo.odb.local.path' should be changed to 'repo.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: '{"url": $REPO.odb.local.path}

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-fs-type-odb
  message: Function call 'get_fs_type(repo.odb.local.path)' should be changed to use
    'repo.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: get_fs_type($REPO.odb.local.path)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-mode-odb-path
  message: Function call '_mode(dvc.odb.local.path)' should be changed to '_mode(dvc.cache.local.path)'
  severity: WARNING
  languages:
  - python
  pattern: _mode($DVC.odb.local.path)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-caches-info-odb
  message: Function call '_get_caches(dvc.odb)' should be changed to '_get_caches(dvc.cache)'
  severity: WARNING
  languages:
  - python
  pattern: _get_caches($DVC.odb)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-if-odb-exists
  message: Condition checking 'repo.odb.local.path' should be changed to 'repo.cache.local.path'
  severity: WARNING
  languages:
  - python
  pattern: "if os.path.exists($REPO.odb.local.path):\n  ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-cloud-schemes-in-odbmanager
  message: CLOUD_SCHEMES constant in ODBManager should be in CacheManager class
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: CLOUD_SCHEMES = [...]
  - pattern-inside: "class ODBManager:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-cache-dir-constant-in-odbmanager
  message: CACHE_DIR constant in ODBManager should be in CacheManager class
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: CACHE_DIR = $VAL
  - pattern-inside: "class ODBManager:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-init-odb-method
  message: Method '_init_odb' in ODBManager should be renamed in CacheManager (possibly
    to '_init_cache')
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def _init_odb($SELF, $SCHEMES):\n  ...\n"
  - pattern-inside: "class ODBManager:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-by-scheme-method
  message: Method 'by_scheme' in ODBManager should be in CacheManager class
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def by_scheme($SELF):\n  ...\n"
  - pattern-inside: "class ODBManager:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-repo-unprotect-via-odb
  message: Method call 'repo.odb.repo.unprotect()' should be changed to 'repo.cache.repo.unprotect()'
  severity: WARNING
  languages:
  - python
  pattern: $REPO.odb.repo.unprotect($TARGET)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-config-get-in-odbmanager
  message: Config access in ODBManager should be in CacheManager class
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.config.get($SCHEME)
  - pattern-inside: "class ODBManager:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-repo-config-cache-in-odbmanager
  message: Config access 'repo.config["cache"]' in ODBManager should be in CacheManager
    class
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $REPO.config["cache"]
  - pattern-inside: "class ODBManager:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-repo-class-odb-type-hint
  message: Repo class type hint for 'self.odb' should be renamed to 'self.cache'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: 'self.odb: $TYPE

      '
  - pattern-inside: "class Repo:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-stage-cache-instantiation
  message: Adjacent instantiation shows 'self.odb = ODBManager' should be 'self.cache
    = CacheManager'
  severity: WARNING
  languages:
  - python
  pattern: 'self.odb = ODBManager(self)

    self.stage_cache = StageCache(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-noop-before-odb
  message: ODBManager instantiation after StateNoop should be CacheManager
  severity: WARNING
  languages:
  - python
  pattern: 'self.state = StateNoop()

    self.odb = ODBManager($REPO)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-repo-cloud-attribute
  message: Class with cloud and odb attributes should rename 'odb' to 'cache'
  severity: WARNING
  languages:
  - python
  pattern: 'self.cloud: $TYPE = DataCloud(self)

    ...

    self.odb: $TYPE2

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-info-caches-call
  message: Info string with '_get_caches(repo.odb)' should use 'repo.cache'
  severity: WARNING
  languages:
  - python
  pattern: '$INFO.append(f"Caches: {_get_caches($REPO.odb)}")

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-ssh-executor-odbmanager-import
  message: Import and usage of ODBManager in SSH executor should use CacheManager
  severity: WARNING
  languages:
  - python
  patterns:
