rules:
- id: detect-predictor-attribute-getter-delegates-to-learner
  message: Detected predictor property/getter delegating to learner attribute
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: return self._learner.$ATTR
    - pattern: "def $GETTER(...):\n  ...\n  return self._learner.$ATTR\n"
  - pattern-inside: "class MultiModalPredictor:\n  ...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: detect-predictor-uses-learner-in-any-method
  message: Detected predictor method using _learner attribute - delegation pattern
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: self._learner
  - pattern-inside: "class MultiModalPredictor:\n  ...\n  def $METHOD(...):\n    ...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
