rules:
- id: old-test-class-in-forms-localflavor
  message: Test class $CLASS should be moved from forms/localflavor/ to the appropriate
    country directory under regressiontests/localflavor/
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(SimpleTestCase):\n    ...\n"
  - metavariable-pattern:
      metavariable: $CLASS
      patterns:
      - pattern-regex: .*LocalFlavorTests
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
  paths:
    include:
    - tests/regressiontests/forms/localflavor/*.py
- id: simpletestcase-import-in-old-location
  message: Test file is still in old location (forms/localflavor/). Should be moved
    to regressiontests/localflavor/<country>/tests.py
  severity: WARNING
  languages:
  - python
  pattern: from django.test import SimpleTestCase
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
  paths:
    include:
    - tests/regressiontests/forms/localflavor/*.py
- id: import-django-localflavor-forms-in-old-location
  message: Test file importing localflavor forms is still in old location (forms/localflavor/).
    Should be moved to regressiontests/localflavor/<country>/tests.py
  severity: WARNING
  languages:
  - python
  pattern: from django.contrib.localflavor.$COUNTRY.forms import $X
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
  paths:
    include:
    - tests/regressiontests/forms/localflavor/*.py
