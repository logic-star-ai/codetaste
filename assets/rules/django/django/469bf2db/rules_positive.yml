rules:
- id: refactored-combined-models-import-with-Aggregate
  message: Detected refactored combined import including Aggregate from django.db.models
    (consolidated from aggregates)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from django.db.models import $A, Aggregate, $B
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - django/db/models/__init__.py
    - django/db/models/aggregates.py
    - django/contrib/gis/db/models/aggregates.py
