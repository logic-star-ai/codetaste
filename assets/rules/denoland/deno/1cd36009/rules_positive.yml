  pattern-regex: impl\s+Default\s+for\s+CliSys
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: sys-traits-0-1-4-or-higher
  message: Detected sys_traits version 0.1.4 or higher
  severity: INFO
  languages:
  - generic
  pattern-regex: sys_traits.*0\.1\.[4-9]|sys_traits.*0\.1\.[1-9][0-9]|sys_traits.*0\.[2-9]
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - Cargo.toml
    - Cargo.lock
