  pattern-regex: CliOptions::from_flags\([^)]*sys
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: real-fs-removed-from-interface
  message: RealFs no longer directly used in interface
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: crate::RealFs\b
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - ext/fs/interface.rs
- id: cli-sys-mod-file
  message: Detected cli_sys module file existence
  severity: INFO
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - cli/cli_sys.rs
    - cli/sys.rs
