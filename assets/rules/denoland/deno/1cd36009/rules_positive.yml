rules:
- id: clisys-keyword-in-code
  message: Detected CliSys type name in code
  severity: INFO
  languages:
  - rust
  pattern-regex: \bCliSys\b
  metadata:
    category: structural
    nr_refactored_patterns: 175
    nr_legacy_patterns: 0
- id: clisys-use-statement
  message: Detected use statement importing CliSys
  severity: INFO
  languages:
  - rust
  pattern-regex: use\s+[^;]*CliSys
  metadata:
    category: dependency
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
- id: cli-sys-import
  message: Detected CliSys import - new abstraction type introduced
  severity: INFO
  languages:
  - rust
  pattern: 'use $MOD::CliSys;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
- id: clisys-pub-fn-parameter
  message: Detected public function with CliSys parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+fn\s+\w+\([^)]*CliSys
  metadata:
    category: api
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: cli-sys-impl-block
  message: Detected CliSys trait implementation - implementing sys_traits directly
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: "impl $TRAIT for CliSys {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: sys-traits-base-fs-impl-for-clisys
  message: Detected sys_traits trait implementation for CliSys
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s+sys_traits::\w+\s+for\s+CliSys
  metadata:
    category: api
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: clisys-new-fn-name
  message: Detected new() constructor with CliSys parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+new\([^)]*CliSys
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: sys-traits-base-fs-method
  message: Detected base_fs_* method call from sys_traits
  severity: INFO
  languages:
  - rust
  pattern-regex: \.base_fs_\w+\(
  metadata:
    category: basic
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: clisys-with-http-cache
  message: Detected HttpCache using CliSys
  severity: INFO
  languages:
  - rust
  pattern-regex: HttpCache.*CliSys
  metadata:
    category: structural
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: clisys-method-receiver
  message: Detected CliSys method implementation - new abstraction methods
  severity: INFO
  languages:
  - rust
  pattern: "impl CliSys {\n  pub fn $METHOD(&self, ...) -> $RET {\n    ...\n  }\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: clisys-ref-in-impl
  message: Detected CliSys reference in impl block
  severity: INFO
  languages:
  - rust
  pattern-regex: impl.*\{[\s\S]*&CliSys
  metadata:
    category: structural
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: clisys-with-global-cache
  message: Detected GlobalHttpCache using CliSys
  severity: INFO
  languages:
  - rust
  pattern-regex: GlobalHttpCache.*CliSys
  metadata:
    category: structural
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: deno-compile-fs-base-trait-impl
  message: Detected DenoCompileFileSystem implementing sys_traits - direct trait impl
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s+sys_traits::(Base)?Fs\w+\s+for\s+DenoCompileFileSystem
  metadata:
    category: architecture
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: clisys-type-alias
  message: Detected type alias involving CliSys
  severity: INFO
  languages:
  - rust
  pattern-regex: type\s+\w+\s*=.*CliSys
  metadata:
    category: structural
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: lsp-sys-field
  message: Detected sys field in LSP using CliSys
  severity: INFO
  languages:
  - rust
  pattern-regex: sys:\s*.*CliSys
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - cli/lsp/*.rs
- id: permission-descriptor-parser-sys-generic
  message: Detected PermissionDescriptorParser with generic parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: PermissionDescriptorParser<\w+>
  metadata:
    category: abstraction
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: clisys-current-dir-usage
  message: Detected current directory access via sys
  severity: INFO
  languages:
  - rust
  pattern-regex: current.*dir.*sys|sys.*current.*dir
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: clisys-question-mark-operator
  message: Detected ? operator with CliSys
  severity: INFO
  languages:
  - rust
  pattern-regex: CliSys.*\?
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: clisys-tokio-test
  message: Detected CliSys in tokio test
  severity: INFO
  languages:
  - rust
  pattern-regex: '#\[tokio::test\][\s\S]{0,500}CliSys'
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: no-fssystraitsadapter-new-real-call
  message: No longer using FsSysTraitsAdapter::new_real() calls
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: FsSysTraitsAdapter::new_real\(\)
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - cli/lsp/resolver.rs
    - cli/lsp/config.rs
    - cli/tsc/mod.rs
- id: cli-package-json-resolver-sys
  message: Detected CliPackageJsonResolver with sys parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: CliPackageJsonResolver.*sys
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: cli-node-resolver-with-sys
  message: Detected CliNodeResolver instantiation with sys parameter
  severity: INFO
  languages:
  - rust
  pattern: 'CliNodeResolver::new($SYS, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: deno-dir-provider-sys-parameter
  message: Detected DenoDirProvider::new with sys parameter - refactored API
  severity: INFO
  languages:
  - rust
  pattern-regex: DenoDirProvider::new\([^)]*sys
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: slopy-imports-cached-fs-clisys
  message: Detected SloppyImportsCachedFs using CliSys
  severity: INFO
  languages:
  - rust
  pattern-regex: SloppyImportsCachedFs::new\(.*CliSys
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: virtual-fs-sys-traits-impl
  message: Detected FileBackedVfs implementing sys_traits directly
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s+sys_traits::\w+\s+for\s+FileBackedVfs
  metadata:
    category: architecture
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: sys-traits-env-current-dir-impl
  message: Detected EnvCurrentDir trait implementation
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s+sys_traits::EnvCurrentDir\s+for
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: clisys-create-fn-name
  message: Detected create* method with CliSys parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+create\w*\([^)]*CliSys
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: sys-traits-env-impl-for-clisys
  message: Detected Env trait implementation for CliSys
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s+sys_traits::Env\w+\s+for\s+CliSys
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: deno-compile-fs-sys-read
  message: Detected DenoCompileFileSystem implementing sys_traits FsRead
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s+sys_traits::.*FsRead.*\s+for\s+DenoCompileFileSystem
  metadata:
    category: architecture
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: clisys-create-dir-all
  message: Detected directory creation via sys
  severity: INFO
  languages:
  - rust
  pattern-regex: create.*dir.*all.*sys|sys.*create.*dir
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: sys-traits-upgrade-version
  message: Detected sys_traits version upgrade to 0.1.4 or higher
  severity: INFO
  languages:
  - generic
  pattern-regex: sys_traits\s*=\s*["\x27]=?0\.1\.[4-9]
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - Cargo.toml
- id: clippy-disallow-real-sys
  message: Detected clippy rule to disallow direct RealSys usage
  severity: INFO
  languages:
  - generic
  pattern-regex: sys_traits::impls::RealSys
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - clippy.toml
- id: sys-strip-unc-feature
  message: Detected sys_traits strip_unc feature usage
  severity: INFO
  languages:
  - generic
  pattern-regex: strip_unc
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - Cargo.toml
- id: sys-traits-version-014
  message: Detected sys_traits version 0.1.4 - upgraded dependency
  severity: INFO
  languages:
  - generic
  pattern-regex: sys_traits.*=.*["\x27]=?0\.1\.4["\x27]
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - Cargo.toml
    - Cargo.lock
- id: clisys-pub-enum-declaration
  message: Detected CliSys public enum declaration
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+enum\s+CliSys
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: disk-cache-sys-parameter
