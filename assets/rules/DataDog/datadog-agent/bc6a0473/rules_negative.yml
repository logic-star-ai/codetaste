rules:
- id: environments-aws-import-in-test-files
  message: Test files should import AWS provisioners from pkg/provisioners/aws after
    refactoring
  severity: WARNING
  languages:
  - go
  pattern-regex: github\.com/DataDog/datadog-agent/test/new-e2e/pkg/environments/aws/(host|docker|ecs|kubernetes)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 103
  paths:
    include:
    - test/new-e2e/tests/**
    exclude:
    - '**/provisioners/**'
- id: old-aws-host-provisioner-import
  message: AWS host provisioner import should use 'pkg/provisioners/aws/host' instead
    of 'pkg/environments/aws/host' after refactoring
  severity: WARNING
  languages:
  - go
  pattern: 'import awshost "github.com/DataDog/datadog-agent/test/new-e2e/pkg/environments/aws/host"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 81
- id: old-environments-aws-host-import-path-in-file
  message: Import path 'pkg/environments/aws/host' should be 'pkg/provisioners/aws/host'
    after refactoring
  severity: WARNING
  languages:
  - go
  pattern-regex: github\.com/DataDog/datadog-agent/test/new-e2e/pkg/environments/aws/host["\s]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 81
  paths:
    exclude:
    - '**/provisioners/**'
- id: e2e-typed-provisioner-return-in-environments
  message: Functions returning e2e.TypedProvisioner should be moved to pkg/provisioners
  severity: ERROR
  languages:
  - go
  pattern-regex: e2e\.TypedProvisioner\[environments\.
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
  paths:
    include:
    - test/new-e2e/pkg/environments/**
- id: old-e2e-new-typed-pulumi-provisioner-call
  message: Function call 'e2e.NewTypedPulumiProvisioner' should be 'provisioners.NewTypedPulumiProvisioner'
    after refactoring
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: e2e.NewTypedPulumiProvisioner(...)
  - pattern-not-inside: 'import "github.com/DataDog/datadog-agent/test/new-e2e/pkg/provisioners"

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: old-qualified-new-typed-pulumi-provisioner-call
  message: Replace 'e2e.NewTypedPulumiProvisioner' with 'provisioners.NewTypedPulumiProvisioner'
    after refactoring
  severity: WARNING
  languages:
  - go
  pattern: e2e.NewTypedPulumiProvisioner
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
  paths:
    exclude:
    - '**/provisioners/**'
- id: provisioner-function-returning-typed-provisioner
  message: Provisioner functions returning e2e.TypedProvisioner should be moved to
    pkg/provisioners
  severity: ERROR
  languages:
  - go
  pattern-regex: func\s+Provisioner.*\)\s+e2e\.TypedProvisioner\[
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - test/new-e2e/pkg/environments/**
- id: old-aws-eks-provisioner-import
  message: AWS kubernetes provisioner import should use 'pkg/provisioners/aws/kubernetes'
