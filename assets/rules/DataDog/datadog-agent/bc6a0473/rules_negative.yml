- id: pulumi-provisioner-instantiation-in-environments
  message: Calls to e2e.NewTypedPulumiProvisioner in environments package should be
    moved to pkg/provisioners
  severity: ERROR
  languages:
  - go
  pattern: e2e.NewTypedPulumiProvisioner($ID, $FUNC, $CONFIG)
  metadata:
