    after refactoring
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern: "type $PROVISIONER interface {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $PROVISIONER
      patterns:
      - pattern-either:
        - pattern: Provisioner
        - pattern: TypedProvisioner
        - pattern: UntypedProvisioner
        - pattern: Diagnosable
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
