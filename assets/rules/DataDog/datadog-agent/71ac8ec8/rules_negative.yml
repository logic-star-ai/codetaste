- id: dd-corecheck-factory-servicediscovery-missing-tagger
  message: Service discovery check Factory still lacks injected tagger dependency;
    update Factory signature accordingly.
  severity: ERROR
  languages:
  - go
  pattern: func Factory(store workloadmeta.Component) $RET { ... }
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/corechecks/servicediscovery/*.go
- id: dd-python-tags-calls-tagsfunc-directly
  message: Tags() uses tagsFunc(goID, ...); after refactor, tags should come from
    check context's injected tagger.LegacyTag.
  severity: WARNING
  languages:
  - go
  pattern: tagsFunc($ID, $CARD)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/python/tagger.go
- id: dd-processor-extension-interface-postprocess-no-args
  message: Processor extension interface still defines PostProcess() without tagger
    parameter; update signature to accept injected tagger.
  severity: ERROR
  languages:
  - go
  pattern: "type $T interface {\n  ...\n  PostProcess()\n  ...\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/corechecks/containers/generic/processor_extension.go
- id: dd-docker-network-extension-postprocess-no-args
  message: dockerNetworkExtension.PostProcess() called without tagger; update to pass
    injected tagger.
  severity: WARNING
  languages:
  - go
  pattern: dockerNetworkExtension.PostProcess()
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/corechecks/containers/docker/**.go
- id: dd-generic-processor-postprocess-no-args
  message: Generic processor PostProcess() still has no args; update to accept tagger
    and forward to extensions.
  severity: ERROR
  languages:
  - go
  pattern: func ($R *$T) PostProcess() { ... }
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/corechecks/containers/generic/processor*.go
- id: dd-containerd-custom-metrics-extension-postprocess-no-args
  message: containerd custom metrics extension PostProcess() has no args; update signature
    to accept injected tagger.
  severity: ERROR
  languages:
  - go
  pattern: func ($R *$T) PostProcess() { ... }
  metadata:
    category: architectural
