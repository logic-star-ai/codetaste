rules:
- id: tagger-global-checks-cardinality-usage
  message: 'Remove global tagger usage: tagger.ChecksCardinality() has been removed.
    Use tagger component instance method instead.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.ChecksCardinality()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: checkscardinality-global-function
  message: 'Remove global ChecksCardinality: Use tagger component instance method
    instead of global function'
  severity: ERROR
  languages:
  - go
  pattern: tagger.ChecksCardinality()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: kubelet-provider-with-global-tagger
  message: 'Kubelet provider using global tagger: Store tagger in provider struct'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'package $PKG

      ...

      '
  - pattern: tagger.Tag($ENTITY, $CARD)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(summary|kubelet|pod)$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '**/kubelet/provider/**/*.go'
- id: new-bundled-transformer-two-params
  message: 'Bundled transformer constructor missing tagger: Add tagger as third parameter'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: newBundledTransformer($FILTER, $WMETA)
  - pattern-not: newBundledTransformer($FILTER, $WMETA, $TAGGER)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/docker/*.go'
- id: pod-provider-tagger-call
  message: 'Kubelet pod provider using global tagger: Pass tagger to provider'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: tagger.Tag($E, $C)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/kubelet/provider/pod/provider.go'
- id: tagger-global-get-entity-hash-usage
  message: 'Remove global tagger usage: tagger.GetEntityHash() has been removed. Use
    tagger component instance method instead.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.GetEntityHash($ENTITY, $CARDINALITY)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: tagger-global-dogstatsd-cardinality-usage
  message: 'Remove global tagger usage: tagger.DogstatsdCardinality() has been removed.
    Use tagger component instance method instead.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.DogstatsdCardinality()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: getentityhash-global-function
  message: 'Remove global GetEntityHash: Use tagger component instance method instead
    of global function'
  severity: ERROR
  languages:
  - go
  pattern: tagger.GetEntityHash($E, $C)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dogstatsdcardinality-global-function
  message: 'Remove global DogstatsdCardinality: Use tagger component instance method
    instead of global function'
  severity: ERROR
  languages:
  - go
  pattern: tagger.DogstatsdCardinality()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: loader-catalog-without-tagger-param
  message: 'LoaderCatalog needs tagger parameter: Pass tagger to enable loader factories
    to receive it'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: LoaderCatalog($SENDER, $RECEIVER)
  - pattern-not: LoaderCatalog($SENDER, $RECEIVER, $TAGGER)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: docker-event-processing-with-global-tagger
  message: 'Docker event processing using global tagger: Store tagger in struct and
    use instance method'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'package docker

      ...

      '
  - pattern-either:
    - pattern: tagger.Tag($ENTITY, $CARD)
    - pattern: tagger.GetEntityHash($ENTITY, $CARD)
    - pattern: tagger.AccumulateTagsFor($ENTITY, $CARD, $TB)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/docker/events.go'
    - '**/docker/eventbundle.go'
    - '**/docker/unbundled_events.go'
- id: set-global-tagger-in-comment
  message: 'Comment references SetGlobalTagger: Update documentation to reflect dependency
    injection'
  severity: INFO
  languages:
  - go
  pattern-regex: (?i).*SetGlobalTagger.*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: tagger-global-list-usage
  message: 'Remove global tagger usage: tagger.List() has been removed. Use tagger
    component instance method instead.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.List()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: tagger-global-enrich-tags-usage
  message: 'Remove global tagger usage: tagger.EnrichTags() has been removed. Use
    tagger component instance method instead.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.EnrichTags($ACCUMULATOR, $ORIGIN)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: list-global-function
  message: 'Remove global List: Use tagger component instance method instead of global
    function'
  severity: ERROR
  languages:
  - go
  pattern: tagger.List()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: enrichtags-global-function
  message: 'Remove global EnrichTags: Use tagger component instance method instead
    of global function'
  severity: ERROR
  languages:
  - go
  pattern: tagger.EnrichTags($TB, $ORIGIN)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: service-listener-deps-not-used
  message: 'Listener constructor should use ServiceListenerDeps: Update $NEWFUNC signature
    to accept ServiceListenerDeps'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'package listeners

      ...

      '
  - pattern: "func $NEWFUNC($CONFIG $CTYPE, $TELEMETRY *telemetry.Store) ($RET, error)\
      \ {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $NEWFUNC
      regex: ^New.*Listener$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/autodiscovery/listeners/*.go'
- id: listener-register-call-old-factory-type
  message: 'Listener registration using old factory type: Update factory to accept
    ServiceListenerDeps'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: Register($NAME, $FACTORY, $MAP)
  - metavariable-pattern:
      metavariable: $FACTORY
      patterns:
      - pattern: "func($CONFIG Config, $TELEMETRY *telemetry.Store) (ServiceListener,\
          \ error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/autodiscovery/listeners/*.go'
- id: summary-provider-tagger-call
  message: 'Kubelet summary provider using global tagger: Pass tagger to provider'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: tagger.Tag($E, $C)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/kubelet/provider/summary/provider.go'
- id: tagger-global-set-client-usage
  message: 'Remove global tagger usage: SetGlobalTaggerClient() has been removed.
    Pass tagger component via dependency injection instead.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.SetGlobalTaggerClient($ARG)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tagger-global-get-entity-usage
  message: 'Remove global tagger usage: tagger.GetEntity() has been removed. Use tagger
    component instance method instead.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.GetEntity($ENTITY)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tagger-global-global-tags-usage
  message: 'Remove global tagger usage: tagger.GlobalTags() has been removed. Use
    tagger component instance method instead.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.GlobalTags($CARDINALITY)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tagger-global-file-import
  message: 'Remove global tagger file: global.go containing global tagger accessors
    should be deleted.'
  severity: ERROR
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - comp/core/tagger/global.go
    - pkg/tagger/global.go
- id: tagger-package-level-setglobal-call
  message: 'Remove global tagger accessor: SetGlobalTaggerClient() should be removed,
    use dependency injection instead'
  severity: ERROR
  languages:
  - go
  pattern: tagger.SetGlobalTaggerClient($CLIENT)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: setglobaltaggerclient-function-call
  message: 'Remove SetGlobalTaggerClient call: Global tagger client initialization
    should be removed'
  severity: ERROR
  languages:
  - go
  pattern: tagger.SetGlobalTaggerClient($ARG)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: getentity-global-function
  message: 'Remove global GetEntity: Use tagger component instance method instead
