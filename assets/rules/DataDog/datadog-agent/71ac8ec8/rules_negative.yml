  severity: ERROR
  languages:
  - go
  pattern: tagger.GetEntity($E)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: globaltags-global-function
  message: 'Remove global GlobalTags: Use tagger component instance method instead
