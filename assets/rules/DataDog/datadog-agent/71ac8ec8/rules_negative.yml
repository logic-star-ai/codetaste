rules:
- id: dd-tagger-tests-reset-tagger-called
  message: Legacy ResetTagger() usage detected in tests; with DI there should be no
    need to reset a global tagger. Create a fresh tagger instance (or use nooptagger)
    and pass it explicitly.
  severity: WARNING
  languages:
  - go
  pattern: $T.ResetTagger()
  metadata:
    category: test
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
- id: dd-tagger-global-checks-cardinality
  message: 'Found tagger.ChecksCardinality(): avoid global accessor; use injected
    tagger to determine checks cardinality.'
  severity: WARNING
  languages:
  - go
  pattern: tagger.ChecksCardinality()
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: dd-proccontainers-callsite-getsharedcontainerprovider-single-arg
  message: Call to GetSharedContainerProvider(...) with a single workloadmeta arg
    found; after refactor, shared provider should be initialized once (with tagger)
    and accessed via new API (likely no args / returns error).
  severity: ERROR
  languages:
  - go
  pattern: proccontainers.GetSharedContainerProvider($WMETA)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: dd-initcheckscheduler-called-with-three-args
  message: InitCheckScheduler called without tagger; after refactor it should accept
    tagger dependency.
  severity: ERROR
  languages:
  - go
  pattern: collector.InitCheckScheduler($C, $S, $L)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: dd-corecheck-docker-uses-global-tagger
  message: Docker check code uses global tagger.Tag(...); refactor to injected tagger
    instance.
  severity: ERROR
  languages:
  - go
  pattern: tagger.Tag($EID, $CARD)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - pkg/collector/corechecks/containers/docker/**.go
- id: dd-ad-listener-ctor-positional-config-telemetry-regex
  message: Listener constructor uses legacy positional args (Config, *telemetry.Store).
    Refactor to NewXListener(ServiceListenerDeps) including tagger and wmeta.
  severity: ERROR
  languages:
  - generic
  pattern-regex: func\s+New[A-Za-z0-9_]*Listener\s*\(\s*[^,\)]*\bConfig\b\s*,\s*\*telemetry\.Store\s*\)\s*\(\s*ServiceListener\s*,\s*error\s*\)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - comp/core/autodiscovery/listeners/*.go
- id: dd-corechecks-factory-stub-single-arg
  message: Stub Factory(_ workloadmeta.Component) still exists; update stubs to new
    signature including tagger.
  severity: WARNING
  languages:
  - generic
  pattern-regex: func\s+Factory\s*\(\s*_\s+workloadmeta\.Component\s*\)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - pkg/collector/corechecks/**/stub.go
- id: dd-tagger-global-legacytag-used-as-func-value
  message: Legacy global tagger.LegacyTag referenced as a function value. Store an
    injected tagger in context and call its LegacyTag method instead.
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern-inside: "import (\n  ...\n  \"github.com/DataDog/datadog-agent/comp/core/tagger\"\
      \n  ...\n)\n...\n"
  - pattern: $X = tagger.LegacyTag
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dd-tagger-global-get-entity-hash
  message: 'Found tagger.GetEntityHash(...): avoid global accessor; call GetEntityHash
    on the injected tagger component.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.GetEntityHash($ENTITY, $CARD)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dd-tagger-global-dogstatsd-cardinality
  message: 'Found tagger.DogstatsdCardinality(): avoid global accessor; use injected
    tagger to determine dogstatsd cardinality.'
  severity: WARNING
  languages:
  - go
  pattern: tagger.DogstatsdCardinality()
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dd-loaders-test-loadercatalog-two-args
  message: Tests call LoaderCatalog(senderManager, logReceiver); after refactor pass
    tagger dependency.
  severity: WARNING
  languages:
  - go
  pattern: LoaderCatalog($SENDER, $LOGRECV)
  metadata:
    category: test
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - pkg/collector/loaders/*test*.go
- id: dd-tagger-global-list
  message: 'Found tagger.List(): avoid global accessor; call List() on the injected
    tagger component.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.List()
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dd-tagger-global-enrich-tags
  message: 'Found tagger.EnrichTags(...): avoid global accessor; call EnrichTags on
    the injected tagger component.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.EnrichTags($TB, $ORIGIN)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dd-ad-listeners-registerlisteners-legacy-factory-wrapper
  message: RegisterListeners still wraps New*Listener with func(config, telemetryStore)
    {...}. Update registration to pass ServiceListenerDeps (config, telemetry, tagger,
    wmeta).
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern-inside: "func RegisterListeners(...) {\n  ...\n}\n"
  - pattern: "Register($NAME, func(config Config, telemetryStore *telemetry.Store)\
      \ (ServiceListener, error) {\n  ...\n}, ...)\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - comp/core/autodiscovery/listeners/listeners.go
- id: dd-ad-listeners-global-tag-call
  message: Service/listener still calls global tagger.Tag(...). Inject tagger into
    the service/listener and call the instance method.
  severity: ERROR
  languages:
  - go
  pattern: tagger.Tag($EID, $CARD)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - comp/core/autodiscovery/listeners/*.go
- id: dd-corecheck-factory-oomkill-no-tagger
  message: OOM kill check Factory signature should accept injected tagger (for container
    tags); legacy Factory() without tagger still present.
  severity: WARNING
  languages:
  - go
  pattern: func Factory() $RET { ... }
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - pkg/collector/corechecks/ebpf/oomkill/*.go
- id: dd-corecheck-factory-tcpqueuelength-no-tagger
  message: TCP queue length check Factory signature should accept injected tagger;
    legacy Factory() without tagger still present.
  severity: WARNING
  languages:
  - go
  pattern: func Factory() $RET { ... }
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - pkg/collector/corechecks/ebpf/tcpqueuelength/*.go
- id: dd-loadercatalog-called-with-two-args
  message: LoaderCatalog called with two args; after refactor it should be passed
    the tagger dependency as well.
  severity: ERROR
  languages:
  - go
  pattern: loaders.LoaderCatalog($SENDER, $LOGRECV)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dd-python-initializecheckcontext-called-with-two-args
  message: initializeCheckContext called with only (senderManager, logReceiver); after
    refactor, pass injected tagger as well.
  severity: ERROR
  languages:
  - go
  pattern: initializeCheckContext($SENDER, $LOGRECV)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - pkg/collector/python/*.go
- id: dd-postprocess-invoked-in-tests
  message: Tests call PostProcess() without passing tagger; update tests for new PostProcess(tagger)
    signature.
  severity: WARNING
  languages:
  - go
  pattern: $X.PostProcess()
  metadata:
    category: test
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*test*.go'
- id: dd-ad-listener-ctor-mentions-workloadmeta-regex
  message: Listener constructor mentions workloadmeta in parameters; after refactor
    it should receive tagger via a deps struct as well.
  severity: WARNING
  languages:
  - generic
  pattern-regex: func\s+New[A-Za-z0-9_]*Listener\s*\([^\)]*workloadmeta\.Component[^\)]*\)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - comp/core/autodiscovery/listeners/*.go
- id: dd-tagger-global-file-still-present
  message: Legacy global tagger singleton file comp/core/tagger/global.go still exists;
    remove global accessor and use dependency injection.
  severity: ERROR
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - comp/core/tagger/global.go
- id: dd-tagger-set-global-tagger-client
  message: 'Found tagger.SetGlobalTaggerClient(...): global tagger singleton should
    be removed; inject tagger.Component instead.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.SetGlobalTaggerClient(...)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dd-tagger-global-get-entity
  message: 'Found tagger.GetEntity(...): avoid global accessor; call GetEntity on
    the injected tagger component.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.GetEntity($ENTITY)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dd-tagger-global-global-tags
  message: 'Found tagger.GlobalTags(...): avoid global accessor; call GlobalTags on
    the injected tagger component.'
  severity: ERROR
  languages:
  - go
  pattern: tagger.GlobalTags($CARD)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dd-tagger-global-set-new-capture-tagger
  message: 'Found tagger.SetNewCaptureTagger(...): legacy global capture tagger setter
    should be removed with global tagger.'
  severity: WARNING
  languages:
  - go
  pattern: tagger.SetNewCaptureTagger($T)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dd-tagger-global-reset-capture-tagger
  message: 'Found tagger.ResetCaptureTagger(): legacy global capture tagger reset
    should be removed with global tagger.'
  severity: WARNING
  languages:
  - go
  pattern: tagger.ResetCaptureTagger()
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dd-proccontainers-getsharedcontainerprovider-legacy-signature
  message: Legacy GetSharedContainerProvider(wmeta) signature found; new API should
    not silently initialize and should accept/init with tagger dependency.
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern: "func GetSharedContainerProvider($WMETA workloadmeta.Component) $RET\
      \ {\n  ...\n}\n"
  - pattern-not: "func GetSharedContainerProvider(...) (..., error) {\n  ...\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/process/util/containers/containers.go
- id: dd-proccontainers-tag-using-global-tagger
  message: Process container provider uses global tagger.Tag(...); should use injected
    tagger component from provider instance.
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern-inside: 'package containers

      ...

      '
  - pattern: tagger.Tag($EID, $CARD)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/process/util/containers/containers.go
- id: dd-ad-kube-endpoints-listener-legacy-signature
  message: Kube endpoints listener still uses legacy signature (conf, telemetryStore).
    Update to ServiceListenerDeps injection.
  severity: ERROR
  languages:
  - go
  pattern: func NewKubeEndpointsListener($CONF Config, $TEL *telemetry.Store) (ServiceListener,
    error) { ... }
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - comp/core/autodiscovery/listeners/kube_endpoints.go
- id: dd-ad-kube-services-listener-legacy-signature
  message: Kube services listener still uses legacy signature (conf, telemetryStore).
    Update to ServiceListenerDeps injection.
  severity: ERROR
  languages:
  - go
  pattern: func NewKubeServiceListener($CONF Config, $TEL *telemetry.Store) (ServiceListener,
    error) { ... }
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - comp/core/autodiscovery/listeners/kube_services.go
- id: dd-corecheck-factory-containerimage-missing-tagger
  message: containerimage check Factory still takes only workloadmeta store; update
    Factory signature to accept injected tagger component.
  severity: ERROR
  languages:
  - go
  pattern: func Factory(store workloadmeta.Component) $RET { ... }
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/corechecks/containerimage/*.go
- id: dd-corecheck-factory-containerd-missing-tagger
  message: containerd check Factory still takes only workloadmeta store; update Factory
