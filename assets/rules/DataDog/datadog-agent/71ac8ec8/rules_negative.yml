    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/corechecks/containers/containerd/check_metrics_extension.go
- id: dd-cri-custom-metrics-extension-postprocess-no-args
  message: CRI custom metrics extension PostProcess() has no args; update signature
