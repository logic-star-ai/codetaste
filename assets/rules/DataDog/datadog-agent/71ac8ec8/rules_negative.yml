    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/corechecks/containers/generic/*.go
- id: dd-corecheck-factory-kubelet-missing-tagger
  message: Kubelet check Factory still takes only workloadmeta store; update Factory
