- id: check-scheduler-init-signature-old
  message: 'InitCheckScheduler missing tagger parameter: Add tagger component parameter'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func InitCheckScheduler($CONFIG $CTYPE, $SENDER $STYPE, $RECEIVER $RTYPE)\
      \ $RET {\n  ...\n}\n"
  - pattern-not: "func InitCheckScheduler($CONFIG $CTYPE, $SENDER $STYPE, $RECEIVER\
      \ $RTYPE, $TAGGER $TTYPE) $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: container-listener-new-without-tagger
