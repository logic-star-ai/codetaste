- id: global-go-file-exists
  message: 'Remove global.go file: This file containing global tagger accessors should
    be deleted'
  severity: ERROR
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/tagger/global.go'
    - '**/taggerimpl/global.go'
- id: docker-check-struct-missing-tagger-field
  message: 'DockerCheck struct missing tagger field: Add tagger field to store tagger
    component'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'package docker

      ...

      '
  - pattern-inside: "type DockerCheck struct {\n  ...\n}\n"
  - pattern-not-inside: "type DockerCheck struct {\n  ...\n  tagger $TYPE\n  ...\n\
      }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/docker/check.go'
- id: containerd-check-struct-missing-tagger-field
  message: 'ContainerdCheck struct missing tagger field: Add tagger field to store
    tagger component'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'package containerd

      ...

