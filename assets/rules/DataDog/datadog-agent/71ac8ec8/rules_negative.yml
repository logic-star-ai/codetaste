  paths:
    include:
    - pkg/collector/corechecks/containers/docker/check_network.go
- id: dd-processor-extension-postprocess-in-loop
  message: Loop calling extension.PostProcess() found; update to pass tagger to each
    PostProcess call.
  severity: ERROR
  languages:
  - go
  pattern: "for _, $EXT := range $EXTS {\n  ...\n  $EXT.PostProcess()\n  ...\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/corechecks/containers/generic/processor.go
- id: dd-ad-registerlisteners-legacy-signature-regex
  message: RegisterListeners signature still only wires workloadmeta; update wiring
    so listener creation receives tagger in deps.
  severity: INFO
  languages:
  - generic
  pattern-regex: func\s+RegisterListeners\s*\([^\)]*wmeta\s+optional\.Option\s*\[\s*workloadmeta\.Component\s*\]
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - comp/core/autodiscovery/listeners/listeners.go
- id: dd-loaderfactory-legacy-type-signature
  message: Legacy LoaderFactory type missing tagger parameter; update LoaderFactory
    to accept injected tagger component.
  severity: ERROR
  languages:
  - generic
  pattern-regex: type\s+LoaderFactory\s+func\s*\(\s*sender\.SenderManager\s*,\s*optional\.Option\s*\[\s*integrations\.Component\s*\]\s*\)\s*\(\s*check\.Loader\s*,\s*error\s*\)
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/loaders/loaders.go
- id: dd-loadercatalog-legacy-func-signature
  message: Legacy LoaderCatalog(senderManager, logReceiver) signature found; update
    to accept injected tagger component and pass it through.
  severity: ERROR
  languages:
  - generic
  pattern-regex: func\s+LoaderCatalog\s*\(\s*senderManager\s+sender\.SenderManager\s*,\s*logReceiver\s+optional\.Option\s*\[\s*integrations\.Component\s*\]\s*\)\s*\[\]check\.Loader
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/loaders/loaders.go
- id: dd-initcheckscheduler-legacy-signature
  message: Legacy InitCheckScheduler(collector, senderManager, logReceiver) signature
    found; update to accept injected tagger parameter.
  severity: ERROR
  languages:
  - generic
  pattern-regex: func\s+InitCheckScheduler\s*\(\s*collector\s+optional\.Option\s*\[\s*collector\.Component\s*\]\s*,\s*senderManager\s+sender\.SenderManager\s*,\s*logReceiver\s+optional\.Option\s*\[\s*integrations\.Component\s*\]\s*\)\s*\*CheckScheduler
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/collector/scheduler.go
- id: dd-python-initializecheckcontext-legacy-signature
  message: Legacy initializeCheckContext(senderManager, logReceiver) signature found;
    update to accept injected tagger and store it in Python check context.
  severity: ERROR
  languages:
  - generic
  pattern-regex: func\s+initializeCheckContext\s*\(\s*senderManager\s+sender\.SenderManager\s*,\s*logReceiver\s+optional\.Option\s*\[\s*integrations\.Component\s*\]\s*\)
  metadata:
    category: architectural
