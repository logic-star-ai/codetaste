rules:
- id: tagger-tag-with-types-cardinality-excluding-security
  message: Detected Tag call with types cardinality excluding security resolver
  severity: INFO
  languages:
  - go
  pattern: $OBJ.tagger.Tag($ENTITY, types.$CARD)
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/security/**/*.go'
- id: check-tags-from-tagger-field-excluding-otel-security
  message: Detected tags assignment from tagger.Tag call outside otel/security
  severity: INFO
  languages:
  - go
  pattern: '$TAGS, $ERR := $OBJ.tagger.Tag($ENTITY, $CARD)

    '
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/otelcol/**/*.go'
    - '**/security/**/*.go'
- id: check-struct-with-store-and-tagger-fields
  message: Detected check struct with both store and tagger fields
  severity: INFO
  languages:
  - go
  pattern: "type $CHECK struct {\n  ...\n  store $STORE_TYPE\n  ...\n  tagger $TAGGER_TYPE\n\
    \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: check-interface-with-tagger-excluding-kubernetesapiserver
  message: Detected check struct with tagger field outside kubernetesapiserver
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $CHECK struct {\n  core.CheckBase\n  ...\n  tagger $TAGGER_TYPE\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/kubernetesapiserver/*.go'
- id: test-setup-creating-tagger-instance
  message: Detected test setup creating tagger instance explicitly
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TAGGER := $FUNC()
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(newtagger|createtagger|nooptagger|faketagger).*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: provider-using-tagger-field
  message: Detected provider using tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $PROVIDER struct {\n  ...\n  tagger $TAGGER_TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PROVIDER
      regex: (?i).*provider.*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: tagger-field-in-check-config-method
  message: Detected tagger field access in check Configure method
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$CHECK) Configure(...) error {\n  ...\n  $R.tagger\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $CHECK
      regex: (?i).*(check|collector).*
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/kubernetesapiserver/*.go'
- id: loader-factory-with-tagger-param
  message: Detected loader factory accepting tagger via dependency injection
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FACTORY($MGR $MGR_TYPE, $RCV $RCV_TYPE, $TAGGER $TAGGER_TYPE) $RET
      { ... }
  - metavariable-regex:
      metavariable: $FACTORY
      regex: (?i).*(loader|load|create|factory).*
  - metavariable-regex:
      metavariable: $TAGGER
      regex: (?i).*(tag|tagger).*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: factory-two-param-tagger-second
  message: Detected factory with two parameters where second is tagger
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func Factory($P1 $T1, $TAGGER tagger.$COMP) $RET { ... }
    - pattern: func Factory($P1 $T1, $TAGGER $PKG.Component) $RET { ... }
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i).*tag.*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: container-check-with-tagger-field
  message: Detected container check struct with tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $CHECK struct {\n  ...\n  tagger $TAGGER_TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CHECK
      regex: (?i).*(container|docker|cri|containerd|kubelet).*check
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: tagger-impl-legacy-tag-method
  message: Detected tagger implementation with LegacyTag method
  severity: INFO
  languages:
  - go
  pattern: "func ($R $T) LegacyTag($ENTITY string, $CARD $CARD_TYPE) ([]string, error)\
    \ {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: check-with-instance-store-tagger
  message: Detected check struct initialization with instance, store, and tagger fields
  severity: INFO
  languages:
  - go
  pattern: "&$CHECK{\n  CheckBase: $BASE,\n  instance: $INST,\n  store: $STORE,\n\
    \  tagger: $TAGGER,\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: check-configure-creating-processor-with-tagger
  message: Detected Configure method creating processor with tagger
  severity: INFO
  languages:
  - go
  pattern: "func ($R *$CHECK) Configure(...) error {\n  ...\n  $R.processor = $CONSTRUCTOR(...,\
    \ $R.tagger)\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: orchestrator-check-with-tagger-field
  message: Detected orchestrator check struct with tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $CHECK struct {\n  ...\n  tagger $TAGGER_TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CHECK
      regex: (?i).*(pod|ecs|orchestrator).*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: check-method-calling-tagger-tag
  message: Detected check method calling Tag on tagger instance
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$CHECK) $METHOD(...) $RET {\n  ...\n  $R.tagger.Tag($ENTITY,\
      \ $CARD)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CHECK
      regex: (?i).*(check|collector)$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: check-field-access-tagger-getEntityHash
  message: Detected field access to tagger followed by GetEntityHash call
  severity: INFO
  languages:
  - go
  pattern: $OBJ.tagger.GetEntityHash($ENTITY, $CARD)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: check-method-using-tagger-checksCardinality
  message: Detected check method using ChecksCardinality on tagger
  severity: INFO
  languages:
  - go
  pattern: "func ($R *$T) $METHOD(...) $RET {\n  ...\n  $R.tagger.ChecksCardinality()\n\
    \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: tagger-dogstatsdCardinality-excluding-global
  message: Detected DogstatsdCardinality call on tagger instance outside global
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TAGGER.DogstatsdCardinality()
  - pattern-not: tagger.DogstatsdCardinality()
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tagger/global.go'
- id: listener-struct-with-tagger-field
  message: Detected listener struct with tagger field for DI
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $LISTENER struct {\n  ...\n  tagger $TAGGER_TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $LISTENER
      regex: (?i).*listener$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: container-listener-with-tagger
  message: Detected container listener with tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $LISTENER struct {\n  ...\n  tagger $TAGGER_TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $LISTENER
      regex: (?i).*(container|docker|containerd).*listener
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: check-run-using-self-tagger
  message: Detected check Run method using self.tagger
  severity: INFO
  languages:
  - go
  pattern: "func ($R $T) Run() error {\n  ...\n  $R.tagger.$METHOD(...)\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: service-method-using-tagger-field
  message: Detected service method using tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$SERVICE) $METHOD(...) $RET {\n  ...\n  $R.tagger.$TAGGER_METHOD(...)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $SERVICE
      regex: (?i).*(service|svc)$
  - metavariable-regex:
      metavariable: $TAGGER_METHOD
      regex: (?i)(tag|enrichtag|gettag)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: check-field-access-tagger-enrichTags
  message: Detected field access to tagger followed by EnrichTags call
  severity: INFO
  languages:
  - go
  pattern: $OBJ.tagger.EnrichTags($ACCUM, $ORIGIN)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: legacy-tag-method-call
  message: Detected LegacyTag method call for backward compatibility
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TAGGER.$METHOD($ENTITY, $CARD)
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)^legacytag$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: get-shared-provider-with-error
  message: Detected GetSharedContainerProvider returning error when not initialized
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $GET() ($RET, error) { ... }
  - metavariable-regex:
      metavariable: $GET
      regex: (?i)get.*(shared|container).*(provider|factory).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: service-gettags-using-field-tagger
  message: Detected GetTags method using service tagger field
  severity: INFO
  languages:
  - go
  pattern: "func ($R $T) GetTags() $RET {\n  ...\n  $R.tagger.$METHOD(...)\n  ...\n\
    }\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: tagger-component-interface-with-legacy-tag
  message: Detected tagger Component interface with LegacyTag method
  severity: INFO
  languages:
  - go
  pattern: "type $INTERFACE interface {\n  ...\n  LegacyTag($ENTITY string, $CARD\
    \ $CARD_TYPE) ([]string, error)\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: service-struct-with-tagger-field
  message: Detected service struct with tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $SERVICE struct {\n  ...\n  tagger $TAGGER_TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $SERVICE
      regex: (?i).*(service|svc)$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: oomkill-check-with-tagger
  message: Detected OOM kill check with tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $CHECK struct {\n  ...\n  tagger $TAGGER_TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CHECK
      regex: (?i).*(oom|kill).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: tcp-queue-check-with-tagger
  message: Detected TCP queue check with tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $CHECK struct {\n  ...\n  tagger $TAGGER_TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CHECK
      regex: (?i).*(tcp|queue|network).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: check-calling-tagger-getEntity
  message: Detected check calling GetEntity on tagger field
  severity: INFO
  languages:
  - go
  pattern: "func ($R *$CHECK) $METHOD(...) $RET {\n  ...\n  $R.tagger.GetEntity($ENTITY)\n\
    \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: provider-init-function-with-wmeta-tagger
  message: Detected provider initialization function with wmeta and tagger params
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $INIT($WMETA $WT, $TAGGER $TT) $RET { ... }
  - metavariable-regex:
      metavariable: $INIT
      regex: (?i).*(init|setup|create).*(provider|shared).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: processor-with-tagger-param-in-constructor
  message: Detected processor constructor accepting tagger parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $NEW(..., $TAGGER tagger.Component) *$PROCESSOR { ... }
  - metavariable-regex:
      metavariable: $NEW
      regex: (?i)^new.*
  - metavariable-regex:
      metavariable: $PROCESSOR
      regex: (?i).*processor.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
