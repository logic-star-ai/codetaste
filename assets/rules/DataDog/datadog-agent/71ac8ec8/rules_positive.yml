rules:
- id: check-struct-tagger-not-pointer
  message: Detected check with non-pointer tagger component field - indicates successful
    DI refactoring
  severity: INFO
  languages:
  - go
  pattern: "type $CHECK struct {\n  ...\n  tagger tagger.Component\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**'
    exclude:
    - '**/kubernetesapiserver/**'
- id: tagger-component-field-exclude-kubeapi
  message: Detected struct with tagger.Component field (excluding pre-existing) -
    indicates successful DI refactoring
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $STRUCT struct {\n  ...\n  $FIELD tagger.Component\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $STRUCT
      regex: .*(Check|Listener|Service|Provider|Processor|Extension|Loader)$
  metadata:
    category: structural
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/kubernetesapiserver/**'
- id: check-struct-with-tagger-and-store
  message: Detected check struct with both store and tagger fields - indicates successful
    DI refactoring
  severity: INFO
  languages:
  - go
  pattern: "type $CHECK struct {\n  ...\n  store $STORE_TYPE\n  tagger $TAGGER_TYPE\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: check-with-tagger-field-exclude-apiserver
  message: Detected check with tagger field - indicates successful DI refactoring
  severity: INFO
  languages:
  - go
  pattern: "type $CHECK struct {\n  core.CheckBase\n  ...\n  tagger tagger.Component\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/kubernetesapiserver/**'
- id: tagger-checks-cardinality-on-instance
  message: Detected ChecksCardinality call on instance tagger - indicates successful
    refactoring from global
  severity: INFO
  languages:
  - go
  pattern: '$VAR.tagger.ChecksCardinality()

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: check-factory-store-tagger-params
  message: Detected Factory with store and tagger params returning optional - indicates
    successful DI refactoring
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func Factory($P1 workloadmeta.Component, $P2 tagger.Component) $RET\
      \ {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $RET
      regex: optional\..*
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: return-check-with-tagger-store
  message: Detected check initialization with both store and tagger - indicates successful
    DI refactoring
  severity: INFO
  languages:
  - go
  pattern: "return &$CHECK{\n  CheckBase: $BASE,\n  store: $STORE,\n  tagger: $TAGGER,\n\
    \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: tagger-in-check-file-struct
  message: Detected check struct with tagger in check.go - indicates successful DI
    refactoring
  severity: INFO
  languages:
  - go
  pattern: "type $CHECK struct {\n  ...\n  tagger tagger.Component\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**/check.go'
- id: tagger-legacytag-method-implementation
  message: Detected LegacyTag method implementation on tagger - indicates successful
    refactoring for Python integration backward compatibility
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV $TYPE) LegacyTag($ENTITY string, $CARDINALITY $CARD_TYPE)\
    \ ([]string, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: legacy-tag-method-in-component
  message: Detected LegacyTag delegating to Tag - indicates successful Python integration
    refactoring
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV *$TYPE) LegacyTag($ENTITY string, $CARD $CARD_TYPE) ([]string,\
    \ error) {\n  ...\n  return $RECV.Tag($ENTITYID, $CARD)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: legacy-tag-with-extract-prefix
  message: Detected LegacyTag with ExtractPrefixAndID - indicates successful Python
    backward compatibility refactoring
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV $TYPE) LegacyTag($ENTITY string, $CARDINALITY $CARD_TYPE)\
    \ ([]string, error) {\n  ...\n  $PREFIX, $ID, $ERR := common.ExtractPrefixAndID($ENTITY)\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: legacy-tag-calls-tag-with-entity-id
  message: Detected LegacyTag converting string to EntityID and calling Tag - indicates
    successful Python compatibility
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV $TYPE) LegacyTag($ENTITY string, $CARDINALITY $CARD_TYPE)\
    \ ([]string, error) {\n  ...\n  $ENTITY_ID := types.NewEntityID($PREFIX, $ID)\n\
    \  return $RECV.Tag($ENTITY_ID, $CARDINALITY)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: new-entity-id-in-legacy-tag
  message: Detected NewEntityID in LegacyTag - indicates string to EntityID conversion
    for Python compatibility
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV $TYPE) LegacyTag($ENTITY string, $CARDINALITY $CARD_TYPE)\
    \ ([]string, error) {\n  ...\n  $ENTITY_ID := types.NewEntityID($PREFIX, $ID)\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: tagger-component-in-function-signature
  message: Detected constructor/initialization function with tagger parameter - indicates
