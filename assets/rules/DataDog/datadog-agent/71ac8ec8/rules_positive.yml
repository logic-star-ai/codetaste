rules:
- id: tagger-component-field-exported
  message: Exported struct contains tagger.Component field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $TYPE struct {\n  ...\n  $FIELD tagger.Component\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^[A-Z].*
  - metavariable-regex:
      metavariable: $FIELD
      regex: (?i).*(tagger|tag).*
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**'
    - '**/listeners/**'
    - '**/providers/**'
    exclude:
    - '**/kubernetesapiserver/**'
    - '**/infraattributesprocessor/**'
    - '**/*_test.go'
- id: check-base-with-tagger-field
  message: CheckBase-derived struct contains tagger field
  severity: INFO
  languages:
  - go
  pattern: "type $CHECK struct {\n  core.CheckBase\n  ...\n  $FIELD tagger.Component\n\
    \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**'
    exclude:
    - '**/kubernetesapiserver/**'
    - '**/infraattributesprocessor/**'
    - '**/*_test.go'
- id: provider-struct-with-tagger
  message: Provider struct includes tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $PROVIDER struct {\n  ...\n  $FIELD tagger.Component\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PROVIDER
      regex: (?i).*(provider|processor|extension).*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/infraattributesprocessor/**'
    - '**/test/**'
    - '**/*_test.go'
- id: nooptagger-used-in-tests
  message: NoopTagger used instead of global tagger in tests
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$TAGGER := nooptagger.$FUNC()

      '
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(new|create|get).*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: check-instance-struct-tagger-field
  message: Check instance struct contains tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $CHECK struct {\n  ...\n  instance $ITYPE\n  ...\n  $FIELD tagger.Component\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $CHECK
      regex: (?i).*(check|collector).*
  - metavariable-regex:
      metavariable: $FIELD
      regex: (?i).*(tagger|tag).*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**'
    exclude:
    - '**/kubernetesapiserver/**'
    - '**/*_test.go'
- id: check-factory-optional-option-return
  message: Check factory returns optional.Option with tagger parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func Factory($STORE $STYPE, $TAGGER tagger.Component) $OPTION {\n  return\
      \ optional.NewOption(...)\n}\n"
  - metavariable-regex:
      metavariable: $OPTION
      regex: (?i).*option.*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**'
    exclude:
    - '**/*_test.go'
- id: provider-constructor-stores-tagger
  message: Provider constructor stores tagger in struct
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(..., $TAGGER tagger.Component, ...) $RET {\n  ...\n  return\
      \ &$TYPE{\n    ...,\n    $FIELD: $TAGGER,\n    ...,\n  }\n}\n"
  - metavariable-regex:
      metavariable: $FIELD
      regex: (?i).*(tagger|tag).*
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(provider|processor|handler).*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*_test.go'
- id: tagger-legacytag-method-added
  message: LegacyTag method added to tagger implementation
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) LegacyTag($ENTITY string, $CARD $CARDTYPE) ([]string,\
      \ error) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(tagger|tag).*
  - pattern-not-inside: "func ($RECV *$TYPE) LegacyTag($ENTITY string, $CARD $CARDTYPE)\
      \ ([]string, error) {\n  return $GLOBAL.$FUNC(...)\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/*_test.go'
- id: containercheck-return-with-fields
  message: Container check returned with store and tagger fields
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "return &$CHECK{\n  ...,\n  store: $STORE,\n  ...,\n  $TFIELD: $TAGGER,\n\
      \  ...,\n}\n"
  - metavariable-regex:
      metavariable: $CHECK
      regex: .*Check$
  - metavariable-regex:
      metavariable: $TFIELD
      regex: (?i).*(tagger|tag).*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/containers/**'
    exclude:
    - '**/*_test.go'
- id: service-struct-with-tagger-field-new
  message: Service/listener struct adds tagger field post-refactoring
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $TYPE struct {\n  ...\n  $FIELD tagger.Component\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(service|listener).*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/autodiscovery/**'
    - '**/listeners/**'
    exclude:
    - '**/test/**'
    - '**/*_test.go'
- id: check-base-initialization-with-tagger
  message: Check struct initialization includes tagger component
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "return &$CHECK{\n  ...,\n  $FIELD: $TAGGER,\n  ...,\n}\n"
  - metavariable-regex:
      metavariable: $CHECK
      regex: (?i).*(check|collector).*
  - metavariable-regex:
      metavariable: $FIELD
      regex: (?i).*(tagger|tag).*
  - pattern-inside: "func Factory($STORE $STYPE, $TAGGER $TTYPE) $OPTION {\n  ...\n\
      }\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: listener-constructor-deps-param
  message: Listener constructor accepts deps struct parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $CONSTRUCTOR($DEPS $DTYPE) ($LISTENER, error) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CONSTRUCTOR
      regex: (?i)^(new.*listener)$
  - metavariable-regex:
      metavariable: $DTYPE
      regex: (?i).*(deps|dependencies|params).*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/listeners/**'
    exclude:
    - '**/*_test.go'
- id: check-uses-tagger-for-tags
  message: Check implementation uses tagger field for tag operations
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $METHOD(...) $RET {\n  ...\n  $R.$TAGGER.Tag(...)\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $TAGGER
      regex: (?i).*(tagger|tag).*
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)^(run|check|collect|process).*$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**'
    exclude:
    - '**/*_test.go'
- id: tagger-getentityhash-instance-call
  message: GetEntityHash called on tagger instance
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TAGGER.GetEntityHash($ENTITYID, $CARD)
  - metavariable-regex:
      metavariable: $TAGGER
      regex: ^[a-z].*$
  - pattern-not: tagger.GetEntityHash(...)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tagger/global.go'
    - '**/test/**'
    - '**/*_test.go'
- id: listener-addservice-with-tagger
  message: Listener AddService implementation stores tagger in service
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "$SERVICE := &$STYPE{\n  ...,\n  $FIELD: $L.$TAGGER,\n  ...,\n}\n"
  - metavariable-regex:
      metavariable: $FIELD
      regex: (?i).*(tagger|tag).*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/listeners/**'
    exclude:
    - '**/*_test.go'
- id: container-check-struct-with-tagger
  message: Container check struct contains tagger field
  severity: INFO
  languages:
  - go
  pattern: "type $CHECK struct {\n  ...\n  $FIELD tagger.Component\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/containers/generic/**'
    exclude:
    - '**/*_test.go'
- id: check-run-uses-instance-tagger
  message: Check Run method uses instance tagger field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) Run() error {\n  ...\n  $R.$TAGGER.$METHOD(...)\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $TAGGER
      regex: (?i).*(tagger|tag).*
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)^(tag|gettags|getentity|accumulatetags).*$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*_test.go'
- id: tagger-enrichtags-instance-call
  message: EnrichTags called on tagger instance
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TAGGER.EnrichTags($TB, $ORIGIN)
  - metavariable-regex:
      metavariable: $TAGGER
      regex: ^[a-z].*$
  - pattern-not: tagger.EnrichTags(...)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tagger/global.go'
    - '**/test/**'
    - '**/*_test.go'
- id: tagger-tag-call-with-types-entityid
  message: Tag method called with types.EntityID parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TAGGER.Tag($ENTITYID, $CARD)
  - pattern-inside: "func $FUNC(..., $TAGGER tagger.Component, ...) $RET {\n  ...\n\
      }\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tagger/global.go'
    - '**/test/**'
    - '**/*_test.go'
- id: gettags-uses-instance-tagger
  message: GetTags method uses instance tagger instead of global accessor
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV $RECVTYPE) GetTags() ([]string, error) {\n  ...\n  $RECV.$TAGGER.Tag(...)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $TAGGER
      regex: (?i).*(tagger|tag).*
  - pattern-not: "func ($RECV $RECVTYPE) GetTags() ([]string, error) {\n  ...\n  tagger.Tag(...)\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: container-provider-returns-error-not-initialized
  message: Container provider function returns error when not initialized
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func $FUNC() ($PROVIDER, error) {\n  ...\n  return nil, $ERR\n  ...\n\
        }\n"
    - pattern: "func $FUNC() ($PROVIDER, error) {\n  ...\n  if $COND {\n    return\
        \ nil, errors.New(...)\n  }\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(get.*provider|shared.*provider).*
  - metavariable-regex:
      metavariable: $PROVIDER
      regex: (?i).*(provider|container).*
  - pattern-not: "func $FUNC($PARAM $TYPE) ($PROVIDER, error) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/containers/containers.go'
    - '**/util/containers/**'
- id: init-shared-provider-with-params
  message: InitSharedContainerProvider called with wmeta and tagger parameters
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC($WMETA $WTYPE, $TAGGER $TTYPE) $RET {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(init.*provider|init.*shared).*
  - metavariable-regex:
      metavariable: $TTYPE
      regex: (?i).*(tagger\.component|component).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/containers/**'
    - '**/process/**'
