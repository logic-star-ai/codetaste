  patterns:
  - pattern: $FACTORY($STORE, $TAGGER)
  - metavariable-regex:
      metavariable: $FACTORY
      regex: (?i).*(factory|check).*
  - pattern-inside: "func $FUNC(..., $TAGGER tagger.Component, ...) $RET {\n  ...\n\
