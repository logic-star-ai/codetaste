  message: Listener creates service using tagger
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $LISTENER.tagger
  pattern-sinks:
  - pattern: "$SVC := &$TYPE{\n  $F1: $V1,\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
