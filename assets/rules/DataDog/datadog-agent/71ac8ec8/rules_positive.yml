rules:
- id: check-method-accesses-tagger-field
  message: Check method accesses tagger from struct field
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $C.tagger
  pattern-sinks:
  - pattern: $TAGGER.Tag($E, $CARD)
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**/*.go'
  options:
    symbolic_propagation: true
- id: tagger-struct-field-in-check
  message: Check struct has tagger component field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $CHECK struct {\n  ...\n  tagger $TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CHECK
      regex: (?i).*(check|collector).*
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**/*.go'
    exclude:
    - '**/kubernetesapiserver/*.go'
- id: check-stores-workloadmeta-and-tagger
  message: Check struct stores both workloadmeta and tagger
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $CHECK struct {\n  $F1 $T1\n  ...\n  store $ST\n  ...\n  tagger\
      \ $TT\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**/*.go'
    exclude:
    - '**/kubernetesapiserver/*.go'
- id: tagger-param-named-tagger
  message: Function parameter named tagger with tagger type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC($P1 $T1, tagger tagger.Component) $RET
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**/*.go'
- id: container-provider-get-with-error-return
  message: GetSharedContainerProvider now returns error if not initialized
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func $GET() ($RET, error) {\n  ...\n}\n"
    - pattern: $VAR, $ERR := $PKG.$GET()
  - metavariable-regex:
      metavariable: $GET
      regex: (?i)^get.*provider.*$
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: check-factory-parameter-tagger-type
  message: Check factory parameter with tagger component type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func Factory($W workloadmeta.Component, $T tagger.Component) $RET {\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**/*.go'
- id: shared-container-provider-error-handling
  message: GetSharedContainerProvider with explicit error handling
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "$P, $ERR := $PKG.GetSharedContainerProvider()\nif $ERR != nil {\n  ...\n\
      \  return $RET\n}\n"
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/process/**/*.go'
    - '**/servicediscovery/**/*.go'
- id: tagger-checks-cardinality-instance-call
  message: ChecksCardinality called on tagger instance
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $T.ChecksCardinality()
  - metavariable-regex:
      metavariable: $T
      regex: ^[a-z].*[tT]agger.*$
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/global.go'
- id: init-shared-provider-call
  message: InitSharedContainerProvider called during fx start
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.InitSharedContainerProvider($W, $T)
  - metavariable-regex:
      metavariable: $PKG
      regex: .*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: resolver-uses-container-provider
  message: Resolver uses container provider with error handling
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "$PROVIDER, $ERR := $PKG.GetSharedContainerProvider()\nif $ERR != nil\
      \ {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/resolver*.go'
    - '**/process/**/*.go'
- id: servicedeps-field-access
  message: ServiceListenerDeps field accessed for tagger
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $DEPS.Tagger
  pattern-sinks:
  - pattern: $TAGGER
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/listeners/**/*.go'
  options:
    symbolic_propagation: true
- id: check-init-scheduler-with-tagger-call
  message: InitCheckScheduler called with tagger argument
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $FUNC($C, $S, $L, $T)
  - metavariable-regex:
      metavariable: $FUNC
      regex: .*InitCheckScheduler.*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: legacy-tag-method-implementation
  message: Tagger has LegacyTag method for Python integration
  severity: INFO
  languages:
  - go
  pattern: "func ($R $T) LegacyTag($E string, $C $CARD) ([]string, error) {\n  ...\n\
    }\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tagger/**/*.go'
    exclude:
    - '**/global.go'
  options:
    symbolic_propagation: true
- id: container-provider-init-invoked
  message: Container provider initialization invoked with components
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: fx.Invoke($FUNC)
  - metavariable-pattern:
      metavariable: $FUNC
      patterns:
      - pattern: $F
      - metavariable-regex:
          metavariable: $F
          regex: (?i).*(init|create).*container.*provider.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cmd/**/*.go'
    - '**/fx*.go'
- id: factory-returns-check-with-store-and-tagger
  message: Factory returns check with both store and tagger initialized
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "return &$CHECK{\n  CheckBase: $BASE,\n  instance: $INST,\n  store: $STORE,\n\
      \  tagger: $TAGGER,\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**/*.go'
- id: workloadmeta-tagger-both-in-factory
  message: Factory signature includes both workloadmeta and tagger types
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(workloadmeta.Component, tagger.Component) $RET {\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^Factory$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/corechecks/**/*.go'
- id: servicelistener-return-type
  message: Function returns ServiceListener type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC($PARAMS) (ServiceListener, error)
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/listeners/**/*.go'
- id: listener-new-constructor-deps-type
  message: Listener constructor accepts Deps type parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $NEW($DEPS $DTYPE) (ServiceListener, error) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $NEW
      regex: (?i)^new.*listener$
  - metavariable-regex:
      metavariable: $DTYPE
      regex: (?i).*deps.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/listeners/**/*.go'
- id: init-check-scheduler-call-four-args
  message: InitCheckScheduler invoked with four arguments
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.InitCheckScheduler($A, $B, $C, $D)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cmd/**/*.go'
- id: service-listener-tagger-field-usage
  message: Service listener uses tagger field for tagging
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $LISTENER struct {\n  ...\n  tagger $TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $LISTENER
      regex: (?i).*listener.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/listeners/**/*.go'
- id: listener-tags-computed-with-tagger-field
  message: Listener computes tags using its tagger field
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $L.tagger
  pattern-sinks:
  - pattern: $TAGGER.GetEntityHash($E, $C)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/listeners/**/*.go'
  options:
    symbolic_propagation: true
- id: tagger-dogstatsd-cardinality-call
  message: Tagger DogstatsdCardinality method called on instance
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TAGGER.DogstatsdCardinality()
  - metavariable-regex:
      metavariable: $TAGGER
      regex: ^[a-z][a-zA-Z0-9]*$
  - pattern-not: tagger.DogstatsdCardinality()
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/global.go'
- id: kubelet-check-tagger-field
