- id: scheduler-init-multiple-params
  message: Scheduler initialization with additional tagger parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func $INIT($P1 $T1, $P2 $T2, $P3 $T3, $P4 $T4) $RET {\n  ...\n}\n"
    - pattern: $INIT($A, $B, $C, $D)
  - metavariable-regex:
      metavariable: $INIT
      regex: (?i)^init.*scheduler.*$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: python-check-init-with-tagger-param
  message: Python check initialization function accepts tagger parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func $INIT($P1 $T1, $P2 $T2, $P3 $T3, $TAGGER $TTAG) $RET {\n  ...\n\
        }\n"
    - pattern: "func $INIT($P1 $T1, $P2 $T2, $TAGGER $TTAG) $RET {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $INIT
      regex: (?i).*(init|create).*check.*context.*
  - metavariable-regex:
      metavariable: $TTAG
      regex: (?i).*tagger.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/rtloader/**/*.go'
    - '**/python/**/*.go'
