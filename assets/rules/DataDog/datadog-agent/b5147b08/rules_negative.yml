rules:
- id: host-metadata-file-in-pkg
  message: Host metadata file in old pkg location. Should be migrated to comp/metadata/host.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - /pkg/metadata/host/host*.go
    - /pkg/metadata/host/payload.go
- id: old-pkg-metadata-host-import
  message: Import of old pkg/metadata/host package detected. This should now be comp/metadata/host
    or comp/metadata/host/utils.
  severity: WARNING
  languages:
  - go
  pattern-regex: '"github\.com/DataDog/datadog-agent/pkg/metadata/host"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: old-common-metadata-import
  message: Old common metadata package import detected. Migrate to comp/metadata/host/utils.
  severity: WARNING
  languages:
  - go
  pattern: import "github.com/DataDog/datadog-agent/pkg/metadata/common"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: metadata-common-package-reference
  message: Reference to old pkg/metadata/common package path detected. Migrate to
    comp/metadata/host/utils.
  severity: WARNING
  languages:
  - go
  pattern-regex: github\.com/DataDog/datadog-agent/pkg/metadata/common
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: metadata-v5-directory-pattern
  message: File in old pkg/metadata/v5 directory detected. Migrate to comp/metadata/host.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - /pkg/metadata/v5/*.go
- id: host-package-direct-function-calls
  message: Direct call to host package functions detected. Use host.Component from
    dependency injection.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: host.GetPayload($CTX, $DATA)
    - pattern: host.GetPayloadFromCache($CTX, $DATA)
  - pattern-not-inside: 'package host

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: v5-package-declaration
  message: Package v5 declaration in old location. Should be migrated to comp/metadata/host.
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package v5
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - /pkg/metadata/v5/*.go
- id: host-getpayloadfromcache-call
  message: host.GetPayloadFromCache() call from external package. Use host.Component
    with caching handled internally.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: host.GetPayloadFromCache($CTX, $HOSTNAME)
  - pattern-not-inside: 'package host

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: metadata-common-directory-pattern
  message: File in old pkg/metadata/common directory detected. Migrate to comp/metadata/host/utils.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - /pkg/metadata/common/*.go
- id: common-package-declaration
  message: Package common declaration in old location. Should be migrated to comp/metadata/host/utils.
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package common
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - /pkg/metadata/common/*.go
- id: host-metadata-test-file
  message: Test file in old host package. Migrate tests to comp/metadata/host with
    component mocking.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - /pkg/metadata/host/host_test.go
    - /pkg/metadata/host/host_*_test.go
- id: old-v5-metadata-import
  message: Old v5 metadata package import detected. Migrate to comp/metadata/host
    component architecture.
  severity: WARNING
  languages:
  - go
  pattern: import "github.com/DataDog/datadog-agent/pkg/metadata/v5"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: metadata-v5-package-reference
  message: Reference to old pkg/metadata/v5 package path detected. Migrate to comp/metadata/host
    component.
  severity: WARNING
  languages:
  - go
  pattern-regex: github\.com/DataDog/datadog-agent/pkg/metadata/v5
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dogstatsd-v5-metadata-import
  message: DogStatsD importing old v5 metadata. Use host.Component with aggregator
    provisioning.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: import "github.com/DataDog/datadog-agent/pkg/metadata/v5"
  - pattern-inside: 'package $PKG

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: v5-payload-file-pattern
  message: Payload file in old v5 package detected. Migrate to comp/metadata/host
    component.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - /pkg/metadata/v5/payload.go
    - /pkg/metadata/v5/payload_*.go
- id: old-v5-metadata-aliased-import
  message: Old v5 metadata package import detected (aliased). Migrate to comp/metadata/host
    component architecture.
  severity: WARNING
  languages:
  - go
  pattern: import $ALIAS "github.com/DataDog/datadog-agent/pkg/metadata/v5"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: v5-get-payload-call
  message: Direct v5.GetPayload() call detected. Use host.Component.GetPayloadAsJSON()
    from the injected component instead.
  severity: WARNING
  languages:
  - go
  pattern: v5.GetPayload($CTX, $HOSTNAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: v5-get-payload-qualified-call
  message: Direct v5.GetPayload() call detected. Use host.Component.GetPayloadAsJSON()
    from the injected component instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $PKG.GetPayload($CTX, $HOSTNAME)
  - metavariable-pattern:
      metavariable: $PKG
      patterns:
      - pattern-regex: .*v5$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: v5-get-payload-in-api-handler
  message: v5.GetPayload() used in API handler. Pass host.Component as parameter and
    use GetPayloadAsJSON() instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'payload := v5.GetPayload($CTX, $HOSTNAME)

      '
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: v5-get-payload-in-flare
  message: v5.GetPayload() used for flare generation without host component. Inject
    host.Component and use GetPayloadAsJSON().
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'payload := v5.GetPayload($CTX, $HOSTNAME)

      '
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  - pattern-not-inside: "func $FUNC(..., host.Component, ...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: common-get-payload-with-hostname
  message: common.GetPayload() call detected. Use GetCommonPayload() from comp/metadata/host/utils
    instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'cp := common.GetPayload($HOSTNAME)

      '
  - pattern-not-inside: "func TestCommon(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: v5-package-alias-usage
  message: Aliased v5.GetPayload() call detected. Use host.Component.GetPayloadAsJSON()
    from injected component.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $V5.GetPayload($CTX, $HOSTNAME)
  - metavariable-regex:
      metavariable: $V5
      regex: ^v[0-9]+$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: v5-imports-in-tests
  message: Test importing old v5 package detected. Update test imports to comp/metadata/host.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: import $ALIAS "github.com/DataDog/datadog-agent/pkg/metadata/v5"
  - pattern-not-inside: 'package v5

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: host-metadata-osname-constant
  message: osName constant in old host package. Should be in component implementation.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'const osName = $VALUE

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - /pkg/metadata/host/*.go
- id: metadata-v5-build-tag
  message: Build tag in old v5 package. Migrate to comp/metadata/host with proper
    platform support.
  severity: WARNING
  languages:
  - go
  pattern-regex: ^//go:build.*linux.*windows.*darwin
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - /pkg/metadata/v5/*.go
- id: common-payload-type-reference
  message: common.Payload type reference detected. Migrate to comp/metadata/host/utils
    types.
  severity: WARNING
  languages:
  - go
  pattern: common.Payload
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: v5-payload-json-marshal
  message: Manual JSON marshalling of v5 payload detected. Use host.Component.GetPayloadAsJSON()
    which returns JSON directly.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'payload := v5.GetPayload($CTX, $HOSTNAME)

      ...

      json.MarshalIndent($PAYLOAD, ...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: hostname-data-v5-usage
  message: Hostname retrieval followed by v5.GetPayload() detected. Use host.Component
    with dependency injection.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$HOSTNAME, _ := hostname.GetWithProvider($CTX)

      ...

      v5.GetPayload($CTX, $HOSTNAME)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: v5-metadata-test-old-import
  message: Test file in old v5 package detected. Migrate tests to comp/metadata/host.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - /pkg/metadata/v5/*_test.go
- id: v5-test-helpers-old-location
  message: Test file in old v5 directory. Migrate to comp/metadata/host with component
    mocking.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - /pkg/metadata/v5/*_test.go
- id: v5-payload-type-definition
  message: Payload type definition in old v5 package. Should be in component implementation.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type Payload struct {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - /pkg/metadata/v5/*.go
- id: host-init-metadata-call
  message: host.InitHostMetadata() call detected. This is now handled by component
    initialization, remove this call.
  severity: WARNING
  languages:
  - go
  pattern: host.InitHostMetadata()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: host-collector-struct-definition
  message: Old HostCollector struct detected. Host metadata should now use component
    architecture, not direct collectors.
  severity: WARNING
  languages:
  - go
  pattern: 'type HostCollector struct{}

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: host-collector-registration
  message: Host metadata collector registration detected. Host metadata should now
    use component architecture, not scheduler collectors.
  severity: WARNING
  languages:
  - go
  pattern: RegisterCollector("host", ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: host-collector-send-method
  message: HostCollector.Send() method detected. Host metadata should now use component
    architecture.
  severity: WARNING
  languages:
  - go
  pattern: "func ($HP *HostCollector) Send($CTX context.Context, $S serializer.MetricSerializer)\
    \ error {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-host-metadata-file-path
  message: Old standalone host metadata collector file detected. This functionality
    should be in comp/metadata/host component.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/host.go
- id: metadata-scheduler-host-init
  message: host.InitHostMetadata() initialization detected. This is now handled by
    component initialization.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'err = host.InitHostMetadata()

      '
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: host-get-payload-direct-call
  message: Direct host.GetPayload() call from old package detected. Use host.Component
    from dependency injection.
  severity: WARNING
  languages:
  - go
  pattern: host.GetPayload($CTX, $HOSTNAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: host-metadata-collector-init-pattern
  message: Host metadata collector registration in init() detected. Host metadata
    should use component architecture now.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func init() {\n  RegisterCollector(\"host\", ...)\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: metadata-serializer-send-host
  message: SendHostMetadata in HostCollector detected. Host metadata should use component
    architecture, not collectors.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$S.SendHostMetadata($PAYLOAD)

      '
  - pattern-inside: "func ($HP *HostCollector) Send(...) error {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: common-metadata-test-old-location
  message: Test file in old common package detected. Migrate tests to comp/metadata/host/utils.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/common/*_test.go
- id: metadata-runner-without-host-component
  message: Metadata runner registering host collector detected. Host metadata should
    be injected via component, not registered as collector.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(...) {\n  ...\n  RegisterCollector(\"host\", ...)\n  ...\n\
      }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: v5-package-get-payload-definition
  message: GetPayload function definition in old v5 package detected. Migrate to comp/metadata/host
    component.
  severity: WARNING
  languages:
  - go
  pattern: "func GetPayload($CTX context.Context, $HOSTNAME hostname.Data) *Payload\
    \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/v5/*.go
- id: common-package-get-payload-definition
  message: GetPayload function in old common package detected. Migrate to GetCommonPayload
    in comp/metadata/host/utils.
  severity: WARNING
  languages:
  - go
  pattern: "func GetPayload($HOSTNAME string) *Payload {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/common/*.go
- id: host-package-get-payload-definition
  message: GetPayload function in old host package detected. This should be in host.Component
    implementation.
  severity: WARNING
  languages:
  - go
  pattern: "func GetPayload($CTX context.Context, $HOSTNAME hostname.Data) *Payload\
    \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/host/*.go
- id: v5-resources-payload-integration
  message: Resources payload integration in old v5 package. Should be in component
    implementation.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'rp := resources.GetPayload($HOSTNAME)

      '
  - pattern-inside: "func GetPayload(...) *Payload {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/v5/*.go
- id: flare-archive-v5-import
  message: Flare package importing old v5 metadata. Inject host.Component via FlareProvider
    instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: import $ALIAS "github.com/DataDog/datadog-agent/pkg/metadata/v5"
  - pattern-inside: 'package flare

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: api-agent-v5-import-pattern
  message: Agent API package importing old v5 metadata. Accept host.Component parameter
    in SetupHandlers.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  v5 \"github.com/DataDog/datadog-agent/pkg/metadata/v5\"\
      \n  ...\n)\n"
  - pattern-inside: 'package agent

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: host-collector-package-reference
  message: HostCollector instantiation detected. Host metadata should use component
    architecture.
  severity: WARNING
  languages:
  - go
  pattern: 'new(HostCollector)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: metadata-host-init-error-handling
  message: host.InitHostMetadata() error handling detected. Remove this, component
    initialization handles setup.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "err = host.InitHostMetadata()\nif err != nil {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: agent-run-command-host-init
  message: host.InitHostMetadata() in run command. Host metadata now injected via
    FX into run commands.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: host.InitHostMetadata()
  - pattern-inside: 'package run

      ...

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: common-payload-file-pattern
  message: Payload file in old common package detected. Migrate to comp/metadata/host/utils.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/common/payload.go
- id: metadata-v5-other-platform-file
  message: Platform-specific v5 file detected. Migrate to comp/metadata/host with
    proper platform support.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/v5/v5_other.go
- id: v5-getpayload-in-collector-send
  message: v5.GetPayload() in collector Send method. Migrate to component-based architecture.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'payload := v5.GetPayload($CTX, $HOSTNAME)

      '
  - pattern-inside: "func ($RECV *$TYPE) Send($CTX context.Context, $SER serializer.MetricSerializer)\
      \ error {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: common-uuid-retrieval-old-package
  message: UUID retrieval in old common package. Should be in comp/metadata/host/utils.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: getUUID()
  - pattern-inside: 'package common

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: host-metadata-buildkey-function
  message: buildKey function in old host package. Should be in component implementation
    with typed cache keys.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func buildKey($SUFFIX string) string {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/host/*.go
- id: metadata-host-package-cache-prefix
  message: Cache prefix constant in old host package. Should be in component with
    improved caching.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'const packageCachePrefix = "host"

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/host/*.go
- id: host-network-meta-old-location
  message: getNetworkMeta function in old host package. Should be in component implementation.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func getNetworkMeta($CTX context.Context) *NetworkMeta {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - /pkg/metadata/host/*.go
- id: host-logs-meta-old-location
  message: getLogsMeta function in old host package. Should be in component with getter/setter
    pattern.
  severity: WARNING
  languages:
  - go
  patterns:
