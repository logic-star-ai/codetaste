rules:
- id: host-metadata-utils-systemstats
  message: System stats collection in host metadata utils
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: getSystemStats()
    - pattern: "func getSystemStats() $RET {\n  $...BODY\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - comp/metadata/host/utils/*.go
- id: host-metadata-comp-package-declaration
  message: Host metadata package declared in comp/metadata/host/
  severity: INFO
  languages:
  - go
  pattern-regex: ^package host$
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - comp/metadata/host/*.go
- id: host-metadata-apache-license
  message: Apache license header in host metadata component files
  severity: INFO
  languages:
  - go
  pattern-regex: Apache License Version 2.0
  metadata:
    category: other
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - comp/metadata/host/*.go
- id: host-metadata-datadog-copyright
  message: Datadog copyright in host metadata component files
  severity: INFO
  languages:
  - go
  pattern-regex: Copyright.*Datadog
  metadata:
    category: other
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
