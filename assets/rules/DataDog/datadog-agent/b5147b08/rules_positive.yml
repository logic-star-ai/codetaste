    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - comp/metadata/host/*.go
    - comp/metadata/host/utils/*.go
- id: host-metadata-error-check
  message: Error checking in host metadata component
  severity: INFO
