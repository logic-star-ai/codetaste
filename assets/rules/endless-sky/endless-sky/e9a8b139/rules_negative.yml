rules:
- id: detect-old-hpp-extension-text-includes
  message: Old .hpp extension detected in text/ include. Should use .h extension with
    capitalized filename
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+"(?:\.\./)?text/[a-z]+\.hpp"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: detect-comment-reference-alignment-hpp
  message: Comment or string references old 'alignment.hpp' filename. Should be updated
    to 'Alignment.h'
  severity: INFO
  languages:
  - generic
  pattern-regex: alignment\.hpp
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - '**/*.cpp'
    - '**/*.h'
    - '**/*.md'
    - '**/*.txt'
- id: detect-forwarded-include-alignment-hpp
  message: Include directive or reference to 'alignment.hpp'. Should use 'Alignment.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: include.*alignment\.hpp
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-string-literal-alignment-hpp-path
  message: String literal contains path to old 'alignment.hpp'. Should use 'Alignment.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '".*alignment\.hpp"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-any-old-alignment-hpp-include-any-path
  message: Old header file 'alignment.hpp' included. Should use 'Alignment.h' instead
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: '#include "alignment.hpp"'
  - pattern: '#include "text/alignment.hpp"'
  - pattern: '#include "../text/alignment.hpp"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: detect-double-quoted-alignment-hpp-in-any-file
  message: Reference to old header 'alignment.hpp' in quotes. Should be 'Alignment.h'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '"(?:text/)?alignment\.hpp"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: detect-includes-with-space-before-alignment-hpp
  message: Include with spacing for old 'alignment.hpp'. Should use 'Alignment.h'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#\s*include\s+"(?:text/)?alignment\.hpp"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: detect-old-alignment-hpp-include
  message: Old header file name detected. Should use 'text/Alignment.h' instead of
    'text/alignment.hpp'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: '#include "text/alignment.hpp"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: detect-comment-reference-truncate-hpp
  message: Comment or string references old 'truncate.hpp' filename. Should be updated
    to 'Truncate.h'
  severity: INFO
  languages:
  - generic
