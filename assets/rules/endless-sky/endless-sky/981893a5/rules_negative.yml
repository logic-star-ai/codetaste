rules:
- id: click-impl-without-button-param-check
  message: Click() implementation in $CLASS uses old signature without MouseButton
    parameter
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern-inside: "bool $CLASS::Click(int $X, int $Y, int $CLICKS)\n{\n  ...\n}\n"
  - pattern: "if($COND)\n{\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 105
- id: click-method-missing-button-check
  message: Click() method implementation with old signature (missing MouseButton parameter)
    in $CLASS
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern-inside: "bool $CLASS::Click(int $X, int $Y, int $CLICKS)\n{\n  ...\n}\n"
  - pattern-not-inside: "bool $CLASS::Click(int $X, int $Y, MouseButton $BTN, int\
      \ $CLICKS)\n{\n  ...\n}\n"
  - pattern: 'return $RET;

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 57
- id: panel-click-impl-return-true
  message: Click() implementation in $CLASS with old signature returning true. Should
    include MouseButton parameter
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern-inside: "bool $CLASS::Click(int $X, int $Y, int $CLICKS)\n{\n  ...\n}\n"
  - pattern: 'return true;

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: rclick-impl-with-body
  message: RClick() implementation in $CLASS should be merged into Click() with MouseButton::RIGHT
    check
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern-inside: "bool $CLASS::RClick(int $X, int $Y)\n{\n  ...\n}\n"
  - pattern: '$EXPR;

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: panel-click-old-signature-override
  message: 'Old Panel Click() override signature detected without MouseButton parameter.
    Should be: bool Click(int x, int y, MouseButton button, int clicks) override'
  severity: WARNING
  languages:
  - cpp
