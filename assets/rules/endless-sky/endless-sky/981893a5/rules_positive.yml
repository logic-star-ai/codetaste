rules:
- id: click-method-button-parameter
  message: Detected Click method with named button parameter
  severity: INFO
  languages:
  - cpp
  pattern-regex: Click\s*\([^)]*,\s*MouseButton\s+button\s*[,\)]
  metadata:
    category: api
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
- id: mousebutton-param-in-function-definition
  message: Detected function definition with MouseButton button parameter
  severity: INFO
  languages:
  - cpp
  pattern-regex: \(\s*int\s+\w+\s*,\s*int\s+\w+\s*,\s*MouseButton\s+button\s*,
  metadata:
    category: api
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: mousebutton-param-before-clicks
  message: Detected MouseButton parameter before clicks parameter - refactored signature
  severity: INFO
  languages:
  - cpp
  pattern-regex: MouseButton\s+button\s*,\s*int\s+clicks
  metadata:
    category: api
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: clicks-param-after-button
  message: Detected clicks parameter after MouseButton parameter
  severity: INFO
  languages:
  - cpp
  pattern-regex: MouseButton\s+[^,)]+\s*,\s*int\s+clicks\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: panel-click-four-params
  message: Detected Click with 4 parameters (x, y, button, clicks)
  severity: INFO
  languages:
  - cpp
  pattern-regex: Click\s*\(\s*int\s+\w+\s*,\s*int\s+\w+\s*,\s*MouseButton\s+\w+\s*,\s*int\s+\w+\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
- id: click-signature-x-y-button-clicks
  message: Detected Click signature with standard parameter names (x, y, button, clicks)
  severity: INFO
  languages:
  - cpp
  pattern-regex: Click\s*\(\s*int\s+x\s*,\s*int\s+y\s*,\s*MouseButton\s+button\s*,\s*int\s+clicks
  metadata:
    category: api
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
- id: xy-then-button-then-clicks-order
  message: 'Detected correct parameter order: x, y, button, clicks'
  severity: INFO
  languages:
  - cpp
  pattern-regex: \(\s*int\s+[xy]\w*\s*,\s*int\s+[xy]\w*\s*,\s*MouseButton\s+\w+\s*,\s*int\s+\w*clicks
  metadata:
    category: api
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
- id: click-four-params-any-names
  message: Detected Click with four parameters in correct order
  severity: INFO
  languages:
  - cpp
  pattern-regex: Click\s*\(\s*int\s+\w+\s*,\s*int\s+\w+\s*,\s*MouseButton\s+\w+\s*,\s*int\s+\w+
  metadata:
    category: api
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
- id: mousebutton-scope-resolution
  message: Detected MouseButton scope resolution operator usage
  severity: INFO
  languages:
  - cpp
  pattern-regex: MouseButton\s*::\s*[A-Z]+
  metadata:
    category: api
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: button-param-not-used
  message: Detected Click with button parameter (may be unused in simple implementations)
  severity: INFO
  languages:
  - cpp
  pattern-regex: Click\s*\([^)]*MouseButton\s+button[^)]*\)[^{]*\{[^}]*\}\s*$
  metadata:
    category: basic
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: mousebutton-enum-left-value
  message: Detected MouseButton::LEFT usage - refactoring applied
  severity: INFO
  languages:
  - cpp
  pattern-regex: MouseButton\s*::\s*LEFT
  metadata:
    category: api
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: button-inequality-check-left
  message: Detected button != LEFT check - early return pattern for non-left clicks
  severity: INFO
  languages:
  - cpp
  pattern-regex: button\s*!=\s*MouseButton\s*::\s*LEFT
  metadata:
    category: basic
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: return-on-button-not-left
  message: Detected early return when button is not LEFT
  severity: INFO
  languages:
  - cpp
  pattern-regex: if\s*\(\s*button\s*!=\s*MouseButton\s*::\s*LEFT\s*\)\s*\n\s*return
  metadata:
    category: basic
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: button-not-equal-pattern
  message: Detected button inequality check with MouseButton
  severity: INFO
  languages:
  - cpp
  pattern-regex: button\s*!=\s*MouseButton
  metadata:
    category: basic
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: function-returning-on-button-check
  message: Detected early return based on button check
  severity: INFO
  languages:
  - cpp
  pattern-regex: if\s*\(\s*button\s*!=[\s\S]{0,50}\)\s*[\n\r]\s*return
  metadata:
    category: basic
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: mousebutton-left-in-conditional
  message: Detected conditional involving MouseButton::LEFT
  severity: INFO
  languages:
  - cpp
  pattern-regex: if.*MouseButton\s*::\s*LEFT|MouseButton\s*::\s*LEFT.*if
  metadata:
    category: basic
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: click-implementation-any-subclass
  message: Detected any class Click implementation with MouseButton parameter
  severity: INFO
  languages:
  - cpp
  pattern-regex: bool\s+\w+::\w*Click\s*\([^)]*MouseButton
  metadata:
    category: api
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
