rules:
- id: conditionsstore-pointer-in-function-param
  message: Detected function accepting ConditionsStore pointer parameter - refactoring
    pattern
  severity: INFO
  languages:
  - c
  - cpp
  pattern: "void $FUNC(..., const ConditionsStore *$STORE, ...)\n{\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
- id: conditionsstore-ptr-in-load-params
  message: Detected Load() with const ConditionsStore* parameter - refactoring applied
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: Load\s*\([^)]*const\s+ConditionsStore\s*\*[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: load-passing-playerConditions-pointer
  message: Detected Load() call passing 'playerConditions' pointer - refactoring applied
  severity: INFO
  languages:
  - c
  - cpp
  pattern: '$OBJ.Load($NODE, playerConditions);

    '
  metadata:
    category: api
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
