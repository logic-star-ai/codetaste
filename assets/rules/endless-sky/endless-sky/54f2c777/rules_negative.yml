rules:
- id: mission-isfailed-with-playerinfo
  message: Mission.IsFailed() should not require PlayerInfo parameter after refactoring
  severity: WARNING
  languages:
  - cpp
  pattern: '$MISSION.IsFailed($PLAYER)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: test-with-conditions-variable
  message: Test() call with conditions variable indicates old pattern - should use
    stored pointer
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $OBJ.Test($COND)
  - metavariable-pattern:
      metavariable: $COND
      patterns:
      - pattern-regex: .*(conditions|playerConditions).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: passing-player-conditions-to-test
  message: Passing player conditions directly to Test() indicates old pattern
  severity: WARNING
  languages:
  - cpp
  pattern: $OBJ.Test($PLAYER.Conditions())
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: conditionset-evaluate-with-parameter
  message: ConditionSet.Evaluate() should not take a conditions parameter after refactoring
    - conditions should be stored internally
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $OBJ.Evaluate($COND)
  - metavariable-pattern:
      metavariable: $OBJ
      patterns:
      - pattern-not: '$X.conditions

          '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: evaluate-with-conditions-variable
  message: Evaluate() call with conditions variable indicates old pattern - should
    use stored pointer
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $OBJ.Evaluate($COND)
  - metavariable-pattern:
      metavariable: $COND
      patterns:
      - pattern-regex: .*(conditions|playerConditions|conditionsStore).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: gameaction-load-call-without-conditions
  message: GameAction/MissionAction.Load() call should pass const ConditionsStore*
    parameter
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $ACTION.Load($NODE);
  - pattern-inside: "void $FUNC(...) {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $ACTION
      patterns:
      - pattern-regex: .*(action|Action).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: passing-player-conditions-to-apply
