rules:
- id: register-access-pattern-get
  message: registers.get() should be context.vm.get_register()
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: registers.get($IDX)
  - pattern-not-inside: "impl Stack {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 171
- id: registers-as-parameter-name
  message: Parameter named 'registers' of type Registers should be removed
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "fn $NAME($PARAM1, registers: $TYPE, $PARAM2) {\n    ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: .*Registers.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 151
- id: operation-signature-single-registers
  message: Operation with single arg should not have registers parameter - use (args,
    context) signature
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    $ARG: $TYPE,\n    registers: &mut Registers,\n\
    \    context: &mut Context,\n) -> $RET {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 91
- id: register-access-pattern-set
  message: registers.set() should be context.vm.set_register()
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: registers.set($IDX, $VAL)
  - pattern-not-inside: "impl Stack {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 91
- id: opcode-struct-operation-method-registers
  message: Opcode operation method should not have registers parameter
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "impl $OPCODE {\n    fn operation(\n        $ARG,\n        registers:\
      \ &mut Registers,\n        context: &mut Context,\n    ) -> $RET {\n       \
      \ ...\n    }\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 91
- id: operation-pub-super-registers
  message: pub(super) operation should not have registers parameter
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    $ARG: $TYPE,\n    registers: &mut Registers,\n\
    \    context: &mut Context,\n) -> JsResult<()> {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 80
- id: registers-type-in-use-statement
  message: Registers import should be removed - use Stack type instead
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use $MODULE::Registers;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 69
- id: context-vm-push-value
  message: context.vm.push() may need to be context.vm.stack.push() after refactoring
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: context.vm.push($VALUE)
  - pattern-not-inside: "impl Vm {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: triple-varying-operand-registers
  message: Operation with triple VaryingOperand should not have registers parameter
  severity: WARNING
  languages:
  - rust
  pattern: "fn operation(\n    ($A, $B, $C): (VaryingOperand, VaryingOperand, VaryingOperand),\n\
    \    registers: &mut Registers,\n    context: &mut Context,\n) -> $RET {\n   \
    \ ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: operation-signature-varying-operand
  message: Operation should not have registers parameter - use (args, context) signature
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    $ARG: VaryingOperand,\n    registers: &mut\
    \ Registers,\n    context: &mut Context,\n) -> $RET {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: context-vm-pop-value
  message: context.vm.pop() may need to be context.vm.stack.pop() after refactoring
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: context.vm.pop()
  - pattern-not-inside: "impl Vm {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: operation-signature-tuple-registers
  message: Operation with tuple args should not have registers parameter - use (args,
    context) signature
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    $ARGS: ($T1, $T2),\n    registers: &mut\
    \ Registers,\n    context: &mut Context,\n) -> $RET {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: operation-two-varying-operands
  message: Operation with two VaryingOperands should not have registers parameter
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    ($A, $B): (VaryingOperand, VaryingOperand),\n\
    \    registers: &mut Registers,\n    context: &mut Context,\n) -> JsResult<()>\
    \ {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: registers-new-constructor
  message: Registers::new() should be removed - use Stack initialization instead
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: Registers::new(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: push-function-with-register-count
  message: push_function() with register count should use Stack frame management
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $VAR.push_function($COUNT)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: callframe-fp-method
  message: CallFrame.fp() should be replaced with frame_pointer() method
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $FRAME.fp()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: operation-signature-unit-registers
  message: Operation with unit args should not have registers parameter - use (args,
    context) signature
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    (): (),\n    registers: &mut Registers,\n\
    \    context: &mut Context,\n) -> $RET {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: register-count-variable-from-ready
  message: Extracting register_count from Ready variant should be updated - Ready
    is now unit variant
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: 'let register_count = $EXPR;

      '
  - metavariable-pattern:
      metavariable: $EXPR
      patterns:
      - pattern-regex: .*register_count.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: registers-new-with-count
  message: Registers::new() call should be removed - use Stack initialization
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: Registers::new($COUNT)
  - metavariable-pattern:
      metavariable: $COUNT
      patterns:
      - pattern-not: '0'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: u32-register-index-constant
  message: Register index constants should use usize instead of u32 after refactoring
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'const $NAME: u32 = $VALUE;

      '
  - metavariable-regex:
      metavariable: $NAME
      regex: .*(INDEX|POSITION|REGISTER).*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: operation-four-operands
  message: Operation with four operands should not have registers parameter
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    ($A, $B, $C, $D): ($T1, $T2, $T3, $T4),\n\
    \    registers: &mut Registers,\n    context: &mut Context,\n) -> JsResult<()>\
    \ {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: registers-pop-function-call
  message: registers.pop_function() should be removed - use Stack frame management
    methods instead
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $REGISTERS.pop_function(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: vm-pop-n-values
  message: context.vm.pop_n_values() may need updating for Stack-based architecture
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: context.vm.pop_n_values($COUNT)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: registers-get-as-object
  message: registers.get().as_object() should use context.vm.get_register().as_object()
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: registers.get($IDX).as_object()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: operation-unit-type
  message: Operation with unit argument should not have registers parameter
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    (): (),\n    registers: &mut Registers,\n\
    \    context: &mut Context,\n) -> JsResult<()> {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: registers-clone-current-frame
  message: registers.clone_current_frame() should be removed - use Stack methods instead
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $REGISTERS.clone_current_frame()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: registers-clone-call
  message: Cloning registers should use Stack methods
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $REGISTERS.clone()
  - metavariable-regex:
      metavariable: $REGISTERS
      regex: registers
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: frame-this-vm-call
  message: CallFrame.this(&vm) should use Stack.get_this() method
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $FRAME.this(&$VM)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: frame-function-vm-call
  message: CallFrame.function(&vm) should use Stack.get_function() method
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $FRAME.function(&$VM)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: registers-get-with-context
  message: registers.get() chain should use context.vm.get_register()
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: registers.get($IDX).$METHOD(context)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: operation-argument-count-operand
  message: Operation with argument_count parameter should not have registers parameter
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    argument_count: VaryingOperand,\n    registers:\
    \ &mut Registers,\n    context: &mut Context,\n) -> JsResult<()> {\n    ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: callvalue-ready-with-field
  message: CallValue::Ready should not have fields - use CallValue::Ready without
    fields
  severity: WARNING
  languages:
  - rust
  pattern: 'CallValue::Ready { $FIELD: $VALUE }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: call-operation-with-registers
  message: Calling operation with registers argument should only pass (args, context)
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $STRUCT::operation($ARGS, $REGISTERS, $CONTEXT)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: vm-stack-index-with-as-usize
  message: Direct vm.stack indexing with as usize cast should use Stack accessor methods
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: vm.stack[$INDEX as usize]
  - pattern-not-inside: "impl Stack {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: registers-undefined-resize
  message: Resizing registers with undefined should use Stack methods
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $REGISTERS.resize($SIZE, JsValue::undefined())
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: call-with-register-count-return
  message: Creating Ready variant with register_count variable should use unit variant
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'let register_count = $EXPR;

      ...

      CallValue::Ready { register_count }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: frame-arguments-vm-call
  message: CallFrame.arguments(&vm) should use Stack.get_arguments() method
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $FRAME.arguments(&$VM)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: registers-index-in-impl
  message: Indexing registers in Registers impl should be removed with Registers
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $SELF.registers[$IDX]
  - pattern-inside: "impl Registers {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: registers-get-to-boolean
  message: registers.get().to_boolean() should use context.vm.get_register().to_boolean()
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: registers.get($IDX).to_boolean()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: operation-five-operands
  message: Operation with five operands should not have registers parameter
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    ($A, $B, $C, $D, $E): ($T1, $T2, $T3, $T4,\
    \ $T5),\n    registers: &mut Registers,\n    context: &mut Context,\n) -> JsResult<()>\
    \ {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: registers-struct-definition
  message: Registers struct should be removed - registers are now stored directly
    on the stack
  severity: WARNING
  languages:
  - rust
  pattern: "pub(crate) struct Registers {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: registers-impl-block
  message: Registers impl block should be removed - functionality moved to Stack
  severity: WARNING
  languages:
  - rust
  pattern: "impl Registers {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: registers-in-struct-field
  message: Registers should not be a struct field - use Stack instead
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "struct $STRUCT {\n    ...,\n    $FIELD: Registers,\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: callvalue-resolve-returns-option
  message: CallValue.resolve() should return JsResult<bool> instead of JsResult<Option<usize>>
  severity: WARNING
  languages:
  - rust
  pattern: "fn resolve($SELF, $CTX: &mut Context) -> JsResult<Option<usize>> {\n \
    \   ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: ok-some-register-count-return
  message: resolve() returning Ok(Some(register_count)) should return Ok(true) after
    refactoring
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: Ok(Some($COUNT))
  - pattern-inside: "fn resolve($SELF, $CTX: &mut Context) -> $RET {\n    ...\n}\n"
  - pattern-inside: "impl CallValue {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: ok-none-in-resolve
  message: resolve() returning Ok(None) should return Ok(false) after refactoring
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: Ok(None)
  - pattern-inside: "fn resolve($SELF, $CTX: &mut Context) -> $RET {\n    ...\n}\n"
  - pattern-inside: "impl CallValue {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: registers-index-with-as-usize
  message: Register indexing pattern should use Stack get_register/set_register methods
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $REGISTERS[$EXPR.rp + $INDEX as usize]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: registers-with-capacity
  message: Vec initialization in Registers impl should be removed - use Stack
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: Vec::with_capacity($SIZE)
  - pattern-inside: "impl Registers {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: this-position-u32-const
  message: THIS_POSITION constant should use usize type after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: 'const THIS_POSITION: u32 = $VAL;

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: function-position-u32-const
  message: FUNCTION_POSITION constant should use usize type after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: 'const FUNCTION_POSITION: u32 = $VAL;

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: vm-registers-get-call
  message: vm.registers.get() should use vm.get_register() or context.vm.get_register()
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $VM.registers.get($INDEX)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: registers-push-function-impl
  message: push_function method in Registers impl should be removed
  severity: WARNING
  languages:
  - rust
  pattern: "pub(crate) fn push_function(&mut self, register_count: usize) {\n    ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: registers-pop-function-impl
  message: pop_function method in Registers impl should be removed
  severity: WARNING
  languages:
  - rust
  pattern: "pub(crate) fn pop_function(&mut self, register_count: usize) {\n    ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: registers-new-impl-method
  message: Registers::new() constructor should be removed
  severity: WARNING
  languages:
  - rust
  pattern: "pub(crate) fn new(register_count: usize) -> Self {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rp-field-assignment
  message: Assigning to rp field in Registers impl should be removed with Registers
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $SELF.rp = $VAL;
  - pattern-inside: "impl Registers {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: registers-truncate-in-impl
  message: Truncating registers in Registers impl should be removed
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $SELF.registers.truncate($SIZE)
  - pattern-inside: "impl Registers {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: registers-get-is-object
  message: registers.get().is_object() should use context.vm.get_register().is_object()
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: registers.get($IDX).is_object()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: operation-index-varying-operand
  message: Operation with index parameter should not have registers parameter
  severity: WARNING
  languages:
  - rust
  pattern: "pub(super) fn operation(\n    index: VaryingOperand,\n    registers: &mut\
    \ Registers,\n    context: &mut Context,\n) -> JsResult<()> {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
