rules:
- id: stack-method-get-register-regex
  message: get_register method call - Stack accessor
  severity: INFO
  languages:
  - rust
  pattern-regex: \.get_register\s*\(
  metadata:
    nr_refactored_patterns: 169
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/vm/**/*.rs'
    - '**/opcode/**/*.rs'
- id: stack-get-register-method-usage
  message: Detected Stack get_register() method call - indicates new unified stack
    structure
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: $OBJ.get_register($INDEX)
  - pattern-not: $REGS.get($INDEX)
  metadata:
    nr_refactored_patterns: 167
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: operation-without-registers-param
  message: Detected operation signature without registers parameter - indicates refactored
    operation API
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: 'pub(crate) fn operation($ARGS, $CTX: &mut Context) { ... }

        '
    - pattern: 'fn operation($ARGS, $CTX: &mut Context) -> $RET { ... }

        '
  - pattern-inside: 'impl $NAME { ... }

      '
  - metavariable-regex:
      metavariable: $CTX
      regex: ^context$
  - pattern-not-inside: 'fn operation($ARGS, $REGS: &mut $REGISTERS, $CTX: &mut Context)
      { ... }

      '
  metadata:
    nr_refactored_patterns: 161
    nr_legacy_patterns: 0
- id: operation-with-get-set-register
  message: Operation with get/set register calls - register operations
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+operation[\s\S]{100,1000}(get|set)_register
  metadata:
    nr_refactored_patterns: 111
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/opcode/**/*.rs'
- id: stack-method-set-register-regex
  message: set_register method call - Stack mutator
  severity: INFO
  languages:
  - rust
  pattern-regex: \.set_register\s*\(
  metadata:
    nr_refactored_patterns: 93
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/vm/**/*.rs'
    - '**/opcode/**/*.rs'
- id: stack-set-register-method-usage
  message: Detected Stack set_register() method call - indicates new unified stack
    structure
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: $OBJ.set_register($INDEX, ...)
  - pattern-not: $REGS.set($INDEX, ...)
  metadata:
    nr_refactored_patterns: 87
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: stack-push-operation
  message: Detected stack.push() on Stack type - unified stack operations
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: $STACK.push($VALUE)
  - pattern-inside: '$CTX.vm.stack.$METHOD(...)

      '
  metadata:
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: stack-pop-operation
  message: Detected stack.pop() on Stack type - unified stack operations
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: $STACK.pop(...)
  - pattern-inside: '$CTX.vm.stack.$METHOD(...)

      '
  metadata:
