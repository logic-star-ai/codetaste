    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: context-run-without-registers
  message: Detected context.run() without registers parameter - indicates unified
    stack execution
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: $CTX.run()
  - pattern-not: $CTX.run($REGS)
  - metavariable-regex:
