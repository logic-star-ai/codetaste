rules:
- id: detect-mut-eventreader-param-regex
  message: Mutable parameter with EventReader<T> should use MessageReader<T>
  severity: WARNING
  languages:
  - rust
  pattern-regex: mut\s+\w+:\s+EventReader<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 121
- id: detect-add-event-method-call
  message: add_event() method should be renamed to add_message()
  severity: WARNING
  languages:
  - rust
  pattern: '$APP.add_event::<$T>()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 109
- id: detect-eventreader-param
  message: EventReader<T> parameter should be renamed to MessageReader<T>
  severity: WARNING
  languages:
  - rust
  pattern: 'fn $FUNC(..., $VAR: EventReader<$T>, ...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 98
- id: detect-generic-bound-bufferedevent-regex
  message: Generic type bound with BufferedEvent should use Message trait
  severity: WARNING
  languages:
  - rust
  pattern-regex: <[^>]+:\s+BufferedEvent[,>]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 82
- id: detect-world-write-event-method
  message: World::write_event() should be renamed to World::write_message()
  severity: WARNING
