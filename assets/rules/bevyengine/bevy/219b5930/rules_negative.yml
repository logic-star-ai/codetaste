rules:
- id: sprite-bundle-any-field
  message: 'SpriteBundle is deprecated. Use Sprite component with fields moved: texture→image,
    atlas as texture_atlas field.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle\s*\{[^}]+\}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 73
  paths:
    exclude:
    - '*/bundle.rs'
- id: multi-line-sprite-bundle
  message: Multi-line SpriteBundle construction is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle\s*\{\s*$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 72
  paths:
    exclude:
    - '*/bundle.rs'
- id: example-file-sprite-bundle
  message: SpriteBundle in examples is deprecated. Use Sprite::from_image() or Sprite
    struct with image field.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 71
  paths:
    include:
    - examples/**/*.rs
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-with-dot-dot
  message: SpriteBundle with struct spread (..) is deprecated. Use Sprite with required
    components added automatically.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle\s*\{[^}]*\.\.
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-tuple-element
  message: Replace SpriteBundle in tuple with Sprite. Use Sprite::from_image() or
    direct construction.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \(\s*SpriteBundle\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
- id: sprite-bundle-default-field
  message: SpriteBundle with ..default() is deprecated. Use Sprite with required components
    added automatically.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle\s*\{[^}]*\.\.default\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-comma-end
  message: SpriteBundle in tuple or list is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle\s*\{[^}]+\}\s*,
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 60
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-texture-field-access
  message: 'SpriteBundle with texture field is deprecated. Use Sprite::from_image(texture)
    or Sprite { image: texture, ... }.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'SpriteBundle\s*\{[^}]*texture\s*:'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
  paths:
    exclude:
    - '*/bundle.rs'
- id: spawn-call-sprite-bundle-any
  message: Spawning SpriteBundle is deprecated. Use Sprite with image field or Sprite::from_image().
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.spawn\(SpriteBundle\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
  paths:
    exclude:
    - '*/bundle.rs'
- id: semicolon-after-spawn-sprite-bundle
  message: Spawning SpriteBundle is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.spawn\(SpriteBundle[^;]+\);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
  paths:
    exclude:
    - '*/bundle.rs'
- id: indent-sprite-bundle
  message: Indented SpriteBundle is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s+SpriteBundle\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-nested-struct
  message: sprite field in SpriteBundle is deprecated. Use Sprite struct directly
    with all fields.
  severity: WARNING
  languages:
  - rust
  pattern-regex: sprite:\s*Sprite\s*\{[^}]*\},
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-sprite-field-access
  message: SpriteBundle with sprite field is deprecated. Use Sprite struct directly
    with required components added automatically.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'SpriteBundle\s*\{[^}]*sprite\s*:'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-transform-field-access
  message: SpriteBundle with transform field is deprecated. Transform is now a required
    component on Sprite, spawn as tuple if custom transform needed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'SpriteBundle\s*\{[^}]*transform\s*:'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
  paths:
    exclude:
    - '*/bundle.rs'
- id: commands-variable-spawn-sprite-bundle
  message: Variable.spawn(SpriteBundle) is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \b\w+\.spawn\(SpriteBundle\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-field-with-spread
  message: sprite field with spread in SpriteBundle is deprecated. Use Sprite struct
    directly.
  severity: WARNING
  languages:
  - rust
  pattern-regex: sprite:\s*Sprite\s*\{[^}]*\.\.default\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-in-2d-examples
  message: SpriteBundle in 2D examples is deprecated. Use Sprite with required components
    added automatically.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
  paths:
    include:
    - examples/2d/**/*.rs
    exclude:
    - '*/bundle.rs'
- id: sprite-field-with-custom-size
  message: sprite field in SpriteBundle is deprecated. Use Sprite struct directly
    with custom_size.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'sprite:\s*Sprite\s*\{[^}]*custom_size:'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-field-with-color
  message: sprite field in SpriteBundle is deprecated. Use Sprite struct directly
    with color field.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'sprite:\s*Sprite\s*\{[^}]*color:'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    exclude:
    - '*/bundle.rs'
- id: commands-spawn-sprite-bundle-ref
  message: commands.spawn(SpriteBundle {...}) is deprecated. Use commands.spawn(Sprite::from_image(...))
    or Sprite struct directly.
  severity: WARNING
  languages:
  - rust
  pattern-regex: commands\.spawn\(SpriteBundle\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-custom-size-some
  message: sprite field with custom_size in SpriteBundle is deprecated. Set custom_size
    on Sprite struct directly.
  severity: WARNING
  languages:
  - rust
  pattern-regex: sprite:\s*Sprite\s*\{[^}]*custom_size:\s*Some\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
  paths:
    exclude:
    - '*/bundle.rs'
- id: setup-function-sprite-bundle
  message: Setup function using SpriteBundle should be migrated to use Sprite.
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+setup\([^)]*\)\s*\{[^}]*SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - examples/**/*.rs
    exclude:
    - '*/bundle.rs'
- id: child-builder-spawn-sprite-bundle
  message: Child builder spawning SpriteBundle is deprecated. Use Sprite::from_image()
    or Sprite with image field.
  severity: WARNING
  languages:
  - rust
  pattern-regex: '\.spawn\(SpriteBundle\s*\{[^}]*texture:'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-texture-transform
  message: SpriteBundle with texture and transform is deprecated. Use Sprite::from_image(),
    Transform is required component.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'SpriteBundle\s*\{[^}]*texture:[^}]*transform:'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-paren-wrap
  message: Wrapped SpriteBundle is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \(SpriteBundle\s*\{[^}]+\}\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    exclude:
    - '*/bundle.rs'
- id: branding-icon-texture
  message: Loading branding/icon.png for SpriteBundle is deprecated. Use Sprite::from_image(...).
  severity: WARNING
  languages:
  - rust
  pattern-regex: texture:\s*\w+\.load\("branding/icon\.png"\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - examples/**/*.rs
- id: texture-clone-in-loop
  message: Cloning texture handle for SpriteBundle is deprecated. Use Sprite with
    image field.
  severity: WARNING
  languages:
  - rust
  pattern-regex: texture:\s*\w+_handle\.clone\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    exclude:
    - '*/bundle.rs'
- id: asset-server-handle-clone
  message: Cloning handle for texture field in SpriteBundle is deprecated. Use Sprite::from_image(handle.clone()).
  severity: WARNING
  languages:
  - rust
  pattern-regex: texture:\s*\w+_handle\.clone\(\)\s*,
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    exclude:
    - '*/bundle.rs'
- id: transform-from-scale
  message: 'transform: Transform::from_scale() in SpriteBundle is deprecated. Transform
    is required component.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: transform:\s*Transform::from_scale\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    exclude:
    - '*/bundle.rs'
- id: parent-spawn-sprite-bundle
  message: Parent spawning SpriteBundle is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: parent\.spawn\(SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: sprite-bundle-in-games
  message: SpriteBundle in game examples is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - examples/games/**/*.rs
- id: sprite-with-color-srgb
  message: sprite field with color in SpriteBundle is deprecated. Set color on Sprite
    struct directly.
  severity: WARNING
  languages:
  - rust
  pattern-regex: sprite:\s*Sprite\s*\{[^}]*Color::srgb\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - '*/bundle.rs'
- id: for-loop-spawn-sprite-bundle
  message: Loop spawning SpriteBundle is deprecated. Spawn Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: for\s+.*\{[^}]*\.spawn\([^)]*SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-in-loop-body
  message: Loop body spawning SpriteBundle is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: for\s+[^{]+\{[^}]{0,200}SpriteBundle\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    exclude:
    - '*/bundle.rs'
- id: with-children-sprite-bundle
  message: Spawning SpriteBundle in with_children is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: with_children\([^)]*SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: commented-sprite-bundle
  message: Comment mentions SpriteBundle which is now deprecated. Update documentation
    to refer to Sprite.
  severity: INFO
  languages:
  - rust
  pattern-regex: //.*SpriteBundle
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: stress-test-sprite-bundle
  message: SpriteBundle in stress tests is deprecated. Use Sprite instead for performance
    testing.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - examples/stress_tests/**/*.rs
- id: sprite-bundle-struct-member
  message: Replace SpriteBundle struct field with Sprite. Required components are
    managed by ECS.
  severity: WARNING
  languages:
  - rust
  pattern-regex: (?:pub\s+)?(\w+)\s*:\s*SpriteBundle
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: doc-comment-sprite-bundle
  message: Doc comment mentions SpriteBundle which is now deprecated. Update to refer
    to Sprite.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ///.*SpriteBundle
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-field-with-flip
  message: sprite field in SpriteBundle is deprecated. Use Sprite struct directly
    with flip_x/flip_y.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'sprite:\s*Sprite\s*\{[^}]*flip_[xy]:'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-with-sprite-handle
  message: SpriteBundle with sprite_handle is deprecated. Use Sprite::from_image()
    or sprite.image field.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle\s*\{[^}]*sprite_handle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-borrowed-field
  message: SpriteBundle with borrowed fields is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle\s*\{[^}]*&\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-struct-field
  message: Replace SpriteBundle field with Sprite. Required components are managed
    by ECS.
  severity: WARNING
  languages:
  - rust
  pattern: "struct $NAME {\n  ...,\n  $FIELD: SpriteBundle,\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sprite-bundle-struct-definition
  message: Replace sprite_bundle field of type SpriteBundle with just Sprite. Required
    components are managed by ECS.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bstruct\s+\w*\s*\{[^}]*\bsprite_bundle\s*:\s*SpriteBundle
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: changed-texture-atlas-filter-pattern
  message: Changed<TextureAtlas> for sprites is deprecated. Use Changed<Sprite> and
    check if texture_atlas field changed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Changed<TextureAtlas>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - '*/bundle.rs'
    - '*/lib.rs'
    - '*/test*.rs'
- id: sprite-bundle-vec-push
  message: Pushing SpriteBundle to vec is deprecated. Use Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.push\(SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sprite-field-with-anchor
  message: sprite field in SpriteBundle is deprecated. Use Sprite struct directly
    with anchor.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'sprite:\s*Sprite\s*\{[^}]*anchor:'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - '*/bundle.rs'
- id: commands-spawn-sprite-default-handle
  message: Spawning Sprite::default() with handle as tuple may indicate old pattern.
    Use Sprite::from_image() or set image field.
  severity: INFO
  languages:
  - rust
  pattern-regex: \.spawn\(\(Sprite::default\(\),[^)]*\)\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - '*/test*.rs'
- id: sprites-push-sprite-bundle
  message: Pushing SpriteBundle to sprites vec is deprecated. Push Sprite instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: sprites\.push\(SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sprite-bundle-with-handle
  message: SpriteBundle with handle variable is deprecated. Use Sprite::from_image(handle)
    or sprite.image field.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle\s*\{[^}]*\bhandle\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - '*/bundle.rs'
- id: sprite-bundle-with-image-handle
  message: SpriteBundle with image_handle is deprecated. Use Sprite::from_image()
    or sprite.image field.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle\s*\{[^}]*image_handle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - '*/bundle.rs'
- id: many-sprites-example-bundle
  message: SpriteBundle in many_sprites example is deprecated. Migrate to Sprite for
    accurate performance testing.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/many_sprites.rs'
- id: bevymark-example-bundle
  message: SpriteBundle in bevymark is deprecated. Use Sprite for benchmark accuracy.
  severity: WARNING
  languages:
  - rust
  pattern-regex: SpriteBundle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/bevymark.rs'
