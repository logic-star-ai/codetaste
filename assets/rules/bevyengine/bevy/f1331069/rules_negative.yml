rules:
- id: detect-old-pub-use-into-system-configs
  message: Public re-export of old trait 'IntoSystemConfigs' - should export 'IntoScheduleConfigs'
  severity: WARNING
  languages:
  - rust
  pattern: pub use $PATH::IntoSystemConfigs;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: detect-old-use-into-system-configs-simple
  message: Import of old trait 'IntoSystemConfigs' - should import 'IntoScheduleConfigs'
  severity: WARNING
  languages:
  - rust
  pattern: use $PATH::IntoSystemConfigs;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: detect-old-system-configs-in-doc-comment
  message: Documentation references old type 'SystemConfigs' - should reference 'ScheduleConfigs'
  severity: WARNING
  languages:
  - rust
  pattern-regex: ///.*SystemConfigs
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
