rules:
- id: tracing-use-in-core-pipeline-subdirs
  message: Detected direct tracing import in bevy_core_pipeline subdirectories
  severity: INFO
  languages:
  - rust
  pattern-regex: '^\s*use\s+tracing\s*::'
  metadata:
    category: dependency
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - crates/bevy_core_pipeline/src/**/*.rs
