- id: bevy-log-prelude-has-tracing-macros-from-tracing
  message: Detected tracing macros re-exported from tracing crate (not bevy_utils)
    in bevy_log prelude
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-inside: "pub mod prelude {\n  ...\n}\n"
  - pattern-either:
    - pattern: pub use tracing::debug;
    - pattern: pub use tracing::info;
    - pattern: pub use tracing::warn;
    - pattern: pub use tracing::error;
    - pattern: pub use tracing::trace;
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - crates/bevy_log/src/lib.rs
