- id: bevy-utils-tracing-feature-cargo
  message: The 'tracing' feature should be removed from bevy_utils Cargo.toml as part
    of the refactoring
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*tracing\s*=\s*\[\s*"dep:tracing"\s*\]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - crates/bevy_utils/Cargo.toml
- id: bevy-utils-default-features-tracing-cargo
  message: The 'tracing' feature should be removed from default features in bevy_utils
    Cargo.toml
  severity: WARNING
  languages:
  - generic
  pattern-regex: default\s*=\s*\[[^\]]*"tracing"[^\]]*\]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - crates/bevy_utils/Cargo.toml
- id: bevy-utils-tracing-dependency-cargo
