  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: bevy-utils-tracing-qualified-call
  message: Use '$FUNC' directly from 'tracing' crate instead of through 'bevy_utils::tracing'.
    Import from 'tracing' and call 'tracing::$FUNC(...)' or '$FUNC(...)'
  severity: WARNING
  languages:
  - rust
  pattern: bevy_utils::tracing::$FUNC(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: bevy-utils-tracing-format-in-log
  message: Use tracing macros directly from 'tracing' crate. Import 'tracing' and
    call the macro without 'bevy_utils::tracing::' prefix
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: bevy_utils::tracing::debug!($FMT, ...)
    - pattern: bevy_utils::tracing::info!($FMT, ...)
    - pattern: bevy_utils::tracing::warn!($FMT, ...)
    - pattern: bevy_utils::tracing::error!($FMT, ...)
    - pattern: bevy_utils::tracing::trace!($FMT, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
