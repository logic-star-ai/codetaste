    use bevy_utils::tracing;

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: bevy-utils-tracing-import-specific
  message: Import '$ITEM' directly from 'tracing' crate instead of 'bevy_utils::tracing'.
    Add 'tracing' as a dependency and use 'use tracing::$ITEM;'
  severity: WARNING
  languages:
  - rust
  pattern: use bevy_utils::tracing::$ITEM;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 74
- id: bevy-utils-tracing-import-cfg-items
  message: Import tracing items directly from 'tracing' crate instead of 'bevy_utils::tracing'.
    Add 'tracing' as a dependency
  severity: WARNING
