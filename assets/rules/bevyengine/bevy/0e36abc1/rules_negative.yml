    use bevy_utils::tracing::$ITEM;

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 74
- id: bevy-utils-tracing-qualified-type
  message: Use 'tracing::$TYPE' directly instead of through 'bevy_utils'. Import 'tracing'
    as a dependency
  severity: WARNING
  languages:
  - rust
  pattern: bevy_utils::tracing::$TYPE
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: bevy-utils-tracing-two-part-import
  message: Import tracing items directly from 'tracing' crate instead of 'bevy_utils::tracing'.
    Add 'tracing' as a dependency
  severity: WARNING
  languages:
  - rust
  pattern: 'use bevy_utils::tracing::$A;

    use bevy_utils::tracing::$B;

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: bevy-utils-tracing-import-two-items
  message: Import tracing items directly from 'tracing' crate instead of 'bevy_utils::tracing'.
    Add 'tracing' as a dependency and use 'use tracing::{$A, $B};'
  severity: WARNING
  languages:
  - rust
