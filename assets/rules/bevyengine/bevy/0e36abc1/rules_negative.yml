rules:
- id: bevy-utils-tracing-in-cfg
  message: Import tracing directly instead of through bevy_utils. Add 'tracing' as
    a dependency and use 'use tracing;'
  severity: WARNING
  languages:
  - rust
  pattern: '#[cfg(feature = "tracing")]

    use bevy_utils::tracing;

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: bevy-utils-tracing-module-import
  message: Import 'tracing' directly instead of through 'bevy_utils'. Add 'tracing'
    as a dependency and use 'use tracing;'
  severity: WARNING
  languages:
  - rust
  pattern: use bevy_utils::tracing;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: bevy-utils-tracing-import-cfg-wrapped
  message: Import 'tracing' directly instead of through 'bevy_utils'. Add 'tracing'
    as a dependency and use 'use tracing;'
  severity: WARNING
