- id: bevy-render-texture-image-with-handle-import
  message: 'Replace `bevy_render::texture::{Image, TRANSPARENT_IMAGE_HANDLE}` with
    separate imports: `bevy_image::Image` and `bevy_render::texture::TRANSPARENT_IMAGE_HANDLE`.
    The bevy_image re-export has been removed from bevy_render.'
  severity: WARNING
  languages:
  - rust
  pattern: use bevy_render::texture::{Image, TRANSPARENT_IMAGE_HANDLE};
  metadata:
    category: api
    nr_refactored_patterns: 0
