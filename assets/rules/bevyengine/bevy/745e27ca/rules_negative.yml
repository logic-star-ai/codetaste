rules:
- id: bevy-render-texture-any-qualified-path
  message: Replace `bevy_render::texture::` qualified paths with `bevy_image::` for
    image types. The bevy_image re-export has been removed from bevy_render.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bbevy_render::texture::(Image|ImageFormat|ImageSampler|ImageLoader|ImageType|BevyDefault|ImageAddressMode|ImageFilterMode|ImageSamplerDescriptor|CompressedImageFormats|TextureFormatPixelInfo)\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: bevy-render-texture-any-enum-variant
  message: Replace qualified enum path `bevy_render::texture::$TYPE` with `bevy_image::$TYPE`.
    The bevy_image re-export has been removed from bevy_render.
  severity: WARNING
  languages:
  - rust
  pattern: bevy_render::texture::$TYPE::$VARIANT
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: bevy-render-texture-image-import
  message: Replace `bevy_render::texture::Image` import with `bevy_image::Image`.
    The bevy_image re-export has been removed from bevy_render.
  severity: WARNING
  languages:
  - rust
  pattern: use bevy_render::texture::Image;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: bevy-render-texture-addressmode-clamptoedge
  message: Replace qualified path `bevy_render::texture::ImageAddressMode` with `bevy_image::ImageAddressMode`.
    The bevy_image re-export has been removed from bevy_render.
  severity: WARNING
  languages:
  - rust
  pattern: bevy_render::texture::ImageAddressMode::ClampToEdge
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bevy-render-texture-filtermode-linear
  message: Replace qualified path `bevy_render::texture::ImageFilterMode` with `bevy_image::ImageFilterMode`.
    The bevy_image re-export has been removed from bevy_render.
  severity: WARNING
  languages:
  - rust
  pattern: bevy_render::texture::ImageFilterMode::Linear
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bevy-render-texture-qualified-imagesamplerdescriptor-usage
  message: Replace qualified path `bevy_render::texture::ImageSamplerDescriptor` with
    `bevy_image::ImageSamplerDescriptor`. The bevy_image re-export has been removed
    from bevy_render.
  severity: WARNING
  languages:
  - rust
  pattern: bevy_render::texture::ImageSamplerDescriptor
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-render-texture-image-with-handle-import
  message: 'Replace `bevy_render::texture::{Image, TRANSPARENT_IMAGE_HANDLE}` with
    separate imports: `bevy_image::Image` and `bevy_render::texture::TRANSPARENT_IMAGE_HANDLE`.
    The bevy_image re-export has been removed from bevy_render.'
  severity: WARNING
  languages:
  - rust
  pattern: use bevy_render::texture::{Image, TRANSPARENT_IMAGE_HANDLE};
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
