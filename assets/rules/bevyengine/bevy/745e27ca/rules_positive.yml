  languages:
  - rust
  pattern: use bevy_image::BevyDefault;
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - crates/**/*.rs
    exclude:
    - crates/bevy_render/**
