rules:
- id: bevy-image-any-import-in-affected-crate
  message: Any bevy_image reference in affected crate files (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: bevy_image
  metadata:
    nr_refactored_patterns: 70
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_text/**/*.rs'
    - '**/bevy_sprite/**/*.rs'
    - '**/bevy_ui/**/*.rs'
    - '**/bevy_pbr/**/*.rs'
    - '**/bevy_gizmos/**/*.rs'
    - '**/bevy_core_pipeline/**/*.rs'
    - '**/bevy_gltf/**/*.rs'
- id: bevy-image-in-core-pipeline
  message: bevy_image import in core_pipeline (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_core_pipeline/**/*.rs'
  options:
    symbolic_propagation: true
- id: bevy-image-import-in-sprite-crate
  message: bevy_image import in bevy_sprite crate (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_sprite/**/*.rs'
  options:
    symbolic_propagation: true
- id: as-import-bevy-image
  message: Import with alias from bevy_image (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE as $ALIAS;
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_*/**/*.rs'
  options:
    symbolic_propagation: true
- id: bevy-image-import-in-pbr-crate
  message: bevy_image import in bevy_pbr crate (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_pbr/**/*.rs'
  options:
    symbolic_propagation: true
- id: bevy-image-three-types-exclude-pre-existing
  message: Import of 3+ types from bevy_image (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: use\s+bevy_image::\{[^,]+,[^,]+,[^}]+\};
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_*/**/*.rs'
    exclude:
    - '**/bevy_mesh/**'
    - '**/bevy_winit/**'
    - '**/bevy_render/**'
- id: bevy-image-in-gltf
  message: bevy_image import in gltf crate (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_gltf/**/*.rs'
  options:
    symbolic_propagation: true
- id: bevy-image-import-in-ui-crate
  message: bevy_image import in bevy_ui crate (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_ui/**/*.rs'
  options:
    symbolic_propagation: true
- id: bevy-image-import-in-text-crate
  message: bevy_image import in bevy_text crate (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_text/**/*.rs'
  options:
    symbolic_propagation: true
- id: bevy-image-path-in-pipeline-file
  message: bevy_image import in pipeline.rs (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pipeline.rs'
  options:
    symbolic_propagation: true
- id: render-path-to-image-path
  message: Render path changed to image path in macro (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: 'image_path::'
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/macros/**/*.rs'
- id: bevy-image-import-in-gizmos-crate
  message: bevy_image import in bevy_gizmos crate (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_gizmos/**/*.rs'
  options:
    symbolic_propagation: true
- id: comment-mentions-bevy-image-in-sprite
  message: Comment mentioning bevy_image in sprite crate (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: //.*bevy_image
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_sprite/**/*.rs'
- id: link-bevy-image-doc-exclude-mesh
  message: Link to bevy_image in documentation (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: \[.*bevy_image
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_*/**/*.rs'
    exclude:
    - '**/bevy_mesh/**'
    - '**/bevy_winit/**'
    - '**/bevy_render/**'
- id: bevy-image-in-braces
  message: bevy_image in braces (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: \{[^}]*bevy_image[^}]*\}
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_*/**/*.rs'
    exclude:
    - '**/bevy_render/**'
    - '**/bevy_mesh/**'
    - '**/bevy_winit/**'
- id: cargo-toml-bevy-image-in-gizmos
  message: bevy_image dependency added to bevy_gizmos (refactoring applied)
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: bevy_image.*path.*bevy_image
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_gizmos/Cargo.toml'
