rules:
- id: bevy-image-impl-block-usage
  message: 'Refactoring detected: Impl block uses bevy_image types'
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: "use bevy_image::$TYPE;\n...\nimpl $TRAIT for $STRUCT {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 167
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_sprite/**/*.rs'
    - '**/bevy_text/**/*.rs'
    - '**/bevy_ui/**/*.rs'
    - '**/bevy_pbr/**/*.rs'
- id: bevy-image-simple-import-any-type
  message: 'Refactoring detected: Any type imported from bevy_image'
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$ANY;
  metadata:
    nr_refactored_patterns: 79
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
    exclude:
    - '**/bevy_render/**'
    - '**/bevy_winit/**'
    - '**/bevy_mesh/**'
    - '**/target/**'
    - '**/bevy_image/**'
- id: bevy-image-direct-import-in-affected-crates
  message: 'Refactoring detected: Direct import from bevy_image in affected crate'
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 69
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_sprite/**/*.rs'
    - '**/bevy_text/**/*.rs'
    - '**/bevy_ui/**/*.rs'
    - '**/bevy_pbr/**/*.rs'
    - '**/bevy_gizmos/**/*.rs'
    - '**/bevy_core_pipeline/**/*.rs'
    - '**/examples/**/*.rs'
    exclude:
    - '**/target/**'
    - '**/bevy_render/**'
- id: bevy-image-qualified-path-usage
  message: 'Refactoring detected: Qualified path bevy_image:: used in code'
  severity: INFO
  languages:
  - rust
  pattern-regex: bevy_image::[A-Z]\w+
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_sprite/**/*.rs'
    - '**/bevy_text/**/*.rs'
    - '**/bevy_ui/**/*.rs'
    - '**/bevy_pbr/**/*.rs'
    - '**/bevy_gizmos/**/*.rs'
    - '**/bevy_core_pipeline/**/*.rs'
    exclude:
    - '**/bevy_render/**'
- id: bevy-image-import-in-sprite-crate
  message: 'Refactoring detected: bevy_sprite now imports from bevy_image'
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_sprite/**/*.rs'
    exclude:
    - '**/target/**'
- id: bevy-image-import-in-pbr-crate
  message: 'Refactoring detected: bevy_pbr now imports from bevy_image'
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_pbr/**/*.rs'
    exclude:
    - '**/target/**'
- id: bevy-image-import-in-ui-crate
  message: 'Refactoring detected: bevy_ui now imports from bevy_image'
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_ui/**/*.rs'
    exclude:
    - '**/target/**'
- id: bevy-image-import-in-text-crate
  message: 'Refactoring detected: bevy_text now imports from bevy_image'
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_text/**/*.rs'
    exclude:
    - '**/target/**'
- id: bevy-main-reexport-image-module
  message: 'Refactoring detected: bevy crate re-exports image module'
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: pub use bevy_image as image;
    - pattern: pub use bevy_image;
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_internal/**/*.rs'
    - '**/src/lib.rs'
- id: bevy-image-path-in-comment
  message: 'Refactoring detected: Documentation references bevy_image path'
  severity: INFO
  languages:
  - rust
  pattern-regex: ///.*bevy_image::[A-Z]\w+
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_sprite/**/*.rs'
    - '**/bevy_text/**/*.rs'
    - '**/bevy_ui/**/*.rs'
    - '**/bevy_pbr/**/*.rs'
- id: bevy-image-import-in-gizmos-crate
  message: 'Refactoring detected: bevy_gizmos now imports from bevy_image'
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE;
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_gizmos/**/*.rs'
    exclude:
    - '**/target/**'
- id: bevy-image-dependency-added-sprite
  message: 'Refactoring detected: bevy_image dependency in bevy_sprite Cargo.toml'
  severity: INFO
  languages:
  - generic
  pattern-regex: (?s).*bevy_image\s*=.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_sprite/Cargo.toml'
- id: bevy-image-dependency-added-text
  message: 'Refactoring detected: bevy_image dependency in bevy_text Cargo.toml'
