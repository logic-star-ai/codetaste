rules:
- id: attribute-with-bevy-image-import
  message: Attribute in file with bevy_image import (refactoring applied)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: '#[$ATTR]'
  - pattern-inside: 'use bevy_image::$_;

      ...

      '
  metadata:
    nr_refactored_patterns: 7498
    nr_legacy_patterns: 0
  paths:
    include:
    - crates/**/*.rs
    exclude:
    - crates/bevy_render/**
    - crates/bevy_winit/**
    - crates/bevy_mesh/**
- id: impl-block-with-bevy-image-import
  message: impl block in file with bevy_image import (refactoring applied)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: "impl $TYPE {\n  ...\n}\n"
  - pattern-inside: 'use bevy_image::$_;

      ...

      '
  metadata:
    nr_refactored_patterns: 259
    nr_legacy_patterns: 0
  paths:
    include:
    - crates/**/*.rs
    exclude:
    - crates/bevy_render/**
    - crates/bevy_winit/**
    - crates/bevy_mesh/**
- id: bevy-default-trait-single-import
