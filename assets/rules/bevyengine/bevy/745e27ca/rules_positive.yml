- id: bevy-internal-exposes-image-module
  message: bevy_internal exposes bevy_image as image module (refactoring applied)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: pub use bevy_image as image;
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_internal/**/lib.rs'
- id: doc-comment-bevy-image-ui
  message: Doc comment mentioning bevy_image in ui crate (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: ///.*bevy_image
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_ui/**/*.rs'
- id: as-bind-group-macro-change
  message: AsBindGroup macro code using bevy_image (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: image_path.*bevy_image
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/as_bind_group.rs'
- id: doc-link-to-bevy-image
  message: Documentation link to bevy_image types (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: '\[`bevy_image::'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_*/**/*.rs'
- id: bevy-image-turbofish-call
  message: Turbofish call with bevy_image (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: '::<.*bevy_image::'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_*/**/*.rs'
- id: bevy-image-import-loader-combo
  message: Import with loader types from bevy_image (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern-regex: use\s+bevy_image::\{.*Loader.*\}
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bevy_*/**/*.rs'
