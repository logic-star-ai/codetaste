rules:
- id: bevy-image-import-in-mesh-crate-excluded
  message: Detected bevy_image import outside mesh/winit/render crates (refactoring
    applied)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use bevy_image::$TYPE;
  - pattern-not-inside: 'mod $MOD { ... }

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 79
    nr_legacy_patterns: 0
  paths:
    include:
    - crates/**
    exclude:
    - crates/bevy_mesh/**
    - crates/bevy_winit/**
    - crates/bevy_render/**
- id: bevy-core-pipeline-any-file-references-bevy-image
  message: Detected bevy_core_pipeline source file references bevy_image (refactoring
    applied)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-regex: '\bbevy_image::'
  metadata:
    category: dependency
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - crates/bevy_core_pipeline/**/*.rs
    exclude:
    - crates/bevy_core_pipeline/Cargo.toml
- id: match-bevy-image-enum-variant
  message: Detected pattern match on bevy_image enum variant (refactoring applied)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: bevy_image::$ENUM::$VARIANT
  - metavariable-regex:
      metavariable: $ENUM
      regex: ^(ImageFormat|ImageAddressMode|ImageFilterMode|ImageType)$
  metadata:
    category: basic
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: bevy-image-import-with-alias
  message: Detected aliased import from bevy_image (refactoring applied)
  severity: INFO
  languages:
  - rust
  pattern: use bevy_image::$TYPE as $ALIAS;
  metadata:
    category: dependency
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
