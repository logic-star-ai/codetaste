rules:
- id: detect-handle-weak-from-u128-any-usage
  message: Replace Handle::weak_from_u128() with weak_handle!() macro
  severity: WARNING
  languages:
  - rust
  pattern: Handle::weak_from_u128($VALUE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 125
- id: detect-handle-weak-from-u128-shader-handle-const
  message: Replace shader Handle::weak_from_u128($VALUE) with weak_handle!("uuid-string")
    macro
  severity: WARNING
