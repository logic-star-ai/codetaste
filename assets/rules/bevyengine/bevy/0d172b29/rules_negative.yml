rules:
- id: bevy-log-single-macro-import
  message: Replace `use bevy_log::$MACRO;` with `use bevy_utils::tracing::$MACRO;`
    for consistent logging
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use bevy_log::$MACRO;
  - metavariable-pattern:
      metavariable: $MACRO
      pattern-either:
      - pattern: error
      - pattern: warn
      - pattern: info
      - pattern: debug
      - pattern: trace
      - pattern: info_span
      - pattern: warn_once
      - pattern: debug_span
      - pattern: warn_span
      - pattern: error_span
      - pattern: trace_span
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: bevy-log-comprehensive-catch-all
  message: Replace any bevy_log usage with bevy_utils::tracing in affected crates
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'bevy_log::'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
  paths:
    include:
    - crates/bevy_animation/**/*.rs
    - crates/bevy_asset/**/*.rs
    - crates/bevy_core_pipeline/**/*.rs
    - crates/bevy_diagnostic/**/*.rs
    - crates/bevy_gilrs/**/*.rs
    - crates/bevy_gizmos/**/*.rs
    - crates/bevy_gltf/**/*.rs
    - crates/bevy_hierarchy/**/*.rs
    - crates/bevy_render/**/*.rs
    - crates/bevy_sprite/**/*.rs
    - crates/bevy_ui/**/*.rs
    exclude:
    - crates/bevy_asset/src/lib.rs
- id: bevy-log-in-affected-crates-general
  message: Replace bevy_log import with bevy_utils::tracing in affected crate
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'use\s+bevy_log::'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    include:
    - crates/bevy_animation/**/*.rs
    - crates/bevy_asset/**/*.rs
    - crates/bevy_core_pipeline/**/*.rs
    - crates/bevy_diagnostic/**/*.rs
    - crates/bevy_gilrs/**/*.rs
    - crates/bevy_gizmos/**/*.rs
    - crates/bevy_gltf/**/*.rs
    - crates/bevy_hierarchy/**/*.rs
    - crates/bevy_render/**/*.rs
    - crates/bevy_sprite/**/*.rs
    - crates/bevy_ui/**/*.rs
    exclude:
    - crates/bevy_asset/src/lib.rs
- id: bevy-log-any-import-single-line
  message: Replace bevy_log macro with bevy_utils::tracing macro
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^[ \t]*use\s+bevy_log::(error|warn|info|debug|trace|info_span|warn_once|debug_span);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    include:
    - crates/bevy_animation/**/*.rs
    - crates/bevy_asset/**/*.rs
    - crates/bevy_core_pipeline/**/*.rs
    - crates/bevy_diagnostic/**/*.rs
    - crates/bevy_gilrs/**/*.rs
    - crates/bevy_gizmos/**/*.rs
    - crates/bevy_gltf/**/*.rs
