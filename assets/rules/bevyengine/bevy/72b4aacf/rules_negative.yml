  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($P1::$V1).add_plugin($P2::$V2).add_plugin($P3::$V3).add_plugin($P4::$V4)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: bevy-add-plugin-after-register-type
  message: Replace deprecated `add_plugin` with `add_plugins` after register_type.
  severity: WARNING
  languages:
  - rust
  pattern: "$APP.register_type::<$T>()\n    .add_plugin($PLUGIN)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: bevy-add-plugin-mixed-six-sequential
  message: Combine six sequential `add_plugin` calls into a single `add_plugins` with
    a tuple.
  severity: WARNING
  languages:
  - rust
  pattern: "$APP.add_plugin($P1)\n    .add_plugin($P2)\n    .add_plugin($P3)\n   \
    \ .add_plugin($P4)\n    .add_plugin($P5)\n    .add_plugin($P6)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: bevy-add-plugin-before-run-chain
  message: Replace deprecated `add_plugin` with `add_plugins` before calling run().
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($PLUGIN).run()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: bevy-add-plugin-compact-with-run
  message: 'Replace deprecated `add_plugin` with `add_plugins`: `app.add_plugins($PLUGIN).run()`'
  severity: WARNING
  languages:
