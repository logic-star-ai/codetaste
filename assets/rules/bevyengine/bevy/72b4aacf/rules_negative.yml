rules:
- id: bevy-deprecated-add-plugin-basic
  message: Replace deprecated `add_plugin` with `add_plugins`. Use `app.add_plugins($PLUGIN)`
    instead of `app.add_plugin($PLUGIN)`.
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($PLUGIN)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 151
- id: bevy-add-plugin-method-call
  message: The `add_plugin` method is deprecated. Use `add_plugins` instead.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $APP.add_plugin(...)
  - pattern-not: $APP.add_plugins(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 151
- id: bevy-add-plugin-any-default-plugin
  message: Replace deprecated `add_plugin` with `add_plugins` for any plugin.
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($PLUGIN_NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 151
- id: bevy-add-plugin-with-path
  message: Replace deprecated `add_plugin` with `add_plugins` for fully qualified
    plugin paths.
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($MOD::$PLUGIN)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: bevy-add-plugin-double-colon-call
  message: Replace deprecated `add_plugin` with `add_plugins` for nested module plugins.
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($MOD::$SUBMOD::$PLUGIN)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
- id: bevy-add-plugin-compact-chain-three
  message: 'Combine sequential `add_plugin` calls into a single `add_plugins` with
    a tuple: `app.add_plugins(($P1, $P2, $P3))`'
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($P1).add_plugin($P2).add_plugin($P3)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: bevy-multiple-sequential-add-plugin-mixed-defaults
  message: 'Combine sequential `add_plugin` calls into a single `add_plugins` with
    a tuple: `app.add_plugins(($P1::default(), $P2))`'
  severity: WARNING
  languages:
  - rust
  pattern: "$APP.add_plugin($P1::default())\n    .add_plugin($P2)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: bevy-add-plugin-mixed-variants-compact
  message: Combine sequential `add_plugin` calls into a single `add_plugins` with
    a tuple.
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($P1::$V1).add_plugin($P2::$V2)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: bevy-add-plugin-frametime-diagnostics
  message: Replace deprecated `add_plugin` with `add_plugins` for FrameTimeDiagnosticsPlugin.
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin(FrameTimeDiagnosticsPlugin)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: bevy-add-plugin-mixed-defaults-compact
  message: Combine sequential `add_plugin` calls into a single `add_plugins` with
    a tuple.
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($P1::default()).add_plugin($P2)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: bevy-four-add-plugin-compact
  message: Combine sequential `add_plugin` calls into a single `add_plugins` with
    a tuple.
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($P1).add_plugin($P2).add_plugin($P3).add_plugin($P4)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: bevy-add-plugin-variant-then-default
  message: Combine sequential `add_plugin` calls into a single `add_plugins` with
    a tuple.
  severity: WARNING
  languages:
  - rust
  pattern: "$APP.add_plugin($P1::$VARIANT)\n    .add_plugin($P2::default())\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: bevy-five-add-plugin-compact
  message: Combine sequential `add_plugin` calls into a single `add_plugins` with
    a tuple.
  severity: WARNING
  languages:
  - rust
  pattern: $APP.add_plugin($P1).add_plugin($P2).add_plugin($P3).add_plugin($P4).add_plugin($P5)
  metadata:
