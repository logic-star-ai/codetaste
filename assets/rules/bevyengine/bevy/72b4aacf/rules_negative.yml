  severity: WARNING
  languages:
  - rust
  pattern: "$APP.add_plugin($P1::default())\n    .add_plugin($M2::$P2)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: bevy-add-plugin-two-diagnostics
  message: 'Combine diagnostic plugins into a tuple: `app.add_plugins((LogDiagnosticsPlugin::default(),
    FrameTimeDiagnosticsPlugin))`'
  severity: WARNING
  languages:
  - rust
  pattern: "$APP.add_plugin(LogDiagnosticsPlugin::default())\n    .add_plugin(FrameTimeDiagnosticsPlugin)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bevy-add-plugin-diagnostics-compact
  message: 'Combine diagnostic plugins into a tuple: `app.add_plugins((LogDiagnosticsPlugin::default(),
