rules:
- id: bevy-ui-style-struct-literal
  message: Style component has been removed. Merge Style fields into Node component
    instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: (?<!taffy::style::)(?<!::)\bStyle\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 361
  paths:
    exclude:
    - '**/gizmos/**'
- id: bevy-ui-node-default-with-style
  message: Don't use Node::default() with Style. Merge all Style fields into Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: Node::default\(\)\s*,\s*Style
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 205
- id: bevy-ui-spawn-with-both-node-style
  message: Spawning with both Node and Style - merge into single Node component
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.spawn\(\s*\(\s*(?:Node::default\(\)|Node\s*\{[^}]*\})\s*,\s*Style
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 197
- id: bevy-ui-style-in-with-child
  message: Style in with_child - Style removed, use Node instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: with_child.*\n[^}]*Style\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 79
- id: bevy-ui-style-in-with-children
  message: Style in with_children closure - Style removed, use Node instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: with_children.*\n[^}]*Style\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: bevy-ui-generic-param-style
  message: Generic parameter with Style - Style removed, use Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: <[^>]*Style[^>]*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    exclude:
    - '**/gizmos/**'
    - '**/convert.rs'
- id: bevy-ui-spawn-tuple-button-style
  message: Don't spawn Button with separate Style. Button now auto-requires Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.spawn\(\s*\(\s*Button\s*,\s*Style\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: bevy-ui-doc-comment-style-component
  message: Doc comment mentions Style component which has been removed
  severity: INFO
  languages:
  - rust
  pattern-regex: ///.*`Style`
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: bevy-ui-style-default
  message: Style component removed. Use Node::default() instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: Style::default\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: bevy-ui-query-mut-style
  message: Style component removed. Query &mut Node to modify UI properties
  severity: WARNING
  languages:
  - rust
  pattern-regex: Query<[^>]*&mut\s+Style[,>]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: bevy-ui-from-style-function
  message: 'Function renamed: from_style() is now from_node()'
  severity: WARNING
  languages:
  - rust
  pattern-regex: from_style\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: bevy-ui-layout-from-style
  message: Function renamed to from_node(). Update layout conversion calls
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bfrom_style\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: bevy-ui-query-ref-style
  message: Style component removed. Query &Node to access UI properties
  severity: WARNING
  languages:
  - rust
  pattern-regex: Query<[^>]*&Style[,>]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: bevy-ui-style-field-position-assign
  message: Accessing style position fields - Style removed, use node fields instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.(left|right|top|bottom)\s*=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: bevy-ui-insert-style-component
  message: Style component removed. Insert Node component with properties instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.insert\(Style\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: bevy-ui-entity-commands-insert-style
  message: Inserting Style component - Style removed, insert Node properties instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.insert\(\s*Style\s*\{[^}]*\}\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: bevy-ui-struct-field-style-type
  message: Struct field of type Style - Style removed, use Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: (?:pub\s+)?style:\s*Style\s*[,}]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: bevy-ui-style-import
  message: Style component has been removed. Import Node instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: use\s+.*Style[,;\s]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bevy-ui-style-field-width-assign
  message: Accessing style.width - Style removed, use node.width instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.width\s*=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bevy-ui-style-field-display-assign
  message: Accessing style.display - Style removed, use node.display instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.display\s*=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bevy-ui-style-left-field
  message: Accessing style.left - Style removed, use node.left
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.left\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bevy-ui-style-top-field
  message: Accessing style.top - Style removed, use node.top
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.top\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bevy-ui-style-component-import
  message: Importing Style from bevy_ui - Style removed, import Node instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: use\s+[^;]*ui::\{[^}]*Style[^}]*\}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bevy-ui-style-ref-annotation
  message: Style component has been removed. Use &Node instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: :\s*&Style\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-button-bundle-style-field
  message: ButtonBundle no longer has 'style' field. Use 'node' field instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'ButtonBundle\s*\{[^}]*\bstyle:'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-style-dot-min-width
  message: Accessing style.min_width - Style removed, use node.min_width instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.min_width\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-style-dot-max-width
  message: Accessing style.max_width - Style removed, use node.max_width instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.max_width\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-with-node-type-alias
  message: WithNode type alias updated. Use With<Node> filter instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bWithNode\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-style-overflow-clip-margin
  message: Accessing style.overflow_clip_margin - Style removed, use node.overflow_clip_margin
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.overflow_clip_margin\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-parent-spawn-style-component
  message: Spawning Style component - Style removed, use Node instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: parent\.spawn\([^)]*Style\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-mut-ref-style-in-tuple
  message: Tuple with &mut Style reference - Style removed, use &mut Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: \(\s*&mut\s+Style\s*,
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-query-tuple-node-and-style
  message: Query includes both &Node and &Style - Style removed, all properties now
    in Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: Query<\s*\([^)]*&Node[^)]*&Style[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-let-style-query-get
  message: Getting style from query - Style removed, query Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: let\s+[^=]*style[^=]*=.*\.get\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-child-builder-spawn-style
  message: Child builder spawning Style - Style removed, use Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: (?:parent|builder)\.spawn\(\s*\([^)]*,\s*Style\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-where-clause-style
  message: Where clause with Style - Style removed, use Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: where[\s\S]{0,200}Style
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bevy-ui-changed-style-filter
  message: Style component removed. Use Changed<Node> to detect property changes
  severity: WARNING
  languages:
  - rust
  pattern-regex: Changed<Style>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-option-style-type
  message: Style component removed. Use Option with Node instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: Option<.*Style>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-node-bundle-style-field
  message: NodeBundle no longer has 'style' field. Use 'node' field with merged properties
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'NodeBundle\s*\{[^}]*\bstyle:'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-image-bundle-style-field
  message: ImageBundle no longer has 'style' field. Use 'node' field instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'ImageBundle\s*\{[^}]*\bstyle:'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-field-height-assign
  message: Accessing style.height - Style removed, use node.height instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.height\s*=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-dot-width-read
  message: Reading style.width - Style removed, use node.width instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.width\b(?!\s*[=:])
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-dot-height-read
  message: Reading style.height - Style removed, use node.height instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.height\b(?!\s*[=:])
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-dot-min-height
  message: Accessing style.min_height - Style removed, use node.min_height instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.min_height\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-dot-max-height
  message: Accessing style.max_height - Style removed, use node.max_height instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.max_height\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-dot-position-type-read
  message: Reading style.position_type - Style removed, use node.position_type instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.position_type\b(?!\s*[=:])
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-row-gap
  message: Accessing style.row_gap - Style removed, use node.row_gap
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.row_gap\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-column-gap
  message: Accessing style.column_gap - Style removed, use node.column_gap
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.column_gap\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-right-field
  message: Accessing style.right - Style removed, use node.right
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.right\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-bottom-field
  message: Accessing style.bottom - Style removed, use node.bottom
  severity: WARNING
  languages:
  - rust
  pattern-regex: style\.bottom\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-commands-spawn-style-component
  message: Spawning Style component - Style removed, use Node instead
  severity: WARNING
  languages:
  - rust
  pattern-regex: commands\.spawn\([^)]*Style\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-register-type-style
  message: Registering Style type - Style removed, only Node needs registration
  severity: WARNING
  languages:
  - rust
  pattern-regex: register_type::<Style>\(
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-if-let-some-style
  message: if-let Some with style - Style removed, use node
  severity: WARNING
  languages:
  - rust
  pattern-regex: if\s+let\s+Some\([^)]*style
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-impl-default-for-style
  message: Default impl for Style - Style should be removed
  severity: WARNING
  languages:
  - rust
  pattern-regex: impl\s+Default\s+for\s+Style
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-style-struct-definition-file
  message: Style struct should be removed - fields merged into Node
  severity: ERROR
  languages:
  - rust
  pattern-regex: pub\s+struct\s+Style\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - crates/bevy_ui/src/ui_node.rs
- id: bevy-ui-tuple-entity-style-marker
  message: Tuple with Entity and Style - Style removed, use Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: \(\s*Entity\s*,\s*[^,)]*Style
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-access-node-require-style
  message: Component requires Style - Style removed, Node is the main component
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[require\([^)]*Style'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-cfg-test-style
  message: Test code using Style - Style removed, update tests to use Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[cfg\(test\)\][\s\S]{0,200}Style\s*\{'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bevy-ui-mod-tests-style
  message: Test module with Style - Style removed, update tests to use Node
  severity: WARNING
  languages:
  - rust
  pattern-regex: mod\s+tests\s*\{[\s\S]{0,500}Style
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
