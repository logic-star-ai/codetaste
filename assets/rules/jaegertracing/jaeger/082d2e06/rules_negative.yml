rules:
- id: old-short-var-strategystore
  message: Variable assignment potentially from old strategystore methods. Review
    for compatibility
  severity: INFO
  languages:
  - go
  pattern: "$VAR := $FUNC(...) \n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 162
  paths:
    include:
    - '**/*strategystore*'
- id: old-test-require-strategystore
  message: Test file in old strategystore package. Package should be reorganized
  severity: INFO
  languages:
  - go
  pattern: 'require.NoError(t, $ERR)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
  paths:
    include:
    - plugin/sampling/strategystore/**/*_test.go
- id: old-package-path-plugin-strategystore
  message: File in old package path 'plugin/sampling/strategystore'. Should be in
    'strategyprovider'
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
  paths:
    include:
    - plugin/sampling/strategystore/**
- id: old-import-cmd-collector-strategystore
  message: 'Old import path detected: ''strategystore'' package should be renamed
    to ''samplingstrategy'''
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/jaegertracing/jaeger/cmd/collector/app/sampling/strategystore"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: old-multi-import-strategystore
  message: Old import path 'strategystore' in import block. Should be 'samplingstrategy'
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/jaegertracing/jaeger/cmd/collector/app/sampling/strategystore\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: old-method-createstrategystore-call
  message: Old method call 'CreateStrategyStore()' detected. Should be renamed to
    'CreateStrategyProvider()'
  severity: WARNING
  languages:
  - go
  pattern: '$X.CreateStrategyStore()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: old-package-strategystore-declaration
  message: Old package name 'strategystore' detected. Should be renamed to 'samplingstrategy'
    or 'strategyprovider' depending on location
  severity: WARNING
  languages:
  - go
  pattern: 'package strategystore

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - plugin/sampling/strategystore/*
    - cmd/collector/app/sampling/strategystore/*
- id: old-assignment-strategystore
  message: Assignment from 'CreateStrategyStore()' detected. Method should be renamed
    to 'CreateStrategyProvider()'
  severity: WARNING
  languages:
  - go
  pattern: '$X = $Y.CreateStrategyStore()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: old-test-createstrategystore-call
  message: Test calling 'CreateStrategyStore()'. Should call 'CreateStrategyProvider()'
  severity: WARNING
  languages:
  - go
  pattern: '$FACTORY.CreateStrategyStore()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/*_test.go'
