rules:
- id: refactor-adaptive-package-files
  message: Detected file in refactored adaptive package path (was under strategystore)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/adaptive/**/*.go
    exclude:
    - plugin/sampling/strategystore/adaptive/**/*.go
- id: refactor-struct-init-samplingprovider
  message: Detected struct initialization with 'SamplingProvider' field (was 'StrategyStore'
    or 'SamplingStore')
  severity: INFO
  languages:
  - go
  pattern: "$STRUCT{\n  ...,\n  SamplingProvider: $EXPR,\n  ...,\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: refactor-test-samplingprovider-variable
  message: Detected test variable using refactored naming 'samplingProvider' or 'provider'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$VAR := $EXPR

      '
  - metavariable-pattern:
      metavariable: $VAR
      pattern-regex: samplingProvider|provider
  metadata:
    category: basic
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: refactor-strategyprovider-test-files
  message: Detected test file in refactored strategyprovider package (was strategystore)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**/*_test.go
    exclude:
    - plugin/sampling/strategystore/**/*_test.go
- id: refactor-plugin-import
  message: Detected plugin import in refactored factory files
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/jaegertracing/jaeger/plugin
  metadata:
    category: dependency
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
- id: refactor-adaptive-package-declaration
  message: Detected 'package adaptive' declaration in refactored path
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: package adaptive
  metadata:
    category: structural
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/adaptive/**
- id: refactor-storage-samplingstore-import
  message: Detected storage import in refactored package
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/jaegertracing/jaeger/storage
  metadata:
    category: dependency
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
    - cmd/collector/app/sampling/samplingstrategy/**
- id: refactor-import-samplingstrategy-package
  message: Detected import of refactored package 'samplingstrategy' (was 'strategystore')
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/jaegertracing/jaeger/cmd/collector/app/sampling/samplingstrategy
  metadata:
    category: structural
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: refactor-metrics-factory-import
  message: Detected metrics import in refactored factory files
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/jaegertracing/jaeger/pkg/metrics
  metadata:
    category: dependency
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
    - cmd/collector/app/sampling/samplingstrategy/**
- id: refactor-createstrategyprovider-call
  message: Detected call to 'CreateStrategyProvider()' (was 'CreateStrategyStore()')
  severity: INFO
  languages:
  - go
  pattern: $FACT.CreateStrategyProvider()
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: refactor-static-package-files
  message: Detected file in refactored static package path (was under strategystore)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/static/**/*.go
    exclude:
    - plugin/sampling/strategystore/static/**/*.go
- id: refactor-static-package-declaration
  message: Detected 'package static' declaration in refactored path
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: package static
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/static/**
- id: refactor-import-strategyprovider-package
  message: Detected import of refactored package 'strategyprovider' (was 'strategystore')
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/jaegertracing/jaeger/plugin/sampling/strategyprovider
  metadata:
    category: structural
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: refactor-samplingprovider-variable
  message: Detected variable named 'samplingProvider' (was 'strategyStore')
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$VAR := $EXPR

      '
  - metavariable-pattern:
      metavariable: $VAR
      pattern-regex: .*samplingProvider.*
  - pattern-not: 'strategyStore := $EXPR

      '
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: refactor-return-provider-aggregator
  message: Detected return statement returning provider and aggregator (refactored
    pattern)
  severity: INFO
  languages:
  - go
  pattern: 'return $PROVIDER, $AGGREGATOR, $ERROR

    '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
    - cmd/collector/app/sampling/samplingstrategy/**
- id: refactor-collector-samplingprovider-field-access
  message: Detected access to 'samplingProvider' field (was 'strategyStore')
  severity: INFO
  languages:
  - go
  pattern: '$COLLECTOR.samplingProvider

    '
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: refactor-viper-import
  message: Detected viper import in refactored package
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/spf13/viper
  metadata:
    category: dependency
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
- id: refactor-flag-import
  message: Detected flag import in refactored package
  severity: INFO
  languages:
  - go
  pattern-regex: '"flag"'
  metadata:
    category: dependency
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
- id: refactor-strategyprovider-package-declaration
  message: Detected 'package strategyprovider' declaration (was 'package strategystore')
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: package strategyprovider
  - pattern-not-regex: package strategystore
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: refactor-provider-initialization
  message: Detected initialization using 'CreateStrategyProvider()' (was 'CreateStrategyStore()')
  severity: INFO
  languages:
  - go
  pattern: '$VAR, $AGG, $ERR := $FACTORY.CreateStrategyProvider()

    '
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: refactor-provider-error-return
  message: Detected return pattern for provider creation with error (refactored context)
  severity: INFO
  languages:
  - go
  pattern: 'return nil, nil, $ERR

    '
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
    - cmd/collector/app/sampling/samplingstrategy/**
- id: refactor-calculationstrategy-in-adaptive-path
  message: Detected calculationstrategy files moved inside adaptive package
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/adaptive/calculationstrategy/**/*.go
    exclude:
    - plugin/sampling/calculationstrategy/**/*.go
- id: refactor-calculationstrategy-package-declaration
  message: Detected 'package calculationstrategy' declaration in refactored location
    inside adaptive
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: package calculationstrategy
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/adaptive/calculationstrategy/**
- id: refactor-createstrategyprovider-method
  message: Detected 'CreateStrategyProvider' method (was 'CreateStrategyStore')
  severity: INFO
  languages:
  - go
  pattern: "func ($R $T) CreateStrategyProvider() ($RET, $AGG, $ERR) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: refactor-samplingproviderfactory-variable
  message: Detected variable named 'samplingStrategyFactory' (was 'strategyStoreFactory')
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$VAR := $EXPR

      '
  - metavariable-pattern:
      metavariable: $VAR
      pattern-regex: .*samplingStrategyFactory.*
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: refactor-params-samplingprovider-usage
  message: Detected access to 'SamplingProvider' field in params struct (was 'StrategyStore')
  severity: INFO
  languages:
  - go
  pattern: '$PARAMS.SamplingProvider

    '
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: refactor-test-collectorparams-samplingprovider
  message: Detected test using CollectorParams with refactored SamplingProvider field
  severity: INFO
  languages:
  - go
  pattern: "CollectorParams{\n  ...,\n  SamplingProvider:  $EXPR,\n  ...,\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: refactor-samplingstrategy-package-declaration
  message: Detected 'package samplingstrategy' declaration (was 'package strategystore')
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: package samplingstrategy
  - pattern-not-regex: package strategystore
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: refactor-struct-init-samplingaggregator
  message: Detected struct initialization with 'SamplingAggregator' field (was 'Aggregator')
  severity: INFO
  languages:
  - go
  pattern: "$STRUCT{\n  ...,\n  SamplingAggregator: $EXPR,\n  ...,\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: refactor-provider-return-type
  message: Detected function returning 'Provider' type (was 'StrategyStore')
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(...) ($PKG.Provider, ...) {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $PKG
      pattern-regex: ^(samplingstrategy|strategyprovider)$
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: refactor-adaptive-import-path
  message: Detected import of refactored adaptive package path (was under strategystore)
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/jaegertracing/jaeger/plugin/sampling/strategyprovider/adaptive
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: refactor-mock-provider-struct
  message: Detected mock struct with 'Provider' in name (was 'StrategyStore')
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $MOCK struct {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $MOCK
      pattern-regex: .*[Mm]ock.*[Pp]rovider.*
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: refactor-adaptive-processor-import
  message: Detected import of refactored adaptive processor package
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/jaegertracing/jaeger/plugin/sampling/strategyprovider/adaptive
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: refactor-collector-struct-samplingprovider
  message: Detected collector struct with 'samplingProvider' field (was 'strategyStore')
  severity: INFO
  languages:
  - go
  pattern: "type $COLLECTOR struct {\n  ...\n  samplingProvider $T\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: refactor-params-struct-initialization-both
  message: Detected params initialization with both refactored fields (SamplingProvider
    and SamplingAggregator)
  severity: INFO
  languages:
  - go
  pattern: "$TYPE{\n  ...,\n  SamplingProvider: $P,\n  ...,\n  SamplingAggregator:\
    \ $A,\n  ...,\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: refactor-factory-configurable-interface
  message: Detected Factory implementing plugin.Configurable in refactored package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: var _ plugin.Configurable = (*Factory)(nil)
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
- id: refactor-test-httpserverparams-samplingprovider
  message: Detected test using HTTPServerParams with refactored SamplingProvider field
  severity: INFO
  languages:
  - go
  pattern: "HTTPServerParams{\n  ...,\n  SamplingProvider:  $EXPR,\n  ...,\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: refactor-samplingprovider-field
  message: Detected 'SamplingProvider' field (was 'StrategyStore' or 'SamplingStore')
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $TYPE struct {\n  ...\n  SamplingProvider $T\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $TYPE
      patterns:
      - pattern-either:
        - pattern: CollectorParams
        - pattern: HTTPServerParams
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: refactor-provider-file-existence
  message: Detected 'provider.go' file (was 'strategy_store.go')
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/provider.go'
    exclude:
    - '**/strategy_store.go'
- id: refactor-calculationstrategy-inside-adaptive
  message: Detected import of calculationstrategy moved inside adaptive package
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/jaegertracing/jaeger/plugin/sampling/strategyprovider/adaptive/calculationstrategy
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: refactor-error-check-createstrategyprovider
  message: Detected error handling for CreateStrategyProvider call (was CreateStrategyStore)
  severity: INFO
  languages:
  - go
  pattern: "$VAR, $AGG, $ERR := $FACTORY.CreateStrategyProvider()\nif $ERR != nil\
    \ {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: refactor-factory-close-method
  message: Detected Factory Close method in refactored context
  severity: INFO
  languages:
  - go
  pattern: "func ($F *Factory) Close() error {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
- id: refactor-test-mock-provider-type
  message: Detected mock Provider type in test (was mockStrategyStore)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'type $MOCK struct{}

      '
  - metavariable-pattern:
      metavariable: $MOCK
      pattern-regex: mock.*[Pp]rovider
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: refactor-factory-comment-createstrategyprovider
  message: Detected CreateStrategyProvider method comment (was CreateStrategyStore)
  severity: INFO
  languages:
  - go
  pattern-regex: // CreateStrategyProvider implements
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: refactor-package-test-empty
  message: Detected test file in refactored package (empty_test.go or package_test.go)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - cmd/collector/app/sampling/samplingstrategy/empty_test.go
    - plugin/sampling/strategyprovider/package_test.go
- id: refactor-provider-close-interface
  message: Detected io.Closer in interface (Provider or Aggregator)
  severity: INFO
  languages:
  - go
  pattern: 'io.Closer

    '
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - cmd/collector/app/sampling/samplingstrategy/interface.go
- id: refactor-configurable-check
  message: Detected plugin.Configurable check in refactored factory
  severity: INFO
  languages:
  - go
  pattern: "if conf, ok := factory.(plugin.Configurable); ok {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
- id: refactor-factory-type-assertion
  message: Detected type assertion for plugin.Configurable in refactored factory
  severity: INFO
  languages:
  - go
  pattern: '$CONF, $OK := $FACTORY.(plugin.Configurable)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/**
- id: refactor-close-comment-provider
  message: Detected Close() comment in refactored interface
  severity: INFO
  languages:
  - go
  pattern-regex: // Close\(\) from io\.Closer.*stop
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - cmd/collector/app/sampling/samplingstrategy/**
- id: refactor-adaptive-aggregator-return
  message: Detected return statement with store and aggregator in refactored adaptive
    package
  severity: INFO
  languages:
  - go
  pattern: 'return $STORE, $AGGREGATOR, $ERROR

    '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/adaptive/**
- id: refactor-static-nil-aggregator-return
  message: Detected return statement with nil aggregator in refactored static package
  severity: INFO
  languages:
  - go
  pattern: 'return $STORE, nil, $ERROR

    '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - plugin/sampling/strategyprovider/static/**
- id: refactor-provider-interface-declaration
  message: Detected 'Provider' interface declaration (was 'StrategyStore')
  severity: INFO
  languages:
  - go
  pattern: "type Provider interface {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: refactor-samplingaggregator-field
  message: Detected 'SamplingAggregator' field (was 'Aggregator')
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type CollectorParams struct {\n  ...\n  SamplingAggregator $T\n  ...\n\
      }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: refactor-provider-interface-with-getsamplingstrategy
  message: Detected 'Provider' interface with GetSamplingStrategy method (refactored
    from StrategyStore)
  severity: INFO
  languages:
  - go
  pattern: "type Provider interface {\n  ...\n  GetSamplingStrategy($CTX context.Context,\
    \ $SVC string) ($RES, $ERR)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: refactor-provider-parameter
  message: Detected function parameter using 'Provider' type (was 'StrategyStore')
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(..., $VAR $PKG.Provider, ...) $RET {\n  ...\n}\n"
  - pattern-not: "func $FUNC(..., $VAR strategystore.StrategyStore, ...) $RET {\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: refactor-provider-interface-comment
  message: Detected comment describing 'Provider' interface (was 'StrategyStore')
  severity: INFO
  languages:
  - go
  pattern-regex: // Provider (keeps track of|provides|returns)
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: refactor-factory-createstrategyprovider-interface
  message: Detected Factory interface with 'CreateStrategyProvider' method (was 'CreateStrategyStore')
  severity: INFO
  languages:
  - go
  pattern: "type Factory interface {\n  ...\n  CreateStrategyProvider() ($PROVIDER,\
    \ $AGGREGATOR, $ERROR)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: refactor-newgrpchandler-with-provider
  message: Detected NewGRPCHandler accepting 'Provider' parameter (was 'StrategyStore')
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func NewGRPCHandler($STORE $PKG.Provider) $RET {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $PKG
      pattern-regex: ^(samplingstrategy|strategyprovider)$
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: refactor-static-import-path
  message: Detected import of refactored static package path (was under strategystore)
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/jaegertracing/jaeger/plugin/sampling/strategyprovider/static
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: refactor-provider-interface-closer
  message: Detected Provider interface embedding io.Closer (refactored from StrategyStore)
  severity: INFO
  languages:
  - go
  pattern: "type Provider interface {\n  io.Closer\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: refactor-comment-provider-interface
  message: Detected comment referencing 'Provider' interface (was 'StrategyStore')
  severity: INFO
  languages:
  - go
  pattern-regex: // Provider (interface|keeps|provides|returns|retrieves)
  metadata:
    category: basic
