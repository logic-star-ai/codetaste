    ...

    return $PKG.ExitError(ctx, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 70
    nr_legacy_patterns: 0
- id: refactor-cli-newcontext-with-parent-context
  message: Detected cli.NewContext followed by c.Context assignment - test pattern
  severity: INFO
  languages:
  - go
  pattern: 'c := cli.NewContext($APP, $FS, $PARENT)

    c.Context = $CTX

    '
  metadata:
    category: basic
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
- id: refactor-out-package-call-with-extracted-context
