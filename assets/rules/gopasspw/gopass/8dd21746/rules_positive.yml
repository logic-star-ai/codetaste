rules:
- id: refactor-test-context-setup-pattern
  message: Detected test pattern where c.Context is set before calling action method
    with c only
  severity: INFO
  languages:
  - go
  pattern: '$C.Context = $CTX

    ...

    $ACTION.$METHOD($C)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 297
    nr_legacy_patterns: 0
- id: refactor-store-method-call-with-extracted-context
  message: Detected store method call using context extracted via WithGlobalFlags
  severity: INFO
  languages:
  - go
  pattern: 'ctx := ctxutil.WithGlobalFlags(c)

    ...

    $STORE.$METHOD(ctx, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 224
    nr_legacy_patterns: 0
- id: refactor-context-passed-through-cli-context
  message: Detected c.Context access - context is now carried by cli.Context
  severity: INFO
  languages:
  - go
  pattern: '$C.Context

    '
  metadata:
    category: basic
    nr_refactored_patterns: 124
    nr_legacy_patterns: 0
- id: refactor-test-context-assignment
  message: Detected c.Context = ctx assignment in test - new pattern for propagating
    context in tests
  severity: INFO
  languages:
  - go
  pattern: '$C.Context = $CTX

    '
  metadata:
    category: basic
    nr_refactored_patterns: 121
    nr_legacy_patterns: 0
- id: refactor-ctxutil-withglobalflags-call
  message: Detected context extraction using ctxutil.WithGlobalFlags(c) - new pattern
    for obtaining context from cli.Context
  severity: INFO
  languages:
  - go
  pattern: 'ctx := ctxutil.WithGlobalFlags($C)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 70
    nr_legacy_patterns: 0
