rules:
- id: ctxutil-withglobalflags-call-in-action
  message: Detected context extraction using ctxutil.WithGlobalFlags in action method
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$CTX := $PKG.WithGlobalFlags($C)

      '
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i)^(ctxutil)$
  metadata:
    nr_refactored_patterns: 70
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/action/**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: action-method-extracting-context-first-line
  message: Action method extracts context from cli.Context at start
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) $METHOD($C *$CLI.Context) error {\n  $CTX := $PKG.WithGlobalFlags($C)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i)^(ctxutil)$
  - metavariable-regex:
      metavariable: $CLI
      regex: (?i)^(cli)$
  metadata:
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/action/**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: action-receiver-method-modified-signature
  message: Action receiver method with modified signature
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *Action) $METHOD($PARAM *cli.Context) error {\n  ...\n}\n"
  - pattern-not: "func ($RECV *Action) $METHOD($CTX context.Context, $PARAM *cli.Context)\
      \ error {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(Audit|Clone|Config|Copy|Delete|Edit|Find|Generate|HIBP|History|Init|Insert|JSONAPI|List|Move|Otp|Print|Recipient|RemoteList|Show|Sync|Templates|Unclip|Update|Version)$
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/action/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: xc-func-cli-context-only
  message: XC package function with cli.Context as first param
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC($C *$CLI.Context, ...) error {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLI
      regex: (?i)^(cli)$
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^[A-Z].*$
  - pattern-not: "func $FUNC($CTX context.Context, $C *$CLI.Context, ...) error {\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/action/xc/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: binary-function-single-cliparam
  message: Binary package function signature changed to accept only cli.Context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC($C *$CLI.Context, $STORE $STYPE) error {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLI
      regex: (?i)^(cli)$
  - pattern-not: "func $FUNC($CTX context.Context, $C *$CLI.Context, $STORE $STYPE)\
      \ error {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/action/binary/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: command-aggregation-in-loop
  message: Commands being aggregated from multiple sources
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $PKG.GetCommands(...)
  pattern-sinks:
  - patterns:
    - pattern: $CMDS = append($CMDS, ...)
    - pattern-inside: "func $FUNC(...) []*$CLI.Command {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: commands-slice-literal
  message: Command slice literal being returned
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: return []*$CLI.Command{...}
  - metavariable-regex:
      metavariable: $CLI
      regex: (?i)^(cli)$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/action/**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: context-from-cli-context-field
  message: Context accessed from cli.Context.Context field
  severity: INFO
  languages:
  - go
  pattern: $C.Context
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/action/**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: commands-file-in-subpackage
  message: Detected commands.go file in action subpackage (decentralized command definitions)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/action/*/commands.go'
    exclude:
    - '**/*_test.go'
- id: getcommands-function-in-action-package
  message: Detected GetCommands function in action package returning command slice
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func GetCommands() []*$CLI.Command {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLI
      regex: (?i)^(cli)$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/action/**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: getcommands-call-in-aggregator
  message: Detected GetCommands() call being aggregated in main command builder
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $PKG.GetCommands()
  pattern-sinks:
  - patterns:
    - pattern: return $CMDS
    - pattern-inside: "func $FUNC(...) []*$CLI.Command {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/*_test.go'
    - '**/pkg/action/binary/**'
    - '**/pkg/action/create/**'
    - '**/pkg/action/xc/**'
  options:
    symbolic_propagation: true
- id: multiple-getcommands-aggregation
  message: Detected multiple GetCommands calls being aggregated
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$CMDS = append($CMDS, $PKG.GetCommands()...)

      '
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i)^(?!.*main).*$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: setupapp-returns-two-values
  message: Detected setupApp function returning both context and app
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $SETUP(...) (context.Context, *$CLI.App) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $SETUP
      regex: (?i).*(setup|init|create).*[Aa]pp.*
  - metavariable-regex:
      metavariable: $CLI
      regex: (?i)^(cli)$
  - pattern-not: "func $SETUP(...) *$CLI.App {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: app-runcontext-call
  message: Detected app.RunContext call with context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$APP.RunContext($CTX, ...)

      '
  - pattern-not: '$APP.Run(...)

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: ctxutil-withglobalflags-function-definition
  message: Detected WithGlobalFlags function definition in ctxutil package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func WithGlobalFlags($C *$CLI.Context) context.Context {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLI
      regex: (?i)^(cli)$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/ctxutil/**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: setupapp-call-destructuring
  message: Detected setupApp call being destructured into context and app
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$CTX, $APP := $SETUP(...)

      '
  - metavariable-regex:
      metavariable: $SETUP
      regex: (?i).*(setup|init|create).*[Aa]pp.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: create-func-cli-context-only
  message: Create package function with cli.Context as first param
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC($C *$CLI.Context, ...) error {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLI
      regex: (?i)^(cli)$
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^[A-Z].*$
  - pattern-not: "func $FUNC($CTX context.Context, $C *$CLI.Context, ...) error {\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/action/create/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: command-slice-make-initialization
  message: Command slice make initialization
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$CMDS := make([]*cli.Command, ...)

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: sort-package-import
  message: Sort package imported for command sorting
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: import "sort"
    - pattern: "import (\n  ...\n  \"sort\"\n  ...\n)\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/commands.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
