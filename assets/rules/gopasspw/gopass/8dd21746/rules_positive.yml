    '
  metadata:
    category: basic
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
- id: refactor-context-extraction-at-action-start
  message: Detected action method extracting context at the start using ctxutil.WithGlobalFlags
  severity: INFO
  languages:
  - go
  pattern: "func ($A $T) $METHOD(c *cli.Context) error {\n  ctx := ctxutil.WithGlobalFlags(c)\n\
    \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
- id: refactor-action-method-extract-context-pattern
  message: 'Detected action method with context extraction pattern: extracts ctx from
    c at method start'
  severity: INFO
  languages:
  - go
  pattern: "func ($R $T) $METHOD(c *cli.Context) error {\n  ctx := ctxutil.WithGlobalFlags(c)\n\
    \  ...\n  return $EXPR\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
