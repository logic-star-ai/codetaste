- id: refactor-getcommands-aggregation
  message: Detected command aggregation from module-specific GetCommands() functions
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: '$CMDS = append($CMDS, $PKG.GetCommands()...)

      '
  - pattern: '$CMDS = append($CMDS, action.GetCommands()...)

      '
  - pattern: '$CMDS = append($CMDS, binary.GetCommands()...)

      '
  - pattern: '$CMDS = append($CMDS, create.GetCommands()...)

      '
  - pattern: '$CMDS = append($CMDS, xc.GetCommands()...)

