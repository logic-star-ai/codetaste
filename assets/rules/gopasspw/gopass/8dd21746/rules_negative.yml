rules:
- id: withglobalflags-helper-call
  message: Usage of old withGlobalFlags() helper. Replace with ctxutil.WithGlobalFlags(c)
    and update method signatures
  severity: WARNING
  languages:
  - go
  pattern: withGlobalFlags($CTX, $C)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 109
- id: withglobalflags-in-action-lambda
  message: Action lambda uses withGlobalFlags(). Update to let action method extract
    context internally via ctxutil.WithGlobalFlags(c)
  severity: WARNING
  languages:
  - go
  pattern: "Action: func(c *cli.Context) error {\n  ...\n  withGlobalFlags($CTX, c)\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 61
- id: action-field-with-withglobalflags-call
  message: Action field uses withGlobalFlags() with old pattern. Action methods should
    extract context internally via ctxutil.WithGlobalFlags(c)
  severity: WARNING
  languages:
  - go
  pattern: "Action: func(c *cli.Context) error {\n  return $ACTION.$METHOD(withGlobalFlags($CTX,\
    \ c), c)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 56
- id: withglobalflags-in-before-lambda
  message: Before lambda uses withGlobalFlags(). Update to let method extract context
    internally via ctxutil.WithGlobalFlags(c)
  severity: WARNING
  languages:
  - go
  pattern: "Before: func(c *cli.Context) error {\n  ...\n  withGlobalFlags($CTX, c)\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: before-field-with-withglobalflags-call
  message: Before field uses withGlobalFlags() with old pattern. Methods should extract
    context internally via ctxutil.WithGlobalFlags(c)
  severity: WARNING
  languages:
  - go
  pattern: "Before: func(c *cli.Context) error {\n  return $ACTION.$METHOD(withGlobalFlags($CTX,\
    \ c), c)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: xc-command-with-withglobalflags
  message: XC command called with withGlobalFlags(). Update to new signature where
    context is extracted internally
  severity: WARNING
  languages:
  - go
  pattern: xc.$METHOD(withGlobalFlags($CTX, $C), $C, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: xc-action-in-cli-command-old
  message: XC action in CLI command uses withGlobalFlags(). Update to let method extract
    context internally
  severity: WARNING
  languages:
  - go
  pattern: "Action: func(c *cli.Context) error {\n  return xc.$METHOD(withGlobalFlags(ctx,\
    \ c), c)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: command-action-binary-pattern
  message: Binary action uses old withGlobalFlags pattern. Method should extract context
    internally
  severity: WARNING
  languages:
  - go
  pattern: "Action: func(c *cli.Context) error {\n  return binary.$METHOD(withGlobalFlags($CTX,\
    \ c), c, $STORE)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: main-setupapp-assignment-old
  message: 'setupApp() call uses old pattern. Should be: ctx, app := setupApp(sv)
    with new return signature'
  severity: WARNING
  languages:
  - go
  pattern: 'app := setupApp($CTX, $SV)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: action-list-call-withglobalflags
  message: action.List() called with withGlobalFlags(). Method should extract context
    internally
  severity: WARNING
  languages:
  - go
  pattern: 'return action.List(withGlobalFlags($CTX, c), c)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: action-show-call-withglobalflags
  message: action.Show() called with withGlobalFlags(). Method should extract context
    internally
