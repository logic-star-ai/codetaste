    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: withglobalflags-helper-definition
  message: Old withGlobalFlags() helper function should be removed. Use ctxutil.WithGlobalFlags()
    instead
  severity: WARNING
  languages:
  - go
  pattern: "func withGlobalFlags($CTX context.Context, $C *cli.Context) context.Context\
    \ {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: app-run-without-context
  message: Old app.Run(os.Args) usage. Replace with app.RunContext(ctx, os.Args) to
    pass context
  severity: WARNING
  languages:
  - go
  pattern: $APP.Run(os.Args)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
