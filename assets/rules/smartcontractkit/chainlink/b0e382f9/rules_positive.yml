rules:
- id: evm-config-toml-import-without-v2
  message: Detected new import path for evm/config/toml without v2 versioning
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$IMPORT"
  - metavariable-regex:
      metavariable: $IMPORT
      regex: .*chainlink/v2/core/chains/evm/config/toml$
  - pattern-not: import "...evm/config/v2..."
  metadata:
    category: structural
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: evm-config-import-without-v2-simple
  message: Detected new import path without v2 versioning
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: github\.com/smartcontractkit/chainlink/v2/core/chains/evm/config/toml
  - pattern-not-regex: evm/config/v2
  metadata:
    category: structural
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: evm-config-toml-multiple-imports-same-file
  message: Detected file importing toml package without v2 reference
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/toml\"\
      \n  ...\n)\n"
  - pattern-not: "import (\n  ...\n  \"github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/v2\"\
      \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: evm-config-toml-defaults-toml-files-in-new-location
  message: Detected TOML default files in new toml/defaults directory
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
  paths:
    include:
    - core/chains/evm/config/toml/defaults/*.toml
- id: evm-config-toml-defaults-function-call
  message: Detected call to toml.Defaults() function after refactoring
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TOML.Defaults(...)
  - metavariable-pattern:
      metavariable: $TOML
      patterns:
      - pattern-either:
        - pattern: toml
        - pattern: evmtoml
        - pattern: cfgtoml
  - pattern-not: v2.Defaults(...)
  metadata:
    category: api
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: evm-config-toml-defaults-with-chainid
  message: Detected call to toml.Defaults() with chain ID after refactoring
  severity: INFO
  languages:
  - go
  pattern: toml.Defaults($CHAINID, ...)
  metadata:
    category: api
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: evm-config-toml-evmconfig-chainid-field-access
  message: Detected ChainID field access on EVMConfig type
  severity: INFO
  languages:
  - go
  pattern: '$VAR.ChainID

    '
  metadata:
    category: api
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  paths:
    include:
    - core/chains/evm/config/toml/*.go
- id: evm-config-toml-range-over-evmconfigs
  message: Detected range over EVMConfigs collection
  severity: INFO
  languages:
  - go
  pattern: "for $IDX, $VAL := range $EVMCONFIGS {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - core/chains/evm/config/toml/*.go
- id: evm-config-test-using-toml-defaults
  message: Detected test using toml.Defaults instead of v2.Defaults
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: toml.Defaults(...)
  - pattern-not: v2.Defaults(...)
  metadata:
    category: api
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - '*_test.go'
- id: evm-config-toml-struct-literal
  message: Detected toml.EVMConfig struct literal after refactoring
  severity: INFO
  languages:
  - go
  pattern: '&toml.EVMConfig{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: evm-config-toml-evmconfig-pointer-ampersand
  message: Detected &toml.EVMConfig struct literal after refactoring
  severity: INFO
  languages:
  - go
  pattern: '&toml.EVMConfig{$...FIELDS}

    '
  metadata:
    category: api
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: evm-config-toml-aliased-import
  message: Detected aliased import for new evm/config/toml package
  severity: INFO
  languages:
  - go
  pattern: "import (\n  ...\n  $ALIAS \"github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/toml\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: evm-config-toml-chain-struct-literal
  message: Detected toml.Chain struct literal after refactoring
  severity: INFO
  languages:
  - go
  pattern: '&toml.Chain{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: evm-config-no-v2-import-alias
  message: Detected import using new package path instead of v2 alias
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-not: "import (\n  ...\n  v2 \"github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/v2\"\
      \n  ...\n)\n"
  - pattern: "import (\n  ...\n  $ALIAS \"github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/toml\"\
      \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: evm-config-toml-chain-pointer-ampersand
  message: Detected &toml.Chain struct literal after refactoring
  severity: INFO
  languages:
  - go
  pattern: '&toml.Chain{$...FIELDS}

    '
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: evm-config-test-using-toml-chain-literal
  message: Detected test using &toml.Chain literal instead of v2
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '&toml.Chain{...}

      '
  - pattern-not: '&v2.Chain{...}

      '
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '*_test.go'
- id: evm-config-test-using-toml-evmconfig-literal
  message: Detected test using &toml.EVMConfig literal instead of v2
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '&toml.EVMConfig{...}

      '
  - pattern-not: '&v2.EVMConfig{...}

      '
  metadata:
    category: api
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '*_test.go'
- id: evm-config-toml-nodes-field-access
  message: Detected Nodes field access on EVMConfig type
  severity: INFO
  languages:
  - go
  pattern: '$VAR.Nodes

    '
  metadata:
    category: api
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - core/chains/evm/config/toml/*.go
- id: evm-config-evmcfg-toml-import
  message: Detected import with evmcfg alias for new toml package
  severity: INFO
  languages:
  - go
  pattern: "import (\n  ...\n  evmcfg \"github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/toml\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: evm-config-toml-evmconfig-method-call
  message: Detected method call on EVMConfig instance
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$VAR.$METHOD(...)

      '
  - metavariable-pattern:
      metavariable: $METHOD
      patterns:
      - pattern-either:
        - pattern: SetFrom
        - pattern: ValidateConfig
        - pattern: IsEnabled
        - pattern: TOMLString
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - core/chains/evm/config/toml/*.go
- id: evm-config-toml-evmconfig-assignment
  message: Detected assignment of toml.EVMConfig struct
  severity: INFO
  languages:
  - go
  pattern: '$VAR = &toml.EVMConfig{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: evm-config-toml-defaults-call-two-args
  message: Detected toml.Defaults call with two arguments
  severity: INFO
  languages:
  - go
  pattern: toml.Defaults($CHAINID, $CHAIN)
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: evm-config-toml-slice-index-access
  message: Detected assignment to EVM slice with toml.EVMConfig
  severity: INFO
  languages:
  - go
  pattern: '$VAR.EVM[$IDX] = &toml.EVMConfig{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: evm-config-package-declaration-in-chain-scoped-files
  message: Detected new package declaration 'package config' in chain_scoped files
    after v2 removal
  severity: INFO
  languages:
  - go
  pattern-regex: ^\s*package\s+config\s*$
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - core/chains/evm/config/chain_scoped*.go
- id: evm-config-toml-method-receiver-evmconfigs
  message: Detected method with EVMConfigs receiver in toml package
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV EVMConfigs) $METHOD(...) $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - core/chains/evm/config/toml/*.go
- id: evm-config-toml-method-call-on-type
  message: Detected SetFrom() method call on toml type after refactoring
  severity: INFO
  languages:
  - go
  pattern: '$VAR.SetFrom($ARG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - core/chains/evm/config/toml/*.go
- id: evm-config-test-file-with-toml-import
  message: Detected test file using new toml package import
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  $ALIAS \"github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/toml\"\
      \n  ...\n)\n"
  - pattern-not: "import (\n  ...\n  v2 \"github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/v2\"\
      \n  ...\n)\n"
  metadata:
    category: structural
