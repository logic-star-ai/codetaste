    nr_legacy_patterns: 0
  paths:
    include:
    - '*_test.go'
- id: evm-config-toml-evmconfig-enabled-field-access
  message: Detected Enabled field access on EVMConfig type
  severity: INFO
  languages:
  - go
  pattern: '$VAR.Enabled

    '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - core/chains/evm/config/toml/*.go
- id: evm-config-toml-pointer-type-declaration
  message: Detected function parameter using toml package pointer type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(..., $VAR *$TOML.$TYPE, ...) $RET {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $TOML
      patterns:
      - pattern-either:
        - pattern: toml
        - pattern: evmtoml
        - pattern: cfgtoml
  - metavariable-pattern:
      metavariable: $TYPE
      patterns:
      - pattern-either:
        - pattern: EVMConfig
        - pattern: Chain
        - pattern: Node
  - pattern-not: "func $FUNC(..., $VAR *v2.$TYPE, ...) $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: evm-config-toml-append-to-evm-slice
  message: Detected append of toml.EVMConfig to slice (not v2)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'append($SLICE, &toml.EVMConfig{...})

      '
  - pattern-not: 'append($SLICE, &v2.EVMConfig{...})

      '
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: evm-config-toml-append-evmconfig-to-evm-slice
  message: Detected appending toml.EVMConfig to EVM slice
  severity: INFO
  languages:
  - go
  pattern: '$VAR.EVM = append($VAR.EVM, &toml.EVMConfig{...})

    '
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: evm-config-toml-defaults-call-with-nil
  message: Detected toml.Defaults(nil) call
  severity: INFO
  languages:
  - go
  pattern: toml.Defaults(nil)
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: evm-config-newtomlchainscoped-call
  message: Detected call to config.NewTOMLChainScopedConfig() after refactoring
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $CONFIG.NewTOMLChainScopedConfig(...)
  - metavariable-pattern:
      metavariable: $CONFIG
      patterns:
      - pattern-either:
        - pattern: config
        - pattern: evmconfig
        - pattern: evmcfg
  - pattern-not: v2.NewTOMLChainScopedConfig(...)
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: evm-config-toml-node-pointer-in-function-param
