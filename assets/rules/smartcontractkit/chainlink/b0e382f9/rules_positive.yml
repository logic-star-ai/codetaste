  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: github\.com/smartcontractkit/chainlink/v2/core/chains/evm/config/toml
  - pattern-not-regex: evm/config/v2
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/chains/evm/chain_set.go
