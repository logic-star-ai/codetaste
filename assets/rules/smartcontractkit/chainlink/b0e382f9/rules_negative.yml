rules:
- id: evm-config-v2-defaults-directory-exists
  message: TOML default files are still in v2/defaults/ directory. Should be moved
    to evm/config/toml/defaults/.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
  paths:
    include:
    - '**/evm/config/v2/defaults/**/*.toml'
- id: evm-config-v2-import-any-alias
  message: Import still uses old v2 versioned package path. Should import from 'evm/config'
    or 'evm/config/toml' instead.
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  $ALIAS \"github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/v2\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: evm-config-v2-import-no-alias
  message: Import still uses old v2 versioned package path without alias. Should import
    from 'evm/config' or 'evm/config/toml' instead.
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/v2\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: evm-config-v2-single-import-any-alias
  message: Single-line import still uses old v2 versioned package path. Should import
    from 'evm/config' or 'evm/config/toml' instead.
  severity: WARNING
  languages:
  - go
  pattern: 'import $ALIAS "github.com/smartcontractkit/chainlink/v2/core/chains/evm/config/v2"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
