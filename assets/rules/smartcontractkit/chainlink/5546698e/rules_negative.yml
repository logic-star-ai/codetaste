    - '*/logpoller/orm.go'
- id: headtracker-orm-lowercase-name
  message: Headtracker orm struct should be renamed to DbORM (exported)
  severity: WARNING
  languages:
  - go
  pattern-regex: ^\s*type\s+orm\s+struct
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/headtracker/orm.go'
- id: forwarder-orm-transaction-withtx
  message: Forwarder ORM Transaction should use sqlutil.DB transaction pattern, not
    pg.Q.Transaction with pg.Queryer
  severity: WARNING
  languages:
  - go
  pattern-regex: o\.q\.Transaction\(func\(tx\s+pg\.Queryer\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/forwarders/orm.go'
