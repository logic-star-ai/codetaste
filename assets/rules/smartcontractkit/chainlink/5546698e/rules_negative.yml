    nr_legacy_patterns: 1
  paths:
    include:
    - '*/logpoller/orm.go'
- id: headtracker-neworm-with-qconfig
  message: Headtracker NewORM should accept (chainID big.Int, db sqlutil.DB) without
    logger and pg.QConfig
  severity: WARNING
  languages:
  - go
  pattern: "func NewORM($DB *sqlx.DB, $LGGR logger.Logger, $CFG pg.QConfig, $CHAIN_ID\
    \ big.Int) ORM {\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/headtracker/orm.go'
- id: logpoller-orm-constructor-with-qconfig
  message: LogPoller NewORM should accept (chainID *big.Int, db sqlutil.DB, lggr logger.Logger)
    without pg.QConfig
  severity: WARNING
  languages:
  - go
  pattern: "func NewORM(..., $CFG pg.QConfig, ...) $RET {\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/logpoller/orm.go'
- id: forwarder-orm-struct-field-q
  message: Forwarder ORM should be renamed to DbORM and use sqlutil.DB field instead
    of pg.Q
  severity: WARNING
  languages:
  - go
  pattern-regex: ^\s*q\s+pg\.Q\s*$
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/forwarders/orm.go'
- id: forwarder-neworm-constructor
  message: Forwarder NewORM should accept only db sqlutil.DB parameter, not *sqlx.DB,
    logger, and pg.QConfig
  severity: WARNING
  languages:
  - go
  pattern-regex: func\s+NewORM\([^)]*\*sqlx\.DB[^)]*pg\.QConfig
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/forwarders/orm.go'
- id: logpoller-orm-insertblock-qopts
  message: LogPoller InsertBlock should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern-regex: InsertBlock\([^)]+,\s*qopts\s+\.\.\.pg\.QOpt\)\s+error
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/logpoller/orm.go'
- id: logpoller-orm-selectblockbyhash-qopts
