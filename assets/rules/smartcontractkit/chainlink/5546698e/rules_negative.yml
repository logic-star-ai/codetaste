rules:
- id: logpoller-latestblock-with-qopts-call
  message: LogPoller LatestBlock should accept context.Context as first parameter,
    not pg.WithParentCtx as qopts
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$LP.LatestBlock(pg.WithParentCtx($CTX))

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: logpoller-orm-constructor-call
  message: LogPoller NewORM should be called with NewORM(chainID, db, lggr) without
    pg.QConfig
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'logpoller.NewORM($CHAIN_ID, $DB, $LGGR, $CFG)

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: headtracker-orm-constructor-call
  message: Headtracker NewORM should be called with NewORM(chainID, db) without logger
    and config
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'headtracker.NewORM($DB, $LGGR, $CFG, $CHAIN_ID)

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: logpoller-service-method-with-qopts
  message: LogPoller service method should accept context.Context instead of qopts
    ...pg.QOpt
  severity: WARNING
  languages:
  - go
  pattern-regex: func\s+\([^)]+\s+\*logPoller\)\s+\w+\([^)]*qopts\s+\.\.\.pg\.QOpt\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - '*/logpoller/log_poller.go'
- id: logpoller-logs-with-qopts-call
  message: LogPoller Logs should accept context.Context as first parameter, not pg.WithParentCtx
    as qopts
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$LP.Logs($START, $END, $HASH, $ADDR, pg.WithParentCtx($CTX))

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: forwarder-orm-constructor-call
  message: Forwarder NewORM should be called with NewORM(db) without logger and config
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'forwarders.NewORM($DB, $LGGR, $CFG)

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: logpoller-indexedlogs-with-qopts-call
  message: LogPoller IndexedLogs should accept context.Context as first parameter,
    not pg.WithParentCtx as qopts
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$LP.IndexedLogs(..., pg.WithParentCtx($CTX))

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: import-pg-package
  message: Remove import of core/services/pg package after migrating to sqlutil.DB
  severity: INFO
  languages:
  - go
  pattern-regex: '"github\.com/smartcontractkit/chainlink/v2/core/services/pg"'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/headtracker/orm.go'
    - '*/forwarders/orm.go'
    - '*/logpoller/orm.go'
- id: logpoller-interface-selectlogs-qopts
  message: LogPoller SelectLogs should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern: 'SelectLogs(..., qopts ...pg.QOpt) $RET

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/logpoller/orm.go'
- id: logpoller-interface-selectindexedlogs-qopts
  message: LogPoller SelectIndexedLogs should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern: 'SelectIndexedLogs(..., qopts ...pg.QOpt) $RET

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/logpoller/orm.go'
- id: logpoller-interface-getblocksrange-qopts
  message: LogPoller GetBlocksRange should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern: 'GetBlocksRange(..., qopts ...pg.QOpt) $RET

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/logpoller/orm.go'
- id: logpoller-interface-deletelogsandblocksafter-qopts
  message: LogPoller DeleteLogsAndBlocksAfter should accept context.Context as first
    parameter
  severity: WARNING
  languages:
  - go
  pattern: 'DeleteLogsAndBlocksAfter(..., qopts ...pg.QOpt) $RET

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/logpoller/orm.go'
- id: forwarder-orm-deleteforwarder-cleanup-signature
  message: Forwarder DeleteForwarder cleanup function should use sqlutil.DB instead
    of pg.Queryer
  severity: WARNING
  languages:
  - go
  pattern-regex: DeleteForwarder\(\s*id\s+int64,\s*cleanup\s+func\([^)]*pg\.Queryer
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/forwarders/orm.go'
- id: forwarder-interface-deleteforwarder-cleanup-pg-queryer
  message: Forwarder ORM interface DeleteForwarder cleanup function should use sqlutil.DB
    instead of pg.Queryer
  severity: WARNING
  languages:
  - go
  pattern-regex: DeleteForwarder\([^)]*cleanup\s+func\([^)]*pg\.Queryer
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/forwarders/orm.go'
- id: logpoller-getblocksrange-call-with-qopts
  message: LogPoller GetBlocksRange should accept context.Context as first parameter,
    not pg.WithParentCtx
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$LP.GetBlocksRange(..., pg.WithParentCtx($CTX))

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: orm-load-with-qopts-pattern
  message: ORM Load methods should accept context.Context as first parameter, not
    pg.WithParentCtx
  severity: WARNING
  languages:
  - go
  pattern-regex: \w+\.Load\w+\(pg\.WithParentCtx\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.go'
    exclude:
    - '*/pg/*.go'
- id: logpoller-insertlogswithblock-call
  message: LogPoller InsertLogsWithBlock should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$ORM.InsertLogsWithBlock($LOGS, $BLOCK, pg.WithParentCtx($CTX))

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: logpoller-loadfilters-call
  message: LogPoller LoadFilters should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$ORM.LoadFilters(pg.WithParentCtx($CTX))

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: logpoller-interface-method-qopts
  message: LogPoller interface method should accept context.Context instead of qopts
    ...pg.QOpt
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type LogPoller interface {\n  ...\n  $METHOD(..., qopts ...pg.QOpt)\
      \ $RET\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: headtracker-orm-uses-pg-q
  message: Headtracker ORM struct should be renamed to DbORM and use sqlutil.DB instead
    of pg.Q
  severity: WARNING
  languages:
  - go
  pattern: "type orm struct {\n  q       pg.Q\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/headtracker/orm.go'
- id: logpoller-interface-insertlogs-qopts
  message: LogPoller InsertLogs should accept context.Context instead of qopts ...pg.QOpt
  severity: WARNING
  languages:
  - go
  pattern: 'InsertLogs($LOGS []Log, qopts ...pg.QOpt) error

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/logpoller/orm.go'
- id: logpoller-interface-insertlogswithblock-qopts
  message: LogPoller InsertLogsWithBlock should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern: 'InsertLogsWithBlock($LOGS []Log, $BLOCK LogPollerBlock, qopts ...pg.QOpt)
    error

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/logpoller/orm.go'
- id: logpoller-interface-insertfilter-qopts
  message: LogPoller InsertFilter should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern: 'InsertFilter($FILTER Filter, qopts ...pg.QOpt) error

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/logpoller/orm.go'
- id: logpoller-interface-loadfilters-qopts
  message: LogPoller LoadFilters should accept context.Context as first parameter
  severity: WARNING
  languages:
