rules:
- id: logpoller-latest-block-no-qopts
  message: Detected LatestBlock call with context parameter and no qopts
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$LP.LatestBlock($CTX)

      '
  - pattern-not: '$LP.LatestBlock()

      '
  - metavariable-regex:
      metavariable: $CTX
      regex: (ctx|context\.Background\(\)|testutils\.Context\(.+\))
  metadata:
    category: basic
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
- id: logpoller-new-orm-call-no-qconfig
  message: Detected logpoller.NewORM call without pg.QConfig parameter
  severity: INFO
