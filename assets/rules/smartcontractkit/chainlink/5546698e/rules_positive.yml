  - pattern-not: "func ($RECV *$ORM) $METHOD(...) $RET {\n  ...\n  $Q := $RECV.q.WithOpts(...)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: (IdempotentInsertHead|TrimOldHeads|LatestHead|LatestHeads|HeadByHash)
