rules:
- id: detect-three-export-calls-in-module
  message: Three separate export calls in one module - indicates constructor, isView,
    and slice should be split
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-inside: '$EXPORT(...);

      ...

      $EXPORT(...);

      ...

      $EXPORT(...);

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-multiple-arraybuffer-exports-same-file
  message: Multiple exports for ArrayBuffer in same file - should be split into separate
    modules for constructor, isView, and slice
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: '$EXPORT(...);

      ...

      $EXPORT(...);

      '
  - pattern-inside: '...

      var ARRAY_BUFFER = ''ArrayBuffer'';

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 49
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-es-typed-in-require-paths
  message: require() call with old 'es.typed.*' module path
  severity: WARNING
  languages:
  - javascript
  pattern-regex: require\(['"].*es\.typed\.(array-buffer|data-view)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-require-old-internals-typed-array
  message: Old internal module 'internals/typed-array' is imported - should be renamed
    to 'internals/typed-array-constructor'
  severity: WARNING
  languages:
  - javascript
  pattern-either:
  - pattern: require('$X/internals/typed-array')
  - pattern: require("$X/internals/typed-array")
  - pattern: require('../internals/typed-array')
  - pattern: require("../internals/typed-array")
  - pattern: require('../../internals/typed-array')
  - pattern: require("../../internals/typed-array")
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-typed-array-buffer-path-in-comments
  message: Reference to old 'es.typed.array-buffer' module path in comments or documentation
    - should be updated to new split modules
  severity: INFO
  languages:
  - javascript
  pattern-regex: .*es\.typed\.array-buffer.*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/*.js'
    - '**/*.md'
    - '**/*.json'
- id: detect-path-internals-typed-array
  message: Reference to 'internals/typed-array' - should be 'internals/typed-array-constructor'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: internals/typed-array['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-typed-data-view-path-in-comments
  message: Reference to old 'es.typed.data-view' module path - should be updated to
    'es.data-view'
  severity: INFO
  languages:
  - javascript
  pattern-regex: .*es\.typed\.data-view.*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '**/*.js'
    - '**/*.md'
    - '**/*.json'
- id: detect-require-chain-typed-array-buffer
  message: Requiring es.typed.array-buffer in a module - should require split modules
    instead
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-inside: 'require($P1);

      require($P2);

      ...

      '
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*es\.typed\.array-buffer.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-require-chain-typed-data-view
  message: Requiring es.typed.data-view in a module - should require es.data-view
    instead
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-inside: 'require($P1);

      require($P2);

      ...

      '
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*es\.typed\.data-view.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-require-es-typed-array-buffer-module
  message: 'Old module ''es.typed.array-buffer'' is imported - should use separate
    modules: es.array-buffer.constructor, es.array-buffer.is-view, es.array-buffer.slice'
  severity: WARNING
  languages:
  - javascript
  pattern-either:
  - pattern: require('$X/modules/es.typed.array-buffer')
  - pattern: require("$X/modules/es.typed.array-buffer")
  - pattern: require('../modules/es.typed.array-buffer')
  - pattern: require("../modules/es.typed.array-buffer")
  - pattern: require('../../modules/es.typed.array-buffer')
  - pattern: require("../../modules/es.typed.array-buffer")
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-require-es-typed-data-view-module
  message: Old module 'es.typed.data-view' is imported - should be renamed to 'es.data-view'
  severity: WARNING
  languages:
  - javascript
  pattern-either:
  - pattern: require('$X/modules/es.typed.data-view')
  - pattern: require("$X/modules/es.typed.data-view")
  - pattern: require('../modules/es.typed.data-view')
  - pattern: require("../modules/es.typed.data-view")
  - pattern: require('../../modules/es.typed.data-view')
  - pattern: require("../../modules/es.typed.data-view")
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-arraybuffer-module-name-in-string
  message: String reference to 'es.typed.array-buffer' module name - should reference
    split modules
  severity: WARNING
  languages:
  - javascript
  pattern-regex: es\.typed\.array-buffer
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - packages/*/features/**/*.js
    - packages/*/es/**/*.js
- id: detect-dataview-module-name-in-string
  message: String reference to 'es.typed.data-view' module name - should be 'es.data-view'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: es\.typed\.data-view
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - packages/*/features/**/*.js
    - packages/*/es/**/*.js
- id: detect-uint8array-reference-in-array-buffer-view-core
  message: Reference to 'Uint8Array' should be changed to 'Int8Array' in array-buffer-view-core.js
  severity: WARNING
  languages:
  - javascript
  pattern-either:
  - pattern: var $VAR = global.Uint8Array
  - pattern: var Uint8Array = $GLOBAL.Uint8Array
  - pattern: var TypedArray = Uint8Array && getPrototypeOf(Uint8Array)
  - pattern: var $VAR = Uint8Array && getPrototypeOf(Uint8Array)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/*/internals/array-buffer-view-core.js
- id: detect-multiple-dataview-refs-one-file
  message: Multiple DataView instantiations in old module - indicates slice logic
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-inside: 'var DataView = $MOD.DataView;

      ...

      new DataView($ARG1);

      ...

      new DataView($ARG2);

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/*/modules/es.typed.*.js
- id: detect-spec-references-in-old-modules
  message: ECMAScript spec reference in old module file - indicates file needs refactoring
  severity: INFO
  languages:
  - javascript
  pattern-regex: .*\d+\.\d+\.\d+\.\d+.*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
    - packages/*/modules/es.typed.data-view.js
- id: detect-features-typed-array-subpath
  message: Path reference to features/typed-array subfolder for ArrayBuffer or DataView
  severity: WARNING
  languages:
  - javascript
  pattern-regex: features/typed-array/(array-buffer|data-view)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*.js'
- id: detect-es-typed-array-first-two-requires
  message: Sequential requires of es.typed.array-buffer and es.typed.data-view - old
    entry point pattern
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: 'require($P1);

      require($P2);

      '
  - metavariable-regex:
      metavariable: $P1
      regex: .*es\.typed\.array-buffer.*
  - metavariable-regex:
      metavariable: $P2
      regex: .*es\.typed\.data-view.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/*/es/*.js
- id: detect-old-es-typed-array-buffer-module-file
  message: 'Old module file ''es.typed.array-buffer.js'' should be split into separate
    files: es.array-buffer.constructor.js, es.array-buffer.is-view.js, and es.array-buffer.slice.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-old-es-typed-data-view-module-file
  message: Old module file 'es.typed.data-view.js' should be renamed to 'es.data-view.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.data-view.js
- id: detect-old-features-typed-array-array-buffer-path
  message: ArrayBuffer feature file should be moved from 'features/typed-array/array-buffer.js'
    to 'features/array-buffer/index.js' or 'features/array-buffer.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/features/typed-array/array-buffer.js
- id: detect-old-features-typed-array-data-view-path
  message: DataView feature file should be moved from 'features/typed-array/data-view.js'
    to 'features/data-view/index.js' or 'features/data-view.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/features/typed-array/data-view.js
- id: detect-old-internals-typed-array-filename
  message: Internal file 'internals/typed-array.js' should be renamed to 'internals/typed-array-constructor.js'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/internals/typed-array.js
- id: detect-require-es-typed-array-buffer-in-typed-array
  message: es/typed-array.js should not require 'es.typed.array-buffer' module - it
    should be removed after splitting
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*es\.typed\.array-buffer.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/es/typed-array.js
- id: detect-require-es-typed-data-view-in-typed-array
  message: es/typed-array.js should not require 'es.typed.data-view' module - it should
    be removed after refactoring
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*es\.typed\.data-view.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/es/typed-array.js
- id: detect-isarraybufferview-export
  message: Export name 'isArrayBufferView' should be renamed to 'isView' in array-buffer-view-core
  severity: WARNING
  languages:
  - javascript
  pattern-either:
  - pattern: 'module.exports = { ..., isArrayBufferView: $VAR, ... }

      '
  - pattern: 'exports.isArrayBufferView = $VAR

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/internals/array-buffer-view-core.js
- id: detect-uint8array-prototype-reference
  message: Reference to 'Uint8Array' prototype should be changed to 'Int8Array' in
    array-buffer-view-core.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: var $VAR = Uint8Array && Uint8Array.prototype
  - metavariable-regex:
      metavariable: $VAR
      regex: Uint8ArrayPrototype
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/internals/array-buffer-view-core.js
- id: detect-arraybuffer-isvview-export-in-monolithic-module
  message: ArrayBuffer.isView should be in a separate module 'es.array-buffer.is-view.js',
    not in monolithic es.typed.array-buffer.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: "$EXPORT({ target: $TARGET, stat: true, ... }, {\n  isView: function\
        \ isView($ARG) { ... }\n})\n"
    - pattern: "$EXPORT({ target: $TARGET, stat: true, ... }, {\n  isView: function($ARG)\
        \ { ... }\n})\n"
  - metavariable-pattern:
      metavariable: $TARGET
      patterns:
      - pattern-either:
        - pattern: '''ArrayBuffer'''
        - pattern: '"ArrayBuffer"'
        - pattern: ARRAY_BUFFER
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.*.js
- id: detect-arraybuffer-slice-export-in-monolithic-module
  message: ArrayBuffer.prototype.slice should be in a separate module 'es.array-buffer.slice.js',
    not in monolithic es.typed.array-buffer.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: "$EXPORT({ target: $TARGET, proto: true, ... }, {\n  slice: function\
        \ slice($START, $END) { ... }\n})\n"
    - pattern: "$EXPORT({ target: $TARGET, proto: true, ... }, {\n  slice: function($START,\
        \ $END) { ... }\n})\n"
  - metavariable-pattern:
      metavariable: $TARGET
      patterns:
      - pattern-either:
        - pattern: '''ArrayBuffer'''
        - pattern: '"ArrayBuffer"'
        - pattern: ARRAY_BUFFER
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.*.js
- id: detect-arraybuffer-constructor-export-in-monolithic-module
  message: ArrayBuffer constructor should be in a separate module 'es.array-buffer.constructor.js',
    not combined with isView and slice
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: '$EXPORT({ global: true, ... }, { ArrayBuffer: $IMPL })

        '
    - pattern: '$EXPORT({ global: true, ... }, { ''ArrayBuffer'': $IMPL })

        '
    - pattern: '$EXPORT({ global: true, ... }, { "ArrayBuffer": $IMPL })

        '
  - pattern-inside: '$EXPORT(...);

      ...

      $EXPORT({ target: $TARGET, stat: true, ... }, { isView: ... });

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.*.js
- id: detect-isarraybufferview-variable-usage
  message: Importing 'isArrayBufferView' from ArrayBufferViewCore - should be renamed
    to 'isView'
  severity: WARNING
  languages:
  - javascript
  pattern-either:
  - pattern: var $VAR = ArrayBufferViewCore.isArrayBufferView
  - pattern: var isArrayBufferView = $MOD.isArrayBufferView
  - pattern: 'var $VAR = require($PATH).isArrayBufferView

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-array-buffer-constant-in-monolithic-module
  message: ARRAY_BUFFER constant defined in monolithic module - indicates module should
    be split
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: var ARRAY_BUFFER = 'ArrayBuffer'
  - pattern-inside: '...

      $EXPORT({ target: ARRAY_BUFFER, stat: true, ... }, { isView: ... });

      ...

      $EXPORT({ target: ARRAY_BUFFER, proto: true, ... }, { slice: ... });

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.*.js
- id: detect-set-species-arraybuffer-in-monolithic-module
  message: set-species call for ARRAY_BUFFER in monolithic module - should be in es.array-buffer.constructor.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)(ARRAY_BUFFER)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*set-species.*
  - pattern-inside: 'var ARRAY_BUFFER = ''ArrayBuffer'';

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-dataview-export-in-typed-namespace
  message: DataView exported in 'es.typed.data-view' - should be in 'es.data-view.js'
    (remove 'typed' from name)
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "$EXPORT({ global: true, ... }, {\n  DataView: $IMPL\n})\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.data-view.js
- id: detect-typed-buffer-dataview-access
  message: DataView accessed from TypedBufferModule in old 'typed' namespace modules
  severity: WARNING
  languages:
  - javascript
  pattern-either:
  - pattern: var DataView = TypedBufferModule.DataView
  - pattern: var DataView = require($PATH).DataView
  - pattern: var $VAR = TypedBufferModule.DataView
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.data-view.js
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-native-array-buffer-import-old-module
  message: NativeArrayBuffer import pattern in old monolithic module
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: var NativeArrayBuffer = require($PATH)[ARRAY_BUFFER]
  - pattern-inside: 'var ARRAY_BUFFER = ''ArrayBuffer'';

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-arraybuffer-from-typed-buffer-module
  message: ArrayBuffer extracted from TypedBufferModule in old monolithic module
  severity: WARNING
  languages:
  - javascript
  pattern-either:
  - pattern: var ArrayBuffer = TypedBufferModule[ARRAY_BUFFER]
  - pattern: var ArrayBuffer = TypedBufferModule['ArrayBuffer']
  - pattern: var ArrayBuffer = TypedBufferModule["ArrayBuffer"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-native-isview-in-monolithic-module
  message: nativeIsView variable in monolithic module - should be in separate es.array-buffer.is-view.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: var nativeIsView = $CORE.NATIVE_ARRAY_BUFFER && ArrayBuffer.isView
  - pattern-inside: 'var ARRAY_BUFFER = ''ArrayBuffer'';

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-arraybuffer-slice-implementation
  message: ArrayBuffer slice implementation in monolithic module - should be extracted
    to es.array-buffer.slice.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "slice: function slice($START, $END) {\n  ...\n  var viewS = new DataView(this);\n\
      \  var viewT = new DataView(result);\n  ...\n}\n"
  - pattern-inside: '$EXPORT({ target: ARRAY_BUFFER, proto: true, ... }, { ... });

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-incorrect-slice-check-in-monolithic-module
  message: INCORRECT_SLICE check in monolithic module - should be in es.array-buffer.slice.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: "var INCORRECT_SLICE = require($PATH)(function () {\n  ...\n})\n"
  - pattern-inside: 'var ARRAY_BUFFER = ''ArrayBuffer'';

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-native-arraybuffer-slice-in-monolithic-module
  message: nativeArrayBufferSlice variable in monolithic module - should be in es.array-buffer.slice.js
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: var nativeArrayBufferSlice = ArrayBuffer.prototype.slice
  - pattern-inside: 'var ARRAY_BUFFER = ''ArrayBuffer'';

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/modules/es.typed.array-buffer.js
- id: detect-arraybufer-view-core-uint8array-var
  message: Uint8Array variable declaration in array-buffer-view-core.js - should be
    changed to Int8Array
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: var Uint8Array = $GLOBAL.Uint8Array
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - packages/*/internals/array-buffer-view-core.js
- id: detect-uint8arrayprototype-variable
  message: Uint8ArrayPrototype variable - should be changed to Int8ArrayPrototype
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: var Uint8ArrayPrototype = Uint8Array && Uint8Array.prototype
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
