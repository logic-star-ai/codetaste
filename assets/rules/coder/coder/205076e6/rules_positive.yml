rules:
- id: knip-in-package-json-scripts-lint
  message: Detected knip in lint script - knip integrated into CI pipeline
  severity: INFO
  languages:
  - json
  patterns:
  - pattern: '"lint": "$SCRIPT"

      '
  - metavariable-regex:
      metavariable: $SCRIPT
      regex: .*knip.*
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - site/package.json
- id: knip-devdependency-added
  message: Detected knip as devDependency - knip tooling installed
  severity: INFO
  languages:
  - json
  pattern: '"knip": "$VERSION"

    '
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - site/package.json
