  pattern: $CMD.SetIn(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 109
- id: cobra-command-initialization
  message: Cobra Command initialization detected. Migrate to &clibase.Cmd{...}
  severity: WARNING
  languages:
  - go
  pattern: '&cobra.Command{ ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: cliflag-package-usage
  message: cliflag package usage detected. Migrate to clibase.OptionSet for flag handling
  severity: WARNING
  languages:
  - go
  pattern: cliflag.$FUNC(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
- id: cobra-rune-handler-signature
  message: 'Old Cobra RunE handler signature. Migrate to Handler: func(inv *clibase.Invocation)
    error'
  severity: WARNING
  languages:
  - go
  pattern: 'RunE: func($CMD *cobra.Command, $ARGS []string) error { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 96
- id: cobra-command-struct-with-rune
  message: 'Cobra Command with inline RunE handler. Migrate to Handler: func(inv *clibase.Invocation)
    error'
  severity: WARNING
  languages:
  - go
  pattern: "&cobra.Command{\n  RunE: func($CMD *cobra.Command, $ARGS []string) error\
    \ {\n    ...\n  },\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 95
- id: cobra-cmd-variable-assignment
  message: Variable assigned to new cobra.Command. Migrate to &clibase.Cmd{...}
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := &cobra.Command{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 88
- id: cobra-command-struct-with-use
  message: 'Cobra Command struct literal with Use field. Migrate to &clibase.Cmd{Use:
    ..., ...}'
  severity: WARNING
  languages:
  - go
  pattern: "&cobra.Command{\n  Use: $USE,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 85
- id: cobra-command-pointer-return
  message: Function returns *cobra.Command. Migrate to return *clibase.Cmd
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(...) *cobra.Command { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: cobra-import-detected
  message: 'Old Cobra import detected. Migrate to clibase: import ''github.com/coder/coder/cli/clibase'''
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/spf13/cobra"

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 75
- id: cobra-command-struct-with-short
  message: 'Cobra Command struct literal with Short field. Migrate to &clibase.Cmd{Short:
    ..., ...}'
  severity: WARNING
  languages:
  - go
  pattern: "&cobra.Command{\n  Short: $SHORT,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 71
- id: cobra-command-function-pattern
  message: 'Command defined as standalone function returning *cobra.Command. Migrate
    to method on RootCmd: func (r *RootCmd) $NAME() *clibase.Cmd'
  severity: WARNING
  languages:
  - go
  pattern: "func $NAME() *cobra.Command {\n  ...\n  cmd := &cobra.Command{ ... }\n\
    \  ...\n  return cmd\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 59
- id: cobra-generic-standalone-cmd-func
  message: Standalone function returning *cobra.Command with local cmd variable. Migrate
    to method on RootCmd returning *clibase.Cmd
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func $CMDNAME() *cobra.Command {\n  ...\n  cmd := &cobra.Command{...}\n\
      \  ...\n  return cmd\n}\n"
  - pattern-not: "func $CMDNAME() (*cobra.Command, ...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 59
- id: create-client-with-cobra-cmd
  message: CreateClient() called with cobra.Command. Migrate to use inv for clibase
  severity: WARNING
  languages:
