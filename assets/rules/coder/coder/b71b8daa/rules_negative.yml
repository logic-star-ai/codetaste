rules:
- id: cobra-cmd-getflagset
  message: Accessing cobra Flags() for FlagSet. In clibase, work with Options directly
  severity: WARNING
  languages:
  - go
  pattern: $CMD.Flags()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 171
- id: cobra-cmd-outerrstdout
  message: cobra Command.OutOrStdout() detected. In clibase, use inv.Stdout
  severity: WARNING
  languages:
  - go
  pattern: $CMD.OutOrStdout()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 157
- id: cobra-command-execute
  message: cobra Command.Execute() detected. Migrate to clibase invocation pattern
  severity: WARNING
  languages:
  - go
  pattern: '$CMD.Execute()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 133
- id: cobra-set-out
  message: cobra Command.SetOut() detected. In clibase, set inv.Stdout directly
  severity: WARNING
