rules:
- id: clibase-value-constructors-in-cli
  message: Detected clibase value constructor in CLI - new option value pattern
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: clibase.BoolOf($VAR)
  - pattern: clibase.StringOf($VAR)
  - pattern: clibase.DurationOf($VAR)
  - pattern: clibase.StringArrayOf($VAR)
  metadata:
    category: api
    nr_refactored_patterns: 125
    nr_legacy_patterns: 0
  paths:
    include:
    - cli/*.go
    - enterprise/cli/*.go
    exclude:
    - cli/clibase/*.go
    - '*_test.go'
- id: clibase-cmd-return-type
  message: Detected function returning *clibase.Cmd - indicates successful migration
    from cobra.Command
  severity: INFO
  languages:
  - go
  pattern: func $FUNC(...) *clibase.Cmd { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
- id: no-cobra-command-return-type
  message: Function returns clibase.Cmd not cobra.Command - successful conversion
  severity: INFO
  languages:
  - go
  pattern: func $FUNC(...) *clibase.Cmd
  metadata:
    category: structural
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
  paths:
    include:
    - cli/*.go
    - enterprise/cli/*.go
    exclude:
    - cli/clibase/*.go
    - '*_test.go'
