  message: Detected Handler with Invocation in CLI command - successful migration
  severity: INFO
  languages:
  - go
  pattern: 'Handler: func($INV *clibase.Invocation) error { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 74
    nr_legacy_patterns: 0
  paths:
