rules:
- id: refactor-tablecell-with-css-prop-padding
  message: 'Refactoring detected: TableCell with div using css prop (replaced Box
    p={...})'
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "<TableCell>\n  <div css={{ padding: $P }}>\n    ...\n  </div>\n</TableCell>\n"
  - pattern-not-inside: 'import Box from "@mui/material/Box"

      '
  - pattern-not-inside: 'import { Box } from "@mui/system"

      '
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: refactor-tablecell-div-emptystate-pattern
  message: 'Refactoring detected: TableCell with div wrapping EmptyState (replaced
    Box)'
  severity: INFO
  languages:
  - typescript
  pattern: "<TableCell>\n  <div css={...}>\n    <EmptyState message={$MSG} />\n  </div>\n\
    </TableCell>\n"
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
