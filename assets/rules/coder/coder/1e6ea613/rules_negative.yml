rules:
- id: mui-box-regex-opening-tag
  message: Replace <Box> with native HTML element (div, span, etc.) and use css prop
    instead of sx
  severity: WARNING
  languages:
  - typescript
  pattern-regex: <Box\s+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 100
  paths:
    exclude:
    - '**/Buttons.tsx'
- id: mui-box-regex-closing-tag
  message: Replace <Box> with native HTML element (div, span, etc.)
  severity: WARNING
  languages:
  - typescript
  pattern-regex: </Box>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 93
- id: mui-sx-prop-usage-box
  message: Replace sx prop with css prop (emotion) and replace <Box> with native HTML
    element
  severity: WARNING
  languages:
  - typescript
  pattern: <Box sx={$OBJ} ... />
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 62
- id: mui-box-with-sx-prop
  message: Replace <Box sx={{...}}> with native HTML element and css prop
