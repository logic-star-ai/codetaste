rules:
- id: old-service-file-naming-camelcase
  message: Service file names should use kebab-case instead of camelCase (e.g., 'note-action.service.js'
    instead of 'noteAction.service.js')
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/*[a-z][A-Z]*.service.js'
- id: old-data-target-noteNameModal
  message: data-target attribute should reference '#noteCreateModal' instead of '#noteNameModal'
  severity: WARNING
  languages:
  - html
  pattern: 'data-target="#noteNameModal"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-comment-reference-notename
  message: Comment or string reference contains old naming convention - should use
    kebab-case (note-create, note-import)
  severity: INFO
  languages:
  - javascript
  - html
  pattern-regex: notename\.controller|noteName-create|noteName-import
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/*.js'
    - '**/*.html'
- id: old-helium-components-location
  message: helium files should be moved from components/helium/ to app/helium/ (feature-based
    organization)
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
