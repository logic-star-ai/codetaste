rules:
- id: old-javadoc-reference-query-exception-error-code
  message: Update Javadoc or comment references from integer error code constants
    to QueryErrorCode enum
  severity: WARNING
  languages:
  - java
  pattern-regex: QueryException\.\w+_ERROR_CODE
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 114
- id: old-query-exception-get-exception-two-args
  message: Replace QueryException.getException() with QueryErrorCode enum and throw
    QueryException
  severity: WARNING
  languages:
  - java
  pattern: QueryException.getException($EXCEPTION, $ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 72
- id: old-import-common-exception-query-exception
  message: Replace import of old QueryException utility class with new QueryException
    from spi.exception
  severity: WARNING
  languages:
  - java
  pattern: import org.apache.pinot.common.exception.QueryException;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 59
- id: old-variable-declaration-processing-exception
