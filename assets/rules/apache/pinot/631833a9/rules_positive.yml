  - metavariable-regex:
      metavariable: $MSG
      regex: (?i).*(Query|Error|Request).*ErrorMessage
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*ErrorCode$
  metadata:
    nr_refactored_patterns: 10
