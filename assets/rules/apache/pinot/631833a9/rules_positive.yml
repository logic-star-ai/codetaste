rules:
- id: query-error-code-enum-specific
  message: Detected QueryErrorCode enum usage (not OperationValidationResponse)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $CODE.$MEMBER
  - metavariable-regex:
      metavariable: $CODE
      regex: ^Query.*ErrorCode$
  metadata:
    nr_refactored_patterns: 487
    nr_legacy_patterns: 0
- id: error-code-in-processing-handler
  message: Detected QueryErrorCode in processing handler
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $CODE.$MEMBER
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*ErrorCode$
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(Processing|Handler|Processor).*
  metadata:
    nr_refactored_patterns: 135
    nr_legacy_patterns: 0
- id: broker-request-handler-error-code-enum
  message: Detected broker request handler using QueryErrorCode enum
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $CODE.$MEMBER
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*(Query|Request).*ErrorCode
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(Broker|Request).*Handler
  metadata:
    nr_refactored_patterns: 129
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/broker/**/*.java'
- id: error-code-in-catch-block-usage
  message: Detected QueryErrorCode used in catch block
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-inside: "try {\n  ...\n} catch ($T $E) {\n  ...\n}\n"
  - pattern: $CODE.$MEMBER
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*ErrorCode$
  metadata:
    nr_refactored_patterns: 115
    nr_legacy_patterns: 0
- id: combine-operator-error-handling
