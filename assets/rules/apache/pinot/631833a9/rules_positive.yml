  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*(Query|Error).*ErrorCode
  - metavariable-regex:
      metavariable: $CONSTRUCTOR
      regex: (?i).*(Query|Request|Processing).*Exception
