- id: error-code-get-id-method-in-tests
  message: Detected .getId() call on error code enum (test pattern migration)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $CODE.$MEMBER.getId()
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*(Query|Error).*ErrorCode$
  metadata:
    nr_refactored_patterns: 63
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/**/*.java'
    - '**/*Test.java'
- id: error-code-enum-in-log-statement
  message: Detected QueryErrorCode enum in logging statement
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $LOGGER.$METHOD(..., $CODE.$MEMBER, ...)
    - pattern: $LOGGER.$METHOD($FMT, ..., $CODE.$MEMBER, ...)
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*(Query|Error).*ErrorCode
  metadata:
    nr_refactored_patterns: 57
    nr_legacy_patterns: 0
- id: error-code-in-timeout-handler
  message: Detected QueryErrorCode in timeout handling
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $CODE.$MEMBER
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*ErrorCode$
  - metavariable-regex:
      metavariable: $MEMBER
      regex: (?i).*(timeout|cancelled|cancel).*
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
- id: error-code-enum-dataflow-to-context
  message: Detected QueryErrorCode enum flowing to context.setErrorCode via dataflow
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $CODE.$MEMBER
    - metavariable-regex:
        metavariable: $CODE
        regex: (?i).*ErrorCode$
  pattern-sinks:
  - pattern: $CTX.setErrorCode($SINK)
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: error-code-enum-method-call
  message: Detected method call on QueryErrorCode enum value
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $CODE.$MEMBER.$METHOD(...)
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*ErrorCode$
  - pattern-not: $CODE.$MEMBER.getId()
  - pattern-not: $CODE.$MEMBER.toString()
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: query-error-code-as-exception-call
  message: Detected asException() call on error code enum (new pattern)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $CODE.$MEMBER.asException(...)
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i)^(Query|Error|Request).*ErrorCode$
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: instance-response-error-code
