  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'class $CLASS extends $PARENT { ... }

      '
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(Query|Request|Execution).*Exception
  - metavariable-regex:
      metavariable: $PARENT
      regex: (?i).*(Pinot|Base).*RuntimeException
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: query-error-code-enum-declaration
  message: Detected QueryErrorCode enum declaration
  severity: INFO
  languages:
