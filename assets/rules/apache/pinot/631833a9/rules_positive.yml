  metadata:
    nr_refactored_patterns: 78
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/integration-test*/**/*.java'
    - '**/integration/**/*Test.java'
- id: error-code-in-api-resources
  message: Detected QueryErrorCode in API resources
