- id: error-code-enum-dataflow-to-exception
  message: Detected QueryErrorCode enum flowing to exception via dataflow
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $CODE.$MEMBER
    - metavariable-regex:
        metavariable: $CODE
        regex: (?i).*(Query|Error|Request).*ErrorCode
  pattern-sinks:
  - patterns:
    - pattern: new $EXC($SINK, ...)
    - metavariable-regex:
        metavariable: $EXC
        regex: (?i).*(Query|Request|Processing).*Exception
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
