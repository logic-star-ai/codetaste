    - pattern: $MSG.getErrCode()
    - pattern: $MSG.getUsrMsg()
    - pattern: $MSG.getLogMsg()
  - metavariable-regex:
      metavariable: $MSG
      regex: (?i).*(Error|Query).*Message
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: error-code-comparison-with-enum
  message: Detected comparison with QueryErrorCode enum value
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $VAR == $CODE.$MEMBER
    - pattern: $CODE.$MEMBER == $VAR
    - pattern: $VAR.equals($CODE.$MEMBER)
    - pattern: $CODE.$MEMBER.equals($VAR)
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*(Query|Error).*ErrorCode
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: query-exception-extends-pinot-runtime-exception
