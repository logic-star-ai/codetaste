    nr_legacy_patterns: 0
- id: catch-query-exception
  message: Detected catching QueryException (runtime exception)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "try {\n  ...\n} catch (QueryException $E) {\n  ...\n}\n"
  - pattern-not-inside: 'import org.apache.pinot.common.exception.QueryException;

      ...

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: query-error-code-field-in-class
  message: Detected QueryErrorCode as field type in class
  severity: INFO
