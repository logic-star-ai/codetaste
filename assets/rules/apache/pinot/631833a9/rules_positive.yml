rules:
- id: error-code-taint-through-variable
  message: Detected error code assigned to variable then used
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: QueryErrorCode.$CODE
  pattern-sinks:
  - patterns:
    - pattern: $VAR
    - metavariable-pattern:
        metavariable: $VAR
        pattern-regex: .*[eE]rror.*
  metadata:
    nr_refactored_patterns: 263
    nr_legacy_patterns: 0
- id: query-error-code-enum-value-access
  message: Detected QueryErrorCode enum value access
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: QueryErrorCode.$VALUE
  - pattern-not: QueryErrorCode.class
  metadata:
    nr_refactored_patterns: 249
    nr_legacy_patterns: 0
- id: error-code-taint-through-method-call
  message: Detected error code flowing through method calls
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: QueryErrorCode.$CODE
  pattern-sinks:
  - pattern: $OBJ.$METHOD($SINK)
  metadata:
    nr_refactored_patterns: 110
    nr_legacy_patterns: 0
- id: import-query-error-code-enum
  message: Detected import of QueryErrorCode enum - new error handling system
  severity: INFO
  languages:
  - java
  pattern: import $PKG.QueryErrorCode;
  metadata:
    nr_refactored_patterns: 68
    nr_legacy_patterns: 0
- id: error-code-taint-to-response
  message: Detected error code flowing to response object
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: QueryErrorCode.$CODE
  pattern-sinks:
  - pattern: new $RESPONSE(...)
  - pattern: $RESP.setException(...)
  metadata:
    nr_refactored_patterns: 61
    nr_legacy_patterns: 0
- id: error-code-taint-to-set-error-code
  message: Detected error code flowing to setErrorCode call
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: QueryErrorCode.$CODE
  pattern-sinks:
  - pattern: $CTX.setErrorCode($SINK)
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: error-code-to-exception-taint
  message: Detected error code flowing to asException call
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: QueryErrorCode.$CODE
  pattern-sinks:
  - pattern: $SRC.asException(...)
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: error-code-parameter-in-constructor
  message: Detected constructor with QueryErrorCode parameter
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "$TYPE(..., QueryErrorCode $PARAM, ...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: import-query-error-message
  message: Detected import of QueryErrorMessage - new error messaging system
  severity: INFO
  languages:
  - java
  pattern: import $PKG.QueryErrorMessage;
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: error-message-taint-flow
  message: Detected error message flowing from QueryErrorMessage
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: new QueryErrorMessage(...)
  - pattern: QueryErrorMessage.$METHOD(...)
  pattern-sinks:
  - pattern: $LOG.$LEVEL(...)
  - pattern: $RESPONSE.setException(...)
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: parameter-type-query-error-code
  message: Detected method parameter with QueryErrorCode type
  severity: INFO
  languages:
  - java
  pattern: "$RET $METHOD(..., QueryErrorCode $PARAM, ...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: error-code-to-processing-exception-conversion
  message: Detected conversion from QueryErrorCode to QueryProcessingException
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: new QueryProcessingException(QueryErrorCode.$CODE, ...)
    - pattern: QueryProcessingException.fromQueryException(...)
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: query-function-invoker-usage
  message: Detected QueryFunctionInvoker usage - new function invocation wrapper
  severity: INFO
  languages:
  - java
  pattern-either:
  - pattern: import $PKG.QueryFunctionInvoker;
  - pattern: new QueryFunctionInvoker(...)
  - pattern: QueryFunctionInvoker.$METHOD(...)
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: query-error-message-field-access
  message: Detected QueryErrorMessage field access (errCode, usrMsg, logMsg)
  severity: INFO
  languages:
  - java
  pattern-either:
  - pattern: $MSG.errCode
  - pattern: $MSG.usrMsg
  - pattern: $MSG.logMsg
  - pattern: $MSG.getErrCode()
  - pattern: $MSG.getUsrMsg()
  - pattern: $MSG.getLogMsg()
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: import-query-exception-runtime
  message: Detected import of QueryException runtime exception - new error handling
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import $PKG.QueryException;
  - pattern-not-inside: import org.apache.pinot.common.exception.QueryException;
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: query-error-message-constructor
  message: Detected QueryErrorMessage instantiation
  severity: INFO
  languages:
  - java
  pattern: new QueryErrorMessage(...)
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: error-code-in-exception-constructor-param
  message: Detected exception constructor with QueryErrorCode parameter type
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "public $EXC(QueryErrorCode $CODE, ...) {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $EXC
      pattern-regex: .*[eE]xception.*
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: instanceof-query-exception
  message: Detected instanceof check for QueryException
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $VAR instanceof QueryException
  - pattern-not-inside: 'import org.apache.pinot.common.exception.QueryException;

      ...

      '
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: query-error-message-as-parameter
  message: Detected QueryErrorMessage passed as parameter
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $METHOD($MSG)
  - metavariable-pattern:
      metavariable: $MSG
      pattern-regex: .*[eE]rror[mM]sg.*
  - pattern-inside: 'import $PKG.QueryErrorMessage;

      ...

      '
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: exception-extends-query-exception
  message: Detected exception class extending QueryException
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CLASS extends QueryException {\n  ...\n}\n"
  - pattern-not-inside: 'import org.apache.pinot.common.exception.QueryException;

      ...

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: method-returns-query-error-code
  message: Detected method returning QueryErrorCode
  severity: INFO
  languages:
  - java
  pattern: "QueryErrorCode $METHOD(...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: query-error-message-in-response
  message: Detected QueryErrorMessage used in response building
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $RESPONSE.$METHOD($ERR_MSG)
  - metavariable-pattern:
      metavariable: $ERR_MSG
      pattern-regex: .*[qQ]uery[eE]rror[mM]essage.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: query-error-message-method-parameter
  message: Detected QueryErrorMessage as method parameter
