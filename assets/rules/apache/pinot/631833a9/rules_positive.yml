- id: query-exception-file-path-check
  message: Detected QueryException class in new location
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/spi/exception/QueryException.java'
    exclude:
    - '**/common/exception/QueryException.java'
