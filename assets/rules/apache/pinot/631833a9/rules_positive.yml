    - pattern: $CODE.valueOf(...)
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*(Query|Error|Request).*ErrorCode
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: return-error-code-enum
  message: Detected method returning QueryErrorCode enum
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "$CODE $METHOD(...) {\n  ...\n  return ...;\n}\n"
  - metavariable-regex:
      metavariable: $CODE
      regex: (?i).*(Query|Error).*ErrorCode
  - pattern-not: "int $METHOD(...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: query-error-message-getter-usage
  message: Detected QueryErrorMessage getter methods (new pattern)
  severity: INFO
  languages:
  - java
  patterns:
