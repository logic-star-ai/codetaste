rules:
- id: old-query-planner-stage-package-comment
  message: Comment/documentation references old package 'org.apache.pinot.query.planner.stage'
    - should reference 'org.apache.pinot.query.planner.plannode'
  severity: WARNING
  languages:
  - java
  pattern-regex: org\.apache\.pinot\.query\.planner\.stage
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 167
- id: old-stagestage-package-import
  message: Old package import detected - should use 'org.apache.pinot.query.planner.plannode'
    instead of 'org.apache.pinot.query.planner.stage'
  severity: WARNING
  languages:
  - java
  pattern: import org.apache.pinot.query.planner.stage.$ANYTHING;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 147
- id: old-abstractstagenode-field-in-subclass
  message: Field in subclass of old 'AbstractStageNode' - parent class should be 'AbstractPlanNode'
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$TYPE $FIELD;

      '
  - pattern-inside: 'class $CLASS extends AbstractStageNode { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: old-stagenode-return-statement
  message: Return statement in method with old 'StageNode' return type - should return
    'PlanNode' instead
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: return $EXPR;
  - pattern-inside: 'StageNode $METHOD($...ARGS) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
- id: old-stage-package-in-fqcn
  message: Fully qualified class name uses old package 'org.apache.pinot.query.planner.stage'
    - should use 'org.apache.pinot.query.planner.plannode'
  severity: WARNING
  languages:
  - java
  pattern-regex: org\.apache\.pinot\.query\.planner\.stage\.(?:StageNode|AbstractStageNode|StageNodeVisitor)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: old-stagenode-return-type
  message: Method return type uses old 'StageNode' - should return 'PlanNode' instead
  severity: WARNING
  languages:
  - java
  pattern: 'StageNode $METH(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: old-stagenode-parameter
  message: Method parameter uses old 'StageNode' type - should use 'PlanNode' instead
  severity: WARNING
  languages:
