rules:
- id: identifier-result-taint-to-method
  message: Taint from findIdentifier to method call
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: $OBJ.findIdentifier($CLASS.class)
  pattern-sinks:
  - pattern: $SINK.$METHOD(...)
  metadata:
    nr_refactored_patterns: 80
    nr_legacy_patterns: 0
- id: import-rule-identifier-classes
  message: Detected import of RuleIdentifier or RuleIdentifiers class
  severity: INFO
  languages:
  - java
  pattern-either:
  - pattern: import $PKG.RuleIdentifier;
  - pattern: import $PKG.RuleIdentifiers;
  - pattern: import $PKG.identifier.RuleIdentifier;
  - pattern: import $PKG.identifier.RuleIdentifiers;
  metadata:
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
- id: get-identifier-call-pattern
  message: Detected getIdentifier() call on rule identifiers
  severity: INFO
  languages:
  - java
  pattern-either:
  - pattern: $OBJ.getIdentifier($CLASS.class)
  - pattern: $OBJ.getIdentifier($CLASS)
  metadata:
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
- id: rule-identifiers-with-varargs
  message: Detected RuleIdentifiers construction with varargs
  severity: INFO
  languages:
  - java
  pattern: new RuleIdentifiers($ARG, ...)
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
- id: find-identifier-call-pattern
  message: Detected findIdentifier() call on rule identifiers
  severity: INFO
  languages:
  - java
  pattern-either:
  - pattern: $OBJ.findIdentifier($CLASS.class)
  - pattern: $OBJ.findIdentifier($CLASS)
  metadata:
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
- id: optional-result-from-find-identifier
  message: Detected Optional result pattern from findIdentifier() call
  severity: INFO
  languages:
  - java
  pattern-either:
  - pattern: Optional<$TYPE> $VAR = $RULE.getRuleIdentifiers().findIdentifier($CLASS.class);
  - pattern: Optional<$TYPE> $VAR = $OBJ.findIdentifier($CLASS.class);
  - pattern: $OBJ.findIdentifier($CLASS.class).isPresent()
  - pattern: $OBJ.findIdentifier($CLASS.class).ifPresent(...)
  metadata:
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
- id: mock-get-rule-identifiers
  message: Detected mocking of getRuleIdentifiers() in tests
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: when($OBJ.getRuleIdentifiers()).thenReturn($EXPR)
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: rule-identifiers-return-type
  message: Detected getRuleIdentifiers() method with RuleIdentifiers return type
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: '$TYPE getRuleIdentifiers();

        '
    - pattern: '$TYPE getRuleIdentifiers() { ... }

        '
  - metavariable-regex:
      metavariable: $TYPE
      regex: .*Identifier.*
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
- id: rule-implements-with-get-identifiers
  message: Detected rule class with getRuleIdentifiers method
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CLASS implements $INTERFACES {\n  ...\n  $TYPE getRuleIdentifiers()\
      \ { ... }\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: .*Rule$
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: rule-identifiers-method-implementation
  message: Detected getRuleIdentifiers() method implementation in rule class
  severity: INFO
  languages:
  - java
  pattern: "$RETURN getRuleIdentifiers() {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/tests/**'
- id: rule-identifiers-field-in-class
  message: Detected RuleIdentifiers field in class
  severity: INFO
  languages:
  - java
  pattern: 'private final RuleIdentifiers $FIELD;

    '
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: interface-extends-rule-identifier
  message: Detected interface extending RuleIdentifier
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'interface $IFACE extends $PARENT { ... }

      '
  - metavariable-regex:
      metavariable: $PARENT
      regex: .*RuleIdentifier.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: rule-identifiers-with-two-args
  message: Detected RuleIdentifiers instantiation with two arguments
  severity: INFO
  languages:
  - java
  pattern: new RuleIdentifiers($ARG1, $ARG2)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: stream-filter-with-find-identifier
  message: Detected stream filter with findIdentifier
  severity: INFO
  languages:
  - java
  pattern: $STREAM.filter($LAMBDA -> $EXPR.getRuleIdentifiers().findIdentifier($CLASS.class).isPresent())
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: rule-identifiers-class-definition
  message: Detected RuleIdentifiers class definition
  severity: INFO
  languages:
  - java
  pattern: "public final class RuleIdentifiers {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: rule-identifier-interface-definition
  message: Detected RuleIdentifier interface definition
  severity: INFO
  languages:
  - java
  pattern: "public interface RuleIdentifier {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
