    nr_legacy_patterns: 0
- id: if-condition-with-find-identifier-present
  message: Detected if condition checking findIdentifier isPresent
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'if ($EXPR.isPresent()) { ... }

      '
  - pattern-inside: '$EXPR = $OBJ.$METHOD($CLASS.class);

      ...

      '
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i).*find.*identifier.*
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: rule-identifiers-field-declaration
  message: Detected RuleIdentifiers field declaration
  severity: INFO
