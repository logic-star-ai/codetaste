  message: Detected Optional.ifPresent with identifier query
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.getRuleIdentifiers().findIdentifier($T.class).ifPresent($LAMBDA)
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: optional-data-node-rule-declaration
  message: Detected Optional<DataNodeRule> declaration
