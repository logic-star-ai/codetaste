rules:
- id: detect-getruleidentifiers-method-call
  message: 'Refactoring detected: Calling getRuleIdentifiers() method on a rule'
  severity: INFO
  languages:
  - java
  pattern: $RULE.getRuleIdentifiers()
  metadata:
    nr_refactored_patterns: 115
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-ruleidentifiers-constructor
  message: 'Refactoring detected: Creating new RuleIdentifiers instance'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: new $TYPE(...)
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(ruleidentifier).*
  metadata:
    nr_refactored_patterns: 61
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-import-ruleidentifiers
  message: 'Refactoring detected: Importing RuleIdentifiers class'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import $PKG.$CLASS;
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^RuleIdentifiers$
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: detect-foreach-rule-getruleidentifiers
  message: 'Refactoring detected: Foreach loop accessing getRuleIdentifiers'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "for ($TYPE $VAR : $COLLECTION) {\n  ...\n  $VAR.getRuleIdentifiers();\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-datanode-identifier-dataflow
  message: 'Refactoring detected: DataNodeRule identifier flows through code'
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $RULE.getRuleIdentifiers().findIdentifier($TYPE.class)
    - metavariable-regex:
        metavariable: $TYPE
        regex: (?i).*datanode.*rule
  pattern-sinks:
  - pattern: $SINK.$METHOD(...)
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-getruleidentifiers-method-declaration
  message: 'Refactoring detected: Method ''getRuleIdentifiers()'' declared, returning
    RuleIdentifiers'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$RETURNTYPE getRuleIdentifiers() { ... }

      '
  - metavariable-regex:
      metavariable: $RETURNTYPE
      regex: (?i).*(ruleidentifier|identifier).*
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-optional-ifpresent-lambda
  message: 'Refactoring detected: Optional.ifPresent() with lambda after findIdentifier'
  severity: INFO
  languages:
  - java
  pattern: $OBJ.findIdentifier($CLASS.class).ifPresent($LAMBDA)
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-optional-ispresent-with-findidentifier
  message: 'Refactoring detected: Optional.isPresent() check after findIdentifier'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'if ($VAR.isPresent()) { ... }

        '
    - pattern: 'if ($VAR.findIdentifier(...).isPresent()) { ... }

        '
  - pattern-inside: '$ANY = $X.findIdentifier(...);

      ...

      '
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-ruleidentifiers-field-declaration
  message: 'Refactoring detected: RuleIdentifiers declared as a field'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-inside: 'class $CLASS { ... }

      '
  - pattern: private $TYPE $FIELD;
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^RuleIdentifiers$
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-interface-extends-ruleidentifier
  message: 'Refactoring detected: Interface extends RuleIdentifier'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'interface $IFACE extends $PARENT { ... }

      '
  - metavariable-regex:
      metavariable: $PARENT
      regex: (?i).*(ruleidentifier).*
  - metavariable-regex:
      metavariable: $IFACE
      regex: (?i).*(rule|mapper|node|datasource).*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-import-ruleidentifier
  message: 'Refactoring detected: Importing RuleIdentifier interface'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import $PKG.$CLASS;
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^RuleIdentifier$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-stream-filter-with-findidentifier
  message: 'Refactoring detected: Stream filter using findIdentifier'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $STREAM.filter($LAMBDA -> $LAMBDA.getRuleIdentifiers().findIdentifier(...).isPresent())
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-getruleidentifiers-method-signature
  message: 'Refactoring detected: getRuleIdentifiers method signature'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $TYPE getRuleIdentifiers();
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(ruleidentifier).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-ruleidentifier-interface-file
  message: 'Refactoring detected: RuleIdentifier interface exists'
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/RuleIdentifier.java'
- id: detect-ruleidentifiers-class-file
  message: 'Refactoring detected: RuleIdentifiers class exists'
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/RuleIdentifiers.java'
- id: detect-interface-ruleidentifier-declaration
  message: 'Refactoring detected: Interface declares RuleIdentifier'
  severity: INFO
  languages:
  - java
  pattern: 'public interface RuleIdentifier { ... }

    '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-class-ruleidentifiers-declaration
  message: 'Refactoring detected: Class declares RuleIdentifiers'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'public class RuleIdentifiers { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
