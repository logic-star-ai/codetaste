      regex: .*RuleIdentifier.*
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: rule-identifier-interface-import
  message: Detected RuleIdentifier interface import
  severity: INFO
  languages:
  - java
  pattern: import org.apache.shardingsphere.infra.rule.identifier.RuleIdentifier;
  metadata:
