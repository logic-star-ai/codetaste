- id: rule-identifiers-as-return-type
  message: Detected method declaration returning RuleIdentifiers
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$TYPE $METHOD(...);

      '
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^RuleIdentifiers$
  - pattern-inside: 'interface $INTERFACE { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: identifier-stream-filter
  message: Detected stream filter with identifier query
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $STREAM.filter($E -> $E.getRuleIdentifiers().$M($T.class).isPresent())
  - metavariable-regex:
      metavariable: $M
      regex: (findIdentifier|getIdentifier)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: rule-identifiers-class-with-methods
  message: Detected RuleIdentifiers class with findIdentifier and getIdentifier methods
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'class RuleIdentifiers { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
