rules:
- id: method-chain-with-get-rule-identifiers
  message: Detected method chaining starting with getRuleIdentifiers
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.$GETTER().$NEXT(...)
  - metavariable-regex:
      metavariable: $GETTER
      regex: (?i)get.*rule.*identifier.*
  - metavariable-regex:
      metavariable: $NEXT
      regex: (?i)(find|get).*
  metadata:
    nr_refactored_patterns: 83
    nr_legacy_patterns: 0
- id: rule-identifiers-import
  message: Detected import of RuleIdentifiers or RuleIdentifier
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: import org.apache.shardingsphere.infra.rule.identifier.RuleIdentifier;
    - pattern: import org.apache.shardingsphere.infra.rule.identifier.RuleIdentifiers;
    - pattern: import org.apache.shardingsphere.infra.rule.identifier.$IDENTIFIER;
  - metavariable-regex:
      metavariable: $IDENTIFIER
      regex: RuleIdentifier.*
  metadata:
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
- id: get-identifier-method-call
  message: Detected getIdentifier() method call - new query pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $X.$METHOD_NAME($CLASS.class)
  - metavariable-regex:
      metavariable: $METHOD_NAME
      regex: (?i)^get.*identifier$
  - pattern-not: $X.getRuleIdentifiers(...)
  metadata:
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
- id: data-node-rule-identifier-query
  message: Detected DataNodeRule identifier query pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $X.findIdentifier(DataNodeRule.class)
    - pattern: $X.getIdentifier(DataNodeRule.class)
  metadata:
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: rule-identifiers-multi-param-constructor
  message: Detected RuleIdentifiers construction with multiple identifier parameters
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: new RuleIdentifiers($ARG1, ...)
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
- id: double-chained-identifier-query
  message: Detected double-chained identifier operations
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.$M1().$M2($C1.class).$M3()
  - metavariable-regex:
      metavariable: $M1
      regex: (?i)get.*rule.*identifier.*
  - metavariable-regex:
      metavariable: $M2
      regex: (?i).*(find|get).*identifier
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: find-identifier-method-call
  message: Detected findIdentifier() method call - new query pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $X.$METHOD_NAME($CLASS.class)
  - metavariable-regex:
      metavariable: $METHOD_NAME
      regex: (?i)find.*identifier
  metadata:
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
- id: for-each-with-get-rule-identifiers
  message: Detected forEach with getRuleIdentifiers
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "for ($TYPE $VAR : $COLLECTION) {\n  ...\n  $VAR.$METHOD();\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)get.*rule.*identifier.*
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: mockito-when-with-get-rule-identifiers
  message: Detected Mockito when with getRuleIdentifiers
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: when($MOCK.$METHOD())
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)get.*rule.*identifier.*
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: get-identifier-data-node-rule
  message: Detected getIdentifier with DataNodeRule
  severity: INFO
  languages:
  - java
  pattern: $OBJ.getIdentifier(DataNodeRule.class)
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: table-mapper-rule-identifier-query
  message: Detected TableMapperRule identifier query pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $X.findIdentifier(TableMapperRule.class)
    - pattern: $X.getIdentifier(TableMapperRule.class)
