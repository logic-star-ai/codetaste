  severity: INFO
  languages:
  - java
  pattern: '$COLLECTION.stream().filter($R -> $R.getRuleIdentifiers().findIdentifier($TYPE.class).isPresent())

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: getidentifier-four-method-chain
  message: Detected four-method chain after getIdentifier()
  severity: INFO
  languages:
  - java
  pattern: '$RULE.getRuleIdentifiers().getIdentifier($TYPE.class).$M1(...).$M2(...).$M3(...).$M4(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: findidentifier-datanode-map-getdatanodes
  message: Detected map operation on DataNodeRule to get data nodes by table
  severity: INFO
  languages:
  - java
  pattern: '$RULE.getRuleIdentifiers().findIdentifier(DataNodeRule.class).map($VAR
    -> $VAR.getDataNodesByTableName(...))

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: data-node-rule-find-actual-table-by-catalog-chained
  message: Detected method chain on findActualTableByCatalog() result
  severity: INFO
  languages:
  - java
  pattern: '$RULE.getRuleIdentifiers().getIdentifier(DataNodeRule.class).findActualTableByCatalog(...).$METHOD(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: findidentifier-multiple-types-pattern
  message: Detected multiple findIdentifier calls for different identifier types
  severity: INFO
  languages:
  - java
  pattern: '$RULE.getRuleIdentifiers().findIdentifier($TYPE1.class);

    ...

    $RULE2.getRuleIdentifiers().findIdentifier($TYPE2.class);

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
