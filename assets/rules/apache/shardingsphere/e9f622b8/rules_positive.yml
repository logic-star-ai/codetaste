    nr_legacy_patterns: 0
- id: get-rule-identifiers-method-definition
  message: Detected getRuleIdentifiers() method implementation in rule class
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$RETURN_TYPE $METHOD_NAME() { ... }

      '
  - metavariable-regex:
      metavariable: $METHOD_NAME
      regex: (?i)get.*rule.*identifier.*
  - metavariable-regex:
      metavariable: $RETURN_TYPE
      regex: .*RuleIdentifier.*
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: rule-identifiers-return-statement
  message: Detected return statement with RuleIdentifiers
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: return new $CLASS_NAME(...);
  - metavariable-regex:
      metavariable: $CLASS_NAME
      regex: .*RuleIdentifier.*
  - pattern-inside: '$TYPE $METHOD(...) { ... }

      '
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
