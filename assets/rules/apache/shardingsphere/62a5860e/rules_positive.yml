rules:
- id: sharding-table-taint-from-find-to-usage
  message: Detected data flow from findShardingTable to usage
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $OBJ.$METHOD($ARG)
    - metavariable-regex:
        metavariable: $METHOD
        regex: (?i)^(find[_-]?sharding[_-]?table.*|get[_-]?sharding[_-]?table.*)$
  pattern-sinks:
  - patterns:
    - pattern: $SINK.$METHOD2(...)
    - pattern-not: $SINK.findTableRule(...)
    - pattern-not: $SINK.getTableRule(...)
  metadata:
    nr_refactored_patterns: 88
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sharding/**/*.java'
- id: sharding-table-variable-declaration
  message: Detected ShardingTable variable declaration
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $TYPE $VAR = ...;
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^(sharding[_-]?table)$
  - pattern-not: TableRule $VAR = ...;
  metadata:
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sharding/**/*.java'
