  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(..., Map<$KEY, ShardingTable> $PARAM, ...) { ... }

      '
  - pattern-not: '$RET $METHOD(..., Map<$KEY, TableRule> $PARAM, ...) { ... }

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-put-in-map
  message: 'Refactoring detected: Putting ShardingTable into map'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $MAP.put($KEY, $VALUE)
  - pattern-either:
    - pattern-inside: 'Map<$K, ShardingTable> $MAP = ...;

        ...

        '
    - pattern-inside: 'ShardingTable $VALUE = ...;

        ...

        '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-in-conditional
  message: 'Refactoring detected: ShardingTable in conditional expression'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: if ($OPT.isPresent()) { ... }
    - pattern: while ($OPT.isPresent()) { ... }
  - pattern-inside: 'Optional<ShardingTable> $OPT = ...;

      ...

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-optional-if-present
  message: 'Refactoring detected: ifPresent on Optional ShardingTable'
