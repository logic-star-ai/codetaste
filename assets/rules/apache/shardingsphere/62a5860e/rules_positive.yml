rules:
- id: detect-sharding-table-dataflow-to-method-arg
  message: 'Refactoring detected: ShardingTable flows as method argument'
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $OBJ.getShardingTable(...)
    - pattern-not: $OBJ.getTableRule(...)
  - pattern: new ShardingTable(...)
  pattern-sinks:
  - pattern: $METHOD($SINK)
  - pattern: $OBJ.$METHOD(..., $SINK, ...)
  metadata:
    nr_refactored_patterns: 120
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-method-call-general
  message: 'Refactoring detected: General method call pattern with ShardingTable'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $VAR.$METHOD(...)
  - pattern-inside: 'ShardingTable $VAR = ...;

      ...

      '
  metadata:
    nr_refactored_patterns: 61
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-variable-declaration
  message: 'Refactoring detected: Variable declared with ShardingTable type'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: ShardingTable $VAR = ...;
  - pattern-not: TableRule $VAR = ...;
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-actual-data-nodes-chain
  message: 'Refactoring detected: Calling getActualDataNodes on ShardingTable'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $VAR.getActualDataNodes()
  - pattern-inside: 'ShardingTable $VAR = ...;

      ...

      '
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-constructor-call
  message: 'Refactoring detected: ShardingTable constructor invocation'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: new ShardingTable(...)
  - pattern-not: new TableRule(...)
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-parameter-type
  message: 'Refactoring detected: Method parameter uses ShardingTable type'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(..., ShardingTable $PARAM, ...) { ... }

      '
  - pattern-not-inside: '$RET $METHOD(..., TableRule $PARAM, ...) { ... }

      '
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-get-sharding-table-method-call
  message: 'Refactoring detected: Method call uses getShardingTable instead of getTableRule'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.getShardingTable(...)
  - pattern-not: $OBJ.getTableRule(...)
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-find-sharding-table-method-call
  message: 'Refactoring detected: Method call uses findShardingTable instead of findTableRule'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.findShardingTable(...)
  - pattern-not: $OBJ.findTableRule(...)
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-import
  message: 'Refactoring detected: Import statement uses ShardingTable instead of TableRule'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import $PKG.ShardingTable;
  - metavariable-regex:
      metavariable: $PKG
      regex: .*sharding.*
  - pattern-not: import $PKG.TableRule;
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/tests/**'
  options:
    symbolic_propagation: true
- id: detect-get-sharding-tables-method-call
  message: 'Refactoring detected: Method call uses getShardingTables instead of getTableRules'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.getShardingTables()
  - pattern-not: $OBJ.getTableRules()
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-field-in-route-classes
  message: 'Refactoring detected: ShardingTable in route classes'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import $PKG.ShardingTable;
  - metavariable-regex:
      metavariable: $PKG
      regex: .*sharding.*
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/route/**/*.java'
  options:
    symbolic_propagation: true
- id: detect-sharding-table-as-argument
  message: 'Refactoring detected: ShardingTable passed as argument'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.$METHOD(..., $VAR, ...)
  - pattern-inside: 'ShardingTable $VAR = ...;

      ...

      '
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-optional-get
  message: 'Refactoring detected: Getting ShardingTable from Optional'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OPT.get()
  - pattern-inside: 'Optional<ShardingTable> $OPT = ...;

      ...

      '
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-return-statement
  message: 'Refactoring detected: Return statement with ShardingTable'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: return $EXPR;
  - pattern-either:
    - pattern-inside: 'ShardingTable $METHOD(...) { ... }

        '
    - pattern-inside: 'Optional<ShardingTable> $METHOD(...) { ... }

        '
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-optional-type
  message: 'Refactoring detected: Optional type uses ShardingTable'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: Optional<ShardingTable> $VAR = ...;
  - pattern-not: Optional<TableRule> $VAR = ...;
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-optional-dataflow
  message: 'Refactoring detected: Optional ShardingTable flows to isPresent check'
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $OBJ.findShardingTable(...)
    - pattern-not: $OBJ.findTableRule(...)
  pattern-sinks:
  - pattern: $SINK.isPresent()
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-return-type
  message: 'Refactoring detected: Method returns ShardingTable type'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'ShardingTable $METHOD(...) { ... }

      '
  - pattern-not-inside: 'TableRule $METHOD(...) { ... }

      '
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-find-sharding-table-by-actual-table-call
  message: 'Refactoring detected: Method call uses findShardingTableByActualTable'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.findShardingTableByActualTable(...)
  - pattern-not: $OBJ.findTableRuleByActualTable(...)
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-dataflow
  message: 'Refactoring detected: ShardingTable object flows through code'
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $OBJ.getShardingTable(...)
    - pattern-not: $OBJ.getTableRule(...)
  pattern-sinks:
  - pattern: $SINK.getActualDataNodes()
  - pattern: $SINK.getLogicTable()
  - pattern: $SINK.getActualDataSourceNames()
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-map-declaration
  message: 'Refactoring detected: Map with ShardingTable as value type'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: Map<$KEY, ShardingTable> $VAR = ...;
    - pattern: Map<$KEY, ShardingTable> $VAR;
  - pattern-not-inside: 'Map<$KEY, TableRule> $VAR = ...;

      '
  - pattern-not-inside: 'Map<$KEY, TableRule> $VAR;

      '
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-foreach-iteration
  message: 'Refactoring detected: Iterating over ShardingTable values'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'for (ShardingTable $VAR : $COLLECTION) { ... }

      '
  - pattern-not: 'for (TableRule $VAR : $COLLECTION) { ... }

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sharding-table-get-actual-table-names
  message: 'Refactoring detected: getActualTableNames on ShardingTable'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $VAR.getActualTableNames(...)
  - pattern-inside: 'ShardingTable $VAR = ...;

      ...

      '
  metadata:
