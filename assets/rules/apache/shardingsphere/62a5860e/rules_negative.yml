rules:
- id: detect-tablerule-type-declaration
  message: Variable declaration with type 'TableRule' detected. Refactor to use 'ShardingTable'
    type instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: TableRule $VAR = ...;
  - pattern-not: ShardingTable $VAR = ...;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: detect-tablerule-import
  message: Import of old class 'TableRule' detected. Refactor to use 'ShardingTable'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: import org.apache.shardingsphere.sharding.rule.TableRule;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: detect-tablerule-constructor-new
  message: Constructor call to 'TableRule' detected. Refactor to use 'new ShardingTable(...)'
    instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new TableRule(...)
  - pattern-not: new ShardingTable(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: detect-tablerule-qualified-name-in-code
  message: Qualified reference to 'org.apache.shardingsphere.sharding.rule.TableRule'
    detected. Refactor to use 'ShardingTable' instead.
  severity: WARNING
  languages:
  - java
  pattern-regex: org\.apache\.shardingsphere\.sharding\.rule\.TableRule
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: detect-tablerule-parameter-type
  message: Method parameter with type 'TableRule' detected. Refactor parameter to
    use 'ShardingTable' type instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(..., TableRule $PARAM, ...) { ... }

      '
  - pattern-not: '$RET $METHOD(..., ShardingTable $PARAM, ...) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: detect-tablerule-parameter-name-tablerule
  message: Parameter named 'tableRule' detected. Refactor to use 'shardingTable' parameter
    name instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(..., $TYPE tableRule, ...) { ... }

      '
  - pattern-not: '$RET $METHOD(..., $TYPE shardingTable, ...) { ... }

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: detect-tablerule-method-signature-multi-param
  message: Method with 'TableRule' parameter detected. Refactor parameter to 'ShardingTable'
    type instead.
  severity: WARNING
  languages:
  - java
  pattern: $RET $METHOD(..., TableRule $PARAM, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: detect-get-tablerule-method-call
  message: Method call 'getTableRule()' detected. Refactor to call 'getShardingTable()'
    instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $OBJ.getTableRule(...)
  - pattern-not: $OBJ.getShardingTable(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: detect-tablerule-variable-gettablerule-call
  message: Call to 'getTableRule()' method detected. Refactor to call 'getShardingTable()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR.getTableRule($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: detect-tablerule-parenthesized-gettablerule
  message: Parenthesized 'getTableRule()' call detected. Refactor to use 'getShardingTable()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: ($VAR.getTableRule(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: detect-find-tablerule-method-call
  message: Method call 'findTableRule()' detected. Refactor to call 'findShardingTable()'
    instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $OBJ.findTableRule(...)
  - pattern-not: $OBJ.findShardingTable(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-tablerule-variable-findtablerule-call
  message: Call to 'findTableRule()' method detected. Refactor to call 'findShardingTable()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR.findTableRule($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-get-tablerules-method-call
  message: Method call 'getTableRules()' detected. Refactor to call 'getShardingTables()'
    instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $OBJ.getTableRules(...)
  - pattern-not: $OBJ.getShardingTables(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-tablerule-method-arg
  message: Method argument using 'getTableRule()' detected. Refactor to use 'getShardingTable()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $METHOD(..., $OBJ.getTableRule(...), ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-tablerule-variable-gettablerules-call
  message: Call to 'getTableRules()' method detected. Refactor to call 'getShardingTables()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR.getTableRules()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-tablerule-assignment-new
  message: Assignment of new 'TableRule' instance detected. Refactor to instantiate
    'ShardingTable' instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR = new TableRule(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-tablerule-optional
  message: Optional with 'TableRule' type detected. Refactor to use 'Optional<ShardingTable>'
    instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: Optional<TableRule> $VAR = ...;
  - pattern-not: Optional<ShardingTable> $VAR = ...;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-tablerule-class-literal
  message: Class literal 'TableRule.class' detected. Refactor to use 'ShardingTable.class'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: TableRule.class
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-tablerule-mockito-mock
  message: Mockito mock of 'TableRule.class' detected. Refactor to mock 'ShardingTable.class'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: mock(TableRule.class)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-tablerule-method-signature-return
  message: Method returning 'TableRule' type detected. Refactor to return 'ShardingTable'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: TableRule $METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-find-tablerule-by-actual-table-method-call
  message: Method call 'findTableRuleByActualTable()' detected. Refactor to call 'findShardingTableByActualTable()'
    instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $OBJ.findTableRuleByActualTable(...)
  - pattern-not: $OBJ.findShardingTableByActualTable(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-tablerule-variable-findtablerulebyactual-call
  message: Call to 'findTableRuleByActualTable()' method detected. Refactor to call
    'findShardingTableByActualTable()' instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR.findTableRuleByActualTable($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-tablerule-collection-map
  message: Map with 'TableRule' value type detected. Refactor to use 'Map<$KEY, ShardingTable>'
    instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: Map<$KEY, TableRule> $VAR = ...;
  - pattern-not: Map<$KEY, ShardingTable> $VAR = ...;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-tablerule-in-assignment
  message: Assignment with 'getTableRule()' call detected. Refactor to call 'getShardingTable()'
    instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $VAR = ... .getTableRule(...);
  - pattern-not: $VAR = ... .getShardingTable(...);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-tablerule-foreach-iteration
  message: For-each loop iterating over 'TableRule' type detected. Refactor to iterate
    over 'ShardingTable' instead.
  severity: WARNING
  languages:
  - java
  pattern: 'for (TableRule $VAR : $COLLECTION) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-tablerule-values-iteration
  message: Iteration over map values with 'TableRule' type detected. Refactor to use
    'ShardingTable' instead.
  severity: WARNING
  languages:
  - java
  pattern: 'for (TableRule $VAR : $MAP.values()) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-tablerule-return-new
  message: Return statement with 'new TableRule()' detected. Refactor to return 'new
    ShardingTable()' instead.
  severity: WARNING
  languages:
  - java
  pattern: return new TableRule(...);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-tablerule-map-size-gettablerules
  message: Call to 'getTableRules().size()' detected. Refactor to use 'getShardingTables().size()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR.getTableRules().size()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-tablerule-method-signature-param
  message: Method with 'TableRule' parameter detected. Refactor parameter to 'ShardingTable'
    type instead.
  severity: WARNING
  languages:
  - java
  pattern: $RET $METHOD(TableRule $PARAM)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-tablerule-map-values-gettablerules
  message: Call to 'getTableRules().values()' detected. Refactor to use 'getShardingTables().values()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR.getTableRules().values()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-tablerule-field-declaration
  message: Field declaration with type 'TableRule' detected. Refactor to use 'ShardingTable'
    type instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "class $CLASS {\n  ...\n  TableRule $FIELD;\n  ...\n}\n"
  - pattern-not: "class $CLASS {\n  ...\n  ShardingTable $FIELD;\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-tablerule-field-name-tablerule
  message: Field named 'tableRule' detected. Refactor to use 'shardingTable' field
    name instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "class $CLASS {\n  ...\n  $TYPE tableRule;\n  ...\n}\n"
  - pattern-not: "class $CLASS {\n  ...\n  $TYPE shardingTable;\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-tablerule-method-chaining
  message: Method chaining with 'getTableRule()' detected. Refactor to call 'getShardingTable()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $OBJ.getTableRule(...). ... .$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-find-tablerule-in-assignment
  message: Assignment with 'findTableRule()' call detected. Refactor to call 'findShardingTable()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR = ... .findTableRule(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-find-tablerule-by-actual-in-assignment
  message: Assignment with 'findTableRuleByActualTable()' call detected. Refactor
    to call 'findShardingTableByActualTable()' instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR = ... .findTableRuleByActualTable(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-tablerule-for-gettablerules-values
  message: Enhanced for loop over 'getTableRules().values()' detected. Refactor to
    use 'getShardingTables().values()' instead.
  severity: WARNING
  languages:
  - java
  pattern: "for (TableRule $VAR : $OBJ.getTableRules().values()) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-tablerule-class-file
  message: File 'TableRule.java' detected. This file should be renamed to 'ShardingTable.java'.
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/TableRule.java'
- id: detect-tablerule-collection-list
  message: List with 'TableRule' type detected. Refactor to use 'List<ShardingTable>'
    instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: List<TableRule> $VAR = ...;
  - pattern-not: List<ShardingTable> $VAR = ...;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-tablerule-map-get
  message: Chained call with 'getTableRule()' after map.get() detected. Refactor to
    call 'getShardingTable()' instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR = $MAP.get(...).getTableRule(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-tablerule-map-keyset-gettablerules
  message: Call to 'getTableRules().keySet()' detected. Refactor to use 'getShardingTables().keySet()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR.getTableRules().keySet()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-tablerule-map-isempty-gettablerules
  message: Call to 'getTableRules().isEmpty()' detected. Refactor to use 'getShardingTables().isEmpty()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR.getTableRules().isEmpty()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-tablerule-get-actual-datasourcenames
  message: Chained call 'getTableRule().getActualDataSourceNames()' detected. Refactor
    to use 'getShardingTable()' instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR.getTableRule(...).getActualDataSourceNames()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-tablerule-stream-gettablerules-values
  message: Stream from 'getTableRules().values()' detected. Refactor to use 'getShardingTables().values()'
    instead.
  severity: WARNING
  languages:
  - java
  pattern: $OBJ.getTableRules().values().stream()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
