rules:
- id: notnull-annotation-without-jspecify-import
  message: Ensure @NotNull is migrated to @NonNull from org.jspecify.annotations
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '@NotNull

      '
  - pattern-not-inside: 'import org.jspecify.annotations.*;

      ...

      '
  - pattern-not-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
- id: javax-nonnull-fully-qualified-usage
  message: Replace @javax.annotation.Nonnull with @org.jspecify.annotations.NonNull
  severity: WARNING
  languages:
  - java
  pattern: '@javax.annotation.Nonnull

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: javax-annotation-nonnull-package-reference
  message: Replace javax.annotation nullness annotations with org.jspecify.annotations
    equivalents
  severity: WARNING
  languages:
  - java
  pattern-regex: javax\.annotation\.(Nonnull|Nullable)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: javax-nullable-fully-qualified-usage
