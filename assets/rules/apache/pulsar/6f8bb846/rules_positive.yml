rules:
- id: jspecify-nonnull-import-detected
  message: 'Migration successful: JSpecify @NonNull annotation imported'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import org.jspecify.annotations.NonNull;
  - pattern-not-inside: 'import org.checkerframework.checker.nullness.qual.NonNull;

      ...

      '
  - pattern-not-inside: 'import javax.annotation.Nonnull;

      ...

      '
  - pattern-not-inside: 'import org.jetbrains.annotations.NotNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test-resources/**'
    - '**/generated/**'
- id: jspecify-annotated-method-param
  message: 'Migration successful: JSpecify @NonNull used on method parameter'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(..., @NonNull $TYPE $PARAM, ...) { ... }

      '
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: jspecify-private-method-return-nonnull
  message: 'Migration successful: JSpecify @NonNull on private method return'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'private @NonNull $TYPE $METHOD(...) { ... }

      '
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: jspecify-completablefuture-return
  message: 'Migration successful: JSpecify annotation on CompletableFuture return'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '@NonNull CompletableFuture<$TYPE> $METHOD(...) { ... }

      '
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
- id: jspecify-nullable-import-detected
  message: 'Migration successful: JSpecify @Nullable annotation imported'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import org.jspecify.annotations.Nullable;
  - pattern-not-inside: 'import org.checkerframework.checker.nullness.qual.Nullable;

      ...

      '
  - pattern-not-inside: 'import javax.annotation.Nullable;

      ...

      '
  - pattern-not-inside: 'import org.jetbrains.annotations.Nullable;

      ...

      '
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: jspecify-return-annotation-nonnull
  message: 'Migration successful: JSpecify @NonNull used as return type annotation'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'public @NonNull $TYPE $METHOD(...) { ... }

      '
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: jspecify-interface-method-nonnull
  message: 'Migration successful: JSpecify @NonNull used in interface method'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: '$RET $METHOD(..., @NonNull $TYPE $PARAM, ...);

        '
    - pattern: '@NonNull $RET $METHOD(...);

        '
  - pattern-inside: 'interface $IFACE { ... }

      '
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: jspecify-protected-return-nonnull
  message: 'Migration successful: JSpecify @NonNull on protected method return'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'protected @NonNull $TYPE $METHOD(...) { ... }

      '
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
