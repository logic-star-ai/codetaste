rules:
- id: jspecify-nonnull-regex-pattern
  message: Detected JSpecify @NonNull usage in Java code
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-regex: '@NonNull'
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 68
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: jspecify-nonnull-return-type
  message: Detected JSpecify @NonNull annotation on method return type
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '@NonNull $TYPE $METHOD(...) { ... }

      '
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: jspecify-nonnull-import-detected
  message: Detected migration to JSpecify @NonNull annotation import
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import org.jspecify.annotations.NonNull;
  - pattern-not-inside: 'import org.checkerframework.checker.nullness.qual.NonNull;

      ...

      '
  - pattern-not-inside: 'import javax.annotation.Nonnull;

      ...

      '
  - pattern-not-inside: 'import org.jetbrains.annotations.NotNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: jspecify-nonnull-constructor-parameter
  message: Detected JSpecify @NonNull annotation on constructor parameter
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$CLASS(..., @NonNull $TYPE $PARAM, ...) { ... }

      '
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: jspecify-nonnull-parameter-annotation
  message: Detected JSpecify @NonNull annotation on method parameter
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(@NonNull $TYPE $PARAM, ...) { ... }

      '
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: jspecify-nullable-import-detected
  message: Detected migration to JSpecify @Nullable annotation import
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import org.jspecify.annotations.Nullable;
  - pattern-not-inside: 'import org.checkerframework.checker.nullness.qual.Nullable;

      ...

      '
  - pattern-not-inside: 'import javax.annotation.Nullable;

      ...

      '
  - pattern-not-inside: 'import org.jetbrains.annotations.Nullable;

      ...

      '
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: jspecify-nullable-parameter-annotation
  message: Detected JSpecify @Nullable annotation on method parameter
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(@Nullable $TYPE $PARAM, ...) { ... }

      '
  - pattern-inside: 'import org.jspecify.annotations.Nullable;

      ...

      '
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: jspecify-nonnull-interface-method-no-body
  message: Detected JSpecify @NonNull annotation on interface method declaration
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '@NonNull $TYPE $METHOD($...ARGS);

      '
  - pattern-inside: "interface $IFACE {\n  ...\n}\n"
  - pattern-inside: 'import org.jspecify.annotations.NonNull;

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
