rules:
- id: redis-config-setter-methods-in-plugin
  message: Redis configuration setters should be in shenyu-infra-redis module
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'public void setUrl(String $URL) { ... }

        '
    - pattern: 'public void setPassword(String $PWD) { ... }

        '
    - pattern: 'public void setMode(String $MODE) { ... }

        '
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: .*Redis.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - shenyu-plugin/**/*.java
- id: import-redis-config-from-plugin
  message: Import Redis configuration from shenyu-infra-redis module instead of plugin
    modules
  severity: ERROR
  languages:
  - java
  pattern-either:
  - pattern: import org.apache.shenyu.plugin.cache.redis.RedisConfigProperties;
  - pattern: import org.apache.shenyu.plugin.$PLUGIN.redis.RedisConfigProperties;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: etcd-client-construction-outside-infra
  message: EtcdClient should be constructed and managed by shenyu-infra-etcd module
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: 'new EtcdClient($URL)

      '
  - pattern: 'new EtcdClient($URL, $TIMEOUT)

      '
  - pattern: 'EtcdClient client = new EtcdClient(...);

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: nacos-namespace-field-outside-infra
  message: Nacos namespace field should be in shenyu-infra-nacos module
