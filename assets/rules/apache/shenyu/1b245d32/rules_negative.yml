- id: etcd-config-without-builder
  message: EtcdConfig should implement builder pattern for consistent configuration
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "class EtcdConfig {\n  ...\n  public void setUrl(...) { ... }\n  ...\n\
      }\n"
  - pattern-not: "class EtcdConfig {\n  ...\n  public static Builder builder() { ...\
      \ }\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nacos-config-without-builder
