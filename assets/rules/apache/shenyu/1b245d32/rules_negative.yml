    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: hardcoded-sync-property-prefix
  message: Use constants from InfraConstants for property prefixes instead of hardcoding
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: '@ConfigurationProperties(prefix = "shenyu.sync.etcd")

      class $CLASS { ... }

      '
  - pattern: '@ConfigurationProperties(prefix = "shenyu.sync.nacos")

      class $CLASS { ... }

      '
  - pattern: '@ConfigurationProperties(prefix = "shenyu.sync.redis")

      class $CLASS { ... }

      '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
