- id: package-declaration-sync-data-nacos-config
  message: Nacos config classes should be in package org.apache.shenyu.infra.nacos.config
  severity: ERROR
  languages:
  - java
  pattern: 'package org.apache.shenyu.sync.data.nacos.config;

    '
  metadata:
