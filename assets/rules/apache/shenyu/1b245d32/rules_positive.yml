    - '**/infra/redis/RedisProperties.java'
    - '**/infra/x/**'
    - '**/infra/zookeeper/**'
- id: any-comment-in-new-infra
  message: Detected comment in new infra files
  severity: INFO
  languages:
  - java
  pattern-regex: .*//.*|.*/\*.*\*/.*
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/infra/**/*.java'
    exclude:
    - '**/test/**'
    - '**/infra/etcd/config/EtcdConfig.java'
    - '**/infra/nacos/config/NacosConfig.java'
