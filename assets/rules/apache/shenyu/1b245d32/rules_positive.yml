- id: config-with-builder-static-method
  message: Detected config class with static builder() method
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CONFIG {\n  ...\n  public static Builder builder() {\n    ...\n\
      \  }\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/infra/**/*.java'
- id: conditional-annotation-sync-etcd
  message: Detected conditional annotation for etcd sync configuration
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "@$ANNOTATION\nclass $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $ANNOTATION
      regex: (?i).*condition.*sync.*etcd.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: builder-static-creation-method
  message: Detected static builder creation method
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "public static Builder builder() {\n  return new Builder();\n}\n"
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/infra/**/*.java'
