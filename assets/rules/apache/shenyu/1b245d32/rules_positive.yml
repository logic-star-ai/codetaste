rules:
- id: import-from-infra-package
  message: Detected import from shenyu.infra package
  severity: INFO
  languages:
  - java
  pattern-regex: import\s+org\.apache\.shenyu\.infra\.(etcd|nacos|redis|zookeeper)\.
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: builder-with-method-chaining
  message: Detected builder with method chaining in config
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "public $BUILDER $METHOD($TYPE $PARAM) {\n  ...\n  return this;\n}\n"
  - pattern-inside: "class Builder {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/**/*.java'
- id: config-getter-invoked-in-admin-listener
  message: Detected config getter invoked in admin-listener
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $CONFIG.getUrl()
    - pattern: $CONFIG.getNamespace()
    - pattern: $CONFIG.getUsername()
    - pattern: $CONFIG.getPassword()
  - pattern-inside: 'import org.apache.shenyu.infra.$MOD.$PKG;

      ...

      '
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-admin-listener-*/**/*.java'
    exclude:
    - '**/shenyu-infra-*/**'
- id: test-configuration-in-infra
  message: Detected test configuration in infra test directory
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "@Test\npublic void $METHOD() {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/src/test/**/*.java'
- id: builder-pattern-in-config-classes
  message: Detected builder pattern in infrastructure config classes
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "public static $BUILDER builder() {\n  ...\n}\n"
    - pattern: "public $TYPE build() {\n  ...\n}\n"
    - pattern: "public static class $BUILDER {\n  ...\n}\n"
  - pattern-inside: "class $CONFIG {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CONFIG
      regex: (?i).*(config|properties|settings?).*
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/**/*.java'
- id: admin-listener-etcd-class-with-infra-import
  message: Detected class in admin-listener-etcd with infra import
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "import org.apache.shenyu.infra.etcd.$PKG;\n...\nclass $CLASS {\n  ...\n\
      }\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-admin-listener-etcd/src/main/java/**/*.java'
- id: admin-listener-etcd-field-from-infra
  message: Detected field of infra type in admin-listener-etcd
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CLASS {\n  ...\n  private $TYPE $FIELD;\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)(etcd).*(config|client)
  - pattern-inside: 'import org.apache.shenyu.infra.etcd.$PKG;

      ...

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-admin-listener-etcd/**/*.java'
- id: test-class-with-test-methods-in-infra
  message: Detected test class with @Test methods in infra
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CLASS {\n  ...\n  @Test\n  public void $METHOD1() { ... }\n \
      \ ...\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/src/test/**/*.java'
- id: builder-return-type
  message: Detected builder method returning config type
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "public $TYPE build() {\n  ...\n  return ...;\n}\n"
  - pattern-inside: "class Builder {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/**/*.java'
- id: builder-with-multiple-methods
  message: Detected builder with multiple setter methods
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class Builder {\n  ...\n  public Builder $METHOD1($TYPE1 $P1) { ...\
      \ }\n  ...\n  public Builder $METHOD2($TYPE2 $P2) { ... }\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/**/*.java'
- id: builder-nested-class-in-config
  message: Detected nested Builder class in config
  severity: INFO
  languages:
  - java
  pattern: "class $CONFIG {\n  ...\n  public static class Builder {\n    ...\n  }\n\
    \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/**/*.java'
- id: condition-on-sync-etcd-annotation
  message: Detected new @ConditionOnSyncEtcd conditional annotation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: '@$ANNOTATION

        class $CLASS { ... }

        '
    - pattern: '@$ANNOTATION

        $TYPE $METHOD(...) { ... }

        '
  - metavariable-regex:
      metavariable: $ANNOTATION
      regex: (?i).*condition.*sync.*etcd.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: condition-on-sync-nacos-annotation
  message: Detected new @ConditionOnSyncNacos conditional annotation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: '@$ANNOTATION

        class $CLASS { ... }

        '
    - pattern: '@$ANNOTATION

        $TYPE $METHOD(...) { ... }

        '
  - metavariable-regex:
      metavariable: $ANNOTATION
      regex: (?i).*condition.*sync.*nacos.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: static-final-string-constant
  message: Detected static final String constant in infra
  severity: INFO
  languages:
  - java
  pattern: 'public static final String $CONST = $VALUE;

    '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/**/*.java'
- id: infra-parent-properties-inheritance
  message: Detected class extending InfraParentProperties base class
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CLASS extends $PARENT {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PARENT
      regex: (?i).*infra.*parent.*properties.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: nacos-config-with-builder
  message: Detected Nacos config with builder pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "class $CLASS {\n  ...\n  public static $BUILDER builder() { ... }\n\
        \  ...\n}\n"
    - pattern: "class $CLASS {\n  ...\n  public static class Builder {\n    ...\n\
        \  }\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(nacos).*(config|properties|acm).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-nacos/**/*.java'
- id: conditional-annotation-class-exists
  message: Detected conditional annotation class for sync
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/src/main/java/**/*Condition*.java'
    - '**/src/main/java/**/*ConditionOnSync*.java'
- id: condition-annotation-definition
  message: Detected custom condition annotation definition
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "@$ANNO\npublic @interface $NAME {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $NAME
      regex: (?i).*condition.*(sync|infra).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: import-from-springframework-boot
  message: Detected Spring Boot imports in infra config
  severity: INFO
  languages:
  - java
  pattern-regex: import\s+org\.springframework\.boot\.
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/**/*Configuration.java'
- id: import-from-springframework-context
  message: Detected Spring context imports in infra
  severity: INFO
  languages:
  - java
  pattern-regex: import\s+org\.springframework\.context\.
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/**/*.java'
- id: admin-listener-nacos-class-with-infra-import
  message: Detected class in admin-listener-nacos with infra import
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "import org.apache.shenyu.infra.nacos.$PKG;\n...\nclass $CLASS {\n  ...\n\
      }\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-admin-listener-nacos/src/main/java/**/*.java'
- id: sync-data-etcd-field-from-infra
  message: Detected field of infra type in sync-data-etcd
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CLASS {\n  ...\n  private $TYPE $FIELD;\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)(etcd).*(config|client)
  - pattern-inside: 'import org.apache.shenyu.infra.etcd.$PKG;

      ...

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-sync-data-etcd/**/*.java'
- id: etcd-config-with-builder
  message: Detected Etcd config with builder pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "class $CLASS {\n  ...\n  public static $BUILDER builder() { ... }\n\
        \  ...\n}\n"
    - pattern: "class $CLASS {\n  ...\n  public static class Builder {\n    ...\n\
        \  }\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(etcd).*(config|properties).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-etcd/**/*.java'
- id: infra-auto-configuration-class
  message: Detected auto-configuration class in infra module
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-infra-*/**/*Configuration.java'
    - '**/shenyu-infra-*/**/*AutoConfiguration.java'
- id: registry-etcd-class-with-infra-import
  message: Detected class in registry-etcd with infra import
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "import org.apache.shenyu.infra.etcd.$PKG;\n...\nclass $CLASS {\n  ...\n\
      }\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/shenyu-registry-etcd/src/main/java/**/*.java'
