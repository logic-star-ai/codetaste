- id: connection-factory-in-infra-redis
  message: Detected connection factory in centralized redis infra module
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $FACTORY {\n  ...\n  public $TYPE $METHOD(...) {\n    ...\n  }\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $FACTORY
      regex: (?i).*(factory|builder|creator).*
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i).*(create|build|get|connect).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/infra/**/redis/**/*.java'
    exclude:
    - '**/plugin/**'
