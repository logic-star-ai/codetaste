- id: infra-etcd-client-in-module
  message: Detected etcd client implementation in centralized infra module
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CLIENT {\n  ...\n  private $CLIENTTYPE $FIELD;\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLIENT
      regex: (?i).*(client|connection|connector).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/infra/**/etcd/**/*.java'
    exclude:
    - '**/admin/listener/**'
    - '**/sync/data/**'
    - '**/registry/**'
