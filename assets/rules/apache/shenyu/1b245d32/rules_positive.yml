rules:
- id: multiline-comment-block-in-new-infra
  message: Detected multi-line comment block in new infra files
  severity: INFO
  languages:
  - java
  pattern-regex: .*\* .*
  metadata:
    nr_refactored_patterns: 295
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/infra/**/*.java'
    exclude:
    - '**/test/**'
    - '**/infra/etcd/config/EtcdConfig.java'
    - '**/infra/nacos/config/NacosConfig.java'
    - '**/infra/nacos/config/NacosACMConfig.java'
    - '**/infra/redis/RedisProperties.java'
    - '**/infra/x/**'
    - '**/infra/zookeeper/**'
- id: any-import-in-new-infra-files
  message: Detected import statement in new infra files
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import $PKG.$CLASS;
  metadata:
    nr_refactored_patterns: 121
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/infra/**/*.java'
    exclude:
    - '**/test/**'
    - '**/infra/etcd/config/EtcdConfig.java'
    - '**/infra/nacos/config/NacosConfig.java'
    - '**/infra/nacos/config/NacosACMConfig.java'
    - '**/infra/redis/RedisProperties.java'
    - '**/infra/x/**'
    - '**/infra/zookeeper/**'
- id: builder-pattern-in-config-class
  message: Detected builder pattern implementation in config class
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "public static class Builder {\n  ...\n}\n"
    - pattern: "public $CLASS build() {\n  ...\n}\n"
    - pattern: "public Builder $METHOD($TYPE $PARAM) {\n  ...\n  return this;\n}\n"
  - pattern-inside: "class $CONFIG {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CONFIG
      regex: (?i).*(config|properties).*
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/infra/**/*.java'
- id: new-java-files-in-infra
  message: Detected new Java files in infra modules (excluding pre-existing)
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/infra/**/*.java'
    exclude:
    - '**/test/**'
    - '**/infra/etcd/config/EtcdConfig.java'
    - '**/infra/nacos/config/NacosConfig.java'
    - '**/infra/nacos/config/NacosACMConfig.java'
    - '**/infra/redis/RedisProperties.java'
    - '**/infra/x/**'
    - '**/infra/zookeeper/**'
- id: package-declaration-in-new-infra
  message: Detected package declaration in new infra files
