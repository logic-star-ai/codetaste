  message: Logging call on commons-logging Log object. Replace Log with SLF4J Logger.
  severity: ERROR
  languages:
  - java
  patterns:
  - pattern: $LOG.debug(...)
  - metavariable-type:
      metavariable: $LOG
      type: org.apache.commons.logging.Log
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
