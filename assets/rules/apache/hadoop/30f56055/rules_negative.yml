rules:
- id: commons-logging-log-import
  message: 'Replace commons-logging Log import with SLF4J Logger: use ''import org.slf4j.Logger;''
    instead'
  severity: ERROR
  languages:
  - java
  pattern: import org.apache.commons.logging.Log;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
