rules:
- id: socket-factory-uses-protobuf-protocol
  message: Socket factory now references DatanodeProtocolPB.class instead of DatanodeWireProtocol.class
  severity: INFO
  languages:
  - java
  pattern: NetUtils.getSocketFactory($CONF, DatanodeProtocolPB.class)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/protocolPB/DatanodeProtocolClientSideTranslatorPB.java'
- id: datanode-protocol-translator-uses-protobuf-socket
  message: Socket factory reference updated to use DatanodeProtocolPB.class instead
    of legacy DatanodeWireProtocol.class
  severity: INFO
  languages:
  - java
  pattern: 'NetUtils.getSocketFactory($CONF, DatanodeProtocolPB.class)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/protocolPB/*.java'
- id: socket-factory-datanode-protocol-pb-class
  message: Socket factory correctly references DatanodeProtocolPB.class after refactoring
    (was DatanodeWireProtocol.class)
  severity: INFO
  languages:
  - java
  pattern: NetUtils.getSocketFactory($C, DatanodeProtocolPB.class)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: datanode-protocol-pb-socket-factory
  message: DatanodeProtocolClientSideTranslatorPB now uses DatanodeProtocolPB.class
    for socket factory (was DatanodeWireProtocol.class)
  severity: INFO
  languages:
  - java
  pattern: NetUtils.getSocketFactory($CONF, DatanodeProtocolPB.class)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/DatanodeProtocolClientSideTranslatorPB.java'
- id: datanode-pb-socket-factory-refactored
  message: Socket factory reference updated to DatanodeProtocolPB.class in RPC.getProxy
    call
  severity: INFO
  languages:
  - java
  pattern: "return RPC.getProxy(DatanodeProtocolPB.class,\n    ..., NetUtils.getSocketFactory($CONF,\
    \ DatanodeProtocolPB.class));\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/DatanodeProtocolClientSideTranslatorPB.java'
- id: getproxy-with-datanodeprotocolpb
  message: RPC.getProxy uses DatanodeProtocolPB.class consistently for protocol and
    socket factory
  severity: INFO
  languages:
  - java
  pattern: RPC.getProxy(DatanodeProtocolPB.class, $VER, $ADDR, $UGI, $CONF, NetUtils.getSocketFactory($C2,
    DatanodeProtocolPB.class))
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: netsocketfactory-datanodeprotocolpb
  message: NetUtils.getSocketFactory uses DatanodeProtocolPB.class for protocol
  severity: INFO
  languages:
  - java
  pattern: NetUtils.getSocketFactory($CONFIG, DatanodeProtocolPB.class)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: datanode-pb-rpc-getproxy-full-signature
  message: Complete RPC.getProxy signature with DatanodeProtocolPB.class for both
    protocol and socket factory
  severity: INFO
  languages:
  - java
  pattern: RPC.getProxy(DatanodeProtocolPB.class, RPC.getProtocolVersion(DatanodeProtocolPB.class),
    $ADDR, $UGI, $CONF, NetUtils.getSocketFactory($C, DatanodeProtocolPB.class))
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: datanode-pb-full-getproxy-context
  message: DatanodeProtocolPB proxy creation with matching protocol class in socket
    factory after refactoring
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: RPC.getProxy(DatanodeProtocolPB.class, RPC.getProtocolVersion(DatanodeProtocolPB.class),
      $ADDR, $UGI, $CONF, NetUtils.getSocketFactory($C, DatanodeProtocolPB.class))
  - pattern-inside: "static DatanodeProtocolPB createNamenode(...) throws IOException\
      \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/DatanodeProtocolClientSideTranslatorPB.java'
- id: socket-factory-datanodeprotocolpb-in-createnameno
  message: Socket factory uses DatanodeProtocolPB.class in createNamenode method
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: NetUtils.getSocketFactory($CONF, DatanodeProtocolPB.class)
  - pattern-inside: "static DatanodeProtocolPB createNamenode(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/DatanodeProtocolClientSideTranslatorPB.java'
- id: return-rpc-getproxy-datanodeprotocolpb-full
  message: Return statement with full RPC.getProxy call using DatanodeProtocolPB consistently
  severity: INFO
  languages:
  - java
  pattern: 'return RPC.getProxy(DatanodeProtocolPB.class, RPC.getProtocolVersion(DatanodeProtocolPB.class),
    $ADDR, $UGI, $CONF, NetUtils.getSocketFactory($C, DatanodeProtocolPB.class));

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: return-getproxy-datanodeprotocolpb-socketfactory
  message: Return statement with RPC.getProxy using DatanodeProtocolPB.class in socket
    factory
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'return RPC.getProxy(DatanodeProtocolPB.class, ..., NetUtils.getSocketFactory($C,
      DatanodeProtocolPB.class));

      '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: socketfactory-datanodeprotocolpb-param
  message: Socket factory uses DatanodeProtocolPB.class, not legacy WireProtocol
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: NetUtils.getSocketFactory($C, DatanodeProtocolPB.class)
  - pattern-not: NetUtils.getSocketFactory($C, DatanodeWireProtocol.class)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: datanodeprotocolpb-getproxy-with-matching-socketfactory
  message: DatanodeProtocolPB used consistently in getProxy and socket factory within
    createNamenode
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: RPC.getProxy(DatanodeProtocolPB.class, $V, $A, $U, $C, NetUtils.getSocketFactory($C2,
      DatanodeProtocolPB.class))
  - pattern-inside: "static DatanodeProtocolPB createNamenode(...) throws IOException\
      \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: return-statement-with-datanodeprotocolpb-getproxy
  message: Return statement in createNamenode uses DatanodeProtocolPB consistently
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'return RPC.getProxy(DatanodeProtocolPB.class, ..., NetUtils.getSocketFactory(...,
      DatanodeProtocolPB.class));

      '
  - pattern-inside: "static DatanodeProtocolPB createNamenode(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: socketfactory-datanodeprotocolpb-in-static-method
  message: Socket factory with DatanodeProtocolPB.class in static method returning
    DatanodeProtocolPB
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: NetUtils.getSocketFactory($CONF, DatanodeProtocolPB.class)
  - pattern-inside: "static DatanodeProtocolPB $METHOD(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: rpc-getproxy-datanodeprotocolpb-complete-call
  message: Complete RPC.getProxy call with DatanodeProtocolPB throughout all parameters
  severity: INFO
  languages:
  - java
  pattern: RPC.getProxy(DatanodeProtocolPB.class, RPC.getProtocolVersion(DatanodeProtocolPB.class),
    $ADDR, $UGI, $CONF, NetUtils.getSocketFactory($CONF, DatanodeProtocolPB.class))
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: getprotocolversion-inside-getproxy-datanodeprotocolpb
  message: RPC.getProtocolVersion for DatanodeProtocolPB inside getProxy call with
    matching socket factory
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: RPC.getProtocolVersion(DatanodeProtocolPB.class)
  - pattern-inside: 'RPC.getProxy(DatanodeProtocolPB.class, ..., NetUtils.getSocketFactory(...,
      DatanodeProtocolPB.class))

      '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: datanodeprotocolpb-socketfactory-no-wireprotocol
  message: Socket factory uses DatanodeProtocolPB.class not WireProtocol in return
    statement
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: NetUtils.getSocketFactory($C, DatanodeProtocolPB.class)
  - pattern-not: NetUtils.getSocketFactory($C, DatanodeWireProtocol.class)
  - pattern-inside: 'return RPC.getProxy(DatanodeProtocolPB.class, ...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
