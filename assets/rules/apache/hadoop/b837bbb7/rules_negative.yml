rules:
- id: detect-server-protocolr23-package-declaration
  message: Package org.apache.hadoop.hdfs.server.protocolR23Compatible should be removed
    - R23 compatibility layer no longer needed
  severity: ERROR
  languages:
  - java
  pattern: package org.apache.hadoop.hdfs.server.protocolR23Compatible;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-writable-convert-method-call
  message: Writable.convert() method call should be removed - use Protocol Buffers
    conversion instead
  severity: ERROR
  languages:
  - java
  pattern-either:
  - pattern: BlockWritable.convert(...)
  - pattern: DatanodeInfoWritable.convert(...)
  - pattern: ExtendedBlockWritable.convert(...)
  - pattern: LocatedBlockWritable.convert(...)
  - pattern: LocatedBlocksWritable.convert(...)
  - pattern: ContentSummaryWritable.convert(...)
  - pattern: DirectoryListingWritable.convert(...)
  - pattern: CheckpointSignatureWritable.convert(...)
  - pattern: StorageInfoWritable.convert(...)
  - pattern: DatanodeRegistrationWritable.convert(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-client-side-translator-r23-class
  message: TranslatorR23 class should be removed - R23 compatibility layer no longer
    needed
  severity: ERROR
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/*TranslatorR23.java'
- id: detect-datanode-wire-protocol-reference
  message: DatanodeWireProtocol reference should be removed - use DatanodeProtocol
    with Protocol Buffers
  severity: ERROR
  languages:
  - java
  pattern-either:
  - pattern: DatanodeWireProtocol.class
  - pattern: DatanodeWireProtocol $VAR;
  - pattern: implements DatanodeWireProtocol
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-client-datanode-wire-protocol-reference
  message: ClientDatanodeWireProtocol reference should be removed - use ClientDatanodeProtocol
    with Protocol Buffers
  severity: ERROR
  languages:
  - java
  pattern-either:
  - pattern: ClientDatanodeWireProtocol.class
  - pattern: ClientDatanodeWireProtocol $VAR;
  - pattern: implements ClientDatanodeWireProtocol
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-writable-array-type
  message: Writable array type should be removed - use Protocol Buffers types instead
  severity: ERROR
  languages:
  - java
  pattern-either:
  - pattern: BlockWritable[] $VAR
  - pattern: DatanodeInfoWritable[] $VAR
  - pattern: ExtendedBlockWritable[] $VAR
  - pattern: LocatedBlockWritable[] $VAR
  - pattern: new BlockWritable[$SIZE]
  - pattern: new DatanodeInfoWritable[$SIZE]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-namenode-wire-protocol-reference
  message: NamenodeWireProtocol reference should be removed - use NamenodeProtocol
    with Protocol Buffers
  severity: ERROR
  languages:
  - java
  pattern-either:
