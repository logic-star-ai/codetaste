  - pattern: implements NamenodeWireProtocol
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-writable-method-parameter
  message: Method parameter using Writable type should be updated to use Protocol
    Buffers type
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: "$RET_TYPE $METHOD(BlockWritable $PARAM, ...) {\n  ...\n}\n"
  - pattern: "$RET_TYPE $METHOD(DatanodeInfoWritable $PARAM, ...) {\n  ...\n}\n"
  - pattern: "$RET_TYPE $METHOD(ExtendedBlockWritable $PARAM, ...) {\n  ...\n}\n"
  - pattern: "$RET_TYPE $METHOD(LocatedBlockWritable $PARAM, ...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-located-block-writable-new
  message: LocatedBlockWritable instantiation should be removed - use Protocol Buffers
    types instead
  severity: ERROR
  languages:
  - java
  pattern: new LocatedBlockWritable(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
