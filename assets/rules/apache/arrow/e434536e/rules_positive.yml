rules:
- id: import-test-util-internal-in-compute
  message: Import of test_util_internal.h from compute kernels detected
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern: '#include "arrow/compute/kernels/test_util_internal.h"'
  metadata:
    category: dependency
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: kernel-test-imports-test-util-internal
  message: Kernel test imports test_util_internal.h
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern: '#include "arrow/compute/kernels/test_util_internal.h"'
  metadata:
    category: dependency
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - cpp/src/arrow/compute/kernels/*test*.cc
- id: cmake-link-arrow-compute-testing
  message: arrow_compute_testing linked in test CMakeLists
  severity: INFO
  languages:
  - generic
  pattern-regex: arrow_compute_testing
  metadata:
    category: architecture
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - cpp/src/arrow/compute/CMakeLists.txt
    - cpp/src/arrow/acero/CMakeLists.txt
