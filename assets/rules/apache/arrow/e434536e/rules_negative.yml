rules:
- id: old-test-util-include-statement
  message: Include statement should be updated to use test_util_internal.h instead
    of test_util.h
  severity: WARNING
  languages:
  - cpp
  pattern: '#include "arrow/compute/kernels/test_util.h"

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: old-kernels-test-util-include-quotes
  message: Include should reference test_util_internal.h instead of test_util.h after
    refactoring
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#include\s+"arrow/compute/kernels/test_util\.h"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: test-util-function-forward-declaration
  message: Check* function declarations in test_util.h should be in test_util_internal.h
  severity: WARNING
  languages:
  - cpp
  pattern-regex: void\s+Check\w+\s*\([^)]*\)\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - cpp/src/arrow/compute/kernels/test_util.h
- id: test-util-source-arrow-includes
  message: test_util.cc includes Arrow headers; file should be renamed to test_util_internal.cc
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#include\s+"arrow/(array|compute|datum|testing)/'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - cpp/src/arrow/compute/kernels/test_util.cc
