rules:
- id: old-runtime-security-dir-exists
  message: Directory src/runtime/security/ should not exist after module extraction
    to src/security/
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
  paths:
    include:
    - src/runtime/security/
- id: any-file-in-runtime-security-directory
  message: All files in src/runtime/security/ should be moved to src/security/ after
    module extraction
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
  paths:
    include:
    - src/runtime/security/*
- id: security-module-in-old-location-check
  message: Security module files should be relocated from src/runtime/security/ to
    src/security/
  severity: WARNING
  languages:
  - cpp
  - c
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
  paths:
    include:
    - src/runtime/security/*.cpp
    - src/runtime/security/*.h
- id: old-runtime-security-path-in-source
  message: Update file path references from 'runtime/security/' to 'security/' after
    module extraction
  severity: INFO
  languages:
  - generic
  pattern-regex: runtime/security/[a-zA-Z_]+\.(cpp|h)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    exclude:
    - '*.md'
    - HISTORY.md
- id: old-include-runtime-security-generic-pattern
  message: Update include path from 'runtime/security/*.h' to 'security/*.h' after
    security module extraction
  severity: WARNING
  languages:
  - cpp
  - c
  pattern-regex: '#include\s+"runtime/security/[^"]+\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: old-include-double-quotes-runtime-security
  message: Update include path from 'runtime/security/*.h' to 'security/*.h' (double
    quotes)
  severity: WARNING
  languages:
  - cpp
  - c
  pattern-regex: '#include\s+"runtime/security/[a-zA-Z_]+\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: old-include-path-with-various-spacing
  message: Update include path from 'runtime/security/*.h' to 'security/*.h' (handle
    various spacing)
  severity: WARNING
  languages:
  - cpp
  - c
  pattern-regex: '#\s*include\s+"runtime\s*/\s*security\s*/\s*[a-zA-Z_]+\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: old-security-namespace-in-runtime-path
  message: Security namespace declarations should be in src/security/ files, not src/runtime/security/
  severity: WARNING
  languages:
  - cpp
  - c
  pattern-regex: namespace\s+dsn\s*\{[^}]*namespace\s+security
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - src/runtime/security/*.h
    - src/runtime/security/*.cpp
- id: include-runtime-security-with-trailing-space
  message: Update include path from 'runtime/security/*.h' to 'security/*.h' after
    module extraction
  severity: WARNING
  languages:
  - cpp
  - c
  pattern-regex: '#include\s+"runtime/security/[a-zA-Z_]+\.h"\s*$'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: include-runtime-security-lowercase
  message: Update include from 'runtime/security/*.h' to 'security/*.h' after security
    module extraction
  severity: WARNING
  languages:
  - cpp
  - c
  pattern-regex: '#include\s*"runtime/security/[a-z_]+\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: include-quotes-runtime-security-any
  message: Update string literal path from 'runtime/security/' to 'security/' after
    module extraction
  severity: WARNING
  languages:
  - cpp
  - c
  pattern-regex: '"runtime/security/[^"]+"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: cpp-include-runtime-security-general
  message: Update references from 'runtime/security' to 'security' throughout C++
    source files
  severity: WARNING
  languages:
  - cpp
  - c
  pattern-regex: runtime/security
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - '*.cpp'
    - '*.h'
    - '*.cc'
    - '*.hpp'
    exclude:
    - '*.md'
