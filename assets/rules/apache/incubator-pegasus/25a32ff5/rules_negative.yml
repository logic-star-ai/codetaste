rules:
- id: extern-c-block-in-runtime-task
  message: Extern C block in 'src/runtime/task/' should be moved to 'src/task/' as
    part of module extraction
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: extern "C" { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1129
  paths:
    include:
    - src/runtime/task/*.h
- id: old-include-runtime-task-generic-pattern
  message: Update include path from 'runtime/task/...' to 'task/...' after task module
    extraction
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+"runtime/task/[^"]+"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 415
- id: string-literal-runtime-task-path
  message: Update string literal to reference 'task/...' instead of 'runtime/task/...'
    after task module extraction
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '"[^"]*runtime/task/[^"]*"'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 415
- id: include-with-newline-runtime-task
  message: Update include path from 'runtime/task/...' to 'task/...' after task module
    extraction
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+"runtime/task/[^"]+"\s*$'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 415
- id: any-runtime-task-include-catch-all
  message: Update include path from 'runtime/task/...' to 'task/...' for task module
    extraction
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#include.*runtime/task/'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 415
- id: runtime-task-in-error-message
  message: Update reference to task module files from 'runtime/task/...' to 'task/...'
    in code
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: runtime/task/[a-zA-Z_][a-zA-Z0-9_]*\.(?:h|cpp)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 413
  paths:
    include:
    - '**/*.cpp'
    - '**/*.h'
