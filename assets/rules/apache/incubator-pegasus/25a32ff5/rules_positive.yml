    - src/replica/**/*.cpp
    - src/replica/**/*.h
- id: refactor-task-task-h-near-beginning-of-file
  message: File includes task/task.h near the beginning (early dependency on task
    module)
  severity: INFO
  languages:
  - cpp
  pattern-regex: (?s)\A.{0,2000}#include\s+"task/task\.h"
  metadata:
