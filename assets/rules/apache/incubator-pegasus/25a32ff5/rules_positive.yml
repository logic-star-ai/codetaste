rules:
- id: refactor-task-include-any-task-header
  message: Detected refactored include path for task module headers (task/* instead
    of runtime/task/*)
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#include\s+"task/[^"]+\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 392
    nr_legacy_patterns: 0
- id: refactor-task-multiple-includes-same-file
  message: File uses new task include paths without runtime/task prefix
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-either:
    - pattern: '#include "task/task.h"'
    - pattern: '#include "task/async_calls.h"'
    - pattern: '#include "task/task_code.h"'
  - pattern-not: '#include "runtime/task/$FILE"'
  metadata:
    category: structural
    nr_refactored_patterns: 263
    nr_legacy_patterns: 0
- id: refactor-task-include-multiple-line-style
  message: Multiple consecutive task includes from new module location
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#include\s+"task/\w+\.h"\s*\n\s*#include\s+"task/\w+\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 121
    nr_legacy_patterns: 0
- id: refactor-task-include-task-code-h
  message: Detected refactored include path for task_code.h (task/task_code.h instead
    of runtime/task/task_code.h)
  severity: INFO
  languages:
  - cpp
  pattern: '#include "task/task_code.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 114
    nr_legacy_patterns: 0
- id: refactor-task-code-standalone-include
  message: Standalone include of task_code.h from new module (task type definitions)
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#include\s+"task/task_code\.h"'
  metadata:
    category: basic
    nr_refactored_patterns: 114
    nr_legacy_patterns: 0
- id: refactor-task-multiple-task-includes-in-file
  message: File contains multiple task module includes using new path structure
  severity: INFO
  languages:
  - cpp
  pattern-regex: (?s)#include\s+"task/[^"]+\.h".*#include\s+"task/[^"]+\.h"
  metadata:
    category: structural
    nr_refactored_patterns: 113
    nr_legacy_patterns: 0
- id: refactor-task-include-ordered-after-other-runtime
  message: Task includes appear after other runtime includes (modular separation)
  severity: INFO
  languages:
  - cpp
  pattern-regex: (?s)#include\s+"runtime/[^"]+\.h".*#include\s+"task/[^"]+\.h"
  metadata:
    category: structural
    nr_refactored_patterns: 107
    nr_legacy_patterns: 0
- id: refactor-task-include-task-h
  message: Detected refactored include path for task.h (task/task.h instead of runtime/task/task.h)
  severity: INFO
  languages:
  - cpp
  pattern: '#include "task/task.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 87
    nr_legacy_patterns: 0
- id: refactor-task-include-task-h-with-whitespace-variations
  message: Detected refactored include for task/task.h (with whitespace variations)
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#\s*include\s+"task/task\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 87
    nr_legacy_patterns: 0
- id: refactor-task-include-in-replica
  message: Detected refactored task includes in replica module
  severity: INFO
