rules:
- id: detect-new-with-prefix-in-comments
  message: Detected new_with_* method name in code or comments
  severity: INFO
  languages:
  - rust
  pattern-regex: (new_with_config|new_with_config_rt|new_with_state|new_with_config_rt_and_catalog_list)
  metadata:
    category: other
    nr_refactored_patterns: 123
    nr_legacy_patterns: 0
- id: detect-new-with-any-method-in-code
  message: Detected any new_with_* method name in code
  severity: INFO
  languages:
  - rust
  pattern-regex: new_with_(config|config_rt|state|config_rt_and_catalog_list)
  metadata:
    category: api
    nr_refactored_patterns: 123
    nr_legacy_patterns: 0
- id: detect-any-new-with-pattern-in-code
  message: Detected new_with_* pattern in SessionContext or SessionState
  severity: INFO
  languages:
  - rust
  pattern-regex: (SessionContext|SessionState)::(new_with_config|new_with_config_rt|new_with_state|new_with_config_rt_and_catalog_list)\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 103
    nr_legacy_patterns: 0
- id: detect-refactored-constructor-pattern
  message: Detected refactored constructor pattern (new_with_* methods)
  severity: INFO
  languages:
  - rust
  pattern-either:
  - pattern: SessionContext::new_with_config($X)
  - pattern: SessionContext::new_with_config_rt($X, $Y)
  - pattern: SessionContext::new_with_state($X)
  - pattern: SessionState::new_with_config_rt($X, $Y)
  metadata:
    category: api
    nr_refactored_patterns: 102
    nr_legacy_patterns: 0
- id: detect-sessioncontext-constructor-renamed-from-with
  message: Detected renamed SessionContext constructor (new_with_* instead of with_*)
  severity: INFO
  languages:
  - rust
  pattern-regex: SessionContext::new_with_(config|config_rt|state)
  metadata:
    category: api
    nr_refactored_patterns: 94
    nr_legacy_patterns: 0
- id: detect-any-new-with-config-method-call
  message: Detected any SessionContext new_with_* constructor method
  severity: INFO
  languages:
  - rust
  pattern-either:
  - pattern: SessionContext::new_with_config(...)
  - pattern: SessionContext::new_with_config_rt(...)
  - pattern: SessionContext::new_with_state(...)
  metadata:
    category: api
    nr_refactored_patterns: 92
    nr_legacy_patterns: 0
- id: detect-sessioncontext-new-with-config-call
  message: Detected usage of new SessionContext::new_with_config constructor
  severity: INFO
  languages:
  - rust
  pattern: SessionContext::new_with_config($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 78
    nr_legacy_patterns: 0
- id: detect-new-with-config-semicolon-statement
  message: Detected SessionContext::new_with_config as statement with semicolon
  severity: INFO
  languages:
  - rust
  pattern: 'SessionContext::new_with_config($CONFIG);

    '
  metadata:
    category: api
    nr_refactored_patterns: 78
    nr_legacy_patterns: 0
- id: detect-new-with-config-result-expression
  message: Detected SessionContext::new_with_config expression (general match)
  severity: INFO
  languages:
  - rust
  pattern: 'SessionContext::new_with_config($CONFIG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 78
    nr_legacy_patterns: 0
- id: detect-new-with-config-standalone-expression
  message: Detected SessionContext::new_with_config as standalone expression (not
