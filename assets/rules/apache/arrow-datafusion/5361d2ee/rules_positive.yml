  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: SessionContext::new_with_config($C)
  - pattern-not: let $X = SessionContext::new_with_config($C)
  - pattern-not: let mut $X = SessionContext::new_with_config($C)
