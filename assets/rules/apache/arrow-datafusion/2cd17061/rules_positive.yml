rules:
- id: statistics-new-with-precision-fields
  message: Detected Statistics struct construction (check if fields use Precision
    types)
  severity: INFO
  languages:
  - rust
  pattern: "Statistics {\n  num_rows: $ROWS,\n  total_byte_size: $BYTES,\n  column_statistics:\
    \ $COLS,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
- id: statistics-field-with-vec-column-stats
  message: Detected Statistics construction with column_statistics as direct Vec
  severity: INFO
  languages:
  - rust
  pattern: "Statistics {\n  $FIELD1: $VAL1,\n  $FIELD2: $VAL2,\n  column_statistics:\
    \ $VEC,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
- id: precision-get-value-method-call
  message: Detected call to Precision::get_value() method
  severity: INFO
  languages:
  - rust
  pattern: $EXPR.get_value()
