- id: map-column-statistics-option
  message: Mapping over column_statistics Option - should be Vec<ColumnStatistics>
    directly
  severity: WARNING
  languages:
  - rust
  pattern: '$STATS.column_statistics.map(|$VAR| $EXPR)

    '
  metadata:
