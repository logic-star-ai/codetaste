- id: combine-statistics-using-is-exact
  message: Combining statistics using is_exact - use per-field Precision propagation
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: '$STATS1.is_exact && $STATS2.is_exact

      '
  - pattern: '$STATS1.is_exact || $STATS2.is_exact

      '
  metadata:
