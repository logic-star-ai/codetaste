rules:
- id: stats-default-creation
  message: Using Statistics::default() - verify it uses Precision types with Absent,
    not Option::None
  severity: INFO
  languages:
  - rust
  pattern: Statistics::default()
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: statistics-construction-with-is-exact-field
  message: Statistics struct construction with is_exact field - use per-field Precision
    types instead
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: "Statistics {\n  num_rows: $NR,\n  total_byte_size: $TBS,\n  column_statistics:\
      \ $CS,\n  is_exact: $IE,\n}\n"
  - pattern: "Statistics {\n  is_exact: $IE,\n  num_rows: $NR,\n  total_byte_size:\
      \ $TBS,\n  column_statistics: $CS,\n}\n"
  - pattern: "Statistics {\n  num_rows: $NR,\n  is_exact: $IE,\n  total_byte_size:\
      \ $TBS,\n  column_statistics: $CS,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: option-as-ref-on-column-statistics
  message: Using Option as_ref/as_mut on column_statistics - should be Vec<ColumnStatistics>
    directly
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: $STATS.column_statistics.as_ref()
  - pattern: $STATS.column_statistics.as_mut()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: option-map-or-on-num-rows
  message: Using Option methods on num_rows - should use Precision<usize> and get_value()
    instead
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: $STATS.num_rows.map_or($DEFAULT, $FUNC)
  - pattern: $STATS.num_rows.map_or_else($DEFAULT_FN, $FUNC)
  - pattern: $STATS.num_rows.map($FUNC)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: option-unwrap-on-column-statistics
  message: Unwrapping column_statistics Option - should be Vec<ColumnStatistics> (always
    present) instead
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: $STATS.column_statistics.unwrap()
  - pattern: $STATS.column_statistics.unwrap_or($DEFAULT)
  - pattern: $STATS.column_statistics.expect($MSG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: if-stats-is-exact-condition
  message: Using is_exact in if condition - use per-field Precision checking
  severity: WARNING
  languages:
  - rust
  pattern: 'if $STATS.is_exact { $...BODY }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: stats-is-exact-logical-and
  message: Using is_exact in logical AND - use per-field Precision checking
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: $STATS.is_exact && $X
  - pattern: $X && $STATS.is_exact
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: column-stats-scalar-value-unwrap
  message: Unwrapping ColumnStatistics scalar value - should use Precision and get_value()
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: $COL.max_value.unwrap()
  - pattern: $COL.min_value.unwrap()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: option-zip-on-stats-field
  message: Using zip() on Statistics Option field - should use Precision methods
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: $STATS.num_rows.zip($OTHER)
  - pattern: $STATS.total_byte_size.zip($OTHER)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: option-map-or-on-total-byte-size
  message: Using Option methods on total_byte_size - should use Precision<usize> and
    get_value() instead
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: $STATS.total_byte_size.map_or($DEFAULT, $FUNC)
  - pattern: $STATS.total_byte_size.map_or_else($DEFAULT_FN, $FUNC)
  - pattern: $STATS.total_byte_size.map($FUNC)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: if-let-some-column-statistics
  message: Using if-let-Some pattern on column_statistics - should be Vec<ColumnStatistics>
    always present
  severity: WARNING
  languages:
  - rust
  pattern: 'if let Some($VAR) = $STATS.column_statistics { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: option-expect-on-column-statistics
  message: Using expect() on column_statistics - should be Vec<ColumnStatistics> directly
  severity: WARNING
  languages:
  - rust
  pattern: $STATS.column_statistics.expect($MSG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
