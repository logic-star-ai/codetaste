  pattern-regex: '@[Dd]eprecated.*\n.*\s+(over|on|withGap|every|preceding|partitionBy|orderBy)\s*\(\s*String\s+\w+\s*\)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/Tumble*.java'
    - '**/Slide*.java'
    - '**/Session*.java'
    - '**/Over*.java'
