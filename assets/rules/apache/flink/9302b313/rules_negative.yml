rules:
- id: expressionparser-instance-access
  message: ExpressionParser.INSTANCE has been removed. Use typed Expression API
  severity: WARNING
  languages:
  - java
  pattern: ExpressionParser.INSTANCE
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: parse-expression-method-call
  message: Call to parseExpression with string literal should be replaced with typed
    Expression
  severity: WARNING
  languages:
  - java
  - scala
  pattern-regex: \.parseExpression\s*\(\s*"[^"]*"\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: deprecated-table-method-with-string-param
  message: Deprecated Table API method with String parameter should be removed
  severity: WARNING
  languages:
  - java
  pattern-regex: '@Deprecated.*\n.*\s+(select|filter|where|groupBy|orderBy|join|leftOuterJoin|rightOuterJoin|fullOuterJoin|addColumns|renameColumns|dropColumns|map|flatMap|aggregate|flatAggregate)\s*\(\s*String\s+'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: expressionparser-import
  message: ExpressionParser has been removed. Migrate to typed Expression API using
    $(...)  or col(...)
  severity: WARNING
  languages:
  - java
  pattern: import org.apache.flink.table.delegation.ExpressionParser;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: expressionparser-list-usage
  message: ExpressionParser.parseExpressionList() has been removed. Use typed Expression
    API
  severity: WARNING
  languages:
  - java
  pattern: $PARSER.parseExpressionList($STR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: package-declaration-stringexpr
  message: Package declaration for stringexpr test package should be removed
  severity: WARNING
  languages:
  - scala
  - java
  pattern: package org.apache.flink.table.planner.plan.$STREAM.table.stringexpr
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: scala-string-expression-test-pattern
  message: Reference to 'stringexpr' test package should be removed
  severity: WARNING
  languages:
  - scala
  - java
  pattern-regex: stringexpr
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - '**/*Test*.scala'
    - '**/*Test*.java'
- id: deprecated-table-api-signature-regex
  message: Deprecated Table API method signature with String parameter should be removed
  severity: WARNING
  languages:
  - java
  pattern-regex: '@Deprecated\s*\n\s*(default\s+)?Table\s+(select|filter|where|orderBy|addColumns|renameColumns|dropColumns|map|flatMap)\s*\(\s*String\s+\w+\s*\)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
