  message: String expression validation test class should be removed or migrated
  severity: WARNING
  languages:
  - scala
  - java
  pattern-regex: class\s+\w*StringExpr\w*Test
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: table-api-string-test-class
  message: Test class for string expression API should be removed or renamed
  severity: WARNING
  languages:
  - scala
  - java
  pattern-regex: class\s+\w*String\w*Expr\w*(Test|ITCase|Suite)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - '**/*Test*.scala'
    - '**/*Test*.java'
    - '**/*ITCase*.scala'
    - '**/*ITCase*.java'
- id: table-impl-string-method-override
  message: Override of deprecated string-based Table method should be removed from
    implementation
  severity: WARNING
  languages:
  - java
  pattern-regex: '@Override.*\n.*public\s+Table\s+(select|filter|where|groupBy|orderBy)\s*\(\s*String\s+\w+\s*\)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '**/*TableImpl*.java'
    - '**/*Table.java'
