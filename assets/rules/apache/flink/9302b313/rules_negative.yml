  message: Reference to stringexpr test package should be removed
  severity: WARNING
  languages:
  - java
  - scala
  pattern-regex: org\.apache\.flink\.table\.planner\.plan\.(batch|stream)\.table\.stringexpr
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
