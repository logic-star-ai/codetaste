rules:
- id: python-call-function-migrated
  message: Python call function invocation in migrated code
  severity: INFO
  languages:
  - python
  pattern: call($FUNC, $ARGS)
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tests/test_expression.py'
- id: python-col-in-udaf-tests-fixed
  message: Python col() in UDAF tests fixed
  severity: INFO
  languages:
  - python
  pattern: col($FIELD)
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*udaf*.py'
    exclude:
    - '**/examples/**'
    - '**/tests/test_udaf.py'
- id: python-lit-in-udaf-tests
  message: Python lit() in UDAF tests
  severity: INFO
  languages:
  - python
  pattern: lit($VALUE)
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*udaf*.py'
    exclude:
    - '**/examples/**'
- id: python-lit-in-pandas-tests-fixed
  message: Python lit() in pandas-related tests
  severity: INFO
  languages:
  - python
  pattern: lit($VALUE)
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*pandas*.py'
    exclude:
    - '**/examples/**'
- id: python-group-by-multiple-in-udaf
  message: Python group_by() with multiple args in UDAF tests
  severity: INFO
  languages:
  - python
  pattern: $T.group_by($E1, $E2, ...)
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*udaf*.py'
    exclude:
    - '**/examples/**'
    - '**/tests/test_udaf.py'
- id: python-group-by-excluding-common-tests
  message: Python group_by() excluding common test files
  severity: INFO
  languages:
  - python
  pattern: $T.group_by($E1, $E2, $E3)
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tests/test_expression.py'
    - '**/tests/test_column_operation.py'
    - '**/tests/test_table_environment_api.py'
    - '**/tests/test_catalog.py'
- id: python-call-in-select
  message: Python call() function used in select
  severity: INFO
  languages:
  - python
  pattern: $T.select(..., call($F, ...), ...)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tests/test_expression.py'
- id: python-call-with-multiple-args
  message: Python call() with multiple arguments
  severity: INFO
  languages:
  - python
  pattern: call($FUNC, $ARG1, $ARG2, ...)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tests/test_expression.py'
- id: python-select-five-exprs-strict
  message: Python select() with five expressions strict
  severity: INFO
  languages:
  - python
  pattern: $T.select($E1, $E2, $E3, $E4, $E5)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tests/test_expression.py'
    - '**/tests/test_column_operation.py'
    - '**/tests/test_table_environment_api.py'
    - '**/tests/test_catalog.py'
    - '**/tests/test_dependency.py'
    - '**/tests/test_udaf.py'
