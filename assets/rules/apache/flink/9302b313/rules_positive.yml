rules:
- id: python-select-expression-in-table-tests
  message: Python select with Expression in table test files
  severity: INFO
  languages:
  - python
  pattern-regex: \.select\([^'\"]+col\(
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pyflink/table/**/test_*.py'
    - '**/pyflink/table/**/*_test.py'
    exclude:
    - '**/datastream/**'
- id: python-multiple-col-in-select-table-tests
  message: Python multiple col() calls in select in table tests
  severity: INFO
  languages:
  - python
  pattern-regex: \.select\(.*col\(.*col\(
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pyflink/table/**/test_*.py'
    exclude:
    - '**/datastream/**'
- id: python-aggregate-with-call-sum
  message: Python aggregate with call(sum, ...)
  severity: INFO
  languages:
  - python
  pattern-regex: call\(.*sum.*col\(|call\(.*count.*col\(|call\(.*avg.*col\(
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pyflink/table/**/test_*.py'
    exclude:
    - '**/datastream/**'
    - '**/test_stream_execution_environment.py'
- id: python-from-expressions-import-call
  message: Python import call from expressions
  severity: INFO
  languages:
  - python
  pattern-regex: from pyflink\.table\.expressions import.*\bcall\b
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pyflink/table/**/test_*.py'
    exclude:
    - '**/datastream/**'
- id: python-table-api-chain-with-expressions
  message: Python table API method chain with expressions
  severity: INFO
  languages:
  - python
  pattern-regex: \.(select|where|filter|group_by)\([^)]*col\([^)]*\)\s*\)\s*\.
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pyflink/table/**/test_*.py'
    exclude:
    - '**/datastream/**'
- id: python-col-dot-cast-table-tests
  message: Python col().cast() in table tests
  severity: INFO
  languages:
  - python
  pattern-regex: col\([^)]+\)\.cast\(
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pyflink/table/**/test_*.py'
    exclude:
    - '**/datastream/**'
- id: python-over-with-col-table-tests
  message: Python over() with col() in table tests
  severity: INFO
  languages:
  - python
  pattern-regex: \.over\([^)]*col\(
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pyflink/table/**/test_*.py'
    exclude:
    - '**/datastream/**'
    - '**/test_stream_execution_environment.py'
