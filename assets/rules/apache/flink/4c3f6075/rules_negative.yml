rules:
- id: detect-stateful-task-import
  message: 'Old pattern: Import of StatefulTask interface detected. This interface
    has been removed.'
  severity: WARNING
  languages:
  - java
  pattern: import org.apache.flink.runtime.jobgraph.tasks.StatefulTask;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-package-stateful-task-import
  message: 'Old pattern: Importing StatefulTask without wildcard. This interface has
    been removed.'
  severity: WARNING
  languages:
  - java
  pattern: import org.apache.flink.runtime.jobgraph.tasks.StatefulTask
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-stateful-task-qualified-import
  message: 'Old pattern: Qualified import of StatefulTask. This interface has been
    removed.'
  severity: WARNING
  languages:
  - java
  pattern: import org.apache.flink.runtime.jobgraph.tasks.StatefulTask;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-stateful-task-variable-declaration
  message: 'Old pattern: Variable with StatefulTask type. This interface has been
    removed.'
  severity: WARNING
  languages:
  - java
  pattern: 'StatefulTask $VAR = ...;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-class-literal-stateful-task
  message: 'Old pattern: Class literal for StatefulTask. This interface has been removed.'
  severity: WARNING
  languages:
  - java
  pattern: 'StatefulTask.class

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-test-creating-task-without-env
  message: 'Old pattern: Creating task in test without Environment parameter. Tasks
    now require Environment in constructor.'
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $TASK task = new $TYPE();
  - pattern-not: $TASK task = new $TYPE($ENV);
  - pattern-not: $TASK task = new $TYPE($ENV, $STATE);
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/*Test.java'
    - '**/*Test*.java'
- id: detect-implements-stateful-task-multiline
  message: 'Old pattern: Class implements StatefulTask interface. This interface has
    been removed.'
  severity: WARNING
  languages:
  - java
  pattern-regex: implements\s+StatefulTask
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-stateful-task-method-override-annotation
  message: 'Old pattern: @Override annotation on setInitialState(). This method is
    from removed StatefulTask interface.'
  severity: WARNING
  languages:
  - java
  pattern: "@Override\n$RET setInitialState(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-stream-task-test-set-environment
  message: 'Old pattern: Setting environment on streamTask variable. Pass Environment
    via constructor.'
  severity: WARNING
  languages:
  - java
  pattern: 'streamTask.setEnvironment($ENV)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-stateful-task-method-set-initial-state
  message: 'Old pattern: setInitialState() method from StatefulTask interface. After
    refactoring, initial state should be passed via constructor.'
  severity: WARNING
  languages:
  - java
  pattern: "void setInitialState(TaskStateSnapshot $STATE) throws Exception {\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-stateful-task-method-setInitialState-override
  message: 'Old pattern: Override of setInitialState() from StatefulTask. State should
    be passed via constructor instead.'
  severity: WARNING
  languages:
  - java
  pattern: "@Override\npublic void setInitialState(TaskStateSnapshot $STATE) throws\
    \ Exception {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-stateful-task-interface-implementation-single
  message: 'Old pattern: Class implements StatefulTask interface. This interface has
    been removed and its methods moved to AbstractInvokable.'
  severity: WARNING
  languages:
  - java
  pattern: 'class $CLASS extends $PARENT implements StatefulTask { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-checkpoint-methods-in-interface-file
  message: 'Old pattern: Checkpoint method declarations in interface. These should
    be moved to AbstractInvokable.'
  severity: WARNING
  languages:
  - java
  pattern-regex: boolean\s+triggerCheckpoint|void\s+triggerCheckpointOnBarrier|void\s+abortCheckpointOnBarrier|void\s+notifyCheckpointComplete
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/StatefulTask.java'
- id: detect-stateful-task-type-cast
  message: 'Old pattern: Cast to StatefulTask interface. This interface has been removed.'
  severity: WARNING
  languages:
  - java
  pattern: '(StatefulTask) $OBJ

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
