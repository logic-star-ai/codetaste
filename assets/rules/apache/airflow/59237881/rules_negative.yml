rules:
- id: dag-schedule-interval-keyword-arg
  message: Replace 'schedule_interval' parameter with 'schedule' in DAG instantiation
  severity: WARNING
  languages:
  - python
  pattern: 'DAG(..., schedule_interval=$VAL, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 148
  paths:
    exclude:
    - airflow/models/dag.py
    - tests/system/*
    - '*/serialization/*'
- id: dag-assignment-schedule-interval
  message: Replace deprecated 'schedule_interval' parameter with 'schedule' parameter
    in DAG assignment
  severity: WARNING
  languages:
  - python
  pattern: '$DAG = DAG(..., schedule_interval=$INTERVAL, ...)

    '
  metadata:
