- id: dag-schedule-interval-cron-expression
  message: Replace 'schedule_interval' with 'schedule' parameter for cron expressions
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: DAG(..., schedule_interval="$CRON", ...)
  - metavariable-regex:
      metavariable: $CRON
      regex: ^(@(once|hourly|daily|weekly|monthly|yearly)|[0-9*/ ]+)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 71
  paths:
    exclude:
    - airflow/models/dag.py
    - tests/system/*
