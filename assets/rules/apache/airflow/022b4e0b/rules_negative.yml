rules:
- id: provider-test-ti-with-execution-date
  message: Provider tests should create TaskInstance with run_id (ensure DagRun exists
    first)
  severity: WARNING
  languages:
  - python
  pattern: 'ti = TaskInstance(task=$TASK, execution_date=$DATE)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
  paths:
    include:
    - '**/providers/**/test_*.py'
- id: scheduler-change-state-without-dagrun
