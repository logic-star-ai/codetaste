    TaskInstances no longer possible with FK constraint)
  severity: ERROR
  languages:
  - python
  pattern-either:
  - pattern: 'def _change_state_for_tis_without_dagrun(...): ...

      '
  - pattern: '$OBJ._change_state_for_tis_without_dagrun(...)

      '
  - pattern: _change_state_for_tis_without_dagrun(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
