rules:
- id: detect-pause-async-in-function-comment
  message: Function name comment contains 'pause_async'; should use 'smp_sched' terminology
  severity: WARNING
  languages:
  - c
  pattern-regex: (\*\s+Name:\s+\w+_pause_async\w*)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-cpupause-file-in-makefile
  message: Build file references *_cpupause.c; should be updated to *_smpcall.c
  severity: WARNING
  languages:
  - generic
  pattern-regex: \w+_cpupause\.c
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    include:
    - '*/Make.defs'
    - '*/Makefile'
    - '*/CMakeLists.txt'
- id: detect-cpupause-comment-in-handler-name
  message: Comment documentation refers to old handler name with 'pause'; should use
    'smp_sched_handler' or 'smp_call_handler'
  severity: WARNING
  languages:
  - c
  pattern-regex: (Name:\s+\w+_pause_async_handler|Name:\s+\w+_pause_handler)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-putreg32-call-in-cpupause
  message: Register write in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: putreg32($VALUE, $ADDR)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - '*_cpupause.c'
- id: detect-this-cpu-call-in-pause-file
  message: CPU identification in *_cpupause.c should be in *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: 'this_cpu()

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - '*_cpupause.c'
- id: detect-up-cpu-pause-async-regex
  message: Function 'up_cpu_pause_async' should be renamed to 'up_send_smp_sched'
  severity: WARNING
  languages:
  - c
  pattern-regex: (inline_function\s+)?int\s+up_cpu_pause_async\s*\([^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-gic-smp-cpucall-constant
  message: Constant 'GIC_SMP_CPUCALL' should be renamed to 'GIC_SMP_CALL'
  severity: WARNING
  languages:
  - c
  pattern: GIC_SMP_CPUCALL
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-inline-up-cpu-pause-async
  message: Function 'up_cpu_pause_async' should be renamed to 'up_send_smp_sched'
  severity: WARNING
  languages:
  - c
  pattern-regex: inline_function\s+int\s+up_cpu_pause_async\s*\([^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-cpupause-filename-pattern
  message: File should be renamed from *_cpupause.c to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*_cpupause.c'
- id: detect-nxsched-process-delivered-in-pause-file
  message: Code in *_cpupause.c file should be moved to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: nxsched_process_delivered(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*_cpupause.c'
- id: detect-arch-path-cpupause-in-comments
  message: Comment path references *_cpupause.c; should be updated to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern-regex: (\*\s+arch/[^/]+/src/[^/]+/\w+_cpupause\.c)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-this-cpu-in-pause-handler-context
  message: Function with 'pause' in name handling SMP delivered tasks should be renamed
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "int $FUNC(...) {\n  ...\n  int $CPU = this_cpu();\n  ...\n  nxsched_process_delivered($CPU);\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: .*pause.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-public-functions-section-in-cpupause
  message: Public functions section in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern-regex: (/\*+\s*\*\s+Public Functions\s*\*+/)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*_cpupause.c'
- id: detect-included-files-section-in-cpupause
  message: File structure in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern-regex: (/\*+\s*\*\s+Included Files\s*\*+/)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*_cpupause.c'
- id: detect-spinlock-include-in-cpupause
  message: Include in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: '#include <nuttx/spinlock.h>

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*_cpupause.c'
- id: detect-sched-note-include-in-cpupause
  message: Include in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: '#include <nuttx/sched_note.h>

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*_cpupause.c'
- id: detect-sched-sched-include-in-cpupause
  message: Include in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: '#include "sched/sched.h"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*_cpupause.c'
- id: detect-gic-smp-cpupause-async-constant
  message: Constant 'GIC_SMP_CPUPAUSE_ASYNC' should be renamed to 'GIC_SMP_SCHED'
  severity: WARNING
  languages:
  - c
  pattern: GIC_SMP_CPUPAUSE_ASYNC
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-pause-handler-prototype-comment
  message: Function documentation comment references old 'pause_handler' name; should
    use 'smp_call_handler'
  severity: WARNING
  languages:
  - c
  pattern-regex: (\*\s+Name:\s+\w+_pause_handler\b)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-nxsched-smp-call-handler-in-pause-file
  message: Code in *_cpupause.c file should be moved to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: nxsched_smp_call_handler(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '*_cpupause.c'
- id: detect-current-task-call-in-pause-file
  message: Task scheduling code in *_cpupause.c should be in *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: 'current_task($CPU)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '*_cpupause.c'
- id: detect-arch-internal-include-in-cpupause
  message: Internal arch include in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: '#include "arm_internal.h"

        '
    - pattern: '#include "riscv_internal.h"

        '
    - pattern: '#include "xtensa_internal.h"

        '
    - pattern: '#include "x86_64_internal.h"

        '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '*_cpupause.c'
- id: detect-description-pause-handler
  message: Inter-CPU interrupt handler description in old *_cpupause.c file
  severity: WARNING
  languages:
  - c
  pattern-regex: (\*\s+Description:\s*\n\s*\*\s+.*[Ii]nter-CPU interrupt handler)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '*_cpupause.c'
- id: detect-async-pause-description-comment
  message: Comment describes 'async pause handler'; should be updated to 'SMP sched
    handler'
  severity: WARNING
  languages:
  - c
  pattern-regex: (\*\s+Description:\s*\n\s*\*\s+.*handler for async pause)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-inter-cpu-interrupt-handler-in-pause-file
  message: Inter-CPU interrupt handler in *_cpupause.c file should be in *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern-regex: (\*\s+Description:\s*\n\s*\*\s+Inter-CPU interrupt handler)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '*_cpupause.c'
- id: detect-ffs-call-in-cpupause
  message: CPU set bit scan in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: ffs($CPUSET)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '*_cpupause.c'
- id: detect-up-cpu-pause-async-call
  message: Function call 'up_cpu_pause_async' should be renamed to 'up_send_smp_sched'
  severity: WARNING
  languages:
  - c
  pattern: up_cpu_pause_async(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-irq-attach-arm-pause-handler
  message: IRQ handler 'arm_pause_handler' should be renamed to 'arm_smp_call_handler'
    in irq_attach call
  severity: WARNING
  languages:
  - c
  pattern: irq_attach($IRQ, arm_pause_handler, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-arm-pause-handler-regex
  message: Function 'arm_pause_handler' should be renamed to 'arm_smp_call_handler'
  severity: WARNING
  languages:
  - c
  pattern-regex: int\s+arm_pause_handler\s*\([^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-rp2040-sio-irq-proc-constant
  message: Constant 'RP2040_SIO_IRQ_PROC*' should be renamed to 'RP2040_SMP_CALL_PROC*'
  severity: WARNING
  languages:
  - c
  pattern-either:
  - pattern: RP2040_SIO_IRQ_PROC0
  - pattern: RP2040_SIO_IRQ_PROC1
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-ifdef-config-smp-in-cpupause-file
  message: CONFIG_SMP conditional in *_cpupause.c file; file should be renamed to
    *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern-regex: '#ifdef\s+CONFIG_SMP'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*_cpupause.c'
- id: detect-endif-config-smp-in-cpupause-file
  message: CONFIG_SMP endif in *_cpupause.c file; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern-regex: '#endif\s*/\*\s*CONFIG_SMP\s*\*/'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*_cpupause.c'
- id: detect-private-data-section-in-cpupause
  message: Private data section in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern-regex: (/\*+\s*\*\s+Private Data\s*\*+/)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*_cpupause.c'
- id: detect-dprintf-debug-in-cpupause
  message: Debug printf in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: DPRINTF($FMT, ...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*_cpupause.c'
- id: detect-gic-cpucall-in-up-trigger-irq
  message: Constant 'GIC_SMP_CPUCALL' should be renamed to 'GIC_SMP_CALL' in up_trigger_irq
    call
  severity: WARNING
  languages:
  - c
  pattern: up_trigger_irq(GIC_SMP_CPUCALL, ...)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-irq-attach-with-cpupause-async
  message: IRQ constant 'GIC_SMP_CPUPAUSE_ASYNC' should be renamed to 'GIC_SMP_SCHED'
  severity: WARNING
  languages:
  - c
  pattern: irq_attach(GIC_SMP_CPUPAUSE_ASYNC, $HANDLER, ...)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-irq-attach-with-cpucall
  message: IRQ constant 'GIC_SMP_CPUCALL' should be renamed to 'GIC_SMP_CALL'
  severity: WARNING
  languages:
  - c
  pattern: irq_attach(GIC_SMP_CPUCALL, $HANDLER, ...)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-arm-pause-async-handler-regex
  message: Function 'arm_pause_async_handler' should be renamed to 'arm_smp_sched_handler'
  severity: WARNING
  languages:
  - c
  pattern-regex: int\s+arm_pause_async_handler\s*\([^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-debugverify-irq-attach-cpupause-async
  message: DEBUGVERIFY with 'GIC_SMP_CPUPAUSE_ASYNC' should use 'GIC_SMP_SCHED'
  severity: WARNING
  languages:
  - c
  pattern: DEBUGVERIFY(irq_attach(GIC_SMP_CPUPAUSE_ASYNC, ...))
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-debugverify-irq-attach-cpucall
  message: DEBUGVERIFY with 'GIC_SMP_CPUCALL' should use 'GIC_SMP_CALL'
  severity: WARNING
  languages:
  - c
  pattern: DEBUGVERIFY(irq_attach(GIC_SMP_CPUCALL, ...))
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-up-send-smp-call-with-old-impl
  message: Function 'up_send_smp_call' is calling old 'up_cpu_pause_async'; should
    call 'up_send_smp_sched'
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "void up_send_smp_call(...) {\n  ...\n  up_cpu_pause_async(...);\n  ...\n\
      }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-ffs-cpuset-with-pause-async-call
  message: Call to 'up_cpu_pause_async' should be renamed to 'up_send_smp_sched'
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: '$CPU = ffs($CPUSET) - 1;

      ...

      up_cpu_pause_async($CPU);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-sam-irq-ipc-constant
  message: Constant 'SAM_IRQ_IPC*' should be renamed to 'SAM_IRQ_SMP_CALL*' for sam4cm
  severity: WARNING
  languages:
  - c
  pattern-either:
  - pattern: SAM_IRQ_IPC0
  - pattern: SAM_IRQ_IPC1
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-public-data-section-in-cpupause
  message: Public data section in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern-regex: (/\*+\s*\*\s+Public Data\s*\*+/)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*_cpupause.c'
- id: detect-preprocessor-definitions-in-cpupause
  message: Preprocessor definitions section in *_cpupause.c; file should be renamed
    to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern-regex: (/\*+\s*\*\s+Pre-processor Definitions\s*\*+/)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*_cpupause.c'
- id: detect-getreg32-call-in-cpupause
  message: Register read in *_cpupause.c; file should be renamed to *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: getreg32($ADDR)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*_cpupause.c'
- id: detect-smp-ipi-irq-constant
  message: Constant 'SMP_IPI_IRQ' should be renamed to 'SMP_IPI_CALL_IRQ' for x86_64
    architecture
  severity: WARNING
  languages:
  - c
  pattern: SMP_IPI_IRQ
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-smp-ipi-async-irq-constant
  message: Constant 'SMP_IPI_ASYNC_IRQ' should be renamed to 'SMP_IPI_SCHED_IRQ' for
    x86_64 architecture
  severity: WARNING
  languages:
  - c
  pattern: SMP_IPI_ASYNC_IRQ
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-generate-irq-for-cpu-comment
  message: Comment in cpupause file references 'Generate IRQ'; file should be renamed
    to smpcall
  severity: WARNING
  languages:
  - c
  pattern-regex: (/\*\s*Generate IRQ for CPU)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*_cpupause.c'
- id: detect-cxd56-cpu-p2-int-define-usage
  message: CXD56 CPU interrupt handling in *_cpupause.c should be in *_smpcall.c
  severity: WARNING
  languages:
  - c
  pattern: CXD56_CPU_P2_INT
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*_cpupause.c'
- id: detect-irq-attach-pause-async-handler
  message: IRQ handler 'arm_pause_async_handler' should be renamed to 'arm_smp_sched_handler'
    in irq_attach call
  severity: WARNING
  languages:
  - c
  pattern: irq_attach($IRQ, arm_pause_async_handler, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-gic-cpupause-async-in-arm-cpu-sgi
  message: Constant 'GIC_SMP_CPUPAUSE_ASYNC' should be renamed to 'GIC_SMP_SCHED'
    in arm_cpu_sgi call
  severity: WARNING
  languages:
  - c
  pattern: arm_cpu_sgi(GIC_SMP_CPUPAUSE_ASYNC, ...)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-up-pause-handler-regex
  message: Function 'up_pause_handler' should be renamed to 'up_smp_call_handler'
  severity: WARNING
  languages:
  - c
  pattern-regex: int\s+up_pause_handler\s*\([^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-up-pause-async-handler-regex
  message: Function 'up_pause_async_handler' should be renamed to 'up_smp_sched_handler'
  severity: WARNING
  languages:
  - c
  pattern-regex: int\s+up_pause_async_handler\s*\([^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-riscv-pause-handler-regex
  message: Function 'riscv_pause_handler' should be renamed to 'riscv_smp_call_handler'
  severity: WARNING
  languages:
  - c
  pattern-regex: int\s+riscv_pause_handler\s*\([^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-lc823450-pause-handler-regex
  message: Function 'lc823450_pause_handler' should be renamed to 'lc823450_smp_call_handler'
  severity: WARNING
  languages:
  - c
  pattern-regex: int\s+lc823450_pause_handler\s*\([^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-s698pm-pause-handler-regex
  message: Function 'sparc_pause_handler' should be renamed to 'sparc_smp_call_handler'
  severity: WARNING
  languages:
  - c
  pattern-regex: int\s+s698pm_pause_handler\s*\([^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-rp2040-sio-irq-proc-in-enable
  message: Constant 'RP2040_SIO_IRQ_PROC*' should be renamed to 'RP2040_SMP_CALL_PROC*'
    in up_enable_irq
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: up_enable_irq(RP2040_SIO_IRQ_PROC0)
    - pattern: up_enable_irq(RP2040_SIO_IRQ_PROC1)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-sam-irq-ipc-in-enable
  message: Constant 'SAM_IRQ_IPC*' should be renamed to 'SAM_IRQ_SMP_CALL*' in up_enable_irq
    for sam4cm
  severity: WARNING
  languages:
  - c
  patterns:
