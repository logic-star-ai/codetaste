    exclude:
    - '**/*cpustart.c'
- id: old-scheduler-resume-after-dispatch
  message: After irq_dispatch, use nxsched_switch_context for context switches
  severity: WARNING
  languages:
  - c
  pattern: 'irq_dispatch(...);

    ...

    nxsched_suspend_scheduler($TASK1);

    ...

    nxsched_resume_scheduler($TASK2);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-scheduler-two-sequential-calls
  message: Replace consecutive nxsched_suspend_scheduler/nxsched_resume_scheduler
    with nxsched_switch_context
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'nxsched_suspend_scheduler($X);

      nxsched_resume_scheduler($Y);

      '
  - pattern-not-inside: "void nxsched_suspend_scheduler(...) {\n  ...\n}\n"
  - pattern-not-inside: "void nxsched_resume_scheduler(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - arch/**/*.c
    exclude:
    - include/**
    - '**/*cpustart.c'
- id: old-scheduler-with-saveusercontext
  message: Context switch with up_saveusercontext should use nxsched_switch_context
  severity: WARNING
  languages:
  - c
  pattern: "if (!up_saveusercontext($REGS)) {\n  ...\n  nxsched_resume_scheduler($TCB);\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
