    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - arch/sim/**/*switchcontext.c
- id: old-scheduler-resume-after-context-switch
  message: Context switch detection should use unified nxsched_switch_context instead
    of separate suspend/resume
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "if ($REGS != $CURRENT_REGS) {\n  ...\n  nxsched_suspend_scheduler(...);\n\
      \  nxsched_resume_scheduler(...);\n  ...\n}\n"
  - pattern-not: "if ($REGS != $CURRENT_REGS) {\n  ...\n  nxsched_switch_context(...);\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
