rules:
- id: old-scheduler-architecture-specific-files
  message: Architecture-specific switch/IRQ files should use nxsched_switch_context
  severity: WARNING
  languages:
  - c
  pattern-regex: \bnxsched_(?:suspend|resume)_scheduler\s*\([^)]+\)\s*;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
  paths:
    include:
    - arch/**/src/**/*switch*.c
    - arch/**/src/**/*irq*.c
    exclude:
    - '**/*cpustart.c'
    - include/**
- id: old-scheduler-generic-switch-context-function
  message: up_switch_context function should use unified nxsched_switch_context API
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-inside: "void up_switch_context(...) {\n  ...\n}\n"
  - pattern-either:
    - pattern: nxsched_suspend_scheduler($T);
    - pattern: nxsched_resume_scheduler($T);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
- id: old-scheduler-resume-in-arch-src
  message: Architecture source files should use unified nxsched_switch_context API
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: nxsched_resume_scheduler($TASK);
  - pattern-not-inside: "void nxsched_resume_scheduler(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
  paths:
    include:
    - arch/*/src/**/*.c
    exclude:
    - '**/*cpustart.c'
    - include/**
- id: old-scheduler-before-restorestate-call
  message: In switchcontext files, use nxsched_switch_context instead of nxsched_resume_scheduler
  severity: WARNING
  languages:
  - c
  pattern: 'nxsched_resume_scheduler($TCB);

    ...

    $FUNC(...);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - '**/*switchcontext.c'
- id: old-scheduler-arch-common-switchcontext
  message: Architecture common switchcontext should use unified nxsched_switch_context
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: 'nxsched_suspend_scheduler($RTCB);

        ...

        nxsched_resume_scheduler($TCB);

        '
    - pattern: nxsched_suspend_scheduler($TASK);
    - pattern: nxsched_resume_scheduler($TASK);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
  paths:
    include:
    - arch/**/src/common/*switchcontext.c
    exclude:
    - include/**
- id: old-scheduler-resume-pattern-in-switchcontext
  message: switchcontext files should use unified nxsched_switch_context API instead
    of nxsched_resume_scheduler
  severity: WARNING
  languages:
  - c
  pattern-regex: \bnxsched_resume_scheduler\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
  paths:
    include:
    - '*switchcontext.c'
    - '*switch_context.c'
- id: old-scheduler-suspend-in-arch-src
  message: Architecture source files should use unified nxsched_switch_context API
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: nxsched_suspend_scheduler($TASK);
  - pattern-not-inside: "void nxsched_suspend_scheduler(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - arch/*/src/**/*.c
    exclude:
    - '**/*cpustart.c'
    - include/**
- id: old-scheduler-paired-calls-generic
  message: Replace paired suspend/resume scheduler calls with nxsched_switch_context(from,
    to)
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'nxsched_suspend_scheduler($FROM);

      ...

      nxsched_resume_scheduler($TO);

      '
  - pattern-not-inside: "void nxsched_switch_context(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - arch/**/*.c
    exclude:
    - include/**
    - '**/*cpustart.c'
- id: old-scheduler-before-context-restore
  message: Before context restore, use nxsched_switch_context
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'nxsched_resume_scheduler($TCB);

      ...

      $FUNC($TCB->xcp.regs);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    include:
    - arch/**/*switchcontext.c
- id: old-scheduler-suspend-in-switch-context
  message: up_switch_context should use nxsched_switch_context instead of separate
    nxsched_suspend_scheduler/nxsched_resume_scheduler
  severity: WARNING
  languages:
  - c
  pattern: "void up_switch_context(...) {\n  ...\n  nxsched_suspend_scheduler($RTCB);\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: old-scheduler-pattern-in-switchcontext-files
  message: switchcontext files should use unified nxsched_switch_context API instead
    of nxsched_suspend_scheduler
  severity: WARNING
  languages:
  - c
  pattern-regex: \bnxsched_suspend_scheduler\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - '*switchcontext.c'
    - '*switch_context.c'
- id: old-scheduler-suspend-first-in-function
  message: up_switch_context starting with nxsched_suspend_scheduler should use nxsched_switch_context
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "void up_switch_context(...) {\n  nxsched_suspend_scheduler($RTCB);\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: old-scheduler-suspend-before-if-block
  message: Replace suspend before if with nxsched_switch_context inside branches
  severity: WARNING
  languages:
  - c
  pattern: "nxsched_suspend_scheduler($RTCB);\nif ($COND) {\n  ...\n  nxsched_resume_scheduler($TCB);\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: old-scheduler-in-addrenv-switch-block
  message: After addrenv_switch, use nxsched_switch_context instead of nxsched_resume_scheduler
  severity: WARNING
  languages:
  - c
  pattern: 'addrenv_switch($TCB);

    ...

    nxsched_resume_scheduler($TASK);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: old-scheduler-before-g-running-tasks-update
  message: Use nxsched_switch_context before updating g_running_tasks[]
  severity: WARNING
  languages:
  - c
  pattern: 'nxsched_resume_scheduler($TCB);

    ...

    g_running_tasks[$CPU] = $TCB;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: old-scheduler-resume-in-interrupt-branch
  message: Replace nxsched_resume_scheduler with unified nxsched_switch_context in
    interrupt context handling
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "if (up_current_regs()) {\n  ...\n  nxsched_resume_scheduler($TCB);\n\
      \  ...\n}\n"
  - pattern-not: "if (up_current_regs()) {\n  ...\n  nxsched_switch_context(...);\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: old-scheduler-misoc-arch-pattern
  message: MiSoC architecture switchcontext should use unified nxsched_switch_context
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: 'nxsched_suspend_scheduler($RTCB);

        ...

        nxsched_resume_scheduler($TCB);

        '
    - pattern: nxsched_suspend_scheduler($TASK);
    - pattern: nxsched_resume_scheduler($TASK);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - arch/misoc/**/*switchcontext.c
- id: old-scheduler-in-interrupt-context-branch
  message: Both interrupt and non-interrupt branches should use nxsched_switch_context
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "if (up_current_regs()) {\n  ...\n  nxsched_resume_scheduler($TCB);\n\
      \  ...\n}\nelse {\n  ...\n  nxsched_resume_scheduler($TCB2);\n  ...\n}\n"
  - pattern-not: "if (up_current_regs()) {\n  ...\n  nxsched_switch_context(...);\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: old-scheduler-suspend-with-running-task-deref
  message: Replace nxsched_suspend_scheduler(*running_task) with nxsched_switch_context(*running_task,
    next_task)
  severity: WARNING
  languages:
  - c
  pattern: nxsched_suspend_scheduler(*$RUNNING_TASK);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
