  patterns:
  - pattern-either:
    - pattern: 'nxsched_suspend_scheduler($RTCB);

        ...

        nxsched_resume_scheduler($TCB);

        '
    - pattern: nxsched_suspend_scheduler($TASK);
    - pattern: nxsched_resume_scheduler($TASK);
  metadata:
