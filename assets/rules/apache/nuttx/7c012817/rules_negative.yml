- id: old-scheduler-with-running-task-pointer
  message: With running_task pointer, use nxsched_switch_context(*running_task, next)
  severity: WARNING
  languages:
  - c
  pattern: 'struct tcb_s **running_task = &g_running_tasks[$CPU];

    ...

    nxsched_suspend_scheduler(*running_task);

    nxsched_resume_scheduler($NEXT);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
