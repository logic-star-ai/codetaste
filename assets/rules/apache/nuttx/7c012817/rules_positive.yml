rules:
- id: switch-context-call-non-arm-archs
  message: nxsched_switch_context found in target architecture (refactoring applied)
  severity: INFO
  languages:
  - c
  pattern: nxsched_switch_context($PREV, $NEXT)
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
- id: switch-context-file-level-detection
  message: File contains nxsched_switch_context implementation
  severity: INFO
  languages:
  - c
  pattern-regex: (?s).*nxsched_switch_context.*
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
- id: switch-context-architecture-migration
  message: Architecture successfully migrated to nxsched_switch_context
  severity: INFO
  languages:
  - c
  pattern-regex: \A[\s\S]*nxsched_switch_context\s*\(\s*[^,]+\s*,\s*[^)]+\s*\)[\s\S]*
  metadata:
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/src/**/*switch*.c'
    - '**/arch/**/src/**/*irq*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
- id: switch-context-after-addrenv-switch-non-arm
  message: nxsched_switch_context used after addrenv_switch in target arch
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: 'addrenv_switch($VAR);

      ...

      nxsched_switch_context(...);

      '
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
- id: nxsched-switch-context-in-up-switch-function
  message: Detected nxsched_switch_context in up_switch_context function
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-inside: "void up_switch_context(...) {\n  ...\n}\n"
  - pattern: nxsched_switch_context($A, $B)
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
- id: switch-context-avoids-old-pattern
  message: Switch context function properly refactored (no old pattern)
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: "void up_switch_context(...) {\n  ...\n  nxsched_switch_context($A, $B);\n\
      \  ...\n}\n"
  - pattern-not: "void up_switch_context(...) {\n  ...\n  nxsched_suspend_scheduler(...);\n\
      \  ...\n  nxsched_resume_scheduler(...);\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*switch*.c'
- id: switch-context-before-running-task-update-non-arm
  message: nxsched_switch_context before updating running_task pointer
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: 'nxsched_switch_context($OLD, $NEW);

      ...

      *$RUNNING = $NEW;

      '
  - metavariable-regex:
      metavariable: $RUNNING
      regex: .*running.*
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
- id: irqdispatch-file-refactored-non-arm
  message: IRQ dispatch implementation refactored in target arch
  severity: INFO
  languages:
  - c
  pattern-regex: \A[\s\S]*nxsched_switch_context[\s\S]*
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*irq*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
- id: switch-context-doirq-file-exists-non-arm
  message: Doirq file contains nxsched_switch_context call
  severity: INFO
  languages:
  - c
  pattern-regex: \A[\s\S]*nxsched_switch_context\s*\([^,]+,\s*[^)]+\)[\s\S]*
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*doirq.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
- id: switch-context-with-g-running-tasks-update
  message: nxsched_switch_context with g_running_tasks update pattern
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: 'nxsched_switch_context(...);

      ...

      g_running_tasks[$IDX] = $TASK;

      '
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
- id: this-task-stored-before-switch-context-non-arm
  message: this_task() stored in local variable before nxsched_switch_context
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: 'struct tcb_s *$VAR = this_task();

      ...

      nxsched_switch_context(..., $VAR);

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
- id: switch-context-after-savecontext-non-arm
  message: nxsched_switch_context follows savecontext call pattern
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: '$SAVE_FUNC(...);

      ...

      nxsched_switch_context($X, $Y);

      '
  - metavariable-regex:
      metavariable: $SAVE_FUNC
      regex: .*save.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
