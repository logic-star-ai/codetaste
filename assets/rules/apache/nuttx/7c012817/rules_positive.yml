- id: detect-nxsched-switch-context-in-up-switch-context
  message: Detected unified nxsched_switch_context call in up_switch_context function
    (refactoring applied)
  severity: INFO
  languages:
  - c
  pattern: "void up_switch_context(...) {\n  ...\n  nxsched_switch_context($PREV,\
    \ $NEXT);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: detect-nxsched-switch-context-single-call-in-function
  message: Detected up_switch_context with nxsched_switch_context and no suspend_scheduler
    (refactored)
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: "void up_switch_context(...) {\n  ...\n  nxsched_switch_context($PREV,\
      \ $NEXT);\n  ...\n}\n"
  - pattern-not: "void up_switch_context(...) {\n  ...\n  nxsched_suspend_scheduler(...);\n\
      \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: detect-nxsched-switch-context-call-removed-suspend
  message: Detected nxsched_switch_context in up_switch_context without nxsched_suspend_scheduler
    (refactored)
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-inside: "void up_switch_context(...) {\n  ...\n}\n"
  - pattern: nxsched_switch_context($PREV, $NEXT)
  - pattern-not-inside: 'nxsched_suspend_scheduler(...);

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: detect-nxsched-switch-context-multiple-in-function
  message: Detected nxsched_switch_context in conditional branch of up_switch_context
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: "$RET up_switch_context(...) {\n  ...\n  if ($COND1) {\n    ...\n \
        \   nxsched_switch_context($A, $B);\n    ...\n  }\n  ...\n}\n"
    - pattern: "$RET up_switch_context(...) {\n  ...\n  if ($COND1) {\n    ...\n \
        \ } else {\n    ...\n    nxsched_switch_context($A, $B);\n    ...\n  }\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: detect-nxsched-switch-context-no-separate-suspend
  message: Detected nxsched_switch_context without separate suspend_scheduler in same
    function
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-inside: "$RET up_switch_context(...) {\n  ...\n}\n"
  - pattern: nxsched_switch_context($A, $B)
  - pattern-not: nxsched_suspend_scheduler($A)
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: detect-nxsched-switch-context-no-separate-resume
  message: Detected nxsched_switch_context without separate resume_scheduler in same
    function
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-inside: "$RET up_switch_context(...) {\n  ...\n}\n"
  - pattern: nxsched_switch_context($A, $B)
  - pattern-not: nxsched_resume_scheduler($B)
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: detect-nxsched-switch-context-replacing-two-calls
  message: Detected nxsched_switch_context replacing dual suspend/resume pattern
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-inside: "void up_switch_context(...) {\n  ...\n  nxsched_switch_context($A,\
      \ $B);\n  ...\n}\n"
  - pattern-not: "void up_switch_context(...) {\n  ...\n  nxsched_suspend_scheduler($A);\n\
      \  ...\n  nxsched_resume_scheduler($B);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: detect-nxsched-switch-context-switch-function-refactored
  message: Detected refactored up_switch_context using unified nxsched_switch_context
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-inside: "void up_switch_context(...) {\n  ...\n}\n"
  - pattern: nxsched_switch_context($PREV, $NEXT)
  - pattern-not-inside: 'nxsched_resume_scheduler($NEXT);

      ...

      nxsched_switch_context($PREV, $NEXT);

      '
  metadata:
    category: structural
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: detect-nxsched-switch-context-single-unified-call
