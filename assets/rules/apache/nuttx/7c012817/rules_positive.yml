    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**'
    exclude:
    - '**/arm/**'
    - '**/arm64/**'
- id: detect-nxsched-switch-context-refactor-complete-indicator
  message: Detected complete refactoring - up_switch_context using nxsched_switch_context
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: nxsched_switch_context($A, $B)
  - pattern-inside: "$RET up_switch_context(...) {\n  ...\n  nxsched_switch_context($A,\
      \ $B);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
