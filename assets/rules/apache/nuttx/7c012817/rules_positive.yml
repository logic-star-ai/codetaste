rules:
- id: detect-nxsched-switch-context-unified-api-usage
  message: Detected unified scheduler context switch API usage
  severity: INFO
  languages:
  - c
  pattern: 'nxsched_switch_context($OLD_TASK, $NEW_TASK);

    '
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**'
    exclude:
    - '**/arm/**'
    - '**/arm64/**'
    - '**/dummy/**'
- id: detect-nxsched-switch-context-simple-two-arg-call
  message: Detected valid nxsched_switch_context call with two non-NULL arguments
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: nxsched_switch_context($ARG1, $ARG2)
  - metavariable-pattern:
      metavariable: $ARG1
      patterns:
      - pattern-not: 'NULL'
  - metavariable-pattern:
      metavariable: $ARG2
      patterns:
      - pattern-not: 'NULL'
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**'
    exclude:
    - '**/arm/**'
    - '**/arm64/**'
- id: detect-nxsched-switch-context-remove-old-api-pattern
  message: Detected nxsched_switch_context without preceding nxsched_suspend_scheduler
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: nxsched_switch_context($A, $B)
  - pattern-not-inside: 'nxsched_suspend_scheduler($A);

      ...

      nxsched_switch_context($A, $B);

      '
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**'
    exclude:
    - '**/arm/**'
    - '**/arm64/**'
- id: detect-nxsched-switch-context-no-resume-after
  message: Detected nxsched_switch_context without following nxsched_resume_scheduler
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: nxsched_switch_context($A, $B)
  - pattern-not-inside: 'nxsched_switch_context($A, $B);

      ...

      nxsched_resume_scheduler($B);

      '
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**'
    exclude:
    - '**/arm/**'
    - '**/arm64/**'
- id: detect-nxsched-switch-context-arch-file-pattern
  message: Detected nxsched_switch_context in architecture file (refactored)
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: nxsched_switch_context($A, $B)
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/avr/**/*.c'
    - '**/arch/ceva/**/*.c'
    - '**/arch/hc/**/*.c'
    - '**/arch/mips/**/*.c'
    - '**/arch/misoc/**/*.c'
    - '**/arch/or1k/**/*.c'
    - '**/arch/renesas/**/*.c'
    - '**/arch/risc-v/**/*.c'
    - '**/arch/sim/**/*.c'
    - '**/arch/sparc/**/*.c'
    - '**/arch/tricore/**/*.c'
    - '**/arch/x86/**/*.c'
    - '**/arch/x86_64/**/*.c'
    - '**/arch/xtensa/**/*.c'
    - '**/arch/z16/**/*.c'
    - '**/arch/z80/**/*.c'
    exclude:
    - '**/arm/**'
    - '**/arm64/**'
- id: detect-nxsched-switch-context-in-non-arm-arch
  message: Detected nxsched_switch_context in non-ARM architecture (newly refactored)
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: nxsched_switch_context($A, $B)
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**'
    exclude:
    - '**/arm/**'
    - '**/arm64/**'
    - '**/dummy/**'
- id: detect-nxsched-switch-context-complete-refactoring
  message: Detected complete refactoring - nxsched_switch_context without old suspend/resume
    pattern
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: nxsched_switch_context($OLD_TASK, $NEW_TASK)
  - pattern-not-inside: 'nxsched_suspend_scheduler($OLD_TASK);

      nxsched_resume_scheduler($NEW_TASK);

      '
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**'
    exclude:
    - '**/arm/**'
    - '**/arm64/**'
- id: detect-nxsched-switch-context-unified-scheduler-integration
  message: Detected unified scheduler integration with nxsched_switch_context (no
    separate suspend)
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: nxsched_switch_context($PREV, $NEXT)
  - pattern-not-inside: "$FUNC(...) {\n  ...\n  nxsched_suspend_scheduler($PREV);\n\
      \  ...\n  nxsched_switch_context($PREV, $NEXT);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**'
    exclude:
    - '**/arm/**'
    - '**/arm64/**'
- id: detect-nxsched-switch-context-scheduler-param-update
  message: Detected scheduler parameter update via nxsched_switch_context
  severity: INFO
  languages:
  - c
  pattern: 'nxsched_switch_context($OLD_TCB, $NEW_TCB);

    '
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/avr/**/*.c'
    - '**/arch/ceva/**/*.c'
    - '**/arch/hc/**/*.c'
    - '**/arch/mips/**/*.c'
    - '**/arch/misoc/**/*.c'
    - '**/arch/or1k/**/*.c'
    - '**/arch/renesas/**/*.c'
    - '**/arch/risc-v/**/*.c'
    - '**/arch/sim/**/*.c'
    - '**/arch/sparc/**/*.c'
    - '**/arch/tricore/**/*.c'
    - '**/arch/x86/**/*.c'
    - '**/arch/x86_64/**/*.c'
    - '**/arch/xtensa/**/*.c'
    - '**/arch/z16/**/*.c'
    - '**/arch/z80/**/*.c'
