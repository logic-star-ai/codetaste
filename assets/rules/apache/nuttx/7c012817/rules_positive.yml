rules:
- id: nxsched-switch-context-in-specific-arches
  message: Detected nxsched_switch_context in affected architecture
  severity: INFO
  languages:
  - c
  pattern: nxsched_switch_context($P1, $P2)
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/avr/**/*.c'
    - '**/arch/ceva/**/*.c'
    - '**/arch/hc/**/*.c'
    - '**/arch/mips/**/*.c'
    - '**/arch/misoc/**/*.c'
    - '**/arch/or1k/**/*.c'
    - '**/arch/renesas/**/*.c'
    - '**/arch/risc-v/**/*.c'
    - '**/arch/sim/**/*.c'
    - '**/arch/sparc/**/*.c'
    - '**/arch/tricore/**/*.c'
    - '**/arch/x86/**/*.c'
    - '**/arch/x86_64/**/*.c'
    - '**/arch/xtensa/**/*.c'
    - '**/arch/z16/**/*.c'
    - '**/arch/z80/**/*.c'
  options:
    symbolic_propagation: true
- id: nxsched-switch-context-with-addrenv-switch
  message: nxsched_switch_context with addrenv_switch in context
  severity: INFO
  languages:
  - c
  pattern-either:
  - pattern: 'addrenv_switch(...);

      ...

      nxsched_switch_context($X, $Y);

      '
  - pattern: 'nxsched_switch_context($A, $B);

      ...

      addrenv_switch(...);

      '
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
  options:
    symbolic_propagation: true
- id: nxsched-switch-context-with-task-assignment
  message: nxsched_switch_context with prior task variable assignment
  severity: INFO
  languages:
  - c
  pattern: '$TASK = $EXPR;

    ...

    nxsched_switch_context($PREV, $TASK);

    '
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
  options:
    symbolic_propagation: true
- id: nxsched-switch-context-after-irq-dispatch
  message: nxsched_switch_context after irq_dispatch in handler
  severity: INFO
  languages:
  - c
  pattern: 'irq_dispatch(...);

    ...

    nxsched_switch_context($A, $B);

    '
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
  options:
    symbolic_propagation: true
- id: nxsched-switch-context-in-up-switch-context-func
  message: Detected nxsched_switch_context in up_switch_context function
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-inside: "void up_switch_context(...) {\n  ...\n}\n"
  - pattern: nxsched_switch_context($A, $B)
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*switchcontext*.c'
  options:
    symbolic_propagation: true
- id: nxsched-switch-context-before-running-task-update
  message: nxsched_switch_context before running_task update
  severity: INFO
  languages:
  - c
  pattern: 'nxsched_switch_context(...);

    ...

    *$PTR = $VAL;

    '
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
  options:
    symbolic_propagation: true
- id: nxsched-switch-context-in-else-branch
  message: nxsched_switch_context in else branch
  severity: INFO
  languages:
  - c
  pattern: "if (...) {\n  ...\n}\nelse {\n  ...\n  nxsched_switch_context($A, $B);\n\
    \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
  options:
    symbolic_propagation: true
- id: nxsched-switch-context-with-task-ptr-ptr-pattern
  message: nxsched_switch_context with double pointer task pattern
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: 'struct tcb_s **$PTR;

      ...

      nxsched_switch_context(*$PTR, $NEXT);

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**/*.c'
    exclude:
    - '**/arch/arm/**'
    - '**/arch/arm64/**'
  options:
    symbolic_propagation: true
