- id: detect-nxsched-switch-context-after-context-check
  message: Detected nxsched_switch_context after context switch check (refactored
    IRQ handler)
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: "if ($REGS != up_current_regs()) {\n  ...\n  nxsched_switch_context(...);\n\
        \  ...\n}\n"
    - pattern: "if (regs != up_current_regs()) {\n  ...\n  nxsched_switch_context(...);\n\
        \  ...\n}\n"
    - pattern: "if (*$RUNNING_TASK != $TCB) {\n  ...\n  nxsched_switch_context(...);\n\
        \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: detect-nxsched-switch-context-task-pointer-pattern
  message: Detected nxsched_switch_context with running_task pointer management pattern
  severity: INFO
  languages:
  - c
  pattern: "struct tcb_s **$RUNNING_TASK = &g_running_tasks[this_cpu()];\n...\nif\
    \ ($COND) {\n  ...\n  nxsched_switch_context(*$RUNNING_TASK, $TCB);\n  ...\n \
    \ *$RUNNING_TASK = $TCB;\n  ...\n}\n"
