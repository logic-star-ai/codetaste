  languages:
  - c
  patterns:
  - pattern: nxsched_switch_context($PREV_TASK, $NEXT_TASK)
  - pattern-inside: "$RET $FUNC(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/arch/**'
    exclude:
    - '**/arm/**'
    - '**/arm64/**'
    - '**/dummy/**'
- id: detect-nxsched-switch-context-metadata-update-pattern
  message: Detected scheduling metadata update via unified nxsched_switch_context
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: nxsched_switch_context($A, $B)
  metadata:
