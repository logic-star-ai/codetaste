rules:
- id: route-with-only-base-no-pattern-services
  message: 'Service route definition with only base property - missing explicit pattern
    field, should add pattern: '''''
  severity: WARNING
  languages:
  - javascript
  pattern-regex: static\s+get\s+route\s*\(\s*\)\s*\{\s*return\s*\{\s*base:\s*["\'`][\w/-]+["\'`]\s*,?\s*\}\s*\}
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 56
  paths:
    include:
    - services/
- id: usage-of-class-makeFullUrl
  message: Usage of class._makeFullUrl found. Should use makeFullUrl from route.js
    module
  severity: WARNING
  languages:
  - javascript
  pattern: $CLASS._makeFullUrl(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: usage-of-class-regex
  message: Usage of class._regex found. Should use prepareRoute() from route.js during
    registration
  severity: WARNING
  languages:
  - javascript
