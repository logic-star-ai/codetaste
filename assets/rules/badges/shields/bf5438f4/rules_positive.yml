rules:
- id: route-module-function-declarations
  message: route.js contains function declarations for extracted route helpers
  severity: INFO
  languages:
  - javascript
  pattern-either:
  - pattern: 'function makeFullUrl(...) { ... }

      '
  - pattern: 'function assertValidRoute(...) { ... }

      '
  - pattern: 'function prepareRoute(...) { ... }

      '
  - pattern: 'function namedParamsForMatch(...) { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: route-helpers-not-prefixed-with-underscore
  message: Route helper functions no longer have underscore prefix (public API)
  severity: INFO
  languages:
  - javascript
  pattern-either:
  - pattern: 'function makeFullUrl(...) { ... }

      '
  - pattern: 'function prepareRoute(...) { ... }

      '
  - pattern: 'function namedParamsForMatch(...) { ... }

      '
  - pattern: 'function assertValidRoute(...) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: route-helpers-testable-independently
  message: Route helpers are standalone functions (testable independently of BaseService)
  severity: INFO
  languages:
  - javascript
  pattern-either:
  - pattern: 'function makeFullUrl(...) { ... }

      '
  - pattern: 'function prepareRoute(...) { ... }

      '
  - pattern: 'function namedParamsForMatch(...) { ... }

      '
  - pattern: 'function assertValidRoute(...) { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: route-module-four-distinct-functions
  message: route.js defines four distinct route helper functions
  severity: INFO
  languages:
  - javascript
  pattern-either:
  - pattern: 'function makeFullUrl(...) { ... }

      '
  - pattern: 'function prepareRoute(...) { ... }

      '
  - pattern: 'function namedParamsForMatch(...) { ... }

      '
  - pattern: 'function assertValidRoute(...) { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: call-namedParamsForMatch-standalone
  message: Using standalone namedParamsForMatch function instead of instance method
  severity: INFO
  languages:
  - javascript
  pattern: namedParamsForMatch($CAPTURE, $MATCH, $SERVICE)
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/*.js'
- id: route-spec-contains-prepareRoute-test
  message: route.spec.js contains tests for prepareRoute function
  severity: INFO
  languages:
  - javascript
  pattern-either:
  - pattern: test(prepareRoute, ...)
  - pattern: 'const $X = prepareRoute({ ... })

      '
  - pattern: prepareRoute({ ... })
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.spec.js'
- id: base-calls-namedParamsForMatch-with-this
  message: Base service classes call namedParamsForMatch passing this for ServiceClass
  severity: INFO
  languages:
  - javascript
  pattern: namedParamsForMatch($NAMES, $MATCH, this)
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/base.js'
    - '**/core/base-service/base-static.js'
    - '**/core/base-service/base-non-memory-caching.js'
- id: makeFullUrl-joins-base-and-partial
  message: makeFullUrl joins base and partial URL components
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: '[..., $BASE, $PARTIAL, ...].filter(...)

        '
    - pattern: '[$BASE, $PARTIAL].filter(Boolean)

        '
    - pattern: '[$BASE, $PARTIAL].filter($F).join(...)

        '
  - pattern-inside: "function makeFullUrl($BASE, $PARTIAL) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: prepareRoute-creates-fullPattern
  message: prepareRoute creates full pattern string with extension
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'const $FULL = `${$BASE}.:ext(...)`

        '
    - pattern: 'const $FULL_PATTERN = ...

        '
  - pattern-inside: "function prepareRoute(...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: prepareRoute-calls-makeFullUrl
  message: prepareRoute calls makeFullUrl to construct full URL pattern
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: makeFullUrl($BASE, $PATTERN)
  - pattern-inside: "function prepareRoute(...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: namedParamsForMatch-accesses-match-element
  message: namedParamsForMatch accesses individual match elements by index
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: '$CAPTURES[$INDEX]

      '
  - pattern-inside: "function namedParamsForMatch(...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: prepareRoute-svg-png-gif-jpg-json
  message: prepareRoute includes all badge format extensions
  severity: INFO
  languages:
  - javascript
  pattern-regex: \(svg\|png\|gif\|jpg\|json\)
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: prepareRoute-handles-missing-base
  message: prepareRoute handles optional base parameter via makeFullUrl
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'makeFullUrl($BASE, $PATTERN)

        '
    - pattern: 'makeFullUrl(..., $PATTERN)

        '
  - pattern-inside: "function prepareRoute(...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: route-module-makeFullUrl-function
  message: Detected makeFullUrl function in new route.js module (refactored from _makeFullUrl)
  severity: INFO
  languages:
  - javascript
  pattern: "function makeFullUrl($BASE, $PARTIAL_URL) {\n  ...\n}\n"
  metadata:
