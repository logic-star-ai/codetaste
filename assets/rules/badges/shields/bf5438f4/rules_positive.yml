    - '**/core/base-service/route.js'
- id: route-module-exports-assertValidRoute
  message: route.js exports new assertValidRoute function for route validation
  severity: INFO
  languages:
  - javascript
  pattern-either:
  - pattern: module.exports = { ..., assertValidRoute, ... }
  - pattern: exports.assertValidRoute = ...
