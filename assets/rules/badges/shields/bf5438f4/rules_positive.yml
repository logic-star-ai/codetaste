    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: route-module-assertValidRoute-function
  message: Detected new assertValidRoute function in route.js module for upfront validation
  severity: INFO
  languages:
  - javascript
  pattern: "function assertValidRoute($ROUTE, ...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: route-module-prepareRoute-function
  message: Detected prepareRoute function in route.js (refactored from _regex and
    _regexFromPath)
  severity: INFO
  languages:
  - javascript
  pattern: "function prepareRoute({ $BASE, $PATTERN, $FORMAT, $CAPTURE }) {\n  ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: route-module-namedParamsForMatch-function
  message: Detected namedParamsForMatch function in route.js (refactored from _namedParamsForMatch)
  severity: INFO
  languages:
  - javascript
  pattern: "function namedParamsForMatch($CAPTURE_NAMES, $MATCH, $SERVICE_CLASS) {\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/base-service/route.js'
- id: route-module-exists
  message: New route.js module exists containing extracted route helper functions
  severity: INFO
