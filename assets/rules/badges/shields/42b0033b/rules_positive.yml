rules:
- id: searchparams-anywhere-in-services
  message: searchParams mentioned anywhere in services (got API)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-regex: searchParams
  metadata:
    nr_refactored_patterns: 113
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/services/*/*.js'
    exclude:
    - '**/*.spec.js'
    - '**/*.test.js'
    - '**/*.tester.js'
  options:
    symbolic_propagation: true
- id: got-searchparams-in-services
  message: Service using 'searchParams' option (got API refactored)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'searchParams: $PARAMS

      '
  - pattern-not-inside: 'qs: $X

      '
  metadata:
    nr_refactored_patterns: 95
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*.spec.js'
    - '**/*.test.js'
    - '**/got.js'
    - '**/got.spec.js'
    - '**/badge-cli.js'
  options:
    symbolic_propagation: true
- id: no-qs-option-in-services
  message: Service code without old 'qs' option usage
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: '{ ..., searchParams: $PARAMS, ... }

      '
  - pattern-not-inside: '{ ..., qs: $Q, ... }

      '
  - pattern-not: 'qs: $Y

      '
  metadata:
    nr_refactored_patterns: 95
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*.spec.js'
    - '**/*.test.js'
    - '**/got.js'
    - '**/badge-cli.js'
  options:
    symbolic_propagation: true
- id: any-searchparams-property
  message: Any searchParams property usage (got API)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: searchParams
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/services/**'
    exclude:
    - '**/*.spec.js'
    - '**/*.test.js'
    - '**/*.tester.js'
    - '**/scripts/**'
  options:
    symbolic_propagation: true
- id: jsdoc-reference-got-docs
  message: JSDoc comment references got documentation (refactored)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-regex: \/\*\*[\s\S]*?@see.*?got[\s\S]*?\*\/
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*.spec.js'
    - '**/*.test.js'
  options:
    symbolic_propagation: true
- id: got-decompress-in-services
  message: Service using 'decompress' option (got API refactored)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'decompress: $VAL

      '
  - pattern-not-inside: 'gzip: $X

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*.spec.js'
    - '**/*.test.js'
    - '**/got.js'
    - '**/got.spec.js'
  options:
    symbolic_propagation: true
- id: searchparams-property-access
  message: Accessing searchParams property (got API)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: '$OBJ.searchParams

      '
  - pattern-not: '$OBJ.qs

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*.spec.js'
    - '**/*.test.js'
    - '**/got.js'
    - '**/badge-cli.js'
  options:
    symbolic_propagation: true
- id: function-param-with-searchparams
  message: Function parameter with searchParams property (got API)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'function $FUNC({ ..., searchParams, ... }) { ... }

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*.spec.js'
    - '**/*.test.js'
    - '**/got.js'
  options:
    symbolic_propagation: true
- id: jsdoc-with-searchparams-mention
  message: JSDoc mentions searchParams (got API)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-regex: \/\*\*[\s\S]*?searchParams[\s\S]*?\*\/
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/*.spec.js'
    - '**/*.test.js'
  options:
    symbolic_propagation: true
- id: tutorial-example-searchparams
  message: Tutorial mentions searchParams (got API)
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: searchParams
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.md'
    - '**/TUTORIAL.md'
- id: readme-mentions-got
  message: Documentation mentions got (refactored)
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: '`got`'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.md'
  options:
    symbolic_propagation: true
- id: https-rejectunauthorized-word
  message: rejectUnauthorized as complete word (got API)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-regex: \brejectUnauthorized\b
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.js'
    exclude:
    - '**/*.spec.js'
    - '**/*.test.js'
    - '**/got.js'
    - '**/got.spec.js'
    - '**/scripts/**'
  options:
    symbolic_propagation: true
