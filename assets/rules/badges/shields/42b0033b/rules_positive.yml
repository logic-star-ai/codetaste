rules:
- id: options-with-searchparams-url
  message: Detected options with searchParams alongside url (got native API)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: '{ url: $URL, options: { ..., searchParams: $P, ... }, ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
- id: options-searchparams-only
  message: Detected options containing only searchParams (refactored from qs)
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'options: { searchParams: $P }

      '
  - pattern-inside: '{ url: $U, ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
- id: options-object-with-searchparams-first
