  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'const $VAR = Object.assign({}, $OPTS)

      '
  - metavariable-regex:
      metavariable: $VAR
      regex: ^(requestOptions|requestOpts)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
