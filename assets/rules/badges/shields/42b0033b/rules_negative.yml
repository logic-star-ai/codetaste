  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "if ('strictSSL' in $OPTS) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-check-auth-in-options
  message: Check for auth option should be removed. Use username and password directly.
