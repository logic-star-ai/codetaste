- id: detect-gotOptions-decompress-from-gzip
  message: This request-to-got gzip translation should be removed. Use decompress
    directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: '$GOTOPTS.decompress = $OPTS.gzip

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-return-options-with-qs
  message: Return statement should use searchParams instead of qs for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "return {\n  options: {\n    qs: $VAL,\n    ...\n  },\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-sendRequest-with-requestOptions
  message: sendRequest function should accept got options directly without conversion.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "async function sendRequest($GOT, $URL, $OPTIONS) {\n  const $GOTOPTS =\
    \ requestOptions2GotOptions($OPTIONS)\n  $GOTOPTS.throwHttpErrors = false\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-object-keys-requestOptions
  message: This request-to-got compatibility validation should be removed.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "if (Object.keys($REQUESTOPTS).length > 0) {\n  throw new Error(...)\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-foreach-interchangeable-options
  message: This request-to-got option translation loop should be removed.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "$OPTS.forEach(function ($OPT) {\n  if ($OPT in $REQUESTOPTS) {\n    $GOTOPTS[$OPT]\
    \ = $REQUESTOPTS[$OPT]\n    delete $REQUESTOPTS[$OPT]\n  }\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-https-object-creation-from-strictSSL
  message: This conversion from strictSSL to https.rejectUnauthorized should be removed.
    Use https.rejectUnauthorized directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "$OPTS.https = {\n  rejectUnauthorized: $VAL.strictSSL,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-gotOptions-assign-from-requestOptions
  message: Empty gotOptions initialization in requestOptions2GotOptions conversion
    should be removed.
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: 'const $GOTOPTS = {}

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/got.js'
    - '**/got.spec.js'
- id: detect-assign-username-from-auth-user
  message: Assignment from auth.user should be removed. Use username directly.
  severity: WARNING
  languages:
  - javascript
