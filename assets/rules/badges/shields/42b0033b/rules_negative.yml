  message: Got options variable in conversion function should be removed.
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'const $GOTOPTS = {}

      '
  - metavariable-regex:
      metavariable: $GOTOPTS
      regex: ^(gotOptions|gotOpts)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
