  languages:
  - javascript
  - typescript
  pattern: "if ('auth' in $OPTS) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-throw-unrecognised-options-error
  message: This request-to-got compatibility validation code should be removed.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: 'throw new Error(`Found unrecognised options ${...}`)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-gotOptions-username-from-auth-user
  message: This request-to-got auth translation should be removed. Use username directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: '$GOTOPTS.username = $OPTS.auth.user

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-gotOptions-password-from-auth-pass
  message: This request-to-got auth translation should be removed. Use password directly.
