rules:
- id: detect-nested-qs-in-options-object
  message: Nested options should use searchParams instead of qs for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "{\n  ...,\n  options: {\n    ...,\n    qs: $VAL,\n    ...\n  },\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 78
- id: detect-qs-property-in-merged-options
  message: Options object should use searchParams instead of qs for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "{\n  options: {\n    qs: {\n      ...\n    },\n    ...\n  },\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 65
- id: detect-qs-in-test-fixture
  message: Test fixture should use searchParams instead of qs.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "const $VAR = {\n  ...,\n  qs: $VAL,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-strictSSL-option-in-object
  message: Replace strictSSL option with https.rejectUnauthorized for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: '{ ..., strictSSL: $VAL, ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-nested-strictSSL-in-options-object
  message: Nested options should use https.rejectUnauthorized instead of strictSSL
    for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "{\n  ...,\n  options: {\n    ...,\n    strictSSL: $VAL,\n    ...\n  },\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-options-qs-property-access
  message: Access to qs property should be replaced with searchParams for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: '$OPTS.qs

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-options-strictSSL-false
  message: strictSSL option should be replaced with https.rejectUnauthorized for got
    library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: '{ ..., strictSSL: false, ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-jsdoc-request-library-reference
  message: JSDoc should reference got library documentation, not request library.
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: '@see\s+https?://github\.com/request/request'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-jsdoc-options-param-mention-request
  message: JSDoc for options parameter should reference got library not request.
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: '@param.*options.*request'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-nested-gzip-in-options-object
  message: Nested options should use decompress instead of gzip for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "{\n  ...,\n  options: {\n    ...,\n    gzip: $VAL,\n    ...\n  },\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-options-gzip-true
  message: gzip option should be replaced with decompress for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: '{ ..., gzip: true, ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-requestOptions2GotOptions-call
  message: Call to requestOptions2GotOptions should be removed. Use got options directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: requestOptions2GotOptions(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-auth-object-with-user-pass
  message: Replace auth object with user/pass with spread username and password for
    got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: '{ ..., auth: { ..., user: $USER, ..., pass: $PASS, ... }, ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-options-with-auth-key
  message: Options should spread username and password instead of nesting auth object
    for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "{\n  options: {\n    auth: $AUTH,\n    ...\n  },\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-options-qs-in-spread
  message: Spread options should use searchParams instead of qs for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: '{ ...$OPTS, qs: $VAL }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-delete-qs-from-requestOptions
  message: This request-to-got option translation code should be removed.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: 'delete $OPTS.qs

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-check-qs-in-options
  message: Check for qs option should be removed. Use searchParams directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "if ('qs' in $OPTS) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-options-strictSSL-property-access
  message: Access to strictSSL property should be replaced with https.rejectUnauthorized
    for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: '$OPTS.strictSSL

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-options-qs-spread
  message: Options should use searchParams instead of qs for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "{\n  options: {\n    qs: {\n      ...$EXISTING,\n      ...\n    },\n \
    \   ...\n  },\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-requestOptions2GotOptions-function-definition
  message: The requestOptions2GotOptions compatibility function should be removed.
    Use got options directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: 'function requestOptions2GotOptions(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-requestOptions2GotOptions-import
  message: Import of requestOptions2GotOptions should be removed. Use got options
    directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., requestOptions2GotOptions, ... } from $MOD
    - pattern: import { requestOptions2GotOptions } from $MOD
    - pattern: 'const { ..., requestOptions2GotOptions, ... } = require($MOD)

        '
    - pattern: 'const { requestOptions2GotOptions } = require($MOD)

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-function-call-with-strictSSL
  message: Replace strictSSL with https.rejectUnauthorized for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: '$FUNC({ ..., strictSSL: $VAL, ... })

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-user-field-in-destructuring
  message: Replace user and pass variable names with username and password for got
    library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'const { _user: user, _pass: pass } = $OBJ

        '
    - pattern: 'const { user, pass } = $OBJ

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-user-variable-name-in-destructuring
  message: Replace user variable with username for got library.
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'const { ..., _user: user, ... } = $OBJ

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-request-option-in-sendRequest
  message: Remove requestOptions2GotOptions call and use got options directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "async function sendRequest($GOT, $URL, $OPTIONS) {\n  const $GOTOPTS =\
    \ requestOptions2GotOptions($OPTIONS)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-interchangeable-options-array
  message: This request-to-got compatibility code should be removed.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: 'const interchangableOptions = [''body'', ''form'', ''headers'', ''method'',
    ''url'']

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-qs-to-searchParams-conversion
  message: This request-to-got qs conversion code should be removed. Use searchParams
    directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "if ('qs' in $OPTS) {\n  $GOTOPTS.searchParams = $OPTS.qs\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-gzip-to-decompress-conversion
  message: This request-to-got gzip conversion code should be removed. Use decompress
    directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "if ('gzip' in $OPTS) {\n  $GOTOPTS.decompress = $OPTS.gzip\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-strictSSL-in-auth-conversion
  message: This request-to-got strictSSL conversion code should be removed. Use https.rejectUnauthorized
    directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "if ('strictSSL' in $OPTS) {\n  $GOTOPTS.https = {\n    rejectUnauthorized:\
    \ $OPTS.strictSSL,\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-auth-conversion-in-requestOptions2GotOptions
  message: This request-to-got auth conversion code should be removed. Use username
    and password directly.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "if ('auth' in $OPTS) {\n  $GOTOPTS.username = $OPTS.auth.user\n  $GOTOPTS.password\
    \ = $OPTS.auth.pass\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-delete-auth-from-requestOptions
  message: This request-to-got option translation code should be removed.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: 'delete $OPTS.auth

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
