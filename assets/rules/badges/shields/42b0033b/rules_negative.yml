  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-interchangeable-options-loop
  message: Request-to-got option translation loop should be removed.
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: "$OPTS.forEach(function ($OPT) {\n  ...\n})\n"
  - pattern-inside: "function requestOptions2GotOptions(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
