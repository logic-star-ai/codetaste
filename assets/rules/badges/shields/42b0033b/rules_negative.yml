  languages:
  - javascript
  - typescript
  pattern: "if ('gzip' in $OPTS) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-check-strictSSL-in-options
  message: Check for strictSSL option should be removed. Use https.rejectUnauthorized
