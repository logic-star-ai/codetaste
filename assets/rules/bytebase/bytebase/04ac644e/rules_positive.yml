  severity: INFO
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: (SETTING_ROUTE_[A-Z_]+.*){2,}
  metadata:
    category: config
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: route-constant-string-template-embedded
