rules:
- id: route-constant-pattern-any-module
  message: Detected route constant with standardized _ROUTE_ pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: \b\w+_V1_ROUTE_\w+|\bSETTING_ROUTE_\w+
  metadata:
    category: basic
    nr_refactored_patterns: 159
    nr_legacy_patterns: 0
- id: route-constant-with-route-pattern-setting
  message: Detected setting route constant with _ROUTE_ pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: SETTING_ROUTE_[A-Z_]+
  metadata:
    category: config
    nr_refactored_patterns: 110
    nr_legacy_patterns: 0
- id: setting-route-prefix-pattern
  message: Detected SETTING_ROUTE_ prefixed constant (refactored pattern)
  severity: INFO
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: \bSETTING_ROUTE_\w+
  metadata:
    category: config
    nr_refactored_patterns: 110
    nr_legacy_patterns: 0
- id: route-file-exports-with-route-infix
  message: Detected route constant export with _ROUTE_ infix pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: export const \w+_ROUTE_\w+ =
  metadata:
    category: basic
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
- id: route-name-equals-route-constant
  message: Detected route name property assigned to route constant
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: name:\s*(PROJECT_V1_ROUTE_|SETTING_ROUTE_)[A-Z_]+
  metadata:
    category: basic
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: route-constant-in-string-template
  message: Detected route constant reference in template string
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: '`[^`]*(PROJECT_V1_ROUTE_|SETTING_ROUTE_)[A-Z_]+[^`]*`'
  metadata:
    category: basic
    nr_refactored_patterns: 50
    nr_legacy_patterns: 0
- id: route-constant-with-route-pattern-project
  message: Detected project route constant with _ROUTE_ pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  - vue
