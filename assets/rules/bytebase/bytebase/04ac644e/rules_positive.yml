  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: export\s+const\s+SETTING_ROUTE_[A-Z_]+\s*=
  metadata:
    category: config
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
- id: multiple-setting-route-constants-in-one-line
