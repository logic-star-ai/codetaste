rules:
- id: detect-project-route-constant-with-route-prefix
  message: Detected route constant with _ROUTE_ prefix
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: export const $CONST = $VAL
    - pattern: const $CONST = $VAL
  - metavariable-regex:
      metavariable: $CONST
      regex: .*_ROUTE_.*
  metadata:
    nr_refactored_patterns: 110
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/router/**/*.ts'
    - '**/routes/**/*.ts'
- id: detect-route-constant-usage-in-component
  message: Route constant used in component
  severity: INFO
  languages:
  - vue
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ name: $ROUTE }'
    - pattern: 'name: $ROUTE'
  - metavariable-regex:
      metavariable: $ROUTE
      regex: '[A-Z_]+_ROUTE_[A-Z_]+'
  metadata:
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
- id: detect-route-usage-in-object-literal
  message: Route constant in object literal
  severity: INFO
  languages:
  - typescript
  - javascript
  - vue
  patterns:
  - pattern: '{ name: $ROUTE }'
  - metavariable-regex:
      metavariable: $ROUTE
      regex: .*_ROUTE_.*
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
- id: detect-route-in-switch-case
  message: Route constant in switch case
  severity: INFO
  languages:
  - typescript
  - javascript
  - vue
  patterns:
  - pattern: "case $ROUTE:\n  ...\n"
  - metavariable-regex:
      metavariable: $ROUTE
      regex: .*_ROUTE_.*
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: detect-route-name-multi-import
  message: Multiple route constant imports
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { $A, $B } from '$PATH'
  - metavariable-regex:
      metavariable: $A
      regex: .*_ROUTE_.*
  - metavariable-regex:
      metavariable: $B
      regex: .*_ROUTE_.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-route-constant-in-redirect
  message: Route constant in redirect
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'redirect: { name: $NAME }'
  - metavariable-regex:
      metavariable: $NAME
      regex: .*_ROUTE_.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-route-as-function-param
  message: Route constant as function parameter
  severity: INFO
  languages:
  - typescript
  - javascript
  - vue
  patterns:
  - pattern: $FUNC($ROUTE)
  - metavariable-regex:
      metavariable: $ROUTE
      regex: ^[A-Z]+_ROUTE_[A-Z0-9_]+$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
