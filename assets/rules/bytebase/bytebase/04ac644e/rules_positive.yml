  patterns:
  - pattern: "[\n  ...,\n  { name: $CONST, ... },\n  ...\n]\n"
  - metavariable-regex:
      metavariable: $CONST
      regex: ^[A-Z][A-Z0-9_]*_ROUTE[A-Z0-9_]*$
  - pattern-inside: 'const $VAR: $TYPE = [...]

      '
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: route-children-with-name-constant
