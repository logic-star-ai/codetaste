rules:
- id: project-route-constant-with-route-prefix
  message: Detected new project route constant with _ROUTE_ prefix
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export const $CONST = ...
  - metavariable-regex:
      metavariable: $CONST
      regex: (?i)^[A-Z0-9_]*_ROUTE_[A-Z0-9_]+$
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/router/**/*.ts'
    - '**/routes/**/*.ts'
  options:
    symbolic_propagation: true
- id: route-constant-in-object-literal
  message: Route constant used in object literal
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '{ ..., name: $CONST, ... }'
  - metavariable-regex:
      metavariable: $CONST
      regex: (?i)^[A-Z][A-Z0-9_]+_ROUTE_[A-Z0-9_]+$
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: workspace-setting-export
  message: Workspace setting constant export
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: export const $NAME = "$VALUE"
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/workspaceSetting.ts'
  options:
    symbolic_propagation: true
- id: switch-case-route-constant
  message: Switch case using route constant
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "case $CONST:\n  ...\n"
  - metavariable-regex:
      metavariable: $CONST
      regex: (?i)^[A-Z][A-Z0-9_]*_ROUTE_.*$
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: route-constant-member-access
  message: Route constant accessed as member
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $OBJ.$CONST
  - metavariable-regex:
      metavariable: $CONST
      regex: (?i)^[A-Z][A-Z0-9_]*_ROUTE_.*$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-route-constants-with-route-infix
  message: Detected import of route constants with _ROUTE_ infix
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., $CONST, ... } from $PATH
    - pattern: import { $CONST } from $PATH
  - metavariable-regex:
      metavariable: $CONST
      regex: (?i).*_ROUTE_.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
