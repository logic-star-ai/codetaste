rules:
- id: any-module-route-constant-pattern
  message: Detected usage of any module's _ROUTE_ pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \b[A-Z][A-Z0-9_]*_ROUTE_[A-Z_]+\b
  metadata:
    nr_refactored_patterns: 169
    nr_legacy_patterns: 0
- id: route-infix-in-any-constant
  message: Detected _ROUTE_ infix in any constant
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \b[A-Z][A-Z0-9]*_ROUTE_[A-Z]
  metadata:
    nr_refactored_patterns: 120
    nr_legacy_patterns: 0
- id: setting-route-prefix-pattern
  message: Detected SETTING_ROUTE prefix usage
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \bSETTING_ROUTE_[A-Z]
  metadata:
    nr_refactored_patterns: 110
    nr_legacy_patterns: 0
- id: setting-route-workspace-pattern
  message: Detected usage of SETTING_ROUTE_WORKSPACE_ pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: SETTING_ROUTE_WORKSPACE_[A-Z_]+
  metadata:
    nr_refactored_patterns: 84
    nr_legacy_patterns: 0
- id: route-constant-string-value-with-route-infix
  message: Detected route constant definition with _ROUTE_ infix in string value
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export const $CONST = "$VALUE"
  - metavariable-regex:
      metavariable: $CONST
      regex: ^[A-Z][A-Z0-9_]*_ROUTE_[A-Z_]+$
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/router/**/*.ts'
- id: colon-separator-route-name-constant
  message: Detected object property with route constant after colon
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: :\s*[A-Z][A-Z0-9_]*_ROUTE_[A-Z_]+
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
- id: multiline-object-with-name-route
  message: Detected multiline object with name route property
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \{\s*\n[^}]*name:\s*[A-Z][A-Z0-9_]*_ROUTE
  metadata:
    nr_refactored_patterns: 54
    nr_legacy_patterns: 0
- id: route-meta-with-name-constant
  message: Detected route meta configuration with name from constant
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "{\n  ...,\n  name: $CONST,\n  meta: { ... },\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CONST
      regex: ^[A-Z][A-Z0-9_]*_ROUTE[A-Z0-9_]*$
  metadata:
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: project-v1-route-branches-pattern
  message: Detected usage of PROJECT_V1_ROUTE_BRANCHES or similar pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: PROJECT_V1_ROUTE_[A-Z_]+
  metadata:
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
- id: route-constant-in-string-double-quotes
  message: Detected route constant pattern in string
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: '"[^"]*[A-Z_]+_ROUTE_[A-Z_]+[^"]*"'
  metadata:
    nr_refactored_patterns: 47
    nr_legacy_patterns: 0
- id: route-constant-in-backtick-template
  message: Detected route constant in template literal
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: '`[^`]*[A-Z_]+_ROUTE_[A-Z_]+[^`]*`'
  metadata:
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
- id: export-all-setting-route-constants
  message: Detected export of SETTING_ROUTE constants
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: export\s+const\s+SETTING_ROUTE_\w+
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
- id: multiple-route-constants-per-line
  message: Detected multiple route constants on same line
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: ([A-Z_]+_ROUTE_[A-Z_]+).*([A-Z_]+_ROUTE_[A-Z_]+)
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
- id: project-v1-route-constant-definition-new-pattern
  message: Detected new project V1 route constant with _ROUTE_ infix pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export const $CONST = ...
  - metavariable-regex:
      metavariable: $CONST
      regex: ^PROJECT_V1_ROUTE_[A-Z_]+$
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/router/**/*.ts'
    - '**/routes/**/*.ts'
- id: workspace-setting-route-constant-definition-new-pattern
  message: Detected new workspace setting route constant with SETTING_ROUTE_WORKSPACE
    prefix
  severity: INFO
