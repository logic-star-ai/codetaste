rules:
- id: src-util-directory-exists
  message: The src/util/ directory exists as the consolidated location for utilities
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 47
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/ai/src/util/
- id: import-from-src-util-in-any-core-module
  message: Import from ../../src/util/ detected in core module (consolidated utility
    path)
  severity: INFO
  languages:
  - typescript
  pattern-regex: from\s+["\x27]\.\.\/\.\./src/util/[a-z\-]+
  metadata:
    category: structural
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/ai/core/*/*.ts
