rules:
- id: no-client-output-property-access
  message: Direct output method call without client.output prefix (singleton pattern)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: output.$METHOD(...)
  - pattern-not: $CLIENT.output.$METHOD(...)
  - pattern-not: client.output.$METHOD(...)
  - pattern-inside: 'import output from ''$PATH''

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 965
    nr_legacy_patterns: 0
- id: output-before-return
  message: Output singleton call before return statement
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'output.$METHOD(...);

      return $VAL;

      '
  - pattern-not-inside: 'const { output } = client;

      ...

      '
  - pattern-inside: 'import output from ''$PATH''

      ...

      '
  metadata:
    category: basic
    nr_refactored_patterns: 379
    nr_legacy_patterns: 0
- id: function-call-without-passing-output
  message: Function called with client but not output argument (refactored to use
    singleton)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: $FUNC(client, ...)
  - pattern-not: $FUNC(output, client, ...)
  - pattern-not: $FUNC($ANY, output, client, ...)
  - pattern-inside: 'import output from ''$PATH''

      ...

      $FUNC(client, ...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 371
    nr_legacy_patterns: 0
- id: await-function-call-with-client-only
  message: Awaited function call with client but not output (uses singleton)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: await $FUNC(client, ...)
  - pattern-not: await $FUNC(output, client, ...)
