rules:
- id: open-dialog-two-parameters
  message: Old openDialog API detected. Use new component-based API instead.
  severity: WARNING
  languages:
  - ts
  - typescript
  patterns:
  - pattern: openDialog($TYPE, $CONFIG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: active-dialog-type-equality-check
  message: Hardcoded dialog type comparison detected. Remove conditional rendering
    logic.
  severity: WARNING
  languages:
  - ts
  - typescript
  patterns:
  - pattern: activeDialogType === $STR
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: config-object-with-payload-and-title-dialog
  message: Old openDialog API with title and payload detected. Use new API with component
    property.
  severity: WARNING
  languages:
  - ts
  - typescript
  patterns:
  - pattern: "openDialog($TYPE, {\n  title: $TITLE,\n  payload: $PAYLOAD\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: form-with-shared-dialog-props
  message: Form component receiving sharedDialogProps detected. Update to pass props
    directly with new API.
  severity: WARNING
  languages:
  - ts
  - typescript
  patterns:
  - pattern: <$FORM {...sharedDialogProps} />
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: config-payload-onsubmit-pattern
  message: Passing onSubmit through payload object detected. Pass props directly to
    component in new API.
  severity: WARNING
  languages:
  - ts
  - typescript
  patterns:
  - pattern: "{\n  payload: {\n    onSubmit: $FUNC,\n    ...\n  }\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
