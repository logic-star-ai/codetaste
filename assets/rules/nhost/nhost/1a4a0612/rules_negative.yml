- id: dynamic-import-in-dialog-provider-drawer
  message: Dynamic import in DialogProvider detected. Forms should be imported at
    usage sites with the new API.
  severity: WARNING
  languages:
  - ts
  - typescript
  patterns:
  - pattern: 'const $FORM = dynamic(() => import($PATH), ...)

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/DialogProvider.tsx'
- id: action-payload-config-access
  message: Accessing action.payload.config detected. Update to new component-based
    action payload structure.
  severity: WARNING
