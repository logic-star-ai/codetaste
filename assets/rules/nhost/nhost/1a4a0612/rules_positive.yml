rules:
- id: open-drawer-with-title-component
  message: Detected new openDrawer with title and component
  severity: INFO
  languages:
  - typescript
  pattern: '$FUNC({ title: $TITLE, component: $COMP, ... })'
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tsx'
    - '**/*.ts'
- id: jsx-element-in-component-field
  message: Detected JSX element assigned to component field
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'component: <$ELEM />'
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tsx'
    - '**/*.ts'
- id: open-multiline-component-config
  message: Detected open with multiline component configuration
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "$FUNC({\n  title: $T,\n  component: <$C\n    $P={$V}\n  />,\n  ...\n\
      })\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(open|show).*
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tsx'
    - '**/*.ts'
