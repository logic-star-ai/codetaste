rules:
- id: open-dialog-with-component-prop
  message: Detected refactored openDialog call with component prop
  severity: INFO
  languages:
  - typescript
  pattern: '$OPEN_FN({ ..., component: <$COMPONENT ... />, ... })'
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
- id: import-form-near-usage
  message: Detected form import near openDialog call
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'import $FORM from ''$PATH''

      ...

      $OPEN({ ... })

      '
  - metavariable-regex:
      metavariable: $FORM
      regex: (?i).*(form|dialog|drawer).*
  - metavariable-regex:
      metavariable: $OPEN
      regex: (?i)^(open(Dialog|Drawer))$
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*form.*
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: form-component-with-location-prop
  message: Detected form component receiving location prop
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: "function $FORM({ ..., location, ... }: $PROPS) {\n  ...\n}\n"
    - pattern: "const $FORM = ({ ..., location, ... }: $PROPS) => {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FORM
      regex: (?i).*(form|component).*
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: form-with-dialog-props
  message: Detected form extending dialog props
  severity: INFO
  languages:
  - typescript
  pattern-regex: extends\s+(Dialog|Drawer|Modal)(Form)?Props
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: no-active-dialog-type-check
  message: Detected absence of activeDialogType conditional check
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-not-inside: '{$TYPE === ''CREATE_TABLE'' && ...}

      '
  - pattern-not-inside: '{$TYPE === ''EDIT_TABLE'' && ...}

      '
  - pattern-not-inside: '{$TYPE === ''CREATE_COLUMN'' && ...}

      '
  - pattern: $RENDER
  - metavariable-regex:
      metavariable: $RENDER
      regex: (?i)^(active(Dialog|Drawer|Component))$
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/DialogProvider.tsx'
    - '**/DialogProvider.ts'
- id: state-active-dialog-element
  message: Detected activeDialog as element in state
  severity: INFO
  languages:
  - typescript
  pattern: 'activeDialog: $TYPE'
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: clone-element-with-location-injection
  message: Detected cloneElement injecting location prop
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'cloneElement($ELEM, { ..., location: $LOC, ... })'
  - metavariable-regex:
      metavariable: $LOC
      regex: (?i)^('drawer'|'dialog'|"drawer"|"dialog")$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: form-activity-indicator-component
  message: Detected extracted FormActivityIndicator component
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: "function FormActivityIndicator(...) {\n  ...\n}\n"
  - pattern: "const FormActivityIndicator = (...) => {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: state-with-component-field
  message: Detected state interface with component/element field
  severity: INFO
  languages:
  - typescript
  pattern-regex: (component|activeDialog|activeDrawer|element):\s*(React\.)?ReactElement
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: dialog-open-options-interface
  message: Detected dialog open options interface
  severity: INFO
  languages:
  - typescript
  pattern-regex: interface\s+Open(Dialog|Drawer)(Options|Config)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: dialog-form-base-interface
  message: Detected base dialog form interface
  severity: INFO
  languages:
  - typescript
  pattern-regex: interface\s+DialogFormProps
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: component-prop-in-options
  message: Detected component in options interface
  severity: INFO
  languages:
  - typescript
  pattern-regex: interface.*Options.*\{[^}]*component
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: dialog-context-component-based-api
  message: Detected component-based API in DialogContext
  severity: INFO
  languages:
  - typescript
  pattern-regex: openDialog.*\(.*options
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/DialogContext.ts'
