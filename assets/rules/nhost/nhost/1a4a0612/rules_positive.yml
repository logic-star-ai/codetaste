rules:
- id: open-dialog-object-parameter
  message: Detected openDialog with object parameter (new API)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: openDialog($OBJ)
  - metavariable-pattern:
      metavariable: $OBJ
      pattern: '{...}'
  - pattern-not: openDialog('$STR', ...)
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: props-with-oncancel-location
  message: Detected props with onCancel and location
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: "{\n  ...,\n  location: $L,\n  ...,\n  onCancel: $C,\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: location-onsubmit-props
  message: Detected props with location and onSubmit
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: "{\n  ...,\n  location: $L,\n  onSubmit: $S,\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: form-activity-indicator-component
  message: Detected FormActivityIndicator component
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: <$COMP ... />
    - pattern: const $VAR = $COMP
  - metavariable-regex:
      metavariable: $COMP
      regex: .*FormActivity.*
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: open-drawer-object-single-arg
  message: Detected openDrawer with single object argument
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: openDrawer($ARG)
  - metavariable-pattern:
      metavariable: $ARG
      pattern: '{...}'
  - pattern-not: openDrawer('$TYPE', ...)
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: open-dialog-in-arrow
  message: Detected openDialog in arrow function
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "() => {\n  ...\n  openDialog({...});\n  ...\n}\n"
  - pattern-not-inside: 'openDialog(''$TYPE'', ...)

      '
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: no-string-type-open-dialog
  message: Detected openDialog without string type param
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: openDialog($ARG)
  - pattern-not: openDialog('$TYPE', ...)
  - metavariable-pattern:
      metavariable: $ARG
      patterns:
      - pattern: '{...$PROPS}'
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: clone-element-with-location
  message: Detected cloneElement with location in props
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "cloneElement($E, {\n  ...,\n  location: $L,\n  ...\n})\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: component-type-field
  message: Detected component field in type
  severity: INFO
  languages:
  - typescript
  pattern-regex: component\s*:\s*React
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
