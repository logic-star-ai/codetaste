- id: component-props-this-untyped
  message: Access to this.props in unmigrated JSX component - needs TypeScript types
  severity: WARNING
  languages:
  - javascript
  pattern: 'this.props

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 55
  paths:
