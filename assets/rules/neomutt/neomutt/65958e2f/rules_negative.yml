  message: Case label uses old centralized SORT_ constant for email - use EMAIL_SORT_*
    constant
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-regex: 'case\s+SORT_(DATE|SIZE|SUBJECT|FROM|TO|RECEIVED|SCORE|SPAM|LABEL|THREADS|ORDER)\s*:'
