  severity: INFO
  languages:
  - c
  patterns:
  - pattern-regex: (//|/\*|\*).*\bcompare_(score|size|date_sent|subject|to|from|date_received|order|spam|label)\b
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
