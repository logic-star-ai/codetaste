  message: Rename compare_* functions to email_sort_* after refactoring
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-regex: static\s+int\s+compare_(score|size|date_sent|subject|to|from|date_received|order|spam|label)\s*\(
  metadata:
