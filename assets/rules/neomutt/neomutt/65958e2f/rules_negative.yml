  message: Sort mapping table uses old centralized SORT_ constants - migrate to component-specific
    constants
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-regex: \{\s*"(address|keyid|trust|alpha|flagged|path|alias|name|email)"\s*,\s*SORT_(ADDRESS|KEYID|TRUST|ALPHA|FLAGGED|PATH|ALIAS|NAME|EMAIL)\s*\}
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: cs-subset-old-sort-var
  message: cs_subset call with old config variable name - use new naming (alias_sort,
    browser_sort, pgp_key_sort, sidebar_sort)
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-regex: cs_subset_\w+\([^,]+,\s*"(sort_alias|sort_browser|pgp_sort_keys|sidebar_sort_method)"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: sort-email-comparison-equality
  message: Equality comparison with old centralized email SORT_ constant - use EMAIL_SORT_*
    constant
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: $VAR == SORT_DATE
    - pattern: $VAR == SORT_SIZE
    - pattern: $VAR == SORT_SUBJECT
    - pattern: $VAR == SORT_FROM
    - pattern: $VAR == SORT_TO
    - pattern: $VAR == SORT_THREADS
    - pattern: $VAR == SORT_RECEIVED
    - pattern: $VAR == SORT_SCORE
    - pattern: $VAR == SORT_SPAM
    - pattern: $VAR == SORT_LABEL
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
