    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: old-sorttype-variable-decl
  message: Variable declaration with enum SortType - use component-specific sort enum
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-regex: enum\s+SortType\s+\w+\s*[=;]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: old-sort-threads-constant
