rules:
- id: old-sort-order-constant
  message: Use component-specific sort constant instead of centralized SORT_ORDER
    constant
  severity: WARNING
  languages:
  - c
  pattern: SORT_ORDER
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: old-sort-date-email-constant
  message: Use EMAIL_SORT_DATE or KEY_SORT_DATE instead of centralized SORT_DATE constant
