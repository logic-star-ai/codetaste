- id: detect-middleware-array-export
  message: Detected export of middleware array from new middleware loading file
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: export default [ ...$MIDDLEWARES ]
  metadata:
    category: structural
    nr_refactored_patterns: 71
    nr_legacy_patterns: 0
  paths:
    include:
    - react/features/app/middlewares.*.js
