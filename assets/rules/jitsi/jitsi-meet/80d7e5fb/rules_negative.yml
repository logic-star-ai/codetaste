rules:
- id: named-export-with-reducer-import
  message: 'Refactor needed: Index.js has named exports with implicit reducer import.
    Remove reducer import.'
  severity: WARNING
  languages:
  - javascript
  pattern: 'export { $EXPORT }

    ...

    import ''./reducer''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 308
  paths:
    include:
    - '*/index.js'
    exclude:
    - react/features/dynamic-branding/index.js
- id: export-default-with-reducer-import
  message: 'Refactor needed: Index.js has default export with implicit reducer import.
    Remove reducer import.'
  severity: WARNING
  languages:
  - javascript
  pattern: 'export default $DEFAULT

    ...

    import ''./reducer''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 308
  paths:
    include:
    - '*/index.js'
    exclude:
    - react/features/dynamic-branding/index.js
- id: named-export-with-middleware-import
  message: 'Refactor needed: Index.js has named exports with implicit middleware import.
    Remove middleware import.'
  severity: WARNING
  languages:
  - javascript
  pattern: 'export { $EXPORT }

    ...

    import ''./middleware''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 238
  paths:
    include:
    - '*/index.js'
- id: export-default-with-middleware-import
  message: 'Refactor needed: Index.js has default export with implicit middleware
    import. Remove middleware import.'
  severity: WARNING
  languages:
  - javascript
  pattern: 'export default $DEFAULT

    ...

    import ''./middleware''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 238
  paths:
    include:
    - '*/index.js'
- id: index-with-only-reducer-and-exports
  message: 'Refactor needed: Index.js exports with implicit reducer. Remove reducer
    import and load explicitly in manifests.'
  severity: WARNING
  languages:
  - javascript
  pattern: 'export * from $EXPORT

    ...

    import ''./reducer''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 171
  paths:
    include:
    - '*/index.js'
    exclude:
    - react/features/dynamic-branding/index.js
- id: index-with-only-middleware-and-exports
  message: 'Refactor needed: Index.js exports with implicit middleware. Remove middleware
    import and load explicitly in manifests.'
  severity: WARNING
  languages:
  - javascript
  pattern: 'export * from $EXPORT

    ...

    import ''./middleware''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 146
  paths:
    include:
    - '*/index.js'
- id: any-side-effect-import-in-index
  message: 'Refactor needed: Index.js contains side-effect import (middleware/reducer/subscriber).
    Remove and add to platform manifests.'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: import\s+['"]\.\/(?:middleware|reducer|subscriber)['"];?
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 137
  paths:
    include:
    - '*/index.js'
    exclude:
    - react/features/dynamic-branding/index.js
- id: multiple-exports-with-reducer
  message: 'Refactor needed: Index.js has multiple exports with implicit reducer.
