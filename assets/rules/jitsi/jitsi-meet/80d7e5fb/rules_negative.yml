- id: index-only-imports-no-exports
  message: 'Refactor needed: Index.js file only contains side-effect imports (middleware/reducer/subscriber)
    without exports. This file should be deleted.'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: ^(?!export)[\s\S]*import\s+['"]\.\/(?:middleware|reducer|subscriber)['"];?\s*(?:\nimport\s+['"]\.\/(?:middleware|reducer|subscriber)['"];?\s*)*$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 82
  paths:
    include:
    - '*/index.js'
    exclude:
    - react/features/dynamic-branding/index.js
- id: implicit-middleware-import-in-index
  message: 'Refactor needed: Remove implicit middleware import from index.js. Middleware
    should be explicitly imported in platform-specific middleware.{any|web|native}.js
    files instead.'
  severity: WARNING
  languages:
  - javascript
  pattern: 'import ''./middleware''

    '
  metadata:
