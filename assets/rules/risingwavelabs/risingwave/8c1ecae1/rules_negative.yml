rules:
- id: executor-impl-block-for-specific-executor
  message: Full Executor trait implementation with all metadata methods indicates
    old pattern. Should implement Execute trait instead.
  severity: WARNING
  languages:
  - rust
  pattern: "impl Executor for $EXECUTOR {\n  fn execute(self: Box<Self>) -> BoxedMessageStream\
    \ { ... }\n  fn schema(&self) -> &Schema { ... }\n  fn pk_indices(&self) -> $TYPE\
    \ { ... }\n  fn identity(&self) -> &str { ... }\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: executor-access-info-pk-indices
  message: Accessing self.info.pk_indices indicates executor stores unused info. Executors
    should only store data they use.
  severity: WARNING
  languages:
  - rust
  pattern: self.info.pk_indices
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
  paths:
    exclude:
    - src/stream/src/executor/hash_agg.rs
    - src/stream/src/executor/hash_join.rs
    - src/stream/src/executor/join/hash_join.rs
