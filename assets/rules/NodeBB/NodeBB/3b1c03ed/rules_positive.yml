rules:
- id: refactor-plugins-hooks-namespace-member-expression
  message: 'Detected reference to refactored hooks namespace: plugins.hooks.method'
  severity: INFO
  languages:
  - javascript
  pattern: plugins.hooks.$METHOD
  metadata:
    category: structural
    nr_refactored_patterns: 347
    nr_legacy_patterns: 0
- id: refactor-plugins-hooks-fire-basic
  message: 'Detected refactored hook method: plugins.hooks.fire() (new namespace pattern)'
  severity: INFO
  languages:
  - javascript
  pattern: plugins.hooks.fire(...)
  metadata:
    category: api
    nr_refactored_patterns: 305
    nr_legacy_patterns: 0
