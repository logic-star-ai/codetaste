rules:
- id: reth-rlp-extern-crate
  message: Old 'extern crate reth_rlp' declaration detected. Replace with 'extern
    crate alloy_rlp' or use imports as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: extern crate reth_rlp;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 204
- id: reth-rlp-cfg-test-import
  message: Test-only reth_rlp import detected. Replace with 'use alloy_rlp::$REST'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: '#[cfg(test)]

    use reth_rlp::$REST;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 200
- id: reth-rlp-pub-use-reexport
  message: Public re-export of reth_rlp item detected. Replace with 'pub use alloy_rlp::$REST'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: pub use reth_rlp::$REST;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 200
- id: reth-rlp-pub-crate-use
  message: Crate-visible reth_rlp import detected. Replace with 'pub(crate) use alloy_rlp::$REST'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: pub(crate) use reth_rlp::$REST;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 200
- id: reth-rlp-pub-super-use
  message: Super-visible reth_rlp import detected. Replace with 'pub(super) use alloy_rlp::$REST'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: pub(super) use reth_rlp::$REST;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 200
- id: reth-rlp-decodable-method-call
  message: Qualified call to reth_rlp::Decodable::decode() detected. Replace with
    'alloy_rlp::Decodable::decode()' as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::Decodable::decode($X)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 70
- id: reth-rlp-question-mark-decode
  message: Decode call with question mark operator using reth_rlp detected. Replace
    with 'alloy_rlp::Decodable::decode()' as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::Decodable::decode($X)?
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
- id: reth-rlp-encodable-import
  message: Old reth_rlp::Encodable import detected. Replace with 'use alloy_rlp::Encodable'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::Encodable;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 55
- id: reth-rlp-decodable-import
  message: Old reth_rlp::Decodable import detected. Replace with 'use alloy_rlp::Decodable'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::Decodable;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
- id: reth-rlp-decode-error-variant-simple
  message: Reference to reth_rlp::DecodeError detected. Replace with 'alloy_rlp::Error'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \b(reth_rlp::DecodeError)\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
- id: reth-rlp-nested-path
  message: Nested path reference to reth_rlp detected. Replace with alloy_rlp equivalent
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: reth_rlp::\w+::\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: reth-rlp-slice-usage
  message: Slice or array with reth_rlp type detected. Replace with alloy_rlp equivalent
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: '\[.*reth_rlp::'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: reth-rlp-enum-tuple-variant
  message: Enum tuple variant with reth_rlp::DecodeError detected. Replace with 'alloy_rlp::Error'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \w+\([^)]*reth_rlp::DecodeError[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: reth-rlp-decode-error-custom
  message: Reference to reth_rlp::DecodeError::Custom variant detected. Replace with
    'alloy_rlp::Error' equivalent as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::DecodeError::Custom($MSG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: reth-rlp-length-of-length-fn-call
  message: Call to reth_rlp::length_of_length() detected. Replace with 'alloy_rlp::length_of_length()'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::length_of_length($X)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: reth-rlp-length-impl
  message: Call to reth_rlp::length_of_length() detected. Replace with 'alloy_rlp::length_of_length()'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::length_of_length($X)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: reth-rlp-decode-error-import
  message: Old reth_rlp::DecodeError import detected. Replace with 'use alloy_rlp::Error'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::DecodeError;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: reth-rlp-cargo-workspace-dependency
  message: Old reth-rlp workspace dependency detected in Cargo.toml. Replace with
    'alloy-rlp.workspace = true' or 'alloy-rlp = "0.3"' as part of the migration to
    alloy-rlp.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*reth-rlp\s*\.\s*workspace\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: reth-rlp-header-decode-call
  message: Call to reth_rlp::Header::decode() detected. Replace with 'alloy_rlp::Header::decode()'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::Header::decode($X)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: reth-rlp-rlp-encodable-import
  message: Old reth_rlp::RlpEncodable derive macro import detected. Replace with 'use
    alloy_rlp::RlpEncodable' with derive feature enabled.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::RlpEncodable;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: reth-rlp-rlp-decodable-import
  message: Old reth_rlp::RlpDecodable derive macro import detected. Replace with 'use
    alloy_rlp::RlpDecodable' with derive feature enabled.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::RlpDecodable;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: reth-rlp-decode-error-input-too-short
  message: Reference to reth_rlp::DecodeError::InputTooShort variant detected. Replace
    with 'alloy_rlp::Error' equivalent as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::DecodeError::InputTooShort
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: reth-rlp-generic-type-parameter
  message: Generic type parameter with reth_rlp type detected. Replace with corresponding
    alloy_rlp type as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: <.*reth_rlp::(Encodable|Decodable|DecodeError).*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: reth-rlp-empty-list-code-qualified
  message: Qualified reference to reth_rlp::EMPTY_LIST_CODE detected. Replace with
    'alloy_rlp::EMPTY_LIST_CODE' as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::EMPTY_LIST_CODE
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: reth-rlp-header-import
  message: Old reth_rlp::Header import detected. Replace with 'use alloy_rlp::Header'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::Header;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: reth-rlp-result-shorthand
  message: Result type with reth_rlp::DecodeError detected. Replace with 'alloy_rlp::Error'
    or use 'alloy_rlp::Result<T>' as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Result<[^,>]+,\s*reth_rlp::DecodeError>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: reth-rlp-fn-return-result-decode-error
  message: Function returning Result with reth_rlp::DecodeError detected. Replace
    with 'alloy_rlp::Error' or use 'alloy_rlp::Result<T>' as part of the migration
    to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+\w+.*->\s*Result<[^,>]+,\s*reth_rlp::DecodeError>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: reth-rlp-error-construction
  message: Error construction with reth_rlp::DecodeError variant detected. Replace
    with 'alloy_rlp::Error' equivalent as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'Err\(reth_rlp::DecodeError::'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: reth-rlp-method-impl-decode
  message: decode() method implementation with reth_rlp::DecodeError detected. Replace
    with 'alloy_rlp::Error' as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+decode\s*\([^)]*\)\s*->\s*Result<[^,>]+,\s*reth_rlp::DecodeError>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: reth-rlp-mod-test-block
  message: Test module with reth_rlp reference detected. Replace with alloy_rlp equivalent
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[cfg\(test\)\][\s\S]{0,100}mod\s+\w+[\s\S]{0,200}reth_rlp'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: reth-rlp-length-import
  message: Old reth_rlp::length_of_length import detected. Replace with 'use alloy_rlp::length_of_length'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::length_of_length;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: reth-rlp-decode-error-custom-enum-variant
  message: Error enum variant with reth_rlp::DecodeError detected. Replace with 'alloy_rlp::Error'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*\w+\((?:#\[from\]\s*)?reth_rlp::DecodeError\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: reth-rlp-encode-fixed-size-call
  message: Call to reth_rlp::encode_fixed_size() detected. Replace with 'alloy_rlp::encode_fixed_size()'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::encode_fixed_size($X)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: reth-rlp-regular-comment
  message: Comment referencing reth_rlp detected. Update comments to reference alloy_rlp
    as part of the migration.
  severity: WARNING
  languages:
  - rust
  pattern-regex: //.*reth_rlp
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: reth-rlp-error-return
  message: Return statement with reth_rlp::DecodeError detected. Replace with 'alloy_rlp::Error'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: return\s+Err\(reth_rlp::DecodeError
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: reth-rlp-cargo-direct-dependency
  message: Old reth-rlp dependency detected in Cargo.toml. Replace with 'alloy-rlp
    = "0.3"' as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*reth-rlp\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: reth-rlp-const-qualified
  message: Qualified reference to reth_rlp::EMPTY_STRING_CODE detected. Replace with
    'alloy_rlp::EMPTY_STRING_CODE' as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::EMPTY_STRING_CODE
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: reth-rlp-decode-error-unexpected-string
  message: Reference to reth_rlp::DecodeError::UnexpectedString variant detected.
    Replace with 'alloy_rlp::Error' equivalent as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::DecodeError::UnexpectedString
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: reth-rlp-documentation-comment
  message: Documentation comment referencing reth_rlp detected. Update documentation
    to reference alloy_rlp as part of the migration.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ///.*reth_rlp
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: reth-rlp-path-dependency
  message: Old reth-rlp path dependency detected in Cargo.toml. Replace with alloy-rlp
    dependency as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - generic
  pattern-regex: reth-rlp.*path\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: reth-rlp-const-import
  message: Old reth_rlp::EMPTY_STRING_CODE import detected. Replace with 'use alloy_rlp::EMPTY_STRING_CODE'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::EMPTY_STRING_CODE;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: reth-rlp-bufmut-import
  message: Old reth_rlp::BufMut import detected. Replace with 'use alloy_rlp::BufMut'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::BufMut;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: reth-rlp-derive-cargo-dependency
  message: Old reth-rlp-derive dependency detected in Cargo.toml. Remove this and
    enable the 'derive' feature on alloy-rlp instead as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^\s*reth-rlp-derive\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: reth-rlp-decode-error-list-length-mismatch
  message: Reference to reth_rlp::DecodeError::ListLengthMismatch variant detected.
    Replace with 'alloy_rlp::Error' equivalent as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::DecodeError::ListLengthMismatch
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: reth-rlp-started-list-import
  message: Old reth_rlp::EMPTY_LIST_CODE constant import detected. Replace with 'use
    alloy_rlp::EMPTY_LIST_CODE' as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::EMPTY_LIST_CODE;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: reth-rlp-use-import-glob
  message: Old reth_rlp glob import detected. Replace 'use reth_rlp::*' with 'use
    alloy_rlp::*' as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::*;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: reth-rlp-method-chain
  message: Method chain starting with reth_rlp call detected. Replace with alloy_rlp
    equivalent as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: reth_rlp::\w+\([^)]*\)\.
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: reth-rlp-feature-definition
  message: Feature definition referencing reth-rlp detected. Update to use alloy-rlp
    features as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[features\][\s\S]{0,200}reth-rlp
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: reth-rlp-optional-dependency
  message: Optional reth-rlp dependency detected. Replace with optional alloy-rlp
    dependency as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - generic
  pattern-regex: reth-rlp.*optional\s*=\s*true
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: reth-rlp-decodable-trait-usage
  message: Type annotation with reth_rlp::Decodable trait detected. Replace with 'alloy_rlp::Decodable'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: :\s*reth_rlp::Decodable
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: reth-rlp-decode-error-overflow
  message: Reference to reth_rlp::DecodeError::Overflow variant detected. Replace
    with 'alloy_rlp::Error' equivalent as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::DecodeError::Overflow
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: reth-rlp-crate-name-in-toml
  message: Crate name 'reth-rlp' found in Cargo.toml. This crate should be removed
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - generic
  pattern-regex: name\s*=\s*"reth-rlp
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: reth-rlp-as-conversion
  message: Type cast to reth_rlp type detected. Replace with alloy_rlp equivalent
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern-regex: '\w+\s+as\s+reth_rlp::'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: reth-rlp-use-import-aliased
  message: Old reth_rlp import with alias detected. Replace 'use reth_rlp as $ALIAS'
    with 'use alloy_rlp as $ALIAS' as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp as $ALIAS;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: reth-rlp-qualified-encodable-trait
  message: Old reth_rlp::Encodable qualified usage detected. Replace with 'alloy_rlp::Encodable'
    as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - rust
  pattern: reth_rlp::Encodable
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: reth-rlp-cargo-feature
  message: Old reth-rlp-derive feature detected in Cargo.toml. Update to use alloy-rlp's
    derive feature as part of the migration to alloy-rlp.
  severity: WARNING
  languages:
  - generic
  pattern-regex: derive\s*=\s*\[\s*"reth-rlp-derive"\s*\]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: reth-rlp-rlp-maxencodedlen-import
  message: Old reth_rlp::RlpMaxEncodedLen derive macro import detected. Replace with
    'use alloy_rlp::RlpMaxEncodedLen' with derive feature enabled.
  severity: WARNING
  languages:
  - rust
  pattern: use reth_rlp::RlpMaxEncodedLen;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: reth-rlp-workspace-path-toml
  message: Workspace dependency definition for reth-rlp detected in root Cargo.toml.
    Replace with 'alloy-rlp = "0.3"' as part of the migration to alloy-rlp.
  severity: WARNING
