rules:
- id: detect-shapedefs-usage
  message: shapedefs registry lookup should be replaced with direct shape type functions
    or shapeTypes list
  severity: WARNING
  languages:
  - typescript
  pattern: 'shapedefs[$SHAPETYPE]

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: detect-shapedefs-import
  message: shapedefs registry import should be removed; use shapeTypes list or computeShapeBbox()
    instead
  severity: WARNING
  languages:
  - typescript
  pattern: 'import { ..., shapedefs, ... } from $MOD

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-shapedef-type-usage
  message: ShapeDef type should be removed; use direct shape type constructors
  severity: WARNING
  languages:
  - typescript
  pattern: 'ShapeDef

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-shapedef-constructor
  message: ShapeDef constructor should be removed; use direct shape type definitions
  severity: WARNING
  languages:
  - typescript
  pattern: 'ShapeDef({ ... })

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-sample-shape-return-type
  message: Shape sampler should return parametric Props<T> type
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export\s+const\s+sample\w+\s*=\s*\([^)]*\):\s*\w+Props\s*=>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-shapedefs-islinelike
  message: shapedefs isLinelike property should be replaced with type-specific checks
    or computeShapeBbox()
