    - ext/mbstring/tests/*.phpt
- id: detect-must-not-be-empty-generic-test-error-output
  message: Detected refactored error/warning with "must not be empty" in test output
  severity: INFO
  languages:
  - generic
  pattern-regex: (Fatal error|Warning|ValueError):[^:]*must not be empty
  metadata:
    category: basic
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.phpt'
    exclude:
    - ext/dom/tests/modern/xml/XMLDocument_fromFile_01.phpt
    - ext/dom/tests/modern/xml/XMLDocument_fromString_01.phpt
    - ext/intl/tests/uconverter_getstandards_basic.phpt
