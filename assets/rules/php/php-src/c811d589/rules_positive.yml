rules:
- id: detect-generic-must-not-be-empty-phpt-files
  message: Detected refactored "must not be empty" in extension test files
  severity: INFO
  languages:
  - generic
  pattern-regex: must not be empty
  metadata:
    category: basic
    nr_refactored_patterns: 101
    nr_legacy_patterns: 0
  paths:
    include:
    - ext/*/tests/*.phpt
    exclude:
    - ext/dom/tests/modern/xml/XMLDocument_fromFile_01.phpt
    - ext/dom/tests/modern/xml/XMLDocument_fromString_01.phpt
    - ext/intl/tests/uconverter_getstandards_basic.phpt
    - ext/mysqli/tests/bug34810.phpt
    - ext/pdo_mysql/tests/pdo_mysql_attr_client_version.phpt
    - ext/pdo_mysql/tests/pdo_mysql_attr_connection_status.phpt
    - ext/pdo_mysql/tests/pdo_mysql_attr_server_info.phpt
    - ext/pdo_mysql/tests/pdo_mysql_attr_server_version.phpt
    - ext/phar/tests/dir.phpt
    - ext/phar/tests/mkdir.phpt
    - ext/standard/tests/array/range/bug32021.phpt
    - ext/standard/tests/array/range/range_inputs_string_invalid.phpt
- id: detect-api-function-rename-in-c-files
  message: Detected refactored API function name anywhere in C/H files
  severity: INFO
  languages:
  - c
  pattern-regex: zend_argument_must_not_be_empty_error
  metadata:
    category: api
    nr_refactored_patterns: 96
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.c'
    - '**/*.h'
- id: detect-zend-argument-must-not-be-empty-error-function-call
  message: Detected refactored function call to zend_argument_must_not_be_empty_error()
  severity: INFO
  languages:
  - c
  pattern: zend_argument_must_not_be_empty_error($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 92
    nr_legacy_patterns: 0
- id: detect-must-not-be-empty-all-extensions
  message: Detected refactored function call across all extensions
  severity: INFO
  languages:
  - c
  pattern: zend_argument_must_not_be_empty_error($NUM);
  metadata:
    category: api
    nr_refactored_patterns: 92
    nr_legacy_patterns: 0
  paths:
    include:
    - ext/**/*.c
- id: detect-must-not-be-empty-in-conditional-context
  message: Detected refactored error call in conditional context
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: "if ($COND) {\n  zend_argument_must_not_be_empty_error($NUM);\n  ...\n\
      }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 91
    nr_legacy_patterns: 0
- id: detect-argument-must-not-be-empty-generic-regex
  message: Detected refactored argument error pattern in extension tests
  severity: INFO
  languages:
  - generic
  pattern-regex: \(\$[a-z_]+\) must not be empty
  metadata:
    category: basic
    nr_refactored_patterns: 91
    nr_legacy_patterns: 0
  paths:
    include:
    - ext/*/tests/*.phpt
    exclude:
    - ext/dom/tests/modern/xml/XMLDocument_fromFile_01.phpt
    - ext/dom/tests/modern/xml/XMLDocument_fromString_01.phpt
    - ext/intl/tests/uconverter_getstandards_basic.phpt
    - ext/mysqli/tests/bug34810.phpt
    - ext/pdo_mysql/tests/pdo_mysql_attr_client_version.phpt
    - ext/pdo_mysql/tests/pdo_mysql_attr_connection_status.phpt
    - ext/pdo_mysql/tests/pdo_mysql_attr_server_info.phpt
    - ext/pdo_mysql/tests/pdo_mysql_attr_server_version.phpt
    - ext/phar/tests/dir.phpt
    - ext/phar/tests/mkdir.phpt
    - ext/standard/tests/array/range/bug32021.phpt
    - ext/standard/tests/array/range/range_inputs_string_invalid.phpt
- id: detect-must-not-be-empty-api-call-generic
  message: Detected refactored zend_argument_must_not_be_empty_error API call anywhere
  severity: INFO
  languages:
  - c
  pattern-regex: zend_argument_must_not_be_empty_error\(\d+\)
  metadata:
    category: api
    nr_refactored_patterns: 87
    nr_legacy_patterns: 0
- id: detect-must-not-be-empty-in-return-throws-context
  message: Detected refactored error call with RETURN_THROWS pattern
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: 'zend_argument_must_not_be_empty_error($NUM);

      RETURN_THROWS();

      '
  metadata:
    category: structural
    nr_refactored_patterns: 86
    nr_legacy_patterns: 0
