rules:
- id: configkeybool-browser-table
  message: ConfigKey usage (in refactored Collection access patterns)
  severity: INFO
  languages:
  - kotlin
  pattern: 'ConfigKey.Bool.BROWSER_TABLE_SHOW_NOTES_MODE

    '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: config-key-browser-mode-usage
  message: ConfigKey usage in CardsOrNotes (refactored with explicit col)
  severity: INFO
