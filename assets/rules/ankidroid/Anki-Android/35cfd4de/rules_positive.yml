  - kotlin
  pattern: 'ConfigKey.Bool.BROWSER_TABLE_SHOW_NOTES_MODE

    '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/CardsOrNotes.kt'
- id: cardsornotes-notes-value
  message: NOTES enum value in CardsOrNotes
  severity: INFO
  languages:
  - kotlin
  pattern: 'NOTES

    '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
