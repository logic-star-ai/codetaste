rules:
- id: kotlin-context-receiver-single-line-fun
  message: Context receiver syntax 'context(Type)' declaration found. Replace with
    explicit parameter passing
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: ^\s*context\s*\(\s*\w+\s*\)\s*$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: kotlin-context-receiver-any-type-line
  message: Context receiver declaration found. Replace with explicit parameter passing
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: ^\s*context\s*\(\s*[A-Z][a-zA-Z0-9_]*\s*\)\s*$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: kotlin-context-receiver-multiline-spacing
  message: Context receiver syntax found on multiple lines. Replace with explicit
    parameter passing
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: ^\s*context\s*\(\s*[A-Z][a-zA-Z0-9_]*\s*\)\s*\n\s*(?:private\s+|public\s+|internal\s+|protected\s+|open\s+|abstract\s+|override\s+|suspend\s+|inline\s+)*fun\s+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: kotlin-context-receiver-line-break-pattern
  message: Context receiver syntax found. Replace with explicit parameter passing
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: ^\s*context\s*\(\s*\w+\s*\)\s*$\n\s*(?:private\s+)?fun\s+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: kotlin-context-receiver-any-kotlin-file
  message: Context receiver syntax detected. Replace with explicit parameter passing
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: context\s*\(\s*[A-Z]\w*\s*\)\s*\n\s*(?:(?:private|public|internal|protected|open|abstract|override|suspend|inline|tailrec|operator|infix|external|expect|actual)\s+)*fun\s+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: kotlin-context-receiver-spaced-format
  message: Context receiver syntax with extra spacing found. Replace with explicit
    parameter
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: context\s+\(\s*[A-Z]\w*\s*\)\s+fun\s+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: kotlin-context-receiver-collection-line
  message: 'Context receiver ''context(Collection)'' declaration found. Replace with
    explicit ''col: Collection'' parameter'
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: ^\s*context\s*\(\s*Collection\s*\)\s*$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: kotlin-context-receiver-in-file
  message: Context receiver syntax found in file. All context receivers should be
    replaced with explicit parameters
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: (?m)^context\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: kotlin-context-receiver-collection
  message: 'Context receiver syntax ''context($TYPE)'' found. Replace with explicit
    parameter ''col: Collection'' or appropriate type'
  severity: WARNING
  languages:
  - kotlin
  pattern: 'context ($TYPE)

    fun $FUNC(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
