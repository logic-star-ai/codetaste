rules:
- id: detect-config-get-macro
  message: Replace config_get() macro with explicit inicfg_get(&netdata_config, ...)
    call
  severity: WARNING
  languages:
  - c
  pattern: config_get($SECTION, $NAME, $DEFAULT)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 159
- id: detect-config-get-boolean-macro
  message: Replace config_get_boolean() macro with explicit inicfg_get_boolean(&netdata_config,
    ...) call
  severity: WARNING
  languages:
  - c
  pattern: config_get_boolean($SECTION, $NAME, $VALUE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 156
- id: detect-appconfig-function-declaration
  message: Rename function declaration from appconfig_* to inicfg_*
  severity: WARNING
  languages:
  - c
  pattern-regex: ^\s*[a-zA-Z_][a-zA-Z0-9_]*\s+appconfig_[a-zA-Z0-9_]+\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 87
