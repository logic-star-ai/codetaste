rules:
- id: inicfg-function-call-any-variant
  message: Detected any inicfg function call (generic pattern)
  severity: INFO
  languages:
  - c
  pattern-regex: inicfg_(get|set)(_[a-z_]+)?\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 899
    nr_legacy_patterns: 0
- id: inicfg-ebpf-plugin-usage
  message: Detected inicfg function call with collector config in ebpf or other plugins
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: inicfg_get(&$VAR, ...)
    - pattern: inicfg_get_boolean(&$VAR, ...)
    - pattern: inicfg_get_number(&$VAR, ...)
  - metavariable-regex:
      metavariable: $VAR
      regex: (collector_config|.*_config)
  metadata:
    category: api
    nr_refactored_patterns: 451
    nr_legacy_patterns: 0
- id: inicfg-explicit-generic-get-call
