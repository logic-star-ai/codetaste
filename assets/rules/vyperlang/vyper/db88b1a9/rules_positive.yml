rules:
- id: detect-ast-bounds-property-access
  message: Detected ast_bounds property access - new type API property
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: $TYPE.ast_bounds
  - pattern: $VAR.ast_bounds
  metadata:
    category: api
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
- id: detect-isinstance-darrayt-in-codegen-only
  message: Detected isinstance check with DArrayT in codegen - using unified dynamic
    array type
  severity: INFO
  languages:
  - python
  pattern: isinstance($VAR, DArrayT)
  metadata:
    category: api
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - vyper/codegen/*.py
    exclude:
    - vyper/semantics/**/*.py
- id: detect-vyper-type-usage-in-codegen
  message: Detected VyperType reference in codegen - using unified type system base
    class
  severity: INFO
  languages:
  - python
  pattern: VyperType
  metadata:
    category: architecture
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - vyper/codegen/*.py
- id: detect-helper-function-import-from-codegen-core
  message: Detected type helper function imported from codegen.core - helper functions
    migrated
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: from vyper.codegen.core import is_numeric_type
  - pattern: from vyper.codegen.core import is_integer_type
  - pattern: from vyper.codegen.core import is_decimal_type
  - pattern: from vyper.codegen.core import is_bytes_m_type
  - pattern: from vyper.codegen.core import $X, is_numeric_type
  - pattern: from vyper.codegen.core import $X, is_integer_type
  - pattern: from vyper.codegen.core import $X, is_decimal_type
  - pattern: from vyper.codegen.core import $X, is_bytes_m_type
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-module-analyzer-instantiation
  message: Detected ModuleAnalyzer usage - renamed from ModuleNodeVisitor
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: ModuleAnalyzer(...)
  - pattern: $X = ModuleAnalyzer(...)
  - pattern: "ModuleAnalyzer(\n    $...ARGS\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-variable-record-import-from-context
  message: Detected VariableRecord imported from codegen.context - moved from function_signature
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: from vyper.codegen.context import VariableRecord
  - pattern: from vyper.codegen.context import $...IMPORTS, VariableRecord, $...MORE
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
