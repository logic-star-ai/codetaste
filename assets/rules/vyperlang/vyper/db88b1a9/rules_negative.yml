  severity: WARNING
  languages:
  - python
  pattern: $VAR = BaseType($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-walrus-assignment-basetype
  message: Walrus operator assignment with BaseType. Should use unified type system
    from vyper.semantics.types after merge.
  severity: WARNING
  languages:
  - python
  pattern: '($VAR := BaseType($ARG))

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
