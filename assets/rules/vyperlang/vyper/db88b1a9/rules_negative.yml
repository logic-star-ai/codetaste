rules:
- id: detect-codegen-types-access
  message: Direct access to vyper.codegen.types module attributes. Should use vyper.semantics.types
    after type system merge.
  severity: WARNING
  languages:
  - python
  pattern: vyper.codegen.types.$ATTR
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 334
- id: detect-old-basetype-instantiation
  message: Instantiation of BaseType from old codegen type system. Should use unified
    type system from vyper.semantics.types after merge.
  severity: WARNING
  languages:
  - python
  pattern: BaseType($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 67
- id: detect-codegen-types-module-usage
  message: Direct import of vyper.codegen.types module detected. Should use vyper.semantics.types
    after type system merge.
  severity: WARNING
  languages:
  - python
  pattern: import vyper.codegen.types
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: detect-old-bytearraytype-instantiation
  message: Instantiation of ByteArrayType from old codegen type system. Should use
    BytesT from vyper.semantics.types after merge.
  severity: WARNING
  languages:
  - python
  pattern: ByteArrayType($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-is-base-type-call
  message: Call to is_base_type helper function. Verify it's imported from vyper.codegen.core
    instead of old vyper.codegen.types after refactoring.
  severity: WARNING
  languages:
  - python
  pattern: is_base_type($...ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-basetype-isinstance-check
  message: isinstance check against BaseType from old codegen system. Should use appropriate
    type checks from unified type system after merge.
  severity: WARNING
  languages:
  - python
  pattern: isinstance($OBJ, BaseType)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-bytearraylike-isinstance-check
  message: isinstance check against ByteArrayLike from old codegen system. Should
    use appropriate type checks from unified type system after merge.
  severity: WARNING
  languages:
  - python
  pattern: isinstance($OBJ, ByteArrayLike)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-basetype-subtype-access
  message: Access to .subtype property. Verify using unified type system API (may
    need .value_type) after merge.
  severity: INFO
  languages:
  - python
  pattern: $TYPE.subtype
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-new-type-to-old-type-call
  message: Call to new_type_to_old_type converter function detected. This temporary
    bridge should be removed after full type system merge.
  severity: WARNING
  languages:
  - python
  pattern: new_type_to_old_type($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-old-tupletype-instantiation
  message: Instantiation of TupleType from old codegen type system. Should use TupleT
    from vyper.semantics.types after merge.
  severity: WARNING
  languages:
  - python
  pattern: TupleType($...ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-darraytype-isinstance-check
  message: isinstance check against DArrayType from old codegen system. Should check
    against DArrayT from vyper.semantics.types after merge.
  severity: WARNING
  languages:
  - python
  pattern: isinstance($OBJ, DArrayType)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-assignment-to-tupletype
  message: Assignment of TupleType instance. Should use TupleT from vyper.semantics.types
    after merge.
  severity: WARNING
  languages:
  - python
  pattern: $VAR = TupleType($...ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-old-basetype-usage
  message: Import of BaseType from old codegen.types module. Should import from vyper.semantics.types
    after type system merge.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from vyper.codegen.types import BaseType
  - pattern-not: from vyper.semantics.types import $...ANYTHING
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-parse-integer-typeinfo-call
  message: Call to parse_integer_typeinfo function. Should use unified type system
    API from vyper.semantics.types after merge.
  severity: WARNING
  languages:
  - python
  pattern: parse_integer_typeinfo($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-assignment-to-basetype
  message: Assignment of BaseType instance. Should use unified type system from vyper.semantics.types
