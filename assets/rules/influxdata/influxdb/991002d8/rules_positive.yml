rules:
- id: seriesfile-field-access
  message: Detected field access on seriesfile type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.$FIELD
  - pattern-inside: 'import "$PKG"

      ...

      '
  - metavariable-regex:
      metavariable: $PKG
      regex: .*seriesfile.*
  metadata:
    nr_refactored_patterns: 6950
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: seriesfile-simple-if-statement
  message: Detected if statement in seriesfile package
  severity: INFO
  languages:
  - go
  pattern: if $COND { ... }
  metadata:
    nr_refactored_patterns: 234
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsdb/seriesfile/series_*.go'
    exclude:
    - '**/*_test.go'
- id: seriesfile-type-usage
  message: Detected usage of type from seriesfile package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$TYPE
  - metavariable-regex:
      metavariable: $PKG
      regex: ^seriesfile$
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^(Series|Partition|Segment|Index|Header|Compactor|Verify|Parse|Append|Compare|Generate|Read|Create|Clone|Find|Join|Split|New).*
  metadata:
    nr_refactored_patterns: 137
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: seriesfile-method-receiver
  message: Detected method with receiver from seriesfile package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($RECV *$TYPE) $METHOD(...) { ... }
  metadata:
    nr_refactored_patterns: 124
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsdb/seriesfile/*.go'
- id: seriesfile-simple-func-def
  message: Detected function definition in seriesfile package
  severity: INFO
  languages:
  - go
  pattern: func $FUNC(...) $RET { ... }
  metadata:
    nr_refactored_patterns: 108
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsdb/seriesfile/series_file.go'
    - '**/tsdb/seriesfile/series_partition.go'
    - '**/tsdb/seriesfile/series_segment.go'
- id: seriesfile-interface-implementation
  message: Detected interface implementation in seriesfile
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV $TYPE) $METHOD(...) $RET {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 96
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsdb/seriesfile/*.go'
    exclude:
    - '**/*_test.go'
- id: import-seriesfile-package
  message: Detected import of seriesfile package - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*tsdb/seriesfile.*
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: seriesfile-func-param
  message: Detected seriesfile type as function parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC(..., $PARAM *$PKG.$TYPE, ...) { ... }
  - metavariable-regex:
      metavariable: $PKG
      regex: ^seriesfile$
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: seriesfile-segment-operations
  message: Detected segment operations from seriesfile package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^seriesfile$
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*[Ss]egment.*
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: seriesfile-struct-definition
  message: Detected struct definition in seriesfile package
  severity: INFO
  languages:
  - go
  pattern: "type $NAME struct {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsdb/seriesfile/series_*.go'
- id: seriesfile-struct-field
  message: Detected seriesfile type used in struct field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $STRUCT struct {\n  ...\n  $FIELD *$PKG.$TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: ^seriesfile$
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: seriesfile-file-exists
  message: Detected file in seriesfile package directory
  severity: INFO
  languages:
