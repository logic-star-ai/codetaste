rules:
- id: method-declaration-on-seriesfile
  message: Method declaration on Series types in tsdb package should be in seriesfile
    package
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+\(\w+\s+\*Series(File|Partition|Segment|Index)\)\s+\w+\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
  paths:
    include:
    - tsdb/series*.go
- id: function-declaration-seriesfile-related
  message: Function declaration in series file code should be in seriesfile package
