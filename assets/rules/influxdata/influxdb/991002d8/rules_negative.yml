  - go
  pattern-regex: func\s+\w*Series(File|Partition|Segment|Index)\w*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
  paths:
    include:
    - tsdb/series*.go
- id: function-param-tsdb-seriesfile
  message: Function parameter type *tsdb.SeriesFile should be updated to *seriesfile.SeriesFile
  severity: WARNING
  languages:
  - go
  patterns:
