rules:
- id: regex-scoped-injectable-loader-initialized
  message: ScopedInjectableLoader<Regex::Engine> should be removed from tests - pass
    engine explicitly
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: 'ScopedInjectableLoader<Regex::Engine> $VAR($INIT);

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: scoped-loader-regex-test-local
  message: Test should use explicit regex engine instead of ScopedInjectableLoader
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: ScopedInjectableLoader<Regex::Engine> engine(...);
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: scoped-injectable-loader-googlere
  message: ScopedInjectableLoader with GoogleReEngine should be removed from tests
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: ScopedInjectableLoader<Regex::Engine> $VAR(std::make_unique<Regex::GoogleReEngine>());
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: scoped-injectable-test-with-make-unique
  message: ScopedInjectableLoader with make_unique should be removed - use explicit
    engine member
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: ScopedInjectableLoader<Regex::Engine> $VAR(std::make_unique<$ENGINE>());
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: scoped-injectable-loader-any-engine-pattern
  message: ScopedInjectableLoader for Engine types should be removed - use explicit
    engine passing
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: ScopedInjectableLoader<$TYPE::Engine> $VAR($INIT);
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: parseregex-call-single-arg-on-matcher
  message: parseRegex() should accept explicit Engine& parameter - add regex_engine
    argument
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: 'Regex::Utility::parseRegex($MATCHER)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: parseregex-utility-single-argument-call
  message: parseRegex() must include explicit Engine& parameter - add regex_engine
    argument
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: Regex::Utility::parseRegex($ARG)
  - pattern-not: Regex::Utility::parseRegex($ARG, $ENGINE)
  - pattern-not: Regex::Utility::parseRegex($ARG, regex_engine)
  - pattern-not: Regex::Utility::parseRegex($ARG, regex_engine_)
  - pattern-not: Regex::Utility::parseRegex($ARG, engine)
  - pattern-not: Regex::Utility::parseRegex($ARG, engine_)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: parseregex-variable-assignment-single-arg
  message: Variable assignment with parseRegex should include explicit Engine& parameter
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: '$VAR = Regex::Utility::parseRegex($PATTERN);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: parseregex-inline-assignment
  message: Inline parseRegex assignment should include explicit Engine& parameter
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: '$VAR = Regex::Utility::parseRegex($PATTERN);

      '
  - pattern-not: '$VAR = Regex::Utility::parseRegex($PATTERN, $ENGINE);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: parseregex-matcher-pattern-direct
  message: parseRegex with matcher.pattern() should include explicit engine parameter
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: Regex::Utility::parseRegex($MATCHER.pattern())
  - pattern-not: Regex::Utility::parseRegex($MATCHER.pattern(), $ENGINE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: parseregex-proto-config-pattern
  message: parseRegex with proto config.pattern() should include explicit engine parameter
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: Regex::Utility::parseRegex($CONFIG.pattern())
  - pattern-not: Regex::Utility::parseRegex($CONFIG.pattern(), $ENGINE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: parseregex-matcher-config-generic
  message: parseRegex with matcher config.pattern() should include explicit engine
    parameter
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: Regex::Utility::parseRegex($MATCHER_CONFIG)
  - pattern-not: Regex::Utility::parseRegex($MATCHER_CONFIG, $ENGINE)
  - metavariable-pattern:
      metavariable: $MATCHER_CONFIG
      patterns:
      - pattern-regex: .*\.pattern\(\).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: parseregex-rewrite-spec-pattern
  message: parseRegex with rewrite spec.pattern() should include explicit engine parameter
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: Regex::Utility::parseRegex($SPEC.pattern())
  - pattern-not: Regex::Utility::parseRegex($SPEC.pattern(), $ENGINE)
  - metavariable-regex:
      metavariable: $SPEC
      regex: .*rewrite.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: header-to-metadata-parseregex-singleton
  message: header_to_metadata filter should use parseRegex with explicit engine parameter
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: 'regex_rewrite_ = Regex::Utility::parseRegex($PATTERN);

      '
  - pattern-not: 'regex_rewrite_ = Regex::Utility::parseRegex($PATTERN, $ENGINE);

