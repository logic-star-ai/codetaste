  - c
  - cpp
  patterns:
  - pattern: 'Regex::Utility::parseRegex($PATTERN)

      '
  - pattern-not: 'Regex::Utility::parseRegex($PATTERN, $ENGINE)

      '
  - pattern-inside: "namespace Router {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: parseregex-in-route-entry
