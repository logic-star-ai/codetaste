rules:
- id: detect-parseregex-two-args-excluding-matchers
  message: ParseRegex with two arguments in refactored code
  severity: INFO
  languages:
  - cpp
  pattern: Regex::Utility::parseRegex($ARG1, $ARG2)
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    exclude:
    - source/common/common/matchers.h
- id: detect-regex-engine-accessed-from-context-general
  message: Regex engine accessed from various context objects
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-either:
    - pattern: $X.regexEngine()
    - pattern: $X->regexEngine()
  - pattern-not: context.regexEngine()
  metadata:
    category: dependency
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: detect-context-dot-regex-engine-call
  message: Context object calling regexEngine() method
  severity: INFO
  languages:
  - cpp
  pattern: $VAR.regexEngine()
  metadata:
    category: dependency
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - source/**/*.cc
    exclude:
    - source/common/common/matchers.*
- id: detect-engine-getter-in-source-code
  message: Source code calling regexEngine() getter method
  severity: INFO
  languages:
  - cpp
  pattern: $X.regexEngine()
  metadata:
    category: dependency
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - source/**/*.cc
    - source/**/*.h
    exclude:
    - source/common/common/matchers.h
- id: detect-regex-namespace-parseregex-call
  message: Regex namespace parseRegex call with two arguments in source code
  severity: INFO
  languages:
  - cpp
  pattern: Regex::Utility::parseRegex($A, $B)
  metadata:
    category: api
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - source/**/*.cc
    exclude:
    - source/common/common/matchers.h
    - source/common/common/matchers.cc
- id: detect-context-member-regex-engine-excluding-matchers
  message: Context member accessing regexEngine in refactored code
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-either:
    - pattern: $OBJ_.regexEngine()
    - pattern: $OBJ_->regexEngine()
  - metavariable-regex:
      metavariable: $OBJ_
      regex: .*context.*
  metadata:
    category: dependency
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    exclude:
    - source/common/common/matchers.h
    - source/common/common/matchers.cc
- id: detect-parseregex-two-params-source-code
  message: ParseRegex with two parameters in source code (refactored)
  severity: INFO
  languages:
  - cpp
  pattern: Regex::Utility::parseRegex($X, $Y)
  metadata:
    category: api
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - source/**/*.cc
    exclude:
    - source/common/common/matchers.*
- id: detect-context-regex-engine-member-access
  message: Accessing regexEngine from context object
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-either:
    - pattern: $CONTEXT.regexEngine()
    - pattern: $CONTEXT->regexEngine()
  - metavariable-regex:
      metavariable: $CONTEXT
      regex: (?!context$).*context.*
  metadata:
    category: dependency
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: detect-engine-access-method-call
  message: RegexEngine method call for explicit engine access
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-either:
    - pattern: regexEngine()
    - pattern: $OBJ.regexEngine()
    - pattern: $OBJ->regexEngine()
  - pattern-not: context.regexEngine()
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - source/**/*.cc
    exclude:
    - source/common/common/matchers.*
- id: detect-regex-rewrite-with-pattern-engine
  message: Regex rewrite using pattern() with explicit engine parameter
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-either:
    - pattern: Regex::Utility::parseRegex($X.pattern(), regex_engine)
    - pattern: regex_rewrite_ = Regex::Utility::parseRegex($X.pattern(), $ENGINE);
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: detect-explicit-engine-variable-named-regex-engine
  message: ParseRegex using variable explicitly named regex_engine
  severity: INFO
  languages:
  - cpp
  pattern: Regex::Utility::parseRegex($X, regex_engine)
  metadata:
    category: dependency
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: detect-parseregex-with-pattern-method-call
  message: ParseRegex using pattern() method call with explicit engine
  severity: INFO
  languages:
  - cpp
  pattern: Regex::Utility::parseRegex($X.pattern(), $ENGINE)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: detect-parseregex-with-config-pattern-access
  message: ParseRegex with nested pattern() access and explicit engine
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-either:
    - pattern: Regex::Utility::parseRegex($X.pattern(), $ENGINE)
    - pattern: Regex::Utility::parseRegex($X.$METHOD().pattern(), $ENGINE)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: detect-regex-pattern-from-rewrite-spec
  message: ParseRegex using rewrite spec pattern with explicit engine
  severity: INFO
  languages:
  - cpp
  pattern: Regex::Utility::parseRegex($SPEC.pattern(), $ENGINE)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: detect-parseregex-pattern-accessor-with-engine
  message: ParseRegex with chained pattern accessor and explicit engine
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-either:
    - pattern: Regex::Utility::parseRegex($A.pattern(), $B)
    - pattern: Regex::Utility::parseRegex($A.$METHOD().pattern(), $B)
    - pattern: Regex::Utility::parseRegex($A.$M1().$M2().pattern(), $B)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: detect-parseregex-in-filter-cc-files
  message: Filter using parseRegex with explicit engine parameter
  severity: INFO
  languages:
  - cpp
  pattern: Regex::Utility::parseRegex($PATTERN, $ENGINE)
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/filters/**/*.cc'
- id: detect-common-factory-context-regex-engine
  message: Common code accessing regex engine from context
  severity: INFO
  languages:
  - cpp
  pattern: $CONTEXT.regexEngine()
  metadata:
