    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: listenerMetadata-address-passed-as-argument
  message: Pass metadata address via listenerInfo() as function argument
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $FUNC(..., &$CTX.listenerMetadata(), ...)
  - pattern-not: $FUNC(..., &$CTX.listenerInfo().metadata(), ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: direct-context-listenerTypedMetadata-call-arrow
  message: Replace direct context->listenerTypedMetadata() call with context->listenerInfo()->typedMetadata()
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $CONTEXT->listenerTypedMetadata()
  - pattern-not: $CONTEXT->listenerInfo()->listenerTypedMetadata()
  - pattern-not: $CONTEXT->listenerInfo()->typedMetadata()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: direct-context-isQuicListener-call-arrow
