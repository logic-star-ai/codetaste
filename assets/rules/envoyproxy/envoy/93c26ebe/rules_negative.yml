    nr_legacy_patterns: 3
- id: direction-method-definition
  message: Consider removing direction() method and delegating to listenerInfo()
  severity: WARNING
  languages:
  - cpp
  pattern: "envoy::config::core::v3::TrafficDirection $CLASS::direction() const {\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: listenerMetadata-method-definition
  message: Consider removing listenerMetadata() method and delegating to listenerInfo()
  severity: WARNING
  languages:
  - cpp
  pattern: "const envoy::config::core::v3::Metadata& $CLASS::listenerMetadata() const\
    \ {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: isQuicListener-method-definition
  message: Consider removing isQuicListener() method and delegating to listenerInfo()
  severity: WARNING
  languages:
  - cpp
  pattern: "bool $CLASS::isQuicListener() const {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
