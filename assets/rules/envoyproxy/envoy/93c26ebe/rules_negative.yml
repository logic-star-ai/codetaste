rules:
- id: generic-listenerMetadata-call-with-context
  message: Replace direct listenerMetadata() call with listenerInfo().metadata() on
    context-like object
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $X.listenerMetadata()
  - metavariable-regex:
      metavariable: $X
      regex: .*context.*
  - pattern-not: $X.listenerInfo().metadata()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: direct-context-isQuicListener-call-dot
  message: Replace direct context.isQuicListener() call with context.listenerInfo().isQuic()
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $CONTEXT.isQuicListener()
  - pattern-not: $CONTEXT.listenerInfo().isQuicListener()
  - pattern-not: $CONTEXT.listenerInfo().isQuic()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: context-listenerMetadata-simple-call
  message: Replace context.listenerMetadata() with context.listenerInfo().metadata()
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern-either:
    - pattern: context.listenerMetadata()
    - pattern: context_.listenerMetadata()
    - pattern: factory_context.listenerMetadata()
    - pattern: factory_context_.listenerMetadata()
  - pattern-not: $ANY.listenerInfo().metadata()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: generic-isQuicListener-call-with-context
  message: Replace direct isQuicListener() call with listenerInfo().isQuic() on context-like
    object
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $X.isQuicListener()
  - metavariable-regex:
      metavariable: $X
      regex: .*context.*
  - pattern-not: $X.listenerInfo().isQuic()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: any-isQuicListener-call-generic
  message: Consider using listenerInfo().isQuic() instead of direct isQuicListener()
    call
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $OBJ.isQuicListener()
  - pattern-not: $OBJ.listenerInfo().isQuic()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: direct-context-listenerTypedMetadata-call-dot
  message: Replace direct context.listenerTypedMetadata() call with context.listenerInfo().typedMetadata()
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $CONTEXT.listenerTypedMetadata()
  - pattern-not: $CONTEXT.listenerInfo().listenerTypedMetadata()
  - pattern-not: $CONTEXT.listenerInfo().typedMetadata()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: context-direction-simple-call
  message: Replace context.direction() with context.listenerInfo().direction()
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern-either:
    - pattern: context.direction()
    - pattern: context_.direction()
    - pattern: factory_context.direction()
    - pattern: factory_context_.direction()
    - pattern: filter_context.direction()
    - pattern: filter_context_.direction()
  - pattern-not: $ANY.listenerInfo().direction()
  - pattern-not: $ANY.listenerConfig().direction()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: generic-listenerTypedMetadata-call-with-context
  message: Replace direct listenerTypedMetadata() call with listenerInfo().typedMetadata()
    on context-like object
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $X.listenerTypedMetadata()
  - metavariable-regex:
      metavariable: $X
      regex: .*context.*
  - pattern-not: $X.listenerInfo().typedMetadata()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: any-listenerTypedMetadata-call-generic
  message: Consider using listenerInfo().typedMetadata() instead of direct listenerTypedMetadata()
    call
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $OBJ.listenerTypedMetadata()
  - pattern-not: $OBJ.listenerInfo().typedMetadata()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: direct-context-direction-reference
  message: Replace direct reference to context.listenerMetadata() with context.listenerInfo().metadata()
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: '&$CONTEXT.listenerMetadata()'
  - pattern-not: '&$CONTEXT.listenerInfo().metadata()'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: factory-context-base-listenerMetadata-override
  message: FactoryContext subclass should not override listenerMetadata() - use listenerInfo()
    interface instead
  severity: WARNING
  languages:
  - cpp
  pattern: 'const envoy::config::core::v3::Metadata& listenerMetadata() const override;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: factory-context-base-listenerTypedMetadata-override
  message: FactoryContext subclass should not override listenerTypedMetadata() - use
    listenerInfo() interface instead
  severity: WARNING
  languages:
  - cpp
  pattern: 'const Envoy::Config::TypedMetadata& listenerTypedMetadata() const override;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: factory-context-base-isQuicListener-override
  message: FactoryContext subclass should not override isQuicListener() - use listenerInfo()
    interface instead
  severity: WARNING
  languages:
  - cpp
  pattern: 'bool isQuicListener() const override;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
