- id: listenerTypedMetadata-method-definition
  message: Consider removing listenerTypedMetadata() method and delegating to listenerInfo()
  severity: WARNING
  languages:
  - cpp
  pattern: "const Envoy::Config::TypedMetadata& $CLASS::listenerTypedMetadata() const\
