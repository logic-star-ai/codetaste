    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: random-lb-constructor-with-six-params
  message: RandomLoadBalancer with 6 parameters may indicate legacy constructor. Verify
    it uses typed config.
  severity: INFO
  languages:
  - cpp
  pattern-regex: RandomLoadBalancer\s*\(\s*[^,]+,\s*[^,]+,\s*[^,]+,\s*[^,]+,\s*[^,]+,\s*[^,]+\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: legacy-config-implementation-file-round-robin
