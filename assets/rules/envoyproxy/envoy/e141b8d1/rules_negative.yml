rules:
- id: config-constructor-with-cluster-proto
  message: Legacy config constructor with ClusterProto parameter should be removed.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: (LegacyRoundRobin|LegacyLeastRequest|LegacyMaglev|LegacyRingHash|EmptyRandom)LbConfig\s*\(\s*const\s+ClusterProto
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: locality-lb-config-from-common-function-call
  message: localityLbConfigFromCommonLbConfig() deprecated. Use convertLocalityLbConfigTo()
    or localityLbConfigFromProto().
  severity: WARNING
  languages:
  - cpp
  pattern-regex: localityLbConfigFromCommonLbConfig\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: legacy-round-robin-config-reference
  message: LegacyRoundRobinLbConfig should be replaced with TypedRoundRobinLbConfig.
    Legacy config class removed.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bLegacyRoundRobinLbConfig\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - test/**
    - '**/BUILD'
- id: legacy-least-request-config-reference
  message: LegacyLeastRequestLbConfig should be replaced with TypedLeastRequestLbConfig.
    Legacy config class removed.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bLegacyLeastRequestLbConfig\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - test/**
    - '**/BUILD'
- id: legacy-maglev-config-reference
  message: LegacyMaglevLbConfig should be replaced with TypedMaglevLbConfig. Legacy
    config class removed.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bLegacyMaglevLbConfig\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - test/**
    - '**/BUILD'
- id: legacy-ring-hash-config-reference
  message: LegacyRingHashLbConfig should be replaced with TypedRingHashLbConfig. Legacy
    config class removed.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bLegacyRingHashLbConfig\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - test/**
    - '**/BUILD'
- id: locality-lb-config-from-common-lb-config
  message: localityLbConfigFromCommonLbConfig() should be removed. Use convertLocalityLbConfigTo()
    or localityLbConfigFromProto() instead.
  severity: WARNING
  languages:
  - cpp
  pattern: 'LoadBalancerConfigHelper::localityLbConfigFromCommonLbConfig(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: todo-comment-merge-legacy-typed
  message: TODO comment about merging legacy and typed configs indicates unfinished
    refactoring.
  severity: INFO
  languages:
  - cpp
  pattern-regex: TODO.*merge.*legacy.*typed.*config
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: typed-config-with-single-member
  message: TypedConfig with single member suggests missing conversion constructor
    from legacy proto.
  severity: INFO
  languages:
  - cpp
  pattern-regex: class\s+Typed\w+LbConfig[^{]*\{[^}]*const\s+\w+LbProto\s+lb_config_;[^}]*\}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: active-or-legacy-pattern-usage
  message: ActiveOrLegacy pattern should be removed. Convert legacy configs to typed
    configs directly at load time.
  severity: WARNING
  languages:
  - cpp
  pattern: 'Common::ActiveOrLegacy<$TYPED, $LEGACY>::get($CONFIG)

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: active-or-legacy-template-usage
  message: ActiveOrLegacy pattern deprecated. Convert legacy configs to typed configs
    at load time.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ActiveOrLegacy\s*<
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: legacy-lb-config-member-in-struct
  message: Legacy config member variable should be removed. Use typed config members.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: (absl::optional|std::optional)\s*<\s*Legacy\w+LbProto\s*>\s+lb_config_
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: legacy-config-constructor-with-cluster-param
  message: Legacy config constructor definition should be removed. Implement conversion
    in typed config.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: (LegacyRoundRobinLbConfig|LegacyLeastRequestLbConfig|LegacyMaglevLbConfig|LegacyRingHashLbConfig)::\1\s*\(\s*const\s+ClusterProto
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: legacy-config-typedef-in-namespace
  message: Legacy proto typedef should be removed as legacy configs are being eliminated.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: using\s+Legacy\w+LbProto\s*=\s*ClusterProto::\w+LbConfig;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: legacy-config-optref-return
  message: Method returning OptRef<LegacyProto> should be removed with legacy config
    class.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: OptRef\s*<\s*const\s+Legacy\w+LbProto\s*>\s+lbConfig
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: assignment-from-cluster-lb-config
  message: Assigning cluster lb_config to member variable indicates legacy pattern.
    Use typed config.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: lb_config_\s*=\s*cluster\.(round_robin|least_request|maglev|ring_hash)_lb_config\(\)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: active-or-legacy-get-call
  message: ActiveOrLegacy::get() call should be replaced with direct typed config
    usage.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ActiveOrLegacy<[^>]+>::get\(
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: legacy-config-namespace-qualifier
  message: Namespace-qualified legacy config reference should be replaced with typed
    config.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: Upstream::Legacy(RoundRobin|LeastRequest|Maglev|RingHash)LbConfig
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: optref-legacy-proto-type-alias
  message: OptRef<LegacyProto> type should be replaced as legacy configs are removed.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: OptRef<const\s+Legacy\w+LbProto>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: absl-optional-legacy-lb-proto
  message: absl::optional<LegacyProto> should be removed with legacy config classes.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: absl::optional<Legacy\w+LbProto>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: cluster-proto-lb-config-field-declaration
  message: Using ClusterProto nested LB config types suggests legacy pattern. Use
    typed extension config.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ClusterProto::(RoundRobin|LeastRequest|Maglev|RingHash)LbConfig
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: legacy-config-public-section
  message: Legacy config class definition should be removed entirely.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: 'class\s+Legacy\w+LbConfig[^{]*\{[^}]*public:'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: empty-random-config-reference
  message: EmptyRandomLbConfig should be replaced with TypedRandomLbConfig. Empty
    config class removed.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bEmptyRandomLbConfig\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    exclude:
    - test/**
    - '**/BUILD'
- id: slow-start-from-legacy-proto-function-call
  message: slowStartConfigFromLegacyProto() deprecated. Use convertSlowStartConfigTo()
    or slowStartConfigFromProto().
  severity: WARNING
  languages:
  - cpp
  pattern-regex: slowStartConfigFromLegacyProto\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: optref-ref-method-on-lb-config
  message: OptRef.ref() call on lb_config suggests legacy config pattern. Update to
    typed config.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \w+_config\.ref\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/load_balancing_policies/**/*lb.h'
    - '**/load_balancing_policies/**/*lb.cc'
- id: factory-load-legacy-returning-legacy-config
  message: loadLegacy() should instantiate typed config with conversion constructor,
    not legacy config.
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: "absl::StatusOr<Upstream::LoadBalancerConfigPtr>\nloadLegacy(...) override\
      \ {\n  return Upstream::LoadBalancerConfigPtr{new $LEGACY_CLASS(...)};\n}\n"
  - metavariable-pattern:
      metavariable: $LEGACY_CLASS
      patterns:
      - pattern-either:
        - pattern: LegacyRoundRobinLbConfig
        - pattern: LegacyLeastRequestLbConfig
        - pattern: LegacyMaglevLbConfig
        - pattern: LegacyRingHashLbConfig
        - pattern: EmptyRandomLbConfig
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: load-balancer-constructor-initialization-with-common
  message: Load balancer initialization with common_config indicates legacy constructor.
    Use typed config.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: :\s*\w+LoadBalancerBase\([^)]*common_config
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/load_balancing_policies/**/*lb.h'
- id: slow-start-config-from-legacy-proto
  message: slowStartConfigFromLegacyProto() should be removed. Use convertSlowStartConfigTo()
    or slowStartConfigFromProto() instead.
  severity: WARNING
  languages:
  - cpp
  pattern: 'LoadBalancerConfigHelper::slowStartConfigFromLegacyProto(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: load-legacy-method-creating-legacy-config
  message: loadLegacy() method should instantiate typed config with conversion constructor,
    not legacy config.
  severity: WARNING
  languages:
  - cpp
  pattern: "absl::StatusOr<Upstream::LoadBalancerConfigPtr>\nloadLegacy(..., const\
    \ ClusterProto& cluster) override {\n  return Upstream::LoadBalancerConfigPtr{new\
    \ $LEGACY_CONFIG(cluster)};\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: load-legacy-with-legacy-config-instantiation
  message: loadLegacy should instantiate typed config with conversion constructor,
    not legacy config.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: loadLegacy\(.*\)\s+override\s*\{[^}]*new\s+Legacy\w+LbConfig
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: has-value-check-on-legacy-proto
  message: has_value() check on lb_config_ suggests legacy optional pattern. Update
    for typed config.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: lb_config_\.has_value\(\)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/load_balancing_policies/**/config.*'
- id: constructor-with-optref-has-value-conditional
  message: Conditional with has_value() and slowStartConfigFromLegacyProto indicates
    legacy constructor pattern.
  severity: WARNING
  languages:
  - cpp
  pattern: "$CONFIG.has_value()\n  ? LoadBalancerConfigHelper::slowStartConfigFromLegacyProto($CONFIG.ref())\n\
    \  : absl::nullopt\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: load-balancer-config-ptr-with-legacy
  message: LoadBalancerConfigPtr wrapping legacy config should use typed config instead.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: LoadBalancerConfigPtr\s*\{\s*new\s+Legacy\w+LbConfig
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: lb-config-optional-value-method
  message: Accessing lb_config_.value() suggests legacy optional pattern. Update for
    typed config.
  severity: WARNING
  languages:
  - cpp
  pattern: 'lb_config_.value()

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/load_balancing_policies/**/config.*'
- id: legacy-round-robin-lb-config-instantiation
  message: LegacyRoundRobinLbConfig should not be instantiated. Use TypedRoundRobinLbConfig
    with conversion constructor.
  severity: WARNING
  languages:
  - cpp
  pattern: 'new LegacyRoundRobinLbConfig(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: legacy-least-request-lb-config-instantiation
  message: LegacyLeastRequestLbConfig should not be instantiated. Use TypedLeastRequestLbConfig
    with conversion constructor.
  severity: WARNING
  languages:
  - cpp
  pattern: 'new LegacyLeastRequestLbConfig(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: empty-random-lb-config-instantiation
  message: EmptyRandomLbConfig should not be instantiated. Use TypedRandomLbConfig
    instead.
  severity: WARNING
  languages:
  - cpp
  pattern: 'new EmptyRandomLbConfig(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: legacy-config-ptr-return-round-robin
  message: Should return TypedRoundRobinLbConfig instead of LegacyRoundRobinLbConfig.
  severity: WARNING
  languages:
  - cpp
  pattern: 'return Upstream::LoadBalancerConfigPtr{new LegacyRoundRobinLbConfig($CLUSTER)};

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: legacy-config-ptr-return-least-request
  message: Should return TypedLeastRequestLbConfig instead of LegacyLeastRequestLbConfig.
  severity: WARNING
  languages:
  - cpp
  pattern: 'return Upstream::LoadBalancerConfigPtr{new LegacyLeastRequestLbConfig($CLUSTER)};

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: empty-random-config-ptr-return
  message: Should return TypedRandomLbConfig instead of EmptyRandomLbConfig.
  severity: WARNING
  languages:
  - cpp
  pattern: 'return Upstream::LoadBalancerConfigPtr{new EmptyRandomLbConfig()};

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: legacy-config-constructor-definition
  message: Legacy config constructor should be removed. Implement conversion constructor
    in typed config class.
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: '$CLASS::$CLASS(const ClusterProto& cluster) { ... }

      '
  - metavariable-pattern:
      metavariable: $CLASS
      patterns:
      - pattern-either:
        - pattern: LegacyRoundRobinLbConfig
        - pattern: LegacyLeastRequestLbConfig
        - pattern: LegacyMaglevLbConfig
        - pattern: LegacyRingHashLbConfig
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: legacy-round-robin-config-lb-config-method
  message: Legacy lbConfig() method in LegacyRoundRobinLbConfig should be removed
    with the class.
  severity: WARNING
  languages:
  - cpp
  pattern: 'OptRef<const LegacyRoundRobinLbProto> lbConfig() const { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: legacy-least-request-config-lb-config-method
  message: Legacy lbConfig() method in LegacyLeastRequestLbConfig should be removed
