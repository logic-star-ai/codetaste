  severity: WARNING
  languages:
  - cpp
  pattern-regex: OptRef\s*<\s*const\s+.*LeastRequestLbConfig\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/load_balancing_policies/**/*.h'
- id: optref-cluster-lb-config-ring-hash
  message: OptRef of RingHashLbConfig suggests legacy constructor signature. Use typed
