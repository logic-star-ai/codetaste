  severity: WARNING
  languages:
  - cpp
  pattern-regex: OptRef\s*<\s*const\s+.*RingHashLbConfig\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/load_balancing_policies/**/*.h'
- id: zone-aware-lb-with-common-config
  message: Zone-aware LB with CommonLbConfig indicates legacy pattern. Update to use
