  severity: WARNING
  languages:
  - cpp
  pattern: 'OptRef<const LegacyLeastRequestLbProto> lbConfig() const { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: optref-cluster-lb-config-round-robin
  message: OptRef of RoundRobinLbConfig suggests legacy constructor signature. Use
    typed config.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: OptRef\s*<\s*const\s+.*RoundRobinLbConfig\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/load_balancing_policies/**/*.h'
- id: optref-cluster-lb-config-least-request
  message: OptRef of LeastRequestLbConfig suggests legacy constructor signature. Use
