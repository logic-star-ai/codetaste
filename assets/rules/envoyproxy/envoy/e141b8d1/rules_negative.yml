  severity: WARNING
  languages:
  - cpp
  pattern-regex: ZoneAwareLoadBalancer\w*\([^)]*CommonLbConfig
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: has-round-robin-config-check
  message: Check for round_robin_lb_config indicates legacy config access. Update
