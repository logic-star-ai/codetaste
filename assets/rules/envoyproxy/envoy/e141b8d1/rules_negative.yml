    nr_legacy_patterns: 1
- id: legacy-round-robin-config-return-type
  message: lbConfig() method returning OptRef<LegacyProto> should be removed with
    legacy config class.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: OptRef\s*<\s*const\s+LegacyRoundRobinLbProto\s*>\s+lbConfig\s*\(\s*\)\s+const
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: legacy-least-request-config-return-type
