- id: random-factory-simplified-no-dynamic-cast-check
  message: Random factory simplified - no if/else for typed vs legacy config
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern: "Upstream::LoadBalancerPtr RandomCreator::operator()(...) {\n  ...\n\
      \  return std::make_unique<Upstream::RandomLoadBalancer>(...);\n}\n"
  - pattern-not: "Upstream::LoadBalancerPtr RandomCreator::operator()(...) {\n  ...\n\
      \  if ($COND) {\n    ...\n  } else {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/random/config.cc
