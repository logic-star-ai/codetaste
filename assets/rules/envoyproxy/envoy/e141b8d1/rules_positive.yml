  languages:
  - cpp
  pattern-regex: LoadBalancerConfigPtr\s*\{\s*new\s+(?:Upstream::)?Typed\w+LbConfig\s*\(\s*cluster[^}]*\}\s*;
  metadata:
    category: architecture
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.h
