rules:
- id: typed-config-in-test-namespace
  message: Test files use typed config classes - tests updated for refactoring
  severity: INFO
  languages:
  - cpp
  pattern-regex: TypedRoundRobinLbConfig|TypedRandomLbConfig|TypedLeastRequestLbConfig|TypedMaglevLbConfig|TypedRingHashLbConfig
  metadata:
    category: basic
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  paths:
    include:
    - test/extensions/load_balancing_policies/*/*test*.cc
- id: conversion-constructor-builds-typed-proto
  message: Conversion constructor uses proto builder methods - legacy to typed proto
    conversion
  severity: INFO
  languages:
  - cpp
  pattern-regex: mutable_\w+\(\)
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.cc
    - source/extensions/load_balancing_policies/*/*_lb.cc
- id: helper-method-convert-to-typed-proto
  message: Uses LoadBalancerConfigHelper::convertXXXTo helper - new conversion helper
    method
  severity: INFO
  languages:
  - cpp
  pattern-regex: LoadBalancerConfigHelper::convert\w+To\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.cc
    - source/extensions/load_balancing_policies/*/*_lb.cc
- id: conversion-helper-invocation-pattern
  message: Invokes LoadBalancerConfigHelper conversion methods - new conversion helpers
    used
  severity: INFO
  languages:
  - cpp
  pattern-regex: LoadBalancerConfigHelper::(convertHashLbConfigTo|convertLocalityLbConfigTo|convertSlowStartConfigTo)\s*\([^)]*,\s*[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.cc
    - source/extensions/load_balancing_policies/*/*_lb.cc
- id: conversion-proto-field-population
  message: Conversion checks has_XXX then populates mutable field - conditional proto
    copying
  severity: INFO
  languages:
  - cpp
  pattern-regex: if\s*\([^)]*has_\w+\(\s*\)\s*\)\s*\{[^}]*mutable_\w+\(\s*\)
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.cc
    - source/extensions/load_balancing_policies/*/*_lb.cc
- id: conversion-helper-method-invocation
  message: Invokes LoadBalancerConfigHelper conversion method - helper usage
  severity: INFO
  languages:
  - cpp
  pattern-regex: LoadBalancerConfigHelper::(convertHashLbConfigTo|convertLocalityLbConfigTo|convertSlowStartConfigTo)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.cc
    - source/extensions/load_balancing_policies/*/*_lb.cc
- id: conversion-copies-proto-field-with-assignment
  message: Conversion constructor copies proto fields using mutable and assignment
    - proto conversion
  severity: INFO
  languages:
  - cpp
  pattern-regex: \*\w+\.mutable_\w+\(\s*\)\s*=
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.cc
    - source/extensions/load_balancing_policies/*/*_lb.cc
- id: typed-config-returned-from-loadlegacy
  message: loadLegacy returns new TypedXXXLbConfig - conversion at load time
  severity: INFO
  languages:
  - cpp
  pattern-regex: loadLegacy\s*\([^)]*\)\s*override\s*\{[^}]*return\s+Upstream::LoadBalancerConfigPtr\s*\{\s*new\s+(?:Upstream::)?Typed\w+LbConfig
  metadata:
    category: architecture
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.h
- id: conversion-proto-mutable-member
  message: Conversion accesses mutable proto member - proto field mutation
  severity: INFO
  languages:
  - cpp
  pattern-regex: mutable_(locality_lb_config|slow_start_config|common_lb_config|hash_function|table_size|minimum_ring_size|maximum_ring_size|choice_count|active_request_bias)
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.cc
    - source/extensions/load_balancing_policies/*/*_lb.cc
- id: conversion-helper-with-three-params
  message: Conversion helper invoked with multiple parameters - helper method usage
  severity: INFO
  languages:
  - cpp
  pattern-regex: LoadBalancerConfigHelper::(convertLocalityLbConfigTo|convertSlowStartConfigTo|convertHashLbConfigTo)\s*\([^,]+,\s*[^,]+,\s*[^)]+\)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.cc
    - source/extensions/load_balancing_policies/*/*_lb.cc
- id: conversion-returns-status-or-with-new
  message: Returns LoadBalancerConfigPtr with new typed config from cluster - conversion
    return
  severity: INFO
  languages:
  - cpp
  pattern-regex: return\s+Upstream::LoadBalancerConfigPtr\s*\{\s*new\s+(?:Upstream::)?Typed\w+LbConfig\s*\(\s*cluster
  metadata:
    category: architecture
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.h
- id: loadlegacy-single-line-return-typed-config
  message: loadLegacy has single-line return with typed config - simple conversion
  severity: INFO
  languages:
  - cpp
  pattern-regex: loadLegacy[^{]*\{\s*return[^}]*new\s+(?:Upstream::)?Typed\w+LbConfig[^}]*\}
  metadata:
    category: architecture
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.h
- id: proto-builder-pattern-in-conversion
  message: Proto builder pattern with mutable and assignment - proto field copying
  severity: INFO
  languages:
  - cpp
  pattern-regex: \*\w+\.mutable_\w+\(\s*\)\s*=\s*\w+\.\w+\(\s*\)
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.cc
    - source/extensions/load_balancing_policies/*/*_lb.cc
- id: conversion-returns-typed-config-from-cluster
  message: Returns typed config constructed from cluster - conversion return pattern
  severity: INFO
  languages:
  - cpp
  pattern-regex: return\s+Upstream::LoadBalancerConfigPtr\s*\{[^}]*Typed\w+LbConfig\s*\(\s*cluster
  metadata:
    category: architecture
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.h
- id: typed-config-multiple-constructors-declared
  message: Typed config declares multiple constructors - standard and conversion
  severity: INFO
  languages:
  - cpp
  pattern-regex: class\s+Typed\w+LbConfig[^}]*Typed\w+LbConfig\s*\([^)]*LbProto[^}]*Typed\w+LbConfig\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - source/extensions/load_balancing_policies/*/config.h
    - source/extensions/load_balancing_policies/*/*_lb.h
