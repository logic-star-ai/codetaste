rules:
- id: defaultcode-prop-any-value
  message: Found defaultCode prop usage. This should be migrated to sandpackExample
    with a separate example file.
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: ^\s*defaultCode=
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 79
  paths:
    include:
    - docs/pages/web/tooltip.js
    - docs/pages/web/selectlist.js
    - docs/pages/web/list.js
    - docs/pages/web/taparea.js
    - docs/pages/web/datapoint.js
    - docs/pages/web/divider.js
- id: defaultcode-multiline-template-literal
