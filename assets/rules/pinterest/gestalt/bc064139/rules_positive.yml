rules:
- id: example-returns-jsx-element
  message: Example function returns JSX element
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: "return (\n  <$COMPONENT ... >\n    ...\n  </$COMPONENT>\n);\n"
  metadata:
    category: basic
    nr_refactored_patterns: 58
    nr_legacy_patterns: 0
  paths:
    include:
    - docs/examples/activationcard/*.js
    - docs/examples/module/*.js
    - docs/examples/upsell/*.js
    - docs/examples/textfield/*.js
    exclude:
    - docs/examples/textfield/main.js
- id: sandpack-example-code-imported-var
  message: SandpackExample references code variable imported from examples
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: '<SandpackExample code={$VAR} ... />

      '
  - metavariable-pattern:
      metavariable: $VAR
      patterns:
      - pattern-not: main
  metadata:
    category: api
    nr_refactored_patterns: 57
    nr_legacy_patterns: 0
  paths:
    include:
    - docs/pages/web/textfield.js
    - docs/pages/web/module.js
    - docs/pages/web/upsell.js
    - docs/pages/web/activationcard.js
- id: example-gestalt-import-multiple-components
  message: Example imports multiple Gestalt components
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: import { $COMP1, ..., $COMP2, ... } from 'gestalt'
  - metavariable-comparison:
      comparison: str($COMP1) != str($COMP2)
  metadata:
    category: dependency
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
  paths:
    include:
    - docs/examples/activationcard/*.js
    - docs/examples/module/*.js
    - docs/examples/upsell/*.js
    - docs/examples/textfield/*.js
    exclude:
    - docs/examples/textfield/main.js
