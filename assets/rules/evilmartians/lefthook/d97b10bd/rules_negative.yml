  message: Check for deprecated non-empty 'Config' field should use 'Configs' array
  severity: WARNING
  languages:
  - go
  pattern: '$REMOTE.Config != ""

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
