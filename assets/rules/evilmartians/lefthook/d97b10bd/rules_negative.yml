rules:
- id: lefthook-options-fs-access
  message: Access to 'Fs' field should be refactored (Fs moved to Lefthook struct)
  severity: WARNING
  languages:
  - go
  pattern: '$VAR.Fs

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
  paths:
    include:
    - internal/lefthook/
- id: lefthook-package-import
  message: Import path 'internal/lefthook' should be changed to 'internal/command'
    (unless it's the base lefthook package)
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/evilmartians/lefthook/internal/lefthook\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: old-lefthook-runner-path-exists
  message: Files should be moved from 'internal/lefthook/runner/' to 'internal/run/'
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - internal/lefthook/runner/
- id: runner-package-in-comment
  message: Comments referencing 'internal/lefthook/runner' path should be updated
    to 'internal/run'
  severity: WARNING
  languages:
  - go
  pattern-regex: internal/lefthook/runner
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - '**/*.go'
- id: import-block-lefthook-runner
  message: Import 'internal/lefthook/runner' should be changed to 'internal/run'
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/evilmartians/lefthook/internal/lefthook/runner\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: runner-struct-method-receiver
  message: Method receiver type '*Runner' should be changed to '*Run'
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *Runner) $METHOD(...) $RET {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: import-block-lefthook-package
  message: Import 'internal/lefthook' in cmd/ should likely be changed to 'internal/command'
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/evilmartians/lefthook/internal/lefthook\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - cmd/
- id: old-lefthook-command-path-exists
  message: Command files should be moved from 'internal/lefthook/' to 'internal/command/'
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - internal/lefthook/add.go
    - internal/lefthook/dump.go
    - internal/lefthook/install.go
    - internal/lefthook/run.go
    - internal/lefthook/uninstall.go
    - internal/lefthook/validate.go
- id: lefthook-package-declaration
  message: Command files with package lefthook should be moved to 'internal/command/'
    and package renamed to 'command'
  severity: WARNING
  languages:
  - go
  pattern: package lefthook
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - internal/lefthook/add.go
    - internal/lefthook/dump.go
    - internal/lefthook/install.go
    - internal/lefthook/run.go
    - internal/lefthook/uninstall.go
    - internal/lefthook/validate.go
- id: runner-package-declaration
  message: Package 'runner' in old path should be moved to 'internal/run/'
  severity: WARNING
  languages:
  - go
  pattern: package runner
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - internal/lefthook/runner/
- id: runner-jobs-path-file
  message: Files in 'internal/lefthook/runner/jobs/' should be moved to 'internal/run/jobs/'
