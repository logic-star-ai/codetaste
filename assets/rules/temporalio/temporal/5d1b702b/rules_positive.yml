rules:
- id: historyi-mutablestate-param-specific
  message: Detected MutableState as function parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $F($P historyi.MutableState, ...) $R { ... }
    - pattern: func ($RCV) $F($P historyi.MutableState, ...) $R { ... }
    - pattern: func $F(..., $P historyi.MutableState, ...) $R { ... }
    - pattern: func ($RCV) $F(..., $P historyi.MutableState, ...) $R { ... }
  metadata:
    nr_refactored_patterns: 134
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/service/history/workflow/**'
  options:
    symbolic_propagation: true
- id: historyi-type-in-ndc-transaction
  message: Detected historyi type in NDC transaction
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: historyi.$TYPE
  metadata:
    nr_refactored_patterns: 124
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/service/history/ndc/*transaction*.go'
  options:
    symbolic_propagation: true
- id: historyi-transactionpolicy-usage
  message: Detected TransactionPolicy usage
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: historyi.TransactionPolicyActive
    - pattern: historyi.TransactionPolicyPassive
  metadata:
    nr_refactored_patterns: 115
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/service/history/workflow/**'
  options:
    symbolic_propagation: true
- id: interface-type-in-function-signature
  message: Detected interface type used in function signature
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $FUNC(..., $VAR $ALIAS.$TYPE, ...) $RET { ... }
    - pattern: func ($RECV) $FUNC(..., $VAR $ALIAS.$TYPE, ...) $RET { ... }
  - metavariable-regex:
      metavariable: $ALIAS
      regex: (?i).*(history|hist).*
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(state|task|query|registry|policy|info|limits|completion).*
  - pattern-not-inside: 'import "go.temporal.io/server/service/history/workflow"

      ...

      '
  metadata:
    nr_refactored_patterns: 47
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: qualified-type-in-ndc-components
  message: Detected interface type usage in NDC components
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $ALIAS.$TYPE
  - metavariable-regex:
      metavariable: $ALIAS
      regex: ^(historyi|historyinterfaces|histinterface|histintf|histi)$
  metadata:
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/service/history/ndc/**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: interface-struct-field-type
  message: Detected struct field with interface type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $STRUCT struct {\n  ...\n  $FIELD $ALIAS.$TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $ALIAS
      regex: (?i).*(history|hist).*
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(state|task|query|registry|policy|info|limits|completion|context).*
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: historyi-transactionpolicy-reference
  message: Detected TransactionPolicy type reference through historyi
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: historyi.TransactionPolicy
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/service/history/workflow/**'
    - '**/interfaces/*_mock.go'
  options:
    symbolic_propagation: true
- id: historyi-mutablestate-in-tuple-return
  message: Detected MutableState in tuple return
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $F(...) (historyi.MutableState, $T2) { ... }
    - pattern: func ($R) $F(...) (historyi.MutableState, $T2) { ... }
    - pattern: func $F(...) ($T1, historyi.MutableState) { ... }
    - pattern: func ($R) $F(...) ($T1, historyi.MutableState) { ... }
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/service/history/workflow/**'
  options:
    symbolic_propagation: true
- id: variable-declaration-historyi-type
  message: Detected variable declaration with historyi type
