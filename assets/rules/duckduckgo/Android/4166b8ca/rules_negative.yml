rules:
- id: detect-userwhitelistdao-import
  message: Import statement for UserWhitelistDao should be changed to UserAllowListDao
  severity: WARNING
  languages:
  - kotlin
  - java
  pattern: import com.duckduckgo.app.privacy.db.UserWhitelistDao
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: detect-userwhitelisteddomain-constructor
  message: Constructor call to UserWhitelistedDomain should be changed to UserAllowListedDomain
