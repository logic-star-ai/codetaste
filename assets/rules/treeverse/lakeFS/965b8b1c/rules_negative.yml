- id: config-old-blockadapter-params-naming
  message: Method naming changed from `GetBlockAdapter*Params()` to `Blockstore*Params()`
    - update method calls
  severity: WARNING
  languages:
  - go
  pattern-regex: .*GetBlockAdapter(S3|Local|GS|Azure)Params.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: config-old-naming-blockadapter-vs-blockstore
  message: Method naming changed from `GetBlockAdapter*Params()` to `Blockstore*Params()`
    - update all occurrences
  severity: WARNING
  languages:
  - go
  pattern-regex: GetBlockAdapter(S3|Local|GS|Azure)Params\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: config-old-naming-kv-vs-database
  message: Method `GetKVParams()` has been renamed to `DatabaseParams()` - update
    all occurrences
  severity: WARNING
  languages:
  - go
  pattern-regex: GetKVParams\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
