  severity: WARNING
  languages:
  - go
  pattern: '$VAR = $C.GetStatsEnabled() && $CONDITION

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: config-comment-mentioning-reutrns
  message: 'Fix typo in comment: ''reutrns'' should be ''returns'''
  severity: INFO
  languages:
  - go
  pattern-regex: //.*reutrns.*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
