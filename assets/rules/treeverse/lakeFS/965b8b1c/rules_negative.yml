rules:
- id: config-all-getter-calls-comprehensive
  message: Replace config getter method with direct field access or renamed method
    - config fields are now public
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $X.GetListenAddress()
  - pattern: $X.GetKVParams()
  - pattern: $X.GetLDAPConfiguration()
  - pattern: $X.GetBlockstoreType()
  - pattern: $X.GetBlockstoreDefaultNamespacePrefix()
  - pattern: $X.GetBlockAdapterS3Params()
  - pattern: $X.GetBlockAdapterLocalParams()
  - pattern: $X.GetBlockAdapterGSParams()
  - pattern: $X.GetBlockAdapterAzureParams()
  - pattern: $X.GetAuthCacheConfig()
  - pattern: $X.GetAuthEncryptionSecret()
  - pattern: $X.GetS3GatewayRegion()
  - pattern: $X.GetS3GatewayDomainNames()
  - pattern: $X.GetS3GatewayFallbackURL()
  - pattern: $X.GetActionsEnabled()
  - pattern: $X.GetStatsEnabled()
  - pattern: $X.GetStatsAddress()
  - pattern: $X.GetStatsFlushInterval()
  - pattern: $X.GetStatsFlushSize()
  - pattern: $X.GetStatsExtended()
  - pattern: $X.GetEmailParams()
  - pattern: $X.GetCommittedParams()
  - pattern: $X.GetFixedInstallationID()
  - pattern: $X.GetCommittedBlockStoragePrefix()
  - pattern: $X.GetLoggingTraceRequestHeaders()
  - pattern: $X.GetAuditLogLevel()
  - pattern: $X.GetSecurityAuditCheckInterval()
  - pattern: $X.GetSecurityAuditCheckURL()
  - pattern: $X.GetAuthAPIEndpoint()
  - pattern: $X.GetAuthAPIToken()
  - pattern: $X.GetAuthAPISupportsInvites()
  - pattern: $X.GetUISnippets()
  - pattern: $X.GetAuthOIDCConfiguration()
  - pattern: $X.GetAuthLogoutRedirectURL()
  - pattern: $X.GetUIEnabled()
  - pattern: $X.GetLoginDuration()
  - pattern: $X.GetGravelerRepositoryCacheConfig()
  - pattern: $X.GetGravelerCommitCacheConfig()
  - pattern: $X.GetDatabaseType()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 95
