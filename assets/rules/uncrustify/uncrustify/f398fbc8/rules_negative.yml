rules:
- id: align-reduce-include-chain-length
  message: Reduce include chain length by using forward declarations or more specific
    headers
  severity: INFO
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: '#include "chunk.h"'
  - pattern: '#include "ChunkStack.h"'
  - pattern: '#include "uncrustify_types.h"'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
  paths:
    include:
    - src/align/*.h
    exclude:
    - src/align/stack.h
    - src/align/align.h
- id: align-principle-of-least-knowledge
