- id: api-exception-throw-statement
  message: Replace 'throw new ApiException(...)' with 'throw new BadRequestException(...)'
  severity: WARNING
  languages:
  - typescript
  pattern: throw new ApiException($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 146
- id: api-exception-throw-multiline
