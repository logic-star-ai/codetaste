rules:
- id: split-import-from-main
  message: 'Split interface has been moved to presto-spi. Update import to: import
    com.facebook.presto.spi.Split;'
  severity: ERROR
  languages:
  - java
  pattern: 'import com.facebook.presto.split.Split;

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: method-name-contains-chunk
  message: Method name contains 'chunk' terminology which should be updated to 'split'.
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$RET $METHOD(...) { ... }

      '
  - metavariable-regex:
      metavariable: $METHOD
      regex: .*[Cc]hunk.*
  - pattern-not: '$RET makeLastChunk(...) { ... }

      '
  - pattern-not: '$RET isLastChunk(...) { ... }

      '
  - pattern-not: '$RET getSerializedChunk(...) { ... }

      '
  - pattern-not: '$RET getPartitionChunks(...) { ... }

      '
  - pattern-not: '$RET serializePartitionChunk(...) { ... }

      '
  - pattern-not: '$RET deserializePartitionChunk(...) { ... }

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
