rules:
- id: zaplogger-param-in-build-method
  message: Function Build has *zap.SugaredLogger parameter
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+\([^)]+\)\s+Build\([^)]*\*zap\.SugaredLogger[^)]*\)\s+\([^)]+\)
  metadata:
    category: api
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
- id: zap-logger-import-in-operator
  message: Build method uses zap.SugaredLogger from zap import
  severity: INFO
  languages:
  - go
  pattern: "import (\n  ...\n  \"go.uber.org/zap\"\n  ...\n)\n...\nfunc ($C $CONFIG)\
    \ Build($LOGGER *zap.SugaredLogger) ($RET, error) {\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
- id: logger-variable-in-build-signature
  message: Build method has named logger parameter of type *zap.SugaredLogger
  severity: INFO
  languages:
  - go
  pattern-regex: Build\(\s*(\w+)\s+\*zap\.SugaredLogger\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
- id: helper-config-build-returns-helper-operator
  message: Helper config Build returns helper operator type with logger param
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) ($HELPER, error) {\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
- id: no-operator-buildcontext-import
  message: Operator import used with logger-based Build, not BuildContext
  severity: INFO
  languages:
  - go
  pattern: "import \"github.com/open-telemetry/opentelemetry-log-collection/operator\"\
    \n...\nfunc ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) ($RET, error) {\n \
    \ ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: config-build-function-signature-logger
  message: Config Build function signature uses *zap.SugaredLogger parameter
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+\(\w+\s+\w+Config\)\s+Build\(\w+\s+\*zap\.SugaredLogger\)
  metadata:
    category: api
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: build-context-removed-no-references
  message: Build method signature contains no BuildContext references
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+\(\w+\s+\w+\)\s+Build\(\w+\s+\*zap\.SugaredLogger\)
  metadata:
    category: api
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: build-method-no-buildcontext-param
  message: Build method does not use BuildContext parameter
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
- id: operator-build-returns-error
  message: Build method with logger returns operator and error
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n  return nil, $ERR\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: build-logger-zap-sugaredlogger-return
  message: Build method with *zap.SugaredLogger returns operator successfully
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n  return $RET, nil\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: operator-build-returns-operator
  message: Build method with logger returns operator instance
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n  return &$OP, nil\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: build-method-logger-error-handling
  message: Build method propagates errors from nested Build calls with logger
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  $OP, $ERR := $NESTED.Build($LOGGER)\n  if $ERR != nil {\n    return\
    \ nil, $ERR\n  }\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: build-method-creates-operator-instance
  message: Build method with logger creates and returns operator instance
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n  return &$TYPE{...}, nil\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: operator-config-with-build-logger-method
  message: Operator config struct has Build method with logger parameter
  severity: INFO
  languages:
  - go
  pattern: "type $CONFIG struct {\n  ...\n}\n\nfunc ($C $CONFIG) Build($LOGGER *zap.SugaredLogger)\
    \ (operator.Operator, error) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: build-with-conditional-error-return
  message: Build method with logger includes conditional error returns
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n  if $CONDITION {\n    return nil, fmt.Errorf(...)\n  }\n \
    \ ...\n  return $OP, nil\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: build-error-with-logger-context
  message: Build method with logger parameter includes error handling
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n  if $COND {\n    return nil, fmt.Errorf($MSG)\n  }\n  ...\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: transformer-operator-build-nested-logger
  message: Transformer operator Build passes logger to nested TransformerConfig.Build
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  $TRANSFORMER, $ERR := $C.TransformerConfig.Build($LOGGER)\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: operator-build-creates-transformer-operator
  message: Build method creates operator with TransformerOperator field
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n  return &$OPERATOR{\n    TransformerOperator: $TRANS,\n  \
    \  ...\n  }, nil\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: input-operator-build-nested-logger
  message: Input operator Build passes logger to nested InputConfig.Build
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  $INPUT, $ERR := $C.InputConfig.Build($LOGGER)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: build-return-with-multiple-fields
  message: Build method with logger returns operator with multiple fields
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n  return &$TYPE{\n    $FIELD1: $VAL1,\n    $FIELD2: $VAL2,\n\
    \    $FIELD3: $VAL3,\n  }, nil\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: operator-build-creates-input-operator
  message: Build method creates operator with InputOperator field
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n  return &$OPERATOR{\n    InputOperator: $INPUT,\n    ...\n\
    \  }, nil\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: operator-build-creates-parser-operator
  message: Build method creates operator with ParserOperator field
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
    \ error) {\n  ...\n  return &$OPERATOR{\n    ParserOperator: $PARSER,\n    ...\n\
    \  }, nil\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: operator-build-interface-implementation
  message: Pointer receiver Build method implements Builder interface with logger
  severity: INFO
  languages:
  - go
  pattern: "func ($C *$CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
