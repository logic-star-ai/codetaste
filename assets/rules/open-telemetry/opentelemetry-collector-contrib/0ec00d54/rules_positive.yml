    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: parser-operator-build-nested-logger
  message: Parser operator Build passes logger to nested ParserConfig.Build
  severity: INFO
  languages:
  - go
  pattern: "func ($C $CONFIG) Build($LOGGER *zap.SugaredLogger) (operator.Operator,\
