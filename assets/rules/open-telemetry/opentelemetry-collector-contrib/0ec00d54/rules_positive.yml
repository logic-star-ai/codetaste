    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: helper-validate-called-without-context
  message: Helper Validate method called without BuildContext parameter
  severity: INFO
  languages:
  - go
  pattern: "if $ERR := $C.$FIELD.Validate(); $ERR != nil {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: encoding-build-no-parameter
  message: Encoding Build called without BuildContext parameter
  severity: INFO
  languages:
  - go
  pattern: '$ENC, $ERR := $CONFIG.Encoding.Build()

    '
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
