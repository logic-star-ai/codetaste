    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: validate-call-with-buildcontext
  message: Validate() call with BuildContext. Remove context dependency from Validate
    methods.
  severity: WARNING
  languages:
  - go
  pattern: '$OBJ.Validate($CTX)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
