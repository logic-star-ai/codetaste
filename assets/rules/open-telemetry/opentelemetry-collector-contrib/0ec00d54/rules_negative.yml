  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: buildcontext-constructor-call
  message: NewBuildContext() constructor should be removed. Pass *zap.SugaredLogger
    directly to Build() methods.
  severity: WARNING
  languages:
  - go
  pattern: operator.NewBuildContext(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: buildcontext-short-declaration
  message: BuildContext initialization detected. Replace with direct *zap.SugaredLogger
    usage.
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := operator.BuildContext{...}

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: buildcontext-struct-literal
  message: BuildContext struct literal detected. Replace with direct *zap.SugaredLogger
    usage.
  severity: WARNING
  languages:
  - go
  pattern: "BuildContext{\n  Logger: $LOGGER,\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: buildcontext-zero-value
  message: BuildContext zero value initialization. Remove BuildContext abstraction.
  severity: WARNING
  languages:
  - go
  pattern: operator.BuildContext{}
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: validate-method-with-buildcontext
  message: Validate() method should not depend on BuildContext. Remove context parameter.
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV $TYPE) Validate($CTX operator.BuildContext) error {\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
