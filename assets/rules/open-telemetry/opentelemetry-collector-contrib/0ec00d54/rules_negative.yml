rules:
- id: testutil-newbuildcontext-call
  message: testutil.NewBuildContext(t) should be replaced with testutil.Logger(t)
  severity: WARNING
  languages:
  - go
  pattern: testutil.NewBuildContext($T)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 124
- id: testutil-buildcontext-in-test
  message: testutil.NewBuildContext() usage in tests. Replace with testutil.Logger().
  severity: WARNING
  languages:
  - go
  pattern-regex: testutil\.NewBuildContext\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 124
- id: buildcontext-build-method-receiver
  message: Build() method should take *zap.SugaredLogger instead of operator.BuildContext
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV $TYPE) Build($CTX operator.BuildContext) ($RET, error) {\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: any-build-method-with-buildcontext
  message: Build() method should take *zap.SugaredLogger instead of operator.BuildContext
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV $TYPE) Build($CTX operator.BuildContext) ($RET, error) {\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: build-method-no-return-type
  message: Build() method should take *zap.SugaredLogger instead of operator.BuildContext
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV $TYPE) Build($CTX operator.BuildContext) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: config-build-multiline
  message: Build() with multiline signature should take *zap.SugaredLogger instead
    of operator.BuildContext
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV $TYPE) Build(\n  $CTX operator.BuildContext,\n) ($RET, error)\
    \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: config-build-returning-operator
  message: Config Build() returning operator should take *zap.SugaredLogger instead
    of operator.BuildContext
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($RECV $TYPE) Build($CTX operator.BuildContext) ($RET, error) {\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: .*Config$
  - metavariable-regex:
      metavariable: $RET
      regex: .*Operator
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
- id: operatorconfig-build-buildcontext
  message: Operator config Build() should take *zap.SugaredLogger instead of operator.BuildContext
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV $TYPE) Build($CTX operator.BuildContext) (operator.Operator,\
    \ error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: build-with-explicit-type
  message: Build() method returning operator.Operator should take *zap.SugaredLogger
