  pattern: "func ($RECV *$TYPE) Build($CTX operator.BuildContext) ($RET, error) {\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: buildcontext-defaultoutputids-field-access
  message: BuildContext.DefaultOutputIDs field access detected. This should be moved
    to pipeline.Config.Build() logic.
  severity: WARNING
  languages:
  - go
  pattern: $CTX.DefaultOutputIDs
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: buildcontext-comment-reference
  message: Comment references BuildContext. Update documentation after removing BuildContext.
  severity: INFO
  languages:
  - go
  pattern-regex: //.*BuildContext
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: output-operator-build-generic
  message: Output operator Build() should take *zap.SugaredLogger instead of operator.BuildContext
