  - metavariable-regex:
      metavariable: $TYPE
      regex: .*Parser.*Config
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: timeparser-validate-call-with-context
  message: TimeParser.Validate() call should not pass BuildContext
  severity: WARNING
  languages:
  - go
  pattern: '$PARSER.Validate($CTX)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
