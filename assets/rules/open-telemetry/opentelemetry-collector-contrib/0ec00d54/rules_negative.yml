  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($RECV $TYPE) Build($CTX operator.BuildContext) ($RET, error) {\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: .*(Input|Output|Parser|Transformer|Writer)Config
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: parser-operator-build-generic
  message: Parser operator Build() should take *zap.SugaredLogger instead of operator.BuildContext
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($RECV $TYPE) Build($CTX operator.BuildContext) ($RET, error) {\n\
