  message: BuildOperators() call detected. This should be consolidated into Build().
  severity: WARNING
  languages:
  - go
  pattern: '$OBJ.BuildOperators($CTX, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
