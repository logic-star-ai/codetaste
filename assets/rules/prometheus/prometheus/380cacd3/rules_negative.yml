rules:
- id: config-targetgroup-pointer-in-slice
  message: Slice type should be []*targetgroup.TargetGroup instead of []*config.TargetGroup
  severity: WARNING
  languages:
  - go
  pattern-regex: \[\]\*config\.TargetGroup
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 136
- id: config-targetgroup-in-test-variable
  message: Test should use targetgroup.TargetGroup instead of config.TargetGroup
  severity: WARNING
  languages:
  - go
  pattern-regex: config\.TargetGroup
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 90
  paths:
    include:
    - '*_test.go'
- id: config-targetgroup-slice-literal
  message: Slice literal should use []*targetgroup.TargetGroup instead of []*config.TargetGroup
  severity: WARNING
  languages:
  - go
  pattern: '[]*config.TargetGroup{...}'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 54
- id: config-targetgroup-slice-make
  message: make() should use []*targetgroup.TargetGroup instead of []*config.TargetGroup
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: make([]*config.TargetGroup, $SIZE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: config-import-block-pattern
  message: Discovery sub-packages should not import main config package
  severity: WARNING
  languages:
  - go
  pattern-regex: ^\s+"github\.com/prometheus/prometheus/config"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
  paths:
    include:
    - discovery/**/*.go
    exclude:
    - discovery/manager.go
    - discovery/manager_test.go
- id: config-targetgroup-send-to-channel
  message: Channel send should use []*targetgroup.TargetGroup instead of []*config.TargetGroup
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CH <- []*config.TargetGroup{...}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: config-targetgroup-composite-literal-unqualified
  message: TargetGroup literal should use targetgroup.TargetGroup instead of config.TargetGroup
  severity: WARNING
  languages:
  - go
  pattern: config.TargetGroup{...}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: config-targetgroup-composite-literal
  message: TargetGroup composite literal should use &targetgroup.TargetGroup instead
    of &config.TargetGroup
  severity: WARNING
  languages:
  - go
  pattern: '&config.TargetGroup{...}'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: config-targetgroup-chan-declaration
  message: Channel type should use targetgroup.TargetGroup instead of config.TargetGroup
  severity: WARNING
  languages:
  - go
  pattern-regex: chan\s+\[?\]?\*?config\.TargetGroup
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: config-targetgroup-in-discovery-manager
  message: Discovery manager should use targetgroup.TargetGroup instead of config.TargetGroup
  severity: WARNING
  languages:
  - go
  pattern-regex: \*?config\.TargetGroup
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - discovery/manager.go
- id: config-import-in-discovery-kubernetes
  message: kubernetes package should not import config; move KubernetesSDConfig to
    discovery/kubernetes
  severity: WARNING
  languages:
  - go
  pattern-regex: ^\s*"github.com/prometheus/prometheus/config"\s*$
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
