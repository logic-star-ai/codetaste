    - discovery/kubernetes/*.go
- id: config-targetgroup-struct-initialization
  message: Struct initialization should use &targetgroup.TargetGroup instead of &config.TargetGroup
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "$VAR := &config.TargetGroup{\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: config-targetgroup-interface-method
  message: Interface method should use targetgroup.TargetGroup instead of config.TargetGroup
  severity: WARNING
  languages:
  - go
  pattern-regex: \)\s+\*?config\.TargetGroup
