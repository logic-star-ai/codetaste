rules:
- id: glabel-instantiation-detected
  message: 'Refactoring detected: GLabel (immutable, non-HTML) instantiated'
  severity: INFO
  languages:
  - java
  pattern: new GLabel(...)
  metadata:
    nr_refactored_patterns: 280
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: gdlabel-instantiation-detected
  message: 'Refactoring detected: GDLabel (mutable, non-HTML) instantiated'
  severity: INFO
  languages:
  - java
  pattern: new GDLabel(...)
  metadata:
    nr_refactored_patterns: 220
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: glabel-in-add-to-container
  message: 'Refactoring detected: GLabel added to container/panel'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $CONTAINER.add(new GLabel(...), ...)
  metadata:
    nr_refactored_patterns: 207
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: gdlabel-import-detected
  message: 'Refactoring detected: GDLabel imported'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import $PACKAGE.GDLabel;
  - metavariable-regex:
      metavariable: $PACKAGE
      regex: .*
  metadata:
    nr_refactored_patterns: 115
    nr_legacy_patterns: 0
- id: glabel-import-detected
  message: 'Refactoring detected: GLabel imported'
  severity: INFO
