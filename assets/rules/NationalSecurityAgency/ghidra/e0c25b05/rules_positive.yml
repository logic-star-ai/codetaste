    nr_legacy_patterns: 0
- id: multiple-glabels-in-method
  message: 'Refactoring detected: Multiple GLabel instantiations in same method'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "$TYPE $METHOD(...) {\n  ...\n  new GLabel(...);\n  ...\n  new GLabel(...);\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 64
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
