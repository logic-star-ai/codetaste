rules:
- id: clangxml-static-field-reference
  message: ClangXML static field reference should be replaced with ClangMarkup ElementId/AttributeId
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: ClangXML.$FIELD
  - metavariable-regex:
      metavariable: $FIELD
      regex: ^[A-Z_]+$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 60
- id: clangxml-string-constant-usage
  message: ClangXML string constants should be replaced with ClangMarkup ElementId
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: ClangXML.DOCUMENT
    - pattern: ClangXML.FUNCTION
    - pattern: ClangXML.BLOCK
    - pattern: ClangXML.RETURN_TYPE
    - pattern: ClangXML.VARDECL
    - pattern: ClangXML.STATEMENT
    - pattern: ClangXML.FUNCPROTO
    - pattern: ClangXML.SYNTAX
    - pattern: ClangXML.VARIABLE
    - pattern: ClangXML.OP
    - pattern: ClangXML.FUNCNAME
    - pattern: ClangXML.TYPE
    - pattern: ClangXML.FIELD
    - pattern: ClangXML.COMMENT
    - pattern: ClangXML.LABEL
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: clangxml-constant-field-declaration
  message: ClangXML string constants should be replaced with ElementId/AttributeId
    classes
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'public static final String $NAME = ...;

      '
  - pattern-inside: 'class ClangXML { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: parser-end-xmlelement-param
  message: XmlPullParser.end(XmlElement) should be replaced with Decoder.closeElement(ElementId)
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$PARSER.end($EL)

      '
  - pattern-inside: 'class $CLASS { ... }

      '
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^(High.*|Pcode.*|Clang.*|JumpTable|LocalSymbolMap)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: parser-start-method-assignment
  message: XmlPullParser.start() assignment should be replaced with Decoder.openElement()
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'XmlElement $VAR = $PARSER.start($STR);

      '
  - pattern-inside: 'class $CLASS { ... }

      '
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^(High.*|Pcode.*|Clang.*|JumpTable)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: xmlelement-start-end-pair
  message: XmlPullParser start/end pattern should be replaced with Decoder openElement/closeElement
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '$START = $PARSER.start($NAME);

      ...

      $PARSER.end($START);

      '
  - pattern-inside: 'class $CLASS { ... }

      '
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^(High.*|Pcode.*|Clang.*)
