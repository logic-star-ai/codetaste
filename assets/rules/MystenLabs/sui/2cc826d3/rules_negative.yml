rules:
- id: old-rpcclient-usage-with-api-trait
  message: Using RPC client with API trait imported from 'sui_json_rpc::api'. Should
    import from 'sui_json_rpc_api'.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $CLIENT.$API_METHOD(...)
  - pattern-inside: 'use sui_json_rpc::api::$TRAIT;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3629
- id: old-open-rpc-macro-in-api-dir
  message: OpenRPC macro in 'sui-json-rpc/src/api/'. API definitions should be in
    'sui-json-rpc-api' crate.
  severity: WARNING
  languages:
  - rust
  pattern: '#[open_rpc($...ARGS)]

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 181
  paths:
    include:
    - '**/sui-json-rpc/src/api/*.rs'
