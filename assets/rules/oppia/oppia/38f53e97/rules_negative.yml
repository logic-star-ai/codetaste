rules:
- id: old-directory-existence-check
  message: Old /editor/ directory still exists. Should be renamed to /exploration_editor/
    with tab subdirectories.
  severity: WARNING
  languages:
  - javascript
  - html
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
  paths:
    include:
    - core/templates/dev/head/editor
- id: old-editor-path-regex-any-file
  message: Path reference contains old /editor/ directory with editor-related files.
    Should use /exploration_editor/ with tab structure.
  severity: WARNING
  languages:
  - javascript
  - python
  - html
  pattern-regex: \beditor/(?:Exploration|State|Gadget|Sidebar|History|Editor|Router|Parameter)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: old-editor-path-in-template-includes
  message: Template include with old '/editor/' path detected. Should use '/exploration_editor/'
    with new tab structure.
  severity: WARNING
  languages:
  - generic
  pattern-regex: '{%\s*include\s+[''"].*editor/(exploration_preview|exploration_statistics|exploration_settings|exploration_history|state_editor|state_interaction)'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '*.html'
    - '*.jinja'
    - '*.jinja2'
- id: old-state-template-path-in-comments
  message: Comment or string references old path for state-related files. Should use
    exploration_editor/main_tab/
  severity: WARNING
  languages:
  - javascript
  - python
  - html
  pattern-regex: editor/state_(?:editor|interaction|responses|fallbacks|parameter_changes|statistics)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: old-tab-template-path-in-comments
  message: Comment or string references old path for tab files. Should use exploration_editor/<tab_name>_tab/
  severity: WARNING
  languages:
  - javascript
  - python
  - html
  pattern-regex: editor/exploration_(?:preview|statistics|settings|history)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-editor-directive-declaration
  message: Directive declaration in old editor structure. Verify it's been moved to
    correct location (e.g., codemirrorMergeview should be in components/).
  severity: WARNING
  languages:
  - javascript
  pattern: 'oppia.directive(''$NAME'', ...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/editor/Exploration*.js'
    - '**/editor/State*.js'
- id: old-editor-constant-declaration
  message: Constant declaration in old editor structure. Verify it's in correct exploration_editor
    location.
  severity: WARNING
  languages:
  - javascript
  pattern: 'oppia.constant(''$NAME'', ...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/editor/Exploration*.js'
- id: history-services-factory-declaration
  message: Factory declaration in HistoryServices.js. Should be in exploration_editor/history_tab/
    after refactoring.
  severity: WARNING
  languages:
  - javascript
  pattern: 'oppia.factory($SERVICE, ...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/editor/HistoryServices.js'
- id: old-exploration-preview-controller-name
  message: Old controller name 'ExplorationPreview' detected. Should be renamed to
    'PreviewTab' as part of tab structure refactoring.
