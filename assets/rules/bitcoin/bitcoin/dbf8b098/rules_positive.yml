rules:
- id: include-primitives-transaction-identifier
  message: Include directive now references primitives/transaction_identifier.h
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#include\s+<primitives/transaction_identifier\.h>'
  metadata:
    category: structural
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: txid-equality-comparison
  message: Equality comparison with Txid
  severity: INFO
  languages:
  - cpp
  pattern-regex: '\w+\s*==\s*Txid::'
  metadata:
    category: basic
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: map-deltas-txid-key
  message: mapDeltas now uses Txid as key type
  severity: INFO
  languages:
  - cpp
  pattern-regex: std::map\s*<\s*Txid\s*,\s*[^>]+>\s+mapDeltas
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: txid-siphash-uint256-conversion
  message: SipHashUint256 called with explicit ToUint256() conversion
  severity: INFO
  languages:
  - cpp
  pattern-regex: SipHashUint256\s*\([^,]+,\s*[^,]+,\s*\w+\.ToUint256\s*\(\s*\)\s*\)
