rules:
- id: missing-includes-transaction-identifier
  message: After refactoring, include should be <primitives/transaction_identifier.h>
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^\s*#include\s+<util/transaction_identifier\.h>
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: std-pair-unsigned-uint256-matched
  message: 'Matched transaction pairs should use Txid: std::pair<unsigned int, Txid>'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::pair<unsigned\s+int,\s*uint256>.*[Mm]atched
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: set-uint256-txids
  message: Transaction ID sets should use std::set<Txid>
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::set\s*<\s*uint256\s*>\s+\w*txid\w*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: unordered-set-uint256-txids
  message: Transaction ID unordered sets should use std::unordered_set<Txid, SaltedTxidHasher>
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::unordered_set\s*<\s*uint256\s*[^>]*>\s+\w*txid\w*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: fee-estimator-uint256-usage
  message: Fee estimator methods should use Txid instead of uint256
  severity: WARNING
  languages:
  - cpp
  pattern-regex: (processTransaction|removeTx|processBlock).*uint256
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: mempool-mapdeltas-uint256-key
  message: Transaction delta maps should use Txid keys instead of uint256
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::map\s*<\s*uint256\s*,\s*\w+\s*>\s+mapDeltas
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: map-uint256-camount-delta
  message: Transaction delta maps should use std::map<Txid, CAmount>
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::map\s*<\s*uint256\s*,\s*CAmount\s*>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: txindex-uint256-lookup
  message: TxIndex should use Txid internally for lookups
  severity: WARNING
  languages:
  - cpp
  pattern-regex: TxIndex.*uint256
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: mempool-mapdeltas-declaration
  message: 'mapDeltas should use Txid as key: std::map<Txid, CAmount>'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::map<uint256,\s*CAmount>\s+mapDeltas
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: partial-merkle-tree-uint256-vector-constructor
  message: CPartialMerkleTree constructor should accept std::vector<Txid> instead
    of std::vector<uint256>
  severity: WARNING
  languages:
  - cpp
  pattern-regex: CPartialMerkleTree\s*\(\s*const\s+std::vector\s*<\s*uint256\s*>\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: rpc-parsehashv-uint256-assignment
  message: RPC transaction hash parsing should directly assign to Txid/Wtxid type
  severity: WARNING
  languages:
  - cpp
  pattern-regex: uint256\s+\w+\s*=\s*ParseHashV
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: merkle-extract-matches-uint256-vector
  message: ExtractMatches should work with std::vector<Txid>
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ExtractMatches\s*\([^)]*std::vector<uint256>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: node-get-transaction-uint256-params
  message: GetTransaction should use Txid parameter and return hashBlock as Txid
  severity: WARNING
  languages:
  - cpp
  pattern-regex: CTransactionRef\s+GetTransaction\s*\([^)]*const\s+uint256\s*&[^)]*uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: cpartialmerkletree-vTxid-vector-uint256
  message: Merkle tree transaction ID vectors should use std::vector<Txid>
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::vector<uint256>\s+vTxid
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: mempoolentry-extractor-struct-uint256
  message: Mempool entry extractor result_type should be Txid/Wtxid
  severity: WARNING
  languages:
  - cpp
  pattern-regex: struct\s+mempoolentry_(txid|wtxid)\s*\{[^}]*typedef\s+uint256\s+result_type
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: vtxid-vector-declaration
  message: Transaction ID vector declarations should use std::vector<Txid>
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::vector<uint256>\s+(vTxid|vtxid|txids|vMatchedTxn)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: txmempool-cs-guarded-uint256-maps
  message: Mempool transaction ID collections should use Txid with GUARDED_BY(cs)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: (std::map|std::set)<uint256[^>]*>\s+\w+\s+GUARDED_BY\s*\(\s*cs\s*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: transaction-identifier-uint256-comparison
  message: Direct uint256 comparison should be removed from transaction_identifier
  severity: WARNING
  languages:
  - cpp
  pattern: 'constexpr int Compare(const uint256& $OTHER) const { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transaction-identifier-file-in-util-directory
  message: transaction_identifier.h should be moved from util/ to primitives/ directory
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/util/transaction_identifier.h
- id: mempool-prioritise-transaction-uint256
  message: PrioritiseTransaction should accept Txid instead of uint256 for type safety
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \s+(void|bool|int)\s+PrioritiseTransaction\s*\(\s*const\s+uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mempool-apply-delta-uint256
  message: ApplyDelta should accept Txid instead of uint256 for type safety
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \s+(void|bool|int)\s+ApplyDelta\s*\(\s*const\s+uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mempool-clear-prioritisation-uint256
  message: ClearPrioritisation should accept Txid instead of uint256 for type safety
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \s+(void|bool|int)\s+ClearPrioritisation\s*\(\s*const\s+uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mempool-get-transaction-ancestry-uint256
  message: GetTransactionAncestry should accept Txid instead of uint256 for type safety
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \s+(void|bool|int)\s+GetTransactionAncestry\s*\(\s*const\s+uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mempool-gather-clusters-uint256-vector
  message: GatherClusters should accept std::vector<Txid> instead of std::vector<uint256>
  severity: WARNING
  languages:
  - cpp
  pattern-regex: GatherClusters\s*\(\s*const\s+std::vector\s*<\s*uint256\s*>\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mempool-unbroadcast-txids-uint256-set
  message: Unbroadcast transaction ID sets should use Txid instead of uint256
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::set\s*<\s*uint256\s*>\s+m_unbroadcast_txids
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transaction-identifier-implicit-conversion-operator
  message: Implicit uint256 conversion operator should be removed from transaction_identifier
  severity: WARNING
  languages:
  - cpp
  pattern-regex: operator\s+const\s+uint256\s*&\s*\(\s*\)\s*const
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: find-tx-function-uint256-param
  message: FindTx should accept Txid parameter instead of uint256
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \s+\w+\s+FindTx\s*\(\s*const\s+uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: getitervec-uint256-vector-param
  message: GetIterVec should accept std::vector<Txid> parameter
  severity: WARNING
  languages:
  - cpp
  pattern-regex: GetIterVec\s*\(\s*const\s+std::vector<uint256>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: add-unbroadcast-tx-uint256
  message: AddUnbroadcastTx should accept Txid parameter instead of uint256
  severity: WARNING
  languages:
  - cpp
  pattern-regex: void\s+AddUnbroadcastTx\s*\(\s*const\s+uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-unbroadcast-tx-uint256
  message: RemoveUnbroadcastTx should accept Txid parameter instead of uint256
  severity: WARNING
  languages:
  - cpp
  pattern-regex: void\s+RemoveUnbroadcastTx\s*\(\s*const\s+uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: is-unbroadcast-tx-uint256
  message: IsUnbroadcastTx should accept Txid parameter instead of uint256
  severity: WARNING
  languages:
  - cpp
  pattern-regex: bool\s+IsUnbroadcastTx\s*\(\s*const\s+uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: get-unbroadcast-txids-returns-uint256-set
  message: GetUnbroadcastTxs should return std::set<Txid>
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::set<uint256>\s+GetUnbroadcastTxs
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: for-loop-uint256-tx-iteration
  message: Iteration over transaction IDs should use Txid type
  severity: WARNING
  languages:
  - cpp
  pattern-regex: for\s*\([^;]*uint256[^;]*:[^)]*tx
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: policy-package-uint256
  message: Package policy should use Txid for transaction identification
  severity: WARNING
  languages:
  - cpp
  pattern-regex: Package.*uint256
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fee-estimator-remove-tx-uint256
  message: removeTx should accept Txid parameter instead of uint256
  severity: WARNING
  languages:
  - cpp
  pattern-regex: bool\s+removeTx\s*\(\s*uint256\s+hash\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fee-estimator-remove-tx-internal-uint256
  message: _removeTx internal helper should use Txid parameter
  severity: WARNING
  languages:
  - cpp
  pattern-regex: bool\s+_removeTx\s*\(\s*const\s+uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: txindex-find-tx-uint256
  message: TxIndex::FindTx should accept Txid parameter
  severity: WARNING
  languages:
  - cpp
  pattern-regex: TxIndex.*FindTx\s*\([^)]*const\s+uint256\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: delta-info-struct-uint256-txid
  message: Delta info structures should use Txid for transaction identification
  severity: WARNING
  languages:
  - cpp
  pattern-regex: struct.*delta.*info.*\{[^}]*uint256.*txid
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: vector-txiter-from-uint256-vector
  message: GetIterVec should accept std::vector<Txid> parameter
  severity: WARNING
  languages:
  - cpp
  pattern-regex: GetIterVec\s*\(\s*const\s+std::vector<uint256>\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: replacement-tracking-uint256
  message: Replacement tracking should use Txid
  severity: WARNING
  languages:
  - cpp
  pattern-regex: (replacement|Replacement).*uint256.*tx
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: compare-uint256-in-transaction-identifier
  message: Direct uint256 comparison in transaction_identifier should be removed
  severity: WARNING
  languages:
  - cpp
  pattern-regex: constexpr\s+int\s+Compare\s*\(\s*const\s+uint256\s*&\s*\w+\s*\)\s*const
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mempool-exists-txid-fromuint256-call
  message: Repeated FromUint256 wrapping indicates exists() should accept Txid directly
  severity: INFO
  languages:
  - cpp
  pattern-regex: exists\s*\(\s*Txid::FromUint256\s*\(\s*\w+\s*\)\s*\)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: txindex-lookup-uint256-param
  message: TxIndex::FindTx should accept Txid parameter named appropriately
  severity: WARNING
  languages:
  - cpp
  pattern-regex: bool\s+FindTx\s*\(\s*const\s+uint256\s*&\s*tx_hash
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
