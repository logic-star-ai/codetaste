rules:
- id: fuzz-target-init-with-identifier
  message: FUZZ_TARGET_INIT macro usage detected. Should be refactored to FUZZ_TARGET
    with .init parameter
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT\s*\(\s*[a-zA-Z_][a-zA-Z0-9_]*\s*,\s*[a-zA-Z_][a-zA-Z0-9_]*\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
    - '**/fuzz.h'
- id: check-fuzz-file-for-old-init-macro
  message: File contains FUZZ_TARGET_INIT macro usage which should be refactored
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bFUZZ_TARGET_INIT\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
    - '**/fuzz.h'
- id: fuzz-target-init-line-beginning
  message: FUZZ_TARGET_INIT at start of line. Refactor to FUZZ_TARGET(name, .init
    = func)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^\s*FUZZ_TARGET_INIT\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
    - '**/fuzz.h'
- id: any-fuzz-target-with-two-args
  message: Two-argument FUZZ_TARGET_INIT detected. Should be refactored to FUZZ_TARGET
    with .init
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT\s*\([^,]+,[^)]+\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
  paths:
    include:
    - '**/test/fuzz/**'
    exclude:
    - '**/fuzz.h'
- id: fuzz-target-init-usage-in-tests
  message: Old FUZZ_TARGET_INIT usage. Refactor to FUZZ_TARGET(name, .init = func)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^FUZZ_TARGET_INIT\s*\(\s*\w+\s*,\s*\w+\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
- id: fuzz-target-init-multiline-pattern
  message: FUZZ_TARGET_INIT with opening brace. Refactor to FUZZ_TARGET with designated
    initializer
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT\s*\(\s*\w+\s*,\s*\w+\s*\)\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
    - '**/fuzz.h'
- id: fuzz-target-init-with-select-params
  message: FUZZ_TARGET_INIT with initialize_* function. Refactor to FUZZ_TARGET(name,
    .init = initialize_*)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT\s*\(\s*\w+\s*,\s*initialize_\w+\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
- id: buffer-parameter-in-fuzz-target-body
  message: FUZZ_TARGET_INIT with buffer parameter usage. Ensure refactored FUZZ_TARGET
    maintains same functionality
  severity: INFO
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT[^{]*\{[\s\S]{0,100}buffer\.
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
- id: fuzz-target-init-after-function-def
  message: FUZZ_TARGET_INIT after function definition. Refactor to FUZZ_TARGET with
    .init
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \}\s*\n\s*FUZZ_TARGET_INIT
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
- id: fuzzed-data-provider-in-old-target
  message: FUZZ_TARGET_INIT with FuzzedDataProvider. Verify refactored version maintains
    same data handling
  severity: INFO
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT[^{]*\{[\s\S]{0,150}FuzzedDataProvider
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
- id: initialize-function-with-old-init-macro
  message: Initialization function followed by FUZZ_TARGET_INIT. Should use FUZZ_TARGET
    with .init parameter
  severity: WARNING
  languages:
  - cpp
  pattern-regex: void\s+initialize_\w+\s*\(\s*\)\s*\{[\s\S]*?\}\s*FUZZ_TARGET_INIT
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
- id: comment-before-fuzz-target-init
  message: Comment followed by FUZZ_TARGET_INIT. Update to FUZZ_TARGET with designated
    initializers
  severity: WARNING
  languages:
  - cpp
  pattern-regex: //.*\n\s*FUZZ_TARGET_INIT
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/test/fuzz/*.cpp'
- id: fuzz-target-init-with-initialize-key
  message: FUZZ_TARGET_INIT with initialize_key. Refactor to FUZZ_TARGET(name, .init
    = initialize_key)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT\s*\(\s*\w+\s*,\s*initialize_key\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: fuzz-targets-return-tuple-map
  message: Old FuzzTargets map using tuple. Should use FuzzTarget struct instead.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::map\s*<\s*std::string_view\s*,\s*std::tuple\s*<\s*TypeTestOneInput\s*,\s*TypeInitialize\s*,\s*TypeHidden\s*>\s*>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/fuzz.cpp'
- id: std-get-2-fuzz-target-access
  message: Old tuple access using std::get<2>. Should use FuzzTarget struct member
    access (.hidden).
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::get\s*<\s*2\s*>\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/fuzz.cpp'
- id: fuzz-cpp-uses-tuple-in-map
  message: fuzz.cpp uses tuple for FuzzTargets map. Should use FuzzTarget struct.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::tuple\s*<\s*TypeTestOneInput\s*,\s*TypeInitialize\s*,\s*TypeHidden\s*>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/test/fuzz/fuzz.cpp'
- id: fuzz-register-function-old-signature
  message: FuzzFrameworkRegisterTarget has old signature with separate TypeTestOneInput,
    TypeInitialize, TypeHidden parameters
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FuzzFrameworkRegisterTarget\s*\([^)]*TypeTestOneInput[^)]*TypeInitialize[^)]*TypeHidden[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/fuzz.h'
    - '**/fuzz.cpp'
- id: type-initialize-used-as-parameter
  message: TypeInitialize used as function parameter. In new design, should be part
    of FuzzTargetOptions.
  severity: INFO
  languages:
  - cpp
  pattern-regex: TypeInitialize\s+\w+\s*[,)]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/fuzz.h'
    - '**/fuzz.cpp'
- id: old-macro-in-policy-estimator
  message: policy_estimator uses old FUZZ_TARGET_INIT macro. Refactor needed.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT\s*\(\s*policy_estimator
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-macro-in-process-message
  message: process_message uses old FUZZ_TARGET_INIT macro. Refactor needed.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT\s*\(\s*process_message
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-macro-in-tx-pool
  message: tx_pool uses old FUZZ_TARGET_INIT macro. Refactor needed.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT\s*\(\s*tx_pool
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: get-2-second-for-hidden-check
  message: Checks std::get<2>(*.second) for hidden flag. Should use struct member
    access .hidden
  severity: WARNING
  languages:
  - cpp
  pattern-regex: if\s*\(\s*std::get<2>\s*\(\s*\w+\.second\s*\)\s*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/fuzz.cpp'
- id: type-hidden-as-param-type
  message: TypeHidden used as parameter type. Should be part of FuzzTargetOptions
    struct.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ',\s*TypeHidden\s+\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/fuzz.h'
    - '**/fuzz.cpp'
- id: continue-on-get-2-hidden
  message: Skips hidden targets using std::get<2>. Should use .hidden member access.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: if\s*\(\s*std::get<2>\s*\([^)]+\)\s*\)\s*continue
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/fuzz.cpp'
- id: range-for-fuzz-targets
  message: Range-for over FuzzTargets(). Verify std::get access is replaced with struct
    members
  severity: WARNING
  languages:
  - cpp
  pattern-regex: for\s*\(\s*const\s+auto\s*&\s*t\s*:\s*FuzzTargets\s*\(\s*\)\s*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/fuzz.cpp'
- id: test-one-input-reference-from-assert
  message: test_one_input from Assert(g_test_one_input). Part of old test harness
    pattern
  severity: INFO
  languages:
  - cpp
  pattern-regex: static\s+const\s+auto\s*&\s*test_one_input\s*=\s*\*\s*Assert\s*\(\s*g_test_one_input\s*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/fuzz.cpp'
- id: fuzz-targets-try-emplace-tuple
  message: Old try_emplace call with separate tuple elements detected. Should construct
    FuzzTarget struct
  severity: WARNING
  languages:
  - cpp
  pattern: '$MAP.try_emplace($NAME, std::move($TARGET), std::move($INIT), $HIDDEN)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: type-hidden-bool-typedef
  message: Old TypeHidden bool typedef detected. Should be part of FuzzTargetOptions
    struct
  severity: WARNING
  languages:
  - cpp
  pattern: 'using TypeHidden = bool;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-fuzz-target-init-macro-def-in-header
  message: Old FUZZ_TARGET_INIT macro definition found. This should be replaced with
    a single variadic FUZZ_TARGET macro.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^\s*#\s*define\s+FUZZ_TARGET_INIT\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.h'
- id: old-fuzz-target-init-hidden-macro-def-in-header
  message: Old FUZZ_TARGET_INIT_HIDDEN macro definition found. This should be replaced
    with a single variadic FUZZ_TARGET macro.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^\s*#\s*define\s+FUZZ_TARGET_INIT_HIDDEN\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.h'
- id: fuzz-framework-register-with-four-params-decl
  message: Old FuzzFrameworkRegisterTarget function declaration with four separate
    parameters. Should accept FuzzTargetOptions struct.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: void\s+FuzzFrameworkRegisterTarget\s*\(\s*std::string_view\s+\w+\s*,\s*TypeTestOneInput\s+\w+\s*,\s*TypeInitialize\s+\w+\s*,\s*TypeHidden\s+\w+\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.h'
- id: type-hidden-typedef-in-header
  message: Old TypeHidden typedef found. Should be part of FuzzTargetOptions struct.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: using\s+TypeHidden\s*=\s*bool\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.h'
- id: fuzz-framework-register-impl-four-params
  message: Old FuzzFrameworkRegisterTarget implementation with four separate parameters.
    Should accept FuzzTargetOptions struct.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: void\s+FuzzFrameworkRegisterTarget\s*\(\s*std::string_view\s+name\s*,\s*TypeTestOneInput\s+target\s*,\s*TypeInitialize\s+init\s*,\s*TypeHidden\s+hidden\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.cpp'
- id: try-emplace-with-three-move-args
  message: Old try_emplace call with three separate arguments (tuple elements). Should
    construct FuzzTarget struct.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \.try_emplace\s*\(\s*\w+\s*,\s*std::move\s*\(\s*\w+\s*\)\s*,\s*std::move\s*\(\s*\w+\s*\)\s*,\s*\w+\s*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.cpp'
- id: std-get-0-fuzz-target-access
  message: Old tuple access using std::get<0>. Should use FuzzTarget struct member
    access (.test_one_input).
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::get\s*<\s*0\s*>\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.cpp'
- id: std-get-1-fuzz-target-access
  message: Old tuple access using std::get<1>. Should use FuzzTarget struct member
    access (.init).
  severity: WARNING
  languages:
  - cpp
  pattern-regex: std::get\s*<\s*1\s*>\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.cpp'
- id: fuzz-target-macro-chain-to-init
  message: Old FUZZ_TARGET macro forwarding to FUZZ_TARGET_INIT. Should be replaced
    with single variadic macro.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^\s*#\s*define\s+FUZZ_TARGET\s*\(\s*name\s*\)\s*\\\s*\n\s*FUZZ_TARGET_INIT\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.h'
- id: fuzz-target-init-chain-to-hidden
  message: Old FUZZ_TARGET_INIT macro forwarding to FUZZ_TARGET_INIT_HIDDEN. Should
    be replaced with single variadic macro.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^\s*#\s*define\s+FUZZ_TARGET_INIT\s*\(\s*name\s*,\s*init_fun\s*\)\s*\\\s*\n\s*FUZZ_TARGET_INIT_HIDDEN\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.h'
- id: fuzz-empty-init-fun-inline
  message: FuzzFrameworkEmptyInitFun function. With new design, empty init is handled
    via default struct initialization.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: inline\s+void\s+FuzzFrameworkEmptyInitFun\s*\(\s*\)\s*\{\s*\}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.h'
- id: fuzz-target-init-hidden-macro-body
  message: Old macro body calling FuzzFrameworkRegisterTarget with four arguments.
    Should use FuzzTargetOptions.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FuzzFrameworkRegisterTarget\s*\(\s*#\s*name\s*,\s*name\s*##\s*_fuzz_target\s*,\s*init_fun\s*,\s*hidden\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/fuzz.h'
- id: fuzz-target-init-hidden-usage-in-tests
  message: Old FUZZ_TARGET_INIT_HIDDEN usage. Refactor to FUZZ_TARGET(name, .init
    = func, .hidden = bool)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^FUZZ_TARGET_INIT_HIDDEN\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
- id: fuzz-target-init-hidden-with-true
  message: Old FUZZ_TARGET_INIT_HIDDEN with true. Refactor to FUZZ_TARGET(name, .init
    = func, .hidden = true)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^FUZZ_TARGET_INIT_HIDDEN\s*\(\s*\w+\s*,\s*\w+\s*,\s*/\*\s*hidden\s*=\s*\*/\s*true\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/test/fuzz/*.cpp'
- id: fuzz-target-init-hidden-pattern
  message: FUZZ_TARGET_INIT_HIDDEN macro usage detected. Should be refactored to FUZZ_TARGET
    with .init and .hidden parameters
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT_HIDDEN\s*\(\s*[a-zA-Z_][a-zA-Z0-9_]*\s*,\s*[a-zA-Z_][a-zA-Z0-9_]*\s*,
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
    - '**/fuzz.h'
- id: check-fuzz-file-for-old-init-hidden-macro
  message: File contains FUZZ_TARGET_INIT_HIDDEN macro usage which should be refactored
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bFUZZ_TARGET_INIT_HIDDEN\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
    - '**/fuzz.h'
- id: fuzz-target-init-hidden-line-beginning
  message: FUZZ_TARGET_INIT_HIDDEN at start of line. Refactor to FUZZ_TARGET(name,
    .init = func, .hidden = value)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ^\s*FUZZ_TARGET_INIT_HIDDEN\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/test/fuzz/*.cpp'
    exclude:
    - '**/fuzz.cpp'
    - '**/fuzz.h'
- id: script-format-old-macro
  message: script_format fuzz target using old macro. Should use FUZZ_TARGET(script_format,
    .init = initialize_script_format)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT\s*\(\s*script_format
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: key-old-macro
  message: key fuzz target using old macro. Should use FUZZ_TARGET with .init parameter
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT\s*\(\s*key\s*,
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: script-assets-test-minimizer-old-hidden-macro
  message: script_assets_test_minimizer using old FUZZ_TARGET_INIT_HIDDEN. Should
    use FUZZ_TARGET(script_assets_test_minimizer, .init = test_init, .hidden = true)
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT_HIDDEN\s*\(\s*script_assets_test_minimizer
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: any-fuzz-target-with-three-args
  message: Three-argument FUZZ_TARGET_INIT_HIDDEN detected. Should be refactored to
    FUZZ_TARGET with .init and .hidden
  severity: WARNING
  languages:
  - cpp
  pattern-regex: FUZZ_TARGET_INIT_HIDDEN\s*\([^,]+,[^,]+,[^)]+\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/test/fuzz/**'
    exclude:
