rules:
- id: detect-common-in-new-file-paths
  message: 'Refactoring detected: include directive for new common header file'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+[<"]common/(messages|signmessage|types)\.h[>"]'
  metadata:
    category: api
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
- id: detect-include-node-types-flexible
  message: 'Refactoring detected: code includes node/types.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: '#include <node/types.h>'
  - pattern: '#include "node/types.h"'
  metadata:
    category: api
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: detect-node-types-includes
  message: 'Refactoring detected: include directive for node/types.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+[<"]node/types\.h[>"]'
  metadata:
    category: api
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: detect-include-common-messages-flexible
  message: 'Refactoring detected: code includes common/messages.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: '#include <common/messages.h>'
  - pattern: '#include "common/messages.h"'
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: detect-psbt-error-usage
  message: 'Refactoring detected: PSBTError enum value used (new enum in common/types.h)'
  severity: INFO
  languages:
  - c
  - cpp
  pattern: PSBTError::$VALUE
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: detect-include-common-signmessage-flexible
  message: 'Refactoring detected: code includes common/signmessage.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: '#include <common/signmessage.h>'
  - pattern: '#include "common/signmessage.h"'
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: detect-util-namespace-split-usage
  message: 'Refactoring detected: Split function called with util:: namespace'
  severity: INFO
  languages:
  - c
  - cpp
  pattern: util::Split(...)
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-hex-base-in-crypto-directory
  message: 'Refactoring detected: hex functions in crypto/hex_base.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: HexStr|HexDigit
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - src/crypto/hex_base.h
- id: detect-include-crypto-hex-base-flexible
  message: 'Refactoring detected: code includes crypto/hex_base.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: '#include <crypto/hex_base.h>'
  - pattern: '#include "crypto/hex_base.h"'
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-include-script-parsing-flexible
  message: 'Refactoring detected: code includes script/parsing.h'
  severity: INFO
