    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-using-util-split
  message: 'Refactoring detected: using declaration for util::Split'
  severity: INFO
  languages:
  - c
  - cpp
  pattern: using util::Split;
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-transaction-error-enum-values
  message: 'Refactoring detected: TransactionError enum values in node/types.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: MISSING_INPUTS|ALREADY_IN_CHAIN|P2P_DISABLED|MEMPOOL_REJECTED|INVALID_PSBT
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - src/node/types.h
- id: detect-hexstr-implementation-in-hex-base
  message: 'Refactoring detected: HexStr implementation in crypto/hex_base.h'
  severity: INFO
