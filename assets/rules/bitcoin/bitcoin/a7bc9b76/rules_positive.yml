    - src/Makefile.am
    - CMakeLists.txt
- id: detect-psbt-error-comment
  message: 'Refactoring detected: comment about PSBTError in common/types.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: PSBTError.*common
  metadata:
    category: config
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-hexstr-span-overload
  message: 'Refactoring detected: HexStr Span overload in crypto/hex_base.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: inline\s+std::string\s+HexStr\s*\(\s*const\s+Span<const\s+(char|std::byte)>
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - src/crypto/hex_base.h
- id: detect-template-split-function
  message: 'Refactoring detected: template Split function with default parameter in
    util/string.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: template\s*<typename\s+T\s*=\s*Span<const\s+char>>
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - src/util/string.h
