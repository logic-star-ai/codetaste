    nr_legacy_patterns: 0
- id: detect-crypto-hex-base-includes
  message: 'Refactoring detected: include directive for crypto/hex_base.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+[<"]crypto/hex_base\.h[>"]'
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-script-parsing-includes
  message: 'Refactoring detected: include directive for script/parsing.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+[<"]script/parsing\.h[>"]'
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-span-of-const-char-in-script-parsing
  message: 'Refactoring detected: Span<const char> used in script/parsing.h'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: Span<const\s+char>
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
