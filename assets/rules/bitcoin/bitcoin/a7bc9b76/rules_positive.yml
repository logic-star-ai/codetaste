    - src/crypto/hex_base.h
- id: detect-common-messages-in-build-files
  message: 'Refactoring detected: common/messages files referenced in build system'
  severity: INFO
  languages:
  - generic
  pattern-regex: common/messages\.(h|cpp)
  metadata:
    category: config
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - src/Makefile.am
    - CMakeLists.txt
- id: detect-common-signmessage-in-build-files
  message: 'Refactoring detected: common/signmessage files referenced in build system'
