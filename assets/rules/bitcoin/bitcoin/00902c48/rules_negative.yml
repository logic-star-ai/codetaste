rules:
- id: directory-exists-rpc-tests
  message: File exists in old rpc-tests directory - should be moved to functional
    directory
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 91
  paths:
    include:
    - test/rpc-tests/*
- id: any-py-file-in-rpc-tests
  message: Python file in old rpc-tests directory - should be moved to functional
    directory
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 74
  paths:
    include:
    - test/rpc-tests/*.py
- id: python-tests-dir-variable-usage
  message: tests_dir variable set to old rpc-tests path - should be updated to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: 'tests_dir = $SRC_DIR + ''/test/rpc-tests/''

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: test-framework-subdirectory-check
  message: File in test_framework under old rpc-tests - should be moved to functional/test_framework
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - test/rpc-tests/test_framework/*
- id: any-file-test-rpc-tests-path
  message: Reference to test/rpc-tests path - should be updated to test/functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: test/rpc-tests
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: directory-name-rpc-tests-generic
  message: Directory path uses old rpc-tests name - should be updated to functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: /rpc-tests/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: generic-slash-rpc-tests-slash
  message: Path component /rpc-tests/ found - should be updated to /functional/
  severity: WARNING
  languages:
  - generic
  pattern-regex: /rpc-tests/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '*.py'
    - '*.sh'
    - '*.md'
    - Makefile.am
- id: makefile-target-name-rpc
  message: Makefile target or variable name contains rpc_test - should be updated
    to functional_test
  severity: WARNING
  languages:
  - generic
  pattern-regex: rpc_test
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - Makefile.am
- id: generic-test-rpc-tests-slash
  message: File contains 'test/rpc-tests/' path - should be updated to 'test/functional/'
  severity: WARNING
  languages:
  - python
  pattern-regex: test/rpc-tests/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*.py'
- id: any-rpc-tests-path-python-files
  message: Python file contains test/rpc-tests path - should be updated to test/functional
  severity: WARNING
  languages:
  - python
  pattern-regex: test/rpc-tests
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*.py'
- id: generic-path-component-rpc-tests
  message: Path component rpc-tests/ found - should be updated to functional/
  severity: WARNING
  languages:
  - generic
  pattern-regex: rpc-tests/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*.py'
    - Makefile.am
- id: generic-test-slash-rpc-tests-anywhere
  message: File contains test/rpc-tests path - should be updated to test/functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: test/rpc-tests
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - Makefile.am
    - .travis.yml
    - doc/developer-notes.md
- id: any-slash-test-slash-rpc-tests-slash
  message: Path /test/rpc-tests/ found - should be updated to /test/functional/
  severity: WARNING
  languages:
  - generic
  pattern-regex: /test/rpc-tests/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*.py'
    - Makefile.am
    - '*.md'
- id: rpc-tests-srcdir-concat-python
  message: SRCDIR concatenation uses old 'rpc-tests' path - should be updated to 'functional'
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: $SRCDIR + '/test/rpc-tests/'
  - pattern: $SRCDIR + "/test/rpc-tests/"
  - pattern: $SRCDIR + '/test/rpc-tests'
  - pattern: $SRCDIR + "/test/rpc-tests"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: markdown-rpc-tests-link
  message: Markdown link contains old 'rpc-tests' path - should be updated to 'functional'
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[.*\]\(.*rpc-tests.*\)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.md'
- id: developer-notes-rpc-tests-reference
  message: Developer notes reference old rpc-tests path - should be updated to functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: test/rpc-tests/
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - doc/developer-notes.md
    - '*/developer-notes.md'
- id: test-framework-rpc-tests-path
  message: Reference to old test_framework location in rpc-tests - should be updated
    to functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: test/rpc-tests/test_framework
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: inline-code-with-rpc-tests-dir
  message: Inline code contains old test/rpc-tests path - should be updated to test/functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: '`[^`]*test/rpc-tests[^`]*`'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.md'
- id: folder-link-rpc-tests-markdown
  message: Markdown link points to test/rpc-tests folder - should be updated to test/functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[.*\]\(.*test/rpc-tests.*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.md'
- id: test-framework-bignum-path
  message: Path references test_framework under old rpc-tests - should be updated
    to functional
  severity: WARNING
  languages:
  - python
  pattern-regex: test/rpc-tests/test_framework
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.py'
- id: any-rpc-tests-reference-developer-notes
  message: Developer notes contain rpc-tests reference - should be updated to functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: rpc-tests
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - doc/developer-notes.md
- id: python-src-dir-plus-rpc-tests
  message: Source directory concatenated with old rpc-tests path - should be updated
    to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $SRC_DIR + '/test/rpc-tests/'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: markdown-link-to-rpc-tests-directory
  message: Markdown link points to /test/rpc-tests - should be updated to /test/functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: \]\(/test/rpc-tests
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.md'
- id: python-from-test-path
  message: String literal for test path contains old rpc-tests - should be updated
    to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: '''/test/rpc-tests/'''
    - pattern: '"/test/rpc-tests/"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: markdown-path-in-parentheses
  message: Markdown path in parentheses references old rpc-tests - should be updated
    to functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: \(/test/rpc-tests
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.md'
- id: developer-notes-test-path
  message: Developer notes reference test/rpc-tests/ path - should be updated to test/functional/
  severity: WARNING
  languages:
  - generic
  pattern-regex: test/rpc-tests/
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - doc/developer-notes.md
- id: python-plus-slash-test-slash-rpc-tests-slash
  message: Variable concatenated with /test/rpc-tests/ path - should be updated to
    /test/functional/
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $VAR + '/test/rpc-tests/'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: doc-developer-notes-test-rpc-tests
  message: Developer notes contain test/rpc-tests - should be updated to test/functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: test/rpc-tests
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - doc/developer-notes.md
- id: rpc-tests-concatenation-python
  message: Path concatenation uses old 'rpc-tests' directory - should be updated to
    'functional'
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: $X + '/test/rpc-tests/' + $Y
  - pattern: $X + "/test/rpc-tests/" + $Y
  - pattern: $X + '/rpc-tests/' + $Y
  - pattern: $X + "/rpc-tests/" + $Y
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: extra-dist-rpc-tests
  message: EXTRA_DIST contains old rpc-tests path - should be updated to functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: EXTRA_DIST.*test/rpc-tests
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - Makefile.am
    - '*.am'
- id: python-srcdir-rpc-tests-concat
  message: SRCDIR dictionary access concatenated with old rpc-tests path - should
    be updated to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $VAR["environment"]["SRCDIR"] + '/test/rpc-tests/' + $X
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python-tests-dir-rpc-tests
  message: tests_dir variable assigned with old rpc-tests path - should be updated
    to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: tests_dir = $X + '/test/rpc-tests/'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python-comment-see-also-rpc-tests
  message: Comment 'See also' references old rpc-tests path - should be updated to
    functional
  severity: INFO
  languages:
  - python
  pattern-regex: See also:.*test/rpc-tests
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.py'
- id: lcov-rpc-tests-target
  message: LCOV target name uses old 'rpc-tests' - should be updated to 'functional'
  severity: WARNING
  languages:
  - generic
  pattern-regex: \$\(LCOV\).*--t\s+rpc-tests
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - Makefile.am
    - '*.mk'
- id: generic-qa-pull-tester-rpc-tests
  message: Path references old qa/pull-tester/rpc-tests.py - should be updated to
    functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: qa/pull-tester/rpc-tests\.py
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python-split-rpc-tests-path
  message: Path split uses old rpc-tests directory - should be updated to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: ($X + '/test/rpc-tests/' + $Y).split()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python-subprocess-check-call-rpc-tests
  message: subprocess.check_call uses old rpc-tests path - should be updated to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: subprocess.check_call(($CFG["environment"]["SRCDIR"] + '/test/rpc-tests/'
      + ...).split() + ...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: test-readme-rpc-tests-folder
  message: Test README links to old rpc-tests folder - should be updated to functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[rpc-tests\]\(/test/rpc-tests/\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - test/README.md
- id: tests-dir-assignment-srcdir
  message: tests_dir variable assigned using old rpc-tests path - should be updated
    to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: tests_dir = $SRC + '/test/rpc-tests/'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: string-concat-srcdir-rpc-tests
  message: String concatenation creates old rpc-tests path - should be updated to
    functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $X + '/test/rpc-tests/' + $Y
    - pattern: $X + "/test/rpc-tests/" + $Y
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: markdown-prose-rpc-tests-folder
  message: Markdown prose references old rpc-tests folder - should be updated to functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: (from|in|the|to)\s+the\s+\[rpc-tests\]
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.md'
- id: python-comment-shared-from-rpc-tests
  message: Comment indicates code shared from old rpc-tests location - should be updated
    to functional
  severity: INFO
  languages:
  - python
  pattern-regex: '#.*shared from.*test/rpc-tests'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.py'
- id: python-class-docstring-rpc-tests
  message: Class docstring references old rpc-tests - should be updated to functional
  severity: INFO
  languages:
  - python
  pattern-regex: class\s+\w+.*:\s*"""[\s\S]*rpc-tests[\s\S]*?"""
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.py'
- id: makefile-lcov-title-rpc-tests
  message: LCOV title option uses old rpc-tests - should be updated to functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: \-\-t\s+rpc-tests
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - Makefile.am
    - '*.mk'
- id: extra-dist-list-rpc-tests
  message: EXTRA_DIST list includes old rpc-tests directory - should be updated to
    functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: test/rpc-tests\s
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - Makefile.am
    - '*.mk'
- id: windows-rpc-tests-comment
  message: Comment about RPC tests on Windows - terminology should be updated to functional
    tests
  severity: INFO
  languages:
  - python
  pattern-regex: RPC tests.*Windows
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.py'
- id: markdown-multiple-tests-from-rpc-tests
  message: Documentation describes running tests from rpc-tests folder - should be
    updated to functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: multiple tests from.*rpc-tests
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.md'
- id: qa-tests-dir-assignment
  message: Test directory variable assigned with old rpc-tests path - should be updated
    to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: qa_tests_dir = $X + '/test/rpc-tests/'
    - pattern: tests_dir = $X + '/test/rpc-tests/'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python-get-tests-dir
  message: Function returns or sets old rpc-tests directory path - should be updated
    to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "def get_tests_dir():\n  ...\n  return $X + '/test/rpc-tests/'\n"
    - pattern: "def $FUNC(...):\n  ...\n  tests_dir = $X + '/test/rpc-tests/'\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python-sys-exit-help-rpc-tests
  message: Help display subprocess uses old rpc-tests path before exit - should be
    updated to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: 'subprocess.check_call(($CFG[...][...] + ''/test/rpc-tests/'' + ...).split()
      + [...])

      sys.exit(...)

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: copyright-script-rpc-tests-list
  message: Copyright exclusion list contains old rpc-tests path - should be updated
    to functional
  severity: WARNING
  languages:
  - python
  pattern-regex: test/rpc-tests/test_framework/bignum
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/copyright_header.py'
    - copyright_header.py
- id: any-rpc-tests-reference-makefile
  message: Makefile contains test/rpc-tests path - should be updated to test/functional
  severity: WARNING
  languages:
  - generic
  pattern-regex: test/rpc-tests
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - Makefile.am
- id: python-config-dict-srcdir-rpc-tests
  message: Config SRCDIR concatenated with old rpc-tests path - should be updated
    to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $CONFIG["environment"]["SRCDIR"] + '/test/rpc-tests/' + $X
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: helper-script-comment
  message: Helper script comment in rpc-tests directory - file should be in functional
    directory
  severity: INFO
  languages:
  - python
  pattern-regex: helper script
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - test/rpc-tests/*.py
- id: python-string-concat-test-rpc-tests
  message: String concatenation creates test/rpc-tests path - should be updated to
    test/functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $X + '/test/rpc-tests/' + $Y
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python-subprocess-path-rpc-tests
  message: Subprocess command uses old rpc-tests path - should be updated to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: subprocess.$METHOD(($X + '/test/rpc-tests/' + $Y).split() + $Z)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: srcdir-environment-variable-rpc-tests
  message: SRCDIR environment variable concatenated with old rpc-tests path - should
    be updated to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $CFG["environment"]["SRCDIR"] + '/test/rpc-tests/' + $X
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tests-directory-variable-assignment
  message: Variable assigned test/rpc-tests directory path - should be updated to
    test/functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $VAR = $X + '/test/rpc-tests/'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: comment-about-multiple-tests
  message: Comment in rpc-tests directory about multiple tests - file should be in
    functional directory
  severity: INFO
  languages:
  - python
  pattern-regex: multiple.*tests
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - test/rpc-tests/create_cache.py
- id: qa-test-comment
  message: QA test comment in rpc-tests directory - file should be in functional directory
  severity: INFO
  languages:
  - python
  pattern-regex: qa.*test
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - test/rpc-tests/create_cache.py
- id: python-line-with-rpc-tests-dir
  message: Assignment with /test/rpc-tests/ path - should be updated to /test/functional/
  severity: WARNING
  languages:
  - python
  pattern-regex: = .*/test/rpc-tests/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.py'
- id: python-tests-dir-equals-path
  message: tests_dir variable set to old rpc-tests path - should be updated to functional
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: tests_dir = $SRC_DIR + '/test/rpc-tests/'
  metadata:
    category: structural
    nr_refactored_patterns: 0
