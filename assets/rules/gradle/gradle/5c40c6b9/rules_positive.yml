rules:
- id: patternset-factory-constructor-param-positive
  message: Detected constructor with dedicated factory parameter
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "$CTOR(..., $FACTORY $PARAM, ...) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FACTORY
      regex: (?i).*(pattern.*set.*factory|patternset.*factory).*
  - pattern-not: $CTOR(..., Factory $X, ...) { ... }
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: patternset-factory-import-statement
  message: Detected import of dedicated PatternSetFactory
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import $PKG.$FACTORY;
  - metavariable-regex:
      metavariable: $FACTORY
      regex: (?i).*(pattern.*set.*factory|patternset.*factory).*
  - pattern-not: import org.gradle.internal.Factory;
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: createpatternset-method-call
  message: Detected call to new dedicated method createPatternSet() instead of generic
    create()
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $FACTORY.$METHOD(...)
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i).*(create.*pattern.*set|make.*pattern.*set|build.*pattern.*set|new.*pattern.*set).*
  - pattern-not: $X.create()
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: patternset-factory-field-type-positive
  message: Detected field with dedicated factory type (not generic Factory)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: private $FACTORY $FIELD;
    - pattern: protected $FACTORY $FIELD;
    - pattern: private final $FACTORY $FIELD;
    - pattern: protected final $FACTORY $FIELD;
    - pattern: public $FACTORY $FIELD;
    - pattern: public final $FACTORY $FIELD;
  - metavariable-regex:
      metavariable: $FACTORY
      regex: (?i).*(pattern.*set.*factory|patternset.*factory).*
  - pattern-not: private Factory $X;
  - pattern-not: protected Factory $X;
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: patternset-factory-provider-method
  message: Detected provider or supplier method returning factory
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "$FACTORY $METHOD() {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FACTORY
      regex: (?i).*(pattern.*set.*factory|patternset.*factory).*
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i).*(provide|supply|create|get|obtain).*factory.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: patternset-factory-local-variable
  message: Detected local variable with dedicated factory type
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$FACTORY $VAR = ...;

      '
  - metavariable-regex:
      metavariable: $FACTORY
      regex: (?i).*(pattern.*set.*factory|patternset.*factory).*
  - pattern-not: 'Factory<PatternSet> $X = ...;

      '
  - pattern-not: 'Factory<$T> $X = ...;

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: patternset-factory-method-return-type
  message: Detected method returning dedicated factory type
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "$FACTORY $METHOD(...) {\n  ...\n  return ...;\n}\n"
  - metavariable-regex:
      metavariable: $FACTORY
      regex: (?i).*(pattern.*set.*factory|patternset.*factory).*
  - pattern-not-inside: 'Factory<PatternSet> ...

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: createpatternset-method-implementation
  message: Detected implementation of createPatternSet() method
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "@Override\npublic $TYPE $METHOD() {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i).*(create.*pattern.*set|make.*pattern.*set|build.*pattern.*set|new.*pattern.*set).*
  - pattern-not: 'public PatternSet create() { ... }

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: createpatternset-method-in-interface
  message: Detected createPatternSet() method definition in interface
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-inside: "interface $IFACE {\n  ...\n}\n"
  - pattern: $TYPE $METHOD();
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i).*(create.*pattern.*set|make.*pattern.*set|build.*pattern.*set).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: patternset-factory-class-implements
  message: Detected class implementing dedicated factory interface
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CLASS implements $IFACE {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $IFACE
      regex: (?i).*(pattern.*set.*factory|patternset.*factory).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: patternset-factory-file-exists
  message: Detected PatternSetFactory interface file
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/PatternSetFactory.java'
  options:
    symbolic_propagation: true
- id: patternset-factory-default-file-exists
  message: Detected DefaultPatternSetFactory implementation file
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/DefaultPatternSetFactory.java'
  options:
    symbolic_propagation: true
