    not :build-cache
  severity: WARNING
  languages:
  - java
  pattern-regex: class\s+DirectoryBuildCacheServiceFactory
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - platforms/core-execution/build-cache/src/**/*.java
