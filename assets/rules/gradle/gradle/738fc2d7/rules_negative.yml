rules:
- id: action-import-local-cache-package
  message: Local cache implementation should use java.util.function.Consumer instead
    of Action
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'package org.gradle.caching.local.internal;

      ...

      import org.gradle.api.Action;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: build-cache-controller-is-emit-debug-logging
  message: BuildCacheController.isEmitDebugLogging() should be removed and passed
    as parameter instead
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: $CTRL.isEmitDebugLogging()
  - pattern: "interface $IFACE {\n  ...\n  boolean isEmitDebugLogging();\n  ...\n\
      }\n"
  - pattern: "class $CLASS {\n  ...\n  boolean isEmitDebugLogging() { ... }\n  ...\n\
      }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: default-build-cache-key-import-from-cache-module
  message: DefaultBuildCacheKey should be imported from :execution subproject
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: import org.gradle.caching.internal.DefaultBuildCacheKey;
  - pattern-not-inside: 'package org.gradle.caching.internal;

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: is-emit-debug-logging-method-call-pattern
  message: BuildCacheController.isEmitDebugLogging() should be removed and passed
    as parameter
