- id: build-cache-key-implements-describable-methods
  message: BuildCacheKey should not extend Describable interface
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "interface BuildCacheKey extends Describable {\n  String getHashCode();\n\
      \  byte[] toByteArray();\n}\n"
  - pattern-inside: 'package org.gradle.caching;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: build-cache-controller-emit-debug-field
  message: isEmitDebugLogging field should be removed and passed as parameter instead
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "class $CLASS {\n  ...\n  boolean emitDebugLogging;\n  ...\n}\n"
    - pattern: "class $CLASS {\n  ...\n  private boolean emitDebugLogging;\n  ...\n\
        }\n"
  - pattern-inside: 'package org.gradle.caching.internal.controller;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
