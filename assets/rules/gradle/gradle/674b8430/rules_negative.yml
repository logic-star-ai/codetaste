rules:
- id: project-identity-direct-constructor-call
  message: Direct ProjectIdentity constructor call detected. Use ProjectIdentity.forRootProject(Path,
    String) for root projects or ProjectIdentity.forSubproject(Path, Path) for subprojects
    instead.
  severity: WARNING
  languages:
  - java
  pattern: new ProjectIdentity($BUILD_ID, $TREE_PATH, $PROJECT_PATH, $NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: project-identity-old-constructor-pattern
  message: ProjectIdentity constructor called with potential BuildIdentifier. Use
    factory methods forRootProject(Path, String) or forSubproject(Path, Path).
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new ProjectIdentity($A, $B, $C, $D)
  - metavariable-pattern:
      metavariable: $A
      pattern: $BUILD_ID
  - pattern-not: new ProjectIdentity(Path.path(...), ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: project-identity-three-path-parameters
  message: ProjectIdentity constructor with 4 parameters detected. Use factory methods
    ProjectIdentity.forRootProject(Path, String) or ProjectIdentity.forSubproject(Path,
    Path) instead.
  severity: WARNING
  languages:
  - java
  pattern: new ProjectIdentity($A, $TREE, $PROJ, $NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: project-identity-with-complex-buildpath-expr
  message: ProjectIdentity construction with complex expression. Ensure it uses factory
    methods with Path after refactoring.
  severity: WARNING
  languages:
  - java
  pattern: 'new ProjectIdentity($BUILD_ID, $EXPR, $PROJ, $NAME)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: project-identity-buildtreepath-parameter-name
  message: ProjectIdentity constructor with parameter suggesting buildTreePath. Use
    factory methods that compute identityPath automatically.
  severity: WARNING
  languages:
  - java
  pattern: 'new ProjectIdentity($BUILD_ID, $BUILD_TREE_PATH, $PROJECT_PATH, $NAME)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: project-identity-without-factory-in-production-code
  message: ProjectIdentity direct construction in production code. Use forRootProject()
    or forSubproject() factory methods.
  severity: WARNING
  languages:
  - java
  pattern: new ProjectIdentity($A, $B, $C, $D)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    exclude:
    - '**/test/**'
    - '**/src/test/**'
    - '**/src/integTest/**'
    - '**/*Test.java'
    - '**/*Spec.java'
    - '**/*Spec.groovy'
- id: serializer-read-buildidentifier-for-project
  message: Serializer reads BuildIdentifier for ProjectIdentity construction. Should
    use ProjectIdentitySerializer with Path instead.
  severity: WARNING
  languages:
  - java
  pattern: 'BuildIdentifier $VAR = $SERIALIZER.read($DECODER);

    ...

    new ProjectIdentity($VAR, ...);

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: decoder-read-string-to-path
  message: Reading string and converting to Path in deserializer. May be part of old
    serialization that should use PathSerializer.
  severity: WARNING
  languages:
  - java
  pattern: 'Path $VAR = Path.path($DECODER.readString());

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/*Serializer.java'
- id: project-identity-deserialize-pattern-buildidentifier-first
  message: Deserializing BuildIdentifier then constructing ProjectIdentity. Should
    use ProjectIdentitySerializer with Path.
  severity: WARNING
  languages:
  - java
  pattern: 'BuildIdentifier $BUILD = $SER.read($DEC);

    ...

    ProjectIdentity $PROJ = new ProjectIdentity($BUILD, ...);

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: decoder-readstring-to-project-path
  message: Deserializing project path then constructing ProjectIdentity. Should use
    ProjectIdentitySerializer.
  severity: WARNING
  languages:
  - java
  pattern: 'Path $PROJ_PATH = Path.path($DECODER.readString());

    ...

    new ProjectIdentity(..., $PROJ_PATH, ...);

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: buildidentifier-used-in-project-context
  message: BuildIdentifier variable used in context with ProjectIdentity. BuildIdentifier
    should be replaced with Path.
  severity: WARNING
  languages:
  - java
  pattern: 'BuildIdentifier $BUILD = ...;

    ...

    ProjectIdentity $PROJ = ...;

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: project-identity-from-buildidentifier-and-paths
  message: Creating ProjectIdentity with BuildIdentifier variable. Use factory methods
    with Path instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new ProjectIdentity($BUILD, $TREE, $PROJ, $NAME)
  - pattern-inside: 'BuildIdentifier $BUILD = ...;

      ...

      '
  - pattern-not-inside: 'Path $BUILD = ...;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: project-identity-inconsistent-invariant
  message: ProjectIdentity constructed with name that may not match project path name.
    Factory methods enforce this invariant.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'new ProjectIdentity($BUILD_ID, $TREE, $PROJ, $NAME)

      '
  - metavariable-pattern:
      metavariable: $NAME
      patterns:
      - pattern-not: $PROJ.getName()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: read-decoder-to-buildidentifier-variable
  message: Deserializing into BuildIdentifier variable. Should deserialize to Path
    using PathSerializer.
  severity: WARNING
  languages:
  - java
  pattern: 'BuildIdentifier $VAR = buildIdentifierSerializer.read($DECODER);

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: buildidentifier-serializer-read-in-deserializer
  message: Reading BuildIdentifier using buildIdentifierSerializer. Should use PathSerializer
    after refactoring.
  severity: WARNING
  languages:
  - java
  pattern: buildIdentifierSerializer.read($DECODER)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/*Serializer.java'
- id: project-component-getprojectname-serialization
  message: Accessing project name from component for serialization. May be part of
    old ROOT_PROJECT special case.
  severity: WARNING
  languages:
  - java
  pattern: '$PROJ.getProjectName()

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/ComponentIdentifierSerializer.java'
    - '**/ComponentSelectorSerializer.java'
- id: project-identity-construction-non-root-same-paths
  message: ProjectIdentity constructed with same tree path and project path. Use forSubproject
    factory for root build projects.
  severity: WARNING
  languages:
  - java
  pattern: new ProjectIdentity($BUILD_ID, $PATH, $PATH, $NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: project-identity-project-path-name-mismatch
  message: ProjectIdentity may have inconsistent name and identityPath. Factory methods
    enforce name == identityPath.getName().
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'new ProjectIdentity($BUILD, $TREE, $PROJ, $NAME)

      '
  - metavariable-pattern:
      metavariable: $TREE
      patterns:
      - pattern-not: Path.ROOT
  - metavariable-pattern:
      metavariable: $NAME
      patterns:
      - pattern-not: $TREE.getName()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: buildidentifier-serializer-write-in-serializer
  message: Writing BuildIdentifier using buildIdentifierSerializer. Should use PathSerializer
    after refactoring.
  severity: WARNING
  languages:
  - java
  pattern: buildIdentifierSerializer.write($ENCODER, $VALUE)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/*Serializer.java'
- id: serializer-write-buildidentifier-for-project
  message: Serializer writes BuildIdentifier from ProjectIdentity. Should use ProjectIdentitySerializer
    instead.
  severity: WARNING
  languages:
  - java
  pattern: '$SERIALIZER.write($ENCODER, $PROJ.getBuildIdentifier());

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: get-project-identity-then-get-build-identifier
  message: Getting BuildIdentifier from ProjectIdentity. Use getBuildPath() instead
    which returns Path.
  severity: WARNING
  languages:
  - java
  pattern: $OBJ.getProjectIdentity().getBuildIdentifier()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: write-buildidentifier-of-method-call
  message: Call to writeBuildIdentifierOf method indicates old serialization pattern.
    Should use Path-based serialization instead.
  severity: WARNING
  languages:
  - java
  pattern: writeBuildIdentifierOf($IDENTIFIER, $ENCODER)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: serialize-getbuildidentifier-from-project
  message: Serializing BuildIdentifier from ProjectComponentIdentifier. Should serialize
    Path directly using PathSerializer.
  severity: WARNING
  languages:
  - java
  pattern: 'buildIdentifierSerializer.write($ENCODER, $PROJ.getBuildIdentifier());

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: project-identity-getbuildidentifier-call-chain
  message: Chaining getProjectIdentity().getBuildIdentifier(). Use getProjectIdentity().getBuildPath()
    instead which returns Path.
  severity: WARNING
  languages:
  - java
  pattern: $VAR.getProjectIdentity().getBuildIdentifier()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: default-project-component-identifier-cast-for-identity-path
  message: Casting to DefaultProjectComponentIdentifier to access identity path, part
    of old serialization logic.
  severity: WARNING
  languages:
  - java
  pattern: 'DefaultProjectComponentIdentifier $VAR = (DefaultProjectComponentIdentifier)
    $VALUE;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/*Serializer.java'
- id: getprojectpath-from-projectidentity
  message: Getting project path through ProjectIdentity from component identifier.
    Complex navigation that may indicate old patterns.
  severity: WARNING
  languages:
  - java
  pattern: $IDENTITY.getProjectIdentity().getProjectPath()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/*Serializer.java'
- id: project-identity-same-buildpath-projectpath
  message: ProjectIdentity constructed with same value for buildTreePath and projectPath.
    Use appropriate factory method.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new ProjectIdentity($BUILD, $PATH, $PATH, $NAME)
  - metavariable-pattern:
      metavariable: $PATH
      patterns:
      - pattern-not: Path.ROOT
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: serializer-resolve-implementation-special-case-root-project
  message: resolveImplementation method contains special-case logic for ROOT_PROJECT.
    Should be simplified after introducing ProjectIdentitySerializer.
  severity: WARNING
  languages:
  - java
  pattern: "if ($COND && $ROOT_CHECK) {\n  return Implementation.ROOT_PROJECT;\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/ComponentIdentifierSerializer.java'
    - '**/ComponentSelectorSerializer.java'
- id: serializer-resolve-implementation-special-case-root-build-project
  message: resolveImplementation method contains special-case logic for ROOT_BUILD_PROJECT.
    Should be simplified after introducing ProjectIdentitySerializer.
  severity: WARNING
  languages:
  - java
  pattern: "if ($COND) {\n  return Implementation.ROOT_BUILD_PROJECT;\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/ComponentIdentifierSerializer.java'
    - '**/ComponentSelectorSerializer.java'
- id: serializer-resolve-implementation-returns-other-build-project
  message: resolveImplementation returns OTHER_BUILD_PROJECT case. This is part of
    the old 4-case project serialization that should be unified.
  severity: WARNING
  languages:
  - java
  pattern: return Implementation.OTHER_BUILD_PROJECT;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/ComponentIdentifierSerializer.java'
    - '**/ComponentSelectorSerializer.java'
- id: project-name-equals-identity-path-name
  message: Checking if project name equals identity path name is part of old special-case
    logic. Enforced by construction after refactoring.
  severity: WARNING
  languages:
  - java
  pattern: '$PROJ_NAME.equals($IDENTITY_PATH.getName())

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*Serializer.java'
- id: buildidentifier-serializer-instantiation
  message: BuildIdentifierSerializer instantiation. After refactoring, should use
    PathSerializer for serializing build paths.
  severity: WARNING
  languages:
  - java
  pattern: new BuildIdentifierSerializer()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: project-identity-manual-buildpath-extraction
  message: Manually extracting build path from BuildIdentifier. BuildIdentifier should
    be replaced with Path directly.
  severity: WARNING
  languages:
  - java
  pattern: '$BUILD_PATH = Path.path($BUILD_ID.getBuildPath());

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: project-identity-construction-with-path-root
  message: ProjectIdentity constructed with Path.ROOT for both paths. Use forRootProject(Path,
    String) factory method.
  severity: WARNING
  languages:
  - java
  pattern: new ProjectIdentity($BUILD_ID, Path.ROOT, Path.ROOT, $NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: serializer-comment-special-case-combinations
  message: Comment about special-casing common combinations of names and paths. This
    logic should be removed after factory methods enforce invariants.
  severity: WARNING
  languages:
  - java
  pattern-regex: Special case.*common combinations.*names.*paths
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*Serializer.java'
- id: return-implementation-root-project
  message: Returning Implementation.ROOT_PROJECT enum value. Part of old 4-case project
    serialization logic.
  severity: WARNING
  languages:
  - java
  pattern: return Implementation.ROOT_PROJECT;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*Serializer.java'
- id: return-implementation-root-build-project
  message: Returning Implementation.ROOT_BUILD_PROJECT enum value. Part of old 4-case
    project serialization logic.
  severity: WARNING
  languages:
  - java
  pattern: return Implementation.ROOT_BUILD_PROJECT;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*Serializer.java'
- id: return-implementation-other-build-root-project
  message: Returning Implementation.OTHER_BUILD_ROOT_PROJECT enum value. Part of old
    4-case project serialization logic.
  severity: WARNING
  languages:
  - java
  pattern: return Implementation.OTHER_BUILD_ROOT_PROJECT;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*Serializer.java'
- id: project-identity-constructor-path-root-both-params
  message: ProjectIdentity constructed with Path.ROOT for both tree and project paths.
    Use forRootProject(Path, String) factory method.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new ProjectIdentity($A, Path.ROOT, Path.ROOT, $NAME)
  - metavariable-pattern:
      metavariable: $A
      patterns:
      - pattern-not: Path.ROOT
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: project-component-projectpath-equals-root-check
  message: Checking if project path equals root in resolveImplementation. Part of
    old special-case logic.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $PROJ_PATH.equals(Path.ROOT)
  - pattern-inside: "private Implementation resolveImplementation(...) {\n  ...\n\
      }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: project-identity-field-buildidentifier
  message: ProjectIdentity class has BuildIdentifier field. Should be replaced with
    Path buildPath.
  severity: WARNING
  languages:
  - java
  pattern: "class ProjectIdentity {\n  ...\n  BuildIdentifier $FIELD;\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: project-identity-getter-buildidentifier-return
  message: ProjectIdentity.getBuildIdentifier() method returns BuildIdentifier. Should
    be deprecated in favor of getBuildPath() returning Path.
  severity: WARNING
  languages:
  - java
  pattern: "class ProjectIdentity {\n  ...\n  public BuildIdentifier getBuildIdentifier()\
    \ {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: buildidentifier-serializer-field-in-component-serializer
  message: ComponentIdentifierSerializer has BuildIdentifierSerializer field. After
    refactoring, should use PathSerializer and ProjectIdentitySerializer.
  severity: WARNING
  languages:
  - java
  pattern: "class ComponentIdentifierSerializer {\n  ...\n  BuildIdentifierSerializer\
    \ $FIELD = ...;\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: serializer-resolve-implementation-special-case-other-build-root
  message: resolveImplementation method contains special-case logic for OTHER_BUILD_ROOT_PROJECT.
    Should be simplified after introducing ProjectIdentitySerializer.
  severity: WARNING
  languages:
  - java
  pattern: "if ($COND && $PROJ_CHECK) {\n  return Implementation.OTHER_BUILD_ROOT_PROJECT;\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ComponentIdentifierSerializer.java'
    - '**/ComponentSelectorSerializer.java'
- id: build-path-comment-todo-buildidentifier
  message: TODO comment mentions BuildIdentifier and path conversion, indicating old
    pattern that needs refactoring.
  severity: WARNING
  languages:
  - java
  pattern-regex: TODO:.*BuildIdentifier.*path
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: write-buildidentifier-method-definition
  message: Method writeBuildIdentifierOf suggests old serialization pattern. Should
    be replaced with Path-based serialization.
  severity: WARNING
  languages:
  - java
  pattern: "private void writeBuildIdentifierOf($COMP, $ENCODER) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: buildidentifier-serializer-field
  message: BuildIdentifierSerializer field declaration. After refactoring, use PathSerializer
    instead.
  severity: WARNING
  languages:
  - java
  pattern: 'BuildIdentifierSerializer $FIELD

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: project-identity-getidentitypath-then-getname
  message: Getting name from identity path. Pattern may be part of old invariant checking
    that should be enforced by construction.
  severity: WARNING
  languages:
  - java
  pattern: $IDENTITY.getIdentityPath().getName()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*Serializer.java'
- id: resolve-implementation-method-with-project-special-cases
  message: resolveImplementation method contains ROOT_PROJECT special case. Should
    be simplified after introducing ProjectIdentitySerializer.
  severity: WARNING
  languages:
  - java
  pattern: "private Implementation resolveImplementation(ComponentIdentifier $VALUE)\
    \ {\n  ...\n  if ($COND) {\n    return Implementation.ROOT_PROJECT;\n  }\n  ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: project-identity-buildpath-field-assignment
  message: Assigning buildPath by converting from BuildIdentifier. BuildIdentifier
    should be replaced with Path parameter.
  severity: WARNING
  languages:
  - java
  pattern: 'this.buildPath = Path.path($BUILD_ID.getBuildPath());

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: buildidentifier-parameter-in-project-identity-constructor
  message: ProjectIdentity constructor accepts BuildIdentifier. Should accept Path
    buildPath instead.
  severity: WARNING
  languages:
  - java
  pattern: "public ProjectIdentity(BuildIdentifier $BUILD_ID, ...) {\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ProjectIdentity.java'
- id: project-identity-buildidentifier-field-declaration
  message: ProjectIdentity has BuildIdentifier field. Should be removed, use Path
    buildPath instead.
  severity: WARNING
  languages:
  - java
  pattern: 'private final BuildIdentifier buildIdentifier;

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ProjectIdentity.java'
- id: project-identity-getbuildidentifier-method
  message: ProjectIdentity has getBuildIdentifier() method. Should use getBuildPath()
    returning Path instead.
  severity: WARNING
  languages:
  - java
  pattern: "public BuildIdentifier getBuildIdentifier() {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ProjectIdentity.java'
- id: component-identifier-serializer-has-buildidentifier-serializer
  message: ComponentIdentifierSerializer has BuildIdentifierSerializer field. Should
    be replaced with PathSerializer after refactoring.
  severity: WARNING
  languages:
  - java
  pattern: 'private final BuildIdentifierSerializer $FIELD = new BuildIdentifierSerializer();

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: project-identity-todo-comment-buildidentifier
  message: TODO comment mentions BuildIdentifier, likely related to the refactoring
    that removes BuildIdentifier dependency.
  severity: WARNING
  languages:
  - java
  pattern-regex: TODO:.*BuildIdentifier.*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ProjectIdentity.java'
- id: project-path-getname-equals-project-name
  message: Checking if path name equals project name. This invariant should be enforced
    by factory methods.
  severity: WARNING
  languages:
  - java
  pattern: '$PATH.getName().equals($PROJ.getProjectName())

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*Serializer.java'
- id: get-included-build-method-buildidentifier-param
  message: getIncludedBuild method accepts BuildIdentifier. Should accept Path instead
    after refactoring.
  severity: WARNING
  languages:
  - java
  pattern: "IncludedBuildState getIncludedBuild(BuildIdentifier $PARAM) {\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: buildidentifier-comment-prefer-buildpath
  message: Comment suggesting to prefer getBuildPath(). Indicates BuildIdentifier
    usage that should be replaced with Path.
  severity: WARNING
  languages:
  - java
  pattern-regex: Prefer.*getBuildPath
