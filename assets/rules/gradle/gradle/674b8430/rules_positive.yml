- id: detect-project-identity-serializer-class-definition
  message: Detected ProjectIdentitySerializer class definition
  severity: INFO
  languages:
  - java
  pattern: "class ProjectIdentitySerializer extends $BASE {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-compute-identity-path-static-method
  message: Detected computeProjectIdentityPath static method definition
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "static $TYPE computeProjectIdentityPath(...) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (Path|.*path.*)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-factory-method-return-root-project
  message: Detected forRootProject factory method definition
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "public static $TYPE forRootProject(Path $P1, String $P2) {\n  ...\n\
        }\n"
    - pattern: "static $TYPE forRootProject(Path $P1, String $P2) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-factory-method-return-subproject
  message: Detected forSubproject factory method definition
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "public static $TYPE forSubproject(Path $P1, Path $P2) {\n  ...\n}\n"
    - pattern: "static $TYPE forSubproject(Path $P1, Path $P2) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-path-root-equals-check
  message: Detected Path.ROOT equality check in PathSerializer
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $PATH.equals(Path.ROOT)
    - pattern: Path.ROOT.equals($PATH)
    - pattern: $PATH == Path.ROOT
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/PathSerializer.java'
- id: detect-path-serializer-write-call
