  - pattern-inside: "public Path read(Decoder $DECODER) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: project-identity-no-todo-comment-about-buildidentifier
  message: ProjectIdentity no longer has TODO about deriving path from BuildIdentifier
    - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: .*TODO.*BuildIdentifier.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/ProjectIdentity.java'
- id: encoder-writes-path-string
  message: Encoder writes path string representation - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $ENC.writeString($PATH.getPath())
