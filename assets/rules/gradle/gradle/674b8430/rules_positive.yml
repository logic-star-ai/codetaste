rules:
- id: project-identity-forRootProject-factory-method-call
  message: Detected factory method ProjectIdentity.forRootProject() - refactoring
    applied
  severity: INFO
  languages:
  - java
  pattern: $TYPE.forRootProject($BUILD_PATH, $PROJECT_NAME)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: project-identity-forSubproject-factory-method-call
  message: Detected factory method ProjectIdentity.forSubproject() - refactoring applied
  severity: INFO
  languages:
  - java
  pattern: $TYPE.forSubproject($BUILD_PATH, $PROJECT_PATH)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: project-identity-computeProjectIdentityPath-static-helper
  message: Detected static helper computeProjectIdentityPath() - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $TYPE.computeProjectIdentityPath($BUILD_PATH, $PROJECT_PATH)
  - metavariable-pattern:
      metavariable: $TYPE
      pattern: ProjectIdentity
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: else-use-forSubproject
  message: Else clause uses forSubproject - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "if (...) {\n  ...\n} else {\n  ...\n  ProjectIdentity.forSubproject(...);\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: component-selector-serializer-simplified-project-read
  message: ComponentSelectorSerializer uses simplified project read logic - refactoring
    applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $PROJ_ID_SER.read($DECODER)
  - metavariable-regex:
      metavariable: $PROJ_ID_SER
      regex: (?i).*project.*identity.*
  - pattern-inside: "public $RETURN read($DEC) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: path-root-equals-check-in-serialization
  message: Path.ROOT equality check in serialization logic - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: Path.ROOT.equals($VAR)
    - pattern: $VAR.equals(Path.ROOT)
  - pattern-inside: "public void write(Encoder $ENC, $TYPE $VAL) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: serializer-field-projectidentityserializer
  message: Serializer has ProjectIdentitySerializer field - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: private ProjectIdentitySerializer $FIELD;
    - pattern: private ProjectIdentitySerializer $FIELD = ...;
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: componentserializer-writes-projectidentity
  message: ComponentSerializer writes projectIdentity using serializer - refactoring
    applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $SER.write($ENC, $COMP.getProjectIdentity())
  - pattern-inside: "public void write(Encoder $ENC, $TYPE $VAL) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: project-identity-serializer-class-exists
  message: New ProjectIdentitySerializer class detected - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class ProjectIdentitySerializer extends $PARENT {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PARENT
      regex: .*Serializer.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: factory-method-forRootProject-defined-in-projectidentity
