rules:
- id: detect-any-method-in-identityserializer
  message: Detected any method in ProjectIdentitySerializer file
  severity: INFO
  languages:
  - java
  pattern-regex: (public|private|protected|void|ProjectIdentity|return|if|else|\{|\})
  metadata:
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/ProjectIdentitySerializer.java'
- id: detect-any-method-in-pathserializer
  message: Detected any method in PathSerializer file
  severity: INFO
  languages:
  - java
  pattern-regex: (public|private|protected|void|Path|return|if|else|\{|\})
  metadata:
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/PathSerializer.java'
- id: detect-identityserializer-variable-name
  message: Detected projectIdentitySerializer or identitySerializer variable name
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $VAR
  - metavariable-regex:
      metavariable: $VAR
      regex: (?i).*(project.*identity.*serial|identity.*serial).*
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/ComponentIdentifierSerializer.java'
    - '**/ComponentSelectorSerializer.java'
- id: detect-path-variable-from-factory
  message: Detected Path variable initialized from factory
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - pattern: $CLASS.forRootProject($BP, $PN)
  - pattern: $CLASS.forSubproject($BP, $PP)
  pattern-sinks:
  - pattern: $VAR
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-project-identity-serializer-usage
  message: Detected usage of ProjectIdentitySerializer in serialization code
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $SERIALIZER.write($ENCODER, $IDENTITY)
    - pattern: $SERIALIZER.read($DECODER)
  - metavariable-regex:
      metavariable: $SERIALIZER
      regex: (?i).*(project.*identity.*serializer).*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-javadoc-any-serializer
  message: Detected any javadoc in serializers
  severity: INFO
  languages:
  - java
  pattern-regex: /\*[\s\S]*?\*/
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/PathSerializer.java'
    - '**/ProjectIdentitySerializer.java'
- id: detect-for-root-project-factory-method
  message: Detected usage of ProjectIdentity.forRootProject() factory method
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $IDENTITY.forRootProject($BUILD_PATH, $PROJECT_NAME)
  - metavariable-regex:
      metavariable: $IDENTITY
      regex: (?i).*(ProjectIdentity|project.*identity|identity).*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-for-subproject-factory-method
  message: Detected usage of ProjectIdentity.forSubproject() factory method
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $IDENTITY.forSubproject($BUILD_PATH, $PROJECT_PATH)
  - metavariable-regex:
      metavariable: $IDENTITY
      regex: (?i).*(ProjectIdentity|project.*identity|identity).*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-compute-identity-path-method-call
  message: Detected call to computeProjectIdentityPath method
  severity: INFO
  languages:
  - java
  pattern: $OBJ.computeProjectIdentityPath($ARG1, $ARG2)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-project-case-in-simplified-serializer
  message: Detected PROJECT case (singular) in serializer
  severity: INFO
  languages:
  - java
  pattern-regex: 'case\s+PROJECT\s*:'
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/ComponentIdentifierSerializer.java'
    - '**/ComponentSelectorSerializer.java'
- id: detect-encoder-import-in-serializer
  message: Detected Encoder import in serializer
  severity: INFO
  languages:
  - java
  pattern: import $PKG.Encoder;
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/PathSerializer.java'
    - '**/ProjectIdentitySerializer.java'
- id: detect-decoder-import-in-serializer
  message: Detected Decoder import in serializer
  severity: INFO
  languages:
  - java
  pattern: import $PKG.Decoder;
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/PathSerializer.java'
    - '**/ProjectIdentitySerializer.java'
- id: detect-final-identityserializer-field
  message: Detected final ProjectIdentitySerializer field
  severity: INFO
  languages:
  - java
  pattern-regex: final\s+ProjectIdentitySerializer
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/ComponentIdentifierSerializer.java'
    - '**/ComponentSelectorSerializer.java'
- id: detect-entire-file-content
  message: Detected entire file content
  severity: INFO
  languages:
  - java
  pattern-regex: '[\s\S]+'
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/PathSerializer.java'
    - '**/ProjectIdentitySerializer.java'
- id: detect-case-project-implementation
  message: Detected case PROJECT implementation in serializers
  severity: INFO
  languages:
  - java
  pattern-regex: case\s+PROJECT\s*:\s*[\s\S]{30,200}
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/ComponentIdentifierSerializer.java'
    - '**/ComponentSelectorSerializer.java'
- id: detect-path-serializer-file
  message: Detected PathSerializer.java file
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/PathSerializer.java'
- id: detect-project-identity-serializer-file
  message: Detected ProjectIdentitySerializer.java file
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
