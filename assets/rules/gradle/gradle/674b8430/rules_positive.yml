- id: path-serializer-encoder-write-boolean
  message: PathSerializer writes boolean for Path.ROOT special case - refactoring
    applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $ENCODER.writeBoolean($BOOL)
  - pattern-inside: "public void write(Encoder $ENCODER, Path $VALUE) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: path-serializer-decoder-read-boolean
