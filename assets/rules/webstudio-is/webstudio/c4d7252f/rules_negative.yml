rules:
- id: simplify-import-in-project-build-schema
  message: Schema files should be moved to @webstudio-is/sdk package
  severity: WARNING
  languages:
  - typescript
  pattern: import type { Simplify } from "type-fest"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 171
  paths:
    include:
    - packages/project-build/src/schema/*.ts
- id: z-literal-in-project-build-schema
  message: Schema literals should be in @webstudio-is/sdk package
  severity: WARNING
  languages:
  - typescript
  pattern: z.literal($VALUE)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - packages/project-build/src/schema/*.ts
- id: schema-type-inference-in-project-build
  message: Schema type definitions should be in @webstudio-is/sdk package
  severity: WARNING
  languages:
  - typescript
  pattern: export type $TYPE = z.infer<typeof $SCHEMA>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - packages/project-build/src/schema/*.ts
- id: schema-refine-method-in-project-build
  message: Schema refinements should be in @webstudio-is/sdk package
  severity: WARNING
  languages:
  - typescript
  pattern: '$SCHEMA.refine($FN, $MSG)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - packages/project-build/src/schema/*.ts
- id: schema-directory-exists-in-old-location
  message: Schema directory should be moved to @webstudio-is/sdk package
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - packages/project-build/src/schema/
- id: zod-import-in-project-build-schema-files
  message: Schema files with zod imports should be moved to @webstudio-is/sdk package
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: import { z } from "zod"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - packages/project-build/src/schema/*.ts
- id: import-getstyledeclkey-from-project-build
  message: getStyleDeclKey should be imported from @webstudio-is/sdk instead of @webstudio-is/project-build
    (if it's a schema utility)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., getStyleDeclKey, ... } from "@webstudio-is/project-build"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
