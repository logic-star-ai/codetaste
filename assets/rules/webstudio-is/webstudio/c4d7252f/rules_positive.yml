rules:
- id: sdk-schema-styles-imports-type-fest
  message: SDK styles schema imports Simplify from type-fest
  severity: INFO
  languages:
  - typescript
  pattern: 'import type { Simplify } from "type-fest"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/sdk/src/schema/styles.ts
- id: project-build-imports-from-sdk
  message: project-build now imports schema types from SDK
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'import { ..., $SCHEMA, ... } from "@webstudio-is/sdk"

      '
  - metavariable-pattern:
      metavariable: $SCHEMA
      patterns:
      - pattern-either:
        - pattern: Breakpoint
        - pattern: Breakpoints
        - pattern: Instance
        - pattern: Instances
        - pattern: Page
        - pattern: Pages
        - pattern: Prop
        - pattern: Props
        - pattern: DataSource
        - pattern: DataSources
        - pattern: StyleDecl
        - pattern: Styles
        - pattern: StyleSource
        - pattern: StyleSources
        - pattern: StyleSourceSelection
        - pattern: StyleSourceSelections
  metadata:
    category: dependency
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/project-build/src/**/*.ts
