rules:
- id: health-check-iterates-generic-pool
  message: Health check iterates over generic Pool beans instead of vendor-specific
    types
  severity: INFO
  languages:
  - java
  pattern: "for (InstanceHandle<Pool> $HANDLE : $CONTAINER.select(Pool.class, ...).handles())\
    \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: pool-creator-input-method-signature
  message: PoolCreator interface returns Pool from create method
  severity: INFO
  languages:
  - java
  pattern: "interface $CREATOR {\n  Pool create(Input $INPUT);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: health-check-selects-pool-class
  message: Health check selects Pool.class instead of vendor-specific type
  severity: INFO
  languages:
  - java
  pattern: '$CONTAINER.select(Pool.class, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/health/**'
- id: pool-creator-method-signature-generic
  message: PoolCreator.create() returns generic Pool type
  severity: INFO
  languages:
  - java
  pattern: 'Pool create(Input $INPUT);

    '
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*PoolCreator.java'
- id: health-check-select-pool-class-any-literal
  message: Health check selects Pool.class with Any qualifier
  severity: INFO
  languages:
  - java
  pattern-regex: select\(Pool\.class,\s*Any\.Literal\.INSTANCE\)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/health/**'
- id: health-check-uses-pool-instance-handle
  message: Health check uses InstanceHandle<Pool> type
  severity: INFO
  languages:
  - java
  pattern-regex: InstanceHandle<Pool>
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/health/**'
- id: health-check-pool-iteration-pattern
  message: Health check iterates over Pool instances
  severity: INFO
  languages:
  - java
  pattern-regex: 'for\s*\(\s*InstanceHandle<Pool>\s+\w+\s*:'
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/health/**'
- id: pool-support-runtime-value-wrapper
  message: PoolSupport wrapped in RuntimeValue in recorder
  severity: INFO
  languages:
  - java
  pattern: 'return new RuntimeValue<>($SUPPORT);

    '
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*PoolRecorder.java'
- id: pool-support-bean-singleton-scope
  message: PoolSupport bean configured as Singleton scope
  severity: INFO
  languages:
  - java
  pattern-regex: \.scope\(Singleton\.class\)
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Reactive*ClientProcessor.java'
- id: recorder-set-of-datasource-names
  message: Recorder uses Set<String> for datasource names
  severity: INFO
  languages:
  - java
  pattern-regex: Set<String>\s+\w+Names
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*PoolRecorder.java'
- id: pool-support-constructor-call-with-names
  message: PoolSupport constructed with datasource names set
  severity: INFO
  languages:
  - java
  pattern-regex: new\s+\w+PoolSupport\s*\(\s*\w+Names\s*\)
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*PoolRecorder.java'
- id: health-check-container-select-pool
  message: Health check uses container.select(Pool.class)
  severity: INFO
  languages:
  - java
  pattern-regex: container\.select\s*\(\s*Pool\.class
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/health/**'
- id: processor-synthetic-bean-pool-support
  message: Processor produces PoolSupport synthetic bean
  severity: INFO
  languages:
  - java
  pattern-regex: syntheticBeans\.produce\s*\([^)]*PoolSupport
  metadata:
    category: dependency
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Reactive*ClientProcessor.java'
- id: arc-container-instance-pool-support
  message: PoolSupport retrieved from Arc container in health check
  severity: INFO
  languages:
  - java
  pattern-regex: container\.instance\s*\(\s*\w+PoolSupport\.class\s*\)
  metadata:
    category: dependency
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/health/**'
- id: pool-support-import-statement
  message: Health check imports PoolSupport class
  severity: INFO
  languages:
  - java
  pattern-regex: import\s+io\.quarkus\.reactive\.\w+\.client\.runtime\.\w+PoolSupport
  metadata:
    category: dependency
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/health/**'
- id: pool-support-package-declaration
  message: PoolSupport in reactive client runtime package
  severity: INFO
  languages:
  - java
  pattern-regex: package\s+io\.quarkus\.reactive\.\w+\.client\.runtime
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*PoolSupport.java'
- id: recorder-casts-pool-to-vendor-type-db2
  message: Recorder casts Pool to DB2Pool when needed
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '($TYPE) $POOL

      '
  - metavariable-pattern:
      metavariable: $TYPE
      pattern: DB2Pool
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/DB2PoolRecorder.java'
