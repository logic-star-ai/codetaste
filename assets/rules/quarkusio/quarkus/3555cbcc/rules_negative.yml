- id: reactive-sql-client-mutiny-pgpool-import
  message: Import of vendor-specific Mutiny PgPool detected. Migrate to generic io.vertx.mutiny.sqlclient.Pool
    type for Vert.x 5 compatibility.
  severity: WARNING
  languages:
  - java
  pattern: import io.vertx.mutiny.pgclient.PgPool;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: reactive-sql-client-mutiny-mysqlpool-import
  message: Import of vendor-specific Mutiny MySQLPool detected. Migrate to generic
    io.vertx.mutiny.sqlclient.Pool type for Vert.x 5 compatibility.
  severity: WARNING
  languages:
  - java
  pattern: import io.vertx.mutiny.mysqlclient.MySQLPool;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: reactive-sql-client-mutiny-mssqlpool-import
  message: Import of vendor-specific Mutiny MSSQLPool detected. Migrate to generic
