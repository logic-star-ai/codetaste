    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: reactive-sql-client-pgpool-create-call
  message: Static factory method PgPool.pool() creates vendor-specific pool. Consider
    using Pool factory or generic approach.
  severity: WARNING
  languages:
  - java
  pattern: PgPool.pool(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
