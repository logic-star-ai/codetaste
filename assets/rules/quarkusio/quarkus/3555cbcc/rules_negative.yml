rules:
- id: reactive-sql-client-pgpool-field-type
  message: Class field uses vendor-specific PgPool type. Use generic Pool type instead.
  severity: WARNING
  languages:
  - java
  pattern: "class $CLASS {\n  ...\n  PgPool $FIELD;\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: reactive-sql-client-mysqlpool-field-type
  message: Class field uses vendor-specific MySQLPool type. Use generic Pool type
    instead.
  severity: WARNING
  languages:
  - java
  pattern: "class $CLASS {\n  ...\n  MySQLPool $FIELD;\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: reactive-sql-client-mssqlpool-field-type
