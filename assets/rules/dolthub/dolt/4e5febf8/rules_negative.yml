rules:
- id: sysbench-runner-directory-path
  message: File in old sysbench_runner directory detected. Directory should be renamed
    to benchmark_runner after refactoring.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    include:
    - '**/go/performance/utils/sysbench_runner/**'
- id: sysbench-runner-package-declaration
  message: Old package name 'sysbench_runner' detected. Should be renamed to 'benchmark_runner'.
  severity: WARNING
  languages:
  - go
  pattern: 'package sysbench_runner

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: reference-to-old-import-in-comments
  message: Comment or string referencing old package path (sysbench_runner or tpcc_runner).
    Should be updated to benchmark_runner.
  severity: WARNING
  languages:
  - go
  pattern-regex: github\.com/dolthub/dolt/go/performance/utils/(sysbench_runner|tpcc_runner)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: old-sysbench-runner-import
  message: Old import path detected. Should use 'benchmark_runner' instead of 'sysbench_runner'
    after refactoring.
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/dolthub/dolt/go/performance/utils/sysbench_runner"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: tpcc-runner-directory-path
  message: File in old tpcc_runner directory detected. This directory should be removed
    entirely and functionality merged into benchmark_runner.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/go/performance/utils/tpcc_runner/**'
- id: tpcc-runner-package-declaration
  message: Old package name 'tpcc_runner' detected. This package should be removed
    and merged into benchmark_runner.
  severity: WARNING
  languages:
  - go
  pattern: 'package tpcc_runner

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-results-format-constants
  message: Results format constants in sysbench_runner. After refactoring, result
    handling should be consolidated in benchmark_runner.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'const CsvFormat = "csv"

        '
    - pattern: 'const JsonFormat = "json"

        '
    - pattern: 'const CsvExt = ".csv"

        '
    - pattern: 'const JsonExt = ".json"

        '
  - pattern-inside: 'package sysbench_runner

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-mysql-constant-from-sysbench-runner
  message: Reference to sysbench_runner.MySql constant. After refactoring, should
    use benchmark_runner.MySql.
  severity: WARNING
  languages:
  - go
  pattern: 'sysbench_runner.MySql

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-sysbench-runner-cmd-main-with-config-flag
  message: Command-line flag parsing for config file detected. After refactoring,
    executables should be removed in favor of programmatic configuration.
  severity: WARNING
  languages:
  - go
  pattern: 'var configFile = flag.String("config", ...)

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: main-with-flag-parse-config-file
  message: Old command-line main with flag parsing for config file. After refactoring,
    executables should be removed in favor of programmatic configuration through Go
    tests.
  severity: WARNING
  languages:
  - go
  pattern: "func main() {\n  ...\n  flag.Parse()\n  ...\n  if *configFile == \"\"\
    \ {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: main-reads-config-from-file
  message: Main function reading config from file. After refactoring, should use programmatic
    configuration through interfaces instead of file-based JSON config.
  severity: WARNING
  languages:
  - go
  pattern: "func main() {\n  ...\n  $CONFIG, $ERR := $FUNC.FromFileConfig(...)\n \
    \ ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-config-new-constructor
  message: Old config constructor function. After refactoring, should use interface-based
    configuration with programmatic setup.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func NewConfig() *Config {\n  ...\n}\n"
    - pattern: "func NewTpccConfig() *TpccBenchmarkConfig {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: filepath-join-with-results-dir
  message: Old result file path construction pattern. After refactoring, result handling
    should be unified across benchmark types.
  severity: WARNING
  languages:
  - go
  pattern: 'filepath.Join($CWD, "results", string($SERVER.Server), ...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: filepath-abs-configfile
  message: Getting absolute path of config file. Indicates file-based configuration
    which should be removed after refactoring.
  severity: WARNING
  languages:
  - go
  pattern: '$PATH, $ERR := filepath.Abs(*configFile)

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-dolt-constant-from-sysbench-runner
  message: Reference to sysbench_runner.Dolt constant. After refactoring, should use
    benchmark_runner.Dolt.
  severity: WARNING
  languages:
  - go
  pattern: 'sysbench_runner.Dolt

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-test-with-name-field
  message: Test type with Name field. After refactoring, test structure should use
    interface-based approach.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "type ConfigTest struct {\n  ...\n  Name string\n  ...\n}\n"
    - pattern: "type TpccTest struct {\n  ...\n  Name string\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-sysbench-runner-aliased-import
  message: Old import path detected. Should use 'benchmark_runner' instead of 'sysbench_runner'
    after refactoring.
  severity: WARNING
  languages:
  - go
  pattern: 'import $ALIAS "github.com/dolthub/dolt/go/performance/utils/sysbench_runner"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-tpcc-runner-import
  message: Old tpcc_runner import detected. This package should be removed and functionality
    merged into benchmark_runner.
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/dolthub/dolt/go/performance/utils/tpcc_runner"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-tpcc-runner-aliased-import
  message: Old tpcc_runner import detected. This package should be removed and functionality
    merged into benchmark_runner.
  severity: WARNING
  languages:
  - go
  pattern: 'import $ALIAS "github.com/dolthub/dolt/go/performance/utils/tpcc_runner"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-fromfileconfig-sysbench-call
  message: File-based JSON configuration loading detected. Should use programmatic
    configuration through interfaces after refactoring.
  severity: WARNING
  languages:
  - go
  pattern: 'runner.FromFileConfig($PATH)

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-fromfileconfig-tpcc-call
  message: File-based JSON configuration loading detected for TPCC. Should use programmatic
    configuration through interfaces after refactoring.
  severity: WARNING
  languages:
  - go
  pattern: 'tpcc_runner.FromFileConfig($PATH)

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sysbench-runner-fromfileconfig-function
  message: FromFileConfig function should be removed. Refactoring eliminates file-based
    JSON configuration in favor of programmatic configuration.
  severity: WARNING
  languages:
  - go
  pattern: "func FromFileConfig($PATH string) (*Config, error) {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tpcc-runner-fromfileconfig-function
  message: FromFileConfig function should be removed from TPCC runner. Refactoring
    eliminates file-based JSON configuration.
  severity: WARNING
  languages:
  - go
  pattern: "func FromFileConfig($PATH string) (*TpccBenchmarkConfig, error) {\n  ...\n\
    }\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-sysbench-run-without-context
  message: Old Run API detected. After refactoring, should use Run(ctx, SysbenchConfig)
    with context parameter.
  severity: WARNING
  languages:
  - go
  pattern: 'runner.Run($CONFIG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-tpcc-run-without-context
  message: Old TPCC Run API detected. After refactoring, should use RunTpcc(ctx, TpccConfig)
    with context parameter.
  severity: WARNING
  languages:
  - go
  pattern: 'tpcc_runner.Run($CONFIG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-run-function-signature-no-context
  message: Old Run function signature without context parameter. Should accept context.Context
    as first parameter after refactoring.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func Run($CONFIG *Config) error {\n  ...\n}\n"
  - pattern-not-inside: "func Run($CTX context.Context, ...) error {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-tpcc-run-function-signature
  message: Old TPCC Run function signature detected. Should be renamed to RunTpcc
    and accept context.Context as first parameter.
  severity: WARNING
  languages:
  - go
  pattern: "func Run($CONFIG *TpccBenchmarkConfig) error {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: config-validate-call-in-run
  message: Config.Validate() call in Run function suggests old architecture. After
    refactoring, validation should be handled differently with interface-based config.
  severity: WARNING
  languages:
  - go
  pattern: "func Run(...) error {\n  ...\n  err := $CONFIG.Validate()\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sysbench-runner-cmd-main-file
  message: Command-line executable main.go file detected in sysbench_runner/cmd/.
    After refactoring, executables should be removed.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/go/performance/utils/sysbench_runner/cmd/main.go'
- id: tpcc-runner-cmd-main-file
  message: Command-line executable main.go file detected in tpcc_runner/cmd/. After
    refactoring, executables should be removed.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/go/performance/utils/tpcc_runner/cmd/main.go'
- id: old-tpccbenchmarkconfig-struct
  message: Old TpccBenchmarkConfig struct detected. After refactoring, should use
    interface-based TpccConfig.
  severity: WARNING
  languages:
  - go
  pattern: "type TpccBenchmarkConfig struct {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-benchmarkdolt-function
  message: Old BenchmarkDolt function signature. After refactoring, should use Benchmarker
    interface with separate implementations (doltBenchmarkerImpl).
  severity: WARNING
  languages:
  - go
  pattern: "func BenchmarkDolt($CTX context.Context, $CONFIG *Config, $SERVER *ServerConfig)\
    \ (Results, error) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-benchmarkmysql-function
  message: Old BenchmarkMysql function signature. After refactoring, should use Benchmarker
    interface with mysqlBenchmarkerImpl.
  severity: WARNING
  languages:
  - go
  pattern: "func BenchmarkMysql($CTX context.Context, $CONFIG *Config, $SERVER *ServerConfig)\
    \ (Results, error) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-benchmarkdoltgres-function
  message: Old BenchmarkDoltgres function signature. After refactoring, should use
    Benchmarker interface with doltgresBenchmarkerImpl.
  severity: WARNING
  languages:
  - go
  pattern: "func BenchmarkDoltgres($CTX context.Context, $CONFIG *Config, $SERVER\
    \ *ServerConfig) (Results, error) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-benchmarkpostgres-function
  message: Old BenchmarkPostgres function signature. After refactoring, should use
    Benchmarker interface with postgresBenchmarkerImpl.
  severity: WARNING
  languages:
  - go
  pattern: "func BenchmarkPostgres($CTX context.Context, $CONFIG *Config, $SERVER\
    \ *ServerConfig) (Results, error) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-profiledolt-function
  message: Old ProfileDolt function. After refactoring, should use Profile(ctx, ...)
    method with ProfilingServerConfig interface.
  severity: WARNING
  languages:
  - go
  pattern: "func ProfileDolt($CTX context.Context, $CONFIG *Config, $SERVER *ServerConfig)\
    \ error {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: run-with-switch-on-server-type
  message: Run function with switch on server type. After refactoring, should use
    Benchmarker interface with separate implementations per server type.
  severity: WARNING
  languages:
  - go
  pattern: "func Run(...) error {\n  ...\n  switch $SERVER.Server {\n  case Dolt:\n\
    \    ...\n  case MySql:\n    ...\n  ...\n  }\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: serverprofile-field-for-profiling
  message: Old profiling pattern using ServerProfile field. After refactoring, should
    use ProfilingServerConfig interface and Profile() method.
  severity: WARNING
  languages:
  - go
  pattern: "if $SERVER.ServerProfile != \"\" {\n  ...\n  return ProfileDolt(...)\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sample-tpcc-config-json
  message: Sample JSON config file detected. After refactoring, JSON configuration
    files should be removed in favor of programmatic configuration.
  severity: WARNING
  languages:
  - json
  pattern-regex: \A[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/sample-tpcc-config.json'
- id: config-updatedefaults-method
  message: updateDefaults method on config. After refactoring, configuration validation
    and defaults should be handled through interface methods.
  severity: WARNING
  languages:
  - go
  pattern: "func ($C *$TYPE) updateDefaults() error {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-default-sysbench-tests-variable
  message: Old defaultSysbenchTests variable using ConfigTest. After refactoring,
    test configuration should use interface-based approach.
  severity: WARNING
  languages:
  - go
  pattern: 'var defaultSysbenchTests = []*ConfigTest{...}

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-configtest-type
  message: Old ConfigTest type. After refactoring, should use interface-based test
    configuration.
  severity: WARNING
  languages:
  - go
  pattern: "type ConfigTest struct {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-newconfigtest-constructor
  message: Old NewConfigTest constructor. After refactoring, test configuration should
    use interface-based approach.
  severity: WARNING
  languages:
  - go
  pattern: "func NewConfigTest($NAME string, ...) *ConfigTest {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-tpcctest-type
  message: Old TpccTest type in tpcc_runner. After refactoring, should use unified
    test interface in benchmark_runner.
  severity: WARNING
  languages:
  - go
  pattern: "type TpccTest struct {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-tpcctestparams-type
  message: Old TpccTestParams type in tpcc_runner. After refactoring, should use interface-based
    configuration.
  severity: WARNING
  languages:
  - go
  pattern: "type TpccTestParams struct {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-default-dolt-server-params
  message: Old defaultDoltServerParams variable. After refactoring, server parameter
    handling should be unified in benchmark_runner.
  severity: WARNING
  languages:
  - go
  pattern: 'var defaultDoltServerParams = []string{"sql-server"}

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-getdefaulttests-function
  message: Old getDefaultTests function. After refactoring, test configuration should
    use interface-based approach.
  severity: WARNING
  languages:
  - go
  pattern: "func getDefaultTests($CONFIG *Config) ([]*ConfigTest, error) {\n  ...\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-getluascripttests-function
  message: Old getLuaScriptTestsFromDir function returning ConfigTest. After refactoring,
    should use interface-based test configuration.
  severity: WARNING
  languages:
  - go
  pattern: "func getLuaScriptTestsFromDir(...) ([]*ConfigTest, error) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-contains-method-on-config
  message: Contains method on old Config struct. After refactoring, config should
    be interface-based.
  severity: WARNING
  languages:
  - go
  pattern: "func ($C *Config) Contains($TYPE ServerType) bool {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-config-validate-method
  message: Old Validate method on Config struct. After refactoring, should use interface-based
    validation.
  severity: WARNING
  languages:
  - go
  pattern: "func ($C *Config) Validate() error {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-serverconfig-getid-method
  message: Old GetId method on ServerConfig struct. After refactoring, should use
    interface-based ServerConfig.
  severity: WARNING
  languages:
  - go
  pattern: "func ($S *ServerConfig) GetId() string {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-sysbench-version-check
  message: Old sysbenchVersion function. After refactoring, should be part of unified
    benchmark runner with Tester interface.
  severity: WARNING
  languages:
  - go
  pattern: "func sysbenchVersion($CTX context.Context) error {\n  ...\n  sysbenchVersion\
    \ := ExecCommand($CTX, \"sysbench\", \"--version\")\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-writeresults-function-definition
  message: Old WriteResults function. After refactoring, result handling should be
    consolidated across benchmark types.
  severity: WARNING
  languages:
  - go
  pattern: "func WriteResults($SERVER *ServerConfig, $RESULTS Results) error {\n \
    \ ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tpcc-runner-benchmarkdolt
  message: Old TPCC BenchmarkDolt in tpcc_runner package. Should be merged into benchmark_runner
    with Benchmarker interface.
  severity: WARNING
  languages:
  - go
  pattern: "func BenchmarkDolt($CTX context.Context, $CONFIG *TpccBenchmarkConfig,\
    \ $SERVER *sysbench_runner.ServerConfig) (...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tpcc-runner-benchmarkmysql
  message: Old TPCC BenchmarkMysql in tpcc_runner package. Should be merged into benchmark_runner
    with Benchmarker interface.
  severity: WARNING
  languages:
  - go
  pattern: "func BenchmarkMysql($CTX context.Context, $CONFIG *TpccBenchmarkConfig,\
    \ $SERVER *sysbench_runner.ServerConfig) (...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-dolt-go-file-in-sysbench-runner
  message: dolt.go file in old sysbench_runner directory. Should be moved to benchmark_runner
    with interface-based architecture.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/go/performance/utils/sysbench_runner/dolt.go'
- id: old-mysql-go-file-in-sysbench-runner
  message: mysql.go file in old sysbench_runner directory. Should be moved to benchmark_runner
    with interface-based architecture.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/go/performance/utils/sysbench_runner/mysql.go'
- id: old-doltgres-go-file-in-sysbench-runner
  message: doltgres.go file in old sysbench_runner directory. Should be moved to benchmark_runner
    with interface-based architecture.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/go/performance/utils/sysbench_runner/doltgres.go'
- id: old-postgres-go-file-in-sysbench-runner
  message: postgres.go file in old sysbench_runner directory. Should be moved to benchmark_runner
    with interface-based architecture.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
