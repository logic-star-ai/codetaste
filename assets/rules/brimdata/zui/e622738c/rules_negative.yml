rules:
- id: detect-query-versions-selector
  message: Usage of QueryVersions selector methods detected. Replace with snapshot
    selectors.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: QueryVersions.$METHOD(...)
    - pattern: QueryVersions.at($ID).$METHOD(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: detect-query-version-comment
  message: Comment or identifier referring to 'QueryVersion' detected. Update to use
    'Snapshot' terminology.
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: (QueryVersion|query version|queryVersion)[^s]
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: detect-editor-snapshot-comment
  message: Reference to 'EditorSnapshot' detected. Update to use 'Snapshot' terminology.
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: EditorSnapshot
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: detect-query-versions-namespace
  message: Reference to QueryVersions namespace detected. Replace with snapshot-based
    operations.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: QueryVersions\.
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: detect-query-version-at-selector
  message: Usage of QueryVersions.at() selector detected. Replace with snapshot selectors.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: QueryVersions.at($QUERY_ID)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: detect-query-versions-actions-namespace
  message: QueryVersions namespace method call detected. Replace with snapshot actions/selectors.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: QueryVersions\.(create|update|delete|set|find|all|at)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: detect-query-versions-at-chained
  message: Chained call on QueryVersions.at() detected. Replace with snapshot operations.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: QueryVersions.at($ID).create
    - pattern: QueryVersions.at($ID).update
    - pattern: QueryVersions.at($ID).delete
    - pattern: QueryVersions.at($ID).find
    - pattern: QueryVersions.at($ID).all
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: detect-query-versions-entity-operations
  message: Entity operations on deprecated QueryVersions detected. Replace with snapshot
    operations.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: QueryVersions.at($ID).create(...)
    - pattern: QueryVersions.at($ID).update(...)
    - pattern: QueryVersions.at($ID).delete(...)
    - pattern: QueryVersions.at($ID).find(...)
    - pattern: QueryVersions.at($ID).all(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-session-history-comment
  message: Reference to 'SessionHistory' detected. Update to use snapshot-based history
    terminology.
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: SessionHistory(?!Id)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-editor-snapshot-class-import
  message: Import of deprecated EditorSnapshot class detected. Replace with Snapshot
    entity.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., EditorSnapshot, ... } from "$PATH"
    - pattern: import { EditorSnapshot } from "$PATH"
    - pattern: import EditorSnapshot from "$PATH/editor-snapshot"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-query-version-object-literal
  message: Object literal matching QueryVersion structure detected. Replace with Snapshot
    entity.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "{\n  version: $VER,\n  ts: $TS,\n  value: $VAL,\n  pins: $PINS\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-query-version-constructor-object
  message: Object with QueryVersion structure (version, ts, value, pins) detected.
    Replace with Snapshot entity.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "{\n  version: $VER,\n  ts: $TS,\n  value: $VAL,\n  pins: $PINS\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-editor-snapshot-instantiation
  message: Instantiation of deprecated EditorSnapshot class detected. Replace with
    Snapshot entity creation.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: new EditorSnapshot(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-session-histories-namespace
  message: Reference to SessionHistories namespace detected. Replace with snapshot-based
    operations.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: SessionHistories\.
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-query-versions-create-action
  message: QueryVersions.at().create() action detected. Replace with snapshot creation
    action.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: QueryVersions.at($ID).create($DATA)
    - pattern: dispatch(QueryVersions.at($ID).create($DATA))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-query-versions-create-dispatch
  message: Dispatch of QueryVersions.at().create() action detected. Replace with snapshot
    creation dispatch.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $DISPATCH(QueryVersions.at($ID).create(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-session-queries-namespace
  message: Reference to SessionQueries namespace detected. Replace with snapshot-based
    operations.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: SessionQueries\.
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-query-versions-find-selector
  message: QueryVersions.at().find() selector detected. Replace with snapshot selector.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: QueryVersions.at($ID).find($STATE, $VID)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-session-queries-selector
  message: Usage of SessionQueries selector methods detected. Replace with snapshot
    selectors.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: SessionQueries.$METHOD(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-editor-snapshot-find
  message: Usage of EditorSnapshot.find() method detected. Replace with snapshot selectors.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: EditorSnapshot.find(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-query-model-latest-version
  message: Usage of QueryModel latestVersion methods detected. Replace with snapshot-based
    access.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $VAR.latestVersion()
    - pattern: $VAR.latestVersionId()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-old-query-path-function
  message: Usage of old queryPath() with version parameter detected. Replace with
    snapshot-based path generation.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: queryPath($QUERY_ID, $VERSION)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-query-model-versions-property
  message: Access to 'versions' property on QueryModel. Replace with snapshot-based
    version list.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $QUERY.versions
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-query-path-function-import
  message: Import of queryPath function detected. This may need updating for snapshot-based
    routing.
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., queryPath, ... } from "$PATH"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-editor-snapshot-directory
  message: File in editor-snapshot directory detected. These should be migrated to
    snapshot entity.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/models/editor-snapshot/*.ts'
- id: detect-query-path-two-params
  message: Call to queryPath() with two parameters (queryId, versionId) detected.
    Replace with snapshot-based path.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: queryPath($QUERY_ID, $VERSION_ID)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-query-model-latest-check
  message: Call to QueryModel latest version methods detected. Replace with snapshot-based
    access.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $QUERY.latestVersion()
    - pattern: $QUERY.latestVersionId()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-session-histories-action-dispatch
  message: Dispatch of SessionHistories action detected. Replace with snapshot-based
    history action dispatch.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: dispatch(SessionHistories.$METHOD(...))
    - pattern: $DISPATCH(SessionHistories.$METHOD(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-session-queries-directory-file
  message: File in SessionQueries state directory detected. These files should be
    removed or migrated to snapshots.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/state/SessionQueries/*.ts'
    - '**/state/SessionQueries/*.tsx'
- id: detect-session-histories-directory-file
  message: File in SessionHistories state directory detected. These files should be
    removed or migrated to snapshots.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/state/SessionHistories/*.ts'
    - '**/state/SessionHistories/*.tsx'
- id: detect-query-version-type-annotation
  message: Variable typed with deprecated QueryVersion. Replace with Snapshot type.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'const $VAR: QueryVersion = ...

        '
    - pattern: 'let $VAR: QueryVersion = ...

        '
    - pattern: 'var $VAR: QueryVersion = ...

        '
    - pattern: '$PARAM: QueryVersion

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-query-versions-slice-reference
  message: Reference to deprecated versionSlice detected. Replace with snapshots slice.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: versionSlice
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-query-model-import
  message: Import of deprecated QueryModel class detected. Replace with simplified
    query handling using snapshots.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., QueryModel, ... } from "$PATH"
    - pattern: import { QueryModel } from "$PATH"
    - pattern: import QueryModel from "$PATH/query-model"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-query-model-instantiation
  message: Instantiation of deprecated QueryModel class detected. Use simplified query
    model with snapshots.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: new QueryModel(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-active-query-is-deleted
  message: Call to isDeleted() method (likely on ActiveQuery) detected. Replace with
    snapshot-based check.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $VAR.isDeleted()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-query-versions-all-call
  message: Reference to QueryVersions.at().all detected. Replace with snapshot selector.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: QueryVersions.at($QID).all
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-query-model-constructor-call
  message: QueryModel constructor with versions parameter detected. Replace with simplified
    query model.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'new QueryModel($RAW, $VERSIONS, $SOURCE)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-query-model-is-read-only-check
  message: Access to isReadOnly property on query object detected. Review for simplified
    query model.
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: $QUERY.isReadOnly
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-query-versions-slice-reference-var
  message: Reference to versionSlice detected. This was the QueryVersions slice, replace
    with snapshots slice.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: versionSlice
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-session-histories-actions-namespace
  message: SessionHistories namespace method call detected. Replace with snapshot
    history actions/selectors.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: SessionHistories\.(create|update|delete|set|get|all|push)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-editor-snapshot-method-chain
  message: Method chain on EditorSnapshot detected. Replace with snapshot-based operations.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $VAR.toSourceSet().contents
    - pattern: $VAR.toQueryText()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-query-model-constructor-pattern
  message: QueryModel constructor with three parameters detected. Replace with simplified
    query construction.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: new QueryModel($RAW, $VERSIONS, $SOURCE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-query-versions-directory-file
  message: File in QueryVersions state directory detected. These files should be removed
    or migrated to snapshots.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/state/QueryVersions/*.ts'
    - '**/state/QueryVersions/*.tsx'
- id: detect-active-query-import
  message: Import of deprecated ActiveQuery class detected. Replace with direct snapshot
    usage.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., ActiveQuery, ... } from "$PATH"
    - pattern: import { ActiveQuery } from "$PATH"
    - pattern: import ActiveQuery from "$PATH/active-query"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-editor-snapshot-to-query-text
  message: Usage of .toQueryText() method (likely on EditorSnapshot). Replace with
    snapshot-based query text.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $VAR.toQueryText()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-active-query-in-function-param
  message: Function parameter typed as ActiveQuery detected. Replace with snapshot-based
    parameter.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'function $NAME($PARAM: ActiveQuery) { ... }

        '
    - pattern: '($PARAM: ActiveQuery) => { ... }

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-query-version-return-type
  message: Function with QueryVersion return type detected. Replace with Snapshot
    return type.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'function $NAME(...): QueryVersion { ... }

        '
    - pattern: 'const $NAME = (...): QueryVersion => { ... }

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-query-versions-all-selector
  message: QueryVersions.at().all() selector detected. Replace with snapshot selector.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: QueryVersions.at($ID).all($STATE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-session-queries-action-dispatch
  message: Dispatch of SessionQueries action detected. Replace with snapshot-based
    action dispatch.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: dispatch(SessionQueries.$METHOD(...))
    - pattern: $DISPATCH(SessionQueries.$METHOD(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-editor-snapshot-query-text-usage
  message: Call to toQueryText() method (EditorSnapshot method) detected. Replace
    with snapshot query text access.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $VAR.toQueryText()
    - pattern: $SNAPSHOT.toQueryText()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-session-queries-actions-namespace
  message: SessionQueries namespace method call detected. Replace with snapshot actions/selectors.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: SessionQueries\.(create|update|delete|set|find|all)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-query-id-version-destructure
  message: Destructuring both queryId and version detected. This matches old SessionHistoryEntry
    pattern.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const { queryId, version } = $OBJ
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-query-versions-raw-selector
  message: Usage of QueryVersions.raw selector detected. Replace with snapshots state
    access.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: QueryVersions.raw($STATE)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-query-versions-initial
  message: Usage of QueryVersions.initial() detected. Replace with snapshot initialization.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: QueryVersions.initial()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-editor-snapshot-where
  message: Usage of EditorSnapshot.where() method detected. Replace with snapshot
    selectors.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: EditorSnapshot.where(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-active-query-instantiation
  message: Instantiation of deprecated ActiveQuery class detected. Use snapshots directly
    instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: new ActiveQuery(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-editor-snapshot-to-source-set
  message: Usage of EditorSnapshot.toSourceSet() method detected. Replace with snapshot-based
    logic.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $VAR.toSourceSet()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-query-versions-reducer-file-exists
  message: QueryVersions reducer file still exists. This should be replaced with snapshots
    reducer.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/QueryVersions/reducer.ts'
    - '**/QueryVersions/index.ts'
- id: detect-session-queries-reducer-file-exists
  message: SessionQueries reducer file still exists. This should be replaced with
    snapshot-based state.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/SessionQueries/reducer.ts'
    - '**/SessionQueries/index.ts'
- id: detect-session-histories-reducer-file-exists
  message: SessionHistories reducer file still exists. This should be replaced with
    snapshot-based history.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/SessionHistories/reducer.ts'
    - '**/SessionHistories/index.ts'
- id: detect-session-queries-migration-needed
  message: Direct string key access to 'sessionQueries' in state detected. Indicates
    migration needed.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'state.sessionQueries[$ID]

        '
    - pattern: '$STATE["sessionQueries"]

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-version-id-parameter
  message: Function parameter or variable named 'versionId' detected. Consider renaming
    to 'snapshotId'.
  severity: INFO
  languages:
  - typescript
  - javascript
