    to InsightsBookingService methods.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'const $RESULT = $DATA.map(...)

      '
  - pattern-inside: "$HANDLER: $PROCEDURE.input(...).query(async ({ ctx, input })\
      \ => {\n  ...\n  const $DATA = await $PRISMA.bookingTimeStatusDenormalized.$METHOD(...)\n\
      \  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
