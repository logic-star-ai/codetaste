- id: insights-handler-ctx-insightsdb-direct-access
  message: Handler directly accesses ctx.insightsDb. Use InsightsBookingService to
    encapsulate database access.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'ctx.insightsDb.bookingTimeStatusDenormalized.$METHOD(...)

      '
  - pattern-inside: '$HANDLER: $PROCEDURE.input(...).query(...)

      '
  - metavariable-regex:
      metavariable: $HANDLER
      regex: ^(?!teamListForUser|getUserRelevantTeamRoutingForms).*$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/insights/server/trpc-router.ts'
- id: insights-component-manual-cache-config
  message: 'Booking chart component uses old cache config. Update staleTime to 180000
    and add refetchOnWindowFocus: false.'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "const { $VAR, ... } = trpc.viewer.insights.$HANDLER.useQuery(\n  $INPUT,\n\
      \  {\n    staleTime: $TIME,\n    ...\n  }\n)\n"
  - metavariable-comparison:
      metavariable: $TIME
      comparison: $TIME < 180000
  - pattern-not: "const { $VAR, ... } = trpc.viewer.insights.$HANDLER.useQuery(\n\
      \  $INPUT,\n  {\n    staleTime: $TIME,\n    refetchOnWindowFocus: false,\n \
      \   ...\n  }\n)\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/insights/components/Booking*.tsx'
    - '**/insights/components/Popular*.tsx'
    - '**/insights/components/*Members*.tsx'
    - '**/insights/components/*Feedback*.tsx'
