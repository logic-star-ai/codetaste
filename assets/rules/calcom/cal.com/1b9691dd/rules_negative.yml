rules:
- id: insights-handler-event-type-id-filtering
  message: Handler is filtering by eventTypeId directly. This logic should be in InsightsBookingService.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'eventTypeId: $EVENTTYPE

        '
    - pattern: 'eventParentId: $EVENTTYPE

        '
  - pattern-inside: "$HANDLER: $PROCEDURE.input(...).query(async ({ ctx, input })\
      \ => {\n  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
  paths:
    include:
    - '**/insights/server/trpc-router.ts'
- id: insights-component-no-use-client-with-trpc-query
  message: Insights component with tRPC query is missing 'use client' directive. Add
    it at the top of the file.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: trpc.viewer.insights.$HANDLER.useQuery(...)
  - pattern-not-inside: '"use client";

      ...

      '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - '**/insights/components/**/*.tsx'
- id: insights-old-file-name-total-user-feedback-table
  message: Old component name 'TotalUserFeedbackTable' found. This should be renamed
    to 'UserStatsTable' as part of the refactoring.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-regex: TotalUserFeedbackTable
  - pattern-not-regex: \/\/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: insights-handler-created-at-time-range-filter
  message: Handler is filtering by createdAt directly. This date filtering logic should
    be in InsightsBookingService.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: "createdAt: {\n  gte: $START,\n  lte: $END\n}\n"
    - pattern: "createdAt: {\n  $OP: $DATE\n}\n"
  - pattern-inside: '$HANDLER: $PROCEDURE.input(...).query(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/insights/server/trpc-router.ts'
- id: insights-handler-query-with-count-aggregation
  message: Handler performs count aggregation. Use service layer methods like getMembersStatsWithCount().
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: '_count: { ... }

        '
    - pattern: 'count: { ... }

        '
  - pattern-inside: "$HANDLER: $PROCEDURE.input(...).query(async ({ ctx, input })\
      \ => {\n  ...\n  await ctx.insightsDb.bookingTimeStatusDenormalized.groupBy(...)\n\
      \  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/insights/server/trpc-router.ts'
- id: insights-handler-createdat-gte-lte
  message: Handler filters by createdAt date range. Use InsightsBookingService with
    dateRange filter options.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: "createdAt: {\n  gte: $START,\n  lte: $END\n}\n"
    - pattern: "createdAt: {\n  gte: $START\n}\n"
    - pattern: "createdAt: {\n  lte: $END\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/insights/server/trpc-router.ts'
- id: insights-component-stale-time-30000-booking-kpi
  message: Booking chart component is using old staleTime of 30000ms. Update to 180000ms
    (3 minutes).
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "trpc.viewer.insights.$HANDLER.useQuery(\n  { ... },\n  {\n    staleTime:\
      \ 30000,\n    ...\n  }\n)\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/insights/components/BookingKPI*.tsx'
    - '**/insights/components/Popular*.tsx'
    - '**/insights/components/*Bookings*.tsx'
    - '**/insights/components/*Members*.tsx'
    - '**/insights/components/*Feedback*.tsx'
    - '**/insights/components/*Ratings*.tsx'
- id: insights-handler-rawdatainputschema-input-type
  message: Handler uses rawDataInputSchema. Ensure it delegates to InsightsBookingService
    instead of direct DB access.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: '$HANDLER: userBelongsToTeamProcedure.input(rawDataInputSchema).query(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/insights/server/trpc-router.ts'
- id: insights-handler-take-limit-pagination
  message: Handler has inline pagination logic. Consider moving to service layer for
    better abstraction.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'take: $LIMIT

      '
  - pattern-inside: "$HANDLER: $PROCEDURE.input(...).query(async ({ ctx, input })\
      \ => {\n  ...\n  await $PRISMA.bookingTimeStatusDenormalized.$METHOD(...)\n\
      \  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/insights/server/trpc-router.ts'
- id: insights-handler-raw-data-transformation
