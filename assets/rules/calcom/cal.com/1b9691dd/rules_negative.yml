    - '**/insights/server/trpc-router.ts'
- id: insights-handler-limit-hardcoded-in-query
  message: Handler has hardcoded limit/take value. Consider making this configurable
    or moving to service layer.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'take: $NUM

      '
  - metavariable-regex:
      metavariable: $NUM
      regex: ^\d+$
  - pattern-inside: "$HANDLER: $PROCEDURE.input(...).query(async ({ ctx, input })\
      \ => {\n  ...\n  await $PRISMA.bookingTimeStatusDenormalized.$METHOD(...)\n\
      \  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/insights/server/trpc-router.ts'
- id: insights-handler-rawdatainputschema-without-service
  message: Handler with rawDataInputSchema is querying database directly. Delegate
    to InsightsBookingService methods.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: "$HANDLER: userBelongsToTeamProcedure.input(rawDataInputSchema).query(async\
      \ ({ ctx, input }) => {\n  ...\n  await ctx.insightsDb.bookingTimeStatusDenormalized.$METHOD(...)\n\
      \  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
