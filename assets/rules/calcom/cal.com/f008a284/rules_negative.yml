  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: prisma.domainWideDelegation.$METHOD(...)
  - pattern: $PRISMA.domainWideDelegation.$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-dwd-variable-assignment
  message: Variable 'dwd' should be renamed to 'delegationCredential'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: const dwd = $X
  - pattern: let dwd = $X
  - pattern: var dwd = $X
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
