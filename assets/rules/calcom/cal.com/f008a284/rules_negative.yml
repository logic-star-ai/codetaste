rules:
- id: detect-dwd-acronym-in-variable-names
  message: Variable/function name containing 'Dwd' acronym should use 'DelegationCredential'
    instead
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \b(dwd[A-Z][a-zA-Z]*|[a-z]+Dwd[A-Z][a-zA-Z]*)\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 246
- id: detect-dwd-credential-id-field
  message: Field name 'domainWideDelegationCredentialId' or 'domainWideDelegationId'
    should be renamed to 'delegationCredentialId'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: domainWideDelegationCredentialId
  - pattern: domainWideDelegationId
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 54
- id: detect-domain-wide-delegation-translation-key
  message: Translation key 'domain_wide_delegation' should be renamed to 'delegation_credential'
  severity: WARNING
  languages:
  - json
  pattern-regex: '["'']domain_wide_delegation["'']'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: detect-add-domain-wide-delegation-translation
  message: Translation key 'add_domain_wide_delegation' should be renamed to 'add_delegation_credential'
  severity: WARNING
  languages:
  - json
  pattern-regex: '["'']add_domain_wide_delegation["'']'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: detect-edit-domain-wide-delegation-translation
  message: Translation key 'edit_domain_wide_delegation' should be renamed to 'edit_delegation_credential'
  severity: WARNING
  languages:
  - json
  pattern-regex: '["'']edit_domain_wide_delegation["'']'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: detect-domain-wide-delegation-enabled-translation
  message: Translation key 'domain_wide_delegation_enabled' should be renamed to 'delegation_credential_enabled'
  severity: WARNING
  languages:
  - json
  pattern-regex: '["'']domain_wide_delegation_enabled["'']'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: detect-domain-wide-delegation-disabled-translation
  message: Translation key 'domain_wide_delegation_disabled' should be renamed to
