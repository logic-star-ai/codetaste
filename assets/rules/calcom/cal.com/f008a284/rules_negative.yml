    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: detect-domain-wide-delegation-description-translation
  message: Translation key 'domain_wide_delegation_description' should be renamed
    to 'delegation_credential_description'
  severity: WARNING
  languages:
  - json
  pattern-regex: '["'']domain_wide_delegation_description["'']'
  metadata:
