rules:
- id: detect-set-perspective-dataflow
  message: Detected setPerspective function from useSetPerspective being called
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $HOOK()
    - metavariable-regex:
        metavariable: $HOOK
        regex: ^useSet.*$
    - pattern-inside: 'import { ..., $HOOK, ... } from ''$PATH''

        ...

        '
    - metavariable-regex:
        metavariable: $PATH
        regex: (?i).*(perspective|release).*
  pattern-sinks:
  - pattern: $FUNC(...)
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-use-set-perspective-hook-import-v2
  message: Detected import of new useSetPerspective hook (refactored from usePerspective)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $HOOK, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^useSet[A-Z][a-zA-Z]*$
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*(perspective|release).*
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/PortableText/**'
    - '**/form/inputs/**'
  options:
    symbolic_propagation: true
- id: detect-perspective-file-in-core
  message: Detected perspective module file in core directory
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/perspective/**'
  options:
    symbolic_propagation: true
- id: detect-use-set-perspective-destructuring-v2
  message: Detected destructuring of setPerspective from dedicated useSetPerspective
    hook
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: const { $SETTER } = $HOOK()
    - pattern: const $SETTER = $HOOK()
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^useSet[A-Z][a-zA-Z]*$
  - pattern-inside: 'import { ..., $HOOK, ... } from ''$PATH''

      ...

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*(perspective|release).*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/PortableText/**'
    - '**/form/inputs/**'
  options:
    symbolic_propagation: true
- id: detect-use-excluded-perspective-hook-import
  message: Detected import of new useExcludedPerspective hook (refactored from usePerspective)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $HOOK, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^useExcluded[A-Z][a-zA-Z]*$
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*(perspective|release|context|hook).*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-separate-hook-file-structure
  message: Detected separate hook files (useSetPerspective or useExcludedPerspective)
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/useSet*.ts'
    - '**/useSet*.tsx'
    - '**/useExcluded*.ts'
    - '**/useExcluded*.tsx'
  options:
    symbolic_propagation: true
- id: detect-hook-file-in-perspective-directory
  message: Detected hook file in perspective directory
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/perspective/hooks/**'
    - '**/perspective/use*.ts'
    - '**/perspective/use*.tsx'
  options:
    symbolic_propagation: true
- id: detect-export-use-set-perspective-hook
  message: Detected export of new useSetPerspective hook function
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: export function $HOOK(...) { ... }
    - pattern: 'function $HOOK(...) { ... }

        ...

        export { ..., $HOOK, ... }

        '
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^useSet[A-Z][a-zA-Z]*$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/hooks/**'
    - '**/perspective/**'
    - '**/releases/**'
  options:
    symbolic_propagation: true
- id: detect-export-use-excluded-perspective-hook
  message: Detected export of new useExcludedPerspective hook function
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: export function $HOOK(...) { ... }
    - pattern: 'function $HOOK(...) { ... }

        ...

        export { ..., $HOOK, ... }

        '
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^useExcluded[A-Z][a-zA-Z]*$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/hooks/**'
    - '**/perspective/**'
    - '**/releases/**'
  options:
    symbolic_propagation: true
- id: detect-perspective-provider-file
  message: Detected PerspectiveProvider file
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*PerspectiveProvider*.ts'
    - '**/*PerspectiveProvider*.tsx'
  options:
    symbolic_propagation: true
- id: detect-perspective-name-from-readonly-hook
  message: Detected selectedPerspectiveName from read-only hook
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const { ..., $NAME, ... } = $HOOK()
  - metavariable-regex:
      metavariable: $NAME
      regex: ^selected.*Name$
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^use[A-Z][a-zA-Z]*$
  - pattern-not: const { ..., setPerspective, ... } = $HOOK()
  - pattern-inside: 'import { ..., $HOOK, ... } from ''$PATH''

      ...

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*(perspective|release).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-jsx-perspective-provider
  message: Detected JSX usage of PerspectiveProvider component
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: <$PROVIDER>$CHILDREN</$PROVIDER>
    - pattern: <$PROVIDER {...$PROPS}>$CHILDREN</$PROVIDER>
  - metavariable-regex:
      metavariable: $PROVIDER
      regex: ^[A-Z][a-zA-Z]*Provider$
  - pattern-inside: 'import { ..., $PROVIDER, ... } from ''$PATH''

      ...

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*(perspective|release).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-global-perspective-provider-usage
  message: Detected usage of new GlobalPerspectiveProvider component
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: <$PROVIDER ...>...</$PROVIDER>
    - pattern: <$PROVIDER ... />
  - metavariable-regex:
      metavariable: $PROVIDER
      regex: ^Global[A-Z][a-zA-Z]*Provider$
  - pattern-inside: 'import { ..., $PROVIDER, ... } from ''$PATH''

      ...

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*(perspective|context|provider).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-use-excluded-perspective-destructuring
  message: Detected destructuring from new useExcludedPerspective hook
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const { ..., $TOGGLE, ..., $CHECK, ... } = $HOOK()
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^useExcluded[A-Z][a-zA-Z]*$
  - metavariable-regex:
      metavariable: $TOGGLE
      regex: ^(toggle|is)[A-Z][a-zA-Z]*$
  - metavariable-regex:
      metavariable: $CHECK
      regex: ^(is|check|has)[A-Z][a-zA-Z]*$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-readonly-perspective-values-destructuring
  message: Detected read-only perspective values from refactored usePerspective
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const { $PROP1, ..., $PROP2 } = $HOOK()
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^use[A-Z][a-zA-Z]*$
  - metavariable-regex:
      metavariable: $PROP1
      regex: ^(selected|perspective|excluded).*$
  - metavariable-regex:
      metavariable: $PROP2
      regex: ^(selected|perspective|excluded).*$
  - pattern-not: const { ..., setPerspective, ... } = $HOOK()
  - pattern-not: const { ..., toggleExcludedPerspective, ... } = $HOOK()
  - pattern-inside: 'import { ..., $HOOK, ... } from ''$PATH''

      ...

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*(perspective|release).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-perspective-context-file
  message: Detected PerspectiveContext file
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*PerspectiveContext*.ts'
    - '**/*PerspectiveContext*.tsx'
  options:
    symbolic_propagation: true
- id: detect-provider-wrapping-components
  message: Detected component being wrapped with PerspectiveProvider
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "<$PROVIDER ...>\n  <$CHILD ... />\n</$PROVIDER>\n"
  - metavariable-regex:
      metavariable: $PROVIDER
      regex: ^[A-Z][a-zA-Z]*(Provider|Context)$
  - pattern-inside: 'import { ..., $PROVIDER, ... } from ''$PATH''

      ...

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*(perspective|release).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-global-provider-import
  message: Detected import of GlobalPerspectiveProvider
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PROVIDER, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $PROVIDER
      regex: ^Global.*Provider$
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*(perspective|release|context|provider).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-global-perspective-provider-export
  message: Detected GlobalPerspectiveProvider export
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: export { $PROVIDER }
    - pattern: export const $PROVIDER = ...
    - pattern: export function $PROVIDER(...) { ... }
  - metavariable-regex:
      metavariable: $PROVIDER
      regex: ^Global[A-Z][a-zA-Z]*Provider$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/context/**'
    - '**/contexts/**'
    - '**/provider/**'
    - '**/perspective/**'
  options:
    symbolic_propagation: true
- id: detect-use-set-perspective-file
  message: Detected useSetPerspective hook file
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/hooks/useSet*.ts'
    - '**/hooks/useSet*.tsx'
    - '**/perspective/useSet*.ts'
    - '**/perspective/useSet*.tsx'
  options:
    symbolic_propagation: true
- id: detect-use-excluded-perspective-file
  message: Detected useExcludedPerspective hook file
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/hooks/useExcluded*.ts'
    - '**/hooks/useExcluded*.tsx'
    - '**/perspective/useExcluded*.ts'
    - '**/perspective/useExcluded*.tsx'
  options:
    symbolic_propagation: true
- id: detect-global-provider-file
  message: Detected GlobalPerspectiveProvider file
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Global*Provider.ts'
    - '**/Global*Provider.tsx'
  options:
    symbolic_propagation: true
- id: detect-perspective-types-file
  message: Detected perspective types file
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/perspective/types.ts'
    - '**/perspective/types.tsx'
    - '**/releases/perspective/types.ts'
    - '**/releases/perspective/types.tsx'
  options:
    symbolic_propagation: true
