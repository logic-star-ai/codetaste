rules:
- id: use-set-perspective-hook-imported
  message: Detected import of new useSetPerspective hook
  severity: INFO
  languages:
  - typescript
  pattern: import { ..., useSetPerspective, ... } from '$PATH'
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: component-uses-both-read-and-write-hooks
  message: Detected component using both usePerspective and useSetPerspective hooks
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - patterns:
      - pattern: usePerspective()
      - pattern-inside: "function $COMP(...) {\n  ...\n  useSetPerspective()\n  ...\n\
          }\n"
    - patterns:
      - pattern: useSetPerspective()
      - pattern-inside: "function $COMP(...) {\n  ...\n  usePerspective()\n  ...\n\
          }\n"
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: use-set-perspective-hook-called
  message: Detected call to new useSetPerspective() hook for write operations
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: useSetPerspective()
  - pattern-not-inside: 'function useSetPerspective(...) { ... }

      '
  - pattern-not-inside: 'const useSetPerspective = (...) => { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: use-set-perspective-const-assignment
  message: Detected useSetPerspective assigned to const variable
  severity: INFO
  languages:
  - typescript
  pattern: 'const $VAR = useSetPerspective()

    '
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: perspective-context-value-type-imported
  message: Detected import of PerspectiveContextValue type from new location
  severity: INFO
  languages:
  - typescript
  pattern: import { ..., PerspectiveContextValue, ... } from '$PATH'
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: use-set-perspective-in-component
  message: Detected useSetPerspective() used in component function
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-inside: "function $COMPONENT(...) { \n  ...\n  useSetPerspective()\n \
      \ ...\n}\n"
  - pattern: useSetPerspective()
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: both-use-perspective-and-use-set-perspective
  message: Detected both usePerspective() and useSetPerspective() in same component
    - proper separation of concerns
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-inside: "function $FUNC(...) { \n  ...\n  usePerspective()\n  ...\n  useSetPerspective()\n\
      \  ...\n}\n"
  - pattern: useSetPerspective()
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: perspective-provider-imported
  message: Detected import of new PerspectiveProvider component
