rules:
- id: perspective-use-old-set-perspective-destructure
  message: 'Refactor required: Use useSetPerspective() instead of destructuring setPerspective
    from usePerspective()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const { ..., setPerspective, ... } = usePerspective()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: perspective-import-use-perspective-only-for-writes
  message: 'Refactor required: Import and use useSetPerspective() or useExcludedPerspective()
    for write operations instead of usePerspective()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: 'import { usePerspective } from ''$PATH''

      ...

      const { setPerspective } = usePerspective()

      '
  - pattern: 'import { usePerspective } from ''$PATH''

      ...

      const { toggleExcludedPerspective } = usePerspective()

      '
  - pattern: 'import { usePerspective } from ''$PATH''

      ...

      const { isPerspectiveExcluded } = usePerspective()

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
