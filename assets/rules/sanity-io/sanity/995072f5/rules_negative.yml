rules:
- id: perspective-use-old-set-perspective-destructure
  message: 'Refactor required: Use useSetPerspective() instead of destructuring setPerspective
    from usePerspective()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const { ..., setPerspective, ... } = usePerspective()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: perspective-import-use-perspective-only-for-writes
  message: 'Refactor required: Import and use useSetPerspective() or useExcludedPerspective()
    for write operations instead of usePerspective()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: 'import { usePerspective } from ''$PATH''

      ...

      const { setPerspective } = usePerspective()

      '
  - pattern: 'import { usePerspective } from ''$PATH''

      ...

      const { toggleExcludedPerspective } = usePerspective()

      '
  - pattern: 'import { usePerspective } from ''$PATH''

      ...

      const { isPerspectiveExcluded } = usePerspective()

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: perspective-read-only-with-write-in-component
  message: 'Refactor required: Split into usePerspective() for read values and useSetPerspective()
    for setPerspective'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const {$READ_FIELD, ..., setPerspective, ...} = usePerspective()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: perspective-read-write-mix-release-id-set
  message: 'Refactor required: Use usePerspective() for selectedReleaseId and useSetPerspective()
    for setPerspective function'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const { selectedReleaseId, ..., setPerspective, ... } = usePerspective()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: perspective-mixed-read-write-usage-pattern
  message: 'Refactor required: Use usePerspective() for read-only values and useSetPerspective()
    for setPerspective function'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const { selectedPerspective, ..., setPerspective, ... } = usePerspective()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: perspective-read-write-mix-selected-name-set
  message: 'Refactor required: Use usePerspective() for selectedPerspectiveName and
    useSetPerspective() for setPerspective function'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const { selectedPerspectiveName, ..., setPerspective, ... } = usePerspective()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: perspective-use-old-toggle-excluded-destructure
  message: 'Refactor required: Use useExcludedPerspective() instead of destructuring
    toggleExcludedPerspective from usePerspective()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const { ..., toggleExcludedPerspective, ... } = usePerspective()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: perspective-access-set-perspective-directly
  message: 'Refactor required: Use useSetPerspective() to access setPerspective function
    instead of usePerspective().setPerspective'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: 'const $VAR = usePerspective()

      ...

      $VAR.setPerspective(...)

      '
  - pattern: 'const $VAR = usePerspective();

      ...

      $VAR.setPerspective(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: perspective-monolithic-hook-return-type
  message: 'Refactor required: Split usePerspective into usePerspective(), useSetPerspective(),
    and useExcludedPerspective()'
  severity: WARNING
  languages:
  - typescript
  pattern: 'export function usePerspective(): PerspectiveValue { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: perspective-use-callback-for-toggle-excluded
  message: 'Refactor required: toggleExcludedPerspective logic should be in useExcludedPerspective()
    hook, not usePerspective()'
  severity: WARNING
  languages:
  - typescript
  pattern: "const toggleExcludedPerspective = useCallback(\n  ($PARAM: $TYPE) => {\n\
    \    ...\n    router.navigateStickyParams({excludedPerspectives: ...})\n  },\n\
    \  ...\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: perspective-destructure-name-release-set
  message: 'Refactor required: Use usePerspective() for read values and useSetPerspective()
    for setPerspective'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const {selectedPerspectiveName, selectedReleaseId, setPerspective} = usePerspective()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
