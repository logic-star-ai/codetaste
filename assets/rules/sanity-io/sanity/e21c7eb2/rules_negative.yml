- id: old-validation-import-validateDocumentObservable
  message: Import validateDocumentObservable from @sanity/validation should use relative
    path after consolidation
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: import { validateDocumentObservable, ... } from '@sanity/validation'
  - pattern: import { ..., validateDocumentObservable, ... } from '@sanity/validation'
  - pattern: import { ..., validateDocumentObservable } from '@sanity/validation'
  - pattern: import { validateDocumentObservable } from '@sanity/validation'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-validation-import-inferFromSchema
