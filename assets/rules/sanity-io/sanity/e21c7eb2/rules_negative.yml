rules:
- id: old-validation-package-directory-any-file
  message: Files in old @sanity/validation package directory should be removed or
    moved after consolidation
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
  paths:
    include:
    - packages/@sanity/validation/**
- id: old-validation-source-exists
  message: Source files should be moved to packages/sanity/src/core/validation
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
  paths:
    include:
    - packages/@sanity/validation/src/**
- id: old-validation-test-exists
  message: Test files should be moved to packages/sanity/test/validation
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - packages/@sanity/validation/test/**
- id: old-validation-util-directory
  message: Util files from old package should be moved to core/validation/util
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - packages/@sanity/validation/src/util/**
- id: old-validation-validators-directory
  message: Validators from old package should be moved to core/validation/validators
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - packages/@sanity/validation/src/validators/**
- id: old-validation-tsconfig-extends
  message: TypeScript config extending validation package config should be updated
  severity: WARNING
  languages:
  - json
  pattern-regex: '"extends"[\s\S]*?validation'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/tsconfig*.json'
- id: old-validation-tsconfig-include-validation
  message: TypeScript config including validation package should be updated
  severity: WARNING
  languages:
  - json
  pattern-regex: '"include"[\s\S]*?validation'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/tsconfig*.json'
- id: old-validation-string-literal-import
  message: String literal reference to @sanity/validation should be updated
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: '''@sanity/validation'''
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-validation-import-named
  message: Import from @sanity/validation should be updated to relative path after
    package consolidation
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: import { ... } from '@sanity/validation'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-validation-package-json-dep
  message: Dependency on @sanity/validation should be removed from package.json after
    consolidation
  severity: WARNING
  languages:
  - json
  pattern-regex: '["'']@sanity/validation["'']'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/package.json'
- id: old-validation-tsconfig-ref
  message: TypeScript reference to @sanity/validation should be removed after consolidation
  severity: WARNING
  languages:
  - json
  pattern-regex: '["'']\.\/packages\/@sanity\/validation[/"'']'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/tsconfig*.json'
- id: old-validation-test-helpers
  message: Test helpers from old package should be moved to packages/sanity/test/validation/helpers
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/@sanity/validation/test/helpers/**
- id: old-validation-tsconfig-reference-path
  message: TypeScript config reference to packages/@sanity/validation should be removed
  severity: WARNING
  languages:
  - json
  pattern-regex: packages\/@sanity\/validation
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - tsconfig.json
    - tsconfig.lib.json
    - '**/tsconfig*.json'
