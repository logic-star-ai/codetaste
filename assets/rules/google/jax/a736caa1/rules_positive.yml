rules:
- id: config-file-multiple-aliases
  message: Detected multiple module-level config aliases
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: '$ALIAS1 = config.$METHOD1

      ...

      $ALIAS2 = config.$METHOD2

      '
  metadata:
    category: api
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config.py'
- id: maps-variables-all-uppercase-underscore
  message: Detected _SPMD_* and _ENSURE_FIXED_SHARDING uppercase underscore variable
    names
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: _SPMD_LOWERING|_SPMD_LOWERING_MANUAL|_ENSURE_FIXED_SHARDING
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/maps.py'
- id: config-module-alias-combined
  message: Detected module-level config function aliases
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: _read = config._read
    - pattern: update = config.update
    - pattern: define_bool_state = config.define_bool_state
    - pattern: define_int_state = config.define_int_state
    - pattern: define_string_state = config.define_string_state
    - pattern: define_enum_state = config.define_enum_state
    - pattern: parse_flags_with_absl = config.parse_flags_with_absl
  - pattern-inside: 'config = Config()

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config.py'
- id: tpu-mosaic-variables-uppercase-underscore-prefix
  message: Detected uppercase _MOSAIC_* variable names (not lowercase mosaic_*)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: _MOSAIC_USE_CPP_PASSES
    - pattern: _MOSAIC_ALLOW_HLO
    - pattern: _MOSAIC_DUMP_MLIR
  - pattern-not: mosaic_use_cpp_passes
  - pattern-not: mosaic_allow_hlo
  - pattern-not: mosaic_dump_mlir
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tpu_custom_call.py'
- id: tpu-mosaic-variables-renamed-pattern
  message: Detected _MOSAIC_* renamed variables pattern in tpu_custom_call.py
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: _MOSAIC_(USE_CPP_PASSES|ALLOW_HLO|DUMP_MLIR)
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tpu_custom_call.py'
- id: tpu-mosaic-variables-all-uppercase-underscore
  message: Detected _MOSAIC_* uppercase underscore variable names
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: _MOSAIC_USE_CPP_PASSES|_MOSAIC_ALLOW_HLO|_MOSAIC_DUMP_MLIR
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tpu_custom_call.py'
- id: config-define-bool-state-assigned-to-underscore-var
  message: Detected config.define_bool_state assigned to uppercase underscore variable
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $_VAR = config.define_bool_state(...)
  - metavariable-pattern:
      metavariable: $_VAR
      pattern-regex: ^_[A-Z_]+$
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: maps-underscore-spmd-lowering-identifier
  message: Detected _SPMD_LOWERING identifier (new module variable name)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: _SPMD_LOWERING
  - pattern-not-regex: config\.experimental_xmap_spmd_lowering
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/maps.py'
- id: maps-module-variables-accessed-with-value
  message: Detected access to maps module state variables with .value property
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: _SPMD_LOWERING.value
    - pattern: _SPMD_LOWERING_MANUAL.value
    - pattern: _ENSURE_FIXED_SHARDING.value
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/maps.py'
- id: mosaic-variable-access-with-value
  message: Detected access to _MOSAIC_* variable .value property
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: _MOSAIC_ALLOW_HLO.value
    - pattern: _MOSAIC_DUMP_MLIR.value
    - pattern: _MOSAIC_USE_CPP_PASSES.value
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tpu_custom_call.py'
- id: maps-state-variable-access-pattern
  message: Detected access to maps module state variables with .value
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: use_spmd_lowering = _SPMD_LOWERING.value
    - pattern: ensure_fixed_sharding = _ENSURE_FIXED_SHARDING.value
    - pattern: "if _SPMD_LOWERING_MANUAL.value:\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/maps.py'
- id: tpu-mosaic-if-condition-with-value
  message: Detected if condition with _MOSAIC_* variable .value in tpu_custom_call.py
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "if _MOSAIC_ALLOW_HLO.value:\n  ...\n"
    - pattern: "if _MOSAIC_USE_CPP_PASSES.value:\n  ...\n"
    - pattern: "if _MOSAIC_DUMP_MLIR.value:\n  ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tpu_custom_call.py'
- id: config-alias-define-states-in-config-file
  message: Detected define_*_state function aliases in config module
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: define_bool_state = config.define_bool_state
    - pattern: define_int_state = config.define_int_state
    - pattern: define_string_state = config.define_string_state
    - pattern: define_enum_state = config.define_enum_state
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/jax/_src/config.py'
- id: config-value-access-on-state-object
  message: Detected .value access on config state object variable
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.value
  - pattern-inside: '$OBJ = config.define_bool_state(...)

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: tpu-custom-call-mosaic-constant-with-underscore
  message: Detected _MOSAIC_* constant in tpu_custom_call.py - renamed from mosaic_*
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $_MOSAIC_VAR = config.define_bool_state(...)
  - metavariable-pattern:
      metavariable: $_MOSAIC_VAR
      pattern-regex: ^_MOSAIC_.*
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tpu_custom_call.py'
- id: maps-module-spmd-state-objects
  message: Detected SPMD/xmap state object definitions stored in module variables
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $_SPMD_LOWERING = config.define_bool_state(name="experimental_xmap_spmd_lowering",
        ...)
    - pattern: $_SPMD_LOWERING_MANUAL = config.define_bool_state(name="experimental_xmap_spmd_lowering_manual",
        ...)
    - pattern: $_ENSURE_FIXED_SHARDING = config.define_bool_state(name="experimental_xmap_ensure_fixed_sharding",
        ...)
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/maps.py'
- id: tpu-underscore-mosaic-variables-definition
  message: Detected _MOSAIC_* variables (renamed from mosaic_*) in tpu_custom_call.py
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: _MOSAIC_USE_CPP_PASSES = $EXPR
    - pattern: _MOSAIC_ALLOW_HLO = $EXPR
    - pattern: _MOSAIC_DUMP_MLIR = $EXPR
  - pattern-not: mosaic_use_cpp_passes = $EXPR
  - pattern-not: mosaic_allow_hlo = $EXPR
  - pattern-not: mosaic_dump_mlir = $EXPR
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tpu_custom_call.py'
- id: tpu-mosaic-variable-conditional-pattern
  message: Detected conditional check on _MOSAIC_* variables (not old mosaic_* names)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "if _MOSAIC_ALLOW_HLO.value:\n  ...\n"
    - pattern: "if _MOSAIC_USE_CPP_PASSES.value:\n  ...\n"
  - pattern-not: "if mosaic_allow_hlo.value:\n  ...\n"
  - pattern-not: "if mosaic_use_cpp_passes.value:\n  ...\n"
