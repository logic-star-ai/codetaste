- id: tink-keyset-handle-type-not-migrated
  message: Use *keyset.Handle instead of *tink.KeysetHandle - KeysetHandle has been
    moved to go/keyset package as Handle
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func $FUNC(..., $VAR *tink.KeysetHandle, ...) { ... }

        '
    - pattern: 'func $FUNC(...) *tink.KeysetHandle { ... }

        '
    - pattern: 'func $FUNC(...) (*tink.KeysetHandle, ...) { ... }

        '
    - pattern: 'var $VAR *tink.KeysetHandle

        '
