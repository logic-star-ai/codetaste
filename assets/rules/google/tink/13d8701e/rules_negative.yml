rules:
- id: tink-import-with-registry-usage
  message: Registry functions should use 'github.com/google/tink/go/registry' package
    instead of tink package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'import "github.com/google/tink/go/tink"

      ...

      '
  - pattern-either:
    - pattern: tink.RegisterKeyManager(...)
    - pattern: tink.GetKeyManager(...)
    - pattern: tink.NewKeyData(...)
    - pattern: tink.NewKey(...)
    - pattern: tink.Primitive(...)
    - pattern: tink.RegisterKMSClient(...)
    - pattern: tink.GetKMSClient(...)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 104
- id: tink-get-key-manager-not-migrated
  message: Use registry.GetKeyManager() instead of tink.GetKeyManager() - registry
    functionality has been moved to go/registry package
  severity: WARNING
  languages:
  - go
  pattern: tink.GetKeyManager(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
- id: tink-get-key-manager-in-error-check
  message: Use registry.GetKeyManager() instead of tink.GetKeyManager() - registry
    functionality has been moved to go/registry package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$KM, $ERR := tink.GetKeyManager($URL)

      '
  - pattern-not-inside: 'import "github.com/google/tink/go/registry"

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 63
- id: error-check-tink-get-key-manager
  message: Function call should use registry.GetKeyManager() instead of tink.GetKeyManager()
    - registry functionality has been moved to go/registry package
  severity: WARNING
  languages:
  - go
  pattern: "$KM, $ERR := tink.GetKeyManager(...)\nif $ERR != nil {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 63
- id: testkeysethandle-keyset-handle-error-message
  message: Reference to testkeysethandle.KeysetHandle found - use testkeyset.NewHandle()
    instead as package has been renamed and function renamed
  severity: WARNING
  languages:
  - go
  pattern-regex: testkeysethandle\.KeysetHandle
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - '*.go'
    exclude:
    - '*/testkeysethandle/*.go'
    - '*/testkeyset/*.go'
- id: testkeysethandle-keyset-handle-not-migrated
  message: Use testkeyset.NewHandle() instead of testkeysethandle.KeysetHandle() -
    package has been renamed to go/testkeyset and function renamed to NewHandle()
  severity: WARNING
