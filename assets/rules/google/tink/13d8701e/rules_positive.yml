rules:
- id: registry-get-keymanager-call-detected
  message: 'Refactor detected: Call to registry.GetKeyManager found'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $REGISTRY.GetKeyManager(...)
  - metavariable-regex:
      metavariable: $REGISTRY
      regex: ^registry$
  - pattern-not-inside: 'package tink

      ...

      '
  metadata:
    nr_refactored_patterns: 69
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tink/*.go'
  options:
    symbolic_propagation: true
- id: import-registry-package-detected
  message: 'Refactor detected: Import from registry package found'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*/(registry)$
  - pattern-not: import "github.com/google/tink/go/tink"
  metadata:
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tink/registry.go'
    - '**/tink/*.go'
  options:
    symbolic_propagation: true
- id: keyset-handle-dataflow-to-function-call
  message: 'Refactor detected: Handle from keyset package flows to function call'
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $KEYSET.NewHandle(...)
    - metavariable-regex:
        metavariable: $KEYSET
        regex: ^keyset$
  - patterns:
    - pattern: $KEYSET.Read(...)
    - metavariable-regex:
        metavariable: $KEYSET
        regex: ^keyset$
  pattern-sinks:
  - pattern: $FUNC($SINK, ...)
  - pattern: $FUNC(..., $SINK, ...)
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tink/*.go'
  options:
    symbolic_propagation: true
