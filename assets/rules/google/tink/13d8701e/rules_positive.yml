rules:
- id: registry-function-in-error-handling
  message: Detected registry package function in error handling - functions moved
    from tink
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: 'if $ERR := registry.RegisterKeyManager(...); $ERR != nil { ... }

      '
  - pattern: '$VAR, $ERR := registry.GetKeyManager(...)

      if $ERR != nil { ... }

      '
  - pattern: '$VAR, $ERR := registry.NewKeyData(...)

      if $ERR != nil { ... }

      '
  - pattern: '$VAR, $ERR := registry.Primitive(...)

      if $ERR != nil { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 81
    nr_legacy_patterns: 0
