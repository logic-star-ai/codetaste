rules:
- id: ts-module-directive-call
  message: module.directive() calls indicate old AngularJS module system. Use ES6
    class exports instead.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'module.directive($NAME, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: ts-iife-wrapper-in-typescript
  message: IIFE wrapper should be removed from TypeScript files. Use ES6 module exports
    instead.
  severity: WARNING
  languages:
  - typescript
  pattern: "(function() {\n  ...\n})();\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-angular-module-definition-inline
  message: Per-file AngularJS module definitions should be replaced with ES6 exports.
    Remove inline angular.module() declarations.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'var $MODULE = angular.module($NAME, [...]);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-templateurl-string-usage
  message: 'Replace templateUrl with webpack require() using raw-loader: template:
    require(''$URL'')'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'templateUrl: $URL

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-static-components-path-in-templateurl
  message: Template paths should use webpack require() instead of URL strings, and
    components directory should be flattened
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: templateUrl:\s*['"]/(static/components/[^'"]+)['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-iife-with-module-export
  message: Remove IIFE wrapper and replace angular.module with ES6 exports
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "(function() {\n  var $MOD = angular.module(...);\n  ...\n})();\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-var-inside-iife
  message: Remove IIFE and replace 'var' with 'let' or 'const'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "(function() {\n  ...\n  var $VAR = ...;\n  ...\n})();\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-iife-closing-pattern
  message: IIFE closing pattern detected. Remove IIFE wrappers and use ES6 modules.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: ^\}\)\(\);?\s*$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-iife-opening-pattern
  message: IIFE opening pattern detected. Remove IIFE wrappers from TypeScript files
    and use ES6 modules.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: ^\(function\(\)\s*\{\s*$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-var-angular-module-assignment
  message: Remove var declarations for angular.module assignments. Use ES6 exports
    instead of AngularJS modules.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'var $MOD = angular.module(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-component-directory-template-path
  message: Template path references old /static/components/ structure. Update path
    and use webpack require().
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: /static/components/[^/]+/[^.]+\.html
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-static-path-prefix-in-template
  message: Hardcoded /static/ path detected. Consider using webpack require() for
    assets.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: '''/static/'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-template-file-in-components
  message: HTML templates in components/ directory should be moved and loaded via
    webpack raw-loader
  severity: WARNING
  languages:
  - html
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - timesketch/ui/static/components/**/*.html
- id: ts-var-with-module-keyword
  message: Replace 'var module' with ES6 export/import. The 'module' variable indicates
    old AngularJS pattern.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'var module = ...

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-var-inside-function-iife
  message: Remove IIFE wrapper and replace 'var' with 'const' or 'let'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "(function() {\n  ...\n  var $VAR = $VALUE;\n  ...\n})()\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-iife-semicolon-close
  message: IIFE closing pattern })(); detected. Remove IIFE wrappers from TypeScript
    files.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \}\)\(\)\;
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-static-components-in-path-string
  message: Path string referencing 'static/components' detected. Update to new structure.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: static/components/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: ts-components-nested-html
  message: Nested HTML templates in components directory should be relocated and loaded
    via webpack
  severity: WARNING
  languages:
  - html
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - timesketch/ui/static/components/**/**/*.html
- id: ts-old-ui-static-components-directory
  message: Files in timesketch/ui/static/components/ should be moved out of the components
    directory (flatten structure)
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
  paths:
    include:
    - timesketch/ui/static/components/*
- id: ts-components-nested-ts
  message: Nested TypeScript files in components directory should be moved to flattened
    structure
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
  paths:
    include:
    - timesketch/ui/static/components/**/**/*.ts
- id: ts-directive-with-string-array-injection
  message: String-based dependency injection in directives should be replaced with
    ES6 imports
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: module\.directive\([^,]+,\s*\[[^\]]*\]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: ts-module-var-angular-pattern
  message: Replace angular.module pattern with ES6 exports and imports
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'var module = angular.module(...);

    module.$METHOD(...);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: ts-directive-suffix-filename
  message: Directive files with -directive suffix indicate old AngularJS structure.
    Consider renaming to follow Angular 2+ conventions.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - '**/*-directive.ts'
    - timesketch/ui/static/components/**/*-directive.ts
- id: ts-iife-with-import
  message: Remove IIFE wrapper from files with ES6 imports. IIFE is not needed with
    ES6 modules.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "import $MOD from $SRC\n(function() {\n  ...\n})();\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: ts-html-template-components-explore
  message: HTML templates should be loaded via webpack raw-loader, not from components
    directory
  severity: WARNING
  languages:
  - html
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - timesketch/ui/static/components/explore/*.html
- id: ts-templateurl-explore-path
  message: Template URL for explore components should use webpack require() with raw-loader
    instead of URL string
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: templateUrl:\s*['"]/(static/components/explore/[^'"]+\.html)['"]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: ts-old-ui-templates-directory
  message: Templates should be moved from timesketch/ui/templates/ to timesketch/templates/
