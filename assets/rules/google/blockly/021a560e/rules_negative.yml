rules:
- id: dart-generator-side-effect-bracket-notation
  message: 'Remove side effect: export block generator function instead of assigning
    to dartGenerator.forBlock'
  severity: WARNING
  languages:
  - javascript
  pattern: dartGenerator.forBlock[$BLOCK] = $FUNC
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 70
- id: lua-generator-side-effect-bracket-notation
  message: 'Remove side effect: export block generator function instead of assigning
    to luaGenerator.forBlock'
  severity: WARNING
  languages:
  - javascript
  pattern: luaGenerator.forBlock[$BLOCK] = $FUNC
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 70
- id: javascript-generator-side-effect-assignment
  message: 'Remove side effect: export block generator function instead of assigning
    to javascriptGenerator.forBlock'
  severity: WARNING
  languages:
  - javascript
  pattern: javascriptGenerator.forBlock[$BLOCK] = $FUNC
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 70
  paths:
    exclude:
    - tests/**
- id: php-generator-side-effect-bracket-notation
  message: 'Remove side effect: export block generator function instead of assigning
    to phpGenerator.forBlock'
  severity: WARNING
  languages:
