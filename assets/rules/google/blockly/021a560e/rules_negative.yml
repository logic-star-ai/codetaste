- id: generator-class-export-in-top-level-lang-js
  message: Generator class should be moved from generators/{lang}.js to generators/{lang}/{lang}_generator.js
  severity: WARNING
  languages:
  - javascript
  pattern: "export class $GENERATOR extends CodeGenerator {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - generators/dart.js
    - generators/javascript.js
    - generators/lua.js
    - generators/php.js
    - generators/python.js
