- id: dart-generator-reference-in-block-function-body
  message: Function references dartGenerator - refactor to export function and use
    'generator' parameter instead
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-inside: "dartGenerator.forBlock[$BLOCK] = function(...) {\n  ...\n};\n"
  - pattern-either:
    - pattern: dartGenerator.$METHOD(...)
    - pattern: dartGenerator.$FIELD
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 62
  paths:
    include:
    - generators/dart/*.js
- id: javascript-generator-reference-in-block-function-body
  message: Function references javascriptGenerator - refactor to export function and
    use 'generator' parameter instead
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern-inside: "javascriptGenerator.forBlock[$BLOCK] = function(...) {\n  ...\n\
      };\n"
  - pattern-either:
    - pattern: javascriptGenerator.$METHOD(...)
    - pattern: javascriptGenerator.$FIELD
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 62
  paths:
    include:
    - generators/javascript/*.js
    exclude:
    - tests/**
