- id: multiple-export-functions-in-single-module
  message: Multiple exported functions detected in single block generator module
  severity: INFO
  languages:
  - javascript
  pattern-regex: (export\s+function\s+\w+\([^)]*\)\s*\{[\s\S]*?\}[\s\S]*?){5,}
  metadata:
    category: api
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
  paths:
    include:
    - generators/*/math.js
    - generators/*/text.js
    - generators/*/lists.js
    - generators/*/loops.js
