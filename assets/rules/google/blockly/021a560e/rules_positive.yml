rules:
- id: block-generator-function-with-two-params
  message: Exported block generator function with (block, generator) signature detected
  severity: INFO
  languages:
  - javascript
  pattern: 'export function $FNAME(block, generator) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 310
    nr_legacy_patterns: 0
  paths:
    include:
    - generators/*/colour.js
    - generators/*/logic.js
    - generators/*/math.js
    - generators/*/text.js
    - generators/*/lists.js
    - generators/*/loops.js
    - generators/*/procedures.js
    - generators/*/variables.js
    exclude:
    - generators/*/all.js
- id: valuecode-call-in-exported-function
  message: Exported generator function calls generator.valueToCode method
  severity: INFO
  languages:
  - javascript
  pattern: "export function $NAME(block, generator) {\n  ...\n  generator.valueToCode(...)\n\
    \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 150
    nr_legacy_patterns: 0
  paths:
    include:
    - generators/*/colour.js
    - generators/*/math.js
    - generators/*/logic.js
    - generators/*/text.js
- id: generator-use-function-parameter
  message: Exported generator function uses generator parameter instead of global
    instance
  severity: INFO
  languages:
  - javascript
  pattern: "export function $NAME(block, generator) {\n  ...\n  generator.$METHOD(...)\n\
    \  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 143
    nr_legacy_patterns: 0
  paths:
    include:
    - generators/*/colour.js
    - generators/*/math.js
    - generators/*/text.js
- id: no-generator-instance-reference-in-block-module
  message: Block generator modules are side-effect-free with no direct generator instance
    assignments
  severity: INFO
  languages:
  - javascript
  pattern: 'export function $FNAME(...) { ... }

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 115
    nr_legacy_patterns: 0
  paths:
    include:
    - generators/*/colour.js
    - generators/*/logic.js
    - generators/*/math.js
- id: no-side-effect-imports-in-block-modules
  message: Block generator module has no side-effect imports, only exports
  severity: INFO
  languages:
  - javascript
  pattern: 'export function $NAME(...) { ... }

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 115
    nr_legacy_patterns: 0
  paths:
    include:
    - generators/*/colour.js
    - generators/*/math.js
    - generators/*/logic.js
- id: function-returns-array-with-order
  message: Exported generator function returns code with Order enum value
  severity: INFO
  languages:
  - javascript
  pattern: "export function $NAME(...) {\n  ...\n  return [$CODE, Order.$ORD];\n}\n"
