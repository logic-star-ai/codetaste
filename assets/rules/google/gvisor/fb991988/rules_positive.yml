  - go
  pattern-regex: pgalloc\.MemoryFile
  metadata:
    category: other
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
- id: kernel-memoryfile-method-call
  message: Detected call to Kernel.MemoryFile() method
  severity: INFO
  languages:
  - go
  pattern: '$KERNEL.MemoryFile()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
- id: pgalloc-package-level-function
  message: Detected function definition in pgalloc package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: 'package pgalloc

      ...

      '
  - pattern: 'func $FUNC(...) { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
