rules:
- id: memory-file-page-operations
  message: Detected page-related operations in pgalloc
  severity: INFO
  languages:
  - go
  pattern-regex: (?i).*(page|Page).*
  metadata:
    nr_refactored_patterns: 174
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: memory-file-if-statements
  message: Detected if statements in pgalloc
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "if $COND {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 97
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: kernel-struct-mfp-usage
  message: Detected usage of mfp field in kernel struct
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $K.mfp
    - pattern: $K.mfp.$METHOD(...)
  - pattern-not-inside: 'package platform

      ...

      '
  metadata:
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-method-call-chain
  message: Detected MemoryFileProvider.MemoryFile() call chain
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PROVIDER.MemoryFile()
    - pattern: $PKG.$FUNC($CTX).MemoryFile()
  - pattern-not-inside: '$P.Memory()

      ...

      '
  metadata:
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-error-nil-check
  message: Detected error nil check in pgalloc
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "if $ERR != nil {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: memory-file-comment-doc
  message: Detected MemoryFile in documentation
  severity: INFO
  languages:
  - go
  pattern-regex: (?i)//.*MemoryFile.*
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: memory-file-variable-usage
  message: Detected variable named similar to memory file
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $VAR.$METHOD(...)
  - metavariable-regex:
      metavariable: $VAR
      regex: (?i)^(mf|memFile|memoryFile)$
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)^(Allocate|DecRef|IncRef|MapInternal|Decommit|UpdateUsage|TotalUsage|TotalSize|FD|SaveTo|LoadFrom|Destroy)$
  - pattern-not: $P.Memory().$M(...)
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-field-access
  message: Detected field access on MemoryFile
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $MF.$FIELD
  - pattern-inside: '$MF := $OBJ.MemoryFile()

      ...

      '
  - pattern-not: $P.Memory().$F
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-from-kernel
  message: Detected MemoryFile accessed from kernel and used in operations
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $KERNEL.MemoryFile()
  pattern-sinks:
  - pattern-either:
    - pattern: $SINK.Allocate(...)
    - pattern: $SINK.DecRef(...)
    - pattern: $SINK.IncRef(...)
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: pgalloc-import-statement-full
  message: Detected full pgalloc import path
  severity: INFO
  languages:
  - go
  pattern: import "gvisor.googlesource.com/gvisor/pkg/sentry/pgalloc"
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: mm-with-memory-file
  message: Detected memory manager using MemoryFile
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $MF.$METHOD(...)
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)^(Allocate|DecRef|IncRef|MapInternal|Decommit)$
  - pattern-inside: '$MF := $OBJ.MemoryFile()

      ...

      '
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-fmt-usage
  message: Detected fmt usage in pgalloc
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: fmt.$METHOD(...)
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: no-platform-memory-method-calls
  message: Detected absence of old Platform.Memory() pattern with new pattern present
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.$METHOD($CTX)
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i).*(MemoryFile|GetMemory).*
  - pattern-not: $PLATFORM.Memory()
  - pattern-not: platform.FromContext($CTX).Memory()
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: context-memfile-propagation
  message: Detected memory file provider obtained from context and used
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $PKG.MemoryFileProviderFromContext($CTX)
  pattern-sinks:
  - pattern: $SINK.$METHOD(...)
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-taint-from-provider
  message: Detected MemoryFile obtained from provider flowing to operations
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $PROVIDER.MemoryFile()
  pattern-sinks:
  - pattern: $SINK.Allocate(...)
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-inline-call
  message: Detected inline MemoryFile call in expression
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $FUNC(..., $PROVIDER.MemoryFile(), ...)
  - pattern-not: $F(..., $P.Memory(), ...)
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-syscall-usage
  message: Detected syscall usage in MemoryFile
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: syscall.$FUNC(...)
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: memory-file-log-usage
  message: Detected log usage in pgalloc
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: log.$METHOD(...)
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: memory-file-provider-from-context-call
  message: Detected call to MemoryFileProviderFromContext (new context access pattern)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.MemoryFileProviderFromContext($CTX)
  - pattern-not: platform.FromContext($CTX)
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-provider-field-in-struct
  message: Detected mfp field or similar in struct (memory file provider)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $STRUCT struct {\n  ...\n  $FIELD $TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FIELD
      regex: (?i).*(mfp|memoryFileProvider|memFile).*
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*Memory.*File.*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-return-with-error
  message: Detected return statement with MemoryFile and error
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: return $MF, $ERR
  - pattern-inside: "func $FUNC(...) (*$TYPE, error) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^.*MemoryFile$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-taint-to-mapinternal
  message: Detected MemoryFile flowing to MapInternal operation
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $PROVIDER.MemoryFile()
  pattern-sinks:
  - pattern: $SINK.MapInternal($FR, $AT)
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: pgalloc-package-files-exist
  message: Detected file in pgalloc package directory
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
    exclude:
    - '**/filemem/*.go'
- id: memory-file-return-tuple
  message: Detected MemoryFile method returning tuple
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($MF *$TYPE) $METHOD(...) ($R1, $R2) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^.*MemoryFile$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: pgalloc-package-declaration
  message: Detected package declaration for pgalloc
  severity: INFO
  languages:
  - go
  pattern: package pgalloc
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: memory-file-type-definitions
  message: Detected type definitions in pgalloc
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: type $NAME $TYPE
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: memory-file-copyright
  message: Detected copyright header in pgalloc files
  severity: INFO
  languages:
  - go
  pattern-regex: ^// Copyright.*Google.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: memory-file-type-declaration
  message: Detected MemoryFile type declaration or usage
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: type $NAME struct { ... }
    - pattern: var $VAR *$TYPE
    - pattern: 'func $FUNC(...) *$TYPE { ... }

        '
    - pattern: $VAR := &$TYPE{...}
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^((?!.*FileMem).)*MemoryFile.*$
  - pattern-not-inside: 'package filemem

      ...

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: pgalloc-package-comment
  message: Detected package comment mentioning pgalloc
  severity: INFO
  languages:
  - go
  pattern-regex: (?i)//.*pgalloc.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
  options:
    symbolic_propagation: true
- id: pgalloc-constant-or-variable
  message: Detected package-level constant or variable in pgalloc context
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pgalloc/*.go'
    exclude:
    - '**/pgalloc/*_test.go'
  options:
    symbolic_propagation: true
- id: memory-file-return-error
  message: Detected MemoryFile method returning error
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($MF *$TYPE) $METHOD(...) error {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^.*MemoryFile$
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)^(SaveTo|LoadFrom|UpdateUsage|Decommit)$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-provider-interface-usage
  message: Detected MemoryFileProvider interface definition or implementation
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "type $INTERFACE interface {\n  ...\n  MemoryFile() *$TYPE\n  ...\n\
        }\n"
    - pattern: 'func ($RECV $T) MemoryFile() *$TYPE { ... }

        '
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*Memory.*File.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-update-usage-call
  message: Detected UpdateUsage call on memory file
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.UpdateUsage()
  - pattern-not: $PLATFORM.Memory().UpdateUsage()
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-struct-field
  message: Detected MemoryFile as struct field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $STRUCT struct {\n  ...\n  $FIELD *$TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^((?!FileMem).)*MemoryFile.*$
  - pattern-not-inside: 'package filemem

      ...

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-provider-return
  message: Detected function returning MemoryFileProvider
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(...) $TYPE {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^.*MemoryFileProvider.*$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-provider-from-context-usage
  message: Detected MemoryFileProviderFromContext with result usage
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$PROVIDER := $PKG.MemoryFileProviderFromContext($CTX)

      ...

      $PROVIDER.$METHOD()

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-state-methods
  message: Detected state methods on MemoryFile (SaveTo/LoadFrom)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func ($MF *$TYPE) SaveTo(...) error { ... }

        '
    - pattern: 'func ($MF *$TYPE) LoadFrom(...) error { ... }

        '
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^.*MemoryFile$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: kernel-set-memory-file-method
  message: Detected SetMemoryFile method on Kernel
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func ($K *$KTYPE) SetMemoryFile($ARG *$MTYPE) { ... }

      '
  - metavariable-regex:
      metavariable: $KTYPE
      regex: (?i).*Kernel.*
  - metavariable-regex:
      metavariable: $MTYPE
      regex: (?i).*Memory.*File.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: memory-file-load-from
