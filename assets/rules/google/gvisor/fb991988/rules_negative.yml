  - go
  pattern: '$MEM := $PLATFORM.Memory()

    ...

    $MEM.IncRef(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: return-platform-memory-simple
  message: Function returns platform.Memory - refactor to return pgalloc.MemoryFile
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(...) platform.Memory

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: filemem-package-dot-new
  message: Function moved from filemem.New to pgalloc.New
  severity: WARNING
  languages:
  - go
  pattern: filemem.New(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: platform-allocateandfill-usage
