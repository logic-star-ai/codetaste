  severity: WARNING
  languages:
  - go
  pattern: '$MEM := $PLATFORM.Memory()

    ...

    $MEM.Allocate(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: platform-memory-stored-then-incref
