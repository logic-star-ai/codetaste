  - go
  pattern: "func ($R $T) Memory() $RET {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: platform-memory-stored-in-variable
  message: Old pattern - Platform.Memory() removed, use context-based memory file
