rules:
- id: filemem-in-error-message
  message: Update error message or string - filemem renamed to pgalloc, FileMem to
    MemoryFile
  severity: INFO
  languages:
  - go
  pattern-regex: filemem|FileMem
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 70
  paths:
    include:
    - '*.go'
- id: platform-memory-method-call
  message: Platform.Memory() method removed - access memory file through context or
    kernel directly
  severity: WARNING
  languages:
  - go
  pattern: '$P.Memory()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: filemem-type-literal
  message: Type renamed from FileMem to MemoryFile
  severity: INFO
  languages:
  - go
  pattern-regex: \bFileMem\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
- id: kernel-with-platform-memory-access
  message: Kernel should not access memory through platform - use Kernel.MemoryFile()
    instead
  severity: WARNING
  languages:
  - go
  pattern: '$KERNEL.$PLATFORM.Memory()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: platform-memory-k-p-pattern
  message: Memory accessed through nested platform field - refactor to use Kernel.MemoryFile()
  severity: WARNING
  languages:
  - go
  pattern: '$K.$P.Memory()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: method-with-platform-receiver-memory-call
  message: Method accesses Memory() through platform field - refactor to use context
    or kernel
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) $METHOD(...) {\n  ...\n  $RECV.$FIELD.Memory()\n \
    \ ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: platform-memory-variable-assignment
  message: Old pattern - Platform.Memory() removed, access memory through context
  severity: WARNING
  languages:
  - go
  pattern: '$MEM := $PLATFORM.Memory()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: platform-memory-short-variable-assignment
  message: Old pattern - Platform.Memory() removed, access memory through context
  severity: WARNING
  languages:
  - go
  pattern: '$MEM = $PLATFORM.Memory()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: platform-memory-with-assignment
  message: Platform.Memory() removed - use context-based memory file access
  severity: WARNING
  languages:
  - go
  pattern: '$VAR = $PLATFORM.Memory()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: platform-memory-temp-variable
  message: Platform.Memory() removed - use context-based memory file access
  severity: WARNING
  languages:
  - go
  pattern: 'mem := $PLATFORM.Memory()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: platform-memory-assignment-from-field
  message: Memory accessed through platform field - refactor to use context or kernel
  severity: WARNING
  languages:
  - go
  pattern: '$MEM := $STRUCT.$FIELD.Memory()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: receiver-p-field-memory
  message: Method accesses memory through platform field - refactor to use context
    or kernel
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) $METHOD(...) {\n  ...\n  $RECV.p.Memory()\n  ...\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: multiple-memory-calls-from-platform
  message: Platform.Memory() removed - refactor to use context-based memory access
  severity: WARNING
  languages:
  - go
  pattern: '$P.Memory()

    ...

    $P.Memory()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: platform-var-p-memory-call
  message: Platform.Memory() removed - use context-based memory file access
  severity: WARNING
  languages:
  - go
  pattern: 'p.Memory()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: receiver-platform-field-memory
  message: Method accesses memory through platform field - refactor to use context
    or kernel
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) $METHOD(...) {\n  ...\n  $RECV.platform.Memory()\n\
    \  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: comment-implements-platform-memory
  message: Update comment - platform.Memory interface removed
  severity: INFO
  languages:
  - go
  pattern-regex: implements.*platform\.Memory
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: platform-memory-allocate
  message: Old pattern - replace $PLATFORM.Memory().Allocate() with memory file access
    through context
  severity: WARNING
  languages:
  - go
  pattern: $PLATFORM.Memory().Allocate(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: platform-memory-decref
  message: Old pattern - replace $PLATFORM.Memory().DecRef() with memory file access
    through context
  severity: WARNING
  languages:
  - go
  pattern: $PLATFORM.Memory().DecRef(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: platform-memory-passed-as-arg
  message: Platform.Memory() removed - pass memory file through context or as explicit
    parameter
  severity: WARNING
  languages:
  - go
  pattern: $FUNC(..., $PLATFORM.Memory(), ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: nested-memory-call-second-arg
  message: Platform.Memory() removed - pass memory file from context instead
  severity: WARNING
  languages:
  - go
  pattern: $FUNC(..., $PLATFORM.Memory(), ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: allocate-with-platform-memory
  message: Old pattern - Platform.Memory() removed, use context-based memory file
    access
  severity: WARNING
  languages:
  - go
  pattern: '$VAR, $ERR := $P.Memory().Allocate(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: memory-call-in-print-statement
  message: Platform.Memory() in print/log statement - refactor or remove
  severity: WARNING
  languages:
  - go
  pattern: '$PRINT(..., $P.Memory(), ...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: filemem-package-reference-in-comment
  message: Update documentation - type renamed from filemem.FileMem to pgalloc.MemoryFile
  severity: INFO
  languages:
  - go
  pattern-regex: filemem\.FileMem
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*.go'
- id: platform-memory-parameter
  message: platform.Memory interface removed - use pgalloc.MemoryFile type
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(..., $PARAM platform.Memory, ...) { ... }

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: platform-memory-stored-then-mapinternal
  message: Old pattern - Platform.Memory() removed, use context-based memory file
    access
  severity: WARNING
  languages:
  - go
  pattern: '$MEM := $PLATFORM.Memory()

    ...

    $MEM.MapInternal(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: param-mem-platform-memory
  message: Function parameter of type platform.Memory - refactor to pgalloc.MemoryFile
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(..., mem platform.Memory, ...) { ... }

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: memory-file-range-operations
  message: Old pattern - Platform.Memory() removed, use context-based memory file
    access
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := $P.Memory()

    ...

    $VAR.$METHOD($FR)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-filemem-package-import
  message: Old import detected - package moved from platform/filemem to pgalloc
  severity: WARNING
  languages:
  - go
  pattern: import "gvisor.googlesource.com/gvisor/pkg/sentry/platform/filemem"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: platform-parameter-memory-call
  message: Platform.Memory() method removed - refactor to use context-based memory
    access
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(..., $P platform.Platform, ...) {\n  ...\n  $P.Memory()\n \
    \ ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: filemem-import-in-build-file
  message: Package moved from platform/filemem to pgalloc
  severity: WARNING
  languages:
  - generic
  pattern-regex: platform/filemem
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - BUILD
    - '*.bazel'
    - '*.bzl'
- id: old-filemem-import-with-quotes
  message: Old import path - package moved from platform/filemem to pgalloc
  severity: WARNING
  languages:
  - go
  pattern-regex: '"gvisor\.googlesource\.com/gvisor/pkg/sentry/platform/filemem"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: filemem-in-package-comment
  message: Update documentation - package moved to pgalloc
  severity: INFO
  languages:
  - go
  pattern-regex: platform/filemem
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: platform-param-name-p-memory-call
  message: Platform parameter 'p' uses Memory() method - refactor to use context-based
    memory access
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(..., p platform.Platform, ...) {\n  ...\n  p.Memory()\n  ...\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: filemem-import-statement-block
  message: Old import - package moved to pkg/sentry/pgalloc
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"gvisor.googlesource.com/gvisor/pkg/sentry/platform/filemem\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: memory-decref-on-error
  message: Old pattern - Platform.Memory() removed, use context-based memory file
    access
  severity: WARNING
  languages:
  - go
  pattern: "if $ERR != nil {\n  ...\n  $P.Memory().DecRef(...)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: filemem-type-reference
  message: Type renamed from filemem.FileMem to pgalloc.MemoryFile
  severity: WARNING
  languages:
  - go
  pattern: filemem.FileMem
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: platform-memory-return-type
  message: platform.Memory interface removed - use pgalloc.MemoryFile type
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(...) platform.Memory { ... }

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: platform-memory-mapinternal
  message: Old pattern - replace $PLATFORM.Memory().MapInternal() with memory file
    access through context
  severity: WARNING
  languages:
  - go
  pattern: $PLATFORM.Memory().MapInternal(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: platform-allocateandfill-call
  message: AllocateAndFill moved to pgalloc package
  severity: WARNING
  languages:
  - go
  pattern: platform.AllocateAndFill($MEM, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: filemem-qualified-reference
  message: Type renamed from filemem.FileMem to pgalloc.MemoryFile
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: filemem.FileMem
  - pattern: '*filemem.FileMem'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: memory-from-platform-context
  message: Old pattern - use pgalloc.MemoryFileProviderFromContext instead of platform.FromContext
  severity: WARNING
  languages:
  - go
  pattern: '$P := platform.FromContext($CTX)

    ...

    $P.Memory()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: filemem-new-call
  message: Package moved - use pgalloc.New() instead of filemem.New()
  severity: WARNING
  languages:
  - go
  pattern: filemem.New(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: return-platform-memory
  message: platform.Memory interface removed - return pgalloc.MemoryFile type instead
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(...) platform.Memory {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: memory-interface-method-in-impl
  message: Memory() method should be removed from platform implementations
  severity: WARNING
