  languages:
  - go
  pattern: "func ($RECV *$TYPE) Memory() platform.Memory {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: platform-memory-method-on-value
