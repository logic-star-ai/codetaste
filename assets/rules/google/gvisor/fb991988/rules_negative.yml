  - go
  pattern: platform.AllocateAndFill(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nested-memory-call-in-expression
  message: Platform.Memory() removed - pass memory file from context instead
  severity: WARNING
  languages:
  - go
  pattern: $FUNC($PLATFORM.Memory(), ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: memory-method-implementation-comment
  message: Update comment - Memory() method removed from Platform interface
  severity: INFO
  languages:
  - go
  pattern-regex: Memory\(\).*platform\.Memory
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: build-filemem-dependency
