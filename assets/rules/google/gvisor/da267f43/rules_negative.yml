rules:
- id: buffer-pkg-dot-access
  message: Reference to old buffer package types or functions. Replace buffer.X with
    bufferv2.X
  severity: ERROR
  languages:
  - go
  pattern-regex: \bbuffer\.(View|Buffer|NewWithData|Range)\b
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 330
- id: buffer-newwithdata-usage
  message: Old buffer.NewWithData() detected. In bufferv2, use bufferv2.MakeWithData()
    or create a View with NewViewWithData()
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData($DATA)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 260
- id: buffer-package-reference-newwithdata
  message: Reference to old buffer package NewWithData. Use bufferv2.MakeWithData()
    or NewViewWithData()
  severity: ERROR
  languages:
  - go
  pattern-either:
  - pattern: buffer.NewWithData(...)
  - pattern: 'import $PKG "gvisor.dev/gvisor/pkg/buffer"

      ...

      $PKG.NewWithData(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 260
- id: buffer-newwithdata-variable
  message: buffer.NewWithData() with variable. Replace with bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData($VAR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 260
- id: packetbuffer-payload-newwithdata
  message: PacketBuffer Payload using old buffer.NewWithData(). Replace with bufferv2.MakeWithData()
    or NewViewWithData()
  severity: ERROR
  languages:
  - go
  pattern: 'Payload: buffer.NewWithData($DATA)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 132
- id: buffer-function-call-result
  message: buffer.NewWithData() with function call result. Replace with bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData($FUNC(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 107
- id: newpacketbuffer-payload-buffer
  message: NewPacketBuffer with old buffer.NewWithData() in Payload. Replace with
    bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: 'stack.NewPacketBuffer(stack.PacketBufferOptions{Payload: buffer.NewWithData($DATA)})

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 79
- id: buffer-pkt-options-with-buffer
  message: PacketBufferOptions with old buffer.NewWithData() in Payload. Replace with
    bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: 'stack.PacketBufferOptions{Payload: buffer.NewWithData(...)}

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 79
- id: buffer-qualified-type-buffer
  message: Reference to buffer.Buffer type. Replace with bufferv2.Buffer
  severity: ERROR
  languages:
  - go
  pattern-regex: \bbuffer\.Buffer\b
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 67
- id: old-buffer-import-quoted
  message: Old buffer package import detected. Replace with 'gvisor.dev/gvisor/pkg/bufferv2'
  severity: ERROR
  languages:
  - go
  pattern: 'import "gvisor.dev/gvisor/pkg/buffer"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 63
- id: old-buffer-import-parenthesized
  message: Old buffer package import detected in import block. Replace with 'gvisor.dev/gvisor/pkg/bufferv2'
  severity: ERROR
  languages:
  - go
  pattern-regex: ^\s*"gvisor\.dev/gvisor/pkg/buffer"\s*$
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 63
  paths:
    include:
    - '*.go'
- id: buffer-import-without-alias
  message: Old buffer package import without alias. Replace with 'gvisor.dev/gvisor/pkg/bufferv2'
  severity: ERROR
  languages:
  - go
  pattern-regex: ^\s*"gvisor\.dev/gvisor/pkg/buffer"\s*$
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 63
  paths:
    include:
    - '*.go'
- id: buffer-newwithdata-append
  message: buffer.NewWithData() with append(). Replace with bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData(append(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
- id: buffer-newwithdata-concatenation
  message: buffer.NewWithData() with slice concatenation using append. Replace with
    bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData(append($SLICE1, $SLICE2...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
- id: buffer-newwithdata-method-call
  message: buffer.NewWithData() with method call result. Replace with bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData($OBJ.$METHOD())
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: buffer-newwithdata-view-call
  message: buffer.NewWithData() with View() call. In bufferv2, use MakeWithData()
    or create View directly
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData($HDR.View())
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: buffer-newwithdata-header-view
  message: buffer.NewWithData() with header View() call. Replace with bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData($HEADER.View())
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: buffer-newwithdata-hdr-view
  message: buffer.NewWithData(hdr.View()). Replace with bufferv2.MakeWithData(hdr.View())
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData(hdr.View())
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: buffer-newwithdata-buf-var
  message: buffer.NewWithData(buf) - common variable name. Replace with bufferv2.MakeWithData(buf)
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData(buf)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: buffer-import-in-tests
  message: Test file importing old buffer package. Replace with bufferv2
  severity: ERROR
  languages:
  - go
  pattern-regex: ^\s*"gvisor\.dev/gvisor/pkg/buffer"\s*$
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
  paths:
    include:
    - '*_test.go'
- id: buffer-newwithdata-slice-literal
  message: buffer.NewWithData() with byte slice literal. Replace with bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: buffer.NewWithData([]byte{...})
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: buffer-newwithdata-multiline-literal
  message: buffer.NewWithData() with multiline byte slice literal. Replace with bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: "buffer.NewWithData([]byte{\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: buffer-newwithdata-in-assignment
  message: Assignment using buffer.NewWithData(). Replace with bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: '$VAR = buffer.NewWithData($DATA)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: buffer-buffer-declaration-newwithdata
  message: Variable declaration using old buffer.NewWithData(). Use bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: '$VAR := buffer.NewWithData($DATA)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: injectinbound-payload-buffer
  message: InjectInbound with old buffer.NewWithData() in Payload. Replace with bufferv2.MakeWithData()
  severity: ERROR
  languages:
  - go
  pattern: '$E.InjectInbound($PROTO, stack.NewPacketBuffer(stack.PacketBufferOptions{Payload:
    buffer.NewWithData($DATA)}))

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: buffer-buffer-construction
  message: Old buffer.Buffer construction detected. In bufferv2, use MakeWithData()
    or MakeWithView()
  severity: ERROR
  languages:
  - go
  pattern: buffer.Buffer{}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: buffer-empty-literal
  message: Empty buffer.Buffer{} literal. Replace with bufferv2.Buffer{}
  severity: ERROR
  languages:
  - go
  pattern: buffer.Buffer{}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: buffer-buffer-type-declaration
  message: Old buffer.Buffer type detected. Replace with bufferv2.Buffer and add proper
    Release() calls
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern: 'var $VAR buffer.Buffer

      '
  - pattern-not: 'var $VAR bufferv2.Buffer

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: buffer-variable-declaration-buffer
  message: Variable declared with old buffer.Buffer type. Replace with bufferv2.Buffer
    and add Release() calls
  severity: ERROR
  languages:
  - go
  pattern: 'var $VAR buffer.Buffer

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: buffer-as-function-arg-newwithdata
  message: Function call with old buffer.NewWithData() as argument. Replace with bufferv2.MakeWithData()
