- id: ktime-path-not-under-kernel-time
  message: Detected new ktime path not under kernel/time
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-regex: pkg/sentry/ktime
  - pattern-not-regex: pkg/sentry/kernel/time
  metadata:
    category: structural
    nr_refactored_patterns: 69
    nr_legacy_patterns: 0
- id: ktime-new-import-path-full
  message: Detected import of new ktime package location (refactored from pkg/sentry/kernel/time)
