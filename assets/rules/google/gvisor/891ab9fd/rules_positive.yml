  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: import "gvisor.dev/gvisor/pkg/sentry/ktime"
    - patterns:
      - pattern: "import (\n  ...\n  \"gvisor.dev/gvisor/pkg/sentry/ktime\"\n  ...\n\
          )\n"
