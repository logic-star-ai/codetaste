  severity: WARNING
  languages:
  - go
  pattern: "func $FN(...) versionedSchema {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: service-type-in-comments
  message: Comment referencing 'Service' type should be updated to reference 'Raft'
  severity: INFO
  languages:
  - go
  pattern-regex: //.*\bService\b.*abstracts away.*Raft
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: store-test-file-should-be-split
  message: Monolithic store_test.go should be split into separate test files matching
    split source files
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/store_test.go
- id: common-error-variable
  message: Common error variable should be moved to cluster/types package
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: var errBadRequest = ...
  - pattern: var errNotFound = ...
  - pattern: var errNotLeader = ...
  - pattern: var errNotOpen = ...
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/*.go
- id: store-apply-method-in-monolithic-file
  message: Apply method should be extracted to store_apply.go
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *Store) Apply($LOG *raft.Log) interface{} {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/store.go
- id: store-snapshot-method-in-monolithic-file
