  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/service.go
- id: old-store-single-file
  message: Monolithic store.go should be split into store.go, store_apply.go, store_cluster_rpc.go,
    store_query.go, and store_snapshot.go
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/store.go
- id: versioned-schema-type
  message: Type 'versionedSchema' should be renamed to 'VersionedSchemaReader'
  severity: WARNING
  languages:
  - go
  pattern: "type versionedSchema struct {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: versioned-schema-field
  message: Struct field of type 'versionedSchema' should be changed to 'VersionedSchemaReader'
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  $FIELD versionedSchema\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: store-package-declaration-bootstrap
  message: Package 'store' should be 'bootstrap' after extraction to cluster/bootstrap/
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package store$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/bootstrap.go
- id: rpc-package-declaration-resolver
  message: Package 'rpc' should be 'resolver' after extraction to cluster/resolver/
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package rpc$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/rpc/rpc_resolver.go
- id: server-name-2-port-map-field
  message: Field 'ServerName2PortMap' should be renamed to 'NodeNameToPortMap'
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  ServerName2PortMap $MAPTYPE\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: address-resolver-interface-old-name
  message: Interface 'addressResolver' should be renamed to 'NodeToAddressResolver'
  severity: WARNING
  languages:
  - go
  pattern: type addressResolver interface { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: address-resolver-field
  message: Field type 'addressResolver' should be changed to 'NodeToAddressResolver'
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  AddrResolver addressResolver\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rpc-resolver-type
  message: Type 'rpcResolver' should be extracted to cluster/resolver package
  severity: WARNING
  languages:
  - go
  pattern: type rpcResolver struct { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: addr-resolver-type
  message: Type 'addrResolver' should be extracted to cluster/resolver or cluster/types
