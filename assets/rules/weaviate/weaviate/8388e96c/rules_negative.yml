rules:
- id: old-error-bad-request
  message: errBadRequest should be defined in cluster/types package
  severity: WARNING
  languages:
  - go
  pattern: errBadRequest
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
  paths:
    include:
    - cluster/store/*.go
- id: store-field-reference-service
  message: Direct store field access in Service (should be Raft) - verify encapsulation
    after refactoring
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: $VAR.store
  - pattern: $RECV.store
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    include:
    - cluster/store/service.go
- id: schema-struct-methods
  message: schema type methods should be in cluster/schema package
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *schema) $METHOD(...) $RET {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    include:
    - cluster/store/schema.go
- id: retry-schema-in-store-package
  message: retrySchema methods should be in cluster/schema package with SchemaReader
    type
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV retrySchema) $METHOD(...) $RET {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - cluster/store/retry_schema.go
- id: importing-old-bootstrap-path
  message: Consider importing from cluster/bootstrap instead of cluster/store for
    bootstrap functionality
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: import "github.com/weaviate/weaviate/cluster/store"
  - pattern: import $ALIAS "github.com/weaviate/weaviate/cluster/store"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: import-store-for-schema
  message: Consider importing from cluster/schema or cluster/bootstrap instead of
    cluster/store after refactoring
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: "import (\n  ...\n  $PKG \"github.com/weaviate/weaviate/cluster/store\"\
      \n  ...\n)\n"
  - pattern: 'import "github.com/weaviate/weaviate/cluster/store"

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: error-definition-in-store
  message: Error definitions should be centralized in cluster/types package
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: var $ERR = errors.New(...)
  - pattern: var $ERR = fmt.Errorf(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - cluster/store/*.go
- id: mock-in-store-test-file
  message: Mock types should be extracted to usecases/fakes/ for reusability
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: type MockStore struct { ... }
  - pattern: type MockLogger struct { ... }
  - pattern: type MockAddressResolver struct { ... }
  - pattern: type MockIndexer struct { ... }
  - pattern: type MockParser struct { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - cluster/store/store_test.go
- id: store-package-declaration-schema
  message: Package 'store' should be 'schema' after extraction to cluster/schema/
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package store$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - cluster/store/schema.go
    - cluster/store/retry_schema.go
    - cluster/store/retry_schema_with_version.go
    - cluster/store/schema_version.go
- id: server-name-2-port-map-usage
  message: Reference to 'ServerName2PortMap' should be updated to 'NodeNameToPortMap'
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $VAR.ServerName2PortMap
  - pattern: ServerName2PortMap
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: schema-reader-method-old-return-type
  message: SchemaReader() method should return 'SchemaReader' type instead of 'retrySchema'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'func ($RECV $TYPE) SchemaReader() retrySchema { ... }

      '
  - pattern-not: 'func ($RECV $TYPE) SchemaReader() SchemaReader { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: retry-schema-as-return-type
  message: Function returning 'retrySchema' should return 'SchemaReader' instead
  severity: WARNING
  languages:
  - go
  pattern: "func $FN(...) retrySchema {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: retry-schema-return-in-function
  message: Function returning retrySchema should return SchemaReader instead
  severity: WARNING
  languages:
  - go
  pattern: "func $FN(...) retrySchema {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: config-log-level-access
  message: LogLevel config field access should be removed after config consolidation
  severity: WARNING
  languages:
  - go
  pattern: $VAR.LogLevel
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - cluster/store/*.go
- id: cluster-bootstrap-not-extracted
  message: Bootstrap logic should be extracted to cluster/bootstrap/ package
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/bootstrap.go
- id: cluster-bootstrap-test-not-extracted
  message: Bootstrap test should be moved to cluster/bootstrap/ package
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/bootstrap_test.go
- id: cluster-schema-not-extracted
  message: Schema logic should be extracted to cluster/schema/ package
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/schema.go
- id: cluster-schema-test-not-extracted
  message: Schema tests should be moved to cluster/schema/ package
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/schema_test.go
- id: cluster-retry-schema-not-extracted
  message: Schema reader (retry_schema) should be extracted to cluster/schema/ package
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/retry_schema.go
- id: cluster-versioned-schema-not-extracted
  message: Versioned schema reader should be extracted to cluster/schema/ package
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/retry_schema_with_version.go
- id: cluster-schema-version-not-extracted
  message: Schema version logic should be moved to cluster/schema/ package
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/schema_version.go
- id: cluster-rpc-resolver-not-extracted
  message: RPC resolver should be extracted to cluster/resolver/ package
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/rpc/rpc_resolver.go
- id: cluster-rpc-resolver-test-not-extracted
  message: RPC resolver tests should be moved to cluster/resolver/ package
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/rpc/rpc_resolver_test.go
- id: old-service-type-declaration
  message: Type 'Service' should be renamed to 'Raft' for clearer intent
  severity: WARNING
  languages:
  - go
  pattern: "type Service struct {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/service.go
- id: old-retry-schema-type
  message: Type 'retrySchema' should be renamed to 'SchemaReader'
  severity: WARNING
  languages:
  - go
  pattern: "type retrySchema struct {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/retry_schema.go
- id: old-service-file-location
  message: Service endpoints should be split into raft.go, raft_cluster_endpoints.go,
