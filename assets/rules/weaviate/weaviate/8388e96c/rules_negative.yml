  severity: WARNING
  languages:
  - go
  pattern: type addrResolver struct { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: log-level-in-raft-config
  message: LogLevel field should be removed from RAFT config as part of consolidation
  severity: WARNING
  languages:
  - go
  pattern: "type $CONFIG struct {\n  ...\n  LogLevel $TYPE\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cluster/store/store.go
- id: log-json-format-in-raft-config
  message: LogJSONFormat field should be removed from RAFT config as part of consolidation
  severity: WARNING
  languages:
  - go
  pattern: "type $CONFIG struct {\n  ...\n  LogJSONFormat $TYPE\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
