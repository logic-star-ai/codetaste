rules:
- id: golang-package-main-in-subdir
  message: File in subcommand/trigger subdirectory declares package main. After consolidation,
    these files should not exist.
  severity: WARNING
  languages:
  - go
  pattern: package main
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
  paths:
    include:
    - plugins/buildpacks/src/subcommands/*/*.go
    - plugins/config/src/subcommands/*/*.go
    - plugins/network/src/subcommands/*/*.go
    - plugins/repo/src/subcommands/*/*.go
    - plugins/resource/src/subcommands/*/*.go
    - plugins/buildpacks/src/triggers/*/*.go
    - plugins/config/src/triggers/*/*.go
    - plugins/network/src/triggers/*/*.go
    - plugins/repo/src/triggers/*/*.go
    - plugins/resource/src/triggers/*/*.go
- id: golang-trigger-common-package-usage
  message: Individual trigger calls common package function. Should be in consolidated
    triggers.go.
  severity: WARNING
  languages:
  - go
  pattern: common.$FUNC(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
  paths:
    include:
    - plugins/*/src/triggers/*/*.go
- id: golang-subcommand-dereference-flag-value
  message: Subcommand dereferences flag pointer. Flag handling should be in consolidated
    subcommands.go.
  severity: WARNING
  languages:
  - go
  pattern: '*$FLAG

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
  paths:
    include:
    - plugins/*/src/subcommands/*/*.go
- id: golang-plugin-individual-subcommand-main-function
  message: Individual subcommand file with main() detected. Should be consolidated
    into single src/subcommands/subcommands.go with routing logic.
  severity: WARNING
  languages:
  - go
  pattern: "package main\n...\nfunc main() {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - plugins/*/src/subcommands/*/*.go
- id: golang-plugin-individual-trigger-main-function
  message: Individual trigger file with main() detected. Should be consolidated into
    single src/triggers/triggers.go with routing logic.
  severity: WARNING
  languages:
  - go
  pattern: "package main\n...\nfunc main() {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - plugins/*/src/triggers/*/*.go
- id: golang-plugin-subcommand-file-in-subdirectory
  message: Individual subcommand .go file exists in subdirectory. Should be removed
    after consolidation into src/subcommands/subcommands.go.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - plugins/buildpacks/src/subcommands/*/*.go
    - plugins/config/src/subcommands/*/*.go
    - plugins/network/src/subcommands/*/*.go
    - plugins/repo/src/subcommands/*/*.go
    - plugins/resource/src/subcommands/*/*.go
- id: golang-plugin-trigger-file-in-subdirectory
  message: Individual trigger .go file exists in subdirectory. Should be removed after
    consolidation into src/triggers/triggers.go.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
