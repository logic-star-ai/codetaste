- id: golang-plugin-config-command-call
  message: Direct config.Command* call in individual file. Should be in consolidated
    routing.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: config.CommandExport(...)
    - pattern: config.CommandGet(...)
    - pattern: config.CommandSet(...)
    - pattern: config.CommandUnset(...)
    - pattern: config.CommandKeys(...)
    - pattern: config.CommandBundle(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - plugins/config/src/subcommands/*/*.go
- id: makefile-individual-subcommand-build-rule
  message: Makefile builds individual subcommands from separate files. Should build
    single subcommands/subcommands binary and use symlinks.
  severity: WARNING
  languages:
  - generic
  pattern-regex: subcommands/%:\s+src/subcommands/\*/%.go
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - plugins/*/Makefile
- id: makefile-build-target-without-symlinks
  message: Makefile build target doesn't create symlinks. Should use 'ln -sf subcommands'
    after building consolidated binary.
  severity: WARNING
  languages:
  - generic
  patterns:
  - pattern-regex: build:\s+commands\s+subcommands
  - pattern-not-regex: ln\s+-sf\s+subcommands
  metadata:
