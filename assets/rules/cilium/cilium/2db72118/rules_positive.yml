rules:
- id: function-param-clientset-type
  message: Function parameter with clientset type detected - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func $FN(..., $PARAM $PKG.Clientset, ...) $RET {\n  ...\n}\n"
    - pattern: "func $FN(..., $PARAM *$PKG.Clientset, ...) $RET {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(?!.*(?:K8sClient|K8sCiliumClient|K8sSlimClient|K8sAPIExtensionsClient)).*(?:client|clientset)$
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: receiver-clientset-isenabled
  message: Receiver clientset field IsEnabled - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $R.clientset.IsEnabled()
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  paths:
    exclude:
    - daemon/cmd/daemon_main.go
    - pkg/k8s/client/*.go
  options:
    symbolic_propagation: true
- id: method-with-clientset-param-void-refactored
  message: Method with clientset param no return refactored - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R $T) $M($CS client.Clientset, ...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    exclude:
    - pkg/k8s/client/*.go
    - clustermesh-apiserver/vmmanager.go
- id: if-clientset-isenabled-new-code
  message: If condition checking clientset.IsEnabled() in new code - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "if $CS.IsEnabled() {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $CS
      patterns:
      - pattern-not: k8s
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    exclude:
    - daemon/cmd/daemon_main.go
    - pkg/k8s/client/cell.go
  options:
    symbolic_propagation: true
- id: struct-with-clientset-field-pkg-refactored
  message: Pkg struct with client.Clientset field refactored - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "type $S struct {\n  ...\n  $F client.Clientset\n  ...\n}\n"
    - pattern: "type $S struct {\n  ...\n  $F *client.Clientset\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - pkg/**/*.go
    exclude:
    - pkg/k8s/client/*.go
    - pkg/k8s/resource/example/*.go
    - operator/pkg/ingress/ingress.go
- id: clientset-slim-in-watchers
  message: Slim() in watchers code - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $CS.Slim()
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - pkg/k8s/watchers/**/*.go
  options:
    symbolic_propagation: true
- id: annotate-node-with-clientset-param
  message: AnnotateNode function now accepts clientset parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.AnnotateNode($CS, ...)
    - pattern: AnnotateNode($CS, ...)
  - pattern-not: $VAR.AnnotateNode(...)
  - metavariable-pattern:
      metavariable: $CS
      patterns:
      - pattern-not: k8s.Client()
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: start-node-watcher-with-clientset
  message: Node watcher initialization with clientset parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: NodesInit($CS)
    - pattern: $VAR.NodesInit($CS)
  - metavariable-pattern:
      metavariable: $CS
      patterns:
      - pattern-not: k8s.Client()
      - pattern-not: k8s.WatcherClient()
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: certificate-manager-with-clientset
  message: Certificate manager created with clientset parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.NewManager($DIR, $CS)
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i).*certificate.*
  - metavariable-pattern:
      metavariable: $CS
      patterns:
      - pattern-not: k8s.Client()
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: annotate-node-pkg-function-with-clientset
  message: k8s package AnnotateNode function with clientset param - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func AnnotateNode($CS kubernetes.Interface, ...) error {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - pkg/k8s/*.go
- id: receiver-clientset-discovery-serverversion
  message: Receiver clientset Discovery ServerVersion - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $R.clientset.Discovery().ServerVersion()
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: struct-embed-clientset
  message: Struct embedding clientset - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $S struct {\n  client.Clientset\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - pkg/k8s/client/*.go
