rules:
- id: k8s-is-enabled-global
  message: Replace k8s.IsEnabled() with clientset.IsEnabled(). Pass clientset explicitly.
  severity: WARNING
  languages:
  - go
  pattern: k8s.IsEnabled()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: k8s-cilium-client-variable-declaration
  message: Remove k8s.CiliumClient() global accessor. Pass clientset explicitly as
    parameter instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '$VAR := k8s.CiliumClient()

        ...

        '
    - pattern: 'var $VAR = k8s.CiliumClient()

        ...

        '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: k8s-import-k8s-package-client-usage
  message: Remove k8s.$CLIENT() global accessor. Refactor to use explicit clientset
    parameter injection.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"github.com/cilium/cilium/pkg/k8s\"\n  ...\n)\n\
      ...\nk8s.$CLIENT()\n"
  - metavariable-pattern:
      metavariable: $CLIENT
      patterns:
      - pattern-either:
        - pattern: Client
        - pattern: CiliumClient
        - pattern: WatcherClient
        - pattern: APIExtClient
        - pattern: WatcherAPIExtClient
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: k8s-global-cilium-client-accessor
  message: Remove k8s.CiliumClient() global accessor. Pass clientset explicitly as
    parameter instead.
  severity: WARNING
  languages:
  - go
  pattern: k8s.CiliumClient()
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: k8s-cilium-client-chained-call
  message: Remove k8s.CiliumClient() global accessor. Pass clientset explicitly and
    use clientset.$METHOD(...) instead.
  severity: WARNING
  languages:
  - go
  pattern: k8s.CiliumClient().$METHOD(...)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: k8s-client-chained-get-operation
  message: Remove k8s.$CLIENT() global accessor. Use clientset.$API().$RESOURCE(...).$OP(...)
    with explicit clientset parameter.
  severity: WARNING
  languages:
  - go
  pattern: k8s.$CLIENT().$API().$RESOURCE(...).$OP(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: k8s-is-enabled-check-in-condition
  message: Replace k8s.IsEnabled() with clientset.IsEnabled(). Pass clientset explicitly.
  severity: WARNING
  languages:
  - go
  pattern: "if k8s.IsEnabled() {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: k8s-client-in-watchers-package
  message: Remove k8s global accessor in watchers package. Pass clientset explicitly
    as parameter.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: k8s.Client()
    - pattern: k8s.WatcherClient()
    - pattern: k8s.CiliumClient()
  - pattern-inside: 'package watchers

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: k8s-client-usage-in-policy-groups
  message: Remove k8s.CiliumClient() global accessor in policy groups. Use clientset.CiliumV2().$RESOURCE(...).$METHOD(...)
    with explicit clientset.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'k8s.CiliumClient().CiliumV2().$RESOURCE(...).$METHOD(...)

      '
  - metavariable-pattern:
      metavariable: $RESOURCE
      patterns:
      - pattern-either:
        - pattern: CiliumNetworkPolicies
        - pattern: CiliumClusterwideNetworkPolicies
  - metavariable-pattern:
      metavariable: $METHOD
      patterns:
      - pattern-either:
        - pattern: Get
        - pattern: Update
        - pattern: Create
        - pattern: UpdateStatus
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: k8s-global-client-accessor
  message: Remove k8s.Client() global accessor. Pass clientset explicitly as parameter
    instead.
  severity: WARNING
  languages:
  - go
  pattern: k8s.Client()
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
