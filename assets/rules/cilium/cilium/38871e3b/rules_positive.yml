  languages:
  - go
  patterns:
  - pattern: '$SCOPED := $LOG.With(...)

      ...

      $SCOPED.$METHOD(...)

      '
  - metavariable-pattern:
      metavariable: $METHOD
      patterns:
      - pattern-either:
        - pattern: Info
        - pattern: Error
        - pattern: Debug
        - pattern: Warn
