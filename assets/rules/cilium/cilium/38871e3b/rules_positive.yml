rules:
- id: clustermesh-test-slog-logger-var
  message: 'Successfully migrated to slog: Test uses hivetest.Logger to create logger
    variable'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$LOG := hivetest.Logger($T)

      ...

      '
  - metavariable-pattern:
      metavariable: $LOG
      pattern-regex: ^(log|logger)$
  metadata:
    category: api
    nr_refactored_patterns: 144
    nr_legacy_patterns: 0
  paths:
    include:
    - pkg/clustermesh/**/*_test.go
- id: clustermesh-slog-info-key-value-call
  message: 'Successfully migrated to slog: Info call with key-value structured logging'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $LOG.Info($MSG, $KEY, $VAL)
    - pattern: $LOG.Info($MSG, $KEY1, $VAL1, $KEY2, $VAL2)
    - pattern: $LOG.Info($MSG, $KEY1, $VAL1, $KEY2, $VAL2, $KEY3, $VAL3)
  - pattern-not: $LOG.WithField(...)
  - pattern-not: $LOG.WithFields(...)
  metadata:
    category: api
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  paths:
    include:
    - pkg/clustermesh/*.go
    - pkg/clustermesh/**/*.go
    - clustermesh-apiserver/**/*.go
