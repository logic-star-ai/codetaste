    - pattern: $LOG.Debug($MSG, $KEY1, $VAL1, $KEY2, $VAL2, $KEY3, $VAL3)
  - pattern-not: $LOG.WithField(...)
  metadata:
    category: api
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - pkg/clustermesh/*.go
    - pkg/clustermesh/**/*.go
    - clustermesh-apiserver/**/*.go
