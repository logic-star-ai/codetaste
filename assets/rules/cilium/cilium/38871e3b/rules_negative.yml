        - pattern: Infof
        - pattern: Error
        - pattern: Errorf
        - pattern: Warn
        - pattern: Warnf
        - pattern: Warning
        - pattern: Warningf
        - pattern: Debug
        - pattern: Debugf
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - pkg/clustermesh/**
    - clustermesh-apiserver/**
    - pkg/dial/**
    - pkg/kvstore/etcdinit/**
