rules:
- id: clustermesh-logrus-withfield
  message: 'Replace logrus WithField with slog''s key-value format: log.With($KEY,
    $VALUE) or use inline key-value pairs'
  severity: WARNING
  languages:
  - go
  pattern: $LOG.WithField($KEY, $VALUE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
  paths:
    include:
    - pkg/clustermesh/**
    - clustermesh-apiserver/**
    - pkg/dial/**
    - pkg/kvstore/etcdinit/**
- id: clustermesh-logrus-witherror
  message: 'Replace logrus WithError with slog format: log.Error(msg, logfields.Error,
    err)'
  severity: WARNING
  languages:
  - go
  pattern: $LOG.WithError($ERR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
  paths:
    include:
    - pkg/clustermesh/**
    - clustermesh-apiserver/**
    - pkg/dial/**
    - pkg/kvstore/etcdinit/**
- id: clustermesh-logrus-withfield-any-log
  message: Replace logrus WithField().$METHOD() with slog format
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $LOG.WithField($KEY, $VALUE).$METHOD(...)
  - metavariable-pattern:
      metavariable: $METHOD
      patterns:
      - pattern-either:
        - pattern: Info
        - pattern: Infof
        - pattern: Error
        - pattern: Errorf
        - pattern: Warn
        - pattern: Warnf
        - pattern: Warning
        - pattern: Warningf
        - pattern: Debug
        - pattern: Debugf
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
  paths:
    include:
    - pkg/clustermesh/**
    - clustermesh-apiserver/**
    - pkg/dial/**
    - pkg/kvstore/etcdinit/**
- id: clustermesh-logrus-witherror-any-log
  message: Replace logrus WithError().$METHOD() with slog format using logfields.Error
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $LOG.WithError($ERR).$METHOD(...)
  - metavariable-pattern:
