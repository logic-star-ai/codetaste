rules:
- id: model-setting-set-method-signature-old-api
  message: Use type-specific setter methods (setInt(), setBool(), setString(), setRaw(),
    setColour()) instead of generic Set() for Model_Setting
  severity: WARNING
  languages:
  - cpp
  pattern-either:
  - pattern: 'Model_Setting::instance().Set($KEY, $VAL)

      '
  - pattern: 'Model_Setting::instance()->Set($KEY, $VAL)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 81
