rules:
- id: old-anchor-options-property
  message: Use 'ports' instead of 'anchorOptions' for node connection points
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'anchorOptions: $VALUE

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: old-anchor-in-jsdoc
  message: JSDoc @param references to 'anchor' should be updated to 'port'
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: ^\s*\*\s*@param\s+\w*[Aa]nchor\w*\s
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: old-get-anchor-position-method-call
  message: Use 'getPortPosition()' instead of 'getAnchorPosition()' method
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: $OBJ.getAnchorPosition(...)
  - pattern: this.getAnchorPosition(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: old-get-xy-by-position-anchor
  message: Use 'getPortPosition' instead of 'getAnchorPosition' in port style calculation
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'getAnchorPosition($BOUNDS, $POSITION)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: old-anchor-attribute-check
  message: Attribute 'anchor' should be renamed to 'port'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: attributes.anchor
  - pattern: $OBJ.anchor === $VAL
  - pattern: if ($OBJ.anchor) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-badge-options-property
  message: Use 'badges' instead of 'badgeOptions' following element conventions
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'badgeOptions: $VALUE

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-get-anchors-method-call
  message: Use 'getPorts()' instead of 'getAnchors()' method
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: $OBJ.getAnchors(...)
  - pattern: this.getAnchors(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-anchor-comment-references
  message: Comments referencing 'anchor' should be updated to 'port' for consistency
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: //.*\banchor\b.*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-anchor-optional-chaining
  message: Optional chaining on 'anchor' variables should use 'port' terminology
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: sourceAnchor?.getPosition()
  - pattern: targetAnchor?.getPosition()
  - pattern: sourceAnchor?.getLocalBounds()
  - pattern: targetAnchor?.getLocalBounds()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-interface-with-source-anchor
  message: Interface field 'sourceAnchor' should be renamed to 'sourcePort'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: ^\s*sourceAnchor\?\s*:\s*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-interface-with-target-anchor
  message: Interface field 'targetAnchor' should be renamed to 'targetPort'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: ^\s*targetAnchor\?\s*:\s*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-const-anchor-style
  message: Variable 'anchorStyle' should be renamed to 'portStyle'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const anchorStyle = $EXPR

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-anchor-style-array-type
  message: Type 'NodeAnchorStyleProps' should be renamed to 'NodePortStyleProps'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: :\s*NodeAnchorStyleProps\[\]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-anchor-options-object-access
  message: Use 'ports' property instead of 'anchorOptions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: $OBJ.anchorOptions
  - pattern: this.anchorOptions
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-get-anchors-style-method
  message: Method 'getAnchorsStyle' should be renamed to 'getPortsStyle'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'getAnchorsStyle(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-find-anchor-method-call
  message: Use 'findPort()' instead of 'findAnchor()' method
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: $OBJ.findAnchor(...)
  - pattern: this.findAnchor(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-get-anchor-position-import
  message: Import should use 'getPortPosition' instead of 'getAnchorPosition'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { ..., getAnchorPosition, ... } from $PKG
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-source-anchor-variable
  message: Variable 'sourceAnchor' should be renamed to 'sourcePort'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: const sourceAnchor = $VAL
  - pattern: let sourceAnchor = $VAL
  - pattern: var sourceAnchor = $VAL
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-target-anchor-variable
  message: Variable 'targetAnchor' should be renamed to 'targetPort'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: const targetAnchor = $VAL
  - pattern: let targetAnchor = $VAL
  - pattern: var targetAnchor = $VAL
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-anchor-function-param
  message: Function parameters using 'anchor' terminology should be renamed to 'port'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: function\s+\w+\s*\([^)]*\b(sourceAnchor|targetAnchor)\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-node-class-with-anchor-style
  message: Node class should rename 'getAnchorsStyle' to 'getPortsStyle'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "class $NODE extends BaseNode {\n  ...\n  getAnchorsStyle(...) { ... }\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-test-it-with-anchor
  message: Test cases with 'anchor' should be updated to 'port'
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: it\(.*[Aa]nchor
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-anchor-key-destructure-edge
  message: Destructuring should use 'sourcePort' instead of 'sourceAnchor'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const { sourceAnchor: $VAR, ... } = $OBJ

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-anchor-conditional-intersect
  message: Anchor-based conditional logic should use 'port' variable names
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: '$VAR ? getEllipseIntersectPoint($X, $VAR.getLocalBounds()) : $DEFAULT

      '
  - pattern: '$VAR ? $X : $NODE.getIntersectPoint($VAR?.getPosition() || $DEFAULT)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-badge-options-object-access
  message: Use 'badges' property instead of 'badgeOptions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: $OBJ.badgeOptions
  - pattern: this.badgeOptions
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-get-anchors-method-definition
  message: Method should be renamed to 'getPorts()' following new conventions
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'getAnchors(...) { ... }

    '
  metadata:
