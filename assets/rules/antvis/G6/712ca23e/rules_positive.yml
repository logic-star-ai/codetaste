rules:
- id: detect-ports-in-style-props
  message: Detected 'ports' property in style configuration object
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ ..., ports: $VAL, ... }

        '
    - pattern: '{ ..., $PREFIX_ports: $VAL, ... }

        '
  - pattern-not-inside: '{ ..., anchorOptions: $X, ... }

      '
  - pattern-not-inside: '$OBJ.anchorOptions = ...

      '
  metadata:
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/legacy/**'
    - '**/deprecated/**'
  options:
    symbolic_propagation: true
- id: detect-get-port-position-call
  message: Detected getPortPosition function call with data flow
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - pattern: getPortPosition($BBOX, $POS)
  pattern-sinks:
  - pattern: $VAR
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/elements/**'
    - '**/utils/**'
  options:
    symbolic_propagation: true
- id: detect-height-property-in-node
  message: Detected height property in node style
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ ..., height: $H, ... }

        '
    - pattern: $ATTRS.height
  - pattern-inside: 'class $CLASS extends $BASE { ... }

      '
  - metavariable-regex:
      metavariable: $BASE
      regex: ^(BaseNode|Polygon)$
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/**'
  options:
    symbolic_propagation: true
- id: detect-source-port-property
  message: Detected sourcePort property (refactored from sourceAnchor)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ ..., sourcePort: $VAL, ... }

        '
    - pattern: $OBJ.sourcePort
  - pattern-not-inside: '{ ..., sourceAnchor: $X, ... }

      '
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-get-port-position-function
  message: Detected getPortPosition() function usage
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $FUNC($BBOX, $POS)
    - pattern: const $VAR = $FUNC($ARG1, $ARG2)
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(getPortPosition|calculatePortPosition)$
  - pattern-not-inside: 'getAnchorPosition($X, $Y)

      '
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-get-ports-method-call
  message: Detected getPorts() method call (refactored from getAnchors)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $OBJ.getPorts(...)
    - pattern: $OBJ.$METHOD(...)
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(getPorts|getPortsMap)$
  - pattern-not-inside: '$X.getAnchors(...)

      '
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-target-port-property
  message: Detected targetPort property (refactored from targetAnchor)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ ..., targetPort: $VAL, ... }

        '
    - pattern: $OBJ.targetPort
  - pattern-not: $X.targetAnchor
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-find-port-function-call
  message: Detected findPort function call with data flow
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - pattern: findPort($NODE, $KEY, ...)
  pattern-sinks:
  - pattern: $RESULT
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/elements/**'
    - '**/utils/**'
  options:
    symbolic_propagation: true
- id: detect-get-port-position-import
  message: Detected getPortPosition import statement
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., getPortPosition, ... } from $PATH
    - pattern: import { ..., $FUNC, ... } from $PATH
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(getPortPosition|calculatePortPosition)$
  - pattern-not-inside: 'import { ..., getAnchorPosition, ... } from $Y

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-xy-width-height-node-positioning
  message: Detected x/y/width/height positioning (refactored from cx/cy/r)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ ..., x: $X, y: $Y, width: $W, height: $H, ... }

        '
    - pattern: '{ x: $X, y: $Y, width: $W, ... }

        '
  - pattern-not-inside: '{ ..., cx: $CX, cy: $CY, r: $R, ... }

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/elements/nodes/**'
    - '**/nodes/**'
  options:
    symbolic_propagation: true
- id: detect-polygon-base-class-usage
  message: Detected Polygon base class pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: class $CLASS extends $BASE { ... }
    - pattern: import { ..., Polygon, ... } from $PATH
  - metavariable-regex:
      metavariable: $BASE
      regex: ^(Polygon|PolygonNode)$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-sourceport-in-type-definition
  message: Detected sourcePort in type definition
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: sourcePort[?]?:\s*\w+
  - pattern-not-regex: sourceAnchor[?]?:\s*\w+
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/**'
    - '**/elements/**'
  options:
    symbolic_propagation: true
- id: detect-targetport-in-type-definition
  message: Detected targetPort in type definition
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: targetPort[?]?:\s*\w+
  - pattern-not-regex: targetAnchor[?]?:\s*\w+
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/**'
    - '**/elements/**'
  options:
    symbolic_propagation: true
- id: detect-find-port-method-call
  message: Detected findPort() method call (refactored from findAnchor)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $FUNC($NODE, $KEY, ...)
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(findPort|locatePort)$
  - pattern-not: findAnchor($X, ...)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-port-style-method
  message: Detected getPortStyle() method (refactored naming)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '$METHOD($ATTRS) { ... }

        '
    - pattern: this.$METHOD($ARGS)
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(getPortStyle|getPortsStyle)$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-badge-zindex-config
  message: Detected badgeZIndex configuration property
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '{ ..., badgeZIndex: $NUM, ... }

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-rx-ry-from-width-height
  message: Detected rx/ry calculation from width/height
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'rx: $WIDTH / 2

        '
    - pattern: 'ry: $HEIGHT / 2

        '
  - pattern-inside: 'const { width, height, ... } = $ATTRS

      ...

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/**'
    - '**/elements/**'
  options:
    symbolic_propagation: true
- id: detect-ports-in-type-definition
  message: Detected ports in type definition
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: ports[?]?:\s*\w+
  - pattern-not-regex: anchorOptions[?]?:\s*\w+
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/**'
    - '**/elements/**'
  options:
    symbolic_propagation: true
- id: detect-badges-in-type-definition
  message: Detected badges in type definition
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: badges[?]?:\s*\w+
  - pattern-not-regex: badgeOptions[?]?:\s*\w+
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/**'
    - '**/elements/**'
  options:
    symbolic_propagation: true
- id: detect-ports-property-usage
  message: Detected refactored 'ports' property usage in configuration
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $OBJ.$PROP
    - metavariable-regex:
        metavariable: $PROP
        regex: ^(ports)$
  pattern-sinks:
  - pattern: $EXPR
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/tests/**'
    - '**/__tests__/**'
  options:
    symbolic_propagation: true
- id: detect-find-port-import
  message: Detected findPort import statement
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., findPort, ... } from $PATH
    - pattern: import { ..., $FUNC, ... } from $PATH
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(findPort|locatePort)$
  - pattern-not: import { ..., findAnchor, ... } from $X
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-port-comment-pattern
  message: Detected 'port' terminology in comments (refactored from anchor)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: //.*\bport[s]?\b.*
  - pattern-not-regex: .*\banchor[s]?\b.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/elements/**'
    - '**/utils/**'
    exclude:
    - '**/__tests__/**'
  options:
    symbolic_propagation: true
- id: detect-port-index-upsert
  message: Detected port upsert with index pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: this.upsert(`port-${$INDEX}`, $CTOR, $STYLE, ...)
  - pattern-not-inside: 'this.upsert(`anchor-${$X}`, $Y, $Z, ...)

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-badges-property-access
  message: Detected 'badges' property access
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $OBJ.badges
  - pattern-not: $X.badgeOptions
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/__tests__/**'
  options:
    symbolic_propagation: true
- id: detect-get-ports-return
  message: Detected getPorts method return statement
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "getPorts() {\n  ...\n  return $EXPR;\n}\n"
  - pattern-not-inside: 'getAnchors() { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-rx-ry-calculation
  message: Detected rx/ry calculation from dimensions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ ..., rx: $W / 2, ... }

        '
    - pattern: '{ ..., ry: $H / 2, ... }

        '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/**'
    - '**/elements/**'
  options:
    symbolic_propagation: true
- id: detect-find-port-function-def
  message: Detected findPort function definition
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: function findPort($ARGS, ...) { ... }
  - pattern-not: function findAnchor($X, ...) { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/utils/**'
    - '**/elements/**'
  options:
    symbolic_propagation: true
- id: detect-get-port-position-function-def
  message: Detected getPortPosition function definition
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: function getPortPosition($ARGS, ...) { ... }
  - pattern-not-inside: 'function getAnchorPosition($X, ...) { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/utils/**'
  options:
    symbolic_propagation: true
