rules:
- id: detect-port-in-spec-files
  message: Detected port usage in spec/test files
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bports?\b
  - pattern-not-regex: .*\banchor\b.*
  metadata:
    nr_refactored_patterns: 53
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.spec.ts'
    - '**/__tests__/**/*.ts'
- id: detect-source-port-regex
  message: Detected sourcePort in code
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bsourcePort\b
  - pattern-not-regex: .*sourceAnchor.*
  metadata:
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
- id: detect-ports-property-usage
  message: Detected 'ports' property usage - refactored from anchorOptions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '{ ..., $PROP: $VALUE, ... }

      '
  - metavariable-regex:
      metavariable: $PROP
      regex: ^ports$
  - pattern-not: '{ ..., anchorOptions: $VALUE, ... }

      '
  metadata:
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
- id: detect-target-port-regex
  message: Detected targetPort in code
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \btargetPort\b
  - pattern-not-regex: .*targetAnchor.*
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: detect-port-array-index-access
  message: Detected array index access on ports
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $PORTS[$INDEX]
  - metavariable-regex:
      metavariable: $PORTS
      regex: (?i).*ports?.*
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
- id: detect-port-in-comment
  message: Detected comment mentioning port (not anchor)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: .*\bport\b.*
  - pattern-not-regex: .*\banchor\b.*
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/elements/**/*.ts'
    - '**/utils/**/*.ts'
- id: detect-get-port-position-function
  message: Detected getPortPosition function - refactored from getAnchorPosition
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $FUNC(...)
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^getPortPosition$
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: detect-source-port-property
  message: Detected sourcePort property - refactored from sourceAnchor
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '{ ..., $PROP: $VALUE, ... }

      '
  - metavariable-regex:
      metavariable: $PROP
      regex: ^sourcePort$
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: detect-height-in-triangle-node
  message: Detected height property in triangle node
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bheight\b
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/triangle.ts'
- id: detect-get-triangle-ports
  message: Detected getTrianglePorts utility
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bgetTrianglePorts\b
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: detect-node-port-props-type
  message: Detected NodePortProps or similar type name
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: \bNode\w*Port\w*Props\b
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: detect-width-height-in-nodes
  message: Detected node with width and height properties instead of radius
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const { ..., width: $W, ..., height: $H, ... } = $OBJ

      '
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/**'
- id: detect-node-port-style-props-type
  message: Detected NodePortStyleProps type definition
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: \bNodePortStyleProps\b
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/*.ts'
- id: detect-base-edge-props-source-port
  message: Detected BaseEdgeProps with sourcePort
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: \bsourcePort\b
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/*.ts'
    - '**/elements/edges/*.ts'
- id: detect-base-edge-props-target-port
  message: Detected BaseEdgeProps with targetPort
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: \btargetPort\b
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/*.ts'
    - '**/elements/edges/*.ts'
- id: detect-target-port-property
  message: Detected targetPort property - refactored from targetAnchor
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '{ ..., $PROP: $VALUE, ... }

      '
  - metavariable-regex:
      metavariable: $PROP
      regex: ^targetPort$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-get-ports-method-call
  message: Detected getPorts() method call - refactored from getAnchors()
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $OBJ.$METHOD(...)
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^getPorts$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-get-star-ports
  message: Detected getStarPorts utility
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bgetStarPorts\b
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-width-height-ellipse
  message: Detected width/height in ellipse node
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \b(width|height)\b
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/ellipse.ts'
- id: detect-width-height-circle
  message: Detected width/height in circle node
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \b(width|height)\b
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/circle.ts'
- id: detect-get-triangle-port
  message: Detected triangle port utility functions
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: getTrianglePorts(...)
  - pattern: getTrianglePortByPosition(...)
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-width-height-min-calc
  message: Detected Math.min with width and height
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: Math.min($W, $H)
  - metavariable-regex:
      metavariable: $W
      regex: (?i).*width.*
  - metavariable-regex:
      metavariable: $H
      regex: (?i).*height.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/**'
- id: detect-import-get-port-position
  message: Detected import of getPortPosition utility
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $FUNC, ... } from $PATH
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^getPortPosition$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-width-height-animation
  message: Detected width/height in animation context (refactored from cx/cy/r)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \b(width|height)\b
  - pattern-not-regex: .*\b(cx|cy|radius)\b.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/__tests__/demo/animation/**'
    - '**/animation/**'
- id: detect-polygon-base-class-usage
  message: Detected Polygon base class usage in node implementation
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: class $CLASS extends $BASE { ... }
  - metavariable-regex:
      metavariable: $BASE
      regex: ^Polygon$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-ports-array-foreach
  message: Detected ports array being iterated with forEach
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $PORTS.forEach(...)
  - metavariable-regex:
      metavariable: $PORTS
      regex: (?i).*ports?.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-get-local-bounds-for-port-position
  message: Detected getLocalBounds call for port position calculation
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "$METHOD(...) {\n  ...\n}\n"
  - pattern: $SHAPE.getLocalBounds()
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i).*port.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-width-in-star-node
  message: Detected width property in star node
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bwidth\b
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/star.ts'
- id: detect-find-port-function-call
  message: Detected findPort function call - refactored from findAnchor
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $FUNC(...)
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^findPort$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-ports-style-method
  message: Detected getPortsStyle or getPortStyle method - refactored API
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $OBJ.$METHOD(...)
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^getPort(s)?Style$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-ports-style-const-declaration
  message: Detected const portsStyle variable declaration
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const portsStyle = ...
  - pattern-not: const anchorsStyle = ...
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-get-ports-style-return
  message: Detected return in getPortsStyle method
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "getPortsStyle(...) {\n  ...\n}\n"
  - pattern: return $VALUE
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-get-star-port
  message: Detected star port utility functions
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: getStarPorts(...)
  - pattern: getStarPortByPosition(...)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-port-in-element-types
  message: Detected port terminology in element type definitions
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: \bport\b
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/element.ts'
- id: detect-get-ports-style-base-node
  message: Detected getPortsStyle method in BaseNode
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bgetPortsStyle\b
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/base-node.ts'
- id: detect-label-zindex-property
  message: Detected labelZIndex property for Z-index control
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '{ ..., $PROP: $VALUE, ... }

      '
  - metavariable-regex:
      metavariable: $PROP
      regex: ^labelZIndex$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-find-port-function-definition
  message: Detected findPort function definition
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: function $FUNC(...) { ... }
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^findPort$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-get-port-position-function-definition
  message: Detected getPortPosition function definition
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: function $FUNC(...) { ... }
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^getPortPosition$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-upsert-with-port-key
  message: Detected upsert call with port-related key
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $THIS.$METHOD($KEY, ...)
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^upsert$
  - metavariable-regex:
      metavariable: $KEY
      regex: (?i).*port.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-import-find-port
  message: Detected import of findPort utility
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $FUNC, ... } from $PATH
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^findPort$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-ports-array-property-access
  message: Detected ports array access in style props
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $OBJ.ports
  - pattern-not: $OBJ.anchorOptions
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-ports-destructuring
  message: Detected destructuring with ports property
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: 'const { ..., ports, ... } = $OBJ

      '
  - pattern: 'let { ..., ports, ... } = $OBJ

      '
  - pattern: 'const { ..., ports: $VAR, ... } = $OBJ

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-get-ports-return-statement
  message: Detected return statement in getPorts method
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "$METHOD(...) {\n  ...\n}\n"
  - pattern: return $VALUE
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^getPorts$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-port-in-omit-style-props-array
  message: Detected 'port' in omitStyleProps exclusion array
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: omitStyleProps($STYLE, [..., 'port', ...])
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-badge-options-to-badges
  message: Detected badges property (refactored from badgeOptions)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $OBJ.badges
  - pattern-not: $OBJ.badgeOptions
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-port-position-type-name
  message: Detected PortPosition type name
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: \bPortPosition\b
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/types/*.ts'
- id: detect-port-constant-declaration
  message: Detected PORT or PORTS constant declaration
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: const PORT = ...
    - pattern: const PORTS = ...
    - pattern: const $VAR_PORT = ...
  - metavariable-regex:
      metavariable: $VAR_PORT
      regex: .*PORT.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-node-get-ports-method-impl
  message: Detected Node class getPorts method
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: "getPorts() {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/nodes/**'
