rules:
- id: taint-ports-to-usage
  message: Data flows from 'ports' property to usage point
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - pattern: $OBJ.ports
  - pattern: '{ ports: $PORTS, ... }

      '
  pattern-sinks:
  - pattern: '$FUNC($SINK, ...)

      '
  - pattern: '$OBJ[$SINK]

      '
  - pattern: 'for ($X of $SINK) { ... }

      '
  metadata:
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: detect-source-port-anywhere
  message: Detected sourcePort property anywhere
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bsourcePort\b
  - pattern-not-regex: \bsourceAnchor\b
  metadata:
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.tsx'
    exclude:
    - '**/node_modules/**'
    - '**/dist/**'
- id: detect-ports-property-usage
  message: Detected usage of 'ports' property (refactored from anchorOptions)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ ports: $VALUE, ... }

        '
    - pattern: '$OBJ.ports

        '
    - pattern: '{ ..., ports, ... }

        '
  - pattern-not-inside: '{ anchorOptions: $X, ... }

      '
  - pattern-not-inside: '$OBJ.anchorOptions

      '
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: detect-target-port-anywhere
  message: Detected targetPort property anywhere
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \btargetPort\b
  - pattern-not-regex: \btargetAnchor\b
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.tsx'
    exclude:
    - '**/node_modules/**'
    - '**/dist/**'
- id: detect-xy-positioning-in-circle
  message: Detected x/y positioning in Circle node (refactored from cx/cy)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'new Circle({ ..., style: { x: $X, y: $Y, ... }, ... })

      '
  - pattern-not: 'new Circle({ ..., style: { cx: $CX, cy: $CY, ... }, ... })

      '
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: taint-source-port-to-usage
  message: Data flows from 'sourcePort' property to usage
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - pattern: $OBJ.sourcePort
  - pattern: '{ sourcePort: $PORT, ... }

      '
  pattern-sinks:
  - pattern: '$FUNC($SINK, ...)

      '
  - pattern: '$PORT = $SINK

      '
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: taint-get-ports-result
  message: Taint from getPorts() result
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - pattern: $NODE.getPorts()
  pattern-sinks:
  - pattern: $SINK
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: detect-get-port-position-anywhere
  message: Detected getPortPosition function anywhere
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bgetPortPosition\b
  - pattern-not-regex: \bgetAnchorPosition\b
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.tsx'
    exclude:
    - '**/node_modules/**'
    - '**/dist/**'
- id: detect-get-port-position-method
  message: Detected usage of 'getPortPosition()' method (refactored from getAnchorPosition())
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'getPortPosition($BBOX, ...)

        '
    - pattern: '$OBJ.getPortPosition(...)

        '
    - pattern: 'function getPortPosition(...) { ... }

        '
    - pattern: 'export function getPortPosition(...) { ... }

        '
  - pattern-not-inside: 'getAnchorPosition($X, ...)

      '
  - pattern-not-inside: 'function getAnchorPosition(...) { ... }

      '
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: detect-source-port-property
  message: Detected usage of 'sourcePort' property (refactored from sourceAnchor)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ sourcePort: $VALUE, ... }

        '
    - pattern: '$OBJ.sourcePort

        '
    - pattern: 'const { sourcePort, ... } = $X

        '
  - pattern-not-inside: '{ sourceAnchor: $X, ... }

      '
  - pattern-not-inside: '$OBJ.sourceAnchor

      '
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: detect-get-ports-method
  message: Detected usage of 'getPorts()' method (refactored from getAnchors())
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '$NODE.getPorts()

        '
    - pattern: 'getPorts()

        '
    - pattern: 'function getPorts(...) { ... }

        '
    - pattern: 'getPorts = (...) => { ... }

        '
  - pattern-not-inside: '$X.getAnchors()

      '
  - pattern-not-inside: 'getAnchors()

      '
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: detect-target-port-property
  message: Detected usage of 'targetPort' property (refactored from targetAnchor)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ targetPort: $VALUE, ... }

        '
    - pattern: '$OBJ.targetPort

        '
    - pattern: 'const { targetPort, ... } = $X

        '
  - pattern-not-inside: '{ targetAnchor: $X, ... }

      '
  - pattern-not-inside: '$OBJ.targetAnchor

      '
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-find-port-method
  message: Detected usage of 'findPort()' method (refactored from findAnchor())
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'findPort($NODE, ...)

        '
    - pattern: '$OBJ.findPort(...)

        '
    - pattern: 'function findPort(...) { ... }

        '
    - pattern: 'export function findPort(...) { ... }

        '
  - pattern-not-inside: 'findAnchor($X, ...)

      '
  - pattern-not-inside: 'function findAnchor(...) { ... }

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-badge-zindex-config
  message: Detected 'badgeZIndex' configuration property
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: '{ badgeZIndex: $VALUE, ... }

      '
  - pattern: '$OBJ.badgeZIndex

      '
  - pattern: 'badgeZIndex: $VALUE

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-ports-style-method
  message: Detected method that returns ports style (refactored from anchors)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'getPortsStyle(...) { ... }

        '
    - pattern: 'getPortStyle(...) { ... }

        '
    - pattern: 'function getPortsStyle(...) { ... }

        '
    - pattern: 'function getPortStyle(...) { ... }

        '
  - pattern-not-inside: 'getAnchorsStyle(...) { ... }

      '
  - pattern-not-inside: 'getAnchorStyle(...) { ... }

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-find-port-function-anywhere
  message: Detected findPort function definition or call anywhere
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bfindPort\b
  - pattern-not-regex: \bfindAnchor\b
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.tsx'
    exclude:
    - '**/node_modules/**'
    - '**/dist/**'
- id: detect-polygon-class-extension
  message: Detected class extending Polygon base class
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: 'class $NAME extends Polygon { ... }

    '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-get-ports-style-method-call
  message: Detected call to getPortsStyle or getPortStyle method
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: 'this.getPortsStyle($ATTRS)

      '
  - pattern: 'this.getPortStyle($ATTRS)

      '
  - pattern: '$OBJ.getPortsStyle(...)

      '
  - pattern: '$OBJ.getPortStyle(...)

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: taint-port-style-to-upsert
  message: Port style data flows to upsert call
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - pattern: '$STYLES.map(($STYLE) => { ... })

      '
  - pattern: '$STYLES.forEach(($STYLE) => { ... })

      '
  pattern-sinks:
  - pattern: 'this.upsert($KEY, $CTOR, $SINK, ...)

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-source-port-parameter
  message: Detected sourcePort as function parameter
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'function $F(..., sourcePort: $T, ...) { ... }

        '
    - pattern: 'function $F(..., sourcePort, ...) { ... }

        '
    - pattern: '($ARGS, sourcePort, ...) => { ... }

        '
  - pattern-not: 'function $X(..., sourceAnchor, ...) { ... }

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-upsert-with-port-prefix
  message: Detected upsert() call with 'port-' prefix (refactored from 'anchor-')
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '$THIS.upsert(`port-${...}`, ...)

        '
    - pattern: '$THIS.upsert(''port-'' + $X, ...)

        '
    - pattern: 'this.upsert(`port-${...}`, ...)

        '
  - pattern-not: '$THIS.upsert(`anchor-${...}`, ...)

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: taint-badges-to-iteration
  message: Badges data flows from property to iteration
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - pattern: $OBJ.badges
  - pattern: '{ badges: $BADGES, ... }

      '
  pattern-sinks:
  - pattern: '$SINK.forEach(...)

      '
  - pattern: '$SINK.map(...)

      '
  - pattern: 'for ($X of $SINK) { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-empty-check-on-badges
  message: Detected isEmpty or empty check specifically on badges
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'isEmpty($VAR)

      '
  - metavariable-regex:
      metavariable: $VAR
      regex: (?i).*(badge|Badge)s$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
