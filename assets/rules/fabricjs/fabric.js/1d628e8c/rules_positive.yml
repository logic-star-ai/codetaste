rules:
- id: isnode-test-helper-function
  message: 'Refactoring detected: isNode() helper function used in tests'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: isNode()
    - pattern: if (isNode()) { ... }
  - pattern-not-inside: function isNode() { ... }
  metadata:
    nr_refactored_patterns: 73
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/**'
    - '**/*.test.*'
    - '**/*.spec.*'
- id: getdocument-helper-usage
  message: 'Refactoring detected: getDocument() helper used instead of getEnv().document'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: getDocument()
  - pattern-not-inside: function getDocument() { ... }
  - pattern-not-inside: const getDocument = ...
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: getwindow-helper-usage
  message: 'Refactoring detected: getWindow() helper used instead of getEnv().window'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: getWindow()
  - pattern-not-inside: function getWindow() { ... }
  - pattern-not-inside: const getWindow = ...
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: glprecision-value-flow
  message: 'Refactoring detected: GLPrecision value flows through code'
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - pattern: GLPrecision.$VAL
  pattern-sinks:
  - patterns:
    - pattern: $SINK
    - pattern-not: GLPrecision.$X
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: env-dispose-method-call
  message: 'Refactoring detected: env.dispose() method called for element cleanup'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $ENV.dispose($ELEMENT)
    - pattern: $OBJ.dispose($ELEMENT)
  - metavariable-regex:
      metavariable: $ENV
      regex: (?i).*(env|context|runtime).*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: glprecision-import-statement
  message: 'Refactoring detected: GLPrecision imported (renamed from WebGLPrecision)'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., GLPrecision, ... } from $PATH
  - pattern-not: import { ..., WebGLPrecision, ... } from $PATH
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: dispose-with-jsdom-impl-cleanup
  message: 'Refactoring detected: dispose handles _image and _canvas cleanup'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: "dispose($EL) {\n  ...\n}\n"
  - pattern-either:
    - pattern: $IMPL._image = null
    - pattern: $IMPL._canvas = null
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: glprobe-in-env-type-def
  message: 'Refactoring detected: GLProbe type in environment definition'
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'WebGLProbe: GLProbe'
    - pattern: 'WebGLProbe: $TYPE'
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*probe.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/**'
- id: jsdom-with-pretend-visual
  message: 'Refactoring detected: JSDOM with pretendToBeVisual config'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "{\n  ...,\n  pretendToBeVisual: $VAL,\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: nodeglprobe-stub-class
  message: 'Refactoring detected: NodeGLProbe stub class implementation'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: class $CLASS { ... }
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(node.*probe|probe.*node).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: jsdom-pretendtobevisual-config
  message: 'Refactoring detected: JSDOM configured with pretendToBeVisual option'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'new JSDOM(..., { ..., pretendToBeVisual: $VAL, ... })

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: no-islikelynode-in-querywebgl
  message: 'Refactoring confirmed: queryWebGL no longer checks isLikelyNode'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "queryWebGL() { \n  ...\n  $STMT;\n  ...\n}\n"
  - pattern-not: "queryWebGL() {\n  ...\n  if ($ENV.isLikelyNode) { ... }\n  ...\n\
      }\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: glprobe-base-class-definition
  message: 'Refactoring detected: GLProbe base class defined'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "class GLProbe {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: env-dispose-method-implementation
  message: 'Refactoring detected: dispose method implemented in environment'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "dispose($ELEMENT) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/**'
    - '**/environment/**'
- id: webglprobe-extends-glprobe
  message: 'Refactoring detected: WebGLProbe extends GLProbe base class'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: class WebGLProbe extends GLProbe { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: webglprobe-import-path-to-filters
  message: 'Refactoring detected: WebGLProbe imported from filters path'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., WebGLProbe, ... } from $PATH
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*filters.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: webglprobe-in-browser-env-return
  message: 'Refactoring detected: WebGLProbe in browser environment return'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "return {\n  ...,\n  WebGLProbe: $VAL,\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/browser*'
- id: webglprobe-in-node-env-return
  message: 'Refactoring detected: WebGLProbe in node environment return'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "return {\n  ...,\n  WebGLProbe: $VAL,\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/node*'
- id: webglprobe-property-in-env-type
  message: 'Refactoring detected: WebGLProbe property in environment type'
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: \bWebGLProbe:\s*\w+
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/types.ts'
- id: import-glprobe-from-filters
  message: 'Refactoring detected: GLProbe imported from filters'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., GLProbe, ... } from $PATH
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*filters.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
