rules:
- id: detect-getdocument-helper-usage
  message: 'Refactoring detected: Using getDocument() helper instead of getEnv().document'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: getDocument()
  - pattern-not-inside: 'export const getDocument = ...

      '
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-getwindow-helper-usage
  message: 'Refactoring detected: Using getWindow() helper instead of getEnv().window'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: getWindow()
  - pattern-not-inside: 'export const getWindow = ...

      '
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-import-getdocument-exclude-fabric
  message: 'Refactoring detected: getDocument imported (excluding fabric.ts)'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., getDocument, ... } from '$PATH'
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/fabric.ts'
- id: detect-webglprobe-reference-exclude-old
  message: 'Refactoring detected: WebGLProbe referenced (excluding old export)'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: WebGLProbe
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/filters/WebGLProbe.ts'
- id: detect-glprecision-enum-usage
  message: 'Refactoring detected: Using GLPrecision enum (renamed from WebGLPrecision)'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., GLPrecision, ... } from '$PATH'
    - pattern: GLPrecision.$VARIANT
  - pattern-not: WebGLPrecision
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-glprobe-base-class-usage
  message: 'Refactoring detected: GLProbe base class implementation'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'class $CLASS extends GLProbe { ... }

        '
    - pattern: import { ..., GLProbe, ... } from '$PATH'
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-env-dispose-method-call
  message: 'Refactoring detected: Using env.dispose() method for cleanup'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: getEnv().dispose($ELEMENT)
    - pattern: $ENV.dispose($ELEMENT)
  - metavariable-pattern:
      metavariable: $ENV
      patterns:
      - pattern-not: cleanUpJsdomNode
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-webglprobe-in-browser-env
  message: 'Refactoring detected: WebGLProbe instantiation in browser env'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: WebGLProbe
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/browser.ts'
- id: detect-nodeglprobe-stub
  message: 'Refactoring detected: NodeGLProbe stub implementation'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'class NodeGLProbe { ... }

        '
    - pattern: import { ..., NodeGLProbe, ... } from '$PATH'
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-env-with-webglprobe-property
  message: 'Refactoring detected: env object with WebGLProbe property'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: return\s*\{[^}]*WebGLProbe[^}]*\}
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/*.ts'
- id: detect-jsdom-pretend-visual
  message: 'Refactoring detected: JSDOM pretendToBeVisual option'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: pretendToBeVisual
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-env-webglprobe-property
  message: 'Refactoring detected: WebGLProbe now accessible via env.WebGLProbe'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $ENV.WebGLProbe
    - pattern: getEnv().WebGLProbe
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-env-dispose-node-cleanup
  message: 'Refactoring detected: Node env dispose method with JSDOM cleanup'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "dispose($ELEMENT) {\n  ...\n  $IMPL._image = ...\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/node.ts'
    - '**/env/node.js'
- id: detect-jsdom-pretendtobevisual-config
  message: 'Refactoring detected: JSDOM configured with pretendToBeVisual'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'new JSDOM(..., { ..., pretendToBeVisual: true, ... })

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-nodeglprobe-constructor-usage
  message: 'Refactoring detected: NodeGLProbe instantiated'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: new NodeGLProbe(...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-glprobe-class-export
  message: 'Refactoring detected: GLProbe class exported'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export class GLProbe { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-env-type-without-islikelynode
  message: 'Refactoring detected: env type definition without isLikelyNode'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: type\s+\w+Env\s*=\s*\{[^}]*window[^}]*\}
  - pattern-not-regex: .*isLikelyNode.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/types.ts'
- id: detect-glprecision-declaration
  message: 'Refactoring detected: GLPrecision type/enum declaration'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: enum\s+GLPrecision
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
