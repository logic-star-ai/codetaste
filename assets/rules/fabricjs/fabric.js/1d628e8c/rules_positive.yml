rules:
- id: isnode-function-call-in-tests
  message: Detected isNode() function call in tests - replaces isLikelyNode flag
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: isNode()
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/**/*.ts'
    - '**/test/**/*.js'
    - '**/*.test.ts'
    - '**/*.test.js'
    - '**/*.spec.ts'
    - '**/*.spec.js'
- id: getdocument-helper-function-call
  message: Detected getDocument() helper function call - replaces getEnv().document
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: getDocument()
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
- id: glprecision-type-reference
  message: Detected GLPrecision type reference - renamed from WebGLPrecision
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '$VAR: GLPrecision'
    - pattern: '($ARG: GLPrecision)'
    - pattern: 'function $FUNC(..., $ARG: GLPrecision, ...)'
    - pattern: $OBJ.$PROP = GLPrecision.$VAL
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
- id: getwindow-helper-function-call
  message: Detected getWindow() helper function call - replaces getEnv().window
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: getWindow()
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
- id: getdocument-helper-import-excluding-main
  message: Detected getDocument helper function import in source files
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { getDocument } from $PATH

        '
    - pattern: 'import { ..., getDocument, ... } from $PATH

        '
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*env.*
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.ts'
    - '**/src/**/*.js'
    exclude:
    - '**/fabric.ts'
    - fabric.ts
- id: getwindow-helper-import-excluding-main
  message: Detected getWindow helper function import in source files
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { getWindow } from $PATH

        '
    - pattern: 'import { ..., getWindow, ... } from $PATH

        '
  - metavariable-regex:
      metavariable: $PATH
      regex: (?i).*env.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.ts'
    - '**/src/**/*.js'
    exclude:
    - '**/fabric.ts'
    - fabric.ts
- id: env-dispose-method-call
  message: Detected env.dispose() method call - new disposal pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $ENV.dispose($ELEM)
    - pattern: getEnv().dispose($ELEM)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
- id: webglprobe-property-in-env-object
  message: Detected WebGLProbe property assignment in env object
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ ..., WebGLProbe: $VAL, ... }

        '
    - pattern: 'return { ..., WebGLProbe: $VAL, ... }

        '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/**/*.ts'
    - '**/env/**/*.js'
- id: glprobe-class-export
  message: Detected GLProbe class export statement
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'export class $CLASS { ... }

        '
    - pattern: 'export { $CLASS }

        '
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(probe|glprobe|webglprobe|nodeglprobe).*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
- id: glprobe-import-statement
  message: Detected GLProbe import statement
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { GLProbe } from $PATH

        '
    - pattern: 'import { ..., GLProbe, ... } from $PATH

        '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
- id: window-domwindow-union-type
  message: Detected Window or DOMWindow union type
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (Window\s*\|\s*DOMWindow|DOMWindow\s*\|\s*Window)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/**/*.ts'
    - '**/*.ts'
- id: glprobe-import-from-filters
  message: Detected GLProbe import from filters
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: import.*GLProbe.*from.*filters
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
- id: getdocument-multiple-usages-file
  message: Detected multiple getDocument() usages in file
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (?s).*getDocument\(\).*getDocument\(\)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/util/**/*.ts'
    - '**/canvas/**/*.ts'
- id: glprobe-base-class-usage
  message: Detected GLProbe base class usage - new probe architecture
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: class $CLASS extends GLProbe { ... }
    - pattern: 'import { GLProbe } from $PATH

        '
    - pattern: 'import { ..., GLProbe, ... } from $PATH

        '
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(probe|gl|webgl).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
- id: glprecision-import-statement
  message: Detected GLPrecision import statement
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { GLPrecision } from $PATH

        '
    - pattern: 'import { ..., GLPrecision, ... } from $PATH

        '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
- id: jsdom-impl-for-wrapper-usage
  message: Detected jsdomImplForWrapper usage in dispose
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: $IMPL($ELEM)
    - pattern: jsdomImplForWrapper($ELEM)
  - metavariable-regex:
      metavariable: $IMPL
      regex: (?i).*impl.*wrapper.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/**/*.ts'
    - '**/env/**/*.js'
- id: jsdom-pretendtobevisual-option
  message: Detected pretendToBeVisual JSDOM option
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: pretendToBeVisual:\s*true
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/**/*.ts'
    - '**/test/**/*.js'
- id: jsdom-pretendtobevisual-config
  message: Detected pretendToBeVisual JSDOM configuration - improved node setup
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'new JSDOM($HTML, { ..., pretendToBeVisual: true, ... })

        '
    - pattern: 'new JSDOM($HTML, { pretendToBeVisual: true })

        '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/**/*.ts'
    - '**/env/**/*.js'
- id: env-dispose-method-regular
  message: Detected dispose method in env as regular function
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: 'dispose($ELEM) { ... }

    '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/**/*.ts'
    - '**/env/**/*.js'
- id: glprecision-enum-definition-file
  message: Detected GLPrecision enum definition
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: enum\s+GLPrecision
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/filters/**/*.ts'
    - '**/*.ts'
- id: webglprobe-property-env-type
  message: Detected WebGLProbe property in TFabricEnv type
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: WebGLProbe\??:\s*\w+
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/types.ts'
- id: env-types-with-dispose
  message: Detected dispose in env types file
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: dispose
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/types.ts'
- id: env-types-without-islikelynode
  message: Detected env types file without isLikelyNode
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: isLikelyNode
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/types.ts'
- id: webglprobe-file-level-pattern
  message: Detected WebGLProbe file with extends and methods
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (?s).*WebGLProbe.*extends.*GLProbe.*queryWebGL
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/filters/**/*.ts'
- id: staticcanvas-getdocument-dispose-pattern
  message: Detected StaticCanvas with getDocument and dispose
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (?s).*getDocument\(\).*getEnv\(\)\.dispose
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/canvas/StaticCanvas.ts'
- id: selectablecanvas-getdocument-dispose-pattern
  message: Detected SelectableCanvas with getDocument and dispose
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (?s).*getDocument\(\).*getEnv\(\)\.dispose
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/canvas/SelectableCanvas.ts'
- id: node-env-pretendtobevisual-pattern
  message: Detected node env with pretendToBeVisual in JSDOM
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (?s).*new\s+JSDOM.*pretendToBeVisual
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/node.ts'
- id: dispose-implementation-node
  message: Detected dispose implementation with JSDOM cleanup in node
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (?s).*dispose.*jsdomImplForWrapper.*_image.*_canvas
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/env/node.ts'
- id: glprecision-all-members
  message: Detected GLPrecision enum with all members
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: (?s).*enum\s+GLPrecision.*low.*=.*lowp.*medium.*=.*mediump.*high.*=.*highp
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/filters/**/*.ts'
