rules:
- id: testautodifftensor-identifier
  message: 'Refactoring detected: TestAutodiffTensor identifier found'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bTestAutodiffTensor\b
  metadata:
    nr_refactored_patterns: 158
    nr_legacy_patterns: 0
- id: autodiffbackend-identifier-usage
  message: 'Refactoring detected: ''AutodiffBackend'' identifier found'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bAutodiffBackend\b
  metadata:
    nr_refactored_patterns: 110
    nr_legacy_patterns: 0
- id: testautodiffbackend-identifier
  message: 'Refactoring detected: ''TestAutodiffBackend'' identifier found'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bTestAutodiffBackend\b
  metadata:
    nr_refactored_patterns: 87
    nr_legacy_patterns: 0
- id: autodifftensor-identifier-usage
  message: 'Refactoring detected: ''AutodiffTensor'' identifier found'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bAutodiffTensor\b
  metadata:
    nr_refactored_patterns: 82
    nr_legacy_patterns: 0
- id: autodiffmodule-identifier-usage
  message: 'Refactoring detected: ''AutodiffModule'' identifier found'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bAutodiffModule\b
  metadata:
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
- id: semicolon-autodiff-exclude-lib
  message: 'Refactoring detected: Statement with Autodiff (excluding lib.rs)'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bAutodiff\b[^;]*;
  metadata:
    nr_refactored_patterns: 73
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/lib.rs'
- id: libtorchdevice-identifier-usage
  message: 'Refactoring detected: ''LibTorchDevice'' identifier found'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bLibTorchDevice\b
  metadata:
    nr_refactored_patterns: 70
    nr_legacy_patterns: 0
- id: ndarray-backend-identifier
  message: 'Refactoring detected: ''NdArray'' backend identifier (without Backend
    suffix)'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bNdArray\s*<
  metadata:
    nr_refactored_patterns: 61
    nr_legacy_patterns: 0
- id: autodiff-identifier-usage
  message: 'Refactoring detected: ''Autodiff'' identifier found in code'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bAutodiff\s*<
  metadata:
    nr_refactored_patterns: 57
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*/**'
- id: tensor-data-autodiff
  message: 'Refactoring detected: Tensor data method with Autodiff'
  severity: INFO
  languages:
  - rust
  pattern-regex: (to_data|into_data|from_data)[^(]{0,30}\([^)]{0,100}\)[^}]{0,50}Autodiff
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: broad-autodiff-with-colon
  message: 'Refactoring detected: Autodiff with colon (type annotation)'
  severity: INFO
  languages:
  - rust
  pattern-regex: :\s*[^=]*\bAutodiff\b
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: libtorch-identifier-usage
  message: 'Refactoring detected: ''LibTorch'' backend identifier found'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bLibTorch\s*<
  metadata:
    nr_refactored_patterns: 50
    nr_legacy_patterns: 0
- id: broad-angle-bracket-ndarray
  message: 'Refactoring detected: Angle bracket with NdArray'
  severity: INFO
  languages:
  - rust
  pattern-regex: <\s*[^>]*\bNdArray\b
  metadata:
    nr_refactored_patterns: 44
    nr_legacy_patterns: 0
- id: semicolon-ndarray-exclude-examples
  message: 'Refactoring detected: Statement with NdArray (excluding examples)'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bNdArray\b[^;]*;
  metadata:
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/examples/**'
    - '**/tensor.rs'
- id: libtorch-with-colon-exclude-tensor
  message: 'Refactoring detected: LibTorch in type position (excluding tensor.rs)'
  severity: INFO
  languages:
  - rust
  pattern-regex: :\s*[^=]*\bLibTorch\b
  metadata:
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tensor.rs'
- id: broad-rust-pattern-ndarray
  message: 'Refactoring detected: NdArray in any Rust context'
  severity: INFO
  languages:
  - rust
  pattern-regex: (struct|type|impl|fn|use).*\bNdArray\b
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: ndarray-with-colon-exclude-web
  message: 'Refactoring detected: NdArray in type position (excluding examples)'
  severity: INFO
  languages:
  - rust
  pattern-regex: :\s*[^=]*\bNdArray\b
  metadata:
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/examples/**'
    - '**/tensor.rs'
- id: wgpu-backend-identifier
  message: 'Refactoring detected: ''Wgpu'' backend identifier (without Backend suffix)'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bWgpu\s*<
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: simple-new-autodiff
  message: 'Refactoring detected: new with Autodiff'
  severity: INFO
  languages:
  - rust
  pattern-regex: ::new\([^)]*\)[^;]*Autodiff
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: string-literal-libtorch
  message: 'Refactoring detected: String literal containing LibTorch'
  severity: INFO
  languages:
  - rust
  pattern-regex: '"[^"]*LibTorch[^"]*"'
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
- id: semicolon-wgpu-exclude-all-false-positives
  message: 'Refactoring detected: Statement with Wgpu (excluding false positives)'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bWgpu\b[^;]*;
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/examples/**'
    - '**/backend.rs'
    - '**/base.rs'
    - '**/server.rs'
    - '**/backward.rs'
- id: broad-equals-autodiff
  message: 'Refactoring detected: Equals sign with Autodiff'
  severity: INFO
  languages:
  - rust
  pattern-regex: =\s*[^;]*\bAutodiff\b
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: broad-equals-libtorch
  message: 'Refactoring detected: Equals sign with LibTorch'
  severity: INFO
  languages:
  - rust
  pattern-regex: =\s*[^;]*\bLibTorch\b
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: candle-backend-identifier
  message: 'Refactoring detected: ''Candle'' backend identifier (without Backend suffix)'
  severity: INFO
  languages:
  - rust
  pattern-regex: \bCandle\s*<
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: method-chain-libtorch
  message: 'Refactoring detected: Method chain with LibTorch'
  severity: INFO
  languages:
  - rust
  pattern-regex: LibTorch[^.]*\.\w+\(
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: broad-equals-wgpu
  message: 'Refactoring detected: Equals sign with Wgpu'
  severity: INFO
  languages:
  - rust
  pattern-regex: =\s*[^;]*\bWgpu\b
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: let-binding-libtorch
  message: 'Refactoring detected: Let binding with LibTorch type'
  severity: INFO
  languages:
  - rust
  pattern-regex: let\s+[^:]*:\s*[^=]*LibTorch\s*<
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: autodiff-in-function-signature
  message: 'Refactoring detected: Autodiff in function signature'
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+\w+[^{]*Autodiff\s*<
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: let-binding-ndarray
  message: 'Refactoring detected: Let binding with NdArray type'
  severity: INFO
  languages:
  - rust
  pattern-regex: let\s+[^:]*:\s*[^=]*NdArray\s*<
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: colon-wgpu-exclude-all-false
  message: 'Refactoring detected: Wgpu type annotation (excluding false positives)'
  severity: INFO
  languages:
  - rust
  pattern-regex: :\s*[^=]*\bWgpu\b
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/examples/**'
    - '**/backend.rs'
    - '**/server.rs'
- id: candle-rust-pattern-exclude-ops
  message: 'Refactoring detected: Candle in Rust constructs (excluding ops)'
  severity: INFO
  languages:
  - rust
  pattern-regex: (struct|type|impl|fn|use).*\bCandle\b
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/examples/**'
    - '**/int_tensor.rs'
- id: simple-clone-autodiff
  message: 'Refactoring detected: clone with Autodiff'
  severity: INFO
  languages:
  - rust
  pattern-regex: \.clone\(\)[^;]*Autodiff
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: broad-angle-bracket-candle
  message: 'Refactoring detected: Angle bracket with Candle'
  severity: INFO
  languages:
  - rust
  pattern-regex: <\s*[^>]*\bCandle\b
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: autodiff-type-alias-definition
  message: 'Refactoring detected: Type alias using ''Autodiff'' defined'
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: 'pub type $NAME = Autodiff<$BACKEND>

      '
  - metavariable-regex:
      metavariable: $NAME
      regex: ^(?!.*AD).*$
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: question-mark-autodiff
  message: 'Refactoring detected: Question mark operator with Autodiff'
  severity: INFO
  languages:
  - rust
  pattern-regex: Autodiff[^?]*\?
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: const-generic-autodiff
  message: 'Refactoring detected: Const generic with Autodiff'
  severity: INFO
  languages:
  - rust
  pattern-regex: const\s+\w+\s*:\s*[^=]*Autodiff\s*<
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: as-cast-autodiff
  message: 'Refactoring detected: Type cast involving Autodiff'
  severity: INFO
  languages:
  - rust
  pattern-regex: \s+as\s+[^;]*Autodiff\s*<
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: to-device-libtorch
  message: 'Refactoring detected: to_device with LibTorch'
  severity: INFO
  languages:
  - rust
  pattern-regex: to_device[^(]*\([^)]*LibTorch
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: backward-pass-autodiff
  message: 'Refactoring detected: backward pass implementation with Autodiff'
  severity: INFO
  languages:
  - rust
  pattern-regex: backward[^{]*\{[^}]*Autodiff\s*<
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: pub-use-autodiff
  message: 'Refactoring detected: Public re-export of Autodiff'
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+use\s+[^;]*Autodiff
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: pub-use-libtorch
  message: 'Refactoring detected: Public re-export of LibTorch'
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+use\s+[^;]*LibTorch
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
