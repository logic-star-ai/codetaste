rules:
- id: test-autodiff-tensor-type
  message: Detected TestAutodiffTensor usage
  severity: INFO
  languages:
  - rust
  pattern-regex: \bTestAutodiffTensor\b
  metadata:
    nr_refactored_patterns: 158
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: test-autodiff-backend-usage
  message: Detected TestAutodiffBackend usage
  severity: INFO
  languages:
  - rust
  pattern-regex: \bTestAutodiffBackend\b
  metadata:
    nr_refactored_patterns: 87
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: ndarray-backend-name-in-code
  message: Detected NdArray backend name in code
  severity: INFO
  languages:
  - rust
  pattern-regex: \bNdArray\s*<
  metadata:
    nr_refactored_patterns: 61
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
    exclude:
    - '**/test*.rs'
- id: libtorch-backend-name-in-code
  message: Detected LibTorch backend name in code
  severity: INFO
  languages:
  - rust
  pattern-regex: \bLibTorch\s*<
  metadata:
    nr_refactored_patterns: 50
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: autodiff-tensor-in-ops
  message: Detected AutodiffTensor in ops modules
  severity: INFO
  languages:
  - rust
  pattern-regex: \bAutodiffTensor\s*<
  metadata:
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/ops/**/*.rs'
- id: libtorch-device-in-burn-tch
  message: Detected LibTorchDevice in burn-tch
  severity: INFO
  languages:
  - rust
  pattern-regex: \bLibTorchDevice\b
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/burn-tch/**/*.rs'
- id: autodiff-backend-simple-import
  message: Detected simple import of AutodiffBackend
  severity: INFO
  languages:
  - rust
  pattern: use $PATH::AutodiffBackend;
  metadata:
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: libtorch-device-enum-variant
  message: Detected LibTorchDevice enum variant usage
  severity: INFO
  languages:
  - rust
  pattern-regex: \bLibTorchDevice\s*::\s*[A-Z]\w+
  metadata:
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: wgpu-backend-name-in-code
  message: Detected Wgpu backend name in code
  severity: INFO
  languages:
  - rust
  pattern-regex: \bWgpu\s*<
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: autodiff-simple-import
  message: Detected simple import of Autodiff
  severity: INFO
  languages:
  - rust
  pattern: use $PATH::Autodiff;
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: libtorch-device-creation
  message: Detected LibTorchDevice being used
  severity: INFO
  languages:
  - rust
  pattern: LibTorchDevice::$VARIANT
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-module-simple-import
  message: Detected simple import of AutodiffModule
  severity: INFO
  languages:
  - rust
  pattern: use $PATH::AutodiffModule;
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: wgpu-simple-import
  message: Detected simple import of Wgpu
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use $PATH::Wgpu;
  - pattern-not: use $X::WgpuBackend;
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: libtorch-simple-import
  message: Detected simple import of LibTorch
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use $PATH::LibTorch;
  - pattern-not: use $X::TchBackend;
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-with-generic-backend
  message: Detected Autodiff wrapping generic backend
  severity: INFO
  languages:
  - rust
  pattern-regex: \bAutodiff\s*<\s*\w+\s*<
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: ndarray-simple-import
  message: Detected simple import of NdArray
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use $PATH::NdArray;
  - pattern-not: use $X::NdArrayBackend;
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: ndarray-type-alias-no-backend-suffix
  message: Detected NdArray type alias (without Backend suffix)
  severity: INFO
  languages:
  - rust
  pattern: type $T = NdArray<$F>;
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-tensor-creation
  message: Detected AutodiffTensor being created
  severity: INFO
  languages:
  - rust
  pattern: AutodiffTensor::$METHOD(...)
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: libtorch-snake-case
  message: Detected libtorch in snake_case identifiers
  severity: INFO
  languages:
  - rust
  pattern-regex: \b\w*libtorch\w*\b
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: autodiff-backend-in-lib-rs
  message: Detected AutodiffBackend in lib.rs file
  severity: INFO
  languages:
  - rust
  pattern-regex: \bAutodiffBackend\b
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/lib.rs'
- id: libtorch-device-in-function
  message: Detected LibTorchDevice in function signature
  severity: INFO
  languages:
  - rust
  pattern: "fn $F(..., $P: &LibTorchDevice, ...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-with-libtorch-pattern
  message: Detected Autodiff<LibTorch> pattern
  severity: INFO
  languages:
  - rust
  pattern-regex: Autodiff\s*<\s*LibTorch
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: autodiff-generic-param
  message: Detected Autodiff used as generic parameter
  severity: INFO
  languages:
  - rust
  pattern: "impl<$B: Backend> $TRAIT for Autodiff<$B> {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-tensor-simple-import
  message: Detected simple import of AutodiffTensor
  severity: INFO
  languages:
  - rust
  pattern: use $PATH::AutodiffTensor;
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: candle-simple-import
  message: Detected simple import of Candle
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use $PATH::Candle;
  - pattern-not: use $X::CandleBackend;
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-with-wgpu-pattern
  message: Detected Autodiff<Wgpu> pattern
  severity: INFO
  languages:
  - rust
  pattern-regex: Autodiff\s*<\s*Wgpu
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: autodiff-type-in-type-alias
  message: Detected usage of new Autodiff type in type alias
  severity: INFO
  languages:
  - rust
  pattern: type $T = Autodiff<$BACKEND>;
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: wgpu-impl-block
  message: Detected impl block for Wgpu (without Backend suffix)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: "impl $TRAIT for Wgpu<$G, $F, $I> {\n  ...\n}\n"
  - pattern-not-inside: WgpuBackend
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-module-in-comments
  message: Detected AutodiffModule mentioned in documentation
  severity: INFO
  languages:
  - rust
  pattern-regex: ///.*\bAutodiffModule\b
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: wgpu-type-alias-no-backend-suffix
  message: Detected Wgpu type alias (without Backend suffix)
  severity: INFO
  languages:
  - rust
  pattern: type $T = Wgpu<$G, $F, $I>;
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: ndarray-impl-block
  message: Detected impl block for NdArray (without Backend suffix)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: "impl $TRAIT for NdArray<$E> {\n  ...\n}\n"
  - pattern-not-inside: NdArrayBackend
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: libtorch-impl-block
  message: Detected impl block for LibTorch
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: "impl $TRAIT for LibTorch<$E> {\n  ...\n}\n"
  - pattern-not-inside: TchBackend
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: libtorch-device-in-comments
  message: Detected LibTorchDevice mentioned in documentation
  severity: INFO
  languages:
  - rust
  pattern-regex: ///.*\bLibTorchDevice\b
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: libtorch-device-variable
  message: Detected LibTorchDevice variable declaration
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: 'let $V: LibTorchDevice = $E;'
    - pattern: let $V = LibTorchDevice::$METHOD(...);
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-with-ndarray-pattern
  message: Detected Autodiff<NdArray> pattern
  severity: INFO
  languages:
  - rust
  pattern-regex: Autodiff\s*<\s*NdArray
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: libtorch-type-alias
  message: Detected LibTorch type alias (refactored from TchBackend)
  severity: INFO
  languages:
  - rust
  pattern: type $T = LibTorch<$E>;
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-backend-in-comments
  message: Detected AutodiffBackend mentioned in documentation
  severity: INFO
  languages:
  - rust
  pattern-regex: ///.*\bAutodiffBackend\b
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: autodiff-backend-trait-definition
  message: Detected new AutodiffBackend trait definition
  severity: INFO
  languages:
  - rust
  pattern: "pub trait AutodiffBackend: $BOUND {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: candle-backend-in-module-path
  message: Detected Candle in module path
  severity: INFO
  languages:
  - rust
  pattern-regex: \bburn::backend::Candle\b
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: libtorch-device-from-impl
  message: Detected From trait impl for LibTorchDevice
  severity: INFO
  languages:
  - rust
  pattern: "impl From<$T> for LibTorchDevice {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-module-in-lib-rs
  message: Detected AutodiffModule in lib.rs file
  severity: INFO
  languages:
  - rust
  pattern-regex: \bAutodiffModule\b
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/lib.rs'
- id: autodiff-struct-name
  message: Detected Autodiff struct definition
  severity: INFO
  languages:
  - rust
  pattern: "pub struct Autodiff<$B> {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: ndarray-backend-in-module-path
  message: Detected NdArray in module path
  severity: INFO
  languages:
  - rust
  pattern-regex: \bburn::backend::NdArray\b
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: wgpu-backend-in-module-path
  message: Detected Wgpu in module path
  severity: INFO
  languages:
  - rust
  pattern-regex: \bburn::backend::Wgpu\b
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.rs'
- id: libtorch-device-as-param-type
  message: Detected LibTorchDevice as parameter type
  severity: INFO
  languages:
  - rust
  pattern: "fn $F($PARAM: LibTorchDevice) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: autodiff-tensor-struct-def
  message: Detected AutodiffTensor struct definition
  severity: INFO
  languages:
  - rust
  pattern: "pub struct AutodiffTensor<$B: Backend, const D: usize> {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
