  pattern-regex: '#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)\s*;\s+\n'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: macro-use-indented-pattern
  message: Remove indented `#[macro_use]` declarations
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s+#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)
