    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: macro-use-after-features
  message: Remove `#[macro_use]` after feature gates and use explicit imports
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#!\[feature\([^\]]+\)\][\s\S]{0,200}#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: macro-use-with-indentation
  message: Remove indented `#[macro_use]` declarations and use explicit imports
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s+#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: macro-use-three-or-more
  message: Three or more consecutive `#[macro_use]` declarations - replace all with
    explicit imports
  severity: WARNING
  languages:
  - rust
  pattern-regex: (#\[macro_use\]\s+extern\s+crate[^;]+;\s*){3,}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: macro-use-rustc-macros-after-allow
  message: Remove `#[macro_use]` for rustc_macros after allow attributes
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#!\[allow\([^\]]+\)\][\s\S]{0,100}#\[macro_use\]\s+extern\s+crate\s+rustc_macros'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: macro-use-between-extern-crates
  message: Remove `#[macro_use]` between extern crate declarations
  severity: WARNING
  languages:
  - rust
  pattern-regex: extern\s+crate[^;]+;\s*#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: macro-use-between-attributes
