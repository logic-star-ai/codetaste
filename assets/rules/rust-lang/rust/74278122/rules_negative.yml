    nr_legacy_patterns: 19
- id: macro-use-rustc-macros-specific-format
  message: Remove specific formatted `#[macro_use]\nextern crate rustc_macros;\n`
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\nextern crate rustc_macros;\n'
