rules:
- id: macro-use-at-file-start
  message: Remove `#[macro_use]` at file start and use explicit imports
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: macro-use-top-level-pattern
  message: Remove top-level `#[macro_use]` declarations and use explicit imports
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: macro-use-in-specific-lib-files
  message: Remove `#[macro_use]` from compiler crate lib.rs files
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
  paths:
    include:
    - compiler/*/src/lib.rs
    - compiler/*/lib.rs
- id: macro-use-first-in-file
  message: Remove `#[macro_use]` at very beginning of file
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^[\s\n]*#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: macro-use-specific-crates-newline-pattern
  message: Remove newline-separated `#[macro_use]` for specific crates
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\n\s*extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)\s*;'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: macro-use-mixed-spacing-pattern
  message: Remove `#[macro_use]` with mixed spacing patterns
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[\s*macro_use\s*\]\s*\n?\s*extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: macro-use-minimal-whitespace
  message: Remove `#[macro_use]` with minimal whitespace at line end
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)\s*;\s*$'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: macro-use-final-cleanup-pattern
  message: Final cleanup - remove any remaining `#[macro_use]` patterns with newlines
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s*\n\s*extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)\s*;\s*\n'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: macro-use-standalone-line
  message: Remove standalone `#[macro_use]` on separate line
  severity: WARNING
  languages:
  - rust
  pattern-regex: \n\s*#\[macro_use\]\s*\n\s*extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures)\s*;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: macro-use-lib-rs-specific-crates
  message: Remove `#[macro_use]` from rustc_* lib.rs files
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures);'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
  paths:
    include:
    - compiler/rustc_*/src/lib.rs
- id: macro-use-within-module-declaration
  message: Remove `#[macro_use]` in module declarations
  severity: WARNING
  languages:
  - rust
  pattern-regex: \n#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls|rustc_data_structures);\n
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: macro-use-compiler-root-level
  message: Remove root-level `#[macro_use]` for compiler crates
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^(?:[\s\n]*(?:#!\[[^\]]+\][\s\n]*)*)?#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: macro-use-at-top-of-compiler-files
  message: Remove `#[macro_use]` at top of compiler files (after comments/attributes)
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^(?:(?://[^\n]*|/\*[\s\S]*?\*/)\s*)*(?:#!\[[^\]]+\]\s*)*#\[macro_use\]\s+extern\s+crate\s+(rustc_macros|bitflags|smallvec|scoped_tls)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: macro-use-rustc-macros-multiline
  message: Remove `#[macro_use]` annotation from rustc_macros and use explicit imports
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s*\n\s*extern\s+crate\s+rustc_macros\s*;'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: macro-use-rustc-macros-any-whitespace
  message: Remove `#[macro_use] extern crate rustc_macros;` and use explicit imports
    for derive macros
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s*extern\s+crate\s+rustc_macros\s*;'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: macro-use-with-comment-rustc-macros
  message: Remove `#[macro_use]` for rustc_macros (with or without comments)
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s+(?://[^\n]*)?\s*extern\s+crate\s+rustc_macros'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: macro-use-rustc-macros-exact-pattern
  message: Remove exact pattern `#[macro_use]\nextern crate rustc_macros;` and use
    explicit imports
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^#\[macro_use\]\nextern crate rustc_macros;$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: macro-use-rustc-macros-with-spaces
  message: Remove `#[macro_use] extern crate rustc_macros;` with any spacing
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[\s*macro_use\s*\]\s+extern\s+crate\s+rustc_macros\s*;'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: macro-use-rustc-macros-lib-rs
  message: Remove `#[macro_use] extern crate rustc_macros` from lib.rs files
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s+extern\s+crate\s+rustc_macros'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
  paths:
    include:
    - '**/lib.rs'
- id: macro-use-newline-variations-rustc-macros
  message: Remove `#[macro_use]` with newline for rustc_macros
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s*\r?\n\s*extern\s+crate\s+rustc_macros'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: macro-use-semicolon-newline-rustc-macros
  message: Remove `#[macro_use] extern crate rustc_macros;` with trailing newline
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s+extern\s+crate\s+rustc_macros\s*;\s*\n'
