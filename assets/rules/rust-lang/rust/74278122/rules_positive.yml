rules:
- id: explicit-import-multiple-rustc-macros-derives-v2
  message: File explicitly imports multiple derives from rustc_macros (refactoring
    applied)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-regex: use\s+rustc_macros::\{[^}]*(Decodable|Encodable|HashStable|TypeFoldable|TypeVisitable)[^}]*\}
  - pattern-regex: \A[\s\S]*
  metadata:
    category: api
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
  paths:
    include:
    - compiler/**/src/**/*.rs
    exclude:
    - compiler/**/src/lib.rs
    - compiler/rustc_hir_typeck/src/cast.rs
    - compiler/rustc_hir_typeck/src/closure.rs
    - compiler/rustc_incremental/src/persist/data.rs
    - compiler/rustc_index/src/bit_set.rs
    - compiler/rustc_middle/src/ty/consts/valtree.rs
