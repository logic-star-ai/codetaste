rules:
- id: detect-fs-wrapper-in-comment
  message: Reference to 'fs_wrapper' found - should be updated to 'rfs' after refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: fs_wrapper
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 218
  paths:
    exclude:
    - '*/run-make-support/src/fs.rs'
    - '*/run-make-support/src/external_deps/*'
- id: detect-fs-wrapper-usage
  message: 'Old usage pattern detected: ''fs_wrapper::$FUNC'' should be ''rfs::$FUNC''
    after refactoring'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: fs_wrapper::$FUNC(...)
  - pattern-not-inside: mod fs_wrapper { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 128
- id: detect-fs-wrapper-module-import
  message: 'Old import pattern detected: ''fs_wrapper'' module should be imported
    as ''rfs'' after refactoring'
  severity: WARNING
  languages:
  - rust
  pattern: use run_make_support::fs_wrapper;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 81
- id: detect-fs-wrapper-in-use-statement
  message: Old 'fs_wrapper' import detected - should use 'rfs' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: use\s+.*fs_wrapper
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 71
- id: detect-inline-function-impl-in-lib
  message: Large inline function implementation in lib.rs - functions should be organized
    into focused modules
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*pub\s+fn\s+\w+.*\{[\s\S]{50,}?\n\s*\}
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-fs-wrapper-remove-file-usage
  message: Old fs_wrapper::remove_file usage detected - should use rfs::remove_file
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::remove_file($PATH)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-fs-wrapper-read-usage
  message: Old fs_wrapper::read usage detected - should use rfs::read after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::read($PATH)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: detect-fs-wrapper-create-dir-usage
  message: Old fs_wrapper::create_dir usage detected - should use rfs::create_dir
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::create_dir($PATH)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-fs-wrapper-rename-usage
  message: Old fs_wrapper::rename usage detected - should use rfs::rename after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::rename($FROM, $TO)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-fs-wrapper-qualified-import
  message: 'Old import pattern detected: ''fs_wrapper::$FUNC'' should be ''rfs::$FUNC''
    after refactoring'
  severity: WARNING
  languages:
  - rust
  pattern: use run_make_support::fs_wrapper::$FUNC;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-fs-wrapper-create-file-usage
  message: Old fs_wrapper::create_file usage detected - should use rfs::create_file
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::create_file($PATH)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-fs-wrapper-write-usage
  message: Old fs_wrapper::write usage detected - should use rfs::write after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::write($PATH, $CONTENT)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-fs-wrapper-read-to-string-usage
  message: Old fs_wrapper::read_to_string usage detected - should use rfs::read_to_string
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::read_to_string($PATH)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-fs-wrapper-create-dir-all-usage
  message: Old fs_wrapper::create_dir_all usage detected - should use rfs::create_dir_all
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::create_dir_all($PATH)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-fs-operations-in-lib-rs
  message: Direct filesystem operations in lib.rs suggest implementations should be
    in fs.rs module
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: fs::$FUNC(...)
    - pattern: std::fs::$FUNC(...)
  - pattern-not-inside: mod fs_wrapper { ... }
  - pattern-not-inside: mod fs { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-format-in-artifact-names
  message: Artifact name formatting logic should be in artifact_names.rs module
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: format!($FMT, ...)
  - pattern-inside: "fn $FUNC($NAME: &str) -> String {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: (static_lib_name|dynamic_lib_name|bin_name|rust_lib_name)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-fs-wrapper-read-dir-usage
  message: Old fs_wrapper::read_dir usage detected - should use rfs::read_dir after
    refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::read_dir($PATH)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-read-dir-callback-usage
  message: 'Old callback-based ''read_dir'' detected: should be renamed to ''read_dir_entries''
    after refactoring'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: read_dir($PATH, |$VAR| { ... })
  - pattern-not-inside: fn read_dir_entries(...) { ... }
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-target-functions-in-lib-rs
  message: Target detection functions should be moved to 'targets.rs' module after
    refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*pub\s+fn\s+(is_windows|is_msvc|is_darwin|target)\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-target-function-implementation
  message: Target detection functions should be in targets.rs module, not lib.rs
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: "fn target() -> String {\n  ...\n}\n"
  - pattern: "fn is_windows() -> bool {\n  ...\n}\n"
  - pattern: "fn is_msvc() -> bool {\n  ...\n}\n"
  - pattern: "fn is_darwin() -> bool {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-recursive-diff-in-comment
  message: Reference to 'recursive_diff' found - should be updated to 'assert_dirs_are_equal'
    after refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: recursive_diff
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-is-msvc-call-in-lib
  message: Functions using is_msvc() suggest target-dependent logic that should be
    modularized
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: is_msvc()
  - pattern-inside: "fn $FUNC(...) -> $RET {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-must-use-on-target-functions
  message: Target detection functions with attributes should be in targets.rs module
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*#\[must_use\]\s*\n\s*pub\s+fn\s+(target|is_windows|is_msvc|is_darwin)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-artifact-name-functions-in-lib-rs
  message: Artifact naming functions should be moved to 'artifact_names.rs' module
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*pub\s+fn\s+(static_lib_name|dynamic_lib_name|bin_name|staticlib|bin)\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-path-helper-implementation
  message: Path helper functions should be in path_helpers.rs module, not lib.rs
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: "fn path<$T: AsRef<Path>>($P: $T) -> PathBuf {\n  ...\n}\n"
  - pattern: "fn cwd() -> PathBuf {\n  ...\n}\n"
  - pattern: "fn source_root() -> PathBuf {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-fs-wrapper-copy-usage
  message: Old fs_wrapper::copy usage detected - should use rfs::copy after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::copy($FROM, $TO)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-target-detection-logic
  message: Target detection logic should be in targets.rs module
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: target().contains($STR)
  - pattern-inside: "fn $FUNC() -> bool {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-is-windows-call-in-lib
  message: Functions using is_windows() suggest target-dependent logic that should
    be modularized
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: is_windows()
  - pattern-inside: "fn $FUNC(...) -> $RET {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-recursive-diff-function
  message: 'Old function name detected: ''recursive_diff'' should be renamed to ''assert_dirs_are_equal''
    after refactoring'
  severity: WARNING
  languages:
  - rust
  pattern: recursive_diff(...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-path-functions-in-lib-rs
  message: Path manipulation functions should be moved to 'path_helpers.rs' module
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*pub\s+fn\s+(path|cwd|source_root|tmp_dir)\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-fs-wrapper-metadata-usage
  message: Old fs_wrapper::metadata usage detected - should use rfs::metadata after
    refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::metadata($PATH)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-fs-wrapper-set-permissions-usage
  message: Old fs_wrapper::set_permissions usage detected - should use rfs::set_permissions
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: fs_wrapper::set_permissions($PATH, $PERM)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-recursive-diff-call
  message: 'Old function call: ''recursive_diff'' should be ''assert_dirs_are_equal''
    after refactoring'
  severity: WARNING
  languages:
  - rust
  pattern: recursive_diff($A, $B)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-create-symlink-in-lib-rs
  message: Filesystem function 'create_symlink' should be moved to 'fs.rs' module
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*pub\s+fn\s+create_symlink\s*<
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-build-helper-with-cc
  message: Build helper using cc should be in external_deps/c_build.rs module
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: cc()
  - pattern-inside: "fn build_native_static_lib(...) -> PathBuf {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-is-darwin-call-in-lib
  message: Functions using is_darwin() suggest target-dependent logic that should
    be modularized
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: is_darwin()
  - pattern-inside: "fn $FUNC(...) -> $RET {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-track-caller-on-env-var
  message: env_var function with attributes should be in env.rs module
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*#\[track_caller\]\s*\n\s*#\[must_use\]\s*\n\s*pub\s+fn\s+env_var
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-to-str-in-string-helpers
  message: String helper implementations should be in string.rs module
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: $PATH.to_str()
    - pattern: $PATH.to_string_lossy()
  - pattern-inside: "fn $FUNC<$T>($P: $T, $ARG: &str) -> bool {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: (has_prefix|has_suffix|has_extension)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-recursive-diff-import
  message: 'Old import detected: ''recursive_diff'' should be ''assert_dirs_are_equal''
    after refactoring'
  severity: WARNING
  languages:
  - rust
  pattern: use run_make_support::recursive_diff;
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-impl-common-helpers-macro-in-lib-rs
  message: Internal macro 'impl_common_helpers' should be moved to 'macros.rs' module
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*macro_rules!\s+impl_common_helpers\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-fs-wrapper-module-declaration
  message: Module 'fs_wrapper' should be renamed to 'fs' and re-exported as 'rfs'
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: 'pub mod fs_wrapper;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-env-var-implementation-in-lib
  message: env_var implementation should be in env.rs module, not lib.rs
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "fn env_var($NAME: &str) -> String {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $NAME
      pattern: name
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-python-command-implementation
  message: python_command implementation should be in external_deps/python.rs module,
    not lib.rs
  severity: WARNING
  languages:
  - rust
  pattern: "fn python_command() -> $TYPE {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-htmldocck-implementation
  message: htmldocck implementation should be in external_deps/htmldocck.rs module,
    not lib.rs
  severity: WARNING
  languages:
  - rust
  pattern: "fn htmldocck() -> $TYPE {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-static-lib-name-implementation
  message: static_lib_name implementation should be in artifact_names.rs module, not
    lib.rs
  severity: WARNING
  languages:
  - rust
  pattern: "fn static_lib_name($NAME: &str) -> String {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-dynamic-lib-name-implementation
  message: dynamic_lib_name implementation should be in artifact_names.rs module,
    not lib.rs
  severity: WARNING
  languages:
  - rust
  pattern: "fn dynamic_lib_name($NAME: &str) -> String {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-bin-name-implementation
  message: bin_name implementation should be in artifact_names.rs module, not lib.rs
  severity: WARNING
  languages:
  - rust
  pattern: "fn bin_name($NAME: &str) -> String {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-cc-not-in-external-deps
  message: cc.rs should be moved to external_deps/ subdirectory
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/cc.rs'
    exclude:
    - '*/run-make-support/src/external_deps/cc.rs'
- id: detect-clang-not-in-external-deps
  message: clang.rs should be moved to external_deps/ subdirectory
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/clang.rs'
    exclude:
    - '*/run-make-support/src/external_deps/clang.rs'
- id: detect-llvm-not-in-external-deps
  message: llvm.rs should be moved to external_deps/ subdirectory
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/llvm.rs'
    exclude:
    - '*/run-make-support/src/external_deps/llvm.rs'
- id: detect-rustc-not-in-external-deps
  message: rustc.rs should be moved to external_deps/ subdirectory
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/rustc.rs'
    exclude:
    - '*/run-make-support/src/external_deps/rustc.rs'
- id: detect-rustdoc-not-in-external-deps
  message: rustdoc.rs should be moved to external_deps/ subdirectory
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/rustdoc.rs'
    exclude:
    - '*/run-make-support/src/external_deps/rustdoc.rs'
- id: detect-old-cc-module-declaration
  message: cc module should be declared under external_deps subdirectory after refactoring
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: pub mod cc;
  - pattern-not-inside: pub mod external_deps { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-old-clang-module-declaration
  message: clang module should be declared under external_deps subdirectory after
    refactoring
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: pub mod clang;
  - pattern-not-inside: pub mod external_deps { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/run-make-support/src/lib.rs'
- id: detect-old-llvm-module-declaration
  message: llvm module should be declared under external_deps subdirectory after refactoring
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: pub mod llvm;
  - pattern-not-inside: pub mod external_deps { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
