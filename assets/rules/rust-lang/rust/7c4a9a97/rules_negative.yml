- id: rustc-incremental-path-display-in-format
  message: Old-style diagnostic with path.display() should be replaced with a translatable
    diagnostic struct (IntoDiagnosticArg for Path was added)
  severity: WARNING
  languages:
  - rust
  pattern-regex: sess\.(err|warn)\(&format!\([^)]*\.display\(\)[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - compiler/rustc_incremental/
