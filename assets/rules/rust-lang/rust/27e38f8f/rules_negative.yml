- id: detect-boundregion-var-kind-branon
  message: 'BoundRegion struct literal with ''kind: ty::BrAnon'' should use ''kind:
    ty::BoundRegionKind::Anon'''
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: $VAR, kind: ty::BrAnon }'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-ty-branon-in-hir-analysis
  message: HIR analysis code using 'ty::BrAnon' should be updated to 'ty::BoundRegionKind::Anon'
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - compiler/rustc_hir_analysis/**
- id: detect-ty-immborrow-usage
