rules:
- id: detect-ty-branon-usage
  message: Old qualified usage 'ty::BrAnon' should be changed to 'ty::BoundRegionKind::Anon'
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: detect-ty-brnamed-usage
  message: Old qualified usage 'ty::BrNamed' should be changed to 'ty::BoundRegionKind::Named'
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrNamed
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: detect-ty-brenv-usage
  message: Old qualified usage 'ty::BrEnv' should be changed to 'ty::BoundRegionKind::ClosureEnv'
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrEnv
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-ty-traitcontainer-usage
