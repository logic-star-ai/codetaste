- id: detect-branon-in-comment-context
  message: Reference to 'BrAnon' should be updated to 'Anon' (check if it's a variant
    reference)
  severity: INFO
  languages:
  - rust
  pattern-regex: (?i)BrAnon\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
