- id: detect-vec-push-branon
  message: Push with 'ty::BrAnon' should use 'ty::BoundRegionKind::Anon'
  severity: WARNING
  languages:
  - rust
  pattern: $VEC.push(ty::BoundVariableKind::Region(ty::BrAnon))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-break-with-brnamed
  message: Break statement with 'ty::BrNamed(...)' should use 'ty::BoundRegionKind::Named(...)'
  severity: WARNING
  languages:
  - rust
  pattern: break ($...ARGS, ty::BrNamed($...MORE));
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-enum-borrowkind-immborrow-def
  message: Enum BorrowKind definition contains old variant 'ImmBorrow' which should
    be renamed to 'Immutable'
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+enum\s+BorrowKind\s*\{[^}]*ImmBorrow
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
