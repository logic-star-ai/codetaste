  pattern: ty::ImmBorrow
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-brnamed-tuple-pattern
  message: Pattern 'ty::BrNamed(def_id, name)' should use 'ty::BoundRegionKind::Named(def_id,
    name)'
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrNamed($DEF_ID, $NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-ty-brnamed-in-trait-selection
