rules:
- id: hir-item-hir-id-to-def-id-conversion
  message: Use item.owner_id.def_id directly instead of converting item.hir_id to
    LocalDefId
  severity: WARNING
  languages:
  - rust
  pattern: '$HIR.local_def_id($ITEM.hir_id)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
