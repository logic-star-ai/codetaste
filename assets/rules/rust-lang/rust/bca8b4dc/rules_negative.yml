  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'fn associated_body(...) -> Option<BodyId> { ... }

      '
  - pattern-not: 'fn associated_body(...) -> Option<(LocalDefId, BodyId)> { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
