    in HIR
  severity: WARNING
  languages:
  - rust
  pattern: $OBJ.local_id_to_def_id
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: hir-visit-fn-old-signature-hirid-param
  message: Update visit_fn signature - parameter should be LocalDefId instead of HirId
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'fn visit_fn(&mut self, $FK: $FKTYPE, $FD: $FDTYPE, $BODY: BodyId, $SPAN:
      Span, $ID: HirId) { ... }

      '
  - metavariable-pattern:
      metavariable: $ID
      patterns:
      - pattern-not: _
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: hir-self-tcx-hir-local-def-id-to-def-id
  message: Use def_id.to_def_id() directly instead of converting from HirId
  severity: WARNING
  languages:
  - rust
  pattern: self.tcx.hir().local_def_id($ID).to_def_id()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: hir-walk-fn-old-signature-hirid
