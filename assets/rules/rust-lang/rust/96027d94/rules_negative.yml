  - rust
  pattern-regex: Vec<.*Generator.*>
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: unstable-feature-generator-trait-regex
  message: Unstable feature 'generator_trait' should be renamed to 'coroutine_trait'
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[unstable\(feature\s*=\s*"generator_trait"'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: comment-generator-trait-issue
  message: Comment references 'generator_trait' feature which should be 'coroutine_trait'
  severity: WARNING
  languages:
  - rust
  pattern-regex: feature\s*=\s*"generator_trait".*issue\s*=\s*"43122"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: use-ops-generator-simple
  message: Import uses 'ops::Generator' instead of 'ops::Coroutine'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use ops::Generator
  - pattern-not-inside: "mod $MOD {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: doc-comment-generator-feature
  message: Doc comment shows generator feature example which should be coroutine
  severity: WARNING
  languages:
  - rust
  pattern-regex: ///.*#!\[feature\(.*generator
