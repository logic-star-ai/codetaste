rules:
- id: hir-generator-kind
  message: Type 'GeneratorKind' should be 'CoroutineKind'
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bGeneratorKind\b
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 116
- id: test-directory-generator
  message: Test directory 'generator' should be renamed to 'coroutine'
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 112
  paths:
    include:
    - tests/ui/generator/*
- id: use-std-ops-generator
  message: Import path still uses 'std::ops::Generator' instead of 'std::ops::Coroutine'
  severity: WARNING
  languages:
  - rust
  pattern: use std::ops::Generator;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 79
- id: feature-gate-generators-regex
  message: Feature gate 'generators' should be renamed to 'coroutines'
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#!\[feature\(generators\)\]'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 71
- id: async-generator-kind-regex
  message: Code uses 'AsyncGeneratorKind' which should be 'AsyncCoroutineKind'
  severity: WARNING
