    of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::infcx::$X
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-use-infcx-solverdelegate
