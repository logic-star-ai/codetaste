rules:
- id: detect-infcx-as-identifier
  message: Identifier `Infcx` should be renamed to `D` as part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bInfcx\b(?!:)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 208
  paths:
    include:
    - '**/rustc_next_trait_solver/**'
- id: detect-lifetime-param-infcx
  message: Generic parameters with lifetime and `Infcx` should use `D` instead as
    part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: <\s*'[a-z_]+\s*,\s*Infcx\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 106
- id: detect-infcx-after-comma
  message: Generic parameter ending with `, Infcx>` should use `, D>` instead as part
    of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: ',\s*Infcx\s*>'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 106
- id: detect-evalctxt-lifetime-infcx
  message: EvalCtxt with generic parameter `Infcx` should be renamed to `D` as part
    of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: EvalCtxt\s*<\s*'[a-z_]+\s*,\s*Infcx\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 104
- id: detect-evalctxt-infcx-regex
  message: EvalCtxt with generic parameter `Infcx` should be renamed to `D` as part
    of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: EvalCtxt\s*<\s*'_\s*,\s*Infcx\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 100
- id: detect-interner-method-result
  message: Method call `.interner()` should be renamed to `.cx()` as part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.interner\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 100
  paths:
    include:
    - '**/rustc_type_ir/**'
    - '**/rustc_next_trait_solver/**'
- id: detect-interner-in-solver-src
  message: Method call `.interner()` in trait solver should be renamed to `.cx()`
    as part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.interner\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 100
  paths:
    include:
    - compiler/rustc_next_trait_solver/src/**
- id: detect-interner-call-in-solver
  message: Method call `.interner()` in solver code should be renamed to `.cx()` as
    part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.interner\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 93
  paths:
    include:
    - '**/solve/**'
- id: detect-mut-ref-evalctxt-infcx
  message: Mutable reference to EvalCtxt with generic parameter `Infcx` should be
    renamed to `D` as part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: '&mut\s+EvalCtxt\s*<\s*''_\s*,\s*Infcx\s*>'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
- id: detect-fn-param-evalctxt-infcx
  message: Function parameter with EvalCtxt<'_, Infcx> should use `D` instead of `Infcx`
    as part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+\w+[^(]*\([^)]*EvalCtxt\s*<\s*'_\s*,\s*Infcx\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
- id: detect-tuple-with-evalctxt-infcx
  message: Tuple containing EvalCtxt<'_, Infcx> should use `D` instead of `Infcx`
    as part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: \([^)]*EvalCtxt\s*<\s*'_\s*,\s*Infcx\s*>[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
- id: detect-ecx-evalctxt-infcx-param
  message: 'Parameter `ecx: &mut EvalCtxt<''_, Infcx>` should use `D` instead of `Infcx`
    as part of the refactoring'
  severity: WARNING
  languages:
  - rust
  pattern-regex: ecx\s*:\s*&mut\s+EvalCtxt\s*<\s*'_\s*,\s*Infcx\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 76
- id: detect-ecx-variable-infcx
  message: Variable `ecx` with type `&mut EvalCtxt<'_, Infcx>` should use `D` instead
    of `Infcx` as part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: \becx\s*:\s*&mut\s+EvalCtxt\s*<\s*'_\s*,\s*Infcx\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 65
- id: detect-interner-method-call-self
  message: Method call `self.interner()` should be renamed to `self.cx()` as part
    of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern: self.interner()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
- id: detect-infcx-solverdelegate-bound-regex
  message: 'Trait bound `Infcx: SolverDelegate` should be renamed to `D: SolverDelegate`
    as part of the refactoring'
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bInfcx\s*:\s*SolverDelegate\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
- id: detect-trait-bounds-infcx-solverdelegate
  message: 'Trait bound `Infcx: SolverDelegate<` should use `D: SolverDelegate<` instead
    as part of the refactoring'
  severity: WARNING
  languages:
  - rust
  pattern-regex: Infcx:\s*SolverDelegate<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: detect-assembly-mod-infcx
  message: Assembly mod.rs code with `Infcx` should be renamed to `D` as part of the
    refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bInfcx\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
  paths:
    include:
    - '**/assembly/mod.rs'
- id: detect-interner-assign-solver
  message: Assignment using `.interner()` in solver code should be changed to `.cx()`
    as part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: \w+\s*=\s*[^;]*\.interner\(\s*\);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
  paths:
    include:
    - '**/rustc_next_trait_solver/**'
    - '**/rustc_type_ir/**'
    exclude:
    - '**/rustc_middle/**'
- id: detect-normalizes-to-mod-infcx
  message: NormalizesTo mod.rs code with `Infcx` should be renamed to `D` as part
