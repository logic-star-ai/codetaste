  severity: WARNING
  languages:
  - rust
  pattern-regex: \bInfcx\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
  paths:
    include:
    - '**/normalizes_to/mod.rs'
- id: detect-interner-method-arg-solver
  message: Method argument using `.interner()` in solver/type_ir should be changed
    to `.cx()` as part of the refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: \([^)]*\.interner\(\s*\)[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
  paths:
    include:
    - '**/rustc_next_trait_solver/**'
    - '**/rustc_type_ir/**'
    exclude:
    - '**/rustc_middle/**'
- id: detect-closure-evalctxt-infcx
