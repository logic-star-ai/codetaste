rules:
- id: detect-substs-field-access
  message: Field access '.substs' should be renamed to '.args' as part of the SubstsŌåÆGenericArgs
    refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $OBJ.substs
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 357
  paths:
    exclude:
    - '*/rust-analyzer/*'
- id: detect-early-binder-subst-identity-method
  message: Method 'subst_identity' should be renamed to 'instantiate_identity' as
    part of the SubstsŌåÆGenericArgs refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $BINDER.subst_identity()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 289
- id: detect-early-binder-subst-method
  message: Method 'subst' on EarlyBinder should be renamed to 'instantiate' as part
    of the SubstsŌåÆGenericArgs refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $BINDER.subst($TCXARG, $ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 161
- id: detect-ty-subst-module-import
  message: Module 'ty::subst' should be renamed to 'ty::generic_args' as part of the
    SubstsŌåÆGenericArgs refactoring
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: use $PKG::ty::subst::$ITEM;
    - pattern: use $PKG::ty::subst::{$...ITEMS};
    - pattern: use $PKG::ty::subst;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 135
