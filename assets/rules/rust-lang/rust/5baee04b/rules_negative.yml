rules:
- id: macro-use-before-extern-crate-tracing
  message: Remove `#[macro_use] extern crate tracing` and replace with explicit module-level
    imports
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*#\s*\[\s*macro_use\s*\]\s*\n\s*extern\s+crate\s+tracing\s*;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - compiler/rustc_codegen_llvm/**/*.rs
    - compiler/rustc_codegen_ssa/**/*.rs
    - compiler/rustc_const_eval/**/*.rs
    - compiler/rustc_incremental/**/*.rs
