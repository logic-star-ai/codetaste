rules:
- id: is-metavar-block-call
  message: Detected call to is_metavar_block() - renamed from is_whole_block() after
    refactoring
  severity: INFO
  languages:
  - rust
  pattern: '$OBJ.is_metavar_block()

    '
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: is-metavar-block-function-call
  message: Detected .is_metavar_block() call - renamed from is_whole_block() after
    refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: \.is_metavar_block\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: if-is-metavar-block
  message: Detected if with is_metavar_block() - new conditional pattern after refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: if\s+[^;{]*\.is_metavar_block\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: token-is-metavar-block-method
  message: Detected token.is_metavar_block() - method call on token
  severity: INFO
  languages:
  - rust
  pattern-regex: token\.is_metavar_block\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: look-ahead-is-metavar-block
  message: Detected look_ahead with is_metavar_block - lookahead token checking
  severity: INFO
  languages:
  - rust
  pattern-regex: look_ahead\s*\([^)]+\)\s*[^;{]*\.is_metavar_block\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: self-token-is-metavar-block
