rules:
- id: is-metavar-block-function-present
  message: is_metavar_block() function detected - replacement for is_whole_block()
    after refactoring
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: 'pub fn is_metavar_block(&$SELF) -> $RET { ... }

        '
    - pattern: 'fn is_metavar_block(&$SELF) -> $RET { ... }

        '
    - pattern: $VAR.is_metavar_block()
  - pattern-not-inside: 'fn is_whole_block(...) { ... }

      '
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: parseresult-block-variant-usage
  message: ParseNtResult::Block variant usage - new pattern
  severity: INFO
  languages:
  - rust
  pattern: $RESULT::Block($EXPR)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/parse*/**'
  options:
    symbolic_propagation: true
- id: parseresult-enum-with-block
  message: ParseNtResult enum with Block variant
  severity: INFO
  languages:
  - rust
  pattern-regex: enum\s+ParseNtResult\s*\{[^}]*Block\([^)]*\)[^}]*\}
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/parse*/**'
- id: is-metavar-block-definition
  message: is_metavar_block() function defined - replacement for is_whole_block()
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+is_metavar_block\s*\(
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*token*.rs'
- id: token-copy-trait-derived
  message: Token derives Copy trait - Interpolated removed
  severity: INFO
  languages:
  - rust
  pattern-regex: '#\[derive\([^]]*Copy[^]]*\)\][^}]*pub\s+struct\s+Token\s*\{'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*token*.rs'
- id: tokenkind-copy-trait-derived
  message: TokenKind derives Copy trait - Interpolated removed
  severity: INFO
  languages:
  - rust
  pattern-regex: '#\[derive\([^]]*Copy[^]]*\)\][^}]*pub\s+enum\s+TokenKind\s*\{'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*token*.rs'
- id: delimiter-skip-only-procmacro
  message: Delimiter skip only returns true for ProcMacro
  severity: INFO
  languages:
  - rust
  pattern-regex: Invisible\s*\(\s*InvisibleOrigin::ProcMacro\s*\)\s*=>\s*true
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*token*.rs'
- id: invisibleorigin-without-flattent
  message: InvisibleOrigin enum definition without FlattenToken
  severity: INFO
  languages:
  - rust
  pattern-regex: (?s)pub\s+enum\s+InvisibleOrigin\s*\{(?:(?!FlattenToken).)*\}
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*token*.rs'
