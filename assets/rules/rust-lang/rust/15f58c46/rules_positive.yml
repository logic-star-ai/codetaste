  severity: INFO
  languages:
  - rust
  pattern: 'fn is_metavar_block(...) -> $RET { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: parse-nt-result-block-return
  message: Detected return of ParseNtResult::Block - new variant used after refactoring
  severity: INFO
  languages:
  - rust
  pattern: 'return Ok(ParseNtResult::Block($EXPR))

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: parse-nt-result-block-ok
  message: Detected Ok(ParseNtResult::Block) - new variant used after refactoring
  severity: INFO
  languages:
  - rust
  pattern: 'Ok(ParseNtResult::Block($EXPR))

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: is-metavar-block-function-def
  message: Detected is_metavar_block function definition - renamed from is_whole_block
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+fn\s+is_metavar_block\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: parse-block-variant-construction
  message: Detected ParseNtResult::Block with collect_tokens - direct block result
    after refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: ParseNtResult::Block\s*\(\s*self\.collect_tokens
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: parse-metavar-block-check
  message: Detected is_metavar_block in boolean expression - metavar checking after
    refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: is_metavar_block\s*\(\s*\)\s*(&&|\|\||and|or)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: delimiter-invisible-procmacro-only
  message: Detected Delimiter::Invisible(ProcMacro) without FlattenToken - simplified
    after refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: Delimiter::Invisible\s*\(\s*InvisibleOrigin::ProcMacro\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: token-derive-with-copy
  message: Detected Token struct deriving Copy - enabled by removing Interpolated
  severity: INFO
  languages:
  - rust
  pattern-regex: '#\[derive\([^\]]*\bCopy\b[^\]]*\)\]\s+(pub\s+)?struct\s+Token\b'
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: parse-nt-result-with-block-enum-variant
  message: Detected ParseNtResult enum with Block variant - new variant after refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+enum\s+ParseNtResult\s*\{[^}]*Block\s*\([^)]+\)
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: invisible-origin-two-variant-enum
  message: Detected InvisibleOrigin enum with only MetaVar and ProcMacro - FlattenToken
    removed
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: 'pub enum InvisibleOrigin { $VAR1($TYPE1), $VAR2, }

      '
  - metavariable-regex:
      metavariable: $VAR1
      regex: MetaVarKind|MetaVar
  - metavariable-regex:
      metavariable: $VAR2
      regex: ProcMacro
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: parsent-result-block-in-ok
  message: Detected Ok(ParseNtResult::Block...) - new variant after refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: Ok\s*\(\s*ParseNtResult::Block
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: parsent-result-enum-definition
  message: Detected ParseNtResult enum definition with Block variant - new variant
    after refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+enum\s+ParseNtResult\s*\{[^}]*\bBlock\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: token-struct-derives-copy
  message: Detected Token struct with Copy derive - enabled after Interpolated removal
  severity: INFO
  languages:
  - rust
  pattern-regex: '#\[derive\([^\]]*Copy[^\]]*\)\][^\n]*\n[^\n]*pub\s+struct\s+Token\s*[<{]'
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: is-metavar-block-definition
  message: Detected is_metavar_block method definition - renamed from is_whole_block
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+fn\s+is_metavar_block\s*\(\s*&self\s*\)\s*->\s*bool
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: block-variant-in-parsent-enum
  message: Detected ParseNtResult enum with Block(P<ast::Block>) variant - new after
    refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+enum\s+ParseNtResult\s*\{[^}]*Block\s*\(\s*P\s*<\s*ast::Block\s*>\s*\)
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: metavar-block-with-boolean-or
  message: Detected is_metavar_block() in OR expression - new checking pattern
  severity: INFO
  languages:
  - rust
  pattern-regex: is_metavar_block\s*\(\s*\)\s*\|\|
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: block-parse-with-collect-no-attrs
  message: Detected ParseNtResult::Block with collect_tokens_no_attrs - new block
    parsing pattern
  severity: INFO
  languages:
  - rust
  pattern-regex: ParseNtResult::Block\s*\([^)]*collect_tokens_no_attrs
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: metavar-block-or-check
  message: Detected is_metavar_block in OR condition - metavar checking pattern
  severity: INFO
  languages:
  - rust
  pattern-regex: is_metavar_block\s*\(\s*\)\s*\|\|[^;{]*\{
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: metavar-block-negation-pattern
  message: Detected !self.token.is_metavar_block() - negated metavar block check
  severity: INFO
  languages:
  - rust
  pattern-regex: '!\s*self\.token\.is_metavar_block\s*\(\s*\)'
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: metavar-block-pipe-or
  message: Detected is_metavar_block() || - OR condition with metavar check
  severity: INFO
  languages:
  - rust
  pattern-regex: \.is_metavar_block\s*\(\s*\)\s*\|\|\s*[^;{]+
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: parsent-block-construction-pattern
  message: Detected ParseNtResult::Block construction - creating block result
  severity: INFO
  languages:
  - rust
  pattern-regex: ParseNtResult::Block\s*\(\s*[a-z_]+\.(?:parse|collect)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: parse-block-in-return
  message: Detected return with ParseNtResult::Block - returning block result
  severity: INFO
  languages:
  - rust
  pattern-regex: return[^;]*ParseNtResult::Block
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: is-metavar-block-return-bool
  message: Detected is_metavar_block implementation with match - function body
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+fn\s+is_metavar_block[^{]*\{\s*match
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
