  severity: INFO
  languages:
  - rust
  pattern-regex: self\.token\.is_metavar_block\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: is-metavar-block-in-if-condition
