    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: else-if-is-metavar-block
  message: Detected else if with is_metavar_block() - conditional branching
  severity: INFO
  languages:
  - rust
  pattern-regex: else\s+if\s+[^{;]*\.is_metavar_block\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: metavar-block-in-if-let
  message: Detected if let with MetaVarKind::Block - pattern matching
  severity: INFO
  languages:
  - rust
  pattern-regex: if\s+let[^{]*MetaVarKind::Block
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: parse-nt-result-block-variant
  message: Detected ParseNtResult::Block variant usage - new variant after refactoring
  severity: INFO
  languages:
  - rust
  pattern: 'ParseNtResult::Block($EXPR)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
