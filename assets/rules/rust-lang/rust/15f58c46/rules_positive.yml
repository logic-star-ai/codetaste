  severity: INFO
  languages:
  - rust
  pattern-regex: if\s+[^{;]*\.is_metavar_block\s*\(\s*\)\s*[{]
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: not-is-metavar-block
  message: Detected negated is_metavar_block() - new checking pattern after refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: '!\s*[^;{]*\.is_metavar_block\s*\(\s*\)'
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: parse-nt-result-block-construction
  message: Detected ParseNtResult::Block construction - new variant after refactoring
  severity: INFO
  languages:
  - rust
  pattern-regex: ParseNtResult::Block\s*\(
  metadata:
