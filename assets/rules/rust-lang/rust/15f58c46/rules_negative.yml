rules:
- id: detect-interpolated-in-match-arm
  message: Pattern matching or construction of 'Interpolated' variant detected. This
    should have been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Interpolated\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: detect-nonterminal-type-reference
  message: Reference to 'Nonterminal' type detected. This type should have been removed
    in the refactoring.
  severity: WARNING
  languages:
  - rust
  pattern: Nonterminal
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-interpolated-case-in-match
  message: Match arm for Interpolated variant detected. This variant should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Interpolated\s*\([^)]*\)\s*=>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-tokenkind-interpolated-variant
  message: Reference to 'TokenKind::Interpolated' variant detected. This variant should
    have been removed.
  severity: WARNING
  languages:
  - rust
  pattern: TokenKind::Interpolated
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-is-whole-block-reference
  message: Reference to 'is_whole_block' detected. Should be replaced with 'is_metavar_block'.
  severity: WARNING
  languages:
  - rust
  pattern-regex: is_whole_block
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-is-whole-block-method
  message: Call to 'is_whole_block()' method detected. Should be replaced with 'is_metavar_block()'.
  severity: WARNING
  languages:
  - rust
  pattern: $X.is_whole_block()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-ntblock-case-in-match
  message: Match arm for NtBlock variant detected. This variant should have been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: NtBlock\s*\([^)]*\)\s*=>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-ntblock-variant
  message: Reference to 'NtBlock' variant detected. This Nonterminal variant should
    have been removed.
  severity: WARNING
  languages:
  - rust
  pattern: NtBlock
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-nonterminal-in-type-annotation
  message: Type annotation with 'Nonterminal' detected. This type should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: :\s*(?:&\s*(?:mut\s+)?)?Nonterminal\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-nonterminal-import
  message: Import of 'Nonterminal' type detected. This type should have been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: use\s+.*\bNonterminal\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-nonterminal-use-statements
  message: Import of Nonterminal type or variants detected. This should have been
    removed.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: use $PKG::Nonterminal;
    - pattern: use $PKG::Nonterminal::*;
    - pattern: pub use Nonterminal::*;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-hastokens-impl-for-nonterminal
  message: Implementation of 'HasTokens' for 'Nonterminal' detected. This should have
    been removed.
  severity: WARNING
  languages:
  - rust
  pattern: "impl HasTokens for Nonterminal {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-nonterminal-reference-parameter
  message: Function parameter with '&Nonterminal' type detected. This type should
    have been removed.
  severity: WARNING
  languages:
  - rust
  pattern: "fn $FUNC(..., $PARAM: &Nonterminal, ...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-flatten-token-in-comment
  message: Reference to 'flatten_token' detected. This method/concept should have
    been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: flatten_token
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-nonterminal-to-string-reference
  message: Reference to 'nonterminal_to_string' detected. This function should have
    been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: nonterminal_to_string
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-interpolated-wildcard-pattern
  message: Wildcard pattern for Interpolated variant detected. This variant should
    have been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Interpolated\s*\(\.\.\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-from-nonterminal-ast-reference
  message: Reference to 'from_nonterminal_ast' detected. This method should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: from_nonterminal_ast
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-interpolated-token-check-patterns
  message: If-let pattern checking for Interpolated token detected. Should use metavariable
    checks instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: if\s+let\s+(?:Some\()?(?:token::)?Interpolated
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-from-nonterminal-ast-method
  message: Call to 'from_nonterminal_ast()' method detected. This method should have
    been removed.
  severity: WARNING
  languages:
  - rust
  pattern: TokenStream::from_nonterminal_ast(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-invisibleorigin-flattentoken
  message: Reference to 'InvisibleOrigin::FlattenToken' variant detected. This variant
    should have been removed.
  severity: WARNING
  languages:
  - rust
  pattern: InvisibleOrigin::FlattenToken
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-impl-for-nonterminal
  message: Implementation for Nonterminal type detected. This type should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: impl\s+(?:\w+\s+for\s+)?Nonterminal\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-flatten-token-tree-reference
  message: Reference to 'flatten_token_tree' detected. This method should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: flatten_token_tree
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-visit-nonterminal-reference
  message: Reference to 'visit_nonterminal' detected. This visitor method should have
    been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: visit_nonterminal
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-arc-nonterminal-regex
  message: Arc<Nonterminal> type detected. Nonterminal should have been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Arc<\s*Nonterminal\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-ntblock-double-deref
  message: Double deref pattern for NtBlock checking detected. This should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern: 'matches!(&**$NT, NtBlock(..))

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-interpolated-variant-general
  message: Interpolated token variant detected in any form. This should have been
    removed.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: Interpolated($X)
    - pattern: TokenKind::Interpolated($X)
    - pattern: token::Interpolated($X)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-interpolated-in-pattern-list
  message: Interpolated in pattern list detected. This variant should have been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \|\s*Interpolated\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-flatten-in-function-name
  message: Function name containing flatten and token detected. Flattening logic should
    be removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+.*flatten.*token
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-token-contains-ast-comment
  message: Comment about tokens containing AST nodes detected. This was the Interpolated
    concept that should be removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: (?://|/\*).*[Tt]oken.*contain.*AST
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-flatten-token-method
  message: Call to 'flatten_token()' method detected. This method should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern: $X.flatten_token(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-flatten-token-tree-method
  message: Call to 'flatten_token_tree()' method detected. This method should have
    been removed.
  severity: WARNING
  languages:
  - rust
  pattern: $X.flatten_token_tree(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-parsent-result-nt-variant
  message: Reference to 'ParseNtResult::Nt' variant detected. This variant should
    have been removed.
  severity: WARNING
  languages:
  - rust
  pattern: ParseNtResult::Nt(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-visit-nonterminal-method
  message: Definition of 'visit_nonterminal()' method detected. This visitor method
    should have been removed.
  severity: WARNING
  languages:
  - rust
  pattern: "fn visit_nonterminal($SELF, $NT: &Nonterminal) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-interpolated-constructor
  message: Construction of TokenKind::Interpolated variant detected. This variant
    should have been removed.
  severity: WARNING
  languages:
  - rust
  pattern: TokenKind::Interpolated($EXPR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-nonterminal-enum-pub
  message: Public Nonterminal enum definition detected. This enum should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+enum\s+Nonterminal\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-maybe-whole-macro-reference
  message: maybe_whole! macro with Nt variant detected. This pattern should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: maybe_whole!\s*\([^,]+,\s*Nt
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-interpolated-doc-comment
  message: Documentation comment mentioning Interpolated detected. This should be
    updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ///.*Interpolated
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-tokenkind-copy-not-implemented
  message: Clone implementation for TokenKind detected. TokenKind should now implement
    Copy instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: impl\s+Clone\s+for\s+TokenKind\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-flatten-token-function
  message: Definition of flatten_token function detected. This function should have
    been removed.
  severity: WARNING
  languages:
  - rust
  pattern: "fn flatten_token(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-flatten-token-tree-function
  message: Definition of flatten_token_tree function detected. This function should
    have been removed.
  severity: WARNING
  languages:
  - rust
  pattern: "fn flatten_token_tree(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-interpolated-token-matching
  message: Pattern matching on token::Interpolated detected. This variant should have
    been removed.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: token::Interpolated($VAR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-ntblock-pattern
  message: NtBlock variant detected in pattern or construction. This should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern: NtBlock(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-token-cannot-be-copy-comment
  message: Comment about TokenKind not being Copy due to Interpolated detected. This
    is no longer relevant.
  severity: WARNING
  languages:
  - rust
  pattern-regex: TokenKind.*(?:cannot|would).*Copy.*Interpolated
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-interpolated-must-impl-copy
  message: Comment about Interpolated implementing Copy detected. This is no longer
    relevant.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Interpolated.*must.*impl.*Copy
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-nonterminal-glob-import
  message: Glob import of Nonterminal variants detected. This should have been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+use\s+Nonterminal::\*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-interpolated-eof-pattern
  message: Pattern combining Interpolated with other variants detected. Interpolated
    should have been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Interpolated\([^)]*\)\s*\|\s*Eof
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-nonterminal-enum-definition
  message: Nonterminal enum definition with NtBlock variant detected. This should
    have been removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+enum\s+Nonterminal\s*\{[^}]*NtBlock
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-tokenkind-interpolated-definition
  message: TokenKind::Interpolated variant definition detected. This should have been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Interpolated\s*\(\s*Arc\s*<\s*Nonterminal\s*>\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-delim-args-flattened-usage
  message: DelimArgs using flattened detected. Should use tokens directly.
  severity: WARNING
  languages:
  - rust
  pattern-regex: DelimArgs.*flattened
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-visit-nonterminal-calls
  message: Call to visit_nonterminal visitor method detected. This should have been
    removed.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: visit_nonterminal($X, $Y)
    - pattern: $X.visit_nonterminal($Y)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-is-whole-block-definition
  message: Definition of is_whole_block function detected. Should be replaced with
    is_metavar_block.
  severity: WARNING
  languages:
  - rust
  pattern: "fn is_whole_block(...) -> $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
