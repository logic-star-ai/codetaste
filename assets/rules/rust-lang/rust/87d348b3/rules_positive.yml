rules:
- id: build-method-typing-mode-parameter
  message: Detected .build() call with TypingMode variant
  severity: INFO
  languages:
  - rust
  pattern-regex: '\.build\s*\(\s*TypingMode\s*::'
  metadata:
    category: api
    nr_refactored_patterns: 66
    nr_legacy_patterns: 0
- id: typing-mode-import
  message: Detected import/use of TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: use\s+.*TypingMode
  metadata:
    category: dependency
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
- id: typing-mode-tcx-relation
  message: Detected relationship between TyCtxt and TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: TyCtxt.*TypingMode|TypingMode.*TyCtxt
  metadata:
    category: api
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
- id: typing-mode-coherence-reference
  message: Detected TypingMode::Coherence usage (regex match)
  severity: INFO
  languages:
  - rust
  pattern-regex: TypingMode\s*::\s*Coherence
  metadata:
    category: api
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
- id: typing-mode-coherence-comment-pattern
  message: Detected comment/documentation mentioning TypingMode and coherence
  severity: INFO
  languages:
  - rust
  pattern-regex: (?i)(typing.?mode|coherence.?mode).*coherence
  metadata:
    category: other
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
- id: typing-mode-coherence-construction
  message: Detected TypingMode::Coherence unit variant construction
  severity: INFO
  languages:
  - rust
  pattern-regex: TypingMode\s*::\s*Coherence(?!\w)
  metadata:
    category: api
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
- id: typing-mode-coherence-variant
  message: Detected TypingMode::Coherence variant usage - replaces intercrate=true
  severity: INFO
  languages:
  - rust
  pattern: 'TypingMode::Coherence

    '
  metadata:
    category: api
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: typing-mode-postanalysis-reference
  message: Detected TypingMode::PostAnalysis usage (regex match)
  severity: INFO
  languages:
  - rust
  pattern-regex: TypingMode\s*::\s*PostAnalysis
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: typing-mode-postanalysis-variant
  message: Detected TypingMode::PostAnalysis variant - for codegen/MIR with revealed
    opaques
  severity: INFO
  languages:
  - rust
  pattern: 'TypingMode::PostAnalysis

    '
  metadata:
    category: api
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: typing-mode-from-param-env-method
  message: Detected TypingMode::from_param_env() compatibility method
  severity: INFO
  languages:
  - rust
  pattern: TypingMode::from_param_env($X)
  metadata:
    category: api
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: typing-mode-from-param-env-regex
  message: Detected TypingMode::from_param_env conversion function
  severity: INFO
  languages:
  - rust
  pattern-regex: TypingMode\s*::\s*from_param_env
  metadata:
    category: api
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: typing-mode-analysis-struct-pattern
  message: Detected TypingMode::Analysis struct pattern (regex match)
  severity: INFO
  languages:
  - rust
  pattern-regex: TypingMode\s*::\s*Analysis\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: typing-mode-unwrap-pattern
  message: Detected TypingMode::Analysis destructuring pattern
  severity: INFO
  languages:
  - rust
  pattern-regex: TypingMode\s*::\s*Analysis\s*\{[^}]*\}
  metadata:
    category: basic
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: typing-mode-analysis-creation-pattern
  message: Detected TypingMode::Analysis struct literal creation
  severity: INFO
  languages:
  - rust
  pattern-regex: TypingMode\s*::\s*Analysis\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: infercxt-typing-mode-method
  message: Detected InferCtxt::typing_mode() accessor method call
  severity: INFO
  languages:
  - rust
  pattern: '$INFCX.typing_mode()

    '
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: infercxt-typing-mode-accessor-regex
  message: Detected .typing_mode() accessor method
  severity: INFO
  languages:
  - rust
  pattern-regex: \.typing_mode\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: typing-mode-postanalysis-match-arm
  message: Detected match arm for TypingMode::PostAnalysis
  severity: INFO
  languages:
  - rust
  pattern-regex: TypingMode\s*::\s*PostAnalysis\s*=>
  metadata:
    category: basic
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: typing-mode-coherence-any-case
  message: Detected text relating coherence and typing mode
  severity: INFO
  languages:
  - rust
  pattern-regex: '[Cc]oherence.*typing.*mode|typing.*mode.*[Cc]oherence'
  metadata:
    category: other
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: typing-mode-analysis-defining-opaque-pattern
  message: Detected Analysis variant with defining_opaque_types field
  severity: INFO
  languages:
  - rust
  pattern-regex: Analysis\s*\{\s*defining_opaque_types
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: typing-mode-function-return-type
  message: Detected function return type as TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: ->\s*TypingMode\s*<
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: match-typing-mode-pattern
  message: Detected match expression on TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: 'match\s+\S+\s*\{\s*TypingMode\s*::'
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: typing-mode-coherence-match-arm
  message: Detected match arm for TypingMode::Coherence
  severity: INFO
  languages:
  - rust
  pattern-regex: TypingMode\s*::\s*Coherence\s*=>
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: typing-mode-analysis-match-arm
  message: Detected match arm for TypingMode::Analysis
  severity: INFO
  languages:
  - rust
  pattern-regex: TypingMode\s*::\s*Analysis\s*\{[^}]*\}\s*=>
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: typing-mode-type-annotation
  message: Detected TypingMode type annotation
  severity: INFO
  languages:
  - rust
  pattern-regex: :\s*TypingMode\s*<
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: typing-mode-tuple-type
  message: Detected tuple type containing TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: \(.*TypingMode.*,.*\)
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: typing-mode-reveal-relation
  message: Detected relationship between Reveal and TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: Reveal.*TypingMode|TypingMode.*Reveal
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: canonical-query-input-typing-mode-field
  message: Detected typing_mode field in struct/enum
  severity: INFO
  languages:
  - rust
  pattern-regex: typing_mode\s*:\s*TypingMode
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: typing-mode-field-in-struct
  message: Detected typing_mode struct field with generic type parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: typing_mode\s*:\s*TypingMode\s*<[^>]+>
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: build-with-postanalysis-mode
  message: Detected .build() with TypingMode::PostAnalysis
  severity: INFO
  languages:
  - rust
  pattern-regex: \.build\s*\(\s*TypingMode\s*::\s*PostAnalysis
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: build-with-coherence-mode
  message: Detected .build() with TypingMode::Coherence
  severity: INFO
  languages:
  - rust
  pattern-regex: \.build\s*\(\s*TypingMode\s*::\s*Coherence
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: typing-mode-if-let-coherence
  message: Detected if-let pattern for TypingMode::Coherence
  severity: INFO
  languages:
  - rust
  pattern: 'if let TypingMode::Coherence = $X { ... }

    '
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: typing-mode-in-if-let
  message: Detected if-let pattern matching on TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: 'if\s+let\s+TypingMode\s*::'
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: typing-mode-fork-pattern
  message: Detected fork pattern with typing_mode
  severity: INFO
  languages:
  - rust
  pattern-regex: fork.*typing_mode|typing_mode.*fork
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: typing-mode-analysis-with-defining-opaques
  message: Detected TypingMode::Analysis with defining_opaque_types field
  severity: INFO
  languages:
  - rust
  pattern: 'TypingMode::Analysis { defining_opaque_types: $X }

    '
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: typing-mode-as-parameter-type
  message: Detected typing_mode as function/method parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: \(.*typing_mode\s*:\s*TypingMode
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: typing-mode-generic-bound
  message: Detected where clause or generic bound involving TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: where.*TypingMode|TypingMode.*:.*Interner
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: typing-mode-analysis-any-case
  message: Detected text relating analysis and typing mode
  severity: INFO
  languages:
  - rust
  pattern-regex: '[Aa]nalysis.*typing.*mode|typing.*mode.*[Aa]nalysis'
  metadata:
    category: other
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: typing-mode-interner-bound
  message: Detected Interner trait bound with TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: I\s*:\s*Interner.*TypingMode|TypingMode.*I\s*:\s*Interner
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: typing-mode-enum-declaration
  message: Detected TypingMode enum declaration
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+enum\s+TypingMode\s*<
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-impl-block
  message: Detected impl block for TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s*<[^>]*>\s*TypingMode\s*<
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-with-reveal
  message: Detected code relating typing_mode with reveal
  severity: INFO
  languages:
  - rust
  pattern-regex: typing_mode.*reveal|reveal.*typing_mode
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: canonical-input-typing-mode-access
  message: Detected access to typing_mode field on canonical/query input
  severity: INFO
  languages:
  - rust
  pattern-regex: (?:canonical_)?(?:query_)?input\.typing_mode
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-query-input-field
  message: Detected public typing_mode field in struct
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+typing_mode\s*:\s*TypingMode
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-method-self-param
  message: Detected method with self and typing_mode parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+\w+\s*\(\s*(?:&)?self.*typing_mode\s*:\s*TypingMode
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-result-type
  message: Detected Result type with TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: Result\s*<[^,]*TypingMode
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-unreachable-message
  message: Detected unreachable with TypingMode in message
  severity: INFO
  languages:
  - rust
  pattern-regex: unreachable!\s*\([^)]*TypingMode
  metadata:
    category: other
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-trait-bound-syntax
  message: Detected generic type parameter with TypingMode
  severity: INFO
  languages:
  - rust
  pattern-regex: <[^>]*TypingMode[^>]*>
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-closure-param
  message: Detected closure with typing_mode parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: \|[^|]*typing_mode\s*:\s*TypingMode
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-param-env-relation
  message: Detected relationship between ParamEnv and typing_mode
  severity: INFO
  languages:
  - rust
  pattern-regex: ParamEnv.*typing_mode|typing_mode.*ParamEnv
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-infercxt-relation
  message: Detected relationship between InferCtxt and typing_mode
  severity: INFO
  languages:
  - rust
  pattern-regex: InferCtxt.*typing_mode|typing_mode.*InferCtxt
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-canonical-relation
  message: Detected relationship between Canonical and typing_mode
  severity: INFO
  languages:
  - rust
  pattern-regex: Canonical.*typing_mode|typing_mode.*Canonical
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-query-relation
  message: Detected query system integration with typing_mode
  severity: INFO
  languages:
  - rust
  pattern-regex: '[Qq]uery.*typing_mode|typing_mode.*[Qq]uery'
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: typing-mode-delegate-pattern
  message: Detected delegate pattern with typing_mode
  severity: INFO
  languages:
  - rust
  pattern-regex: '[Dd]elegate.*typing_mode|typing_mode.*[Dd]elegate'
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
