rules:
- id: stable-mir-derives-deserialize
  message: Detected Deserialize derive in stable_mir - indicates types with deserialization
    support moved
  severity: INFO
  languages:
  - rust
  pattern: '#[derive(..., Deserialize, ...)]

    $ITEM

    '
  metadata:
    category: basic
    nr_refactored_patterns: 13831
    nr_legacy_patterns: 0
  paths:
    include:
    - compiler/stable_mir/src/**/*.rs
- id: stable-mir-has-clone-derive
  message: Detected Clone derive in stable_mir - indicates cloneable types moved
  severity: INFO
