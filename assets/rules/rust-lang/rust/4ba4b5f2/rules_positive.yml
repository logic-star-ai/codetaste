  - rust
  pattern: '#[derive(..., Clone, ...)]

    $ITEM

    '
  metadata:
    category: basic
    nr_refactored_patterns: 13831
    nr_legacy_patterns: 0
  paths:
    include:
    - compiler/stable_mir/src/**/*.rs
