- id: stable-mir-uses-rustc-middle
  message: Detected rustc_middle import in stable_mir - indicates stable_mir now directly
    uses rustc dependencies
  severity: INFO
  languages:
  - rust
  pattern-either:
  - pattern: use rustc_middle::$X;
  - pattern: use rustc_middle::$X::$Y;
  metadata:
    category: dependency
    nr_refactored_patterns: 50
    nr_legacy_patterns: 0
  paths:
    include:
    - compiler/stable_mir/src/**/*.rs
