  languages:
  - rust
  pattern-regex: '#\[macro_use\][^\n]*\n[^\n]*extern\s+crate\s+tracing'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
