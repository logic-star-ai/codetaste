rules:
- id: macro-use-before-extern-crate-tracing
  message: 'Remove #[macro_use] attribute from extern crate tracing declaration and
    use explicit imports'
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s+(extern\s+crate\s+tracing\s*;)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - compiler/rustc_borrowck/**
    - compiler/rustc_hir_analysis/**
    - compiler/rustc_hir_typeck/**
    - compiler/rustc_infer/**
    - compiler/rustc_mir_transform/**
    - compiler/rustc_trait_selection/**
- id: implicit-tracing-macro-import-pattern
  message: 'Modernize tracing import: remove #[macro_use] and add explicit use tracing::{{debug,
    trace, ...}}'
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[macro_use\]\s*\n\s*extern\s+crate\s+tracing\s*;'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - compiler/rustc_borrowck/**
    - compiler/rustc_hir_analysis/**
    - compiler/rustc_hir_typeck/**
    - compiler/rustc_infer/**
    - compiler/rustc_mir_transform/**
    - compiler/rustc_trait_selection/**
- id: macro-use-tracing-multiline
