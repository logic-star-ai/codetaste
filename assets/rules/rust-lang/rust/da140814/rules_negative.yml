rules:
- id: detect-ty-branon-two-args-qualified
  message: ty::BrAnon should no longer take a u32 index. Use ty::BrAnon($SPAN) instead.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon($INDEX, $SPAN)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-ty-boundregion-branon-pattern-idx
  message: ty::BrAnon pattern/construction with index is outdated. Use ty::BrAnon($SPAN)
    only.
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BrAnon($IDX, $SPAN)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-ty-br-anon-two-parameters
  message: ty::BrAnon with two parameters is outdated. Use ty::BrAnon($B) with only
    the span.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon($A, $B)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-branon-anon-variable-idx
  message: ty::BrAnon with variable index is outdated. Use ty::BrAnon($SPAN) with
    only the span.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon($ANON, $SPAN)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-br-anon-qualified-two-arg
  message: ty::BrAnon with two arguments is outdated. Use ty::BrAnon($Y) with only
    the span parameter.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon($X, $Y)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-ty-branon-with-none
  message: ty::BrAnon should no longer take a u32 index. Use ty::BrAnon(None) instead.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon($INDEX, None)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-ty-branon-index-none
  message: ty::BrAnon with index parameter is outdated. Use ty::BrAnon(None) only.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon($INDEX, None)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-ty-boundregion-kind-branon-construction
  message: BoundRegion construction should not duplicate var index in BrAnon. Use
    ty::BrAnon($SPAN).
  severity: WARNING
  languages:
  - rust
  pattern: "ty::BoundRegion { \n  var: $VAR, \n  kind: ty::BrAnon($N, $SPAN) \n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-boundregion-struct-with-branon-idx
  message: BoundRegion struct construction should not include index in BrAnon. Use
    ty::BrAnon($SPAN).
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: $VAR, kind: ty::BrAnon($INDEX, $SPAN) }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-boundregion-idx-with-ty-prefix
  message: ty::BoundRegion should not have index in BrAnon kind. Use ty::BrAnon($S)
    only.
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: $V, kind: ty::BrAnon($I, $S) }'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-placeholder-name-field-with-ty
  message: Placeholder field 'name' should be 'bound'. Update field name in struct
    initialization.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'name:\s*ty::'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-placeholder-name-field-ty-prefix
  message: Placeholder should use 'bound' field with full Bound type instead of 'name'
    with BoundKind.
  severity: WARNING
  languages:
  - rust
  pattern-regex: name:\s*ty::Bound
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-placeholder-name-access-any-context
  message: Accessing placeholder.name is outdated. Use placeholder.bound instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bplaceholder\s*\.\s*name\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-boundtykind-anon-qualified-with-idx
  message: ty::BoundTyKind::Anon should not take an index parameter. Use ty::BoundTyKind::Anon
    (unit variant).
  severity: WARNING
  languages:
  - rust
  pattern: ty::BoundTyKind::Anon($INDEX)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-boundtykind-anon-ty-prefix-idx
  message: ty::BoundTyKind::Anon should not have a parameter. Use ty::BoundTyKind::Anon
    (unit variant).
  severity: WARNING
  languages:
  - rust
  pattern: ty::BoundTyKind::Anon($I)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-boundtykind-anon-parameter
  message: ty::BoundTyKind::Anon should not have a parameter. Use ty::BoundTyKind::Anon
    (unit variant).
  severity: WARNING
  languages:
  - rust
  pattern: ty::BoundTyKind::Anon($X)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-branon-with-literal-zero
  message: BrAnon should no longer take a numeric index. Use ty::BrAnon($SPAN) instead.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon(0, $SPAN)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-boundvar-from-u32-with-branon-duplicate
  message: 'BoundRegion duplicates the index unnecessarily. BrAnon should only take
    span: ty::BrAnon($SPAN).'
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: ty::BoundVar::from_u32($N), kind: ty::BrAnon($N,
    $SPAN) }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-boundregion-from-u32-with-index
  message: BoundRegion construction duplicates index between var and BrAnon. Use ty::BrAnon($SPAN)
    only.
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: ty::BoundVar::from_u32($N), kind: ty::BrAnon($N,
    $SPAN) }'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-boundvar-from-u32-n-branon
  message: 'BoundRegion duplicates index between var and BrAnon. Remove index from
    BrAnon: use ty::BrAnon(None).'
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: ty::BoundVar::from_u32($NUM), kind: ty::BrAnon($NUM,
    None) }'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-boundregion-full-old-pattern
  message: BoundRegion pattern duplicates index. Use ty::BrAnon($Y) without redundant
    from_u32 index.
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: ty::BoundVar::from_u32($X), kind: ty::BrAnon($X,
    $Y) }'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-ty-branon-literal-numeric
  message: ty::BrAnon should no longer take a numeric literal. Use ty::BrAnon(None)
    or ty::BrAnon(Some($SPAN)).
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: ty::BrAnon(0, None)
  - pattern: ty::BrAnon(1, None)
  - pattern: ty::BrAnon(0, Some($SPAN))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-br-anon-with-numeric-literal
  message: ty::BrAnon with numeric literal is outdated. Use ty::BrAnon(None) without
    index.
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: ty::BrAnon(0, None)
  - pattern: ty::BrAnon(1, None)
  - pattern: ty::BrAnon(2, None)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-branon-placeholder-name-boundtykind
  message: 'Placeholder should use ''bound: BoundTy'' instead of ''name: BoundTyKind''.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: name:\s*ty::BoundTyKind
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-boundregion-branon-with-zero
  message: BoundRegion construction should not include numeric index in BrAnon. Use
    ty::BrAnon($SPAN).
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: $VAR, kind: ty::BrAnon(0, $SPAN) }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-ty-branon-idx-cast
  message: ty::BrAnon should no longer take a u32 index. Use ty::BrAnon($SPAN) instead.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon($IDX as u32, $SPAN)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-boundregion-var-from-u32-0
  message: BoundRegion duplicates index 0. Use ty::BrAnon($SPAN) without the redundant
    index.
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: ty::BoundVar::from_u32(0), kind: ty::BrAnon(0,
    $SPAN) }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-branon-placeholder-name-boundregionkind
  message: 'Placeholder should use ''bound: BoundRegion'' instead of ''name: BoundRegionKind''.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: name:\s*ty::BoundRegionKind
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-chalk-placeholder-name-branon
  message: 'Chalk placeholder should use ''bound: BoundRegion'' instead of ''name:
    BoundRegionKind::...''.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'name:\s*ty::BoundRegionKind::'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-branon-idx-as-u32-parameter
  message: ty::BrAnon should not use index cast to u32. Use ty::BrAnon($SPAN) only.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon($IDX as u32, $SPAN)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-boundtykind-anon-with-u32
  message: BoundTyKind::Anon should no longer take a u32 argument. Use BoundTyKind::Anon
    instead.
  severity: WARNING
  languages:
  - rust
  pattern: BoundTyKind::Anon($INDEX)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-boundtykind-anon-expect-method
  message: BoundTyKind::Anon should no longer contain a u32 index. Update to BoundTyKind::Anon
    (unit variant).
  severity: WARNING
  languages:
  - rust
  pattern: 'BoundTyKind::Anon($I)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-boundtykind-anon-with-index-any
  message: BoundTyKind::Anon should not have a parameter. Use BoundTyKind::Anon (unit
    variant).
  severity: WARNING
  languages:
  - rust
  pattern: BoundTyKind::Anon($N)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-branon-var-as-u32-construction
  message: BrAnon should no longer take var.as_u32() as first argument. Use ty::BrAnon($SPAN)
    directly.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon($VAR.as_u32(), $SPAN)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-ty-boundty-kind-anon-with-idx
  message: ty::BoundTy with Anon containing index is outdated. Use ty::BoundTyKind::Anon
    without parameter.
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundTy { var: $VAR, kind: ty::BoundTyKind::Anon($IDX) }'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-branon-with-var-u32-call
  message: ty::BrAnon should not take var.as_u32(). Use ty::BrAnon(None) directly.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BrAnon($VAR.as_u32(), None)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-branon-with-two-args-construction
  message: BrAnon should no longer take a u32 index argument. Use BrAnon($SPAN) instead.
  severity: WARNING
  languages:
  - rust
  pattern: BrAnon($INDEX, $SPAN)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-expect-anon-method-returning-u32
  message: expect_anon method should be updated to match the new BoundTyKind::Anon
    structure without u32.
  severity: WARNING
  languages:
  - rust
  pattern: 'pub fn expect_anon(self) -> u32 { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-branon-with-none-span
  message: BrAnon should no longer take a u32 index as first argument. Use BrAnon(None)
    instead.
  severity: WARNING
  languages:
  - rust
  pattern: BrAnon($INDEX, None)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-boundregion-with-branon-var-as-u32
  message: BoundRegion with BrAnon should no longer duplicate the var as u32. Use
    ty::BrAnon($SPAN) instead.
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: $VAR, kind: ty::BrAnon($VAR.as_u32(), $SPAN) }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-branon-pattern-with-var-name
  message: BrAnon pattern matching with index variable should be updated to ty::BrAnon($_)
    without the index.
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegionKind::BrAnon($VAR, $_)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-placeholder-struct-with-name-field-def
  message: Placeholder struct definition should use 'bound' field instead of 'name'.
  severity: WARNING
  languages:
  - rust
  pattern: "pub struct Placeholder<$T> {\n  pub universe: $U,\n  pub name: $T,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-placeholder-name-in-typeerror
  message: TypeError construction should use $PLACEHOLDER.bound instead of $PLACEHOLDER.name.
  severity: WARNING
  languages:
  - rust
  pattern: TypeError::RegionsOverlyPolymorphic($PLACEHOLDER.name, $REGION)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-placeholder-name-in-insufficient-error
  message: TypeError construction should use $PLACEHOLDER.bound instead of $PLACEHOLDER.name.
  severity: WARNING
  languages:
  - rust
  pattern: TypeError::RegionsInsufficientlyPolymorphic($PLACEHOLDER.name, $REGION)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-boundregion-var-kind-separate-branon
  message: BoundRegion should not have redundant index in BrAnon. Use BrAnon($SPAN)
    only.
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: $VAR, kind: BrAnon($INDEX, $SPAN) }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-ty-boundregionkind-branon-two-args
  message: ty::BoundRegionKind::BrAnon should no longer take an index. Use ty::BoundRegionKind::BrAnon($SPAN).
  severity: WARNING
  languages:
  - rust
  pattern: ty::BoundRegionKind::BrAnon($INDEX, $SPAN)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-branon-in-struct-field
  message: BrAnon with numeric first parameter is outdated. Use BrAnon($_) with only
    the span parameter.
  severity: WARNING
  languages:
  - rust
  pattern: 'BrAnon($NUM, $_)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-branon-construction-variable-index
  message: BrAnon construction with two parameters is outdated. Use BrAnon($SPAN)
    only.
  severity: WARNING
  languages:
  - rust
  pattern: BrAnon($VAR, $SPAN)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-boundvar-as-u32-in-branon
  message: BrAnon should not use var.as_u32() as a parameter. Use BrAnon($SPAN) only.
  severity: WARNING
  languages:
  - rust
  pattern: BrAnon($V.as_u32(), $SPAN)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-boundregionkind-branon-qualified
  message: ty::BoundRegionKind::BrAnon should not include index parameter. Use ty::BoundRegionKind::BrAnon($SPAN).
  severity: WARNING
  languages:
  - rust
  pattern: ty::BoundRegionKind::BrAnon($IDX, $SPAN)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-branon-construction-with-index
  message: BrAnon construction with index parameter is outdated. Use BrAnon($SPAN)
    only.
  severity: WARNING
  languages:
  - rust
  pattern: BrAnon($NUM, $SPAN)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-boundty-anon-with-parameter
  message: BoundTy with Anon variant containing index is outdated. Use BoundTyKind::Anon
    without parameter.
  severity: WARNING
  languages:
  - rust
  pattern: 'BoundTy { var: $VAR, kind: BoundTyKind::Anon($IDX) }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-branon-var-index-pattern
  message: ty::BoundRegionKind::BrAnon with variable index is outdated. Use ty::BoundRegionKind::BrAnon($SPAN).
  severity: WARNING
  languages:
  - rust
  pattern: ty::BoundRegionKind::BrAnon($V, $SPAN)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-ty-boundregion-with-idx-span
  message: ty::BoundRegion should not include index in BrAnon kind. Use BrAnon($SPAN).
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: $V, kind: BrAnon($IDX, $SPAN) }'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-branon-index-variable-param
  message: BrAnon with index parameter is outdated. Use BrAnon(None) without the index.
  severity: WARNING
  languages:
  - rust
  pattern: BrAnon($INDEX, None)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-ty-boundregionkind-two-params
  message: ty::BoundRegionKind::BrAnon should only take span parameter. Remove the
    index parameter.
  severity: WARNING
  languages:
  - rust
  pattern: ty::BoundRegionKind::BrAnon($A, $B)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-branon-num-span-option
  message: BrAnon with numeric index is outdated. Use BrAnon($OPT) with only the span
    option.
  severity: WARNING
  languages:
  - rust
  pattern: BrAnon($NUM, $OPT)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-ty-boundregion-with-var-u32
  message: ty::BoundRegion duplicates var info in BrAnon. Use ty::BrAnon($S) without
    var.as_u32().
  severity: WARNING
  languages:
  - rust
  pattern: 'ty::BoundRegion { var: $V, kind: ty::BrAnon($V.as_u32(), $S) }'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-placeholder-name-tykind
  message: 'Placeholder should use ''bound: BoundTy'' instead of ''name: BoundTyKind''.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: name:\s*BoundTyKind
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-boundregionkind-ty-branon-two
  message: ty::BoundRegionKind::BrAnon with two parameters is outdated. Use ty::BoundRegionKind::BrAnon($B).
  severity: WARNING
  languages:
  - rust
  pattern: ty::BoundRegionKind::BrAnon($A, $B)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-branon-index-option-span
  message: BrAnon with index parameter is outdated. Use BrAnon($OS) with only the
    Option<Span>.
  severity: WARNING
  languages:
  - rust
  pattern: BrAnon($I, $OS)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
