rules:
- id: comment-from-exposed-addr-v2
  message: Update comment to use `with_exposed_provenance` instead of `from_exposed_addr`
  severity: WARNING
  languages:
  - rust
  pattern-regex: \/\/.*from_exposed_addr
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
  paths:
    exclude:
    - src/tools/rust-analyzer/
- id: doc-comment-from-exposed-addr-v2
  message: Update documentation to use `with_exposed_provenance` instead of `from_exposed_addr`
  severity: WARNING
  languages:
  - rust
  pattern-regex: \/\/\/.*from_exposed_addr
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    exclude:
    - src/tools/rust-analyzer/
- id: cast-kind-enum-variant
  message: Replace `PointerFromExposedAddress` with `PointerWithExposedProvenance`
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bPointerFromExposedAddress\b
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    exclude:
    - src/tools/rust-analyzer/
    - '*.stderr'
- id: doc-fn-from-exposed-addr
  message: Update doc comment to use `with_exposed_provenance`
  severity: WARNING
  languages:
  - rust
  pattern-regex: /// .*`from_exposed_addr`
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    exclude:
    - src/tools/rust-analyzer/
- id: ptr-wildcard-from-exposed-addr-comment
  message: Update comment discussing `from_exposed_addr` to use `with_exposed_provenance`
  severity: WARNING
  languages:
  - rust
  pattern-regex: expose_addr.*from_exposed_addr
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: mir-syntax-pointer-from-exposed-address
  message: Replace enum variant `PointerFromExposedAddress` with `PointerWithExposedProvenance`
  severity: WARNING
  languages:
  - rust
  pattern-regex: PointerFromExposedAddress\s*,
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - src/tools/rust-analyzer/
- id: ptr-from-exposed-addr-turbofish
  message: Replace `ptr::from_exposed_addr` with `ptr::with_exposed_provenance`
  severity: WARNING
  languages:
  - rust
  pattern: ptr::from_exposed_addr::<$T>($ADDR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: inline-comment-from-exposed-addr
  message: Update module doc comment to use `with_exposed_provenance`
  severity: WARNING
  languages:
  - rust
  pattern-regex: //!.*from_exposed_addr
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - src/tools/rust-analyzer/
