rules:
- id: report-object-safety-error-function
  message: Function 'report_object_safety_error' should be renamed to 'report_dyn_incompatibility'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: report_object_safety_error(...)
  - pattern-not: report_dyn_incompatibility(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: report-object-safety-error-call
  message: Call to 'report_object_safety_error' should be renamed to 'report_dyn_incompatibility'
  severity: WARNING
  languages:
  - rust
  pattern: report_object_safety_error(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: push-ObjectSafetyViolation
  message: Usage of 'ObjectSafetyViolation' should be renamed to 'DynCompatibilityViolation'
  severity: WARNING
  languages:
  - rust
  pattern: '$VEC.push(ObjectSafetyViolation::$VARIANT(...))

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: object-safety-method-call
  message: Method call 'object_safety_violations' should be renamed to 'dyn_compatibility_violations'
  severity: WARNING
  languages:
  - rust
  pattern: $X.object_safety_violations(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: tcx-object-safety-query-field-access
  message: Query field 'object_safety_violations' should be renamed to 'dyn_compatibility_violations'
  severity: WARNING
  languages:
  - rust
  pattern: '$TCX.object_safety_violations

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: function-returning-object-safety-violations
  message: Function returning 'Vec<ObjectSafetyViolation>' should be updated to 'Vec<DynCompatibilityViolation>'
  severity: WARNING
  languages:
  - rust
  pattern: "fn $FUNC(...) -> Vec<ObjectSafetyViolation> {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: enum-variant-contains-ObjectSafe
  message: Enum variant with 'ObjectSafe' in name should be renamed to use 'DynCompatible'
  severity: WARNING
  languages:
  - rust
  pattern-regex: \s+\w*ObjectSafe\w*\([^)]*\),
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: if-is-object-safe
  message: Call to 'is_object_safe' should be renamed to 'is_dyn_compatible'
  severity: WARNING
  languages:
  - rust
  pattern: 'if $TCX.is_object_safe($ARG) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: turbofish-call-object-safety-violations
  message: Call to 'object_safety_violations' should be renamed to 'dyn_compatibility_violations'
  severity: WARNING
  languages:
  - rust
  pattern: $X::object_safety_violations(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: object-safety-violations-call-tcx
  message: Call to 'object_safety_violations' should be renamed to 'dyn_compatibility_violations'
  severity: WARNING
  languages:
  - rust
  pattern: $TCX.object_safety_violations($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
