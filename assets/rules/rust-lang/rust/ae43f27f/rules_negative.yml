  message: Function 'object_safety_violations_for_assoc_item' should be renamed to
    'dyn_compatibility_violations_for_assoc_item'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: object_safety_violations_for_assoc_item(...)
  - pattern-not: dyn_compatibility_violations_for_assoc_item(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: TraitNotObjectSafe-standalone-usage
  message: TraitNotObjectSafe should be renamed to TraitDynIncompatible
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: TraitNotObjectSafe
  - pattern-not-inside: SelectionError::TraitDynIncompatible
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: ObjectSafetyViolation-SizedSelf-variant
