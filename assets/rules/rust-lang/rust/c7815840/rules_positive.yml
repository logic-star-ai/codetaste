rules:
- id: use-rustc-fluent-macro-fluent-messages
  message: Import of fluent_messages from rustc_fluent_macro detected
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use rustc_fluent_macro::fluent_messages;
  metadata:
    category: api
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
- id: use-rustc-fluent-macro-any-import
  message: Import from rustc_fluent_macro detected
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use rustc_fluent_macro::$ITEM;
  metadata:
    category: api
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
- id: multiple-crates-import-rustc-fluent-macro
  message: Multiple crates now import from rustc_fluent_macro
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use rustc_fluent_macro::$ITEM;
  metadata:
    category: api
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
- id: consumer-uses-rustc-fluent-macro-not-rustc-macros
  message: Consumer crates now use rustc_fluent_macro instead of rustc_macros for
    fluent_messages
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use rustc_fluent_macro::fluent_messages;
  - pattern-not: use rustc_macros::fluent_messages;
  metadata:
    category: api
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
- id: decoupling-fluent-from-rustc-macros
  message: Decoupling achieved - fluent_messages imported from new dedicated crate
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use rustc_fluent_macro::fluent_messages;
  metadata:
    category: architecture
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
- id: cargo-toml-has-rustc-fluent-macro-dep
  message: Cargo.toml has rustc_fluent_macro dependency
  severity: INFO
  languages:
  - generic
  pattern-regex: rustc_fluent_macro\s*=.*
  metadata:
    category: dependency
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    include:
    - compiler/*/Cargo.toml
- id: rustc-fluent-macro-path-dependency
  message: Consumer crates use path dependency to rustc_fluent_macro
  severity: INFO
  languages:
  - generic
  pattern-regex: rustc_fluent_macro\s*=\s*\{\s*path\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    include:
    - compiler/*/Cargo.toml
- id: multiple-rustc-crates-depend-on-fluent-macro
  message: Multiple rustc crates now depend on rustc_fluent_macro with path dependency
  severity: INFO
  languages:
  - generic
  pattern-regex: rustc_fluent_macro\s*=.*path.*
  metadata:
    category: architecture
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    include:
    - compiler/*/Cargo.toml
- id: dependency-path-points-to-rustc-fluent-macro
  message: Dependency path points to rustc_fluent_macro directory
  severity: INFO
  languages:
  - generic
  pattern-regex: path\s*=\s*"[^"]*rustc_fluent_macro
  metadata:
    category: dependency
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    include:
    - compiler/*/Cargo.toml
- id: compiler-crate-imports-fluent-macro
  message: Compiler crates import from rustc_fluent_macro
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use rustc_fluent_macro::$ITEM;
  metadata:
    category: api
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    include:
    - compiler/**/lib.rs
- id: architectural-separation-compile-time
  message: Architectural separation - consumer crates use dedicated fluent macro crate
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use rustc_fluent_macro::$ITEM;
  metadata:
    category: architecture
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    include:
    - compiler/rustc_*/src/lib.rs
- id: specific-crate-depends-on-both-macros
  message: Some crates depend on both rustc_macros and rustc_fluent_macro
  severity: INFO
  languages:
  - generic
  pattern-regex: rustc_macros\s*=[\s\S]*rustc_fluent_macro\s*=
