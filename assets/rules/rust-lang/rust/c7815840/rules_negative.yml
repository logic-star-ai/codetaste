  message: Crate using fluent_messages should depend on rustc_fluent_macro, not rustc_macros
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use rustc_macros::fluent_messages;
  - pattern-not-inside:
      pattern: 'extern crate rustc_fluent_macro;

        '
  - pattern-not-inside:
      pattern: 'use rustc_fluent_macro;

        '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
