rules:
- id: old-fluent-messages-invocation-after-rustc-macros-import
  message: fluent_messages! invocation should use rustc_fluent_macro import instead
    of rustc_macros
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: fluent_messages!($X)
  - pattern-inside: 'use rustc_macros::fluent_messages;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: old-fluent-macro-invocation-with-messages-ftl
  message: fluent_messages! macro should use rustc_fluent_macro after import change
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: fluent_messages! { $X }
  - pattern-inside: 'use rustc_macros::fluent_messages;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: consumer-using-fluent-messages-without-new-import
  message: fluent_messages! invocation should import from rustc_fluent_macro
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: fluent_messages! { $FILE }
  - pattern-not-inside: 'use rustc_fluent_macro::fluent_messages;

      ...

      '
  - pattern-inside: 'use rustc_macros::fluent_messages;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: old-fluent-macro-invocation-any-path
  message: fluent_messages! invocation should use rustc_fluent_macro import
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: fluent_messages! { $PATH }
  - pattern-inside: 'use rustc_macros::fluent_messages;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: consumer-fluent-messages-call-old-import
  message: fluent_messages! macro call should use rustc_fluent_macro import
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'fluent_messages! { $FILE }

      '
  - pattern-inside: 'use rustc_macros::fluent_messages;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: old-fluent-messages-macro-with-ftl-file
  message: fluent_messages! with .ftl file should use rustc_fluent_macro import
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'fluent_messages! { $PATH }

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: .*\.ftl.*
  - pattern-inside: 'use rustc_macros::fluent_messages;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: fluent-messages-invocation-simple
  message: fluent_messages! should use import from rustc_fluent_macro
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'fluent_messages! { $X }

      '
  - pattern-inside: 'use rustc_macros::fluent_messages;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: fluent-messages-macro-call-with-old-import
  message: fluent_messages! macro needs rustc_fluent_macro import
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'fluent_messages!($X)

      '
  - pattern-inside: 'use rustc_macros::fluent_messages;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: fluent-messages-call-after-old-import
  message: Update import to rustc_fluent_macro before using fluent_messages!
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: fluent_messages!{ $X }
  - pattern-inside: 'use rustc_macros::fluent_messages;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: rustc-macros-with-fluent-in-use-list
  message: fluent_messages import should be from rustc_fluent_macro, not rustc_macros
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: use rustc_macros::{$A, fluent_messages}
  - pattern: use rustc_macros::{fluent_messages, $A}
  - pattern: use rustc_macros::fluent_messages
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: old-rustc-macros-fluent-messages-import
  message: fluent_messages macro import should use rustc_fluent_macro crate instead
