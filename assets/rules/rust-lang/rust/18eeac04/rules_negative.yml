rules:
- id: test-extern-crate-issue-pattern
  message: External crate uses old 'issue_*' naming pattern, should use descriptive
    name or 'aux_*' pattern
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: extern crate $CRATE;
  - metavariable-regex:
      metavariable: $CRATE
      regex: ^issue_(9155|9725|9942|23442|25386|9968|9906)$
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: aux-build-directive-specific-issues
  message: Aux-build directive references old 'issue-*.rs' file, should use 'aux-*.rs'
    pattern
  severity: WARNING
  languages:
  - rust
  pattern-regex: //[@\s]*aux-build:\s*issue-(9155|9725|9942|23442|25386|9968|9906)\.rs
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: test-in-issues-dir-issue-9725
  message: Test file 'issue-9725.rs' should be moved to 'tests/ui/binding/struct-destructuring-repeated-bindings-9725.rs'
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tests/ui/issues/issue-9725.rs
