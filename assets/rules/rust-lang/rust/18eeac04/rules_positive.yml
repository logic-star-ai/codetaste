rules:
- id: github-issue-url-in-categorized-test
  message: GitHub issue URL from moved test present in categorized directory
  severity: INFO
  languages:
  - rust
  pattern-regex: (?s).*//\s*https://github\.com/rust-lang/rust/issues/(9725|91489|9942|23442|9155)
  metadata:
    category: config
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/ui/binding/*.rs
    - tests/ui/autoref-autoderef/*.rs
    - tests/ui/cast/*.rs
    - tests/ui/associated-types/*.rs
    - tests/ui/cross-crate/*.rs
    exclude:
    - tests/ui/*/issue-*.rs
