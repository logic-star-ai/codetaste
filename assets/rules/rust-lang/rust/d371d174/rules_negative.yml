    removed
  severity: WARNING
  languages:
  - rust
  pattern: '#![allow(dead_code)]

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 237
  paths:
    include:
    - '**/sys/pal/**/thread_local_key.rs'
