    or find_parent()
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: 'let $VAR = $HIR.get_parent_node($ARG);

        ...

        $HIR.get($VAR)

        '
    - pattern: 'let $VAR = $HIR.get_parent_node($ARG);

        ...

        $HIR.find($VAR)

        '
