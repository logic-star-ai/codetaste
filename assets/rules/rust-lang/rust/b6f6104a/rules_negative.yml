    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mir-inline-cleanup-mapping
  message: Inlining handling cleanup mapping. Should map UnwindAction after refactoring.
  severity: INFO
  languages:
  - rust
  pattern-regex: inline.*cleanup
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mir-cleanup-filter-method
  message: Calling filter() on cleanup Option. Should handle UnwindAction variants
    after refactoring.
  severity: WARNING
  languages:
  - rust
  pattern-regex: cleanup\.filter\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mir-unwind-unwrap-or
  message: Calling unwrap_or on unwind Option in Drop/FalseUnwind. Should handle UnwindAction
    variants after refactoring.
  severity: WARNING
  languages:
  - rust
  pattern-regex: unwind\.unwrap_or
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mir-doc-comment-cleanup-option
