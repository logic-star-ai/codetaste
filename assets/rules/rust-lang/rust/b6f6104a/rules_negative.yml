  pattern-regex: Call\s*\{[^}]*target:\s*None\s*,\s*cleanup:\s*None
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: mir-inlineasm-dest-none-cleanup-none
  message: 'InlineAsm pattern ''destination: None, cleanup: None''. Should use appropriate
