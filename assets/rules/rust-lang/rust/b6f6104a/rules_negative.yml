rules:
- id: mir-stackpopunwind-enum-reference
  message: Reference to old 'StackPopUnwind' enum. Should use 'UnwindAction' directly
    after refactoring.
  severity: WARNING
  languages:
  - rust
  pattern-regex: StackPopUnwind
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 50
- id: mir-abort-variant-usage
  message: Usage of old 'TerminatorKind::Abort' variant. Should be renamed to 'TerminatorKind::Terminate'
    in refactoring.
  severity: WARNING
  languages:
  - rust
  pattern: TerminatorKind::Abort
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: mir-terminator-match-cleanup-none-v2
  message: 'Match pattern ''cleanup: None'' on terminator. Should use ''unwind: UnwindAction::Continue''
    after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: cleanup:\s*None
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    exclude:
    - src/tools/rust-analyzer/*
    - src/tools/miri/*
- id: mir-cleanup-none-field-in-struct-v2
  message: 'Field assignment ''cleanup: None'' in struct. Should use ''unwind: UnwindAction::Continue''
    after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: ',\s*cleanup:\s*None\s*[,}]'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
  paths:
    exclude:
    - src/tools/rust-analyzer/*
- id: mir-machine-trait-stackpopunwind
  message: Machine trait method accepting old StackPopUnwind parameter. Should accept
    UnwindAction instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+\w+\([^)]*StackPopUnwind
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: mir-cleanup-some-field-in-struct
  message: 'Field assignment ''cleanup: Some(...)'' in struct. Should use ''unwind:
    UnwindAction::Cleanup(...)'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: ',\s*cleanup:\s*Some\s*\('
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: mir-terminator-assert-destructure
  message: 'Destructuring Assert terminator with ''cleanup'' field. Should use ''unwind:
    UnwindAction'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: TerminatorKind::Assert\s*\{[^}]*cleanup
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: mir-terminator-inlineasm-destructure
  message: 'Destructuring InlineAsm terminator with ''cleanup'' field. Should use
    ''unwind: UnwindAction'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: TerminatorKind::InlineAsm\s*\{[^}]*cleanup
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: mir-terminator-match-unwind-none-v2
  message: 'Match pattern ''unwind: None'' in Drop/FalseUnwind. Should use ''unwind:
    UnwindAction::Continue'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: unwind:\s*None
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    exclude:
    - src/tools/rust-analyzer/*
    - src/tools/miri/*
- id: mir-if-let-cleanup-some
  message: Pattern 'if let Some(x) = cleanup'. Should check for UnwindAction::Cleanup(x)
    after refactoring.
  severity: WARNING
  languages:
  - rust
  pattern-regex: if\s+let\s+Some\s*\(\s*\w+\s*\)\s*=\s*cleanup
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: mir-call-target-some-cleanup-none
  message: 'Call pattern ''target: Some(...), cleanup: None''. Should use ''unwind:
    UnwindAction::Continue'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: Call\s*\{[^}]*target:\s*Some\s*\([^)]*\)\s*,\s*cleanup:\s*None
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: mir-terminator-match-cleanup-some-var
  message: 'Match pattern ''cleanup: Some(var)'' on terminator. Should use ''unwind:
    UnwindAction::Cleanup(var)'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: cleanup:\s*Some\s*\(\s*\w+\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: mir-unwind-none-field-in-struct
  message: 'Field assignment ''unwind: None'' in struct. Should use ''unwind: UnwindAction::Continue''
    after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: ',\s*unwind:\s*None\s*[,}]'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: mir-double-unwind-guard-reference
  message: Reference to old 'double_unwind_guard' naming. Should be refactored to
    'terminate_block' in the unwind refactoring.
  severity: WARNING
  languages:
  - rust
  pattern-regex: double_unwind_guard
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: mir-inlineasm-destination-cleanup-pattern
  message: 'InlineAsm terminator pattern with ''cleanup: Some(...)''. Should use ''unwind:
    UnwindAction::Cleanup(...)'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: InlineAsm\s*\{[^}]*destination:[^,]+,\s*cleanup:\s*Some
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: mir-drop-target-unwind-none
  message: 'Drop pattern with ''unwind: None''. Should use ''unwind: UnwindAction::Continue''
    after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: Drop\s*\{[^}]*target:[^,]*,\s*unwind:\s*None
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: mir-terminator-match-cleanup-some-underscore
  message: 'Match pattern ''cleanup: Some(_)'' on terminator. Should use ''unwind:
    UnwindAction::Cleanup(_)'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: cleanup:\s*Some\s*\(\s*_\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: mir-call-target-cleanup-pattern
  message: 'Call terminator pattern with ''target: Some(...), cleanup: Some(...)''.
    Should use ''unwind: UnwindAction::Cleanup(...)'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: Call\s*\{[^}]*target:\s*Some\s*\([^)]+\)\s*,\s*cleanup:\s*Some
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: mir-unwind-some-field-in-struct
  message: 'Field assignment ''unwind: Some(...)'' in struct. Should use ''unwind:
    UnwindAction::Cleanup(...)'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: ',\s*unwind:\s*Some\s*\('
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: mir-cleanup-block-comment-old
  message: 'Comment or documentation mentioning old ''cleanup: Option<BasicBlock>''
    representation. Should refer to ''unwind: UnwindAction''.'
  severity: INFO
  languages:
  - rust
  pattern-regex: cleanup:\s+Option<BasicBlock>
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: mir-unwind-option-basicblock-comment
  message: 'Comment or documentation mentioning old ''unwind: Option<BasicBlock>''
    in Drop terminator. Should refer to ''unwind: UnwindAction''.'
  severity: INFO
  languages:
  - rust
  pattern-regex: unwind:\s+Option<BasicBlock>
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: mir-cleanup-parameter-name
  message: 'Parameter or field declaration with ''cleanup: Option<BasicBlock>''. Should
    be ''unwind: UnwindAction''.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: \bcleanup\s*:\s*Option\s*<\s*BasicBlock\s*>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: mir-unwind-field-option-basicblock
  message: 'Field ''unwind: Option<BasicBlock>''. Should be ''unwind: UnwindAction''
    after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: unwind\s*:\s*Option\s*<\s*BasicBlock\s*>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: mir-target-cleanup-both-some
  message: 'Pattern with both ''target: Some'' and ''cleanup: Some''. Should use UnwindAction::Cleanup
    after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: target:\s*Some.*cleanup:\s*Some
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: mir-terminator-match-cleanup-some-ref
  message: 'Match pattern ''cleanup: Some(ref ...)'' on terminator. Should use ''unwind:
    UnwindAction::Cleanup(...)'' after refactoring.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: cleanup:\s*Some\s*\(\s*ref\s+\w+\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: mir-terminator-match-unwind-some-var
  message: 'Match pattern ''unwind: Some(var)'' in Drop/FalseUnwind. Should use ''unwind:
