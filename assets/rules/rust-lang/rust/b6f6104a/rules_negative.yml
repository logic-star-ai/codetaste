  severity: WARNING
  languages:
  - rust
  pattern-regex: InlineAsm\s*\{[^}]*destination:\s*None\s*,\s*cleanup:\s*None
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: mir-inlineasm-dest-some-cleanup-none
