- id: environments-refactor-import-multiple-targets-from-target-types
  message: Detected multiple environment targets imported together from new location
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from pants.core.environments.target_types import $IMPORT1, $IMPORT2
  - metavariable-regex:
      metavariable: $IMPORT1
      regex: (Local|Docker|Remote).*Target
  - metavariable-regex:
      metavariable: $IMPORT2
      regex: (Local|Docker|Remote).*Target
  metadata:
    category: structural
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
