rules:
- id: detect-round-engine-and-engine-imports-together
  message: Imports from pants.engine.round_engine or pants.engine.legacy_engine should
    be from pants.engine.legacy.round_engine after refactoring
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+pants\.engine\.(?:round_engine|legacy_engine)\s+import\s+.*(?:RoundEngine|Engine)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-engine-legacy-engine-import-alias
  message: Import of pants.engine.legacy_engine should be updated to pants.engine.legacy.round_engine
    (merged file) after refactoring
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: import pants.engine.legacy_engine
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-v2-graph-code-in-legacy-graph-file
  message: V2 graph code (resolve_target, transitive_target, Owners, OwnersRequest)
    should be moved from legacy/graph.py to internals/graph.py
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-either:
    - pattern: 'async def resolve_target(...): ...

        '
    - pattern: 'async def transitive_target(...): ...

        '
    - pattern: 'class Owners: ...

        '
    - pattern: 'class OwnersRequest: ...

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - src/python/pants/engine/legacy/graph.py
- id: detect-sourcessnapshot-in-legacy-graph-file
  message: SourcesSnapshot and SourcesSnapshots classes should be moved from legacy/graph.py
    to engine/fs.py
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-either:
    - pattern: 'class SourcesSnapshot: ...

        '
    - pattern: 'class SourcesSnapshots(...): ...

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - src/python/pants/engine/legacy/graph.py
- id: detect-legacy-graph-owners-single-import
  message: Owners should be imported from pants.engine.internals.graph, not pants.engine.legacy.graph
    after refactoring
  severity: WARNING
  languages:
  - python
  pattern: from pants.engine.legacy.graph import Owners
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-legacy-graph-ownersrequest-single-import
  message: OwnersRequest should be imported from pants.engine.internals.graph, not
    pants.engine.legacy.graph after refactoring
  severity: WARNING
  languages:
  - python
  pattern: from pants.engine.legacy.graph import OwnersRequest
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-legacy-graph-sourcessnapshots-single-import
  message: SourcesSnapshots should be imported from pants.engine.fs, not pants.engine.legacy.graph
    after refactoring
  severity: WARNING
  languages:
  - python
  pattern: from pants.engine.legacy.graph import SourcesSnapshots
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-engine-legacy-engine-import-regex
  message: Import from pants.engine.legacy_engine should be updated to pants.engine.legacy.round_engine
    (merged) after refactoring
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+pants\.engine\.legacy_engine\s+import
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-legacy-graph-sourcessnapshots-import-regex
  message: SourcesSnapshots should be imported from pants.engine.fs, not pants.engine.legacy.graph
    after refactoring
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+pants\.engine\.legacy\.graph\s+import\s+.*\bSourcesSnapshots\b
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-engine-class-import-from-legacy-engine
  message: Engine should be imported from pants.engine.legacy.round_engine (merged),
    not pants.engine.legacy_engine after refactoring
  severity: WARNING
  languages:
  - python
  pattern: from pants.engine.legacy_engine import Engine
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-engine-legacy-engine-in-docstring
