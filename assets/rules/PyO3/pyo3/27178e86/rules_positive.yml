rules:
- id: pyo3-025-dev-version-in-toml-excluding-introspection
  message: Found 0.25.0-dev version string in TOML file (excluding pyo3-introspection)
    - version bump applied
  severity: INFO
  languages:
  - generic
  pattern-regex: 0\.25\.0-dev
  metadata:
    category: config
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.toml'
    - '**/*.toml'
    exclude:
    - pyo3-introspection/Cargo.toml
- id: pyo3-any-025-version-in-workspace
  message: 0.25 version string present in workspace member
  severity: INFO
  languages:
  - generic
  pattern-regex: 0\.25
  metadata:
    category: config
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - pyo3-ffi/Cargo.toml
    - pyo3-macros/Cargo.toml
    - pyo3-build-config/Cargo.toml
    - pyo3-macros-backend/Cargo.toml
- id: pyo3-no-024-dependency-versions
  message: No 0.24.x pyo3 dependencies remain, all updated to 0.25
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern-not-regex: pyo3.*=0\.24\.
  - pattern-regex: pyo3.*=0\.25
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - Cargo.toml
    - pyo3-macros/Cargo.toml
    - pyo3-ffi/Cargo.toml
- id: pyo3-exact-version-dep-025-dev
  message: Exact version dependency =0.25.0-dev found in workspace
  severity: INFO
  languages:
  - generic
  pattern-regex: =\s*0\.25\.0-dev
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: pyo3-path-dependency-with-025-version
  message: Path dependency with =0.25.x version constraint
  severity: INFO
  languages:
  - generic
  pattern-regex: path\s*=.*version\s*=\s*"=0\.25
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: pyo3-025-dev-exact-version-pattern
  message: Exact version =0.25.0-dev dependency found
  severity: INFO
  languages:
  - generic
  pattern-regex: '"=0\.25\.0-dev"'
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.toml'
- id: pyo3-workspace-deps-all-025
  message: Workspace dependency with =0.25.x version
  severity: INFO
  languages:
  - generic
  pattern-regex: (pyo3-ffi|pyo3-macros|pyo3-build-config).*"=0\.25
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - Cargo.toml
    - '*/Cargo.toml'
- id: pyo3-internal-workspace-deps-025-pattern
  message: Internal workspace dependency with path and =0.25.x version
  severity: INFO
  languages:
  - generic
  pattern-regex: path\s*=\s*"[^"]*pyo3-[^"]*".*version\s*=\s*"=0\.25
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: pyo3-config-workspace-member-versions
  message: Workspace member versions all set to =0.25.0-dev
  severity: INFO
  languages:
  - generic
  pattern-regex: (pyo3-ffi|pyo3-macros|pyo3-build-config|pyo3-macros-backend).*=0\.25\.0-dev
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: pyo3-multiple-025-dev-versions-in-workspace
  message: Multiple workspace crates updated to 0.25.0-dev
  severity: INFO
  languages:
  - generic
  pattern-regex: 0\.25\.0-dev
  metadata:
    category: config
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - pyo3-ffi/Cargo.toml
    - pyo3-macros/Cargo.toml
    - pyo3-build-config/Cargo.toml
- id: pyo3-build-config-dependency-025-dev
  message: pyo3-build-config dependency updated to 0.25.0-dev
  severity: INFO
  languages:
  - generic
  pattern-regex: pyo3-build-config.*=0\.25\.0-dev
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - Cargo.toml
- id: pyo3-main-crate-build-config-025-dev-dependency
  message: Main Cargo.toml has pyo3-build-config dependency set to =0.25.0-dev
  severity: INFO
  languages:
  - generic
  pattern-regex: pyo3-build-config.*version\s*=\s*"\=0\.25\.0-dev"
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - Cargo.toml
- id: pyo3-workspace-dependency-consistency
  message: Workspace maintains consistent 0.25.0-dev version across dependencies
  severity: INFO
  languages:
  - generic
  pattern-regex: pyo3[a-z-]*.*version.*=0\.25\.0-dev
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/Cargo.toml'
- id: pyo3-multiple-internal-deps-025-dev
  message: Internal pyo3-* dependencies updated to 0.25.0-dev
  severity: INFO
  languages:
  - generic
  pattern-regex: pyo3-(ffi|macros|build-config|macros-backend).*=0\.25\.0-dev
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/Cargo.toml'
- id: pyo3-crate-version-025-dev-exact
  message: 'Workspace crate has exact version line: version = 0.25.0-dev'
  severity: INFO
  languages:
  - generic
  pattern-regex: ^version\s*=\s*"0\.25\.0-dev"$
  metadata:
    category: config
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - pyo3-ffi/Cargo.toml
    - pyo3-macros/Cargo.toml
    - pyo3-build-config/Cargo.toml
    - pyo3-macros-backend/Cargo.toml
- id: pyo3-main-crate-build-config-dependency-025
  message: Main crate has pyo3-build-config =0.25.0-dev dependency
  severity: INFO
  languages:
  - generic
  pattern-regex: pyo3-build-config.*version\s*=\s*"=0\.25\.0-dev"
  metadata:
