- id: pyo3-removed-deprecated-loads-bound
  message: Deprecated loads_bound function and its deprecation annotation removed
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-not-regex: (?s)#\[deprecated.*loads_bound
  - pattern-regex: pub\s+fn\s+loads\s*<
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/marshal.rs
- id: pyo3-removed-deprecated-pyunicode-alias
  message: Deprecated PyUnicode type alias removed
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-not-regex: (?s)#\[deprecated.*PyUnicode
  - pattern-regex: pub\s+struct\s+PyString
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/types/string.rs
