    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - Cargo.toml
- id: pyo3-dependency-cross-crate-025
  message: Cross-crate dependencies use =0.25.x version with path
  severity: INFO
  languages:
  - generic
  pattern-regex: (path\s*=\s*"[^"]*".*version\s*=\s*"=0\.25|version\s*=\s*"=0\.25.*path\s*=\s*"[^"]*")
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/Cargo.toml'
- id: pyo3-version-025-in-pyo3-macros-backend-toml
  message: pyo3-macros-backend Cargo.toml updated to version 0.25.0-dev
  severity: INFO
  languages:
  - generic
  pattern-regex: version\s*=\s*"\=?0\.25\.0-dev"
  metadata:
    category: config
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - pyo3-macros-backend/Cargo.toml
