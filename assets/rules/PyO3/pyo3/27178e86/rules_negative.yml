rules:
- id: deprecated-023-annotation-regex
  message: Deprecated annotation from PyO3 0.23 found - associated item should be
    removed
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[deprecated\(since\s*=\s*"0\.23\.0"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: deprecated-since-023-attribute
  message: 'Item with #[deprecated(since = "0.23.0")] attribute should be removed
    entirely'
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[deprecated\(since\s*=\s*"0\.23\.0"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: new-bound-constructor-regex
  message: new_bound constructor should be removed (deprecated in PyO3 0.23, renamed
    to new)
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*pub\s+fn\s+new_bound\s*(<[^>]+>)?\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: version-024-dependency-exact
  message: Exact version dependency =0.24.0 should be updated to =0.25.0-dev
  severity: WARNING
  languages:
  - generic
  pattern-regex: version\s*=\s*"=0\.24\.0"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '*/Cargo.toml'
    - Cargo.toml
- id: version-024-in-cargo-toml
