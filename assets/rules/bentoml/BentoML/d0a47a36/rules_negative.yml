- id: bentoml-isinstance-runner-check-without-legacy
  message: Use 'bentoml.legacy.Runner' instead of 'bentoml.Runner' in isinstance checks
  severity: WARNING
  languages:
  - python
  pattern: isinstance($VAR, bentoml.Runner)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bentoml-runner-variable-assignment-without-legacy
  message: Use 'bentoml.legacy.Runner' instead of 'bentoml.Runner' for runner instantiation
  severity: WARNING
  languages:
  - python
  pattern: $VAR = bentoml.Runner(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bentoml-module-attrs-service-mapping
  message: Update MODULE_ATTRS mapping for 'Service' to point to bentoml.legacy module
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "MODULE_ATTRS = {\n  ...,\n  \"Service\": $VALUE,\n  ...,\n}\n"
  - metavariable-pattern:
      metavariable: $VALUE
      pattern-regex: .*_internal\.service.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/bentoml/__init__.py'
- id: bentoml-service-as-function-argument
  message: Use 'bentoml.legacy.Service' instead of 'bentoml.Service' when passing
    as function argument
  severity: WARNING
  languages:
  - python
  pattern: $FUNC(..., bentoml.Service(...), ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bentoml-runner-in-list-literal
  message: Use 'bentoml.legacy.Runner' instead of 'bentoml.Runner' in list literals
  severity: WARNING
  languages:
