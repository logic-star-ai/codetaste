rules:
- id: bentoml-runnable-in-docstring-reference
  message: Update documentation to reference 'bentoml.legacy.Runnable' instead of
    'bentoml.Runnable'
  severity: INFO
  languages:
  - python
  pattern-regex: (bentoml\.Runnable)(?!.*legacy)
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
  paths:
    include:
    - '*.py'
- id: bentoml-runnable-class-inheritance-without-legacy
  message: Inherit from 'bentoml.legacy.Runnable' instead of 'bentoml.Runnable'
  severity: WARNING
  languages:
  - python
  pattern: "class $CLASS(..., bentoml.Runnable, ...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: bentoml-service-instantiation-without-legacy
  message: Use 'bentoml.legacy.Service' instead of 'bentoml.Service' for legacy service
    definitions
  severity: WARNING
  languages:
  - python
  pattern: bentoml.Service(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: bentoml-service-assignment-pattern
  message: Use 'bentoml.legacy.Service' instead of 'bentoml.Service' for service assignment
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $SVC = bentoml.Service(...)
  - metavariable-regex:
      metavariable: $SVC
      regex: ^(svc|service|my_service).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: bentoml-service-param-type-hint-without-legacy
  message: Use 'bentoml.legacy.Service' type hint instead of 'bentoml.Service'
  severity: WARNING
  languages:
  - python
  pattern: "def $FUNC(..., $PARAM: bentoml.Service, ...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: bentoml-runner-in-docstring-reference
  message: Update documentation to reference 'bentoml.legacy.Runner' instead of 'bentoml.Runner'
  severity: INFO
  languages:
  - python
  pattern-regex: (bentoml\.Runner)(?!.*legacy)
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '*.py'
- id: bentoml-service-name-parameter-without-legacy
  message: Use 'bentoml.legacy.Service' instead of 'bentoml.Service' for service creation
  severity: WARNING
  languages:
  - python
  pattern: bentoml.Service(name=$NAME, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: bentoml-service-with-single-positional-arg
  message: Use 'bentoml.legacy.Service' instead of 'bentoml.Service' for service creation
  severity: WARNING
  languages:
  - python
  pattern: bentoml.Service($NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: bentoml-runnable-attribute-access-without-legacy
  message: Use 'bentoml.legacy.Runnable' instead of 'bentoml.Runnable' for accessing
    Runnable class methods
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: bentoml.Runnable.$METHOD
  - pattern-not: bentoml.legacy.Runnable.$METHOD
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: bentoml-runnable-method-decorator-with-args-without-legacy
  message: Use '@bentoml.legacy.Runnable.method(...)' decorator instead of '@bentoml.Runnable.method(...)'
  severity: WARNING
  languages:
  - python
  pattern: '@bentoml.Runnable.method(...)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: bentoml-service-with-keyword-runners
  message: Use 'bentoml.legacy.Service' instead of 'bentoml.Service' for service creation
    with runners
  severity: WARNING
  languages:
  - python
  pattern: bentoml.Service(..., runners=..., ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: bentoml-isinstance-service-check-without-legacy
  message: Use 'bentoml.legacy.Service' instead of 'bentoml.Service' in isinstance
    checks
  severity: WARNING
  languages:
  - python
  pattern: isinstance($VAR, bentoml.Service)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: bentoml-legacy-api-in-test-fixture
  message: Use 'bentoml.legacy.$API' type hint instead of 'bentoml.$API' in test fixtures
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def $FUNC(...) -> bentoml.$API:\n  ...\n"
  - metavariable-pattern:
      metavariable: $API
      pattern-either:
      - pattern: Service
      - pattern: Runner
      - pattern: Runnable
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bentoml-service-sphinx-obj-reference
  message: Update Sphinx reference to ':obj:`~bentoml.legacy.Service`' instead of
    ':obj:`~bentoml.Service`'
  severity: INFO
  languages:
  - python
  pattern-regex: :obj:`~bentoml\.Service`
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: bentoml-runner-instantiation-without-legacy
  message: Use 'bentoml.legacy.Runner' instead of 'bentoml.Runner' for legacy runner
    definitions
  severity: WARNING
  languages:
  - python
  pattern: bentoml.Runner(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bentoml-runner-type-hint-without-legacy
  message: Use 'bentoml.legacy.Runner' type hint instead of 'bentoml.Runner'
  severity: WARNING
  languages:
