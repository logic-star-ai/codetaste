    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bentoml-runnable-method-decorator-without-legacy
  message: Use '@bentoml.legacy.Runnable.method' decorator instead of '@bentoml.Runnable.method'
  severity: WARNING
  languages:
  - python
  pattern: '@bentoml.Runnable.method'
  metadata:
