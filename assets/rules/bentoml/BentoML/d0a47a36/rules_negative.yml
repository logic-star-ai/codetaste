  severity: WARNING
  languages:
  - python
  pattern: "with ... as $VAR:\n  ...\n  bentoml.Service(...)\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: bentoml-runner-class-inheritance-without-legacy
  message: Inherit from 'bentoml.legacy.Runner' instead of 'bentoml.Runner'
  severity: WARNING
  languages:
  - python
  pattern: "class $CLASS(..., bentoml.Runner, ...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bentoml-service-type-hint-without-legacy
  message: Use 'bentoml.legacy.Service' type hint instead of 'bentoml.Service'
  severity: WARNING
  languages:
