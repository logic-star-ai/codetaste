rules:
- id: bentoml-legacy-module-ref
  message: Detected bentoml.legacy module reference
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: \bbentoml\.legacy\b
  metadata:
    nr_refactored_patterns: 112
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: legacy-in-docstring-type-hint
  message: Detected legacy reference in docstring
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: bentoml\.legacy\.(Service|Runner|Runnable|Strategy|Resource|HTTPServer|GrpcServer)
  metadata:
    nr_refactored_patterns: 98
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: any-legacy-attribute-access
  message: Detected any attribute access on bentoml.legacy
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: bentoml.legacy.$ANY
  - pattern-not: bentoml.legacy
  metadata:
    nr_refactored_patterns: 87
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: format-string-legacy-path
  message: Detected format string with legacy path
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: '["''][^"'']*bentoml\.legacy\.[^"'']*["'']'
  metadata:
    nr_refactored_patterns: 80
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: direct-reference-legacy-runnable
  message: Detected direct reference to bentoml.legacy.Runnable
  severity: INFO
  languages:
  - python
  pattern: bentoml.legacy.Runnable
  metadata:
    nr_refactored_patterns: 44
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: any-whitespace-legacy
  message: Detected bentoml.legacy with any context
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: '[\s\S]*bentoml\.legacy\.(?:Service|Runner|Runnable|Strategy|Resource|HTTPServer|GrpcServer)[\s\S]*'
  metadata:
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/test*.py'
- id: direct-reference-legacy-service
  message: Detected direct reference to bentoml.legacy.Service
  severity: INFO
  languages:
  - python
  pattern: bentoml.legacy.Service
  metadata:
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: multiline-string-legacy-reference
  message: Detected multiline string with legacy reference
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: '"""[\s\S]*?bentoml\.legacy\.[\s\S]*?"""'
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: service-class-with-legacy-taint
  message: Detected Service class definition using bentoml.legacy.Service
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: bentoml.legacy.Service
  pattern-sinks:
  - patterns:
    - pattern: $VAR = $SOURCE(...)
    - metavariable-pattern:
        metavariable: $VAR
        patterns:
        - pattern-not: bentoml.Service
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-specific-legacy-api
  message: Detected specific import from bentoml.legacy
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from bentoml.legacy import $API
  - metavariable-regex:
      metavariable: $API
      regex: ^(Service|Runner|Runnable|Strategy|Resource|HTTPServer|GrpcServer)$
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: direct-reference-legacy-runner
  message: Detected direct reference to bentoml.legacy.Runner
  severity: INFO
  languages:
  - python
  pattern: bentoml.legacy.Runner
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: module-attrs-with-legacy-string
  message: Detected MODULE_ATTRS with legacy string
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: '"[^"]*legacy[^"]*"'
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bentoml/__init__.py'
- id: type-checking-guard-legacy
  message: Detected TYPE_CHECKING import guard with legacy types
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "if TYPE_CHECKING:\n  ...\n"
  - pattern-either:
    - pattern: from bentoml.legacy import $X
    - pattern: import bentoml.legacy
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: legacy-api-with-from-import
  message: Detected from import for legacy API
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from bentoml import legacy
    - pattern: from bentoml.legacy import $API
  - pattern-not: from bentoml import Service
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: f-string-with-legacy-reference
  message: Detected f-string containing legacy reference
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: f["'].*bentoml\.legacy\..*["']
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: legacy-py-file-exists
  message: Detected legacy.py file
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bentoml/legacy.py'
    - '**/src/bentoml/legacy.py'
- id: getattr-hook-for-legacy
  message: Detected __getattr__ hook implementation
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def __getattr__($NAME: str) -> $RET:\n  ...\n  bentoml.legacy\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
