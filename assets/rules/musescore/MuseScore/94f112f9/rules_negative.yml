rules:
- id: mu-extensions-base-namespace-ref
  message: Namespace reference should be changed from 'mu::extensions' to 'muse::extensions'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: mu::extensions\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 62
  paths:
    exclude:
    - '*.cmake'
    - CMakeLists.txt
- id: mu-extensions-header-guard-ifndef
  message: Header guard should be changed from 'MU_EXTENSIONS_*' to 'MUSE_EXTENSIONS_*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#ifndef\s+MU_EXTENSIONS_\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: mu-extensions-header-guard-define
  message: Header guard define should be changed from 'MU_EXTENSIONS_*' to 'MUSE_EXTENSIONS_*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#define\s+MU_EXTENSIONS_\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: mu-extensions-fully-qualified-type
  message: Fully qualified type reference should be changed from 'mu::extensions::*'
    to 'muse::extensions::*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bmu::extensions::\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: mu-extensions-header-guard-endif-fixed
  message: Header guard endif comment should be changed from 'MU_EXTENSIONS_*' to
    'MUSE_EXTENSIONS_*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#endif\s*//\s*MU_EXTENSIONS_\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
  paths:
    exclude:
    - src/framework/global/api/iapiengine.h
- id: mu-extensions-double-colon-pattern
  message: 'Namespace reference ''mu :: extensions ::'' should be changed to ''muse::extensions::''
    (spacing normalized)'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '\bmu\s*::\s*extensions\s*::'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: mu-extensions-any-qualified-ref
  message: Any qualified reference to 'mu::extensions::*' should be changed to 'muse::extensions::*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bmu::extensions::[a-zA-Z_]\w*\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
  paths:
    exclude:
    - '*.cmake'
    - CMakeLists.txt
    - build/**
- id: mu-extensions-namespace-decl-regex
  message: Namespace declaration should be changed from 'namespace mu::extensions'
    to 'namespace muse::extensions'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: namespace\s+mu::extensions\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: mu-extensions-using-namespace-regex
  message: Using namespace should be changed from 'using namespace mu::extensions'
    to 'using namespace muse::extensions'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: using\s+namespace\s+mu::extensions\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: mu-extensions-cpp-file-reference
  message: Namespace reference should be changed from 'mu::extensions::apiv1' to 'muse::extensions::apiv1'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: mu::extensions::apiv1
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: mu-extensions-api-namespace-ref
  message: Namespace reference should be changed from 'mu::extensions::api' to 'muse::extensions::api'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: mu::extensions::api\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: mu-extensions-enum-class-reference
  message: Enum or nested class reference should be changed from 'mu::extensions::*'
    to 'muse::extensions::*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: mu::extensions::\w+::\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: mu-extensions-qmllistproperty-type
  message: QmlListProperty type reference should be changed from 'mu::extensions::api::QmlListProperty'
    to 'muse::extensions::api::QmlListProperty'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bmu::extensions::api::QmlListProperty\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: mu-extensions-apiv1-namespace-decl-regex
  message: Namespace declaration should be changed from 'namespace mu::extensions::apiv1'
    to 'namespace muse::extensions::apiv1'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: namespace\s+mu::extensions::apiv1\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: mu-extensions-apiv1-header-guard-ifndef
  message: Header guard should be changed from 'MU_EXTENSIONS_APIV1_*' to 'MUSE_EXTENSIONS_APIV1_*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#ifndef\s+MU_EXTENSIONS_APIV1_\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: mu-extensions-apiv1-header-guard-define
  message: Header guard define should be changed from 'MU_EXTENSIONS_APIV1_*' to 'MUSE_EXTENSIONS_APIV1_*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#define\s+MU_EXTENSIONS_APIV1_\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: mu-extensions-class-inheritance
  message: Class inheritance should be changed from 'mu::extensions::*' to 'muse::extensions::*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: :\s*public\s+mu::extensions::\w+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: mu-extensions-apiv1-header-guard-endif
  message: Header guard endif should be changed from 'MU_EXTENSIONS_APIV1_*' to 'MUSE_EXTENSIONS_APIV1_*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#endif\s*//\s*MU_EXTENSIONS_APIV1_\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: mu-extensions-apiv1-using-namespace-regex
  message: Using namespace should be changed from 'using namespace mu::extensions::apiv1'
    to 'using namespace muse::extensions::apiv1'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: using\s+namespace\s+mu::extensions::apiv1\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: mu-extensions-legacy-namespace-ref
  message: Namespace reference should be changed from 'mu::extensions::legacy' to
    'muse::extensions::legacy'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: mu::extensions::legacy\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: mu-extensions-api-namespace-decl-regex
  message: Namespace declaration should be changed from 'namespace mu::extensions::api'
    to 'namespace muse::extensions::api'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: namespace\s+mu::extensions::api\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: mu-extensions-legacy-namespace-decl-regex
  message: Namespace declaration should be changed from 'namespace mu::extensions::legacy'
    to 'namespace muse::extensions::legacy'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: namespace\s+mu::extensions::legacy\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: mu-extensions-legacy-using-namespace-regex
  message: Using namespace should be changed from 'using namespace mu::extensions::legacy'
    to 'using namespace muse::extensions::legacy'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: using\s+namespace\s+mu::extensions::legacy\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: mu-extensions-api-header-guard-ifndef
  message: Header guard should be changed from 'MU_EXTENSIONS_API_*' to 'MUSE_EXTENSIONS_API_*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#ifndef\s+MU_EXTENSIONS_API_\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: mu-extensions-api-header-guard-define
  message: Header guard define should be changed from 'MU_EXTENSIONS_API_*' to 'MUSE_EXTENSIONS_API_*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#define\s+MU_EXTENSIONS_API_\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: mu-extensions-api-header-guard-endif
  message: Header guard endif should be changed from 'MU_EXTENSIONS_API_*' to 'MUSE_EXTENSIONS_API_*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#endif\s*//\s*MU_EXTENSIONS_API_\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: mu-extensions-action-local-var
  message: Local variable type 'extensions::Action' should be reviewed - ensure proper
    namespace context after refactoring to 'muse::extensions'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: const\s+extensions::Action\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: mu-extensions-new-expression
  message: New expression should use 'muse::extensions::$TYPE' instead of 'mu::extensions::$TYPE'
  severity: WARNING
  languages:
  - cpp
  pattern-either:
  - pattern: new mu::extensions::$TYPE(...)
  - pattern: new mu::extensions::$TYPE()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mu-extensions-api-using-namespace-regex
  message: Using namespace should be changed from 'using namespace mu::extensions::api'
    to 'using namespace muse::extensions::api'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: using\s+namespace\s+mu::extensions::api\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mu-extensions-scoped-type-reference
  message: Type reference should be changed from 'mu::extensions::*' to 'muse::extensions::*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bmu::extensions::(I[A-Z]\w+|[A-Z]\w+)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mu-extensions-extensionsmodule-instantiation
  message: ExtensionsModule instantiation should use 'muse::extensions::ExtensionsModule'
    instead of 'mu::extensions::ExtensionsModule'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: new\s+mu::extensions::ExtensionsModule\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mu-extensions-function-call-qualified
  message: Function call should be changed from 'mu::extensions::*' to 'muse::extensions::*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: mu::extensions::\w+\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mu-extensions-extensionsmodule-type
  message: ExtensionsModule type reference should be changed from 'mu::extensions::ExtensionsModule'
    to 'muse::extensions::ExtensionsModule'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bmu::extensions::ExtensionsModule\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mu-extensions-inject-macro
  message: INJECT macro should use 'muse::extensions::*' or ensure proper namespace
    context after refactoring
  severity: WARNING
  languages:
  - cpp
  pattern-regex: INJECT\s*\(\s*extensions::IExtensions\w+
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mu-extensions-iextensionsprovider-inject
  message: INJECT(extensions::IExtensionsProvider...) should use 'muse::extensions::IExtensionsProvider'
    or ensure proper namespace context
  severity: WARNING
  languages:
  - cpp
  pattern-regex: INJECT\s*\(\s*extensions::IExtensionsProvider
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mu-extensions-for-loop-action
  message: For loop with 'extensions::Action' should be reviewed - ensure proper namespace
    context after refactoring to 'muse::extensions'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: for\s*\(\s*const\s+extensions::Action\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mu-extensions-module-creation
  message: Module instantiation should use 'muse::extensions::*' instead of 'mu::extensions::*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: new\s+mu::extensions::\w+Module
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mu-extensions-extensionsmodule-header-guard
  message: ExtensionsModule header guard should be changed from 'MU_EXTENSIONS_EXTENSIONSMODULE_H'
    to 'MUSE_EXTENSIONS_EXTENSIONSMODULE_H'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#ifndef\s+MU_EXTENSIONS_EXTENSIONSMODULE_H'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
