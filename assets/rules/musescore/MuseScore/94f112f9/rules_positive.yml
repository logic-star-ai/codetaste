    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: muse-extensions-class-definition-with-namespace
  message: Detected class definition containing refactored type
  severity: INFO
  languages:
  - cpp
  pattern-regex: 'class\s+[A-Z]\w+[^{]{0,100}\{[^}]{0,200}muse::extensions::'
