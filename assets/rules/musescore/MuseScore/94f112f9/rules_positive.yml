    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: muse-extensions-header-guard-ifndef-apiv1-nested
  message: Detected complete apiv1 header guard pattern
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#ifndef\s+MUSE_EXTENSIONS_APIV1_\w+_H\s+#define\s+MUSE_EXTENSIONS_APIV1_\w+_H'
  metadata:
