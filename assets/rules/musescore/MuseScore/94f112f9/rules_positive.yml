rules:
- id: muse-extensions-namespace-in-string-literal
  message: Detected string literal mentioning refactored namespace
  severity: INFO
  languages:
  - cpp
  pattern-regex: '"[^"]*muse::extensions'
  metadata:
    category: other
    nr_refactored_patterns: 59
    nr_legacy_patterns: 0
- id: muse-extensions-any-qualified-reference
  message: Detected any qualified reference to refactored muse extensions namespace
  severity: INFO
  languages:
  - cpp
  pattern-regex: \bmuse::extensions::[a-zA-Z_]\w*
  metadata:
    category: structural
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
- id: muse-extensions-header-guard-full-pattern
  message: Detected refactored header guard pattern
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#ifndef\s+MUSE_EXTENSIONS_\w+\s+#define\s+MUSE_EXTENSIONS_\w+'
  metadata:
    category: structural
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: muse-extensions-header-guard-full-set
  message: Detected complete refactored header guard pattern
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#ifndef\s+(MUSE_EXTENSIONS_\w+)\s+#define\s+\1'
  metadata:
    category: structural
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: muse-extensions-using-statement
  message: Detected refactored using statement for muse extensions
  severity: INFO
  languages:
  - cpp
  pattern: using namespace muse::extensions;
  metadata:
    category: structural
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
- id: muse-extensions-header-guard-ifndef
  message: Detected refactored header guard with MUSE_EXTENSIONS prefix
  severity: INFO
  languages:
  - cpp
  pattern-regex: ^#ifndef\s+MUSE_EXTENSIONS_[A-Z_]+_H
  metadata:
    category: structural
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: muse-extensions-header-guard-define
  message: Detected refactored header guard define with MUSE_EXTENSIONS prefix
  severity: INFO
  languages:
  - cpp
  pattern-regex: ^#define\s+MUSE_EXTENSIONS_[A-Z_]+_H
  metadata:
    category: structural
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: muse-extensions-header-guard-endif-comment
  message: Detected refactored header guard endif comment
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#endif\s*//\s*MUSE_EXTENSIONS_[A-Z_]+_H'
  metadata:
    category: structural
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: muse-extensions-namespace-declaration-with-body
  message: Detected refactored namespace block muse extensions
  severity: INFO
  languages:
  - cpp
  pattern: "namespace muse::extensions {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: muse-extensions-namespace-block-content
  message: Detected content within refactored muse extensions namespace block
  severity: INFO
  languages:
  - cpp
  pattern-regex: namespace\s+muse::extensions\s*\{[^}]{0,50}(?:class|struct|enum|typedef)
  metadata:
    category: structural
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: muse-extensions-brace-initialization
  message: Detected brace initialization with refactored type
  severity: INFO
  languages:
  - cpp
  pattern-regex: muse::extensions::\w+\s*\{[^}]*\}
  metadata:
    category: basic
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: muse-extensions-scope-resolution
  message: Detected nested scope resolution with refactored muse extensions
  severity: INFO
  languages:
  - cpp
  pattern-regex: muse::extensions::\w+::\w+
  metadata:
    category: structural
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: muse-extensions-namespace-multi-level
  message: Detected multi-level namespace reference with refactored muse extensions
  severity: INFO
  languages:
  - cpp
  pattern-regex: \bmuse::extensions::(?:api|apiv1|legacy)::\w+
  metadata:
    category: structural
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: muse-extensions-api-qmllistproperty-base-class
  message: Detected class inheriting from refactored muse extensions api QmlListProperty
  severity: INFO
  languages:
  - cpp
  pattern-regex: :\s*(?:public\s+)?muse::extensions::api::QmlListProperty<
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: muse-extensions-api-namespace-scope
  message: Detected usage of type from refactored muse extensions api namespace
  severity: INFO
  languages:
  - cpp
  pattern-regex: muse::extensions::api::[A-Z][a-zA-Z0-9_]*
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: muse-extensions-api-qmllistproperty-with-template
  message: Detected QmlListProperty template instantiation with refactored namespace
  severity: INFO
  languages:
  - cpp
  pattern-regex: muse::extensions::api::QmlListProperty<[^>]+>
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: muse-extensions-qualified-type-reference
  message: Detected refactored qualified type reference with muse extensions prefix
  severity: INFO
  languages:
  - cpp
  pattern-regex: muse::extensions::[A-Z][a-zA-Z0-9_]*
  metadata:
    category: structural
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: muse-extensions-semicolon-terminated
  message: Detected semicolon-terminated statement with refactored type
  severity: INFO
  languages:
  - cpp
  pattern-regex: muse::extensions::\w+\s*;
