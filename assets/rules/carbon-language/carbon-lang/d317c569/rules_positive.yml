rules:
- id: diagnostics-namespace-qualified-access
  message: Detected qualified access to Diagnostics namespace members
  severity: INFO
  languages:
  - cpp
  pattern-regex: Diagnostics::(Consumer|Emitter|Loc|Level|Kind|Message|TypeInfo|ConvertedLoc|AnnotationScope|BoolAsSelect|IntAsSelect)
  metadata:
    category: structural
    nr_refactored_patterns: 192
    nr_legacy_patterns: 0
- id: diagnostics-consumer-contextualized-usage
  message: Detected Diagnostics::Consumer in variable/parameter context
  severity: INFO
  languages:
  - cpp
  pattern-regex: Diagnostics::Consumer\s*[&*]?\s+\w+\s*[=;,\)]
  metadata:
    category: structural
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
