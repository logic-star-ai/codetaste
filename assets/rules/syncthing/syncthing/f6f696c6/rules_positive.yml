rules:
- id: nooplogger-to-param-flow
  message: Detected NoopLogger flowing to function parameter - refactoring applied
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern-either:
    - pattern: events.NoopLogger{}
    - pattern: events.NoopLogger
  pattern-sinks:
  - pattern: $FUNC(..., $SINK, ...)
  metadata:
    nr_refactored_patterns: 127
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: log-call-not-on-default
  message: Detected Log call not on events.Default - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $LOGGER.Log($TYPE, $DATA)
  - pattern-not: events.Default.Log($TYPE, $DATA)
  - pattern-not: Default.Log($TYPE, $DATA)
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|log|ev).*
  - pattern-not-inside: "func ($RECV) Log($TYPE, $DATA) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: noop-logger-instantiation
  message: Detected NoopLogger instantiation - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: events.NoopLogger{}
    - pattern: events.NoopLogger
    - pattern: $PKG.NoopLogger{}
    - pattern: $PKG.NoopLogger
  - metavariable-regex:
      metavariable: $PKG
      regex: ^events$
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: method-using-logger-field
  message: Detected method using logger struct field - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) $METHOD(...) {\n  ...\n  $RECV.$FIELD.Log(...)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $FIELD
      regex: (?i).*(logger|log|ev).*
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: subscription-unsubscribe-method
  message: Detected Subscription.Unsubscribe() method call - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $SUB.Unsubscribe()
  - pattern-not-inside: '$LOGGER.Unsubscribe($SUB)

      '
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: event-logger-parameter-in-function
  message: Detected function with events.Logger parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $FUNC(..., $PARAM $PKG.Logger, ...) { ... }
    - pattern: func $FUNC(..., $PARAM $PKG.Logger) { ... }
    - pattern: func ($RECV) $METHOD(..., $PARAM $PKG.Logger, ...) { ... }
    - pattern: func ($RECV) $METHOD(..., $PARAM $PKG.Logger) { ... }
  - metavariable-regex:
      metavariable: $PKG
      regex: ^events$
  metadata:
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: logger-passed-in-any-call
  message: Detected logger passed to function call - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $FUNC(..., $LOGGER, ...)
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i)^(ev|event|log)?(logger|log)$
  - pattern-not: $FUNC($LOGGER)
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: logger-variable-multiple-uses
  message: Detected logger variable used in multiple operations - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$LOGGER := ...

      ...

      $LOGGER.Subscribe(...)

      '
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|evlog).*
  - pattern-not: '$LOGGER := events.Default

      ...

      $LOGGER.Subscribe(...)

      '
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: subscribe-result-assignment
  message: Detected subscription assignment from logger - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $SUB := $LOGGER.Subscribe($MASK)
  - pattern-not: $SUB := events.Default.Subscribe($MASK)
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|log|ev).*
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: logger-field-in-struct
  message: Detected events.Logger as struct field - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $STRUCT struct {\n  ...\n  $FIELD events.Logger\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: config-wrap-multiarg
  message: Detected config.Wrap with additional parameters - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: config.Wrap($PATH, $CFG, $LOGGER)
  - pattern-not: config.Wrap($PATH, $CFG)
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/cmd/stcli/**'
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: logger-variable-declaration
  message: Detected events.Logger variable declaration - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: var $VAR events.Logger
    - pattern: $VAR := $EXPR
  - metavariable-regex:
      metavariable: $VAR
      regex: (?i).*(logger|evlog|eventlog).*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: stop-on-passed-logger
  message: Detected Stop call on passed logger - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $LOGGER.Stop()
  - pattern-not: events.Default.Stop()
  - pattern-not: Default.Stop()
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|log|ev).*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: multiple-logger-operations
  message: Detected multiple operations on same logger - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$LOGGER.Subscribe(...)

      ...

      $LOGGER.Log(...)

      '
  - pattern-not: 'events.Default.Subscribe(...)

      ...

      events.Default.Log(...)

      '
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|evlog).*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: logger-method-chain-pattern
  message: Detected logger method chaining - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $LOGGER.Subscribe(...).C()
  - pattern-not: events.Default.Subscribe(...).C()
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: new-progress-emitter-with-logger
  message: Detected NewProgressEmitter with logger parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: NewProgressEmitter(..., $LOGGER, ...)
    - pattern: $PKG.NewProgressEmitter(..., $LOGGER, ...)
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|log|ev).*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: buffered-subscription-with-logger-subscribe
  message: Detected BufferedSubscription with logger Subscribe - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: events.NewBufferedSubscription($LOGGER.Subscribe(...), ...)
  - pattern-not: events.NewBufferedSubscription(events.Default.Subscribe(...), ...)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: model-service-function-logger
  message: Detected model service function with logger - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $SERVICE := model.$FUNC(..., $LOGGER, ...)
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|evlog).*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: discover-new-global-with-logger
  message: Detected discover.NewGlobal with logger parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: discover.NewGlobal(..., $LOGGER, ...)
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|log|ev).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: discover-new-local-with-logger
  message: Detected discover.NewLocal with logger parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: discover.NewLocal(..., $LOGGER, ...)
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|log|ev).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: new-model-with-logger-param
  message: Detected model.NewModel with logger parameter - refactoring applied
  severity: INFO
  languages:
  - go
  pattern: model.NewModel($CFG, $ID, $NAME, $VER, $DB, $FILES, ..., $LOGGER, ...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: new-logger-creation-in-main
  message: Detected events.NewLogger creation - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $VAR := events.NewLogger()
  - pattern-inside: "func $MAIN(...) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $MAIN
      regex: (?i).*(main|init|setup|start).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: logger-interface-type-declaration
  message: Detected events.Logger as interface type - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type Logger interface {\n  ...\n}\n"
  - pattern-inside: 'package events

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: connections-new-service-with-logger
  message: Detected connections.NewService with logger parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: connections.NewService(..., $LOGGER, ...)
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|log|ev).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: lowercase-logger-type
  message: Detected lowercase logger concrete type - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: type logger struct { ... }
  - pattern-inside: 'package events

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: logger-composite-literal
  message: Detected logger composite literal instantiation - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "&logger{\n  ...\n}\n"
  - pattern-inside: 'package events

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: main-function-logger-usage
  message: Detected main/start function with logger operations - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $MAIN(...) {\n  ...\n  $LOGGER := events.NewLogger()\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $MAIN
      regex: (?i).*(main|start|run|init).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: unsubscribe-method-on-subscription
  message: Detected Unsubscribe method on Subscription - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($S *$SUBSCRIPTION) Unsubscribe() { ... }
  - metavariable-regex:
      metavariable: $SUBSCRIPTION
      regex: (?i).*(subscription|sub).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: lowercase-logger-impl
  message: Detected lowercase logger method implementation - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func ($L *logger) $METHOD(...) $RET { ... }
    - pattern: func ($L logger) $METHOD(...) $RET { ... }
  - pattern-inside: 'package events

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: logger-sendevent-method
  message: Detected sendEvent method on logger - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($L *logger) sendEvent($EVENT Event) { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: api-service-with-logger
  message: Detected API service function with logger - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $SERVICE := api.$FUNC(..., $LOGGER, ...)
  - metavariable-regex:
      metavariable: $LOGGER
      regex: (?i).*(logger|evlog).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
