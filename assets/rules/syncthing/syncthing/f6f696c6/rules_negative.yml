    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - lib/model/*.go
- id: discover-newglobal-missing-evlogger
  message: discover.NewGlobal() should accept events.Logger parameter. Add evLogger
