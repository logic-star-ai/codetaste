rules:
- id: events-default-method-call
  message: events.Default method calls should be replaced with evLogger.$METHOD(...).
    Pass events.Logger explicitly instead of using the global singleton.
  severity: WARNING
  languages:
  - go
  pattern: events.Default.$METHOD(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 75
- id: events-default-log-call
  message: events.Default.Log() should be replaced with evLogger.Log(). Pass events.Logger
    explicitly instead of using the global singleton.
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Log($EVENT, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: function-call-with-events-default-log
  message: Log with map data should use evLogger.Log() instead of events.Default.Log().
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'events.Default.Log($TYPE, map[string]$VALTYPE{...})

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: events-default-log-any-event-type
  message: Event logging should use evLogger.Log() instead of events.Default.Log().
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: events.Default.Log(events.$EVENT, ...)
  - metavariable-pattern:
      metavariable: $EVENT
      pattern-either:
      - pattern: ItemStarted
      - pattern: ItemFinished
      - pattern: DeviceConnected
      - pattern: DeviceDisconnected
      - pattern: ConfigSaved
      - pattern: Starting
      - pattern: StartupComplete
      - pattern: FolderRejected
      - pattern: DeviceRejected
      - pattern: StateChanged
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: subscription-unsubscribe-old-api
  message: Use subscription.Unsubscribe() method instead of logger.Unsubscribe(subscription).
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$LOGGER.Unsubscribe($SUB)

      '
  - metavariable-pattern:
      metavariable: $LOGGER
      patterns:
      - pattern-not: cfg
      - pattern-not: w
      - pattern-not: c
      - pattern-not: wrapper
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    exclude:
    - lib/api/api.go
    - lib/watchaggregator/aggregator.go
- id: folder-log-without-evlogger-field
  message: Folder methods should use f.evLogger.Log() instead of events.Default.Log().
    Add evLogger field to folder structs.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: events.Default.Log($EVENT, ...)
  - pattern-inside: "func ($F *$FOLDER) $METHOD(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - lib/model/folder*.go
- id: events-default-log-with-string-map
  message: Log event with string map should use evLogger.Log() instead of events.Default.Log().
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Log($TYPE, map[string]string{...})
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: events-default-log-with-interface-map
  message: Log event with interface map should use evLogger.Log() instead of events.Default.Log().
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Log($TYPE, map[string]interface{}{...})
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: events-default-subscribe-call
  message: events.Default.Subscribe() should be replaced with evLogger.Subscribe().
    Pass events.Logger explicitly instead of using the global singleton.
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Subscribe($MASK)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: events-log-in-sendreceivefolder
  message: sendReceiveFolder should use f.evLogger.Log() instead of events.Default.Log().
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: events.Default.Log($EVENT, ...)
  - pattern-inside: "func ($F *sendReceiveFolder) $METHOD(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    include:
    - lib/model/folder_sendrecv.go
- id: events-default-in-test
  message: Tests should not use events.Default. Use events.NoopLogger or create a
    dedicated events.Logger instance for testing.
  severity: WARNING
  languages:
  - go
  pattern: events.Default
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - '*_test.go'
- id: helper-function-uses-events-default
  message: Helper function should accept events.Logger parameter instead of using
    events.Default.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: events.Default.Log(...)
    - pattern: events.Default.Subscribe(...)
  - pattern-not-inside: "func ($RCV *$TYPE) $METHOD(...) {\n  ...\n}\n"
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: events-default-after-defer
  message: Code using events.Default should use explicit evLogger instance.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'defer $FUNC(...)

      ...

      events.Default.$METHOD(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: events-default-reference
  message: events.Default.Subscribe() should be replaced with evLogger.Subscribe().
    Pass events.Logger explicitly instead of using the global singleton.
  severity: WARNING
  languages:
  - go
  pattern: '$X := events.Default.Subscribe(...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: events-default-unsubscribe-call
  message: events.Default.Unsubscribe() should be replaced with subscription.Unsubscribe().
    Use the Unsubscribe method on the subscription itself.
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Unsubscribe($SUB)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: model-log-without-evlogger-field
  message: Model methods should use m.evLogger.Log() instead of events.Default.Log().
    Add evLogger field to model struct.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: events.Default.Log($EVENT, ...)
  - pattern-inside: "func ($M *model) $METHOD(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - lib/model/*.go
- id: itemstarted-event-logging-old-pattern
  message: ItemStarted event should use evLogger.Log() instead of events.Default.Log().
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Log(events.ItemStarted, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: itemfinished-event-logging-old-pattern
  message: ItemFinished event should use evLogger.Log() instead of events.Default.Log().
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Log(events.ItemFinished, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: model-method-uses-default-log
  message: Method should use receiver's evLogger field instead of events.Default.Log().
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: events.Default.Log(...)
  - pattern-inside: "func ($RCV *$TYPE) $METHOD(...) $RET {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $TYPE
      pattern-either:
      - pattern: model
      - pattern: sendReceiveFolder
      - pattern: sendOnlyFolder
      - pattern: receiveOnlyFolder
      - pattern: ProgressEmitter
      - pattern: folderSummaryService
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: events-default-used-in-closure
  message: Closure should capture evLogger from enclosing scope instead of using events.Default.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: events.Default.Log(...)
    - pattern: events.Default.Subscribe(...)
  - pattern-inside: "func(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: events-default-defer-unsubscribe
  message: events.Default.Unsubscribe() should be replaced with sub.Unsubscribe().
    Use the Unsubscribe method on the subscription itself.
  severity: WARNING
  languages:
  - go
  pattern: 'defer events.Default.Unsubscribe($SUB)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: defer-events-default-unsubscribe-pattern
  message: 'Replace with: sub := evLogger.Subscribe(...); defer sub.Unsubscribe().
    Use explicit logger and subscription.Unsubscribe() method.'
  severity: WARNING
  languages:
  - go
  pattern: '$SUB := events.Default.Subscribe($MASK)

    defer events.Default.Unsubscribe($SUB)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: test-using-events-default-subscribe
  message: Tests should create events.Logger instance or use events.NoopLogger instead
    of events.Default.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: events.Default.Subscribe(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '*_test.go'
- id: events-default-subscribe-any-event-type
  message: Event subscription should use evLogger.Subscribe() instead of events.Default.Subscribe().
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: events.Default.Subscribe(events.$EVENT)
  - metavariable-pattern:
      metavariable: $EVENT
      pattern-either:
      - pattern: DeviceConnected
      - pattern: AllEvents
      - pattern: LocalIndexUpdated
      - pattern: ItemStarted
      - pattern: ItemFinished
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: test-using-events-default-log
  message: Tests should use events.NoopLogger or dedicated test logger instead of
    events.Default.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: events.Default.Log(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*_test.go'
- id: configsaved-event-logging-old-pattern
  message: ConfigSaved event should be logged by calling code using evLogger.Log(),
    not by config wrapper.
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Log(events.ConfigSaved, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: multiple-event-mask-subscription-old-pattern
  message: Multi-event subscription should use evLogger.Subscribe() instead of events.Default.Subscribe().
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Subscribe($TYPE1 | $TYPE2)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: test-using-events-default-unsubscribe
  message: Tests should use sub.Unsubscribe() method instead of events.Default.Unsubscribe().
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: events.Default.Unsubscribe(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*_test.go'
- id: main-function-uses-default
  message: Main function should create and use events.Logger instead of events.Default.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: events.Default.Log(...)
    - pattern: events.Default.Subscribe(...)
    - pattern: events.Default.Unsubscribe(...)
  - pattern-inside: "func $MAIN(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - cmd/syncthing/*.go
- id: discoverer-missing-evlogger-field
  message: Discoverer struct should have evLogger events.Logger field. Add evLogger
    field.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type $DISCOVERER struct {\n  ...\n}\n"
  - pattern-not: "type $DISCOVERER struct {\n  ...\n  evLogger events.Logger\n  ...\n\
      }\n"
  - metavariable-pattern:
      metavariable: $DISCOVERER
      pattern-either:
      - pattern: globalClient
      - pattern: localClient
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/discover/*.go
- id: events-log-call-in-goroutine
  message: Goroutine using events.Default.Log() should use evLogger.Log() instead.
    Capture evLogger from enclosing scope.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "go func() {\n  ...\n  events.Default.Log($TYPE, ...)\n  ...\n}()\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: buffered-subscription-from-events-default
  message: NewBufferedSubscription should use evLogger.Subscribe() instead of events.Default.Subscribe().
  severity: WARNING
  languages:
  - go
  pattern: events.NewBufferedSubscription(events.Default.Subscribe($MASK), $SIZE)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: allevents-subscription-old-pattern
  message: AllEvents subscription should use evLogger.Subscribe() instead of events.Default.Subscribe().
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Subscribe(events.AllEvents)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: statechanged-event-logging-old-pattern
  message: StateChanged event should use evLogger.Log() instead of events.Default.Log().
  severity: WARNING
  languages:
  - go
  pattern: events.Default.Log(events.StateChanged, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: poll-on-events-default-subscription
  message: Subscription from events.Default should be replaced with evLogger.Subscribe().
  severity: WARNING
  languages:
  - go
  pattern: '$SUB := events.Default.Subscribe($MASK)

    ...

    $SUB.Poll($TIMEOUT)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: subscription-in-struct-initialization
  message: Struct initialization should use evLogger.Subscribe() instead of events.Default.Subscribe().
  severity: WARNING
  languages:
  - go
  pattern: "&$STRUCT{\n  ...,\n  $FIELD: events.Default.Subscribe($MASK),\n  ...\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: events-log-in-folder-summary-service
  message: folderSummaryService should use s.evLogger.Log() instead of events.Default.Log().
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: events.Default.Log($EVENT, ...)
  - pattern-inside: "func ($S *folderSummaryService) $METHOD(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/model/folder_summary.go
- id: config-wrapper-emits-config-saved-event
  message: Config wrapper should no longer emit ConfigSaved events directly. The calling
    code is responsible for logging config-related events.
  severity: WARNING
  languages:
  - go
  pattern: events.$ANY.Log(events.ConfigSaved, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - lib/config/*.go
- id: events-default-declaration-exists
  message: The global events.Default singleton should be removed. Use explicit events.Logger
    instances passed through constructors.
  severity: WARNING
  languages:
  - go
  pattern: 'var Default = $FUNC()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - lib/events/events.go
- id: model-newmodel-missing-evlogger-param
  message: NewModel() should accept events.Logger parameter. Add evLogger events.Logger
    parameter to enable explicit event logging.
  severity: WARNING
  languages:
  - go
  pattern: "func NewModel($CFG config.Wrapper, $ID protocol.DeviceID, $CLIENT string,\
    \ $VERSION string, $LDB *db.Lowlevel, $FILES []string) $RET {\n  ...\n}\n"
