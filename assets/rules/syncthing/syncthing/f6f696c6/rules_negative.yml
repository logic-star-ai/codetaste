- id: init-func-starts-default-logger
  message: events.Default initialization in init() should be removed. Start events.Logger
    explicitly in main.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func init() {\n  ...\n  go Default.Serve()\n  ...\n}\n"
  - pattern-inside: 'package events

      ...

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: events-logger-should-be-interface
  message: events.Logger should be an interface. Rename concrete struct to 'logger'
    and create Logger interface.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type Logger struct {\n  ...\n}\n"
  - pattern-not-inside: "type Logger interface {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
