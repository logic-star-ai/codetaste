rules:
- id: python-file-in-source-space-dir
  message: Detected Python file in source_space directory
  severity: INFO
  languages:
  - python
  pattern-regex: .*
  metadata:
    nr_refactored_patterns: 5974
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/_*.py'
    - '**/source_space/__*.py'
- id: call-renamed-plot-ch-type-function
  message: Detected call to renamed _get_plot_ch_type function
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: _get_plot_ch_type
  pattern-sinks:
  - pattern: $FUNC($...ARGS)
  metadata:
    nr_refactored_patterns: 149
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: docstring-pattern-in-source-space-files
  message: Detected docstring in source_space file
  severity: INFO
  languages:
  - python
  pattern-regex: '""".*"""'
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/**/*.py'
- id: detect-source-space-nested-module-import
  message: Detected import from new nested source_space._source_space module
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MOD.source_space._source_space import $X
    - pattern: import $MOD.source_space._source_space
  - metavariable-regex:
      metavariable: $MOD
      regex: ^(mne|\.+)$
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-source-space-relative-import
  message: Detected relative import in source_space package
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from . import $X
    - pattern: from .. import $X
    - pattern: from .$MOD import $X
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/**/*.py'
  options:
    symbolic_propagation: true
- id: detect-new-comment-about-nesting
  message: Detected comment about import nesting
  severity: INFO
  languages:
  - python
  pattern-regex: '#.*[Nn]est.*import.*'
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-import-statements-in-source-space-init
  message: Detected import statement in source_space/__init__.py
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MOD import $X
    - pattern: import $MOD
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/__init__.py'
  options:
    symbolic_propagation: true
- id: multiline-string-in-source-space
  message: Detected multiline string in source_space
  severity: INFO
  languages:
  - python
  pattern-regex: '"""[\s\S]{10,}"""'
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/**/*.py'
- id: detect-import-plot-ch-type-from-viz-utils
  message: Detected import of _get_plot_ch_type from viz.utils
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MOD.viz.utils import $IMPORTS
    - pattern: from $MOD.viz import $IMPORTS
  - metavariable-regex:
      metavariable: $IMPORTS
      regex: .*_get_plot_ch_type.*
  - metavariable-regex:
      metavariable: $MOD
      regex: ^(mne|\.+)$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-source-space-subdir-file
  message: Detected file in source_space subdirectory (converted from single file)
  severity: INFO
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/*.py'
    exclude:
    - '**/source_space.py'
- id: detect-renamed-plot-ch-type-function
  message: Detected renamed function '_get_plot_ch_type' in viz.utils module
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def _get_plot_ch_type($...ARGS):\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/viz/utils.py'
- id: detect-import-nesting-hierarchy-test-function
  message: Detected test_import_nesting_hierarchy test function
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def test_import_nesting_hierarchy($...ARGS):\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/**/test_*.py'
    - '**/test_*.py'
- id: detect-source-space-init-file
  message: Detected __init__.py in source_space subdirectory
  severity: INFO
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/__init__.py'
- id: detect-docstring-in-source-space-init
  message: Detected docstring in source_space/__init__.py
  severity: INFO
  languages:
  - python
  pattern-regex: '"""[\s\S]*"""'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/__init__.py'
- id: detect-test-with-ast-module-import
  message: Detected ast module import in test
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: import ast
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/**/*.py'
  options:
    symbolic_propagation: true
