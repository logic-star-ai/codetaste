rules:
- id: source-space-has-comments
  message: 'Refactoring detected: Comments in source_space'
  severity: INFO
  languages:
  - python
  pattern-regex: '#.*'
  metadata:
    nr_refactored_patterns: 275
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/_source_space.py'
- id: source-space-init-has-content
  message: 'Refactoring detected: source_space __init__ has content'
  severity: INFO
  languages:
  - python
  pattern: $STMT
  metadata:
    nr_refactored_patterns: 76
    nr_legacy_patterns: 0
  paths:
    include:
    - mne/source_space/__init__.py
- id: imports-in-source-space-submodule
  message: 'Refactoring detected: Imports in _source_space submodule'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: import $MOD
    - pattern: from $MOD import $ITEM
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/_source_space.py'
- id: source-space-package-structure-import
  message: 'Refactoring detected: source_space module reorganized as package'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from mne.source_space.$SUBMOD import $FUNC
    - pattern: from .source_space.$SUBMOD import $FUNC
    - pattern: from ..source_space.$SUBMOD import $FUNC
  - metavariable-regex:
      metavariable: $SUBMOD
      regex: ^_.*
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: nesting-test-imports-beyond-old
  message: 'Refactoring detected: Imports beyond old ones in nesting test'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: import $MOD
    - pattern: from $MOD import $ITEMS
  - pattern-not: import os
  - pattern-not: import sys
  - pattern-not: import pytest
  - pattern-not: from mne.utils import run_subprocess
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - mne/tests/test_import_nesting.py
- id: test-import-hierarchy-logic
  message: 'Refactoring detected: Import hierarchy testing logic'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "$VAR = ($TUPLE, ...)\n...\nfor $ITEM in ...:\n    ...\n"
    - pattern: "for $ITEM in ...:\n    ...\n    $LIST.index($VAR)\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/test_import_nesting.py'
- id: imports-in-source-space-init
  message: 'Refactoring detected: Imports in source_space package init'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MOD import $ITEM
    - pattern: import $MODULE
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/__init__.py'
- id: pathlib-in-test-file
  message: 'Refactoring detected: Using pathlib in test'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from pathlib import Path
    - pattern: Path($ARG)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/test_import*.py'
- id: source-space-reorganized-files
  message: 'Refactoring detected: Files in reorganized source_space'
  severity: INFO
  languages:
  - python
  pattern-regex: \A
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/_*.py'
- id: function-definitions-in-test-nesting
  message: 'Refactoring detected: Multiple function definitions in test_import_nesting'
  severity: INFO
  languages:
  - python
  pattern: "def $FUNC1(...):\n    ...\n...\ndef $FUNC2(...):\n    ...\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/test_import_nesting.py'
- id: ast-import-in-test-file
  message: 'Refactoring detected: Using ast module in test'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: import ast
    - pattern: ast.$METHOD(...)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: new-get-plot-ch-type-function-in-viz-utils
  message: 'Refactoring detected: _get_plot_ch_type function now exists in mne.viz.utils'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def _get_plot_ch_type($ARGS, ...):\n    ...\n"
  - metavariable-regex:
      metavariable: $ARGS
      regex: .*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/viz/utils.py'
    - '**/viz/utils/*.py'
- id: import-plot-ch-type-from-viz-utils
  message: 'Refactoring detected: Importing plot ch type function from mne.viz.utils'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from mne.viz.utils import $FUNC
    - pattern: from mne.viz import $X
    - pattern: from ...viz.utils import $FUNC
    - pattern: from ..viz.utils import $FUNC
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*plot.*ch.*type.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: source-space-underscore-module-file
  message: 'Refactoring detected: source_space organized as package with _source_space.py'
  severity: INFO
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/_source_space.py'
- id: import-nesting-order-definition
  message: 'Refactoring detected: IMPORT_NESTING_ORDER tuple defined in test'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: IMPORT_NESTING_ORDER = ($ITEMS, ...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/test_import*.py'
    - '**/test_import*.py'
- id: test-import-nesting-hierarchy-function
  message: 'Refactoring detected: test_import_nesting_hierarchy function exists'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def test_import_nesting_hierarchy(...):\n    ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/test_import*.py'
    - '**/test_import*.py'
- id: source-space-init-file-exists
  message: 'Refactoring detected: source_space has __init__.py (converted to package)'
  severity: INFO
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/source_space/__init__.py'
- id: test-nesting-expanded-beyond-old
  message: 'Refactoring detected: Test nesting has new content'
  severity: INFO
  languages:
  - python
  pattern-regex: (?s).{2000,}
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - mne/tests/test_import_nesting.py
