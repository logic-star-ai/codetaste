    - mne/viz/ica.py
- id: get-ch-type-function-parameter-in-viz
  message: Function using _get_ch_type in viz module. After refactoring, should use
    _get_plot_ch_type from viz.utils
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def $FUNC(...):\n    ...\n    $VAR = _get_ch_type($INST, $CH)\n    ...\n"
  metadata:
