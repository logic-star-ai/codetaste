    - mne/viz/*.py
    - mne/report/*.py
- id: direct-reference-to-old-source-space-file
  message: Old source_space.py file detected at root level. Should be converted to
    mne/source_space/_source_space.py directory structure
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - mne/source_space.py
- id: import-get-ch-type-from-channels-in-report
  message: Module-level import of _get_ch_type from channels in report module. This
    may create circular dependencies and should be nested or use plotting-specific
    function
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'from ..channels import _get_ch_type

        '
    - pattern: 'from mne.channels import _get_ch_type

        '
  - pattern-not-inside: "def $FUNC(...):\n    ...\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - mne/report/*.py
