rules:
- id: call-old-get-ch-type-function
  message: Calling old function '_get_ch_type'. Should use '_get_plot_ch_type' from
    mne.viz.utils
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: pick._get_ch_type(...)
  - pattern: $MOD._get_ch_type(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: import-specific-get-ch-type-variant
  message: Import of _get_ch_type from channels module. After refactoring, plotting
    code should use _get_plot_ch_type from viz.utils
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MOD.channels import _get_ch_type
    - pattern: from $MOD.channels.channels import _get_ch_type
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - mne/viz/*.py
    - mne/report/*.py
- id: relative-channels-channels-import-viz
  message: Relative import of _get_ch_type from channels.channels. In viz context,
    should use _get_plot_ch_type from viz.utils
  severity: WARNING
  languages:
  - python
  pattern: from ..channels.channels import _get_ch_type
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: nested-import-get-ch-type-from-channels-in-viz
  message: Nested import of _get_ch_type from channels module. After refactoring,
    this should be _get_plot_ch_type from viz.utils instead
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'from ..channels.channels import _get_ch_type

        '
    - pattern: 'from ..channels import _get_ch_type

        '
    - pattern: 'from mne.channels.channels import _get_ch_type

        '
    - pattern: 'from mne.channels import _get_ch_type

        '
  - pattern-inside: "def $FUNC(...):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - mne/viz/*.py
- id: ch-type-equals-get-ch-type
  message: Assignment to ch_type variable using _get_ch_type. After refactoring, use
    _get_plot_ch_type from viz.utils
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: ch_type = _get_ch_type(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - mne/viz/*.py
    - mne/report/*.py
- id: import-from-channels-then-get-ch-type
  message: Import and use of _get_ch_type from channels in viz. After refactoring,
    use _get_plot_ch_type from viz.utils
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'from ..channels.channels import _get_ch_type

        ...

        _get_ch_type(...)

        '
    - pattern: 'from ..channels import _get_ch_type

        ...

        _get_ch_type(...)

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - mne/viz/*.py
- id: get-ch-type-any-call-in-viz
  message: Any call to _get_ch_type in viz module. After refactoring, use _get_plot_ch_type
    from viz.utils
  severity: WARNING
  languages:
  - python
  pattern: _get_ch_type(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - mne/viz/topomap.py
    - mne/viz/ica.py
- id: import-get-ch-type-nested-in-topomap
  message: Import of _get_ch_type from channels.channels in viz/topomap.py. After
    refactoring, use _get_plot_ch_type from viz.utils instead
  severity: WARNING
  languages:
  - python
  pattern: from ..channels.channels import _get_ch_type
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - mne/viz/topomap.py
- id: call-get-ch-type-in-viz-topomap
  message: Call to _get_ch_type in viz/topomap.py. After refactoring, use _get_plot_ch_type
    instead
  severity: WARNING
  languages:
  - python
  pattern: _get_ch_type($INST, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - mne/viz/topomap.py
- id: get-ch-type-assignment-pattern
  message: Variable assignment from _get_ch_type. After refactoring, use _get_plot_ch_type
    from viz.utils
  severity: WARNING
  languages:
  - python
  pattern: $VAR = _get_ch_type($OBJ, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - mne/viz/*.py
    - mne/report/*.py
- id: get-ch-type-assignment-in-viz-topomap
  message: Assignment using _get_ch_type in viz/topomap.py. After refactoring, should
