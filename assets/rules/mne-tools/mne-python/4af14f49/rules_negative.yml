  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $VAR = _get_ch_type(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - mne/viz/topomap.py
- id: get-ch-type-with-inst-and-ch-type
  message: Call to _get_ch_type with two parameters in viz module. After refactoring,
    use _get_plot_ch_type from viz.utils
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: _get_ch_type($X, $Y)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
