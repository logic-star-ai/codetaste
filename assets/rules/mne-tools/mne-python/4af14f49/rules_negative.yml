- id: get-ch-type-with-ch-type-none
  message: Call to _get_ch_type with None as ch_type. After refactoring, use _get_plot_ch_type
    from viz.utils
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: _get_ch_type($INST, None)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
