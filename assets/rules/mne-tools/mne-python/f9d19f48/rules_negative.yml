rules:
- id: old-param-validation-three-options-list-refined
  message: Old-style parameter validation detected. Replace with _check_option
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "if $VAR not in [$OPT1, $OPT2, $OPT3]:\n    raise ValueError(...)\n"
  - pattern-not-inside: "def _get_config(...):\n    ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    exclude:
    - mne/utils/config.py
- id: old-param-validation-four-options-list
  message: Old-style parameter validation detected. Replace with _check_option('$VAR',
    $VAR, [$OPT1, $OPT2, $OPT3, $OPT4])
  severity: WARNING
  languages:
  - python
  pattern: "if $VAR not in [$OPT1, $OPT2, $OPT3, $OPT4]:\n    raise ValueError(...)\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
