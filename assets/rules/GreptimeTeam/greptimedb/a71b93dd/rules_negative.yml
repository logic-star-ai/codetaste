rules:
- id: detect-cluster-id-display-format
  message: cluster_id placeholder in format string should be removed
  severity: WARNING
  languages:
  - rust
  pattern-regex: \{[^}]*cluster_id[^}]*\}
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 307
- id: detect-cluster-id-in-function-call
  message: cluster_id argument in function call should be removed
  severity: WARNING
  languages:
  - rust
  pattern: $FUNC(..., cluster_id, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 182
- id: detect-cluster-id-method-call
  message: cluster_id argument in method call should be removed
  severity: WARNING
  languages:
  - rust
  pattern: $OBJ.$METHOD(..., cluster_id, ...)
