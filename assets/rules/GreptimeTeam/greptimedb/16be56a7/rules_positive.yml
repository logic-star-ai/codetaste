rules:
- id: optionext-with-errorext
  message: File uses explicit OptionExt and ErrorExt imports (refactoring applied)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: use snafu::OptionExt;
  - pattern-inside: 'use common_error::ext::ErrorExt;

      ...

      '
  - pattern-not: use common_error::prelude::*;
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
