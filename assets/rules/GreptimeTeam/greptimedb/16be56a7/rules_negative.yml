rules:
- id: common-error-prelude-import-pattern-either
  message: Remove prelude import and use explicit imports instead
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: use common_error::prelude::*;
    - pattern: use common_error::prelude::$SINGLE;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 120
- id: common-error-prelude-specific-import
  message: Remove import from common_error::prelude. Replace '$ITEM' with explicit
    import from common_error::ext, common_error::status_code, or snafu.
  severity: WARNING
  languages:
  - rust
  pattern: use common_error::prelude::$ITEM;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 85
- id: common-error-prelude-import-any-item-generic
  message: Replace any prelude import with explicit imports from common_error::ext,
    common_error::status_code, or snafu
  severity: WARNING
  languages:
  - rust
  pattern: use common_error::prelude::$ANY;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 85
- id: common-error-prelude-with-pub-use
  message: Remove pub use of prelude items. Use explicit imports instead.
  severity: WARNING
  languages:
  - rust
  pattern: pub use common_error::prelude::$ITEM;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 85
- id: common-error-prelude-qualified-path
  message: Remove qualified path usage of common_error::prelude items. Use explicit
    imports instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: common_error::prelude::\w+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
  paths:
    exclude:
    - src/common/error/src/lib.rs
- id: common-error-prelude-wildcard-import
  message: Remove wildcard import from common_error::prelude. Replace with explicit
    imports from common_error::ext, common_error::status_code, or snafu.
  severity: WARNING
  languages:
  - rust
  pattern: use common_error::prelude::*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
- id: common-error-prelude-wildcard-anywhere
  message: Replace prelude wildcard import with explicit imports
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use $PATH::prelude::*;
  - metavariable-pattern:
      metavariable: $PATH
      pattern: common_error
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
- id: common-error-prelude-boxederror-import
  message: Replace 'use common_error::prelude::BoxedError' with 'use common_error::ext::BoxedError'
  severity: WARNING
  languages:
  - rust
