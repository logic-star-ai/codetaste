    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: method-body-unused-registerstate
  message: IRQ handler with unused RegisterState parameter (no reference to regs in
    body). Remove the parameter.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: handle_(interrupt|irq)\s*\(\s*RegisterState\s+const\s*&\s*\)\s*\{[^}]{0,100}(return|if|u\d+)
  metadata:
