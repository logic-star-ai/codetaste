    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: interrupt-handler-return-with-regs-check
  message: Interrupt handler with RegisterState parameter that just returns bool.
    Remove the unused parameter.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: handle_(interrupt|irq)\s*\(\s*RegisterState\s+const\s*&[^)]*\)[^{]*\{[^}]{0,200}return\s+(true|false)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: handle-irq-forward-regs
  message: handle_irq() call forwards 'regs' parameter. Remove the parameter.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: handle_irq\s*\(\s*regs\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: lambda-with-registerstate-param
  message: Lambda or function still captures RegisterState parameter. Remove the parameter.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \[\s*[^\]]*\]\s*\(\s*RegisterState\s+const\s*&[^)]*\)\s*\{
