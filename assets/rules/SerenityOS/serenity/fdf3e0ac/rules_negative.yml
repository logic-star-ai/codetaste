rules:
- id: generic-irq-function-old
  message: IRQ function uses RegisterState parameter. Consider if this needs updating.
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: \w+_irq\s*\([^)]*RegisterState\s+const\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: function-void-registerstate-callback
  message: Timer callback still uses old signature Function<void(RegisterState const&)>.
    Change to Function<void()>.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: Function\s*<\s*void\s*\(\s*RegisterState\s+const\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: handle-irq-registerstate-method
  message: handle_irq() method still uses old signature with RegisterState parameter.
    Remove the RegisterState const& parameter.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: (virtual\s+)?bool\s+handle_irq\s*\(\s*RegisterState\s+const\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: generic-interrupt-function-old
  message: Interrupt function uses RegisterState parameter. Consider if this needs
    updating.
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: \w+_interrupt\s*\([^)]*RegisterState\s+const\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: any-handler-class-registerstate
  message: Handler class method uses RegisterState parameter. Remove the parameter.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '[A-Z]\w*Handler[^{;]*handle_\w+\s*\(\s*RegisterState\s+const\s*&'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: override-handle-irq-registerstate
  message: Override of handle_irq() still uses RegisterState parameter. Remove the
    parameter.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: bool\s+handle_irq\s*\(\s*RegisterState\s+const\s*&[^)]*\)\s+override
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: registerstate-unused-param-comment
  message: RegisterState parameter is likely unused. Remove the parameter entirely.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: handle_(interrupt|irq)\s*\(\s*RegisterState\s+const\s*&\s*(/\*[^*]*\*/|\w+)\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: handle-interrupt-registerstate-method
  message: handle_interrupt() method still uses old signature with RegisterState parameter.
    Remove the RegisterState const& parameter.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: (virtual\s+)?bool\s+handle_interrupt\s*\(\s*RegisterState\s+const\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: override-handle-interrupt-registerstate
  message: Override of handle_interrupt() still uses RegisterState parameter. Remove
    the parameter.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: bool\s+handle_interrupt\s*\(\s*RegisterState\s+const\s*&[^)]*\)\s+override
  metadata:
