  severity: WARNING
  languages:
  - cpp
  pattern-regex: template\s+RefPtr<Protocol::Request>\s+Protocol::RequestClient::start_request.*CaseInsensitiveStringTraits
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/RequestClient.cpp'
- id: requestclient-hashmap-clone-template
  message: HashMap clone with template parameter - remove after migrating to HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: request_headers\.template\s+clone<Traits<ByteString>>\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/RequestClient.cpp'
- id: connectionfromclient-start-request-hashmap
