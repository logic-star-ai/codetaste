  severity: WARNING
  languages:
  - cpp
  pattern-regex: template\s*<\s*typename\s+\w+\s*=\s*Traits<ByteString>\s*>\s*\n.*start_request
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/RequestClient.h'
    - '**/RequestClient.cpp'
- id: requestclient-explicit-template-instantiation
  message: Explicit template instantiation for CaseInsensitiveStringTraits - remove
