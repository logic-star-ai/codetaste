  languages:
  - cpp
  pattern-regex: for\s*\(\s*auto\s*&\s*header\s*:\s*m_headers\s*\)\s*\{[^}]*header\.name[^}]*header\.value
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/HttpRequest.cpp'
- id: http-request-from-raw-vector-headers
