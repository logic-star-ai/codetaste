rules:
- id: start-request-with-hashmap-headers
  message: start_request method uses HashMap for headers - should use HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: start_request\s*\([^)]*HashMap<\s*ByteString\s*,\s*ByteString\s*>[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: userland-maps-headers-declaration
  message: Maps application has HashMap headers - verify it uses HTTP::HeaderMap
  severity: INFO
  languages:
  - cpp
  pattern-regex: HashMap<[^>]*>\s+headers\s*;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/Applications/Maps/**'
- id: vector-header-member-variable
  message: Vector<Header> used for headers storage - should use HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: Vector<\s*Header\s*>\s+(m_headers|headers)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/HttpRequest.h'
    - '**/HttpRequest.cpp'
- id: utilities-hashmap-case-insensitive-headers
  message: Utility uses HashMap with CaseInsensitiveStringTraits for headers - should
    use HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: HashMap<[^>]*,\s*CaseInsensitiveStringTraits\s*>\s+\w*headers
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/Utilities/**'
- id: gemini-protocol-hashmap-headers
  message: Gemini protocol start_request uses HashMap - should use HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: start_request.*HashMap<\s*ByteString\s*,\s*ByteString
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/GeminiProtocol.h'
    - '**/GeminiProtocol.cpp'
    - '**/GeminiRequest.h'
    - '**/GeminiRequest.cpp'
- id: request-server-adapter-hashmap
  message: RequestServerAdapter may use HashMap for headers - should use HTTP::HeaderMap
  severity: INFO
  languages:
  - cpp
  pattern-regex: HashMap<\s*ByteString\s*,\s*ByteString\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/RequestServerAdapter.cpp'
    - '**/RequestServerAdapter.h'
- id: http-protocol-start-request-impl
  message: HTTP/HTTPS protocol start_request implementation uses HashMap - should
    use HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: start_request\s*\([^)]*HashMap
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/HttpProtocol.cpp'
    - '**/HttpsProtocol.cpp'
- id: headers-equals-ignoring-case-content-length
  message: Manual case-insensitive comparison on header.name - HeaderMap handles this
    internally
  severity: INFO
  languages:
  - cpp
  pattern-regex: header\.name\.equals_ignoring_ascii_case\s*\(\s*"Content-Length"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/HttpRequest.cpp'
- id: request-header-iteration-key-value
  message: Iterating headers using .key and .value - should use .name and .value after
    migration
  severity: INFO
  languages:
  - cpp
  pattern-regex: it\.key.*it\.value
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/Request*.cpp'
    - '**/*Http*.cpp'
- id: http-request-header-equals-ignoring-case
  message: Manual case-insensitive comparison - HeaderMap handles case-insensitivity
  severity: INFO
  languages:
  - cpp
  pattern-regex: header\.name\.equals_ignoring_ascii_case
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/HttpRequest.cpp'
- id: template-instantiation-refptr-request
  message: Explicit template instantiation of start_request - remove after HeaderMap
    migration
  severity: WARNING
  languages:
  - cpp
  pattern-regex: template\s+RefPtr<Protocol::Request>\s+Protocol::RequestClient::start_request
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/RequestClient.cpp'
- id: iterate-headers-with-key-value-pair
  message: Accessing .key and .value on iterator - should use .name and .value after
    HTTP::Header migration
  severity: INFO
  languages:
  - cpp
  pattern-regex: \w+\.key[^;]*\w+\.value
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/Request*.cpp'
    - '**/*Http*.cpp'
- id: hashmap-clone-with-traits-template
  message: HashMap clone with template traits found. After migrating to HTTP::HeaderMap,
    this pattern should be removed.
  severity: WARNING
  languages:
  - cpp
  pattern: '$HEADERS.template clone<Traits<ByteString>>()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: set-headers-method-with-hashmap
  message: set_headers method takes HashMap parameter instead of HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: void\s+set_headers\s*\(\s*HashMap<\s*ByteString\s*,\s*ByteString\s*>\s*const\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: template-with-request-hashmap-traits
  message: Template parameter for HashMap traits found - should be removed after migrating
    to HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: template\s*<\s*typename\s+\w+\s*=\s*Traits<ByteString>\s*>
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - AK/**
- id: explicit-template-instantiation-case-insensitive
  message: Explicit template instantiation with CaseInsensitiveStringTraits - remove
    after HeaderMap migration
  severity: WARNING
  languages:
  - cpp
  pattern-regex: template\s+.*HashMap<\s*ByteString\s*,\s*ByteString\s*,\s*CaseInsensitiveStringTraits\s*>
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: hashmap-clone-with-traits
  message: HashMap clone with template traits - should be removed after migrating
    to HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \.template\s+clone<\s*Traits<ByteString>\s*>\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: request-headers-struct-member-hashmap
  message: Struct member 'request_headers' uses HashMap - should use HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: HashMap<\s*ByteString\s*,\s*ByteString\s*>\s+request_headers
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: local-header-struct-in-httprequest
  message: Local Header struct definition found - should use HTTP::Header from Header.h
  severity: WARNING
  languages:
  - cpp
  pattern-regex: struct\s+Header\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/HttpRequest.h'
- id: headers-method-returns-vector
  message: headers() method returns Vector<Header> const& - should return HTTP::HeaderMap
    or use HeaderMap internally
  severity: WARNING
  languages:
  - cpp
  pattern-regex: Vector<\s*Header\s*>\s+const\s*&\s+headers\s*\(\s*\)\s*const
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/HttpRequest.h'
- id: ipc-start-request-hashmap-signature
  message: IPC start_request signature uses HashMap for headers - should use HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: virtual\s+void\s+start_request\s*\([^)]*HashMap<\s*ByteString\s*,\s*ByteString\s*>[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: httprequest-set-headers-hashmap
  message: HttpRequest::set_headers should take HTTP::HeaderMap instead of HashMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: void\s+set_headers\s*\(\s*HashMap<\s*ByteString\s*,\s*ByteString\s*>\s*const\s*&
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/HttpRequest.h'
    - '**/HttpRequest.cpp'
- id: httprequest-local-header-struct
  message: HttpRequest defines local Header struct - should use HTTP::Header from
    Header.h
  severity: WARNING
  languages:
  - cpp
  pattern-regex: struct\s+Header\s*\{\s*ByteString\s+name\s*;\s*ByteString\s+value\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/HttpRequest.h'
- id: httprequest-vector-header-storage
  message: HttpRequest uses Vector<Header> for storage - should use HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: Vector<\s*Header\s*>\s+m_headers\s*;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/HttpRequest.h'
- id: httprequest-headers-getter-vector
  message: HttpRequest::headers() returns Vector<Header> const& - should use HTTP::HeaderMap
  severity: WARNING
  languages:
  - cpp
  pattern-regex: Vector<\s*Header\s*>\s+const\s*&\s+headers\s*\(\s*\)\s*const
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/HttpRequest.h'
- id: requestclient-template-hashmap-traits-param
