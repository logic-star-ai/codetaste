    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/ai-editor.contribution.ts'
- id: ai-editor-e-inline-chat-status-enum
  message: Inline chat status management should be in InlineChatHandler
  severity: WARNING
