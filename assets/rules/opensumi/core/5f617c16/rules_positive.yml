rules:
- id: detect-multiple-handler-imports-in-contribution
  message: Detected multiple handler imports - refactoring successfully split features
    into separate modules
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'import { $H1 } from $P1

      '
  - pattern: 'import { $H2 } from $P2

      '
  - metavariable-pattern:
      metavariable: $H1
      patterns:
      - pattern-either:
        - pattern: CodeActionHandler
        - pattern: InlineChatHandler
        - pattern: InlineCompletionHandler
        - pattern: RenameHandler
  - metavariable-pattern:
      metavariable: $H2
      patterns:
      - pattern-either:
        - pattern: CodeActionHandler
        - pattern: InlineChatHandler
        - pattern: InlineCompletionHandler
        - pattern: RenameHandler
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-any-handler-class-definition
  message: Detected handler class definition - refactoring successfully split features
    into handler classes
  severity: INFO
  languages:
  - typescript
  pattern-regex: class\s+(CodeAction|InlineChat|InlineCompletion|Rename)Handler
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-handler-classes-in-same-file
  message: Detected multiple handler classes - refactoring created dedicated handler
    classes for different features
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'class $H1 extends Disposable { ... }

      '
  - pattern: 'class $H2 extends Disposable { ... }

      '
  - metavariable-pattern:
      metavariable: $H1
      pattern-regex: (CodeAction|InlineChat|InlineCompletion|Rename)Handler
  - metavariable-pattern:
      metavariable: $H2
      pattern-regex: (CodeAction|InlineChat|InlineCompletion|Rename)Handler
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-handler-module-export-file
  message: Detected handler file in contrib directory - refactoring organized handlers
    in dedicated modules
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/contrib/*/*.handler.ts'
- id: detect-handler-file-in-feature-directory
  message: Detected handler in feature-specific directory - refactoring organized
    handlers by feature
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/code-action/**/*.ts'
    - '*/inline-completions/**/*handler*.ts'
    - '*/rename/**/*handler*.ts'
- id: detect-rename-handler-success-flag
  message: Detected success tracking in RenameHandler - refactoring moved result tracking
    to rename handler
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-inside: 'class RenameHandler extends $BASE { ... }

      '
  - pattern: 'success: $BOOL

      '
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-handler-index-export-in-contrib
  message: Detected index.ts in contrib subdirectory - refactoring added proper module
    exports for feature handlers
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/contrib/*/index.ts'
- id: detect-inline-chat-handler-with-visible-diff
  message: Detected aiDiffWidget manipulation in InlineChatHandler - refactoring moved
    diff widget to inline chat handler
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-inside: 'class InlineChatHandler extends $BASE { ... }

      '
  - pattern: "$METHOD(...) {\n  ...\n  this.aiDiffWidget.$FUNC(...)\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-inline-chat-handler-need-show-flag
  message: Detected show flag in InlineChatHandler - refactoring moved visibility
    state to inline chat handler
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-inside: 'class InlineChatHandler extends $BASE { ... }

      '
  - pattern: 'let $NEED_SHOW = false

      '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-code-action-handler-dispose-on-change
  message: Detected conditional disposal in CodeActionHandler - refactoring moved
    lifecycle management to code action handler
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-inside: 'class CodeActionHandler extends $BASE { ... }

      '
  - pattern: "if ($CODE_ACTION_DISPOSE) {\n  $CODE_ACTION_DISPOSE.dispose()\n  ...\n\
      }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
