- id: detect-inline-chat-handler-inline-chat-status
  message: Detected inline chat status enum in InlineChatHandler - refactoring moved
    status management to handler
  severity: INFO
  languages:
  - typescript
  pattern-regex: EInlineChatStatus
  metadata:
    category: basic
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/inline-chat/*handler*.ts'
- id: detect-inline-chat-handler-chat-response-handling
  message: Detected chat response handling in InlineChatHandler - refactoring moved
    response processing to handler
