  - typescript
  pattern-regex: (ChatResponse|ReplyResponse|CancelResponse|ErrorResponse)
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/inline-chat/*handler*.ts'
- id: detect-contrib-inline-completions-directory
  message: Detected inline completions contrib directory - refactoring organized completion
    feature into dedicated module
