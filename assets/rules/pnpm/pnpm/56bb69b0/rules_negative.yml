    context)
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: '$FUNC(..., pref, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-pref-parameter-name
  message: Parameter 'pref' should likely be renamed to 'bareSpecifier' (verify context)
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'function $FUNC(..., pref, ...) { ... }

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-pref-parameter-with-type
  message: Parameter 'pref' with type should be renamed to 'bareSpecifier'
  severity: WARNING
