    or 'parseBareSpecifier.js'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/parsePref.ts'
    - '**/parsePref.js'
- id: detect-pref-from-wantedDependency
  message: Both 'parsePref' and '.pref' should be updated to 'parseBareSpecifier'
    and '.bareSpecifier'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'parsePref($DEP.pref, ...)

      '
  - metavariable-regex:
      metavariable: $DEP
      regex: .*[Dd]ependency.*
