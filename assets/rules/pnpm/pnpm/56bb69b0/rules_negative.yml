rules:
- id: detect-pref-object-key
  message: Object property 'pref' should likely be 'bareSpecifier' (verify context)
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '{ pref: $VAL }

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 228
- id: detect-pref-colon-type
  message: Property 'pref' with type annotation should be renamed to 'bareSpecifier'
  severity: WARNING
  languages:
  - typescript
  pattern: 'pref: $TYPE

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 223
- id: detect-wantedDependency-pref-access
  message: Property access '.pref' should likely be updated to '.bareSpecifier' (verify
    context)
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $OBJ.pref
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 88
- id: detect-pref-in-spec-object
  message: Property access '.pref' on spec object should be updated to '.bareSpecifier'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $SPEC.pref
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 88
- id: detect-pref-in-wantedDependency-object
