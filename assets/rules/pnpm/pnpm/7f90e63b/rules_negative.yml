  severity: WARNING
  languages:
  - typescript
  pattern: "export class UnsupportedEngineError extends Error {\n  public code: 'ERR_PNPM_UNSUPPORTED_ENGINE'\
    \ = 'ERR_PNPM_UNSUPPORTED_ENGINE'\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
