  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '$ERR[''code''] = ''ERR_PNPM_DIRECTORY_HAS_NO_PACKAGE_JSON''

        '
    - pattern: '$ERR.code = ''ERR_PNPM_DIRECTORY_HAS_NO_PACKAGE_JSON''

        '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/local-resolver/*'
- id: error-type-file-in-supi-package
  message: Exported PnpmError class in supi/errorTypes.ts. Should import from centralized
    @pnpm/error
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export\s+class\s+PnpmError\s+extends\s+Error
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/supi/src/errorTypes.ts'
- id: package-store-pnpm-error-code-type
