  severity: WARNING
  languages:
  - typescript
  pattern: "export class UnsupportedPlatformError extends Error {\n  public code:\
    \ 'ERR_PNPM_UNSUPPORTED_PLATFORM' = 'ERR_PNPM_UNSUPPORTED_PLATFORM'\n  ...\n}\n"
  metadata:
    category: api
