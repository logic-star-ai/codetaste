rules:
- id: tslint-disable-with-err-pnpm-code
  message: tslint:disable comment with ERR_PNPM_* error code. Should use PnpmError
    from @pnpm/error
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: err\['code'\]\s*=\s*'ERR_PNPM_[A-Z_]+'\s*//\s*tslint:disable
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: manual-error-with-err-pnpm-and-tslint
  message: Manual ERR_PNPM_* assignment with tslint disable comment. Should use PnpmError
    from @pnpm/error
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: err\['code'\]\s*=\s*'ERR_PNPM_[A-Z_]+'.{0,50}tslint
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: err-pnpm-code-in-string-literal
  message: ERR_PNPM_* string literal in errorTypes file. Should use centralized @pnpm/error
    package
  severity: WARNING
  languages:
  - typescript
  pattern-regex: '''ERR_PNPM_[A-Z_]+'''
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - '*/supi/src/errorTypes.ts'
    - '*/pnpm/src/errorTypes.ts'
    - '*/package-store/src/errorTypes/*.ts'
- id: new-pnpm-error-without-import
  message: Using new PnpmError() without importing from @pnpm/error package
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'new PnpmError($CODE, $MSG)

      '
  - pattern-not-inside: 'import PnpmError from ''@pnpm/error''

      ...

      '
  - pattern-not-inside: 'import { PnpmError } from ''@pnpm/error''

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: import-pnpm-error-from-relative-path
  message: Importing PnpmError from relative path. Should import from centralized
    @pnpm/error package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import.*PnpmError.*from\s+['"]\.
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '*/supi/src/**/*.ts'
    - '*/pnpm/src/**/*.ts'
    - '*/lockfile-file/src/**/*.ts'
    - '*/tarball-fetcher/src/**/*.ts'
    - '*/package-store/src/**/*.ts'
- id: pnpm-error-code-string-union-literal
  message: String union type with multiple ERR_PNPM_* codes. Should use centralized
    @pnpm/error package
  severity: WARNING
  languages:
  - typescript
  pattern-regex: '''ERR_PNPM_[A-Z_]+''[\s\n]*\|[\s\n]*''ERR_PNPM'
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: pnpm-error-constructor-with-code-message
  message: Local PnpmError-like class with (code, message) constructor. Should extend
    PnpmError from @pnpm/error
  severity: WARNING
  languages:
  - typescript
  pattern: "class $NAME extends Error {\n  ...\n  constructor (code: $TYPE, message:\
    \ string) {\n    super(message)\n    this.code = code\n  }\n  ...\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: pnpm-package-import-local-error-type
  message: Importing from local errorTypes. Should import from centralized @pnpm/error
    package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import.*errorTypes
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*/pnpm/src/**/*.ts'
    - '*/supi/src/**/*.ts'
- id: pnpm-error-type-union-definition
  message: PnpmErrorCode union type with multiple ERR_PNPM_* codes. Should use centralized
    @pnpm/error package
  severity: WARNING
  languages:
  - typescript
  pattern-regex: PnpmErrorCode.*=.*'ERR_PNPM_[A-Z_]+'[\s\|]*'ERR_PNPM
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: error-code-type-annotation-err-pnpm
  message: Type annotation with hardcoded ERR_PNPM_* code. Should extend PnpmError
    from @pnpm/error
  severity: WARNING
  languages:
  - typescript
  pattern-regex: code:\s*'ERR_PNPM_[A-Z_]+'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: error-file-with-pnpm-in-name
  message: PnpmError.ts file found. Should use centralized @pnpm/error package instead
    of local definitions
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/PnpmError.ts'
- id: exported-pnpm-error-class
  message: Exported PnpmError class found. Should use centralized @pnpm/error package
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "export class PnpmError extends Error {\n  ...\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: err-pnpm-lockfile-missing-dependency
  message: Manual ERR_PNPM_LOCKFILE_MISSING_DEPENDENCY assignment in filter-lockfile.
    Should use PnpmError from @pnpm/error
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'err[''code''] = ''ERR_PNPM_LOCKFILE_MISSING_DEPENDENCY''

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/filter-lockfile/*'
- id: package-store-error-types-directory
  message: Local errorTypes directory in package-store. Should use centralized @pnpm/error
    package
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/package-store/src/errorTypes/*.ts'
- id: error-code-property-declaration-err-pnpm
  message: Public code property with hardcoded ERR_PNPM_* value. Should extend PnpmError
    from @pnpm/error
  severity: WARNING
  languages:
  - typescript
  pattern-regex: public\s+code:\s*'ERR_PNPM_[A-Z_]+'\s*=
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: supi-error-types-export-statement
  message: Exporting PnpmError from supi/errorTypes.ts. Should use centralized @pnpm/error
    package
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export.*PnpmError
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/supi/src/errorTypes.ts'
- id: pnpm-error-types-export-statement
  message: Exporting PnpmError from pnpm/errorTypes.ts. Should use centralized @pnpm/error
    package
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export.*PnpmError
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/pnpm/src/errorTypes.ts'
- id: pnpm-error-with-code-property-constructor
  message: Custom error class with code property constructor pattern. Should extend
    PnpmError from @pnpm/error
  severity: WARNING
  languages:
  - typescript
  pattern: "export class $NAME extends Error {\n  public code: $TYPE\n  constructor\
    \ (code: $TYPE, message: string) {\n    ...\n  }\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: filter-lockfile-manual-error-creation
  message: Manual error creation in filter-lockfile. Should use PnpmError from @pnpm/error
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const err = new Error($MSG)

    err[''code''] = ''ERR_PNPM_LOCKFILE_MISSING_DEPENDENCY''

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/filter-lockfile/*'
- id: error-code-assignment-filter-lockfile
  message: Bracket notation error code assignment in filter-lockfile. Should use PnpmError
    from @pnpm/error
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '$ERR[''code''] = $CODE

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/filter-lockfile/src/*.ts'
- id: error-types-ts-file-existence
  message: errorTypes.ts file exists. Should use centralized @pnpm/error package instead
