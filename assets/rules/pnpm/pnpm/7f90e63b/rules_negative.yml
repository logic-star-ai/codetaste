    package
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export\s+type\s+PnpmErrorCode\s*=\s*'ERR_PNPM_
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/package-store/src/errorTypes/PnpmError.ts'
- id: importing-local-pnpm-error-supi
