rules:
- id: pnpm-error-import-default-from-centralized-package
  message: Detected default import of PnpmError from centralized @pnpm/error package
  severity: INFO
  languages:
  - typescript
  pattern: 'import PnpmError from ''@pnpm/error''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
- id: pnpm-error-default-import-detected
  message: Detected default import of PnpmError from centralized @pnpm/error package
  severity: INFO
  languages:
  - typescript
  pattern: 'import PnpmError from ''@pnpm/error''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
