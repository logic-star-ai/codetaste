  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'import PnpmError from ''@pnpm/error''

      ...

      throw new PnpmError($CODE, $MSG)

      '
  metadata:
    category: api
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: pnpm-error-package-dependency
