  - typescript
  pattern: 'import type PnpmError from ''@pnpm/error''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
- id: pnpm-error-import-statement-at-top
  message: PnpmError imported at module level
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: import PnpmError from '@pnpm/error'
  - pattern-not-inside: '...

      function $F() { ... }

      ...

      import PnpmError from ''@pnpm/error''

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
