- id: array-of-objects-with-rootdir-string
  message: Array type should use branded type 'ProjectRootDir' instead of plain 'string'
    for rootDir field
  severity: WARNING
  languages:
  - typescript
  pattern-regex: Array<\{[^}]*\brootDir\s*:\s*string\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
