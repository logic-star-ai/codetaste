- id: borsh-old-borsh-skip-attribute
  message: 'Old borsh attribute syntax #[borsh_skip] detected. Replace with #[borsh(skip)]
    in borsh v1.0.0'
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[borsh_skip\]'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: borsh-old-borsh-init-attribute
