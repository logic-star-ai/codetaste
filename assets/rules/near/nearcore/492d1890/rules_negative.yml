rules:
- id: borsh-try-to-vec-general-regex
  message: Old borsh .try_to_vec() method detected. Replace with borsh::to_vec(&obj)
    in v1.0.0
  severity: WARNING
  languages:
  - rust
  pattern-regex: \.try_to_vec\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 228
- id: borsh-try-to-vec-method-call
  message: Old borsh serialization method .try_to_vec() detected. Replace with borsh::to_vec(&$OBJ)
    in borsh v1.0.0
  severity: WARNING
  languages:
  - rust
  pattern: $OBJ.try_to_vec()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 207
- id: borsh-try-to-vec-parenthesized
  message: Old borsh parenthesized .try_to_vec() detected. Replace with borsh::to_vec(&($OBJ))
    in v1.0.0
  severity: WARNING
  languages:
  - rust
  pattern: ($OBJ).try_to_vec()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 207
- id: borsh-try-to-vec-with-unwrap
  message: Old borsh serialization method .try_to_vec().unwrap() detected. Replace
    with borsh::to_vec(&$OBJ).unwrap() in borsh v1.0.0
  severity: WARNING
  languages:
  - rust
  pattern: $OBJ.try_to_vec().unwrap()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 114
- id: borsh-try-to-vec-parenthesized-unwrap
  message: Old borsh parenthesized .try_to_vec().unwrap() detected. Replace with borsh::to_vec(&($OBJ)).unwrap()
    in v1.0.0
  severity: WARNING
  languages:
  - rust
  pattern: ($OBJ).try_to_vec().unwrap()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 114
- id: borsh-try-to-vec-with-expect
