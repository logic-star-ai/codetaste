rules:
- id: borsh-v1-qualified-function-call
  message: Detected qualified borsh function call (v1.0.0 API)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: borsh::to_vec(...)
    - pattern: borsh::to_writer(...)
    - pattern: borsh::object_length(...)
  - pattern-not: borsh::to_vec
  - pattern-not: borsh::to_writer
  - pattern-not: borsh::object_length
  metadata:
    category: api
    nr_refactored_patterns: 209
    nr_legacy_patterns: 0
- id: borsh-v1-to-vec-function-call
  message: Detected borsh::to_vec() function call (v1.0.0 API)
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: borsh::to_vec($X)
  - pattern-not: borsh::to_vec
  metadata:
    category: api
    nr_refactored_patterns: 192
    nr_legacy_patterns: 0
- id: borsh-v1-reference-to-vec
