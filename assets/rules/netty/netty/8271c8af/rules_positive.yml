- id: dns-section-enum-values
  message: Detected DnsSection enum value usage
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: DnsSection.$VALUE
  - metavariable-regex:
      metavariable: $VALUE
      regex: (?i)^(QUESTION|ANSWER|AUTHORITY|ADDITIONAL)$
  metadata:
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/codec-dns/**/*.java'
    - '**/codec/dns/**/*.java'
    - '**/resolver-dns/**/*.java'
  options:
    symbolic_propagation: true
