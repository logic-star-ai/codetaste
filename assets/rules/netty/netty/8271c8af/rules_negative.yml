    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dns-old-instanceof-dnsentry
  message: DnsEntry has been removed. Check for DnsQuestion or DnsRecord instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR instanceof DnsEntry
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
