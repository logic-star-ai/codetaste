rules:
- id: dns-old-dnstype-usage
  message: DnsType has been renamed to DnsRecordType. Replace with DnsRecordType.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: DnsType.$FIELD
    - pattern: DnsType.valueOf(...)
    - pattern: new DnsType(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 69
- id: dns-old-dnstype-variable-declaration
  message: DnsType has been renamed to DnsRecordType. Update type declaration.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: DnsType $VAR = ...;
    - pattern: $TYPE $METHOD(..., DnsType $PARAM, ...)
    - pattern: DnsType $METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 54
- id: dns-old-static-dnstype-field
  message: Static field uses DnsType. Update to DnsRecordType.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'public static final DnsType $FIELD = ...;

        '
    - pattern: 'private static final DnsType $FIELD = ...;

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: dns-old-dnsheader-usage
  message: DnsHeader has been merged into DnsMessage. Access header fields directly
    on DnsMessage.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $MSG.header()
    - pattern: DnsHeader $VAR = ...;
    - pattern: $TYPE $METHOD(..., DnsHeader $PARAM, ...)
    - pattern: DnsHeader $METHOD(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: dns-old-dnsclass-usage
  message: DnsClass enum has been removed. Use int for class field to support EDNS.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: DnsClass.$FIELD
    - pattern: DnsClass.valueOf(...)
    - pattern: new DnsClass(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: dns-old-dnsresource-type-declaration
  message: DnsResource type has been renamed to DnsRecord. Update type declaration.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: DnsResource $VAR = ...;
    - pattern: List<DnsResource> $VAR = ...;
    - pattern: $TYPE $METHOD(..., DnsResource $PARAM, ...)
    - pattern: DnsResource $METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: dns-old-dnstype-static-field-access
  message: DnsType constants should be DnsRecordType constants. Update class reference.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: DnsType.A
    - pattern: DnsType.AAAA
    - pattern: DnsType.CNAME
    - pattern: DnsType.MX
    - pattern: DnsType.NS
    - pattern: DnsType.PTR
    - pattern: DnsType.SOA
    - pattern: DnsType.TXT
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: dns-old-dnsclass-variable-declaration
  message: DnsClass enum has been removed. Use int for class field to support EDNS.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: DnsClass $VAR = ...;
    - pattern: $TYPE $METHOD(..., DnsClass $PARAM, ...)
    - pattern: DnsClass $METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: dns-old-header-method-call-chain
  message: DnsHeader has been merged into DnsMessage. Call methods directly on the
    message object.
  severity: WARNING
  languages:
  - java
  pattern: $MSG.header().$METHOD(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: dns-old-authority-resources-method
  message: authorityResources() and additionalResources() have been replaced with
    section-based API. Use recordAt() or similar.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $MSG.authorityResources()
    - pattern: $MSG.additionalResources()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: dns-old-add-question-method
  message: Verify addQuestion() is used with updated DnsQuestion interface, not old
    concrete class.
  severity: WARNING
  languages:
  - java
  pattern: $MSG.addQuestion($QUESTION)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: dns-old-method-with-dnsresource-param
  message: Method parameter uses DnsResource which has been renamed. Change to DnsRecord.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $RET $METHOD($T1 $A1, DnsResource $PARAM) { ... }
    - pattern: $RET $METHOD(DnsResource $PARAM, $T2 $A2) { ... }
    - pattern: $RET $METHOD($T1 $A1, DnsResource $PARAM, $T2 $A2) { ... }
    - pattern: $RET $METHOD(DnsResource $PARAM) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: dns-old-method-returning-dnsheader
  message: Method returns DnsHeader which has been merged into DnsMessage. Remove
    this method.
  severity: WARNING
  languages:
  - java
  pattern: DnsHeader $METHOD(...) { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: dns-old-method-returning-dnsresource
  message: Method returns DnsResource which has been renamed. Change return type to
    DnsRecord.
  severity: WARNING
  languages:
  - java
  pattern: DnsResource $METHOD(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: dns-old-dnsresource-for-loop
  message: Enhanced for loop uses DnsResource. Update to DnsRecord.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'for (DnsResource $VAR : $COLLECTION) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: dns-old-static-dnsclass-field
  message: Static field uses DnsClass. Update to int constant.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'public static final DnsClass $FIELD = ...;

        '
    - pattern: 'private static final DnsClass $FIELD = ...;

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: dns-old-method-returning-dnsclass
  message: Method returns DnsClass which has been removed. Change return type to int.
  severity: WARNING
  languages:
  - java
  pattern: DnsClass $METHOD(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: dns-old-dnsclass-valueof-int
  message: DnsClass.valueOf() has been removed. Use int directly for class field.
  severity: WARNING
  languages:
  - java
  pattern: DnsClass.valueOf($INT)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: dns-old-dnstype-for-loop
  message: Enhanced for loop uses DnsType. Update to DnsRecordType.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'for (DnsType $VAR : $COLLECTION) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: dns-old-dnsheader-method-reference
  message: Accessing header fields through header() method. Call methods directly
    on DnsMessage.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $MSG.header().id()
    - pattern: $MSG.header().setId(...)
    - pattern: $MSG.header().type()
    - pattern: $MSG.header().setType(...)
    - pattern: $MSG.header().isRecursionDesired()
    - pattern: $MSG.header().setRecursionDesired(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: dns-old-dnsresource-class-usage
  message: DnsResource class has been renamed to DnsRecord. Replace with DnsRecord
    or appropriate subclass.
  severity: WARNING
  languages:
  - java
  pattern: new DnsResource(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dns-old-dnsresource-import
  message: DnsResource has been renamed to DnsRecord. Update import to use DnsRecord.
  severity: WARNING
  languages:
  - java
  pattern: import io.netty.handler.codec.dns.DnsResource;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dns-old-dnsresponsedecoder-usage
  message: DnsResponseDecoder has been renamed to DatagramDnsResponseDecoder. Update
    class name.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: new DnsResponseDecoder()
    - pattern: DnsResponseDecoder $VAR = ...;
    - pattern: $TYPE $METHOD(..., DnsResponseDecoder $PARAM, ...)
    - pattern: DnsResponseDecoder $METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dns-old-add-additional-resource
  message: addAdditionalResource() has been replaced. Use addRecord() with DnsSection.ADDITIONAL.
  severity: WARNING
  languages:
  - java
  pattern: $MSG.addAdditionalResource(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dns-old-dnsresource-constructor-with-bytebuf
  message: DnsResource constructor with ByteBuf has changed. Use DnsRawRecord or specific
    record types.
  severity: WARNING
  languages:
  - java
  pattern: 'new DnsResource($NAME, $TYPE, $CLASS, $TTL, $CONTENT)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dns-old-method-returning-dnstype
  message: Method returns DnsType which has been renamed. Change return type to DnsRecordType.
  severity: WARNING
  languages:
  - java
  pattern: DnsType $METHOD(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dns-old-dnstype-valueof
  message: DnsType.valueOf() has been renamed. Use DnsRecordType.valueOf().
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: DnsType.valueOf($ARG)
    - pattern: DnsType.valueOf($INT, $NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dns-old-concrete-dnsquestion-instantiation
  message: DnsQuestion is now an interface. Use DefaultDnsQuestion.
  severity: WARNING
  languages:
  - java
  pattern: new DnsQuestion($NAME, $TYPE, $CLASS)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dns-old-dnsclass-for-loop
  message: Enhanced for loop uses DnsClass. Update to int or Integer.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'for (DnsClass $VAR : $COLLECTION) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dns-old-dnstype-import
  message: DnsType has been renamed to DnsRecordType. Update import.
  severity: WARNING
  languages:
  - java
  pattern: import io.netty.handler.codec.dns.DnsType;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-dnsclass-enum-import
  message: DnsClass enum has been removed. Use int for class field to support EDNS.
  severity: WARNING
  languages:
  - java
  pattern: import io.netty.handler.codec.dns.DnsClass;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-dnsqueryencoder-usage
  message: DnsQueryEncoder has been renamed to DatagramDnsQueryEncoder. Update class
    name.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: new DnsQueryEncoder()
    - pattern: DnsQueryEncoder $VAR = ...;
    - pattern: $TYPE $METHOD(..., DnsQueryEncoder $PARAM, ...)
    - pattern: DnsQueryEncoder $METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-add-authority-resource
  message: addAuthorityResource() has been replaced. Use addRecord() with DnsSection.AUTHORITY.
  severity: WARNING
  languages:
  - java
  pattern: $MSG.addAuthorityResource(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-newheader-method
  message: newHeader() abstract method has been removed. DnsMessage is now an interface
    with direct header field access.
  severity: WARNING
  languages:
  - java
  pattern: '$TYPE newHeader($ID) { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-dnsresource-in-collection
  message: DnsResource has been renamed to DnsRecord. Update collection type parameter.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: List<DnsResource> $METHOD(...)
    - pattern: Collection<DnsResource> $VAR = ...;
    - pattern: Iterable<DnsResource> $VAR = ...;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-add-answer-method
  message: addAnswer() may need updating to work with DnsRecord instead of DnsResource.
    Verify record type.
  severity: WARNING
  languages:
  - java
  pattern: $MSG.addAnswer($RESOURCE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-dnsclass-static-field-access
  message: DnsClass enum constants have been removed. Use int constants instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: DnsClass.IN
    - pattern: DnsClass.CSNET
    - pattern: DnsClass.CHAOS
    - pattern: DnsClass.HESIOD
    - pattern: DnsClass.NONE
    - pattern: DnsClass.ANY
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-javadoc-dnsresource
  message: Javadoc references DnsResource. Update to DnsRecord.
  severity: WARNING
  languages:
  - java
  pattern-regex: .*@(see|link|code)\s+(DnsResource).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-javadoc-dnsheader
  message: Javadoc references DnsHeader. This has been merged into DnsMessage.
  severity: WARNING
  languages:
  - java
  pattern-regex: .*@(see|link|code)\s+(DnsHeader).*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-comment-dnsresource
  message: Comment mentions DnsResource. Consider updating to DnsRecord.
  severity: WARNING
  languages:
  - java
  pattern-regex: .*\*.*DnsResource.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-list-with-dnsresource
  message: Method returning List<DnsResource> should return List<DnsRecord>.
  severity: WARNING
  languages:
  - java
  pattern: List<DnsResource> $METHOD(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-dnsresource-in-annotation
  message: Annotation references DnsResource. Update to DnsRecord.
  severity: WARNING
  languages:
  - java
  pattern-regex: '@.*DnsResource.*'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-linked-list-dnsresource
  message: LinkedList of DnsResource. Update to LinkedList<DnsRecord>.
  severity: WARNING
  languages:
  - java
  pattern: new LinkedList<DnsResource>()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dns-old-dnsresponsedecoder-import
  message: DnsResponseDecoder has been renamed to DatagramDnsResponseDecoder for UDP-specific
    functionality.
  severity: WARNING
  languages:
  - java
  pattern: import io.netty.handler.codec.dns.DnsResponseDecoder;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dns-old-concrete-dnsmessage-class
  message: DnsMessage is now an interface. Extend AbstractDnsMessage or implement
    the interface.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: class $CLASS extends DnsMessage { ... }
    - pattern: abstract class $CLASS extends DnsMessage { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dns-old-cast-to-dnstype
  message: DnsType has been renamed to DnsRecordType. Update cast.
  severity: WARNING
  languages:
  - java
  pattern: (DnsType) $VAR
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dns-old-cast-to-dnsclass
  message: DnsClass enum has been removed. Use int instead.
  severity: WARNING
  languages:
  - java
  pattern: (DnsClass) $VAR
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dns-old-dnsclass-field-declaration
  message: DnsClass enum has been removed. Use int for class field.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'private DnsClass $FIELD;

        '
    - pattern: 'protected DnsClass $FIELD;

        '
    - pattern: 'public DnsClass $FIELD;

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dns-old-dnsentry-usage
  message: DnsEntry class has been removed. Use DnsQuestion or DnsRecord interfaces
    directly.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: new DnsEntry(...)
    - pattern: DnsEntry $VAR = ...;
    - pattern: $TYPE $METHOD(..., DnsEntry $PARAM, ...)
    - pattern: DnsEntry $METHOD(...)
    - pattern: extends DnsEntry
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dns-old-dnsqueryencoder-import
  message: DnsQueryEncoder has been renamed to DatagramDnsQueryEncoder for UDP-specific
