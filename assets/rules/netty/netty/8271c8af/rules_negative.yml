  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'private DnsResource $FIELD;

        '
    - pattern: 'protected DnsResource $FIELD;

        '
    - pattern: 'public DnsResource $FIELD;

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dns-old-method-with-dnsclass-param
  message: Method parameter uses DnsClass which has been removed. Change to int.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $RET $METHOD($T1 $A1, DnsClass $PARAM) { ... }
    - pattern: $RET $METHOD(DnsClass $PARAM, $T2 $A2) { ... }
    - pattern: $RET $METHOD($T1 $A1, DnsClass $PARAM, $T2 $A2) { ... }
