  message: DnsType has been renamed to DnsRecordType. Update field type.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'private DnsType $FIELD;

        '
    - pattern: 'protected DnsType $FIELD;

        '
    - pattern: 'public DnsType $FIELD;

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
