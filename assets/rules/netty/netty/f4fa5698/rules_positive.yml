  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: boolean isTerminated();
    - pattern: public boolean isTerminated();
  - pattern-inside: "interface $IFACE {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $IFACE
      regex: (?i).*executor.*group$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-awaittermination-method
  message: Detected awaitTermination() method in EventExecutorGroup - new group interface
    method
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: boolean awaitTermination($TIMEOUT, $UNIT);
    - pattern: public boolean awaitTermination($TIMEOUT, $UNIT);
  - pattern-inside: "interface $IFACE {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $IFACE
      regex: (?i).*executor.*group$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-next-method-declaration
  message: Detected next() method in EventExecutorGroup returning EventExecutor -
    new API
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $ETYPE next();
    - pattern: public $ETYPE next();
  - metavariable-regex:
      metavariable: $ETYPE
      regex: (?i).*executor$
  - pattern-inside: "interface $IFACE {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $IFACE
      regex: (?i).*group$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-nioeventloop-without-child
  message: Detected NioEventLoop class extending single-threaded parent - removed
    Child suffix
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "class NioEventLoop extends $PARENT {\n  ...\n}\n"
    - pattern: "public class NioEventLoop extends $PARENT {\n  ...\n}\n"
  - metavariable-regex:
