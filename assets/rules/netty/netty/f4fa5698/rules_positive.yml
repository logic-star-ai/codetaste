- id: detect-defaulteventexecutor-without-child
  message: Detected DefaultEventExecutor class without Child suffix - refactored naming
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "class DefaultEventExecutor extends $PARENT {\n  ...\n}\n"
    - pattern: "public class DefaultEventExecutor extends $PARENT {\n  ...\n}\n"
  - metavariable-regex:
