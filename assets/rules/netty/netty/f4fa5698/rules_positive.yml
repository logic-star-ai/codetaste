rules:
- id: detect-group-instantiation
  message: Detected instantiation of new EventLoopGroup class - renamed classes
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: new $CLASS(...)
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(nio|aio|oio|local|default).*(executor|loop).*group$
  metadata:
    nr_refactored_patterns: 67
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-import
  message: Detected import of EventExecutorGroup or EventLoopGroup - new interfaces
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: import $PKG.$CLASS;
    - pattern: import static $PKG.$CLASS;
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(executor|loop).*group$
  - pattern-not: import $P.MultithreadEventExecutor;
  - pattern-not: import $P.MultithreadEventLoop;
  metadata:
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-bootstrap-group-call
  message: Detected Bootstrap.group() method call - refactored API
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $BOOTSTRAP.group(...)
  - metavariable-regex:
      metavariable: $BOOTSTRAP
      regex: (?i).*bootstrap.*
  - pattern-not: $X.eventLoop(...)
  metadata:
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-method-call
  message: Detected method call on group variable - using new group API
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $GROUP.$METHOD(...)
  - metavariable-regex:
      metavariable: $GROUP
      regex: (?i).*group.*
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(next|shutdown|isShutdown|isTerminated|awaitTermination|register)$
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-iteration-pattern
  message: Detected iteration over children in group - new pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "for ($ETYPE $VAR : children) {\n  ...\n}\n"
    - pattern: "for ($ETYPE $VAR : $FIELD) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $ETYPE
      regex: (?i).*(executor|loop)$
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*group$
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-variable-declaration
  message: Detected variable declared with EventExecutorGroup/EventLoopGroup type
    - new API
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $GTYPE $VAR = $INIT;
  - metavariable-regex:
      metavariable: $GTYPE
      regex: (?i).*(executor|loop).*group$
  - pattern-not: EventExecutor $X = $Y;
  - pattern-not: EventLoop $X = $Y;
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-pipeline-add-with-group-parameter
  message: Detected ChannelPipeline.add*() with EventExecutorGroup parameter - refactored
    from EventExecutor
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: '$PIPELINE $METHOD($GTYPE $GROUP, ...);

        '
    - pattern: 'public $PIPELINE $METHOD($GTYPE $GROUP, ...);

        '
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^add(First|Last|Before|After)$
  - metavariable-regex:
      metavariable: $GTYPE
      regex: (?i).*group$
  - pattern-inside: "interface $IFACE {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $IFACE
      regex: (?i).*pipeline$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-null-check
  message: Detected null check for group variable - new API pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: if ($GROUP == null) { ... }
    - pattern: if ($GROUP != null) { ... }
    - pattern: if (null == $GROUP) { ... }
    - pattern: if (null != $GROUP) { ... }
  - metavariable-regex:
      metavariable: $GROUP
      regex: (?i).*group.*
  - pattern-not: if ($X == null) { ... }
  - pattern-not: if (eventLoop == null) { ... }
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-override-next
  message: Detected @Override next() method - implementing new EventExecutorGroup
    interface
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "@Override\npublic $ETYPE next() {\n  ...\n}\n"
    - pattern: "@Override\n$ETYPE next() {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $ETYPE
      regex: (?i).*(executor|loop)$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-multithread-group-extends
  message: Detected class extending MultithreadEventExecutorGroup/MultithreadEventLoopGroup
    - refactored hierarchy
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "class $CLASS extends $PARENT {\n  ...\n}\n"
    - pattern: "public class $CLASS extends $PARENT {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PARENT
      regex: (?i).*multithread.*(executor|loop).*group$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-package-declaration
  message: Detected package declaration in group-related file - new files in io.netty.channel
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: package io.netty.channel;
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*EventExecutorGroup.java'
    - '**/*EventLoopGroup.java'
  options:
    symbolic_propagation: true
- id: detect-group-constructor-parameter
  message: Detected constructor with EventExecutorGroup/EventLoopGroup parameter -
    new API
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "$CLASS($GTYPE $PARAM) {\n  ...\n}\n"
    - pattern: "public $CLASS($GTYPE $PARAM) {\n  ...\n}\n"
    - pattern: "protected $CLASS($GTYPE $PARAM) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $GTYPE
      regex: (?i).*(executor|loop).*group$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-synchronized-block
  message: Detected synchronized block with group - new pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "synchronized ($LOCK) {\n  ...\n  $GROUP.$METHOD(...);\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $GROUP
      regex: (?i).*group.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-override-register
  message: Detected @Override register() method in EventLoopGroup implementation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "@Override\npublic $FUTURE register($CHANNEL $C) {\n  ...\n}\n"
    - pattern: "@Override\npublic $FUTURE register($CHANNEL $C, $FUTURE2 $F) {\n \
        \ ...\n}\n"
  - metavariable-regex:
      metavariable: $FUTURE
      regex: (?i).*future$
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*loop.*group$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-bootstrap-group-validation
  message: Detected Bootstrap validating group is not null - new pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "if ($FIELD == null) {\n  throw new $EX(...);\n}\n"
  - metavariable-regex:
      metavariable: $FIELD
      regex: (?i).*group$
  - pattern-inside: "class $BOOTSTRAP {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $BOOTSTRAP
      regex: (?i).*bootstrap$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/channel/group/**'
  options:
    symbolic_propagation: true
- id: detect-group-field-in-bootstrap
  message: Detected group field in Bootstrap - refactored from eventLoop field
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'private $GTYPE $VAR;

      '
  - metavariable-regex:
      metavariable: $GTYPE
      regex: (?i).*group$
  - pattern-inside: "class $BOOTSTRAP {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $BOOTSTRAP
      regex: (?i).*bootstrap$
  - pattern-not: 'private EventLoop eventLoop;

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-niogroup-class
  message: Detected NioEventLoopGroup class - renamed from NioEventLoop
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "class $CLASS extends $PARENT {\n  ...\n}\n"
    - pattern: "public class $CLASS extends $PARENT {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(nio|aio|oio|local).*group$
  - metavariable-regex:
      metavariable: $PARENT
      regex: (?i).*multithread.*group$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.java'
  options:
    symbolic_propagation: true
- id: detect-group-parent-method-implementation
  message: Detected parent() method implementation returning group - new API
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "public $GTYPE parent() {\n  ...\n  return $VAR;\n}\n"
    - pattern: "$GTYPE parent() {\n  ...\n  return $VAR;\n}\n"
  - metavariable-regex:
      metavariable: $GTYPE
      regex: (?i).*(executor|loop).*group$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-override-shutdown
  message: Detected @Override shutdown() method - implementing EventExecutorGroup
    interface
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "@Override\npublic void shutdown() {\n  ...\n}\n"
    - pattern: "@Override\nvoid shutdown() {\n  ...\n}\n"
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(executor|loop).*group$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-override-isterminated
  message: Detected @Override isTerminated() method in group implementation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "@Override\npublic boolean isTerminated() {\n  ...\n}\n"
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*group$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-override-isshutdown
  message: Detected @Override isShutdown() method in group implementation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "@Override\npublic boolean isShutdown() {\n  ...\n}\n"
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*group$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-override-awaittermination
  message: Detected @Override awaitTermination() method in group implementation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "@Override\npublic boolean awaitTermination($TIME, $UNIT) throws $EX\
      \ {\n  ...\n}\n"
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*group$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-implements-interface
  message: Detected class implementing EventExecutorGroup/EventLoopGroup - new hierarchy
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "class $CLASS implements $IFACE {\n  ...\n}\n"
    - pattern: "public class $CLASS implements $IFACE {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $IFACE
      regex: (?i).*(executor|loop).*group$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-next-implementation-return-self
  message: Detected next() returning this/self in single executor - group of one pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "public $ETYPE next() {\n  ...\n  return this;\n}\n"
    - pattern: "$ETYPE next() {\n  ...\n  return this;\n}\n"
  - metavariable-regex:
      metavariable: $ETYPE
      regex: (?i).*(executor|loop)$
  - pattern-not-inside: "$T nextChild() {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-collection-add
  message: Detected adding group to collection - new pattern
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $COLL.add($GROUP)
    - pattern: $COLL.put($KEY, $GROUP)
  - metavariable-regex:
      metavariable: $GROUP
      regex: (?i).*group.*
  - pattern-not: $X.add(channel)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-eventexecutorgroup-interface
  message: Detected new EventExecutorGroup interface - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "interface $IFACE extends $PARENT {\n  ...\n}\n"
    - pattern: "public interface $IFACE extends $PARENT {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $IFACE
      regex: .*Group$
  - metavariable-regex:
      metavariable: $PARENT
      regex: (?i).*(executor|scheduled).*
  - pattern-not-inside: "interface $X extends EventExecutor {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-bootstrap-group-method
  message: Detected Bootstrap.group() method - refactored from eventLoop()
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "public $TYPE group($GTYPE $PARAM) {\n  ...\n}\n"
    - pattern: "$TYPE group($GTYPE $PARAM) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $GTYPE
      regex: (?i).*group$
  - pattern-inside: "class $BOOTSTRAP {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $BOOTSTRAP
      regex: (?i).*bootstrap$
  - pattern-not: "$T eventLoop($X $Y) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-serverbootstrap-dual-group-method
  message: Detected ServerBootstrap.group(parentGroup, childGroup) - refactored from
    eventLoop(parent, child)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "public $TYPE group($GTYPE1 $PARAM1, $GTYPE2 $PARAM2) {\n  ...\n}\n"
    - pattern: "$TYPE group($GTYPE1 $PARAM1, $GTYPE2 $PARAM2) {\n  ...\n}\n"
  - pattern-inside: "class $BOOTSTRAP {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $BOOTSTRAP
      regex: (?i).*(server|parent).*bootstrap$
  - metavariable-regex:
      metavariable: $GTYPE1
      regex: (?i).*group$
  - pattern-not: "$T eventLoop($X $Y, $Z $W) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-cast
  message: Detected cast to EventExecutorGroup/EventLoopGroup type - new API
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: ($GTYPE) $EXPR
  - metavariable-regex:
      metavariable: $GTYPE
      regex: (?i).*(executor|loop).*group$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-shutdown-method-declaration
  message: Detected shutdown() method in EventExecutorGroup - new group interface
    method
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: void shutdown();
    - pattern: public void shutdown();
  - pattern-inside: "interface $IFACE {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $IFACE
      regex: (?i).*executor.*group$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-isshutdown-method
  message: Detected isShutdown() method in EventExecutorGroup - new group interface
    method
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: boolean isShutdown();
    - pattern: public boolean isShutdown();
  - pattern-inside: "interface $IFACE {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $IFACE
      regex: (?i).*executor.*group$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-group-isterminated-method
  message: Detected isTerminated() method in EventExecutorGroup - new group interface
