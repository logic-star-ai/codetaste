rules:
- id: server-bootstrap-old-eventloop-method
  message: Use 'group(...)' instead of 'eventLoop(...)' in ServerBootstrap after the
    EventLoop/EventExecutor hierarchy refactoring
  severity: WARNING
  languages:
  - java
  pattern: $BOOTSTRAP.eventLoop($PARENT, $CHILD)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: children-array-iteration
  message: This iteration over 'children' array is from old MultithreadEventExecutor
    - refactor to EventExecutorGroup
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "for (EventExecutor $VAR: children) {\n    ...\n}\n"
  - pattern-inside: 'class MultithreadEventExecutor { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: unsafe-nextchild-implementation
  message: Remove 'nextChild()' implementation - use 'next()' in EventExecutorGroup
    interface instead
  severity: WARNING
  languages:
  - java
  pattern: "public EventExecutor nextChild() {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-multithread-event-loop-import
  message: Use 'MultithreadEventLoopGroup' instead of 'MultithreadEventLoop' after
    the EventLoop/EventExecutor hierarchy refactoring
  severity: WARNING
  languages:
  - java
  pattern: import io.netty.channel.MultithreadEventLoop;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-multithread-event-loop-type
  message: Use 'MultithreadEventLoopGroup' instead of 'MultithreadEventLoop' after
    the EventLoop/EventExecutor hierarchy refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'class $CLASS extends MultithreadEventLoop { ... }

      '
  - pattern-not: 'class $CLASS extends MultithreadEventLoopGroup { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: unsafe-field-with-nextchild
  message: Remove 'Unsafe' implementation with 'nextChild()' - replace with direct
    'next()' method after the refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "private final Unsafe unsafe = new Unsafe() {\n    ...\n    public EventExecutor\
      \ nextChild() { ... }\n    ...\n};\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: nio-child-eventloop-class-reference
  message: Use 'NioEventLoop' instead of 'NioChildEventLoop' after removing 'Child'
    suffix in the refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: NioChildEventLoop.class
    - pattern: (NioChildEventLoop) $VAR
    - pattern: instanceof NioChildEventLoop
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: unsafe-anonymous-class-nextchild
  message: Remove Unsafe anonymous class with nextChild() - replace with direct next()
    method
  severity: WARNING
  languages:
  - java
  pattern: "new Unsafe() {\n    @Override\n    public EventExecutor nextChild() {\n\
    \        ...\n    }\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: multithread-loop-package-import
  message: Change import from 'MultithreadEventLoop' to 'MultithreadEventLoopGroup'
  severity: WARNING
  languages:
  - java
  pattern-regex: import\s+io\.netty\.channel\.MultithreadEventLoop\s*;
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: children-array-indexed-access
  message: Direct array access to 'children' is from old MultithreadEventExecutor
    - refactor to EventExecutorGroup
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: children[$INDEX]
  - pattern-inside: 'class MultithreadEventExecutor { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-multithread-event-executor-type
  message: Use 'MultithreadEventExecutorGroup' instead of 'MultithreadEventExecutor'
    after the EventLoop/EventExecutor hierarchy refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'class $CLASS extends MultithreadEventExecutor { ... }

      '
  - pattern-not: 'class $CLASS extends MultithreadEventExecutorGroup { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pipeline-eventexecutor-parameter-type
  message: Use 'EventExecutorGroup' parameter type in ChannelPipeline methods instead
    of 'EventExecutor' after the refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'ChannelPipeline addFirst(EventExecutor $PARAM, ...);

      '
  - pattern-not: 'ChannelPipeline addFirst(EventExecutorGroup $PARAM, ...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pipeline-eventexecutor-parameter-type-addlast
  message: Use 'EventExecutorGroup' parameter type in ChannelPipeline methods instead
    of 'EventExecutor' after the refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'ChannelPipeline addLast(EventExecutor $PARAM, ...);

      '
  - pattern-not: 'ChannelPipeline addLast(EventExecutorGroup $PARAM, ...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: nio-child-loop-cast
  message: Update cast from 'NioChildEventLoop' to 'NioEventLoop'
  severity: WARNING
  languages:
  - java
  pattern: (NioChildEventLoop) $EXPR
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: server-bootstrap-eventloop-fields
  message: Change EventLoop fields to EventLoopGroup type in ServerBootstrap (parentGroup,
    childGroup)
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'private EventLoop parentEventLoop;

        '
    - pattern: 'private EventLoop childEventLoop;

        '
  - pattern-inside: 'class ServerBootstrap { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: eventloop-null-check-in-bootstrap
  message: Update null check from 'eventLoop' to 'group' in Bootstrap after refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "if (eventLoop == null) {\n    ...\n}\n"
  - pattern-inside: 'class Bootstrap { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-nio-child-event-loop-instantiation
  message: Use 'NioEventLoop' instead of 'NioChildEventLoop' after removing 'Child'
    suffix in the refactoring
  severity: WARNING
  languages:
  - java
  pattern: new NioChildEventLoop(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bootstrap-eventloop-method-definition
  message: Rename method 'eventLoop' to 'group' in Bootstrap after the EventLoop/EventExecutor
    hierarchy refactoring
  severity: WARNING
  languages:
  - java
  pattern: 'public Bootstrap eventLoop($ARG) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bootstrap-eventloop-field-declaration
  message: Use 'EventLoopGroup' type instead of 'EventLoop' for Bootstrap fields after
    the refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'private EventLoop $FIELD;

      '
  - pattern-inside: 'class Bootstrap { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: bootstrap-eventloop-parameter
  message: Use 'EventLoopGroup' parameter type and 'group' method name in Bootstrap
    after the refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'public Bootstrap eventLoop(EventLoop $PARAM) { ... }

      '
  - pattern-not: 'public Bootstrap group(EventLoopGroup $PARAM) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: unsafe-nextchild-method-call
  message: Remove usage of 'Unsafe.nextChild()' - use 'next()' method on EventExecutorGroup
    instead after the refactoring
  severity: WARNING
  languages:
  - java
  pattern: $EXECUTOR.unsafe().nextChild()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: unsafe-interface-in-eventexecutor
  message: Remove 'Unsafe' interface from EventExecutor - it should be replaced with
    EventExecutorGroup abstraction
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'interface Unsafe { ... }

      '
  - pattern-inside: 'interface EventExecutor { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: unsafe-method-in-eventexecutor
  message: Remove 'unsafe()' method from EventExecutor interface after the refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'Unsafe unsafe();

      '
  - pattern-inside: 'interface EventExecutor { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: children-array-field
  message: This is the old MultithreadEventExecutor pattern - should be refactored
    to MultithreadEventExecutorGroup
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'private final EventExecutor[] children;

      '
  - pattern-inside: 'abstract class MultithreadEventExecutor { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: multithread-executor-extends-pattern
  message: Change 'MultithreadEventExecutor' to 'MultithreadEventExecutorGroup' after
    the refactoring
  severity: WARNING
  languages:
  - java
  pattern: "public abstract class $CLASS extends MultithreadEventExecutor {\n    ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: oio-child-eventloop-class-reference
  message: Use 'OioEventLoop' instead of 'OioChildEventLoop' after removing 'Child'
    suffix in the refactoring
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: OioChildEventLoop.class
    - pattern: (OioChildEventLoop) $VAR
    - pattern: instanceof OioChildEventLoop
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: nio-eventloop-old-usage
  message: NioEventLoop is now for single instances; multi-threaded groups should
    use NioEventLoopGroup
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'class NioEventLoop extends MultithreadEventLoop { ... }

      '
  - pattern-not: 'class NioEventLoopGroup extends MultithreadEventLoopGroup { ...
      }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: aio-eventloop-old-usage
  message: AioEventLoop is now for single instances; multi-threaded groups should
    use AioEventLoopGroup
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'class AioEventLoop extends MultithreadEventLoop { ... }

      '
  - pattern-not: 'class AioEventLoopGroup extends MultithreadEventLoopGroup { ...
      }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: local-eventloop-old-usage
  message: LocalEventLoop is now for single instances; multi-threaded groups should
    use LocalEventLoopGroup
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'class LocalEventLoop extends MultithreadEventLoop { ... }

      '
  - pattern-not: 'class LocalEventLoopGroup extends MultithreadEventLoopGroup { ...
      }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: default-executor-old-usage
  message: DefaultEventExecutor is now for single instances; multi-threaded groups
    should use DefaultEventExecutorGroup
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'class DefaultEventExecutor extends MultithreadEventExecutor { ... }

      '
  - pattern-not: 'class DefaultEventExecutorGroup extends MultithreadEventExecutorGroup
      { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: nextchild-method-in-unsafe
  message: Remove 'nextChild()' from Unsafe interface - replaced by 'next()' in EventExecutorGroup
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'EventExecutor nextChild();

      '
  - pattern-inside: 'interface Unsafe { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: children-eventexecutor-array
  message: This EventExecutor array pattern is from old MultithreadEventExecutor -
    refactor to EventExecutorGroup
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: EventExecutor[] $VAR
  - pattern-inside: 'class MultithreadEventExecutor { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: nio-child-loop-instanceof
  message: Update instanceof check from 'NioChildEventLoop' to 'NioEventLoop'
  severity: WARNING
  languages:
  - java
  pattern: $VAR instanceof NioChildEventLoop
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: nio-child-loop-newinstance
  message: Use 'new NioEventLoop(...)' instead of 'new NioChildEventLoop(...)' after
    removing 'Child' suffix
  severity: WARNING
  languages:
  - java
  pattern: new NioChildEventLoop($FACTORY, ...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: oio-child-eventloop-return-type
  message: Change return type from 'OioChildEventLoop' to 'OioEventLoop' after removing
    'Child' suffix
  severity: WARNING
  languages:
  - java
  pattern: 'OioChildEventLoop $METHOD(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: nio-eventloop-multithread-extends
  message: Rename 'NioEventLoop' to 'NioEventLoopGroup' when extending MultithreadEventLoop
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public class NioEventLoop extends MultithreadEventLoop {\n    ...\n\
      }\n"
  - pattern-not: "public class NioEventLoopGroup extends MultithreadEventLoopGroup\
      \ {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: aio-eventloop-multithread-extends
  message: Rename 'AioEventLoop' to 'AioEventLoopGroup' when extending MultithreadEventLoop
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public class AioEventLoop extends MultithreadEventLoop {\n    ...\n\
      }\n"
  - pattern-not: "public class AioEventLoopGroup extends MultithreadEventLoopGroup\
      \ {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: local-eventloop-multithread-extends
  message: Rename 'LocalEventLoop' to 'LocalEventLoopGroup' when extending MultithreadEventLoop
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public class LocalEventLoop extends MultithreadEventLoop {\n    ...\n\
      }\n"
  - pattern-not: "public class LocalEventLoopGroup extends MultithreadEventLoopGroup\
      \ {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: default-executor-multithread-extends
  message: Rename 'DefaultEventExecutor' to 'DefaultEventExecutorGroup' when extending
    MultithreadEventExecutor
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public class DefaultEventExecutor extends MultithreadEventExecutor {\n\
      \    ...\n}\n"
  - pattern-not: "public class DefaultEventExecutorGroup extends MultithreadEventExecutorGroup\
      \ {\n    ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: unsafe-field-declaration
  message: Remove 'unsafe' field from MultithreadEventExecutor - refactor to EventExecutorGroup
    pattern
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'private final Unsafe unsafe = ...;

      '
  - pattern-inside: 'class MultithreadEventExecutor { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: eventloop-method-with-eventloop-param
  message: Rename method to 'group' and change parameter type to 'EventLoopGroup'
  severity: WARNING
  languages:
  - java
  pattern: "public Bootstrap eventLoop(EventLoop $PARAM) {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: server-bootstrap-eventloop-two-params
  message: Rename method to 'group' and change parameter types to 'EventLoopGroup'
    (parentGroup, childGroup)
  severity: WARNING
  languages:
  - java
  pattern: "public ServerBootstrap eventLoop(EventLoop $PARENT, EventLoop $CHILD)\
    \ {\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: eventloop-assignment-in-bootstrap
  message: Rename field from 'eventLoop' to 'group' in Bootstrap class
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: 'this.eventLoop = $VALUE;

      '
  - pattern-inside: 'class Bootstrap { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: multithreadeventloop-class-name-file
  message: Rename file and class from 'MultithreadEventLoop' to 'MultithreadEventLoopGroup'
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/MultithreadEventLoop.java'
- id: multithreadeventexecutor-class-name-file
  message: Rename file and class from 'MultithreadEventExecutor' to 'MultithreadEventExecutorGroup'
