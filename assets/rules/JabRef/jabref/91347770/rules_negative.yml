rules:
- id: test-uses-jabrefpreferences-getinstance-refined
  message: Test should not use JabRefPreferences.getInstance(). Use mock(JabRefPreferences.class)
    or mock(PreferencesService.class) instead for test isolation.
  severity: WARNING
  languages:
  - java
  pattern: JabRefPreferences.getInstance()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 67
  paths:
    include:
    - '*/test/**'
    - '*Test.java'
    - '*Tests.java'
    exclude:
    - '**/JabRefPreferencesTest.java'
    - '**/LastFocusedTabPreferencesTest.java'
- id: test-calls-prefs-method-on-instance
  message: Test should not call methods on JabRefPreferences.getInstance(). Mock the
    specific preferences class needed.
  severity: WARNING
  languages:
  - java
  pattern: JabRefPreferences.getInstance().$METHOD(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 57
  paths:
    include:
    - '*/test/**'
    - '*Test.java'
    - '*Tests.java'
    exclude:
    - '**/JabRefPreferencesTest.java'
    - '**/LastFocusedTabPreferencesTest.java'
- id: test-imports-jabrefpreferences-refined
  message: Test should not import JabRefPreferences. Use PreferencesService interface
    or mock preferences classes instead.
  severity: WARNING
  languages:
  - java
  pattern-regex: ^\s*import\s+org\.jabref\.preferences\.JabRefPreferences\s*;
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 52
  paths:
    include:
    - '*/test/**'
    - '*Test.java'
    - '*Tests.java'
    exclude:
    - '**/JabRefPreferencesTest.java'
    - '**/LastFocusedTabPreferencesTest.java'
- id: test-setup-initializes-jabrefpreferences-refined
  message: Test setUp method should not initialize JabRefPreferences.getInstance().
    Use mocks instead.
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-inside: "@Before\npublic void $METHOD(...) {\n  ...\n}\n"
  - pattern: 'JabRefPreferences.getInstance()

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
  paths:
