    nr_legacy_patterns: 0
- id: getproxy-all-contexts
  message: Detected getProxy call on any context object
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: mainContext.getProxy(...)
  - pattern: extHostContext.getProxy(...)
  - pattern: threadService.getProxy(...)
