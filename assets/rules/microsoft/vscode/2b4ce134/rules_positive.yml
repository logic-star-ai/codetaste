rules:
- id: getproxy-spread-operator
  message: Detected getProxy with spread operator
  severity: INFO
  languages:
  - typescript
  pattern: '...$CTX.getProxy($ID)'
  metadata:
    category: api
    nr_refactored_patterns: 889
    nr_legacy_patterns: 0
- id: protocol-getproxy-call-generic
  message: Detected refactored protocol.getProxy() call
  severity: INFO
  languages:
  - typescript
  pattern: $PROTOCOL.getProxy($IDENTIFIER)
  metadata:
    category: api
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: getproxy-with-any-context-parameter
  message: Detected getProxy call with context parameter
  severity: INFO
  languages:
  - typescript
  pattern: $CTX.getProxy($ANY)
  metadata:
    category: api
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: getproxy-identifier-pattern
  message: Detected getProxy call with namespaced identifier
  severity: INFO
  languages:
  - typescript
  pattern: $CTX.getProxy($NAMESPACE.$IDENTIFIER)
  metadata:
    category: api
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: getproxy-semicolon-statement
  message: Detected standalone getProxy statement
  severity: INFO
  languages:
  - typescript
  pattern: $VAR.getProxy($ID);
  metadata:
    category: api
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: getproxy-method-call-pattern
  message: Detected .getProxy( method call pattern
  severity: INFO
  languages:
  - typescript
  pattern-regex: \.getProxy\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/mainThread*.ts'
    - '**/extHost*.ts'
    - '**/rpcProtocol.ts'
    - '**/proxyIdentifier.ts'
- id: getproxy-specific-protocol-call
  message: Detected getProxy call on protocol object
  severity: INFO
  languages:
  - typescript
  pattern: $PROTOCOL.getProxy(...)
  metadata:
    category: api
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/mainThread*.ts'
    - '**/extHost*.ts'
- id: getproxy-assignment-expression
  message: Detected getProxy in parenthesized assignment
  severity: INFO
  languages:
  - typescript
  pattern: ($VAR = $CTX.getProxy($ID))
  metadata:
    category: api
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
