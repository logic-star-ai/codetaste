rules:
- id: detect-import-from-interactive-session-path
  message: Import from old 'interactiveSession' path - should import from 'chat' path
    instead
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import.*from\s+['"].*interactiveSession.*['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 118
  paths:
    include:
    - '*.ts'
    - '*.tsx'
    - '*.js'
    - '*.jsx'
- id: detect-interactive-session-service-id
  message: Service ID references IInteractiveSession*Service - should reference IChat*Service
    instead
  severity: WARNING
  languages:
  - typescript
  pattern-regex: IInteractiveSession\w*Service\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 115
  paths:
    include:
    - '*.ts'
    - '*.tsx'
