  message: Import from 'vs/platform/electron/*' should be changed to 'vs/platform/native/*'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import.*from\s+['"]vs/platform/electron
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 54
- id: detect-ielectronservice-colon-type
  message: Type annotation 'IElectronService' should be changed to 'INativeHostService'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: :\s*IElectronService([^A-Za-z]|$)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 50
- id: detect-electronservice-import
  message: Import of 'ElectronService' should be changed to 'NativeHostService'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s*\{[^}]*ElectronService[^}]*\}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 49
