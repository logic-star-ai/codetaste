rules:
- id: detect-ielectronservice-interface-reference
  message: Reference to 'IElectronService' should be changed to 'INativeHostService'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \bIElectronService\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 170
- id: detect-electronservice-variable-name
  message: Variable name 'electronService' should be renamed to 'nativeHostService'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \belectronService\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 159
- id: detect-electronservice-dot-property-access
  message: Property access 'electronService.' should use 'nativeHostService.'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \belectronService\.
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 100
- id: detect-electronservice-method-call
  message: Method call on 'electronService' should use 'nativeHostService'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \belectronService\.[a-zA-Z]+
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 100
- id: detect-electronservice-property-access-with-this
  message: Property 'this.electronService' should be renamed to 'this.nativeHostService'
  severity: WARNING
  languages:
