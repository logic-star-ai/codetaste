rules:
- id: automation-index-exports
  message: Detected exports in test/automation/src/index.ts - automation package exports
    defined
  severity: INFO
  languages:
  - typescript
  pattern-regex: export\s+.*\s+from
  metadata:
    category: structural
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - test/automation/src/index.ts
- id: smoke-imports-vscode-automation
  message: Detected import from 'vscode-automation' - smoke tests now use automation
    package
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., $X, ... } from 'vscode-automation'
    - pattern: import { $X } from 'vscode-automation'
    - pattern: import * as $X from 'vscode-automation'
  metadata:
    category: dependency
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - test/smoke/src/**/*.ts
