    re-exported from new crates after refactoring.
  severity: WARNING
  languages:
  - rust
  pattern: pub use ruff_python_ast::source_code::$ITEM;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 203
