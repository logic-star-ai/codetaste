rules:
- id: status-constants-still-in-store
  message: Status constants (StatusUnknown, StatusUninitialized, StatusInstalling,
    etc.) should be moved to pkg/limatype, not defined in pkg/store/instance.go
  severity: WARNING
  languages:
  - go
  pattern-regex: const\s+\(\s*StatusUnknown.*Status\s*=\s*""\s*StatusUninitialized.*Status\s*=\s*"Uninitialized"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/store/instance.go
- id: instance-type-still-in-store
  message: Instance type should be moved to pkg/limatype/lima_instance.go, not defined
    in pkg/store/instance.go
  severity: WARNING
  languages:
  - go
  pattern-regex: type\s+Instance\s+struct\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pkg/store/instance.go
- id: status-type-still-in-store
