rules:
- id: limatype-function-parameter
  message: Detected function parameter with limatype type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func $FUNC($PARAM *$PKG.$TYPE, ...) { ... }

        '
    - pattern: 'func $FUNC(..., $PARAM *$PKG.$TYPE, ...) { ... }

        '
    - pattern: 'func $FUNC($PARAM $PKG.$TYPE, ...) { ... }

        '
    - pattern: 'func $FUNC(..., $PARAM $PKG.$TYPE, ...) { ... }

        '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  metadata:
    nr_refactored_patterns: 92
    nr_legacy_patterns: 0
- id: limatype-arch-constants-usage
  message: Detected usage of arch constants from limatype
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$ARCH
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $ARCH
      regex: ^(X8664|AARCH64|ARMV7L|PPC64LE|RISCV64|S390X)$
  metadata:
    nr_refactored_patterns: 80
    nr_legacy_patterns: 0
- id: limatype-composite-literal
  message: Detected composite literal of limatype type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$TYPE{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^[A-Z].*
  metadata:
    nr_refactored_patterns: 66
    nr_legacy_patterns: 0
- id: limatype-import-in-group
  message: Detected limatype import in import group
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"$PKG\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*/pkg/limatype$
  metadata:
    nr_refactored_patterns: 58
    nr_legacy_patterns: 0
- id: limatype-ellipsis-in-call
  message: Detected variadic call with limatype
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $FUNC(..., limatype.$CONST, ...)
  metadata:
    nr_refactored_patterns: 58
    nr_legacy_patterns: 0
- id: limatype-vmtype-constants-usage
  message: Detected usage of VMType constants from limatype
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$VM
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $VM
      regex: ^(QEMU|VZ|WSL2)$
  metadata:
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: limatype-mounttype-constants-usage
  message: Detected usage of MountType constants from limatype
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$MOUNT
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $MOUNT
      regex: ^(REVSSHFS|NINEP|VIRTIOFS|WSLMount)$
  metadata:
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
- id: limatype-type-equality-check
  message: Detected type equality check with limatype constant
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "if ... == limatype.$CONST {\n  ...\n}\n"
    - pattern: "if limatype.$CONST == ... {\n  ...\n}\n"
    - pattern: "if ... != limatype.$CONST {\n  ...\n}\n"
    - pattern: "if limatype.$CONST != ... {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
- id: import-limatype-filenames-package
  message: Detected import of new pkg/limatype/filenames package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*/pkg/limatype/filenames$
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: limatype-slice-type-declaration
  message: Detected slice of limatype type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: var $VAR []$PKG.$TYPE
    - pattern: 'func $FUNC(...) []$PKG.$TYPE { ... }

        '
    - pattern: 'make([]$PKG.$TYPE, ...)

        '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  metadata:
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
- id: limatype-return-statement
  message: Detected return statement with limatype type or constant
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: return $PKG.$CONST
    - pattern: return $PKG.$CONST, ...
    - pattern: return ..., $PKG.$CONST
    - pattern: return &$PKG.$TYPE{...}
    - pattern: return $PKG.$TYPE{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  metadata:
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: import-limatype-dirnames-package
  message: Detected import of new pkg/limatype/dirnames package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*/pkg/limatype/dirnames$
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: limatype-boolean-expression
  message: Detected boolean expression with limatype comparison
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $X == limatype.$C && ...
    - pattern: $X != limatype.$C && ...
    - pattern: $X == limatype.$C || ...
    - pattern: $X != limatype.$C || ...
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: limatype-field-assignment
  message: Detected field assignment with limatype constant
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.$FIELD = $PKG.$CONST
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: limatype-status-comparison
  message: Detected comparison with limatype status constants
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $X == $PKG.$STATUS
    - pattern: $X != $PKG.$STATUS
    - pattern: $PKG.$STATUS == $X
    - pattern: $PKG.$STATUS != $X
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $STATUS
      regex: ^Status.*
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: limatype-function-return-type
  message: Detected function returning limatype type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func $FUNC(...) (*$PKG.$TYPE, ...) { ... }

        '
    - pattern: 'func $FUNC(...) ($PKG.$TYPE, ...) { ... }

        '
    - pattern: 'func $FUNC(...) *$PKG.$TYPE { ... }

        '
    - pattern: 'func $FUNC(...) $PKG.$TYPE { ... }

        '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: limatype-status-running-usage
  message: Detected StatusRunning constant usage from limatype
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.StatusRunning
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: limatype-variable-declaration
  message: Detected variable declaration with limatype type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: var $VAR *$PKG.$TYPE
    - pattern: var $VAR $PKG.$TYPE
    - pattern: var $VAR *$PKG.$TYPE = ...
    - pattern: var $VAR $PKG.$TYPE = ...
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: limatype-status-stopped-usage
  message: Detected StatusStopped constant usage from limatype
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.StatusStopped
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: limatype-short-var-declaration
  message: Detected short variable declaration with limatype type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $VAR := limatype.$CONST
    - pattern: $VAR := &limatype.$TYPE{...}
    - pattern: $VAR := limatype.$TYPE{...}
    - pattern: $VAR := limatype.$FUNC(...)
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: limatype-newarch-function-call
  message: Detected call to NewArch function from limatype package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC($ARG)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^NewArch$
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: limatype-linux-constant-usage
  message: Detected usage of LINUX constant from limatype
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$OS
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $OS
      regex: ^LINUX$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: limatype-struct-field-limayaml-pointer
  message: Detected struct field with pointer to LimaYAML type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $NAME struct {\n  ...\n  $FIELD *limatype.LimaYAML\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: limatype-instance-type-usage
  message: Detected usage of Instance type from limatype package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: var $VAR *$PKG.$TYPE
    - pattern: var $VAR $PKG.$TYPE
    - pattern: func $FUNC(...) *$PKG.$TYPE
    - pattern: func $FUNC(...) $PKG.$TYPE
    - pattern: '$VAR := &$PKG.$TYPE{ ... }

        '
    - pattern: '$VAR := $PKG.$TYPE{ ... }

        '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^Instance$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: limatype-instance-struct-initialization
  message: Detected Instance struct initialization from limatype
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '&$PKG.Instance{...}

        '
    - pattern: '$PKG.Instance{...}

        '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: limatype-format-string-with-status
  message: Detected formatting with limatype status
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: fmt.$FUNC(..., $PKG.$STATUS, ...)
    - pattern: logrus.$FUNC(..., $PKG.$STATUS, ...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $STATUS
      regex: ^Status.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: limatype-arch-type-usage
  message: Detected usage of Arch type or constants from limatype package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: var $VAR $PKG.$ARCH
    - pattern: $PKG.$ARCHVAL
    - pattern: $FUNC($PKG.$ARCHVAL, ...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $ARCH
      regex: ^Arch$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: limatype-package-declaration
  message: Detected package declaration for new limatype package
  severity: INFO
  languages:
  - go
  pattern: package limatype
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/limatype/*.go'
- id: limatype-spdx-license-comment
  message: Detected SPDX license comment in new limatype file
  severity: INFO
  languages:
  - go
  pattern-regex: '// SPDX-License-Identifier: Apache-2\.0'
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/limatype/*.go'
- id: limatype-copyright-comment
  message: Detected copyright comment in new limatype file
  severity: INFO
  languages:
  - go
  pattern-regex: // SPDX-FileCopyrightText:.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/limatype/*.go'
- id: limatype-portforward-slice-in-function-signature
  message: Detected PortForward slice type in function signature
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func $NAME(..., $VAR []limatype.PortForward, ...) { ... }

        '
    - pattern: 'func $NAME(...) ([]limatype.PortForward, ...) { ... }

        '
    - pattern: 'func $NAME(...) []limatype.PortForward { ... }

        '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: limatype-struct-field-portforward-slice
  message: Detected struct field with PortForward slice type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $NAME struct {\n  ...\n  $FIELD []limatype.PortForward\n  ...\n\
      }\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: limatype-newos-function-call
  message: Detected call to NewOS function from limatype package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC($ARG)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^NewOS$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: limatype-lima-yaml-file-exists
  message: Detected new file in pkg/limatype package (lima_yaml.go)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/limatype/lima_yaml.go'
- id: limatype-lima-instance-file-exists
  message: Detected new file in pkg/limatype package (lima_instance.go)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/limatype/lima_instance.go'
- id: limatype-dirnames-moved-file-exists
  message: Detected dirnames package moved to pkg/limatype/dirnames
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/limatype/dirnames/*.go'
- id: limatype-embedded-struct
  message: Detected embedded struct with limatype type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $NAME struct {\n  ...\n  $PKG.$TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: ^limatype$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: limatype-provision-slice-in-function-signature
  message: Detected Provision slice type in function signature
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func $NAME(..., $VAR []limatype.Provision, ...) { ... }

        '
    - pattern: 'func $NAME(...) ([]limatype.Provision, ...) { ... }

        '
    - pattern: 'func $NAME(...) []limatype.Provision { ... }

        '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: limatype-struct-field-vmtype-type
  message: Detected struct field with VMType type from limatype
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $NAME struct {\n  ...\n  $FIELD limatype.VMType\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: limatype-new-arch-function-exists
  message: Detected NewArch function definition in limatype
  severity: INFO
  languages:
  - go
  pattern: "func NewArch($PARAM string) Arch {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/limatype/*.go'
- id: limatype-new-os-function-exists
  message: Detected NewOS function definition in limatype
  severity: INFO
  languages:
