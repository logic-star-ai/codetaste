    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/limatype/*.go'
- id: limatype-type-alias-status
  message: Detected Status type alias in limatype
  severity: INFO
  languages:
  - go
  pattern: type Status = string
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/limatype/*.go'
