rules:
- id: limatype-import-block-with-limatype
  message: Detected import block containing limatype
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"$PKG\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*lima.*/pkg/limatype$
  metadata:
    nr_refactored_patterns: 58
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: limatype-function-parameter-instance
  message: Detected function with limatype.Instance parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func $FUNC($PARAM *limatype.Instance) $RET {\n  ...\n}\n"
    - pattern: "func $FUNC(..., $PARAM *limatype.Instance, ...) $RET {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
