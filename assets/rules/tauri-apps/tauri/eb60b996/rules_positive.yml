  metadata:
    category: api
    nr_refactored_patterns: 151
    nr_legacy_patterns: 0
- id: fs-context-multiline-message
  message: Detected fs_context call with any message - filesystem error handling
  severity: INFO
  languages:
  - rust
  patterns:
