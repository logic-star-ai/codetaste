rules:
- id: fs-context-method-call
  message: Detected fs_context() method call - indicates ErrorExt trait usage for
    filesystem operations
  severity: INFO
  languages:
  - rust
  pattern: '$EXPR.fs_context($MSG, $PATH)

    '
  metadata:
    category: api
    nr_refactored_patterns: 151
    nr_legacy_patterns: 0
- id: question-mark-after-fs-context
  message: Detected fs_context likely followed by error propagation
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: '$EXPR.fs_context($MSG, $PATH)

      '
  - pattern-not: 'let $VAR = $EXPR.fs_context($MSG, $PATH);

      '
  metadata:
    category: api
    nr_refactored_patterns: 151
    nr_legacy_patterns: 0
