rules:
- id: detect-anyhow-import-with-context-usage
  message: Replace anyhow::Context with custom Context trait. Implement Context trait
    for Result<T, Error>.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'use anyhow::Context;

      ...

      $EXPR.context($MSG)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
  paths:
    include:
    - crates/tauri-bundler/src/**/*.rs
    - crates/tauri-cli/src/**/*.rs
- id: detect-bail-macro-formatted
  message: Replace bail! macro with early return using custom Error variant with formatted
    message.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: anyhow::bail!($FMT, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: detect-anyhow-context-import-in-cli
  message: anyhow::Context import in CLI source. Replace with custom Context trait
    implementation.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use anyhow::Context;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
  paths:
    include:
    - crates/tauri-cli/src/**/*.rs
- id: detect-bail-macro-usage
  message: 'Replace bail! macro with early return using custom Error variant: return
    Err(Error::YourVariant(...))'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: anyhow::bail!($MSG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: detect-bail-simple-string
  message: Using bail! with simple string literal. Replace with return Err(Error::YourVariant(msg.to_string()))
    or specific error variant.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: anyhow::bail!($STR)
  - metavariable-pattern:
      metavariable: $STR
      pattern: '"..."'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: detect-bail-in-early-return
  message: 'Replace anyhow::bail! with explicit error return: if cond { return Err(Error::YourVariant(...));
    }'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "if $COND {\n  anyhow::bail!($MSG);\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-result-map-err-anyhow-formatted
  message: Replace .map_err() with anyhow! with specific Error variant that captures
    the context.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $EXPR.map_err(|$E| anyhow::anyhow!($FMT, ...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-err-anyhow-return-exclude-build
  message: Returning anyhow error. Replace with return Err(Error::YourVariant(...))
    using custom Error enum.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: return Err(anyhow::anyhow!($MSG));
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    exclude:
    - crates/tauri-build/**/*.rs
- id: detect-result-map-err-anyhow
  message: Replace .map_err() with anyhow! with custom Error enum variant.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $EXPR.map_err(|$E| anyhow::anyhow!($MSG))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-anyhow-context-import-in-bundler
  message: anyhow::Context import in bundler source. Replace with custom Context trait
    implementation.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use anyhow::Context;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - crates/tauri-bundler/src/**/*.rs
- id: detect-bail-in-early-return-pattern
  message: Using bail! for early return on negative condition. Use return Err(Error::YourVariant(...)).
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "if !$COND {\n  anyhow::bail!($MSG);\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-ok-or-else-anyhow
  message: Replace .ok_or_else() with anyhow! with explicit Error variant.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $EXPR.ok_or_else(|| anyhow::anyhow!($MSG))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-bail-in-final-else
  message: Using bail! in else branch. Use return Err(Error::YourVariant(...)) for
    explicit error handling.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "if $COND {\n  ...\n} else {\n  anyhow::bail!($MSG);\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-anyhow-ok-or-else-closure
  message: Using ok_or_else with anyhow!. Replace with ok_or_else(|| Error::YourVariant(...))
    using custom Error enum.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $OPT.ok_or_else(|| anyhow::anyhow!($MSG))
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-anyhow-import-with-result-usage
  message: Remove anyhow::Result import and usage. Define custom Result<T, Error>
    type alias with thiserror-based Error enum.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: 'use anyhow::Result;

        ...

        fn $FUNC(...) -> Result<$T> { ... }

        '
    - pattern: 'use anyhow::Result;

        ...

        pub fn $FUNC(...) -> Result<$T> { ... }

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - crates/tauri-bundler/src/**/*.rs
    - crates/tauri-cli/src/**/*.rs
- id: detect-map-err-anyhow-context
  message: Chaining map_err with anyhow! and context. Use specific Error variant with
    proper From implementation.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $EXPR.map_err(|$E| anyhow::anyhow!($MSG)).context($CTX)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-anyhow-result-import-in-cli
  message: anyhow::Result import in CLI. Define and use custom Result type alias.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use anyhow::Result;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - crates/tauri-cli/src/**/*.rs
- id: detect-context-on-fs-write
  message: Using .context() on fs::write. Replace with .fs_context('description',
    path) to include path in error.
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: std::fs::write($PATH, $DATA).context($MSG)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-if-let-some-bail
  message: Using bail! inside if-let block. Replace with return Err(Error::YourVariant(...)).
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "if let Some($V) = $EXPR {\n  ...\n  anyhow::bail!($MSG);\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-bail-after-unwrap
  message: bail! after unwrap(). Consider proper error handling without unwrap, returning
    specific Error variant.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: '$EXPR.unwrap();

      ...

      anyhow::bail!($MSG);

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-anyhow-in-if-else-error
  message: Using anyhow! in else branch. Use custom Error enum variant for better
    error typing.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "if $COND {\n  ...\n} else {\n  anyhow::anyhow!($MSG)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-anyhow-bail-import-in-cli
  message: anyhow::bail import in CLI. Remove and use return Err(Error::YourVariant(...))
    pattern.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use anyhow::bail;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - crates/tauri-cli/src/**/*.rs
- id: detect-anyhow-import-with-bail
  message: 'Remove anyhow::bail import and usage. Use explicit error return: return
    Err(Error::YourVariant(...)).'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'use anyhow::bail;

      ...

      bail!($MSG)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-anyhow-from-str
  message: Creating anyhow error from string. Define specific Error enum variant for
    this error case.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: anyhow::anyhow!($S.to_string())
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-anyhow-error-from-call
  message: Converting error to anyhow::Error. Implement From trait for custom Error
    enum to handle this error type.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: anyhow::Error::from($E)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-bail-in-else-if
  message: Using bail! in else-if branch. Replace with return Err(Error::YourVariant(...)).
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "if $COND1 {\n  ...\n} else if $COND2 {\n  anyhow::bail!($MSG);\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-anyhow-in-cli-lib-exports
  message: CLI lib.rs exports anyhow items. Export custom error types instead.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: pub use anyhow::$ITEM;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - crates/tauri-cli/src/lib.rs
- id: detect-anyhow-from-string
  message: Creating anyhow error from to_string(). Define Error enum variant that
    captures the semantic meaning of the error.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: anyhow::anyhow!($S.to_string())
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-missing-error-module-in-cli
  message: CLI should define a custom error module with thiserror-based Error enum
    for explicit error handling.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A(?![\s\S]*mod\s+error)[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - crates/tauri-cli/src/lib.rs
- id: detect-bail-with-format-args
  message: 'Replace anyhow::bail! with custom Error variant: return Err(Error::YourVariant(format!(...)))'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: anyhow::bail!($FMT, $ARG1, ...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-anyhow-import-with-anyhow-macro
  message: Remove anyhow::anyhow import and usage. Create specific Error enum variant
    with thiserror.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'use anyhow::anyhow;

      ...

      anyhow!($MSG)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-anyhow-with-cause
  message: Chaining anyhow! with context. Use Error::Context variant or appropriate
    error enum variant with cause.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: anyhow::anyhow!($MSG).context($CTX)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-err-bail-equivalent
  message: Returning anyhow! error (equivalent to bail!). Use explicit Error enum
    variant.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: return Err(anyhow!($MSG));
  - pattern-inside: 'use anyhow::anyhow;

      ...

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-if-error-bail
  message: Using bail! after error check. Use pattern matching or ? with proper error
    context instead.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "if $E.is_err() {\n  anyhow::bail!($MSG);\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-anyhow-context-import-qualified
  message: Importing anyhow::Context with alias. Remove and implement custom Context
    trait instead.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use anyhow::Context as $ALIAS;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-context-on-fs-create
  message: Using .context() on fs::create_dir_all. Replace with .fs_context('failed
    to create directory', path).
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: std::fs::create_dir_all($PATH).context($MSG)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-anyhow-macro-with-error-source
  message: Chaining anyhow! with .context(). Use Error::Context variant or specific
    error enum variant that captures both.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: anyhow::anyhow!($MSG).context($CTX)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-if-ok-is-err-with-bail
  message: Checking is_err() then using bail!. Use ? operator with proper context
    or explicit error handling.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "if $EXPR.is_err() {\n  anyhow::bail!($MSG);\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-if-some-else-bail
  message: Using bail! in else after if-let-Some. Use return Err(Error::YourVariant(...))
    or ? with ok_or.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "if let Some($V) = $EXPR {\n  $BODY\n} else {\n  anyhow::bail!($MSG);\n\
      }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-bail-in-loop-body
  message: Using bail! in loop. Replace with return Err(Error::YourVariant(...)) or
    break with error handling.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "loop {\n  ...\n  anyhow::bail!($MSG);\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-anyhow-bail-import-in-bundler
  message: anyhow::bail import in bundler. Remove and use explicit error returns with
    custom Error enum.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: use anyhow::bail;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - crates/tauri-bundler/src/**/*.rs
