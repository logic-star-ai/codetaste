rules:
- id: obsolete-directory-usage
  message: Detected file in _OBSOLETE_ directory (obsolete classes moved here after
    refactoring)
  severity: INFO
  languages:
  - csharp
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/_OBSOLETE_/*'
- id: new-containerconfiguration-instantiation
  message: Detected instantiation of ContainerConfiguration class
  severity: INFO
  languages:
  - csharp
  pattern: 'new ContainerConfiguration(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
