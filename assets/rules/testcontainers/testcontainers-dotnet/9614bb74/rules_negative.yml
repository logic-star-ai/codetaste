rules:
- id: idocker-image-return
  message: Replace 'IDockerImage' return type with 'IImage'
  severity: WARNING
  languages:
  - csharp
  pattern: "IDockerImage $METHOD(...)\n{\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: testcontainers-builder-extension-method
  message: Replace extension methods on 'ITestcontainersBuilder<T>' with dedicated
    builder class methods for module independence
  severity: WARNING
  languages:
  - csharp
  pattern: "public static ITestcontainersBuilder<$T> $METHOD(this ITestcontainersBuilder<$T>\
    \ $VAR, ...)\n{\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    exclude:
    - examples/*
    - '**/BackwardCompatibility/**'
    - '**/_OBSOLETE_/**'
- id: testcontainers-builder-extension-class
  message: Replace builder extension class with dedicated module builder class for
    better modularity
