    (throttle, debounce moved here)
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: import\s+\{[^}]*\}\s+from\s+['"](\.\.\/)*\.?\/?.*\/utils\/rate-limit['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
