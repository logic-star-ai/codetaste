    path
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: import\s*\{\s*parseDate\s*\}\s*from.*core/types/date
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: refactor-function-file-in-core-types
  message: Detected function.js file in new core/types location
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/core/types/function.js
- id: refactor-date-file-in-core-types
  message: Detected date.js file in new core/types location
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/core/types/date.js
