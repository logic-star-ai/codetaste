rules:
- id: detect-get-graphhopper-storage-method-call
  message: Replace getGraphHopperStorage() with getBaseGraph()
  severity: WARNING
  languages:
  - java
  pattern: $OBJ.getGraphHopperStorage()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 78
- id: detect-get-graphhopper-storage-chained-call
  message: Replace getGraphHopperStorage() with getBaseGraph() in chained calls
  severity: WARNING
  languages:
  - java
  pattern: $OBJ.getGraphHopperStorage().$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: detect-graphhopper-storage-var-assignment
  message: Replace getGraphHopperStorage() with getBaseGraph() in variable assignments
