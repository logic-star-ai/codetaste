    applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'public Factory(..., BaseGraph $BG, ..., EncodingManager $EM, ...) {
      ... }

      '
  - metavariable-pattern:
      metavariable: $BG
      patterns:
      - pattern-not: 'null'
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
