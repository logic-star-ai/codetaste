rules:
- id: detect-graphhopper-get-base-graph-call
  message: Detected getBaseGraph() call on GraphHopper instance - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $GH.getBaseGraph()
    - pattern: getBaseGraph()
  - metavariable-pattern:
      metavariable: $GH
      patterns:
      - pattern-regex: ^(graphHopper|hopper|gh)$
  metadata:
    category: api
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
- id: detect-graphhopper-gtfs-base-graph-usage
  message: Detected getBaseGraph() in GraphHopperGtfs class - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: getBaseGraph()
  - pattern-inside: 'class GraphHopperGtfs { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: detect-pt-router-field-base-graph
  message: Detected BaseGraph field in PtRouter class - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'private final BaseGraph $FIELD;

      '
  - pattern-inside: 'class $PTROUTER { ... }

      '
  - metavariable-pattern:
      metavariable: $PTROUTER
      patterns:
      - pattern-regex: ^.*PtRouter.*$
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-router-impl-base-graph-constructor
  message: Detected Router implementation constructor with BaseGraph - refactoring
    applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'public $ROUTER(..., BaseGraph $BG, ...) { ... }

      '
  - pattern-inside: 'class $ROUTERCLASS { ... }

      '
  - metavariable-pattern:
      metavariable: $ROUTERCLASS
      patterns:
      - pattern-regex: ^.*Router.*Impl$
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-properties-get-call-after-base-graph
  message: Detected separate getBaseGraph() and getProperties() calls - refactoring
    applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$BG = $X.getBaseGraph();

      ...

      $PROPS = $X.getProperties();

      '
  - metavariable-pattern:
      metavariable: $X
      patterns:
      - pattern-regex: .*
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-properties-from-separate-object
  message: Detected separate retrieval of BaseGraph and Properties - refactoring applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '$BG = $X.getBaseGraph();

      ...

      $PROPS = $Y.getProperties();

      '
  - metavariable-pattern:
      metavariable: $X
      patterns:
      - pattern-regex: .*
  - metavariable-pattern:
      metavariable: $Y
      patterns:
      - pattern-regex: .*
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-gtfs-reader-no-ghstorage-reference
  message: Detected GtfsReader using BaseGraph instead of GraphHopperStorage - refactoring
    applied
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: .*GraphHopperStorage.*
  - pattern-regex: .*BaseGraph.*
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/GtfsReader.java'
- id: detect-method-param-base-graph-and-storable-properties
  message: Detected method with separate BaseGraph and StorableProperties parameters
    - refactoring applied
  severity: INFO
  languages:
  - java
  pattern: '$RET $METHOD(..., BaseGraph $BG, ..., StorableProperties $SP, ...) { ...
    }

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-base-graph-import-with-storable-properties
  message: Detected file importing both BaseGraph and StorableProperties - refactoring
    applied
  severity: INFO
  languages:
  - java
  pattern-regex: (?s).*import.*\.BaseGraph;.*import.*\.StorableProperties;.*
  metadata:
    category: dependency
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.java'
- id: detect-base-graph-factory-constructor
