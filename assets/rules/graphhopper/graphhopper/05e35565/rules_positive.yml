rules:
- id: graphhopper-osm-test-basegraph
  message: GraphHopperOSMTest uses BaseGraph
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.getBaseGraph()
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/GraphHopperOSMTest.java'
  options:
    symbolic_propagation: true
- id: gtfs-reader-init-basegraph-field
  message: GTFS reader initializes BaseGraph field
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'this.$FIELD = $GRAPH;

      '
  - metavariable-type:
      metavariable: $GRAPH
      type: BaseGraph
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/gtfs/**/*.java'
  options:
    symbolic_propagation: true
- id: gtfs-field-basegraph-type
  message: GTFS class field uses BaseGraph type
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: private final BaseGraph $FIELD;
  - pattern-not-inside: "class GraphHopperStorage {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/gtfs/**/*.java'
    - '**/reader-gtfs/**/*.java'
  options:
    symbolic_propagation: true
