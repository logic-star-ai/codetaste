    - '**/*BaseGraphTest.java'
    - '**/test/**/BaseGraph*.java'
- id: properties-string-formatting-moved
  message: String formatting methods for properties in GraphHopper class
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "$RET $METHOD(...) {\n  ...\n  return $STR + \"...\" + ...;\n}\n"
    - pattern: return ... + "|" + ...;
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i).*(string|details|versions?).*
