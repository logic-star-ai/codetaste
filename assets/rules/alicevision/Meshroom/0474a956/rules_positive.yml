rules:
- id: choiceparam-with-name-label-desc-values-no-exclusive
  message: ChoiceParam with name/label/description/values but no exclusive (using
    new default True)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "desc.ChoiceParam(\n    name=$N,\n    label=$L,\n    description=$D,\n\
      \    ...,\n    values=$V,\n    ...\n)\n"
  - pattern-not: "desc.ChoiceParam(\n    ...,\n    exclusive=$E,\n    ...\n)\n"
  metadata:
    category: basic
    nr_refactored_patterns: 210
    nr_legacy_patterns: 0
  paths:
    include:
    - meshroom/nodes/**
- id: choiceparam-with-name-value-no-exclusive
  message: ChoiceParam with name and value but no exclusive parameter (using new default)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "desc.ChoiceParam(\n    name=$N,\n    ...,\n    value=$V,\n    ...\n\
      )\n"
  - pattern-not: "desc.ChoiceParam(\n    ...,\n    exclusive=$E,\n    ...\n)\n"
  metadata:
    category: basic
    nr_refactored_patterns: 210
    nr_legacy_patterns: 0
  paths:
    include:
    - meshroom/nodes/**
- id: choiceparam-with-comment-above-no-exclusive
  message: Commented ChoiceParam without exclusive parameter (refactored)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "# $COMMENT\ndesc.ChoiceParam(\n    ...\n)\n"
  - pattern-not: "desc.ChoiceParam(\n    ...,\n    exclusive=$E,\n    ...\n)\n"
  metadata:
    category: basic
    nr_refactored_patterns: 210
    nr_legacy_patterns: 0
  paths:
    include:
    - meshroom/nodes/**
