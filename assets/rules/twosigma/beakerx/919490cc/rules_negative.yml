rules:
- id: js-file-over-1500-lines
  message: plotScope.js is a monolithic file (1500+ lines) - break down into focused,
    testable modules
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \n
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2178
  paths:
    include:
    - '**/plotScope.js'
- id: complex-prototype-method-count
  message: High number of prototype methods indicates monolithic class - extract responsibilities
  severity: WARNING
  languages:
  - javascript
  pattern-regex: PlotScope\.prototype\.
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
  paths:
    include:
    - '**/plotScope.js'
