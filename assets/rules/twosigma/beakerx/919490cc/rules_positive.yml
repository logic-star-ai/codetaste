rules:
- id: import-multiple-new-modules-in-scope
  message: Detected multiple imports from new refactored modules in scope file
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { $A, ..., $B } from '$PATH'
    - pattern: 'import $A from ''$P1''

        ...

        import $B from ''$P2''

        '
  - metavariable-regex:
      metavariable: $A
      regex: (?i)^.*([Gg]rid|[Ll]ayout|[Ll]egend|[Cc]ursor|[Ii]nteraction).*$
  metadata:
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plot/*Scope.ts'
    - '**/plot/*scope.ts'
  options:
    symbolic_propagation: true
- id: jquery-access-not-models-not-modal
  message: Detected jQuery access in new extracted module
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $($X).$METHOD(...)
  metadata:
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plot/**/*.ts'
    exclude:
    - '**/test/**'
    - '**/*.d.ts'
    - '**/plotScope.ts'
    - '**/plotUtils.ts'
    - '**/zoom/**'
    - '**/range/**'
    - '**/std/**'
    - '**/models/**'
    - '**/plotModal/**'
  options:
    symbolic_propagation: true
