    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: perms-nested-import-from-user-permission-submodule
  message: Import from 'perms.api.user_permission.$SUB' detected. Should be 'perms.api.asset.user_permission.$SUB'
    after refactoring.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from perms.api.user_permission.$SUB import $X
    - pattern: import perms.api.user_permission.$SUB
  - metavariable-regex:
      metavariable: $SUB
      regex: ^(common|mixin|user_permission_assets|user_permission_nodes|user_permission_nodes_with_assets)$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
