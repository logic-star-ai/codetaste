rules:
- id: perms-relative-import-same-level-asset-modules
  message: Same-level relative import of asset-related module - should be reorganized
    into asset/ subdirectory
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from . import asset_permission
    - pattern: from . import asset_permission_relation
    - pattern: from . import user_group_permission
    - pattern: from . import user_permission
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - apps/perms/api/*.py
    - apps/perms/serializers/*.py
    - apps/perms/utils/*.py
- id: perms-relative-import-same-level-application-modules
  message: Same-level relative import of application-related module - should be reorganized
    into application/ subdirectory
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from . import application_permission
    - pattern: from . import application_permission_relation
    - pattern: from . import user_group_permission_application
    - pattern: from . import user_permission_application
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - apps/perms/api/*.py
    - apps/perms/serializers/*.py
    - apps/perms/utils/*.py
- id: perms-api-user-permission-old-location
  message: Files in 'apps/perms/api/user_permission/' should be moved to 'apps/perms/api/asset/user_permission/'
    after refactoring
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - apps/perms/api/user_permission/*.py
- id: perms-api-user-permission-old-import
  message: Import from old path 'perms.api.user_permission' detected. Should be 'perms.api.asset.user_permission'
    after refactoring.
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: from perms.api.user_permission import $X
  - pattern: from perms.api.user_permission.$Y import $X
  - pattern: import perms.api.user_permission
  - pattern: import perms.api.user_permission.$Y
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: perms-api-user-permission-application-old-location
  message: Files in 'apps/perms/api/user_permission_application/' should be moved
    to 'apps/perms/api/application/user_permission/' after refactoring
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - apps/perms/api/user_permission_application/*.py
- id: perms-internal-asset-permission-cross-reference
  message: Import from 'perms.api.user_permission' should be updated to 'perms.api.asset.user_permission'
    after refactoring
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from perms.api.user_permission.$SUBMOD import $X
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: perms-api-user-permission-mixin-old-import
  message: Import 'perms.api.user_permission.mixin' should be 'perms.api.asset.user_permission.mixin'
    after refactoring
  severity: WARNING
  languages:
  - python
