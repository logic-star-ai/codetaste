    - pattern: from tensorflow.python.data.ops import options as options_lib
    - pattern: from tensorflow.python.data.ops.options import Options
  metadata:
    category: structural
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
- id: options-lib-used-as-module-reference
