rules:
- id: test-file-uses-consolidated-options
  message: Detected test file using consolidated options module
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'from tensorflow.python.data.ops import options

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 516
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.py'
    - '**/test_*.py'
- id: options-in-dataset-ops-same-package
  message: Detected options imported in same package as dataset_ops
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'from tensorflow.python.data.ops import options as $ALIAS

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 177
    nr_legacy_patterns: 0
  paths:
    include:
    - tensorflow/python/data/ops/*.py
- id: options-class-reference-from-ops-module
  message: Detected fully qualified reference to options classes in new location
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: tensorflow.python.data.ops.options.Options
    - pattern: tensorflow.python.data.ops.options.$CLASS
  metadata:
    category: api
    nr_refactored_patterns: 162
    nr_legacy_patterns: 0
- id: options-lib-prefix-usage-excluding-dataset-ops
  message: Detected usage of options classes via options_lib prefix after consolidation
  severity: INFO
  languages:
  - python
  pattern-regex: options_lib\.(Options|OptimizationOptions|DistributeOptions|ThreadingOptions|AutoShardPolicy|ExternalStatePolicy)
  metadata:
    category: api
    nr_refactored_patterns: 144
    nr_legacy_patterns: 0
  paths:
    exclude:
    - tensorflow/python/data/ops/dataset_ops.py
    - tensorflow/python/data/ops/options.py
- id: options-import-alongside-dataset-ops
  message: Detected options imported alongside dataset_ops from ops module
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'from tensorflow.python.data.ops import dataset_ops

      ...

      from tensorflow.python.data.ops import options

      '
  metadata:
    category: structural
    nr_refactored_patterns: 87
    nr_legacy_patterns: 0
- id: consolidated-module-has-all-six-classes
  message: Detected one of the six consolidated classes in new module
  severity: INFO
  languages:
  - python
  pattern-regex: (Options|OptimizationOptions|DistributeOptions|ThreadingOptions|AutoShardPolicy|ExternalStatePolicy)
  metadata:
    category: structural
    nr_refactored_patterns: 76
    nr_legacy_patterns: 0
  paths:
    include:
    - tensorflow/python/data/ops/options.py
- id: test-using-options-from-new-module
  message: Detected test class using options from new consolidated location
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "from tensorflow.python.data.ops import options\n...\nclass $TEST(...):\n\
      \  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 66
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.py'
- id: import-from-new-options-module
  message: Detected import from new consolidated options module location
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from tensorflow.python.data.ops import options
    - pattern: from tensorflow.python.data.ops import options as $ALIAS
    - pattern: from tensorflow.python.data.ops.options import $CLASS
  metadata:
    category: structural
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
- id: options-policy-enums-from-new-module
