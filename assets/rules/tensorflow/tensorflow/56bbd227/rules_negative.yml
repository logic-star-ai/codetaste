rules:
- id: tf-data-attribute-access-optimization-options
  message: Accessing experimental_optimization attribute while using old optimization_options
    import. Update import to consolidated options module
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $OBJ.experimental_optimization
  - pattern-inside: 'from tensorflow.python.data.experimental.ops import optimization_options

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
