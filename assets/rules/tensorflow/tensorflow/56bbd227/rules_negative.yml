- id: tf-data-autoshard-comparison
  message: Comparison with AutoShardPolicy from old module. Import AutoShardPolicy
    from consolidated options module
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $X == distribute_options.AutoShardPolicy.$Y
    - pattern: $X != distribute_options.AutoShardPolicy.$Y
    - pattern: distribute_options.AutoShardPolicy.$Y == $X
    - pattern: distribute_options.AutoShardPolicy.$Y != $X
  - pattern-not-inside: 'from tensorflow.python.data.ops.options import AutoShardPolicy

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tf-data-autoshard-in-conditional
  message: Conditional using AutoShardPolicy from old module. Import from consolidated
    options module
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "if $X == AutoShardPolicy.$Y:\n  ...\n"
    - pattern: "if AutoShardPolicy.$Y == $X:\n  ...\n"
  - pattern-inside: 'from tensorflow.python.data.experimental.ops.distribute_options
      import AutoShardPolicy

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
