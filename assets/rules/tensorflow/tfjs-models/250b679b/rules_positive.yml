rules:
- id: hand-pose-detection-apache-license-header
  message: Detected Apache License header in hand-pose-detection file
  severity: INFO
  languages:
  - generic
  pattern-regex: Apache\s+License,\s+Version\s+2\.0
  metadata:
    category: other
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - hand-pose-detection/**
- id: hand-pose-detection-rollup-export-default
  message: Detected export default in hand-pose-detection rollup config
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: export default [...]
  metadata:
    category: config
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  paths:
    include:
    - hand-pose-detection/rollup.config.js
- id: hand-pose-detection-finger-keypoint-list
  message: Detected finger keypoint name in hand-pose-detection documentation
  severity: INFO
  languages:
  - generic
  pattern-regex: (thumb|index_finger|middle_finger|ring_finger|pinky_finger)_(mcp|pip|dip|tip)
  metadata:
    category: config
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - hand-pose-detection/**/*.md
- id: hand-pose-detection-demo-directory-exists
  message: Detected file in hand-pose-detection/demos directory (directory was renamed)
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - hand-pose-detection/demos/**
