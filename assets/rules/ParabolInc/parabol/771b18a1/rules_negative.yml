rules:
- id: relay-kickedout-unmigrated
  message: 'KickedOut.tsx: Replace createFragmentContainer with useFragment. Steps:
    1) Import useFragment from ''react-relay'', 2) Rename notification -> notificationRef
    in Props, 3) Call useFragment inside component body, 4) Export component directly'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: createFragmentContainer
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - packages/client/components/KickedOut.tsx
