  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: Popen([..., "-m", "tests.mockserver", ...], ...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: http-port-zero-listen
  message: Port 0 (random port) in reactor.listen* suggests subprocess entry point
