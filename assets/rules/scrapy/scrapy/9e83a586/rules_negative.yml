rules:
- id: geturl-call-with-portno
  message: 'Old pattern detected: getURL(portno, path) call suggests in-process server
    - use mockserver.url(path) instead'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $SELF.getURL($PORTNO, $PATH)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
  paths:
    include:
    - tests/test_*.py
- id: get-mockserver-env-function-usage
  message: 'Old function call: get_mockserver_env() has been renamed to get_script_run_env()
    and moved to tests.utils'
  severity: WARNING
  languages:
  - python
  pattern: get_mockserver_env()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: not-done-yet-usage
  message: server.NOT_DONE_YET usage suggests in-process resource implementation -
    move to mockserver subprocess
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: server.NOT_DONE_YET
  - pattern-not-inside: "def main(...):\n  ...\n"
  - pattern-not-inside: "if __name__ == \"__main__\":\n  ...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - tests/test_*.py
- id: not-done-yet-return
  message: Returning NOT_DONE_YET suggests resource implementation that should be
    in mockserver subprocess
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: return server.NOT_DONE_YET
  - pattern-inside: "def render($SELF, $REQUEST):\n  ...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - tests/test_*.py
- id: wrapping-factory-assignment
  message: WrappingFactory assignment should be removed - use subprocess-based mockservers
    instead
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $VAR = WrappingFactory(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: ssl-context-factory-with-self-keyfile
  message: 'Old pattern detected: ssl_context_factory() should receive explicit paths,
    not self.keyfile/self.certfile'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: ssl_context_factory(self.keyfile, self.certfile, ...)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: server-port-fixture-with-reactor-listenssl
  message: 'Old pattern detected: server_port fixture using reactor.listenSSL should
    be replaced with mockserver fixture'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "@async_yield_fixture\nasync def server_port(...):\n  ...\n  port = reactor.listenSSL(...)\n\
      \  ...\n"
  - pattern-not-inside: "def main(...):\n  ...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: geturl-method-with-portno
  message: 'Old pattern detected: getURL(portno, path) method suggests in-process
    server - use mockserver.url(path) instead'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def getURL($SELF, $PORTNO, $PATH):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - tests/test_*.py
- id: basemockserver-missing-inheritance
  message: MockServer class should inherit from BaseMockServer abstract base class
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "class $CLASS:\n  def __enter__($SELF):\n    ...\n    self.proc = Popen(...)\n\
      \    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - tests/mockserver*.py
- id: mockserver-proc-popen-assignment
  message: 'Old MockServer implementation: proc attribute should be managed through
    BaseMockServer inheritance'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $SELF.proc = Popen(...)
  - pattern-not-inside: "class $CLASS(BaseMockServer):\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - tests/mockserver*.py
- id: mockserver-proc-stdout-readline
  message: 'Old MockServer implementation: Manual stdout reading should be abstracted
    in BaseMockServer'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $SELF.proc.stdout.readline()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - tests/mockserver*.py
- id: mockserver-proc-kill
  message: 'Old MockServer implementation: Process cleanup should be handled by BaseMockServer'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $SELF.proc.kill()
  - pattern-not-inside: "class $CLASS(BaseMockServer):\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - tests/mockserver*.py
- id: mockserver-proc-communicate
  message: 'Old MockServer implementation: Process communication should be handled
    by BaseMockServer'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $SELF.proc.communicate()
  - pattern-not-inside: "class $CLASS(BaseMockServer):\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - tests/mockserver*.py
- id: strip-decode-ascii-pattern
  message: strip().decode('ascii') pattern often used in old subprocess communication
    - check if refactored
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $X.strip().decode("ascii")
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - tests/mockserver*.py
- id: env-parameter-in-popen
  message: Popen with env=get_mockserver_env() - should use get_script_run_env() from
    tests.utils
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: Popen(..., env=get_mockserver_env(), ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-mockserver-reference-in-subprocess
  message: 'Old subprocess pattern: tests.mockserver should reference specific module
    like ''tests.mockserver.http'''
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: Popen([sys.executable, ..., "-m", "tests.mockserver", ...], ...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: scheme-attribute-http
  message: 'Old pattern detected: ''scheme'' attribute should be replaced with ''is_secure
    = False'' boolean flag'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(...):\n  ...\n  scheme = \"http\"\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - tests/test_*.py
- id: testhttpmockserverbase-class-name
  message: 'Old class name detected: TestHttpMockServerBase should be renamed to TestHttpWithCrawlerBase'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "class $CLASS(TestHttpMockServerBase):\n  ...\n"
    - pattern: "class $CLASS(..., TestHttpMockServerBase, ...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - tests/test_*.py
- id: testhttpmockserverbase-import
  message: 'Old class name detected: Import TestHttpWithCrawlerBase instead of TestHttpMockServerBase'
  severity: WARNING
  languages:
  - python
  pattern: from tests.test_downloader_handlers_http_base import TestHttpMockServerBase
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: server-port-fixture-with-reactor-listen
  message: 'Old pattern detected: server_port fixture using reactor.listenTCP should
    be replaced with mockserver fixture'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "@async_yield_fixture\nasync def server_port(...):\n  ...\n  port = reactor.listenTCP(...)\n\
      \  ...\n"
  - pattern-not-inside: "def main(...):\n  ...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: popen-with-tests-mockserver-module
  message: 'Old subprocess pattern: Reference to ''tests.mockserver'' module should
