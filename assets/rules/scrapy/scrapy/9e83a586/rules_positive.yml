rules:
- id: test-fixture-with-mockserver-param
  message: Detected test function using mockserver fixture parameter after refactoring
  severity: INFO
  languages:
  - python
  pattern-regex: (async\s+)?def\s+test_\w+\([^)]*mockserver[^)]*\)
  metadata:
    category: config
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
  paths:
    exclude:
    - tests/test_command_shell.py
    - tests/test_contracts.py
    - tests/test_scheduler.py
- id: mockserver-modular-http-import-regex
  message: Detected import from refactored tests.mockserver.http module
  severity: INFO
  languages:
  - python
  pattern-regex: from\s+tests\.mockserver\.http\s+import\s+
  metadata:
    category: structural
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: mockserver-import-from-http-module
  message: Detected MockServer import from new http.py module
  severity: INFO
  languages:
  - python
  pattern: from tests.mockserver.http import MockServer
  metadata:
    category: structural
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: resource-render-method-in-http-resources
  message: Detected render() method in resource class in http_resources.py
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def render($SELF, $REQUEST):\n    ...\n"
  - pattern-inside: "class $CLASS(...):\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/mockserver/http_resources.py
- id: twisted-reactor-import-in-mockserver
  message: Detected reactor import in mockserver subprocess module
  severity: INFO
  languages:
  - python
  pattern-regex: from\s+twisted\.internet\s+import\s+.*reactor
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/mockserver/*.py
- id: request-write-in-resource
