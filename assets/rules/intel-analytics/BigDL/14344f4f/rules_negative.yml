rules:
- id: old-example-directory-reference
  message: Reference to example/GPU/QLoRA-FineTuning. Should use LLM-Finetuning/{mode}
    structure.
  severity: WARNING
  languages:
  - generic
  pattern-regex: example/GPU/QLoRA-FineTuning[/]?
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: shared-script-multiple-mode-bash-calls
  message: Reference to alpaca_qlora_finetuning.py from non-qlora script. Each mode
    should have its own script file.
  severity: WARNING
  languages:
  - bash
  pattern-regex: alpaca_qlora_finetuning\.py
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/lora_finetune_*.sh'
    - '**/qalora_finetune_*.sh'
    - '**/relora_finetune_*.sh'
- id: bash-script-in-mixed-mode-directory
  message: Bash scripts for different modes in same directory. Should be organized
    into mode-specific folders.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/QLoRA-FineTuning/alpaca-qlora/*_finetune_*.sh'
- id: mixed-mode-bash-scripts-same-dir
  message: Multiple mode-specific bash scripts in same alpaca-qlora directory. Should
    be separated into mode folders.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/alpaca-qlora/lora_finetune_*.sh'
    - '**/alpaca-qlora/qalora_finetune_*.sh'
    - '**/alpaca-qlora/relora_finetune_*.sh'
- id: old-path-reference-qlora-finetuning-in-markdown
  message: Old path reference detected. Should be updated to 'example/GPU/LLM-Finetuning/{mode}'
    after refactoring
  severity: WARNING
  languages:
  - generic
  pattern-regex: example/GPU/QLoRA-FineTuning
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*.md'
    - '*.rst'
    - '*.txt'
- id: old-gpu-qlora-path-in-readme
  message: GPU QLoRA-FineTuning path reference. Should use LLM-Finetuning/{mode} structure.
  severity: WARNING
  languages:
  - generic
  pattern-regex: GPU/QLoRA-FineTuning
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*.md'
    - '*.rst'
- id: finetune-llama-scripts-in-alpaca-qlora
  message: Finetune script in alpaca-qlora directory. Different modes should be in
    separate folders (LoRA/, QLoRA/, QA-LoRA/, ReLora/).
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/alpaca-qlora/finetune_llama*.sh'
- id: old-path-in-github-url
  message: GitHub URL with old path structure detected. Should reference new LLM-Finetuning/{mode}
    structure
  severity: WARNING
  languages:
  - generic
  pattern-regex: github\.com/intel-analytics/BigDL/[^/]*/main/python/llm/example/GPU/QLoRA-FineTuning
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: old-qlora-example-link
  message: Markdown link to GPU QLoRA-FineTuning example. Should link to new LLM-Finetuning
    structure.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \]\([^)]*example/GPU/QLoRA-FineTuning[^)]*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '*.md'
- id: export-merged-model-old-location-reference
  message: Reference to export_merged_model.py in old location. After refactoring,
    each mode folder should have its own copy
  severity: WARNING
  languages:
  - generic
  pattern-regex: QLoRA-FineTuning/export_merged_model\.py
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: bash-script-training-mode-parameter-lora
  message: Bash script passing training_mode parameter. Mode-specific scripts should
    not need this parameter.
  severity: WARNING
  languages:
  - bash
  pattern-regex: --training_mode\s+(lora|"lora")
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*.sh'
- id: bash-script-training-mode-parameter-qalora
  message: Bash script passing training_mode parameter. Mode-specific scripts should
    not need this parameter.
  severity: WARNING
  languages:
  - bash
  pattern-regex: --training_mode\s+(qalora|"qalora")
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*.sh'
- id: bash-script-training-mode-parameter-relora
  message: Bash script passing training_mode parameter. Mode-specific scripts should
    not need this parameter.
  severity: WARNING
  languages:
  - bash
  pattern-regex: --training_mode\s+(relora|"relora")
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*.sh'
- id: bash-lora-script-in-qlora-directory
  message: LoRA bash script in QLoRA-FineTuning directory. LoRA scripts should be
    in dedicated LoRA/ folder.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/QLoRA-FineTuning/**/lora_finetune_*.sh'
- id: bash-qalora-script-in-qlora-directory
  message: QA-LoRA bash script in QLoRA-FineTuning directory. QA-LoRA scripts should
    be in dedicated QA-LoRA/ folder.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/QLoRA-FineTuning/**/qalora_finetune_*.sh'
- id: bash-relora-script-in-qlora-directory
  message: ReLora bash script in QLoRA-FineTuning directory. ReLora scripts should
    be in dedicated ReLora/ folder.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/QLoRA-FineTuning/**/relora_finetune_*.sh'
- id: lora-finetune-scripts-in-alpaca-qlora
  message: LoRA finetune script in QLoRA-FineTuning/alpaca-qlora. Should be in dedicated
    LoRA/ folder.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/QLoRA-FineTuning/alpaca-qlora/lora_finetune*.sh'
- id: qalora-finetune-scripts-in-alpaca-qlora
  message: QA-LoRA finetune script in QLoRA-FineTuning/alpaca-qlora. Should be in
    dedicated QA-LoRA/ folder.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/QLoRA-FineTuning/alpaca-qlora/qalora_finetune*.sh'
- id: relora-finetune-scripts-in-alpaca-qlora
  message: ReLora finetune script in QLoRA-FineTuning/alpaca-qlora. Should be in dedicated
    ReLora/ folder.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/QLoRA-FineTuning/alpaca-qlora/relora_finetune*.sh'
- id: old-path-github-tree-structure
  message: GitHub tree link to old QLoRA-FineTuning structure. Should reference new
    mode-separated folders.
  severity: WARNING
  languages:
  - generic
  pattern-regex: github\.com/intel-analytics/BigDL/tree/[^/]+/python/llm/example/GPU/QLoRA-FineTuning
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-path-in-shell-script
  message: Shell script path reference to old QLoRA-FineTuning directory detected
  severity: WARNING
  languages:
  - bash
  pattern-regex: /QLoRA-FineTuning/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*.sh'
- id: qlora-finetuning-script-old-location
  message: Reference to qlora_finetuning.py in old generic location. Should be in
    mode-specific folder
  severity: WARNING
  languages:
  - generic
  pattern-regex: QLoRA-FineTuning/qlora_finetuning\.py
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: test-script-old-path-reference
  message: Test script referencing old QLoRA-FineTuning path structure
  severity: WARNING
  languages:
  - bash
  pattern-regex: \$\{[^}]*\}/.*QLoRA-FineTuning
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*test*.sh'
    - '*run*.sh'
- id: old-qlora-directory-in-test-script
  message: Test script referencing files in old QLoRA-FineTuning structure. Should
    reference new mode-specific paths.
  severity: WARNING
  languages:
  - bash
  pattern-regex: QLoRA-FineTuning/(alpaca-qlora/)?[a-z_]+\.py
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/test/**/*.sh'
    - '**/*test*.sh'
- id: old-finetuning-script-path-in-test
  message: Test script path to old QLoRA-FineTuning directory. Should use new mode-specific
    paths.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \$\{[^}]+\}/python/llm/example/[^/]+/QLoRA-FineTuning
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-analytics-zoo-root-qlora-ref
  message: Environment variable path referencing old QLoRA-FineTuning structure. Should
    use new paths.
  severity: WARNING
  languages:
  - bash
  pattern-regex: ANALYTICS_ZOO_ROOT[^/]*/python/llm/example/GPU/QLoRA-FineTuning
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: test-script-old-qlora-path
  message: Test script referencing old QLoRA-FineTuning path. Should use new mode-specific
    structure.
  severity: WARNING
  languages:
  - bash
  pattern-regex: example/GPU/QLoRA-FineTuning
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/*test*.sh'
    - '**/test/**/*.sh'
- id: analytics-zoo-root-qlora-variable
  message: ANALYTICS_ZOO_ROOT variable with old path. Should reference new mode-specific
    directories.
  severity: WARNING
  languages:
  - bash
  pattern-regex: ANALYTICS_ZOO_ROOT.*QLoRA-FineTuning
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-test-path-qlora-finetuning
  message: Test script using old QLoRA-FineTuning path with ANALYTICS_ZOO_ROOT. Should
    use new mode-specific paths.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \$\{ANALYTICS_ZOO_ROOT\}/python/llm/example/GPU/QLoRA-FineTuning
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: qlora-finetuning-script-in-test
  message: Test running script from old QLoRA-FineTuning path. Should use new LLM-Finetuning
    structure.
  severity: WARNING
  languages:
  - bash
  pattern-regex: python.*example/GPU/QLoRA-FineTuning.*\.py
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/*test*.sh'
- id: old-path-github-link-main-branch
  message: GitHub link to old QLoRA-FineTuning on main branch. Should reference new
    structure.
  severity: WARNING
  languages:
  - generic
  pattern-regex: github\.com/intel-analytics/BigDL/blob/main/python/llm/example/GPU/QLoRA-FineTuning
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: conditional-trainer-import-relora
  message: Conditional ReLoRATrainer import based on mode. ReLora-specific scripts
    should import directly.
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: "if $MODE == \"relora\":\n    from bigdl.llm.transformers.relora import\
      \ ReLoRATrainer\n    return ReLoRATrainer\nreturn transformers.Trainer\n"
  - pattern: "if $MODE == \"relora\":\n    from bigdl.llm.transformers.relora import\
      \ ReLoRATrainer\n    return ReLoRATrainer\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: python-file-in-qlora-finetuning-root
  message: Python file at QLoRA-FineTuning root level. After refactoring, scripts
    should be in mode-specific subdirectories.
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/GPU/QLoRA-FineTuning/*.py'
- id: training-mode-commented-config
  message: Commented code with training_mode checks. Even in comments, suggests multi-mode
    implementation.
  severity: WARNING
  languages:
  - python
  pattern-regex: '#.*training_mode\s*(==|=)\s*["\''](lora|qlora|qalora|relora)'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: training-mode-conditional-lora
  message: Conditional logic based on training_mode should be removed. Each mode should
    have its own dedicated script.
  severity: WARNING
  languages:
  - python
  pattern: "if $TRAINING_MODE == \"lora\":\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: training-mode-conditional-qalora
  message: Conditional logic based on training_mode should be removed. Each mode should
    have its own dedicated script.
  severity: WARNING
  languages:
  - python
  pattern: "if $TRAINING_MODE == \"qalora\":\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: training-mode-validation-multiple-modes
  message: Multi-mode validation should be removed. Each mode should have its own
    dedicated script with a single default mode.
  severity: WARNING
  languages:
  - python
  pattern: 'invalidInputError($TRAINING_MODE in ["qlora", "qalora", "lora", "relora"],
    ...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: get-trainer-cls-with-mode-switch
  message: Trainer class selection based on training_mode should be removed. Each
    mode-specific script should directly use the appropriate trainer.
  severity: WARNING
  languages:
  - python
  pattern: "def _get_trainer_cls(training_mode):\n    if training_mode == \"relora\"\
    :\n        ...\n    return ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: training-mode-ternary-qalora
  message: Ternary operator with training_mode check should be removed. Each mode
    should have its own dedicated script.
  severity: WARNING
  languages:
  - python
  pattern: $EXPR if training_mode=="qalora" else $EXPR2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: trainer-cls-selection-by-mode
  message: Dynamic trainer class selection based on training_mode. Each script should
    directly use its appropriate trainer class.
  severity: WARNING
  languages:
  - python
  pattern: '$TRAINER_CLS = _get_trainer_cls(training_mode=$MODE)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: invalid-input-error-mode-list-check
  message: Validation checking training_mode against multiple values. Each mode should
    have its own script.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: 'invalidInputError($VAR in [..., "lora", ...], ...)

      '
  - metavariable-regex:
      metavariable: $VAR
      regex: .*training.*mode.*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: conditional-relora-trainer-import
  message: Conditional import of ReLoRATrainer based on mode. ReLora scripts should
    import directly.
  severity: WARNING
  languages:
  - python
  pattern: "if $MODE == \"relora\":\n    from bigdl.llm.transformers.relora import\
    \ ReLoRATrainer\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mode-specific-config-in-training-args
  message: Training arguments with conditional values based on mode. Each script should
    have fixed configuration.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: '$ARGS(..., $PARAM=$VAL1 if $COND else $VAL2, ...)

      '
  - metavariable-regex:
      metavariable: $COND
      regex: .*training.*mode.*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-qlora-directory-structure-root
  message: Generic qlora_finetuning.py at QLoRA-FineTuning root. Should be in QLoRA/
    subdirectory with mode-specific name.
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/GPU/QLoRA-FineTuning/qlora_finetuning.py'
- id: old-export-merged-model-root-location
  message: export_merged_model.py at root of QLoRA-FineTuning. Should be copied to
    each mode-specific folder.
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/GPU/QLoRA-FineTuning/export_merged_model.py'
- id: old-readme-structure-description
  message: README describing old directory structure. Should describe new mode-separated
    organization.
  severity: WARNING
  languages:
  - generic
  pattern-regex: QLoRA.*FineTuning.*running.*QLoRA\s+finetuning
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/GPU/README.md'
- id: readme-in-qlora-finetuning-root
  message: README in QLoRA-FineTuning root directory. After refactoring, should document
    new LLM-Finetuning structure.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/GPU/QLoRA-FineTuning/README.md'
- id: training-mode-list-validation
  message: Multi-mode validation with all four modes. Each mode should have dedicated
    script without validation.
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: 'invalidInputError($VAR in ["qlora", "qalora", "lora", "relora"], ...)

      '
  - pattern: 'invalidInputError($VAR in [''qlora'', ''qalora'', ''lora'', ''relora''],
      ...)

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: training-mode-conditional-model-prep-lora
  message: Conditional model preparation for LoRA mode. LoRA scripts should implement
    directly.
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: "if $MODE == \"lora\":\n    $MODEL = ...\n"
  - pattern: "if $MODE == \"lora\":\n    ...\n    $MODEL = get_peft_model(...)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: training-mode-conditional-model-prep-qalora
  message: Conditional model preparation for QA-LoRA mode. QA-LoRA scripts should
    implement directly.
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: "if $MODE == \"qalora\":\n    $MODEL = ...\n"
  - pattern: "if $MODE == \"qalora\":\n    ...\n    $CONFIG = ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: trainer-cls-function-with-mode-parameter
  message: Function to get trainer class based on mode. Each script should directly
    use appropriate trainer.
  severity: WARNING
  languages:
  - python
  pattern: "def _get_trainer_cls($MODE):\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python-script-with-multi-mode-support
  message: Python script with multi-mode support and validation. Should be split into
    mode-specific scripts.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def train(..., training_mode: str = $DEFAULT, ...):\n    ...\n    invalidInputError($VAR\
      \ in [...], ...)\n    ...\n"
  - metavariable-regex:
      metavariable: $DEFAULT
      regex: '"(lora|qlora|qalora|relora)"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: docker-file-qlora-path-reference
  message: Docker configuration referencing old QLoRA-FineTuning path. Should use
    new structure.
  severity: WARNING
  languages:
  - dockerfile
  pattern-regex: example/GPU/QLoRA-FineTuning
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: gpu-readme-qlora-section
  message: Section link to QLoRA-FineTuning. Should link to mode-specific directories
    in new structure.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[QLoRA-FineTuning\]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/GPU/README.md'
- id: get-trainer-cls-function-definition
