  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$PKG.Register(..., $UC, ...)

      '
  - metavariable-pattern:
      metavariable: $UC
      pattern-regex: .*[uU]serOnlyContext.*
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
