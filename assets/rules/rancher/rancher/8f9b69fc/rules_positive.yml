  severity: INFO
  languages:
  - go
  pattern: "if err != nil {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 150
    nr_legacy_patterns: 0
  paths:
    include:
    - pkg/controllers/user/**/*.go
- id: refactor-controllers-user-functions
  message: Detected function in user controllers (consolidated from cluster/workload/helm
    controllers)
  severity: INFO
  languages:
  - go
  pattern: "func $FUNC(...) $RET {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 126
    nr_legacy_patterns: 0
  paths:
    include:
    - pkg/controllers/user/**/*.go
    exclude:
    - '**/*_test.go'
