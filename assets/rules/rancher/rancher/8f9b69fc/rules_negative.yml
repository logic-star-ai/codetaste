    include:
    - pkg/cluster/controller/**/*.go
    exclude:
    - '**/*_test.go'
- id: old-api-cluster-import
  message: Import from old location 'pkg/api/cluster' detected. Should be moved to
    'pkg/api/user'.
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/rancher/rancher/pkg/api/cluster"

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: old-api-cluster-package-reference
  message: Reference to old package path 'pkg/api/cluster' detected. Should use 'pkg/api/user'.
  severity: WARNING
  languages:
  - go
  pattern-regex: github\.com/rancher/rancher/pkg/api/cluster
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: old-import-block-api-cluster
  message: Import of 'pkg/api/cluster' in import block detected. Should be moved to
    'pkg/api/user'.
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "import (\n  ...\n  \"github.com/rancher/rancher/pkg/api/cluster\"\n\
      \  ...\n)\n"
  - pattern: "import (\n  ...\n  $ALIAS \"github.com/rancher/rancher/pkg/api/cluster\"\
      \n  ...\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: old-clustercontext-function-param
  message: Function parameter using 'config.ClusterContext' detected. Should be renamed
    to 'config.UserContext'.
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(..., $PARAM *config.ClusterContext, ...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
