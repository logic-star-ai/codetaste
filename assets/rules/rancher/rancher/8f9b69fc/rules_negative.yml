rules:
- id: old-clustercontext-comment-reference
  message: Reference to 'ClusterContext' in code detected. Should be renamed to 'UserContext'.
  severity: INFO
  languages:
  - go
  pattern-regex: ClusterContext
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    exclude:
    - '*.md'
    - '*.txt'
- id: old-go-file-in-management-controller
  message: Go file in old 'pkg/management/controller' directory. Should be moved to
    'pkg/controllers/management'.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - pkg/management/controller/**/*.go
    exclude:
    - '**/*_test.go'
- id: old-go-file-in-api-cluster
  message: Go file in old 'pkg/api/cluster' directory. Should be moved to 'pkg/api/user'.
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - pkg/api/cluster/**/*.go
    exclude:
    - '**/*_test.go'
- id: old-workloadcontext-comment-reference
  message: Reference to 'WorkloadContext' in code detected. Should be renamed to 'UserOnlyContext'.
  severity: INFO
  languages:
  - go
  pattern-regex: WorkloadContext
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    exclude:
    - '*.md'
    - '*.txt'
- id: old-go-file-in-cluster-controller
