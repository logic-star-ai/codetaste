- id: old-newclustercontext-call
  message: Function call 'config.NewClusterContext' detected. Should be renamed to
    'config.NewUserContext'.
  severity: WARNING
  languages:
  - go
  pattern: 'config.NewClusterContext(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-clustercontext-function-call-assignment
  message: Assignment from 'config.NewClusterContext' detected. Should use 'config.NewUserContext'
    instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$VAR, $ERR := config.NewClusterContext(...)

      '
  - pattern-not: '$VAR, $ERR := config.NewUserContext(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-clustercontext-single-assignment
  message: Assignment from 'config.NewClusterContext' (no error handling) detected.
    Should use 'config.NewUserContext' instead.
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := config.NewClusterContext(...)

    '
