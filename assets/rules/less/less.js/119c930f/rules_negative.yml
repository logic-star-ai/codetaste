rules:
- id: multiple-tree-class-assignments
  message: Multiple tree class assignments with function calls - refactor to direct
    requires
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: 'tree.$CLASS1 = require($PATH1)(...);

      ...

      tree.$CLASS2 = require($PATH2)(...);

      '
  - metavariable-regex:
      metavariable: $CLASS1
      regex: ^[A-Z].*
  - metavariable-regex:
      metavariable: $CLASS2
      regex: ^[A-Z].*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 496
- id: tree-dot-property-assignment-pattern
  message: Assigning class/constructor to tree property inside module wrapper - use
    direct exports
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: tree.$PROP = $VALUE
  - metavariable-regex:
      metavariable: $PROP
      regex: ^[A-Z].*
  - pattern-inside: "module.exports = function(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: general-require-invocation-pattern
  message: Tree module require() called with arguments - likely old dependency injection
    pattern
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)($ARG, ...)
  - metavariable-pattern:
      metavariable: $PATH
      patterns:
      - pattern-regex: ^['"]\./tree/.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: tree-property-assignment-with-call
  message: Tree property assigned from require() with parameters - dependency injection
    pattern. Use direct require().
  severity: WARNING
  languages:
  - javascript
  pattern: 'tree.$PROP = require($PATH)(...)

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: any-require-with-tree-only
  message: Tree module required with tree parameter - remove dependency injection
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: require($PATH)(tree)
  - metavariable-pattern:
      metavariable: $PATH
      patterns:
      - pattern-regex: ^['"]\./tree/.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: tree-dot-class-assignment-with-require-call
  message: Tree class assignment with function call to required module - old injection
    pattern. Use direct require().
  severity: WARNING
  languages:
  - javascript
  pattern: tree.$CLASS = require($PATH)($ARG)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: tree-property-class-with-require-invocation
  message: Tree property assigned class from require with parameter - old injection
    pattern
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: tree.$CLASS = require($PATH)($PARAM)
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^[A-Z].*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: tree-tocss-reference
  message: Assigning tree.toCSS to prototype - should inherit from Node base class
    with toCSS method
  severity: WARNING
  languages:
  - javascript
  pattern: 'toCSS: tree.toCSS

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
