rules:
- id: tree-node-has-node-require
  message: Tree node file has explicit Node require statement
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: 'var Node = require($PATH);

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 333
    nr_legacy_patterns: 0
  paths:
    include:
    - lib/less/tree/*.js
    exclude:
    - lib/less/tree/node.js
    - lib/less/tree/unit-conversions.js
- id: tree-js-no-wrapper-function
  message: tree.js exports flat structure without wrapper function
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: 'var tree = {};

      ...

      '
  - pattern-not-inside: 'module.exports = function (...) { ... }

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
  paths:
    include:
    - lib/less/tree.js
- id: no-wrapper-function-in-tree-nodes
  message: Tree node exports class directly without wrapper function
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: module.exports = $CLASS;
  - pattern-not: 'module.exports = function($TREE) { ... }

      '
  - pattern-not: 'module.exports = function($TREE, ...) { ... }

      '
  - metavariable-pattern:
      metavariable: $CLASS
      pattern-regex: ^[A-Z][a-zA-Z]*$
  metadata:
    category: dependency
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
  paths:
    include:
    - lib/less/tree/*.js
    exclude:
    - lib/less/tree/unit-conversions.js
- id: tree-node-inherits-from-node
  message: Tree node now inherits from Node base class using prototypal inheritance
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: '$CLASS.prototype = new Node();

        '
    - pattern: '$CLASS.prototype = Object.create(Node.prototype);

        '
  metadata:
    category: architecture
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    include:
    - lib/less/tree/*.js
- id: tree-node-class-constructor-pattern
  message: Tree node follows new pattern - constructor, Node inheritance, direct export
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: 'var $CLASS = function (...) { ... };

      $CLASS.prototype = new Node();

      ...

      module.exports = $CLASS;

      '
  - pattern-not-inside: 'module.exports = function(...) { ... }

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  paths:
    include:
    - lib/less/tree/*.js
- id: contexts-eval-env-usage
  message: Using contexts.evalEnv instead of tree.evalEnv
  severity: INFO
  languages:
  - javascript
  pattern-either:
  - pattern: contexts.evalEnv
  - pattern: new contexts.evalEnv(...)
  - pattern: contexts.evalEnv(...)
  metadata:
    category: api
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: contexts-usage-replaces-tree-env
  message: Using contexts.parseEnv or contexts.evalEnv instead of tree.*Env
  severity: INFO
  languages:
  - javascript
  pattern-either:
  - pattern: contexts.parseEnv
  - pattern: contexts.evalEnv
  metadata:
    category: api
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: tree-node-uses-node-methods
  message: Tree nodes use Node.prototype methods
  severity: INFO
  languages:
  - javascript
  pattern-either:
  - pattern: 'Node.prototype.$METHOD

      '
  - pattern: 'Node.prototype.$METHOD = ...

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - lib/less/tree/*.js
- id: new-contexts-eval-env
  message: Creating new instance of contexts.evalEnv
  severity: INFO
  languages:
  - javascript
  pattern: 'new contexts.evalEnv(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
