rules:
- id: parameter-with-varargs-servlet-context-initializer
  message: Varargs parameter ServletContextInitializer... uses old package, should
    use o.s.b.web.servlet
  severity: WARNING
  languages:
  - java
  pattern: '$METHOD(..., org.springframework.boot.context.embedded.ServletContextInitializer...
    $INITS) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: non-deprecated-class-in-context-embedded-for-servlet
  message: Non-deprecated class $CLASS should be moved from o.s.b.context.embedded
    to o.s.b.web.servlet
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "package org.springframework.boot.context.embedded;\n...\npublic class\
      \ $CLASS { \n  ...\n}\n"
  - pattern-not: "package org.springframework.boot.context.embedded;\n...\n@Deprecated\n\
      public class $CLASS { \n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $CLASS
      patterns:
      - pattern-either:
        - pattern: ServletContextInitializer
        - pattern: ErrorPage
        - pattern: FilterRegistrationBean
        - pattern: ServletRegistrationBean
        - pattern: ServletListenerRegistrationBean
        - pattern: DelegatingFilterProxyRegistrationBean
        - pattern: MultipartConfigFactory
        - pattern: RegistrationBean
        - pattern: AbstractFilterRegistrationBean
        - pattern: ServletContextInitializerBeans
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: error-page-constructor-with-status
  message: ErrorPage constructor call with import from old package o.s.b.context.embedded,
    should use o.s.b.web.servlet
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new ErrorPage($STATUS, $PATH)
  - pattern-inside: 'import org.springframework.boot.context.embedded.ErrorPage;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: non-deprecated-class-in-context-web-for-filter
  message: Non-deprecated class $CLASS should be moved from o.s.b.context.web to o.s.b.web.filter
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "package org.springframework.boot.context.web;\n...\npublic class $CLASS\
      \ { \n  ...\n}\n"
  - pattern-not: "package org.springframework.boot.context.web;\n...\n@Deprecated\n\
      public class $CLASS { \n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $CLASS
      patterns:
      - pattern-either:
        - pattern: ApplicationContextHeaderFilter
        - pattern: OrderedCharacterEncodingFilter
        - pattern: OrderedHiddenHttpMethodFilter
        - pattern: OrderedHttpPutFormContentFilter
        - pattern: OrderedRequestContextFilter
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: non-deprecated-class-in-context-web-for-support
  message: Non-deprecated class $CLASS should be moved from o.s.b.context.web to o.s.b.web.support
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "package org.springframework.boot.context.web;\n...\npublic class $CLASS\
      \ { \n  ...\n}\n"
  - pattern-not: "package org.springframework.boot.context.web;\n...\n@Deprecated\n\
      public class $CLASS { \n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $CLASS
      patterns:
      - pattern-either:
        - pattern: ErrorPageFilter
        - pattern: ServletContextApplicationContextInitializer
        - pattern: SpringBootServletInitializer
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: parameter-type-error-page-old-package
  message: Method parameter type ErrorPage uses old package o.s.b.context.embedded,
    should use o.s.b.web.servlet
  severity: WARNING
  languages:
  - java
  pattern: '$METHOD(org.springframework.boot.context.embedded.ErrorPage $PARAM, ...)
    { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-import-registration-bean
  message: RegistrationBean should be imported from org.springframework.boot.web.servlet,
    not org.springframework.boot.context.embedded
  severity: WARNING
  languages:
  - java
  pattern: import org.springframework.boot.context.embedded.RegistrationBean;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-import-servlet-context-initializer-beans
  message: ServletContextInitializerBeans should be imported from org.springframework.boot.web.servlet,
    not org.springframework.boot.context.embedded
  severity: WARNING
  languages:
  - java
  pattern: import org.springframework.boot.context.embedded.ServletContextInitializerBeans;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-import-application-context-header-filter
  message: ApplicationContextHeaderFilter should be imported from org.springframework.boot.web.filter,
    not org.springframework.boot.context.web
  severity: WARNING
  languages:
  - java
  pattern: import org.springframework.boot.context.web.ApplicationContextHeaderFilter;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: registration-bean-in-old-package
  message: RegistrationBean class file should be moved from o.s.b.context.embedded
    to o.s.b.web.servlet package
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/org/springframework/boot/context/embedded/RegistrationBean.java'
- id: abstract-filter-registration-bean-in-old-package
  message: AbstractFilterRegistrationBean class file should be moved from o.s.b.context.embedded
    to o.s.b.web.servlet package
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/org/springframework/boot/context/embedded/AbstractFilterRegistrationBean.java'
- id: servlet-context-initializer-beans-in-old-package
  message: ServletContextInitializerBeans class file should be moved from o.s.b.context.embedded
    to o.s.b.web.servlet package
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/org/springframework/boot/context/embedded/ServletContextInitializerBeans.java'
- id: application-context-header-filter-in-old-package
  message: ApplicationContextHeaderFilter class file should be moved from o.s.b.context.web
    to o.s.b.web.filter package
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/org/springframework/boot/context/web/ApplicationContextHeaderFilter.java'
- id: servlet-context-initializer-interface-in-old-package
  message: ServletContextInitializer interface should be in o.s.b.web.servlet, not
    o.s.b.context.embedded
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "package org.springframework.boot.context.embedded;\n...\npublic interface\
      \ ServletContextInitializer {\n  ...\n}\n"
  - pattern-not: "package org.springframework.boot.context.embedded;\n...\n@Deprecated\n\
      public interface ServletContextInitializer {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: multipart-config-factory-with-builder-methods-in-old-package
  message: MultipartConfigFactory implementation should be in o.s.b.web.servlet, not
    o.s.b.context.embedded
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "package org.springframework.boot.context.embedded;\n...\npublic class\
      \ MultipartConfigFactory {\n  ...\n  public void setMaxFileSize($SIZE) { ...\
      \ }\n  ...\n}\n"
  - pattern-not: "package org.springframework.boot.context.embedded;\n...\n@Deprecated\n\
      public class MultipartConfigFactory {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cast-to-servlet-context-initializer-old-package
  message: Cast to ServletContextInitializer uses old package o.s.b.context.embedded,
    should use o.s.b.web.servlet
  severity: WARNING
  languages:
  - java
  pattern: (org.springframework.boot.context.embedded.ServletContextInitializer) $EXPR
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: varargs-parameter-error-page-old-package
  message: Varargs parameter ErrorPage... uses old package, should use o.s.b.web.servlet
  severity: WARNING
  languages:
  - java
  pattern: '$METHOD(..., org.springframework.boot.context.embedded.ErrorPage... $PAGES)
    { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: application-context-header-filter-constructor
  message: ApplicationContextHeaderFilter constructor with import from old package,
    should use o.s.b.web.filter
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: new ApplicationContextHeaderFilter($CTX)
  - pattern-inside: 'import org.springframework.boot.context.web.ApplicationContextHeaderFilter;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: instanceof-check-servlet-context-initializer
  message: instanceof check for ServletContextInitializer uses old package, should
    use o.s.b.web.servlet
  severity: WARNING
  languages:
  - java
  pattern: $EXPR instanceof org.springframework.boot.context.embedded.ServletContextInitializer
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
