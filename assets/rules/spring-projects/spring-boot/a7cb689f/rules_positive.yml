    detected
  severity: INFO
  languages:
  - java
  pattern: 'import org.springframework.boot.web.servlet.ServletContextInitializer;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
