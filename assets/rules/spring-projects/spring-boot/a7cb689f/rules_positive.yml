  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/org/springframework/boot/web/servlet/*.java'
    exclude:
    - '**/view/**'
    - '**/ServletComponent*.java'
