rules:
- id: detect-resource-config-data-location-type-reference
  message: Type reference to ResourceConfigDataLocation should be changed to StandardConfigDataResource.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: ResourceConfigDataLocation $VAR = ...;
  - pattern: ResourceConfigDataLocation $VAR;
  - pattern: new ResourceConfigDataLocation(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: detect-config-data-location-not-found-action-reference
  message: ConfigDataLocationNotFoundAction should be renamed to ConfigDataNotFoundAction.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: ConfigDataLocationNotFoundAction.$METHOD
  - pattern: ConfigDataLocationNotFoundAction $VAR = ...;
  - pattern: ConfigDataLocationNotFoundAction $VAR;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: detect-enum-fail-reference
  message: Reference to ConfigDataLocationNotFoundAction.FAIL should use ConfigDataNotFoundAction.FAIL.
  severity: WARNING
  languages:
  - java
  pattern: ConfigDataLocationNotFoundAction.FAIL
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-class-extending-config-data-location
  message: Classes should not extend ConfigDataLocation (except in new design where
    it's a String wrapper). They should extend ConfigDataResource instead.
  severity: WARNING
  languages:
  - java
  pattern: 'class $CLASS extends ConfigDataLocation { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-list-of-resource-config-data-location
  message: List<ResourceConfigDataLocation> should be changed to List<StandardConfigDataResource>.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: List<ResourceConfigDataLocation> $VAR = ...;
  - pattern: List<ResourceConfigDataLocation> $VAR;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-optional-config-data-location-type-reference
  message: OptionalConfigDataLocation type should not be used. ConfigDataLocation
    handles optional prefix directly.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: OptionalConfigDataLocation $VAR = ...;
  - pattern: OptionalConfigDataLocation $VAR;
  - pattern: new OptionalConfigDataLocation(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-resolve-method-with-boolean-optional-param
  message: Method signature with boolean 'optional' parameter should be refactored.
    The new ConfigDataLocation class should encapsulate optional handling.
  severity: WARNING
  languages:
  - java
  pattern: 'List<$RET> resolve(ConfigDataLocationResolverContext $CTX, String $LOC,
    boolean optional) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-variable-name-wrapped-location
  message: Variable with OptionalConfigDataLocation suggests wrapping pattern. Use
    ConfigDataLocation directly with optional handling.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: 'OptionalConfigDataLocation $VAR = ...;

      '
  - pattern: '$TYPE $WRAPPED = new OptionalConfigDataLocation(...);

      '
  - pattern: 'ConfigDataLocation $WRAPPED = new OptionalConfigDataLocation(...);

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-override-resolve-with-boolean-optional
  message: Override of resolve() with boolean optional should be refactored. Method
    signature should use ConfigDataLocation with optional state.
  severity: WARNING
  languages:
  - java
  pattern: '@Override

    public List<$TYPE> resolve(ConfigDataLocationResolverContext $CTX, String $LOC,
    boolean optional) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-optional-location-constructor-call
  message: OptionalConfigDataLocation constructor should not be used. ConfigDataLocation
    handles optional state.
  severity: WARNING
  languages:
  - java
  pattern: 'new OptionalConfigDataLocation($LOC)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-resolve-profile-specific-call-with-boolean
  message: Call to resolveProfileSpecific() with boolean optional parameter should
    be refactored. Use ConfigDataLocation that encapsulates optional state.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: $RESOLVER.resolveProfileSpecific($CTX, $LOC, true, $PROF)
  - pattern: $RESOLVER.resolveProfileSpecific($CTX, $LOC, false, $PROF)
  - pattern: $RESOLVER.resolveProfileSpecific($CTX, $LOC, $BOOL, $PROF)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-static-optional-prefix-on-location-class
  message: ConfigDataLocation.OPTIONAL_PREFIX suggests old abstract class pattern.
    In new design, ConfigDataLocation should be concrete String wrapper.
  severity: WARNING
  languages:
  - java
  pattern: ConfigDataLocation.OPTIONAL_PREFIX
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-resolve-profile-specific-with-boolean-optional
  message: Method signature with boolean 'optional' parameter should be refactored.
    Optional handling should be in ConfigDataLocation class.
  severity: WARNING
  languages:
  - java
  pattern: 'List<$RET> resolveProfileSpecific(ConfigDataLocationResolverContext $CTX,
    String $LOC, boolean optional, Profiles $PROF) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-handle-method-with-location-not-found-exception
  message: Handle method with ConfigDataLocationNotFoundException should be updated
    for new exception hierarchy.
  severity: WARNING
  languages:
  - java
  pattern: 'void handle(Log $LOGGER, Object $LOC, ConfigDataLocationNotFoundException
    $EX) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-variable-name-optionallocation
  message: Variable named 'optionalLocation' suggests old OptionalConfigDataLocation
    pattern.
  severity: WARNING
  languages:
  - java
  pattern: '$TYPE optionalLocation = ...;

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-old-property-key-on-location-not-found
  message: Property key 'spring.config.on-location-not-found' should be renamed to
    'spring.config.on-not-found'.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: '"spring.config.on-location-not-found"

      '
  - pattern: '''spring.config.on-location-not-found''

      '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-optional-config-data-location-wrap-all
  message: OptionalConfigDataLocation.wrapAll() should not be used. ConfigDataLocation
    should handle optional prefix internally.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: OptionalConfigDataLocation.wrapAll($LOCS)
  - pattern: $X.wrapAll($LOCS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-optional-config-data-location-unwrap
  message: OptionalConfigDataLocation.unwrap() should not be used. ConfigDataLocation
    should handle optional state internally.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: OptionalConfigDataLocation.unwrap($LOC)
  - pattern: OptionalConfigDataLocation.<$T>unwrap($LOC)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-cast-to-resource-config-data-location
  message: Cast to ResourceConfigDataLocation should be changed to StandardConfigDataResource.
  severity: WARNING
  languages:
  - java
  pattern: (ResourceConfigDataLocation) $EXPR
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-cast-to-optional-config-data-location
  message: Cast to OptionalConfigDataLocation should not be used. Use ConfigDataLocation
    methods instead.
  severity: WARNING
  languages:
  - java
  pattern: (OptionalConfigDataLocation) $EXPR
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-catch-config-data-location-not-found-only
  message: Catch block for ConfigDataLocationNotFoundException may need to catch base
    ConfigDataNotFoundException or handle both location and resource not found exceptions.
  severity: WARNING
  languages:
  - java
  pattern: 'catch (ConfigDataLocationNotFoundException $EX) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-manual-optional-prefix-removal
  message: Manual removal of 'optional:' prefix should be replaced with ConfigDataLocation.getNonPrefixedValue()
    or getValue() method.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: $STR.substring(ConfigDataLocation.OPTIONAL_PREFIX.length())
  - pattern: $STR.substring(9)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-javadoc-reference-to-resource-config-data-location
  message: Javadoc reference to ResourceConfigDataLocation should be changed to StandardConfigDataResource.
  severity: WARNING
  languages:
  - java
  pattern-regex: '[@{]link\s+ResourceConfigDataLocation[}]'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-private-resolve-method-with-optional-param
  message: Private resolve method with boolean optional parameter should be refactored.
    ConfigDataLocation should encapsulate optional state.
  severity: WARNING
  languages:
  - java
  pattern: 'private List<ConfigDataLocation> resolve(..., boolean optional, ...) {
    ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-override-resolve-profile-specific-with-boolean
  message: Override of resolveProfileSpecific() with boolean should be refactored.
    Use ConfigDataLocation with optional state.
  severity: WARNING
  languages:
  - java
  pattern: '@Override

    public List<$TYPE> resolveProfileSpecific(ConfigDataLocationResolverContext $CTX,
    String $LOC, boolean optional, Profiles $PROF) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-optional-config-data-location-class
  message: OptionalConfigDataLocation class should be removed. The new ConfigDataLocation
    class should handle optional prefix directly.
  severity: WARNING
  languages:
  - java
  pattern: class OptionalConfigDataLocation extends ConfigDataLocation { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-resource-config-data-location-class-name
  message: ResourceConfigDataLocation should be renamed to StandardConfigDataResource
    and extend ConfigDataResource (not ConfigDataLocation).
  severity: WARNING
  languages:
  - java
  pattern: class ResourceConfigDataLocation extends ConfigDataLocation { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-resource-config-data-loader-class-name
  message: ResourceConfigDataLoader should be renamed to StandardConfigDataLoader
    and use ConfigDataResource type.
  severity: WARNING
  languages:
  - java
  pattern: 'class ResourceConfigDataLoader implements ConfigDataLoader<$LOC> { ...
    }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-resource-config-data-location-resolver-class-name
  message: ResourceConfigDataLocationResolver should be renamed to StandardConfigDataResourceResolver.
  severity: WARNING
  languages:
  - java
  pattern: 'class ResourceConfigDataLocationResolver implements ConfigDataLocationResolver<$LOC>
    { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-config-data-location-not-found-action-enum
  message: ConfigDataLocationNotFoundAction should be renamed to ConfigDataNotFoundAction.
  severity: WARNING
  languages:
  - java
  pattern: enum ConfigDataLocationNotFoundAction { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-abstract-config-data-location-class
  message: ConfigDataLocation should be a concrete class that wraps String values
    with optional prefix handling, not an abstract class.
  severity: WARNING
  languages:
  - java
  pattern: 'public abstract class ConfigDataLocation { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-method-param-with-resource-config-data-location
  message: Method parameter type ResourceConfigDataLocation should be changed to StandardConfigDataResource.
  severity: WARNING
  languages:
  - java
  pattern: '$RET $METHOD(..., ResourceConfigDataLocation $PARAM, ...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-instanceof-resource-config-data-location
  message: instanceof check for ResourceConfigDataLocation should be changed to StandardConfigDataResource.
  severity: WARNING
  languages:
  - java
  pattern: $VAR instanceof ResourceConfigDataLocation
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-instanceof-optional-config-data-location
  message: instanceof check for OptionalConfigDataLocation should not be used. Check
    ConfigDataLocation.isOptional() instead.
  severity: WARNING
  languages:
  - java
  pattern: $VAR instanceof OptionalConfigDataLocation
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-method-returning-resource-config-data-location
  message: Method return type ResourceConfigDataLocation should be changed to StandardConfigDataResource.
  severity: WARNING
  languages:
  - java
  pattern: 'ResourceConfigDataLocation $METHOD(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-config-data-loader-with-resource-location
  message: ConfigDataLoader<ResourceConfigDataLocation> should use StandardConfigDataResource
    instead.
  severity: WARNING
  languages:
  - java
  pattern: 'class $CLASS implements ConfigDataLoader<ResourceConfigDataLocation> {
    ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-config-data-location-resolver-with-resource-location
  message: ConfigDataLocationResolver<ResourceConfigDataLocation> should use StandardConfigDataResource
    instead.
  severity: WARNING
  languages:
  - java
  pattern: 'class $CLASS implements ConfigDataLocationResolver<ResourceConfigDataLocation>
    { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-throw-config-data-location-not-found-exception
  message: Throwing ConfigDataLocationNotFoundException directly may need review.
    Consider if this should be ConfigDataResourceNotFoundException based on context.
  severity: WARNING
  languages:
  - java
  pattern: throw new ConfigDataLocationNotFoundException($LOC);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-on-location-not-found-property-usage
  message: Property 'spring.config.on-location-not-found' should be renamed to 'spring.config.on-not-found'.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: $BINDER.bind("spring.config.on-location-not-found", ...)
  - pattern: $ENV.getProperty("spring.config.on-location-not-found")
  - pattern: $PROPS.getProperty("spring.config.on-location-not-found")
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-javadoc-reference-to-optional-config-data-location
  message: Javadoc reference to OptionalConfigDataLocation should be removed or changed
    to ConfigDataLocation.
  severity: WARNING
  languages:
  - java
  pattern-regex: '[@{]link\s+OptionalConfigDataLocation[}]'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-config-tree-location-extends-config-data-location
  message: ConfigTreeConfigDataLocation extending ConfigDataLocation suggests old
    hierarchy. Should extend ConfigDataResource instead.
  severity: WARNING
  languages:
  - java
  pattern: 'class ConfigTreeConfigDataLocation extends ConfigDataLocation { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-location-instanceof-optional-in-assignment
  message: Checking instanceof OptionalConfigDataLocation should be refactored. Use
    ConfigDataLocation.isOptional() instead.
  severity: WARNING
  languages:
  - java
  pattern: 'boolean $VAR = $LOC instanceof OptionalConfigDataLocation;

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-ternary-unwrap-optional-location
  message: Ternary expression with OptionalConfigDataLocation.unwrap() should be refactored.
    ConfigDataLocation handles optional state.
  severity: WARNING
  languages:
  - java
  pattern: '$LOC = (!$COND) ? $LOC : OptionalConfigDataLocation.unwrap($LOC);

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-lambda-calling-resolve-profile-specific-with-boolean
  message: Lambda calling resolveProfileSpecific() with boolean should be refactored.
    Use ConfigDataLocation with optional state.
  severity: WARNING
  languages:
  - java
  pattern: () -> $RESOLVER.resolveProfileSpecific($CTX, $LOC, $BOOL, $PROF)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-config-data-location-list-add-with-optional-wrap
  message: Adding OptionalConfigDataLocation to list should be refactored. Use ConfigDataLocation
    with optional state.
  severity: WARNING
  languages:
  - java
  pattern: $LIST.add(new OptionalConfigDataLocation($LOC))
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-foreach-lambda-wrapping-optional
  message: forEach wrapping locations in OptionalConfigDataLocation should be refactored.
    Use ConfigDataLocation directly.
  severity: WARNING
  languages:
  - java
  pattern: $LOCS.forEach(($LOC) -> $LIST.add(new OptionalConfigDataLocation($LOC)))
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-assert-type-optional-config-data-location
  message: Assertion checking for OptionalConfigDataLocation type should not be used.
    Check ConfigDataLocation.isOptional() instead.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: assertThat($VAR).isInstanceOf(OptionalConfigDataLocation.class)
  - pattern: assertTrue($VAR instanceof OptionalConfigDataLocation)
  - pattern: assertEquals(OptionalConfigDataLocation.class, $VAR.getClass())
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-class-literal-resource-config-data-location
  message: Class literal for ResourceConfigDataLocation/OptionalConfigDataLocation
    suggests old type usage. Update to new types.
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: ResourceConfigDataLocation.class
  - pattern: OptionalConfigDataLocation.class
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-resource-config-data-location-filename
  message: File ResourceConfigDataLocation.java should be renamed to StandardConfigDataResource.java
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ResourceConfigDataLocation.java'
- id: detect-resource-config-data-loader-filename
  message: File ResourceConfigDataLoader.java should be renamed to StandardConfigDataLoader.java
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ResourceConfigDataLoader.java'
- id: detect-resource-config-data-location-resolver-filename
  message: File ResourceConfigDataLocationResolver.java should be renamed to StandardConfigDataResourceResolver.java
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ResourceConfigDataLocationResolver.java'
- id: detect-optional-config-data-location-filename
  message: File OptionalConfigDataLocation.java should be removed. ConfigDataLocation
    should handle optional prefix directly.
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/OptionalConfigDataLocation.java'
- id: detect-config-data-location-not-found-action-filename
  message: File ConfigDataLocationNotFoundAction.java should be renamed to ConfigDataNotFoundAction.java
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ConfigDataLocationNotFoundAction.java'
- id: detect-test-class-name-resource-config-data-location
  message: Test class ResourceConfigDataLocationTests should be renamed to StandardConfigDataResourceTests.
  severity: WARNING
  languages:
  - java
  pattern: 'class ResourceConfigDataLocationTests { ... }

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-test-class-name-optional-config-data-location
  message: Test class OptionalConfigDataLocationTests should be removed. ConfigDataLocation
    tests should cover optional handling.
  severity: WARNING
  languages:
  - java
  pattern: 'class OptionalConfigDataLocationTests { ... }

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-test-class-name-resource-config-data-loader
  message: Test class ResourceConfigDataLoaderTests should be renamed to StandardConfigDataLoaderTests.
  severity: WARNING
  languages:
  - java
  pattern: 'class ResourceConfigDataLoaderTests { ... }

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-test-class-name-resource-config-data-location-resolver
  message: Test class ResourceConfigDataLocationResolverTests should be renamed to
    StandardConfigDataResourceResolverTests.
  severity: WARNING
  languages:
  - java
  pattern: 'class ResourceConfigDataLocationResolverTests { ... }

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-default-method-with-optional-param
  message: Default method with boolean optional parameter should be refactored. ConfigDataLocation
    should handle optional state.
  severity: WARNING
  languages:
  - java
  pattern: 'default List<$TYPE> resolveProfileSpecific(..., boolean optional, ...)
    { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-method-call-returning-resource-location
  message: Method call returning ResourceConfigDataLocation should return StandardConfigDataResource.
  severity: WARNING
  languages:
  - java
  pattern: 'ResourceConfigDataLocation $VAR = $OBJ.$METHOD(...);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-resource-config-data-location-test-filename
  message: Test file ResourceConfigDataLocationTests.java should be renamed to StandardConfigDataResourceTests.java
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ResourceConfigDataLocationTests.java'
- id: detect-resource-config-data-loader-test-filename
  message: Test file ResourceConfigDataLoaderTests.java should be renamed to StandardConfigDataLoaderTests.java
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ResourceConfigDataLoaderTests.java'
- id: detect-resource-config-data-location-resolver-test-filename
  message: Test file ResourceConfigDataLocationResolverTests.java should be renamed
    to StandardConfigDataResourceResolverTests.java
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
