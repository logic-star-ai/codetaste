rules:
- id: kri-from-with-sectionname-param
  message: kri.From() should not take sectionName parameter. Use kri.From() and then
    kri.WithSectionName() if needed
  severity: WARNING
  languages:
  - go
  pattern: 'kri.From($RESOURCE, $SECTION)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
- id: kri-from-name-param
  message: kri.From() with name parameter. Use kri.WithSectionName(kri.From($R), $NAME)
  severity: WARNING
  languages:
  - go
  pattern: 'kri.From($R, $NAME)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
- id: kri-from-empty-string-explicit
  message: kri.From() with empty string for section name. Use kri.From($R) without
    section parameter
  severity: WARNING
  languages:
  - go
  pattern: 'kri.From($R, "")

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: kri-from-old-api-with-variable
  message: kri.From() with variable section name. Use kri.WithSectionName(kri.From($R),
    $VAR)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: kri.From($R, $VAR)
  - pattern-not: kri.From($R, "")
  - pattern-not: kri.From($R, fmt.Sprintf(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: kri-fromresourcemeta-with-sectionname-param
  message: kri.FromResourceMeta() should not take sectionName parameter. Use kri.FromResourceMeta()
    and then kri.WithSectionName() if needed
  severity: WARNING
  languages:
  - go
  pattern: 'kri.FromResourceMeta($META, $TYPE, $SECTION)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: kri-fromresourcemeta-name-param
  message: kri.FromResourceMeta() with name parameter. Use kri.WithSectionName(kri.FromResourceMeta($M,
    $T), $NAME)
  severity: WARNING
  languages:
  - go
  pattern: 'kri.FromResourceMeta($M, $T, $NAME)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: kri-fromresourcemeta-empty-string-explicit
  message: kri.FromResourceMeta() with empty string for section name. Use kri.FromResourceMeta($M,
    $T) without section parameter
  severity: WARNING
  languages:
  - go
  pattern: 'kri.FromResourceMeta($M, $T, "")

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: kri-resourceornull-method
  message: Method 'ResourceOrNil()' should be renamed to 'Resource()' and return value-based
    'kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "func ($RECV $TYPE) ResourceOrNil() *kri.Identifier {\n  ...\n}\n"
  - pattern: $X.ResourceOrNil()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: ref-resourceornul-call-pattern
  message: ResourceOrNil() method call should be replaced with Resource() and IsEmpty()
    check
  severity: WARNING
  languages:
  - go
  pattern: '$REF.ResourceOrNil()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: kri-from-call-old-signature
  message: kri.From() with non-empty sectionName. Use kri.From($R) then kri.WithSectionName($S)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: kri.From($R, $S)
  - pattern-not: kri.From($R, "")
  - metavariable-regex:
      metavariable: $S
      regex: ^[^"']
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: kri-from-with-section-name-string
  message: kri.From() with section name. Use kri.WithSectionName(kri.From($R), $S)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: kri.From($R, $S)
  - metavariable-regex:
      metavariable: $S
      regex: ^"[^"]+"$
  - pattern-not: kri.From($R, "")
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: resourceorigin-parenthesized-nil-check
  message: Parenthesized ResourceOrigin nil check. Replace with IsEmpty() method
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: ($R.ResourceOrigin != nil)
  - pattern: ($R.ResourceOrigin == nil)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*/xds/*.go'
    - '*/core/xds/*.go'
- id: kri-nosectionname-on-pointer
  message: Calling NoSectionName on dereferenced pointer. Use value-based kri.Identifier
  severity: WARNING
  languages:
  - go
  pattern: 'kri.NoSectionName(*$PTR)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: kri-identifier-pointer-in-composite-literal
  message: Creating pointer to kri.Identifier. Use value-based kri.Identifier
  severity: WARNING
  languages:
  - go
  pattern: "&kri.Identifier{\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    exclude:
    - '*/plugin_test.go'
- id: resourceorigin-nil-check-simple-eq
  message: Nil check on ResourceOrigin. Replace with 'IsEmpty()' method check
  severity: WARNING
  languages:
  - go
  pattern: '$X.ResourceOrigin == nil

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*/xds/*.go'
    - '*/core/xds/*.go'
- id: kri-from-field-assignment-with-section
  message: kri.From() with section name in assignment. Use kri.WithSectionName(kri.From($R),
    $S)
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := kri.From($R, $S)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: kri-identifier-pointer-function-param
  message: Function parameter '$PARAM' uses pointer '*kri.Identifier'. Replace with
    value-based 'kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(..., $PARAM *kri.Identifier, ...) $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: kri-identifier-pointer-function-return
  message: Function returns pointer '*kri.Identifier'. Replace with value-based 'kri.Identifier'
    and use IsEmpty() check
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(...) *kri.Identifier {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: kri-identifier-pointer-method-return
  message: Method returns pointer '*kri.Identifier'. Replace with value-based 'kri.Identifier'
    and use IsEmpty() check
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV $TYPE) $METHOD(...) *kri.Identifier {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: backendref-resourceornul-nil-check
  message: ResourceOrNil() with nil check should be replaced with Resource() and IsEmpty()
    check
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "if $REF := $DEST.BackendRef.ResourceOrNil(); $REF != nil {\n  ...\n\
      }\n"
  - pattern: "if $VAR := $X.ResourceOrNil(); $VAR != nil {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: backendref-resourceornul-call-pattern
  message: ResourceOrNil() method call should be replaced with Resource() and IsEmpty()
    check
  severity: WARNING
  languages:
  - go
  pattern: '$DEST.BackendRef.ResourceOrNil()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: resourceornul-in-conditional-assignment
  message: ResourceOrNil() in conditional. Replace with Resource() and use IsEmpty()
    check
  severity: WARNING
  languages:
  - go
  pattern: 'if $VAR := $EXPR.ResourceOrNil(); $VAR != nil { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: realref-resourceornul-check-pattern
  message: Using ResourceOrNil() with nil check. Replace with Resource() and IsEmpty()
    check
  severity: WARNING
  languages:
  - go
  pattern: 'if realRef := dest.BackendRef.ResourceOrNil(); realRef != nil { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: kri-identifier-pointer-function-return-named
  message: Function returns named pointer '*kri.Identifier'. Use value-based 'kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(...) (result *kri.Identifier) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: kri-identifier-pointer-method-return-named
  message: Method returns named pointer '*kri.Identifier'. Use value-based 'kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: 'func ($R $T) $METHOD(...) (result *kri.Identifier) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: resourceornul-assignment-to-variable
  message: Assigning ResourceOrNil() result. Replace with Resource() and check IsEmpty()
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := $EXPR.ResourceOrNil()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: resourceornul-field-assignment
  message: Assigning ResourceOrNil() result to field. Replace with Resource() method
  severity: WARNING
  languages:
  - go
  pattern: '$FIELD = $EXPR.ResourceOrNil()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: kri-identifier-pointer-variable-declaration
  message: Variable declared as pointer '*kri.Identifier'. Use value-based 'kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: 'var $VAR *kri.Identifier

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: targetreftokri-call-with-resourcemeta
  message: TargetRefToKRI() called with ResourceMeta. Update to accept kri.Identifier
    origin
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'TargetRefToKRI($META, $REF)

      '
  - metavariable-type:
      metavariable: $META
      type: core_model.ResourceMeta
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: resourceorigin-nil-check-simple
  message: Nil check on ResourceOrigin. Replace with 'IsEmpty()' method check
  severity: WARNING
  languages:
  - go
  pattern: '$X.ResourceOrigin != nil

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/xds/*.go'
    - '*/core/xds/*.go'
- id: resourceorigin-nil-or-condition
  message: Complex nil check on ResourceOrigin. Use IsEmpty() method
  severity: WARNING
  languages:
  - go
  pattern: '$R.ResourceOrigin == nil || ($R.ResourceOrigin != nil && ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: resource-struct-field-declaration-pointer
  message: Struct field 'Resource' declared as pointer '*kri.Identifier'. Should be
    value-based 'kri.Identifier'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type $TYPE struct {\n  ...\n  Resource *kri.Identifier\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^(Outbound|RealResourceBackendRef)$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: outbound-resource-nil-check-pattern
  message: Checking ResourceOrNil() == nil. Replace with Resource() and IsEmpty()
    check
  severity: WARNING
  languages:
  - go
  pattern: 'if ref == nil || ref.ResourceOrNil() == nil { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: backendref-service-resourceornul-assignment
  message: Assigning ResourceOrNil() to ResourceOrigin. Use Resource() method instead
  severity: WARNING
  languages:
  - go
  pattern: 'ResourceOrigin: service.BackendRef().ResourceOrNil()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: backendref-service-backendref-resourceornul
  message: Calling ResourceOrNil() on BackendRef(). Use Resource() method instead
  severity: WARNING
  languages:
  - go
  pattern: 'service.BackendRef().ResourceOrNil()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: kri-from-sectionname-field-access
  message: kri.From() with SectionName field. Use kri.WithSectionName(kri.From($R),
    $EXPR.SectionName)
  severity: WARNING
  languages:
  - go
  pattern: 'kri.From($R, $EXPR.SectionName)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: kri-identifier-return-nil-only
  message: Function returns nil for *kri.Identifier. Should return empty kri.Identifier{}
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(...) *kri.Identifier {\n  ...\n  return nil\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: kri-identifier-method-return-nil-only
  message: Method returns nil for *kri.Identifier. Should return empty kri.Identifier{}
  severity: WARNING
  languages:
  - go
  pattern: "func ($R $T) $METHOD(...) *kri.Identifier {\n  ...\n  return nil\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: resourceorigin-nil-binary-expression
  message: Binary expression with ResourceOrigin nil check. Replace with IsEmpty()
    method
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $R.ResourceOrigin == nil && $OTHER
  - pattern: $OTHER && $R.ResourceOrigin == nil
  - pattern: $R.ResourceOrigin != nil && $OTHER
  - pattern: $OTHER && $R.ResourceOrigin != nil
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/xds/*.go'
    - '*/core/xds/*.go'
- id: core-xds-resource-resourceorigin-pointer
  message: core_xds.Resource.ResourceOrigin should be value-based 'kri.Identifier'
    not '*kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: "type Resource struct {\n  ...\n  ResourceOrigin *kri.Identifier\n  ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/core/xds/resource.go'
- id: xds-types-outbound-resource-pointer
  message: xds_types.Outbound.Resource should be value-based 'kri.Identifier' not
    '*kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: "type Outbound struct {\n  ...\n  Resource *kri.Identifier\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/xds/types/outbound.go'
    - '*/core/xds/types/outbound.go'
- id: xds-types-externalservice-ownerresource-pointer
  message: xds_types.ExternalService.OwnerResource should be value-based 'kri.Identifier'
    not '*kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: "type ExternalService struct {\n  ...\n  OwnerResource *kri.Identifier\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/xds/types.go'
    - '*/core/xds/types.go'
- id: resolve-realresourcebackendref-resource-pointer
  message: resolve.RealResourceBackendRef.Resource should be value-based 'kri.Identifier'
    not '*kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: "type RealResourceBackendRef struct {\n  ...\n  Resource *kri.Identifier\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/policies/core/rules/resolve/backendref.go'
- id: backendref-call-with-resourcemeta-origin
  message: BackendRef() called with ResourceMeta. Update to accept kri.Identifier
    origin
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'BackendRef($META, $REF, $RESOLVER)

      '
  - metavariable-type:
      metavariable: $META
      type: core_model.ResourceMeta
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: resourceornul-method-definition
  message: Method 'ResourceOrNil()' should be renamed to 'Resource()' and return value-based
    'kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: 'func (rbr *ResolvedBackendRef) ResourceOrNil() *kri.Identifier { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/policies/core/rules/resolve/backendref.go'
- id: backendref-function-signature-old
  message: BackendRef() should accept kri.Identifier origin instead of core_model.ResourceMeta
  severity: WARNING
  languages:
  - go
  pattern: 'func BackendRef(meta core_model.ResourceMeta, br common_api.BackendRef,
    resolver LabelResourceIdentifierResolver) (ResolvedBackendRef, bool) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/policies/core/rules/resolve/backendref.go'
- id: backendrefornul-function-signature-old
  message: BackendRefOrNil() should accept kri.Identifier origin instead of core_model.ResourceMeta
  severity: WARNING
  languages:
  - go
  pattern: 'func BackendRefOrNil(meta core_model.ResourceMeta, br common_api.BackendRef,
    resolver LabelResourceIdentifierResolver) *ResolvedBackendRef { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/policies/core/rules/resolve/backendref.go'
- id: targetreftokri-function-signature-old
  message: TargetRefToKRI() should accept kri.Identifier origin instead of core_model.ResourceMeta
  severity: WARNING
  languages:
  - go
  pattern: 'func TargetRefToKRI(meta core_model.ResourceMeta, tr common_api.TargetRef)
    kri.Identifier { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/policies/core/rules/resolve/backendref.go'
- id: label-resource-identifier-resolver-returns-pointer
  message: LabelResourceIdentifierResolver returns pointer. Should return value-based
    'kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: 'type LabelResourceIdentifierResolver func(core_model.ResourceType, map[string]string)
    *kri.Identifier

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/policies/core/rules/resolve/backendref.go'
- id: realresourcebackendref-struct-def-with-pointer
  message: RealResourceBackendRef.Resource should be value-based 'kri.Identifier'
  severity: WARNING
  languages:
  - go
  pattern: "type RealResourceBackendRef struct {\n  Resource *kri.Identifier\n  Weight\
    \   uint\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/policies/core/rules/resolve/backendref.go'
- id: ownerresource-nil-check-simple
  message: Nil check on OwnerResource field. Replace with 'IsEmpty()' method check
  severity: WARNING
  languages:
  - go
  pattern: '$ES.OwnerResource != nil

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/xds/*.go'
    - '*/core/xds/*.go'
- id: kri-from-function-def-with-sectionname
  message: From() function signature includes sectionName parameter. Remove sectionName
    parameter
  severity: WARNING
  languages:
  - go
  pattern: 'func From(r core_model.Resource, sectionName string) Identifier { ...
    }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/core/kri/kri.go'
- id: kri-fromresourcemeta-function-def-with-sectionname
  message: FromResourceMeta() function signature includes sectionName parameter. Remove
    sectionName parameter
  severity: WARNING
  languages:
  - go
  pattern: 'func FromResourceMeta(rm core_model.ResourceMeta, resourceType core_model.ResourceType,
    sectionName string) Identifier { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/core/kri/kri.go'
- id: resourceorigin-field-deref-in-comparison
  message: Dereferencing ResourceOrigin field pointer. Use value-based kri.Identifier
  severity: WARNING
  languages:
  - go
  pattern: '*$X.ResourceOrigin

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/xds/*.go'
    - '*/core/xds/*.go'
- id: resourceorigin-struct-field-declaration-pointer
  message: Struct field 'ResourceOrigin' declared as pointer '*kri.Identifier'. Should
    be value-based 'kri.Identifier'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type $TYPE struct {\n  ...\n  ResourceOrigin *kri.Identifier\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^Resource$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: ownerresource-struct-field-declaration-pointer
  message: Struct field 'OwnerResource' declared as pointer '*kri.Identifier'. Should
    be value-based 'kri.Identifier'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type $TYPE struct {\n  ...\n  OwnerResource *kri.Identifier\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^ExternalService$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: nonmeshexternalservice-function-pattern
  message: Function uses ResourceOrigin nil checks. Replace with IsEmpty() method
  severity: WARNING
