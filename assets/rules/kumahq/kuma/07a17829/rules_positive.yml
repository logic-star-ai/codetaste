rules:
- id: kri-from-without-sectionname-param
  message: Detected kri.From() call without sectionName parameter (refactored API)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: kri.From($R)
  - pattern-not: kri.From($R, $SECTION)
  metadata:
    category: api
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: kri-from-called-without-third-arg
  message: Detected kri.From() called with single argument (sectionName removed)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: kri.From($ARG1)
  - pattern-not: kri.From($ARG1, $ARG2)
  - pattern-not: kri.From($ARG1, $ARG2, $ARG3)
  metadata:
    category: api
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: kri-from-called-in-function-body
  message: Detected kri.From() call without sectionName in function body
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  - pattern: kri.From($R)
  - pattern-not: kri.From($R, $SECTION)
  metadata:
    category: api
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
- id: kri-identifier-in-function-call-arg
  message: Detected kri function result passed directly as argument (value-based)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $FUNC(..., kri.From($R), ...)
    - pattern: $FUNC(..., kri.FromResourceMeta($META, $TYPE), ...)
  - pattern-not-inside: '$FUNC(..., pointer.To(...), ...)

      '
  metadata:
    category: basic
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: kri-from-two-arg-call-removed
  message: Detected kri.From() with single argument (sectionName parameter removed)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: kri.From($R)
  - pattern-not: kri.From($R, $SECTION)
  - pattern-inside: "func $FUNC(...) {\n  ...\n  kri.From($R)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: kri-identifier-passed-to-function-call
  message: Detected kri.From() result passed directly to function (value-based)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $FUNC(..., kri.From($R), ...)
  - pattern-not: $FUNC(..., pointer.To(kri.From($R)), ...)
  metadata:
    category: basic
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: kri-fromresourcemeta-without-sectionname-param
  message: Detected kri.FromResourceMeta() call without sectionName parameter (refactored
    API)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: kri.FromResourceMeta($META, $TYPE)
  - pattern-not: kri.FromResourceMeta($META, $TYPE, $SECTION)
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: kri-fromresourcemeta-called-with-two-args
  message: Detected kri.FromResourceMeta() called with two arguments (sectionName
    removed)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: kri.FromResourceMeta($ARG1, $ARG2)
  - pattern-not: kri.FromResourceMeta($ARG1, $ARG2, $ARG3)
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: kri-struct-field-initialization-value-type
  message: Detected struct field initialization with value-based kri.Identifier
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'Resource: kri.$FUNC(...)

        '
    - pattern: 'ResourceOrigin: kri.$FUNC(...)

        '
    - pattern: 'OwnerResource: kri.$FUNC(...)

        '
  - pattern-not-regex: .*pointer\.To.*
  metadata:
    category: basic
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: kri-identifier-isempty-method-call
  message: Detected IsEmpty() method call on kri.Identifier (refactored pattern)
  severity: INFO
  languages:
  - go
  pattern: $ID.IsEmpty()
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: kri-withsectionname-chained-with-from
  message: Detected WithSectionName chained with From/FromResourceMeta (new API pattern)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: kri.WithSectionName(kri.From($R), $NAME)
    - pattern: kri.WithSectionName(kri.FromResourceMeta($META, $TYPE), $NAME)
  metadata:
    category: api
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: kri-withsectionname-replaces-from-section-param
  message: Detected WithSectionName wrapping From/FromResourceMeta (replacement for
    section parameter)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: kri.WithSectionName(kri.From($R), $SECTION)
    - pattern: kri.WithSectionName(kri.FromResourceMeta($META, $TYPE), $SECTION)
  - pattern-not: kri.From($R, $SECTION)
  metadata:
    category: api
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: kri-resource-method-call-on-struct
  message: Detected Resource() method call (refactored from ResourceOrNil)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.Resource()
  - pattern-not-inside: 'if $OBJ.ResourceOrNil() != nil { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: kri-isempty-used-in-validation
  message: Detected IsEmpty() used in validation logic
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "if $COND {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $COND
      patterns:
      - pattern-either:
        - pattern: $ID.IsEmpty()
        - pattern: '!$ID.IsEmpty()'
  metadata:
    category: basic
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: kri-fromresourcemeta-called-in-function-body
  message: Detected kri.FromResourceMeta() call without sectionName in function body
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  - pattern: kri.FromResourceMeta($META, $TYPE)
  - pattern-not: kri.FromResourceMeta($META, $TYPE, $SECTION)
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: kri-from-in-conditional-expression
  message: Detected kri.From() without sectionName in conditional block
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "if $COND {\n  ...\n  kri.From($R)\n  ...\n}\n"
  - pattern-not: 'kri.From($R, $SECTION)

      '
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: kri-isempty-negation-check
  message: Detected negated IsEmpty() check (refactored from != nil check)
  severity: INFO
  languages:
  - go
  pattern: '!$ID.IsEmpty()

    '
  metadata:
    category: basic
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: kri-fromresourcemeta-two-arg-call-removed
  message: Detected kri.FromResourceMeta() with two arguments (sectionName parameter
    removed)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: kri.FromResourceMeta($META, $TYPE)
  - pattern-not: kri.FromResourceMeta($META, $TYPE, $SECTION)
  - pattern-inside: "func $FUNC(...) {\n  ...\n  kri.FromResourceMeta($META, $TYPE)\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: kri-identifier-fromresourcemeta-passed-to-function
  message: Detected kri.FromResourceMeta() result passed directly to function (value-based)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $FUNC(..., kri.FromResourceMeta($META, $TYPE), ...)
  - pattern-not: $FUNC(..., pointer.To(kri.FromResourceMeta(...)), ...)
  metadata:
    category: basic
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: kri-identifier-isempty-check-in-condition
  message: Detected IsEmpty() check in conditional (refactored from nil check)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'if $ID.IsEmpty() { ... }

        '
    - pattern: 'if !$ID.IsEmpty() { ... }

        '
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: kri-from-used-in-comparison
  message: Detected comparison with kri.From() result (value-based)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: kri.From($R) == $OTHER
    - pattern: kri.From($R) != $OTHER
    - pattern: $OTHER == kri.From($R)
    - pattern: $OTHER != kri.From($R)
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: kri-identifier-nil-check-removed
  message: Detected IsEmpty() check replacing nil check pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "if $ID.IsEmpty() {\n  ...\n}\n"
    - pattern: "if !$ID.IsEmpty() {\n  ...\n}\n"
  - pattern-not: "if $ID == nil {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: kri-isempty-called-on-field
  message: Detected IsEmpty() called on struct field (value-based identifier)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $OBJ.Resource.IsEmpty()
    - pattern: $OBJ.ResourceOrigin.IsEmpty()
    - pattern: $OBJ.OwnerResource.IsEmpty()
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: kri-identifier-assignment-from-method-call
  message: Detected assignment from Resource() method (refactored from ResourceOrNil)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$VAR := $OBJ.Resource()

      '
  - pattern-not: '$VAR := $OBJ.ResourceOrNil()

      '
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: kri-from-in-variable-initialization
  message: Detected variable initialization with kri.From() result (value-based)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$VAR := kri.From($R)

      '
  - pattern-not-inside: '$VAR := pointer.To(kri.From($R))

      '
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: kri-from-single-param-in-assignment
  message: Detected assignment from kri.From() with single parameter (sectionName
    removed)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$VAR = kri.From($R)

      '
  - pattern-not: '$VAR = kri.From($R, $SECTION)

      '
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: kri-fromresourcemeta-in-conditional-expression
  message: Detected kri.FromResourceMeta() without sectionName in conditional block
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "if $COND {\n  ...\n  kri.FromResourceMeta($META, $TYPE)\n  ...\n}\n"
  - pattern-not: 'kri.FromResourceMeta($META, $TYPE, $SECTION)

      '
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: kri-from-result-assigned-to-local-var
  message: Detected kri.From() result assigned to local variable (value-based)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$VAR := kri.From($R)

      '
  - pattern-not-inside: '$VAR := pointer.To(...)

      '
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: kri-isempty-in-ternary-or-logical-expr
  message: Detected IsEmpty() in logical expression (refactored pattern)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '$A && $ID.IsEmpty()

        '
    - pattern: '$ID.IsEmpty() && $A

        '
    - pattern: '$A || $ID.IsEmpty()

        '
    - pattern: '$ID.IsEmpty() || $A

        '
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: kri-function-param-named-origin-value-type
  message: Detected function with 'origin' parameter as value-based kri.Identifier
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func $FUNC(..., origin kri.Identifier, ...) { ... }

        '
    - pattern: 'func $FUNC(..., origin kri.Identifier, ...) $RET { ... }

        '
    - pattern: 'func ($RECV $TYPE) $FUNC(..., origin kri.Identifier, ...) { ... }

        '
    - pattern: 'func ($RECV $TYPE) $FUNC(..., origin kri.Identifier, ...) $RET { ...
        }

        '
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: kri-isempty-in-early-return
  message: Detected early return with IsEmpty() check
  severity: INFO
  languages:
  - go
  pattern: "if $ID.IsEmpty() {\n  return ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: kri-isempty-check-with-negation-in-if
  message: Detected negated IsEmpty() check in if statement (refactored from nil check)
  severity: INFO
  languages:
  - go
  pattern: "if !$VAR.IsEmpty() {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: kri-isempty-in-function-guard
  message: Detected IsEmpty() used as guard condition in function
  severity: INFO
  languages:
  - go
  pattern: "func $FUNC(...) {\n  ...\n  if $ID.IsEmpty() {\n    return ...\n  }\n\
    \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: kri-var-declaration-value-type
  message: Detected variable declaration with value-based kri.Identifier type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'var $VAR kri.Identifier

        '
    - pattern: 'var $VAR kri.Identifier = ...

        '
  - pattern-not: 'var $VAR *kri.Identifier

      '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: kri-value-type-in-resource-struct
  message: Detected refactored Resource struct using value-based kri.Identifier for
    ResourceOrigin field
  severity: INFO
  languages:
  - go
  pattern: "type Resource struct {\n  ...\n  ResourceOrigin kri.Identifier\n  ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-value-type-in-outbound-struct
  message: Detected refactored Outbound struct using value-based kri.Identifier for
    Resource field
  severity: INFO
  languages:
  - go
  pattern: "type Outbound struct {\n  ...\n  Resource kri.Identifier\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-value-type-in-externalservice-struct
  message: Detected refactored ExternalService struct using value-based kri.Identifier
    for OwnerResource field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type ExternalService struct {\n  ...\n  OwnerResource kri.Identifier\n\
      \  ...\n}\n"
  - pattern-not: "type ExternalService struct {\n  ...\n  OwnerResource *kri.Identifier\n\
      \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-value-type-in-realresourcebackendref-struct
  message: Detected refactored RealResourceBackendRef struct using value-based kri.Identifier
    for Resource field
  severity: INFO
  languages:
  - go
  pattern: "type RealResourceBackendRef struct {\n  ...\n  Resource kri.Identifier\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: resource-method-returning-value
  message: Detected Resource() method returning value-based kri.Identifier (refactored
    from ResourceOrNil)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func ($RECV $TYPE) Resource() kri.Identifier { ... }

      '
  - pattern-not: 'func ($RECV $TYPE) Resource() *kri.Identifier { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: backendref-with-kri-identifier-origin
  message: Detected BackendRef() call with kri.Identifier origin parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: BackendRef($ORIGIN, $BR, $RESOLVER)
  - metavariable-type:
      metavariable: $ORIGIN
      type: kri.Identifier
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: targetref-to-kri-with-identifier-origin
  message: Detected TargetRefToKRI() call with kri.Identifier origin parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: TargetRefToKRI($ORIGIN, $TR)
  - metavariable-type:
      metavariable: $ORIGIN
      type: kri.Identifier
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-withsectionname-in-return-statement
  message: Detected return statement using kri.WithSectionName() (new API)
  severity: INFO
  languages:
  - go
  pattern: 'return kri.WithSectionName($ID, $NAME)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-resolver-returning-value-type
  message: Detected function type returning value-based kri.Identifier
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'type $NAME func(...) kri.Identifier

      '
  - pattern-not: 'type $NAME func(...) *kri.Identifier

      '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-isempty-in-return-condition
  message: Detected IsEmpty() check in return statement
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'return ..., $ID.IsEmpty()

        '
    - pattern: 'return ..., !$ID.IsEmpty()

        '
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-targetrefto-kri-signature-with-identifier-param
  message: Detected TargetRefToKRI() with kri.Identifier origin parameter (refactored
    signature)
  severity: INFO
  languages:
  - go
  pattern: "func TargetRefToKRI(origin kri.Identifier, ...) kri.Identifier {\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-backendref-signature-with-identifier-param
  message: Detected BackendRef() with kri.Identifier origin parameter (refactored
    signature)
  severity: INFO
  languages:
  - go
  pattern: "func BackendRef(origin kri.Identifier, ...) (...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-identifier-field-ownerresource-value-access
  message: Detected direct field access on OwnerResource field (value-based, no dereference)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $OBJ.OwnerResource.$FIELD
    - pattern: $OBJ.OwnerResource.String()
    - pattern: $OBJ.OwnerResource.HasSectionName()
  - pattern-not: '$OBJ.OwnerResource.$METHOD(...)

      '
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-resolver-func-type-returns-value
  message: Detected LabelResourceIdentifierResolver returning value-based kri.Identifier
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'type LabelResourceIdentifierResolver func(...) kri.Identifier

      '
  - pattern-not: 'type LabelResourceIdentifierResolver func(...) *kri.Identifier

      '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-backendref-ornill-returns-pointer-to-struct
  message: Detected BackendRefOrNil with kri.Identifier origin parameter (refactored
    signature)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func BackendRefOrNil(...) *ResolvedBackendRef {\n  ...\n  return &$VAR\n\
      \  ...\n}\n"
  - pattern-inside: "func BackendRefOrNil(origin kri.Identifier, ...) *ResolvedBackendRef\
      \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-targetrefto-kri-called-with-identifier
  message: Detected TargetRefToKRI() called with identifier-like parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: TargetRefToKRI($ORIGIN, $TR)
  - metavariable-regex:
      metavariable: $ORIGIN
      regex: ^(origin|id|identifier|kri|resourceId)$
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-backendref-called-with-identifier
  message: Detected BackendRef() called with identifier-like parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: BackendRef($ORIGIN, $BR, $RESOLVER)
  - metavariable-regex:
      metavariable: $ORIGIN
      regex: ^(origin|id|identifier|kri|resourceId)$
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-mesh-context-resolver-returns-value
  message: Detected MeshContext.ResolveResourceIdentifier returning value-based kri.Identifier
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV *MeshContext) ResolveResourceIdentifier(...) kri.Identifier\
    \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-destination-index-resolver-returns-value
  message: Detected DestinationIndex.ResolveResourceIdentifier returning value-based
    kri.Identifier
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV *DestinationIndex) ResolveResourceIdentifier(...) kri.Identifier\
    \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: kri-realresourcebackendref-resource-field-value-type
  message: Detected RealResourceBackendRef.Resource as value-based kri.Identifier
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type RealResourceBackendRef struct {\n  ...\n  Resource kri.Identifier\n\
      \  ...\n}\n"
  - pattern-not: "type RealResourceBackendRef struct {\n  ...\n  Resource *kri.Identifier\n\
      \  ...\n}\n"
