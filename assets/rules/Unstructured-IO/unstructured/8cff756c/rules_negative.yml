    to use subcommand architecture.
  severity: WARNING
  languages:
  - python
  pattern: "if remote_url:\n    protocol = urlparse(remote_url).scheme\n    if protocol\
    \ in (\"s3\", \"s3a\"):\n        ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
