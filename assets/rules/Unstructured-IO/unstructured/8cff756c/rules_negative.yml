rules:
- id: detect-doc-connector-assignment
  message: Connector assignment in main function detected. Should be moved to connector-specific
    runner.
  severity: WARNING
  languages:
  - python
  pattern: doc_connector = $CONNECTOR(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - '*/ingest/main.py'
- id: detect-connector-import-pattern
  message: Connector import at module level in main.py. Should be in connector-specific
    subcommand module.
  severity: WARNING
  languages:
  - python
  pattern: 'from unstructured.ingest.connector.$CONN import $CONNECTOR

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - '*/ingest/main.py'
- id: detect-biomed-prefixed-parameter-usage
  message: Old Biomed-prefixed parameter detected. Should be renamed without prefix
    in Biomed subcommand.
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: biomed_path
  - pattern: biomed_api_id
  - pattern: biomed_api_from
  - pattern: biomed_api_until
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-ms-prefixed-parameter-usage
  message: Old Microsoft-prefixed parameter detected. Should be renamed without prefix
    in OneDrive/Outlook subcommands.
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: ms_client_id
  - pattern: ms_client_cred
  - pattern: ms_tenant
  - pattern: ms_user_pname
  - pattern: ms_onedrive_folder
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-hashlib-sha256-connector-selection
  message: Hash-based directory name generation in connector selection logic. Should
    be in connector-specific runner.
  severity: WARNING
  languages:
  - python
  pattern: 'hashed_dir_name = hashlib.sha256($STR.encode("utf-8"))

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*/ingest/main.py'
