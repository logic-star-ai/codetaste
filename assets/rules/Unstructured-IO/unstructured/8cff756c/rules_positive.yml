rules:
- id: subcommand-function-calls-runner
  message: Detected subcommand function calling runner function
  severity: INFO
  languages:
  - python
  pattern: "def $SUBCMD(...):\n  ...\n  $RUNNER(...)\n  ...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - unstructured/ingest/cli/cmds/*.py
- id: click-command-decorator-for-subcommand
  message: Detected click.command() decorator for individual subcommand
  severity: INFO
  languages:
  - python
  pattern: "@click.command(...)\ndef $SUBCMD(...):\n  ...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - unstructured/ingest/cli/cmds/*.py
- id: multiple-subcommand-files-exist
