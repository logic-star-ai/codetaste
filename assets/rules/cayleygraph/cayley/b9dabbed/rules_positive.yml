- id: graph-ref-iterator-resolver-package
  message: Iterator package uses graph.Ref (refactored from graph.Value)
  severity: INFO
  languages:
  - go
  pattern-regex: graph\.Ref
  metadata:
    category: architecture
    nr_refactored_patterns: 98
    nr_legacy_patterns: 0
  paths:
    include:
    - graph/iterator/*.go
    exclude:
    - graph/iterator/resolver.go
- id: graph-ref-in-function-call-args
  message: Function call with graph.Ref argument (refactored from graph.Value)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $FUNC(..., $ARG, ...)
  - metavariable-type:
      metavariable: $ARG
      type: graph.Ref
  metadata:
    category: basic
    nr_refactored_patterns: 66
    nr_legacy_patterns: 0
- id: graph-ref-interface-method-parameter
  message: Function accepts graph.Ref parameter (refactored from graph.Value)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func ($RECV $TYPE) $METHOD(..., $ARG graph.Ref, ...) $RET { ... }

      '
  - metavariable-pattern:
      metavariable: $METHOD
