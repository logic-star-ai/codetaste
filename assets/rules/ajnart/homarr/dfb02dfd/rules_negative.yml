rules:
- id: fetch-call-in-async-arrow-function
  message: fetch() in async arrow function to old API. Should use tRPC client methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "async () => {\n  ...\n  fetch($URL)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: fetch-without-await
  message: fetch() without await to old API. Should use tRPC client methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: fetch($URL)
  - pattern-not: await fetch($URL)
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: fetch-api-modules-regex
  message: fetch() call to /api/modules/* detected. Should use tRPC client methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: fetch\([`'"]\/api\/modules\/
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: fetch-response-json-variable-api
  message: fetch() followed by .json() for API call. Should use tRPC client methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '$VAR = await fetch($URL)

      ...

      $VAR.json()

      '
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: const-res-await-fetch-api
  message: Storing fetch() response to old API. Should use tRPC client methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const $RES = await fetch($URL)

      '
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: async-function-with-fetch-api
  message: Async function with fetch() to old API. Should use tRPC client methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "async function $FN(...) {\n  ...\n  fetch($URL)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: axios-get-api-regex
  message: axios.get() call to old API endpoint detected. Should use tRPC client methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: axios\.get\([`'"]\/api\/(modules|configs|docker|icons)\/
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: fetch-to-api-modules-endpoint
  message: 'Direct fetch() call to /api/modules/*. Should use tRPC client: api.<router>.<procedure>.useQuery()
    or useMutation()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: fetch($URL, ...)
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27]/api/modules/.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: axios-get-without-await
  message: axios.get() without await to old API. Should use tRPC client methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: axios.get($URL)
  - pattern-not: await axios.get($URL)
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27`]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: query-param-string-construction
  message: Manual query parameter construction. tRPC handles input parameters with
    validation.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \?[a-z]+=\$\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - src/components/**/*.tsx
    - src/modules/**/*.tsx
- id: axios-get-to-api-modules
  message: 'axios.get() to /api/modules/*. Should use tRPC: api.<router>.<procedure>.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: axios.get($URL, ...)
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27]/api/modules/.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: axios-put-template-literal-api-configs
  message: 'axios.put() with template literal to /api/configs/*. Should use tRPC:
    api.config.save.useMutation()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: axios.put(`/api/configs/${...}`, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: axios-put-with-body
  message: 'axios.put() with body to old API. Should use tRPC: api.<router>.<procedure>.useMutation()
    with input.'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: axios.put($URL, { ... })
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27`]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: axios-put-api-regex
  message: 'axios.put() call to /api/configs/* detected. Should use tRPC: api.config.save.useMutation()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: axios\.put\([`'"]\/api\/configs\/
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: fetch-api-configs-regex
  message: 'fetch() call to /api/configs* detected. Should use tRPC: api.config methods.'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: fetch\([`'"]\/api\/configs
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: axios-response-data-access
  message: axios.get() followed by .data access for API call. Should use tRPC which
    returns data directly.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '$RES = await axios.get($URL)

      ...

      $RES.data

      '
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27`]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: axios-get-await-in-variable
  message: Storing axios.get() result in variable for old API. Should use tRPC client
    methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const $VAR = await axios.get($URL)

      '
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27`]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: axios-call-in-async-arrow-function
  message: axios.get() in async arrow function to old API. Should use tRPC client
    methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "async () => {\n  ...\n  axios.get($URL)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27`]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: query-key-with-manual-api-string
  message: Manual query key that likely references old API. tRPC generates query keys
    automatically.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'queryKey: [''$KEY'', ...]

      '
  - metavariable-regex:
      metavariable: $KEY
      regex: ^(containers|ping|overseerr|configs|config|docker)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: axios-variable-assignment
  message: Storing axios response in variable. tRPC returns data directly.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const $VAR = await axios.$METHOD(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - src/components/**/*.tsx
    - src/modules/**/*.tsx
- id: fetch-to-api-configs-endpoint
  message: 'Direct fetch() call to /api/configs/*. Should use tRPC client: api.config.<procedure>.useQuery()
    or useMutation()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: fetch($URL, ...)
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27]/api/configs.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fetch-api-configs-all-endpoint
  message: fetch('/api/configs') should be replaced with api.config.all.useQuery()
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: fetch('/api/configs')
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: axios-get-overseerr-endpoint
  message: 'axios.get() to /api/modules/overseerr. Should use tRPC: api.overseerr.search.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: axios.get(`/api/modules/overseerr?query=${...}`)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fetch-then-json-api-call
  message: fetch().then().json() pattern for API call. Should use tRPC client methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'fetch($URL).then(($RES) => $RES.json())

      '
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27`]/api/.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: await-fetch-json-api-call
  message: await (await fetch()).json() pattern for API call. Should use tRPC client
    methods.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'await (await fetch($URL)).json()

      '
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fetch-api-modules-ping
  message: 'fetch() to /api/modules/ping. Should use tRPC: api.app.ping.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: fetch(`/api/modules/ping?url=${...}`)
    - pattern: fetch('/api/modules/ping', ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fetch-api-modules-downloads
  message: 'fetch() to /api/modules/downloads. Should use tRPC: api.download.queue.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: fetch('/api/modules/downloads', ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: axios-get-docker-container-action
  message: 'axios.get() to /api/docker/container with action. Should use tRPC: api.docker.start/stop/restart.useMutation()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: axios.get(`/api/docker/container/${...}?action=${...}`)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: axios-get-containers-data-access
  message: 'axios.get(''/api/docker/containers'') with .data access. Should use tRPC:
    api.docker.list.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '$VAR = await axios.get(''/api/docker/containers'')

    ...

    $VAR.data

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fetch-api-modules-media-server
  message: 'fetch() to /api/modules/media-server. Should use tRPC: api.mediaServer.sessions.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: fetch('/api/modules/media-server', ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fetch-api-modules-media-requests
  message: 'fetch() to /api/modules/media-requests. Should use tRPC: api.mediaRequest.requests.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: fetch('/api/modules/media-requests', ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: axios-then-catch-pattern
  message: axios.get().then().catch() to old API. Should use tRPC with error handling.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'axios.get($URL).then(...).catch(...)

      '
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27`]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: return-await-fetch-json
  message: Returning await (await fetch()).json(). Should use tRPC which returns data
    directly.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'return await (await fetch($URL)).json()

      '
  - metavariable-regex:
      metavariable: $URL
      regex: ^["\x27]/api/(modules|configs|docker|icons).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fetch-api-ping-with-query
  message: 'fetch() to /api/modules/ping with URL query param. Should use tRPC: api.app.ping.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: fetch(`/api/modules/ping?url=${...}`)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fetch-api-ping-encodeuri
  message: 'fetch() to /api/modules/ping with encodeURI. Should use tRPC: api.app.ping.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: fetch(`/api/modules/ping?url=${encodeURI(...)}`)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: const-containers-axios-get
  message: 'axios.get(''/api/docker/containers''). Should use tRPC: api.docker.list.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const $VAR = await axios.get(''/api/docker/containers'')

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fetch-api-configs-no-params
  message: 'fetch(''/api/configs''). Should use tRPC: api.config.all.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: fetch('/api/configs')
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: axios-get-api-docker-containers
  message: 'axios.get(''/api/docker/containers''). Should use tRPC: api.docker.list.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: axios.get('/api/docker/containers')
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: querykey-containers-string
  message: Query key 'containers' for manual fetch. tRPC manages query keys automatically.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'queryKey: [''containers'']

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: querykey-config-get-all
  message: Query key 'config/get-all' for manual fetch. tRPC manages query keys automatically.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'queryKey: [''config/get-all'']

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: querykey-array-with-id-param
  message: Manual query key with parameters. tRPC generates query keys from procedure
    inputs automatically.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'queryKey: [''$NAME'', { id: ..., ... }]

      '
  - metavariable-regex:
      metavariable: $NAME
      regex: ^(ping|docker|overseerr|config)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: encodeuri-in-api-call
  message: Using encodeURI for API parameters. tRPC handles parameter encoding automatically.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: encodeURI(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/components/**/*.tsx
    - src/modules/**/*.tsx
- id: fetch-api-icons-endpoint
  message: 'fetch() call to /api/icons* detected. Should use tRPC: api.icon methods.'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: fetch\([`'"]\/api\/icons
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: axios-get-overseerr-query
  message: 'axios.get() to /api/modules/overseerr with query. Should use tRPC: api.overseerr.search.useQuery()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: axios.get(`/api/modules/overseerr?query=${$QUERY}`)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: containers-data-return
  message: Returning .data property. tRPC returns typed data directly.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'return $VAR.data

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/modules/**/*.tsx
- id: querykey-ping-id-name
  message: Manual query key for ping. tRPC generates query keys automatically.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'queryKey: [''ping'', { id: ..., name: ... }]

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: response-variable-assignment
  message: Storing fetch response in variable. tRPC handles response parsing automatically.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const $VAR = await fetch(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/components/**/*.tsx
    - src/modules/**/*.tsx
- id: await-response-json
  message: await response.json() call. tRPC returns parsed data automatically.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: await $RES.json()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/components/**/*.tsx
    - src/modules/**/*.tsx
