rules:
- id: detect-synccontext-sync-event-import
  message: Detected usage of generic event types from synccontext package - refactoring
    applied
  severity: INFO
  languages:
  - go
  pattern-regex: synccontext\.(SyncEvent|SyncToHostEvent|SyncToVirtualEvent)
  metadata:
    category: api
    nr_refactored_patterns: 106
    nr_legacy_patterns: 0
- id: detect-generic-event-type-reference-in-code
  message: Detected reference to generic event type from synccontext - generic types
    in use
  severity: INFO
  languages:
  - go
  pattern-regex: synccontext\.Sync(Event|ToHostEvent|ToVirtualEvent)\[.*\]
  metadata:
    category: api
    nr_refactored_patterns: 93
    nr_legacy_patterns: 0
- id: detect-synccontext-event-import-pattern
  message: Detected synccontext event type with generic parameter - generic event
    types in use
  severity: INFO
  languages:
  - go
  pattern-regex: synccontext\.(Sync.*Event)\[
  metadata:
    category: api
    nr_refactored_patterns: 93
    nr_legacy_patterns: 0
- id: detect-generic-event-function-parameter
  message: Detected function with generic event parameter - refactoring applied
  severity: INFO
  languages:
  - go
  pattern-regex: func.*\(.*event \*synccontext\.(SyncEvent|SyncToHostEvent|SyncToVirtualEvent)\[
  metadata:
    category: api
    nr_refactored_patterns: 83
    nr_legacy_patterns: 0
- id: detect-sync-event-with-generic-type-any-resource
  message: Detected generic event type with pointer type parameter - Go generics in
    syncer
  severity: INFO
  languages:
  - go
  pattern-regex: \*synccontext\.(SyncEvent|SyncToHostEvent|SyncToVirtualEvent)\[\*
  metadata:
    category: api
    nr_refactored_patterns: 81
    nr_legacy_patterns: 0
- id: detect-generic-syncer-receiver-method
  message: Detected receiver method with generic event parameter - refactoring to
    event-based API
  severity: INFO
  languages:
  - go
  pattern-regex: func \(\w+ \*\w+\) \w+\([^)]*\*synccontext\.(SyncEvent|SyncToHostEvent|SyncToVirtualEvent)\[
  metadata:
    category: api
    nr_refactored_patterns: 81
    nr_legacy_patterns: 0
- id: detect-event-parameter-in-sync-methods-simple
  message: Detected sync method with 'event' parameter - refactoring from pObj/vObj
    to event object
  severity: INFO
  languages:
  - go
  pattern-regex: func \(\w+ \*\w+\) Sync\w*\([^,]+, event \*synccontext\.
  metadata:
    category: api
    nr_refactored_patterns: 80
    nr_legacy_patterns: 0
- id: detect-event-context-usage-pattern
  message: Detected usage of event API methods - generic event pattern in use
  severity: INFO
  languages:
  - go
  pattern-regex: event\.(SourceObject|TargetObject|IsDelete)\(\)
  metadata:
    category: api
    nr_refactored_patterns: 78
    nr_legacy_patterns: 0
- id: detect-generic-event-with-any-k8s-resource
  message: Detected generic event with any Kubernetes API resource type - comprehensive
    refactoring
  severity: INFO
  languages:
  - go
  pattern-regex: \*synccontext\.(SyncEvent|SyncToHostEvent|SyncToVirtualEvent)\[\*[a-z0-9]+v[0-9]+\.
  metadata:
    category: api
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
- id: detect-event-receiver-methods-pattern
  message: Detected syncer receiver with event parameter - syncer methods refactored
    to use events
  severity: INFO
  languages:
  - go
  pattern-regex: func \([a-z]+ \*\w+Syncer\) (Sync|SyncToHost|SyncToVirtual)\([^)]*event
    \*synccontext\.
  metadata:
    category: api
    nr_refactored_patterns: 74
    nr_legacy_patterns: 0
- id: detect-event-object-access-pattern
  message: Detected field access on event object methods - new event API pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $EVENT.SourceObject().$FIELD
    - pattern: $EVENT.TargetObject().$FIELD
  metadata:
    category: api
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
- id: detect-event-source-object-call
  message: Detected event.SourceObject() call - new generic event API in use
  severity: INFO
  languages:
  - go
  pattern: $EVENT.SourceObject()
  metadata:
    category: api
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: detect-event-target-object-call
  message: Detected event.TargetObject() call - new generic event API in use
  severity: INFO
  languages:
  - go
  pattern: $EVENT.TargetObject()
  metadata:
    category: api
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: detect-generic-sync-to-host-event-any-resource
  message: Detected SyncToHostEvent with any K8s resource - comprehensive host sync
    refactoring
  severity: INFO
  languages:
  - go
  pattern-regex: \*synccontext\.SyncToHostEvent\[\*[a-z0-9]+v[0-9]+\.\w+
  metadata:
    category: api
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: detect-generic-sync-to-virtual-event-any-resource
