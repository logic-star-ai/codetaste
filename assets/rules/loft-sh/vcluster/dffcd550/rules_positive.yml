- id: detect-event-is-delete-call
  message: Detected event.IsDelete() call - new generic event API in use
  severity: INFO
  languages:
  - go
  pattern: $EVENT.IsDelete()
  metadata:
    category: api
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: detect-event-based-conditional-is-delete
  message: Detected conditional using event.IsDelete() - new event API in use
  severity: INFO
  languages:
  - go
  pattern: "if $EVENT.IsDelete() {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: detect-event-based-deletion-check
  message: Detected event-based deletion check pattern - new IsDelete() API in use
  severity: INFO
  languages:
  - go
  pattern: "if $EVENT.IsDelete() {\n  ...\n  return $RESULT\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: detect-event-based-if-condition-simple
  message: Detected simple if block with event.IsDelete() - new deletion check pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "if $EVENT.IsDelete() {\n  $X\n}\n"
  - metavariable-pattern:
      metavariable: $X
      patterns:
      - pattern-not: '...

          '
  metadata:
    category: api
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
