    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: detect-sync-method-without-pobj-vobj-params
  message: Detected Sync method with single event param instead of pObj/vObj - signature
    refactoring complete
  severity: INFO
  languages:
  - go
  pattern-regex: func \([a-z]+ \*\w+Syncer\) Sync\([^,]+, event \*synccontext\.SyncEvent
  metadata:
    category: api
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
