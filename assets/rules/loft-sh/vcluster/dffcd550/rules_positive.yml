rules:
- id: event-field-access-in-logic
  message: Detected event fields used in business logic - refactoring applied
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: $E.Virtual
      - pattern: $E.Host
    - metavariable-regex:
        metavariable: $E
        regex: ^(event|evt|e|ev|syncEvent)$
  pattern-sinks:
  - pattern: $FUNC(...)
  metadata:
    nr_refactored_patterns: 440
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: event-virtual-object-access
  message: Detected access to Virtual field on event - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $EVENT.Virtual
  - metavariable-regex:
      metavariable: $EVENT
      regex: ^(event|evt|e|ev|syncEvent)$
  metadata:
    nr_refactored_patterns: 385
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: event-host-object-access
  message: Detected access to Host field on event - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $EVENT.Host
  - metavariable-regex:
      metavariable: $EVENT
      regex: ^(event|evt|e|ev|syncEvent)$
  metadata:
    nr_refactored_patterns: 297
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: event-type-in-comment-or-name
  message: Detected SyncEvent related type name - refactoring applied
  severity: INFO
  languages:
  - go
  pattern-regex: (SyncEvent|SyncToHostEvent|SyncToVirtualEvent)
  metadata:
    nr_refactored_patterns: 287
    nr_legacy_patterns: 0
- id: new-event-helper-calls
  message: Detected new event helper function calls - refactoring applied
  severity: INFO
  languages:
  - go
  pattern-regex: (NewSyncEvent|NewSyncToHostEvent|NewSyncToVirtualEvent)\(
  metadata:
    nr_refactored_patterns: 114
    nr_legacy_patterns: 0
- id: event-type-import-or-usage
  message: Detected SyncEvent, SyncToHostEvent, or SyncToVirtualEvent type - refactoring
    applied
  severity: INFO
  languages:
  - go
  pattern-regex: (SyncEvent|SyncToHostEvent|SyncToVirtualEvent)\[[\w\.]+\]
  metadata:
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
- id: event-source-object-call
  message: Detected event.SourceObject() API usage - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $EVENT.SourceObject()
  - metavariable-regex:
      metavariable: $EVENT
      regex: ^(event|evt|e|ev|syncEvent)$
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: generic-wrapper-type-func
  message: Detected generic wrapper or conversion function - refactoring applied
  severity: INFO
  languages:
  - go
  pattern-regex: ToGenericSyncer|AsGeneric|Generic\w+Wrapper
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: event-isdelete-call
  message: Detected event.IsDelete() API usage - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $EVENT.IsDelete()
  - metavariable-regex:
      metavariable: $EVENT
      regex: ^(event|evt|e|ev|syncEvent)$
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: event-isdelete-in-condition
  message: Detected event.IsDelete() in conditional - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: if $E.IsDelete() { ... }
    - pattern: if !$E.IsDelete() { ... }
  - metavariable-regex:
      metavariable: $E
      regex: ^(event|evt|e|ev|syncEvent)$
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: any-client-object-constraint
  message: Detected client.Object constraint - refactoring applied
  severity: INFO
  languages:
  - go
  pattern-regex: T\sclient\.Object
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/syncer/**/*.go'
- id: event-struct-literal-with-fields
  message: Detected event struct literal - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "$TYPE{\n  ...,\n  Virtual: $V,\n  ...,\n}\n"
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: event-isdelete-method-def
  message: Detected IsDelete method definition on event - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($E $EVENT) IsDelete() $RET { ... }
  - metavariable-regex:
      metavariable: $EVENT
      regex: .*Event.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: event-struct-field-virtual
  message: Detected Virtual field on event struct - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $EVENT struct {\n  ...\n  Virtual $TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $EVENT
      regex: .*Event.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: event-struct-field-host
  message: Detected Host field on event struct - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $EVENT struct {\n  ...\n  Host $TYPE\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $EVENT
      regex: .*Event.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: event-source-object-method-def
  message: Detected SourceObject method definition on event - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($E $EVENT) SourceObject() $RET { ... }
  - metavariable-regex:
      metavariable: $EVENT
      regex: .*Event.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: event-target-object-method-def
  message: Detected TargetObject method definition on event - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($E $EVENT) TargetObject() $RET { ... }
  - metavariable-regex:
      metavariable: $EVENT
      regex: .*Event.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: sync-generic-interface-def
  message: Detected Sync generic interface definition - refactoring applied
  severity: INFO
  languages:
  - go
  pattern-regex: type\s+Sync\b
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/syncer/types/**/*.go'
- id: generic-syncer-return-type
  message: Detected function returning generic syncer - refactoring applied
  severity: INFO
  languages:
  - go
  pattern-regex: \)\s+Sync\[
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: event-file-existence
  message: Detected event-related file - refactoring applied
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/syncer/types/event.go'
    - '**/pkg/syncer/**/event*.go'
- id: sync-interface-name
  message: Detected Sync interface - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: type Sync interface { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/syncer/types/*.go'
