rules:
- id: detect-event-virtual-field-access
  message: Detected access to event.Virtual field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $EVENT.Virtual
  - metavariable-regex:
      metavariable: $EVENT
      regex: (?i).*(event|evt).*
  metadata:
    nr_refactored_patterns: 385
    nr_legacy_patterns: 0
- id: detect-event-host-field-access
  message: Detected access to event.Host field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $EVENT.Host
  - metavariable-regex:
      metavariable: $EVENT
      regex: (?i).*(event|evt).*
  metadata:
    nr_refactored_patterns: 297
    nr_legacy_patterns: 0
- id: no-synccontext-cast-usage
  message: Absence of Cast function call indicates refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(...)
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i)^synccontext$
  - pattern-not: $PKG.Cast(...)
  - pattern-not: $PKG.SyncSourceTarget(...)
  metadata:
    nr_refactored_patterns: 136
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*sync*.go'
- id: detect-generic-instantiation-with-object
  message: Detected generic type instantiation with client.Object
  severity: INFO
  languages:
  - go
  pattern-regex: \w+\[client\.Object\]
  metadata:
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*sync*.go'
- id: detect-sync-event-type-anywhere
  message: Detected SyncEvent type reference anywhere
  severity: INFO
  languages:
  - go
  pattern-regex: SyncEvent
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/syncer/**/*.go'
    exclude:
    - '**/vendor/**'
- id: detect-event-source-object-call
  message: Detected call to event.SourceObject() method indicating refactored event
    API
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $EVENT.$METHOD()
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)^[Ss]ource[Oo]bject$
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: detect-sync-interface-import
  message: Detected import or reference to sync types package
  severity: INFO
  languages:
  - go
  pattern-regex: (syncer\.Sync|types\.Sync)\[
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
- id: detect-generic-syncer-type-reference
  message: Detected reference to Sync with generic type parameter in comment or type
  severity: INFO
  languages:
  - go
  pattern-regex: Sync\[
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*sync*.go'
    - '**/types/*.go'
- id: detect-sync-to-host-with-single-param
  message: Detected SyncToHost with single parameter after context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func ($RECV $TYPE) SyncToHost($CTX $CTXTYPE, $PARAM $PTYPE) ($RET) {
      ... }

      '
  - metavariable-regex:
      metavariable: $PTYPE
      regex: ^\*.*
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: detect-sync-with-single-param
  message: Detected Sync with single parameter after context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func ($RECV $TYPE) Sync($CTX $CTXTYPE, $PARAM $PTYPE) ($RET) { ... }

      '
  - metavariable-regex:
      metavariable: $PTYPE
      regex: ^\*.*
  - pattern-not: 'func ($RECV $TYPE) Sync($CTX $CTXTYPE, $P1 $T1, $P2 $T2) ($RET)
      { ... }

      '
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: detect-sync-to-virtual-with-single-param
  message: Detected SyncToVirtual with single parameter after context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func ($RECV $TYPE) SyncToVirtual($CTX $CTXTYPE, $PARAM $PTYPE) ($RET)
      { ... }

      '
  - metavariable-regex:
      metavariable: $PTYPE
      regex: ^\*.*
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: detect-syncer-with-generic-return-type
  message: Detected Syncer method with generic return
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func ($RECV $TYPE) Syncer() $RET { ... }

      '
  - metavariable-regex:
      metavariable: $RET
      regex: .*\[.*\].*
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
- id: detect-new-event-helper-call
  message: Detected NewSyncEvent, NewSyncToHostEvent, or NewSyncToVirtualEvent call
  severity: INFO
  languages:
  - go
  pattern-regex: New(Sync|SyncToHost|SyncToVirtual)Event\[
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
- id: detect-event-is-delete-call
  message: Detected call to event.IsDelete() method from new event API
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $EVENT.$METHOD()
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)^[Ii]s[Dd]elete$
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: detect-syncer-method-call-returning-generic
  message: Detected Syncer() method call
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.Syncer()
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: event-isdelete-in-conditional
  message: Detected event.IsDelete() in conditional statement
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'if $EVENT.$METHOD() { ... }

        '
    - pattern: 'if !$EVENT.$METHOD() { ... }

        '
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)^[Ii]s[Dd]elete$
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: detect-event-type-field-access
  message: Detected access to event.Type field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $EVENT.Type
  - metavariable-regex:
      metavariable: $EVENT
      regex: (?i).*(event|evt).*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/podprinter/*.go'
    - '**/e2e/**/*.go'
- id: detect-generic-type-param-anywhere
  message: Detected generic type parameter T
  severity: INFO
  languages:
  - go
  pattern-regex: \[T\s+client\.Object\]
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/syncer/**/*.go'
- id: detect-event-struct-init-with-type
  message: Detected event struct initialization with type parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "&$TYPE{\n  Host: ...,\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(event|evt).*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: detect-event-type-string
  message: Detected SyncEvent type as string
  severity: INFO
  languages:
  - go
  pattern-regex: \*SyncEvent\[
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-event-method-with-receiver
  message: Detected method on event type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$TYPE) $METHOD(...) $RET {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: Sync.*Event
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-event-struct-literal
  message: Detected event struct literal creation
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "&$TYPE{\n  Host: $H,\n  Virtual: $V,\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(sync|event).*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-event-constructor-pattern
  message: Detected event constructor pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $NAME(...) *$TYPE {\n  ...\n  return &$TYPE{...}\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: .*Event
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-event-in-function-signature
  message: Detected event-like parameter in function signature
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func $NAME($P1 $T1, $EVENT $ETYPE) $RET

      '
  - metavariable-regex:
      metavariable: $EVENT
      regex: (?i)^(event|evt|ev|e)$
  - metavariable-regex:
      metavariable: $ETYPE
      regex: ^\*.*[Ee]vent.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-event-type-field-definition
  message: Detected Type field in event struct definition
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $NAME struct {\n  ...\n  Type $T\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $NAME
      regex: (?i).*(sync.*event|event.*sync).*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-event-to-host-type-string
  message: Detected SyncToHostEvent type as string
  severity: INFO
  languages:
  - go
  pattern-regex: \*SyncToHostEvent\[
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-event-to-virtual-type-string
  message: Detected SyncToVirtualEvent type as string
  severity: INFO
  languages:
  - go
  pattern-regex: \*SyncToVirtualEvent\[
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-sync-event-struct-definition
  message: Detected SyncEvent-like struct definition with Host/Virtual fields
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $NAME struct {\n  ...\n  Host $HTYPE\n  Virtual $VTYPE\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $NAME
      regex: (?i).*(sync|event).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-to-generic-syncer-function
  message: Detected ToGenericSyncer function definition
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ToGenericSyncer(...) $RET {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-generic-syncer-new-files
  message: Detected generic syncer files
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/syncer/generic*.go'
    - '**/syncer/wrapper*.go'
