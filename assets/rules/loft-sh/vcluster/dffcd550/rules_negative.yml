    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: synccontext-eventfromhost-check
  message: Using ctx.EventFromHost() to determine event direction. Refactor to use
    typed event object with event.Type() or event.IsDelete()
  severity: WARNING
  languages:
  - go
  pattern: $CTX.EventFromHost()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: ctx-eventfromhost-call
  message: Using ctx.EventFromHost() to check event source. Refactor to use typed
    event object - events encode their direction
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CTX.EventFromHost()
  - metavariable-pattern:
      metavariable: $CTX
      pattern: $X
  - focus-metavariable: $CTX
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: manual-cast-pod-in-sync
