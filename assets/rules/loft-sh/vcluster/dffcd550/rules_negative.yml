rules:
- id: sync-method-old-signature
  message: 'Sync uses old signature with client.Object parameters. Refactor to: Sync(ctx
    *synccontext.SyncContext, event *SyncEvent[T]) (ctrl.Result, error)'
  severity: WARNING
  languages:
  - go
  pattern: "func ($R $T) Sync($CTX *synccontext.SyncContext, pObj client.Object, vObj\
    \ client.Object) ($RET, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: syncer-imports-synccontext-package
  message: Syncer imports synccontext for old API. New generic API may reduce dependencies
    on helper functions
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"github.com/loft-sh/vcluster/pkg/syncer/synccontext\"\
      \n  ...\n)\n"
  - pattern-inside: "package $PKG\n...\nfunc ($R $T) SyncToHost($CTX *synccontext.SyncContext,\
      \ $VOBJ client.Object) (...) {\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: sync-parameters-named-pobj-vobj
  message: Sync parameters are client.Object. Refactor to accept SyncEvent[T] for
    type safety
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($R $T) Sync($CTX *synccontext.SyncContext, pObj client.Object,\
      \ vObj client.Object) (...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: synctohost-method-old-signature
  message: 'SyncToHost uses old signature with client.Object. Refactor to: SyncToHost(ctx
    *synccontext.SyncContext, event *SyncToHostEvent[T]) (ctrl.Result, error)'
  severity: WARNING
  languages:
  - go
  pattern: "func ($R $T) SyncToHost($CTX *synccontext.SyncContext, vObj client.Object)\
    \ ($RET, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: synctohost-parameter-named-vobj
  message: SyncToHost parameter is client.Object. Refactor to accept SyncToHostEvent[T]
    for type safety
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($R $T) SyncToHost($CTX *synccontext.SyncContext, vObj client.Object)\
      \ (...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: type-cast-in-function-call-argument
  message: Type cast in function call within syncer method. Use generic event for
    typed access
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $FUNC(..., $OBJ.(*$TYPE), ...)
  - pattern-inside: "func ($R $T) $METHOD($CTX *synccontext.SyncContext, $OBJ client.Object,\
      \ ...) (...) {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $METHOD
      pattern-either:
      - pattern: SyncToHost
      - pattern: Sync
      - pattern: SyncToVirtual
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: synctovirtual-method-old-signature
  message: 'SyncToVirtual uses old signature with client.Object. Refactor to: SyncToVirtual(ctx
    *synccontext.SyncContext, event *SyncToVirtualEvent[T]) (ctrl.Result, error)'
  severity: WARNING
  languages:
  - go
  pattern: "func ($R $T) SyncToVirtual($CTX *synccontext.SyncContext, pObj client.Object)\
    \ ($RET, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: synctovirtual-parameter-named-pobj
  message: SyncToVirtual parameter is client.Object. Refactor to accept SyncToVirtualEvent[T]
    for type safety
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($R $T) SyncToVirtual($CTX *synccontext.SyncContext, pObj client.Object)\
      \ (...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: pobj-variable-assignment-with-cast-sync
  message: Physical object variable assignment with cast in Sync. Use generic SyncEvent[T]
    with event.Host()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$P := $POBJ.(*$TYPE)

      '
  - pattern-inside: "func ($R $T) Sync($CTX *synccontext.SyncContext, $POBJ client.Object,\
      \ $VOBJ client.Object) (...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: vobj-variable-assignment-with-cast-sync
  message: Virtual object variable assignment with cast in Sync. Use generic SyncEvent[T]
    with event.Virtual()
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$V := $VOBJ.(*$TYPE)

      '
  - pattern-inside: "func ($R $T) Sync($CTX *synccontext.SyncContext, $POBJ client.Object,\
      \ $VOBJ client.Object) (...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: accessing-ctx-eventsource-field
  message: Accessing ctx.EventSource field. Generic events encode source/target, use
    event methods instead
  severity: WARNING
  languages:
  - go
  pattern: $CTX.EventSource
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: vobj-variable-assignment-with-cast-synctohost
  message: Variable assignment with type cast in SyncToHost. Use generic SyncToHostEvent[T]
    with event.Virtual() for type-safe access
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$V := $PARAM.(*$TYPE)

      '
  - pattern-inside: "func ($R $T) SyncToHost($CTX *synccontext.SyncContext, $PARAM\
      \ client.Object) (...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: manual-cast-with-comment-synctohost
  message: Type cast in SyncToHost. Use SyncToHostEvent[T] with event.Virtual() for
    type-safe access
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $V := $VOBJ.(*$TYPE)
  - pattern-inside: "func ($R $T) SyncToHost($CTX *synccontext.SyncContext, $VOBJ\
      \ client.Object) (...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: translate-with-context-and-typed-object
  message: Translate method called with type cast. Use generic event to access typed
    object without casting
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $R.translate($CTX, $OBJ.(*$TYPE))
  - pattern-inside: "func ($R $T) SyncToHost($CTX *synccontext.SyncContext, $OBJ client.Object)\
      \ (...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: pobj-variable-assignment-with-cast-synctovirtual
  message: Variable assignment with type cast in SyncToVirtual. Use generic SyncToVirtualEvent[T]
    with event.Host() for type-safe access
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$P := $PARAM.(*$TYPE)

      '
  - pattern-inside: "func ($R $T) SyncToVirtual($CTX *synccontext.SyncContext, $PARAM\
      \ client.Object) (...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: manual-cast-with-comment-synctovirtual
  message: Type cast in SyncToVirtual. Use SyncToVirtualEvent[T] with event.Host()
