rules:
- id: test-calling-function-with-expr-root
  message: Function calls should use root variable from test setup, not expr.Root
    global. Ensures consistent parameter passing pattern.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $FUNC("", expr.Root)
    - pattern: $FUNC($ARG, expr.Root)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
  paths:
    include:
    - '*test.go'
- id: service-data-get-call-inline
  message: Services.Get() should use services data passed as parameter, not global
    Services/HTTPServices/GRPCServices.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$VAR := $SERVICES.Get($NAME)

      '
  - metavariable-regex:
      metavariable: $SERVICES
      regex: ^(Services|HTTPServices|GRPCServices)$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: expr-root-direct-access-api-example-generator
  message: Replace expr.Root global reference with root parameter passed to function.
    Change function signature to accept root *expr.RootExpr.
  severity: WARNING
  languages:
  - go
  pattern: expr.Root.API.ExampleGenerator
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: example-generator-access-via-expr-root
  message: Use root.API.ExampleGenerator where root is passed as parameter instead
    of expr.Root global.
  severity: WARNING
  languages:
  - go
  pattern: expr.Root.API.ExampleGenerator
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
  paths:
    include:
    - codegen/**/*.go
- id: payload-example-with-expr-root
  message: Use root.API.ExampleGenerator where root is passed as parameter instead
    of expr.Root.API.ExampleGenerator.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$PAYLOAD.Example(expr.Root.API.ExampleGenerator)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: result-example-with-expr-root
  message: Use root.API.ExampleGenerator where root is passed as parameter instead
    of expr.Root.API.ExampleGenerator.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$RESULT.Example(expr.Root.API.ExampleGenerator)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: streaming-payload-example-with-expr-root
  message: Use root.API.ExampleGenerator where root is passed as parameter instead
    of expr.Root.API.ExampleGenerator.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$STREAMING_PAYLOAD.Example(expr.Root.API.ExampleGenerator)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: http-services-get-method-using-global
  message: Replace global HTTPServices reference with services parameter passed to
    function. HTTPServices should be passed explicitly, not accessed globally.
  severity: WARNING
  languages:
  - go
  pattern: HTTPServices.Get($ARG)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: grpc-services-get-method-using-global
  message: Replace global GRPCServices reference with services parameter passed to
    function. GRPCServices should be passed explicitly, not accessed globally.
  severity: WARNING
  languages:
  - go
  pattern: GRPCServices.Get($ARG)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: direct-access-service-services-in-template
  message: Template should not access global service.Services. Pass services data
    explicitly to template functions.
  severity: WARNING
  languages:
  - go
  pattern: service.Services
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - http/codegen/*.go
    - grpc/codegen/*.go
- id: test-using-expr-root-api-http-services
  message: Test should use root parameter passed from test setup instead of accessing
    expr.Root global. Update function signature to accept root *expr.RootExpr.
  severity: WARNING
  languages:
  - go
  pattern: expr.Root.API.HTTP.Services
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '*test.go'
- id: services-get-method-using-global
  message: Replace global Services reference with services parameter passed to function.
    Services should be passed explicitly, not accessed globally.
  severity: WARNING
  languages:
  - go
  pattern: Services.Get($ARG)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: test-using-expr-root-services-len
  message: Test should use root parameter instead of expr.Root global. Pass root to
    functions and use root.Services.
  severity: WARNING
  languages:
  - go
  pattern: 'require.Len(t, expr.Root.Services, $N)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '*test.go'
- id: test-http-services-data-indexing
  message: Test should use root parameter instead of expr.Root global. Pass root to
    test functions and use root.API.HTTP.Services.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: expr.Root.API.HTTP.Services[$IDX]
  - pattern-inside: "func $TEST(t *testing.T) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '*test.go'
- id: service-services-make-in-test
  message: Use NewServicesData() constructor instead of direct make() initialization
    for better encapsulation.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: service.Services = make(service.ServicesData)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-test-pattern-services-assignment
  message: Use services := service.NewServicesData() and pass services explicitly
    instead of global assignment.
  severity: WARNING
  languages:
  - go
  pattern: 'service.Services = make(service.ServicesData)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*test.go'
    - '*/testing.go'
- id: old-request-init-template-func-gotyperef
  message: Replace global service.Services reference with explicit parameter. Use
    passed services data instead of global state.
  severity: WARNING
  languages:
  - go
  pattern: 'service.Services.Get($SVC).Scope.GoTypeRef(...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: init-services-data-in-function
  message: Use NewServicesData() constructor instead of direct make() for better encapsulation
    and initialization.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'HTTPServices = make(ServicesData)

        '
    - pattern: 'GRPCServices = make(ServicesData)

        '
    - pattern: 'Services = make(service.ServicesData)

        '
  - pattern-not-inside: 'var $VAR = make($TYPE)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: services-data-accessed-in-loop
  message: Replace global Services reference with services parameter. Services data
    should be passed explicitly through function parameters.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "for $_, $SVC := range $ROOT.API.$TRANSPORT.Services {\n  ...\n  $DATA\
      \ := $SERVICES.Get($SVC.Name())\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $SERVICES
      regex: ^(HTTPServices|GRPCServices)$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: services-data-map-without-constructor
  message: Add NewServicesData() constructor function to reduce initialization boilerplate
    and improve encapsulation.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'type ServicesData map[string]*$TYPE

      '
  - pattern-not-inside: "func NewServicesData() ServicesData {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-test-pattern-http-services-assignment
  message: Use httpServices := NewServicesData() and pass httpServices explicitly
    instead of global assignment.
  severity: WARNING
  languages:
  - go
  pattern: 'HTTPServices = make(ServicesData)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*test.go'
    - '*/testing.go'
