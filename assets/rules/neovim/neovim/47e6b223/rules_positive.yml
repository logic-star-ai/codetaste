    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.c'
    - '**/*.h'
- id: detect-dict-in-doxygen-return-tag
  message: Detected doxygen @return comment with Dict type
  severity: INFO
  languages:
  - c
  pattern-regex: ///\s*@return.*\bDict\b
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/api/**'
- id: detect-dict-return-with-error
  message: Detected early return of Dict in error handling
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-inside: "Dict $FUNC(..., Error *$ERR) {\n  ...\n}\n"
  - pattern: "if (...) {\n  ...\n  return $DICT;\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-dict-pass-by-reference
  message: Detected passing Dict by reference to function
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-inside: 'Dict $DICT = ...;

      ...

      '
  - pattern: $FUNC(..., &$DICT, ...)
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-api-free-dict-call
  message: Detected call to 'api_free_dict' function (was 'api_free_dictionary')
