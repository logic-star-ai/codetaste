rules:
- id: detect-dict-variable-simple
  message: Detected variable of type 'Dict'
  severity: INFO
  languages:
  - c
  pattern: Dict $VAR = $INIT;
  metadata:
    category: basic
    nr_refactored_patterns: 61
    nr_legacy_patterns: 0
- id: detect-dict-temp-variable
  message: Detected temporary Dict variable assignment
  severity: INFO
  languages:
  - c
  pattern: 'Dict $TMP = $EXPR;

    '
  metadata:
    category: basic
    nr_refactored_patterns: 61
    nr_legacy_patterns: 0
- id: detect-object-data-dict-access
  message: Detected access to '.data.dict' field (was '.data.dictionary')
  severity: INFO
  languages:
  - c
  pattern: $OBJ.data.dict
  metadata:
    category: basic
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
- id: detect-kobjecttype-dict-enum-value
  message: Detected use of kObjectTypeDict enum constant
  severity: INFO
  languages:
  - c
  pattern-regex: \bkObjectTypeDict\b
  metadata:
    category: basic
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
- id: detect-object-data-dict-in-union
  message: Detected access to .data.dict union member (was .data.dictionary)
  severity: INFO
  languages:
  - c
  pattern-regex: \.data\.dict\b
  metadata:
    category: basic
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
