    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/api/**'
- id: detect-copy-dict-call
  message: Detected call to 'copy_dict' helper (was 'copy_dictionary')
  severity: INFO
  languages:
  - c
  pattern: copy_dict(...)
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-gen-api-dictof-reference
  message: Detected 'DictOf(' pattern in code generator
  severity: INFO
  languages:
  - lua
  pattern-regex: DictOf\(
  metadata:
    category: config
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/gen_api_dispatch.lua'
    - '**/gen_declarations.lua'
