  severity: INFO
  languages:
  - c
  pattern: kObjectTypeDict
  metadata:
    category: basic
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: detect-dict-pointer-deref
  message: Detected dereference of Dict pointer
  severity: INFO
  languages:
  - c
  patterns:
  - pattern-inside: 'Dict *$PTR = ...;

      ...

      '
  - pattern: '*$PTR'
  metadata:
    category: basic
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: detect-dict-function-return-type
  message: Detected function returning 'Dict' type (was 'Dictionary')
  severity: INFO
  languages:
  - c
  pattern: "Dict $FUNC(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: detect-dict-init-constant
  message: Detected Dict type cast with ARRAY_DICT_INIT
  severity: INFO
  languages:
  - c
  pattern: (Dict)ARRAY_DICT_INIT
  metadata:
    category: basic
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: detect-kobjecttype-dict-comparison
  message: Detected comparison with kObjectTypeDict enum value
  severity: INFO
  languages:
  - c
  pattern: $VAR == kObjectTypeDict
