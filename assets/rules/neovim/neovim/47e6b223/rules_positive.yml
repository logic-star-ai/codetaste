    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/api/**'
- id: detect-dict-pointer-parameter
  message: Detected function with Dict pointer parameter
  severity: INFO
  languages:
  - c
  pattern-regex: \w+\s*\([^)]*\bDict\s*\*
