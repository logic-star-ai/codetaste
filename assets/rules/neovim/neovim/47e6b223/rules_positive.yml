  message: Detected 'Dict' in doxygen return documentation
  severity: INFO
  languages:
  - c
  pattern-regex: '@return.*\bDict\b.*'
  metadata:
    category: basic
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: detect-dict-in-doxygen-param-tag
  message: Detected doxygen @param comment with Dict type
  severity: INFO
  languages:
  - c
  pattern-regex: ///\s*@param.*\bDict\b
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/api/**'
