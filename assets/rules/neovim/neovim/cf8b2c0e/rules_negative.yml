rules:
- id: c-file-includes-option-defs-uses-global-p-vars
  message: C file includes option_defs.h and uses p_* variables - should include option_vars.h
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-inside: '#include "nvim/option_defs.h"

      ...

      '
  - pattern-not-inside: '#include "nvim/option_vars.h"

      ...

      '
  - pattern-regex: \bp_[a-z]{2,}[^(]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 936
  paths:
    include:
    - '*.c'
- id: file-includes-only-option-defs-needs-vars-for-p-usage
  message: File includes option_defs.h but uses p_* variables - should include option_vars.h
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-inside: '#include "nvim/option_defs.h"

      ...

      '
  - pattern-not-inside: '#include "nvim/option_vars.h"

      ...

      '
  - pattern-not-inside: '#include "nvim/option.h"

      ...

      '
  - pattern-regex: \bp_[a-z]{2,}\b
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 171
- id: incorrect-header-for-option-variables-usage
  message: File uses option variables (p_*) but only includes option_defs.h - should
    include option_vars.h
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-inside: '#include "nvim/option_defs.h"

      ...

      '
  - pattern-not-inside: '#include "nvim/option_vars.h"

      ...

      '
  - pattern-not-inside: '#include "nvim/option.h"

      ...

      '
  - pattern-regex: \bp_[a-z]+\b
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 171
- id: option-defs-with-extern-p-declarations
  message: option_defs.h contains EXTERN variable declarations (p_*) - these should
    be moved to option_vars.h
  severity: ERROR
  languages:
  - c
  pattern-regex: ^\s*EXTERN\s+(int|char\s*\*|OptInt|unsigned)\s+p_[a-z]+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 149
  paths:
    include:
    - src/nvim/option_defs.h
- id: option-defs-extern-declaration-block
  message: EXTERN declaration for p_* variable found in option_defs.h - should be
    in option_vars.h
  severity: ERROR
  languages:
  - c
  pattern-regex: ^\s*EXTERN\s+(int|char\s*\*|OptInt|unsigned)\s+p_
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 149
  paths:
    include:
    - src/nvim/option_defs.h
- id: extern-macro-with-p-variable-in-option-defs
  message: EXTERN macro used with p_* variable in option_defs.h - all p_* variables
    should be in option_vars.h
  severity: ERROR
  languages:
  - c
  pattern-regex: EXTERN\s+[a-zA-Z_*\s]+\s+p_[a-z_]+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 149
  paths:
    include:
    - src/nvim/option_defs.h
- id: option-defs-with-bv-enum-definition
  message: option_defs.h contains BV_ enum definitions - these should be moved to
    option_vars.h
  severity: ERROR
  languages:
  - c
  pattern-regex: ^\s*BV_[A-Z]+\s*[,=]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 89
  paths:
    include:
    - src/nvim/option_defs.h
- id: multiple-extern-declarations-in-option-defs
  message: Multiple consecutive EXTERN variable declarations in option_defs.h - all
    should be in option_vars.h
  severity: WARNING
  languages:
  - c
  pattern-regex: ^EXTERN (int|char \*|OptInt|unsigned) p_[a-z]+.*\n^EXTERN (int|char
    \*|OptInt|unsigned) p_[a-z]+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 58
  paths:
    include:
    - src/nvim/option_defs.h
