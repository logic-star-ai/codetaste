rules:
- id: audit-package-import
  message: Old audit package import detected. Change 'org.keycloak.audit' to 'org.keycloak.events'
  severity: WARNING
  languages:
  - java
  pattern: import org.keycloak.audit.$PACKAGE;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 130
- id: audit-directory-path-check
  message: File in 'audit/' directory detected. Move to 'events/' directory
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
  paths:
    include:
    - audit/**
- id: import-event-type-from-audit
  message: Import of EventType from audit package. Change to 'org.keycloak.events.EventType'
  severity: WARNING
  languages:
  - java
  pattern: import org.keycloak.audit.EventType;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: import-event-from-audit
  message: Import of Event from audit package. Change to 'org.keycloak.events.Event'
  severity: WARNING
  languages:
  - java
  pattern: import org.keycloak.audit.Event;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: import-details-from-audit
  message: Import of Details from audit package. Change to 'org.keycloak.events.Details'
  severity: WARNING
  languages:
  - java
  pattern: import org.keycloak.audit.Details;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: realm-get-audit-expiration-call
  message: Call to getAuditExpiration() detected. Change to 'getEventsExpiration()'
  severity: WARNING
  languages:
  - java
  pattern: $REALM.getAuditExpiration()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: realm-get-audit-listeners-call
  message: Call to getAuditListeners() detected. Change to 'getEventsListeners()'
  severity: WARNING
  languages:
  - java
  pattern: $REALM.getAuditListeners()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: audit-spi-files-path
  message: File in audit/api package. Move to events/api package
  severity: WARNING
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/audit/api/**'
- id: audit-close-method
  message: close() method in audit package. Ensure provider is moved to events package
  severity: WARNING
  languages:
  - java
  pattern: 'public void close() { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/audit/**'
- id: audit-package-declaration
  message: Old audit package declaration detected. Change 'org.keycloak.audit' to
    'org.keycloak.events'
  severity: WARNING
  languages:
  - java
  pattern: package org.keycloak.audit.$SUBPACKAGE;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: realm-is-audit-enabled-call
  message: Call to isAuditEnabled() detected. Change to 'isEventsEnabled()'
  severity: WARNING
  languages:
  - java
  pattern: $REALM.isAuditEnabled()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: realm-set-audit-listeners-call
  message: Call to setAuditListeners(...) detected. Change to 'setEventsListeners(...)'
  severity: WARNING
  languages:
  - java
  pattern: $REALM.setAuditListeners(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: import-audit-provider
  message: Import of AuditProvider detected. Change to 'org.keycloak.events.EventStoreProvider'
  severity: WARNING
  languages:
  - java
  pattern: import org.keycloak.audit.AuditProvider;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: realm-model-get-audit-listeners-method
  message: getAuditListeners() method declaration detected. Rename to 'getEventsListeners()'
  severity: WARNING
  languages:
  - java
  pattern: '$TYPE getAuditListeners() { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: import-audit-listener
  message: Import of AuditListener detected. Change to 'org.keycloak.events.EventListenerProvider'
  severity: WARNING
  languages:
  - java
  pattern: import org.keycloak.audit.AuditListener;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: event-set-event-method-call
  message: Call to setEvent(...) detected. If this is on Event class, rename to 'setType(...)'
  severity: WARNING
  languages:
  - java
  pattern: $OBJ.setEvent(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: realm-set-audit-enabled-call
  message: Call to setAuditEnabled(...) detected. Change to 'setEventsEnabled(...)'
  severity: WARNING
  languages:
  - java
  pattern: $REALM.setAuditEnabled(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: realm-model-is-audit-enabled-method
  message: isAuditEnabled() method declaration detected. Rename to 'isEventsEnabled()'
  severity: WARNING
  languages:
  - java
  pattern: 'boolean isAuditEnabled() { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: realm-model-get-audit-expiration-method
  message: getAuditExpiration() method declaration detected. Rename to 'getEventsExpiration()'
