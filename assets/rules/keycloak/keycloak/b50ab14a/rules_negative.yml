    nr_legacy_patterns: 4
- id: audit-provider-spi-string-literal
  message: String literal 'audit' detected as SPI name. Change to 'eventsStore'
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: '"$STR"

      '
  - metavariable-regex:
      metavariable: $STR
      regex: ^audit$
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: import-audit-listener-factory
