- id: realm-entity-audit-enabled-field
  message: Field 'auditEnabled' found. Rename to 'eventsEnabled'
  severity: WARNING
  languages:
  - java
  pattern: "class $CLASS {\n  ...\n  $TYPE auditEnabled;\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: realm-entity-audit-expiration-field
