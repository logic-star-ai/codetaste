rules:
- id: provider-factory-create-call-no-session
  message: ProviderFactory.create() calls should pass ProviderSession parameter after
    refactoring
  severity: WARNING
  languages:
  - java
  pattern: $FACTORY.create()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: authentication-manager-get-manager-no-session
  message: AuthenticationProviderManager.getManager() should be replaced with constructor
    that accepts ProviderSession
  severity: WARNING
  languages:
  - java
  pattern: 'AuthenticationProviderManager.getManager($REALM)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: authentication-provider-manager-getmanager-static
  message: Static AuthenticationProviderManager.getManager() should be replaced with
    constructor using ProviderSession
  severity: WARNING
  languages:
  - java
  pattern: 'AuthenticationProviderManager.getManager($REALM)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: provider-session-import-services
  message: ProviderSession import should be from org.keycloak.provider package, not
    services
  severity: WARNING
  languages:
  - java
  pattern: import org.keycloak.services.ProviderSession;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: keycloak-registry-import
  message: KeycloakRegistry should be removed in favor of ProviderSession-based dependency
    resolution
  severity: WARNING
  languages:
  - java
  pattern: import org.keycloak.util.KeycloakRegistry;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: keycloak-registry-usage
  message: KeycloakRegistry instantiation should be removed - use ProviderSession
    instead
  severity: WARNING
  languages:
  - java
  pattern: new KeycloakRegistry()
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: authentication-manager-getmanager-usage
  message: Static getManager() call should be replaced with constructor accepting
    ProviderSession
  severity: WARNING
  languages:
  - java
  pattern: 'AuthenticationProviderManager $MGR = AuthenticationProviderManager.getManager($REALM);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: provider-factory-create-method-no-param
  message: ProviderFactory.create() method should accept ProviderSession parameter
  severity: WARNING
  languages:
  - java
  pattern: 'public $T create() { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*ProviderFactory.java'
- id: provider-factory-impl-create-no-session-param
  message: ProviderFactory implementation create() method should accept ProviderSession
    parameter
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public class $CLASS implements $FACTORY {\n  ...\n  public $T create()\
      \ {\n    ...\n  }\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FACTORY
      regex: .*ProviderFactory
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: provider-factory-create-implementation-no-param
  message: ProviderFactory.create() implementation should accept and use ProviderSession
    parameter
  severity: WARNING
  languages:
  - java
  pattern: "public $T create() {\n  return new $CLASS(...);\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/*ProviderFactory.java'
- id: authentication-provider-without-factory-meta-inf
  message: META-INF services file should reference AuthenticationProviderFactory classes
  severity: WARNING
  languages:
  - generic
  pattern-regex: (?!.*Factory).*AuthenticationProvider
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/META-INF/services/*AuthenticationProvider*'
- id: provider-session-factory-import-services
  message: ProviderSessionFactory import should be from org.keycloak.provider package,
    not services
  severity: WARNING
  languages:
  - java
  pattern: import org.keycloak.services.ProviderSessionFactory;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: partition-manager-provider-reference
  message: PartitionManagerProvider should be replaced with IdentityManagerProvider
  severity: WARNING
  languages:
  - java
  pattern: import $PKG.PartitionManagerProvider;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: meta-inf-services-authentication-provider
  message: META-INF/services should reference AuthenticationProviderFactory, not AuthenticationProvider
    directly
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/META-INF/services/org.keycloak.authentication.AuthenticationProvider'
- id: audit-provider-factory-create-no-session
  message: AuditProvider factory create() should accept ProviderSession parameter
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public $T create() {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $T
      pattern: AuditProvider
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: authentication-provider-impl-without-close
  message: AuthenticationProvider should implement close() method from Provider interface
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public class $CLASS implements AuthenticationProvider {\n  ...\n}\n"
  - pattern-not-inside: "public class $CLASS implements AuthenticationProvider {\n\
      \  ...\n  public void close() {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: audit-provider-create-no-session-param
  message: AuditProvider factory create() method should accept ProviderSession parameter
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public $PROV create() {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PROV
      regex: .*AuditProvider
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*AuditProviderFactory.java'
- id: picketlink-import-partitionmanager-provider
  message: PartitionManagerProvider import should be replaced with IdentityManagerProvider
  severity: WARNING
  languages:
  - java
  pattern: import org.keycloak.picketlink.PartitionManagerProvider;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: ldap-test-utils-keycloak-registry
  message: KeycloakRegistry retrieval from context should be replaced with ProviderSessionFactory
  severity: WARNING
  languages:
  - java
  pattern: KeycloakRegistry $REG = $CTX.getAttribute($KEY);
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: keycloak-registry-put-service
  message: KeycloakRegistry.putService() should be removed - use factory registration
    instead
  severity: WARNING
  languages:
  - java
  pattern: $REG.putService($CLASS, $OBJ)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: provider-session-services-package
  message: ProviderSession should be moved from services to core module
  severity: WARNING
  languages:
  - java
  pattern-regex: \Apackage org\.keycloak\.services;[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ProviderSession.java'
- id: provider-session-factory-services-package
  message: ProviderSessionFactory should be moved from services to core module
  severity: WARNING
  languages:
  - java
  pattern-regex: \Apackage org\.keycloak\.services;[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/ProviderSessionFactory.java'
- id: authentication-provider-service-loader
  message: ServiceLoader for AuthenticationProvider should be replaced with factory-based
    approach using AuthenticationProviderFactory
  severity: WARNING
  languages:
  - java
  pattern: ProviderLoader.load(AuthenticationProvider.class)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: provider-loader-partition-manager
  message: ServiceLoader for PartitionManagerProvider should be replaced with IdentityManagerProvider
    factory pattern
  severity: WARNING
  languages:
  - java
  pattern: ProviderLoader.load(PartitionManagerProvider.class)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: picketlink-auth-provider-no-injection
  message: PicketlinkAuthenticationProvider should receive IdentityManagerProvider
    via constructor injection, not ServiceLoader
  severity: WARNING
  languages:
  - java
  pattern: "public class PicketlinkAuthenticationProvider implements AuthenticationProvider\
    \ {\n  ...\n  public $RET getIdentityManager(...) {\n    ...\n    ProviderLoader.load(PartitionManagerProvider.class);\n\
    \    ...\n  }\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: partition-manager-registry-wrong-package
  message: PartitionManagerRegistry should be moved to realm package after refactoring
  severity: WARNING
  languages:
  - java
  pattern-regex: \Apackage org\.keycloak\.picketlink\.impl;[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/PartitionManagerRegistry.java'
- id: provider-session-no-get-all-providers
  message: ProviderSession should have getAllProviders() method for dependency management
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public interface ProviderSession {\n  ...\n}\n"
  - pattern-not-inside: "public interface ProviderSession {\n  ...\n  $RET getAllProviders(...);\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: timer-provider-factory-create-no-session
  message: TimerProvider factory create() should accept ProviderSession parameter
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public $T create() {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $T
      pattern: TimerProvider
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: identity-manager-without-provider-session
  message: IdentityManager retrieval should use ProviderSession.getProvider() instead
    of ProviderLoader
  severity: WARNING
  languages:
  - java
  pattern: "public IdentityManager getIdentityManager($REALM) {\n  ...\n  ProviderLoader.load(...);\n\
    \  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: authentication-provider-static-load
  message: Static load() method using ProviderLoader should be replaced with factory
    pattern
  severity: WARNING
  languages:
  - java
  pattern: "public static Iterable<AuthenticationProvider> load() {\n  return ProviderLoader.load(AuthenticationProvider.class);\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: resteasy-provider-factory-push-identity-manager
  message: ResteasyProviderFactory context manipulation should be replaced with ProviderSession-based
    injection
  severity: WARNING
  languages:
  - java
  pattern: ResteasyProviderFactory.pushContext(IdentityManager.class, $IM)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: resteasy-provider-factory-get-identity-manager
  message: ResteasyProviderFactory context retrieval should be replaced with ProviderSession.getProvider()
  severity: WARNING
  languages:
  - java
  pattern: ResteasyProviderFactory.getContextData(IdentityManager.class)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: picketlink-realm-provider-old-location
  message: RealmPartitionManagerProvider should be in keycloak-picketlink-realm module
    after refactoring
  severity: WARNING
  languages:
  - java
  pattern-regex: \Apackage org\.keycloak\.picketlink\.impl;[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/RealmPartitionManagerProvider.java'
- id: jpa-audit-provider-factory-no-session-create
  message: JpaAuditProviderFactory.create() should accept ProviderSession parameter
  severity: WARNING
  languages:
  - java
  pattern: "public class JpaAuditProviderFactory implements AuditProviderFactory {\n\
    \  ...\n  public AuditProvider create() {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mongo-audit-provider-factory-no-session-create
  message: MongoAuditProviderFactory.create() should accept ProviderSession parameter
  severity: WARNING
  languages:
  - java
  pattern: "public class MongoAuditProviderFactory implements AuditProviderFactory\
    \ {\n  ...\n  public AuditProvider create() {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: basic-timer-provider-factory-no-session-create
  message: BasicTimerProviderFactory.create() should accept ProviderSession parameter
  severity: WARNING
  languages:
  - java
  pattern: "public class BasicTimerProviderFactory implements TimerProviderFactory\
    \ {\n  ...\n  public TimerProvider create() {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: partition-manager-provider-iterable-load
  message: Loading PartitionManagerProvider via ProviderLoader should be replaced
    with IdentityManagerProvider factory
  severity: WARNING
  languages:
  - java
  pattern: Iterable<PartitionManagerProvider> $VAR = ProviderLoader.load(PartitionManagerProvider.class);
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: authentication-manager-providerloader-in-getmanager
  message: AuthenticationProviderManager.getManager() static method with ProviderLoader
    should be refactored
  severity: WARNING
  languages:
  - java
  pattern: "public static AuthenticationProviderManager getManager(RealmModel $REALM)\
    \ {\n  Iterable<AuthenticationProvider> providers = load();\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: authentication-provmanager-load-method
  message: Static load() method in AuthenticationProviderManager should be removed
    in favor of factory pattern
  severity: WARNING
  languages:
  - java
  pattern: "public static Iterable<AuthenticationProvider> load() {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/AuthenticationProviderManager.java'
- id: get-identity-manager-with-providerloader
  message: getIdentityManager should use ProviderSession.getProvider() instead of
    ProviderLoader
  severity: WARNING
  languages:
  - java
  pattern: "public IdentityManager getIdentityManager(RealmModel realm) {\n  ...\n\
    \  Iterable<$TYPE> providers = ProviderLoader.load($CLASS);\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: partition-manager-null-check-pattern
  message: PartitionManager discovery pattern should be replaced with IdentityManagerProvider
    from ProviderSession
  severity: WARNING
  languages:
  - java
  pattern: "PartitionManager partitionManager = null;\nfor (PartitionManagerProvider\
    \ provider : providers) {\n  partitionManager = provider.getPartitionManager(realm);\n\
    \  if (partitionManager != null) {\n    break;\n  }\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: auth-provider-exception-partition-manager
  message: PartitionManager error message should reference IdentityManagerProvider
    after refactoring
  severity: WARNING
  languages:
  - java
  pattern: 'throw new AuthenticationProviderException("Not able to locate PartitionManager
    with any PartitionManagerProvider");

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: timer-provider-create-no-session-param
  message: TimerProvider factory create() method should accept ProviderSession parameter
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: "public $PROV create() {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PROV
      regex: .*TimerProvider
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*TimerProviderFactory.java'
- id: partition-manager-for-each-provider
  message: Iteration over PartitionManagerProvider should use IdentityManagerProvider
    from ProviderSession
  severity: WARNING
  languages:
  - java
  pattern: "for (PartitionManagerProvider provider : $PROVIDERS) {\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: keycloak-registry-put-service-if-absent
  message: KeycloakRegistry.putServiceIfAbsent() should be replaced with factory registration
  severity: WARNING
  languages:
  - java
  pattern: $REG.putServiceIfAbsent($CLASS, $OBJ)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: identity-manager-resteasy-context
  message: IdentityManager context pattern should be replaced with ProviderSession-based
    injection
  severity: WARNING
  languages:
  - java
  pattern: "IdentityManager identityManager = ResteasyProviderFactory.getContextData(IdentityManager.class);\n\
    if (identityManager == null) {\n  ...\n  ResteasyProviderFactory.pushContext(IdentityManager.class,\
    \ identityManager);\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: authentication-manager-load-call
  message: Loading and mapping providers manually should use ProviderSession
  severity: WARNING
  languages:
  - java
  pattern: 'Iterable<AuthenticationProvider> providers = load();

    Map<String, AuthenticationProvider> providersMap = ...;

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: picketlink-partition-manager-provider-iteration
  message: Iterating PartitionManagerProvider should use IdentityManagerProvider from
    ProviderSession
  severity: WARNING
  languages:
  - java
  pattern: "for (PartitionManagerProvider $PROV : $PROVIDERS) {\n  $PM = $PROV.getPartitionManager($REALM);\n\
    \  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: auth-manager-getmanager-with-providerloader
  message: Static getManager with ProviderLoader pattern should be refactored to use
    ProviderSession
  severity: WARNING
  languages:
  - java
  pattern: "public static AuthenticationProviderManager getManager(RealmModel realm)\
    \ {\n  Iterable<AuthenticationProvider> providers = load();\n  ...\n  return new\
    \ AuthenticationProviderManager(realm, providersMap);\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: partition-manager-break-pattern
  message: PartitionManager null check and break pattern indicates old provider discovery
  severity: WARNING
  languages:
  - java
  pattern: "if (partitionManager != null) {\n  break;\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/PicketlinkAuthenticationProvider.java'
- id: auth-manager-static-load-method-impl
  message: Static load() method using ProviderLoader.load(AuthenticationProvider.class)
    should be replaced with factory pattern
  severity: WARNING
  languages:
  - java
  pattern: "public static Iterable<AuthenticationProvider> load() {\n  return ProviderLoader.load(AuthenticationProvider.class);\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: picketlink-partition-manager-loop
  message: PartitionManager discovery loop should be replaced with ProviderSession.getProvider(IdentityManagerProvider.class)
  severity: WARNING
  languages:
  - java
  pattern: "PartitionManager partitionManager = null;\nfor ($TYPE provider : providers)\
    \ {\n  partitionManager = $CALL;\n  if (partitionManager != null) {\n    break;\n\
    \  }\n}\nif (partitionManager == null) {\n  throw new AuthenticationProviderException(...);\n\
    }\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: partition-manager-provider-load-call
  message: Loading PartitionManagerProvider via ProviderLoader should use IdentityManagerProvider
    factory with ProviderSession
  severity: WARNING
  languages:
  - java
  pattern: 'Iterable<PartitionManagerProvider> $VAR = ProviderLoader.load(PartitionManagerProvider.class);

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
