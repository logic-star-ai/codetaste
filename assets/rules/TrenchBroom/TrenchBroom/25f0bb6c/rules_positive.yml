rules:
- id: property-value-type-identifier-usage
  message: Detected PropertyValueType identifier (std::variant for property values)
  severity: INFO
  languages:
  - cpp
  pattern-regex: PropertyValueType
  metadata:
    category: abstraction
    nr_refactored_patterns: 50
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.h'
    - '**/*.cpp'
- id: parse-property-definition-returns-value
  message: Detected parse function returning PropertyDefinition by value
  severity: INFO
  languages:
  - cpp
  pattern-regex: PropertyDefinition\s+parse\w+Property
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/io/*Parser.*'
- id: entity-definition-type-point
  message: Detected EntityDefinitionType::Point (renamed from PointEntity)
  severity: INFO
  languages:
  - cpp
  pattern-regex: EntityDefinitionType\s*::\s*Point\b
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: get-type-function-call
  message: Detected getType() utility function call for EntityDefinition
  severity: INFO
  languages:
  - cpp
  pattern: getType($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: vector-entity-definition-value
  message: Detected std::vector<EntityDefinition> (value semantics, not unique_ptr)
  severity: INFO
  languages:
  - cpp
  pattern-regex: std\s*::\s*vector\s*<\s*EntityDefinition\s*>
  metadata:
    category: dependency
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: entity-definition-type-enum-point-value
  message: Detected EntityDefinitionType::Point enum value (renamed from PointEntity)
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern: EntityDefinitionType::Point
  - pattern-not: EntityDefinitionType::PointEntity
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: get-point-entity-definition-call
  message: Detected getPointEntityDefinition() utility function call
  severity: INFO
  languages:
  - cpp
  pattern: getPointEntityDefinition($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: property-definition-key-direct-member
  message: Detected direct access to PropertyDefinition.key member
  severity: INFO
  languages:
  - cpp
  pattern-regex: propertyDef(?:inition)?\.key\b
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: result-vector-entity-definition
  message: Detected Result<vector<EntityDefinition>> return type (value semantics)
  severity: INFO
  languages:
  - cpp
  pattern-regex: Result\s*<\s*std\s*::\s*vector\s*<\s*EntityDefinition\s*>\s*>
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: point-entity-definition-dereference
  message: Detected dereferencing optional PointEntityDefinition
  severity: INFO
  languages:
  - cpp
  pattern-regex: \*\s*\w+\.pointEntityDefinition
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: entity-definition-type-enum-brush-value
  message: Detected EntityDefinitionType::Brush enum value (renamed from BrushEntity)
  severity: INFO
  languages:
  - cpp
