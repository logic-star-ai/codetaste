    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: get-if-flags
  message: Detected std::get_if<Flags> for safe Flags variant access
  severity: INFO
  languages:
  - cpp
  pattern-regex: std::get_if<Flags>\(
  metadata:
    category: abstraction
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: lambda-auto-targetsource-param
  message: Detected lambda taking const TargetSource& from variant
  severity: INFO
  languages:
  - cpp
  pattern-regex: \[\s*\]\s*\(\s*const\s+TargetSource\s*&
  metadata:
    category: abstraction
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: lambda-auto-targetdestination-param
