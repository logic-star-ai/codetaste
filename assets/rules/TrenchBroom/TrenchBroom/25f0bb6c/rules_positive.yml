    nr_legacy_patterns: 0
- id: property-definition-direct-key-access
  message: Detected direct member access to PropertyDefinition.key (refactored from
    method call)
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern: $DEFN.key
  - pattern-not: $DEFN->key
  - metavariable-type:
      metavariable: $DEFN
      types:
      - PropertyDefinition
      - const PropertyDefinition
      - PropertyDefinition&
      - const PropertyDefinition&
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: entity-definition-utils-file-exists
  message: Detected new EntityDefinitionUtils.h file created for utility functions
