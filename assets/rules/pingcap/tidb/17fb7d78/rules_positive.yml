      \ {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^\*.*Join.*$
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: next-call-bootstrap-context
  message: Detected Next() call in session bootstrap context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: err := r.Next($CTX, chk)
  - pattern-inside: 'package session

      ...

      '
