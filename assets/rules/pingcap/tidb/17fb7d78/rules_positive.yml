rules:
- id: recordset-next-method-call
  message: Detected call to Next() method on recordset/resultset - refactoring applied
  severity: INFO
  languages:
  - go
  pattern: $RS.Next($CTX, $CHK)
  metadata:
    category: api
    nr_refactored_patterns: 108
    nr_legacy_patterns: 0
- id: next-call-assignment-reuse
  message: Detected Next() call with error variable reassignment
  severity: INFO
  languages:
  - go
  pattern: 'err = $RS.Next($CTX, $CHK)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 101
    nr_legacy_patterns: 0
- id: next-call-with-metrics
  message: Detected Next() with metrics recording
  severity: INFO
  languages:
  - go
  pattern: '$METRIC.$METHOD()

    ...

    err := $RS.Next($CTX, $CHK)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 76
    nr_legacy_patterns: 0
- id: executor-next-method-receiver-pointer
  message: Detected Next() method with pointer receiver
  severity: INFO
  languages:
  - go
  pattern: "func ($E *$TYPE) Next(ctx context.Context, chk *chunk.Chunk) error {\n\
    \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
- id: executor-pkg-next-implementation
  message: Detected Next() method implementation in executor package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($E $TYPE) Next($CTX context.Context, $CHK *chunk.Chunk) error\
      \ {\n  ...\n}\n"
  - pattern-inside: 'package executor

      ...

      '
  metadata:
    category: basic
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: executor-adapter-next-method
  message: Detected Next() implementation in executor-type struct
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($E *$TYPE) Next($CTX context.Context, $CHK *chunk.Chunk) error\
      \ {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: .*Exec.*
  metadata:
    category: basic
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
- id: next-call-iteration-pattern
  message: Detected Next() call with error check pattern
  severity: INFO
  languages:
  - go
  pattern: "err = $RS.Next($CTX, $CHK)\nif err != nil {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
- id: next-method-call-with-error-check
  message: Detected Next() method call with error assignment
  severity: INFO
  languages:
  - go
  pattern: 'err := $RS.Next($CTX, $CHK)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
- id: recordset-next-call-within-session
  message: Detected Next() method call on recordset variable in session/server context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $RS.Next($CTX, $CHK)
  - metavariable-regex:
      metavariable: $RS
      regex: ^(rs|r|recordSet|recordset|result)$
  metadata:
    category: api
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
- id: next-error-check-annotation
  message: Detected Next() call with linter annotation
  severity: INFO
  languages:
  - go
  pattern: '// nolint

    err := $RS.Next($CTX, $CHK)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
- id: next-method-call-in-loop
  message: Detected Next() method call in loop pattern
  severity: INFO
  languages:
  - go
  pattern: "for {\n  ...\n  $RS.Next($CTX, $CHK)\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 44
    nr_legacy_patterns: 0
- id: next-implements-executor-comment
  message: Detected comment referencing 'Executor Next' instead of 'NextChunk'
  severity: INFO
  languages:
  - go
  pattern-regex: // Next implements.*Executor Next
  metadata:
    category: basic
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: next-call-with-trace-error
  message: Detected Next() call followed by errors.Trace
  severity: INFO
  languages:
  - go
  pattern: 'err := $RS.Next($CTX, $CHK)

    ...

    return errors.Trace(err)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
- id: next-call-error-log
  message: Detected Next() with error logging
  severity: INFO
  languages:
  - go
  pattern: "err := $RS.Next($CTX, $CHK)\nif err != nil {\n  $LOG.$METHOD(...)\n  ...\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
- id: next-call-with-nil-check
  message: Detected Next() call with nil error check and return
  severity: INFO
  languages:
  - go
  pattern: "err := $RS.Next($CTX, $CHK)\nif err != nil {\n  ...\n  return $ERR\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
- id: next-call-array-index
  message: Detected Next() call on array/slice element
  severity: INFO
  languages:
  - go
  pattern: $RS[$IDX].Next($CTX, $CHK)
  metadata:
    category: basic
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: next-method-call-error-check-loop
  message: Detected Next() method call with error check in loop
  severity: INFO
  languages:
  - go
  pattern: "for {\n  ...\n  err := $RS.Next($CTX, $CHK)\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: next-call-err-not-nil-trace
  message: Detected Next() with error trace return pattern
  severity: INFO
  languages:
  - go
  pattern: "err = $RS.Next($CTX, $CHK)\nif err != nil {\n  return errors.Trace(err)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: next-select-statement-result
  message: Detected Next() on statement execution result
  severity: INFO
  languages:
  - go
  pattern: '$RS, $ERR := $STMT.$METHOD(...)

    ...

    $RS.Next($CTX, $CHK)

    '
  metadata:
    category: api
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
- id: next-call-error-trace
  message: Detected Next() call with error tracing pattern
  severity: INFO
  languages:
  - go
  pattern: "err := $RS.Next($CTX, $CHK)\nif err != nil {\n  return errors.Trace(err)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: next-error-handling-wrap
  message: Detected Next() with error wrapping
  severity: INFO
  languages:
  - go
  pattern: "err := $RS.Next($CTX, $CHK)\nif err != nil {\n  return errors.$WRAP(err,\
    \ ...)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: next-call-multiple-sequential
  message: Detected sequential Next() calls on same recordset
  severity: INFO
  languages:
  - go
  pattern: 'err = $RS.Next($CTX, $CHK)

    ...

    err = $RS.Next($CTX, $CHK)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: next-call-conditional-break
  message: Detected Next() with conditional break
  severity: INFO
  languages:
  - go
  pattern: "err := $RS.Next($CTX, $CHK)\n...\nif $COND {\n  break\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: next-call-check-numrows-break
  message: Detected Next() with NumRows check and break pattern
  severity: INFO
  languages:
  - go
  pattern: "err := $RS.Next($CTX, $CHK)\n...\nif $CHK.NumRows() == 0 {\n  break\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: next-call-infinite-loop-break
  message: Detected Next() in infinite loop with break
  severity: INFO
  languages:
  - go
  pattern: "for {\n  ...\n  err := $RS.Next($CTX, $CHK)\n  ...\n  break\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: executor-children-next-call
  message: Detected Next() call on children executor array element
  severity: INFO
  languages:
  - go
  pattern: '$E.children[$IDX].Next($CTX, $CHK)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: recordset-fields-next-pattern
  message: Detected struct with Next() method implementation
  severity: INFO
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n}\n\nfunc ($R *$TYPE) Next($CTX context.Context,\
    \ $CHK *chunk.Chunk) error {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: next-call-with-context-todo
  message: Detected Next() call with context.TODO()
  severity: INFO
  languages:
  - go
  pattern: $RS.Next(context.TODO(), $CHK)
  metadata:
    category: basic
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: next-call-for-loop-chunk-rows
  message: Detected Next() in loop with chunk NumRows check
  severity: INFO
  languages:
  - go
  pattern: "for {\n  err := $RS.Next($CTX, $CHK)\n  ...\n  if $CHK.NumRows() == 0\
    \ {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: executor-child-next-call
  message: Detected Next() call on child executor
  severity: INFO
  languages:
  - go
  pattern: $E.$CHILD.Next($CTX, $CHK)
  metadata:
    category: structural
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: next-loop-numrows-zero-break
  message: Detected Next() loop breaking on zero rows
  severity: INFO
  languages:
  - go
  pattern: "for {\n  err := $RS.Next($CTX, $CHK)\n  ...\n  if $CHK.NumRows() == 0\
    \ {\n    break\n  }\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: next-call-with-context-background
  message: Detected Next() call with context.Background()
  severity: INFO
  languages:
  - go
  pattern: $RS.Next(context.Background(), $CHK)
  metadata:
    category: basic
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: executor-next-fetch-pattern
  message: Detected Next() with internal fetch method pattern
  severity: INFO
  languages:
  - go
  pattern: "func ($E $TYPE) Next($CTX context.Context, $CHK *chunk.Chunk) error {\n\
    \  ...\n  $E.$METHOD()\n  ...\n  return nil\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: next-call-zero-rows-return
  message: Detected Next() with zero rows check and return
  severity: INFO
  languages:
  - go
  pattern: "err := $RS.Next($CTX, $CHK)\n...\nif $CHK.NumRows() == 0 {\n  return $RET\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: recordset-next-in-statistics
  message: Detected Next() call in statistics package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $RS.Next($CTX, $CHK)
  - pattern-inside: 'package statistics

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: bootstrap-next-call-pattern
  message: Detected Next() call in bootstrap function
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: err = r.Next($CTX, chk)
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: .*[Bb]ootstrap.*
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: server-conn-next-call
  message: Detected Next() call in server conn handling
  severity: INFO
  languages:
  - go
  pattern: 'err := rs.Next($CTX, chk)

    '
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: recordset-next-loop-accumulate
  message: Detected Next() in loop with row accumulation
  severity: INFO
  languages:
  - go
  pattern: "for {\n  ...\n  err := $RS.Next($CTX, $CHK)\n  ...\n  $ROWS = append($ROWS,\
    \ ...)\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: next-call-fields-assignment
  message: Detected Next() with chunk field access
  severity: INFO
  languages:
  - go
  pattern: 'err := $RS.Next($CTX, $CHK)

    ...

    $VAR = $CHK.$METHOD()

    '
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: executor-base-next-child-call
  message: Detected Next() implementation that calls child executor Next()
  severity: INFO
  languages:
  - go
  pattern: "func ($E $ETYPE) Next($CTX context.Context, $CHK *chunk.Chunk) error {\n\
    \  ...\n  $E.$CHILD.Next($CTX, $CHK)\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: next-method-comment-fills-chunk
  message: Detected updated comment for Next method that fills chunk
  severity: INFO
  languages:
  - go
  pattern-regex: // Next fills.*chunk
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: chunk-reset-before-next
  message: Detected chunk Reset before Next() call
