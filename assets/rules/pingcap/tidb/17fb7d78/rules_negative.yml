rules:
- id: nextchunk-comment-any-reference
  message: Reference to 'NextChunk' should be updated to 'Next'
  severity: INFO
  languages:
  - go
  pattern-regex: NextChunk
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 278
  paths:
    include:
    - '*.go'
    exclude:
    - vendor/**
