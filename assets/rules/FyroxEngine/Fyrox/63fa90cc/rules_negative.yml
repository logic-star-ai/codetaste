    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: self-path-field-return
  message: Resource types should not access self.path field - metadata moved to ResourceHeader
  severity: WARNING
  languages:
  - rust
  pattern: '&self.path

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/texture/**/*.rs'
    - '**/model/**/*.rs'
    - '**/shader/**/*.rs'
    - '**/material/**/*.rs'
    - '**/curve/**/*.rs'
- id: self-path-equals-assignment
  message: Resource types should not assign to self.path field - use ResourceHeader.set_kind()
  severity: WARNING
  languages:
  - rust
  pattern: 'self.path = $VAL

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
