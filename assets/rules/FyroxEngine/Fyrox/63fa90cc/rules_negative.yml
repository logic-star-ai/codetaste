  severity: WARNING
  languages:
  - rust
  pattern-regex: LoadError\s*\{[^}]*type_uuid:\s*Uuid
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/state.rs'
    - '**/fyrox-resource/**/*.rs'
