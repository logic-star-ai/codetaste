rules:
- id: material-resource-new-ok-without-kind
  message: MaterialResource::new_ok should require ResourceKind parameter after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: 'MaterialResource::new_ok($DATA)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: resource-set-path-method-call-statement
  message: After refactoring, use resource.set_kind() instead of resource.set_path()
  severity: WARNING
  languages:
  - rust
  pattern: '$RESOURCE.set_path($PATH);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: untyped-resource-new-ok-without-resource-kind
  message: UntypedResource::new_ok should require ResourceKind parameter
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'UntypedResource::new_ok($DATA)

      '
  - pattern-not: 'UntypedResource::new_ok($DATA, $KIND)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: resource-data-impl-set-path-method
  message: ResourceData implementation should not have set_path() method - metadata
    should be in ResourceHeader
  severity: WARNING
  languages:
  - rust
  pattern: "impl ResourceData for $TYPE {\n    ...\n    fn set_path(&mut self, $PATH:\
    \ PathBuf) {\n        ...\n    }\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: commit-error-with-path-parameter
  message: commit_error should not take path parameter - path should be in ResourceHeader
  severity: WARNING
  languages:
  - rust
  pattern: '$VAR.commit_error($PATH, $ERROR)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: untyped-resource-commit-error-call
  message: commit_error should not take path parameter after refactoring - path in
    ResourceHeader
  severity: WARNING
  languages:
  - rust
  pattern: '$RESOURCE.commit_error($PATH, $ERROR)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: self-is-embedded-field-return
  message: Resource types should not access self.is_embedded field - use ResourceKind
  severity: WARNING
  languages:
  - rust
  pattern: 'self.is_embedded

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/texture/**/*.rs'
    - '**/model/**/*.rs'
    - '**/shader/**/*.rs'
    - '**/material/**/*.rs'
    - '**/curve/**/*.rs'
- id: resource-state-pending-path-match
  message: Do not access path from ResourceState::Pending variant - metadata moved
    to ResourceHeader
  severity: WARNING
  languages:
  - rust
  pattern-regex: ResourceState::Pending\s*\{\s*path
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/*.rs'
- id: direct-resource-set-path-call
  message: Use resource.set_kind() instead of resource.set_path() after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: '$RESOURCE.set_path($PATH)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: resource-state-load-error-path-match
  message: Do not access path from ResourceState::LoadError variant - metadata moved
    to ResourceHeader
  severity: WARNING
  languages:
  - rust
  pattern-regex: ResourceState::LoadError\s*\{\s*path
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/*.rs'
- id: resource-new-ok-call-without-kind
  message: Resource::new_ok should require ResourceKind parameter after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: 'Resource::new_ok($DATA)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: resource-state-load-error-type-uuid-match
  message: Do not access type_uuid from ResourceState::LoadError variant - metadata
    moved to ResourceHeader
  severity: WARNING
  languages:
  - rust
  pattern-regex: ResourceState::LoadError\s*\{\s*[^}]*type_uuid
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/*.rs'
- id: resource-loader-trait-load-signature-old
  message: ResourceLoader::load() should not have event_broadcaster parameter - new
    signature returns Result<LoaderPayload, LoadError>
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+load\s*\([^)]*event_broadcaster:\s*ResourceEventBroadcaster
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/loader.rs'
- id: resource-loader-trait-load-signature-reload
  message: ResourceLoader::load() should not have reload parameter - new signature
    simplified
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+load\s*\([^)]*reload:\s*bool
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/loader.rs'
- id: resource-impl-set-path-field-mutation
  message: ResourceData should not have path field - use ResourceHeader.set_kind()
  severity: WARNING
  languages:
  - rust
  pattern: "fn set_path(&mut self, $ARG: PathBuf) {\n    self.path = $ARG;\n}\n"
  metadata:
