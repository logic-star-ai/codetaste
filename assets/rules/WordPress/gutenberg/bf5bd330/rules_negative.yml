    after folder consolidation
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+\{\s*space\s*\}\s+from\s+['"](\.\./)+ui/utils/space['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: space-import-trailing-semicolon
