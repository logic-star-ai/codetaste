rules:
- id: string-literal-ui-utils-path
  message: String literal containing 'ui/utils' path should be updated to 'utils'
    after folder consolidation
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: '[''"](\.\./)+ui/utils/[^''"]+[''"]'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: import-from-ui-utils-any-file-generic
  message: Import statement references 'ui/utils/' which should be updated to 'utils/'
    after folder consolidation
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+[^;]+from\s+['"](\.\./)+ui/utils/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: ui-utils-import-with-multiline-names
  message: Multi-line import from 'ui/utils/*' should be updated to 'utils/*' after
    folder consolidation
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+\{[\s\S]*?\}\s+from\s+['"](\.\./)+ui/utils/[^'"]+['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: import-from-ui-utils-space-regex
  message: Import from 'ui/utils/space' should be updated to 'utils/space' after ui/
    folder consolidation
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+\{[^}]+\}\s+from\s+['"](\.\./|\.\./\.\./)+ui/utils/space['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: import-space-function-only
