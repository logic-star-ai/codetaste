rules:
- id: refactored-test-body-bytesio-dict
  message: Detected dict with Body and BytesIO (refactored from six.BytesIO)
  severity: INFO
  languages:
  - python
  pattern: "{\n    ...,\n    'Body': BytesIO(...),\n    ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/**
- id: refactored-general-isinstance-str-pattern
  message: Detected isinstance with str type (refactored from six types)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: isinstance($X, str)
    - pattern: isinstance($X, (str))
  - pattern-not-inside: 'six.string_types

      ...

      '
  - pattern-not-inside: 'six.text_type

      ...

      '
  - pattern-not-inside: 'from $MOD import six

      ...

      isinstance($X, str)

      '
  metadata:
    category: basic
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    exclude:
    - awscli/customizations/history/db.py
- id: refactored-no-six-import-with-isinstance-str
  message: Detected isinstance with str in code that doesn't import six
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: isinstance($VAR, str)
  - pattern-not-inside: 'from $MOD import six

      ...

      '
  - pattern-not-inside: 'import six

      ...

      '
  - metavariable-pattern:
      metavariable: $VAR
      patterns:
      - pattern-not: six.$ATTR
  metadata:
    category: basic
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    exclude:
    - awscli/customizations/history/db.py
- id: refactored-dict-body-bytesio
  message: Detected dict with Body key and BytesIO value (refactored from six.BytesIO)
  severity: INFO
