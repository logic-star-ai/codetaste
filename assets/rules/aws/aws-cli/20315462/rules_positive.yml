rules:
- id: tests-import-mock-botocore-only
  message: 'Migration detected: botocore test imports mock from tests'
  severity: INFO
  languages:
  - python
  pattern: from tests import mock
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/unit/botocore/**/*.py
    exclude:
    - tests/unit/botocore/docs/test_docstring.py
    - tests/unit/botocore/test_compress.py
    - tests/unit/botocore/test_http_session.py
    - tests/unit/botocore/test_httpchecksum.py
    - tests/unit/botocore/test_monitoring.py
    - tests/unit/botocore/test_tokens.py
  options:
    symbolic_propagation: true
- id: tests-import-unittest-mock-botocore
  message: 'Migration detected: botocore test imports mock from tests module'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from tests import unittest, $X, mock
    - pattern: from tests import unittest, $X, mock, $Y
    - pattern: from tests import $A, mock
    - pattern: from tests import $A, mock, $B
    - pattern: from tests import $A, $B, mock
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/unit/botocore/**/*.py
    exclude:
    - tests/unit/botocore/docs/test_docstring.py
    - tests/unit/botocore/test_http_session.py
    - tests/unit/botocore/test_monitoring.py
  options:
    symbolic_propagation: true
