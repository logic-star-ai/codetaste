rules:
- id: migrated-Mock-with-return-value-param
  message: File creates Mock with return_value parameter after migration
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.Mock(..., return_value=$VAL, ...)
  - pattern-not-inside: 'import mock

      ...

      '
  - pattern-not-inside: 'from mock import $ANY

      ...

      '
  metadata:
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/**/*.py'
    exclude:
    - '**/logs/test_tail.py'
    - '**/s3/test_presign_command.py'
- id: migrated-file-uses-patch-dict
  message: File uses patch.dict after migration from old mock import
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.patch.dict(...)
  - pattern-not-inside: 'import mock

      ...

      '
  - pattern-not-inside: 'from mock import $ANY

      ...

      '
  metadata:
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/**/*.py'
    exclude:
    - '**/ec2instanceconnect/test_websocket.py'
    - '**/test_compat.py'
- id: migrated-patch-with-return-value-param
  message: File uses patch with return_value parameter after migration
