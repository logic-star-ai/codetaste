- id: customizations-emr-all-migrated
  message: All EMR customization tests migrated from 'from mock import' to unittest.mock
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from tests import $IMPORTS
    - pattern: from awscli.testutils import $IMPORTS
  - metavariable-regex:
      metavariable: $IMPORTS
      regex: .*mock.*
  - pattern-not-inside: 'from mock import $X

      ...

      '
