- id: migrated-call-empty-args
  message: File uses mock.call() without arguments after migration
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $MOD.call()
  - pattern-not-inside: 'import mock

      ...

      '
  - pattern-not-inside: 'from mock import $ANY

      ...

      '
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/**/*.py'
    exclude:
    - '**/s3transfer/test_bandwidth.py'
- id: migrated-Mock-multiple-parameters
  message: File creates Mock with multiple parameters after migration
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $MOD.Mock($PARAM1=$VAL1, $PARAM2=$VAL2, ...)
  - pattern-not-inside: 'import mock

      ...

      '
  - pattern-not-inside: 'from mock import $ANY

      ...

      '
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/**/*.py'
    exclude:
    - '**/botocore/test_events.py'
