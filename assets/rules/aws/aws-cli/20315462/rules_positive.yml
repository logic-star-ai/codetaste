- id: unittest-mock-in-testutils
  message: Detected unittest.mock usage in testutils module
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from unittest import mock
    - pattern: from unittest.mock import $ITEM
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/testutils.py'
    - '**/awscli/testutils.py'
- id: newly-migrated-unittest-mock-import
  message: Detected newly migrated file using unittest.mock import
  severity: INFO
  languages:
  - python
  pattern: from unittest import mock
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/ec2instanceconnect/test_websocket.py'
    - '**/s3transfer/__init__.py'
    - '**/configured_endpoint_urls/test_configured_endpoint_url.py'
    - '**/ec2instanceconnect/test_opentunnel.py'
    - '**/ec2instanceconnect/test_ssh.py'
    - '**/awscli/testutils.py'
- id: migrated-patch-with-wraps-param
  message: File uses patch with wraps parameter after migration
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $MOD.patch(..., wraps=$VAL, ...)
  - pattern-not-inside: 'import mock

      ...

      '
  - pattern-not-inside: 'from mock import $ANY

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/**/*.py'
