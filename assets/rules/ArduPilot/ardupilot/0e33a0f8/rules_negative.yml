rules:
- id: copter-space-before-enabled
  message: Replace trailing 'ENABLED' with numeric value '1'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \s+ENABLED\s*$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 283
  paths:
    include:
    - '**/ArduCopter/**'
- id: copter-any-eq-enabled
  message: Replace 'FEATURE == ENABLED' with just 'FEATURE'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \w+\s*==\s*ENABLED
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 279
  paths:
    include:
    - '**/ArduCopter/**'
- id: copter-space-eq-enabled
  message: Replace '== ENABLED' comparison with simplified condition
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \s==\s+ENABLED
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 279
  paths:
    include:
    - '**/ArduCopter/**'
- id: copter-enabled-in-if-expr
  message: Replace ENABLED macro usage in preprocessor conditional
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#if.*\sENABLED\s'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 258
  paths:
    include:
    - '**/ArduCopter/**'
- id: copter-if-feature-eq-enabled
  message: Replace '#if FEATURE == ENABLED' with '#if FEATURE'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: ^\s*#\s*if\s+\w+\s*==\s*ENABLED
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 257
  paths:
    include:
    - '**/ArduCopter/**'
- id: copter-general-enabled-equality
  message: Replace '*_ENABLED == ENABLED' with just the feature flag name
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \w+_ENABLED\s*==\s*ENABLED
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 256
  paths:
    include:
    - '**/ArduCopter/**'
- id: copter-conditional-enabled-first
  message: Replace 'ENABLED == FEATURE' with simplified condition (reverse comparison)
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: ENABLED\s*==\s*\w+
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 256
  paths:
    include:
    - '**/ArduCopter/**'
- id: copter-mode-features-enabled
  message: Replace mode feature comparison '== ENABLED' with simplified condition
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: (ACRO|AUTO|BRAKE|CIRCLE|DRIFT|FLIP|FOLLOW|GUIDED|LOITER|POSHOLD|RTL|SMARTRTL|SPORT|THROW|ZIGZAG|TURTLE|FLOWHOLD|AUTOROTATE|SYSTEMID).*==\s*ENABLED
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 215
  paths:
    include:
    - '**/ArduCopter/**'
