rules:
- id: copter-refactor-apm-config-numeric-comment
  message: Detected refactored commented-out flag definition with numeric value in
    APM_Config.h
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: //\s*#define\s+(MODE_\w+_ENABLED|AUTOTUNE_ENABLED)\s+(1|0)\s+
  metadata:
    category: config
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - ArduCopter/APM_Config.h
- id: copter-refactor-apm-config-example-numeric
  message: Detected example config with numeric 0 value (refactored from DISABLED)
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: //\s*#define\s+(MODE_\w+_ENABLED|AUTOTUNE_ENABLED)\s+(0)\s+
  metadata:
    category: config
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - ArduCopter/APM_Config.h
- id: copter-refactor-numeric-in-apm-config-comments
  message: Detected commented config examples using numeric 0 with 'disable' text
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: //.*#define.*(MODE_\w+_ENABLED|AUTOTUNE_ENABLED).*0.*disable
  metadata:
    category: config
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - ArduCopter/APM_Config.h
- id: copter-refactor-all-modes-numeric-values
  message: Detected mode flag definition using direct numeric value (0 or 1)
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern-regex: (?m)^#\s*define\s+MODE_\w+_ENABLED\s+[01]$
  - pattern-not-regex: (?m)^#\s*define\s+MODE_\w+_ENABLED\s+(ENABLED|DISABLED)$
  metadata:
    category: basic
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - ArduCopter/config.h
    - ArduCopter/APM_Config.h
- id: copter-refactor-mode-flag-numeric-one
  message: Detected refactored mode flag using numeric value 1 instead of ENABLED
    macro
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: '#define $MODE 1

      '
  - metavariable-regex:
      metavariable: $MODE
      regex: ^MODE_(ACRO|AUTO|BRAKE|CIRCLE|DRIFT|FLIP|FOLLOW|GUIDED|GUIDED_NOGPS|LOITER|POSHOLD|RTL|SMARTRTL|SPORT|SYSTEMID|THROW|ZIGZAG|FLOWHOLD|AUTOROTATE|TURTLE)_ENABLED$
  - pattern-not: '#define $MODE ENABLED

      '
  metadata:
    category: basic
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: copter-refactor-mode-acro-ifdef
  message: 'Detected simplified #if for MODE_ACRO_ENABLED'
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-regex: (?m)^#if MODE_ACRO_ENABLED
  - pattern-not-regex: (?m)^#if MODE_ACRO_ENABLED\s*==\s*ENABLED
  metadata:
    category: basic
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - ArduCopter/Parameters.h
    - ArduCopter/Parameters.cpp
- id: copter-refactor-numeric-one-in-config-ifndef
  message: Detected mode flag defined with numeric 1 in config.h (refactored)
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-regex: (?m)^# define MODE_\w+_ENABLED 1$
  - pattern-not-regex: (?m)^# define MODE_\w+_ENABLED ENABLED$
  metadata:
    category: config
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - ArduCopter/config.h
- id: copter-refactor-numeric-one-mode-definitions
  message: Detected major mode flag defined with numeric value 1 in config.h
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: '#define $MODE 1

      '
  - metavariable-regex:
      metavariable: $MODE
      regex: ^MODE_(ACRO|AUTO|BRAKE|CIRCLE|DRIFT|FLIP|GUIDED|LOITER|POSHOLD|RTL|SMARTRTL|THROW|ZIGZAG)_ENABLED$
  metadata:
    category: basic
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - ArduCopter/config.h
- id: copter-refactor-config-numeric-default-zero
  message: Detected feature flag in config.h refactored to numeric value 0
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: '# define $FLAG 0

      '
  - metavariable-regex:
      metavariable: $FLAG
      regex: ^(MODE_.*_ENABLED|.*_ENABLED|AUTOTUNE_ENABLED|TOY_MODE_ENABLED|WEATHERVANE_ENABLED|USER_PARAMS_ENABLED|ADVANCED_FAILSAFE|AC_NAV_GUIDED)$
  - pattern-not: '# define $FLAG DISABLED

      '
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - ArduCopter/config.h
