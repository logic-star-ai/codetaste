  - pattern-not-regex: (?m)^#if MODE_ACRO_ENABLED == ENABLED \|\| MODE_SPORT_ENABLED
      == ENABLED
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
