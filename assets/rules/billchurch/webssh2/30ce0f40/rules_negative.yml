    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-array-isarray-check
  message: 'Old pattern: Inline Array.isArray check in validation. Extract to validation
    helper'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'Array.isArray($VAL)

    '
  metadata:
