rules:
- id: detect-security-detect-object-injection-comment
  message: 'Old pattern: Disabling security linting inline. Ensure proper validation
    helpers are used to avoid injection'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '// eslint-disable-next-line security/detect-object-injection

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - app/validation/
- id: detect-password-mask-inline
  message: 'Old pattern: Inline password masking. Use maskSensitiveConfig() or PASSWORD_MASK
    constant'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '$PASSWORD != null && $PASSWORD !== '''' ? ''***'' : null

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-privatekey-mask-inline
  message: 'Old pattern: Inline privateKey masking. Use maskSensitiveConfig() or maskCredentials()
