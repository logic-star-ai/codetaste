- id: detect-typeof-object-null-check
  message: 'Old pattern: Inline object type + null check. Extract to validation helper'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'typeof $VAL !== ''object'' || $VAL == null

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - app/validation/
- id: detect-multiple-result-ok-checks
  message: 'Old pattern: Multiple sequential Result.ok checks. Simplify with early
    returns or helper function'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "if ($RESULT1.ok) {\n  ...\n}\n...\nif ($RESULT2.ok) {\n  ...\n}\n...\n\
    if ($RESULT3.ok) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
