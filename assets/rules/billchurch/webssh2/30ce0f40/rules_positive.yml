  - typescript
  pattern: 'import { $CONST } from ''../constants.js''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - app/errors/*.ts
- id: webssh2-refactor-config-error-file
  message: Detected new config error file split from monolithic errors.ts
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - app/errors/config-error.ts
- id: webssh2-refactor-ssh-error-file
  message: Detected new SSH connection error file split from monolithic errors.ts
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - app/errors/ssh-connection-error.ts
- id: webssh2-refactor-config-error-export
  message: Detected ConfigError class export in separate file (error hierarchy split)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "export class ConfigError extends $BASE {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $BASE
      patterns:
      - pattern-either:
        - pattern: WebSSH2Error
        - pattern: Error
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - app/errors/config-error.ts
- id: webssh2-refactor-ssh-connection-error-export
  message: Detected SSHConnectionError class export in separate file (error hierarchy
    split)
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "export class SSHConnectionError extends $BASE {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $BASE
      patterns:
      - pattern-either:
        - pattern: WebSSH2Error
        - pattern: Error
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - app/errors/ssh-connection-error.ts
- id: webssh2-refactor-import-from-config-error
  message: Detected import from split config-error module
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: 'import { $X } from ''./errors/config-error.js''

      '
  - pattern: 'import { $X } from ''../errors/config-error.js''

      '
  - pattern: 'import { $X } from ''../../errors/config-error.js''

      '
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: webssh2-refactor-import-from-ssh-connection-error
