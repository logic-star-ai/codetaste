rules:
- id: webssh2-refactor-messages-import-in-error-file
  message: Detected MESSAGES import in error module (error refactoring)
  severity: INFO
  languages:
  - typescript
  pattern: 'import { MESSAGES } from ''../constants.js''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - app/errors/*.ts
- id: webssh2-refactor-any-super-call-with-message
  message: Detected super call with message parameter in error file
  severity: INFO
  languages:
  - typescript
  pattern: 'super(message, $CODE)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - app/errors/*.ts
- id: webssh2-refactor-import-messages-constant
  message: Detected MESSAGES constant import in error file
  severity: INFO
  languages:
  - typescript
  pattern: 'import { MESSAGES } from ''../constants.js''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - app/errors/*.ts
- id: webssh2-refactor-message-parameter-in-super
  message: Detected super with message parameter in error constructor
  severity: INFO
  languages:
  - typescript
  pattern: 'super(message, $CODE)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - app/errors/*.ts
- id: webssh2-refactor-webssh2error-alternative-import
  message: Detected WebSSH2Error import from webssh2-error (error hierarchy)
  severity: INFO
  languages:
  - typescript
  pattern: 'import { WebSSH2Error } from ''./webssh2-error.js''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: webssh2-refactor-constants-import-in-errors
  message: Detected constants import in error module
  severity: INFO
