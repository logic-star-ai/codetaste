rules:
- id: diy-backend-blob-operations
  message: Detected blob operations in DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $BUCKET.WriteAll($CTX, $KEY, $DATA, $OPTS)
    - pattern: $BUCKET.ReadAll($CTX, $KEY)
    - pattern: $BUCKET.Delete($CTX, $KEY)
    - pattern: $BUCKET.Exists($CTX, $KEY)
  metadata:
    nr_refactored_patterns: 80
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-backend-url-string-literal
  message: Detected string mentioning DIY backend URL schemes
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '"$STR"'
    - pattern: return "$STR"
  - metavariable-regex:
      metavariable: $STR
      regex: (?i).*(file://|s3://|gs://|azblob://).*
  metadata:
    nr_refactored_patterns: 53
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-backend-field-access
  message: Detected field access on DIY backend instance
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $BACKEND.$FIELD
  - metavariable-regex:
      metavariable: $BACKEND
      regex: (?i).*diy.*
  - pattern-not-regex: (?i).*(local|filestate).*
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: diy-backend-fmt-errorf-usage
  message: Detected fmt.Errorf in DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: fmt.Errorf($FMT, ...)
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-backend-type-assertion
  message: Detected type assertion to DIY backend type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $VAR.(*$TYPE)
    - pattern: $VAR, $OK := $EXPR.(*$TYPE)
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*diy[Bb]ackend.*
  - pattern-not-regex: (?i).*(local[Bb]ackend|filestate).*
  metadata:
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: diy-backend-method-call-chain
  message: Detected method call on DIY backend instance
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $BACKEND.$METHOD(...)
  - metavariable-regex:
      metavariable: $BACKEND
      regex: (?i).*diy.*
  - pattern-not-regex: (?i).*(local|filestate).*
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: diy-backend-path-join
  message: Detected path.Join in DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: path.Join(...)
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-backend-contract-require
  message: Detected contract.Require in DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: contract.Require($COND, $MSG)
    - pattern: contract.Requiref($COND, $FMT, ...)
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-backend-filepath-join
  message: Detected filepath.Join in DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: filepath.Join(...)
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-package-declaration
  message: Detected package diy declaration instead of package filestate
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: package diy
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/*.go'
    exclude:
    - '**/backend/filestate/*.go'
    - '**/backend/local/*.go'
- id: diy-backend-qualified-type-reference
  message: Detected qualified reference to DIY backend type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.$TYPE
    - pattern: var $VAR $PKG.$TYPE
    - pattern: func $FUNC(...) $PKG.$TYPE { ... }
  - metavariable-regex:
      metavariable: $PKG
      regex: ^diy$
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^[A-Z].*
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: diy-backend-errors-new-usage
  message: Detected errors.New in DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: errors.New($MSG)
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-backend-make-call
  message: Detected make() call for DIY backend type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: make($TYPE, ...)
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*diy.*
  - pattern-not-regex: (?i).*(local|filestate).*
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: diy-backend-function-call
  message: Detected call to function with DIY in name
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $FUNC(...)
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i)^(new|create|get|is).*[Dd][Ii][Yy].*
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: test-file-in-diy-directory
  message: Detected test file in diy backend directory
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/*_test.go'
    - '**/integration/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
    - '**/backend/local/**'
- id: diy-backend-gcerrors-usage
  message: Detected gcerrors package usage in DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: gcerrors.Code($ERR)
    - pattern: gcerrors.NotFound
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-backend-bucket-close
  message: Detected bucket closing in DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $BUCKET.Close()
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-backend-display-resource-changes
  message: Detected display.ResourceChanges in DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $FUNC(...) (display.ResourceChanges, result.Result) { ... }
    - pattern: func ($RECV) $METHOD(...) (display.ResourceChanges, result.Result)
        { ... }
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-backend-url-validation-call
  message: Detected call to IsDIYBackendURL function
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.IsDIYBackendURL($URL)
    - pattern: IsDIYBackendURL($URL)
  - pattern-not: $PKG.IsFileStateBackendURL($URL)
  - pattern-not: IsFileStateBackendURL($URL)
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: diy-backend-return-type
  message: Detected function returning DIY backend type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $FUNC(...) *$TYPE { ... }
    - pattern: func $FUNC(...) (*$TYPE, error) { ... }
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*diy[Bb]ackend.*
  - pattern-not-regex: (?i).*(local[Bb]ackend|filestate).*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: diy-backend-error-return-flow
  message: Detected error flow from DIY backend operation
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: $BACKEND.$METHOD(...)
      - pattern: $FUNC(...)
    - metavariable-regex:
        metavariable: $BACKEND
        regex: (?i).*diy.*
  pattern-sinks:
  - pattern: return ..., $ERR
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: diy-backend-encoding-json
  message: Detected JSON encoding/decoding in DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: encoding.JSON.Marshal($VAL)
    - pattern: encoding.JSON.Unmarshal($DATA, $VAL)
    - pattern: json.Marshal($VAL)
    - pattern: json.Unmarshal($DATA, $VAL)
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/**/*.go'
    exclude:
    - '**/backend/filestate/**'
- id: diy-backend-time-now
  message: Detected time.Now usage in DIY backend
  severity: INFO
