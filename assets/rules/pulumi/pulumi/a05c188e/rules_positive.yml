rules:
- id: diy-method-receiver
  message: Detected method with DIY-prefixed receiver
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($RECV *$TYPE) $METHOD(...) $RET { ... }
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^diy[A-Z][a-zA-Z]*$
  metadata:
    nr_refactored_patterns: 86
    nr_legacy_patterns: 0
- id: diy-backend-type-assertion
  message: Detected type assertion to DIY backend type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $VAR.(*$TYPE)
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^diy[A-Z][a-zA-Z]*$
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
- id: diy-backend-go-files
  message: Detected Go files in DIY backend directory
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/*.go'
    exclude:
    - '**/backend/filestate/*.go'
- id: diy-backend-call-with-context
  message: Detected DIY backend function call with context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $VAR.$METHOD($CTX, ...)
  - metavariable-regex:
      metavariable: $VAR
      regex: ^diy
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: diy-import-in-cmd-files
  message: Detected DIY backend import in command files
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*github\.com/pulumi/pulumi/pkg/v3/backend/diy"?$
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: diy-backend-url-call
  message: Detected call to DIY backend URL function
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC($ARG)
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i)^Is.*DIY.*URL$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: diy-imports-in-cmd
  message: Detected DIY backend import in command files
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PATH"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/backend/diy"?$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cmd/**/*.go'
    - '**/pkg/cmd/**/*.go'
- id: diy-backend-taint-from-url-check
  message: Detected DIY backend check result flowing to backend creation
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $PKG.$FUNC($ARG)
    - metavariable-regex:
        metavariable: $FUNC
        regex: (?i).*DIY.*URL$
  pattern-sinks:
  - pattern: if $RESULT { ... }
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: diy-backend-reference-type
  message: Detected DIY backend reference type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: type $REF struct { ... }
  - metavariable-regex:
      metavariable: $REF
      regex: ^diy.*[Rr]eference$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: diy-stack-type
  message: Detected DIY stack type (not localStack)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: type $STACK struct { ... }
  - metavariable-regex:
      metavariable: $STACK
      regex: ^diy.*[Ss]tack$
  - pattern-not: type localStack struct { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: diy-backend-constructor
  message: Detected DIY backend constructor function
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func $FUNC(...) (*$TYPE, error) { ... }
    - pattern: func $FUNC(...) ($TYPE, error) { ... }
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^new[A-Z].*[Bb]ackend$
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^diy[A-Z]
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: diy-backend-interface-method
  message: Detected DIY backend interface method (not local())
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($RECV *$TYPE) $METHOD() { ... }
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^diy$
  - pattern-not: func ($R *$T) local() { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: diy-snapshot-persister-type
  message: Detected DIY snapshot persister type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: type $PERSISTER struct { ... }
  - metavariable-regex:
      metavariable: $PERSISTER
      regex: ^diy.*[Pp]ersister$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: diy-query-type
  message: Detected DIY query type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: type $QUERY struct { ... }
  - metavariable-regex:
      metavariable: $QUERY
      regex: ^diy.*[Qq]uery$
  - pattern-not: type localQuery struct { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: diy-backend-fmt-error
  message: Detected fmt error with DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: fmt.$FUNC("$MSG", ...)
  - metavariable-regex:
      metavariable: $MSG
      regex: (?i).*DIY\s+backend.*
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(Errorf|Sprintf)$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: diy-backend-multiline-comment
  message: Detected multiline comment about DIY backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: /\*[\s\S]*DIY\s+backend[\s\S]*\*/
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: diy-package-doc-file
  message: Detected doc.go in DIY backend package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/backend/diy/doc.go'
- id: diy-var-name-backend
  message: Detected variable name with DIY backend prefix
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $VAR := $EXPR
  - metavariable-regex:
      metavariable: $VAR
      regex: ^diy[A-Z][a-zA-Z]*$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
