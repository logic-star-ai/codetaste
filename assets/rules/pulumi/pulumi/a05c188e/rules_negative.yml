rules:
- id: error-message-local-backend
  message: Error message should use 'DIY backend' instead of 'local backend' (unless
    referring to local filesystem specifically)
  severity: WARNING
  languages:
  - go
  pattern-regex: (?i)"[^"]*local\s*backend[^"]*"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 95
- id: local-backend-method-receiver
  message: Method receiver type '*localBackend' should be changed to '*diyBackend'
  severity: WARNING
  languages:
  - go
  pattern: 'func ($RECV *localBackend) $METHOD(...) { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 62
- id: string-literal-filestate-backend
  message: String literal should use 'DIY backend' instead of 'filestate backend'
    or 'Filestate backend'
  severity: WARNING
  languages:
  - go
  pattern-regex: '"[^"]*[Ff]ilestate backend[^"]*"'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: filestate-struct-tag
  message: Struct tag containing 'filestate' should use 'diy' instead
  severity: WARNING
  languages:
  - go
  pattern-regex: '`[^`]*filestate[^`]*`'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: local-stack-method-receiver
  message: Method receiver type '*localStack' should be changed to '*diyStack'
  severity: WARNING
  languages:
  - go
  pattern: 'func ($RECV *localStack) $METHOD(...) { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: local-backend-type-assertion
  message: Type assertion to '*localBackend' should be changed to '*diyBackend'
  severity: WARNING
  languages:
  - go
  pattern: '$VAR.(*localBackend)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: comment-local-backend-reference
  message: Comment should use 'DIY backend' instead of 'local backend' (unless referring
    to local filesystem specifically)
  severity: INFO
  languages:
  - go
  pattern-regex: //.*local backend.*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: filestate-package-reference
  message: Package reference 'filestate' should be changed to 'diy'
  severity: WARNING
  languages:
  - go
  pattern: 'filestate.$FUNC(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: string-literal-local-backend-generic
  message: String literal should use 'DIY backend' instead of 'local backend' (unless
    referring to local filesystem specifically)
  severity: WARNING
  languages:
  - go
  pattern-regex: '"[^"]*local backend[^"]*"'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: local-backend-reference-method-receiver
  message: Method receiver type '*localBackendReference' should be changed to '*diyBackendReference'
  severity: WARNING
  languages:
  - go
  pattern: 'func ($RECV *localBackendReference) $METHOD(...) { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: filestate-package-import
  message: Import should use 'pkg/v3/backend/diy' instead of 'pkg/v3/backend/filestate'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/pulumi/pulumi/pkg/v3/backend/filestate"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: import-path-backend-filestate
  message: Import path should use 'pkg/v3/backend/diy' instead of 'pkg/v3/backend/filestate'
  severity: WARNING
  languages:
  - go
  pattern-regex: '"github\.com/pulumi/pulumi/pkg/v3/backend/filestate"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: format-string-filestate-backend
  message: Format string should use 'DIY backend' instead of 'filestate backend' or
    'Filestate backend'
  severity: WARNING
  languages:
  - go
  pattern-regex: '`[^`]*[Ff]ilestate backend[^`]*`'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: new-local-backend-call
  message: Function call 'newLocalBackend' should be changed to 'newDIYBackend'
  severity: WARNING
  languages:
  - go
  pattern: 'newLocalBackend(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: local-backend-options-composite
  message: Type '&localBackendOptions' should be changed to '&diyBackendOptions'
  severity: WARNING
  languages:
  - go
  pattern: '&localBackendOptions{...}

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: format-string-local-backend
  message: Format string should use 'DIY backend' instead of 'local backend' (unless
    referring to local filesystem specifically)
  severity: WARNING
  languages:
  - go
  pattern-regex: '`[^`]*local backend[^`]*`'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: multiline-comment-filestate
  message: Multi-line comment containing 'filestate' should use 'DIY' instead
  severity: INFO
  languages:
  - go
  pattern-regex: /\*[\s\S]*filestate[\s\S]*\*/
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: test-file-filestate-path
  message: Test file in 'tests/integration/backend/filestate/' should be moved to
    'tests/integration/backend/diy/'
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - tests/integration/backend/filestate/*.go
- id: local-backend-reference-factory
  message: Function return type '*localBackendReference' should be changed to '*diyBackendReference'
  severity: WARNING
  languages:
  - go
  pattern: 'func $NAME(...) (*localBackendReference, error) { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: filestate-new-function-call
  message: Package reference 'filestate.New' should be changed to 'diy.New'
  severity: WARNING
  languages:
  - go
  pattern: 'filestate.New(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: local-backend-struct-field
  message: Struct field type '*localBackend' should be changed to '*diyBackend'
  severity: WARNING
  languages:
  - go
  pattern: "type $STRUCT struct {\n  ...\n  $FIELD *localBackend\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: string-literal-local-backend-noun
  message: String literal should use 'the DIY backend' instead of 'the local backend'
  severity: WARNING
  languages:
  - go
  pattern-regex: '"[^"]*the local backend[^"]*"'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: multiline-comment-local-backend
  message: Multi-line comment containing 'local backend' should use 'DIY backend'
    instead
