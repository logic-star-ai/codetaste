    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: local-backend-in-type-name
  message: Type name containing 'LocalBackend' or 'localBackend' should use 'DIYBackend'
    or 'diyBackend' instead
  severity: WARNING
  languages:
