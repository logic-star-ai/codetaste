rules:
- id: detect-function-param-audiopath-enum
  message: AudioPath enum value should be replaced with AudioPathType enum
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \bAudioPath::(MASTER|VINYLCONTROL|MICROPHONE|AUXILIARY)\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: detect-master-buffer-variable
  message: Variable masterBuffer should be renamed to mainBuffer
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \bmasterBuffer\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-m-master-audio-latency
  message: Variable starting with m_masterAudioLatency should use m_mainAudioLatency
    prefix
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \bm_masterAudioLatency[A-Z][a-zA-Z0-9_]*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-m-pmaster-enabled-var
