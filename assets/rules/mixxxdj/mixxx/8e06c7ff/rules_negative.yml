- id: detect-micmonitormode-enum-value
  message: MicMonitorMode::$VALUE should use inclusive naming (Main, MainAndBooth)
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: MicMonitorMode::$VALUE
  - metavariable-pattern:
      metavariable: $VALUE
