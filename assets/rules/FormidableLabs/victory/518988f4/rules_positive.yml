rules:
- id: victory-package-json-no-prop-types-dependency
  message: Victory package.json no longer contains prop-types dependency after refactoring
  severity: INFO
  languages:
  - json
  pattern-regex: (?s)\A(?!.*"prop-types").*\z
  metadata:
    category: dependency
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - packages/victory-core/package.json
    - packages/victory-area/package.json
    - packages/victory-axis/package.json
    - packages/victory-bar/package.json
    - packages/victory-box-plot/package.json
