- id: histogram-interface-includes-both-read-write
  message: Histogram interface mixes read and write methods - should be split into
    Histogram (write) and HistogramSnapshot (read)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type Histogram interface {\n  ...\n  Update($T)\n  ...\n  Mean() $R\n\
      \  ...\n}\n"
