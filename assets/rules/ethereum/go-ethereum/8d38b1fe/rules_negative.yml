- id: snapshot-creation-with-type-assertion
  message: Snapshot creation with type assertion to exported type - types should be
    unexported after refactoring
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $RECV.sample.Snapshot().(*SampleSnapshot)
  - pattern: $RECV.histogram.Snapshot().(*HistogramSnapshot)
  - pattern: $RECV.meter.Snapshot().(*MeterSnapshot)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: counter-read-operations-without-snapshot
  message: Reading Counter without calling Snapshot() first - use $VAR.Snapshot().Count()
    instead
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $VAR.Count()
    - pattern: return $VAR.Count()
  - metavariable-type:
      metavariable: $VAR
      types:
      - metrics.Counter
      - Counter
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: sample-snapshot-recalculates-max
  message: SampleSnapshot.Max() recalculates on every call - should be calculated
    once during snapshot creation
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'func ($RECV *SampleSnapshot) Max() int64 { return SampleMax($RECV.values)
      }

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
