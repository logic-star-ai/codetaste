rules:
- id: histogram-snapshot-delegates-to-sample
  message: HistogramSnapshot delegates to sample methods - causes recalculation on
    every call
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func ($RECV *HistogramSnapshot) Count() int64 { return $RECV.sample.Count()
        }

        '
    - pattern: 'func ($RECV *HistogramSnapshot) Max() int64 { return $RECV.sample.Max()
        }

        '
    - pattern: 'func ($RECV *HistogramSnapshot) Mean() float64 { return $RECV.sample.Mean()
        }

        '
    - pattern: 'func ($RECV *HistogramSnapshot) Min() int64 { return $RECV.sample.Min()
        }

        '
    - pattern: 'func ($RECV *HistogramSnapshot) Sum() int64 { return $RECV.sample.Sum()
        }

        '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: timer-snapshot-delegates-to-histogram-sample
  message: TimerSnapshot delegates to histogram methods - causes recalculation on
    every call
  severity: WARNING
  languages:
  - go
  patterns:
