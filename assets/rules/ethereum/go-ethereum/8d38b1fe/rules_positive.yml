rules:
- id: timer-snapshot-delegating-to-histogram-snapshot
  message: Detected timerSnapshot delegating to histogram snapshot (composition pattern)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *timerSnapshot) $METHOD() $RET {\n  return $RECV.histogram.$METHOD()\n\
      }\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: (Mean|Min|Max|Sum|Count|StdDev|Variance|Percentile|Percentiles)
  metadata:
    category: architecture
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: timer-snapshot-delegating-to-meter-snapshot
  message: Detected timerSnapshot delegating to meter snapshot (composition pattern)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *timerSnapshot) $METHOD() $RET {\n  return $RECV.meter.$METHOD()\n\
      }\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: (Rate1|Rate5|Rate15|RateMean)
  metadata:
    category: architecture
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: meter-snapshot-returning-fields
  message: Detected meterSnapshot methods returning precomputed fields (no recalculation)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func ($RECV *meterSnapshot) Rate1() float64 {\n  return $RECV.rate1\n\
        }\n"
    - pattern: "func ($RECV *meterSnapshot) Rate5() float64 {\n  return $RECV.rate5\n\
        }\n"
    - pattern: "func ($RECV *meterSnapshot) Rate15() float64 {\n  return $RECV.rate15\n\
        }\n"
    - pattern: "func ($RECV *meterSnapshot) RateMean() float64 {\n  return $RECV.rateMean\n\
        }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
