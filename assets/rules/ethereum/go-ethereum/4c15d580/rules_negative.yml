rules:
- id: old-trie-newdatabase-with-exclusion
  message: 'Old function call detected: ''trie.NewDatabase()'' should be replaced
    with ''triedb.NewDatabase()'''
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: trie.NewDatabase($DB, $CFG)
  - pattern: trie.NewDatabase($DB, nil)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 59
  paths:
    exclude:
    - cmd/utils/history_test.go
- id: old-trie-newdatabase-two-args
  message: 'Old ''trie.NewDatabase()'' call detected: should use ''triedb.NewDatabase()'''
  severity: WARNING
  languages:
  - go
  pattern: trie.NewDatabase($ARG1, $ARG2)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 59
  paths:
    exclude:
    - cmd/utils/history_test.go
- id: old-trie-database-in-tests
  message: 'Test uses old ''trie.NewDatabase()'': should use ''triedb.NewDatabase()'''
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: trie.NewDatabase($DB, $CFG)
  - metavariable-pattern:
      metavariable: $CFG
      patterns:
      - pattern-either:
        - pattern: nil
        - pattern: $X
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
  paths:
    include:
    - '**/*_test.go'
    exclude:
    - cmd/utils/history_test.go
- id: old-trie-database-assignment
  message: 'Assignment uses old ''trie.NewDatabase()'': should use ''triedb.NewDatabase()'''
  severity: WARNING
  languages:
  - go
  pattern: '$VAR = trie.NewDatabase(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
- id: old-trie-config-composite-literal
  message: 'Old config instantiation: should use ''&triedb.Config{...}'' instead of
    ''&trie.Config{...}'''
  severity: WARNING
  languages:
  - go
  pattern: '&trie.Config{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: old-trie-database-short-var-decl
