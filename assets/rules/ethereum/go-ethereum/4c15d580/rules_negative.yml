- id: old-trie-database-method-definition
  message: Database method in trie package should be moved to triedb package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'func ($RECV *Database) $METHOD(...) $RET { ... }

      '
  - metavariable-pattern:
      metavariable: $METHOD
      patterns:
      - pattern-either:
        - pattern: Update
        - pattern: Commit
        - pattern: Size
        - pattern: Initialized
        - pattern: Scheme
        - pattern: Reader
