    - core/gen_genesis_account.go
- id: func-param-core-genesis-alloc
  message: Function parameter should use types.GenesisAlloc instead of core.GenesisAlloc
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: 'func $FUNC(..., $PARAM core.GenesisAlloc, ...) { ... }

      '
  - pattern: 'func ($RECV $TYPE) $FUNC(..., $PARAM core.GenesisAlloc, ...) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: struct-field-core-genesis-alloc
  message: Struct field should use types.GenesisAlloc instead of core.GenesisAlloc
  severity: WARNING
  languages:
  - go
  pattern: "type $STRUCT struct {\n  ...\n  $FIELD core.GenesisAlloc\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: makeprestate-uses-core-genesis-alloc
  message: MakePreState should use types.GenesisAlloc instead of core.GenesisAlloc
  severity: WARNING
  languages:
  - go
  pattern: "func MakePreState($DB ethdb.Database, $ACCOUNTS core.GenesisAlloc, ...)\
    \ $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: genesis-account-enc-var-declaration
  message: GenesisAccount var declaration in MarshalJSON should be in core/types/gen_account.go
    for Account
  severity: WARNING
  languages:
  - go
  pattern: 'var $ENC GenesisAccount

    '
