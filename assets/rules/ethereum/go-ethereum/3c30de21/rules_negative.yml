  message: GenesisAlloc type should be moved to core/types package
  severity: WARNING
  languages:
  - go
  pattern: 'type GenesisAlloc map[$ADDR]GenesisAccount

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - core/genesis.go
- id: old-gen-genesis-account-file-exists
  message: Generated file core/gen_genesis_account.go should be moved to core/types/gen_account.go
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - core/gen_genesis_account.go
- id: genesis-account-marshal-in-core-package
  message: GenesisAccount MarshalJSON should be in core/types/gen_account.go for Account
    type
  severity: WARNING
  languages:
  - go
  pattern: "func ($G GenesisAccount) MarshalJSON() ([]byte, error) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - core/gen_genesis_account.go
