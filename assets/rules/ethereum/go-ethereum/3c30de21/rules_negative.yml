  message: GenesisAccount struct should be moved to core/types package as Account
    struct
  severity: WARNING
  languages:
  - go
  pattern: "type GenesisAccount struct {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - core/genesis.go
