  paths:
    include:
    - core/gen_genesis_account.go
- id: storage-json-cast-to-common-hash
  message: storageJSON to common.Hash cast in generated code should be in core/types/gen_account.go
  severity: WARNING
  languages:
  - go
  pattern: 'common.Hash($K)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - core/gen_genesis_account.go
- id: storage-json-cast-from-hash
  message: common.Hash to storageJSON cast in generated code should be in core/types/gen_account.go
  severity: WARNING
  languages:
  - go
  pattern: 'storageJSON($K)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - core/gen_genesis_account.go
