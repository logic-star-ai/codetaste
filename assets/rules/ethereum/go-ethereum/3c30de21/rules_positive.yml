rules:
- id: any-types-genesis-alloc-usage
  message: Detected any usage of types.GenesisAlloc
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: types\.GenesisAlloc
  metadata:
    nr_refactored_patterns: 120
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
- id: make-types-genesis-alloc
  message: Detected make() call creating types.GenesisAlloc
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: make($PKG.GenesisAlloc, ...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 79
    nr_legacy_patterns: 0
- id: any-line-in-account-go
  message: Any line in account.go
  severity: INFO
  languages:
  - go
  pattern-regex: .+
  metadata:
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: types-genesis-alloc-in-core-tests
  message: Detected types.GenesisAlloc in core package tests
  severity: INFO
  languages:
  - go
  pattern-regex: types\.GenesisAlloc
  metadata:
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - core/**/*_test.go
- id: any-types-account-usage
  message: Detected any usage of types.Account
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: types\.Account
  metadata:
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
- id: types-genesis-alloc-in-eth-test
  message: Detected types.GenesisAlloc in eth package tests
  severity: INFO
  languages:
  - go
  pattern-regex: types\.GenesisAlloc
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - eth/**/*_test.go
- id: import-types-account-struct
  message: Detected usage of types package Account in import with struct literal
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.Account{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: conversion-make-types-genesis-alloc-with-size
  message: Detected make with types.GenesisAlloc and size parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: make($PKG.GenesisAlloc, $SIZE)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: genesis-alloc-in-ethapi-test
  message: Detected GenesisAlloc usage in internal ethapi test
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.GenesisAlloc{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(core\.)?types$
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - internal/ethapi/**/*_test.go
- id: types-genesis-alloc-in-core-non-test
  message: Detected types.GenesisAlloc in core non-test files
  severity: INFO
  languages:
  - go
  pattern-regex: types\.GenesisAlloc
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - core/*.go
    exclude:
    - core/*_test.go
- id: genesis-alloc-in-tracer-test
  message: Detected GenesisAlloc usage in tracer test
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.GenesisAlloc{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(core\.)?types$
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - eth/tracers/**/*_test.go
- id: genesis-alloc-in-ethclient-test
  message: Detected GenesisAlloc usage in ethclient test
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.GenesisAlloc{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(core\.)?types$
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - ethclient/**/*_test.go
- id: struct-field-with-types-genesis-alloc
  message: Detected struct field using types.GenesisAlloc type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $STRUCT struct {\n  ...\n  $FIELD $PKG.GenesisAlloc\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: map-literal-address-to-types-account
  message: Detected map literal with Address keys and types.Account values
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: map[$ADDR]$PKG.Account{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: function-call-new-backend-types-genesis-alloc
  message: Detected NewBackend call with types.GenesisAlloc argument
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: NewBackend($PKG.GenesisAlloc{...}, ...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: function-param-types-genesis-alloc
  message: Detected function parameter with types.GenesisAlloc type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC(..., $PARAM $PKG.GenesisAlloc, ...) { ... }
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: types-genesis-alloc-in-graphql
  message: Detected types.GenesisAlloc in graphql
  severity: INFO
  languages:
  - go
  pattern-regex: types\.GenesisAlloc
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - graphql/**/*.go
- id: lgpl-license-in-account
  message: LGPL license mention in account.go
  severity: INFO
  languages:
  - go
  pattern-regex: GNU Lesser General Public License
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: pointer-to-types-genesis-alloc-parameter
  message: Detected function parameter with pointer to types.GenesisAlloc
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC(..., $PARAM *$PKG.GenesisAlloc, ...) { ... }
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: test-genesis-alloc-assignment
  message: Detected Genesis Alloc field assignment
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $VAR.Alloc = $PKG.GenesisAlloc{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: types-genesis-alloc-in-eth-protocols
  message: Detected types.GenesisAlloc in eth/protocols
  severity: INFO
  languages:
  - go
  pattern-regex: types\.GenesisAlloc
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - eth/protocols/**/*.go
- id: type-alias-genesis-account-to-types-account
  message: 'Detected type alias for backwards compatibility: GenesisAccount = types.Account'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: type $OLDNAME = $PKG.Account
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  - metavariable-regex:
      metavariable: $OLDNAME
      regex: (?i).*(genesis|alloc|account).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/genesis.go'
- id: type-alias-genesis-alloc-to-types-alloc
  message: 'Detected type alias for backwards compatibility: GenesisAlloc = types.GenesisAlloc'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: type $OLDNAME = $PKG.GenesisAlloc
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  - metavariable-regex:
      metavariable: $OLDNAME
      regex: (?i).*(genesis|alloc).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/genesis.go'
- id: function-return-types-genesis-alloc
  message: Detected function return type types.GenesisAlloc
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC(...) $PKG.GenesisAlloc { ... }
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: file-exists-core-types-account
  message: Detected new file core/types/account.go created during refactoring
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: file-exists-core-types-gen-account
  message: Detected generated file moved to core/types/gen_account.go
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/gen_account.go
- id: type-definition-account-in-types-package
  message: Detected Account type definition in core/types package
  severity: INFO
  languages:
  - go
  pattern: "type Account struct {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: type-definition-genesis-alloc-in-types-package
  message: Detected GenesisAlloc type definition in core/types package
  severity: INFO
  languages:
  - go
  pattern: 'type GenesisAlloc map[$KEY]Account

    '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: package-declaration-types-account-file
  message: Detected package types declaration in account.go file
  severity: INFO
  languages:
  - go
  pattern: package types
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: unmarshal-json-method-genesis-alloc-types
  message: Detected UnmarshalJSON method for GenesisAlloc in types package
  severity: INFO
  languages:
  - go
  pattern: "func ($RECV *GenesisAlloc) UnmarshalJSON(...) error {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: storage-json-type-in-types-package
  message: Detected storageJSON helper type in types package
  severity: INFO
  languages:
  - go
  pattern: type storageJSON $TYPE
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: go-generate-comment-account-types
  message: Detected go:generate comment for Account in types package
  severity: INFO
  languages:
  - go
  pattern-regex: //go:generate.*-type Account.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: variable-declaration-with-make-no-size-types-genesis-alloc
  message: Detected variable declaration with make(types.GenesisAlloc)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $VAR := make($PKG.GenesisAlloc)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: copyright-header-account-file
  message: Detected copyright header in account.go
  severity: INFO
  languages:
  - go
  pattern-regex: // Copyright.*go-ethereum.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: import-big-in-account-file
  message: Detected math/big import in account.go
  severity: INFO
  languages:
  - go
  pattern: "import (\n  ...\n  \"math/big\"\n  ...\n)\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: genesis-alloc-in-miner-test
  message: Detected GenesisAlloc usage in miner test
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.GenesisAlloc{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(core\.)?types$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - miner/**/*_test.go
- id: genesis-alloc-in-history-test
  message: Detected GenesisAlloc usage in history test
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.GenesisAlloc{...}
  - metavariable-regex:
      metavariable: $PKG
