rules:
- id: types-genesisalloc-in-map-literal
  message: Detected types.GenesisAlloc literal initialization
  severity: INFO
  languages:
  - go
  pattern: 'types.GenesisAlloc{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 79
    nr_legacy_patterns: 0
- id: types-genesisalloc-in-composite-literal
  message: Detected types.GenesisAlloc in composite literal
  severity: INFO
  languages:
  - go
  pattern: "$T{\n  ...,\n  $FIELD: types.GenesisAlloc{...},\n  ...,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 65
    nr_legacy_patterns: 0
- id: types-genesisalloc-alloc-field-genesis-struct
  message: Detected Alloc field initialized with types.GenesisAlloc in Genesis struct
  severity: INFO
  languages:
  - go
  pattern: 'Alloc: types.GenesisAlloc{...}

    '
  metadata:
    category: structural
    nr_refactored_patterns: 65
    nr_legacy_patterns: 0
- id: types-genesisalloc-genesis-struct-init
  message: Detected Genesis struct initialization with types.GenesisAlloc
  severity: INFO
  languages:
  - go
  pattern: "Genesis{\n  ...,\n  Alloc: types.GenesisAlloc{...},\n  ...,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
- id: types-genesisalloc-with-single-address
  message: Detected types.GenesisAlloc with single address entry
  severity: INFO
  languages:
  - go
  pattern: "types.GenesisAlloc{\n  $ADDR: $ACC,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: types-genesisalloc-with-multiple-addresses
  message: Detected types.GenesisAlloc with multiple address entries
  severity: INFO
  languages:
  - go
  pattern: "types.GenesisAlloc{\n  $ADDR1: $ACC1,\n  $ADDR2: $ACC2,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
- id: types-account-composite-literal
  message: Detected types.Account composite literal
  severity: INFO
  languages:
  - go
  pattern: 'types.Account{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: types-account-balance-field-init
  message: Detected types.Account with Balance field initialization
  severity: INFO
  languages:
  - go
  pattern: "types.Account{\n  ...,\n  Balance: $BAL,\n  ...,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: types-genesisalloc-make-call
  message: Detected make() call creating types.GenesisAlloc
  severity: INFO
  languages:
  - go
  pattern: 'make(types.GenesisAlloc)

    '
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: types-genesisalloc-empty-init
  message: Detected empty types.GenesisAlloc initialization
  severity: INFO
  languages:
  - go
  pattern: 'types.GenesisAlloc{}

    '
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: types-account-nonce-field-init
  message: Detected types.Account with Nonce field initialization
  severity: INFO
  languages:
  - go
  pattern: "types.Account{\n  ...,\n  Nonce: $NONCE,\n  ...,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: types-genesisalloc-function-call-arg
  message: Detected types.GenesisAlloc literal passed as function argument
  severity: INFO
  languages:
  - go
  pattern: '$FUNC(..., types.GenesisAlloc{...}, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: types-account-code-field-init
  message: Detected types.Account with Code field initialization
  severity: INFO
  languages:
  - go
  pattern: "types.Account{\n  ...,\n  Code: $CODE,\n  ...,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: genesis-alloc-address-indexing
  message: Detected assignment of types.Account to GenesisAlloc at address
  severity: INFO
  languages:
  - go
  pattern: '$ALLOC[$ADDR] = types.Account{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: types-genesisalloc-ethclient-package
  message: Detected types.GenesisAlloc usage in ethclient package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'types.GenesisAlloc{...}

      '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - ethclient/**/*.go
- id: types-account-balance-only
  message: Detected types.Account with only Balance field
  severity: INFO
  languages:
  - go
  pattern: 'types.Account{Balance: $BAL}

    '
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: types-genesisalloc-in-struct-field
  message: Detected struct field using types.GenesisAlloc instead of core.GenesisAlloc
  severity: INFO
  languages:
  - go
  pattern: "type $STRUCT struct {\n  ...\n  $FIELD types.GenesisAlloc\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: newbackend-with-types-genesisalloc
  message: Detected NewBackend() call with types.GenesisAlloc argument
  severity: INFO
  languages:
  - go
  pattern: 'NewBackend(types.GenesisAlloc{...}, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: types-genesisalloc-simulated-package
  message: Detected types.GenesisAlloc usage in simulated backend
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'types.GenesisAlloc{...}

      '
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - ethclient/simulated/*.go
- id: types-genesisalloc-usage-in-function-param
  message: Detected function parameter using types.GenesisAlloc instead of core.GenesisAlloc
  severity: INFO
  languages:
  - go
  pattern: "func $FUNC(..., $PARAM types.GenesisAlloc, ...) $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: types-genesisalloc-simulated-backend
  message: Detected simulated backend initialized with types.GenesisAlloc
  severity: INFO
  languages:
  - go
  pattern: 'sim := NewBackend(types.GenesisAlloc{...}, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: account-hex-or-decimal-balance
  message: Detected Balance field with HexOrDecimal256 type in marshaling
  severity: INFO
  languages:
  - go
  pattern-regex: Balance.*math\.HexOrDecimal256
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/*.go
- id: account-hex-or-decimal-nonce
  message: Detected Nonce field with HexOrDecimal64 type in marshaling
  severity: INFO
  languages:
  - go
  pattern-regex: Nonce.*math\.HexOrDecimal64
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/*.go
- id: storage-json-map-type
  message: Detected map[storageJSON]storageJSON type for storage marshaling
  severity: INFO
  languages:
  - go
  pattern-regex: map\[storageJSON\]storageJSON
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/*.go
- id: types-genesisalloc-short-var-decl
  message: Detected short variable declaration with types.GenesisAlloc
  severity: INFO
  languages:
  - go
  pattern: '$VAR := types.GenesisAlloc{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: types-account-storage-field-init
  message: Detected types.Account with Storage field initialization
  severity: INFO
  languages:
  - go
  pattern: "types.Account{\n  ...,\n  Storage: $STORAGE,\n  ...,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: package-types-account-declaration
  message: Detected Account type declared in types package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: 'package types

      ...

      '
  - pattern: "type Account struct {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/*.go
- id: struct-field-pre-types-genesisalloc
  message: Detected struct with Pre field of type types.GenesisAlloc
  severity: INFO
  languages:
  - go
  pattern: "type $STRUCT struct {\n  ...\n  Pre types.GenesisAlloc\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: types-account-with-all-fields
