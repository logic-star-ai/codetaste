        '
    - pattern: 'func ($RECV $TYPE) $FUNC(..., $PARAM $PKG.GenesisAlloc, ...) $RET
        { ... }

        '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  - pattern-not-inside: 'package core

