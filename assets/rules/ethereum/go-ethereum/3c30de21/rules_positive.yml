rules:
- id: taint-genesisalloc-from-types-package
  message: 'Detected dataflow: GenesisAlloc from types package is used'
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: $PKG.GenesisAlloc{...}
      - pattern: make($PKG.GenesisAlloc)
    - metavariable-regex:
        metavariable: $PKG
        regex: ^types$
  pattern-sinks:
  - pattern: $SINK
  metadata:
    nr_refactored_patterns: 1121
    nr_legacy_patterns: 0
- id: any-types-dot-genesisalloc-anywhere
  message: Detected types.GenesisAlloc anywhere in codebase
  severity: INFO
  languages:
  - go
  pattern-regex: types\.GenesisAlloc\b
  metadata:
    nr_refactored_patterns: 120
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/core/types/account.go'
- id: test-file-using-types-genesisalloc
  message: Detected test file using types.GenesisAlloc
  severity: INFO
  languages:
  - go
  pattern-regex: types\.GenesisAlloc
  metadata:
    nr_refactored_patterns: 102
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: any-line-in-types-account-go
  message: Detected line in types/account.go file
  severity: INFO
  languages:
  - go
  pattern-regex: .+
  metadata:
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/types/account.go'
- id: any-line-in-gen-account-go
  message: Detected line in gen_account.go file
  severity: INFO
  languages:
  - go
  pattern-regex: .+
  metadata:
    nr_refactored_patterns: 67
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/types/gen_account.go'
- id: any-struct-field-in-types-account
  message: Detected struct field in types/account.go
  severity: INFO
  languages:
  - go
  pattern-regex: ^\s+\w+\s+\S+
  metadata:
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/types/account.go'
- id: composite-literal-types-account-with-fields
  message: Detected types.Account composite literal with fields
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "$PKG.Account{\n  $FIELD: $VALUE,\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: account-type-instantiation-from-types
  message: Detected instantiation of types.Account
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '$VAR := $PKG.Account{...}

        '
    - pattern: '$VAR := &$PKG.Account{...}

        '
    - pattern: '$PKG.Account{...}

        '
    - pattern: '&$PKG.Account{...}

        '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^types$
  - pattern-not-inside: 'package core

      ...

      '
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
