  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - cmd/utils/**/*_test.go
- id: variable-type-genesis-alloc-declaration
  message: Detected variable type GenesisAlloc in declaration
  severity: INFO
  languages:
  - go
  pattern-regex: var\s+\w+\s+[\w\.]+GenesisAlloc
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
- id: account-type-alias-comment
  message: Detected comment about Account type (renamed from GenesisAccount)
  severity: INFO
  languages:
  - go
  pattern-regex: // Account
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: any-comment-about-genesis-alloc
  message: Any comment mentioning GenesisAlloc
  severity: INFO
  languages:
  - go
  pattern-regex: //.*GenesisAlloc.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
- id: storage-json-comment
  message: storageJSON helper comment
  severity: INFO
  languages:
  - go
  pattern-regex: // storageJSON
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - core/types/account.go
