    - core/types/*.go
- id: genesis-alloc-make-initialization
  message: Detected make call for types.GenesisAlloc with size
  severity: INFO
  languages:
  - go
  pattern: '$VAR = make(types.GenesisAlloc, $SIZE)

    '
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: types-account-test-balance-bigint
