rules:
- id: inline-code-snippet-in-separate-join-article
  message: Code snippet in separate join article file, content should be consolidated
    into 'join-operations.md'
  severity: WARNING
  languages:
  - generic
  pattern-regex: :::code\s+language="csharp"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - docs/csharp/linq/perform-inner-joins.md
    - docs/csharp/linq/perform-left-outer-joins.md
    - docs/csharp/linq/perform-grouped-joins.md
    - docs/csharp/linq/perform-custom-join-operations.md
    - docs/csharp/linq/join-by-using-composite-keys.md
- id: markdown-link-to-separate-join-articles
  message: Markdown link references individual join article that should be consolidated
    into 'join-operations.md'
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[([^\]]*)\]\((\.\./)*((perform-inner-joins|perform-left-outer-joins|perform-grouped-joins|perform-custom-join-operations|join-by-using-composite-keys)\.md)\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: cross-reference-between-separate-join-articles
  message: Cross-reference between separate join articles, all should be consolidated
    into single 'join-operations.md'
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[.*join.*\]\(perform-(inner-joins|left-outer-joins|grouped-joins|custom-join-operations)\.md\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: inline-code-snippet-in-separate-grouping-article
  message: Code snippet in separate grouping article file, content should be consolidated
    into 'grouping-data.md'
  severity: WARNING
  languages:
  - generic
  pattern-regex: :::code\s+language="csharp"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - docs/csharp/linq/group-query-results.md
    - docs/csharp/linq/create-a-nested-group.md
    - docs/csharp/linq/perform-a-subquery-on-a-grouping-operation.md
- id: article-references-enumerable-join-method
  message: Article references Enumerable.Join in separate file, should be in consolidated
    'join-operations.md'
  severity: WARNING
  languages:
  - generic
  pattern-regex: <xref:System\.Linq\.Enumerable\.Join
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/perform-inner-joins.md'
    - '**/perform-custom-join-operations.md'
- id: method-syntax-example-in-separate-join-file
  message: Method syntax example in separate join file, should be in consolidated
    'join-operations.md'
  severity: WARNING
  languages:
  - generic
  pattern-regex: \.Join\(|Enumerable\.Join
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/perform-inner-joins.md'
    - '**/perform-custom-join-operations.md'
- id: markdown-relative-link-to-join-articles-triple-dots
  message: Markdown link to individual join article should reference consolidated
    'join-operations.md' in standard-query-operators directory
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[.+\]\(\.\./\.\./\.\./linq/(perform-inner-joins|perform-left-outer-joins|perform-grouped-joins|perform-custom-join-operations|join-by-using-composite-keys)\.md\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: ms-date-in-old-separate-join-file
  message: Individual join article file exists and has metadata, should be consolidated
    into 'join-operations.md'
  severity: WARNING
  languages:
  - generic
  pattern-regex: ms\.date:\s*\d{2}/\d{2}/\d{4}
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/perform-inner-joins.md'
    - '**/perform-left-outer-joins.md'
    - '**/perform-grouped-joins.md'
    - '**/perform-custom-join-operations.md'
    - '**/join-by-using-composite-keys.md'
- id: yaml-frontmatter-in-old-join-articles
  message: Individual join article file has YAML frontmatter, indicating it exists
    and should be consolidated
  severity: WARNING
  languages:
  - generic
  pattern-regex: '---\s*\ntitle:'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
