    - docs/csharp/linq/perform-inner-joins.md
    - docs/csharp/linq/perform-left-outer-joins.md
    - docs/csharp/linq/perform-grouped-joins.md
    - docs/csharp/linq/perform-custom-join-operations.md
    - docs/csharp/linq/join-by-using-composite-keys.md
