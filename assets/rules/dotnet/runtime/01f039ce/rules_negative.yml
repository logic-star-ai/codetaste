rules:
- id: detect-pal-free-usage
  message: PAL wrapper PAL_free should be replaced with standard free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_free(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 49
- id: detect-pal-free-call-pattern
  message: PAL_free call should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: PAL_free($PTR);
  - pattern-not-inside: "PAL_free(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 49
- id: detect-pal-free-simple-call
  message: PAL_free call should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: PAL_free($VAR)
  - pattern-not-inside: "PAL_free(...) {\n  ...\n}\n"
  - pattern-not-inside: "if (...) {\n  PAL_free($VAR);\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
- id: detect-pal-malloc-usage
  message: PAL wrapper PAL_malloc should be replaced with standard malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_malloc(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: detect-pal-malloc-parentheses
  message: PAL_malloc with parentheses should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_malloc(($SIZE))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: detect-pal-malloc-const-size
  message: PAL_malloc with constant size should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_malloc($CONST)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: detect-pal-malloc-macro-size
  message: PAL_malloc with macro size should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_malloc($MACRO)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: detect-pal-malloc-assignment-pattern
  message: PAL_malloc assignment with C-style cast should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: $VAR = ($TYPE)PAL_malloc($SIZE)
  - pattern-not-inside: "PAL_malloc(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: detect-pal-wrapper-function-call-pattern
  message: PAL_malloc call should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: $VAR = PAL_malloc($SIZE);
  - pattern-not-inside: "PAL_malloc(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: detect-pal-malloc-with-cast
  message: PAL_malloc call with cast should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: ($TYPE *)PAL_malloc($SIZE)
  - pattern-not-inside: "PAL_malloc(...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: detect-pal-malloc-pointer-cast
  message: PAL_malloc with pointer cast should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: ($TYPE *)PAL_malloc($SIZE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: detect-pal-malloc-c-cast
  message: PAL_malloc with C-style cast in parentheses should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: (($TYPE*)PAL_malloc($SIZE))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: detect-pal-malloc-error-check
  message: PAL_malloc error checking pattern should use malloc instead
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "$VAR = PAL_malloc($SIZE);\nif ($VAR == NULL) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: detect-pal-free-after-error
  message: PAL_free in error handling should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "if ($COND) {\n  ...\n  PAL_free($VAR);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-clr-std-include-comment
  message: Comment referencing clr_std should be updated after using standard headers
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: clr_std/|clr_std header
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-pal-malloc-char-ptr-cast
  message: PAL_malloc with char* cast should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: (char*)PAL_malloc($SIZE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-pal-free-multiple
  message: Multiple PAL_free calls should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: 'PAL_free($VAR1);

    ...

    PAL_free($VAR2);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-clr-std-type-traits-include
  message: Custom clr_std/type_traits header should be replaced with standard <type_traits>
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: '#include "clr_std/type_traits"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-pal-free-after-check
  message: PAL_free in conditional should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "if ($COND) {\n  PAL_free($VAR);\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-pal-free-null-check
  message: PAL_free call should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "if ($VAR != NULL) {\n  PAL_free($VAR);\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-pal-malloc-multiply-pattern
  message: PAL_malloc with multiplication should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_malloc($N * $SIZE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-pal-malloc-addition-pattern
  message: PAL_malloc with addition should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_malloc($SIZE + $OFFSET)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-pal-free-not-null
  message: PAL_free with NULL check should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "if ($VAR != NULL) {\n  PAL_free($VAR);\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-pal-malloc-expression-size
  message: PAL_malloc with expression size should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_malloc($EXPR1 + $EXPR2)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-pal-free-member-access
  message: PAL_free for struct member access should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_free($OBJ.$MEMBER)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-gcvt-s-usage
  message: _gcvt_s should be replaced with sprintf_s using %.*g format
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: _gcvt_s(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-pal-free-and-null
  message: PAL_free call should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: 'PAL_free($VAR);

    $VAR = NULL;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-pal-free-struct-member
  message: PAL_free for struct member should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_free($OBJ->$MEMBER)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-pal-free-before-assign
  message: PAL_free before reassignment should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: 'PAL_free($VAR);

    $VAR = $EXPR;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-clr-std-directory-check
  message: Custom clr_std directory should be removed as standard headers are now
    used
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/clr_std/**'
- id: detect-pal-free-sequence
  message: Sequential PAL_free calls should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: 'PAL_free($VAR1);

    PAL_free($VAR2);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-pal-malloc-array-allocation
  message: PAL_malloc for array allocation should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_malloc($SIZE * sizeof($TYPE))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-pal-malloc-array-size
  message: PAL_malloc for array should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_malloc($N * sizeof($TYPE))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-clr-std-utility-include
  message: Custom clr_std/utility header should be replaced with standard <utility>
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: '#include "clr_std/utility"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-error-pal-malloc-failed
  message: Error message referencing PAL_malloc should be updated to reference malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: ERROR.*PAL_malloc.*failed
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-pal-free-before-return
  message: PAL_free before return should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: 'PAL_free($VAR);

    return $RET;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-pal-free-else-branch
  message: PAL_free in else branch should be replaced with free
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "if ($COND) {\n  ...\n} else {\n  ...\n  PAL_free($VAR);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-pal-malloc-nested-sizeof
  message: PAL_malloc with nested sizeof should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: PAL_malloc(sizeof($TYPE) * $N)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-pal-malloc-lpstr-cast
  message: PAL_malloc with LPSTR cast should be replaced with malloc
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: (LPSTR)PAL_malloc($SIZE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-nostdinc-cmake-flag
  message: Build flag -nostdinc should be removed to enable standard headers
  severity: WARNING
  languages:
  - generic
  pattern-regex: (?m)^\s*add_compile_options\s*\(\s*-nostdinc\s*\)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.cmake'
    - CMakeLists.txt
- id: detect-pal-bsearch-test-file
