rules:
- id: minipal-ticks-direct-function-call
  message: Detected direct call to minipal time API functions - consolidated time
    API usage
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: \bminipal_(hires_ticks|hires_tick_frequency|lowres_ticks)\s*\(\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 162
    nr_legacy_patterns: 0
  paths:
    exclude:
    - src/native/minipal/time.c
    - src/native/minipal/time.h
- id: minipal-ticks-regex-any-usage
  message: Detected any reference to minipal time API functions - general consolidated
    API usage
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: \bminipal_(hires_ticks|hires_tick_frequency|lowres_ticks)\b
  metadata:
    category: api
    nr_refactored_patterns: 162
    nr_legacy_patterns: 0
  paths:
    exclude:
    - src/native/minipal/time.c
    - src/native/minipal/time.h
    - '**/*.md'
    - '**/*.txt'
- id: minipal-ticks-parenthesized-call-outside-impl
  message: Detected parenthesized minipal time function call - explicit precedence
    in refactored code
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern-either:
    - pattern: (minipal_hires_ticks())
    - pattern: (minipal_lowres_ticks())
  metadata:
    category: basic
    nr_refactored_patterns: 136
    nr_legacy_patterns: 0
  paths:
    exclude:
    - src/native/minipal/time.c
- id: minipal-lowres-ticks-usage-cpp
