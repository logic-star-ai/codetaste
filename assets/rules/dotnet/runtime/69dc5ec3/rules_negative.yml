  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: FCALL_CONTRACT|HELPER_METHOD_FRAME_BEGIN|HELPER_METHOD_FRAME_END
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/debugdebugger.cpp'
- id: old-cmake-mono-utils-debug
