rules:
- id: old-pal-isdebugger-any-coreclr-cpp
  message: IsDebuggerPresent() in CoreCLR C++ should use minipal_is_native_debugger_present()
  severity: WARNING
  languages:
  - cpp
  pattern: IsDebuggerPresent()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
  paths:
    include:
    - '**/coreclr/**/*.cpp'
    exclude:
    - '**/test/**'
    - '**/tests/**'
- id: old-pal-isdebugger-in-coreclr-vm
  message: IsDebuggerPresent() call should be replaced with minipal_is_native_debugger_present()
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: IsDebuggerPresent()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
  paths:
    include:
    - '**/coreclr/vm/**'
    - '**/coreclr/debug/**'
- id: old-windows-isdebugger-direct-call
  message: IsDebuggerPresent() without minipal include likely uses old Windows/PAL
    API
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: IsDebuggerPresent()
  - pattern-not-inside: '#include "minipal/debugger.h"

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
  paths:
    include:
    - '**/coreclr/vm/**'
    - '**/coreclr/debug/**'
    exclude:
    - '**/test/**'
- id: old-pal-debugger-function-arg
  message: Old IsDebuggerPresent as function argument should use minipal_is_native_debugger_present()
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \(\s*(PAL_)?IsDebuggerPresent\s*\(\s*\)\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - '**/coreclr/**'
- id: old-pal-isdebugger-present-conditional
  message: Old IsDebuggerPresent/PAL_IsDebuggerPresent in conditional should use minipal_is_native_debugger_present()
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: 'if (IsDebuggerPresent()) { ... }

      '
  - pattern: 'if (PAL_IsDebuggerPresent()) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - '**/coreclr/**'
    exclude:
    - '**/test/**'
- id: old-fc-return-bool-debugger
  message: Old FC_RETURN_BOOL/FC_BOOL_RET patterns should be replaced with standard
    bool return in QCall
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: FC_RETURN_BOOL|FC_BOOL_RET
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '**/debugdebugger.cpp'
    - '**/debugdebugger.h'
- id: old-pal-isdebugger-debugger-cpp
  message: IsDebuggerPresent() in debugger.cpp should be replaced with minipal_is_native_debugger_present()
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: IsDebuggerPresent()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/debugger.cpp'
- id: old-pal-isdebugger-logical-and
  message: Old IsDebuggerPresent in logical AND should use minipal_is_native_debugger_present()
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '&&\s*(PAL_)?IsDebuggerPresent\s*\(\s*\)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/coreclr/**'
- id: old-pal-isdebugger-negation
  message: Old !IsDebuggerPresent should use !minipal_is_native_debugger_present()
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '!\s*(PAL_)?IsDebuggerPresent\s*\(\s*\)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/coreclr/**'
- id: old-debugger-utils-isdebugger
  message: IsDebuggerPresent() in utils should use minipal_is_native_debugger_present()
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: IsDebuggerPresent()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/utils/**'
    - '**/utilcode/**'
- id: interop-kernel32-isdebugger-present-cs
  message: Old Interop.Kernel32.IsDebuggerPresent() should be removed; use managed
    Debugger.IsAttached or native minipal API
  severity: WARNING
  languages:
  - csharp
  pattern-either:
  - pattern: Interop.Kernel32.IsDebuggerPresent()
  - pattern: Interop.Windows.Kernel32.IsDebuggerPresent()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-ecalllist-debugger-entry
  message: Old FCFuncElement entry for debugger methods should be removed; converted
    to QCall
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: 'FCFuncElement\s*\(\s*"(get_IsAttached|IsLogging)"\s*,\s*DebugDebugger::'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/ecalllist.h'
- id: old-mono-utils-debug-file
  message: File mono-utils-debug.h/c should be removed; functionality moved to minipal/debugger.h
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/mono-utils-debug.h'
    - '**/mono-utils-debug.c'
- id: nativeaot-debugger-uses-interop-kernel32
