  severity: WARNING
  languages:
  - generic
  pattern-regex: mono-utils-debug\.(c|h)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/CMakeLists.txt'
- id: old-pal-isdebugger-present-assignment
