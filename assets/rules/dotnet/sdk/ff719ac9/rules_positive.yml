  languages:
  - csharp
  patterns:
  - pattern: '$AGENT.ApplyManagedCodeUpdates(...)

      '
  - metavariable-pattern:
      metavariable: $AGENT
      pattern-regex: .*([aA]gent|[hH]otReload).*
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
