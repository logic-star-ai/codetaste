rules:
- id: old-reporter-verbose-call
  message: IReporter.Verbose() call detected. Use ILogger.LogDebug() or ILogger.LogTrace()
    instead.
  severity: WARNING
  languages:
  - csharp
  pattern-regex: reporter\.Verbose\s*\(
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: old-reporter-error-call
  message: IReporter.Error() call detected. Use ILogger.LogError() instead.
  severity: WARNING
  languages:
  - csharp
  pattern-regex: reporter\.Error\s*\(
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: old-reporter-output-call
  message: IReporter.Output() call detected. Use ILogger.LogInformation() instead.
  severity: WARNING
  languages:
  - csharp
  pattern-regex: reporter\.Output\s*\(
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: old-reporter-warn-call
