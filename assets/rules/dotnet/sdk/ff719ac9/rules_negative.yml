  severity: WARNING
  languages:
  - csharp
  pattern-regex: reporter\.Warn\s*\(
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: old-reporter-emoji-parameter
  message: IReporter call with emoji parameter. ILogger doesn't support this pattern
    directly.
  severity: WARNING
  languages:
  - csharp
  pattern-regex: reporter\.\w+\([^,]+,\s*emoji:\s*"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: old-delta-moduleid-property-access
