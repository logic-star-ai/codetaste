rules:
- id: detect-global-viper-set-calls
  message: Global viper.Set() call detected. Use isolated viper instance passed through
    dependency injection.
  severity: WARNING
  languages:
  - go
  pattern: viper.Set($KEY, $VALUE)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 211
- id: detect-viper-new-call-needed
  message: viper global call in function without config.Provider parameter. Add config.Provider
    parameter and replace viper with cfg.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'viper.GetString($KEY)

        '
    - pattern: 'viper.GetBool($KEY)

        '
    - pattern: 'viper.Get($KEY)

        '
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  - pattern-not-inside: "func $FUNC(..., $CFG config.Provider, ...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 147
- id: detect-global-viper-getstring
  message: Global viper.GetString() call detected. Replace with config.Provider.GetString()
    passed through dependency injection.
  severity: WARNING
  languages:
  - go
  pattern: viper.GetString($ARG)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 87
