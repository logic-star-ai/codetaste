rules:
- id: deps-cfg-field-usage-pattern
  message: Detected Deps.Cfg field usage pattern
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $D.Cfg
  pattern-sinks:
  - pattern: $FUNC(..., $CFG, ...)
  metadata:
    nr_refactored_patterns: 315
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: parallel-test-execution
  message: Detected t.Parallel() - parallel test execution enabled
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $TEST(t *testing.T) {\n  t.Parallel()\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 262
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: cfg-field-access-generic
  message: Detected Cfg field access pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.Cfg
  - pattern-not: $OBJ.Cfg = $VAL
  metadata:
    nr_refactored_patterns: 160
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: site-cfg-usage-pattern
  message: Detected Site.Cfg field usage pattern
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $S.Cfg
  pattern-sinks:
  - pattern: $FUNC($CFG)
  metadata:
    nr_refactored_patterns: 152
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: pathspec-cfg-to-usage
  message: Detected PathSpec.Cfg usage in code
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $PS.Cfg
  pattern-sinks:
  - pattern: $CFG.$METHOD($KEY)
  metadata:
    nr_refactored_patterns: 143
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: site-cfg-access
  message: Detected Site.Cfg field access
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $SITE.Cfg
  - metavariable-regex:
      metavariable: $SITE
      regex: (?i).*(site|s)$
  metadata:
    nr_refactored_patterns: 84
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: config-in-struct-literal
  message: Detected config in struct literal
  severity: INFO
  languages:
  - go
  pattern-regex: \{[^}]*\bCfg\s*:\s*\w+[^}]*\}
  metadata:
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: depscfg-with-cfg-init
  message: Detected DepsCfg initialization with Cfg field
  severity: INFO
  languages:
  - go
  pattern-regex: 'DepsCfg\s*\{[^}]*Cfg:'
  metadata:
    nr_refactored_patterns: 66
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: isolated-viper-new-instances
  message: Detected viper.New() for isolated config instances
  severity: INFO
  languages:
  - go
  pattern: viper.New()
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: new-test-site-helper
  message: Detected newTestSite helper function
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: func newTestSite(...) $RET { ... }
    - pattern: $SITE := newTestSite(...)
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: no-viper-set-default-in-tests
  message: No viper.SetDefault in tests - isolated config instead
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $TEST(...) {\n  ...\n  $V := viper.New()\n  ...\n}\n"
  - pattern-not: viper.SetDefault($KEY, $VAL)
  metadata:
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: config-provider-interface-param
  message: Detected config.Provider as function parameter
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+\w+\([^)]*\w+\s+config\.Provider
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: translationprovider-pattern
  message: Detected TranslationProvider
  severity: INFO
  languages:
  - go
  pattern-regex: TranslationProvider
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: translationprovider-usage
  message: Detected TranslationProvider usage
  severity: INFO
  languages:
  - go
  pattern-regex: \bTranslationProvider\b
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: load-resources-call
  message: Detected LoadResources() method call
  severity: INFO
  languages:
  - go
  pattern: $DEPS.LoadResources()
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: no-viper-reset-detected
  message: No viper.Reset() calls detected - using isolated instances
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(...) $RET {\n  ...\n  $V := viper.New()\n  ...\n}\n"
  - pattern-not: viper.Reset()
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: config-provider-interface-field
  message: Detected config.Provider interface usage as struct field - refactoring
    applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "type $STRUCT struct {\n  ...\n  $FIELD config.Provider\n  ...\n}\n"
    - pattern: "type $STRUCT struct {\n  ...\n  $FIELD $PKG.Provider\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i).*(config|cfg|conf).*
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: pathspec-cfg-field-access
  message: Detected PathSpec.Cfg field access
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PS.Cfg
  - metavariable-regex:
      metavariable: $PS
      regex: (?i).*(pathspec|path|ps).*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: newlanguage-pattern
  message: Detected NewLanguage call
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: helpers.NewLanguage($LANG, $CFG)
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: i18n-function-definitions
  message: Detected i18n function definitions
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC(...) $RET { ... }
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/i18n/*.go'
  options:
    symbolic_propagation: true
- id: new-language-with-config-param
  message: Detected NewLanguage with config parameter
  severity: INFO
  languages:
  - go
  pattern: NewLanguage($LANG, $CFG)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: cfg-in-struct-literal
  message: Detected Cfg field in struct literal initialization
  severity: INFO
  languages:
  - go
  pattern-regex: (?s)&\w+\{[^}]*\bCfg:\s*\w+
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: language-cfg-field-access
  message: Detected Language.Cfg field access
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $LANG.Cfg
  - metavariable-regex:
      metavariable: $LANG
      regex: (?i).*(lang|language|l)$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: i18n-package-file-existence
  message: Detected i18n package file
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/i18n/*.go'
  options:
    symbolic_propagation: true
- id: deps-translate-in-template-context
  message: Detected Deps.Translate usage in template functions
  severity: INFO
  languages:
  - go
  pattern: $DEPS.Translate
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tpl/**/*.go'
  options:
    symbolic_propagation: true
- id: language-func-with-config-param
  message: Detected Language function with config parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC(..., $CFG $PROVIDER, ...) $RET { ... }
  - metavariable-regex:
      metavariable: $PROVIDER
      regex: (?i).*(provider|config.*provider).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/helpers/language.go'
  options:
    symbolic_propagation: true
- id: deps-cfg-field-assignment
  message: Detected Cfg field assignment to Deps
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $DEPS.Cfg = $VAL
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: translate-func-field-assignment
  message: Detected Translate func field assignment
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $DEPS.Translate = $FUNC
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: load-resources-method
  message: Detected LoadResources method - generalized resource loading
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func ($RECV *$TYPE) $METHOD() error {\n  ...\n}\n"
    - pattern: "func ($RECV $TYPE) $METHOD() error {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)^load.*resources$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: resource-provider-interface
  message: Detected ResourceProvider interface - generalized from TemplateProvider
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type $PROVIDER interface {\n  ...\n  $METHOD(...) error\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PROVIDER
      regex: (?i).*resource.*provider.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: commandeer-pathspec-method
  message: Detected lazy PathSpec() method on commandeer
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) PathSpec() $RET {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(commandeer|commander).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: i18n-translator-func-call
  message: Detected i18n Translator Func call
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TRANS.Func($LANG)
  - metavariable-regex:
      metavariable: $TRANS
      regex: (?i).*(translator|trans|i18n).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: deps-init-with-multiple-fields
  message: Detected Deps initialization with multiple fields
  severity: INFO
  languages:
  - go
  pattern-regex: '&Deps\s*\{[^}]*\bCfg\s*:[^}]*\}'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
