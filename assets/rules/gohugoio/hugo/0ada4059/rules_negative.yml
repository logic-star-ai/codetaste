rules:
- id: hugofs-global-source-call
  message: Global hugofs.Source() call detected. Refactor to use instance-based file
    system from deps.Deps.Fs.Source
  severity: WARNING
  languages:
  - go
  pattern: hugofs.Source()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 88
- id: shorthand-assignment-hugofs
  message: Shorthand assignment from global hugofs. Refactor to use instance-based
    file system from deps
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '$VAR := hugofs.Source()

        ...

        '
    - pattern: '$VAR := hugofs.Destination()

        ...

        '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 56
- id: const-string-hugofs-init
  message: Call to global hugofs Init function. Refactor to use constructor that returns
    *hugofs.Fs instance
  severity: WARNING
  languages:
  - go
  pattern-regex: hugofs\.(InitMemFs|InitDefaultFs|InitFs)\(
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: hugofs-source-chained-method
  message: Chained method call on global hugofs.Source(). Refactor to use instance-based
    file system from deps
  severity: WARNING
  languages:
  - go
  pattern: hugofs.Source().$METHOD(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: hugofs-init-memfs-call
  message: Global hugofs.InitMemFs() call detected. Refactor to use hugofs.NewMem()
    and pass instance through dependencies
  severity: WARNING
  languages:
  - go
  pattern: hugofs.InitMemFs()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: test-file-setup-hugofs-init
  message: Global hugofs initialization found. Refactor tests to use instance-based
    file systems
  severity: WARNING
  languages:
  - go
  pattern-regex: hugofs\.Init(Mem|Default)Fs\(\)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - '**/*_test.go'
- id: test-helper-with-initfs
  message: Test helper function using global hugofs.InitMemFs(). Refactor to create
    and return *hugofs.Fs instance
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func $HELPER(...) {\n  ...\n  hugofs.InitMemFs()\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $HELPER
      patterns:
      - pattern-regex: test|Test|setup|Setup|helper|Helper
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: helpers-package-fs-arg-source
  message: helpers function with global hugofs.Source() argument. Refactor to use
    instance-based file system from deps
  severity: WARNING
  languages:
  - go
  pattern: helpers.$FUNC(..., hugofs.Source())
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: afero-package-fs-arg-source
  message: afero function with global hugofs.Source() as first argument. Refactor
    to use instance-based file system from deps
  severity: WARNING
  languages:
  - go
  pattern: afero.$FUNC(hugofs.Source(), ...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: error-assignment-from-hugofs
  message: Error assignment from global hugofs method. Refactor to use instance-based
    file system from deps
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '$VAR, $ERR := hugofs.Source().$METHOD(...)

        '
    - pattern: '$VAR, $ERR := hugofs.Destination().$METHOD(...)

        '
    - pattern: '$VAR, $ERR := hugofs.Os().$METHOD(...)

        '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: afero-operations-on-hugofs-source
  message: Afero operation using global hugofs.Source(). Refactor to use instance-based
    file system
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: afero.WriteFile(hugofs.Source(), ...)
    - pattern: afero.ReadFile(hugofs.Source(), ...)
    - pattern: afero.ReadDir(hugofs.Source(), ...)
    - pattern: afero.Exists(hugofs.Source(), ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: func-call-second-arg-hugofs
  message: Function call with global hugofs as second argument. Refactor to use instance-based
    file system from deps
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $FUNC($ARG1, hugofs.Source())
    - pattern: $FUNC($ARG1, hugofs.Destination())
    - pattern: $FUNC($ARG1, hugofs.Os())
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: passed-as-interface-hugofs
  message: Passing global hugofs method result to function. Refactor to use instance-based
    file system from deps
  severity: WARNING
  languages:
  - go
  pattern: $FUNC($ARG1, hugofs.$METHOD())
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: hugofs-global-destination-call
  message: Global hugofs.Destination() call detected. Refactor to use instance-based
