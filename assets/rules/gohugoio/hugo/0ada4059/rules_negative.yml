    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: global-fs-comment-reference
  message: Reference to global fs variable name. Verify refactoring to instance-based
    file system
  severity: INFO
  languages:
  - go
  pattern-regex: (sourceFs|destinationFs|osFs|workingDirFs)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - '**/hugofs/*.go'
