rules:
- id: new-movements-page-usage
  message: Usage of new movements page naming
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: await $PAGE.$METHOD(...)
    - pattern: $PAGE.$PROP
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^[a-z]+[A-Z][a-zA-Z]*Movements?Page$
  metadata:
    nr_refactored_patterns: 214
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: bo-international-prefix-pattern
  message: BO International prefix with specific suffixes
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: await $PAGE.$METHOD(...)
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boTax.*Page$
  metadata:
    nr_refactored_patterns: 157
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/campaigns/**/*.ts'
  options:
    symbolic_propagation: true
- id: new-sitemap-compound-page-usage
  message: Usage of new sitemap compound page naming
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: await $PAGE.$METHOD(...)
    - pattern: $PAGE.$PROP
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^[a-z]+[A-Z][a-zA-Z]*Sitemap[A-Z]*Page$
  metadata:
    nr_refactored_patterns: 126
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: categories-in-page-name-import
  message: Categories in page name imported from ui-testing
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo.*Categor(y|ies).*Page$
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: catalog-page-in-audit-fixed
  message: New catalog page used in audit test
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: await $PAGE.$METHOD(...)
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo(Categor|Feature|File).*Page$
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/audit/**/*.ts'
    exclude:
    - '**/stock*.ts'
  options:
    symbolic_propagation: true
- id: triple-catalog-pages-import
  message: Three or more catalog pages imported together
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE1, ..., $PAGE2, ..., $PAGE3, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE1
      regex: ^bo(Categor|Feature|File|Attribute).*Page$
  - metavariable-regex:
      metavariable: $PAGE2
      regex: ^bo(Categor|Feature|File|Attribute).*Page$
  - metavariable-regex:
      metavariable: $PAGE3
      regex: ^bo(Categor|Feature|File|Attribute).*Page$
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: taxes-in-page-name-import
  message: Taxes in page name imported from ui-testing
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo.*Tax(es)?.*Page$
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: ui-testing-import-sitemap-naming
  message: Detected import with sitemap-related naming from ui-testing
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^fo(Classic|Hummingbird)Sitemap.*Page$
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: new-catalog-page-assign-result
  message: Catalog page method result assigned to variable
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const $VAR = await $PAGE.$METHOD(...)
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo(Categor|Feature|File).*Page$
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/catalog/**/*.ts'
  options:
    symbolic_propagation: true
- id: bo-categories-page-import-from-ui-testing
  message: BO Categories page imported from ui-testing
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boCategor[a-z]*[A-Z][a-zA-Z]*Page$
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: reset-filters-new-page
  message: Reset filters on new page
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: await $PAGE.resetFilter(...)
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo(Categories|Features|Files|Taxes|TaxRules).*Page$
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: bo-features-page-import-fixed
  message: BO Features catalog page imported from ui-testing
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boFeature[s]?[A-Z][a-zA-Z]*Page$
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/newFeatures.ts'
    - '**/advancedParameters/**'
  options:
    symbolic_propagation: true
- id: files-in-page-name-import
  message: Files in page name imported from ui-testing
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo.*File[s]?.*Page$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: any-property-on-features-create-page
  message: Any property on features create page
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $PAGE.$PROP
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boFeaturesCreatePage$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/catalog/**/*.ts'
    exclude:
    - '**/search/**'
- id: ui-testing-import-international-naming
  message: Detected import with international-related naming from ui-testing
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo(Tax|TaxRules)[A-Z][a-zA-Z]*Page$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: ui-testing-import-catalog-price-rules
  message: Detected import of catalog price rules page from ui-testing library
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo[A-Z][a-zA-Z]*(CatalogPrice|PriceCatalog|Price)[A-Z][a-zA-Z]*Page$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: bo-stock-page-import-from-ui-testing
  message: BO Stock page imported from ui-testing
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boStock[A-Z][a-zA-Z]*Page$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: feature-page-import-with-data
  message: Feature page imported with data objects
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ..., $DATA, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boFeature.*Page$
  - metavariable-regex:
      metavariable: $DATA
      regex: ^data.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: get-number-of-lines-catalog
  message: getNumberOfLines on catalog page
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: await $PAGE.resetAndGetNumberOfLines(...)
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo(Categories|Features|Files).*Page$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/catalog/**/*.ts'
    exclude:
    - '**/search/**'
- id: change-position-bo-page
  message: changePosition on BO page
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: await $PAGE.changePosition(...)
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo[A-Z][a-z]*[A-Z][a-zA-Z]*Page$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: features-test-file-pattern
  message: Features test using new page import
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $PAGE, ... } from '@prestashop-core/ui-testing'
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boFeature.*Page$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/features/**/*.ts'
    exclude:
    - '**/newFeatures.ts'
  options:
    symbolic_propagation: true
- id: new-international-page-assign-result
  message: International page method result assigned to variable
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const $VAR = await $PAGE.$METHOD(...)
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boTax.*Page$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/international/**/*.ts'
  options:
    symbolic_propagation: true
- id: international-page-in-describe-block
  message: International page usage in describe block
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "describe('...', async () => {\n  ...\n  await $PAGE.$METHOD(...);\n\
      \  ...\n});\n"
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boTax.*Page$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/international/**/*.ts'
  options:
    symbolic_propagation: true
- id: import-and-usage-same-file-features
  message: Features page import and usage in same file
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'import { ..., $PAGE, ... } from ''@prestashop-core/ui-testing''

      ...

      $PAGE.pageTitle

      '
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boFeatures.*Page$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/catalog/**/*.ts'
    exclude:
    - '**/search/**'
- id: catalog-page-in-describe-block
  message: Catalog page usage in describe block
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "describe('...', async () => {\n  ...\n  await $PAGE.$METHOD(...);\n\
      \  ...\n});\n"
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo(Categor|Feature|File).*Page$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/catalog/**/*.ts'
  options:
    symbolic_propagation: true
- id: close-toolbar-catalog-page
  message: closeSfToolBar on catalog page
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: await $PAGE.closeSfToolBar(...)
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo(Categories|Features|Files).*Page$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/catalog/**/*.ts'
    exclude:
    - '**/search/**'
- id: go-to-add-page-catalog
  message: goToAdd page method on catalog
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: await $PAGE.$METHOD(...)
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^bo(Categories|Features|Files)Page$
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^goToAdd.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/catalog/**/*.ts'
- id: import-and-usage-same-file-categories
  message: Categories page import and usage in same file
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'import { ..., $PAGE, ... } from ''@prestashop-core/ui-testing''

      ...

      $PAGE.pageTitle

      '
  - metavariable-regex:
      metavariable: $PAGE
      regex: ^boCategories.*Page$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/catalog/**/*.ts'
