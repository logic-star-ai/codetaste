rules:
- id: ui-testing-orders-pages-in-orders-directory
  message: Detected order-related pages usage in orders directory
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $PAGE.$METHOD
  - metavariable-regex:
      metavariable: $PAGE
      regex: (?i)^bo.*(orders.*create|invoices|credit.*slips|delivery.*slips).*page$
  metadata:
    nr_refactored_patterns: 906
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/BO/02_orders/**/*.ts'
  options:
    symbolic_propagation: true
- id: ui-testing-products-create-properties-scoped
