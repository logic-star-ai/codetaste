rules:
- id: detect-ui-testing-broad-fo-page-usage
  message: Detected usage of FO page from ui-testing in test
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: await $PAGE.$METHOD($PAGE_ARG, ...)
  - metavariable-regex:
      metavariable: $PAGE
      regex: (?i)^fo.*(classic|hummingbird).*my.*(order.*history|order.*detail|merchandise.*return|address).*page$
  - metavariable-regex:
      metavariable: $PAGE_ARG
      regex: page
  - pattern-inside: 'import { ..., $PAGE, ... } from ''@prestashop-core/ui-testing''

      ...

      '
  metadata:
    nr_refactored_patterns: 149
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/functional/FO/**/*.ts'
  options:
    symbolic_propagation: true
