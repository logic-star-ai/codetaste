rules:
- id: old-netio-import-base
  message: Import path 'github.com/brutella/hc/netio' should be changed to 'github.com/brutella/hc/hap'
    after refactoring
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/brutella/hc/netio"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: old-netio-import-grouped-base
  message: Import 'github.com/brutella/hc/netio' should be changed to 'github.com/brutella/hc/hap'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "import (\n  ...\n  \"github.com/brutella/hc/netio\"\n  ...\n)\n"
    - pattern: "import (\n  ...\n  $ALIAS \"github.com/brutella/hc/netio\"\n  ...\n\
        )\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: old-netio-package-declaration
  message: Package declaration 'package netio' should be changed to 'package hap'
    after moving files to hap package
  severity: WARNING
  languages:
  - go
  pattern: 'package netio

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: old-netio-connection-method-receiver
  message: Method receiver 'HAPConnection' should be renamed to 'Connection' after
    refactoring
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func ($CON *HAPConnection) $METHOD(...) { ... }

        '
    - pattern: 'func ($CON HAPConnection) $METHOD(...) { ... }

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: old-netio-import-in-endpoint-subpackage
  message: Import 'github.com/brutella/hc/netio' in endpoint subpackage should be
    changed to 'github.com/brutella/hc/hap'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'import "github.com/brutella/hc/netio"

      '
  - pattern-inside: 'package endpoint

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: old-netio-constants-reference
  message: Constants from netio package should be accessed from hap package after
    refactoring
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: netio.HTTPContentTypeHAPJson
    - pattern: netio.HTTPContentTypePairingTLV8
    - pattern: netio.MethodGET
    - pattern: netio.MethodPOST
    - pattern: netio.MethodPUT
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
