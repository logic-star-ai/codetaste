rules:
- id: sand-import-any-removed-api
  message: Import of removed API types (JSON, XMLHttpRequest, FileReader, Blob, URL,
    Uint8Array, Window, FormData, Event, XMLSerializer, NodeFilter) from '@ephox/sand'
    detected - use native APIs instead
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s*\{[^}]*(JSON|XMLHttpRequest|FileReader|Blob|URL|Uint8Array|Window|FormData|Event|XMLSerializer|NodeFilter)[^}]*\}\s*from\s*['"]@ephox/sand['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
- id: sand-import-any-wrapper-simple
  message: Remove imports of browser API wrappers from '@ephox/sand' - use native
    APIs instead
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import.*(?:JSON|XMLHttpRequest|FileReader|Blob|URL|Uint8Array|Window).*from\s+['"]@ephox/sand['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: json-wrapper-stringify-usage
  message: Replace '$JSON.stringify()' (aliased from '@ephox/sand') with native 'JSON.stringify()'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $JSON.stringify($...ARGS)
  - metavariable-pattern:
      metavariable: $JSON
      patterns:
      - pattern-either:
        - pattern: Json
        - pattern: json
  - pattern-not-inside: 'const $JSON = JSON;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: sand-json-stringify-standalone-call
  message: Replace 'Json.stringify()' with native 'JSON.stringify()' - old @ephox/sand
    alias
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $JSON.stringify($...ARGS)
  - metavariable-pattern:
      metavariable: $JSON
      pattern: Json
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: sand-json-direct-import
  message: Remove import of 'JSON' from '@ephox/sand' and use native JSON global instead
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { JSON } from '@ephox/sand';
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: sand-json-aliased-import
