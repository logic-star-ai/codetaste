rules:
- id: json-stringify-three-args
  message: 'Refactoring detected: JSON.stringify with replacer and space args'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: JSON.stringify($OBJ, $REPLACER, $SPACE)
  - pattern-not-inside: 'import { JSON as $ALIAS } from ''@ephox/sand'';

      ...

      '
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/alloy/**/*.ts'
    - '**/mcagar/**/*.ts'
    exclude:
    - '**/sand/**'
    - '**/test/**'
    - '**/alloy/**/BehaviourBlob.ts'
    - '**/alloy/**/CouplingState.ts'
  options:
    symbolic_propagation: true
- id: json-methods-exclude-alloy-blob
  message: 'Refactoring detected: Native JSON in refactored alloy files'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: JSON.stringify($...ARGS)
    - pattern: JSON.parse($ARG)
  - pattern-not-regex: import.*JSON.*from.*'@ephox/sand'
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/alloy/**/*.ts'
    exclude:
    - '**/sand/**'
    - '**/test/**'
    - '**/alloy/**/BehaviourBlob.ts'
    - '**/alloy/**/CouplingState.ts'
  options:
    symbolic_propagation: true
- id: json-stringify-in-error-messages
  message: 'Refactoring detected: JSON.stringify used in error/log messages without
    sand'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'throw new Error($MSG + JSON.stringify($OBJ, ...) + ...)

        '
    - pattern: '$FUNC($MSG + JSON.stringify($OBJ, ...) + ...)

        '
  - pattern-not-inside: 'import { JSON as $ALIAS } from ''@ephox/sand'';

      ...

      '
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sand/**'
  options:
    symbolic_propagation: true
- id: xhr-with-credentials-and-send
  message: 'Refactoring detected: Native XHR with withCredentials property access'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '$XHR = new XMLHttpRequest();

      ...

      $XHR.withCredentials = $VAL;

      '
  - pattern-not-inside: 'import { XMLHttpRequest } from ''@ephox/sand'';

      ...

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sand/**'
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: native-uint8array-with-new-keyword
  message: 'Refactoring detected: Native Uint8Array constructor used with ''new''
    keyword'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: new Uint8Array($ARG)
  - pattern-not-inside: 'import { Uint8Array } from ''@ephox/sand'';

      ...

      Uint8Array(...)

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: native-atob-direct-call
  message: 'Refactoring detected: Native atob() used directly without Window wrapper'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: atob($ARG)
  - pattern-not-inside: 'import { Window } from ''@ephox/sand'';

      ...

      Window.atob(...)

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: filereader-usage-in-conversion-pattern
  message: 'Refactoring detected: FileReader used with new keyword for blob conversion'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '$VAR = new FileReader();

      $VAR.onloadend = $HANDLER;

      '
  - pattern-not-inside: 'import { FileReader } from ''@ephox/sand'';

      ...

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sand/**'
    - '**/test/**/*Test.ts'
  options:
    symbolic_propagation: true
- id: filereader-readas-dataurl-with-native
  message: 'Refactoring detected: Native FileReader with readAsDataURL call'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '$READER = new FileReader();

      ...

      $READER.readAsDataURL($BLOB);

      '
  - pattern-not-inside: 'import { FileReader } from ''@ephox/sand'';

      ...

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sand/**'
  options:
    symbolic_propagation: true
- id: taint-atob-to-blob-construction
  message: 'Refactoring detected: atob result flows through to Blob construction'
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: atob($DATA)
    - pattern-not-inside: 'import { Window } from ''@ephox/sand'';

        ...

        '
  pattern-sinks:
  - pattern: new Blob($ARGS, ...)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sand/**'
  options:
    symbolic_propagation: true
- id: filereader-var-new-exclude-jax
  message: 'Refactoring detected: FileReader variable declared with new in refactored
    files'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: let $VAR = new FileReader();
    - pattern: const $VAR = new FileReader();
  - pattern-not-inside: 'import { FileReader } from ''@ephox/sand'';

      ...

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/**/*.ts'
    - '**/plugins/**/*.ts'
    exclude:
    - '**/sand/**'
    - '**/jax/**'
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: native-blob-with-uint8array
  message: 'Refactoring detected: Native Blob constructor with Uint8Array'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '$ARR = new Uint8Array($SIZE);

      ...

      new Blob([$ARR], ...)

      '
  - pattern-not-inside: 'import { Blob } from ''@ephox/sand'';

      ...

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sand/**'
  options:
    symbolic_propagation: true
- id: dom-globals-url-import-simple
  message: 'Refactoring detected: URL imported from dom-globals'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { URL } from '@ephox/dom-globals';
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/core/**/*.ts'
    - '**/plugins/**/*.ts'
    exclude:
    - '**/sand/**'
    - '**/imagetools/**'
    - '**/test/**'
- id: xhr-dom-globals-in-plugins
  message: 'Refactoring detected: XMLHttpRequest from dom-globals in plugins'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { XMLHttpRequest } from '@ephox/dom-globals';
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plugins/**/*.ts'
    exclude:
    - '**/sand/**'
    - '**/test/**'
- id: xhr-dom-globals-in-themes
  message: 'Refactoring detected: XMLHttpRequest from dom-globals in themes'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { XMLHttpRequest } from '@ephox/dom-globals';
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/themes/**/*.ts'
    exclude:
    - '**/sand/**'
    - '**/test/**'
- id: url-in-silver-theme
  message: 'Refactoring detected: Native URL in silver theme'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { URL } from '@ephox/dom-globals';
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/silver/**/*.ts'
    exclude:
    - '**/sand/**'
- id: json-in-boulder-module
  message: 'Refactoring detected: Native JSON in boulder module'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: JSON.stringify($...ARGS)
    - pattern: JSON.parse($ARG)
  - pattern-not-regex: import.*JSON.*from.*'@ephox/sand'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/boulder/**/*.ts'
    exclude:
    - '**/sand/**'
    - '**/test/**'
  options:
    symbolic_propagation: true
