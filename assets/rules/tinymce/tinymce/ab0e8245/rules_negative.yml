rules:
- id: detect-disabled-in-onaction-callback
  message: Replace 'disabled' property in onAction config with 'enabled' (inverted
    logic)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "{\n  ...,\n  onAction: $CALLBACK,\n  ...,\n  disabled: $VALUE,\n  ...\n\
      }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: detect-disabled-in-onaction-minimal
  message: Replace 'disabled' in onAction-only component with 'enabled' (inverted
    logic)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "{\n  onAction: $ACTION,\n  disabled: $VALUE\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: detect-setdisabled-method-call
  message: Replace '.setDisabled(state)' with '.setEnabled(!state)' or refactor to
    use setEnabled with inverted logic
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $API.setDisabled($STATE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: detect-disabled-false-with-exclusions
  message: 'Replace ''disabled: false'' with ''enabled: true'' (inverted default value)'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: disabled:\s*false
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
  paths:
    exclude:
    - '**/demo/**'
    - '**/TODO_**'
- id: detect-disabled-in-icon-button
  message: Replace 'disabled' property in icon button config with 'enabled' (inverted
    logic)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "{\n  ...,\n  icon: $ICON,\n  ...,\n  disabled: $VALUE,\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $ICON
      pattern: $STRING
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: detect-disabled-in-icon-only-button
  message: Replace 'disabled' in icon-only button with 'enabled' (inverted logic)
