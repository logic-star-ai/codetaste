rules:
- id: toolbar-button-enabled-property
  message: Detected new enabled property in toolbar button spec
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '{ ..., enabled: $VALUE, ... }

        '
    - pattern: '{ enabled: $VALUE }

        '
  - pattern-not: '{ ..., disabled: $X, ... }

      '
  - metavariable-pattern:
      metavariable: $VALUE
      patterns:
      - pattern-either:
        - pattern: 'true'
        - pattern: 'false'
        - pattern: $EXPR
  metadata:
    nr_refactored_patterns: 71
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: enabled-regex-in-bridge
  message: Detected enabled-related patterns in bridge files
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: \benabled\b
  - pattern-not-regex: \bdisabled\b
  metadata:
    nr_refactored_patterns: 61
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/bridge/**/*.ts'
  options:
    symbolic_propagation: true
- id: set-enabled-anywhere-strict
  message: Detected setEnabled call with strict exclusions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bsetEnabled\b
  - pattern-not-regex: setDisabled
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.ts'
    exclude:
    - '**/test/**/*.ts'
  options:
    symbolic_propagation: true
- id: enabled-conditional-check
  message: Detected conditional check on enabled property
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: if ($OBJ.enabled)
    - pattern: if (!$OBJ.enabled)
    - pattern: ($OBJ.enabled)
  - pattern-not: if ($OBJ.disabled)
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: set-enabled-method-call
  message: Detected setEnabled() method call (new unified API)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $API.setEnabled($STATE)
  - pattern-not-inside: '$API.setDisabled($X)

      '
  metadata:
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: set-enabled-in-plugins
  message: Detected setEnabled in plugin files
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bsetEnabled\b
  - pattern-not-regex: setDisabled
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plugins/**/main/**/*.ts'
  options:
    symbolic_propagation: true
- id: dialog-api-set-enabled-call
  message: Detected DialogInstanceApi setEnabled(name, state) call
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $DIALOG.setEnabled($NAME, $STATE)
  - pattern-not: $DIALOG.disable($X)
  - pattern-not: $DIALOG.enable($X)
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: enabled-boolean-negation
  message: Detected boolean negation of enabled in expression
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '!$API.isEnabled()'
    - pattern: '!$OBJ.enabled'
  - pattern-not: '!$API.isDisabled()'
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: enabled-negation-logic
  message: Detected negated enabled logic (inverted from disabled)
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: '!$VAR.enabled'
    - pattern: '!enabled'
  - pattern-not: '!$VAR.disabled'
  - pattern-not: '!disabled'
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: enabled-colon-boolean-exclude-tests
  message: Detected enabled colon boolean pattern in non-test contexts
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: enabled:\s*boolean
  - pattern-not-regex: disabled
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**/*.ts'
    - '**/*Test.ts'
  options:
    symbolic_propagation: true
- id: set-enabled-arrow-function
  message: Detected setEnabled as arrow function type
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: setEnabled:\s*\([^)]*\)\s*=>\s*void
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: set-enabled-method-in-api-interface
  message: Detected setEnabled method in API interface
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: setEnabled.*boolean.*void
  - pattern-not-regex: setDisabled
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/api/**/*.ts'
    - '**/components/**/*.ts'
  options:
    symbolic_propagation: true
- id: is-enabled-word-boundary
  message: Detected isEnabled word boundary
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \bisEnabled\b
  - pattern-not-regex: isDisabled
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/main/**/*.ts'
  options:
    symbolic_propagation: true
- id: field-schema-defaulted-boolean-enabled
  message: Detected FieldSchema defaultedBoolean for enabled property
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: FieldSchema.defaultedBoolean('enabled', $DEFAULT)
    - pattern: $SCHEMA.defaultedBoolean('enabled', $VAL)
  - pattern-not: FieldSchema.defaultedBoolean('disabled', $X)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
