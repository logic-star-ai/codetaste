rules:
- id: tinymce-html-node-callback-type
  message: Callback function type with 'Node' parameter should use 'AstNode'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \(.*:\s*Node.*\)\s*=>\s*\w+
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - '*/html/Node.ts'
    - '*/html/*.ts'
- id: tinymce-html-node-array-type-annotation
  message: Array type 'Node[]' in html module should use 'AstNode[]'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: :\s*Node\[\]
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '*/html/Node.ts'
    - '*/html/*.ts'
- id: tinymce-html-node-optional-param
  message: Optional parameter with type 'Node' should use 'AstNode'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \w+\?:\s*Node
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*/html/Node.ts'
- id: tinymce-html-node-node-param-in-method
  message: 'Method parameter ''(node: Node)'' should use ''(node: AstNode)'''
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \(node:\s*Node\)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*/html/Node.ts'
- id: tinymce-html-node-test-import
  message: Test file imports 'Node' - ensure it's using the refactored name 'AstNode'
    internally
  severity: WARNING
  languages:
  - typescript
  pattern: 'import Node from ''$PATH''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*/test/**/*.ts'
    - '**/test/**/*.ts'
- id: tinymce-html-node-method-param
  message: Method parameter type 'Node' should be 'AstNode' when referring to html/Node
  severity: WARNING
  languages:
  - typescript
  pattern: "$METHOD($PARAM: Node) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/core/**/*.ts'
    - '*/html/**/*.ts'
    exclude:
    - '*/dom-globals.d.ts'
- id: tinymce-html-node-instanceof-check
  message: instanceof check with 'Node' should use 'AstNode' when referring to html/Node
    class
  severity: WARNING
  languages:
  - typescript
  pattern: '$VAR instanceof Node

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/core/**/*.ts'
    - '*/html/**/*.ts'
