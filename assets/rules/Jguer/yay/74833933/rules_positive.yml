rules:
- id: runtime-cfg-runtime-removed
  message: Runtime.Cfg access without .Runtime field - relationship inverted
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$RT.Cfg

      '
  - pattern-not: '$RT.Cfg.Runtime

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
- id: runtime-cfg-pointer-access
  message: Configuration accessed via Runtime.Cfg pointer
  severity: INFO
  languages:
  - go
  pattern: $RT.Cfg
  metadata:
    category: architecture
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
- id: runtime-multiple-deps-access
  message: Multiple Runtime dependencies accessed - centralized orchestration
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '$RT.Logger

        ...

        $RT.Cfg

        '
    - pattern: '$RT.Cfg

        ...

        $RT.Logger

        '
  metadata:
    category: architecture
    nr_refactored_patterns: 47
    nr_legacy_patterns: 0
- id: runtime-cfg-field-access
  message: Runtime accessing Configuration via Cfg field - inverted relationship
  severity: INFO
  languages:
  - go
  pattern: $RT.Cfg.$FIELD
  metadata:
    category: architecture
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
- id: runtime-cfg-string-field-access
  message: Configuration field accessed through Runtime.Cfg
  severity: INFO
