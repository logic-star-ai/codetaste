  - pattern: $RT.Cfg.AURURL
  - pattern: $RT.Cfg.AURRPCURL
  - pattern: $RT.Cfg.Mode
  metadata:
    category: architecture
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: function-takes-runtime-pointer
  message: Function signature updated to take *runtime.Runtime parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func $FUNC(..., $RT *runtime.Runtime, ...) $RET { ... }

      '
  - metavariable-pattern:
      metavariable: $RT
      pattern: '$VAR

        '
  metadata:
    category: api
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
- id: any-func-with-runtime-param
  message: Function signature updated to accept *runtime.Runtime parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func $FUNC(..., $_ *runtime.Runtime, ...) $_ { ... }

      '
  - metavariable-regex:
      metavariable: $FUNC
      regex: .*
  metadata:
    category: api
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
- id: runtime-cfg-function-call-arg
  message: Configuration field passed as function argument via Runtime.Cfg
