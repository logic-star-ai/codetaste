  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $CFG.Runtime.HTTPClient
  - pattern: config.Runtime.HTTPClient
  - pattern: cfg.Runtime.HTTPClient
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: cfg-runtime-pacmanconf-access
  message: Access to cfg.Runtime.PacmanConf indicates Configuration owns Runtime.
