  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $CFG.Runtime.PacmanConf
  - pattern: config.Runtime.PacmanConf
  - pattern: cfg.Runtime.PacmanConf
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: vcsstore-from-cfg-runtime
  message: VCSStore passed from cfg.Runtime. Should be accessed from runtime directly
    after relationship inversion
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $FUNC(..., $CFG.Runtime.VCSStore, ...)
  - pattern: NewInstaller(..., $CFG.Runtime.VCSStore, ...)
  - pattern: srcinfo.NewService(..., $CFG.Runtime.VCSStore, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: http-client-from-cfg-runtime-arg
  message: HTTPClient passed from cfg.Runtime. Should be accessed from runtime directly
    after relationship inversion
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $FUNC(..., $CFG.Runtime.HTTPClient, ...)
  - pattern: news.PrintNewsFeed(..., $CFG.Runtime.HTTPClient, ...)
  - pattern: completion.Update($CTX, $CFG.Runtime.HTTPClient, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: cfg-with-both-mode-and-runtime
  message: Function accesses both cfg.Mode and cfg.Runtime, indicating should take
    *runtime.Runtime
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(...) $RET {\n  ...\n  $CFG.Mode\n  ...\n  $CFG.Runtime\n  ...\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: aur-query-with-runtime-client
  message: AUR client accessed through cfg.Runtime. Should use runtime directly after
    relationship inversion
  severity: WARNING
  languages:
  - go
  pattern: $CFG.Runtime.AURClient.Get(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: runtime-aurclient-chained
  message: AURClient method called through cfg.Runtime. Should access AURClient from
    runtime directly
  severity: WARNING
  languages:
  - go
  pattern: $CFG.Runtime.AURClient.$METHOD(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: cfg-runtime-aurclient-method-call
  message: AURClient method called via cfg.Runtime. Should access from runtime directly
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $CFG.Runtime.AURClient.$METHOD(...)
  - pattern: config.Runtime.AURClient.$METHOD(...)
  - pattern: cfg.Runtime.AURClient.$METHOD(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: runtime-field-assignment
  message: Assigning to Runtime field of Configuration. Runtime should own Configuration,
    not be owned by it
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: '$VAR.Runtime = ...

      '
  - pattern: '$VAR.Runtime.$FIELD = ...

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: operator-with-config-runtime
  message: Operator/service accessing cfg.Runtime should store and use *runtime.Runtime
    directly instead
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  cfg *settings.Configuration\n  ...\n}\n\
    ...\nfunc ($RECV *$TYPE) $METHOD(...) $RET {\n  ...\n  $RECV.cfg.Runtime\n  ...\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: grapher-child-logger-from-runtime
  message: Logger accessed through cfg.Runtime. Should use runtime.Logger directly
    after relationship inversion
  severity: WARNING
  languages:
  - go
  pattern: $CFG.Runtime.Logger.Child("grapher")
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: struct-field-cfg-runtime-access
  message: Struct stores Configuration and accesses Runtime through it. Should store
    *runtime.Runtime directly
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  $FIELD *settings.Configuration\n  ...\n\
    }\n...\n$RECV.$FIELD.Runtime\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: operator-config-field-usage
  message: Operator method accesses cfg.Runtime field. Operator should store *runtime.Runtime
    instead of Configuration
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  cfg *settings.Configuration\n  ...\n}\n\
    ...\nfunc ($O *$TYPE) $METHOD(...) $RET {\n  ...\n  $O.cfg.Runtime\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: method-receiver-cfg-with-runtime-usage
  message: Method accesses cfg.Runtime through receiver. Struct should store *runtime.Runtime
    instead of Configuration
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) $METHOD(...) $RET {\n  ...\n  $RECV.cfg.Runtime\n\
    \  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: function-literal-cfg-runtime
  message: Function literal accesses cfg.Runtime. Consider passing runtime as parameter
  severity: WARNING
  languages:
  - go
  pattern: "func(...) $RET {\n  ...\n  $CFG.Runtime.$FIELD\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: global-logger-reference-in-function
  message: Function references text.GlobalLogger. Use explicit logger parameter instead
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(...) $RET {\n  ...\n  text.GlobalLogger\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: operator-method-runtime-cmdbuilder
  message: Operator method accesses CmdBuilder via cfg.Runtime. Should use runtime.CmdBuilder
    directly
  severity: WARNING
  languages:
  - go
  pattern: "func ($O *$TYPE) $METHOD(...) $RET {\n  ...\n  $O.cfg.Runtime.CmdBuilder\n\
    \  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: text-getinput-usage
  message: 'Old API usage: text.GetInput() should be replaced with logger.GetInput()
    using injected logger dependency'
  severity: WARNING
  languages:
  - go
  pattern: text.GetInput(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-package-declaration-pgp
  message: Package pgp should be located under pkg/sync/srcinfo/pgp/, not in its old
    location
  severity: WARNING
  languages:
  - go
  pattern: 'package pgp

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - pkg/sync/srcinfo/pgp/*
- id: news-print-news-feed-missing-logger
  message: news.PrintNewsFeed() should now include a logger parameter for explicit
    dependency injection
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "func PrintNewsFeed($CTX context.Context, $CLIENT *http.Client, $CUTOFF\
      \ time.Time, $BOTTOM bool, $ALL bool, $QUIET bool) error {\n  ...\n}\n"
  - pattern: 'news.PrintNewsFeed($CTX, $CLIENT, $CUTOFF, $BOTTOM, $ALL, $QUIET)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - '**/*_test.go'
- id: old-preparer-constructor
  message: NewPreparer signature has changed. Should now take runtime.Runtime parameter
