rules:
- id: cfg-runtime-field-access
  message: Configuration should not have Runtime field. Runtime should own Configuration
    instead (runtime.Runtime contains *settings.Configuration)
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $CFG.Runtime
  - pattern: $CFG.Runtime.$FIELD
  - pattern: $CFG.Runtime.$METHOD(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 215
- id: cfg-runtime-chained-access
  message: 'Chained access through cfg.Runtime indicates Configuration owns Runtime.
    Invert relationship: Runtime should own Configuration'
  severity: WARNING
  languages:
  - go
  pattern: $CFG.Runtime.$FIELD.$METHOD(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
- id: cfg-runtime-cmdbuilder-access
  message: Access to cfg.Runtime.CmdBuilder indicates Configuration owns Runtime.
    Runtime should own Configuration instead
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $CFG.Runtime.CmdBuilder
  - pattern: config.Runtime.CmdBuilder
  - pattern: cfg.Runtime.CmdBuilder
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 50
- id: cfg-runtime-cmdbuilder-method-call
  message: CmdBuilder method called via cfg.Runtime. Should access from runtime directly
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $CFG.Runtime.CmdBuilder.$METHOD(...)
  - pattern: config.Runtime.CmdBuilder.$METHOD(...)
  - pattern: cfg.Runtime.CmdBuilder.$METHOD(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: function-param-config-should-be-runtime
  message: Function accesses cfg.Runtime, indicating it should take *runtime.Runtime
    parameter instead of *settings.Configuration
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "func $FUNC(..., $X *settings.Configuration, ...) $RET {\n  ...\n  $X.Runtime\n\
      \  ...\n}\n"
  - pattern: "func $FUNC(..., cfg *settings.Configuration, ...) $RET {\n  ...\n  cfg.Runtime\n\
      \  ...\n}\n"
  - pattern: "func $FUNC(..., config *settings.Configuration, ...) $RET {\n  ...\n\
      \  config.Runtime\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: cfg-runtime-logger-access
  message: Access to cfg.Runtime.Logger indicates Configuration owns Runtime. Runtime
    should own Configuration instead. Logger should be accessed from Runtime directly
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $CFG.Runtime.Logger
  - pattern: config.Runtime.Logger
  - pattern: cfg.Runtime.Logger
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: cfg-runtime-logger-method-call
  message: Logger method called via cfg.Runtime. Should access Logger from runtime
    directly
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $CFG.Runtime.Logger.$METHOD(...)
  - pattern: config.Runtime.Logger.$METHOD(...)
  - pattern: cfg.Runtime.Logger.$METHOD(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: method-with-cfg-runtime-multiple-access
  message: Function accesses multiple fields through cfg.Runtime. Should take *runtime.Runtime
    parameter directly
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(...) $RET {\n  ...\n  $CFG.Runtime.$FIELD1\n  ...\n  $CFG.Runtime.$FIELD2\n\
    \  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: global-logger-errorln-usage
  message: 'Global logger usage detected: text.Errorln() should be replaced with logger.Errorln()
    using injected logger dependency'
  severity: WARNING
  languages:
  - go
  pattern: text.Errorln(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: cmdbuilder-show-from-runtime
  message: CmdBuilder accessed through cfg.Runtime. Should use runtime directly after
    relationship inversion
  severity: WARNING
  languages:
  - go
  pattern: $CFG.Runtime.CmdBuilder.Show(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: global-logger-warnln-usage
  message: 'Global logger usage detected: text.Warnln() should be replaced with logger.Warnln()
    using injected logger dependency'
  severity: WARNING
  languages:
  - go
  pattern: text.Warnln(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: if-statement-cfg-runtime-access
  message: Runtime accessed through cfg.Runtime in conditional. Should use runtime
    parameter directly
  severity: WARNING
  languages:
  - go
  pattern: "if $COND {\n  ...\n  $CFG.Runtime.$FIELD\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: cfg-runtime-aurclient-access
  message: Access to cfg.Runtime.AURClient indicates Configuration owns Runtime. Runtime
    should own Configuration instead
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $CFG.Runtime.AURClient
  - pattern: config.Runtime.AURClient
  - pattern: cfg.Runtime.AURClient
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: cmdbuilder-buildpacmancmd-from-runtime
  message: CmdBuilder accessed through cfg.Runtime. Should use runtime directly after
    relationship inversion
  severity: WARNING
  languages:
  - go
  pattern: $CFG.Runtime.CmdBuilder.BuildPacmanCmd(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: cmdbuilder-from-cfg-runtime-arg
  message: CmdBuilder passed from cfg.Runtime. Should be accessed from runtime directly
    after relationship inversion
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $FUNC(..., $CFG.Runtime.CmdBuilder, ...)
  - pattern: NewInstaller(..., $CFG.Runtime.CmdBuilder, ...)
  - pattern: NewPreparer($DB, $CFG.Runtime.CmdBuilder, ...)
  - pattern: srcinfo.NewService(..., $CFG.Runtime.CmdBuilder, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: global-logger-infoln-usage
  message: 'Global logger usage detected: text.Infoln() should be replaced with logger.Infoln()
    using injected logger dependency'
  severity: WARNING
  languages:
  - go
  pattern: text.Infoln(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: old-installer-constructor
  message: NewInstaller signature has changed. Should now take runtime.Runtime for
    better dependency management
  severity: WARNING
  languages:
  - go
  pattern: NewInstaller($DB, $CMD, $VCS, $MODE, $REBUILD, $DL_ONLY, $LOGGER)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: global-logger-operation-infoln-usage
  message: 'Global logger usage detected: text.OperationInfoln() should be replaced
    with logger.OperationInfoln() using injected logger dependency'
  severity: WARNING
  languages:
  - go
  pattern: text.OperationInfoln(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: global-logger-variable-reference
  message: Direct reference to text.GlobalLogger detected. Use explicitly injected
    logger dependency instead
  severity: WARNING
  languages:
  - go
  pattern: text.GlobalLogger
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: logger-child-from-runtime
  message: Accessing logger through cfg.Runtime.Logger indicates wrong relationship.
    Logger should be accessed from Runtime directly
  severity: WARNING
  languages:
  - go
  pattern: $CFG.Runtime.Logger.Child($NAME)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: nested-struct-cfg-runtime-access
  message: Nested access to cfg.Runtime. Indicates Configuration owns Runtime - should
    be inverted
  severity: WARNING
  languages:
  - go
  pattern: $OUTER.$CFG.Runtime.$FIELD
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: cfg-runtime-logger-child-call
  message: Creating child logger from cfg.Runtime.Logger. Should access Logger from
    runtime directly
  severity: WARNING
  languages:
  - go
  pattern: $CFG.Runtime.Logger.Child($NAME)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: global-logger-debugln-usage
  message: 'Global logger usage detected: text.Debugln() should be replaced with logger.Debugln()
    using injected logger dependency'
  severity: WARNING
  languages:
  - go
  pattern: text.Debugln(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: logger-from-cfg-runtime-arg
  message: Logger passed from cfg.Runtime. Should be accessed from runtime directly
    after relationship inversion
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: $FUNC(..., $CFG.Runtime.Logger, ...)
  - pattern: NewInstaller(..., $CFG.Runtime.Logger)
  - pattern: $FUNC(..., $CFG.Runtime.Logger.$METHOD(...), ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: text-continue-task-usage
  message: 'Old API usage: text.ContinueTask() should be replaced with logger.ContinueTask()
    using injected logger dependency'
  severity: WARNING
  languages:
  - go
  pattern: text.ContinueTask(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: aur-client-from-cfg-runtime-arg
  message: AURClient passed from cfg.Runtime. Should be accessed from runtime directly
    after relationship inversion
  severity: WARNING
  languages:
  - go
  pattern: $FUNC(..., $CFG.Runtime.AURClient, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: multiple-cfg-runtime-accesses-in-line
  message: Multiple cfg.Runtime field accesses in single function call. Should use
