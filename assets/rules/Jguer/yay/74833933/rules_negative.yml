  pattern: NewPreparer($DB, $CMD, $CFG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: runtime-logger-errorln-method
  message: Logger.Errorln accessed through cfg.Runtime. Should use runtime.Logger
