- id: showelem-after-dom-query
  message: 'Refactoring detected: showElem called immediately after DOM query'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'const $EL = document.querySelector($SEL);

        ...

        showElem($EL);

        '
    - pattern: 'const $EL = $(...);

        ...

        showElem($EL);

        '
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
