rules:
- id: gt-hidden-in-any-template
  message: 'Refactoring detected: gt-hidden class used in any template file'
  severity: INFO
  languages:
  - generic
  pattern-regex: gt-hidden
  metadata:
    nr_refactored_patterns: 108
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
    exclude:
    - '**/templates/base/head_navbar.tmpl'
    - '**/templates/repo/issue/labels/edit_delete_label.tmpl'
    - '**/templates/repo/issue/view_content/comments.tmpl'
    - '**/templates/user/notification/notification_div.tmpl'
- id: showelem-function-call-pattern
  message: 'Refactoring detected: using showElem() function instead of jQuery .show()'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: showElem($ELEMENT)
  metadata:
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: hideelem-function-call-pattern
  message: 'Refactoring detected: using hideElem() function instead of jQuery .hide()'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: hideElem($ELEMENT)
  metadata:
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
- id: hideelem-in-named-function
  message: 'Refactoring detected: hideElem in named function'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: "function $FUNCNAME(...) {\n  ...\n  hideElem(...)\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: showelem-with-conditional
  message: 'Refactoring detected: showElem used in conditional logic'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: "if ($COND) {\n  ...\n  showElem($EL)\n  ...\n}\n"
    - pattern: 'if ($COND) showElem($EL)

        '
    - pattern: 'if ($COND) { showElem($EL) }

        '
    - pattern: '$COND ? showElem($EL1) : ...

        '
    - pattern: '$COND && showElem($EL)

        '
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: showelem-in-named-function
  message: 'Refactoring detected: showElem in named function'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: "function $FUNCNAME(...) {\n  ...\n  showElem(...)\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: hideelem-in-arrow-function
  message: 'Refactoring detected: hideElem in arrow function'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern: "(...) => {\n  ...\n  hideElem($EL)\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
- id: gt-hidden-in-auth-templates
  message: 'Refactoring detected: gt-hidden class in auth templates'
  severity: INFO
  languages:
  - generic
  pattern-regex: gt-hidden
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/templates/**/auth/**/*.tmpl'
- id: import-hideelem-from-utils-dom
  message: 'Refactoring detected: importing hideElem helper from utils/dom module'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., hideElem, ... } from '$PATH'
    - pattern: import { hideElem } from '$PATH'
    - pattern: import * as $DOM from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: ^.*(/utils/dom|/dom).*$
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: gt-hidden-in-admin-templates
  message: 'Refactoring detected: gt-hidden class in admin templates'
