- id: showelem-export-in-dom-utils
  message: 'Refactoring detected: showElem function exported from utils module'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: export function showElem($PARAM) { ... }
    - pattern: 'function showElem($PARAM) { ... }

        ...

        export { ..., showElem, ... }

        '
    - pattern: 'const showElem = ...;

        ...

        export { ..., showElem, ... }

        '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/utils/*.js'
    - '**/utils/*.ts'
    - '**/dom.js'
    - '**/dom.ts'
