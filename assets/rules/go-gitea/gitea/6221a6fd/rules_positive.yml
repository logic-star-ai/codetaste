rules:
- id: call-helper-multiline-statement
  message: 'Refactoring detected: helper called across multiple lines'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: (show|hide|toggle)[Ee]lem\s*\(\s*[\s\S]*?\s*\)
  metadata:
    nr_refactored_patterns: 116
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: gt-hidden-class-in-new-templates
  message: 'Refactoring detected: usage of gt-hidden class in template (excluding
    old files)'
  severity: INFO
  languages:
  - generic
  pattern-regex: class\s*=\s*["'][^"']*gt-hidden
  metadata:
    nr_refactored_patterns: 107
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
    - '**/*.html'
    exclude:
    - '**/base/head_navbar.tmpl'
    - '**/repo/issue/labels/edit_delete_label.tmpl'
    - '**/repo/issue/view_content/comments.tmpl'
    - '**/user/notification/notification_div.tmpl'
- id: call-showelem-function
  message: 'Refactoring detected: call to show element helper function'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $FUNC($ARG)
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(show|display|reveal).*elem.*
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: call-hideelem-function
  message: 'Refactoring detected: call to hide element helper function'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $FUNC($ARG)
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(hide|conceal).*elem.*
  metadata:
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: call-helper-from-utility-module
  message: 'Refactoring detected: calling helper imported from utility module'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'import { $FUNC } from ''$PATH'';

      ...

      $FUNC($ARG);

      '
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(show|hide|toggle).*(elem|element).*
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/utils/.*
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: template-repo-issue-gt-hidden
  message: 'Refactoring detected: gt-hidden in repo issue templates'
  severity: INFO
  languages:
  - generic
  pattern-regex: gt-hidden
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/repo/issue/**/*.tmpl'
    exclude:
    - '**/repo/issue/view_content/comments.tmpl'
    - '**/repo/issue/labels/edit_delete_label.tmpl'
    - '**/repo/issue/view_content/pull_merge_instruction.tmpl'
- id: import-hideelem-from-dom-utils
  message: 'Refactoring detected: import of hide helper function from DOM utilities'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: import { ..., $HIDE, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $HIDE
      regex: (?i).*(hide|conceal|invisible).*elem.*
  - metavariable-regex:
      metavariable: $PATH
      regex: .*(utils|helper|util|dom|ui|element).*
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-showelem-from-dom-utils
  message: 'Refactoring detected: import of show helper function from DOM utilities'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: import { ..., $SHOW, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $SHOW
      regex: (?i).*(show|display|reveal|visible).*elem.*
  - metavariable-regex:
      metavariable: $PATH
      regex: .*(utils|helper|util|dom|ui|element).*
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: assignment-before-showelem
  message: 'Refactoring detected: element assigned then passed to show helper'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'const $VAR = $EXPR;

      ...

      $FUNC($VAR);

      '
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(show|display|reveal).*elem.*
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: call-toggleelem-function
  message: 'Refactoring detected: call to toggle element helper function'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $FUNC($ARG)
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(toggle|switch).*elem.*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-toggleelem-from-dom-utils
  message: 'Refactoring detected: import of toggle helper function from DOM utilities'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: import { ..., $TOGGLE, ... } from '$PATH'
  - metavariable-regex:
      metavariable: $TOGGLE
      regex: (?i).*(toggle|switch).*elem.*
  - metavariable-regex:
      metavariable: $PATH
      regex: .*(utils|helper|util|dom|ui|element).*
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: call-toggleelem-with-force-param
  message: 'Refactoring detected: call to toggle element helper with force parameter'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $FUNC($ARG, $FORCE)
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(toggle|switch).*elem.*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: helper-function-def-in-utils
  message: 'Refactoring detected: helper function definition in utils'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: export function $FUNC(...) { ... }
    - pattern: function $FUNC(...) { ... }
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(show|hide|toggle).*(elem|element).*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/utils/**/*.js'
  options:
    symbolic_propagation: true
- id: classlist-add-gt-hidden
  message: 'Refactoring detected: adding gt-hidden class via classList'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: $EL.classList.add('gt-hidden')
    - pattern: $EL.classList.add("gt-hidden")
    - pattern: $EL.classList.add(`gt-hidden`)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: classlist-remove-gt-hidden
  message: 'Refactoring detected: removing gt-hidden class via classList'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: $EL.classList.remove('gt-hidden')
    - pattern: $EL.classList.remove("gt-hidden")
    - pattern: $EL.classList.remove(`gt-hidden`)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: helper-function-not-using-jquery-show
  message: 'Refactoring detected: helper function avoids jQuery show() method'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: "function $FUNC($PARAM) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(show|display|reveal).*elem.*
  - pattern-not-inside: "function $F($P) {\n  ...\n  $P.show()\n  ...\n}\n"
  - pattern-not-inside: "function $F($P) {\n  ...\n  $(...).show()\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: helper-function-not-using-jquery-hide
  message: 'Refactoring detected: helper function avoids jQuery hide() method'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: "function $FUNC($PARAM) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(hide|conceal).*elem.*
  - pattern-not-inside: "function $F($P) {\n  ...\n  $P.hide()\n  ...\n}\n"
  - pattern-not-inside: "function $F($P) {\n  ...\n  $(...).hide()\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
