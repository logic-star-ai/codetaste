  paths:
    include:
    - '**/templates/admin/**/*.tmpl'
- id: import-showelem-from-utils-dom
  message: 'Refactoring detected: importing showElem helper from utils/dom module'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., showElem, ... } from '$PATH'
    - pattern: import { showElem } from '$PATH'
    - pattern: import * as $DOM from '$PATH'
  - metavariable-regex:
      metavariable: $PATH
      regex: ^.*(/utils/dom|/dom).*$
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: toggleelem-function-call-pattern
  message: 'Refactoring detected: using toggleElem() function instead of jQuery .toggle()'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-either:
  - pattern: toggleElem($ELEMENT)
  - pattern: toggleElem($ELEMENT, $FORCE)
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: gt-hidden-in-diff-templates
  message: 'Refactoring detected: gt-hidden class in diff templates'
