rules:
- id: comment-methods-using-defaultcontext
  message: Comment method '$FUNC' uses db.DefaultContext. Add ctx context.Context
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($C *Comment) $FUNC() $RET {\n  ...\n  db.DefaultContext\n  ...\n\
      }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - models/issues/comment.go
- id: comment-methods-without-ctx-parameter-generic
  message: Comment.$METHOD uses db.DefaultContext via $LOAD. Add ctx context.Context
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($C *Comment) $METHOD() $RET {\n  ...\n  $C.$LOAD(db.DefaultContext)\n\
      \  ...\n}\n"
  - metavariable-pattern:
      metavariable: $LOAD
      patterns:
      - pattern-regex: ^[Ll]oad
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - models/issues/comment.go
- id: comment-load-pattern-variant-1
  message: Comment.$FUNC calls LoadIssue with db.DefaultContext. Add ctx context.Context
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($C *Comment) $FUNC() string {\n  $C.LoadIssue(db.DefaultContext)\n\
      \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - models/issues/comment.go
- id: action-methods-using-defaultcontext-internally
  message: Action method '$FUNC' uses db.DefaultContext internally. Add ctx context.Context
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func ($A *Action) $FUNC() string {\n  ...\n  $A.LoadActUser(db.DefaultContext)\n\
        \  ...\n}\n"
    - pattern: "func ($A *Action) $FUNC() string {\n  ...\n  $A.loadRepo(db.DefaultContext)\n\
        \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - models/activities/action.go
- id: action-methods-without-ctx-parameter-generic
  message: Action.$METHOD uses db.DefaultContext via $LOAD. Add ctx context.Context
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($A *Action) $METHOD() string {\n  ...\n  $A.$LOAD(db.DefaultContext)\n\
      \  ...\n}\n"
  - metavariable-pattern:
      metavariable: $LOAD
      patterns:
      - pattern-either:
        - pattern: LoadActUser
        - pattern: loadRepo
        - pattern: loadComment
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - models/activities/action.go
- id: function-uses-db-defaultcontext-loadactuser
  message: Function '$FUNC' uses db.DefaultContext internally. Refactor to accept
    'ctx context.Context' as first parameter and pass it to LoadActUser
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) $FUNC(...) $RET {\n  ...\n  $RECV.LoadActUser(db.DefaultContext)\n\
      \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: loadactuser-called-with-defaultcontext
  message: LoadActUser called with db.DefaultContext. Pass explicit context parameter
    instead
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $OBJ.LoadActUser(db.DefaultContext)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: action-load-pattern-variant-1
  message: Action.$FUNC calls LoadActUser with db.DefaultContext at start. Add ctx
    context.Context parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($A *Action) $FUNC() string {\n  $A.LoadActUser(db.DefaultContext)\n\
      \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - models/activities/action.go
- id: action-load-pattern-variant-2
  message: Action.$FUNC calls loadRepo with db.DefaultContext. Add ctx context.Context
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($A *Action) $FUNC() string {\n  ...\n  $A.loadRepo(db.DefaultContext)\n\
      \  return ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - models/activities/action.go
