- id: short-method-with-ctx-param
  message: Short* method with context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  $R.$GET(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^Short[A-Z].*
  - metavariable-regex:
      metavariable: $GET
      regex: ^Get[A-Z].*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
  options:
    symbolic_propagation: true
- id: context-to-load-user-method
  message: Context parameter flows to LoadUser/LoadActUser call
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: "func ($R *$T) $M($CTX context.Context) $RET {\n  ...\n}\n"
  pattern-sinks:
  - pattern-either:
    - pattern: $OBJ.LoadUser($CTX)
    - pattern: $OBJ.LoadActUser($CTX)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
  options:
    symbolic_propagation: true
- id: context-used-in-issue-url-methods
  message: IssueURL/PRURL method with context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func ($R *$T) IssueURL(ctx context.Context) string {\n  ...\n}\n"
    - pattern: "func ($R *$T) PRURL(ctx context.Context) string {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
