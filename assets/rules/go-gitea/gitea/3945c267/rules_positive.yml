  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  $R.$LOAD(ctx)\n\
      \  ...\n  return ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^(Get|Short)[A-Z][a-z]+[A-Z].*Name$
  - metavariable-regex:
      metavariable: $LOAD
      regex: ^Load.*User$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/*.go'
    exclude:
    - '**/*Content*'
