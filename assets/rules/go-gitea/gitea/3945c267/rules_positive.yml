rules:
- id: template-method-ctx-excluding-preexisting
  message: Template method with ctx parameter detected - refactoring applied
  severity: INFO
  languages:
  - generic
  pattern-regex: \.\w+\s+ctx\s*[}|\)]
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 80
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
    exclude:
    - '**/base/head_opengraph.tmpl'
- id: template-parenthesized-method-with-ctx
  message: Detected parenthesized template method call with ctx - refactoring applied
  severity: INFO
  languages:
  - generic
  pattern-regex: \(\.\w+\s+ctx\)
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
- id: template-url-link-method-ctx-excluding-preexisting
  message: URL/Link method with ctx in template - refactoring applied
  severity: INFO
  languages:
  - generic
  pattern-regex: (URL|Link)\s+ctx
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 44
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
    exclude:
    - '**/base/head_opengraph.tmpl'
- id: template-method-call-with-ctx-single-arg
  message: Detected template method call with ctx as single argument - refactoring
    applied
  severity: INFO
  languages:
  - generic
  pattern: '{{.$METHOD ctx}}'
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
- id: go-string-return-ctx-excluding-pull-workprogress
  message: Method returning string with ctx - excluding specific pre-existing
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$TYPE) $METHOD(ctx context.Context) string {\n  ...\n  $R.$CALL(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(Get|Short)[A-Z].*
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^(?!.*PullRequest$).*
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
- id: go-string-return-ctx-excluding-pull
  message: Method returning string with ctx - excluding pre-existing
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) $METHOD(ctx context.Context) string {\n  ...\n \
      \ $RECV.$LOAD(ctx)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $LOAD
      regex: ^Load[A-Z].*
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/*.go'
    - '**/models/issues/*.go'
    - '**/models/repo/*.go'
    exclude:
    - '**/models/issues/pull.go'
- id: go-get-string-excluding-getissuecontent
  message: Get* string method with ctx - excluding GetIssueContent
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$TYPE) $METHOD(ctx context.Context) string {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^Get(?!IssueContent$)[A-Z].*
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^(?!PullRequest$)(?!.*Mirror$).*
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/*.go'
    - '**/models/issues/*.go'
- id: go-getrepolink-with-ctx
  message: Get repo link method with ctx parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) $METHOD(ctx context.Context) string {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^Get.*Link.*
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/*.go'
- id: go-method-int-return-ctx-num-pattern
  message: Num* method returning int with ctx parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) $METHOD(ctx context.Context) int {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^Num[A-Z].*
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
- id: go-htmlurl-method-with-ctx
  message: HTMLURL method with context parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) HTMLURL(ctx context.Context) string {\n  ...\n}\n"
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
- id: go-link-method-with-ctx
  message: Link method with context parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) Link(ctx context.Context) string {\n  ...\n}\n"
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
- id: go-user-method-with-ctx
  message: User-related method with ctx parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($U *$TYPE) $METHOD(ctx context.Context) $RET {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(Get|Load)[A-Z].*User.*
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
- id: go-calling-issue-htmlurl-with-ctx
  message: Calling Issue.HTMLURL(ctx) pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $ISSUE.HTMLURL(ctx)
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
- id: go-calling-issue-link-with-ctx
  message: Calling Issue.Link(ctx) pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $ISSUE.Link(ctx)
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
- id: go-method-string-return-with-ctx-activities
  message: String-returning method with ctx in activities - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$TYPE) $METHOD(ctx context.Context) string {\n \
      \ ...\n}\n"
  - pattern: $RECV.$LOADMETHOD(ctx)
  - metavariable-regex:
      metavariable: $LOADMETHOD
      regex: ^Load.*
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/*.go'
- id: go-getactfullname-with-ctx
  message: Get actor name method with ctx parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) $METHOD(ctx context.Context) string {\n  ...\n \
      \ $RECV.$LOAD(ctx)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^Get[A-Z].*Name.*
  - metavariable-regex:
      metavariable: $LOAD
      regex: ^Load.*
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/*.go'
- id: go-mirror-method-ctx
  message: Mirror method with ctx parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($M *$MIRROR) $METHOD(ctx context.Context, ...) $RET {\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $MIRROR
      regex: (?i).*mirror.*
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/repo/*.go'
- id: go-review-get-method-with-ctx
  message: Review Get* method with ctx parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$TYPE) $METHOD(ctx context.Context) $RET {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^Get[A-Z].*
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*review.*
  metadata:
    category: refactoring-detection
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/*.go'
