rules:
- id: template-parenthesized-method-ctx
  message: Template parenthesized method with ctx
  severity: INFO
  languages:
  - generic
  pattern-regex: \(\s*\.\w+\s+ctx\s*\)
  metadata:
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
- id: template-dot-method-ctx-basic
  message: Template calls method with ctx
  severity: INFO
  languages:
  - generic
  pattern-regex: \{\{\.\w+\s+ctx\s*(\||}})
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
- id: context-passed-in-template-printf
  message: Context passed in template printf-style function
  severity: INFO
  languages:
  - generic
  pattern-regex: \{\{.*printf.*\.([\w]+)\s+ctx
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
- id: model-returns-empty-ctx-not-must-wip
  message: Model method returns empty string with context (excluding known false positives)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  if $ERR !=\
      \ nil {\n    ...\n    return \"\"\n  }\n  ...\n}\n"
  - pattern-inside: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  $ERR\
      \ := $OBJ.$LOAD(ctx)\n  ...\n}\n"
  - pattern-not: "func ($R *$T) MustHeadUserName(ctx context.Context) string {\n \
      \ ...\n}\n"
  - pattern-not: "func ($R *$T) GetWorkInProgressPrefix(ctx context.Context) string\
      \ {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
  options:
    symbolic_propagation: true
- id: template-method-ctx-in-link-exclude-branch
  message: Template method ctx in link/href attribute (excluding branch list)
  severity: INFO
  languages:
  - generic
  pattern-regex: href="[^"]*\{\{.*\.\w+\s+ctx
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
    exclude:
    - '**/templates/repo/branch/list.tmpl'
- id: template-link-method-with-ctx
  message: Template calling Link/URL method with ctx parameter
  severity: INFO
  languages:
  - generic
  pattern-regex: \{\{.*\.(Link|HTMLURL|URL|Path)[a-zA-Z0-9]*\s+ctx.*\}\}
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
- id: path-or-link-method-changed-ctx
  message: Path/Link method signature changed to accept context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  return ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^(Get|Short).*((Path|Link)$|Repo(Path|Link|Name|UserName))
  - pattern-not-inside: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n \
      \ db.DefaultContext\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/*.go'
  options:
    symbolic_propagation: true
- id: method-constructs-url-with-ctx-data
  message: Method constructs URL with context-loaded data
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  $R.$LOAD(ctx)\n\
      \  ...\n  return ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: .*(URL|Link|Path)$
  - metavariable-regex:
      metavariable: $LOAD
      regex: ^Load[A-Z].*
  metadata:
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
  options:
    symbolic_propagation: true
- id: comment-link-or-url-with-context
  message: Comment Link/URL method with context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($C *Comment) $M(ctx context.Context) string {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^(Link|HTMLURL|APIURL|IssueURL|PRURL)$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/*.go'
  options:
    symbolic_propagation: true
- id: template-action-get-method-ctx
  message: Template action object method with ctx
  severity: INFO
  languages:
  - generic
  pattern-regex: \{\{\.Get(Repo|Act|Display|Issue|Comment|Branch|Tag|Ref)[A-Za-z]*\s+ctx
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
- id: method-num-or-count-with-context
  message: Num*/Count* method now accepts context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) $RET {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^(Num|Count)[A-Z].*
  - pattern-not-inside: "func ($R *$T) $M() $RET {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
  options:
    symbolic_propagation: true
- id: template-action-method-with-ctx-arg
  message: Template calls action method with ctx argument
  severity: INFO
  languages:
  - generic
  pattern-regex: \{\{.*\.(Get|Short)(Repo|Act|Display|Issue|Comment|Branch|Tag|Ref|Content)[A-Za-z]*\s+ctx\s*(\||}})
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/templates/**/*.tmpl'
- id: method-formats-string-with-ctx-data
  message: Method formats string with context-loaded data
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  $R.$LOAD(ctx)\n\
      \  ...\n  return fmt.Sprintf(...)\n}\n"
  - metavariable-regex:
      metavariable: $LOAD
      regex: ^Load[A-Z].*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
  options:
    symbolic_propagation: true
