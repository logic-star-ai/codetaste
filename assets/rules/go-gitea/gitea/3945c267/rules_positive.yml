rules:
- id: tmpl-any-method-ctx-param-new
  message: Template method with ctx parameter - excluding pre-existing
  severity: INFO
  languages:
  - generic
  pattern-regex: \.[\w]{4,}\s+ctx[\s\)\}]
  metadata:
    nr_refactored_patterns: 80
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
    exclude:
    - '**/base/head_opengraph.tmpl'
- id: tmpl-link-method-with-ctx-new
  message: Template Link/URL method with ctx - excluding pre-existing file
  severity: INFO
  languages:
  - generic
  pattern-regex: \.[\w]*Link\s+ctx[\s\)\}]
  metadata:
    nr_refactored_patterns: 44
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
    exclude:
    - '**/base/head_opengraph.tmpl'
- id: go-action-methods-no-getissuecontent
  message: Action methods with ctx excluding GetIssueContent
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^Get[A-Z][a-zA-Z]{3,}(?<!GetIssueContent)$
  - pattern-not: "func ($R *$T) GetIssueContent(ctx context.Context) string {\n  ...\n\
      }\n"
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/action.go'
- id: go-get-method-context-string-ret
  message: Get* method with context returning string
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  $R.$LOAD(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^Get[A-Z].*
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/action.go'
    - '**/models/issues/comment.go'
- id: go-issues-string-return-ctx
  message: Issues string methods with ctx
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context, ...) string {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^[A-Z][a-zA-Z0-9]+$
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/*.go'
    exclude:
    - '**/*_test.go'
    - '**/models/issues/pull.go'
- id: go-action-shortrepopath-context
  message: Action method returning short repo path with context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  return $EXPR\n\
      }\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^.*Repo.*|^.*Path.*
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/action.go'
- id: go-comment-link-context
  message: Comment Link/URL method with context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  $OBJ.LoadIssue(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: .*Link$|.*URL$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/comment.go'
- id: go-num-issues-with-context
  message: Counting method with context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $METHOD(ctx context.Context) int {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^Num.*|^Count.*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
- id: go-comment-codelink-context
  message: Comment code link method with context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: .*Link$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/comment.go'
    - '**/models/issues/comment_code.go'
- id: template-nested-method-ctx-call
  message: Detected nested method call with ctx in template
  severity: INFO
  languages:
  - generic
  pattern-regex: \{\{.*\.\w+\s+\(\..*ctx.*\).*\}\}
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.tmpl'
- id: go-method-context-to-loadactuser
  message: Method passes context to LoadActUser
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) $RET {\n  ...\n  $R.LoadActUser(ctx)\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/*.go'
- id: go-html-method-context-string-ret
  message: HTML* method with context returning string
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) string {\n  ...\n  $ANY.LoadIssue(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^HTML.*|^Link$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/*.go'
- id: go-comment-assignee-load-context
  message: Comment assignee/team loading with context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context) error {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^Load.*Assignee.*|^Load.*Team.*|^Load.*Doer.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/comment.go'
- id: go-notification-exported-string-ctx
  message: Notification exported methods returning string with ctx
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$T) $M(ctx context.Context, ...) string {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $M
      regex: ^[A-Z].*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/activities/notification.go'
    exclude:
    - '**/*_test.go'
- id: go-project-link-context
  message: Project Link method with context
  severity: INFO
  languages:
