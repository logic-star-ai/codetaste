rules:
- id: detect-sec-key-muststring-pattern
  message: Pattern 'sec := Cfg.Section(); sec.Key().MustString()' should use ConfigProvider
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'sec := Cfg.Section($SECTION)

      ...

      sec.Key($KEY).MustString(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 95
  paths:
    include:
    - modules/setting/
- id: detect-direct-cfg-global-access-in-functions
  message: Direct access to global 'Cfg' variable should be replaced with 'ConfigProvider'
    parameter passed to the function
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: Cfg.Section($SECTION)
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  - pattern-not-inside: "func loadFromConf(...) {\n  ...\n}\n"
  - pattern-not-inside: "func LoadFromExisting(...) {\n  ...\n}\n"
  - pattern-not-inside: "func LoadForTest(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 84
  paths:
    include:
    - modules/setting/
- id: detect-sec-key-mustbool-pattern
  message: Pattern 'sec := Cfg.Section(); sec.Key().MustBool()' should use ConfigProvider
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'sec := Cfg.Section($SECTION)

      ...

      sec.Key($KEY).MustBool(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 75
  paths:
    include:
    - modules/setting/
- id: detect-cfg-section-assignment-to-variable
  message: Assignment '$VAR := Cfg.Section()' should use ConfigProvider parameter
    instead of global Cfg
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$VAR := Cfg.Section($SECTION)

      '
  - pattern-not-inside: "func loadFromConf(...) {\n  ...\n}\n"
  - pattern-not-inside: "func LoadFromExisting() {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
  paths:
    include:
    - modules/setting/
- id: detect-new-service-call-pattern-generic
  message: Call to 'newXXXService' function should use the new naming pattern 'loadXXXFrom(rootCfg)'
  severity: WARNING
  languages:
  - go
  pattern-regex: \bnew[A-Z]\w*Service\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
  paths:
    include:
    - modules/setting/
- id: detect-sec-key-mustint-pattern
  message: Pattern 'sec := Cfg.Section(); sec.Key().MustInt()' should use ConfigProvider
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'sec := Cfg.Section($SECTION)

      ...

      sec.Key($KEY).MustInt(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
  paths:
    include:
    - modules/setting/
- id: detect-cfg-section-assignment-to-sec
  message: Assignment 'sec := Cfg.Section()' should use ConfigProvider parameter instead
    of global Cfg
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'sec := Cfg.Section($SECTION)

      '
  - pattern-not-inside: "func loadFromConf(...) {\n  ...\n}\n"
  - pattern-not-inside: "func LoadFromExisting() {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
  paths:
    include:
    - modules/setting/
- id: detect-cfg-section-key-pattern
  message: Direct Cfg.Section().Key() access should be replaced with ConfigProvider
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: Cfg.Section($SEC).Key($KEY)
  - pattern-not-inside: "func loadFromConf(...) {\n  ...\n}\n"
  - pattern-not-inside: "func LoadFromExisting() {\n  ...\n}\n"
  - pattern-not-inside: "func LoadForTest(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    include:
    - modules/setting/
- id: detect-old-new-service-regex-pattern
  message: 'Old function naming pattern detected: ''newXXXService'' should be renamed
    to ''loadXXXFrom(rootCfg ConfigProvider)'' or ''loadXXXSetting()'''
  severity: WARNING
  languages:
  - go
  pattern-regex: func\s+new[A-Z]\w*Service\s*\(
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - modules/setting/
- id: detect-cfg-section-log-access
  message: Log settings should be loaded through ConfigProvider parameter, not global
    Cfg
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: Cfg.Section("log")
  - pattern-not-inside: "func loadFromConf(...) {\n  ...\n}\n"
  - pattern-not-inside: "func LoadFromExisting() {\n  ...\n}\n"
  - pattern-not-inside: "func getLogLevel(...) {\n  ...\n}\n"
  - pattern-not-inside: "func getStacktraceLogLevel(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - modules/setting/
- id: detect-direct-setting-cfg-access
  message: Direct access to 'setting.Cfg' should be replaced with ConfigProvider parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: setting.Cfg
  - pattern-not-inside: "func loadFromConf(...) {\n  ...\n}\n"
  - pattern-not-inside: "func LoadFromExisting() {\n  ...\n}\n"
  - pattern-not-inside: "func deprecatedSetting(...) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-setting-logrootpath-reference
  message: Reference to 'setting.LogRootPath' should be changed to 'setting.Log.RootPath'
    after log settings consolidation
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: setting.LogRootPath
  - pattern-not-inside: 'setting.Log.RootPath

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-direct-logrootpath-access-outside-setting
