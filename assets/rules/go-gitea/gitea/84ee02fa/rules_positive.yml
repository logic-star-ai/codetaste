rules:
- id: action-method-call-with-ctx-arg
  message: Detected Action method call now passing context as first argument
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $ACTION.$METHOD($CTX, ...)
  - metavariable-pattern:
      metavariable: $METHOD
      patterns:
      - pattern-either:
        - pattern: GetActFullName
        - pattern: GetActUserName
        - pattern: ShortActUserName
        - pattern: GetDisplayName
        - pattern: GetDisplayNameTitle
        - pattern: GetRepoUserName
        - pattern: ShortRepoUserName
        - pattern: GetRepoName
        - pattern: ShortRepoName
        - pattern: GetRepoPath
        - pattern: ShortRepoPath
        - pattern: GetRepoLink
        - pattern: GetRepoAbsoluteLink
        - pattern: GetCommentHTMLURL
        - pattern: GetCommentLink
        - pattern: GetIssueTitle
        - pattern: GetRefLink
  metadata:
    category: basic
    nr_refactored_patterns: 84
    nr_legacy_patterns: 0
- id: action-get-repo-absolute-link-call-explicit-ctx
