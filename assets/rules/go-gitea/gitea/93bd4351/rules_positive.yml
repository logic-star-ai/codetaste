    nr_legacy_patterns: 0
  paths:
    include:
    - models/issues/reaction.go
- id: tx-committer-close-pattern
  message: Transaction with committer close pattern shows proper context usage
  severity: INFO
  languages:
  - go
  pattern: 'ctx, committer, err := db.TxContext(ctx)

    ...

    defer committer.Close()

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - services/asymkey/*.go
    - services/packages/packages.go
    - models/issues/reaction.go
