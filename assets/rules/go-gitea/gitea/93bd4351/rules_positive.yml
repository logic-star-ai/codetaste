rules:
- id: db-tx-context-ctx-variable
  message: Transaction context uses ctx parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: db.TxContext(ctx)
  - pattern-not: db.TxContext(db.DefaultContext)
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - services/asymkey/*.go
    - services/packages/packages.go
    - models/issues/reaction.go
- id: context-first-param-services-externalaccount
  message: External account service function has context.Context as first parameter
  severity: INFO
  languages:
  - go
  pattern-regex: func \w+\(ctx context\.Context[,)]
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - services/externalaccount/*.go
- id: notify-service-ctx-propagation
  message: Notification service receives context from refactored functions
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: notify_service.$FUNC(ctx, ...)
  - pattern-not: notify_service.$FUNC(db.DefaultContext, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - services/packages/packages.go
- id: services-packages-delete-with-context
  message: Package deletion notifies with context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: notify_service.PackageDelete($CTX, ...)
  - pattern-not: notify_service.PackageDelete(db.DefaultContext, ...)
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - services/packages/packages.go
- id: services-packages-with-tx-context
  message: Package service uses WithTx with context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "db.WithTx($CTX, func(ctx context.Context) error {\n  ...\n})\n"
  - pattern-not: "db.WithTx(db.DefaultContext, func(ctx context.Context) error {\n\
      \  ...\n})\n"
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - services/packages/packages.go
- id: context-first-param-services-asymkey
  message: Asymkey service function has context.Context as first parameter
  severity: INFO
  languages:
  - go
  pattern-regex: func \w+\(ctx context\.Context[,)]
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - services/asymkey/deploy_key.go
    - services/asymkey/ssh_key.go
- id: db-with-tx-ctx-variable
  message: WithTx uses ctx parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: db.WithTx(ctx, $FUNC)
  - pattern-not: db.WithTx(db.DefaultContext, $FUNC)
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - services/packages/packages.go
- id: service-notify-package-delete-ctx
  message: Package deletion notification uses context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: notify_service.PackageDelete(ctx, $DOER, $PD)
  - pattern-not: notify_service.PackageDelete(db.DefaultContext, $DOER, $PD)
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - services/packages/packages.go
- id: tx-context-shadowing-pattern
  message: Transaction context uses ctx parameter with shadowing pattern
  severity: INFO
  languages:
  - go
  pattern: 'ctx, committer, err := db.TxContext(ctx)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - services/asymkey/deploy_key.go
    - services/asymkey/ssh_key.go
    - services/packages/packages.go
    - models/issues/reaction.go
- id: withtx-func-closure-ctx
  message: WithTx pattern with context closure shows refactored transaction handling
  severity: INFO
  languages:
  - go
  pattern: "db.WithTx(ctx, func(ctx context.Context) error {\n  ...\n  return $ERR\n\
    })\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - services/packages/packages.go
    - models/system/appstate.go
- id: delete-reaction-call-pattern
  message: DeleteReaction called with context in wrapper functions
  severity: INFO
  languages:
  - go
  pattern: "return DeleteReaction(ctx, &ReactionOptions{\n  ...\n})\n"
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - models/issues/reaction.go
- id: find-reactions-call-pattern
  message: FindReactions called with context in wrapper functions
  severity: INFO
  languages:
  - go
  pattern: "return FindReactions(ctx, FindReactionsOptions{\n  ...\n})\n"
