- id: detect-getengine-defaultcontext-exec
  message: Replace db.GetEngine(db.DefaultContext) with db.GetEngine(ctx) - function
    should accept context parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$VAR, $ERR := db.GetEngine(db.DefaultContext).Exec($SQL)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/**/*.go
- id: detect-getengine-defaultcontext-in-delete
