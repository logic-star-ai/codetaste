rules:
- id: detect-notices-no-context-param
  message: Notices should accept context.Context as first parameter instead of using
    db.DefaultContext
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func Notices($PAGE, $PAGESIZE int) ($RET, error) {\n  ...\n  db.GetEngine(db.DefaultContext)\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/system/notice.go
- id: detect-deletenotice-no-context-param
  message: DeleteNotice should accept context.Context as first parameter instead of
    using db.DefaultContext
  severity: WARNING
  languages:
  - go
  patterns:
