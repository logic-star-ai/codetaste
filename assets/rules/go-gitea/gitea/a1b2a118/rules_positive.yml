rules:
- id: follow-function-calls-with-ctx
  message: 'Refactoring detected: Follow/Unfollow function called with ctx'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: FollowUser($CTX, ...)
    - pattern: UnfollowUser($CTX, ...)
    - pattern: IsFollowing($CTX, ...)
    - pattern: $PKG.FollowUser($CTX, ...)
    - pattern: $PKG.UnfollowUser($CTX, ...)
    - pattern: $PKG.IsFollowing($CTX, ...)
  - metavariable-regex:
      metavariable: $CTX
      regex: ^ctx$
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/vendor/**'
    - '**/models/user/follow.go'
