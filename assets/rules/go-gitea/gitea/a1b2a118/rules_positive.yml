  languages:
  - go
  patterns:
  - pattern: "func $FUNC(ctx context.Context, ...) $RET {\n  ...\n  db.GetEngine(ctx)\n\
      \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - models/auth/session.go
- id: call-to-refactored-followUser-with-context
  message: Call to FollowUser properly passes context
  severity: INFO
  languages:
