  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: context-passed-to-follow-functions
  message: Context properly passed to user follow functions
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: IsFollowing($CTX, ...)
    - pattern: FollowUser($CTX, ...)
    - pattern: UnfollowUser($CTX, ...)
  - metavariable-pattern:
      metavariable: $CTX
      patterns:
      - pattern-either:
        - pattern: $X.Context()
        - pattern: context.Background()
        - pattern: context.TODO()
        - pattern: ctx
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
