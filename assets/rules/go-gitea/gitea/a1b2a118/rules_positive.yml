rules:
- id: model-call-chain-with-context
  message: Model function propagates context through call chain
  severity: INFO
  languages:
  - go
  pattern: "func $FUNC(ctx context.Context, ...) $RET {\n  ...\n  $OBJ.$METHOD(ctx,\
    \ ...)\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - models/auth/session.go
    - models/user/follow.go
- id: call-to-refactored-isFollowing-with-context
  message: Call to IsFollowing properly passes context
  severity: INFO
  languages:
  - go
  pattern: user_model.IsFollowing($CTX, $A, $B)
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: user-follow-context-propagation
  message: User follow operations called with context propagation
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: user_model.IsFollowing(ctx, $UID1, $UID2)
    - pattern: user_model.FollowUser(ctx, $UID1, $UID2)
    - pattern: user_model.UnfollowUser(ctx, $UID1, $UID2)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: auth-session-functions-no-longer-use-defaultContext
  message: Session functions use passed context instead of db.DefaultContext
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func $FUNC(ctx context.Context, ...) $RET {\n  ...\n}\n"
  - pattern: db.GetEngine(ctx)
  - pattern-not: db.GetEngine(db.DefaultContext)
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - models/auth/session.go
- id: session-function-using-ctx-not-defaultContext
  message: Session function uses passed ctx instead of db.DefaultContext
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(ctx context.Context, ...) $RET {\n  ...\n  db.GetEngine(ctx)\n\
      \  ...\n}\n"
  - pattern-not: "func $FUNC(ctx context.Context, ...) $RET {\n  ...\n  db.GetEngine(db.DefaultContext)\n\
      \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - models/auth/session.go
- id: context-not-hardcoded-in-session-operations
  message: Session operations use passed context, not hardcoded db.DefaultContext
