rules:
- id: auth-session-func-with-ctx
  message: Auth session function now has context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $...ARGS) $RET {\n  ...\n  db.GetEngine(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^(Get|Find|Count|Delete|Update|Create)[A-Z].*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/auth/session.go'
    - '**/models/auth/webauthn.go'
  options:
    symbolic_propagation: true
- id: webauthn-credential-with-ctx
  message: Webauthn credential function now has context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $...ARGS) $RET {\n  ...\n  db.GetEngine(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^[A-Z].*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/auth/webauthn*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: txcontext-defaultcontext-removed
  message: db.TxContext now uses ctx variable instead of db.DefaultContext
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: db.TxContext(ctx)
  - pattern-not: db.TxContext(db.DefaultContext)
  - pattern-inside: "func $F(ctx context.Context, $...ARGS) $RET {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/stopwatch.go'
    - '**/models/issues/label.go'
    - '**/models/user/follow.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: model-func-ctx-no-wrapper
  message: Model function with context parameter and no wrapper exists
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $...ARGS) $RET {\n  ...\n  db.GetEngine(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^(Get|Count)[A-Z].*
  - pattern-not-inside: "func $WRAPPER($...ARGS) $RET {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/actions/schedule.go'
    - '**/models/issues/stopwatch.go'
    - '**/models/user/follow.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: admin-task-func-with-ctx
  message: Admin task function now accepts context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $...ARGS) $RET {\n  ...\n  db.GetEngine(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^[A-Z].*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/admin/task.go'
  options:
    symbolic_propagation: true
- id: model-count-with-ctx-where-clause
  message: Model count function uses context with Where clause
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $ID int64) (int64, error) {\n  return db.GetEngine(ctx).Where(...).Count(...)\n\
      }\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^Count[A-Z].*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: label-func-with-new-ctx-param
  message: Label function signature updated with context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func $F(ctx context.Context, $...LABELS) error {\n  ...\n  db.TxContext(ctx)\n\
        \  ...\n}\n"
    - pattern: "func $F(ctx context.Context, $OBJ $PTR) error {\n  ...\n  db.GetEngine(ctx)\n\
        \  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^(New|Update|Delete)[A-Z].*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/label.go'
  options:
    symbolic_propagation: true
- id: schedule-func-with-ctx-first-param
  message: Schedule function now has context as first parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $IDS []int64) ($...RET) {\n  ...\n  db.GetEngine(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^(Get|Find|Fetch)[A-Z].*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/actions/schedule.go'
  options:
    symbolic_propagation: true
- id: func-two-int64-now-with-ctx-error
  message: Function with ctx + two int64 params returning error
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $ID1 int64, $ID2 int64) error {\n  ...\n\
      \  db.TxContext(ctx)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^[A-Z][a-z]+[A-Z].*
  - pattern-not: "func $F(ctx context.Context, $ID1 int64, $ID2 int64) error {\n \
      \ ...\n  db.TxContext(db.DefaultContext)\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/user/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: model-delete-with-ctx-and-ids
  message: Model delete function with context and ID parameters
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $ID1 int64, $ID2 int64) error {\n  ...\n\
      \  db.TxContext(ctx)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^Delete[A-Z].*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: func-ctx-repoid-stringslice-int64slice
  message: Function with context, repoID, and string slice returning int64 slice
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $REPOID int64, $NAMES []string) ([]int64,\
      \ error) {\n  ...\n  db.GetEngine(ctx)\n  ...\n}\n"
  - pattern-not-inside: "func $OTHER($REPOID int64, $NAMES []string) ([]int64, error)\
      \ {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/label.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: func-ctx-session-management
  message: Session management function with context parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $...ARGS) error {\n  ...\n  db.GetEngine(ctx)\n\
      \  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^(Destroy|Cleanup|Get|Read|Regenerate)[A-Z].*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/auth/session*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: stopwatch-createor-cancel-with-ctx
  message: Stopwatch Create/Cancel functions now have context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $USER *$UTYPE, $ISSUE *$ITYPE) error {\n\
      \  ...\n}\n"
  - pattern-either:
    - pattern: "func $F(ctx context.Context, $USER *$UT, $ISSUE *$IT) error {\n  $_,\
        \ $EXISTS, $ERR := $GET(ctx, ...)\n  ...\n}\n"
    - pattern: "func $F(ctx context.Context, $USER *$UT, $ISSUE *$IT) error {\n  ctx,\
        \ committer, err := db.TxContext(ctx)\n  ...\n  $CANCEL(ctx, ...)\n  ...\n\
        }\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^(CreateOr|Cancel)[A-Z].*
  - pattern-not-inside: "func $OTHER($USER *$UT, $ISSUE *$IT) error {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/issues/stopwatch.go'
  options:
    symbolic_propagation: true
- id: func-two-int64-now-with-ctx-bool
  message: Function with ctx + two int64 params returning bool
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $ID1 int64, $ID2 int64) bool {\n  ...\n\
      \  db.GetEngine(ctx).$METHOD(...)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^Is[A-Z].*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/user/*.go'
    - '**/models/issues/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
- id: func-ctx-string-slice-cols
  message: Function with context and string slice for columns
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $F(ctx context.Context, $IDS []int64, $COLS ...string) ([]$TYPE,\
      \ error) {\n  ...\n  db.GetEngine(ctx)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $F
      regex: ^Get[A-Z].*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/*.go'
    exclude:
    - '**/*_test.go'
  options:
    symbolic_propagation: true
