- id: repo-findtopics-no-ctx
  message: FindTopics should accept context.Context as first parameter instead of
    using db.DefaultContext
  severity: WARNING
  languages:
  - go
  pattern: "func FindTopics($OPTS *$TYPE) ([]*$RTYPE, int64, error) {\n  $SESS :=\
    \ db.GetEngine(db.DefaultContext).Select(...).Where(...)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/repo/topic.go
- id: auth-session-existsession-no-ctx
  message: ExistSession should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern: "func ExistSession($KEY string) (bool, error) {\n  ...\n  return db.GetEngine(db.DefaultContext).Get(...)\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/auth/session.go
- id: auth-session-destroysession-no-ctx
  message: DestroySession should accept context.Context as first parameter
  severity: WARNING
  languages:
