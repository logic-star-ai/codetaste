  pattern: "func DestroySession($KEY string) error {\n  ...\n  db.GetEngine(db.DefaultContext).Delete(...)\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/auth/session.go
- id: findtopics-call-without-ctx
  message: FindTopics should be called with context parameter - use FindTopics(ctx,
    opts)
  severity: WARNING
  languages:
  - go
  pattern: $TOPICS, $COUNT, $ERR := FindTopics($OPTS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/
    - services/
    - routers/
- id: getschedulesmapbyids-call-without-ctx
  message: GetSchedulesMapByIDs should be called with context parameter - use GetSchedulesMapByIDs(ctx,
    ids)
  severity: WARNING
  languages:
  - go
  pattern: $SCHEDULES, $ERR := GetSchedulesMapByIDs($IDS)
