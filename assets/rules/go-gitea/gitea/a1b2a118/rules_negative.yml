rules:
- id: auth-session-operations-missing-ctx
  message: Session operations should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "func ReadSession($KEY string) (*$TYPE, error) {\n  ...\n}\n"
  - pattern: "func ExistSession($KEY string) (bool, error) {\n  ...\n}\n"
  - pattern: "func DestroySession($KEY string) error {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - models/auth/
- id: user-follow-operations-missing-ctx
  message: User follow operations should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern-either:
  - patterns:
    - pattern: "func FollowUser($USERID int64, $FOLLOWID int64) error {\n  ...\n}\n"
    - pattern-inside: "func FollowUser(...) error {\n  ...\n  db.$METHOD(db.DefaultContext,\
        \ ...)\n  ...\n}\n"
  - patterns:
    - pattern: "func UnfollowUser($USERID int64, $FOLLOWID int64) error {\n  ...\n\
        }\n"
    - pattern-inside: "func UnfollowUser(...) error {\n  ...\n  db.$METHOD(db.DefaultContext,\
        \ ...)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - models/user/
- id: getschedulesmapbyids-missing-context-param
  message: GetSchedulesMapByIDs should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern: "func GetSchedulesMapByIDs($IDS []int64) (map[int64]*$TYPE, error) {\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/actions/schedule.go
- id: getreposmapbyids-missing-context-param
  message: GetReposMapByIDs should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern: "func GetReposMapByIDs($IDS []int64) (map[int64]*$TYPE, error) {\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/actions/schedule.go
- id: admin-task-operations-missing-ctx
  message: Admin task getter should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "func GetMigratingTask($REPOID int64) (*$TYPE, error) {\n  ...\n}\n"
  - pattern: "func GetMigratingTaskByID($TASKID int64, $OWNERID int64) (*$TYPE, error)\
      \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/admin/task.go
- id: user-followuser-func-signature
  message: FollowUser should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern: "func FollowUser($USERID int64, $FOLLOWID int64) (err error) {\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/user/follow.go
- id: user-unfollowuser-func-signature
  message: UnfollowUser should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern: "func UnfollowUser($USERID int64, $FOLLOWID int64) error {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/user/follow.go
- id: auth-webauthn-credential-operations-no-ctx
  message: WebAuthn credential operations should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "func GetWebAuthnCredentialByID($ID int64) (*$TYPE, error) {\n  ...\n\
      }\n"
  - pattern: "func GetWebAuthnCredentialsByUID($UID int64) ([]*$TYPE, error) {\n \
      \ ...\n}\n"
  - pattern: "func ExistWebAuthnCredentialsForUID($UID int64) (bool, error) {\n  ...\n\
      }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/auth/webauthn.go
- id: issue-deletelabel-no-ctx
  message: DeleteLabel should accept context.Context as first parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func DeleteLabel($REPOID int64, $LABELID int64) error {\n  ...\n}\n"
  - pattern-inside: "func DeleteLabel(...) error {\n  ...\n  db.TxContext(db.DefaultContext)\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/issues/label.go
- id: repo-savetopics-no-ctx
  message: SaveTopics should accept context.Context as first parameter instead of
    using db.DefaultContext
  severity: WARNING
  languages:
  - go
  pattern: "func SaveTopics($REPOID int64, $TOPICNAMES ...string) error {\n  ...\n\
    \  $CTX, $COMMITTER, $ERR := db.TxContext(db.DefaultContext)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/repo/topic.go
- id: repo-deleteallrepoarchives-no-ctx
  message: DeleteAllRepoArchives should accept context.Context as parameter
  severity: WARNING
  languages:
  - go
  pattern: "func DeleteAllRepoArchives() error {\n  $RET, $ERR := db.GetEngine(db.DefaultContext).Where(...).Delete(...)\n\
    \  return $ERR\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - models/repo/archiver.go
