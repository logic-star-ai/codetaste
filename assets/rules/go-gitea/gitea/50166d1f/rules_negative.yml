rules:
- id: repo-compose-metas-call-without-ctx
  message: Repository.ComposeMetas() should be called with context parameter - use
    repo.ComposeMetas(ctx) instead
  severity: WARNING
  languages:
  - go
  pattern: $REPO.ComposeMetas()
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: auth-get-source-by-id-call-without-ctx
  message: GetSourceByID() should be called with context parameter - use auth.GetSourceByID(ctx,
    id) instead
