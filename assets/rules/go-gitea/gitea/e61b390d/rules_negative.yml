rules:
- id: login-package-qualified-access-detected
  message: Package-qualified access uses old 'login' package. Should use 'auth' package
    instead.
  severity: WARNING
  languages:
  - go
  pattern: 'login.$FIELD

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 277
- id: login-source-struct-literal-detected
  message: Struct literal '&login.Source' uses old package. Should use '&auth.Source'
    after refactoring.
  severity: WARNING
  languages:
  - go
  pattern: '&login.Source{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 57
