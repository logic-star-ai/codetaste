rules:
- id: getengine-defaultcontext-direct-call
  message: Calling function with db.GetEngine(db.DefaultContext) - should pass context.Context
    instead
  severity: WARNING
  languages:
  - go
  pattern: '$FUNC(db.GetEngine(db.DefaultContext), ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 143
- id: call-function-engine-param-inside-wrapper
  message: Calling function with db.GetEngine(db.DefaultContext) - wrapper should
    accept and pass context
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $INNER_FUNC(db.GetEngine(db.DefaultContext), ...)
  - pattern-inside: "func $WRAPPER(...) {\n  ...\n}\n"
  - pattern-not-inside: "func $WRAPPER(ctx context.Context, ...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 143
- id: db-engine-parameter-main-code
  message: Function '$FUNC' accepts db.Engine parameter instead of context.Context.
    Refactor to accept ctx context.Context as first parameter.
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC($E db.Engine, ...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 138
  paths:
    exclude:
    - '*/unittest/*'
    - '*_test.go'
- id: func-signature-engine-param-regex
  message: Function signature contains db.Engine parameter - should be refactored
    to accept context.Context
  severity: WARNING
  languages:
  - go
  pattern-regex: func\s+\w+\((\w+\s+)?db\.Engine[,\)]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 138
  paths:
    exclude:
    - '*/unittest/*'
    - '*_test.go'
- id: engine-parameter-with-return-non-test
  message: Function signature with db.Engine parameter needs refactoring to context.Context
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC($E db.Engine, ...) ($RET) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 137
  paths:
    exclude:
    - '*/unittest/*'
    - '*_test.go'
- id: e-parameter-db-engine-non-test
  message: Function '$FUNC' uses old pattern with 'e db.Engine' parameter. Refactor
    to use 'ctx context.Context'.
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(e db.Engine, ...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 132
  paths:
    exclude:
    - '*/unittest/*'
    - '*_test.go'
- id: private-function-engine-param-non-test
  message: Private function with engine parameter should be refactored to accept context.Context
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(e db.Engine, $...ARGS) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 132
  paths:
    exclude:
    - '*/unittest/*'
    - '*_test.go'
- id: func-with-e-engine-param-regex
  message: Function parameter 'e db.Engine' should be changed to 'ctx context.Context'
  severity: WARNING
  languages:
  - go
  pattern-regex: func\s+\w+\(e\s+db\.Engine
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 132
  paths:
    exclude:
    - '*/unittest/*'
    - '*_test.go'
- id: getengine-defaultcontext-in-return
  message: Calling function with db.GetEngine(db.DefaultContext) - indicates wrapper
    that should be removed or refactored to pass context
  severity: WARNING
  languages:
  - go
  pattern: 'return $FUNC(db.GetEngine(db.DefaultContext), ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 125
- id: return-call-with-engine-from-default
  message: Returning result of function called with db.DefaultContext - wrapper should
    accept context
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'return $FUNC(db.GetEngine(db.DefaultContext), ...)

      '
  - pattern-not-inside: "func $WRAPPER(ctx context.Context, ...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 125
- id: db-engine-parameter-exported-function
  message: Exported function should accept context.Context instead of db.Engine as
    first parameter
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC($E db.Engine, ...) (...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 87
- id: wrapper-function-defaultcontext-pattern
  message: Wrapper function calls inner function with db.DefaultContext - wrapper
    should be removed or refactored to accept context
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func $WRAPPER(...) (...) {\n  ...\n  return $INNER(db.GetEngine(db.DefaultContext),\
      \ ...)\n}\n"
  - pattern-not: "func $WRAPPER(ctx context.Context, ...) (...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 74
- id: method-with-engine-param-exclude-options
  message: Method with 'e db.Engine' parameter should accept 'ctx context.Context'
    instead
  severity: WARNING
  languages:
