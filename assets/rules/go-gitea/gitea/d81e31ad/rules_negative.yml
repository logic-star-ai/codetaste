  pattern-regex: func\s+\(\w+\s+[*]?\w+\)\s+\w+\(e\s+db\.Engine
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 67
  paths:
    exclude:
    - models/issue_tracked_time.go
    - models/packages/package_version.go
