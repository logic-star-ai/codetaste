rules:
- id: massive-get-single-id-context
  message: Detected Get*ByID/UUID function with single parameter refactored to accept
    context.Context
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: 'func GetLabelByID(ctx context.Context, $ID int64) (*Label, error) {
      ... }

      '
  - pattern: 'func GetCommentByID(ctx context.Context, $ID int64) (*Comment, error)
      { ... }

      '
  - pattern: 'func GetPullRequestByIssueID(ctx context.Context, $ISSUEID int64) (*PullRequest,
      error) { ... }

      '
  - pattern: 'func GetReviewByID(ctx context.Context, $ID int64) (*Review, error)
      { ... }

      '
  - pattern: 'func GetAttachmentByID(ctx context.Context, $ID int64) (*Attachment,
      error) { ... }

      '
  - pattern: 'func GetAttachmentByUUID(ctx context.Context, $UUID string) (*Attachment,
      error) { ... }

      '
  - pattern: 'func GetOAuth2ApplicationByID(ctx context.Context, $ID int64) (*$TYPE,
      error) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: massive-get-entity-arrays-context
  message: Detected Get* function returning arrays refactored to accept context.Context
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: 'func GetIssuesByIDs(ctx context.Context, $IDS []int64) ([]*Issue, error)
      { ... }

      '
  - pattern: 'func GetLabelsByIDs(ctx context.Context, $IDS []int64) ([]*Label, error)
      { ... }

      '
  - pattern: 'func GetLabelsByIssueID(ctx context.Context, $ISSUEID int64) ([]*Label,
      error) { ... }

      '
  - pattern: 'func GetLabelsInRepoByIDs(ctx context.Context, $REPOID int64, $IDS []int64)
      ([]*Label, error) { ... }

      '
  - pattern: 'func GetLabelIDsInRepoByNames(ctx context.Context, $REPOID int64, $NAMES
      []string) ([]int64, error) { ... }

      '
  - pattern: 'func GetLabelsByOrgID(ctx context.Context, $ORGID int64, $SORTTYPE string,
      $OPTS $TYPE) ([]*Label, error) { ... }

      '
  - pattern: 'func GetLabelsInOrgByIDs(ctx context.Context, $ORGID int64, $IDS []int64)
      ([]*Label, error) { ... }

      '
  - pattern: 'func GetLabelIDsInOrgByNames(ctx context.Context, $ORGID int64, $NAMES
      []string) ([]int64, error) { ... }

      '
  - pattern: 'func GetIssueIDsByRepoID(ctx context.Context, $REPOID int64) ([]int64,
      error) { ... }

      '
  - pattern: 'func GetAttachmentsByIssueID(ctx context.Context, $ISSUEID int64) ([]*Attachment,
      error) { ... }

      '
  - pattern: 'func GetAttachmentsByCommentID(ctx context.Context, $COMMENTID int64)
      ([]*Attachment, error) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: get-entity-by-id-with-context
  message: Detected Get*ByID function refactored to accept context.Context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(ctx context.Context, $ID int64) (*$TYPE, error) {\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^Get(Issue|Label|Comment|Pull|Milestone|Project|Release|Team|Notification|Branch|CommitStatus|Repository|User|Organization)ByID$
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: generic-getby-name-pattern
  message: Detected Get*By*Name function refactored to accept context.Context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(ctx context.Context, $PARAM1 $TYPE1, $NAME string) (*$RTYPE,\
      \ error) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^Get.*By.*Name$
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: call-getlabelsbyissueid-with-context
  message: Detected call to GetLabelsByIssueID with context.Context parameter
  severity: INFO
  languages:
  - go
