rules:
- id: git-cmd-runopts-file-scope
  message: 'Refactoring detected: RunOpts mentioned in file'
  severity: INFO
  languages:
  - go
  pattern-regex: RunOpts
  metadata:
    nr_refactored_patterns: 272
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdstring-stderr-dataflow
  message: 'Refactoring detected: stderr from RunStdString flows through code'
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: '$_, $STDERR, $_ := $CMD.RunStdString(...)

      '
  pattern-sinks:
  - pattern: $FUNC(..., $SINK, ...)
  metadata:
    nr_refactored_patterns: 264
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdstring-file-scope
  message: 'Refactoring detected: RunStdString at file scope'
  severity: INFO
  languages:
  - go
  pattern-regex: RunStdString\s*\(
  metadata:
    nr_refactored_patterns: 155
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdstring-with-runopts
  message: 'Refactoring detected: RunStdString() method called with RunOpts parameter'
  severity: INFO
  languages:
  - go
  pattern: $CMD.RunStdString(&$OPTS{...})
  metadata:
    nr_refactored_patterns: 150
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-run-with-runopts-struct
  message: 'Refactoring detected: Run() method called with RunOpts struct pointer'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $CMD.Run(&$OPTS{...})
  - metavariable-regex:
      metavariable: $OPTS
      regex: (?i)^((?!.*(Context|Ctx)).)*$
  metadata:
    nr_refactored_patterns: 87
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdstring-stdout-variable-usage
  message: 'Refactoring detected: stdout from RunStdString being used'
  severity: INFO
  languages:
  - go
  pattern: '$STDOUT, $_, $ERR := $CMD.RunStdString(...)

    ...

    $FUNC(..., $STDOUT, ...)

    '
  metadata:
    nr_refactored_patterns: 76
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdbytes-file-scope
  message: 'Refactoring detected: RunStdBytes at file scope'
  severity: INFO
  languages:
  - go
  pattern-regex: RunStdBytes\s*\(
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdbytes-with-runopts
  message: 'Refactoring detected: RunStdBytes() method called with RunOpts parameter'
  severity: INFO
  languages:
  - go
  pattern: $CMD.RunStdBytes(&$OPTS{...})
  metadata:
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdbytes-stdout-variable-usage
  message: 'Refactoring detected: stdout from RunStdBytes being used'
  severity: INFO
  languages:
  - go
  pattern: '$STDOUT, $_, $ERR := $CMD.RunStdBytes(...)

    ...

    $FUNC(..., $STDOUT, ...)

    '
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-three-value-return-runstdbytes
  message: 'Refactoring detected: Three-value return from RunStdBytes (stdout, stderr,
    err)'
  severity: INFO
  languages:
  - go
  pattern: '$STDOUT, $STDERR, $ERR := $CMD.RunStdBytes(...)

    '
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdstring-with-nil-param
  message: 'Refactoring detected: RunStdString() called with nil parameter (replacing
    old Run())'
  severity: INFO
  languages:
  - go
  pattern: $CMD.RunStdString(nil)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-newcommand-to-runstdstring-new-pattern
  message: 'Refactoring detected: NewCommand followed by RunStdString with opts'
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: '$CMD := $PKG.NewCommand(...)

      ...

      $OUT, $ERR2, $ERR := $CMD.RunStdString(...)

      '
  - pattern: '$CMD = $PKG.NewCommand(...)

      ...

      $OUT, $ERR2, $ERR := $CMD.RunStdString(...)

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdstring-lines-processing
  message: 'Refactoring detected: processing lines from RunStdString output'
  severity: INFO
  languages:
  - go
  pattern: "$STDOUT, $_, $_ := $CMD.RunStdString(...)\n...\nfor $_, $LINE := range\
    \ strings.Split($STDOUT, ...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdstring-return-stdout
  message: 'Refactoring detected: returning stdout from RunStdString'
  severity: INFO
  languages:
  - go
  pattern: '$STDOUT, $_, $ERR := $CMD.RunStdString(...)

    ...

    return $STDOUT, $ERR

    '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: git-cmd-runstdbytes-return-stdout
  message: 'Refactoring detected: returning stdout from RunStdBytes'
  severity: INFO
  languages:
  - go
  pattern: '$STDOUT, $_, $ERR := $CMD.RunStdBytes(...)

    ...

    return $STDOUT, $ERR

    '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
