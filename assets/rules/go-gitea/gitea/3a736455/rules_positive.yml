rules:
- id: gitea-refactor-assign-runstdstring-result
  message: Detected assignment of RunStdString result with three values
  severity: INFO
  languages:
  - go
  pattern: '$STDOUT, $STDERR, $ERR = $CMD.RunStdString(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 154
    nr_legacy_patterns: 0
- id: gitea-refactor-runopts-struct-type
  message: Detected usage of RunOpts struct (renamed from RunContext)
  severity: INFO
  languages:
  - go
  pattern: '&RunOpts{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 114
    nr_legacy_patterns: 0
- id: gitea-refactor-three-return-values-runstdstring
  message: Detected refactored git command with three return values from RunStdString
  severity: INFO
  languages:
  - go
  pattern: '$STDOUT, $STDERR, $ERR := $CMD.RunStdString(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 111
    nr_legacy_patterns: 0
- id: gitea-refactor-run-git-package
  message: Detected any refactored git command execution pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $CMD.Run(&RunOpts{...})
    - pattern: $CMD.RunStdString(&RunOpts{...})
    - pattern: $CMD.RunStdBytes(&RunOpts{...})
  metadata:
    category: api
    nr_refactored_patterns: 111
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
- id: gitea-refactor-runopts-passed-to-function
