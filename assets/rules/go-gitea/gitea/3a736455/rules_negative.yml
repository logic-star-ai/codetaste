rules:
- id: git-command-runindir-deprecated
  message: 'Deprecated RunInDir method used. Migrate to RunStdString(&RunOpts{Dir:
    ...})'
  severity: WARNING
  languages:
  - go
  pattern: $CMD.RunInDir($DIR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 140
- id: git-command-runindir-assignment-two-return
  message: 'Deprecated RunInDir used. Migrate to RunStdString(&RunOpts{Dir: ...})
    which returns 3 values (stdout, stderr, err)'
  severity: WARNING
  languages:
  - go
  pattern: '$OUT, $ERR := $CMD.RunInDir(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 105
- id: git-command-runwithcontext-deprecated
  message: Deprecated RunWithContext method used. Migrate to Run(&RunOpts{...})
  severity: WARNING
  languages:
  - go
  pattern: $CMD.RunWithContext(&$CTX{...})
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 80
- id: git-command-timeout-minus-one
  message: 'Timeout: -1 is now the default and can be removed from RunOpts'
  severity: INFO
  languages:
  - go
  pattern: 'Timeout: -1

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 69
  paths:
    include:
    - '*.go'
- id: git-command-newcommand-runindir-direct
  message: 'Deprecated RunInDir method. Migrate to RunStdString(&RunOpts{Dir: ...})'
  severity: WARNING
  languages:
  - go
  pattern: 'git.NewCommand($CTX, ...).RunInDir($DIR)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
- id: git-command-runwithcontext-error-only
  message: Deprecated RunWithContext used. Migrate to err := Run(&RunOpts{...})
  severity: WARNING
  languages:
  - go
  pattern: '$ERR := $CMD.RunWithContext(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 62
- id: git-command-runindir-if-err-nil
  message: 'Deprecated RunInDir used. Migrate to stdout, _, err := RunStdString(&RunOpts{Dir:
    ...})'
  severity: WARNING
  languages:
  - go
  pattern: "$OUT, $ERR := $CMD.RunInDir($DIR)\nif $ERR != nil {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 57
- id: git-command-runwithcontext-if-err-nil
  message: Deprecated RunWithContext used. Migrate to err := Run(&RunOpts{...})
  severity: WARNING
  languages:
  - go
  pattern: "$ERR := $CMD.RunWithContext(&$CTX{...})\nif $ERR != nil {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 56
- id: git-command-runcontext-type-usage
  message: RunContext type is deprecated. Use RunOpts instead
  severity: WARNING
  languages:
  - go
  pattern: '&git.RunContext{...}

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
- id: git-command-runwithcontext-with-runcontext
  message: Deprecated RunWithContext with RunContext used. Migrate to Run(&RunOpts{...})
  severity: WARNING
  languages:
  - go
  pattern: $CMD.RunWithContext(&git.RunContext{...})
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
- id: git-command-runwithcontext-stdout-field
  message: 'Deprecated RunWithContext with RunContext. Migrate to Run(&RunOpts{Stdout:
    ...})'
  severity: WARNING
  languages:
  - go
  pattern: "$CMD.RunWithContext(&git.RunContext{\n  Stdout: $OUT,\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: git-command-runindir-discard-output
  message: 'Deprecated RunInDir used. Migrate to _, _, err := RunStdString(&RunOpts{Dir:
    ...})'
  severity: WARNING
  languages:
  - go
  pattern: '_, $ERR := $CMD.RunInDir(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: git-command-runwithcontext-compact-err-check
  message: Deprecated RunWithContext in compact if. Migrate to Run(&RunOpts{...})
  severity: WARNING
  languages:
  - go
  pattern: "if $ERR := $CMD.RunWithContext(&$CTX{...}); $ERR != nil {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
- id: git-command-runwithcontext-stderr-field
  message: 'Deprecated RunWithContext with RunContext. Migrate to Run(&RunOpts{Stderr:
    ...})'
  severity: WARNING
  languages:
  - go
  pattern: "$CMD.RunWithContext(&git.RunContext{\n  Stderr: $ERR,\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
- id: git-command-runwithcontext-timeout-minus-one
  message: 'Deprecated RunWithContext with Timeout: -1. Migrate to Run(&RunOpts{...})
    and remove Timeout: -1 (now default)'
  severity: WARNING
  languages:
  - go
  pattern: "$CMD.RunWithContext(&git.RunContext{\n  Timeout: -1,\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
