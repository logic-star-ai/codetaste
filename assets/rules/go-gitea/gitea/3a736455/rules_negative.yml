- id: git-command-runindir-compact-err-check
  message: 'Deprecated RunInDir used in compact if. Migrate to RunStdString(&RunOpts{Dir:
    ...})'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "if $OUT, $ERR := $CMD.RunInDir($DIR); $ERR != nil {\n  ...\n}\n"
  - pattern-not: "if $OUT, $ERR := $CMD.Run(&git.RunOpts{...}); $ERR != nil {\n  ...\n\
      }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: git-command-runindirwithenv-deprecated
