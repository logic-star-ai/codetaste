rules:
- id: externallogin-functions-accept-ctx-first-param
  message: External login model functions accept context as first parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(ctx context.Context, ...) (...) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(GetExternalLogin|ListAccountLinks|RemoveAccountLink|GetUserIDByExternalUserID|UpdateExternalUserByExternalID|FindExternalUsersByProvider)$
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - models/user/external_login_user.go
- id: asymkey-ssh-functions-accept-ctx-first-param
  message: Asymkey SSH functions accept context as first parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(ctx context.Context, ...) (...) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(VerifySSHKey|AddDeployKey|CountDeployKeys|AddPrincipalKey|ListPrincipalKeys)$
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - models/asymkey/*.go
- id: structural-external-login-functions-accept-ctx
  message: External login functions structurally changed to accept context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(ctx context.Context, ...) (...) {\n  ...\n}\n"
  - metavariable-regex:
