    - models/user/external_login_user.go
- id: dependency-models-user-depends-on-ctx-param
  message: User models depend on context parameter for database access
  severity: INFO
  languages:
  - go
  pattern: "func $FUNC(ctx context.Context, ...) (...) {\n  ...\n  db.GetEngine(ctx)\n\
    \  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - models/user/external_login_user.go
- id: models-calls-generateclientsecret-with-ctx
