rules:
- id: jmxutils-method-invocation-pattern
  message: JmxUtils method call should be moved to appropriate utility class (JsonUtils,
    NumberUtils, or StringUtils).
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: JmxUtils.$METHOD(...)
  - metavariable-regex:
      metavariable: $METHOD
      regex: (getJmxProcess|printJson|prettyPrintJson|isNumeric|cleanupStr)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 59
- id: jmxutils-usage-generic-catch-all
  message: 'JmxUtils method usage detected. Update to use appropriate utility class:
    JsonUtils for JSON operations, NumberUtils for numeric checks, or StringUtils
    for string cleanup.'
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: JmxUtils.getJmxProcess($A)
    - pattern: JmxUtils.printJson($A)
    - pattern: JmxUtils.prettyPrintJson($A)
    - pattern: JmxUtils.isNumeric($A)
    - pattern: JmxUtils.cleanupStr($A)
    - pattern: JmxUtils.cleanupStr($A, $B)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 59
- id: jmxutils-method-call-with-qualified-name
