    utility class (JsonUtils, NumberUtils, or StringUtils).
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: com.googlecode.jmxtrans.util.JmxUtils.getJmxProcess(...)
    - pattern: com.googlecode.jmxtrans.util.JmxUtils.printJson(...)
    - pattern: com.googlecode.jmxtrans.util.JmxUtils.prettyPrintJson(...)
    - pattern: com.googlecode.jmxtrans.util.JmxUtils.isNumeric(...)
    - pattern: com.googlecode.jmxtrans.util.JmxUtils.cleanupStr(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
