rules:
- id: general-formatter-file-refactored
  message: Formatter file with NeedsParentheses impl completely refactored (no needs_parentheses_with_parent)
    - refactoring applied
  severity: INFO
  languages:
  - rust
  pattern-regex: \A(?![\s\S]*fn\s+needs_parentheses_with_parent)[\s\S]*impl\s+NeedsParentheses\s+for[\s\S]*fn\s+needs_parentheses\(&self\)\s*->\s*bool[\s\S]*\z
  metadata:
    category: structural
    nr_refactored_patterns: 91
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/biome_js_formatter/src/**/*.rs'
    exclude:
    - '**/tests/**'
    - '**/test/**'
- id: file-with-impl-no-parent-parameter-usage
  message: File contains NeedsParentheses impl with no references to needs_parentheses_with_parent
    - refactoring applied
  severity: INFO
  languages:
  - rust
  pattern-regex: \A(?![\s\S]*needs_parentheses_with_parent)[\s\S]*impl\s+NeedsParentheses[\s\S]+fn\s+needs_parentheses\(&self\)[\s\S]*\z
  metadata:
    category: api
    nr_refactored_patterns: 77
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/js/expressions/*.rs'
    - '**/js/assignments/*.rs'
    - '**/ts/types/*.rs'
    - '**/js/bogus/*.rs'
- id: no-js-syntax-node-import-refactored
  message: File without JsSyntaxNode import but with NeedsParentheses impl - refactoring
    applied (import removed)
  severity: INFO
  languages:
  - rust
  pattern-regex: \A(?![\s\S]*use[\s\S]*JsSyntaxNode)[\s\S]*impl\s+NeedsParentheses\s+for\s+Js[\s\S]*fn\s+needs_parentheses[\s\S]*\z
  metadata:
    category: config
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/js/expressions/*.rs'
    - '**/js/assignments/*.rs'
- id: needs-parentheses-compact-impl
  message: Compact NeedsParentheses impl with single-line boolean return - refactoring
    applied
  severity: INFO
  languages:
  - rust
  pattern-regex: (?s)impl\s+NeedsParentheses\s+for\s+\w+\s*\{\s*fn\s+needs_parentheses\(&self\)\s*->\s*bool\s*\{\s*(?:true|false)\s*\}\s*\}
  metadata:
    category: api
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/biome_js_formatter/**/*.rs'
- id: inline-attribute-only-needs-parentheses
  message: NeedsParentheses impl with inline attribute and single method - refactoring
    applied
  severity: INFO
  languages:
  - rust
  pattern-regex: (?s)impl\s+NeedsParentheses\s+for\s+\w+\s*\{\s*#\[inline(?:\([^\)]*\))?\]\s*fn\s+needs_parentheses\(&self\)\s*->\s*bool\s*\{[^}]*\}\s*\}(?!\s*fn\s+needs_parentheses_with_parent)
  metadata:
    category: api
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/biome_js_formatter/**/*.rs'
- id: needs-parentheses-trait-impl-short-form
  message: Simple NeedsParentheses impl returning constant boolean - refactoring applied
  severity: INFO
  languages:
  - rust
  pattern-regex: (?s)impl\s+NeedsParentheses\s+for\s+\w+\s*\{\s*#?\[inline[^\]]*\]?\s*fn\s+needs_parentheses\(&self\)\s*->\s*bool\s*\{\s*(false|true)\s*\}\s*\}
  metadata:
    category: api
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/biome_js_formatter/**/*.rs'
- id: inline-always-needs-parentheses-only
  message: NeedsParentheses impl with inline(always) and single method - refactoring
    applied
  severity: INFO
  languages:
  - rust
  pattern-regex: (?s)impl\s+NeedsParentheses\s+for\s+\w+\s*\{\s*#\[inline\(always\)\]\s*fn\s+needs_parentheses\(&self\)\s*->\s*bool[^}]*\}\s*(?!\s*#\[inline|fn\s+needs_parentheses_with_parent)
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/biome_js_formatter/**/*.rs'
- id: expression-file-no-parent-import
  message: Expression file refactored without JsSyntaxNode import - refactoring applied
  severity: INFO
  languages:
  - rust
  pattern-regex: \A(?![\s\S]*use.*JsSyntaxNode[;\s])[\s\S]*impl\s+NeedsParentheses[\s\S]*fn\s+needs_parentheses\(&self\)[\s\S]*\z
  metadata:
    category: config
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/js/expressions/call_expression.rs'
    - '**/js/expressions/new_expression.rs'
    - '**/js/expressions/unary_expression.rs'
- id: refactored-expressions-directory
  message: Expression file with no needs_parentheses_with_parent references - refactoring
    applied
  severity: INFO
  languages:
  - rust
  pattern-regex: \A(?![\s\S]*needs_parentheses_with_parent)[\s\S]*\z
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/js/expressions/logical_expression.rs'
    - '**/js/expressions/conditional_expression.rs'
    - '**/js/expressions/arrow_function_expression.rs'
- id: helper-function-refactored-signature
  message: Helper function with parentheses in name taking single parameter - refactoring
    applied
  severity: INFO
  languages:
  - rust
  pattern-regex: pub(?:\(crate\))?\s+fn\s+\w*parenthes\w*\s*\(\s*\w+:\s*&[^,]+\)\s*->\s*bool
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/utils/*.rs'
    - '**/parentheses.rs'
- id: type-file-no-parent-import
  message: Type file refactored without JsSyntaxNode import - refactoring applied
  severity: INFO
  languages:
  - rust
  pattern-regex: \A(?![\s\S]*use.*JsSyntaxNode[;\s])[\s\S]*impl\s+NeedsParentheses[\s\S]*fn\s+needs_parentheses\(&self\)[\s\S]*\z
  metadata:
    category: config
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/ts/types/infer_type.rs'
    - '**/ts/types/typeof_type.rs'
- id: helper-needs-binary-like-no-parent-param
  message: Helper function needs_binary_like_parentheses without parent parameter
    - refactoring applied
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-inside: "pub fn needs_binary_like_parentheses($NODE: &$TYPE) -> bool {\n\
      \  ...\n}\n"
  - pattern-not: "pub fn needs_binary_like_parentheses($NODE: &$TYPE, $PARENT: &$PTYPE)\
      \ -> bool {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: helper-unary-like-no-parent-param
  message: Helper function unary_like_expression_needs_parentheses without parent
    parameter - refactoring applied
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-inside: "pub fn unary_like_expression_needs_parentheses($NODE: &$TYPE)\
      \ -> bool {\n  ...\n}\n"
  - pattern-not: "pub fn unary_like_expression_needs_parentheses($NODE: &$TYPE, $PARENT:\
      \ &$PTYPE) -> bool {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: helper-needs-binary-like-no-parent-v2
  message: Helper function needs_binary_like_parentheses without parent parameter
    - refactoring applied
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern: "pub fn needs_binary_like_parentheses($NODE: &$TYPE) -> bool {\n  ...\n\
      }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/binary_like_expression.rs'
- id: parentheses-rs-no-with-parent-trait-method
  message: NeedsParentheses trait without needs_parentheses_with_parent method - refactoring
    applied
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-inside: "pub trait NeedsParentheses: $BOUND {\n  ...\n}\n"
  - pattern-not-regex: fn\s+needs_parentheses_with_parent
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/parentheses.rs'
- id: trait-single-method-parentheses-rs
