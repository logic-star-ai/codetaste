    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-parent-kind-match-in-needs-parentheses-with-parent
  message: 'Old pattern detected: Accessing parent.kind() in needs_parentheses_with_parent
    method'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: parent.kind()
  - pattern-inside: "fn needs_parentheses_with_parent(&self, parent: JsSyntaxNode)\
      \ -> bool {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-call-needs-binary-like-parentheses-with-parent
  message: 'Old pattern detected: Call to needs_binary_like_parentheses with explicit
    parent parameter. After refactoring, parent should be retrieved internally'
