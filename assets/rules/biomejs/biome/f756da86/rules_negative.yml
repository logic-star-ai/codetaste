rules:
- id: detect-needs-parentheses-with-parent-call
  message: 'Old pattern detected: Call to needs_parentheses_with_parent() found. Use
    needs_parentheses() instead which gets parent internally'
  severity: WARNING
  languages:
  - rust
  pattern: $EXPR.needs_parentheses_with_parent($PARENT)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 102
- id: detect-needs-parentheses-with-parent-method-call
  message: 'Old pattern detected: Call to needs_parentheses_with_parent() found. Use
    needs_parentheses() instead which gets parent internally'
  severity: WARNING
  languages:
  - rust
  pattern: $EXPR.needs_parentheses_with_parent($PARENT)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 102
- id: detect-delegate-to-needs-parentheses-with-parent-in-match
  message: 'Old pattern detected: Delegation to needs_parentheses_with_parent with
    ''parent'' variable'
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.needs_parentheses_with_parent(parent)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 102
- id: detect-needs-parentheses-calling-trait-method
  message: 'Old pattern detected: Call to needs_parentheses_with_parent inside NeedsParentheses
    impl'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $EXPR.needs_parentheses_with_parent($ARG)
  - pattern-inside: "impl NeedsParentheses for $TYPE {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 101
- id: detect-format-node-rule-needs-parentheses-with-parent-call
  message: 'Old pattern detected: Call to needs_parentheses_with_parent inside FormatNodeRule
    impl'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: $ITEM.needs_parentheses_with_parent($PARENT)
  - pattern-inside: "impl FormatNodeRule<$TYPE> for $FORMATTER {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 101
- id: detect-impl-needs-parentheses-for-any-type
  message: 'Old pattern detected: Type implements needs_parentheses_with_parent method'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "impl NeedsParentheses for $TYPE {\n  ...\n  fn needs_parentheses_with_parent(&self,\
      \ parent: JsSyntaxNode) -> bool {\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: detect-needs-parentheses-with-parent-js-in-type-impl
  message: 'Old pattern detected: Js* type implements needs_parentheses_with_parent
    method'
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: "impl NeedsParentheses for $TYPE {\n  fn needs_parentheses_with_parent(&self,\
      \ parent: JsSyntaxNode) -> bool {\n    ...\n  }\n}\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^Js.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: detect-needs-parentheses-with-parent-ts-type-impl
  message: 'Old pattern detected: Ts* type implements needs_parentheses_with_parent
