rules:
- id: cpu-plugin-detect-exec-network-scope-resolution
  message: ExecNetwork scope resolution detected. Migrate to CompiledModel for Plugin
    API 2.0.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: ExecNetwork::\w+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - src/plugins/intel_cpu/src/**
    exclude:
    - '**/tests/**'
- id: cpu-plugin-detect-ie-parameter-usage
