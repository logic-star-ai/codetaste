- id: cpu-plugin-detect-infer-request-base-friend-class
  message: Friend declaration for InferRequestBase detected. Update to SyncInferRequest
    for Plugin API 2.0.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: friend\s+class\s+InferRequestBase
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/plugins/intel_cpu/src/**
    exclude:
    - '**/tests/**'
- id: cpu-plugin-detect-infer-request-base-constructor-call
  message: InferRequestBase constructor with InputsDataMap detected. Migrate to SyncInferRequest
    for Plugin API 2.0.
  severity: WARNING
  languages:
  - cpp
  pattern-regex: InferRequestBase\s*\([^)]*InputsDataMap
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
