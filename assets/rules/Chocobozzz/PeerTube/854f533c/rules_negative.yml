      regex: ^\.+/helpers/core-utils
  - metavariable-pattern:
      metavariable: $FUNC
      pattern-either:
      - pattern: sha256
      - pattern: sha1
      - pattern: root
      - pattern: buildPath
      - pattern: getLowercaseExtension
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
