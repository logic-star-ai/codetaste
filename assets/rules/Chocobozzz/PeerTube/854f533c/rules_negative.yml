rules:
- id: old-uuid-import-from-server-helpers
  message: UUID utilities (buildUUID, uuidToShort, shortToUUID, isShortUUID) should
    be imported from '@shared/core-utils' instead of '@server/helpers/uuid'
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: import { ..., $FUNC, ... } from '@server/helpers/uuid'
  - pattern: import { ..., $FUNC, ... } from '../helpers/uuid'
  - pattern: import { ..., $FUNC, ... } from '../../helpers/uuid'
  - pattern: import { ..., $FUNC, ... } from '../../../helpers/uuid'
  - pattern: import { ..., $FUNC, ... } from '../../../../helpers/uuid'
  - pattern: import * as $MOD from '@server/helpers/uuid'
  - pattern: import * as $MOD from '../helpers/uuid'
  - pattern: import $MOD from '@server/helpers/uuid'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: import-statement-with-server-helpers-uuid-string
  message: UUID utilities should be imported from '@shared/core-utils' instead of
    '@server/helpers/uuid'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+.*from\s+['"]@server/helpers/uuid['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: any-import-from-server-helpers-uuid-absolute
  message: UUID utilities should be imported from '@shared/core-utils' instead of
    '@server/helpers/uuid'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: ^import\s+.*from\s+['"]@server/helpers/uuid['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: import-statement-with-helpers-core-utils-path-funcs
  message: Path utilities should be imported from '@shared/core-utils/path' instead
    of server helpers
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*(root|buildPath|getLowercaseExtension)[^}]*\}\s+from\s+['"](@server/helpers/core-utils|\.\.*/helpers/core-utils)['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: any-file-importing-uuid-with-server-prefix
  message: UUID utilities should be imported from '@shared/core-utils' instead of
    '@server/helpers/uuid'
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import\s+\{[^}]*(buildUUID|uuidToShort|shortToUUID|isShortUUID)[^}]*\}\s+from\s+['"]@server/helpers/uuid['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - server/**/*.ts
- id: export-uuid-functions-from-server-helpers
  message: UUID functions should not be exported from server/helpers - they should
    be in shared/core-utils/uuid.ts
  severity: ERROR
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'export { buildUUID, ... }

        '
    - pattern: 'export { ..., uuidToShort, ... }

        '
    - pattern: 'export { ..., shortToUUID, ... }

        '
    - pattern: 'export { ..., isShortUUID, ... }

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    include:
    - server/helpers/uuid.ts
- id: old-uuid-import-builduuid-from-server
  message: buildUUID should be imported from '@shared/core-utils' instead of server/helpers/uuid
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: import { buildUUID } from $PATH
  - metavariable-regex:
      metavariable: $PATH
      regex: .*server/helpers/uuid.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: builduuid-alone-import-from-server
