- id: old-root-import-from-server-core-utils
  message: root function should be imported from '@shared/core-utils/path' instead
    of '@server/helpers/core-utils'
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: import { ..., root, ... } from '@server/helpers/core-utils'
  - pattern: import { ..., root, ... } from '../helpers/core-utils'
  - pattern: import { ..., root, ... } from '../../helpers/core-utils'
  - pattern: import { ..., root, ... } from '../../../helpers/core-utils'
  - pattern: import { ..., root, ... } from '../../../../helpers/core-utils'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: relative-import-core-utils-for-crypto-or-path
  message: Crypto and path utilities should be imported from '@shared/core-utils'
    instead of relative path to helpers/core-utils
