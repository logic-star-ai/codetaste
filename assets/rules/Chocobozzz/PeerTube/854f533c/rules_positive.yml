- id: import-uuid-from-shared-core-utils
  message: Detected import of UUID utilities from shared/core-utils - refactoring
    applied
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., $FUNC, ... } from '@shared/core-utils/uuid'
    - pattern: import { ..., $FUNC, ... } from 'shared/core-utils/uuid'
    - pattern: import { ..., $FUNC, ... } from '../shared/core-utils/uuid'
    - pattern: import { ..., $FUNC, ... } from '../../shared/core-utils/uuid'
  - metavariable-regex:
      metavariable: $FUNC
      regex: (buildUUID|uuidToShort|shortToUUID|isShortUUID)
  metadata:
    category: api
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
- id: import-uuid-from-at-shared-path
