rules:
- id: server-controllers-uses-uuid-from-shared
  message: Server controllers import UUID utilities from shared
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'import { ... } from ''@shared/core-utils/uuid''

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 149
    nr_legacy_patterns: 0
  paths:
    include:
    - server/controllers/**/*.ts
- id: ffprobe-export-in-shared-extra-utils
  message: Detected FFprobe utility exports in shared/extra-utils/ffprobe.ts
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'export { ..., ffprobePromise, ... }

        '
    - pattern: 'export { ..., getVideoStreamSize, ... }

        '
    - pattern: 'export { ..., getVideoFileFPS, ... }

        '
  metadata:
    category: api
    nr_refactored_patterns: 86
    nr_legacy_patterns: 0
  paths:
    include:
    - shared/extra-utils/ffprobe.ts
- id: ffprobe-utilities-export-list
  message: FFprobe utilities exported as a list from shared/extra-utils/ffprobe.ts
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: "export {\n  ...,\n  ffprobePromise,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 86
    nr_legacy_patterns: 0
  paths:
    include:
    - shared/extra-utils/ffprobe.ts
