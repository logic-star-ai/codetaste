rules:
- id: hle-refactor-hleloginfo-new-function
  message: Detected usage of new hleLogInfo function that replaces hleLogSuccessInfoI/X
  severity: INFO
  languages:
  - cpp
  pattern-either:
  - pattern: return hleLogInfo(...);
  - pattern: hleLogInfo(...);
  - pattern: hleDelayResult(hleLogInfo(...), ...)
  metadata:
    category: api
    nr_refactored_patterns: 107
    nr_legacy_patterns: 0
- id: hle-refactor-hleloginfo-refactor-complete
  message: Detected usage of new consolidated logging API
  severity: INFO
  languages:
  - cpp
  pattern-regex: hleLogInfo|hleLogDebugOrError|hleLogDebugOrWarn
  metadata:
    category: api
    nr_refactored_patterns: 105
    nr_legacy_patterns: 0
- id: hle-refactor-hleloginfo-usage
  message: Detected usage of new consolidated hleLogInfo function (replaces hleLogSuccessInfoI/X)
  severity: INFO
  languages:
  - cpp
  pattern: hleLogInfo($LOG, $RES, ...)
  metadata:
    category: api
    nr_refactored_patterns: 91
    nr_legacy_patterns: 0
- id: hle-refactor-hleloginfo-with-constant-result
  message: Detected hleLogInfo with constant result
  severity: INFO
  languages:
  - cpp
  pattern: hleLogInfo($LOG, $CONST, ...)
  metadata:
    category: api
    nr_refactored_patterns: 91
    nr_legacy_patterns: 0
- id: hle-refactor-hleloginfo-multiline-format
  message: Detected multi-line hleLogInfo call
  severity: INFO
  languages:
  - cpp
  pattern: "hleLogInfo(\n  $LOG,\n  $RES,\n  ...\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 91
    nr_legacy_patterns: 0
- id: hle-refactor-hleloginfo-generic-pattern
  message: Detected generic hleLogInfo pattern with any Log type
  severity: INFO
  languages:
  - cpp
  pattern-regex: hleLogInfo\s*\(\s*Log::[A-Za-z]+\s*,
  metadata:
    category: api
    nr_refactored_patterns: 91
    nr_legacy_patterns: 0
- id: hle-refactor-hleloginfo-spacing-variations
  message: Detected hleLogInfo with varying spacing patterns
  severity: INFO
  languages:
  - cpp
  pattern-regex: hleLogInfo\s*\(\s*Log\s*::\s*[A-Za-z]+\s*,\s*
  metadata:
    category: api
    nr_refactored_patterns: 91
    nr_legacy_patterns: 0
- id: hle-refactor-hleloginfo-in-return
  message: Detected return statement using new hleLogInfo function
  severity: INFO
  languages:
  - cpp
  pattern: return hleLogInfo($LOG, $RES, ...);
  metadata:
    category: api
    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
- id: hle-refactor-hleloginfo-with-parentheses
  message: Detected hleLogInfo with extra parentheses
  severity: INFO
