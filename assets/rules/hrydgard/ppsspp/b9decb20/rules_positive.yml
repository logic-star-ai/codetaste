rules:
- id: detect-hle-log-info-usage
  message: Detected use of new consolidated hleLogInfo macro (replaces hleLogSuccessInfoI/X)
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: hleLogInfo($LOG, $RES, ...)
  metadata:
    category: refactoring
    subcategory: hle-logging-consolidation
    nr_refactored_patterns: 91
    nr_legacy_patterns: 0
- id: detect-hle-log-debug-or-error-usage
  message: Detected use of new consolidated hleLogDebugOrError macro (replaces hleLogSuccessOrError)
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: hleLogDebugOrError($LOG, $RES, ...)
  metadata:
    category: refactoring
    subcategory: hle-logging-consolidation
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: hle-macro-definition-pattern
  message: Detected HLE logging macro definition
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '#define\s+hleLog(Info|DebugOrWarn|DebugOrError)\s*\('
  metadata:
    category: refactoring
    subcategory: hle-logging-consolidation
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/HLE/HLE.h'
- id: detect-hle-log-debug-or-warn-usage
  message: Detected use of new consolidated hleLogDebugOrWarn macro (replaces hleLogSuccessOrWarn)
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: hleLogDebugOrWarn($LOG, $RES, ...)
  metadata:
    category: refactoring
    subcategory: hle-logging-consolidation
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-hle-do-log-without-retmask-param
  message: Detected hleDoLog template without retmask parameter
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: "template <bool $LEAVE, typename $T>\n$RET hleDoLog($LOG_TYPE $LOG, $LEVEL_TYPE\
      \ $LEVEL, $T $RES, const char *$FILE, int $LINE, const char *$TAG, const char\
      \ *$FMT, ...) {\n  ...\n}\n"
  - pattern-not: "template <bool $LEAVE, typename $T>\n$RET hleDoLog($LOG_TYPE $LOG,\
      \ $LEVEL_TYPE $LEVEL, $T $RES, const char *$FILE, int $LINE, const char *$TAG,\
      \ char $MASK, const char *$FMT, ...) {\n  ...\n}\n"
  metadata:
    category: refactoring
    subcategory: hle-logging-consolidation
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.h'
- id: detect-hle-log-info-macro-definition
  message: Detected new hleLogInfo macro definition
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: ^\s*#define\s+hleLogInfo\s*\(
  metadata:
    category: refactoring
    subcategory: hle-logging-consolidation
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/HLE.h'
