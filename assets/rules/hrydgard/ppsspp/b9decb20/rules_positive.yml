    nr_refactored_patterns: 75
    nr_legacy_patterns: 0
- id: hle-refactor-hleloginfo-tab-indented
  message: Detected tab-indented return hleLogInfo statement
  severity: INFO
  languages:
  - cpp
  pattern-regex: ^\t+return\s+hleLogInfo\s*\(
