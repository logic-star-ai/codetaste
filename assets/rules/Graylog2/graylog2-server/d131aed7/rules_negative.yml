rules:
- id: mongoutils-getorcreate-call
  message: getOrCreate() moved to MongoCollection interface - refactor accordingly
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $UTILS.getOrCreate($ENT)
  - metavariable-regex:
      metavariable: $UTILS
      regex: .*[Uu]tils
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: getorcreate-on-utils-instance
  message: getOrCreate() should be called on MongoCollection, not MongoUtils
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: $UTILS_VAR.getOrCreate($ENTITY_VAR)
  - metavariable-regex:
      metavariable: $UTILS_VAR
      regex: .*[Uu]tils$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: direct-getorcreate-call
  message: getOrCreate() moved to MongoCollection interface
