rules:
- id: remove-transport-field-in-composite-literal
  message: Replace 'transport' field name with 'client' in struct literals
  severity: WARNING
  languages:
  - go
  pattern: 'transport: $TRANSPORT

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 192
- id: remove-apitransport-transport-field
  message: If in apiTransport initialization, remove - entire struct being deleted
  severity: INFO
  languages:
  - go
  pattern: 'transport: $TRANSPORT

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 192
- id: remove-mock-client-tlsconfig-param
  message: Remove tlsConfig parameter from newMockClient - no longer needed
  severity: WARNING
  languages:
  - go
  pattern: 'newMockClient($TLSCONFIG, $DOER)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 190
- id: remove-nil-tlsconfig-in-mock
  message: Simplify to newMockClient(...) - tlsConfig parameter removed
  severity: WARNING
  languages:
  - go
  pattern: 'newMockClient(nil, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 190
- id: remove-transport-package-import
  message: Remove import of transport package - use *http.Client directly instead
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/docker/docker/client/transport"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: remove-transport-field-access
  message: Replace .transport field access with .client field for *http.Client
  severity: WARNING
  languages:
  - go
  pattern: '$CLI.transport

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: remove-transport-test-import
  message: Remove transport package import from test files
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/docker/docker/client/transport"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: remove-transport-sender-interface-usage
  message: Replace transport.Sender parameter with *http.Client or appropriate interface
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(..., $PARAM transport.Sender, ...) $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-cancellable-package-files
  message: Remove cancellable package files - use golang.org/x/net/context/ctxhttp
    directly
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - transport/cancellable/*.go
- id: remove-cancellable-package-declaration
  message: Remove cancellable package - it's a forked ctxhttp that should be deleted
  severity: WARNING
  languages:
  - go
  pattern: 'package cancellable

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: remove-cancellable-test-hooks
  message: If in cancellable package, remove - entire package being deleted
  severity: INFO
  languages:
  - go
  pattern: 'var $VAR = nop

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: remove-cancellable-test-hook-vars
  message: Remove test hook variables - part of cancellable package being deleted
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'var testHookContextDoneBeforeHeaders = nop

        '
    - pattern: 'var testHookDoReturned = nop

        '
    - pattern: 'var testHookDidBodyClose = nop

        '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: remove-newclient-transport-variable
  message: Remove transport variable - refactor to not use transport.NewTransportWithHTTP
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'transport

      '
  - pattern-inside: "func NewClient(...) (*Client, error) {\n  ...\n  transport, err\
      \ := transport.NewTransportWithHTTP(...)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: remove-transport-apitransport-struct-reference
  message: Remove apiTransport struct - use *http.Client directly
  severity: WARNING
  languages:
  - go
  pattern: 'apiTransport{...}

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: remove-transport-secure-method-call
  message: Replace transport.Secure() call with checking TLS config directly
  severity: WARNING
  languages:
  - go
  pattern: '$CLI.transport.Secure()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: remove-transport-scheme-method-implementation
  message: Remove Scheme() method implementation - use helper function resolveScheme()
    instead
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) Scheme() string {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: remove-transport-secure-method-implementation
  message: Remove Secure() method implementation - check TLS config directly instead
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) Secure() bool {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: remove-transport-tlsconfig-method-implementation
  message: Remove TLSConfig() method implementation - use helper function resolveTLSConfig()
    instead
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) TLSConfig() *tls.Config {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: remove-transport-cancelrequest-method
  message: Remove CancelRequest method call - use context cancellation instead
  severity: WARNING
  languages:
  - go
  pattern: '$CLIENT.CancelRequest($REQ)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-transport-package-declaration
  message: Remove transport package - this entire package should be deleted
  severity: WARNING
  languages:
  - go
  pattern: 'package transport

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: remove-transport-method-call-in-error-check
  message: Replace transport.Secure() call - use direct TLS config check instead
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "if !$CLI.transport.Secure() && ... {\n  ...\n}\n"
    - pattern: "if $CLI.transport.Secure() && ... {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: remove-apitransport-type-usage
  message: Remove apiTransport struct usage - use *http.Client directly
  severity: WARNING
  languages:
  - go
  pattern: "&apiTransport{\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: remove-transport-client-methods-signature
  message: If these are transport.Client interface methods, the interface should be
    removed
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'Secure() bool

        '
    - pattern: 'Scheme() string

        '
    - pattern: 'TLSConfig() *tls.Config

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: remove-transport-cancellable-import
  message: Remove import of transport/cancellable package - use golang.org/x/net/context/ctxhttp
    directly instead
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/docker/docker/client/transport/cancellable"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-client-type-field
  message: Replace transport.Client field with *http.Client
  severity: WARNING
  languages:
  - go
  pattern: "type $STRUCT struct {\n  ...\n  $FIELD transport.Client\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-newtransportwithhttp-call
  message: Remove transport.NewTransportWithHTTP call - configure http.Transport directly
    using sockets.ConfigureTransport
  severity: WARNING
  languages:
  - go
  pattern: 'transport.NewTransportWithHTTP($PROTO, $ADDR, $CLIENT)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-cancellable-do-call
  message: Replace cancellable.Do with ctxhttp.Do from golang.org/x/net/context/ctxhttp
  severity: WARNING
  languages:
  - go
  pattern: 'cancellable.Do($CTX, $CLIENT, $REQ)

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-tlsinfo-struct-reference
  message: Remove tlsInfo struct - use helper functions resolveTLSConfig() instead
  severity: WARNING
  languages:
  - go
  pattern: 'tlsInfo{...}

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-scheme-method-call
  message: Replace transport.Scheme() call with helper function resolveScheme()
  severity: WARNING
  languages:
  - go
  pattern: '$CLI.transport.Scheme()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-tlsconfig-method-call
  message: Replace transport.TLSConfig() call with helper function resolveTLSConfig()
  severity: WARNING
  languages:
  - go
  pattern: '$CLI.transport.TLSConfig()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-client-assignment
  message: Replace transport.NewTransportWithHTTP assignment with *http.Client configuration
  severity: WARNING
  languages:
  - go
  pattern: '$VAR = transport.NewTransportWithHTTP(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-defaulttransport-function-call
  message: Replace defaultTransport() with direct http.Transport configuration using
    sockets.ConfigureTransport
  severity: WARNING
  languages:
  - go
  pattern: 'defaultTransport($PROTO, $ADDR)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-transport-package-files
  message: Remove transport/client.go file - transport package should be deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - transport/client.go
- id: detect-transport-transport-file
  message: Remove transport/transport.go file - transport package should be deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - transport/transport.go
- id: remove-transport-sender-interface-definition
  message: Remove Sender interface definition from transport package
  severity: WARNING
  languages:
  - go
  pattern: "type Sender interface {\n  ...\n  Do(*http.Request) (*http.Response, error)\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-client-interface-def
  message: Remove Client interface definition - part of transport package that should
    be deleted
  severity: WARNING
  languages:
  - go
  pattern: "type Client interface {\n  Sender\n  Secure() bool\n  Scheme() string\n\
    \  TLSConfig() *tls.Config\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-field-in-client-struct
  message: Replace 'transport transport.Client' field with 'client *http.Client'
  severity: WARNING
  languages:
  - go
  pattern: "type Client struct {\n  ...\n  transport transport.Client\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-newtransportwithhttp-assignment
  message: Replace transport.NewTransportWithHTTP with direct http.Client configuration
  severity: WARNING
  languages:
  - go
  pattern: '$VAR, $ERR := transport.NewTransportWithHTTP($PROTO, $ADDR, $CLIENT)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-scheme-in-url-assignment
  message: Replace transport.Scheme() call with resolveScheme() helper function
  severity: WARNING
  languages:
  - go
  pattern: '$REQ.URL.Scheme = $CLI.transport.Scheme()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-apitransport-type-definition
  message: Remove apiTransport struct definition - part of transport package to be
    deleted
  severity: WARNING
  languages:
  - go
  pattern: "type apiTransport struct {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-tlsinfo-type-definition
  message: Remove tlsInfo struct definition - part of transport package to be deleted
  severity: WARNING
  languages:
  - go
  pattern: "type tlsInfo struct {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-tlsinfo-pointer-usage
  message: Remove tlsInfo usage - use helper functions instead
  severity: WARNING
  languages:
  - go
  pattern: 'tlsInfo: &tlsInfo{...}

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-client-conversion
  message: Replace transport.Client return type with *http.Client or concrete type
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(...) transport.Client {\n  ...\n  return &$TYPE{...}\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-do-method-interface
  message: Check if this interface is transport.Sender - should be removed
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE interface {\n  ...\n  Do(*http.Request) (*http.Response, error)\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-cancelrequest-implementation
  message: Remove CancelRequest method - use context cancellation instead
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) CancelRequest($REQ *http.Request) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-httpclient-field-with-asterisk
  message: Remove tlsInfo embedding - part of transport package refactoring
  severity: WARNING
  languages:
  - go
  pattern: "type $STRUCT struct {\n  *http.Client\n  *tlsInfo\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-sockets-configure-in-defaulttransport
  message: Move defaultTransport logic to NewClient - this helper should be removed
    with transport package
  severity: WARNING
  languages:
  - go
  pattern: "func defaultTransport(...) *http.Transport {\n  $TR := new(http.Transport)\n\
    \  sockets.ConfigureTransport($TR, ...)\n  return $TR\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-assertion-ok-check
  message: Check if this is in transport package code - may need refactoring for client
    usage
  severity: INFO
  languages:
  - go
  pattern: '$TR, $OK := $CLIENT.Transport.(*http.Transport)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-cancellable-do-with-transport-sender
  message: Replace cancellable.Do with ctxhttp.Do and use .client instead of .transport
  severity: WARNING
  languages:
  - go
  pattern: 'resp, err := cancellable.Do($CTX, $CLI.transport, $REQ)

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-field-comment
  message: Replace transport field with client field of type *http.Client
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type Client struct {\n  ...\n  transport $TYPE\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $TYPE
      patterns:
      - pattern: transport.Client
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-short-var-decl
  message: Replace transport.NewTransportWithHTTP with direct *http.Client configuration
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := transport.NewTransportWithHTTP(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-cancellable-canceler-file
  message: Remove canceler.go - part of forked ctxhttp that should be deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - transport/cancellable/canceler.go
- id: detect-cancellable-cancellable-file
  message: Remove cancellable.go - forked ctxhttp file that should be deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - transport/cancellable/cancellable.go
- id: detect-cancellable-canceler-go14-file
  message: Remove canceler_go14.go - part of forked ctxhttp that should be deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - transport/cancellable/canceler_go14.go
- id: remove-mock-client-struct-def
  message: Update mockClient struct to match new client structure without transport
    types
  severity: WARNING
  languages:
  - go
  pattern: "type mockClient struct {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-type-in-error-return
  message: Remove transport-specific error message - no longer relevant after refactoring
  severity: WARNING
  languages:
  - go
  pattern: 'return nil, fmt.Errorf("unable to verify TLS configuration, invalid transport
    %v", ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-default-transport-call
  message: Replace defaultTransport call with inline http.Transport configuration
  severity: WARNING
  languages:
  - go
  pattern: 'transport = defaultTransport($PROTO, $ADDR)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-tlsinfo-composite-literal-field
  message: Remove tlsInfo field - helper functions will replace this functionality
  severity: WARNING
  languages:
  - go
  pattern: 'tlsInfo: $VALUE

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-apitransport-cancelrequest
  message: Remove apiTransport.CancelRequest method - part of transport package to
    delete
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($A *apiTransport) CancelRequest($REQ *http.Request) {\n  ...\n\
      }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-package-function-call
  message: Remove transport package function call - transport package should be deleted
  severity: WARNING
  languages:
  - go
  pattern: 'transport.$FUNC(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-httpclient-embedding-in-apitransport
  message: Remove apiTransport struct - part of transport package to be deleted
  severity: WARNING
  languages:
  - go
  pattern: "type apiTransport struct {\n  *http.Client\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-secure-negation
  message: Replace transport.Secure() check with direct TLS config validation
  severity: WARNING
  languages:
  - go
  pattern: '!$CLI.transport.Secure()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-mockclient-scheme-method
  message: Remove Scheme() method from mockClient - no longer part of interface
  severity: WARNING
  languages:
  - go
  pattern: "func ($M *mockClient) Scheme() string {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-mockclient-secure-method
  message: Remove Secure() method from mockClient - no longer part of interface
  severity: WARNING
  languages:
  - go
  pattern: "func ($M *mockClient) Secure() bool {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-mockclient-tlsconfig-method
  message: Remove TLSConfig() method from mockClient - no longer part of interface
  severity: WARNING
  languages:
  - go
  pattern: "func ($M *mockClient) TLSConfig() *tls.Config {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-cancellable-responseAndError-type
  message: Remove responseAndError type - part of cancellable package to be deleted
  severity: WARNING
  languages:
  - go
  pattern: "type responseAndError struct {\n  resp *http.Response\n  err  error\n\
    }\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-mockclient-do-field
  message: Update mockClient struct for new client structure without transport types
  severity: WARNING
  languages:
  - go
  pattern: "type mockClient struct {\n  do func(*http.Request) (*http.Response, error)\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-mockclient-do-method
  message: Verify mockClient.Do method matches new interface requirements
  severity: INFO
  languages:
  - go
  pattern: "func ($M mockClient) Do($REQ *http.Request) (*http.Response, error) {\n\
    \  return $M.do($REQ)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-invalid-transport-error
  message: Remove transport validation error - no longer needed after refactoring
  severity: WARNING
  languages:
  - go
  pattern: 'return nil, fmt.Errorf("unable to verify TLS configuration, invalid transport
    %v", $CLIENT.Transport)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: remove-transport-client-ok-check
  message: Remove transport type assertion check - part of transport package validation
    to remove
  severity: WARNING
