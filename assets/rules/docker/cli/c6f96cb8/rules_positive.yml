rules:
- id: docker-cli-test-client-field-mock
  message: Detected test Client with client field
  severity: INFO
  languages:
  - go
  pattern: "&Client{\n  $...BEFORE,\n  client: $MOCK,\n  $...AFTER,\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 191
    nr_legacy_patterns: 0
- id: docker-cli-client-assignment
  message: Detected test using newMockClient with client field instead of transport
    field
  severity: INFO
  languages:
  - go
  pattern: 'client: newMockClient($DOER)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 190
    nr_legacy_patterns: 0
- id: docker-cli-test-client-with-newmockclient
  message: Detected test Client initialization with client field using newMockClient
  severity: INFO
  languages:
  - go
  pattern: "&Client{\n  $...FIELDS,\n  client: newMockClient($FUNC),\n  $...MORE,\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 190
    nr_legacy_patterns: 0
- id: docker-cli-newmockclient-call
  message: Detected call to newMockClient with function parameter
  severity: INFO
  languages:
  - go
  pattern: newMockClient($FUNC)
  metadata:
    category: basic
    nr_refactored_patterns: 190
    nr_legacy_patterns: 0
- id: docker-cli-newmockclient-without-tls
  message: Detected newMockClient call without TLS config parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: newMockClient($FUNC)
  - pattern-not: newMockClient($TLS, $FUNC)
  metadata:
    category: basic
    nr_refactored_patterns: 190
    nr_legacy_patterns: 0
- id: docker-cli-test-newmockclient-assignment
  message: Detected Client test initialization with client field and newMockClient
  severity: INFO
  languages:
  - go
  pattern: "$C := &Client{\n  $...FIELDS1,\n  client: newMockClient($F),\n  $...FIELDS2,\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 189
    nr_legacy_patterns: 0
- id: docker-cli-newmockclient-single-func-arg
  message: Detected newMockClient call with single function argument
  severity: INFO
  languages:
  - go
  pattern: newMockClient(func($REQ *http.Request) (*http.Response, error) { ... })
  metadata:
    category: basic
    nr_refactored_patterns: 88
    nr_legacy_patterns: 0
- id: docker-cli-test-mock-function-inline
  message: Detected newMockClient with inline function definition
  severity: INFO
  languages:
  - go
  pattern: "newMockClient(func(req *http.Request) (*http.Response, error) {\n  ...\n\
    })\n"
  metadata:
    category: basic
    nr_refactored_patterns: 80
    nr_legacy_patterns: 0
- id: docker-cli-client-field-access
  message: Detected access to 'client' field instead of 'transport' field
  severity: INFO
  languages:
  - go
  pattern: $CLI.client
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: docker-cli-client-dot-client-pattern
  message: Detected cli.client field access pattern
  severity: INFO
  languages:
  - go
  pattern: cli.client
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: docker-cli-cli-client-access-pattern
  message: Detected access to client field on any struct
  severity: INFO
  languages:
  - go
  pattern: $X.client
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: docker-cli-resolve-tls-config-call
  message: Detected call to helper function resolveTLSConfig()
  severity: INFO
  languages:
  - go
  pattern: resolveTLSConfig($CLIENT)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: docker-cli-http-client-field-in-struct
  message: Detected refactored Client struct with 'client' field of type *http.Client
    instead of transport.Client
  severity: INFO
  languages:
  - go
  pattern: "type Client struct {\n  ...\n  client *http.Client\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-import
  message: Detected direct import of golang.org/x/net/context/ctxhttp instead of forked
    cancellable package
  severity: INFO
  languages:
  - go
  pattern-regex: ^\s*"golang\.org/x/net/context/ctxhttp"\s*$
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-do-call
  message: Detected use of ctxhttp.Do() directly instead of cancellable.Do()
  severity: INFO
  languages:
  - go
  pattern: ctxhttp.Do($CTX, $CLIENT, $REQ)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-mock-client-returns-http-client
  message: Detected newMockClient returning *http.Client instead of transport.Client
  severity: INFO
  languages:
  - go
  pattern: "func newMockClient(...) *http.Client {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-transport-file-without-package
  message: Detected transport.go in main package instead of transport/ directory
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - transport.go
    exclude:
    - transport/transport.go
- id: docker-cli-newclient-with-http-transport-config
  message: Detected NewClient() directly configuring http.Transport with sockets.ConfigureTransport()
  severity: INFO
  languages:
  - go
  pattern: "func NewClient($HOST string, $VERSION string, $CLIENT *http.Client, $HEADERS\
    \ map[string]string) (*Client, error) {\n  ...\n  sockets.ConfigureTransport($TRANSPORT,\
    \ $PROTO, $ADDR)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-resolve-scheme-call
  message: Detected call to helper function resolveScheme()
  severity: INFO
  languages:
  - go
  pattern: resolveScheme($CLIENT)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-newmockclient-single-param
  message: Detected simplified newMockClient() with single parameter (no tlsConfig)
  severity: INFO
  languages:
  - go
  pattern: "func newMockClient($DOER func(*http.Request) (*http.Response, error))\
    \ *http.Client {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-mock-client-http-client-return
  message: Detected mock client returning http.Client with custom Transport
  severity: INFO
  languages:
  - go
  pattern: "return &http.Client{\n  Transport: $TRANSPORT,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-do-with-client-field
  message: Detected ctxhttp.Do() using client field instead of transport field
  severity: INFO
  languages:
  - go
  pattern: 'ctxhttp.Do($CTX, $CLI.client, $REQ)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-client-type-http-client
  message: Detected Client struct containing *http.Client field type
  severity: INFO
  languages:
  - go
  pattern: "type Client struct {\n  ...\n  $FIELD *http.Client\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-package-usage
  message: Detected usage of ctxhttp package methods
  severity: INFO
  languages:
  - go
  pattern: ctxhttp.$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-do-context-param
  message: Detected ctxhttp.Do call with context parameter
  severity: INFO
  languages:
  - go
  pattern: ctxhttp.Do($CTX, ...)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-request-context-http
  message: Detected ctxhttp.Do with cli.client field access
  severity: INFO
  languages:
  - go
  pattern: '$RESP, $ERR := ctxhttp.Do($CTX, $CLI.client, $REQ)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-test-mock-without-interfaces
  message: Detected mock client function returning concrete http.Client type
  severity: INFO
  languages:
  - go
  pattern: "func newMockClient($DOER func(*http.Request) (*http.Response, error))\
    \ *http.Client {\n  return &http.Client{\n    Transport: $TRANSPORT,\n  }\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-client-struct-no-transport-interface
  message: Detected Client struct without transport.Client interface field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type Client struct {\n  ...\n}\n"
  - pattern-not: "type Client struct {\n  ...\n  transport transport.Client\n  ...\n\
      }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-newclient-return-statement
  message: Detected Client return statement with client field in NewClient
  severity: INFO
  languages:
  - go
  pattern: "return &Client{\n  host: $H,\n  proto: $P,\n  addr: $A,\n  basePath: $BP,\n\
    \  client: $C,\n  version: $V,\n  customHTTPHeaders: $HDRS,\n}, nil\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-import-statement
  message: Detected import of golang.org/x/net/context/ctxhttp package
  severity: INFO
  languages:
  - go
  pattern-regex: import\s+\(\s*[^)]*"golang\.org/x/net/context/ctxhttp"[^)]*\)
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-http-client-nil-else-create
  message: Detected http.Client creation when nil in NewClient
  severity: INFO
  languages:
  - go
  pattern: "if $CLIENT == nil {\n  ...\n  $CLIENT = &http.Client{...}\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-newmockclient-return-http
  message: Detected newMockClient returning *http.Client type
  severity: INFO
  languages:
  - go
  pattern: "func newMockClient(...) *http.Client {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-client-struct-fields-order
  message: Detected Client struct with refactored field order including client field
  severity: INFO
  languages:
  - go
  pattern: "type Client struct {\n  host string\n  proto string\n  addr string\n \
    \ basePath string\n  client *http.Client\n  version string\n  customHTTPHeaders\
    \ map[string]string\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-request-with-ctxhttp
  message: Detected response and error assignment from ctxhttp.Do call
  severity: INFO
  languages:
  - go
  pattern: 'resp, err := ctxhttp.Do($CTX, $CLIENT, $REQ)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-do-error-handling
  message: Detected ctxhttp.Do with error handling pattern
  severity: INFO
  languages:
  - go
  pattern: "resp, err := ctxhttp.Do($CTX, $C, $REQ)\nif err != nil {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-newmockclient-func-signature
  message: Detected newMockClient with 'doer' parameter name
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+newMockClient\s*\(\s*doer\s+func\(\*http\.Request\)\s*\(\*http\.Response,\s*error\)\s*\)
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-newclient-return-client-err
  message: Detected return statement with Client containing client field
  severity: INFO
  languages:
  - go
  pattern: "return &Client{\n  $...FIELDS,\n  client: $C,\n  $...MORE,\n}, nil\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-simple-call
  message: Detected simple ctxhttp.Do call with three arguments
  severity: INFO
  languages:
  - go
  pattern: ctxhttp.Do($A, $B, $C)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-client-field-seven-fields
  message: Detected Client struct with 7 fields including *http.Client
  severity: INFO
  languages:
  - go
  pattern: "type Client struct {\n  $F1 string\n  $F2 string\n  $F3 string\n  $F4\
    \ string\n  $F5 *http.Client\n  $F6 string\n  $F7 map[string]string\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-newmockclient-lowercase-doer
  message: Detected newMockClient with lowercase 'doer' parameter
  severity: INFO
  languages:
  - go
  pattern-regex: newMockClient\s*\(\s*doer\s+
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-with-context
  message: Detected ctxhttp.Do with ctx variable
  severity: INFO
  languages:
  - go
  pattern: 'ctxhttp.Do(ctx, $CLIENT, $REQ)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-newmockclient-parameter-type
  message: Detected newMockClient parameter type signature
  severity: INFO
  languages:
  - go
  pattern: 'func newMockClient(doer func(*http.Request) (*http.Response, error))

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-client-struct-initialization
  message: Detected Client struct initialization with all fields including client
  severity: INFO
  languages:
  - go
  pattern: "Client{\n  host: $H,\n  proto: $P,\n  addr: $A,\n  basePath: $B,\n  client:\
    \ $C,\n  version: $V,\n  customHTTPHeaders: $HDR,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-client-type-with-http
  message: Detected Client type definition containing client *http.Client field
  severity: INFO
  languages:
  - go
  pattern-regex: type\s+Client\s+struct\s*\{[^}]*client\s+\*http\.Client
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-newclient-with-sockets
  message: Detected NewClient with sockets.ConfigureTransport call
  severity: INFO
  languages:
  - go
  pattern: "func NewClient(...) (*Client, error) {\n  ...\n  sockets.ConfigureTransport($T,\
    \ $P, $A)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-mock-client-return
  message: Detected return of http.Client pointer
  severity: INFO
  languages:
  - go
  pattern: "return &http.Client{\n  $...FIELDS,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-package-call
  message: Detected call to ctxhttp package function
  severity: INFO
  languages:
  - go
  pattern: ctxhttp.$FUNC(...)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-mock-roundtrip-func
  message: Detected RoundTrip method implementation for mock transport
  severity: INFO
  languages:
  - go
  pattern: "func ($M $TYPE) RoundTrip($REQ *http.Request) (*http.Response, error)\
    \ {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-client-return-with-client-field
  message: Detected Client return with client field assignment
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: 'return &Client{$...F, client: $C, $...G}, nil

      '
  - pattern: 'return &Client{$...F, client: $C, $...G}, $E

      '
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-newclient-configure-then-create
  message: Detected sockets.ConfigureTransport inside NewClient function
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: sockets.ConfigureTransport($T, $P, $A)
  - pattern-inside: "func NewClient(...) (*Client, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-ctxhttp-error-assignment
  message: Detected response and error from ctxhttp.Do
  severity: INFO
  languages:
  - go
  pattern: '$RESP, $ERR := ctxhttp.Do($CTX, $C, $REQ)

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: docker-cli-newmockclient-doer-param
  message: Detected newMockClient with doer parameter name
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+newMockClient\s*\(\s*doer
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
