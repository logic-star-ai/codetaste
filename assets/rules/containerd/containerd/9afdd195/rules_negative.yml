rules:
- id: detect-cricontainerd-method-receiver
  message: Method receiver uses 'criContainerdService' type which should be renamed
    to 'criService'
  severity: WARNING
  languages:
  - go
  pattern: func ($RECV *criContainerdService) $METHOD(...) { ... }
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 65
- id: detect-cricontainerd-receiver-any-method
  message: Method receiver 'criContainerdService' should be renamed to 'criService'
  severity: WARNING
  languages:
  - go
  pattern: 'func (c *criContainerdService) $METHOD(...) $RETURN

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 62
