rules:
- id: go-files-in-tigron-test
  message: Detected any Go content in test package
  severity: INFO
  languages:
  - go
  pattern-regex: \S
  metadata:
    nr_refactored_patterns: 25344
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/mod/tigron/test/*.go'
- id: any-content-tigron-internal
  message: Detected content in tigron internal
  severity: INFO
  languages:
  - go
  pattern-regex: .
  metadata:
    nr_refactored_patterns: 5219
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/mod/tigron/test/internal/**'
