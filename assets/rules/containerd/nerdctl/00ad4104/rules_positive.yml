- id: require-not-function-call
  message: Detected usage of require.Not() instead of old test.Not()
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.Not($ARG)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(require)$
  - pattern-not: test.Not(...)
  metadata:
    nr_refactored_patterns: 85
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
