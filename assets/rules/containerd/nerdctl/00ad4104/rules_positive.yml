rules:
- id: test-data-type-usage-with-new-imports
  message: 'Refactoring detected: test.Data type used with new imports'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func($ARG $TEST.Data, ...) { ... }
  - metavariable-regex:
      metavariable: $TEST
      regex: ^test$
  - pattern-inside: 'import "$TIGRON"

      ...

      '
  - metavariable-regex:
      metavariable: $TIGRON
      regex: .*/mod/tigron/test$
  metadata:
    nr_refactored_patterns: 745
    nr_legacy_patterns: 0
- id: test-expects-function-usage
  message: 'Refactoring detected: test.Expects() function used with new tigron imports'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $TEST.Expects(...)
  - metavariable-regex:
      metavariable: $TEST
      regex: ^test$
  - pattern-inside: 'import "$TIGRON"

      ...

      '
  - metavariable-regex:
      metavariable: $TIGRON
      regex: .*/mod/tigron/.*
  metadata:
    nr_refactored_patterns: 196
    nr_legacy_patterns: 0
- id: test-run-method-with-new-imports
  message: 'Refactoring detected: test.Case.Run() method call with new imports'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $CASE.Run($T)
  - pattern-inside: 'import "$TIGRON"

      ...

      '
  - metavariable-regex:
      metavariable: $TIGRON
      regex: .*/mod/tigron/test$
  metadata:
    nr_refactored_patterns: 161
    nr_legacy_patterns: 0
- id: no-old-test-import-with-new-tigron
  message: 'Refactoring detected: Using mod/tigron without old pkg/testutil/test import'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$TIGRON"
  - metavariable-regex:
      metavariable: $TIGRON
      regex: .*/mod/tigron/.*
  - pattern-not-inside: 'import "github.com/containerd/nerdctl/v2/pkg/testutil/test"

      ...

      '
  - pattern-not-inside: 'import $A "github.com/containerd/nerdctl/v2/pkg/testutil/test"

      ...

      '
  metadata:
    nr_refactored_patterns: 155
    nr_legacy_patterns: 0
