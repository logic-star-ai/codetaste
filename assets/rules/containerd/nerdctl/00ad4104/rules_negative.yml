rules:
- id: qualified-test-package-reference
  message: Old test package API usage detected. Migrate to mod/tigron sub-packages
    (expect, require, utils)
  severity: WARNING
  languages:
  - go
  pattern-regex: \btest\.(Require|Contains|Equals|Match|All|DoesNotContain|Binary|Not|Windows|Linux|Arm64|Amd64|RandomStringBase64)\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 372
- id: test-contains-function-call
  message: Old API usage detected. Replace 'test.Contains(...)' with 'expect.Contains(...)'
  severity: WARNING
  languages:
  - go
  pattern: test.Contains(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 104
- id: test-contains-variable-parameter
  message: Old comparator test.Contains detected. Replace with expect.Contains from
    mod/tigron/expect
  severity: WARNING
  languages:
  - go
  pattern: test.Contains($VAR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 104
- id: test-case-with-old-expected-assignment
  message: Old Expected pattern with old comparator detected. Migrate to expect package
    from mod/tigron
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'Expected: test.Expects($EXIT, $ERRS, test.$COMPARATOR(...))

      '
  - metavariable-pattern:
      metavariable: $COMPARATOR
      patterns:
      - pattern-either:
        - pattern: Contains
        - pattern: Equals
        - pattern: Match
        - pattern: All
        - pattern: DoesNotContain
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 91
- id: test-not-function-call
  message: Old API usage detected. Replace 'test.Not(...)' with 'require.Not(...)'
  severity: WARNING
  languages:
  - go
  pattern: test.Not(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 85
- id: test-not-with-any-requirement
  message: Old requirement negation test.Not detected. Replace with require.Not from
    mod/tigron/require
  severity: WARNING
  languages:
  - go
  pattern: test.Not($REQ)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 85
- id: test-expected-struct-initialization
  message: Old Expected struct with old comparator detected. Migrate to mod/tigron
    expect package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "test.Expected{\n  Output: $OUT,\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $OUT
      pattern-either:
      - pattern: test.Contains(...)
      - pattern: test.Equals(...)
      - pattern: test.All(...)
      - pattern: test.DoesNotContain(...)
      - pattern: test.Match(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 81
- id: test-package-qualified-import-path-v2
  message: Old test framework import detected. Replace 'github.com/containerd/nerdctl/v2/pkg/testutil/test'
    with mod/tigron sub-packages
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'import "github.com/containerd/nerdctl/v2/pkg/testutil/test"

      '
  - pattern-not: 'import "github.com/containerd/nerdctl/v2/mod/tigron/..."

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 73
- id: test-package-import-in-group-v2
  message: Old test framework import detected in import group. Replace with mod/tigron
    sub-packages (expect, require, test, utils)
  severity: WARNING
  languages:
  - go
  pattern-regex: '^\s*"github\.com/containerd/nerdctl/v2/pkg/testutil/test"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 72
  paths:
    include:
    - '**/*.go'
- id: old-pkg-testutil-test-string-literal
  message: Old test framework import path detected as string. Replace with mod/tigron
    sub-packages
  severity: WARNING
  languages:
  - go
  pattern-regex: '"github\.com/containerd/nerdctl/v\d+/pkg/testutil/test"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 72
  paths:
    include:
    - '**/*.go'
