rules:
- id: datacatalog-any-python-file-reference
  message: 'Refactoring confirmed: DataCatalog in any Python file (broad check)'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: DataCatalog
    - pattern: DataCatalog(...)
    - pattern: DataCatalog.from_config(...)
  metadata:
    nr_refactored_patterns: 197
    nr_legacy_patterns: 0
  paths:
    exclude:
    - tests/io/test_kedro_data_catalog.py
    - kedro/io/kedro_data_catalog.py
- id: datacatalog-from-config-call
  message: 'Refactoring confirmed: DataCatalog.from_config() called (not KedroDataCatalog)'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: DataCatalog.from_config(...)
  - pattern-not: KedroDataCatalog.from_config(...)
  metadata:
    nr_refactored_patterns: 44
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: datacatalog-assignment-from-constructor
  message: 'Refactoring confirmed: Variable assigned from DataCatalog constructor'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $VAR = DataCatalog(...)
  - pattern-not: $VAR = KedroDataCatalog(...)
  metadata:
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: datacatalog-any-mention-in-new-file
  message: 'Refactoring confirmed: DataCatalog mentioned anywhere in new file'
  severity: INFO
  languages:
  - python
  pattern-regex: DataCatalog
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - kedro/io/data_catalog.py
- id: import-datacatalog-from-kedro-io
  message: 'Refactoring confirmed: DataCatalog imported from kedro.io (not KedroDataCatalog)'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from kedro.io import DataCatalog
    - pattern: from kedro.io import $X, DataCatalog, $Y
    - pattern: from kedro.io import $X, DataCatalog
    - pattern: from kedro.io import DataCatalog, $Y
  - pattern-not: from kedro.io import KedroDataCatalog
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: datacatalog-in-fixture
  message: 'Refactoring confirmed: DataCatalog used in pytest fixture'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "@pytest.fixture\ndef $FIXTURE(...):\n  ...\n  DataCatalog(...)\n  ...\n"
  - pattern-not-inside: "@pytest.fixture\ndef $FIXTURE(...):\n  ...\n  KedroDataCatalog(...)\n\
      \  ...\n"
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: datacatalog-config-dict-literal
  message: 'Refactoring confirmed: Config dictionary for DataCatalog'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: '$VAR = {...}

      ...

      DataCatalog.from_config($VAR, ...)

      '
  - pattern-not: '$VAR = {...}

      ...

      KedroDataCatalog.from_config($VAR, ...)

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: datacatalog-subclass-definition
  message: 'Refactoring confirmed: Class inheriting from DataCatalog'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(DataCatalog):\n  ...\n"
  - pattern-not: "class $CLASS(KedroDataCatalog):\n  ...\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: new-data-catalog-file-exists
  message: 'Refactoring confirmed: New data_catalog.py file exists in kedro/io/'
  severity: INFO
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - kedro/io/data_catalog.py
- id: datacatalog-class-definition-in-new-file
  message: 'Refactoring confirmed: DataCatalog class defined in new file location'
  severity: INFO
  languages:
  - python
  pattern: "class DataCatalog(...):\n    ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - kedro/io/data_catalog.py
  options:
    symbolic_propagation: true
- id: new-test-file-data-catalog-exists
  message: 'Refactoring confirmed: New test_data_catalog.py file exists'
  severity: INFO
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/io/test_data_catalog.py
- id: test-class-testdatacatalog
  message: 'Refactoring confirmed: TestDataCatalog class in tests (not TestKedroDataCatalog)'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class TestDataCatalog:\n  ...\n"
  - pattern-not: "class TestKedroDataCatalog:\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: datacatalog-in-all-exports
  message: 'Refactoring confirmed: DataCatalog in __all__ export list'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: __all__ = [..., "DataCatalog", ...]
    - pattern: "__all__ = [\n  ...,\n  \"DataCatalog\",\n  ...,\n]\n"
  - pattern-not: __all__ = [..., "KedroDataCatalog", ...]
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: datacatalog-import-in-init
  message: 'Refactoring confirmed: DataCatalog imported in __init__.py'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from .data_catalog import DataCatalog
  - pattern-not: from .kedro_data_catalog import KedroDataCatalog
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/__init__.py'
  options:
    symbolic_propagation: true
