rules:
- id: any-missing-header-with-glibc-name-pattern
  message: Remove includes of missing_*.h headers (fcntl, sched, mman, pidfd, random,
    socket, wait) and use standard system headers instead
  severity: WARNING
  languages:
  - c
  pattern-regex: '#include\s+"missing_(fcntl|sched|mman|pidfd|random|socket|wait)\.h"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
- id: include-missing-headers-generic-pattern
  message: Remove '#include "missing_*.h"' and use the corresponding standard system
    header instead (e.g., <fcntl.h>, <sched.h>, <sys/mman.h>, <sys/pidfd.h>, <sys/random.h>,
    <sys/socket.h>, <sys/wait.h>)
  severity: WARNING
  languages:
  - c
  pattern-either:
  - pattern: '#include "missing_fcntl.h"'
  - pattern: '#include "missing_sched.h"'
  - pattern: '#include "missing_mman.h"'
  - pattern: '#include "missing_pidfd.h"'
  - pattern: '#include "missing_random.h"'
  - pattern: '#include "missing_socket.h"'
  - pattern: '#include "missing_wait.h"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
- id: any-include-statement-with-missing-prefix
  message: Remove all '#include "...missing_*.h"' statements. Use standard system
    headers like <fcntl.h>, <sched.h>, <sys/mman.h>, etc. instead
  severity: WARNING
  languages:
  - c
  pattern-regex: '#include\s+".*missing_(fcntl|sched|mman|pidfd|random|socket|wait)\.h"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
- id: include-missing-sched
  message: Remove '#include "missing_sched.h"' and use '#include <sched.h>' instead
  severity: WARNING
  languages:
  - c
  pattern: '#include "missing_sched.h"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: include-missing-sched-with-path
  message: Remove '#include "missing_sched.h"' (with any path prefix) and use '#include
    <sched.h>' instead
  severity: WARNING
  languages:
  - c
  pattern-regex: '#include\s+"[./]*missing_sched\.h"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: any-file-includes-missing-sched-broadly
  message: Remove any form of '#include "...missing_sched..."' and use '#include <sched.h>'
    instead
  severity: WARNING
  languages:
  - c
  pattern-regex: (?i)#\s*include\s+"[^"]*missing_sched[^"]*"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: any-c-or-h-file-includes-missing-sched
  message: Any file including missing_sched.h should remove it and use '#include <sched.h>'
    instead
  severity: WARNING
  languages:
  - c
  pattern: '#include "missing_sched.h"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    include:
    - '**/*.c'
    - '**/*.h'
- id: missing-header-with-iwyu-export
  message: 'Old missing_*.h header uses ''#include <xyz.h> /* IWYU pragma: export
    */'' which should be changed to ''#include_next <xyz.h>'' during refactoring'
  severity: WARNING
  languages:
  - c
  pattern-regex: (?s)#include\s+<[^>]+>\s*/\*\s*IWYU pragma:\s*export\s*\*/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/basic/missing_fcntl.h
    - src/basic/missing_sched.h
    - src/basic/missing_mman.h
    - src/basic/missing_pidfd.h
    - src/basic/missing_random.h
    - src/basic/missing_socket.h
    - src/basic/missing_wait.h
- id: header-file-in-basic-with-missing-prefix
  message: File with 'missing_' prefix should be moved to src/basic/include/ with
    canonical glibc name (remove 'missing_' prefix, adjust path for sys/* headers)
  severity: WARNING
  languages:
  - c
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/basic/missing_fcntl.h
    - src/basic/missing_sched.h
    - src/basic/missing_mman.h
    - src/basic/missing_pidfd.h
    - src/basic/missing_random.h
    - src/basic/missing_socket.h
    - src/basic/missing_wait.h
- id: old-missing-fcntl-defines-raw-o-largefile
  message: 'Old missing_fcntl.h contains RAW_O_LARGEFILE definition. Should be moved
    to src/basic/include/fcntl.h with #include_next'
  severity: WARNING
  languages:
  - c
  pattern-regex: '#define\s+RAW_O_LARGEFILE'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/basic/missing_fcntl.h
- id: header-file-at-old-missing-location
  message: 'Header file with ''missing_'' prefix exists at old location src/basic/.
    Should be moved to src/basic/include/ with canonical glibc name (fcntl.h, sched.h,
    sys/mman.h, sys/pidfd.h, sys/random.h, sys/socket.h, sys/wait.h) and use #include_next'
  severity: WARNING
  languages:
  - c
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/basic/missing_fcntl.h
    - src/basic/missing_sched.h
    - src/basic/missing_mman.h
    - src/basic/missing_pidfd.h
    - src/basic/missing_random.h
    - src/basic/missing_socket.h
    - src/basic/missing_wait.h
- id: old-header-location-pattern-check
  message: 'Old missing_*.h header pattern detected (SPDX + pragma once + system include).
    Should be refactored: move to src/basic/include/, use #include_next, remove forward.h,
    replace assert_cc with _Static_assert'
  severity: WARNING
  languages:
  - c
  pattern-regex: (?s)SPDX.*#pragma\s+once.*#include\s+<
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
