rules:
- id: assigned-product-attr-value-direct-product-fk
  message: Detected direct product FK usage on AssignedProductAttributeValue instead
    of assignment
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $MODEL.objects.filter(..., product=$PROD, ...)
    - pattern: $MODEL.objects.filter(..., product_id=$ID, ...)
    - pattern: $MODEL.objects.get(..., product=$PROD, ...)
    - pattern: $MODEL.objects.get(..., product_id=$ID, ...)
  - metavariable-regex:
      metavariable: $MODEL
      regex: (?i).*(assigned|attr|attribute).*(product).*(value|val).*
  - pattern-not-inside: '... .filter(..., assignment=..., ...)

      '
  - pattern-not-inside: '... .filter(..., assignment_id=..., ...)

      '
  - pattern-not-inside: '... .get(..., assignment=..., ...)

      '
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
  options:
    symbolic_propagation: true
- id: assignedproductattributevalue-field-access-not-assignment
  message: Detected field access on AssignedProductAttributeValue that is not assignment
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $OBJ.value
    - pattern: $OBJ.product
    - pattern: $OBJ.sort_order
  - pattern-inside: "for $OBJ in AssignedProductAttributeValue.objects.$M(...):\n\
      \  ...\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
  options:
    symbolic_propagation: true
- id: assigned-attr-value-create-with-product
  message: Detected create/get_or_create using product parameter directly
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $MODEL.objects.create(..., product=$PROD, ...)
    - pattern: $MODEL.objects.get_or_create(..., product=$PROD, ...)
    - pattern: $MODEL(..., product=$PROD, ...)
  - metavariable-regex:
      metavariable: $MODEL
      regex: (?i).*(assigned|attr|attribute).*(product).*(value|val).*
  - pattern-not-inside: '... (..., assignment=..., ...)

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
  options:
    symbolic_propagation: true
- id: iterate-product-attributevalues-directly
  message: Detected direct iteration over product.attributevalues
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "for $VAL in $PROD.attributevalues.$METHOD(...):\n  ...\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(all|filter|select_related|prefetch_related)$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
  options:
    symbolic_propagation: true
- id: attribute-values-queryset-from-product
  message: Detected getting attribute values queryset from product directly
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: '$VALUES = $PRODUCT.attributevalues

        '
    - pattern: '$QS = $PRODUCT.attributevalues.all()

        '
    - pattern: '$QS = $PRODUCT.attributevalues.filter(...)

        '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
  options:
    symbolic_propagation: true
- id: import-without-assignedproductattribute-model
  message: Detected import statement without AssignedProductAttribute
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from $PKG.attribute.models import $IMPORTS
  - metavariable-regex:
      metavariable: $IMPORTS
      regex: (?i).*(assignedproductattributevalue).*
  - pattern-not: from $X.attribute.models import AssignedProductAttribute
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
- id: assigned-product-attr-value-product-foreignkey-access
  message: Detected direct access to product field on assigned attribute value
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $OBJ.product
    - pattern: $OBJ.product_id
  - pattern-inside: "class $CLASS(...):\n  ...\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(assigned|attr|attribute).*(product).*(value|val).*
  - pattern-not: $OBJ.assignment
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
  options:
    symbolic_propagation: true
- id: unique-together-value-product-constraint
  message: Detected unique_together constraint on (value, product) instead of (value,
    assignment)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'unique_together = (("value", "product"),)

        '
    - pattern: 'unique_together = (("value", "product"))

        '
    - pattern: 'unique_together = [("value", "product")]

        '
  - pattern-inside: "class Meta:\n  ...\n"
  - pattern-not-inside: "class Meta:\n  ...\n  unique_together = (..., \"assignment\"\
      , ...)\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
- id: prefetch-related-attributevalues-on-product
  message: Detected prefetch_related for attributevalues on product queries
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $QS.prefetch_related("attributevalues")
    - pattern: $QS.prefetch_related(..., "attributevalues", ...)
  - pattern-not: $X.prefetch_related(..., "attributes", ...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
  options:
    symbolic_propagation: true
- id: bulk-update-sort-order-on-value-assignments
  message: Detected bulk_update on value assignments with sort_order
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: '$MODEL.objects.bulk_update($LIST, ["sort_order"])

      '
  - metavariable-regex:
      metavariable: $MODEL
      regex: ^AssignedProductAttributeValue$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
  options:
    symbolic_propagation: true
- id: null-blank-on-product-field-removed
  message: Detected product field definition without null=True, blank=True
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'product = models.ForeignKey($TARGET, ...)

      '
  - pattern-not: 'product = models.ForeignKey(..., null=True, ...)

      '
  - pattern-not: 'product = models.ForeignKey(..., blank=True, ...)

      '
  - pattern-inside: "class $CLASS(...):\n  ...\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*assigned.*product.*value.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
- id: assignedproductattributevalue-any-bulk-create
  message: Detected bulk_create on AssignedProductAttributeValue
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: AssignedProductAttributeValue.objects.bulk_create(...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test*.py'
    - '**/migrations/**'
  options:
    symbolic_propagation: true
