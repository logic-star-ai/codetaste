rules:
- id: filter-assignment-value-by-product-id
  message: Detected filtering value assignment by product_id after refactoring
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $OBJ.filter(product_id=...)
    - pattern: $OBJ.filter(product_id__in=...)
    - pattern: $OBJ.filter(product=...)
    - pattern: $OBJ.filter(product__in=...)
  - metavariable-regex:
      metavariable: $OBJ
      regex: (?i).*(assigned|attribute).*(value|assignment).*
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: product-attributevalues-count
  message: Detected product.attributevalues.count() access
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $PRODUCT.attributevalues.count()
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: iterator-on-product-filtered-values
  message: Detected iterator on value assignment filtered by product
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $OBJ.filter(..., product_id__in=$IDS, ...).iterator()
    - pattern: $OBJ.filter(..., product=$PROD, ...).iterator()
  - metavariable-regex:
      metavariable: $OBJ
      regex: (?i).*(assigned|attribute).*(value).*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: unique-together-value-product-in-assignment-model
  message: Detected unique_together on value and product instead of assignment
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "class Meta:\n  unique_together = ((\"value\", \"product\"), ...)\n\
        \  ...\n"
    - pattern: "class Meta:\n  unique_together = ((\"value\", \"product\"))\n  ...\n"
    - pattern: "class Meta:\n  unique_together = [[\"value\", \"product\"], ...]\n\
        \  ...\n"
    - pattern: "class Meta:\n  unique_together = [[\"value\", \"product\"]]\n  ...\n"
  - pattern-inside: "class $CLASS_NAME(...):\n  ...\n"
  - metavariable-regex:
      metavariable: $CLASS_NAME
      regex: (?i).*(assigned|attribute).*(value|assignment).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/**/**.py'
    - '**/product/**/**.py'
- id: values-list-with-product-id-on-assignment
  message: Detected values_list with product_id on value assignment
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $OBJ.values_list("product_id", ...)
    - pattern: $OBJ.values_list(..., "product_id", ...)
    - pattern: $OBJ.values("product_id", ...)
    - pattern: $OBJ.values(..., "product_id", ...)
  - metavariable-regex:
      metavariable: $OBJ
      regex: (?i).*(assigned|attribute).*(value|assignment).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: no-assignment-fk-in-value-model
  message: Detected value assignment model without assignment FK field
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS_NAME(...):\n  ...\n  product = models.ForeignKey(...)\n\
      \  ...\n"
  - metavariable-regex:
      metavariable: $CLASS_NAME
      regex: (?i).*(assigned).*(value).*
  - pattern-not: "class $CLASS_NAME(...):\n  ...\n  assignment = models.ForeignKey(...)\n\
      \  ...\n  product = models.ForeignKey(...)\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/**/**.py'
    - '**/models/**/*.py'
- id: no-assignedproductattribute-in-import
  message: Detected import statement without AssignedProductAttribute model
  severity: INFO
  languages:
  - python
  pattern-regex: ^from\s+[\w.]+attribute[\w.]*\s+import\s+(?!.*AssignedProductAttribute[^V]).*AssignedProductAttributeValue.*$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: prefetch-attributevalues-from-product
  message: Detected prefetch_related on attributevalues from product
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $OBJ.prefetch_related("attributevalues")
    - pattern: $OBJ.prefetch_related(..., "attributevalues", ...)
  - metavariable-regex:
      metavariable: $OBJ
      regex: (?i).*(product|item).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
- id: webhook-serialize-values-by-product
  message: Detected webhook serialization accessing values by product
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $PRODUCT.attributevalues.all()
    - pattern: $PRODUCT.attributevalues.filter(...)
    - pattern: $PRODUCT.attributevalues.select_related(...)
  - metavariable-regex:
      metavariable: $PRODUCT
      regex: (?i).*(product|instance|obj).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/webhook/**/*.py'
    - '**/serializers/**/*.py'
    - '**/*serial*.py'
- id: migration-alter-unique-together-product
  message: Detected migration altering unique_together to use product
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "migrations.AlterUniqueTogether(\n  name=$MODEL,\n  unique_together={(\"\
        value\", \"product\"), ...},\n)\n"
    - pattern: "migrations.AlterUniqueTogether(\n  name=$MODEL,\n  unique_together={(\"\
        value\", \"product\")},\n)\n"
  - metavariable-regex:
      metavariable: $MODEL
      regex: (?i).*(assigned).*(value).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/migrations/**/*.py'
- id: dataloader-context-key-values-by-product
  message: Detected dataloader with context_key for values by product
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $LOADER(...):\n  context_key = $KEY\n  ...\n  def batch_load(self,\
      \ $KEYS):\n    ...\n    $MODEL.objects.$METHOD(...).filter(product_id__in=$KEYS)\n\
      \    ...\n"
  - metavariable-regex:
      metavariable: $KEY
      regex: (?i).*value.*product.*
  - metavariable-regex:
      metavariable: $MODEL
      regex: (?i).*(assigned).*(value).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dataloaders/**/*.py'
    - '**/*loader*.py'
- id: migration-alter-field-product
  message: Detected migration altering product field on value assignment
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "migrations.AlterField(\n  model_name=$MODEL,\n  name=\"product\",\n\
      \  ...\n)\n"
  - metavariable-regex:
      metavariable: $MODEL
      regex: (?i).*(assigned).*(value).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/migrations/**/*.py'
- id: migration-remove-field-assignment
  message: Detected migration removing assignment field from value model
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "migrations.RemoveField(\n  model_name=\"assignedproductattributevalue\"\
      ,\n  name=\"assignment\",\n)\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/migrations/**/*.py'
- id: import-assigned-value-models-list
  message: Detected import of assigned value models in list format
  severity: INFO
  languages:
  - python
  pattern-regex: ^from\s+\.product\s+import\s+AssignedProductAttributeValue,\s*AttributeProduct$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/__init__.py'
- id: filter-product-id-in-values-dataloader
  message: Detected filtering AssignedProductAttributeValue by product_id__in in dataloader
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def batch_load(self, $KEYS):\n  ...\n  AssignedProductAttributeValue.objects.using($DB).filter(product_id__in=$KEYS)\n\
      \  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dataloaders/**/*.py'
