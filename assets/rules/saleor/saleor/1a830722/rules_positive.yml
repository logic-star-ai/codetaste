rules:
- id: assigned-product-attribute-value-product-filter
  message: Detected filtering AssignedProductAttributeValue by product field directly,
    indicating successful refactoring
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: AssignedProductAttributeValue.objects.filter(product_id=...)
    - pattern: AssignedProductAttributeValue.objects.filter(product=...)
    - pattern: AssignedProductAttributeValue.objects.filter(product__in=...)
    - pattern: AssignedProductAttributeValue.objects.filter(product_id__in=...)
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: attribute-value-assignment-filter-chain-product
  message: Detected filtering AssignedProductAttributeValue by product field
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: '$VALUES.filter(product_id=...)

        '
    - pattern: '$VALUES.filter(product=...)

        '
  - metavariable-pattern:
      metavariable: $VALUES
      patterns:
      - pattern-either:
        - pattern: AssignedProductAttributeValue.objects
        - pattern: AssignedProductAttributeValue.objects.filter(...)
        - pattern: AssignedProductAttributeValue.objects.using(...)
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: count-attribute-values-by-product
  message: Detected counting attribute values directly from product
  severity: INFO
  languages:
  - python
  pattern: '$PRODUCT.attributevalues.count()

    '
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: attribute-product-filter-by-product-type
  message: Detected filtering AttributeProduct by product_type_id (new pattern)
  severity: INFO
  languages:
  - python
  pattern: 'AttributeProduct.objects.filter(product_type_id=$ID)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: filter-products-by-attribute-values-direct-product
  message: Detected filtering products by attribute values using direct product_id
    reference
  severity: INFO
  languages:
  - python
  pattern: 'assigned_product_attribute_values = AssignedProductAttributeValue.objects.filter(...)

    ...

    Q(Exists(assigned_product_attribute_values.filter(product_id=OuterRef("pk"))))

    '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/filters.py'
- id: delete-attribute-values-by-product
  message: Detected deleting AssignedProductAttributeValue records by product
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'AssignedProductAttributeValue.objects.filter(product=$P).delete()

        '
    - pattern: 'AssignedProductAttributeValue.objects.filter(product_id=$P).delete()

        '
    - pattern: 'AssignedProductAttributeValue.objects.filter(product__in=$P).delete()

        '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: bulk-delete-attribute-values-by-product-filter
  message: Detected bulk deleting attribute values filtered by product
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'AssignedProductAttributeValue.objects.filter(product_id=$ID).delete()

        '
    - pattern: 'AssignedProductAttributeValue.objects.filter(product=$P).delete()

        '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: assigned-product-attribute-value-unique-together-product
  message: Detected unique_together constraint using 'product' instead of 'assignment'
    on AssignedProductAttributeValue
  severity: INFO
  languages:
  - python
  pattern: "class Meta:\n    ...\n    unique_together = ((\"value\", \"product\"),)\n\
    \    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/**'
- id: attribute-product-no-assigned-products-field
  message: Detected AttributeProduct class without assigned_products M2M field
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class AttributeProduct(...):\n    ...\n"
  - pattern-not: "class AttributeProduct(...):\n    ...\n    assigned_products = ...\n\
      \    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/**'
- id: bulk-update-attribute-values-by-product
  message: Detected bulk update of AssignedProductAttributeValue records
  severity: INFO
  languages:
  - python
  pattern: 'AssignedProductAttributeValue.objects.bulk_update($LIST, [...])

    '
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: migration-remove-assignment-field
  message: Detected migration removing assignment field from AssignedProductAttributeValue
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "operations.RemoveField(\n    model_name=\"assignedproductattributevalue\"\
        ,\n    name=\"assignment\",\n)\n"
    - pattern: "migrations.RemoveField(\n    model_name=\"assignedproductattributevalue\"\
        ,\n    name=\"assignment\",\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/migrations/**'
- id: no-assignment-in-unique-together
  message: Detected unique_together constraint on (value, product) in AssignedProductAttributeValue
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class Meta:\n    ...\n    unique_together = $CONSTRAINT\n    ...\n"
  - metavariable-pattern:
      metavariable: $CONSTRAINT
      pattern: '(("value", "product"),)

        '
  - pattern-inside: "class AssignedProductAttributeValue(...):\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/**'
- id: sort-order-get-ordering-queryset-product
  message: Detected get_ordering_queryset accessing product.attributevalues directly
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def get_ordering_queryset(self):\n    return $PRODUCT.attributevalues.all()\n"
  - pattern-inside: "class AssignedProductAttributeValue(...):\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/**'
- id: batch-load-with-product-id-keys
  message: Detected dataloader batch_load filtering AssignedProductAttributeValue
    by product_id__in
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def batch_load(self, keys):\n    ...\n    $QS.filter(product_id__in=keys)\n\
      \    ...\n"
  - metavariable-pattern:
      metavariable: $QS
      pattern: AssignedProductAttributeValue.objects
  - pattern-inside: "class $LOADER(DataLoader):\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dataloaders/**'
- id: no-reference-to-assigned-product-attribute-class
  message: Detected product filters file without AssignedProductAttribute references
    (only AssignedProductAttributeValue)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: .*AssignedProductAttribute[^V].*
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/graphql/product/filters.py'
- id: no-m2m-through-assigned-product-attribute
  message: Detected AttributeProduct model without M2M through AssignedProductAttribute
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class AttributeProduct(...):\n    ...\n"
  - pattern-not: "class AttributeProduct(...):\n    ...\n    $FIELD = models.ManyToManyField(...,\
      \ through=AssignedProductAttribute, ...)\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/**'
- id: only-two-fks-on-assigned-value-model
  message: Detected AssignedProductAttributeValue with only value and product FKs
    (no assignment FK)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class AssignedProductAttributeValue(...):\n    value = models.ForeignKey(...)\n\
      \    ...\n    product = models.ForeignKey(...)\n    ...\n"
  - pattern-not: "class AssignedProductAttributeValue(...):\n    ...\n    assignment\
      \ = models.ForeignKey(...)\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/product.py'
- id: unique-together-value-product-tuple
  message: Detected unique_together constraint specifically on (value, product) in
    AssignedProductAttributeValue Meta
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'unique_together = (("value", "product"),)

      '
  - pattern-inside: "class AssignedProductAttributeValue(...):\n    ...\n    class\
      \ Meta:\n        ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/**'
- id: models-product-file-no-assigned-product-attribute-class
  message: Detected product models file without AssignedProductAttribute class definition
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: .*class AssignedProductAttribute\(.*
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/product.py'
    exclude:
    - '**/migrations/**'
- id: two-step-filter-product-by-attr-value
  message: Detected simplified two-step product filtering by attribute values (no
    intermediate assignment)
  severity: INFO
  languages:
  - python
  pattern: '$AVS = AssignedProductAttributeValue.objects.filter(value_id__in=$VALUES)

    ...

    Q(Exists($AVS.filter(product_id=OuterRef("pk"))))

    '
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/filters.py'
- id: two-step-filter-product-by-attr-qs
  message: Detected simplified two-step product filtering with value queryset (no
    intermediate assignment)
  severity: INFO
  languages:
  - python
  pattern: '$AVS = AssignedProductAttributeValue.objects.filter(value__in=$VALUES_QS)

    ...

    Q(Exists($AVS.filter(product_id=OuterRef("pk"))))

    '
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/filters.py'
- id: attribute-value-by-product-id-loader-class
  message: Detected AttributeValuesByProductIdLoader class (new loader after refactoring)
  severity: INFO
  languages:
  - python
  pattern: "class AttributeValuesByProductIdLoader(DataLoader):\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dataloaders/**'
- id: assigned-value-no-assignment-field-definition
  message: Detected AssignedProductAttributeValue without assignment field definition
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class AssignedProductAttributeValue(...):\n    value = $V\n    ...\n\
      \    product = $P\n    ...\n"
  - pattern-not: "class AssignedProductAttributeValue(...):\n    ...\n    assignment\
      \ = $A\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/product.py'
- id: attribute-product-no-m2m-assigned-products
  message: Detected AttributeProduct without assigned_products M2M field
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class AttributeProduct(...):\n    attribute = $ATTR\n    product_type\
      \ = $PT\n    ...\n"
  - pattern-not: "class AttributeProduct(...):\n    ...\n    assigned_products = $M2M\n\
      \    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/models/product.py'
