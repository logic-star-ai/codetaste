rules:
- id: import-assignedproductattributevalue-only
  message: 'Refactoring detected: Import AssignedProductAttributeValue without AssignedProductAttribute'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from $MOD import AssignedProductAttributeValue
  - pattern-not: from $MOD import AssignedProductAttribute, AssignedProductAttributeValue
  - pattern-not: from $MOD import AssignedProductAttributeValue, AssignedProductAttribute
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/migrations/**'
- id: taint-product-id-to-attributevalue-filter
  message: 'Refactoring detected: Product ID flows to AttributeValue filter'
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: $PRODUCT.id
  - pattern: $PRODUCT.pk
  pattern-sinks:
  - pattern: $MODEL.objects.filter(product_id=$SINK)
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/migrations/**'
- id: assigned-product-attribute-value-product-filter
  message: 'Refactoring detected: Filtering AssignedProductAttributeValue by product_id
    instead of assignment_id'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $MODEL.objects.filter(product_id=...)
    - pattern: $MODEL.objects.filter(product=...)
    - pattern: $MODEL.objects.filter(product_id__in=...)
    - pattern: $MODEL.objects.filter(product__in=...)
  - metavariable-regex:
      metavariable: $MODEL
      regex: ^Assigned.*AttributeValue$
  - pattern-not-inside: '...

      $MODEL.objects.filter(assignment_id=...)

      ...

      '
  - pattern-not-inside: '...

      $MODEL.objects.filter(assignment=...)

      ...

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/migrations/**'
- id: aggregation-count-product-attributevalues
  message: 'Refactoring detected: Aggregating counts on product attributevalues'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $PRODUCT.attributevalues.count()
    - pattern: Count("attributevalues")
    - pattern: $QS.annotate(Count("attributevalues"))
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/migrations/**'
- id: webhook-payload-product-attributes-direct
  message: 'Refactoring detected: Webhook payload generation uses direct product attribute
    access'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "def $FUNC($PRODUCT, ...):\n    ...\n    $ATTRS = $PRODUCT.attributevalues.$METHOD(...)\n\
        \    ...\n"
    - pattern: '$ATTRS = $INSTANCE.attributevalues.all()

        '
  - pattern-not-inside: '...

      $X.attributes.all()

      ...

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/webhook/**/*.py'
    - '**/serializers/**/*.py'
    exclude:
    - '**/migrations/**'
- id: no-assignedproductattribute-filter-in-function
  message: 'Refactoring detected: Function filters attributes without AssignedProductAttribute'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def $FUNC(...):\n    ...\n    $MODEL.objects.filter(...)\n    ...\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: .*filter.*product.*attribute.*
  - pattern-not-inside: "def $F(...):\n    ...\n    AssignedProductAttribute.objects.filter(...)\n\
      \    ...\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/filters.py'
    - '**/graphql/**/filters.py'
    exclude:
    - '**/migrations/**'
- id: list-attribute-values-iterator
  message: 'Refactoring detected: List constructor with attribute values iterator'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: list($MODEL.objects.$METHOD(...).iterator())
  - metavariable-regex:
      metavariable: $MODEL
      regex: ^Assigned.*AttributeValue$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/migrations/**'
- id: product-attributevalues-related-access
  message: 'Refactoring detected: Accessing attributevalues relation on product'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $PRODUCT.attributevalues
  - metavariable-regex:
      metavariable: $PRODUCT
      regex: ^product$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/migrations/**'
    - '**/tests/**'
- id: assigned-product-attribute-value-has-direct-product-fk
  message: 'Refactoring detected: AssignedProductAttributeValue now has direct product
    ForeignKey instead of assignment'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(...):\n    ...\n    $FIELD = models.ForeignKey($PRODUCT_MODEL,\
      \ ...)\n    ...\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: ^Assigned.*AttributeValue$
  - metavariable-regex:
      metavariable: $FIELD
      regex: ^product$
  - pattern-not-inside: "class $CLASS(...):\n    ...\n    assignment = models.ForeignKey(...)\n\
      \    ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/**/models/**/*.py'
    - '**/attribute/models.py'
- id: serializer-product-attributevalues-direct-access
  message: 'Refactoring detected: Serializer accesses product.attributevalues directly'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $PRODUCT.attributevalues.all()
    - pattern: $PRODUCT.attributevalues.filter(...)
    - pattern: $PRODUCT.attributevalues.select_related(...)
  - pattern-not-inside: '...

      $PRODUCT.attributes.all()

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/serializers/**/*.py'
    - '**/webhook/**/*.py'
    exclude:
    - '**/migrations/**'
- id: exists-filter-on-attributevalue-product
  message: 'Refactoring detected: Exists filter on AttributeValue using product reference'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: Exists($MODEL.objects.filter(..., product_id=OuterRef(...), ...))
  - metavariable-regex:
      metavariable: $MODEL
      regex: ^Assigned.*AttributeValue$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/migrations/**'
- id: filter-assignedpageattributevalue-by-page
  message: 'Refactoring detected: Filtering AssignedPageAttributeValue by page'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: AssignedPageAttributeValue.objects.filter(page=$PAGE, ...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/migrations/**'
- id: product-id-in-filter-without-assignment
  message: 'Refactoring detected: product_id__in filter without assignment context'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $MODEL.objects.$METHOD(...).filter(product_id__in=$IDS)
  - metavariable-regex:
      metavariable: $MODEL
      regex: ^Assigned.*AttributeValue$
  - pattern-not-inside: '...

      $ASSIGNMENT = AssignedProductAttribute.objects.$X(...)

      ...

      $MODEL.objects.$METHOD(...).filter(product_id__in=$IDS)

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/migrations/**'
- id: dataloader-attributevaluesbyproductidloader-class
  message: 'Refactoring detected: AttributeValuesByProductIdLoader dataloader class'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $LOADER(...):\n    ...\n    def batch_load(self, keys):\n    \
      \    ...\n"
  - metavariable-regex:
      metavariable: $LOADER
      regex: ^AttributeValuesByProductIdLoader$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dataloaders/**/*.py'
- id: utils-associate-attribute-no-assignedproductattribute
  message: 'Refactoring detected: Utils associate function without AssignedProductAttribute
    usage'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def _associate_attribute_to_instance($INSTANCE, $ATTRIBUTE, *$VALUES):\n\
      \    ...\n"
  - pattern-not-inside: "def _associate_attribute_to_instance(...):\n    ...\n   \
      \ AssignedProductAttribute.objects.$METHOD(...)\n    ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/attribute/utils.py'
