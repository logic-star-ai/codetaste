rules:
- id: filter-productassignments-through
  message: Update filter path - productassignments was the through relationship for
    removed model
  severity: ERROR
  languages:
  - python
  pattern-regex: productassignments__
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: attributeproduct-productassignments-reference
  message: Remove reference to productassignments - related_name for removed AssignedProductAttribute
  severity: ERROR
  languages:
  - python
  pattern-regex: \.productassignments\.
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: related-name-productassignments-in-models
  message: Remove related_name productassignments - used by deleted AssignedProductAttribute
    model
  severity: WARNING
  languages:
  - python
  pattern-regex: related_name\s*=\s*"productassignments"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - saleor/attribute/models/product.py
- id: through-assignedproductattribute-in-m2m
  message: Remove through=AssignedProductAttribute - intermediate model deleted
  severity: ERROR
  languages:
  - python
  pattern-regex: through\s*=\s*AssignedProductAttribute
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - saleor/attribute/models/product.py
- id: dataloader-class-name-assignedproductattribute
  message: Update dataloader class name - AssignedProductAttribute model removed
  severity: WARNING
  languages:
  - python
  pattern-regex: class\s+\w*AssignedProductAttribute\w*Loader
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - saleor/graphql/
- id: assignment-dot-product-access
  message: Replace .assignment.product with direct .product access
  severity: ERROR
  languages:
  - python
  pattern-regex: \.assignment\.product
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - saleor/attribute/
    - saleor/graphql/
    - saleor/product/
- id: loop-over-assigned-product-attributes
  message: Update loop - likely iterating over removed AssignedProductAttribute objects
  severity: WARNING
  languages:
  - python
  pattern-regex: for\s+\w+\s+in\s+assigned_product_attributes
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - saleor/attribute/
    - saleor/graphql/
- id: assigned-product-attribute-value-assignment-foreignkey
  message: Remove 'assignment' ForeignKey to AssignedProductAttribute - use direct
    'product' ForeignKey instead
  severity: ERROR
  languages:
  - python
  pattern: "assignment = models.ForeignKey(\n    \"AssignedProductAttribute\",\n \
    \   $...ARGS\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: get-ordering-queryset-via-assignment
  message: Update get_ordering_queryset to use direct product reference instead of
    assignment
  severity: ERROR
  languages:
  - python
  pattern: "def get_ordering_queryset(self):\n    return self.assignment.productvalueassignment.all()\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: product-id-access-via-assignment
  message: Replace indirect access via assignment.product_id with direct .product_id
    reference
  severity: ERROR
  languages:
  - python
  pattern: $VAR.assignment.product_id
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: attribute-product-assigned-products-m2m
  message: Remove 'assigned_products' M2M field from AttributeProduct - use ProductType
    relationship instead
  severity: ERROR
  languages:
  - python
  pattern: "assigned_products = models.ManyToManyField(\n    $...ARGS\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/attribute/models/product.py'
- id: product-attributes-related-name
  message: Check if this is AssignedProductAttribute.product field - this model should
    be removed
  severity: WARNING
  languages:
  - python
  pattern: 'product = models.ForeignKey($...ARGS, related_name="attributes", $...REST)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/attribute/models/**'
- id: assignment-foreignkey-to-attributeproduct
  message: Remove assignment ForeignKey to AttributeProduct - this is part of the
    removed intermediate model pattern
  severity: ERROR
  languages:
  - python
  patterns:
  - pattern: 'assignment = models.ForeignKey($MODEL, $...ARGS)

      '
  - metavariable-pattern:
      metavariable: $MODEL
      pattern-either:
      - pattern: '"AttributeProduct"'
      - pattern: '''AttributeProduct'''
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/attribute/models/product.py'
- id: product-assignment-related-name
  message: Remove assignment field with productassignments related_name - this is
    part of AssignedProductAttribute
  severity: ERROR
  languages:
  - python
  pattern: 'assignment = models.ForeignKey($...ARGS, related_name="productassignments",
    $...REST)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: assignedproductattribute-comment-or-docstring
  message: Remove docstring for AssignedProductAttribute - this model should be removed
  severity: INFO
  languages:
