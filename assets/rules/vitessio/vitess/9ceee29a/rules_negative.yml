rules:
- id: topo-backend-interface-methods-comment
  message: Comment references to topo.Backend should be updated to topo.Conn
  severity: INFO
  languages:
  - go
  pattern-regex: // \w+ is part of the topo\.Backend interface
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: topo-client-for-cell-call
  message: clientForCell/connForCell calls should be replaced with topo.Server.ConnForCell
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $RECV.clientForCell($CTX, $CELL)
    - pattern: $RECV.connForCell($CTX, $CELL)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: topo-update-call-with-cell
  message: Update call should not pass cell parameter - use ConnForCell first, then
    call Update(ctx, filePath, contents, version)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $X.Update($CTX, $CELL, $FILE, $CONTENTS, $VERSION)
  - pattern-not: $X.Update($CTX, $FILE, $CONTENTS, $VERSION)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: topo-delete-call-with-cell
  message: Delete call should not pass cell parameter - use ConnForCell first, then
    call Delete(ctx, filePath, version)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $X.Delete($CTX, $CELL, $FILE, $VERSION)
  - pattern-not: $X.Delete($CTX, $FILE, $VERSION)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: topo-update-with-five-params
  message: Update with 5 parameters indicates old API with cell - use ConnForCell
    first
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $OBJ.Update($A, $B, $C, $D, $E)
  - metavariable-pattern:
      metavariable: $OBJ
      patterns:
      - pattern-not: $X.cli
      - pattern-not: $X.Txn
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - go/vt/topo/**/*.go
- id: topo-delete-four-params
  message: Delete with 4 parameters indicates old API with cell - use ConnForCell
    first
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $OBJ.Delete($A, $B, $C, $D)
  - metavariable-pattern:
      metavariable: $OBJ
      patterns:
      - pattern-not: $X.cli
      - pattern-not: $X.Txn
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - go/vt/topo/**/*.go
- id: topo-backend-all-methods-cell
  message: Backend method should not have cell parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "func ($S *Server) $METHOD($CTX context.Context, cell, $P1 string)\
        \ $RET {\n  ...\n}\n"
    - pattern: "func ($S *Server) $METHOD($CTX context.Context, cell, $P1 string,\
        \ $P2 $T) $RET {\n  ...\n}\n"
    - pattern: "func ($S *Server) $METHOD($CTX context.Context, cell, $P1, $P2 string)\
        \ $RET {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: (Create|Update|Get|Delete|ListDir|Lock|Watch)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - go/vt/topo/*topo/*.go
- id: topo-impl-type-assertion
  message: Accessing .Impl field indicates old architecture - use globalCell or ConnForCell
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $VAR.Impl
  - metavariable-regex:
      metavariable: $VAR
      regex: .*[Ss]erver.*|.*[Tt]opo.*|ts
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: topo-cell-root-field-access
  message: Accessing cellClient.root indicates old architecture
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $C.root
    - pattern: $CLIENT.root
  - metavariable-regex:
      metavariable: $C
      regex: ^c$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - go/vt/topo/consultopo/*.go
    - go/vt/topo/etcd2topo/*.go
- id: topo-consulclient-etcdclient-var
  message: clientForCell call indicates old cell management - use ConnForCell in topo.Server
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $C, $ERR := $S.clientForCell($CTX, $CELL)
    - pattern: $CLIENT, $ERR := $S.clientForCell($CTX, $CELL)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: topo-client-var-clientforcell
  message: clientForCell assignment indicates old cell management pattern
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$CLIENT, $ERR := $S.clientForCell($CTX, $CELL)

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: topo-lock-call-with-cell
  message: Lock call should not pass cell parameter - use ConnForCell first, then
    call Lock(ctx, dirPath, contents)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $X.Lock($CTX, $CELL, $DIR, $CONTENTS)
  - pattern-not: $X.Lock($CTX, $DIR, $CONTENTS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: topo-lock-four-params
  message: Lock with 4 parameters indicates old API with cell - use ConnForCell first
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $OBJ.Lock($A, $B, $C, $D)
  - metavariable-pattern:
      metavariable: $OBJ
      patterns:
      - pattern-not: $X.cli
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - go/vt/topo/**/*.go
- id: topo-backend-method-receiver
  message: Method should not have cell parameter or call clientForCell - implement
    on Conn
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *Server) $METHOD($CTX context.Context, $CELL, ...) $RET\
      \ {\n  $C, $ERR := $RECV.clientForCell($CTX, $CELL)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - go/vt/topo/consultopo/*.go
    - go/vt/topo/etcd2topo/*.go
- id: topo-listdir-call-with-cell
  message: ListDir call should not pass cell parameter - use ConnForCell first, then
    call ListDir(ctx, dirPath)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $X.ListDir($CTX, $CELL, $DIR)
  - pattern-not: $X.ListDir($CTX, $DIR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: topo-path-join-with-cell-root
  message: Path construction using cellClient.root indicates old architecture
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: path.Join($CLIENT.root, $FILE)
  - metavariable-regex:
      metavariable: $CLIENT
      regex: ^c$|^client$|^cellClient$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: topo-nodepath-join-with-c-root
  message: Path join with c.root indicates old cellClient pattern
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: path.Join($C.root, $PATH)
  - metavariable-regex:
      metavariable: $C
      regex: ^c$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - go/vt/topo/consultopo/*.go
    - go/vt/topo/etcd2topo/*.go
- id: topo-directory-listdir-three-params
  message: ListDir with 3 parameters indicates old API with cell - use ConnForCell
    first
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $OBJ.ListDir($A, $B, $C)
  - metavariable-pattern:
      metavariable: $OBJ
      patterns:
      - pattern-not: $X.cli
      - pattern-not: $X.client
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - go/vt/topo/**/*.go
- id: topo-nodepath-c-root-construct
  message: Constructing nodePath with c.root indicates old cellClient pattern
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$NODEPATH := path.Join($C.root, $PATH)

      '
  - metavariable-regex:
      metavariable: $C
      regex: ^c$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: topo-err-converting-after-clientforcell
  message: Error handling after clientForCell indicates old architecture
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "$C, $ERR := $S.clientForCell($CTX, $CELL)\nif $ERR != nil {\n  return\
      \ ..., $ERR\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: topo-impl-field-usage
  message: Direct usage of ts.Impl is deprecated - use ts.globalCell or ts.ConnForCell(ctx,
    cell) instead
  severity: WARNING
  languages:
  - go
  pattern: $TS.Impl.$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: topo-server-global-field-usage
  message: Direct access to Server.global cellClient fields indicates old architecture
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $S.global.cli
    - pattern: $S.global.root
    - pattern: $S.global.close()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: topo-create-method-impl-with-cell
  message: Create method implementation should not have cell parameter
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) Create($CTX context.Context, $CELL, $FILE string,\
    \ $CONTENTS []byte) ($RET, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: topo-update-method-impl-with-cell
  message: Update method implementation should not have cell parameter
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) Update($CTX context.Context, $CELL, $FILE string,\
    \ $CONTENTS []byte, $VERSION $VTYPE) ($RET, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: topo-get-method-impl-with-cell
  message: Get method implementation should not have cell parameter
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) Get($CTX context.Context, $CELL, $FILE string) ([]byte,\
    \ $VERSION, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: topo-listdir-method-impl-with-cell
  message: ListDir method implementation should not have cell parameter
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) ListDir($CTX context.Context, $CELL, $DIR string)\
    \ ([]string, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: topo-lock-method-impl-with-cell
  message: Lock method implementation should not have cell parameter
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) Lock($CTX context.Context, $CELL, $DIR, $CONTENTS\
    \ string) ($RET, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: topo-watch-method-impl-with-cell
  message: Watch method implementation should not have cell parameter
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) Watch($CTX context.Context, $CELL, $FILE string) ($CURR\
    \ $T1, $CH $T2, $CANCEL $T3) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: topo-delete-method-impl-with-cell
  message: Delete method implementation should not have cell parameter
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) Delete($CTX context.Context, $CELL, $FILE string,\
    \ $VERSION $VTYPE) error {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: topo-cellclient-creation
  message: cellClient creation should be removed - backends create Conn directly
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '$CLIENT, $ERR := newCellClient($ADDR, $ROOT)

        '
    - pattern: "$CLIENT = &cellClient{\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: topo-newcellclient-call
  message: newCellClient call indicates old architecture - backends should create
    Conn directly
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: newCellClient($ADDR, $ROOT)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: topo-global-root-path-access
  message: Accessing global.root indicates old cellClient architecture
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $S.global.root
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: topo-globalcell-via-impl
  message: Use ts.globalCell.Method(...) instead of ts.Impl.Method(ctx, GlobalCell,
    ...)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $TS.Impl.Create($CTX, topo.GlobalCell, ...)
    - pattern: $TS.Impl.Update($CTX, topo.GlobalCell, ...)
    - pattern: $TS.Impl.Get($CTX, topo.GlobalCell, ...)
    - pattern: $TS.Impl.Delete($CTX, topo.GlobalCell, ...)
    - pattern: $TS.Impl.ListDir($CTX, topo.GlobalCell, ...)
    - pattern: $TS.Impl.Lock($CTX, topo.GlobalCell, ...)
    - pattern: $TS.Impl.Watch($CTX, topo.GlobalCell, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: topo-cellclient-return-type
  message: Function should return Conn, not *cellClient
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func $NAME(...) (*cellClient, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: topo-serveraddress-cellinfo-access
  message: Accessing CellInfo.ServerAddress in backend indicates old architecture
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CI.ServerAddress
  - pattern-inside: "func ($S *Server) getCellAddrs(...) (...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: topo-c-cli-get-call
  message: Using c.cli indicates old cellClient pattern
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $C.cli.Get($CTX, $PATH, ...)
  - metavariable-regex:
      metavariable: $C
      regex: ^c$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - go/vt/topo/etcd2topo/*.go
- id: topo-factory-create-signature-old
  message: 'Factory.Create signature should include cell parameter: Create(cell, serverAddr,
    root string)'
  severity: WARNING
  languages:
  - go
  pattern: "func ($F $TYPE) Create($ADDR, $ROOT string) ($RET, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: topo-factory-returns-impl
  message: Factory.Create should accept cell parameter and return topo.Conn, not topo.Impl
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($F $TYPE) Create($ADDR, $ROOT string) (topo.Impl, error) {\n \
      \ ...\n}\n"
  - pattern-not: "func ($F $TYPE) Create($CELL, $ADDR, $ROOT string) (topo.Conn, error)\
      \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: topo-cellspath-constant-usage
  message: Direct cellsPath usage may indicate old cell management - verify new architecture
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: path.Join($ROOT, cellsPath, $CELL, ...)
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: topo-cells-path-constant
  message: cellsPath constant usage may indicate old cell management patterns
  severity: INFO
  languages:
  - go
  pattern-regex: cellsPath\s*=
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - go/vt/topo/*topo/*.go
- id: topo-cell-info-file-path-join
  message: Direct CellInfo path construction in backend indicates old cell management
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: path.Join($ROOT, cellsPath, $CELL, topo.CellInfoFile)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: topo-c-cli-txn-call
  message: Using c.cli indicates old cellClient pattern in etcd2topo
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $C.cli.Txn($CTX)
  - metavariable-regex:
      metavariable: $C
      regex: ^c$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - go/vt/topo/etcd2topo/*.go
- id: topo-cellclient-type-definition
  message: cellClient type should be removed - cell management is now in topo.Server
  severity: WARNING
  languages:
  - go
  pattern: "type cellClient struct {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-clientforcell-method
  message: clientForCell method should be removed - cell management now in topo.Server
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) clientForCell($CTX context.Context, $CELL string)\
    \ ($RET, error) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-global-cellclient-field
  message: Backend Server should not have cellClient fields - implement Conn interface
    directly
  severity: WARNING
  languages:
  - go
  pattern: "type $NAME struct {\n  ...\n  global *cellClient\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-getcelladdrs-method
  message: getCellAddrs method should be removed - cell address management is in topo.Server
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) getCellAddrs($CTX context.Context, $CELL string) ($ADDR,\
    \ $ROOT string, $ERR error) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-newcellclient-function
  message: newCellClient function should be removed - backends now create Conn directly
  severity: WARNING
  languages:
  - go
  pattern: "func newCellClient($ADDR, $ROOT string) (*cellClient, error) {\n  ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-server-struct-global-field-type
  message: Server.global should be of type Conn, not *cellClient
  severity: WARNING
  languages:
  - go
  pattern: "type Server struct {\n  ...\n  global *cellClient\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-newserver-returns-backend-server
  message: NewServer should return a Conn implementation, not a Server with cells
    map
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func NewServer($ADDR, $ROOT string) (*Server, error) {\n  ...\n  return\
      \ &Server{\n    global: $GLOBAL,\n    cells: ...,\n  }, nil\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-server-close-global-close
  message: Close method should close Conn, not cellClient
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($S *Server) Close() {\n  ...\n  $S.global.close()\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-cells-nil-assignment
  message: Cells map nil assignment should be removed - no cells field in new architecture
  severity: WARNING
  languages:
  - go
  pattern: '$S.cells = nil

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-global-nil-assignment
  message: Global field management changed - should be Conn type, not cellClient
  severity: WARNING
  languages:
  - go
  pattern: '$S.global = nil

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-global-cell-constant-usage
  message: Replace ts.Impl.Method(ctx, GlobalCell, ...) with ts.globalCell.Method(ctx,
    ...)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $TS.Impl.Create($CTX, topo.GlobalCell, ...)
    - pattern: $TS.Impl.Update($CTX, topo.GlobalCell, ...)
    - pattern: $TS.Impl.Get($CTX, topo.GlobalCell, ...)
    - pattern: $TS.Impl.Delete($CTX, topo.GlobalCell, ...)
    - pattern: $TS.Impl.ListDir($CTX, topo.GlobalCell, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: topo-directory-go-listdir-implementation
  message: ListDir implementation should not have cell parameter or call clientForCell
  severity: WARNING
  languages:
  - go
  pattern: "func ($S *Server) ListDir($CTX context.Context, $CELL, $DIR string) ([]string,\
    \ error) {\n  $C, $ERR := $S.clientForCell($CTX, $CELL)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/topo/*/directory.go
- id: topo-file-go-create-implementation
  message: Create implementation should not have cell parameter or call clientForCell
