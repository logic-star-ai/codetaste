rules:
- id: globalcell-direct-field-usage
  message: Detected direct globalCell field usage - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $SERVER.globalCell.$METHOD(...)
    - pattern: $VAR = $SERVER.globalCell
    - pattern: $SERVER.globalCell
  - pattern-not-inside: "type $T struct {\n  ...\n  globalCell $TYPE\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 57
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: connforcell-method-call
  message: Detected ConnForCell method call - refactoring applied
  severity: INFO
  languages:
  - go
  pattern: $SERVER.ConnForCell($CTX, $CELL)
  metadata:
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: connforcell-error-check-pattern
  message: Detected error handling for ConnForCell call - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "$CONN, $ERR := $SERVER.ConnForCell($CTX, $CELL)\nif $ERR != nil {\n\
      \  ...\n}\n"
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: backend-implements-conn-interface-comment
  message: Detected comment indicating backend implements Conn - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: //.*(?:is part of|implements).*topo\.Conn.*
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/consultopo/**'
    - '**/etcd2topo/**'
    - '**/zk2topo/**'
    - '**/memorytopo/**'
    exclude:
    - '**/vendor/**'
- id: conn-field-usage-taint
  message: Detected connection obtained from ConnForCell used for operations - refactoring
    applied
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $SERVER.ConnForCell($CTX, $CELL)
  pattern-sinks:
  - patterns:
    - pattern: $CONN.$METHOD(...)
    - metavariable-regex:
        metavariable: $METHOD
        regex: (?i)^(listdir|create|update|get|delete|watch|lock)$
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: update-without-cell-param
  message: Detected Update call without cell parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.Update($CTX, $PATH, $CONTENTS, $VERSION)
  - pattern-not: $OBJ.Update($CTX, $CELL, $PATH, $CONTENTS, $VERSION)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: lock-without-cell-param
  message: Detected Lock call without cell parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.Lock($CTX, $PATH, $CONTENTS)
  - pattern-not: $OBJ.Lock($CTX, $CELL, $PATH, $CONTENTS)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: listdir-without-cell-param
  message: Detected ListDir call without cell parameter - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $OBJ.ListDir($CTX, $PATH)
  - pattern-not: $OBJ.ListDir($CTX, $CELL, $PATH)
  - metavariable-regex:
      metavariable: $PATH
      regex: .*
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: connforcell-then-update
  message: Detected ConnForCell followed by Update call - refactoring applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: '$CONN, $ERR := $SERVER.ConnForCell($CTX, $CELL)

        ...

        $CONN.Update($CTX2, $PATH, $CONTENTS, $VERSION)

        '
    - pattern: '$CONN := $SERVER.ConnForCell($CTX, $CELL)

        ...

        $CONN.Update($CTX2, $PATH, $CONTENTS, $VERSION)

        '
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
