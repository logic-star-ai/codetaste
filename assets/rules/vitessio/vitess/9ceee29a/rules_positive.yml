rules:
- id: conn-implements-interface-comment
  message: Detected comment about implementing topo.Conn interface
  severity: INFO
  languages:
  - go
  pattern-regex: implements.*topo\.Conn|part of.*topo\.Conn|topo\.Conn interface
  metadata:
    category: api
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: topo-connforcell-call
  message: Detected call to ConnForCell method
  severity: INFO
  languages:
  - go
  pattern: $TS.ConnForCell($CTX, $CELL)
  metadata:
    category: basic
    nr_refactored_patterns: 33
    nr_legacy_patterns: 0
- id: topo-conn-variable-assignment
  message: Detected pattern of obtaining Conn from Server
  severity: INFO
  languages:
  - go
  pattern: '$CONN, $ERR := $TS.ConnForCell($CTX, $CELL)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: connforcell-error-check-pattern
  message: Detected ConnForCell with error handling pattern
  severity: INFO
  languages:
  - go
  pattern: "$CONN, $ERR := $TS.ConnForCell($CTX, $CELL)\nif $ERR != nil {\n  ...\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: topo-globalcell-field-usage
  message: Detected direct usage of globalCell field
  severity: INFO
  languages:
  - go
  pattern: $TS.globalCell.$METHOD(...)
  metadata:
    category: basic
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: topo-conn-method-chain
  message: Detected pattern of getting Conn and calling methods on it
  severity: INFO
  languages:
  - go
  pattern: '$CONN, $ERR := $TS.ConnForCell($CTX, $CELL)

    ...

    $CONN.$METHOD(...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: conn-update-call-without-cell
  message: Detected Update call without cell parameter
  severity: INFO
  languages:
  - go
  pattern: $CONN.Update($CTX, $PATH, $CONTENTS, $VER)
  metadata:
    category: basic
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: no-cell-param-in-backend-methods
  message: Detected backend method with only 2 parameters (ctx and path, no cell)
  severity: INFO
  languages:
  - go
  pattern-regex: func \(.* \*Server\) (ListDir|Create|Update|Get|Delete|Lock|Watch)\(ctx
    context\.Context, [^,)]*string
  metadata:
    category: api
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/etcd2topo/*.go'
    - '*/consultopo/*.go'
    - '*/zk2topo/*.go'
    - '*/memorytopo/*.go'
- id: conn-lock-call-without-cell
  message: Detected Lock call without cell parameter
  severity: INFO
  languages:
  - go
  pattern: $CONN.Lock($CTX, $PATH, $CONTENTS)
  metadata:
    category: basic
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: conn-method-call-without-cell
  message: Detected ListDir call without cell parameter
  severity: INFO
  languages:
  - go
  pattern: $CONN.ListDir($CTX, $PATH)
  metadata:
    category: basic
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: globalcell-get-call
  message: Detected direct call to globalCell.Get method
  severity: INFO
  languages:
  - go
  pattern: $SERVER.globalCell.Get($CTX, $PATH)
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: memorytopo-conn-methods-use-factory
  message: Detected memorytopo Conn method delegating to factory
  severity: INFO
  languages:
  - go
  pattern: "func ($C *Conn) $METHOD($CTX context.Context, ...) (...) {\n  ...\n  $C.factory.$CALL(...)\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/memorytopo/*.go'
- id: conn-watch-call-without-cell
  message: Detected Watch call without cell parameter
  severity: INFO
  languages:
  - go
  pattern: $CONN.Watch($CTX, $PATH)
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: globalcell-listdir-call
  message: Detected direct call to globalCell.ListDir method
  severity: INFO
  languages:
  - go
  pattern: $SERVER.globalCell.ListDir($CTX, $PATH)
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: globalcell-update-call
  message: Detected direct call to globalCell.Update method
  severity: INFO
  languages:
  - go
  pattern: $SERVER.globalCell.Update($CTX, $PATH, $CONTENTS, $VER)
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: globalcell-delete-call
  message: Detected direct call to globalCell.Delete method
  severity: INFO
  languages:
  - go
  pattern: $SERVER.globalCell.Delete($CTX, $PATH, $VER)
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: memorytopo-nodebypath-uses-conn-cell
  message: Detected memorytopo Conn method using factory.nodeByPath with cell
  severity: INFO
  languages:
  - go
  pattern: "func ($C *Conn) $METHOD(...) (...) {\n  ...\n  $C.factory.nodeByPath($C.cell,\
    \ ...)\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/memorytopo/*.go'
- id: globalcell-direct-method-call
  message: Detected direct call to globalCell.Create method
  severity: INFO
  languages:
  - go
  pattern: $SERVER.globalCell.Create($CTX, $PATH, $CONTENTS)
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: listdir-impl-without-clientforcell
  message: Detected ListDir implementation not calling clientForCell
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($S *Server) ListDir($CTX context.Context, $PATH string) ([]string,\
      \ error) {\n  ...\n}\n"
  - pattern-not: "func ($S *Server) ListDir($CTX context.Context, $PATH string) ([]string,\
      \ error) {\n  ...\n  $S.clientForCell(...)\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/etcd2topo/*.go'
    - '*/consultopo/*.go'
    - '*/zk2topo/*.go'
- id: create-impl-without-clientforcell
  message: Detected Create implementation not calling clientForCell
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($S *Server) Create($CTX context.Context, $PATH string, $CONTENTS\
      \ []byte) ($VER, error) {\n  ...\n}\n"
  - pattern-not: "func ($S *Server) Create($CTX context.Context, $PATH string, $CONTENTS\
      \ []byte) ($VER, error) {\n  ...\n  $S.clientForCell(...)\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/etcd2topo/*.go'
    - '*/consultopo/*.go'
    - '*/zk2topo/*.go'
- id: globalcell-lock-call
  message: Detected direct call to globalCell.Lock method
  severity: INFO
  languages:
  - go
  pattern: $SERVER.globalCell.Lock($CTX, $PATH, $CONTENTS)
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: server-struct-with-conn-field
  message: Detected Server struct with Conn field
  severity: INFO
  languages:
  - go
  pattern: "type Server struct {\n  ...\n  $FIELD Conn\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: election-uses-conn
  message: Detected election using Conn.NewMasterParticipation
  severity: INFO
  languages:
  - go
  pattern: "func $NAME(...) {\n  ...\n  $CONN, $_ := $TS.ConnForCell(...)\n  ...\n\
    \  $CONN.NewMasterParticipation(...)\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: topo-server-globalcell-field
  message: Detected Server struct with globalCell field
  severity: INFO
  languages:
  - go
  pattern: "type Server struct {\n  ...\n  globalCell $CONN\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: topo-conn-delete-interface-method
  message: Detected Delete interface method without cell parameter
  severity: INFO
  languages:
  - go
  pattern: 'Delete(ctx context.Context, filePath string, version Version) error

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/topo/*.go'
- id: memorytopo-factory-struct
  message: Detected memorytopo Factory struct
  severity: INFO
  languages:
