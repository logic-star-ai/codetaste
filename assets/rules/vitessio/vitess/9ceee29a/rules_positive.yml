  - go
  pattern: "func ($S *Server) Close() {\n  ...\n  for $_, $CONN := range $S.cells\
    \ {\n    ...\n    $CONN.Close()\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
