rules:
- id: servenv-mysql-version-test-helper
  message: Use of servenv.SetMySQLServerVersionForTest() found. Use config.DefaultMySQLVersion
    directly in tests instead.
  severity: WARNING
  languages:
  - go
  pattern: servenv.SetMySQLServerVersionForTest($VERSION)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: config-default-mysql-version-not-used
  message: Using servenv.SetMySQLServerVersionForTest() with custom version. Replace
    with config.DefaultMySQLVersion or pass version explicitly.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: servenv.SetMySQLServerVersionForTest($VERSION)
  - pattern-not: 'servenv.SetMySQLServerVersionForTest(config.DefaultMySQLVersion)

      '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: servenv-test-helper-vtgate-tests
  message: Use of servenv.SetMySQLServerVersionForTest() in vtgate tests. Use config.DefaultMySQLVersion
    or pass version parameter.
  severity: WARNING
  languages:
  - go
  pattern: servenv.SetMySQLServerVersionForTest($VERSION)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - go/vt/vtgate/**
- id: servenv-set-mysql-version-for-test-all
  message: servenv.SetMySQLServerVersionForTest() usage. Replace with config.DefaultMySQLVersion
    or pass version parameter.
  severity: WARNING
  languages:
  - go
  pattern-regex: servenv\.SetMySQLServerVersionForTest\(
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - go/vt/**
    exclude:
    - go/cmd/**
- id: servenv-test-helper-in-planbuilder-tests
  message: Use of servenv.SetMySQLServerVersionForTest(). Use config.DefaultMySQLVersion
    directly or pass version as parameter.
  severity: WARNING
  languages:
  - go
  pattern: servenv.SetMySQLServerVersionForTest($VERSION)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - go/vt/vtgate/planbuilder/**
- id: servenv-test-helper-in-engine-tests
  message: Use of servenv.SetMySQLServerVersionForTest(). Use config.DefaultMySQLVersion
    directly or pass version as parameter.
  severity: WARNING
  languages:
  - go
  pattern: servenv.SetMySQLServerVersionForTest($VERSION)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - go/vt/vtgate/engine/**
- id: servenv-mysql-version-in-evalengine-package
  message: servenv.MySQLServerVersion() used in evalengine package. Remove servenv
    dependency and pass MySQL version as parameter.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: servenv.MySQLServerVersion()
  - pattern-inside: 'package evalengine

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/vtgate/evalengine/**
- id: servenv-import-evalengine-non-test
  message: Import of servenv in evalengine package. Remove servenv dependency from
    library code.
  severity: WARNING
  languages:
  - go
  pattern: 'import "vitess.io/vitess/go/vt/servenv"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/vtgate/evalengine/*.go
    exclude:
    - go/vt/vtgate/evalengine/*_test.go
- id: servenv-test-helper-in-evalengine-tests
  message: Use of servenv.SetMySQLServerVersionForTest(). Use config.DefaultMySQLVersion
    directly or pass version as parameter.
  severity: WARNING
  languages:
  - go
  pattern: servenv.SetMySQLServerVersionForTest($VERSION)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/vtgate/evalengine/**
- id: servenv-mysql-version-byteslice-conversion
  message: Converting servenv.MySQLServerVersion() to byte slice. Pass MySQL version
    as parameter instead.
  severity: WARNING
  languages:
  - go
  pattern: '[]byte(servenv.MySQLServerVersion())'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: servenv-usage-evalengine-non-test-files
  message: servenv.MySQLServerVersion() call found in evalengine. Remove servenv dependency.
  severity: WARNING
  languages:
  - go
  pattern-regex: servenv\.MySQLServerVersion\(\)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/vtgate/evalengine/*.go
    exclude:
    - go/vt/vtgate/evalengine/*_test.go
- id: servenv-mysql-version-in-new-eval-text-call
  message: Using servenv.MySQLServerVersion() in newEvalText call. Pass MySQL version
    as parameter.
  severity: WARNING
  languages:
  - go
  pattern-regex: newEvalText\(\[\]byte\(servenv\.MySQLServerVersion\(\)\)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/vtgate/evalengine/**
- id: servenv-set-test-version-string-literal
  message: servenv.SetMySQLServerVersionForTest with string literal. Use config.DefaultMySQLVersion
    or pass version parameter.
  severity: WARNING
  languages:
  - go
  pattern-regex: servenv\.SetMySQLServerVersionForTest\("[0-9.]+"\)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: servenv-package-reference-in-library
  message: Reference to servenv package. Consider removing servenv dependency from
    library code.
  severity: INFO
  languages:
  - go
  pattern-regex: \bservenv\.
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/vtgate/evalengine/**
    - go/vt/schemadiff/**
    exclude:
    - '**/*_test.go'
- id: byte-conversion-servenv-mysql-version
  message: Converting servenv.MySQLServerVersion() to bytes. Pass MySQL version as
    parameter.
  severity: WARNING
  languages:
  - go
  pattern-regex: \[\]byte\(servenv\.MySQLServerVersion\(\)\)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: servenv-mysql-version-in-struct-field-init
  message: Struct field initialized with servenv.MySQLServerVersion(). Obtain version
    at initialization and pass through.
  severity: WARNING
  languages:
  - go
  pattern-regex: MySQLServerVersion:\s*servenv\.MySQLServerVersion\(\)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/**
    exclude:
    - go/cmd/**
- id: servenv-mysql-version-all-contexts
  message: servenv.MySQLServerVersion() call detected. Pass MySQL version as explicit
    parameter.
  severity: WARNING
  languages:
  - go
  pattern-regex: \bservenv\.MySQLServerVersion\(\)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/vtgate/evalengine/**
    - go/vt/schemadiff/**
    exclude:
    - '**/*_test.go'
    - '**/integration/**'
- id: servenv-import-statement-generic
  message: servenv package import found. Remove servenv dependency from library code.
  severity: INFO
  languages:
  - go
  pattern-regex: ^\s*"vitess\.io/vitess/go/vt/servenv"\s*$
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/vtgate/evalengine/**
    - go/vt/schemadiff/**
    exclude:
    - '**/*_test.go'
- id: servenv-mysql-version-any-function-arg
  message: servenv.MySQLServerVersion() passed as function argument. Pass MySQL version
    as parameter.
  severity: INFO
  languages:
  - go
  pattern-regex: \w+\([^)]*servenv\.MySQLServerVersion\(\)[^)]*\)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/vtgate/evalengine/**
    - go/vt/schemadiff/**
    exclude:
    - '**/*_test.go'
- id: servenv-mysql-version-struct-initialization
  message: Struct initialized with MySQLServerVersion from servenv. Obtain version
    at init and pass through.
  severity: WARNING
  languages:
  - go
  pattern-regex: \w+\{[^}]*MySQLServerVersion:\s*servenv\.MySQLServerVersion\(\)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - go/vt/**
    exclude:
    - go/cmd/**
- id: new-eval-text-byte-array-servenv
  message: newEvalText using servenv.MySQLServerVersion(). Pass MySQL version as parameter.
  severity: WARNING
  languages:
  - go
  pattern-regex: newEvalText\(\[\]byte\(servenv
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: servenv-mysql-version-in-vm-stack-assignment
  message: Using servenv.MySQLServerVersion() in VM stack assignment. Pass MySQL version
    as parameter.
  severity: WARNING
  languages:
  - go
  pattern: 'env.vm.stack[$IDX] = env.vm.arena.newEvalText([]byte(servenv.MySQLServerVersion()),
    $COLLATION)

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: servenv-mysql-version-new-eval-text
  message: Using servenv.MySQLServerVersion() with newEvalText(). Pass MySQL version
    as parameter.
  severity: WARNING
  languages:
  - go
  pattern: '$ARENA.newEvalText([]byte(servenv.MySQLServerVersion()), ...)

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: executor-struct-missing-mysql-version
  message: Executor struct may be missing mysqlVersion field. Add field to store MySQL
    version if needed.
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type Executor struct {\n  ...\n}\n"
  - pattern-not: "type Executor struct {\n  ...\n  mysqlVersion string\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - go/vt/vtgate/executor.go
- id: wrangler-struct-missing-mysql-version
  message: Wrangler struct may be missing mysqlVersion field. Add field to store MySQL
    version if needed.
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type Wrangler struct {\n  ...\n}\n"
  - pattern-not: "type Wrangler struct {\n  ...\n  mysqlVersion string\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - go/vt/wrangler/wrangler.go
- id: servenv-mysql-version-return-value
  message: Returning servenv.MySQLServerVersion() from function. Pass MySQL version
    as parameter.
  severity: WARNING
  languages:
  - go
  pattern-regex: return.*servenv\.MySQLServerVersion\(\)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - go/vt/vtgate/evalengine/**
    - go/vt/schemadiff/**
- id: servenv-reference-evalengine-compiler
  message: Reference to servenv package in compiler. Remove servenv dependency.
  severity: WARNING
  languages:
  - go
  pattern-regex: servenv\.
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - go/vt/vtgate/evalengine/compiler_asm.go
    - go/vt/vtgate/evalengine/compiler.go
