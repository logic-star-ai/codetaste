rules:
- id: mysqlversion-in-struct-literal-init
  message: Struct literal initialization with mysqlVersion field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "$TYPE{\n  ...,\n  mysqlVersion: $VALUE,\n  ...,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    include:
    - go/vt/vtgate/**
    - go/vt/schemadiff/**
    - go/vt/vttablet/**
    - go/vt/wrangler/**
- id: mysqlversion-struct-initialization
  message: Struct initialized with mysqlVersion field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "&$STRUCT{\n  ...,\n  mysqlVersion: $VAR,\n  ...,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
    include:
    - go/vt/vtgate/**
    - go/vt/schemadiff/**
    - go/vt/vttablet/**
    - go/vt/wrangler/**
- id: config-defaultmysqlversion-in-evalengine-tests
  message: evalengine tests now use config.DefaultMySQLVersion directly
  severity: INFO
  languages:
  - go
  pattern: config.DefaultMySQLVersion
  metadata:
    category: config
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - go/vt/vtgate/evalengine/*test*.go
- id: mysqlversion-in-function-call-with-field
  message: Function called with mysqlVersion field from object
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$FUNC(..., $OBJ.mysqlVersion, ...)

      '
  metadata:
    category: structural
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - go/vt/vtgate/**
    - go/vt/schemadiff/**
    - go/vt/vttablet/**
    - go/vt/wrangler/**
- id: mysqlversion-passed-between-packages
  message: MySQL version passed explicitly to cross-package function call
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(..., $VER, ...)
  - metavariable-pattern:
      metavariable: $VER
      patterns:
      - pattern-regex: (?i)^(mysqlVersion|version)$
  - metavariable-pattern:
      metavariable: $PKG
      patterns:
      - pattern-regex: ^(evalengine|schemadiff|workflow|wrangler)$
  metadata:
    category: dependency
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: mysqlversion-initialization-at-startup
  message: MySQL version obtained once at initialization and passed to functions
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$VAR := servenv.MySQLServerVersion()

      ...

      $FUNC(..., $VAR, ...)

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - go/cmd/**
- id: mysqlversion-method-implementation
  message: MySQLVersion() method implementation returns stored field instead of global
    call
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$TYPE) MySQLVersion() string {\n  ...\n}\n"
  - pattern-not: "func ($RECV *$TYPE) MySQLVersion() string {\n  return servenv.MySQLServerVersion()\n\
      }\n"
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - go/vt/vtgate/**
    - go/vt/schemadiff/**
    - go/vt/vttablet/**
    - go/vt/wrangler/**
    - go/vt/vtctl/**
- id: mysqlversion-constructor-param
  message: Constructor initializes struct with mysqlVersion field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $CONSTRUCTOR(...) $RET {\n  ...\n  $VAR := &$TYPE{\n    ...,\n\
      \    mysqlVersion: $VERSION,\n    ...,\n  }\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - go/vt/vtgate/**
    - go/vt/schemadiff/**
    - go/vt/vttablet/**
    - go/vt/wrangler/**
- id: mysqlversion-error-return-pattern
  message: Function with mysqlVersion parameter returns error
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(..., mysqlVersion string, ...) ($RET, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - go/vt/vtgate/**
    - go/vt/schemadiff/**
    - go/vt/vttablet/**
- id: mysqlversion-field-in-wrangler-methods
  message: Wrangler methods access mysqlVersion field
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $W.mysqlVersion
  - pattern-inside: 'package wrangler

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: mysqlversion-in-method-receiver-usage
  message: Method passes mysqlVersion field to function call
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($R *$TYPE) $METHOD(...) $RET {\n  ...\n  $CALL(..., $R.mysqlVersion,\
      \ ...)\n  ...\n}\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - go/vt/vtgate/**
    - go/vt/wrangler/**
    - go/vt/vtctl/**
- id: mysqlversion-passed-in-execute-context
  message: Execution context initialized with mysqlVersion
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "$CTX{\n  ...,\n  mysqlVersion: $VAL,\n  ...,\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - go/vt/vtgate/**
- id: test-creates-evalengine-with-mysqlversion
  message: Test passes config.DefaultMySQLVersion to evalengine function
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: evalengine.$FUNC(..., config.DefaultMySQLVersion, ...)
  metadata:
    category: config
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: mysqlversion-method-in-interface
  message: Interface now has MySQLVersion() method
  severity: INFO
  languages:
  - go
  patterns:
