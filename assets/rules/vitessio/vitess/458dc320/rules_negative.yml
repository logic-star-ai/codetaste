rules:
- id: detect-ioutil-import
  message: Deprecated io/ioutil import detected. Remove this import and use io and
    os packages instead.
  severity: WARNING
  languages:
  - go
  pattern: 'import "io/ioutil"

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 156
- id: detect-ioutil-readfile-call
  message: Replace ioutil.ReadFile with os.ReadFile
  severity: WARNING
  languages:
  - go
  pattern: ioutil.ReadFile(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 108
- id: detect-ioutil-readfile-with-args
  message: Replace ioutil.ReadFile with os.ReadFile
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: ioutil.ReadFile($PATH)
    - pattern: ioutil.ReadFile($VAR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 108
- id: detect-ioutil-readfile-assignment
  message: Replace ioutil.ReadFile with os.ReadFile
  severity: WARNING
  languages:
  - go
  pattern: '$VAR, $ERR := ioutil.ReadFile($PATH)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 98
- id: detect-ioutil-readfile-no-error
  message: Replace ioutil.ReadFile with os.ReadFile
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := ioutil.ReadFile($PATH)

    '
