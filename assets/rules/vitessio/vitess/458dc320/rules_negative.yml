- id: detect-ioutil-readfile-multiline
  message: Replace ioutil.ReadFile with os.ReadFile
  severity: WARNING
  languages:
  - go
  pattern: "$VAR, $ERR :=\n  ioutil.ReadFile($PATH)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 98
- id: detect-ioutil-readfile-in-function
  message: Replace ioutil.ReadFile with os.ReadFile
  severity: WARNING
  languages:
  - go
  pattern: "func $NAME(...) {\n  ...\n  ioutil.ReadFile(...)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 96
- id: detect-ioutil-writefile-call
