rules:
- id: vtenv-newtestenv-call
  message: Detected vtenv.NewTestEnv() call - initializing test environment
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: vtenv.NewTestEnv()
  - pattern: $VAR := vtenv.NewTestEnv()
  - pattern: $VAR = vtenv.NewTestEnv()
  metadata:
    category: abstraction
    nr_refactored_patterns: 470
    nr_legacy_patterns: 0
- id: vtenv-newtestenv-inline-in-function-call
  message: Detected vtenv.NewTestEnv inline in function call - test environment created
    and passed
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: $FUNC(..., vtenv.NewTestEnv(), ...)
  - pattern: $FUNC(vtenv.NewTestEnv())
  metadata:
    category: abstraction
    nr_refactored_patterns: 357
    nr_legacy_patterns: 0
- id: vtenv-parser-accessor-call
  message: Detected call to env.Parser() accessor - accessing parser from environment
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: $ENV.Parser()
  - pattern: $VAR := $ENV.Parser()
  - pattern: $VAR = $ENV.Parser()
  metadata:
    category: api
    nr_refactored_patterns: 196
    nr_legacy_patterns: 0
- id: vtenv-import-statement
  message: Detected import of vtenv package - refactored environment abstraction being
    used
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: 'import "vitess.io/vitess/go/vt/vtenv"

      '
  - pattern: "import (\n  ...\n  \"vitess.io/vitess/go/vt/vtenv\"\n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 157
    nr_legacy_patterns: 0
- id: function-using-env-parser-call
  message: Detected function calling env.Parser() - using accessor instead of direct
    parameter
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: "func $FUNC(...) {\n  ...\n  $X.Parser()\n  ...\n}\n"
  - pattern: "func $FUNC(...) $RET {\n  ...\n  $X.Parser()\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 143
    nr_legacy_patterns: 0
- id: vtenv-import-in-test-file
  message: Detected vtenv import in test file - test code refactored
  severity: INFO
  languages:
  - go
  pattern: "import (\n  ...\n  \"vitess.io/vitess/go/vt/vtenv\"\n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 95
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: parser-accessed-via-env-in-expression
  message: Detected env.Parser() used in function call - extracting parser from environment
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: $FUNC(..., $ENV.Parser(), ...)
  - pattern: $FUNC($ENV.Parser())
  - pattern: $METHOD(..., $OBJ.env.Parser(), ...)
  metadata:
    category: basic
    nr_refactored_patterns: 91
    nr_legacy_patterns: 0
- id: accessing-parser-from-struct-env-field
  message: Detected accessing parser via struct env field - using consolidated environment
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: $OBJ.env.Parser()
  - pattern: $VAR := $OBJ.env.Parser()
  - pattern: $VAR = $OBJ.env.Parser()
  metadata:
    category: basic
    nr_refactored_patterns: 66
    nr_legacy_patterns: 0
- id: vtenv-environment-parameter-type
  message: Detected function accepting *vtenv.Environment parameter - consolidated
    environment parameter
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: 'func $FUNC(..., $ENV *vtenv.Environment, ...) { ... }

      '
  - pattern: 'func $FUNC(..., $ENV *vtenv.Environment, ...) $RET { ... }

      '
  - pattern: 'func ($RECV $TYPE) $FUNC(..., $ENV *vtenv.Environment, ...) { ... }

      '
  - pattern: 'func ($RECV $TYPE) $FUNC(..., $ENV *vtenv.Environment, ...) $RET { ...
      }

      '
