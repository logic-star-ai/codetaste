    3 params to 1
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: wrangler.New($LOGGER, $TS, $TMC, $ENV)
  - pattern: "wrangler.New(\n  $LOGGER,\n  $TS,\n  $TMC,\n  $ENV,\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 47
    nr_legacy_patterns: 0
