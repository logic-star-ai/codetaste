rules:
- id: old-pattern-new-wrangler-signature
  message: Old wrangler.New() signature with separate collationEnv, parser, mysqlVersion.
    Should use wrangler.New(env, ...) with vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern: 'wrangler.New($LOGGER, $TS, $TMC, $COLLENV, $PARSER, $VERSION)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: old-pattern-wrangler-new-call-six-params
  message: wrangler.New() called with 6 parameters (old signature). Should use vtenv.Environment
    to reduce parameter count.
  severity: WARNING
  languages:
  - go
  pattern: 'wrangler.New($A, $B, $C, $D, $E, $F)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: old-pattern-function-call-new-with-six-args
  message: Package New() called with 6 arguments - possible old pattern. Verify if
    collationEnv/parser/mysqlVersion should be consolidated into vtenv.Environment.
  severity: INFO
  languages:
  - go
  pattern: '$PKG.New($A, $B, $C, $D, $E, $F)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: old-pattern-wrangler-new-explicit-call
  message: wrangler.New() called with old 6-parameter signature. Should use vtenv.Environment
    to consolidate last 3 parameters.
  severity: WARNING
  languages:
  - go
  pattern: 'wrangler.New($LOGGER, $TS, $TMC, $COLLENV, $PARSER, $VERSION)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: old-pattern-function-mysqlversion-last-param
  message: Function takes mysqlVersion/mysqlServerVersion and collationEnv as separate
    parameters. Should use vtenv.Environment.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'func $FUNC(..., $VERSION string) $RET

      '
  - metavariable-pattern:
      metavariable: $VERSION
      patterns:
      - pattern-either:
        - pattern: mysqlVersion
        - pattern: mysqlServerVersion
  - pattern-inside: 'func $FUNC(..., $COLLENV *collations.Environment, ..., $VERSION
      string) $RET

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
- id: old-pattern-three-params-collation-parser-mysqlversion
  message: Function takes separate collationEnv, parser, and mysqlVersion parameters
    instead of unified vtenv.Environment. Refactor to use 'env *vtenv.Environment'.
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(..., $COLLENV *collations.Environment, $PARSER *sqlparser.Parser,\
    \ $VERSION string, ...) $RET {\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: old-pattern-three-params-mysqlversion-naming
  message: Function takes collationEnv, parser, and string parameter (likely MySQL
    version). Should use vtenv.Environment.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'func $F(..., $COLLENV *collations.Environment, $PARSER *sqlparser.Parser,
      $VER string, ...) $R

      '
  - metavariable-pattern:
      metavariable: $VER
      patterns:
      - pattern-either:
        - pattern: mysqlVersion
        - pattern: mysqlServerVersion
        - pattern: version
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: old-pattern-function-params-all-three-explicit-names
  message: Function signature uses exact names collationEnv, parser, mysqlVersion.
    Should be refactored to use vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(..., collationEnv *collations.Environment, parser *sqlparser.Parser,
    mysqlVersion string, ...) $RET

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: old-pattern-newapi-separate-params
  message: NewAPI uses old signature with separate parameters. Should use NewAPI(env,
    clusters, opts) with vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern: 'NewAPI($CLUSTERS, $OPTS, $COLLENV, $PARSER, $VERSION)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: old-pattern-vtadmin-newapi-five-params
  message: NewAPI called with 5 parameters. After vtenv refactoring, should use env
    parameter.
  severity: WARNING
  languages:
  - go
  pattern: 'NewAPI($A, $B, $C, $D, $E)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: old-pattern-newvtctldserver-separate-params
  message: NewVtctldServer uses old signature with separate collationEnv, parser,
    mysqlVersion. Should use NewVtctldServer(env, ...) with vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern: 'grpcvtctldserver.NewVtctldServer($TS, $COLLENV, $PARSER, $VERSION)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: old-pattern-grpcvtctldserver-newvtctldserver-four-params
  message: NewVtctldServer called with 4 parameters. After vtenv refactoring, should
    take env as parameter.
  severity: WARNING
  languages:
  - go
  pattern: 'grpcvtctldserver.NewVtctldServer($A, $B, $C, $D)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: old-pattern-passing-collenv-version-fields
  message: Passing collationEnv and mysqlVersion as separate arguments. Should use
    env object after vtenv refactoring.
  severity: INFO
  languages:
  - go
  pattern: '$FUNC(..., $OBJ.collationEnv, ..., $OBJ.mysqlVersion, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: old-pattern-vtctld-server-new-four-args
  message: grpcvtctldserver.NewVtctldServer called with 4 args (old signature). Should
    use vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern: 'grpcvtctldserver.NewVtctldServer($TS, $COLLENV, $PARSER, $VERSION)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: old-pattern-function-call-newvtctldserver
  message: NewVtctldServer called with 4 arguments. After vtenv refactoring, should
    use env parameter.
  severity: WARNING
  languages:
  - go
  pattern: '$PKG.NewVtctldServer($A, $B, $C, $D)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: old-pattern-passing-collenv-parser-fields
  message: Passing collationEnv and parser as separate arguments. Should use env object
    after vtenv refactoring.
  severity: INFO
  languages:
  - go
  pattern: '$FUNC(..., $OBJ.collationEnv, $OBJ.parser, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: old-pattern-struct-with-collenv-and-mysqlversion
  message: Struct has collationEnv and mysqlVersion fields. Consider consolidating
    into vtenv.Environment.
  severity: INFO
  languages:
  - go
  pattern: "type $T struct {\n  ...\n  collationEnv *collations.Environment\n  mysqlVersion\
    \ string\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    exclude:
    - go/vt/vtenv/
- id: old-pattern-passing-parser-version-fields
  message: Passing parser and mysqlVersion as separate arguments. Should use env object
    after vtenv refactoring.
  severity: INFO
  languages:
  - go
  pattern: '$FUNC(..., $OBJ.parser, ..., $OBJ.mysqlVersion, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: old-pattern-struct-three-fields-v2
  message: Struct stores collationEnv, parser, and mysqlVersion as separate fields.
    Refactor to use single 'env *vtenv.Environment' field.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type $STRUCT struct {\n  ...\n  $COLL_FIELD *collations.Environment\n\
      \  ...\n  $PARSER_FIELD *sqlparser.Parser\n  ...\n  $VERSION_FIELD string\n\
      \  ...\n}\n"
  - metavariable-pattern:
      metavariable: $VERSION_FIELD
      patterns:
      - pattern-either:
        - pattern: mysqlVersion
        - pattern: mysqlServerVersion
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    exclude:
    - go/vt/vtenv/
- id: old-pattern-passing-three-struct-fields
  message: Passing collationEnv, parser, and mysqlVersion as separate arguments from
    same object. Should pass $OBJ.env after vtenv refactoring.
  severity: WARNING
  languages:
  - go
  pattern: '$FUNC(..., $OBJ.collationEnv, $OBJ.parser, $OBJ.mysqlVersion, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: old-pattern-any-new-with-collenv-parser-version
  message: New* function signature contains collations.Environment, sqlparser.Parser,
    and string parameter. Consider vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern-regex: func\s+New\w*\([^)]*collations\.Environment[^)]*sqlparser\.Parser[^)]*string[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: old-pattern-struct-with-parser-and-mysqlversion
  message: Struct has parser and mysqlVersion fields. Consider consolidating into
    vtenv.Environment.
  severity: INFO
  languages:
  - go
  pattern: "type $T struct {\n  ...\n  parser       *sqlparser.Parser\n  mysqlVersion\
    \ string\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    exclude:
    - go/vt/vtenv/
- id: old-pattern-struct-with-three-env-fields
  message: Struct contains three separate environment fields (collationEnv, parser,
    mysqlVersion). Should consolidate into vtenv.Environment.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type $NAME struct {\n  ...\n  collationEnv   *collations.Environment\n\
      \  parser         *sqlparser.Parser\n  mysqlVersion   string\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    exclude:
    - go/vt/vtenv/
- id: old-pattern-method-receiver-collenv-parser-usage
  message: Method passes collationEnv and parser fields from receiver. Should use
    $R.env after vtenv refactoring.
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$T) $M(...) $RET {\n  ...\n  $FUNC(..., $R.collationEnv, $R.parser,\
    \ ...)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: old-pattern-method-receiver-env-fields-usage
  message: Method passes collationEnv, parser, and mysqlVersion fields from receiver.
    Should use $R.env after vtenv refactoring.
  severity: WARNING
  languages:
  - go
  pattern: "func ($R *$T) $M(...) $RET {\n  ...\n  $FUNC(..., $R.collationEnv, $R.parser,\
    \ $R.mysqlVersion, ...)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: old-pattern-function-two-params-collenv-version
  message: Function takes collationEnv and mysqlVersion separately. Consider using
    vtenv.Environment for consistency.
  severity: INFO
  languages:
  - go
  pattern: 'func $FUNC(..., $COLLENV *collations.Environment, $VERSION string, ...)
    $RET

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: old-pattern-func-collenv-version-params
  message: Function takes collationEnv and mysqlVersion as separate parameters. Should
    use vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(..., $COLLENV *collations.Environment, $VERSION string, ...)
    $RET

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: old-pattern-explicit-env-param-combo
  message: Function takes context plus collationEnv, parser, mysqlVersion. Should
    consolidate env params into vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern: 'func $F($CTX context.Context, ..., $CE *collations.Environment, $P *sqlparser.Parser,
    $MV string) $R

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: old-pattern-interface-collationenv-method-return
  message: Interface defines CollationEnv() method returning *collations.Environment.
    After vtenv refactoring, consider environment access patterns.
  severity: INFO
  languages:
  - go
  pattern: "type $IFACE interface {\n  ...\n  CollationEnv() *collations.Environment\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-pattern-function-rewrite-with-collenv
  message: Rewrite function takes collations.Environment and string (likely mysqlVersion).
    Should use vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern-regex: func\s+rewrite\w+\(.*\*collations\.Environment.*string.*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-pattern-init-func-with-collenv-parser
  message: Init* function takes collations.Environment and sqlparser.Parser separately.
    Consider using vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern-regex: func\s+Init\w*\([^)]*collations\.Environment[^)]*sqlparser\.Parser
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-pattern-function-with-topo-and-three-env
  message: Function takes topo.Server followed by collationEnv, parser, mysqlVersion.
    Should use vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern: 'func $F($TS *topo.Server, $CE *collations.Environment, $P *sqlparser.Parser,
    $V string) $R

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-pattern-vtexplain-init-separate-params
  message: VTExplain Init uses old signature with separate collationEnv, parser, mysqlVersion.
    Should use Init(ctx, ..., env) with vtenv.Environment.
  severity: WARNING
  languages:
  - go
  pattern: 'Init($CTX, $VSCHEMA, $SQLSCHEMA, $KSMAP, $OPTS, $COLLENV, $PARSER, $VERSION)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-pattern-vtexplain-init-eight-params
  message: Init called with 8 parameters. After vtenv refactoring, should consolidate
    collationEnv/parser/mysqlVersion into env.
  severity: WARNING
  languages:
  - go
  pattern: 'Init($A, $B, $C, $D, $E, $F, $G, $H)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
