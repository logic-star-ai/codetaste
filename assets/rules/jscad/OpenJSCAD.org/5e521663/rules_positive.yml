  message: Detected toSides using toOutlines().forEach()
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: "toOutlines($GEOM).forEach(($OUTLINE) => {\n  ...\n})\n"
  - pattern-inside: "export const toSides = ($GEOM) => {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-create-param-name-outlines
  message: Detected create function with outlines parameter name
