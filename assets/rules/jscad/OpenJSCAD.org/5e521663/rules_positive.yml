  - pattern-inside: "const toSides = ($GEOM) => {\n  ...\n  const sides = []\n  ...\n\
      }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-expansion-create-newoutlines
  message: Detected expansion creating geom2 with newoutlines variable
