rules:
- id: geom2-outlines-property-access
  message: Detected access to geom2.outlines property (new pattern after refactoring)
  severity: INFO
  languages:
  - javascript
  pattern: $GEOM.outlines
  metadata:
    category: structural
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: geom2-outlines-in-object-literal
  message: Detected object literal with outlines property
  severity: INFO
  languages:
  - javascript
  pattern: "{\n  outlines: $VAL,\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: geom2-outlines-index-access
  message: Detected indexed access to outlines array
  severity: INFO
  languages:
  - javascript
  pattern: $GEOM.outlines[$INDEX]
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: geom2-frompoints-wrap-in-array
  message: Detected fromPoints wrapping points in array for single outline
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: 'outlines: [$POINTS]

      '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: geom2-foreach-outline-iteration
  message: Detected iteration over outlines using forEach
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: $GEOM.outlines.forEach($FUNC)
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: geom2-expansion-geom2-create
  message: Detected expansion operation creating geom2 with outlines variable
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: return geom2.create($RESULT)
  - metavariable-regex:
      metavariable: $RESULT
      regex: ^(new)?[oO]utlines$
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: geom2-assign-outlines-property
  message: Detected assignment to outlines property
  severity: INFO
  languages:
  - javascript
  pattern: $VAR.outlines = $EXPR
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: geom2-applytransforms-map-outlines
  message: Detected applyTransforms mapping over outlines property
  severity: INFO
  languages:
  - javascript
  pattern: '$GEOM.outlines = $GEOM.outlines.map($FUNC)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: geom2-map-outline-transformation
  message: Detected transformation of outlines using map
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: $GEOM.outlines.map($FUNC)
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: geom2-outlines-map-arrow-function
  message: Detected mapping over outlines with arrow function
  severity: INFO
  languages:
  - javascript
  pattern: $GEOM.outlines.map(($OUTLINE) => $EXPR)
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: geom2-outlines-map-function
  message: Detected mapping over outlines property
  severity: INFO
  languages:
  - javascript
  pattern: $GEOM.outlines.map($FUNC)
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: geom2-measure-foreach-outline
  message: Detected forEach on toOutlines result
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: toOutlines($GEOM).forEach($FUNC)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: geom2-create-file-outlines-comment
  message: Detected create.js documenting outlines property
  severity: INFO
  languages:
  - javascript
  pattern-regex: outlines.*list.*outlines
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/geom2/create.js'
- id: geom2-applytransforms-file-outlines
  message: Detected applyTransforms.js using outlines property
  severity: INFO
  languages:
  - javascript
  pattern-regex: geometry\.outlines
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/geom2/applyTransforms.js'
- id: geom2-tocompactbinary-file-outlines-serialize
  message: Detected toCompactBinary.js serializing outlines
  severity: INFO
  languages:
  - javascript
  pattern-regex: \.outlines|outlines\.length|outlines\.reduce
  metadata:
    category: config
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/geom2/toCompactBinary.js'
- id: geom2-create-function-outlines-param
  message: Detected create() function returning object with outlines property
  severity: INFO
  languages:
  - javascript
  pattern: "export const create = ($PARAM) => {\n  ...\n  return {\n    outlines:\
    \ $PARAM,\n    ...\n  }\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-tooutlines-simplified-direct-access
  message: Detected simplified toOutlines() using direct outlines property access
  severity: INFO
  languages:
  - javascript
  pattern: 'export const toOutlines = ($GEOM) => applyTransforms($GEOM).outlines

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-tooutlines-returning-outlines-property
  message: Detected toOutlines() returning outlines property directly
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: "export const toOutlines = ($GEOM) => {\n  ...\n  return $RESULT.outlines\n\
      }\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-reverse-map-outline-reverse
  message: Detected reverse() implementation mapping and reversing outlines
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: '$OUTLINES.map(($OUTLINE) => $OUTLINE.reverse())

      '
  - pattern-inside: "export const reverse = ($GEOM) => {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-tosides-convert-outlines-to-sides
  message: Detected toSides() converting outlines to sides using forEach/for loop
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern-either:
    - pattern: "toOutlines($GEOM).forEach(($OUTLINE) => {\n  ...\n  $SIDES.push([$PREV,\
        \ $POINT])\n  ...\n})\n"
    - pattern: "for (const $OUTLINE of toOutlines($GEOM)) {\n  ...\n  $SIDES.push([$PREV,\
        \ $POINT])\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-validate-outlines-check
  message: Detected validate() checking outlines property
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: $OBJ.outlines
  - pattern-inside: "export const validate = ($OBJ) => {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-fromcompactbinary-push-outline
  message: Detected fromCompactBinary pushing to outlines array
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: $CREATED.outlines.push($OUTLINE)
  - pattern-inside: "export const fromCompactBinary = ($DATA) => {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-applyTransforms-outline-map
  message: Detected applyTransforms mapping over outlines and their points
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: '$GEOM.outlines = $GEOM.outlines.map(($OUTLINE) => $OUTLINE.map($FUNC))

      '
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-create-outlines-assignment
  message: Detected return statement with outlines property in geom2 object
  severity: INFO
  languages:
  - javascript
  pattern: "return {\n  outlines: $VAL,\n  transforms: $TRANS\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-applytransforms-check-identity
  message: Detected applyTransforms checking identity then mapping outlines
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: 'if (mat4.isIdentity($GEOM.transforms)) return $GEOM

      $GEOM.outlines = $GEOM.outlines.map($FUNC)

      '
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-fromsides-file-exists
  message: Detected existence of fromSides.js file
  severity: INFO
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/geom2/fromSides.js'
- id: geom2-clone-map-outline-clone
  message: Detected cloning outlines by mapping over outline arrays
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: '$GEOM.outlines.map(($OUTLINE) => $OUTLINE.map($FUNC))

      '
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-tooutlines-one-liner
  message: Detected one-liner toOutlines returning outlines property
  severity: INFO
  languages:
  - javascript
  pattern: 'const toOutlines = ($GEOM) => applyTransforms($GEOM).outlines

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: geom2-fromcompactbinary-outline-push
  message: Detected pushing outline to outlines array
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: '$VAR.outlines.push($OUTLINE)

      '
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
