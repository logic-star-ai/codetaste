    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: geom2-fromoutlines-previous-assignment
  message: Tracking previous point in fromOutlines loop. After refactoring, this function
    is deprecated
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'previous = $POINT

      '
