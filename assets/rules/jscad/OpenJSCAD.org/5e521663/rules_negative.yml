rules:
- id: geom2-create-empty-sides-array
  message: Creating variable named 'sides' array. After refactoring, should use 'outlines'
    terminology
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'const sides = []

        '
    - pattern: 'let sides = []

        '
    - pattern: 'var sides = []

        '
  - pattern-not-inside: 'const toSides = (...) => { ... }

      '
  - pattern-not-inside: 'export const toSides = (...) => { ... }

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: geom2-module-fromoutlines-call
  message: Call to geom2.fromOutlines() detected. After refactoring, use geom2.create()
    directly with outlines
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: geom2.fromOutlines($OUTLINES)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: geom2-module-fromoutlines-method
  message: Call to module.fromOutlines() detected. After refactoring, use module.create()
    directly
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $MODULE.fromOutlines($OUTLINES)
  - metavariable-regex:
      metavariable: $MODULE
      regex: ^geom2$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: geom2-martinez-polygon-flat
  message: Martinez result handling with fromOutlines. After refactoring, use create()
    with outlines
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: "if ($POLYGONS) {\n  return geom2.fromOutlines($POLYGONS.flat())\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: geom2-assign-sides-property
