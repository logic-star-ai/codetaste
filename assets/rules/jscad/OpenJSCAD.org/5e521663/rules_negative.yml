    'outlines' property
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: $OBJ.sides = $EXPR
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: geom2-push-side-pair-pattern
  message: Pushing cloned point pairs to array (sides format). After refactoring,
    should build outlines directly
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: '$ARRAY.push([vec2.clone($PREV), vec2.clone($POINT)])

      '
