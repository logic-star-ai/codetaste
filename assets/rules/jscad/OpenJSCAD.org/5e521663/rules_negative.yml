  message: JSDoc references 'sides' property. Should be updated to 'outlines' after
    refactoring
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: '[@]property\s+\{[^}]*\}\s+sides\s+-\s+list\s+of\s+sides'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: geom2-create-sides-typedef
  message: JSDoc typedef references 'sides' property in geom2. Should reference 'outlines'
    instead
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: '[@]typedef[^{]*\{[^}]*\}[^{]*geom2[^@]*[@]property[^{]*\{[^}]*\}\s+sides'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: geom2-return-object-with-sides
  message: Returning object with 'sides' property. After refactoring, geom2 should
    use 'outlines' property
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "return {\n  sides: $EXPR,\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: geom2-import-fromoutlines
  message: Importing fromOutlines function. After refactoring, this function is deprecated
    - use create() instead
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: import { ..., fromOutlines, ... } from $PATH
    - pattern: import fromOutlines from $PATH
    - pattern: const { ..., fromOutlines, ... } = require($PATH)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: geom2-outline-from-sides-loop
  message: Converting outlines to sides format. After refactoring, geom2 stores outlines
    directly
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: "outlines.forEach(($OUTLINE) => {\n  ...\n  for (...) {\n    ...\n    $SIDES.push([$PREV,\
    \ $POINT])\n    ...\n  }\n})\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
