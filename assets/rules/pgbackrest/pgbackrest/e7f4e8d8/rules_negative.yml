rules:
- id: protocol-result-without-data-end
  message: protocolServerDataPut without protocolServerDataEndPut - in old protocol,
    data end was required
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: 'protocolServerDataPut($SERVER, $RESULT);

      ...

      '
  - pattern-not: 'protocolServerDataPut($SERVER, $RESULT);

      ...

      protocolServerDataEndPut($SERVER);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
- id: fn-extern-void-handler-packread-protocolserver
  message: FN_EXTERN void handler(PackRead *, ProtocolServer *) declaration - migrate
    to return ProtocolServerResult*
  severity: WARNING
  languages:
  - c
  pattern-regex: FN_EXTERN\s+void\s+\w+\(\s*PackRead\s*\*[^,]*,\s*ProtocolServer\s*\*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
- id: protocol-command-new-call
  message: protocolCommandNew() is removed - use new protocol request/response model
    instead
  severity: WARNING
  languages:
  - c
  pattern: protocolCommandNew(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: protocol-streaming-read-write-pattern
  message: Streaming read/write pattern detected - break into separate requests using
    new async request/response model
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: 'protocolClientCommandPut($CLIENT, $CMD, true);

        ...

        protocolClientDataPut(...);

        '
    - pattern: 'protocolClientDataPut(...);

        ...

        protocolClientDataEndGet(...);

        '
    - pattern: 'protocolServerDataPut(...);

        ...

        protocolServerDataEndPut(...);

        '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: protocol-server-data-end-put-call
  message: protocolServerDataEndPut() is removed - one response per request, no explicit
    data end needed
  severity: WARNING
  languages:
  - c
  pattern: protocolServerDataEndPut(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: protocol-handler-single-line-data-end
  message: Standalone protocolServerDataEndPut call - verify migration to new protocol
    response model
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'protocolServerDataEndPut($SERVER);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: protocol-command-param-call
  message: protocolCommandParam() is removed - data sent as request parameters directly
  severity: WARNING
  languages:
  - c
  pattern: protocolCommandParam(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: protocol-server-data-put-pattern
  message: protocolServerDataPut() usage needs review - ensure migrated to new handler
    signature that returns ProtocolServerResult
  severity: WARNING
  languages:
  - c
  pattern: protocolServerDataPut($SERVER, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: protocol-data-put-without-pack-new
  message: protocolServerDataPut without local protocolPackNew - verify migration
    to new protocol response model
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: 'protocolServerDataPut($SERVER, $DATA);

      '
  - pattern-not: '$DATA = protocolPackNew();

      ...

      protocolServerDataPut($SERVER, $DATA);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: protocol-handler-array-with-command-field
  message: ProtocolServerHandler array element with .command and .handler fields -
    verify handler uses new signature
  severity: WARNING
  languages:
  - c
  pattern-regex: \{\s*\.command\s*=\s*\w+,\s*\.handler\s*=\s*\w+\s*\}
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: protocol-handler-definition-pattern
  message: Protocol handler definition with old signature - migrate to return ProtocolServerResult*
  severity: WARNING
  languages:
  - c
  pattern-regex: void\s+\w+Protocol\s*\([^)]*PackRead[^)]*ProtocolServer[^)]*\)\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: protocol-command-variable-assignment
  message: ProtocolCommand variable assignment - refactor to use new protocol without
    ProtocolCommand object
  severity: WARNING
  languages:
  - c
  pattern: '$VAR = protocolCommandNew(...);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: protocol-command-new-in-assignment
  message: ProtocolCommand assignment - refactor to use new protocol without ProtocolCommand
    object
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: '$TYPE $VAR = protocolCommandNew(...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: protocol-command-creation-and-param
  message: protocolCommandNew followed by protocolCommandParam - refactor to use new
    protocol without ProtocolCommand
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'protocolCommandNew($CMDID);

      protocolCommandParam(...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: protocol-client-execute-with-command-object
  message: protocolClientExecute() with ProtocolCommand object needs refactoring to
    use new session-based protocol
  severity: WARNING
  languages:
  - c
  pattern: protocolClientExecute($CLIENT, $COMMAND, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: temp-protocol-command-usage-in-mem-context
  message: ProtocolCommand usage in temp memory context - refactor to use new protocol
    without ProtocolCommand object
  severity: WARNING
  languages:
  - c
  pattern: "MEM_CONTEXT_TEMP_BEGIN()\n{\n  ...\n  ProtocolCommand *$CMD = protocolCommandNew(...);\n\
    \  ...\n}\nMEM_CONTEXT_TEMP_END();\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: protocol-handler-declaration-header-file
  message: Protocol handler function declaration with old signature - change to return
    ProtocolServerResult*
  severity: WARNING
  languages:
  - c
  pattern-regex: void\s+\w+Protocol\s*\(\s*PackRead\s*\*[^,]*,\s*ProtocolServer\s*\*[^)]*\)\s*;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: protocol-handler-fn-extern-definition
  message: FN_EXTERN protocol handler definition with old signature - migrate to return
    ProtocolServerResult*
  severity: WARNING
  languages:
  - c
  pattern-regex: FN_EXTERN\s+void\s+\w+Protocol\s*\(\s*PackRead\s*\*[^,]*,\s*ProtocolServer\s*\*[^)]*\)\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: protocol-handler-data-put-then-end
  message: protocolServerDataPut immediately followed by DataEndPut - refactor to
    return single ProtocolServerResult*
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'protocolServerDataPut($SERVER, $RESULT);

      protocolServerDataEndPut($SERVER);

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: protocol-command-in-function-signature
  message: Function signature with ProtocolCommand parameter - ProtocolCommand is
    removed, refactor function
  severity: WARNING
  languages:
  - c
  pattern-regex: \w+\s*\(\s*[^)]*ProtocolCommand\s*\*[^)]*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: protocol-pack-write-result-assignment
  message: PackWrite assignment from protocolCommandParam - refactor to send data
    as request parameters directly
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'PackWrite *$VAR = protocolCommandParam(...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: protocol-command-variable-initialization
  message: ProtocolCommand initialization with param - refactor to send data as request
    parameters directly
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'ProtocolCommand *$CMD = protocolCommandNew($CMDID);

      PackWrite *$PARAM = protocolCommandParam($CMD);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: protocol-client-data-get-call
  message: protocolClientDataGet() usage - verify migration to new session-based async
    request/response model
  severity: WARNING
  languages:
  - c
  pattern: protocolClientDataGet(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: protocol-command-write-operations-sequence
  message: Protocol command creation with write operations - refactor to send data
    as request parameters directly
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'protocolCommandNew($CMDID);

      ...

      pckWriteStrP(...);

      ...

      protocolClientExecute(...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: protocol-command-execute-no-result
  message: protocolClientExecute with resultRequired=false - verify migration to new
    session-based protocol
  severity: WARNING
  languages:
  - c
  pattern: protocolClientExecute($CLIENT, $CMD, false)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: protocol-command-constructor-in-conditional
  message: protocolCommandNew in conditional block - refactor to use new protocol
    without ProtocolCommand object
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "if ($COND)\n{\n  ...\n  protocolCommandNew(...);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: protocol-command-execute-result-ignored
  message: protocolClientExecute with result not required - verify migration to new
    session-based protocol
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'protocolClientExecute($CLIENT, $CMD, false);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: protocol-command-execute-bool-literal-false
  message: protocolClientExecute with false - verify migration to new session-based
    protocol
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: protocolClientExecute($CLIENT, $CMD, false);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: protocol-client-data-end-get-call
  message: protocolClientDataEndGet() is removed - one response per request in new
    protocol, no separate data end
  severity: WARNING
  languages:
  - c
  pattern: protocolClientDataEndGet(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: protocol-server-command-get-usage
  message: protocolServerCommandGet usage - verify compatibility with new command
    types (Open/Process/Close/Cancel)
  severity: INFO
  languages:
  - c
  pattern: protocolServerCommandGet($SERVER)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: protocol-command-sequential-new-execute
  message: Sequential protocolCommandNew and protocolClientExecute - refactor to use
    new session-based protocol
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'ProtocolCommand *$CMD = protocolCommandNew($CMDID);

      ...

      protocolClientExecute($CLIENT, $CMD, ...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: protocol-client-execute-with-command-var
  message: protocolClientExecute with ProtocolCommand variable - refactor to use new
    session-based protocol
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'ProtocolCommand *$CMD = ...;

      ...

      protocolClientExecute($CLIENT, $CMD, ...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: protocol-command-temp-mem-context-pattern
  message: Protocol command execution in temp context with old ProtocolCommand pattern
    - refactor to use new session-based protocol
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "MEM_CONTEXT_TEMP_BEGIN()\n{\n  ...\n  protocolCommandNew(...);\n  ...\n\
      \  protocolClientExecute(...);\n  ...\n}\nMEM_CONTEXT_TEMP_END();\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: protocol-command-execute-immediate-call
  message: protocolClientExecute with immediate protocolCommandNew call - refactor
    to use new session-based protocol
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: protocolClientExecute($CLIENT, protocolCommandNew($CMDID), ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: protocol-command-in-function-call
  message: Function call with protocolCommandNew as argument - refactor to use new
    protocol without ProtocolCommand
  severity: WARNING
  languages:
  - c
  pattern-regex: \w+\([^)]*protocolCommandNew\([^)]*\)[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: protocol-client-command-put-call
  message: protocolClientCommandPut() is part of old streaming protocol - refactor
    to use new session-based request/response model
  severity: WARNING
  languages:
  - c
  pattern: protocolClientCommandPut(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: protocol-client-data-put-call
  message: protocolClientDataPut() usage - verify migration to new session-based async
    request/response model
  severity: WARNING
  languages:
  - c
  pattern: protocolClientDataPut(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: protocol-server-data-operations-sequence
  message: Sequential protocolServerDataGet and DataPut - old streaming pattern, refactor
    to new async request/response
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'protocolServerDataGet($SERVER);

      ...

      protocolServerDataPut($SERVER, ...);

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: protocol-command-execute-with-result
  message: protocolClientExecute with resultRequired=true - verify migration to new
    session-based protocol
  severity: WARNING
  languages:
  - c
  pattern: protocolClientExecute($CLIENT, $CMD, true)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: protocol-command-execute-bool-literal-true
  message: protocolClientExecute with true - verify migration to new session-based
    protocol
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: protocolClientExecute($CLIENT, $CMD, true);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: protocol-server-response-pattern-old
  message: Old protocol response pattern with separate DataPut and DataEndPut - refactor
    to return single ProtocolServerResult
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'PackWrite *$RESULT = protocolPackNew();

      ...

      protocolServerDataPut($SERVER, $RESULT);

      protocolServerDataEndPut($SERVER);

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: protocol-command-object-parameter
  message: Function parameter of type ProtocolCommand* - ProtocolCommand is removed,
    refactor function signature
  severity: WARNING
  languages:
  - c
  pattern-regex: \w+\s*\(\s*ProtocolCommand\s*\*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: protocol-command-param-write-str
  message: pckWriteStrP on protocolCommandParam - refactor to send data as request
    parameters directly
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'pckWriteStrP(protocolCommandParam($CMD), ...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-protocol-handler-signature-pattern
  message: Old protocol handler signature detected - change from 'void handler(PackRead
    *, ProtocolServer *)' to 'ProtocolServerResult *handler(PackRead *)'
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "void $FUNC(PackRead *$PARAM, ProtocolServer *$SERVER)\n{\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $FUNC
      patterns:
      - pattern-regex: .*Protocol$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: protocol-server-data-get-pattern
  message: protocolServerDataGet() usage needs review - verify migration to new protocol
    request/response model
  severity: WARNING
  languages:
  - c
  pattern: protocolServerDataGet($SERVER)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: protocol-handler-void-return-generic
  message: Protocol handler with old signature (void return, ProtocolServer param)
    - migrate to new signature returning ProtocolServerResult*
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "void $FUNC(PackRead *$PARAM, ProtocolServer *$SERVER)\n{\n  ...\n}\n"
  - pattern-not: "void $FUNC(PackRead *$PARAM, ProtocolServer *$SERVER)\n{\n  ...\n\
      \  return;\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: protocol-multiple-data-puts-pattern
  message: Multiple protocolServerDataPut calls - in old protocol this streamed data,
    refactor to single response
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'protocolServerDataPut($SERVER, $DATA1);

      ...

      protocolServerDataPut($SERVER, $DATA2);

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: protocol-handler-assert-server-param
  message: Protocol handler with ASSERT on server param - old signature, migrate to
    return ProtocolServerResult*
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "void $FUNC(PackRead *$PARAM, ProtocolServer *$SERVER)\n{\n  ...\n  ASSERT($SERVER\
      \ != NULL);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: protocol-command-header-include
  message: Remove include of protocol/command.h - ProtocolCommand object has been
    removed in the refactoring
  severity: WARNING
  languages:
  - c
  pattern: '#include "protocol/command.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: protocol-message-type-data-enum
  message: protocolMessageTypeData usage - verify data transfer works with new request/response
    model
  severity: INFO
  languages:
  - c
  pattern: protocolMessageTypeData
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: protocol-command-include-in-header
  message: Include of protocol/command.h - this header is removed, refactor to use
    new protocol
  severity: WARNING
  languages:
  - c
  pattern-regex: '#include\s+"protocol/command\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: protocol-handler-with-conditional-data-end
  message: Conditional protocolServerDataEndPut - old protocol pattern, refactor to
    return ProtocolServerResult*
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "if ($COND)\n{\n  ...\n  protocolServerDataEndPut($SERVER);\n  ...\n\
      }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: protocol-client-data-get-assignment
  message: protocolClientDataGet result assignment - verify migration to new async
    request/response model
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: 'PackRead *$DATA = protocolClientDataGet($CLIENT);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: protocol-handler-void-return-with-packread
  message: Handler with void return and protocolServerDataEndPut - should return ProtocolServerResult*
    instead
  severity: WARNING
  languages:
  - c
  pattern: "void $FUNC(PackRead *$PARAM, ...)\n{\n  ...\n  protocolServerDataEndPut(...);\n\
    \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: protocol-handler-with-server-write-pattern
  message: Protocol handler using protocolServerDataPut with old signature - migrate
    to return ProtocolServerResult*
  severity: WARNING
  languages:
  - c
  pattern: "void $FUNC(PackRead *$PARAM, ProtocolServer *$SERVER)\n{\n  ...\n  protocolServerDataPut($SERVER,\
    \ ...);\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: protocol-handler-mem-context-temp-pattern
  message: Protocol handler with old signature using temp memory context - migrate
    to return ProtocolServerResult*
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: "void $FUNC(PackRead *$PARAM, ProtocolServer *$SERVER)\n{\n  ...\n  MEM_CONTEXT_TEMP_BEGIN()\n\
      \  {\n    ...\n    protocolServerDataEndPut($SERVER);\n  }\n  MEM_CONTEXT_TEMP_END();\n\
      \  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: protocol-command-free-call
  message: protocolCommandFree() is removed - ProtocolCommand object no longer exists
  severity: WARNING
  languages:
  - c
  pattern: protocolCommandFree(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: protocol-message-type-data-end-usage
  message: protocolMessageTypeDataEnd is removed - one response per request in new
    protocol
  severity: WARNING
  languages:
  - c
  pattern: protocolMessageTypeDataEnd
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: protocol-message-type-command-enum
  message: protocolMessageTypeCommand usage - verify compatibility with new command
    type system (Open/Process/Close/Cancel)
  severity: INFO
  languages:
  - c
  pattern: protocolMessageTypeCommand
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: protocol-command-struct-reference
  message: struct ProtocolCommand reference - this struct is removed in the refactoring
  severity: WARNING
  languages:
  - c
  pattern-regex: \bstruct\s+ProtocolCommand\b
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: protocol-command-file-exists-check
  message: Protocol command files (command.c/command.h) should be removed - ProtocolCommand
    object is eliminated
  severity: WARNING
  languages:
  - c
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - src/protocol/command.c
    - src/protocol/command.h
- id: protocol-command-test-param-macro
  message: FUNCTION_TEST_PARAM with PROTOCOL_COMMAND type - ProtocolCommand is removed
    in refactoring
  severity: WARNING
  languages:
  - c
  pattern-regex: FUNCTION_TEST_PARAM\(PROTOCOL_COMMAND,
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: protocol-command-result-variable
  message: protocolClientExecute result assignment - verify migration to new session-based
    protocol
  severity: INFO
  languages:
  - c
  patterns:
  - pattern: 'PackRead *$RESULT = protocolClientExecute($CLIENT, $CMD, ...);

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
