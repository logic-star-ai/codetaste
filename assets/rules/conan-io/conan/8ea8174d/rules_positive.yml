rules:
- id: multiple-item-model-import
  message: Multiple items imported in one statement
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from conan.internal.model.$M import $X, ...
  metadata:
    nr_refactored_patterns: 2566
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-from-conan-internal-model
  message: Detected import from new conan.internal.model namespace
  severity: INFO
  languages:
  - python
  pattern: from conan.internal.model.$MODULE import $IMPORTS
  metadata:
    nr_refactored_patterns: 306
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: rest-routes-in-client-rest
  message: rest_routes now in conans/client/rest/ (moved from model/)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from conans.client.rest.rest_routes import $X
    - pattern: import conans.client.rest.rest_routes
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
