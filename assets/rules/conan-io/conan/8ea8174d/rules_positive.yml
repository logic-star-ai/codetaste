- id: refactor-any-import-from-internal-model-package
  message: Detected direct import from conan.internal.model package (refactoring applied)
  severity: INFO
  languages:
  - python
  pattern: from conan.internal.model import $IMPORT
  metadata:
    category: structural
    nr_refactored_patterns: 306
    nr_legacy_patterns: 0
