rules:
- id: detect-graph-import-pattern-regex
  message: 'Refactoring detected: Import pattern from conan.internal.graph'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: from\s+conan\.internal\.graph\.[a-zA-Z_][a-zA-Z0-9_]*\s+import\s+.+
  - pattern-not: from conans.client.graph.$X import $Y
  metadata:
    nr_refactored_patterns: 59
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-new-graph-module-from-import
  message: 'Refactoring detected: Import from new conan.internal.graph module'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from conan.internal.graph.$MODULE import $ITEMS
  - pattern-not: from conans.client.graph.$X import $Y
  metadata:
    nr_refactored_patterns: 58
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-new-rest-module-import
  message: 'Refactoring detected: Import of new conan.internal.rest module'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: import conan.internal.rest.$MODULE
  - pattern-not: import conans.client.rest.$X
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
