rules:
- id: other-conan-internal-module-usage-refactored
  message: Detected usage of refactored conan.internal modules in code
  severity: INFO
  languages:
  - python
  pattern-regex: (conan\.internal\.(rest|graph|loader|source|subsystems|hook_manager))
  metadata:
    category: other
    nr_refactored_patterns: 142
    nr_legacy_patterns: 0
- id: other-internal-graph-module-in-tree-refactored
  message: Detected reference to conan.internal.graph in codebase after refactoring
  severity: INFO
  languages:
  - python
  pattern-regex: (from conan\.internal\.graph|import conan\.internal\.graph)
  metadata:
    category: other
    nr_refactored_patterns: 59
    nr_legacy_patterns: 0
- id: dependency-internal-graph-module-refactored
  message: Detected import from refactored conan.internal.graph module namespace
  severity: INFO
  languages:
  - python
  pattern: from conan.internal.graph import $MODULE
  metadata:
    category: dependency
    nr_refactored_patterns: 58
    nr_legacy_patterns: 0
- id: structural-graph-submodule-import-refactored
