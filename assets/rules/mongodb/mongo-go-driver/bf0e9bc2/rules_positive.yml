rules:
- id: integtest-qualified-function-usage
  message: Detected qualified usage of integtest package functions
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: integtest.$FUNC(...)
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(DBName|ColName|AddTestServerAPIVersion|GetDBName)$
  metadata:
    category: structural
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: integtest-add-test-server-api-version-call
  message: Detected call to integtest.AddTestServerAPIVersion function
  severity: INFO
  languages:
  - go
  pattern: integtest.AddTestServerAPIVersion(...)
  metadata:
    category: structural
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: integtest-functions-in-test
  message: Detected integtest functions used in test function
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func $TEST(t *testing.T) {\n  ...\n}\n"
  - pattern-either:
    - pattern: integtest.DBName(...)
    - pattern: integtest.ColName(...)
    - pattern: integtest.AddTestServerAPIVersion(...)
  - metavariable-regex:
      metavariable: $TEST
      regex: ^Test.*
  metadata:
    category: api
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: handshake-qualified-import-usage
  message: Detected qualified usage of handshake package constants
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: handshake.LegacyHello
  - pattern: handshake.LegacyHelloLowercase
  - pattern: handshake.Version
  metadata:
    category: structural
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: integtest-add-server-api-with-clientoptions
  message: Detected integtest.AddTestServerAPIVersion modifying options
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: integtest.AddTestServerAPIVersion($OPTS)
  - metavariable-regex:
      metavariable: $OPTS
      regex: .*[Oo]pts.*
  metadata:
    category: api
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: errutil-wrap-errorf-call
  message: Detected call to errutil.WrapErrorf in new package
  severity: INFO
  languages:
  - go
  pattern: errutil.WrapErrorf(...)
  metadata:
    category: structural
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: errutil-qualified-import-usage
  message: Detected qualified usage of errutil package functions
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: errutil.$FUNC(...)
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(WrapErrorf|WrapError|UnwrapError|RolledUpErrorMessage)$
  metadata:
    category: structural
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: httputil-qualified-import-usage
  message: Detected qualified usage of httputil package
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: httputil.CloseIdleHTTPConnections(...)
  - pattern: httputil.DefaultHTTPClient
