  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/mongo/background_context.go'
- id: background-context-function-in-mongo
  message: Detected background context function in mongo package (moved from internal)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $FUNC($CTX context.Context) context.Context { ... }
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(background|detach).*context.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/mongo/**/*.go'
    exclude:
    - '**/internal/**'
  options:
    symbolic_propagation: true
