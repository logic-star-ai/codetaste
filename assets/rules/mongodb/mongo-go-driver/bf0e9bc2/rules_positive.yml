  - patterns:
    - pattern: $PKG.$FUNC(...)
    - metavariable-regex:
        metavariable: $PKG
        regex: (?i)^bsonutil$
  pattern-sinks:
  - pattern: $X
  metadata:
    nr_refactored_patterns: 101
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: integtest-package-function-call
  message: Detected function call from integtest package (was testutil)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(...)
