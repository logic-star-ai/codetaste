    nr_legacy_patterns: 0
- id: import-internal-spectest
  message: 'Refactoring detected: Import from flattened internal/spectest package
    (was testutil/helpers)'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*internal/spectest(?:["/].*)?$
  - pattern-not-inside: 'import "go.mongodb.org/mongo-driver/internal/testutil/helpers"

      ...

      '
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: package-declaration-new-structure
  message: 'Refactoring detected: Package declaration in new focused package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: package $PKG
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(bsonutil|csfle|csot|errutil|handshake|httputil|eventtest|spectest|integtest)$
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: package-comment-new-structure
  message: 'Refactoring detected: Package comment for new focused package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: (?s)^//.*package (bsonutil|csfle|csot|errutil|handshake|httputil|eventtest|spectest|integtest).*
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/internal/bsonutil/*.go'
    - '**/internal/csfle/*.go'
    - '**/internal/csot/*.go'
    - '**/internal/errutil/*.go'
    - '**/internal/handshake/*.go'
    - '**/internal/httputil/*.go'
    - '**/internal/eventtest/*.go'
    - '**/internal/spectest/*.go'
    - '**/internal/integtest/*.go'
- id: import-internal-csot
  message: 'Refactoring detected: Import from new internal/csot package'
