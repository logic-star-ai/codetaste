    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: spectest-assert-soon-renamed-to-assert-soon
  message: Detected call to assert.Soon (renamed from helpers.AssertSoon)
  severity: INFO
  languages:
  - go
  pattern: assert.Soon(...)
  metadata:
    category: basic
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: spectest-assert-soon-with-timeout
  message: Detected assert.Soon call with timeout (migrated from helpers.AssertSoon)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: assert.Soon($T, $CALLBACK, $TIMEOUT)
  - metavariable-pattern:
      metavariable: $TIMEOUT
      patterns:
      - pattern-not: '0'
  metadata:
    category: basic
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: assert-soon-replaces-helpers-assertsoon
  message: Detected assert.Soon usage in test files (replaces helpers.AssertSoon)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: assert.Soon($TB, $CALLBACK, $TIMEOUT)
  metadata:
    category: basic
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
