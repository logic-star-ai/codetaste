- id: cancellation-listener-in-topology
  message: 'Refactoring detected: cancellListener type in topology/connection.go (moved
    from internal)'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: type cancellListener struct { ... }
    - pattern: type $TYPE struct { ... }
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*(cancell?.*listener).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/topology/connection.go'
    - '**/x/mongo/driver/topology/connection.go'
