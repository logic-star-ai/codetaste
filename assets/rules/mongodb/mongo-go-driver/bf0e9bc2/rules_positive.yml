    category: structural
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: import-internal-integtest-package
  message: Detected import of new internal/integtest package (renamed from testutil)
  severity: INFO
  languages:
  - go
  pattern: 'import "go.mongodb.org/mongo-driver/internal/integtest"

    '
