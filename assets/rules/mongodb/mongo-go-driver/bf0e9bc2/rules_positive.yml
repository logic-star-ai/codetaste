  languages:
  - go
  patterns:
  - pattern: $PKG.$CONST
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i)^handshake$
  - metavariable-regex:
      metavariable: $CONST
      regex: (?i).*(legacy|hello|master).*
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: any-httputil-reference
  message: Detected any reference to httputil package
  severity: INFO
  languages:
  - go
  pattern-regex: httputil\.
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
- id: any-eventtest-reference
