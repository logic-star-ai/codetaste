rules:
- id: integtest-function-usage
  message: 'Refactoring detected: Usage of integration test utility from integtest
    package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.$FUNC(...)
    - pattern: $PKG.$VAR
  - metavariable-regex:
      metavariable: $PKG
      regex: ^integtest$
  metadata:
    nr_refactored_patterns: 140
    nr_legacy_patterns: 0
- id: bsonutil-function-usage
  message: 'Refactoring detected: Usage of BSON utility function from bsonutil package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.$FUNC(...)
    - pattern: $PKG.$FUNC
  - metavariable-regex:
      metavariable: $PKG
      regex: ^bsonutil$
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(slice|raw|document|value|element|convert|parse).*
  metadata:
    nr_refactored_patterns: 74
    nr_legacy_patterns: 0
- id: http-client-from-httputil-taint
  message: 'Refactoring detected: HTTP client usage from httputil package'
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $PKG.$VAR
    - metavariable-regex:
        metavariable: $PKG
        regex: ^httputil$
    - metavariable-regex:
        metavariable: $VAR
        regex: (?i).*(client|http|default).*
  pattern-sinks:
  - pattern: $SINK
  metadata:
    nr_refactored_patterns: 72
    nr_legacy_patterns: 0
- id: errutil-function-usage
  message: 'Refactoring detected: Usage of error utility function from errutil package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.$FUNC(...)
    - pattern: $PKG.$FUNC
  - metavariable-regex:
      metavariable: $PKG
      regex: ^errutil$
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(wrap|unwrap|error|rolled).*
  metadata:
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
- id: test-helper-with-spectest-import
  message: 'Refactoring detected: Test helper using spectest'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $HELPER($T *testing.T, ...) {\n  ...\n}\n"
  - pattern-inside: 'import "go.mongodb.org/mongo-driver/internal/spectest"

      ...

      '
  metadata:
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
- id: handshake-constant-usage
  message: 'Refactoring detected: Usage of handshake constant from handshake package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.$CONST
    - pattern: $VAR = $PKG.$CONST
    - pattern: $VAR := $PKG.$CONST
  - metavariable-regex:
      metavariable: $PKG
      regex: ^handshake$
  - metavariable-regex:
      metavariable: $CONST
      regex: (?i).*(legacy|hello|master|primary).*
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: test-helper-with-integtest-import
  message: 'Refactoring detected: Test helper using integtest'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $HELPER($T *testing.T, ...) {\n  ...\n}\n"
  - pattern-inside: 'import "go.mongodb.org/mongo-driver/internal/integtest"

      ...

      '
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: csot-function-usage
  message: 'Refactoring detected: Usage of CSOT utility from csot package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.$FUNC(...)
    - pattern: $PKG.$FUNC
  - metavariable-regex:
      metavariable: $PKG
      regex: ^csot$
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(timeout|context|make|csot).*
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: import-internal-integtest
  message: 'Refactoring detected: Import from flattened internal/integtest package
    (was testutil)'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*internal/integtest(?:["/].*)?$
  - pattern-not-inside: 'import "go.mongodb.org/mongo-driver/internal/testutil"

      ...

      '
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: eventtest-function-usage
  message: 'Refactoring detected: Usage of event test utility from eventtest package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.$FUNC(...)
    - pattern: $PKG.$TYPE{ ... }
  - metavariable-regex:
      metavariable: $PKG
      regex: ^eventtest$
  metadata:
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: assert-soon-new-signature
  message: 'Refactoring detected: assert.Soon usage (renamed from helpers.AssertSoon)'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.Soon($T, $CALLBACK, $TIMEOUT)
    - pattern: $PKG.Soon($T, $CALLBACK, ...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^assert$
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
- id: spectest-function-usage
  message: 'Refactoring detected: Usage of spec test utility from spectest package'
