  pattern-sinks:
  - pattern: $X
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: handshake-constant-from-new-package
  message: Detected handshake constant reference from new handshake package
