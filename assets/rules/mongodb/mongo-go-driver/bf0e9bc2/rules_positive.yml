    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-path-not-old-internal-package
  message: Detected import avoiding old monolithic internal package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: import "$PKG"
    - pattern: import $ALIAS "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*mongo-driver/internal/(bsonutil|errutil|csfle|csot|handshake|httputil)$
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: csfle-function-call-from-new-package
  message: Detected CSFLE utility function call from new csfle package
  severity: INFO
  languages:
