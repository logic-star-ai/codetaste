  pattern-either:
  - pattern: "import (\n  ...\n  \"go.mongodb.org/mongo-driver/internal/integtest\"\
      \n  ...\n)\n"
  - pattern: "import (\n  ...\n  $ALIAS \"go.mongodb.org/mongo-driver/internal/integtest\"\
      \n  ...\n)\n"
