- id: background-context-in-mongo-package
  message: 'Refactoring detected: background_context.go moved to mongo package'
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/mongo/background_context.go'
    exclude:
    - '**/internal/background_context.go'
