rules:
- id: method-call-chain-with-new-packages
  message: Detected method call chain with new package values
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $PKG.$FUNC(...)
    - metavariable-regex:
        metavariable: $PKG
        regex: (?i)^(bsonutil|errutil|csfle|csot|handshake|httputil|eventtest|spectest|integtest)$
  pattern-sinks:
  - pattern: $OBJ.$METHOD(...)
  metadata:
    nr_refactored_patterns: 294
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: csot-function-call-from-new-package
  message: Detected CSOT utility function call from new csot package
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $PKG.$FUNC(...)
    - metavariable-regex:
        metavariable: $PKG
        regex: (?i)^csot$
  pattern-sinks:
  - pattern: $X
  metadata:
    nr_refactored_patterns: 254
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-multiple-new-packages
  message: Detected multiple imports from new internal package structure
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "import (\n  ...\n  \"$PKG1\"\n  ...\n  \"$PKG2\"\n  ...\n)\n"
    - pattern: "import (\n  ...\n  \"$PKG1\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PKG1
      regex: .*mongo-driver/internal/(bsonutil|errutil|csfle|csot|handshake|httputil|eventtest|rand|israce|spectest|integtest)$
  metadata:
    nr_refactored_patterns: 166
    nr_legacy_patterns: 0
- id: any-qualified-call-to-split-packages
  message: Detected qualified call to any split internal package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$X
  - metavariable-regex:
      metavariable: $PKG
      regex: (?i)^(bsonutil|errutil|csfle|csot|handshake|httputil)$
  metadata:
    nr_refactored_patterns: 150
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: errutil-function-call-from-new-package
  message: Detected error utility function call from new errutil package
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $PKG.$FUNC(...)
    - metavariable-regex:
        metavariable: $PKG
        regex: (?i)^errutil$
    - metavariable-regex:
        metavariable: $FUNC
        regex: (?i).*(wrap|unwrap|error|rolled).*
  pattern-sinks:
  - pattern: $X
  metadata:
    nr_refactored_patterns: 104
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: bsonutil-function-call-from-new-package
  message: Detected BSON utility function call from new bsonutil package
  severity: INFO
  languages:
  - go
  mode: taint
