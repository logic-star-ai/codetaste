  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "import (\n  ...\n  \"go.mongodb.org/mongo-driver/internal/testutil\"\
      \n  ...\n)\n"
  - pattern: "import (\n  ...\n  \"go.mongodb.org/mongo-driver/internal/testutil\"\
      \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 57
