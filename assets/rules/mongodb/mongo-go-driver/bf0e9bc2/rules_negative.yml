rules:
- id: old-testutil-usage-needing-integtest
  message: Package 'testutil' has been renamed to 'integtest'. Import from 'internal/integtest'
    instead of 'internal/testutil'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'import "go.mongodb.org/mongo-driver/internal/testutil"

      ...

      '
  - pattern: testutil.$F(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 75
- id: old-testutil-authtestcluster-var-usage
  message: Variables/functions from 'testutil' package should be accessed from 'internal/integtest'
    package (integtest.$VAR)
  severity: WARNING
  languages:
  - go
  pattern: testutil.$VAR
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 75
- id: old-helpers-getrawdocumentsfromarrayelement-usage
  message: Functions from 'helpers' package should be accessed from 'internal/spectest'
    package (spectest.$F)
  severity: WARNING
  languages:
  - go
  pattern: helpers.$F(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
- id: old-testutil-import
  message: Old import 'internal/testutil' should be replaced with 'internal/integtest'
  severity: WARNING
  languages:
  - go
  pattern: 'import "go.mongodb.org/mongo-driver/internal/testutil"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 57
