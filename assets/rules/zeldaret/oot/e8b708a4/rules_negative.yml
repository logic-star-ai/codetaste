rules:
- id: z64-include-generic-pattern
  message: Include statement uses old z64-prefixed header name; should be updated
    to remove z64 prefix (check special cases for z64play.h and z64math.h)
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+"z64[a-z_]+\.h"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2426
- id: z64-include-with-path
  message: Include statement uses old z64-prefixed header (possibly with path); should
    be updated to remove z64 prefix
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+"[^"]*z64[a-z_]+\.h"'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2426
