rules:
- id: detect-avalanchego-import-in-mock-config
  message: Centralized mock configuration with import path and destination. Should
    replace with local '//go:generate' directives.
  severity: WARNING
  languages:
  - regex
  pattern-regex: github\.com/ava-labs/avalanchego/\w+(/\w+)*=\w+=\w+(/\w+)*/\w+mock/\w+\.go
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: detect-regex-mockgen-interface-pattern
  message: Reflect-mode mock configuration pattern detected. Should replace with local
    '//go:generate' directives.
  severity: WARNING
  languages:
  - regex
  pattern-regex: github\.com/ava-labs/avalanchego/[a-z/]+=[A-Z]\w+=[a-z/]+\.go
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: detect-old-mockgen-source-mode-command-in-comments
  message: Mock file generated with old source-mode mockgen command. Should regenerate
    using reflect mode with 'go run go.uber.org/mock/mockgen@v0.5'.
  severity: WARNING
  languages:
  - go
  pattern-regex: //\s*mockgen\s+-source=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-source-file-comment-in-mock
  message: Source file comment in mock indicates source-mode generation. Should regenerate
    using reflect mode with local '//go:generate' directives.
  severity: WARNING
  languages:
  - go
  pattern-regex: //\s*Source:\s*\w+/\w+/.*\.go
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-vms-platformvm-mock-config
  message: Mock configuration for platformvm package. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: vms/platformvm/.*mock
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - scripts/mocks.mockgen*.txt
- id: detect-old-mock-destination-in-script-var
  message: Output path variable in mock generation script. Centralized path management
    should be replaced with local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \$\{?output_path\}?
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - scripts/mock*.sh
- id: detect-vms-avm-mock-config
  message: Mock configuration for avm package. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: vms/avm/.*mock
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - scripts/mocks.mockgen*.txt
- id: detect-mockgen-source-flag-comment
  message: Source file reference in mock comment indicates source-mode generation.
    Should regenerate using reflect mode with local '//go:generate' directives.
  severity: WARNING
  languages:
  - go
  pattern-regex: //\s*Source:\s*[a-z/]+\.go
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/*mock*.go'
- id: detect-snow-engine-mock-config
  message: Mock configuration for snow/engine subpackage. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: snow/engine/[a-z]+/.*mock
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - scripts/mocks.mockgen*.txt
- id: detect-snow-networking-mock-config
  message: Mock configuration for snow/networking subpackage. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: snow/networking/[a-z]+/[a-z]+mock
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - scripts/mocks.mockgen*.txt
- id: detect-outputted-files-plus-equals
  message: Array append for tracking outputted mock files. Local '//go:generate' directives
    eliminate need for manual tracking.
  severity: WARNING
  languages:
  - bash
  pattern-regex: outputted_files\+=\(
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-contributing-md-old-mock-instructions
  message: Documentation references old mock generation scripts. Should be updated
    to describe using 'go generate -run "go.uber.org/mock/mockgen" ./...' with local
    'mocks_generate_test.go' files.
  severity: WARNING
  languages:
  - generic
  pattern-regex: (scripts/mocks\.mockgen\.txt|scripts/mock\.gen\.sh|./scripts/mock\.gen\.sh)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - CONTRIBUTING.md
    - README.md
    - '*.md'
- id: detect-excluded-mock-files-in-script
  message: Manual exclusion of mock files in script detected. Local '//go:generate'
    directives eliminate need for manual exclusions.
  severity: WARNING
  languages:
  - bash
  pattern-regex: outputted_files\+=\('.*mock.*'\)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-utils-package-mock-config
  message: Mock configuration for utils subpackage. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: utils/[a-z]+/[a-z]+mock
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - scripts/mocks.mockgen.txt
- id: detect-direct-mockgen-command-in-script
  message: Direct 'mockgen' command invocation detected in script. Should use 'go
    run go.uber.org/mock/mockgen@v0.5' in local '//go:generate' directives instead.
  severity: WARNING
  languages:
  - bash
  pattern-either:
  - pattern: mockgen -package=$PACKAGE ...
  - pattern: mockgen -source=$SOURCE ...
  - pattern: mockgen $...ARGS
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/*.sh
- id: detect-outputted-files-array-for-mocks
  message: Script tracking outputted mock files detected. This centralized approach
    should be replaced with local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern: 'outputted_files=()

    ...

    outputted_files+=("$OUTPUT")

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-mockgen-destination-flag-in-script
  message: mockgen with -destination flag in script detected. Should use 'go run go.uber.org/mock/mockgen@v0.5'
    in local '//go:generate' directives instead.
  severity: WARNING
  languages:
  - bash
  pattern-either:
  - pattern: mockgen ... -destination=$DEST ...
  - pattern: mockgen ... --destination=$DEST ...
  - pattern: mockgen ... -destination="$DEST" ...
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-centralized-mock-loop-pattern
  message: Centralized mock generation loop detected. Should replace with local '//go:generate'
    directives in individual package test files.
  severity: WARNING
  languages:
  - bash
  pattern: "while IFS= read -r line\ndo\n  ...\n  mockgen ...\n  ...\ndone < $INPUT\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-mockgen-with-mock-names-flag
  message: mockgen with -mock_names flag in script detected. Should use 'go run go.uber.org/mock/mockgen@v0.5'
    in local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern-either:
  - pattern: mockgen ... -mock_names=$NAMES ...
  - pattern: mockgen ... --mock_names=$NAMES ...
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-tuples-comment-in-script
  message: Comment describing tuple-based mock configuration detected. This centralized
    configuration should be replaced with local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern-regex: '#\s*tuples\s+of\s+\(.*interface.*\)'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-echo-generating-message
  message: Progress message for centralized mock generation detected. With local '//go:generate'
    directives, 'go generate' provides its own output.
  severity: WARNING
  languages:
  - bash
  pattern: echo "Generating $OUTPUT..."
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-bash-while-read-line-for-mocks
  message: Bash while-read loop in mock generation script detected. Should replace
    with local '//go:generate' directives in package test files.
  severity: WARNING
  languages:
  - bash
  pattern: "while IFS= read -r line\ndo\n  ...\ndone < $FILE\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mock*.sh
- id: detect-exit-255-in-mock-script
  message: Exit code in mock generation script detected, indicating centralized approach.
    Should use local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern: exit 255
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mock*.sh
- id: detect-basename-dirname-for-package
  message: Basename/dirname pattern for extracting package name detected. With local
    '//go:generate' directives, package context is automatic.
  severity: WARNING
  languages:
  - bash
  pattern-either:
  - pattern: basename "$(dirname $PATH)"
  - pattern: basename $(dirname $PATH)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mock*.sh
- id: detect-ifs-delimiter-equal-sign
  message: IFS delimiter for parsing mock configuration detected. This centralized
    config parsing should be replaced with local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern-regex: IFS='='
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mock*.sh
- id: detect-here-string-line-parsing
  message: Here-string line parsing in mock script detected. Centralized configuration
    parsing should be replaced with local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern-regex: <<<\s*"\$\{line\}"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mock*.sh
- id: detect-api-server-servermock-reference
  message: Reference to 'api/server/servermock' detected. This mock was removed in
    the refactoring as it was unused.
  severity: WARNING
  languages:
  - generic
  pattern-regex: api/server/servermock
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    exclude:
    - '**/*mock*.go'
    - '**/go.mod'
    - '**/go.sum'
- id: detect-script-input-variable-assignment
  message: Input variable pointing to mock configuration file. Centralized configuration
    should be replaced with local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern-regex: input="scripts/mocks
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-echo-generating-with-path
  message: Progress echo in centralized mock generation script. Local '//go:generate'
    directives provide automatic feedback.
  severity: WARNING
  languages:
  - bash
  pattern-regex: echo\s+"Generating\s+\$\{?\w+\}?\.\.\.\"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/*.sh
- id: detect-read-line-in-loop
  message: Read line in loop for processing mock configuration. Should replace with
    local '//go:generate' directives per package.
  severity: WARNING
  languages:
  - bash
  pattern: read -r line
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mock*.sh
- id: detect-snow-consensus-mock-config
  message: Mock configuration for snow/consensus package. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: snow/consensus/snowman
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mocks.mockgen.txt
- id: detect-database-mock-config
  message: Mock configuration for database package. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: database/databasemock
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mocks.mockgen.txt
- id: detect-message-package-mock-config
  message: Mock configuration for message package. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: message/messagemock
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mocks.mockgen.txt
- id: detect-executor-manager-mock-config
  message: Mock configuration for executor manager. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: executor/executormock/manager
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mocks.mockgen.source.txt
- id: detect-mock-double-destination-syntax
  message: Double-equals syntax for source-mode mock generation. Should transition
    to reflect mode with local '//go:generate' directives.
  severity: WARNING
  languages:
  - regex
  pattern-regex: ==.*Mock.*=
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mocks.mockgen.source.txt
- id: detect-state-mock-source-config
  message: Source-mode mock for state. Should transition to reflect mode with local
    '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: state/state\.go=.*=Mock
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mocks.mockgen.source.txt
- id: detect-chain-state-mock-swap
  message: Mock name swapping for Chain/State. Should transition to reflect mode with
    local '//go:generate' directive and proper naming.
  severity: WARNING
  languages:
  - regex
  pattern-regex: (State=MockChain|Chain=MockState)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mocks.mockgen.source.txt
- id: detect-avalanche-vertex-mock-config
  message: Mock configuration for avalanche vertex. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: snow/engine/avalanche/vertex
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mocks.mockgen.txt
- id: detect-mempool-mock-config
  message: Mock configuration for mempool. Should create 'mocks_generate_test.go'
    with local '//go:generate' directive.
  severity: WARNING
  languages:
  - regex
  pattern-regex: mempool/mempoolmock
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/mocks.mockgen.txt
- id: detect-old-mock-gen-shell-script
  message: Old centralized mock generation script 'scripts/mock.gen.sh' still exists.
    This should be removed in favor of local '//go:generate' directives in 'mocks_generate_test.go'
    files per package.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - scripts/mock.gen.sh
- id: detect-old-mocks-mockgen-txt
  message: Old centralized mock configuration file 'scripts/mocks.mockgen.txt' still
    exists. This should be removed in favor of local '//go:generate' directives in
    'mocks_generate_test.go' files per package.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - scripts/mocks.mockgen.txt
- id: detect-old-mocks-mockgen-source-txt
  message: Old centralized mock source-mode configuration file 'scripts/mocks.mockgen.source.txt'
    still exists. This should be removed in favor of local '//go:generate' directives
    in 'mocks_generate_test.go' files per package.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - scripts/mocks.mockgen.source.txt
- id: detect-go-install-mockgen-v04
  message: Old mockgen v0.4.0 installation detected. Should upgrade to v0.5 and use
    'go run go.uber.org/mock/mockgen@v0.5' instead of globally installing.
  severity: WARNING
  languages:
  - bash
  pattern-either:
  - pattern: go install -v go.uber.org/mock/mockgen@v0.4.0
  - pattern: go install -v go.uber.org/mock/mockgen@v0.4.0 ...
  - pattern: go install go.uber.org/mock/mockgen@v0.4.0
  - pattern: go install go.uber.org/mock/mockgen@v0.4.0 ...
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-scripts-mock-gen-sh-invocation
  message: Invocation of 'scripts/mock.gen.sh' detected. Should use 'go generate -run
    "go.uber.org/mock/mockgen" ./...' instead.
  severity: WARNING
  languages:
  - bash
  pattern-either:
  - pattern: ./scripts/mock.gen.sh
  - pattern: bash scripts/mock.gen.sh
  - pattern: sh scripts/mock.gen.sh
  - pattern: scripts/mock.gen.sh
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-ci-workflow-old-mock-check
  message: CI workflow uses old 'scripts/mock.gen.sh' script. Should be updated to
    use 'grep | xargs | go generate' pattern instead.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: scripts/mock\.gen\.sh
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .github/workflows/*.yml
    - .github/workflows/*.yaml
- id: detect-mockgen-v04-in-go-mod
  message: mockgen v0.4.0 dependency detected in go.mod. Should upgrade to v0.5 for
    generic support.
  severity: WARNING
  languages:
  - generic
  pattern-regex: go\.uber\.org/mock.*v0\.4\.0
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - go.mod
- id: detect-centralized-mock-verification-logic
  message: Centralized mock verification logic detected. With local '//go:generate'
    directives, verification should be handled by 'go generate' itself.
  severity: WARNING
  languages:
  - bash
  pattern-either:
  - pattern: 'mapfile -t all_generated_files < <(grep -Rl ''Code generated by MockGen.
      DO NOT EDIT.'')

      '
  - pattern: 'grep -Rl ''Code generated by MockGen. DO NOT EDIT.''

      '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-mock-package-name-extraction
  message: Dynamic package name extraction for mock generation detected. With local
    '//go:generate' directives, package context is inherent.
  severity: WARNING
  languages:
  - bash
  pattern: 'package_name="$(basename "$(dirname "$OUTPUT")")"

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-bash-script-must-run-from-root-check
  message: Script location check for 'scripts/mock.gen.sh' detected. This indicates
    centralized mock generation that should be replaced with local directives.
  severity: WARNING
  languages:
  - bash
  pattern-regex: if.*scripts/mock\.gen\.sh.*then
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-mockgen-with-exclude-interfaces
  message: mockgen with -exclude_interfaces flag in script detected. Should transition
    to reflect mode with local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern-either:
  - pattern: mockgen ... -exclude_interfaces=$INTERFACES ...
  - pattern: mockgen ... --exclude_interfaces=$INTERFACES ...
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-array-diff-for-mock-verification
  message: Array diff logic for mock verification detected. With local '//go:generate'
    directives, CI can use 'go generate' directly for verification.
  severity: WARNING
  languages:
  - bash
  pattern: 'mapfile -t diff_files < <(echo "$ARRAY1" "$ARRAY2" | tr '' '' ''\n'' |
    sort | uniq -u)

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-old-readme-mock-workflow
  message: Documentation describing old centralized mock workflow detected. Should
    update to describe local '//go:generate' directives in 'mocks_generate_test.go'
    files.
  severity: WARNING
  languages:
  - generic
  pattern-regex: add.*remove.*interface.*mock.*mocks\.mockgen
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.md'
    - README.md
    - CONTRIBUTING.md
- id: detect-mockgen-reflect-mode-in-script
  message: Old mockgen reflect-mode invocation in script detected. Should use 'go
    run go.uber.org/mock/mockgen@v0.5' in local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern: mockgen -package=$PKG -destination=$DEST -mock_names=$NAMES $IMPORT $INTERFACE
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-mockgen-source-mode-in-script
  message: Old mockgen source-mode invocation in script detected. Should transition
    to reflect mode with local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern: mockgen -source=$SRC -destination=$DEST -package=$PKG -exclude_interfaces=$EXCL
    -mock_names=$NAMES
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-set-euo-pipefail-in-mock-script
  message: Bash strict mode in mock generation script detected, indicating centralized
    scripting approach. Should use local '//go:generate' directives.
  severity: WARNING
  languages:
  - bash
  pattern: set -euo pipefail
