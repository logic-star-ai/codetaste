rules:
- id: ice-python-copyright-header-new-modules
  message: Copyright header present in newly extracted module
  severity: INFO
  languages:
  - python
  pattern-regex: Copyright.*ZeroC.*All rights reserved
  metadata:
    category: basic
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  paths:
    include:
    - python/python/Ice/Future.py
    - python/python/Ice/InvocationFuture.py
    - python/python/Ice/Object.py
    - python/python/Ice/Blobject.py
    - python/python/Ice/BlobjectAsync.py
    - python/python/Ice/Value.py
    - python/python/Ice/Exception.py
    - python/python/Ice/LocalException.py
    - python/python/Ice/UserException.py
    - python/python/Ice/EnumBase.py
    - python/python/Ice/CommunicatorI.py
    - python/python/Ice/ObjectAdapterI.py
    - python/python/Ice/LoggerI.py
    - python/python/Ice/PropertiesI.py
    - python/python/Ice/ImplicitContextI.py
    - python/python/Ice/InitializationData.py
    - python/python/Ice/BatchRequestInterceptor.py
    - python/python/Ice/UnknownSlicedValue.py
    - python/python/Ice/FormatType.py
    - python/python/Ice/CtrlCHandler.py
- id: ice-python-future-has-state-attribute
  message: Future module manages state attribute
  severity: INFO
  languages:
  - python
  pattern: '$SELF._state = $VALUE

    '
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - python/python/Ice/Future.py
- id: ice-python-import-renamed-modules
  message: Import statement for renamed module (without _local suffix) in __init__.py
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: import Ice.Properties
  - pattern: import Ice.ObjectAdapter
  - pattern: import Ice.Logger
  - pattern: import Ice.ImplicitContext
  - pattern: import Ice.ServantLocator
  - pattern: import Ice.ValueFactory
  - pattern: import Ice.Communicator
  - pattern: import Ice.Endpoint
  - pattern: import Ice.Connection
  - pattern: import Ice.FacetMap
  - pattern: import Ice.Instrumentation
  - pattern: import Ice.Current
  - pattern: import Ice.EndpointSelectionType
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - python/python/Ice/__init__.py
