    - '*/Ice/__init__.py'
- id: ice-python-future-state-constants-in-init
  message: Future state constants should be in extracted Future.py module
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: StateRunning = $VAL
    - pattern: StateDone = $VAL
    - pattern: StateCancelled = $VAL
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/Ice/__init__.py'
