rules:
- id: ice-python-old-local-suffix-pattern
  message: Files with _local suffix should be renamed without the suffix as part of
    refactoring
  severity: WARNING
  languages:
  - python
  pattern-regex: _local
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
  paths:
    include:
    - '*/Ice/*_local.py'
- id: ice-python-with-condition-block-in-init
  message: Threading condition context manager usage suggests Future implementation
    should be extracted
  severity: WARNING
  languages:
  - python
  pattern: "with $VAR._condition:\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - '*/Ice/__init__.py'
- id: ice-python-large-class-bodies-in-init
  message: Large class definition (20+ lines) in __init__.py should be extracted to
    dedicated module
  severity: WARNING
  languages:
  - python
  pattern-regex: class\s+\w+\([^)]+\):\s*\n(\s{4}[^\n]+\n){20,}
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '*/Ice/__init__.py'
- id: ice-python-exception-init-method-in-init
  message: Multiple __init__ methods suggest classes should be extracted to separate
    modules
  severity: INFO
  languages:
  - python
  pattern: "def __init__(self, $ARGS):\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '*/Ice/__init__.py'
- id: ice-python-notify-all-in-init
  message: Threading notify_all logic suggests Future implementation should be extracted
  severity: WARNING
  languages:
  - python
  pattern: '$VAR._condition.notify_all()

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*/Ice/__init__.py'
- id: ice-python-donecallbacks-attribute-in-init
  message: Done callbacks implementation should be in extracted Future.py module
  severity: WARNING
  languages:
  - python
  pattern: 'self._doneCallbacks = $VAL

    '
  metadata:
