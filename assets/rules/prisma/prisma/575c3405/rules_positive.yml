rules:
- id: detect-factory-pattern-comment
  message: Detected factory pattern terminology
  severity: INFO
  languages:
  - typescript
  pattern-regex: factory|Factory
  metadata:
    category: other
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/adapter-*/src/*.ts'
- id: detect-sql-driver-adapter-type-annotation
  message: Detected SqlDriverAdapter type annotation
  severity: INFO
  languages:
  - typescript
  pattern-regex: :\s*SqlDriverAdapter
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: detect-promise-sql-driver-adapter-return-type
  message: Detected Promise<SqlDriverAdapter> return type
  severity: INFO
  languages:
  - typescript
  pattern-regex: Promise<SqlDriverAdapter>
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: detect-adapter-method-with-isolation-level-variable
  message: Detected isolationLevel variable usage in startTransaction method
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-inside: 'startTransaction(...) { ... }

      '
  - pattern: 'isolationLevel

      '
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
- id: detect-sql-driver-adapter-import
  message: Detected import of new SqlDriverAdapter interface (renamed from SqlConnection)
  severity: INFO
  languages:
  - typescript
  pattern: 'import { ..., SqlDriverAdapter, ... } from ''@prisma/driver-adapter-utils''

    '
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: detect-isolation-level-import-from-utils
  message: Detected IsolationLevel import from @prisma/driver-adapter-utils (moved
    from @prisma/client-engine-runtime)
  severity: INFO
  languages:
  - typescript
  pattern: 'import { ..., IsolationLevel, ... } from ''@prisma/driver-adapter-utils''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: detect-return-type-promise-sql-driver-adapter
  message: Detected Promise<SqlDriverAdapter> return type
  severity: INFO
  languages:
  - typescript
  pattern-regex: :\s*Promise<SqlDriverAdapter>
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: detect-implements-sql-driver-adapter-in-adapter-files
  message: Detected class implementing SqlDriverAdapter interface
  severity: INFO
  languages:
  - typescript
  pattern-regex: implements\s+SqlDriverAdapter
  metadata:
    category: api
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/adapter-pg/src/*.ts'
    - '**/adapter-neon/src/*.ts'
    - '**/adapter-planetscale/src/*.ts'
    - '**/adapter-libsql/src/*.ts'
    - '**/adapter-d1/src/*.ts'
    - '**/adapter-pg-worker/src/*.ts'
- id: detect-adapter-instantiation-with-config-object-pg
  message: Detected PrismaPg/PrismaPgAdapterFactory instantiation with config object
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: new PrismaPg({ ... })
  - pattern: new PrismaPgAdapterFactory({ ... })
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: detect-adapter-returning-sql-driver-adapter
  message: Detected method returning Promise<SqlDriverAdapter>
  severity: INFO
  languages:
  - typescript
  pattern-regex: :\s*Promise<SqlDriverAdapter>\s*{
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: detect-sql-driver-adapter-factory-string
  message: Detected SqlDriverAdapterFactory string in code
  severity: INFO
  languages:
  - typescript
  pattern-regex: SqlDriverAdapterFactory
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/adapter-*/src/*.ts'
    - '**/driver-adapter-utils/**'
- id: detect-new-prisma-pg-pattern
  message: Detected new PrismaPg instantiation with object literal
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: new\s+PrismaPg\s*\(\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
