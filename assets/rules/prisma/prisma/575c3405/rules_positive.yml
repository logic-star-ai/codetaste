- id: detect-adapter-class-implementing-sql-driver-adapter-directly
  message: Detected adapter class extending base and implementing SqlDriverAdapter
  severity: INFO
  languages:
  - typescript
  pattern-regex: class\s+\w+\s+extends\s+\w+\s+implements\s+SqlDriverAdapter
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/adapter-*/src/*.ts'
