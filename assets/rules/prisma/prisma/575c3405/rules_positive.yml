  message: Detected adapter with executeScript method
  severity: INFO
  languages:
  - typescript
  pattern: "class $CLASS implements SqlDriverAdapter {\n  ...\n  executeScript($PARAM)\
    \ { ... }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: detect-adapter-with-dispose-method
