  severity: INFO
  languages:
  - typescript
  pattern: 'class $CLASS implements SqlDriverAdapter { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: detect-sql-driver-adapter-factory-type-annotation
  message: Detected SqlDriverAdapterFactory type annotation
