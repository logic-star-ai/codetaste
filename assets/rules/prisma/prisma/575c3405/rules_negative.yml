  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'const client = new Client($CONFIG)

      '
  - pattern-inside: "test($TEST, () => {\n  ...\n})\n"
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: adapter-validation-not-pool
  message: Validation checking for client instance existence. Adapters should now
