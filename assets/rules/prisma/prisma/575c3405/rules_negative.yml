rules:
- id: transaction-context-comment-reference
  message: Reference to TransactionContext found. This interface has been removed.
  severity: INFO
  languages:
  - typescript
  pattern-regex: .*TransactionContext.*
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
  paths:
    include:
    - '*.ts'
- id: generic-parameter-transactioncontext
  message: Generic parameter with TransactionContext type. TransactionContext has
    been removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: <TransactionContext>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: adapter-return-type-transactioncontext
  message: Method returning Promise<TransactionContext>. TransactionContext has been
    removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: :\s*Promise<TransactionContext>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: generic-parameter-sqlconnection
  message: Generic parameter with SqlConnection type. SqlConnection has been renamed
    to SqlDriverAdapter.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: <SqlConnection>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: class-implements-sqlconnection
  message: Class implementing SqlConnection interface detected. SqlConnection should
    be renamed to SqlDriverAdapter.
  severity: WARNING
  languages:
  - typescript
  pattern: "class $CLASS implements SqlConnection {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: adapter-return-type-sqlconnection
  message: Method returning Promise<SqlConnection>. SqlConnection has been renamed
    to SqlDriverAdapter.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: :\s*Promise<SqlConnection>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: import-transactioncontext
  message: TransactionContext import detected. This interface has been removed.
  severity: WARNING
  languages:
  - typescript
  pattern: 'import { TransactionContext } from ''@prisma/driver-adapter-utils''

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: import-sqlconnection-interface
  message: SqlConnection import detected. This interface has been renamed to SqlDriverAdapter.
  severity: WARNING
  languages:
  - typescript
  pattern: 'import { SqlConnection } from ''@prisma/driver-adapter-utils''

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: transaction-context-class-extends
  message: Class implementing TransactionContext detected. This interface has been
    removed in the new adapter interface.
  severity: WARNING
  languages:
  - typescript
  pattern: 'class $NAME extends $BASE implements TransactionContext { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: class-implements-transactioncontext
  message: Class implementing TransactionContext interface. TransactionContext has
    been removed in the new adapter interface.
  severity: WARNING
  languages:
  - typescript
  pattern: "class $CLASS implements TransactionContext {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: transaction-context-extends-queryable
  message: Class implementing TransactionContext. This interface has been removed
    in the new adapter architecture.
  severity: WARNING
  languages:
  - typescript
  pattern: "class $NAME extends $BASE implements TransactionContext {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: transaction-options-phantom-query
  message: TransactionOptions in TransactionContext implementation. TransactionContext
    has been removed.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'usePhantomQuery: $VAL

      '
  - pattern-inside: "const options: TransactionOptions = {\n  ...\n}\n"
  - pattern-inside: "class $CLASS implements TransactionContext {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: planetscale-client-import-pattern
  message: Importing Client from planetscale for adapter. Adapters should now accept
    config objects.
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'import { Client } from ''@planetscale/database''

      '
  - pattern-inside: 'import { Client } from ''@planetscale/database''

      ...

      new PrismaPlanetScale(...)

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: createclient-then-adapter
  message: 'Old LibSQL adapter pattern: Pass config to PrismaLibSQL directly instead
    of creating client first. Use: new PrismaLibSQL({ url, authToken })'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'const $CLIENT = createClient($CONFIG)

      '
  - pattern-inside: 'const $CLIENT = createClient($CONFIG)

      ...

      new PrismaLibSQL($CLIENT)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: libsql-createclient-pattern
  message: Creating libsql client with createClient(). In new pattern, pass config
    directly to PrismaLibSQL constructor.
  severity: INFO
  languages:
  - typescript
  pattern: 'const $CLIENT = createClient({ ... })

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: class-implements-sql-migration-aware
  message: Class implementing SqlMigrationAwareDriverAdapter. This should be renamed
    to SqlMigrationAwareDriverAdapterFactory.
  severity: WARNING
  languages:
  - typescript
  pattern: "class $CLASS implements SqlMigrationAwareDriverAdapter {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: import-sql-migration-aware-adapter
  message: SqlMigrationAwareDriverAdapter import detected. This has been renamed to
    SqlMigrationAwareDriverAdapterFactory.
  severity: WARNING
  languages:
  - typescript
  pattern: 'import { SqlMigrationAwareDriverAdapter } from ''@prisma/driver-adapter-utils''

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: migration-aware-class-with-old-interface
  message: Class implementing SqlMigrationAwareDriverAdapter detected. This should
    be renamed to SqlMigrationAwareDriverAdapterFactory.
  severity: WARNING
  languages:
  - typescript
  pattern: "export class $NAME implements SqlMigrationAwareDriverAdapter {\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: adapter-test-pool-then-adapter
  message: Test code using old two-step adapter instantiation. Pass config directly
    to adapter constructor.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'const pool = new Pool()

      '
  - pattern-inside: 'const pool = new Pool()

      ...

      new $ADAPTER(pool)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: neon-pool-new-then-adapter
  message: 'Creating Pool then PrismaNeon adapter. Use new pattern: new PrismaNeon({
    connectionString })'
  severity: WARNING
  languages:
  - typescript
  pattern: 'new Pool($CONFIG)

    ...

    new PrismaNeon(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: planetscale-client-new-then-adapter
  message: 'Creating Client then PrismaPlanetScale adapter. Use new pattern: new PrismaPlanetScale({
    url })'
  severity: WARNING
  languages:
  - typescript
  pattern: 'new Client($CONFIG)

    ...

    new PrismaPlanetScale(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: adapter-example-with-pool
  message: Example code using old two-step adapter pattern. Update to pass config
    directly to adapter.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'const pool = new Pool($CONFIG)

      '
  - pattern-inside: 'const pool = new Pool($CONFIG)

      ...

      const adapter = new $ADAPTER(pool)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: readme-example-pool-pattern
  message: README example showing old Pool-based pattern. Update to show config-based
    adapter instantiation.
  severity: INFO
  languages:
  - generic
  pattern-regex: const\s+pool\s*=\s*new\s+Pool.*\n.*new\s+Prisma
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*.md'
    - README*
- id: libsql-client-import-pattern
  message: Importing createClient from libsql for adapter. Adapters should now accept
    config objects.
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'import { createClient } from ''@libsql/client''

      '
  - pattern-inside: 'import { createClient } from ''@libsql/client''

      ...

      new PrismaLibSQL(...)

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: adapter-test-with-pool-initialization
  message: Test initializing Pool. Tests should be updated to use new config-based
    adapter pattern.
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'const pool = new Pool()

      '
  - pattern-inside: "test($TEST, () => {\n  ...\n})\n"
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: prisma-pg-class-definition
  message: PrismaPg class implementing SqlConnection detected. Should implement SqlDriverAdapter
    and be renamed to PrismaPgFactory.
  severity: WARNING
  languages:
  - typescript
  pattern: "export class PrismaPg extends $BASE implements SqlConnection {\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pg-transaction-context-instantiation
  message: PgTransactionContext instantiation detected. TransactionContext classes
    have been removed.
  severity: WARNING
  languages:
  - typescript
  pattern: 'new PgTransactionContext($ARG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: adapter-with-migration-old-interface
  message: Migration-aware adapter with old interface name. Should implement SqlMigrationAwareDriverAdapterFactory.
  severity: WARNING
  languages:
  - typescript
  pattern: "export class $NAME implements SqlMigrationAwareDriverAdapter {\n  constructor(private\
    \ readonly config: $CONFIG, ...) {\n    ...\n  }\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: client-then-adapter-pattern
  message: Old two-step adapter instantiation pattern detected. Adapters should now
    accept config objects directly, not pre-initialized Pool/Client instances.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'const $CLIENT = new Client(...)

      ...

      const $ADAPTER = new $ADAPTER_CLASS($CLIENT)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transaction-context-variable-declaration
  message: TransactionContext type usage detected. This interface has been removed
    in the new adapter interface.
  severity: WARNING
  languages:
  - typescript
  pattern: 'const $VAR: TransactionContext = ...

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: await-transaction-context-call
  message: 'Call to transactionContext() detected. Should be replaced with startTransaction(isolationLevel?:
    IsolationLevel) directly on the adapter.'
  severity: WARNING
  languages:
  - typescript
  pattern: 'await $CONN.transactionContext()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transaction-context-method-call
  message: Call to transactionContext() method detected. This method has been removed.
    Use startTransaction(isolationLevel?) directly on the adapter instead.
  severity: WARNING
  languages:
  - typescript
  pattern: '$CONN.transactionContext()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: isolation-level-from-engine-runtime
  message: IsolationLevel imported from old location '@prisma/client-engine-runtime'.
    Should be imported from '@prisma/driver-adapter-utils'.
  severity: WARNING
  languages:
  - typescript
  pattern: 'import { ..., IsolationLevel, ... } from ''@prisma/client-engine-runtime''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transaction-context-start-transaction-call
  message: Calling startTransaction() on a context object. In the new interface, call
    startTransaction(isolationLevel?) directly on the adapter.
  severity: WARNING
  languages:
  - typescript
  pattern: '$CTX.startTransaction()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transaction-context-const-assignment
  message: transactionContext() method call detected. This method has been removed.
    Use startTransaction() directly on the adapter.
  severity: WARNING
  languages:
  - typescript
  pattern: 'const $VAR = await $OBJ.transactionContext()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: prisma-neon-class-definition
  message: PrismaNeon class implementing SqlConnection detected. Should implement
    SqlDriverAdapter and be renamed to PrismaNeonFactory.
  severity: WARNING
  languages:
  - typescript
  pattern: "export class PrismaNeon extends $BASE implements SqlConnection {\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: prisma-libsql-class-definition
  message: PrismaLibSQL class implementing SqlConnection detected. Should implement
    SqlDriverAdapter and be renamed to PrismaLibSQLFactory.
  severity: WARNING
  languages:
  - typescript
  pattern: "export class PrismaLibSQL extends $BASE implements SqlConnection {\n \
    \ ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: prisma-planetscale-class-definition
  message: PrismaPlanetScale class implementing SqlConnection detected. Should implement
    SqlDriverAdapter and be renamed to PrismaPlanetScaleFactory.
  severity: WARNING
  languages:
  - typescript
  pattern: "export class PrismaPlanetScale extends $BASE implements SqlConnection\
    \ {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: prisma-d1-class-definition
  message: PrismaD1 class implementing SqlConnection detected. Should implement SqlDriverAdapter
    and be renamed to PrismaD1Factory.
  severity: WARNING
  languages:
  - typescript
  pattern: "export class PrismaD1 extends $BASE implements SqlConnection {\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: start-transaction-on-transaction-context-object
  message: Calling startTransaction() on a context object. In the new interface, call
    startTransaction() directly on the adapter, not on a context.
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: '$CTX.startTransaction()

      '
  - pattern-not: 'this.startTransaction()

      '
  - pattern-not: 'super.startTransaction()

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: neon-transaction-context-instantiation
  message: NeonTransactionContext instantiation detected. TransactionContext classes
    have been removed.
  severity: WARNING
  languages:
  - typescript
  pattern: 'new NeonTransactionContext($ARG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: libsql-transaction-context-instantiation
  message: LibSqlTransactionContext instantiation detected. TransactionContext classes
    have been removed.
  severity: WARNING
  languages:
  - typescript
  pattern: 'new LibSqlTransactionContext($ARG, $RELEASE)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: planetscale-transaction-context-instantiation
  message: PlanetScaleTransactionContext instantiation detected. TransactionContext
