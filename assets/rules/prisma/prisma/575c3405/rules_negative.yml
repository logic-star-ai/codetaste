  severity: WARNING
  languages:
  - typescript
  pattern: 'new PlanetScaleTransactionContext($ARG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: d1-transaction-context-instantiation
  message: D1TransactionContext instantiation detected. TransactionContext classes
    have been removed.
  severity: WARNING
  languages:
  - typescript
  pattern: 'new D1TransactionContext($ARG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: adapter-constructor-validates-pool-instance
  message: Validation checking for client instance. Adapters should now validate config
    objects, not client instances.
  severity: INFO
  languages:
  - typescript
  pattern: "if (!client) {\n  throw new TypeError($MSG)\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transaction-context-in-variable-name
  message: Variable with TransactionContext type. This interface has been removed.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: 'const \w*[Cc]ontext\w*: TransactionContext'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: assign-transaction-context-result
  message: Assigning result of transactionContext(). This method has been removed.
    Use startTransaction() directly.
  severity: WARNING
  languages:
  - typescript
  pattern: '$VAR = await $CONN.transactionContext()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transaction-context-start-transaction-await
  message: Calling startTransaction() on what appears to be a context object. In new
    interface, call directly on adapter.
  severity: INFO
  languages:
  - typescript
  pattern: 'await $CTX.startTransaction()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: prisma-pg-with-migration-class
  message: PrismaPgWithMigration implementing SqlMigrationAwareDriverAdapter. Should
