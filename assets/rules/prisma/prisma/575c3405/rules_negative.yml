  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'await this.client.transaction(''deferred'')

      '
  - pattern-inside: "class $CLASS implements TransactionContext {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: adapter-neon-http-class-old-interface
