  languages:
  - typescript
  pattern-regex: :\s*TransactionContext\s*=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transaction-deferred-mode
  message: Transaction with deferred mode in TransactionContext. TransactionContext
