  severity: INFO
  languages:
  - generic
  pattern-regex: const\s+client\s*=\s*new\s+Client.*\n.*new\s+Prisma
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
