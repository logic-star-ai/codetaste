  paths:
    include:
    - '**/generator/**/*.ts'
    exclude:
    - '**/node_modules/**'
    - '**/generator-helper/**'
  options:
    symbolic_propagation: true
- id: import-any-from-prisma-generator
  message: Any import from @prisma/generator
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: '@prisma/generator[^-]'
  metadata:
