  message: 'Refactoring detected: Import from @prisma/generator with code following'
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: import.*@prisma/generator['"]\s*\n
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
- id: array-type-syntax-in-dmmf
