rules:
- id: variable-typed-with-generator-types
  message: Variable typed with generator types
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: :\s*[A-Z][A-Za-z0-9_]*
  - pattern-inside: 'import { ... } from ''$PKG''

      ...

      '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@[^/]+/generator$
  metadata:
    nr_refactored_patterns: 599
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: property-declaration-with-type
  message: Property declaration with type from new packages
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: $PROP = $VAL
  - pattern-inside: "class $CLASS {\n  ...\n}\n"
  - pattern-inside: 'import { ..., $TYPE, ... } from ''$PKG''

      ...

      '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@[^/]+/(dmmf|generator)$
  metadata:
    nr_refactored_patterns: 369
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: union-type-with-generator
  message: Union type including type from new generator package
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: .*:.*\|.*
  - pattern-inside: 'import { ..., $TYPE, ... } from ''$PKG''

      ...

      '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@[^/]+/generator$
  metadata:
    nr_refactored_patterns: 100
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    exclude:
    - '**/node_modules/**'
  options:
    symbolic_propagation: true
- id: export-namespace-in-dmmf
  message: Namespace export in DMMF package
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: export namespace $NS { ... }
    - pattern: export { $NS }
  metadata:
    nr_refactored_patterns: 92
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dmmf/**/*.ts'
    exclude:
    - '**/node_modules/**'
  options:
    symbolic_propagation: true
- id: string-literal-generator-package
  message: String literal references generator package
  severity: INFO
  languages:
  - typescript
  - javascript
  - json
  pattern-regex: '[''"]@prisma/generator[''"]'
  metadata:
    nr_refactored_patterns: 58
    nr_legacy_patterns: 0
- id: export-namespace-in-generator
  message: Namespace export in generator package
  severity: INFO
