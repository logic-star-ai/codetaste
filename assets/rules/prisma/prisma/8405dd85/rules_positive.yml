rules:
- id: import-datamodel-enum-from-dmmf
  message: 'Refactoring detected: DatamodelEnum type from @prisma/dmmf'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { DMMF } from '@prisma/dmmf'
    - pattern: import type { DMMF } from '@prisma/dmmf'
  - pattern-inside: 'import { ... } from ''@prisma/dmmf''

      ...

      '
  metadata:
    nr_refactored_patterns: 114
    nr_legacy_patterns: 0
- id: dmmf-namespace-export-in-new-package
  message: 'Refactoring detected: DMMF namespace exported from new package'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: export namespace DMMF { ... }
    - pattern: export { DMMF }
  metadata:
    nr_refactored_patterns: 92
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dmmf/**/*.ts'
    exclude:
    - '**/node_modules/**'
    - '**/generator-helper/**'
- id: colon-space-in-type-annotation-dmmf
  message: 'Refactoring detected: Type annotation with colon in @prisma/dmmf'
  severity: INFO
  languages:
  - typescript
  pattern-regex: \w+:\s*\w+
  metadata:
    nr_refactored_patterns: 84
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/dmmf/**/*.ts'
    - '**/packages/dmmf/**/*.ts'
    exclude:
    - '**/generator-helper/**'
- id: string-type-in-dmmf
  message: 'Refactoring detected: string type in @prisma/dmmf'
  severity: INFO
  languages:
  - typescript
  pattern-regex: :\s*string
