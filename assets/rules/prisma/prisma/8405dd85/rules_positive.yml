- id: import-from-generator-specific-file
  message: 'Refactoring detected: Import from @prisma/generator in specific file'
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { ... } from '@prisma/generator'
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/client/src/runtime/**/*.ts'
    - '**/internals/src/**/*.ts'
    - '**/migrate/src/**/*.ts'
    - '**/cli/src/**/*.ts'
    exclude:
    - '**/node_modules/**'
- id: import-datasource-from-new-package
  message: 'Refactoring detected: DataSource types imported from @prisma/generator'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { $DS } from '@prisma/generator'
    - pattern: import type { $DS } from '@prisma/generator'
  - metavariable-regex:
      metavariable: $DS
      regex: (?i).*(data.*source|source|connector.*type|env.*value).*
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
