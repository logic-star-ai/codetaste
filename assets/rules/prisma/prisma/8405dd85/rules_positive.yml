    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-statement-anywhere-generator
  message: Import from generator anywhere in codebase
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: from\s+['"]@prisma/generator['"]
  metadata:
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-from-new-generator-config-package
  message: Detected import from new modular generator configuration package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., $IMPORT, ... } from '$PKG'
    - pattern: import * as $ALIAS from '$PKG'
    - pattern: import $DEFAULT from '$PKG'
    - pattern: import type { ..., $IMPORT, ... } from '$PKG'
    - pattern: import type * as $ALIAS from '$PKG'
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@[^/]+/generator$
  - pattern-not: import { ..., $X, ... } from '@prisma/generator-helper'
  metadata:
    nr_refactored_patterns: 47
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
