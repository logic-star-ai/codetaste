rules:
- id: all-generator-types-should-use-generator-package
  message: Generator-related types should be imported from '@prisma/generator' instead
    of '@prisma/generator-helper'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $TYPE, ... } from '@prisma/generator-helper'
  - metavariable-regex:
      metavariable: $TYPE
      regex: ^(GeneratorConfig|GeneratorOptions|GeneratorManifest|DataSource|EnvValue|BinaryTargetsEnvValue|ConnectorType|ActiveConnectorType|BinaryPaths|EnvPaths|EngineType|SqlQueryOutput|SqlQueryParameterOutput|SqlQueryColumnOutput|QueryIntrospectionType|QueryIntrospectionBuiltinType)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
  paths:
    exclude:
    - packages/generator-helper/**
    - '**/*generator.ts'
    - '**/*generator.js'
    - '**/fixtures/**'
- id: dmmf-namespace-import-from-generator-helper
  message: DMMF namespace should be imported from '@prisma/dmmf' instead of '@prisma/generator-helper'
  severity: WARNING
  languages:
