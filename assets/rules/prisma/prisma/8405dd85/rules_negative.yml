- id: multiple-generator-types-import-from-generator-helper
  message: Generator configuration types should be imported from '@prisma/generator'
    instead of '@prisma/generator-helper'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., $TYPE1, ..., $TYPE2, ... } from '@prisma/generator-helper'
    - pattern: import type { ..., $TYPE1, ..., $TYPE2, ... } from '@prisma/generator-helper'
  - metavariable-regex:
      metavariable: $TYPE1
      regex: ^(GeneratorConfig|GeneratorOptions|DataSource|EnvValue)$
  - metavariable-regex:
      metavariable: $TYPE2
      regex: ^(GeneratorConfig|GeneratorOptions|DataSource|EnvValue|BinaryTargetsEnvValue|ConnectorType|ActiveConnectorType)$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    exclude:
    - packages/generator-helper/**
    - '**/*generator.ts'
    - '**/*generator.js'
    - '**/fixtures/**'
