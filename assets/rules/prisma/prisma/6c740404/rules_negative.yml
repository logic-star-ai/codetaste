rules:
- id: detect-spread-platforms-array
  message: Variable platforms should be renamed to binaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '...platforms'
  - pattern-not: '...binaryTargets'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 210
- id: detect-get-platform-function-call
  message: Replace getPlatform() with getBinaryTargetForCurrentPlatform()
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: getPlatform(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: detect-namespace-import-get-platform
  message: Update to use getBinaryTargetForCurrentPlatform instead of getPlatform
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $NS.getPlatform(...)
  - pattern-not: $NS.getBinaryTargetForCurrentPlatform(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: detect-get-platform-async-call
  message: Replace getPlatform() with getBinaryTargetForCurrentPlatform()
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: await getPlatform(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: detect-get-platform-await-variable
  message: Replace getPlatform() with getBinaryTargetForCurrentPlatform()
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const $VAR = await getPlatform(...)
  - pattern-not: const $VAR = await getBinaryTargetForCurrentPlatform(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: detect-await-get-platform-assignment
  message: Replace getPlatform() with getBinaryTargetForCurrentPlatform()
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const $VAR = await getPlatform()
  - pattern-not: const $VAR = await getBinaryTargetForCurrentPlatform()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: detect-get-platform-import
  message: Update import to use getBinaryTargetForCurrentPlatform instead of getPlatform
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., getPlatform, ... } from '...'
  - pattern-not: import { ..., getBinaryTargetForCurrentPlatform, ... } from '...'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: detect-get-node-api-name-platform-param
  message: Update function call to use binaryTarget parameter instead of platform
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: getNodeAPIName(platform, ...)
  - pattern-not: getNodeAPIName(binaryTarget, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-get-platform-internal-function-call
  message: Replace getPlatformInternal() with getBinaryTargetForCurrentPlatformInternal()
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: getPlatformInternal(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-this-platform-access
  message: Rename property platform to binaryTarget
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: this.platform
  - pattern-not: this.binaryTarget
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-platform-in-array-literal
  message: Rename variable platform to binaryTarget in array literal
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '[..., platform, ...]'
  - pattern-not: '[..., binaryTarget, ...]'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-platform-function-parameter
  message: Rename parameter platform to binaryTarget
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: function $FUNC(platform, ...) { ... }
    - pattern: function $FUNC(..., platform) { ... }
    - pattern: function $FUNC(..., platform, ...) { ... }
  - pattern-not: function $FUNC(binaryTarget, ...) { ... }
  - pattern-not: function $FUNC(..., binaryTarget) { ... }
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-platforms-import-named
  message: Update import to use binaryTargets instead of platforms
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { platforms } from '$PATH'
  - pattern-not: import { binaryTargets } from '$PATH'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-platform-type-annotation-function-param
  message: Rename type Platform to BinaryTarget in function parameter
  severity: WARNING
  languages:
  - typescript
  pattern: 'function $FUNC(..., $PARAM: Platform, ...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-get-platform-function-declaration
  message: Rename function getPlatform to getBinaryTargetForCurrentPlatform
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: function getPlatform(...) { ... }
  - pattern-not: function getBinaryTargetForCurrentPlatform(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-get-platform-async-function-declaration
  message: Rename function getPlatform to getBinaryTargetForCurrentPlatform
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: async function getPlatform(...) { ... }
  - pattern-not: async function getBinaryTargetForCurrentPlatform(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-platforms-const-declaration
  message: Rename variable platforms to binaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const platforms = $EXPR
  - pattern-not: const binaryTargets = $EXPR
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-import-from-platforms-file
  message: Update import path from platforms to binaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import.*from ['"].*\/platforms['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-platform-import-named
  message: Update import to use BinaryTarget instead of Platform type
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: import { Platform } from '$PATH'
  - pattern-not: import { BinaryTarget } from '$PATH'
  - pattern-not-regex: from ['"].*platform['"]$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-get-platform-internal-import
  message: Update import to use getBinaryTargetForCurrentPlatformInternal instead
    of getPlatformInternal
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., getPlatformInternal, ... } from '...'
  - pattern-not: import { ..., getBinaryTargetForCurrentPlatformInternal, ... } from
      '...'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-platform-regex-ts-file
  message: File platformRegex.ts should be renamed to binaryTargetRegex.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/platformRegex.ts'
- id: detect-known-platforms-variable
  message: Rename variable knownPlatforms to knownBinaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const knownPlatforms = $EXPR
  - pattern-not: const knownBinaryTargets = $EXPR
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-platforms-object-literal-property
  message: Rename object property platforms to binaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "{ \n  platforms: $VALUE\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-get-platform-class-method
  message: Rename method getPlatform to getBinaryTargetForCurrentPlatform
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "class $CLASS {\n  getPlatform(...) { ... }\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-async-get-platform-class-method
  message: Rename method getPlatform to getBinaryTargetForCurrentPlatform
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "class $CLASS {\n  async getPlatform(...) { ... }\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-this-get-platform-call
  message: Rename method getPlatform to getBinaryTargetForCurrentPlatform
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: this.getPlatform(...)
  - pattern-not: this.getBinaryTargetForCurrentPlatform(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-get-platform-function-export
  message: Rename function getPlatform to getBinaryTargetForCurrentPlatform
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export function getPlatform(...) { ... }
  - pattern-not: export function getBinaryTargetForCurrentPlatform(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-platform-internal-function-export
  message: Rename function getPlatformInternal to getBinaryTargetForCurrentPlatformInternal
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export function getPlatformInternal(...) { ... }
  - pattern-not: export function getBinaryTargetForCurrentPlatformInternal(...) {
      ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-platform-async-function-export
  message: Rename function getPlatform to getBinaryTargetForCurrentPlatform
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export async function getPlatform(...) { ... }
  - pattern-not: export async function getBinaryTargetForCurrentPlatform(...) { ...
      }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-platform-internal-function-declaration
  message: Rename function getPlatformInternal to getBinaryTargetForCurrentPlatformInternal
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: function getPlatformInternal(...) { ... }
  - pattern-not: function getBinaryTargetForCurrentPlatformInternal(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-platform-return-type
  message: Rename type Platform to BinaryTarget in return type
  severity: WARNING
  languages:
  - typescript
  pattern: 'function $FUNC(...): Platform { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-platforms-array-export
  message: Rename exported variable platforms to binaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'export const platforms = [...]

      '
  - pattern-not: 'export const binaryTargets = [...]

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-platforms-ts-file
  message: File platforms.ts should be renamed to binaryTargets.ts
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/platforms.ts'
- id: detect-platforms-function-parameter
  message: Rename parameter platforms to binaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: function $FUNC(platforms, ...) { ... }
    - pattern: function $FUNC(..., platforms) { ... }
    - pattern: function $FUNC(..., platforms, ...) { ... }
  - pattern-not: function $FUNC(binaryTargets, ...) { ... }
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-platforms-destructuring-single
  message: Rename destructured property platforms to binaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const { platforms } = $OBJ
  - pattern-not: const { binaryTargets } = $OBJ
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-platforms-destructuring-multiple
  message: Rename destructured property platforms to binaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const { ..., platforms, ... } = $OBJ
  - pattern-not: const { ..., binaryTargets, ... } = $OBJ
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-platform-includes-function
  message: Variable platforms should be renamed to binaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: platforms.includes(...)
  - pattern-not: binaryTargets.includes(...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-platform-internal-variable
  message: Replace getPlatformInternal() with getBinaryTargetForCurrentPlatformInternal()
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const $VAR = getPlatformInternal(...)
  - pattern-not: const $VAR = getBinaryTargetForCurrentPlatformInternal(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-node-api-name-function
  message: Rename parameter platform to binaryTarget in getNodeAPIName
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: function getNodeAPIName(platform, ...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-export-get-node-api-name-function
  message: Rename parameter platform to binaryTarget in getNodeAPIName
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: export function getNodeAPIName(platform, ...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-platforms-includes-call
  message: Rename variable platforms to binaryTargets
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: platforms.includes($VALUE)
  - pattern-not: binaryTargets.includes($VALUE)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-platform-optional-chaining
  message: Rename variable platform to binaryTarget
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: platform?.$PROP
  - pattern-not: binaryTarget?.$PROP
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-platform-internal-describe
  message: Update test describe block to use getBinaryTargetForCurrentPlatformInternal
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'describe(''getPlatformInternal'', ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-platforms-object-shorthand
  message: Rename property platforms to binaryTargets in object shorthand
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '{ ..., platforms, ... }'
  - pattern-not: '{ ..., binaryTargets, ... }'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-platform-return-statement
  message: Rename variable platform to binaryTarget in return statement
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: return platform
  - pattern-not: return binaryTarget
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
