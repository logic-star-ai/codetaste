- id: detect-jsc-namespace-var-excluding-codegen
  message: Detected direct field access on jsc namespace alias (excluding pre-existing
    files)
  severity: INFO
  languages:
  - generic
  patterns:
  - pattern: jsc.$FIELD
  - pattern-inside: 'const jsc = bun.jsc;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 638
    nr_legacy_patterns: 0
  paths:
    exclude:
    - src/codegen/*.ts
    - src/bun.js/Debugger.zig
    - src/bun.js/WTFTimer.zig
    - src/bun.js/bindings/JSBigInt.zig
    - src/bun.js/jsc/host_fn.zig
    - src/bun.js/node/time_like.zig
    - src/bun.js/web_worker.zig
    - src/bun.js/webcore/ByteBlobLoader.zig
    - src/bun.js/webcore/ByteStream.zig
