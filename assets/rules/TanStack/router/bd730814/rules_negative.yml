    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - packages/react-router/src/link.tsx
    - packages/react-router/src/link.ts
    - packages/solid-router/src/link.tsx
    - packages/solid-router/src/link.ts
- id: detect-link-types-in-react-router-link-file
  message: Link-related types like NavigateOptions, ToOptions, LinkOptions should
    be imported from @tanstack/router-core, not defined in react-router/link
  severity: WARNING
  languages:
  - typescript
  pattern-regex: ^\s*export\s+type\s+(NavigateOptions|ToOptions|LinkOptions|ToPathOption)\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - packages/react-router/src/link.tsx
    - packages/react-router/src/link.ts
- id: detect-link-types-in-solid-router-link-file
  message: Link-related types like NavigateOptions, ToOptions, LinkOptions should
