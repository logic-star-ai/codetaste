rules:
- id: detect-routeinfo-imports-from-local
  message: Types from routeInfo should be imported from @tanstack/router-core after
    migration
  severity: WARNING
  languages:
  - typescript
  pattern-regex: import.*from\s+['"]\.\/routeInfo['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - packages/react-router/src/*.ts
    - packages/react-router/src/*.tsx
    - packages/solid-router/src/*.ts
    - packages/solid-router/src/*.tsx
- id: detect-relative-to-path-types-in-link-files
  message: Path resolution types should be imported from @tanstack/router-core, not
    defined in framework-specific link files
  severity: WARNING
  languages:
  - typescript
  pattern-regex: ^\s*export\s+type\s+(RelativeToPath|RelativeToParentPath|RelativeToCurrentPath|AbsoluteToPath)\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - packages/react-router/src/link.tsx
    - packages/react-router/src/link.ts
    - packages/solid-router/src/link.tsx
    - packages/solid-router/src/link.ts
- id: detect-param-types-in-link
  message: Parameter types should be imported from @tanstack/router-core, not defined
    locally
  severity: WARNING
  languages:
  - typescript
  pattern-regex: ^\s*export\s+type\s+.*Param.*\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - packages/react-router/src/link.tsx
    - packages/react-router/src/link.ts
    - packages/solid-router/src/link.tsx
    - packages/solid-router/src/link.ts
- id: detect-relative-path-type-exports
