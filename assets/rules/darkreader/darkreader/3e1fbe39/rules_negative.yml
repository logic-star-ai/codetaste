rules:
- id: private-async-method-destructured-untyped
  message: Private async method with destructured parameter missing explicit type
    annotation
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-regex: private\s+async\s+\w+\s*\(\s*\{[^}:]+\}\s*\)
  - pattern-not-regex: private\s+async\s+\w+\s*\(\s*\{[^}]+\}\s*:\s*\w+
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: function-with-untyped-config-param
  message: Function parameter 'local' in config object needs explicit type annotation
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'function $FUNC({local}) { ... }

        '
    - pattern: 'function $FUNC({local, ...}) { ... }

        '
  - pattern-not: 'function $FUNC({local}: $TYPE) { ... }

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: function-destructured-param-without-type
  message: Function with destructured parameter missing explicit type annotation
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-regex: function\s+\w+\s*\(\s*\{[^}:]+\}\s*\)
