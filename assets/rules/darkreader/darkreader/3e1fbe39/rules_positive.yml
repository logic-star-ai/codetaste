rules:
- id: destructured-param-typed-props
  message: Destructured parameter with typed properties
  severity: INFO
  languages:
  - typescript
  pattern-regex: \(\s*\{[^}]+\}\s*:\s*\{[^}]+:\s*\w+
  metadata:
    category: basic
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: function-param-with-object-type
  message: Function destructured parameter has explicit object type
  severity: INFO
  languages:
  - typescript
  pattern: 'function $FUNC({..., $PROP, ...}: {$PROP: $TYPE}) { ... }

    '
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: nextintervaltime-typed-params
  message: nextIntervalTime function has typed time parameters
  severity: INFO
  languages:
  - typescript
  pattern-regex: function\s+nextIntervalTime\s*\(\s*time1\s*:\s*number\[\]\s*,\s*time2\s*:\s*number\[\]\s*,\s*currentTime\s*:\s*number\[\]
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/time.ts'
- id: time-nextintervaltime-typed-number-arrays
  message: nextIntervalTime function parameters typed as number[]
  severity: INFO
  languages:
  - typescript
  pattern-regex: nextIntervalTime\s*\(\s*time1\s*:\s*number\[\]
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*time.ts'
- id: extension-alarm-listener-typed
  message: alarmListener has typed alarm parameter
  severity: INFO
  languages:
  - typescript
  pattern-regex: alarmListener\s*=\s*\(\s*alarm\s*:\s*\w+
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*extension.ts'
- id: select-onrender-node-typed
  message: onRender function has typed node parameter
  severity: INFO
  languages:
  - typescript
  pattern-regex: function\s+onRender\s*\(\s*node\s*:\s*\w+
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/select/*.tsx'
- id: extension-getconnectionmessage-typed-params
  message: getConnectionMessage method has typed string parameters
  severity: INFO
  languages:
  - typescript
  pattern-regex: getConnectionMessage\s*\(\s*url\s*:\s*string\s*,\s*frameURL\s*:\s*string
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*extension.ts'
- id: extension-oncolorschemechange-typed-param
  message: onColorSchemeChange has typed destructured parameter
  severity: INFO
  languages:
  - typescript
  pattern-regex: onColorSchemeChange\s*=\s*\(\s*\{\s*isDark\s*\}\s*:\s*\{
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*extension.ts'
- id: ext-getconnmsg-url-string-type
  message: getConnectionMessage has url typed as string
  severity: INFO
  languages:
  - typescript
  pattern-regex: private\s+getConnectionMessage\s*\(\s*url\s*:\s*string
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*extension.ts'
- id: time-nextint-time2-numarray
  message: time2 parameter typed as number[]
  severity: INFO
  languages:
  - typescript
  pattern-regex: time2\s*:\s*number\[\]\s*,
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*time.ts'
- id: time-nextint-curtime-numarray
  message: currentTime parameter typed as number[]
  severity: INFO
  languages:
  - typescript
  pattern-regex: currentTime\s*:\s*number\[\]\s*,
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*time.ts'
- id: ext-getconnmsg-frameurl-string
  message: frameURL parameter typed as string in function
  severity: INFO
  languages:
  - typescript
  pattern-regex: frameURL\s*:\s*string\s*\)\s*\{
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*extension.ts'
- id: time-nextinterval-four-typed-params
  message: nextIntervalTime has four typed parameters including number[] and Date
  severity: INFO
  languages:
  - typescript
  pattern-regex: nextIntervalTime\s*\(\s*time1\s*:\s*number\[\]\s*,\s*time2\s*:\s*number\[\]\s*,\s*currentTime\s*:\s*number\[\]\s*,\s*date\s*:\s*Date\s*\)
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*time.ts'
- id: ext-getconnmsg-url-frameurl-typed
  message: getConnectionMessage has both url and frameURL typed as string
  severity: INFO
  languages:
  - typescript
  pattern-regex: getConnectionMessage\s*\(\s*url\s*:\s*string\s*,\s*frameURL\s*:\s*string\s*\)
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*extension.ts'
- id: ext-oncolorsch-isdark-destr-typed
  message: 'onColorSchemeChange has destructured isDark: boolean parameter'
  severity: INFO
  languages:
  - typescript
  pattern-regex: onColorSchemeChange\s*=\s*\(\s*\{\s*isDark\s*\}\s*:\s*\{\s*isDark\s*:\s*boolean\s*\}\s*\)
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*extension.ts'
