- id: register-inbound-with-json-loader
  message: Replace JsonConfigLoader with direct registration pattern
  severity: WARNING
  languages:
  - go
  pattern: 'config.RegisterInboundConnectionConfig($NAME, json.JsonConfigLoader(...))

