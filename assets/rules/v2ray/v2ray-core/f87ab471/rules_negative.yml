rules:
- id: import-internal-config
  message: JSON packages being removed - consolidate into config_json.go files
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/v2ray/v2ray-core/proxy/internal/config\"\
    \n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - proxy/*/json/*.go
- id: json-package-declaration
  message: Separate JSON package - should be consolidated into config_json.go with
    build tag
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package json
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - proxy/*/json/*.go
    - proxy/*/*/json/*.go
- id: user-getter-method-id
  message: Replace user.ID() with direct field access user.ID
  severity: WARNING
  languages:
  - go
  pattern: $USER.ID()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: json-config-loader-usage
  message: Remove JsonConfigLoader wrapper, use direct json.Unmarshal registration
  severity: WARNING
  languages:
  - go
  pattern: json.JsonConfigLoader(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: import-internal-json-config
  message: Remove import of proxy/internal/config/json - package should be deleted
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/v2ray/v2ray-core/proxy/internal/config/json\"\
    \n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: separate-json-config-loader-call
  message: JsonConfigLoader call - replace with direct registration
  severity: WARNING
  languages:
  - go
  pattern: json.JsonConfigLoader(func() interface{} { return $EXPR })
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: config-struct-pointer-in-json-loader
  message: Config instantiation in JsonConfigLoader - migrate to direct pattern
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: return &$TYPE{...}
  - pattern-inside: "json.JsonConfigLoader(func() interface{} {\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: json-loader-return-config-pointer
  message: JsonConfigLoader with struct literal - replace with direct registration
  severity: WARNING
  languages:
  - go
  pattern: "json.JsonConfigLoader(func() interface{} {\n  return &$CONFIG{...}\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: json-import-encoding-json-in-json-pkg
  message: JSON package with encoding/json - consolidate into config_json.go
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"encoding/json\"\n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - proxy/*/json/*.go
    - proxy/*/*/json/*.go
- id: new-config-pointer-in-json-loader
  message: new() in JsonConfigLoader - migrate to direct struct instantiation
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: return new($TYPE)
  - pattern-inside: "json.JsonConfigLoader(func() interface{} {\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: json-loader-return-new-config
  message: JsonConfigLoader with new() - replace with direct registration
  severity: WARNING
  languages:
  - go
  pattern: "json.JsonConfigLoader(func() interface{} {\n  return new($CONFIG)\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: blank-import-json-socks
  message: Remove blank import of proxy/socks/json - JSON parsing moved to config_json.go
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  _ \"github.com/v2ray/v2ray-core/proxy/socks/json\"\n\
    \  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: json-config-custom-unmarshal
  message: Custom UnmarshalJSON in JSON package - move to config_json.go with build
    tag
  severity: WARNING
  languages:
  - go
  pattern: "func ($THIS *$TYPE) UnmarshalJSON($DATA []byte) error {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - proxy/*/json/*.go
    - proxy/*/*/json/*.go
- id: json-test-assert-bool-hasaccount
  message: Test calling HasAccount() in JSON package - update after refactoring
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'assert.Bool($VAR.HasAccount($U, $P)).$METHOD()

      '
  - pattern-inside: 'package json

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: blank-import-json-dokodemo
  message: Remove blank import of proxy/dokodemo/json - JSON parsing moved to config_json.go
