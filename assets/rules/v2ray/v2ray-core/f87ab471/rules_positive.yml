  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type Config struct {\n  $FIELD1 $TYPE1\n  ...\n}\n"
  - pattern-not-inside: "type Config interface {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/*/config.go'
- id: detect-config-as-struct-parameter-type
  message: Detected function with *Config parameter type - pointer struct parameter
    instead of interface
  severity: INFO
  languages:
  - go
  pattern: "func $FUNCNAME($PARAM1 $TYPE1, config *Config) $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/**/*.go'
    exclude:
    - '**/proxy/**/json/**'
