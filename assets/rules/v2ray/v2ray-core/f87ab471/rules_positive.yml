rules:
- id: detect-json-struct-tag-usage
  message: Detected JSON struct tags in config_json.go - JSON-specific types consolidated
  severity: INFO
  languages:
  - go
  pattern-regex: '`json:"[^"]+"`'
  metadata:
    category: config
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-build-json-comment-directive
  message: Detected +build json directive - conditional compilation for JSON support
    enabled
  severity: INFO
  languages:
  - go
  pattern-regex: (?m)^//\s*\+build\s+json\s*$
  metadata:
    category: config
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
- id: detect-build-json-tag-in-config-files
  message: Detected '// +build json' tag - indicates JSON config has been moved to
    conditional compilation
  severity: INFO
  languages:
  - go
  pattern-regex: ^//\s*\+build\s+json
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-config-json-file-existence
  message: Detected config_json.go file - indicates JSON parsing moved from separate
    json/ package
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-init-function-in-config-json
  message: Detected init function in config_json.go - JSON config registration moved
    to conditional compilation file
  severity: INFO
  languages:
  - go
  pattern: "func init() {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-proxy-config-import
  message: Detected proxy internal config import in config_json.go - consolidated
    config registration
  severity: INFO
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/v2ray/v2ray-core/proxy/internal/config\"\
    \n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-package-main-build-tag
  message: Detected +build json tag in config_json.go - conditional compilation tag
    applied
  severity: INFO
  languages:
  - go
  pattern-regex: (?m)^//\s*\+build\s+json
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-config-registration-init
  message: Detected config registration in init() within config_json.go - consolidated
    registration
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func init() {\n  config.$REGISTER(..., ...)\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-github-v2ray-proxy-config-import
  message: Detected internal config package import - unified registration mechanism
  severity: INFO
  languages:
  - go
  pattern: 'import "github.com/v2ray/v2ray-core/proxy/internal/config"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-build-json-with-blank-line
  message: Detected proper +build json tag with blank line - correct build constraint
    format
  severity: INFO
  languages:
  - go
  pattern-regex: (?m)^//\s*\+build\s+json\s*\n\s*\n
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-any-config-json-file-in-proxy
  message: Detected config_json.go anywhere in proxy tree - JSON logic consolidated
    with build tags
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/**/config_json.go'
- id: detect-json-unmarshal-in-config-json
  message: Detected direct json.Unmarshal usage in config_json.go - refactored from
    JsonConfigLoader wrapper
  severity: INFO
  languages:
  - go
  pattern: json.Unmarshal(...)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-config-json-go-in-proxy-dirs
  message: Detected config_json.go file in proxy directory - JSON logic moved from
    json/ subpackage
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/blackhole/config_json.go'
    - '**/proxy/dokodemo/config_json.go'
    - '**/proxy/freedom/config_json.go'
    - '**/proxy/http/config_json.go'
    - '**/proxy/socks/config_json.go'
- id: detect-config-json-in-proxy-package
  message: Detected config_json.go directly in proxy package - flat structure without
    json/ subdirectory
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/*/config_json.go'
- id: detect-config-struct-field-with-exported-name
  message: Detected Config struct with exported fields - refactored from interface
    with getter methods
  severity: INFO
  languages:
  - go
  pattern: "type Config struct {\n  ...\n  $FIELD $TYPE\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/*/config.go'
    - '**/proxy/*/inbound/config.go'
    - '**/proxy/*/outbound/config.go'
- id: detect-register-inbound-connection-config
  message: Detected RegisterInboundConnectionConfig in config_json.go - JSON config
    registration consolidated
  severity: INFO
  languages:
  - go
  pattern: config.RegisterInboundConnectionConfig($NAME, ...)
  metadata:
    category: config
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-json-import-in-config-json
  message: Detected encoding/json import in config_json.go - direct JSON unmarshaling
  severity: INFO
  languages:
  - go
  pattern: 'import "encoding/json"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-encoding-json-import
  message: Detected encoding/json import in config_json.go - direct JSON unmarshaling
    in conditional file
  severity: INFO
  languages:
  - go
  pattern: "import (\n  ...\n  \"encoding/json\"\n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-type-conversion-to-config-struct
  message: Detected type assertion to *Config - working with concrete struct type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $X.(*Config)
  - pattern-not-inside: "type Config interface {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/**/*.go'
- id: detect-config-struct-with-exported-fields-any-proxy
  message: Detected Config struct with exported field in any proxy - widespread struct
    adoption
  severity: INFO
  languages:
  - go
  pattern: "type Config struct {\n  $FIELD $TYPE\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/*/config.go'
    - '**/proxy/*/*/config.go'
- id: detect-register-outbound-connection-config
  message: Detected RegisterOutboundConnectionConfig in config_json.go - JSON config
    registration consolidated
  severity: INFO
  languages:
  - go
  pattern: config.RegisterOutboundConnectionConfig($NAME, ...)
  metadata:
    category: config
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-config-type-assertion-removed
  message: Detected type assertion for Config - indicates interface-to-struct migration
  severity: INFO
  languages:
  - go
  pattern: '$VAR := $CONFIG.(*Config)

    '
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/**/*.go'
- id: detect-type-assertion-no-interface-check
  message: Detected direct type assertion to *Config - working with concrete type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $X := $Y.(*Config)
  - pattern-not-inside: "if $Z, $OK := $Y.(*Config); $OK {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/**/*.go'
- id: detect-concrete-config-in-handler-struct
  message: Detected handler struct with *Config field - refactored from Config interface
  severity: INFO
  languages:
  - go
  pattern: "type $HANDLER struct {\n  ...\n  config *Config\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/**/*.go'
- id: detect-multiple-config-fields-in-struct
  message: Detected Config struct with multiple exported fields - comprehensive interface-to-struct
    refactoring
  severity: INFO
  languages:
  - go
  pattern: "type Config struct {\n  $FIELD1 $TYPE1\n  $FIELD2 $TYPE2\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/*/config.go'
    - '**/proxy/*/inbound/config.go'
    - '**/proxy/*/outbound/config.go'
- id: detect-config-field-initialization-struct-literal
  message: Detected Config struct literal with field initialization - direct struct
    usage
  severity: INFO
  languages:
  - go
  pattern: "&Config{\n  $FIELD: $VALUE,\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config_json.go'
- id: detect-vmess-config-json-files
  message: Detected config_json.go in vmess subdirectory - JSON config consolidated
    with build tags
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/vmess/inbound/config_json.go'
    - '**/proxy/vmess/outbound/config_json.go'
- id: detect-pointer-config-parameter
  message: Detected function with *Config parameter - pointer struct instead of interface
  severity: INFO
  languages:
  - go
  pattern: "func $NAME($SPACE $SPACETYPE, $CONFIG *Config) $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/proxy/**/dokodemo.go'
    - '**/proxy/**/blackhole.go'
    - '**/proxy/**/freedom.go'
    - '**/proxy/**/socks.go'
- id: detect-config-struct-stored-in-handler
  message: Detected handler storing *Config - concrete struct storage
  severity: INFO
  languages:
  - go
  pattern: "type $HANDLER struct {\n  ...\n  config *Config\n  ...\n}\n"
  metadata:
