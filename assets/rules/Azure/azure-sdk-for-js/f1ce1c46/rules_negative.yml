    vi.spyOn().mockImplementation()
  severity: WARNING
  languages:
  - typescript
  pattern: '$VAR.stub($OBJ, $METHOD)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 87
  paths:
    include:
    - sdk/playwrighttesting/microsoft-playwright-testing/test/**/*.ts
