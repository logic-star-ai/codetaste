rules:
- id: playwright-testing-named-import-no-extension
  message: Named import missing .js extension in microsoft-playwright-testing - ESM
    requires explicit .js extensions for relative imports
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern: 'import { ..., $NAME, ... } from "$PATH"

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: ^\.\.?/
  - metavariable-regex:
      metavariable: $PATH
      regex: ^(?!.*\.js$).*$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 108
  paths:
    include:
    - sdk/playwrighttesting/microsoft-playwright-testing/src/**/*.ts
    - sdk/playwrighttesting/microsoft-playwright-testing/test/**/*.ts
- id: playwright-testing-sinon-stub-method
