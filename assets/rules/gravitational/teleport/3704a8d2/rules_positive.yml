rules:
- id: tctl-commonclient-package-reference
  message: Detected reference to commonclient.InitFunc type
  severity: INFO
  languages:
  - go
  pattern-regex: commonclient\.InitFunc
  metadata:
    category: api
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: tctl-tryrun-with-initfunc-parameter
  message: Detected TryRun method refactored to use commonclient.InitFunc for lazy
    client initialization
  severity: INFO
  languages:
  - go
  pattern: "func ($C *$TYPE) TryRun(ctx context.Context, $CMD string, $FUNC commonclient.InitFunc)\
    \ (bool, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: tctl-tryrun-with-clientfunc-parameter
  message: Detected TryRun method with clientFunc parameter for lazy initialization
  severity: INFO
  languages:
  - go
  pattern: "func ($C *$TYPE) TryRun(ctx context.Context, $CMD string, clientFunc commonclient.InitFunc)\
    \ (bool, error) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: tctl-lazy-client-init-with-clientfunc
  message: Detected clientFunc invocation for lazy auth client initialization
  severity: INFO
  languages:
  - go
  pattern: '$CLIENT, $CLOSE, $ERR := clientFunc(ctx)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: tctl-lazy-init-client-closefn-error
  message: Detected lazy client initialization with close function pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$CLIENT, $CLOSEFN, $ERR := $FUNC($CTX)

      '
  - metavariable-regex:
      metavariable: $CLOSEFN
      regex: ^(closeFn|closeFunc|close)$
  metadata:
    category: basic
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: tctl-error-check-after-clientfunc
  message: Detected error handling after clientFunc call
  severity: INFO
  languages:
  - go
  pattern: "$CLIENT, $CLOSEFN, $ERR := clientFunc($CTX)\nif $ERR != nil {\n  ...\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: tctl-clientfunc-invocation-pattern
  message: Detected clientFunc invocation with ctx parameter
  severity: INFO
  languages:
  - go
  pattern: '$CLIENT, $CLOSEFN, $ERR := clientFunc(ctx)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: tctl-client-init-error-handling
  message: Detected error handling after lazy client initialization
  severity: INFO
  languages:
  - go
  pattern: "$CLIENT, $CLOSEFN, $ERR := clientFunc(ctx)\nif $ERR != nil {\n  return\
    \ $RET, trace.Wrap($ERR)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: tctl-client-variable-from-clientfunc
  message: Detected client variable assignment from clientFunc
  severity: INFO
  languages:
  - go
  pattern: 'client, $CLOSEFN, err := clientFunc(ctx)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: tctl-trace-wrap-after-clientfunc-error
  message: Detected trace.Wrap on clientFunc error
  severity: INFO
  languages:
  - go
  pattern: "$CLIENT, $CLOSEFN, $ERR := clientFunc($CTX)\nif $ERR != nil {\n  return\
    \ $X, trace.Wrap($ERR)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
- id: tctl-closefn-called-after-operation
  message: Detected closeFn called after operation completes
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$CLIENT, $CLOSEFN, $ERR := clientFunc($CTX)

      ...

      $CLOSEFN($CTX)

      '
  - metavariable-regex:
      metavariable: $CLOSEFN
      regex: ^(closeFn|closeFunc)$
  metadata:
    category: basic
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
- id: tctl-defer-closefn-after-client-init
  message: Detected defer closeFn pattern after lazy client initialization
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$CLIENT, $CLOSEFN, $ERR := clientFunc($CTX)

      ...

      defer $CLOSEFN($CTX)

      '
  - metavariable-regex:
      metavariable: $CLOSEFN
      regex: ^(closeFn|closeFunc|close)$
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: tctl-defer-closefn-with-trace
  message: Detected deferred closeFn call pattern
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'defer $CLOSEFN(ctx)

      '
  - metavariable-regex:
      metavariable: $CLOSEFN
      regex: ^(closeFn|closeFunc)$
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: tctl-config-package-files
  message: Detected new config package for tctl configuration handling
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/config/*.go
- id: tctl-test-noop-close-function-return
  message: Detected test returning noop close function
  severity: INFO
  languages:
  - go
  pattern: 'return $CLIENT, func(context.Context) {}, nil

    '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
- id: tctl-closefn-in-return-statement
  message: Detected noop close function in return
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'return ..., func(context.Context) {}, ...

      '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: tctl-client-package-files
  message: Detected new client package for tctl auth client initialization
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/client/*.go
- id: tctl-config-globalcliflags-in-config-package
  message: Detected GlobalCLIFlags moved to config package
  severity: INFO
  languages:
  - go
  pattern: "package config\n\n...\n\ntype GlobalCLIFlags struct {\n  ...\n}\n"
  metadata:
