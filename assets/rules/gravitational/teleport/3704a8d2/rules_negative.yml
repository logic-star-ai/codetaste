      ...

      $CLIENT, $ERR := authclient.Connect($CTX, $CLIENTCONFIG)

      '
  - pattern-inside: "func TryRun(...) error {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
