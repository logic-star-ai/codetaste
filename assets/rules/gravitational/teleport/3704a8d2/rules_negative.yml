  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "$CLIENT, $ERR := authclient.Connect($CTX, $CONFIG)\n...\n$CLIENT.SetMFAPromptConstructor(...)\n\
      ...\nfor _, $C := range $COMMANDS {\n  ...\n}\n"
  - pattern-inside: 'package common

      ...

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tctl-authclient-connect-no-func-wrapper
  message: authclient.Connect called directly instead of being wrapped in InitFunc.
    Refactor to use lazy initialization.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$CLIENT, $ERR := authclient.Connect($CTX, ...)

      '
  - pattern-not-inside: "$FUNC := func($CTX context.Context) (...) {\n  ...\n  $CLIENT,\
      \ $ERR := authclient.Connect($CTX, ...)\n  ...\n}\n"
  - pattern-inside: "func TryRun(...) error {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
