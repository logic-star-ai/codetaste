    nr_legacy_patterns: 1
- id: tctl-tryrun-func-eager-client-init
  message: TryRun function eagerly initializes auth client before command matching.
    Should use lazy initialization with InitFunc.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func TryRun($COMMANDS []CLICommand, $ARGS []string) error {\n  ...\n\
      \  $CLIENT, $ERR := authclient.Connect($CTX, $CLIENTCONFIG)\n  ...\n  for $_,\
      \ $C := range $COMMANDS {\n    $MATCH, $ERR = $C.TryRun($CTX, $SELECTEDCMD,\
      \ $CLIENT)\n    ...\n  }\n  ...\n}\n"
  - pattern-inside: 'package common

      ...

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tctl-auth-client-connect-before-version-check
  message: Version command check should short-circuit before any auth client initialization.
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "if $SELECTED == $VER.FullCommand() {\n  ...\n}\n...\n$CLIENT, $ERR :=\
      \ authclient.Connect(...)\n"
  - pattern-not: "$CLIENT, $ERR := authclient.Connect(...)\n...\nif $SELECTED == $VER.FullCommand()\
      \ {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tctl-missing-lazy-init-wrapper-function
  message: File should define or use InitFunc wrapper for lazy auth client initialization.
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: .*func.*InitFunc.*
  - pattern-regex: .*authclient\.Connect.*
  - pattern-inside: 'package common

      ...

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tool/tctl/common/tctl.go
