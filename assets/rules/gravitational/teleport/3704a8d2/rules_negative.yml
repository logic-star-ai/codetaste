rules:
- id: tctl-tryrun-old-authclient-signature
  message: TryRun method uses old signature with *authclient.Client instead of lazy
    InitFunc. Refactor to use commonclient.InitFunc parameter for lazy client initialization.
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV $TYPE) TryRun($CTX context.Context, $CMD string, $CLIENT *authclient.Client)\
    \ ($MATCH bool, $ERR error) {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: tctl-no-commonclient-import
  message: Command file doesn't import commonclient package. Likely uses old eager
    initialization pattern.
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: .*commonclient.*
  - pattern-regex: .*func.*TryRun.*authclient\.Client.*
  - pattern-inside: 'package common

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
  paths:
    include:
    - tool/tctl/common/*_command.go
- id: tctl-applyconfig-called-before-version
  message: ApplyConfig called without checking for version command first. Version
    shouldn't require config.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$CFG.Debug = $CCF.Debug

      $CLIENTCONFIG, $ERR := ApplyConfig(&$CCF, $CFG)

      ...

      '
  - pattern-not: "if $SELECTED == $VER.FullCommand() {\n  ...\n  return nil\n}\n...\n\
      $CLIENTCONFIG, $ERR := ApplyConfig(...)\n...\n"
  - pattern-inside: "func TryRun(...) error {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: tctl-version-command-with-client-requirement
  message: Version command check happens after client initialization setup. Version
    command should not require auth client connection.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "if $SELECTED == $VER.FullCommand() {\n  ...\n  return nil\n}\n...\n\
      $CLIENT, $ERR := authclient.Connect(...)\n...\n"
  - metavariable-pattern:
      metavariable: $VER
      pattern-regex: ver
  - pattern-not: "if $SELECTED == $VER.FullCommand() {\n  ...\n  return nil\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: tctl-clicommand-interface-old-signature
  message: CLICommand interface defines TryRun with old *authclient.Client parameter.
    Should use commonclient.InitFunc instead.
  severity: WARNING
  languages:
  - go
  pattern: "type CLICommand interface {\n  ...\n  TryRun(..., $CLIENT *authclient.Client)\
    \ (...)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tctl-authclient-connect-eager-initialization
  message: Auth client is eagerly initialized with authclient.Connect before command
    execution. Should use lazy initialization pattern.
  severity: WARNING
  languages:
  - go
  pattern: "$CLIENT, $ERR := authclient.Connect($CTX, $CONFIG)\nif $ERR != nil {\n\
    \  ...\n}\n...\nfor _, $CMD := range $COMMANDS {\n  ...\n  $CMD.TryRun(...)\n\
    \  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tctl-globalcliflags-missing-lazy-init
  message: GlobalCLIFlags structure may need to support lazy initialization pattern.
    Verify if InitFunc field is needed.
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "type GlobalCLIFlags struct {\n  ...\n}\n"
  - pattern-not: "type GlobalCLIFlags struct {\n  ...\n  $FIELD InitFunc\n  ...\n\
      }\n"
  - pattern-inside: 'package common

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
