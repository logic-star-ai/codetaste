rules:
- id: tbot-initcmd-flag-to-cliconf
  message: 'Old pattern: init command flag bound to CLIConf field. Use per-command
    struct in cli package.'
  severity: WARNING
  languages:
  - go
  pattern: 'initCmd.Flag($NAME, $MSG).StringVar(&$CF.$FIELD)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - tool/tbot/main.go
- id: tbot-old-proxy-server-envar
  message: proxyServerEnvVar constant usage. Should be managed by AuthProxyArgs in
    new architecture.
  severity: WARNING
  languages:
  - go
  pattern: 'proxyServerEnvVar

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - tool/tbot/main.go
- id: tbot-old-fromcliconf-function-call
  message: FromCLIConf() function call detected. Replace with LoadConfigWithMutators()
    pattern that chains mutators to build final config.
  severity: WARNING
  languages:
  - go
  pattern: 'config.FromCLIConf($ARG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: tbot-old-start-command-flag-registration
