    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: tctl-insecure-flag-usage
  message: Insecure flag used in config; ensure lazy init pattern preserves this
  severity: INFO
  languages:
  - go
  pattern: '$CLIENTCONFIG.TLS.InsecureSkipVerify = $CCF.Insecure

