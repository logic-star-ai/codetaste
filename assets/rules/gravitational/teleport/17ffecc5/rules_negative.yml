  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client)\
      \ (...) {\n  ...\n}\n"
  - pattern: "if $CMD == $CLAUSE.FullCommand() {\n  ...\n}\n"
