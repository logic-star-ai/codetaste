rules:
- id: tctl-client-setssomfa-before-command-match
  message: Client SSO MFA configuration before command matching; should be part of
    lazy init
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "...\n$CLIENT.SetSSOMFACeremonyConstructor(...)\n...\nfor ..., $CMD :=\
      \ range $COMMANDS {\n  ...\n}\n...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 219
  paths:
    include:
    - tool/tctl/common/tctl.go
- id: tctl-client-setmfaprompt-before-command-match
  message: Client MFA configuration before command matching; should be part of lazy
    init
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "...\n$CLIENT.SetMFAPromptConstructor(...)\n...\nfor ..., $CMD := range\
      \ $COMMANDS {\n  ...\n}\n...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 214
  paths:
    include:
    - tool/tctl/common/tctl.go
- id: tctl-client-ping-before-command-match
  message: Client.Ping called before command matching; should be part of lazy init
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "...\n$RESP, $ERR := $CLIENT.Ping($CTX)\n...\nfor ..., $CMD := range\
      \ $COMMANDS {\n  ...\n}\n...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 199
  paths:
    include:
    - tool/tctl/common/tctl.go
- id: tctl-auth-client-connect-before-command-match
  message: Auth client is initialized before command matching; should use lazy initialization
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "...\n$CLIENT, $ERR := authclient.Connect(...)\n...\nfor ..., $CMD :=\
      \ range $COMMANDS {\n  $MATCH, $ERR = $CMD.TryRun(...)\n  ...\n}\n...\n"
  - pattern-not: "...\n$INITFUNC := ...\n...\nfor ..., $CMD := range $COMMANDS {\n\
      \  $MATCH, $ERR = $CMD.TryRun(..., $INITFUNC)\n  ...\n}\n...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 189
- id: tctl-dialer-init-before-command-match
  message: Dialer initialized before command matching; should be part of lazy init
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "...\n$DIALER, $ERR := reversetunnelclient.NewTunnelAuthDialer(...)\n\
      ...\nfor ..., $CMD := range $COMMANDS {\n  ...\n}\n...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 174
  paths:
    include:
    - tool/tctl/common/tctl.go
- id: tctl-resolver-init-before-command-match
  message: Resolver initialized before command matching; should be part of lazy init
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "...\n$RESOLVER, $ERR := reversetunnelclient.CachingResolver(...)\n...\n\
      for ..., $CMD := range $COMMANDS {\n  ...\n}\n...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 164
  paths:
    include:
    - tool/tctl/common/tctl.go
- id: tctl-command-method-call-with-client-param
  message: Command method called with direct client parameter from TryRun; use InitFunc
    pattern
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client)\
      \ (...) {\n  ...\n}\n"
  - pattern-either:
    - pattern: $RECV.$METHOD($CTX, $CLIENT)
    - pattern: $RECV.$METHOD($CLIENT)
    - pattern: $ERR = $RECV.$METHOD($CTX, $CLIENT)
    - pattern: $ERR = $RECV.$METHOD($CLIENT)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 139
- id: tctl-err-assignment-in-switch
  message: Method call in TryRun with old signature; refactor to accept InitFunc
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client)\
      \ (...) {\n  ...\n}\n"
  - pattern: '$ERR = $RECV.$METHOD(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 68
  paths:
    include:
    - tool/tctl/common/*_command.go
- id: tctl-tryrun-accepts-authclient-directly
  message: TryRun method should accept InitFunc instead of *authclient.Client for
    lazy initialization
  severity: WARNING
  languages:
  - go
  pattern: 'func ($RECV *$CMDTYPE) TryRun($CTX context.Context, $CMD string, $CLIENT
    *authclient.Client) (...)  { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: tctl-tryrun-parameter-type-authclient
  message: TryRun parameter should be InitFunc type instead of *authclient.Client
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client,
      ...) (...) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: tctl-initialize-missing-globalcliflags
  message: Initialize method should accept *GlobalCLIFlags parameter for lazy initialization
    support
  severity: WARNING
  languages:
  - go
  pattern: 'func ($RECV *$CMDTYPE) Initialize($APP *kingpin.Application, $CFG *servicecfg.Config)
    { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: tctl-return-false-nil-tryrun
  message: TryRun default return with old signature; refactor to accept InitFunc
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client)\
      \ (...) {\n  ...\n}\n"
  - pattern: 'return false, nil

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: tctl-any-command-tryrun-old-sig
  message: Command TryRun method accepts *authclient.Client; should accept InitFunc
    for lazy initialization
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$CMDTYPE) TryRun($CTX context.Context, $CMD string, $CLIENT\
      \ *authclient.Client) ($MATCH bool, $ERR error) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CMDTYPE
      regex: .*Command$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - tool/tctl/common/*.go
- id: tctl-tryrun-return-bool-error
  message: TryRun accepts *authclient.Client parameter; refactor to accept InitFunc
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client) (bool,\
      \ error) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CMDTYPE
      regex: .*Command$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - tool/tctl/common/*.go
- id: tctl-tryrun-returns-match-true
  message: TryRun returns with old signature; should accept InitFunc instead of *authclient.Client
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client)\
      \ (bool, error) {\n  ...\n}\n"
  - pattern: 'return true, trace.Wrap($ERR)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: tctl-command-initialize-old-sig
  message: Command Initialize method missing GlobalCLIFlags parameter for lazy initialization
    support
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$CMDTYPE) Initialize($APP *kingpin.Application, $CFG *servicecfg.Config)\
      \ {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CMDTYPE
      regex: .*Command$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
  paths:
    include:
    - tool/tctl/common/*.go
- id: tctl-trace-wrap-err-in-tryrun
  message: TryRun returns with old signature accepting *authclient.Client; refactor
    to InitFunc
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client)\
      \ (...) {\n  ...\n}\n"
  - pattern: 'return true, trace.Wrap(err)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
- id: tctl-client-parameter-named-client
  message: TryRun parameter 'client' is *authclient.Client; should be InitFunc type
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'func ($RECV *$CMDTYPE) TryRun(...) (...) { ... }

      '
  - pattern: "func ($RECV *$CMDTYPE) TryRun($CTX context.Context, $CMD string, client\
      \ *authclient.Client) (...) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: tctl-switch-cmd-with-methods
  message: Switch on cmd in TryRun with old signature; refactor to accept InitFunc
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client)\
      \ (...) {\n  ...\n}\n"
  - pattern: "switch $CMD {\ncase ...:\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: tctl-command-tryrun-passes-client-to-methods
  message: TryRun passes client directly to methods; should obtain client from InitFunc
    first
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client) (...) {\n\
    \  ...\n  $ERR = $RECV.$METHOD(..., $CLIENT)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: tctl-command-switch-statement-pattern
  message: Switch statement in TryRun with old signature; refactor to accept InitFunc
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMDTYPE) TryRun($CTX context.Context, $CMD string,\
      \ $CLIENT *authclient.Client) (bool, error) {\n  ...\n}\n"
  - pattern-either:
    - pattern: "switch $CMD {\ncase $CLAUSE1.FullCommand():\n  $ERR = ...\ncase $CLAUSE2.FullCommand():\n\
        \  $ERR = ...\ndefault:\n  return false, nil\n}\n"
    - pattern: "switch $CMD {\ncase $CLAUSE.FullCommand():\n  $ERR = ...\ndefault:\n\
        \  return false, nil\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: tctl-servicecfg-config-parameter
  message: Initialize method missing GlobalCLIFlags parameter for lazy init refactoring
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$CMDTYPE) Initialize($APP *kingpin.Application, config\
      \ *servicecfg.Config) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CMDTYPE
      regex: .*Command$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
  paths:
    include:
    - tool/tctl/common/*_command.go
- id: tctl-command-receiver-pattern
  message: Command TryRun with receiver 'c' accepts *authclient.Client; refactor to
    InitFunc
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func (c *$CMDTYPE) TryRun(ctx context.Context, cmd string, client *authclient.Client)\
      \ (bool, error) {\n  ...\n  return $MATCH, trace.Wrap($ERR)\n}\n"
  - metavariable-regex:
      metavariable: $CMDTYPE
      regex: ^[A-Z].*Command$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: tctl-command-app-variable
  message: Initialize assigns app command without GlobalCLIFlags param; add flags
    parameter
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMDTYPE) Initialize($APP *kingpin.Application,\
      \ $CFG *servicecfg.Config) {\n  ...\n}\n"
  - pattern: '$RECV.$FIELD = $APP.Command(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - tool/tctl/common/*_command.go
- id: tctl-tryrun-err-variable-with-client
  message: TryRun with old signature (accepts *authclient.Client); refactor to InitFunc
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMDTYPE) TryRun(..., $CLIENT *authclient.Client)\
      \ (bool, error) {\n  ...\n}\n"
  - pattern-either:
    - pattern: 'var $ERR error

        '
    - pattern: '$ERR := ...

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - tool/tctl/common/*_command.go
- id: tctl-showclusteralerts-after-commands
  message: ShowClusterAlerts uses direct client after command loop; client should
    be from lazy init
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "for ..., $C := range $COMMANDS {\n  ...\n}\n...\ncommon.ShowClusterAlerts($CTX,\
      \ $CLIENT, ...)\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - tool/tctl/common/tctl.go
- id: tctl-cmd-fullcommand-comparison-with-client
  message: Command matching in TryRun with old signature; refactor to accept InitFunc
