rules:
- id: tctl-refactor-import-both-new-packages
  message: Detected imports of both new client and config packages
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'import commonclient "github.com/gravitational/teleport/tool/tctl/common/client"

        '
    - pattern: 'import tctlcfg "github.com/gravitational/teleport/tool/tctl/common/config"

        '
  - pattern-either:
    - pattern: 'import tctlcfg "github.com/gravitational/teleport/tool/tctl/common/config"

        '
    - pattern: 'import commonclient "github.com/gravitational/teleport/tool/tctl/common/client"

        '
  metadata:
    category: dependency
    nr_refactored_patterns: 71
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/*.go
- id: tctl-refactor-error-wrap-after-client-init
  message: Detected error wrapping after client initialization
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: '$CLIENT, $CLOSEFN, $ERR := $INITFUNC($CTX)

      ...

      '
  - pattern: 'return $MATCH, trace.Wrap($ERR)

      '
  metadata:
    category: basic
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/*_command.go
- id: tctl-refactor-config-package-import
  message: Detected import of new config package
  severity: INFO
  languages:
  - go
  pattern: 'import "github.com/gravitational/teleport/tool/tctl/common/config"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: tctl-refactor-tctlcfg-import-alias
  message: Detected aliased import of config package as tctlcfg
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: 'import tctlcfg "github.com/gravitational/teleport/tool/tctl/common/config"

      '
  - pattern: "import (\n  ...\n  tctlcfg \"github.com/gravitational/teleport/tool/tctl/common/config\"\
      \n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: tctl-refactor-tctlcfg-qualified-import
  message: Detected qualified import for common/config package
  severity: INFO
  languages:
  - go
  pattern-regex: ^\s*tctlcfg\s+"github\.com/gravitational/teleport/tool/tctl/common/config"
  metadata:
    category: dependency
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: tctl-refactor-client-package-import
  message: Detected import of new client package
  severity: INFO
  languages:
  - go
  pattern: 'import "github.com/gravitational/teleport/tool/tctl/common/client"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
- id: tctl-refactor-commonclient-import-alias
  message: Detected aliased import of common client package
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: 'import commonclient "github.com/gravitational/teleport/tool/tctl/common/client"

      '
  - pattern: "import (\n  ...\n  commonclient \"github.com/gravitational/teleport/tool/tctl/common/client\"\
      \n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
- id: tctl-refactor-common-client-qualified-import
  message: Detected qualified import for common/client package
  severity: INFO
  languages:
  - go
  pattern-regex: ^\s*commonclient\s+"github\.com/gravitational/teleport/tool/tctl/common/client"
  metadata:
    category: dependency
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
- id: tctl-refactor-initfunc-parameter-type
  message: Detected TryRun method with InitFunc parameter type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'func ($RECV *$CMD) TryRun($CTX context.Context, $CMDSTR string, $INITFUNC
      $TYPE) (bool, error) { ... }

      '
  - metavariable-pattern:
      metavariable: $TYPE
      patterns:
      - pattern-either:
        - pattern: InitFunc
        - pattern: $PKG.InitFunc
        - pattern: commonclient.InitFunc
  metadata:
    category: api
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
- id: tctl-refactor-tryrun-with-commonclient-initfunc
  message: Detected TryRun using commonclient.InitFunc type
  severity: INFO
  languages:
  - go
  pattern: 'func ($RECV *$CMD) TryRun($CTX context.Context, $CMDSTR string, $INITFUNC
    commonclient.InitFunc) (bool, error) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
- id: tctl-refactor-globalcliflags-reference
  message: Detected reference to GlobalCLIFlags from config package
  severity: INFO
  languages:
  - go
  pattern-regex: \*tctlcfg\.GlobalCLIFlags|\*config\.GlobalCLIFlags
  metadata:
    category: api
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/*.go
- id: tctl-refactor-initfunc-call-in-tryrun
  message: Detected TryRun method calling initFunc to get client lazily
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func ($RECV *$CMD) TryRun($CTX context.Context, $CMDSTR string, $INITFUNC\
      \ $TYPE) ($MATCH bool, $ERR error) {\n  ...\n  $CLIENT, $CLOSEFN, $ERR := $INITFUNC($CTX)\n\
      \  ...\n}\n"
  - metavariable-pattern:
      metavariable: $TYPE
      patterns:
      - pattern-either:
        - pattern: InitFunc
        - pattern: $PKG.InitFunc
  metadata:
    category: basic
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: tctl-refactor-client-init-within-tryrun-method
  message: Detected client initialization with error check within TryRun
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func ($RECV *$CMD) TryRun($CTX context.Context, $CMDSTR string,\
      \ $INITFUNC $TYPE) (bool, error) {\n  ...\n}\n"
  - pattern: "$CLIENT, $CLOSEFN, $ERR := $INITFUNC($CTX)\nif $ERR != nil {\n  ...\n\
      }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: tctl-refactor-commands-updated-count
  message: Detected TryRun method with InitFunc in signature
  severity: INFO
  languages:
  - go
  pattern-regex: TryRun.*InitFunc
  metadata:
    category: api
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/*_command.go
- id: tctl-refactor-lazy-init-error-return
  message: Detected lazy init with error handling in command
  severity: INFO
  languages:
  - go
  pattern: "$CLIENT, $CLOSEFN, $ERR := $INITFUNC($CTX)\nif $ERR != nil {\n  return\
    \ $RET, trace.Wrap($ERR)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/*_command.go
- id: tctl-refactor-trace-wrap-after-initfunc
  message: Detected trace.Wrap error handling after initFunc call
  severity: INFO
  languages:
  - go
  pattern: "$CLIENT, $CLOSEFN, $ERR := $INITFUNC($CTX)\nif $ERR != nil {\n  return\
    \ $MATCH, trace.Wrap($ERR)\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/*_command.go
- id: tctl-refactor-client-init-match-false-return
  message: Detected client init with false match return on error
  severity: INFO
  languages:
  - go
  pattern: "$CLIENT, $CLOSEFN, $ERR := $INITFUNC($CTX)\nif $ERR != nil {\n  return\
    \ false, $WRAP\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/*_command.go
- id: tctl-refactor-client-init-if-err-not-nil
  message: Detected client init error handling pattern in command
  severity: INFO
  languages:
  - go
  pattern: "$VAR1, $VAR2, $ERR := $FUNC($CTX)\nif $ERR != nil {\n  return $BOOL, trace.Wrap($ERR)\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/*_command.go
    exclude:
    - tool/tctl/common/bots_command.go
- id: tctl-refactor-defer-close-after-init
  message: Detected defer close pattern after client initialization
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$CLIENT, $CLOSEFN, $ERR := $INITFUNC($CTX)

      ...

      defer $CLOSEFN($CTX)

      '
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: tctl-refactor-client-close-defer-after-error-check
  message: Detected proper defer cleanup after error check for auth client
  severity: INFO
  languages:
  - go
  pattern: "$CLIENT, $CLOSEFN, $ERR := $INITFUNC($CTX)\nif $ERR != nil {\n  ...\n\
    }\ndefer $CLOSEFN($CTX)\n"
  metadata:
    category: basic
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: tctl-refactor-return-client-closefn-error
  message: Detected return of client, close function, and error triple
  severity: INFO
  languages:
  - go
  pattern: 'return $CLIENT, $CLOSEFN, $ERR

    '
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - tool/tctl/common/client/*.go
