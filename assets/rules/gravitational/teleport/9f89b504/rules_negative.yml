    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-old-keyindex-type-declaration
  message: Type declaration 'KeyIndex' should be renamed to 'KeyRingIndex'
  severity: WARNING
  languages:
  - go
  pattern: 'type KeyIndex $TYPE

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-old-keyindex-return-type
  message: Return type 'KeyIndex' should be renamed to 'KeyRingIndex'
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC($...PARAMS) (..., KeyIndex, ...) \n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-old-keymap-declaration
  message: Type alias 'keyMap' should use '*KeyRing' instead of '*Key'
  severity: WARNING
  languages:
  - go
  pattern-regex: type\s+keyMap\s+map\[string\]map\[string\]map\[string\]\*Key
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-old-keyindex-field-in-keyring
  message: Embedded field 'KeyIndex' in KeyRing should be 'KeyRingIndex'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "type $STRUCT struct {\n  ...\n  KeyIndex\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $STRUCT
      pattern: KeyRing
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-old-key-equaleprivatekey-call
  message: Method 'EqualPrivateKey' should be called on KeyRing type
  severity: WARNING
  languages:
