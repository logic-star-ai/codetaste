rules:
- id: detect-old-keyindex-field-access
  message: Struct field access '.KeyIndex' should be renamed to '.KeyRingIndex'
  severity: WARNING
  languages:
  - go
  pattern: $OBJ.KeyIndex
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: detect-old-addkey-call
  message: Function call 'AddKey()' should be renamed to 'AddKeyRing()'
  severity: WARNING
  languages:
  - go
  pattern: $OBJ.AddKey(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: detect-old-keyindex-to-keyringindex
  message: Field access '.KeyIndex' should be '.KeyRingIndex' if part of KeyRing struct
  severity: WARNING
  languages:
  - go
  pattern-regex: \.KeyIndex(?!\.|\s*=)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: detect-old-addkey-addkeyring-mismatch
  message: Call to 'AddKey()' should use KeyRing type variable, not Key
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $STORE.AddKey($KEY)
    - pattern: $AGENT.AddKey($KEY)
  - metavariable-pattern:
      metavariable: $KEY
      patterns:
      - pattern-not: $X.KeyRing
      - pattern-not-regex: .*keyRing.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
- id: detect-old-generatersakey-call
  message: Function call 'GenerateRSAKey()' should be renamed to 'GenerateRSAKeyRing()'
  severity: WARNING
  languages:
  - go
  pattern: $OBJ.GenerateRSAKey(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-old-getcorekey-call
  message: Function call 'GetCoreKey()' should be renamed to 'GetCoreKeyRing()'
  severity: WARNING
  languages:
  - go
  pattern: $OBJ.GetCoreKey(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-old-unloadkey-call
  message: Function call 'UnloadKey()' should be renamed to 'UnloadKeyRing()'
  severity: WARNING
  languages:
  - go
  pattern: $OBJ.UnloadKey(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-old-getkey-with-options
  message: GetKey returns KeyRing type - ensure proper handling
  severity: WARNING
  languages:
  - go
  pattern: $STORE.GetKey($IDX, WithSSHCerts{}, $...OPTS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-old-teleportclienttlsconfig-on-key
  message: Method receiver variable 'key' should be 'keyRing' after refactoring
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $KEY.TeleportClientTLSConfig($...ARGS)
  - metavariable-regex:
      metavariable: $KEY
      regex: ^key$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-old-rootclustername-on-key
  message: Method receiver variable 'key' should be 'keyRing' after refactoring
  severity: WARNING
  languages:
