rules:
- id: detect-stores-with-toast-import
  message: Detected toast import in Pinia store - migrated from ElMessage
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'import { toast } from ''vue-sonner''

      ...

      '
  - pattern-inside: 'import { ... } from ''pinia''

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - src/stores/*.ts
- id: detect-vue-sonner-usage-pattern
  message: Detected vue-sonner import pattern
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { toast } from ''vue-sonner''

        ...

        '
    - pattern: 'import { Toaster } from ''vue-sonner''

        ...

        '
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-toast-function-call
  message: Detected toast method call - successful migration from ElMessage
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: toast.$METHOD(...)
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(success|error|warning|info|promise|loading|custom)$
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-toast-success-call
  message: Detected toast.success() - migration from ElMessage success
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: toast.success(...)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-toast-method-any
  message: Detected toast method call - migration from ElMessage/ElNotification
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: toast.success(...)
    - pattern: toast.error(...)
    - pattern: toast.warning(...)
    - pattern: toast.info(...)
    - pattern: toast.promise(...)
    - pattern: toast.loading(...)
    - pattern: toast.custom(...)
    - pattern: toast(...)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-toast-success-with-message
  message: Detected toast.success() with message - replaced ElMessage.success()
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: 'toast.success($MSG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-toast-function-call-general
  message: Detected toast notification method - migrated from ElMessage
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: toast.success(...)
    - pattern: toast.error(...)
    - pattern: toast.info(...)
    - pattern: toast.warning(...)
    - pattern: toast.message(...)
    - pattern: toast.loading(...)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-toast-success-call-simple
  message: Detected toast.success() call - migrated from ElMessage.success
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: toast.success($X)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-toast-any-call
  message: Detected toast method call - notification system migrated
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: toast.$METHOD($X)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-toast-in-arrow-function
  message: Detected toast usage in arrow function - notification migration
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "const $FUNC = (...) => {\n  ...\n  toast.$METHOD(...)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-vue-sonner-import
  message: Detected import from vue-sonner - successful migration from ElMessage
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { ... } from 'vue-sonner'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-vue-sonner-in-package
  message: Detected vue-sonner in package.json - new dependency added
  severity: INFO
  languages:
  - json
  pattern-regex: '"vue-sonner"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: detect-vue-pick-colors-in-package
  message: Detected vue-pick-colors in package.json - new dependency added
  severity: INFO
  languages:
  - json
  pattern-regex: '"vue-pick-colors"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: detect-vue-sonner-import-toast
  message: Detected vue-sonner import - replacement for Element Plus notifications
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { toast } from 'vue-sonner'
    - pattern: import { ..., toast, ... } from 'vue-sonner'
    - pattern: import { Toaster } from 'vue-sonner'
    - pattern: import { ..., Toaster, ... } from 'vue-sonner'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-vue-sonner-in-stores
  message: Detected vue-sonner import in stores - migration complete
  severity: INFO
  languages:
  - typescript
  pattern-regex: from ['"]vue-sonner['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/stores/*.ts
- id: detect-toast-import-destructured
  message: Detected toast import from vue-sonner
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: 'import { toast } from ''vue-sonner''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-no-elmessage-function-call
  message: Detected toast usage without ElMessage
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \A(?!.*ElMessage)[\s\S]*toast\.
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/**/*.ts
    - src/**/*.vue
- id: detect-stores-import-toast-usage
  message: Detected toast import and usage in stores - complete migration
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'import { toast } from ''vue-sonner''

      ...

      toast.$METHOD(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/stores/*.ts
- id: detect-vue-sonner-in-dependencies
  message: Detected vue-sonner in dependencies section
  severity: INFO
  languages:
  - json
  pattern-regex: '"dependencies"[\s\S]*"vue-sonner"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: detect-pick-colors-in-dependencies
  message: Detected vue-pick-colors in dependencies section
  severity: INFO
  languages:
  - json
  pattern-regex: '"dependencies"[\s\S]*"vue-pick-colors"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
