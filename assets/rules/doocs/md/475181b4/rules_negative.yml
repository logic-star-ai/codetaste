rules:
- id: element-plus-plugin-install-method
  message: Element Plus plugin install method detected. This file should be removed.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "export default {\n  install($APP) {\n    ...\n  }\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/element/index.ts'
- id: element-plugin-default-export
  message: Default export in element plugin detected. Remove this Element Plus plugin
    file.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "export default {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/element/index.ts'
- id: el-variable-reference
  message: Element Plus component reference detected (El* pattern). Replace with custom
    components.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: \bEl[A-Z][a-zA-Z]+\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: el-component-variable-name
  message: Element Plus component variable detected. Replace with custom component.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: \bEl(Message|MessageBox|Loading|Button|Input|Form|Select|Upload|Switch|Icon|Tabs|Dialog|Dropdown|ColorPicker|Link|Row|Col|InputNumber|Checkbox|Radio)\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: element-plus-node-modules-import
  message: Element Plus reference detected. Ensure complete migration to custom components.
  severity: INFO
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: element-plus
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '**/*.ts'
    - '**/*.js'
    - '**/*.vue'
- id: el-message-reference
  message: ElMessage reference detected. Replace with toast from vue-sonner.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: ElMessage
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: element-plus-named-import
  message: Element Plus component import detected. Replace with custom UI components
    (e.g., ElMessage → toast, ElMessageBox → AlertDialog).
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { ..., $COMPONENT, ... } from 'element-plus'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: el-message-import
  message: ElMessage import from Element Plus detected. Replace with toast from vue-sonner.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: 'import { ..., ElMessage, ... } from ''element-plus''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: element-plus-component-import-any
  message: Element Plus component import detected. Replace with custom UI components
    or alternatives.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-either:
  - pattern: import { $COMP } from 'element-plus'
  - pattern: import { $C1, $C2 } from 'element-plus'
  - pattern: import { $C1, $C2, $C3 } from 'element-plus'
  - pattern: import { $C1, $C2, $C3, $C4 } from 'element-plus'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: el-component-destructure-import
  message: Element Plus component import detected. Migrate to custom UI components.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: 'import { $COMP, ... } from ''element-plus''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: global-properties-assignment
  message: Global properties assignment in element plugin detected. Remove Element
    Plus global property setup.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $APP.config.globalProperties.$PROP = $VALUE
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/element/*.ts'
    - '**/element/*.js'
- id: import-statement-element-plus-any
  message: Element Plus import statement detected. Replace with custom UI components.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: import\s+.*from\s+['"]element-plus['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: element-plus-import-two-components
  message: Element Plus component imports detected. Migrate to custom UI components.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: import { $A, $B } from 'element-plus'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: element-plus-import-any-from
  message: Element Plus import detected. Migrate to custom UI components.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: from ['"]element-plus['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: element-plus-import-single-component
  message: Element Plus single component import detected. Migrate to custom UI component.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: import { $COMP } from 'element-plus'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: global-config-properties
  message: Global properties configuration in Element Plus plugin. Remove this setup
    code.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $APP.config.globalProperties
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/element/index.ts'
- id: codemirror-imports-with-element
  message: Element Plus import statement found. Migrate to custom UI components.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: import.*from\s+['"]element-plus['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: element-plus-css-import-quoted
  message: Element Plus CSS import detected. Remove all Element Plus style imports.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: import\s*['"]element-plus/[^'"]+\.css['"]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: app-config-global-props-access
  message: Global properties access in element plugin. Remove Element Plus global
    setup.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: app.config.globalProperties.$X
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/element/index.ts'
- id: el-message-method-any-call
  message: ElMessage API call detected. Replace with toast() from vue-sonner.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-either:
  - pattern: ElMessage.$METHOD($ARG)
  - pattern: ElMessage($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: element-plus-package-import-path
  message: Element Plus package import path detected. Migrate to custom UI components.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: from\s+['"]element-plus['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: element-plus-json-dep-check
  message: Element Plus reference in package.json. Ensure it's removed from dependencies.
  severity: WARNING
  languages:
  - json
  pattern-regex: element-plus
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - package.json
- id: element-plus-component-import-generic
  message: Element Plus component import detected. Migrate to custom UI components
    or alternatives.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: 'import { $X } from ''element-plus''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: el-message-import-destructure
  message: ElMessage destructured import detected. Replace with toast from vue-sonner.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: 'import { ElMessage } from ''element-plus''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: element-plus-string-literal-import
  message: Element Plus string literal detected. Complete migration to custom components.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: '[''"]element-plus[''"]'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: element-plus-css-import
  message: Element Plus CSS import detected. Remove this import as Element Plus is
    being replaced.
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import 'element-plus/dist/index.css'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-message-success-call
  message: ElMessage.success() usage detected. Replace with toast.success() from vue-sonner.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: ElMessage.success($MSG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-message-object-call
  message: ElMessage() object call detected. Replace with toast() from vue-sonner
    with appropriate options.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: ElMessage({ ... })
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-message-box-confirm
  message: ElMessageBox.confirm() usage detected. Replace with custom AlertDialog
    component.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: ElMessageBox.confirm($MSG, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-plus-icons-star-import
  message: Element Plus icons wildcard import detected. Replace with lucide-vue-next
    icons.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: import * as $VAR from '@element-plus/icons-vue'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: global-properties-loading
  message: Global property $loading registration detected. Remove Element Plus global
    property configuration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $APP.config.globalProperties.$loading = $VAL
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: global-properties-message
  message: Global property $message registration detected. Remove Element Plus global
    property configuration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $APP.config.globalProperties.$message = $VAL
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-loading-import
  message: ElLoading import from Element Plus detected. Replace with custom loading
    component.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: 'import { ..., ElLoading, ... } from ''element-plus''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-message-box-import
  message: ElMessageBox import from Element Plus detected. Replace with custom AlertDialog
    component.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: 'import { ..., ElMessageBox, ... } from ''element-plus''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-plus-plugin-file-exists
  message: Element Plus plugin file src/element/index.ts still exists. This file should
    be removed as part of the migration.
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/element/index.ts
- id: element-plus-app-use
  message: Element Plus plugin registration detected. Remove app.use(ElementPlus)
    from main.ts.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $APP.use(ElementPlus)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-plus-plugin-import-in-main
  message: Element Plus plugin import detected in main.ts. Remove this import after
    migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import $VAR from './element'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-icon-component-registration
  message: Element Plus icon component registration detected. Replace with lucide-vue-next
    icons.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $APP.component(`ElIcon${$NAME}`, $COMPONENT)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-plus-icons-object-entries
  message: Element Plus icon registration loop detected. Remove this icon registration
    code.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "for (const [$KEY, $COMPONENT] of Object.entries($ICONS)) {\n  ...\n  app.component(`ElIcon${...}`,\
    \ ...)\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-plus-css-vars-theme-import
  message: Element Plus dark theme CSS import detected. Remove this import and use
    custom theme system.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import 'element-plus/theme-chalk/dark/css-vars\.css'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: replace-all-el-text-color
  message: Code replacing --el-text-color-regular CSS variable detected. Update to
    use new CSS variable system.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: $STR.replaceAll(`var(--el-text-color-regular)`, $COLOR)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: package-json-element-plus-dep
  message: Element Plus dependency found in package.json. Remove this dependency after
    migration.
  severity: WARNING
  languages:
  - json
  pattern-regex: '"element-plus":\s*"[^"]*"'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - package.json
- id: package-json-element-plus-icons-dep
  message: Element Plus icons dependency found in package.json. Remove this dependency
    after migration to lucide-vue-next.
  severity: WARNING
  languages:
  - json
  pattern-regex: '"@element-plus/icons-vue":\s*"[^"]*"'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - package.json
- id: el-message-success-direct-call
  message: ElMessage.success() call detected. Replace with toast.success() from vue-sonner.
  severity: WARNING
  languages:
  - vue
  - typescript
  - javascript
  pattern: ElMessage.success($MSG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-message-box-confirm-call
  message: ElMessageBox.confirm() call detected. Replace with custom AlertDialog component.
  severity: WARNING
  languages:
  - vue
  - typescript
  - javascript
  pattern: ElMessageBox.confirm($MSG, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-message-any-method
  message: ElMessage method call detected. Replace with appropriate toast method from
    vue-sonner.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  patterns:
  - pattern-either:
    - pattern: ElMessage.success(...)
    - pattern: ElMessage.error(...)
    - pattern: ElMessage.warning(...)
    - pattern: ElMessage.info(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-plus-dist-css-import
  message: Element Plus CSS import detected. Remove this import as Element Plus is
    being replaced.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: import\s+['"]element-plus/dist/index\.css['"]
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-loading-service-import
  message: ElLoading import detected. Replace with custom loading component or state
    management.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: 'import { ..., ElLoading, ... } from ''element-plus''

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-plugin-import-from-element
  message: Import from ./element directory detected. This should be removed after
    Element Plus migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import $VAR from './element'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-icon-component-loop-registration
  message: Icon registration loop detected in Element Plus plugin. Remove this code.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "for (const [$KEY, $COMPONENT] of Object.entries($ICONS)) {\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/element/*.ts'
    - '**/element/*.js'
- id: import-statement-element-icons-any
  message: Element Plus icons import statement detected. Replace with lucide-vue-next.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: import\s+.*from\s+['"]@element-plus/icons-vue['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-message-method-success
  message: ElMessage.success() detected. Replace with toast.success() from vue-sonner.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-either:
  - pattern: ElMessage.success(...)
  - pattern: $OBJ.ElMessage.success(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-message-box-method-confirm
  message: ElMessageBox.confirm() detected. Replace with custom AlertDialog component.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-either:
  - pattern: ElMessageBox.confirm(...)
  - pattern: $OBJ.ElMessageBox.confirm(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-import-relative-element
  message: Relative import from element directory detected. Remove after Element Plus
    migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-either:
  - pattern: import $X from './element'
  - pattern: import $X from '../element'
  - pattern: import $X from '../../element'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-plus-css-import-single-quotes
  message: Element Plus CSS import detected. Remove this import.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: import 'element-plus/dist/index.css'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-message-plain-call
  message: ElMessage() call detected. Replace with toast() from vue-sonner.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: ElMessage(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-message-box-confirm-direct
  message: ElMessageBox.confirm() call detected. Replace with custom AlertDialog component.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: ElMessageBox.confirm(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-plus-icons-namespace-import-specific
  message: Element Plus icons namespace import detected. Replace with lucide-vue-next.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: import * as $VAR from '@element-plus/icons-vue'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: icon-component-app-register
  message: Component registration in Element Plus plugin detected. Remove this code.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'app.component($NAME, $COMP)

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/element/index.ts'
- id: element-css-vars-import-dark
  message: Element Plus dark theme CSS import detected. Remove and use custom theme.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: import 'element-plus/theme-chalk/dark/css-vars.css'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-plus-icons-import-any-from
  message: Element Plus icons import detected. Replace with lucide-vue-next.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern-regex: from ['"]@element-plus/icons-vue['"]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: el-components-in-object-entries
  message: Object.entries in Element Plus plugin detected. Remove this icon registration
    code.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: Object.entries($ICONS)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/element/index.ts'
- id: el-message-success-with-template
  message: ElMessage.success() with template string detected. Replace with toast.success()
    from vue-sonner.
  severity: WARNING
  languages:
  - typescript
  - javascript
  - vue
  pattern: ElMessage.success(`$MSG`)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: element-dir-file-pattern
  message: File in element directory detected. This directory should be removed after
    Element Plus migration.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
