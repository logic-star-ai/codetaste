rules:
- id: detect-wikisite-field-access
  message: Detected field access with WikiSite type
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.$FIELD
  - pattern-inside: 'WikiSite $VAR = ...;

      ...

      '
  - pattern-not-inside: 'Site $V2 = ...;

      ...

      '
  metadata:
    nr_refactored_patterns: 489
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-wikisite-explicit-type-cast
  message: Detected explicit WikiSite type in parentheses
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: (WikiSite $VAR)
  - pattern-not: (Site $V)
  metadata:
    nr_refactored_patterns: 477
    nr_legacy_patterns: 0
- id: detect-wikisite-type-regex
  message: Detected WikiSite type using regex
  severity: INFO
  languages:
  - java
  pattern-regex: \bWikiSite\b
  metadata:
    nr_refactored_patterns: 318
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/build/**'
    - '**/test/**'
    - '**/androidTest/**'
- id: detect-wikisite-dataflow-to-method
  message: Detected WikiSite dataflow from creation to usage
  severity: INFO
  languages:
  - java
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: WikiSite.forLanguageCode($CODE)
      - pattern: new WikiSite(...)
    - pattern-not: Site.forLanguageCode($C2)
    - pattern-not: new Site(...)
  pattern-sinks:
  - pattern: $OBJ.$METHOD($SINK, ...)
  metadata:
    nr_refactored_patterns: 143
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-wikisite-in-string-literal
  message: Detected WikiSite string reference in code
  severity: INFO
  languages:
  - java
  pattern-regex: '"[^"]*WikiSite[^"]*"'
  metadata:
    nr_refactored_patterns: 133
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/build/**'
    - '**/test/**'
- id: detect-getwikisite-method-call
  message: Detected getWikiSite() method invocation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: $OBJ.getWikiSite()
  - pattern-not: $O2.getSite()
  metadata:
    nr_refactored_patterns: 125
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-wikisite-constructor-parameter
  message: Detected WikiSite in constructor parameter
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "$CLASS(..., WikiSite $PARAM, ...) {\n  ...\n}\n"
  - pattern-not: "$C2(..., Site $P2, ...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 123
    nr_legacy_patterns: 0
- id: detect-wikisite-in-test-files
  message: Detected WikiSite in test files
  severity: INFO
  languages:
  - java
  pattern-regex: \bWikiSite\b
  metadata:
    nr_refactored_patterns: 112
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/**/*.java'
    - '**/androidTest/**/*.java'
    exclude:
    - '**/build/**'
- id: detect-wikisite-import-in-dataclient
  message: Detected import of WikiSite from dataclient package (refactoring applied)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: import org.wikipedia.dataclient.WikiSite;
  - pattern-not: import org.wikipedia.Site;
  metadata:
    nr_refactored_patterns: 108
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/build/**'
- id: detect-wikisite-parameter
  message: Detected WikiSite as method parameter
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: '$RET $METHOD(..., WikiSite $PARAM, ...) { ... }

        '
    - pattern: '$RET $METHOD(..., @NonNull WikiSite $PARAM, ...) { ... }

        '
  - pattern-not-inside: '$RET $METHOD2(..., Site $P2, ...) { ... }

      '
  metadata:
    nr_refactored_patterns: 73
    nr_legacy_patterns: 0
- id: detect-wikisite-forlanguagecode-factory-method
  message: Detected WikiSite.forLanguageCode() factory method usage
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: WikiSite.forLanguageCode($LANG)
  - pattern-not: Site.forLanguageCode($LANG)
  metadata:
    nr_refactored_patterns: 62
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-wikisite-variable-declaration
  message: Detected WikiSite variable declaration
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: WikiSite $VAR = $EXPR;
  - pattern-not: Site $VAR2 = $EXPR2;
  metadata:
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-wikisite-local-variable
  message: Detected WikiSite local variable in method body
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "$RET $METHOD(...) {\n  ...\n  WikiSite $VAR = ...;\n  ...\n}\n"
  - pattern-not: "$R $M2(...) {\n  ...\n  Site $V = ...;\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: detect-wikisite-return-statement
  message: Detected return statement with WikiSite value
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: return $WIKISITE;
  - pattern-inside: "WikiSite $METHOD(...) {\n  ...\n}\n"
  - pattern-not-inside: "Site $M2(...) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-wikisite-with-nonnull-annotation
  message: Detected WikiSite with @NonNull annotation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '@NonNull WikiSite $VAR

      '
  - pattern-not: '@NonNull Site $V2

      '
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: detect-wikisite-comment-regex
  message: Detected WikiSite in comment/javadoc
  severity: INFO
  languages:
  - java
  pattern-regex: (?:\/\*\*?|\/{2}).*WikiSite.*
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/build/**'
- id: detect-getwikisite-method
  message: Detected getWikiSite() method (renamed from getSite())
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'WikiSite getWikiSite() { ... }

        '
    - pattern: 'public WikiSite getWikiSite() { ... }

        '
    - pattern: '@NonNull WikiSite getWikiSite() { ... }

        '
    - pattern: '@NonNull public WikiSite getWikiSite() { ... }

        '
  - pattern-not-inside: 'Site getSite() { ... }

      '
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-wikisite-supportedauthority-static
  message: Detected WikiSite.supportedAuthority() static method call
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: WikiSite.supportedAuthority($AUTHORITY)
  - pattern-not: Site.supportedAuthority($A)
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-wikisite-with-nullable-annotation
  message: Detected WikiSite with @Nullable annotation
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '@Nullable WikiSite $VAR

      '
  - pattern-not: '@Nullable Site $V2

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: detect-wikisite-getclass-call
  message: Detected WikiSite.class reference
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: WikiSite.class
  - pattern-not: Site.class
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: detect-wikisite-nested-class
  message: Detected WikiSite usage in nested class
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $OUTER {\n  ...\n  class $INNER {\n    ...\n    WikiSite $FIELD;\n\
      \    ...\n  }\n  ...\n}\n"
  - pattern-not: "class $O {\n  ...\n  class $I {\n    ...\n    Site $F;\n    ...\n\
      \  }\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: detect-extra-wiki-constant
  message: Detected EXTRA_WIKI constant (renamed from EXTRA_SITE)
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'static final String EXTRA_WIKI = $VALUE;

        '
    - pattern: 'public static final String EXTRA_WIKI = $VALUE;

        '
    - pattern: 'protected static final String EXTRA_WIKI = $VALUE;

        '
  - pattern-not: 'static final String EXTRA_SITE = $VALUE2;

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-wikisite-gsonunmarshaller
  message: Detected WikiSite from GsonUnmarshaller.unmarshal
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: GsonUnmarshaller.unmarshal(WikiSite.class, $JSON)
  - pattern-not: GsonUnmarshaller.unmarshal(Site.class, $J)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-wikisite-in-retrofit-service
  message: Detected WikiSite parameter in Retrofit service interface
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "interface $SERVICE {\n  ...\n  $RET $METHOD(..., WikiSite $PARAM, ...);\n\
      \  ...\n}\n"
  - pattern-not: "interface $S2 {\n  ...\n  $R $M(..., Site $P, ...);\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-wikisite-in-foreach
  message: Detected WikiSite in for-each loop
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "for (WikiSite $ITEM : $COLLECTION) {\n  ...\n}\n"
  - pattern-not: "for (Site $I : $C) {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-wikisite-adapter-field
  message: Detected WikiSite in adapter class
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $ADAPTER {\n  ...\n  WikiSite $FIELD;\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $ADAPTER
      regex: .*Adapter.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-wikisite-class-definition-in-dataclient
  message: Detected WikiSite class definition in dataclient package
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: 'package org.wikipedia.dataclient;

      ...

      class WikiSite { ... }

      '
  - pattern-not-inside: 'class Site { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/org/wikipedia/dataclient/*.java'
- id: detect-wikisite-test-file
  message: Detected WikiSiteTest.java test file (renamed from SiteTests.java)
  severity: INFO
  languages:
  - java
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/WikiSiteTest.java'
    exclude:
    - '**/SiteTests.java'
    - '**/SiteTest.java'
- id: detect-wikisite-method-calls
  message: Detected method calls on WikiSite objects
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: $WIKISITE.authority()
    - pattern: $WIKISITE.languageCode()
    - pattern: $WIKISITE.url(...)
  - pattern-inside: 'WikiSite $WIKISITE = ...;

      ...

      '
  - pattern-not-inside: 'Site $S = ...;

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: detect-wikisite-null-check
  message: Detected null check on WikiSite variable
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: 'WikiSite $VAR = ...;

        ...

        if ($VAR == null) { ... }

        '
    - pattern: 'WikiSite $VAR = ...;

        ...

        if ($VAR != null) { ... }

        '
  - pattern-not: 'Site $V2 = ...;

      ...

      if ($V2 == null) { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-wikisite-in-funnel
  message: Detected WikiSite in funnel/analytics class
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class $CLASS {\n  ...\n  WikiSite $FIELD;\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: .*Funnel.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
