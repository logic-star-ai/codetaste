- id: util-require-before-usage
  message: 'Successfully refactored: util is required before being used in the same
    file'
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: 'const util = require("./util");

      ...

      util.$METHOD(...);

      '
  metadata:
    category: basic
    nr_refactored_patterns: 66
    nr_legacy_patterns: 0
  paths:
    include:
    - static/js/
    exclude:
