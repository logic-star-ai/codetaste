- id: util-property-read-without-import
  message: Add 'const util = require("./util")' - util property/method accessed without
    import
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: util.$PROP
  - pattern-not: util
  - pattern-not-inside: 'const util = require(...);

      ...

      '
  - pattern-not-inside: 'const util = zrequire(...);

      ...

      '
  - pattern-not-inside: window.util = $X
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 121
  paths:
    exclude:
    - '*/util.js'
    - '*/test*.js'
    - '**/frontend_tests/**'
