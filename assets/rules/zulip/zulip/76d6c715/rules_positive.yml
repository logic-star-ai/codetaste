    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: general-fixture-data-with-type
  message: Detected fixture_data call with type parameter for subdirectory
  severity: INFO
  languages:
  - python
  pattern: self.fixture_data($FILENAME, type=$TYPE)
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/tests/test_*.py
    exclude:
    - zerver/webhooks/*/tests.py
- id: general-fixture-data-variable-type
  message: Detected fixture_data with variable type parameter
  severity: INFO
  languages:
  - python
  pattern: self.fixture_data($FILE, type=$VAR)
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/tests/test_*.py
- id: general-fixture-data-open-replacement
  message: Confirmed fixture_data replaces open() call
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: self.fixture_data($FILE, ...)
  - pattern-not: open(...)
  metadata:
    category: basic
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/tests/test_email_mirror.py
    - zerver/tests/test_slack_importer.py
- id: webhook-fixture-data-json-parse-pattern
  message: Detected webhook_fixture_data with JSON parsing
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: ujson.loads(self.webhook_fixture_data(...))
    - pattern: ujson.dumps(ujson.loads(self.webhook_fixture_data(...)))
    - pattern: json.loads(self.webhook_fixture_data(...))
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: fixture-data-path-type-subdirectory
  message: Detected fixture_data with subdirectory type parameter
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: self.fixture_data($FILE, type=$SUBDIR)
  - metavariable-pattern:
      metavariable: $SUBDIR
      pattern-regex: .*
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/tests/test_*.py
- id: webhook-fixture-data-json-loads
  message: Detected webhook_fixture_data with ujson.loads
