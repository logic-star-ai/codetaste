rules:
- id: webhook-fixture-data-basic-call
  message: Detected webhook_fixture_data call - webhook tests now use webhook_fixture_data
    instead of fixture_data
  severity: INFO
  languages:
  - python
  pattern: self.webhook_fixture_data($TYPE, $ACTION, ...)
  metadata:
    category: api
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-variable-action
  message: Detected webhook_fixture_data with variable action parameter
  severity: INFO
  languages:
  - python
  pattern: self.webhook_fixture_data($TYPE, $VAR, ...)
  metadata:
    category: api
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-method-call-simple
  message: Detected webhook_fixture_data method call on object
  severity: INFO
  languages:
  - python
  pattern: $OBJ.webhook_fixture_data(...)
  metadata:
    category: api
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-multiple-calls
  message: Detected multiple webhook_fixture_data calls
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: self.webhook_fixture_data(...)
  - pattern: self.webhook_fixture_data(...)
  metadata:
    category: api
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-any-webhook
  message: Detected webhook_fixture_data call in any webhook test
  severity: INFO
  languages:
  - python
  pattern: self.webhook_fixture_data($ANY_TYPE, $ANY_FIXTURE, ...)
  metadata:
    category: api
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-method-in-webhook-test-case
  message: Detected webhook_fixture_data in WebhookTestCase get_body
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(WebhookTestCase):\n  ...\n  def get_body(...):\n    ...\n\
      \    self.webhook_fixture_data(...)\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-with-file-type
  message: Detected webhook_fixture_data call with file_type parameter
  severity: INFO
  languages:
  - python
  pattern: self.webhook_fixture_data($TYPE, $ACTION, file_type=$FTYPE)
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-return-statement
  message: Detected return statement using webhook_fixture_data
  severity: INFO
  languages:
  - python
  pattern: return self.webhook_fixture_data(...)
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-variable-file-type
  message: Detected webhook_fixture_data with variable file_type
  severity: INFO
  languages:
  - python
  pattern: self.webhook_fixture_data($TYPE, $FIXTURE, file_type=$VAR)
  metadata:
    category: api
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-get-body-override
  message: Detected get_body override returning webhook_fixture_data
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def get_body(self, $ARG):\n  return self.webhook_fixture_data(...)\n"
  metadata:
    category: api
    nr_refactored_patterns: 35
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-json-file-extension
  message: Detected webhook_fixture_data with JSON file type
  severity: INFO
  languages:
  - python
  pattern: self.webhook_fixture_data($TYPE, $FIXTURE, file_type="json")
  metadata:
    category: api
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: general-fixture-data-any-test-file
  message: Detected fixture_data call in general test file
  severity: INFO
  languages:
  - python
  pattern: self.fixture_data($ANY_FILE, ...)
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/tests/test_email_mirror.py
    - zerver/tests/test_slack_importer.py
    - zerver/tests/test_push_notifications.py
    - zerver/tests/test_notifications.py
    - zerver/tests/test_report.py
- id: webhook-fixture-data-with-fixture-dir-name
  message: Detected webhook_fixture_data using FIXTURE_DIR_NAME
  severity: INFO
  languages:
  - python
  pattern: self.webhook_fixture_data(self.FIXTURE_DIR_NAME, $ARG, ...)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-txt-file-extension
  message: Detected webhook_fixture_data with TXT file type
  severity: INFO
  languages:
  - python
