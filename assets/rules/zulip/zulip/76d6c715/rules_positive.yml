    nr_legacy_patterns: 0
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: webhook-fixture-data-dict-wrapping
  message: Detected webhook_fixture_data wrapped in dictionary
  severity: INFO
  languages:
