rules:
- id: webhook-test-uses-old-fixture-data-method
  message: Webhook test class should use self.webhook_fixture_data() instead of self.fixture_data()
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.fixture_data(...)
  - pattern-inside: "class $CLASS(..., WebhookTestCase, ...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: webhook-test-fixture-data-in-method
  message: Webhook test should use self.webhook_fixture_data() instead of self.fixture_data()
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.fixture_data($TYPE, $ACTION, ...)
  - pattern-inside: "class $CLASS(WebhookTestCase):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: fixture-data-call-in-webhook-directory
  message: Webhook test should use self.webhook_fixture_data() instead of self.fixture_data()
  severity: WARNING
  languages:
  - python
  pattern: self.fixture_data(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: fixture-data-multiline-webhook-test
  message: Webhook test using old fixture_data() method; use self.webhook_fixture_data()
    instead
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "self.fixture_data(\n  $TYPE,\n  $ACTION,\n  ...\n)\n"
  - pattern-inside: "class $CLASS(WebhookTestCase):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: fixture-data-in-webhook-helper-method
  message: Webhook helper method should use self.webhook_fixture_data() instead of
    self.fixture_data()
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.fixture_data(...)
  - pattern-inside: "class $CLASS(WebhookTestCase):\n  ...\n  def $HELPER(...):\n\
      \    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: fixture-data-webhook-any-class-inheritance
  message: Use self.webhook_fixture_data() in webhook tests or self.fixture_data()
    in general tests
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.fixture_data(...)
  - pattern-inside: "class $CLASS(...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
  paths:
    include:
    - zerver/webhooks/*/tests.py
- id: fixture-data-in-webhook-subclass
  message: Webhook test subclass should use self.webhook_fixture_data() instead of
    self.fixture_data()
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.fixture_data(...)
  - pattern-inside: "class $CLASS($PARENT):\n  ...\n"
  - metavariable-pattern:
      metavariable: $PARENT
      pattern-regex: .*WebhookTestCase.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: multiple-fixture-data-calls-webhook
  message: Multiple fixture_data() calls in webhook test; all should use self.webhook_fixture_data()
    instead
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.fixture_data(...)
  - pattern: self.fixture_data(...)
  - pattern-inside: "class $CLASS(WebhookTestCase):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: fixture-data-with-variable-args-webhook
  message: Webhook test using old fixture_data() with variable args; use self.webhook_fixture_data()
    instead
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.fixture_data($VAR, ...)
  - pattern-inside: "class $CLASS(WebhookTestCase):\n  ...\n"
  - pattern-not: self.webhook_fixture_data(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: fixture-data-call-any-webhook-test
  message: Replace fixture_data() with webhook_fixture_data() in webhook tests or
    fixture_data() in general tests
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: self.fixture_data(...)
  - pattern-not: self.webhook_fixture_data(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
  paths:
    include:
    - zerver/webhooks/*/tests.py
