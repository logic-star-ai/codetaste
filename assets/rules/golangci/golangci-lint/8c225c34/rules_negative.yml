  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter(..., $A.Doc, []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
- id: golangci-old-newlinter-both-name-and-doc
  message: Replace NewLinter($A.Name, $A.Doc, []*analysis.Analyzer{$A}, ...) with
