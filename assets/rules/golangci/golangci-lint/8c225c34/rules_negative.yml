rules:
- id: golangci-old-newlinter-single-analyzer-basic-v2
  message: Replace goanalysis.NewLinter with single analyzer using NewLinterFromAnalyzer($A).WithDesc(...)
    for cleaner API
  severity: WARNING
  languages:
  - go
  pattern: goanalysis.NewLinter($NAME, $DESC, []*analysis.Analyzer{$A}, $CFG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 109
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-newlinter-name-literal-v2
  message: Use NewLinterFromAnalyzer($A) instead of manually passing analyzer name
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter($STR, ..., []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 109
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-newlinter-doc-literal-v2
  message: Use NewLinterFromAnalyzer($A) or NewLinterFromAnalyzer($A).WithDesc($STRING)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter(..., $STRING, []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 109
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-single-analyzer-v2
  message: Single analyzer slice should use NewLinterFromAnalyzer($ANALYZER)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '[]*analysis.Analyzer{$ANALYZER}

      '
  - metavariable-pattern:
      metavariable: $ANALYZER
      patterns:
      - pattern-not: inspect.Analyzer
      - pattern-not: buildssa.Analyzer
      - pattern-not: identical.Analyzer
  - pattern-inside: "func New(...) *goanalysis.Linter {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 108
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-newlinter-in-new-v2
  message: Refactor New() to use NewLinterFromAnalyzer($A) fluent API
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinter($NAME, $DOC, []*analysis.Analyzer{$A}, $CFG)
  - pattern-inside: "func New(...) *goanalysis.Linter {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 108
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-analyzer-field-reference-name
  message: Single analyzer array literal indicates need to use NewLinterFromAnalyzer($A)
  severity: WARNING
  languages:
  - go
  pattern: '[]*analysis.Analyzer{$A}

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 105
  paths:
    include:
    - pkg/golinters/*/
    exclude:
    - pkg/golinters/unused/unused.go
    - pkg/golinters/dogsled/dogsled.go
    - pkg/golinters/gochecknoinits/gochecknoinits.go
    - pkg/golinters/iface/iface.go
    - pkg/golinters/unparam/unparam.go
    - pkg/goanalysis/linter.go
- id: golangci-analyzer-assign-then-use-v2
  message: Replace with NewLinterFromAnalyzer($EXPR) for cleaner code
  severity: WARNING
  languages:
  - go
  pattern: '$A := $EXPR

    ...

    goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 105
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-old-newlinter-single-analyzer-with-loadmode
  message: Replace verbose NewLinter call with NewLinterFromAnalyzer($A).WithConfig(...).WithLoadMode(...)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter($NAME, $DESC, []*analysis.Analyzer{$A}, $CFG).WithLoadMode(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: golangci-newlinter-chained-loadmode
  message: Replace with NewLinterFromAnalyzer($A).WithConfig(...).WithLoadMode(...)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter($NAME, $DESC, []*analysis.Analyzer{$A}, $CFG).WithLoadMode(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: golangci-newlinter-loadmode-chain-pattern
  message: 'Use fluent API: NewLinterFromAnalyzer(...).WithConfig(...).WithLoadMode(...)'
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter($NAME, ..., []*analysis.Analyzer{...}, ...).WithLoadMode(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: golangci-return-with-loadmode-chain
  message: 'Replace with: return goanalysis.NewLinterFromAnalyzer($A).WithConfig(...).WithLoadMode(...)'
  severity: WARNING
  languages:
  - go
  pattern: 'return goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, ...).WithLoadMode(...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: golangci-newlinter-return-with-chain
  message: 'Use fluent API: return NewLinterFromAnalyzer($A).WithConfig(...).$METHOD(...)'
  severity: WARNING
  languages:
  - go
  pattern: 'return goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, ...).$METHOD(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: golangci-old-newlinter-analyzer-name-as-first-arg
  message: Replace NewLinter($A.Name, ..., []*analysis.Analyzer{$A}, ...) with NewLinterFromAnalyzer($A)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter($A.Name, ..., []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
- id: golangci-newlinter-first-arg-analyzer-field
  message: Use NewLinterFromAnalyzer($A) to avoid extracting analyzer name
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinter($A.Name, ...)
  - pattern-inside: "func New(...) *goanalysis.Linter {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
- id: golangci-analyzer-call-direct-name-access
  message: Store analyzer in variable and use NewLinterFromAnalyzer instead of accessing
    .Name directly
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter($CALL.Name, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
- id: golangci-analyzer-field-name-in-call
  message: NewLinterFromAnalyzer($A) automatically extracts analyzer name
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinter($A.Name, ...)
  - metavariable-pattern:
      metavariable: $A
      patterns:
      - pattern-not: $PKG.$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
- id: golangci-analyzer-name-extraction
  message: NewLinterFromAnalyzer($A) automatically uses analyzer's Name field
  severity: WARNING
  languages:
  - go
  pattern: '$A := ...

    ...

    goanalysis.NewLinter($A.Name, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 79
- id: golangci-analyzer-var-declaration-then-usage
  message: Pattern suggests NewLinterFromAnalyzer($EXPR) would be cleaner
  severity: WARNING
  languages:
  - go
  pattern: '$A := $EXPR

    ...

    goanalysis.NewLinter($A.Name, ..., []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 79
- id: golangci-newlinter-nil-config-v2
  message: Replace NewLinter with nil config using NewLinterFromAnalyzer($A)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, nil)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 78
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-old-newlinter-analyzer-doc-as-second-arg
  message: Replace NewLinter with NewLinterFromAnalyzer to avoid manually extracting
