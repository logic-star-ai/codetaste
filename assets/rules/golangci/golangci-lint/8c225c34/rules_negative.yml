  languages:
  - go
  pattern: 'goanalysis.NewLinter($A.Name, $A.Doc, []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
- id: golangci-newlinter-second-arg-analyzer-field
  message: Use NewLinterFromAnalyzer($A) to avoid extracting analyzer doc
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinter(..., $A.Doc, ...)
  - pattern-inside: "func New(...) *goanalysis.Linter {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
- id: golangci-analyzer-call-direct-doc-access
