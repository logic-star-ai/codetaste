rules:
- id: golangci-old-newlinter-single-analyzer-basic-v2
  message: Replace goanalysis.NewLinter with single analyzer using NewLinterFromAnalyzer($A).WithDesc(...)
    for cleaner API
  severity: WARNING
  languages:
  - go
  pattern: goanalysis.NewLinter($NAME, $DESC, []*analysis.Analyzer{$A}, $CFG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 109
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-single-analyzer-v2
  message: Single analyzer slice should use NewLinterFromAnalyzer($ANALYZER)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '[]*analysis.Analyzer{$ANALYZER}

      '
  - metavariable-pattern:
      metavariable: $ANALYZER
      patterns:
      - pattern-not: inspect.Analyzer
      - pattern-not: buildssa.Analyzer
      - pattern-not: identical.Analyzer
  - pattern-inside: "func New(...) *goanalysis.Linter {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 108
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-analyzer-assign-then-use-v2
  message: Replace with NewLinterFromAnalyzer($EXPR) for cleaner code
  severity: WARNING
  languages:
  - go
  pattern: '$A := $EXPR

    ...

    goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 105
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-old-newlinter-single-analyzer-with-loadmode
  message: Replace verbose NewLinter call with NewLinterFromAnalyzer($A).WithConfig(...).WithLoadMode(...)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter($NAME, $DESC, []*analysis.Analyzer{$A}, $CFG).WithLoadMode(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: golangci-old-newlinter-analyzer-name-as-first-arg
  message: Replace NewLinter($A.Name, ..., []*analysis.Analyzer{$A}, ...) with NewLinterFromAnalyzer($A)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter($A.Name, ..., []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
- id: golangci-analyzer-name-extraction
  message: NewLinterFromAnalyzer($A) automatically uses analyzer's Name field
  severity: WARNING
  languages:
  - go
  pattern: '$A := ...

    ...

    goanalysis.NewLinter($A.Name, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 79
- id: golangci-newlinter-nil-config-v2
  message: Replace NewLinter with nil config using NewLinterFromAnalyzer($A)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, nil)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 78
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-old-newlinter-analyzer-doc-as-second-arg
  message: Replace NewLinter with NewLinterFromAnalyzer to avoid manually extracting
    analyzer name and doc
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter(..., $A.Doc, []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
- id: golangci-analyzer-doc-extraction
  message: NewLinterFromAnalyzer($A) automatically uses analyzer's Doc field
  severity: WARNING
  languages:
  - go
  pattern: '$A := ...

    ...

    goanalysis.NewLinter(..., $A.Doc, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 62
- id: golangci-newlinter-name-first-doc-second
  message: NewLinterFromAnalyzer($A) extracts both name and doc automatically
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinter($A.Name, $A.Doc, ...)
  - pattern-inside: '$A := ...

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 62
- id: golangci-analyzer-variable-to-newlinter-same-name
  message: Simplify by using NewLinterFromAnalyzer($A) instead of extracting name
    manually
  severity: WARNING
  languages:
  - go
  pattern: '$A := $FUNC(...)

    ...

    goanalysis.NewLinter($A.Name, ..., []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 56
- id: golangci-newlinter-loadmodetypesinfo
  message: Use NewLinterFromAnalyzer($A).WithConfig(...).WithLoadMode(goanalysis.LoadModeTypesInfo)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, ...).WithLoadMode(goanalysis.LoadModeTypesInfo)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 49
- id: golangci-analyzer-variable-to-newlinter-same-doc
  message: Use NewLinterFromAnalyzer($A) to automatically use analyzer's doc
  severity: WARNING
  languages:
  - go
  pattern: '$A := $FUNC(...)

    ...

    goanalysis.NewLinter(..., $A.Doc, []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
- id: golangci-newlinter-nil-fourth-param
  message: Replace nil config pattern with NewLinterFromAnalyzer($A)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinter($A.Name, $A.Doc, []*analysis.Analyzer{$A}, nil)
  - pattern-inside: "func New(...) *goanalysis.Linter {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: golangci-newlinter-loadmodesyntax
  message: Use NewLinterFromAnalyzer($A).WithConfig(...).WithLoadMode(goanalysis.LoadModeSyntax)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, ...).WithLoadMode(goanalysis.LoadModeSyntax)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: golangci-analyzer-newanalyzer-call
  message: Replace with NewLinterFromAnalyzer($PKG.NewAnalyzer(...))
  severity: WARNING
  languages:
  - go
  pattern: '$A := $PKG.NewAnalyzer(...)

    ...

    goanalysis.NewLinter($A.Name, $A.Doc, []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: golangci-theonly-constants-usage
  message: TheOnly* constants removed - use NewLinterFromAnalyzer or actual analyzer
    fields
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: goanalysis.TheOnlyAnalyzerName
    - pattern: goanalysis.TheOnlyanalyzerDoc
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: golangci-deprecated-theonlyanalyzerdoc
  message: TheOnlyanalyzerDoc constant has been removed - use NewLinterFromAnalyzer
    instead
  severity: WARNING
  languages:
  - go
  pattern: goanalysis.TheOnlyanalyzerDoc
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: golangci-const-lintername-array-v2
  message: Refactor to use NewLinterFromAnalyzer($A) without separate linterName constant
  severity: WARNING
  languages:
  - go
  pattern: 'const linterName = $STR

    ...

    goanalysis.NewLinter(linterName, ..., []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-analyzer-from-package-then-newlinter
  message: Replace with NewLinterFromAnalyzer($PKG.Analyzer)
  severity: WARNING
  languages:
  - go
  pattern: '$A := $PKG.Analyzer

    ...

    goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: golangci-newlinter-with-cfg-param
  message: Replace with NewLinterFromAnalyzer($A).WithConfig(single-level-config)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter($A.Name, $A.Doc, []*analysis.Analyzer{$A}, cfg)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: golangci-config-field-assignment-analyzer-name
  message: WithConfig() auto-wraps with analyzer name - pass settings map directly
  severity: WARNING
  languages:
  - go
  pattern: 'cfg[$ANALYZER.Name] = ...

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: golangci-config-map-nested-init-with-name
  message: Use WithConfig($INNER) instead of wrapping with analyzer name as key
  severity: WARNING
  languages:
  - go
  pattern: "map[string]map[string]any{\n  $A.Name: $INNER,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: golangci-analyzer-literal-to-newlinter
  message: 'Replace with: goanalysis.NewLinterFromAnalyzer($PKG.Analyzer)'
  severity: WARNING
  languages:
  - go
  pattern: '$A := $PKG.Analyzer

    ...

    goanalysis.NewLinter($A.Name, $A.Doc, []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: golangci-config-init-double-map-empty
  message: Use single-level map[string]any{} with WithConfig() instead of double-nested
    map
  severity: WARNING
  languages:
  - go
  pattern: 'cfg := map[string]map[string]any{}

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: golangci-config-init-empty-then-fill
  message: Replace nested config pattern with WithConfig(map[string]any{...}) on fluent
    API
  severity: WARNING
  languages:
  - go
  pattern: 'cfg := map[string]map[string]any{}

    ...

    cfg[$NAME] = map[string]any{...}

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: golangci-config-init-and-fill-pattern
  message: Replace nested config pattern with WithConfig() in fluent API
  severity: WARNING
  languages:
  - go
  pattern: 'cfg := map[string]map[string]any{}

    ...

    cfg[$NAME] = ...

    ...

    goanalysis.NewLinter(...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: golangci-config-assignment-nested-map
  message: Config wrapping pattern should be refactored to use WithConfig() with single-level
    map
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'cfg = map[string]map[string]any{...}

      '
  - pattern-not: 'cfg = map[string]map[string]any{}

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: golangci-cfg-analyzer-name-conditional
  message: WithConfig() handles analyzer name wrapping - use single-level map conditionally
  severity: WARNING
  languages:
  - go
  pattern: "if ... {\n  cfg[$ANALYZER.Name] = map[string]any{...}\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: golangci-empty-nested-config-init
  message: Refactor to use WithConfig(map[string]any{...}) in conditional chain
  severity: WARNING
  languages:
  - go
  pattern: "cfg := map[string]map[string]any{}\nif ... {\n  cfg[$A.Name] = map[string]any{...}\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: golangci-newlinter-with-contextsetter
  message: Replace NewLinter with NewLinterFromAnalyzer($A).WithConfig(...).WithContextSetter(...)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, ...).WithContextSetter(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: golangci-settings-config-nested-pattern
  message: Use WithConfig() conditionally instead of nested map construction
  severity: WARNING
  languages:
  - go
  pattern: "if $SETTINGS != nil {\n  ...\n  cfg = map[string]map[string]any{...}\n\
    \  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: golangci-conditional-config-double-map
  message: With new API, use conditional single-level map with WithConfig()
  severity: WARNING
  languages:
  - go
  pattern: "if ... {\n  cfg = map[string]map[string]any{...}\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: golangci-cfg-nil-then-assigned
  message: Replace double-nested config pattern with single-level map in WithConfig()
  severity: WARNING
  languages:
  - go
  pattern: 'var cfg map[string]map[string]any

    ...

    cfg = map[string]map[string]any{$A.Name: {...}}

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: golangci-newlinter-issuesreporter-v2
  message: Refactor to NewLinterFromAnalyzer($A).WithConfig(...).WithIssuesReporter(...)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, ...).WithIssuesReporter(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    exclude:
    - pkg/golinters/unused/unused.go
- id: golangci-var-cfg-conditional-nested
  message: Refactor to use single-level map with WithConfig() in fluent API chain
  severity: WARNING
  languages:
  - go
  pattern: "var cfg map[string]map[string]any\nif $SETTINGS != nil {\n  cfg = map[string]map[string]any{...}\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: golangci-settings-nil-check-config
  message: Use conditional WithConfig() with single-level map instead of nested pattern
  severity: WARNING
  languages:
  - go
  pattern: "if $SETTINGS != nil {\n  $VAR = map[string]map[string]any{...}\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: golangci-cfg-settings-check-nested
  message: Refactor to use conditional .WithConfig(map[string]any{...}) in fluent
    chain
  severity: WARNING
  languages:
  - go
  pattern: "if $SETTINGS != nil {\n  cfg = map[string]map[string]any{...}\n}\n...\n\
    goanalysis.NewLinter(..., ..., []*analysis.Analyzer{$A}, cfg)\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: golangci-analyzer-new-to-newlinter-pattern
  message: 'Replace with: goanalysis.NewLinterFromAnalyzer($PKG.New())'
  severity: WARNING
  languages:
  - go
  pattern: '$A := $PKG.New()

    ...

    goanalysis.NewLinter($A.Name, $A.Doc, []*analysis.Analyzer{$A}, ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: golangci-deprecated-theonlyanalyzername
  message: TheOnlyAnalyzerName constant has been removed - use NewLinterFromAnalyzer
    instead
  severity: WARNING
  languages:
  - go
  pattern: goanalysis.TheOnlyAnalyzerName
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: golangci-theonlyanalyzername-in-analyzer
  message: TheOnlyAnalyzerName is removed - use actual analyzer name or NewLinterFromAnalyzer
  severity: WARNING
  languages:
  - go
  pattern: "&analysis.Analyzer{\n  Name: goanalysis.TheOnlyAnalyzerName,\n  ...\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: golangci-old-linter-const-definition
  message: TheOnlyAnalyzerName and TheOnlyanalyzerDoc constants have been removed
    from API
  severity: WARNING
  languages:
  - go
  pattern: "const (\n  TheOnlyAnalyzerName = $STR1\n  TheOnlyanalyzerDoc = $STR2\n\
    )\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: golangci-package-analyzer-reference
  message: Simplify to NewLinterFromAnalyzer($PKG.Analyzer)
  severity: WARNING
  languages:
  - go
  pattern: 'goanalysis.NewLinter($PKG.Analyzer.Name, $PKG.Analyzer.Doc, []*analysis.Analyzer{$PKG.Analyzer},
    ...)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
