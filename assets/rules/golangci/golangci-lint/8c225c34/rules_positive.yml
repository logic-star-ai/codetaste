rules:
- id: new-linter-from-analyzer-basic-usage
  message: Detected NewLinterFromAnalyzer() constructor usage
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.NewLinterFromAnalyzer($ANALYZER)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^[a-zA-Z_][a-zA-Z0-9_]*$
  metadata:
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: multiline-fluent-chain
  message: Detected multiline fluent chain with NewLinterFromAnalyzer
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "$PKG.\n  NewLinterFromAnalyzer($A).$CHAIN\n"
  - pattern-not: "$PKG.\n  NewLinter(...)\n"
  metadata:
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: simple-new-function-with-new-linter-from-analyzer
  message: Detected New() function with NewLinterFromAnalyzer
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+New\([^)]*\)[^{]*\{[\s\S]*NewLinterFromAnalyzer
  metadata:
    nr_refactored_patterns: 108
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/golinters/**/*.go'
    exclude:
    - '**/*_test.go'
- id: new-linter-from-analyzer-with-load-mode
  message: Detected NewLinterFromAnalyzer with WithLoadMode chain
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.NewLinterFromAnalyzer(...).WithLoadMode($MODE)
  - pattern-not: $PKG.NewLinter(...)
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: return-chained-new-linter-from-analyzer
  message: Detected return with chained NewLinterFromAnalyzer
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "return $PKG.\n  NewLinterFromAnalyzer(...).$CHAIN\n"
    - pattern: 'return $PKG.NewLinterFromAnalyzer(...).$M1(...).$M2(...)

        '
  - pattern-not: return $PKG.NewLinter(...)
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
- id: new-linter-from-analyzer-full-chain
  message: Detected full fluent chain with NewLinterFromAnalyzer
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.NewLinterFromAnalyzer($A).WithConfig($C).WithLoadMode($M)
    - pattern: $PKG.NewLinterFromAnalyzer($A).WithLoadMode($M).WithConfig($C)
    - pattern: $PKG.NewLinterFromAnalyzer($A).WithDesc($D).WithConfig($C)
    - pattern: $PKG.NewLinterFromAnalyzer($A).WithDesc($D).WithLoadMode($M)
  - pattern-not: $PKG.NewLinter(...)
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
- id: new-linter-from-analyzer-with-config-chain
  message: Detected NewLinterFromAnalyzer().WithConfig() chain
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.NewLinterFromAnalyzer(...).WithConfig($CFG)
  - pattern-not: $PKG.NewLinter(...)
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
- id: three-method-chain-pattern
  message: Detected three-method chain with NewLinterFromAnalyzer
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.NewLinterFromAnalyzer(...).$M1(...).$M2(...).$M3(...)
  - pattern-not: $PKG.NewLinter(...)
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/golinters/**/*.go'
- id: config-without-nested-analyzer-key
  message: Detected config map without nested analyzer name key
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$CFG := map[string]any{...}

      ...

      $X.WithConfig($CFG)

      '
  - pattern-not-inside: '$OUTER := map[string]map[string]any{...}

      ...

      '
  - pattern-not: '$CFG := map[string]any{...}

      ...

      $NESTED[$KEY] = $CFG

      ...

      '
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: analyzer-assigned-then-used
  message: Detected analyzer assignment then used in NewLinterFromAnalyzer
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$A := $EXPR

      ...

      $PKG.NewLinterFromAnalyzer($A)

      '
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/golinters/**/*.go'
- id: new-linter-from-analyzer-function-def
  message: Detected NewLinterFromAnalyzer function definition
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func NewLinterFromAnalyzer($ANALYZER *analysis.Analyzer) *Linter { ...
      }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/goanalysis/linter.go'
- id: with-config-method-def
  message: Detected WithConfig method definition
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($LNT *Linter) WithConfig($CFG map[string]any) *Linter { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/goanalysis/linter.go'
- id: with-desc-method-def
  message: Detected WithDesc method definition
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func ($LNT *Linter) WithDesc($DESC string) *Linter { ... }
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/goanalysis/linter.go'
