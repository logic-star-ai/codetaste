rules:
- id: detect-new-linter-from-analyzer-basic
  message: Detected use of new NewLinterFromAnalyzer() API introduced in refactoring
  severity: INFO
  languages:
  - go
  pattern: goanalysis.NewLinterFromAnalyzer($ANALYZER)
  metadata:
    category: api
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-new-linter-from-analyzer-multiline-chain
  message: Detected multiline fluent chain starting with NewLinterFromAnalyzer()
  severity: INFO
  languages:
  - go
  pattern: "goanalysis.\n  NewLinterFromAnalyzer($ANALYZER).\n  $METHOD(...)\n"
  metadata:
    category: api
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-fluent-chain-starting-with-goanalysis
  message: Detected fluent chain starting with goanalysis.NewLinterFromAnalyzer()
  severity: INFO
  languages:
  - go
  pattern: "goanalysis.\n  NewLinterFromAnalyzer($ANALYZER)\n"
  metadata:
    category: api
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-no-analyzer-slice-in-new-linter-from-analyzer
  message: Detected NewLinterFromAnalyzer() used instead of NewLinter() with analyzer
    slice
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinterFromAnalyzer($A)
  - pattern-not: goanalysis.NewLinter($NAME, $DESC, []*analysis.Analyzer{$A}, $CFG)
  metadata:
    category: basic
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-new-linter-from-analyzer-eliminates-slice-syntax
  message: Detected NewLinterFromAnalyzer() eliminates need for analyzer slice syntax
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinterFromAnalyzer($ANALYZER)
  - pattern-not-inside: '[]*analysis.Analyzer{...}

      '
  metadata:
    category: basic
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-analyzer-doc-not-passed-to-new-linter
  message: Detected NewLinterFromAnalyzer() auto-uses analyzer doc
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinterFromAnalyzer($A)
  - pattern-not: goanalysis.NewLinter($N, $A.Doc, ..., ...)
  metadata:
    category: basic
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-analyzer-name-not-passed-to-new-linter
  message: Detected NewLinterFromAnalyzer() auto-uses analyzer name
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinterFromAnalyzer($A)
  - pattern-not: goanalysis.NewLinter($A.Name, ..., ..., ...)
  metadata:
    category: basic
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-new-from-analyzer-removes-name-parameter
  message: Detected NewLinterFromAnalyzer() eliminates explicit name parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinterFromAnalyzer($A)
  - pattern-not: goanalysis.NewLinter($NAME, ...)
  metadata:
    category: basic
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-new-from-analyzer-removes-desc-parameter
  message: Detected NewLinterFromAnalyzer() eliminates explicit desc parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinterFromAnalyzer($A)
  - pattern-not: goanalysis.NewLinter(..., $DESC, ...)
  metadata:
    category: basic
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-new-from-analyzer-removes-analyzer-slice-parameter
  message: Detected NewLinterFromAnalyzer() eliminates explicit analyzer slice parameter
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: goanalysis.NewLinterFromAnalyzer($A)
  - pattern-not: goanalysis.NewLinter(..., []*analysis.Analyzer{...}, ...)
  metadata:
    category: basic
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-new-api-usage-in-golinters
  message: Detected NewLinterFromAnalyzer() usage in golinters package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: 'package $PKG

      ...

      '
  - pattern: goanalysis.NewLinterFromAnalyzer($A)
  metadata:
    category: structural
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-analyzer-passed-directly-without-slice
  message: Detected analyzer passed directly without slice wrapper
  severity: INFO
  languages:
  - go
  pattern: goanalysis.NewLinterFromAnalyzer($ANALYZER)
  metadata:
    category: basic
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-multiline-new-linter-from-analyzer-simple
  message: Detected multiline NewLinterFromAnalyzer() call
  severity: INFO
  languages:
  - go
  pattern: "goanalysis.\n  NewLinterFromAnalyzer($A)\n"
  metadata:
    category: api
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
- id: detect-new-linter-from-analyzer-pattern-in-function
  message: Detected NewLinterFromAnalyzer() in New() linter constructor function
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func New(...) *goanalysis.Linter {\n  ...\n}\n"
  - pattern: goanalysis.NewLinterFromAnalyzer($A)
  metadata:
    category: structural
    nr_refactored_patterns: 108
    nr_legacy_patterns: 0
- id: detect-three-level-chain
  message: Detected three-level method chain from NewLinterFromAnalyzer()
  severity: INFO
  languages:
  - go
  pattern: 'goanalysis.NewLinterFromAnalyzer($A).$M1(...).$M2(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 57
    nr_legacy_patterns: 0
- id: detect-new-linter-from-analyzer-single-line-chain
  message: Detected single-line method chain from NewLinterFromAnalyzer()
  severity: INFO
  languages:
  - go
  pattern: goanalysis.NewLinterFromAnalyzer($A).$M1(...).$M2(...)
  metadata:
    category: api
    nr_refactored_patterns: 57
    nr_legacy_patterns: 0
- id: detect-fluent-chain-with-two-methods
