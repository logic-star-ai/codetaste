rules:
- id: detect-multiline-chained-linter-construction
  message: Detected multiline chained linter construction with new API
  severity: INFO
  languages:
  - go
  pattern: "goanalysis.\n  NewLinterFromAnalyzer($A).\n  ...\n"
  metadata:
    nr_refactored_patterns: 465
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-new-linter-from-analyzer-constructor
  message: Detected use of new NewLinterFromAnalyzer() constructor
  severity: INFO
  languages:
  - go
  pattern: goanalysis.NewLinterFromAnalyzer($ANALYZER)
  metadata:
    nr_refactored_patterns: 109
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-config-settings-conditional-simple
  message: Detected simple settings conditional
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "if $SETTINGS != nil {\n  ...\n}\n...\ngoanalysis.NewLinterFromAnalyzer($A)\n"
  metadata:
    nr_refactored_patterns: 60
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-chained-new-linter-from-analyzer-with-loadmode
  message: Detected chained NewLinterFromAnalyzer().WithLoadMode()
  severity: INFO
  languages:
  - go
  pattern: goanalysis.NewLinterFromAnalyzer($A).WithLoadMode($MODE)
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-newlinterfromanalyzer-with-nil-config
  message: Detected NewLinterFromAnalyzer() without separate config (nil/no config
    in old API)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func New(...) *goanalysis.Linter {\n  ...\n  return goanalysis.NewLinterFromAnalyzer($A).WithLoadMode($M)\n\
      }\n"
  - pattern-not: "func New(...) *goanalysis.Linter {\n  ...\n  return goanalysis.NewLinter(...,\
      \ nil).WithLoadMode($M)\n}\n"
  metadata:
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-with-config-fluent-method
  message: Detected use of new WithConfig() fluent method
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $LINTER.WithConfig($CFG)
  - metavariable-pattern:
      metavariable: $LINTER
      patterns:
      - pattern-not: goanalysis.NewLinter(...)
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-full-chain-new-linter-from-analyzer-config-loadmode
  message: Detected full chain NewLinterFromAnalyzer().WithConfig().WithLoadMode()
  severity: INFO
  languages:
  - go
  pattern: goanalysis.NewLinterFromAnalyzer($A).WithConfig($CFG).WithLoadMode($MODE)
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-config-var-declaration-flat
  message: Detected var config declaration as flat map
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'var $CFG map[string]any

      ...

      $X.WithConfig($CFG)

      '
  metadata:
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-conditional-withconfig-after-newlinterfromanalyzer
  message: Detected conditional config with new API
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "if $COND != nil {\n  $CFG = map[string]any{...}\n}\n...\n$X.WithConfig($CFG)\n"
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-with-desc-fluent-method
  message: Detected use of new WithDesc() fluent method
  severity: INFO
  languages:
  - go
  pattern: $LINTER.WithDesc($DESC)
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-simplified-config-pattern-in-golinters
  message: Detected simplified config pattern in linter constructor
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$CFG := map[string]any{...}

      ...

      $X.WithConfig($CFG)

      '
  - pattern-not: '$CFG := map[string]map[string]any{...}

      '
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/golinters/**/*.go'
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-analyzer-variable-to-newlinterfromanalyzer
  message: Detected analyzer variable passed to NewLinterFromAnalyzer()
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: '$A := $EXPR

      ...

      goanalysis.NewLinterFromAnalyzer($A)

      '
  - metavariable-pattern:
      metavariable: $EXPR
      patterns:
      - pattern-either:
        - pattern: $PKG.New()
        - pattern: $PKG.NewAnalyzer()
        - pattern: $PKG.Analyzer
        - pattern: '&analysis.Analyzer{...}'
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-lintername-const-usage
  message: Detected linterName const usage with inline analyzer
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'const linterName = $NAME

      ...

      &analysis.Analyzer{Name: linterName, ...}

      ...

      goanalysis.NewLinterFromAnalyzer($A)

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/testdata/**'
    - '**/*_test.go'
- id: detect-absence-of-old-constants-in-linter-file
  message: Confirmed old constants TheOnlyAnalyzerName and TheOnlyanalyzerDoc are
    not used
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: .*TheOnlyAnalyzerName.*
  - pattern-not-regex: .*TheOnlyanalyzerDoc.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/goanalysis/linter.go'
