  - go
  pattern: "goanalysis.NewLinterFromAnalyzer($A).\n  $M1(...).\n  $M2(...)\n"
  metadata:
    category: api
    nr_refactored_patterns: 57
    nr_legacy_patterns: 0
- id: detect-with-loadmode-after-new-linter-from-analyzer
  message: Detected WithLoadMode() directly chained with NewLinterFromAnalyzer()
  severity: INFO
  languages:
  - go
  pattern: 'goanalysis.NewLinterFromAnalyzer($ANALYZER).WithLoadMode($MODE)

    '
  metadata:
    category: api
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: detect-return-new-linter-from-analyzer-chained
  message: Detected return statement with chained NewLinterFromAnalyzer()
  severity: INFO
  languages:
  - go
  pattern: 'return goanalysis.NewLinterFromAnalyzer($ANALYZER).$METHOD(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: detect-return-multiline-new-linter-from-analyzer
  message: Detected return with multiline NewLinterFromAnalyzer chain
  severity: INFO
  languages:
  - go
  pattern: "return goanalysis.\n  NewLinterFromAnalyzer($ANALYZER).\n  WithLoadMode($MODE)\n"
  metadata:
    category: api
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: detect-return-from-analyzer-without-config
  message: Detected return NewLinterFromAnalyzer() without WithConfig()
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'return goanalysis.NewLinterFromAnalyzer($ANALYZER).WithLoadMode($MODE)

      '
  - pattern-not: 'return goanalysis.NewLinterFromAnalyzer($ANALYZER).WithConfig(...).WithLoadMode($MODE)

      '
  metadata:
    category: api
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
- id: detect-return-statement-with-new-api
  message: Detected return statement using NewLinterFromAnalyzer() in New function
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func $F(...) *goanalysis.Linter {\n  ...\n}\n"
  - pattern: 'return goanalysis.NewLinterFromAnalyzer($ANALYZER).$METHOD(...)

      '
  metadata:
