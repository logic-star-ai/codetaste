rules:
- id: require-dynamic-import-in-switch
  message: 'Refactor needed: Replace dynamic require() imports with static imports
    and type-specific wrappers'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const $COMP = require($PATH).default

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
  paths:
    include:
    - '*/messages/wrapper/*.tsx'
    - '*/messages/wrapper/*.ts'
- id: get-ids-from-props
  message: 'Refactor needed: Use Context API (ConvoIDContext, OrdinalContext, GetIdsContext)
    instead of props'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const {conversationIDKey, ordinal} = $PROPS

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*/messages/wrapper/*.tsx'
    - '*/messages/wrapper/*.ts'
    - '*/messages/*/wrapper.tsx'
    - '*/messages/*/wrapper.ts'
- id: generic-message-wrapper-with-measure-callback
  message: 'Refactor needed: Remove ''measure'' callback prop - components should
    just render, parents handle resizing'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '<$COMPONENT ... measure={$FUNC} ... />

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: is-text-or-attachment-check
  message: 'Refactor needed: Type-specific wrappers eliminate need for type checking'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: Constants.isTextOrAttachment($MSG)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: message-type-type-imports
  message: 'Refactor needed: Remove type imports for message containers - use type-specific
    wrappers'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import type AttachmentMessageType from ''../attachment/container''

        '
    - pattern: 'import type TextMessageType from ''../text/container''

        '
    - pattern: 'import type PaymentMessageType from ''../account-payment/container''

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/messages/wrapper/index.tsx'
    - '*/messages/wrapper/index.ts'
- id: fail-underline-style
  message: 'Refactor needed: Move failure styling to type-specific wrappers'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'styles.failUnderline

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/messages/wrapper/index.tsx'
    - '*/messages/wrapper/index.ts'
- id: padding-left-tiny-style
  message: 'Refactor needed: Simplify padding styles in type-specific wrappers'
