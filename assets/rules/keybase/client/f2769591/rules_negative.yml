- id: container-use-previous2-hook
  message: 'Refactor needed: Remove usePrevious2 pattern - use better memoization
    in type-specific wrappers'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'Container.usePrevious2($VAL)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/messages/wrapper/*.tsx'
    - '*/messages/wrapper/*.ts'
- id: get-message-with-fallback-in-component
  message: 'Refactor needed: Use Context API to access conversationIDKey/ordinal instead
    of passing as props'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "const message = Container.useSelector(\n  state => Constants.getMessage(state,\
    \ $CONVOID, $ORDINAL) || $DEFAULT\n)\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: use-previous-message-selector
  message: 'Refactor needed: Remove previousMsg selector - use ItemSeparatorComponent
    for author/orange line logic'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "const previousMsg = Container.useSelector(\n  state => ($PREV && Constants.getMessage(state,\
    \ $CONVOID, $PREV)) || undefined\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: show-username-calculation-with-previous
  message: 'Refactor needed: Remove showUsername calculation with previousMsg - handle
    in ItemSeparatorComponent'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const showUsername = getUsernameToShow($MSG, $PREV_MSG, $YOU, $ORANGE)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: orange-line-map-selector-in-wrapper
  message: 'Refactor needed: Move orange line logic to ItemSeparatorComponent'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "const orangeLineAbove = Container.useSelector(\n  state => state.chat2.orangeLineMap.get($CONVOID)\
    \ === $ID\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: placeholder-message-with-spinner
  message: 'Refactor needed: Remove spinner from placeholder messages (shown briefly
    during high CPU, slows downloads)'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: '<Kb.ProgressIndicator ... />

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/messages/placeholder/*.tsx'
    - '*/messages/placeholder/*.ts'
