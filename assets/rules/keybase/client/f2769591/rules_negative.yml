  message: 'Refactor needed: Simplify styling context - handle in type-specific wrappers'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "<Styles.StyleContext.Provider value={$VAL}>\n  ...\n</Styles.StyleContext.Provider>\n"
