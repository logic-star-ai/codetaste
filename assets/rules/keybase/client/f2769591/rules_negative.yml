- id: measure-on-message-change
  message: 'Refactor needed: Remove measure callback pattern - components just render,
    parents handle resizing'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "if (measure && ($MSG !== $PREV || $ORANGE !== $PREV_ORANGE)) {\n  measure()\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
