  severity: INFO
  languages:
  - typescript
  pattern-regex: import.*from\s+['"]\./wrapper
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/chat/conversation/messages/*'
