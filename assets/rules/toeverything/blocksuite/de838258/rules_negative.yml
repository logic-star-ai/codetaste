rules:
- id: detect-line-colors-array-access
  message: Replace array index access LINE_COLORS[$INDEX] with LineColor enum member
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: LINE_COLORS[$INDEX]
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-shape-blue-string-literal
  message: Replace string literal '--affine-palette-shape-blue' with ShapeFillColor.Blue
    enum value
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '''--affine-palette-shape-blue'''
  - pattern-not-inside: 'const $ARRAY = [...];

      '
  - pattern-not-inside: 'export const $ARRAY = [...];

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
