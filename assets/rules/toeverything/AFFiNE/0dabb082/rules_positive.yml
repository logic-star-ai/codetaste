    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: useLiveData-page-mode-variable
  message: Detected useLiveData with page/record mode property
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'useLiveData($VAR.mode)

      '
  - metavariable-regex:
      metavariable: $VAR
      regex: ^(page|pageRecord|record)$
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
