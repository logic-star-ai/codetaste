  - typescript
  patterns:
  - pattern: $RECORDLIST.record($ID).value
  - pattern-not: $RECORDLIST.record($ID).value.$METHOD(...)
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: page-setmode-with-ternary
  message: Detected page.setMode method call
  severity: INFO
  languages:
  - typescript
  pattern: $PAGE.setMode($EXPR)
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: page-setmode-statement-expression
  message: Detected page.setMode as statement
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: '$PAGE.setMode($MODE);

      '
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: pagerecordlist-file-import-path
  message: Detected PageRecordList import from infra package
  severity: INFO
  languages:
  - typescript
  pattern: import { PageRecordList } from '@toeverything/infra'
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: page-mode-property-access-chained
  message: Detected chained mode property access (LiveData value extraction)
  severity: INFO
  languages:
  - typescript
  pattern: $VAR.mode.value
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: page-setmode-function-call
  message: Detected page.setMode() method invocation
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: $PAGE.setMode($ARG)
  - pattern-not-inside: 'class $CLASS { ... setMode($ARG) { ... } ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: useLiveData-with-optional-chaining
  message: Detected useLiveData with optional chaining (supports null/undefined)
  severity: INFO
