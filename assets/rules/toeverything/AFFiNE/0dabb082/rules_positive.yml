rules:
- id: page-mode-via-livedata
  message: Detected use of LiveData for page mode access (refactored from currentModeAtom)
  severity: INFO
  languages:
  - typescript
  pattern: useLiveData($PAGE.mode)
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: page-mode-livedata-property-access
  message: Detected page.mode LiveData property access in useLiveData
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: $PAGE.mode
  - pattern-inside: 'useLiveData(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: livedata-mode-property-general
  message: Detected LiveData usage for mode property access
  severity: INFO
  languages:
  - typescript
  pattern: useLiveData($VAR.mode)
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: pagerecord-mode-property
  message: Detected PageRecord.mode property in LiveData context
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: $RECORD.mode
  - pattern-inside: 'useLiveData(...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: page-mode-livedata-const-declaration
  message: Detected const declaration with useLiveData for page mode
  severity: INFO
  languages:
  - typescript
  pattern: 'const $VAR = useLiveData($PAGE.mode)

    '
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: livedata-mode-in-variable-assignment
  message: Detected variable assignment with useLiveData mode
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: 'const $VAR = useLiveData($EXPR.mode)

      '
  - pattern-not: 'const $VAR = useLiveData(useAtomValue(...))

      '
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: pagerecordlist-import-statement
  message: Detected PageRecordList import (new DI service class)
  severity: INFO
  languages:
  - typescript
  pattern: import { PageRecordList } from $PATH
  metadata:
    category: structural
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: page-setmode-method-call
  message: Detected page.setMode() method call (replaces setPageModeAtom)
  severity: INFO
  languages:
  - typescript
  pattern: $PAGE.setMode($MODE)
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: pagerecordlist-record-access
  message: Detected PageRecordList record access pattern (replaces pageSettingFamily)
  severity: INFO
  languages:
  - typescript
  pattern: $LIST.record($ID).value
  metadata:
    category: api
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: pagerecord-record-value-access
  message: Detected PageRecordList.record().value access for page settings
  severity: INFO
