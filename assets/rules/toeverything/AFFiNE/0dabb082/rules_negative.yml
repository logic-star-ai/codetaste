rules:
- id: detect-page-mode-export-usage
  message: PageMode re-export in file with pageSettingFamily - verify migration to
    PageRecord
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'export { ..., PageMode, ... } from ''$PATH''

      '
  - pattern-inside: '...

      pageSettingFamily

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 441
- id: detect-atom-type-import-primitive
  message: PrimitiveAtom type import with pageSettingFamily - migrate to PageRecordList
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import type { PrimitiveAtom } from 'jotai'
  - pattern-inside: '...

      pageSettingFamily

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 441
- id: detect-atom-family-type-import
  message: AtomFamily type import with pageSettingFamily - migrate to PageRecordList
    service
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import type { AtomFamily } from '$PATH'
  - pattern-inside: '...

      pageSettingFamily

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 441
- id: detect-comment-with-page-settings-atom
  message: Reference to old atom names detected - verify if migration to DI services
    is complete
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: (pageSettingsAtom|currentPageIdAtom|currentModeAtom|pageSettingFamily|setPageModeAtom)
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
- id: detect-page-settings-storage-key
  message: Usage of 'pageSettings' storage key detected - verify if migration to WorkspaceLocalState
    is needed
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: pageSettings
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - '*.ts'
    - '*.tsx'
- id: detect-atoms-path-reference
  message: Reference to atoms/mode path - old atom file that should be removed
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: (['"]).*\/atoms\/mode.*\1
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-jotai-import-for-page-setting-family
  message: Jotai import in file using pageSettingFamily - migrate to PageRecordList
    service
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { $IMPORT } from 'jotai'
  - pattern-inside: '...

      pageSettingFamily

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-jotai-import-for-page-atoms
  message: Jotai import in file using currentModeAtom - migrate to DI services
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { $IMPORT } from 'jotai'
  - pattern-inside: '...

      currentModeAtom

      ...

      '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-page-setting-family-call
  message: pageSettingFamily function call - replace with pageRecordList.record(pageId)
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: pageSettingFamily($PAGEID)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-current-mode-atom-variable
  message: currentModeAtom reference - should be removed, use page.mode$ LiveData
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: currentModeAtom
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-current-mode-atom-import
  message: currentModeAtom import detected - should be replaced with useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { ..., currentModeAtom, ... } from '...'
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-use-atom-value-current-mode
  message: useAtomValue(currentModeAtom) detected - should be replaced with useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: useAtomValue(currentModeAtom)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-current-mode-atom-any-import
  message: currentModeAtom import detected - replace with useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: import { currentModeAtom } from '$PATH'
  - pattern: import { ..., currentModeAtom } from '$PATH'
  - pattern: import { ..., currentModeAtom, ... } from '$PATH'
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-page-detail-page-atom-usage
  message: pageSettingFamily usage in DetailPage - migrate to PageRecord service
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-inside: 'import { pageSettingFamily, ... } from ''$PATH''

      ...

      '
  - pattern: pageSettingFamily($PAGEID)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-page-setting-family-import
  message: pageSettingFamily import detected - should be replaced with pageRecordList.record(pageId)
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { ..., pageSettingFamily, ... } from '...'
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-page-setting-family-any-import
  message: pageSettingFamily import detected - replace with PageRecordList service
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: import { pageSettingFamily } from '$PATH'
  - pattern: import { ..., pageSettingFamily } from '$PATH'
  - pattern: import { ..., pageSettingFamily, ... } from '$PATH'
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-current-page-id-atom-variable
  message: currentPageIdAtom reference - should be removed, use Page service from
    DI
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: currentPageIdAtom
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-page-mode-state-variable
  message: Arrow function component using currentModeAtom - migrate to useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const $MODE = useAtomValue(currentModeAtom);

      '
  - pattern-inside: "const $COMPONENT = (...) => {\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-page-settings-atom-variable
  message: pageSettingsAtom reference - should be removed, use WorkspaceLocalState
    service
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: pageSettingsAtom
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-set-page-mode-atom-variable
  message: setPageModeAtom reference - should be removed, use page.setMode() method
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: setPageModeAtom
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-const-arrow-function-with-mode-atom
  message: Arrow function component using currentModeAtom - migrate to useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "const $FUNC = (...) => {\n  ...\n  useAtomValue(currentModeAtom)\n  ...\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-current-page-id-atom-import
  message: currentPageIdAtom import detected - should be replaced with Page service
    via DI
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { ..., currentPageIdAtom, ... } from '...'
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-set-page-mode-atom-import
  message: setPageModeAtom import detected - should be replaced with page.setMode()
    method
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { ..., setPageModeAtom, ... } from '...'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-current-page-id-atom-in-function
  message: currentPageIdAtom used in component - replace with Page service from DI
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'const $VAR = useAtomValue(currentPageIdAtom);

        '
    - pattern: 'const [$VAR, $SETTER] = useAtom(currentPageIdAtom);

        '
    - pattern: 'const $SETTER = useSetAtom(currentPageIdAtom);

        '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-set-page-mode-atom-any-import
  message: setPageModeAtom import detected - replace with page.setMode() method
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: import { setPageModeAtom } from '$PATH'
  - pattern: import { ..., setPageModeAtom } from '$PATH'
  - pattern: import { ..., setPageModeAtom, ... } from '$PATH'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-current-page-id-atom-any-import
  message: currentPageIdAtom import detected - replace with Page service
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: import { currentPageIdAtom } from '$PATH'
  - pattern: import { ..., currentPageIdAtom } from '$PATH'
  - pattern: import { ..., currentPageIdAtom, ... } from '$PATH'
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-use-atom-value-current-page-id
  message: useAtomValue(currentPageIdAtom) detected - should be replaced with Page
    service via DI
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: useAtomValue(currentPageIdAtom)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-atoms-index-file-structure
  message: atoms/index.ts contains old atom exports - remove after migration
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: (pageSettingsAtom|currentPageIdAtom|currentModeAtom|pageSettingFamily|setPageModeAtom)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/atoms/index.ts'
- id: detect-page-settings-atom-import
  message: pageSettingsAtom import detected - should be replaced with WorkspaceLocalState
    service via DI
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { ..., pageSettingsAtom, ... } from '...'
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-use-atom-value-page-setting-family
  message: useAtomValue(pageSettingFamily(...)) detected - should be replaced with
    pageRecordList.record(pageId).value
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: useAtomValue(pageSettingFamily($PAGEID))
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-use-set-atom-set-page-mode
  message: useSetAtom(setPageModeAtom) detected - should be replaced with page.setMode()
    method
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: useSetAtom(setPageModeAtom)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-set-page-mode-atom-usage
  message: setPageModeAtom setter used - replace with page.setMode() method
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const $SETTER = useSetAtom(setPageModeAtom);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-page-setting-family-read
  message: pageSettingFamily read detected - replace with pageRecordList.record(pageId).value
    or useLiveData
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const $VAR = useAtomValue(pageSettingFamily($PAGEID));

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-page-mode-conditional-render
  message: Conditional rendering based on currentModeAtom - use useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const $MODE = useAtomValue(currentModeAtom);

      ...

      $MODE === ''page'' ? $A : $B

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-page-settings-atom-any-import
  message: pageSettingsAtom import detected - replace with WorkspaceLocalState service
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-either:
  - pattern: import { pageSettingsAtom } from '$PATH'
  - pattern: import { ..., pageSettingsAtom } from '$PATH'
  - pattern: import { ..., pageSettingsAtom, ... } from '$PATH'
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-use-atom-value-page-settings
  message: useAtomValue(pageSettingsAtom) detected - should be replaced with WorkspaceLocalState
    service
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: useAtomValue(pageSettingsAtom)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-page-settings-atom-read
  message: pageSettingsAtom read detected - replace with WorkspaceLocalState service
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const $VAR = useAtomValue(pageSettingsAtom);

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-test-file-atom-usage
  message: pageSettingFamily in test file - update tests to use PageRecordList service
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: pageSettingFamily($ID)
  - pattern-inside: "describe(..., () => {\n  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-mode-comparison-page
  message: Comparing currentModeAtom result to 'page' - use useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const $MODE = useAtomValue(currentModeAtom);

      ...

      $MODE === ''page''

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-store-atom-spec-file
  message: pageSettingFamily in test suite - migrate tests to use PageRecordList
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: pageSettingFamily($ID)
  - pattern-inside: "describe($DESC, () => {\n  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-use-set-atom-current-page-id
  message: useSetAtom(currentPageIdAtom) detected - should be replaced with Page service
    via DI
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: useSetAtom(currentPageIdAtom)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-direct-page-setting-family-usage
  message: Direct store access to pageSettingFamily detected - should use pageRecordList.record(pageId).value
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $STORE.get(pageSettingFamily($PAGEID))
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-page-settings-atom-definition
  message: pageSettingsAtom definition detected - should be removed, replaced with
    WorkspaceLocalState service
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: export const pageSettingsAtom = atom(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-current-page-id-atom-definition
  message: currentPageIdAtom definition detected - should be removed, replaced with
    Page service
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: export const currentPageIdAtom = atom(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-current-mode-atom-definition
  message: currentModeAtom definition detected - should be removed, use Page.mode$
    LiveData instead
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: export const currentModeAtom = atom(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-page-setting-family-definition
  message: pageSettingFamily definition detected - should be removed, use PageRecordList
    service instead
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: export const pageSettingFamily = atomFamily(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-set-page-mode-atom-definition
  message: setPageModeAtom definition detected - should be removed, use page.setMode()
    method instead
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: export const setPageModeAtom = atom(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-page-settings-base-atom
  message: pageSettingsBaseAtom definition detected - should be removed, WorkspaceLocalState
    handles storage now
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const pageSettingsBaseAtom = atomWithStorage(''pageSettings'', ...)

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-atom-with-storage-page-settings
  message: atomWithStorage('pageSettings', ...) detected - should use WorkspaceLocalState
    service for page settings storage
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: atomWithStorage('pageSettings', ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-page-local-setting-type
  message: PageLocalSetting type detected - should be removed, PageRecord encapsulates
    this now
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "type PageLocalSetting = {\n  mode: $MODE;\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-page-setting-family-in-atom
  message: Atom deriving from pageSettingFamily detected - should use LiveData composition
    from PageRecord.mode$
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: "atom($GET => {\n  ...\n  $GET(pageSettingFamily($ID))\n  ...\n})\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-default-page-setting-constant
  message: defaultPageSetting constant detected - PageRecord provides default values
    now
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: "const defaultPageSetting = {\n  mode: $MODE,\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-atom-family-import-jotai
  message: atomFamily import from jotai/utils - verify if this is for page state management
    that should use DI services
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern: import { ..., atomFamily, ... } from 'jotai/utils'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-current-mode-atom-in-function
  message: currentModeAtom used in component - replace with useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'const $VAR = useAtomValue(currentModeAtom);

        '
    - pattern: 'const [$VAR, $SETTER] = useAtom(currentModeAtom);

        '
  - pattern-not-inside: '// @migrated

      ...

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-get-page-setting-family-mode
  message: Getting mode from pageSettingFamily via atom get - use PageRecord.mode$
    LiveData
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'get(pageSettingFamily($PAGEID)).mode

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-rootstore-get-page-setting
  message: rootStore.get(pageSettingFamily).mode detected - replace with PageRecord.mode$
    LiveData
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'rootStore.get(pageSettingFamily($PAGEID)).mode

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-page-mode-conditional-edgeless
  message: Conditional rendering based on currentModeAtom - use useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const $MODE = useAtomValue(currentModeAtom);

      ...

      $MODE === ''edgeless'' ? $A : $B

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-help-island-mode-atom
  message: HelpIsland component using currentModeAtom - migrate to useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const $MODE = useAtomValue(currentModeAtom);
  - pattern-inside: "function $FUNC(...) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: .*(HelpIsland|Help|Island).*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-block-suite-header-mode-atom
  message: BlockSuite header/menu using currentModeAtom - migrate to useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const $MODE = useAtomValue(currentModeAtom);
  - pattern-inside: "function $FUNC(...) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: .*(BlockSuite|Header|Menu).*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-use-block-suite-meta-helper-mode
  message: BlockSuite helper hook using currentModeAtom - migrate to useLiveData(page.mode$)
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const $MODE = useAtomValue(currentModeAtom);
  - pattern-inside: "function $FUNC(...) {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $FUNC
      regex: .*(useBlockSuite|useMeta|Helper).*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
