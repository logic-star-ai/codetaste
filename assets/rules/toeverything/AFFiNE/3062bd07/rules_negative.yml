  severity: ERROR
  languages:
  - typescript
  pattern-regex: (declare\s+global\s*\{[^}]*namespace\s+BlockSuite\s*\{[^}]*(SurfaceElementModelMap|EdgelessTextModelMap|SurfaceLocalModelMap)[^}]*\}[^}]*\})
  metadata:
    category: architecture
    nr_refactored_patterns: 0
