rules:
- id: blocksuite-type-in-class-property
  message: Remove BlockSuite type from class property - use explicit GfxModel types
  severity: WARNING
  languages:
  - typescript
  pattern-regex: (private|public|protected)?\s*\w+\s*:\s*BlockSuite\.(EdgelessBlockModelType|SurfaceElementModel|SurfaceModel|EdgelessTextModelType)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: array-type-blocksuite-regex
  message: Remove BlockSuite array type - use explicit GfxModel array types or specific
    element arrays
  severity: WARNING
  languages:
  - typescript
  pattern-regex: BlockSuite\.(EdgelessBlockModelType|SurfaceModel|SurfaceElementModel|EdgelessTextModelType)\[\]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: declare-global-namespace-blocksuite-regex
  message: Remove global BlockSuite namespace declaration for edgeless types - use
    explicit exports
  severity: ERROR
  languages:
  - typescript
  pattern-regex: declare\s+global\s*\{[^}]*namespace\s+BlockSuite\s*\{[^}]*(SurfaceElementModelMap|EdgelessBlockModelMap|EdgelessTextModelMap|SurfaceLocalModelMap|SurfaceGroupLikeModelMap)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
  paths:
    include:
    - blocksuite/affine/model/**
    - blocksuite/affine/block-surface/**
- id: function-parameter-blocksuite-type-regex
  message: Remove BlockSuite type from function parameter - use explicit types or
    string
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \(\s*\w+\s*:\s*BlockSuite\.(EdgelessModelKeys|SurfaceModel|EdgelessBlockModelType|SurfaceElementModel|EdgelessTextModelType)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: block-model-file-with-global-declaration
  message: Remove global namespace declaration for edgeless block types - use explicit
    exports
  severity: ERROR
  languages:
  - typescript
  pattern-regex: (declare\s+global\s*\{[^}]*namespace\s+BlockSuite\s*\{[^}]*EdgelessBlockModelMap[^}]*\}[^}]*\})
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - blocksuite/affine/model/src/blocks/**
- id: interface-property-blocksuite-type
  message: Remove BlockSuite type from interface property - use explicit types
  severity: WARNING
  languages:
  - typescript
  pattern-regex: ^\s*\w+\s*:\s*BlockSuite\.(SurfaceElementModel|EdgelessBlockModelType|SurfaceModel|EdgelessTextModelType)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: blocksuite-edgeless-text-model-type-usage-regex
  message: Remove BlockSuite.EdgelessTextModelType type annotation - replace with
    SurfaceTextModel
  severity: WARNING
  languages:
  - typescript
  pattern-regex: :\s*BlockSuite\.EdgelessTextModelType\s*(\[\]|\||;)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: blocksuite-edgeless-text-model-type-array-parameter
  message: Remove BlockSuite.EdgelessTextModelType[] - replace with SurfaceTextModel[]
    from explicit exports
  severity: WARNING
  languages:
  - typescript
  pattern: 'function $FUNC(..., $PARAM: BlockSuite.EdgelessTextModelType[], ...) {
    ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: blocksuite-edgeless-model-keys-usage-regex
  message: Remove BlockSuite.EdgelessModelKeys type annotation or cast - use string
    type
  severity: WARNING
  languages:
  - typescript
  pattern-regex: (as\s+BlockSuite\.EdgelessModelKeys|:\s*BlockSuite\.EdgelessModelKeys)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: change-text-menu-elements-array
  message: Remove BlockSuite.EdgelessTextModelType[] - replace with SurfaceTextModel[]
    from explicit exports
  severity: WARNING
  languages:
  - typescript
  pattern-regex: elements\s*:\s*BlockSuite\.EdgelessTextModelType\[\]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - blocksuite/blocks/src/root-block/widgets/**
- id: blocksuite-type-cast-as-regex
  message: Remove BlockSuite type cast - use explicit GfxModel types or specific element
    types
  severity: WARNING
  languages:
  - typescript
  pattern-regex: \)\s+as\s+BlockSuite\.(EdgelessBlockModelType|SurfaceModel|SurfaceElementModel|EdgelessTextModelType)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: blocksuite-edgeless-model-keys-type-cast
  message: Remove BlockSuite.EdgelessModelKeys type cast - use string or specific
    types
  severity: WARNING
  languages:
  - typescript
  pattern: $EXPR as BlockSuite.EdgelessModelKeys
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: get-most-common-function-with-blocksuite
  message: Remove BlockSuite.EdgelessTextModelType[] from function parameter - use
    SurfaceTextModel[]
  severity: WARNING
  languages:
  - typescript
  pattern-regex: function\s+getMostCommon\w+\s*\(\s*elements\s*:\s*BlockSuite\.EdgelessTextModelType\[\]
