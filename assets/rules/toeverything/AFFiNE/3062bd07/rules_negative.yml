    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: get-last-props-key-with-blocksuite-type
  message: Remove BlockSuite.EdgelessModelKeys type cast - getLastPropsKey signature
    should accept string
  severity: WARNING
  languages:
  - typescript
  pattern: 'getLastPropsKey($EXPR as BlockSuite.EdgelessModelKeys, ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: element-model-file-with-global-declaration
  message: Remove global namespace declaration for surface element types - use explicit
