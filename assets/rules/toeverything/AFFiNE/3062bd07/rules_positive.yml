rules:
- id: detect-type-with-surfacetext-prefix
  message: Detected SurfaceText-prefixed type usage (new naming convention after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: \bSurfaceText\w+
  metadata:
    category: api
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: detect-surface-text-model-usage-in-type
  message: Detected SurfaceTextModel type annotation (new type after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: :\s*SurfaceTextModel\b
  metadata:
    category: api
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: detect-colon-surface-text-model
  message: Detected SurfaceTextModel as type annotation (new type usage)
  severity: INFO
  languages:
  - typescript
  pattern-regex: :\s*SurfaceTextModel\s*[;,\)\{\[]
  metadata:
    category: api
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: detect-surface-element-model-map-import
  message: Detected explicit import of SurfaceElementModelMap type (refactored from
    BlockSuite.SurfaceElementModelMap)
  severity: INFO
  languages:
  - typescript
  pattern: 'import { ..., SurfaceElementModelMap, ... } from ''...''

    '
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-surface-element-model-map-import-regex
  message: Detected explicit SurfaceElementModelMap import (new type after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: import\s+(?:type\s+)?\{[^}]*SurfaceElementModelMap[^}]*\}
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-keyof-surface-text-model-map
  message: Detected keyof SurfaceTextModelMap usage (explicit type map after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: keyof\s+SurfaceTextModelMap
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-surface-element-keyof-type
  message: Detected generic constraint using keyof SurfaceElementModelMap (explicit
    type)
  severity: INFO
  languages:
  - typescript
  pattern-regex: keyof\s+SurfaceElementModelMap\s*>
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-type-param-extends-keyof-surface
  message: Detected generic type parameter constrained to keyof Surface map (explicit
    type)
  severity: INFO
  languages:
  - typescript
  pattern-regex: <\w+\s+extends\s+keyof\s+Surface\w+Map>
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: detect-export-surface-text-model-map-from-index
  message: Detected export of SurfaceTextModelMap from index (new explicit export)
  severity: INFO
  languages:
  - typescript
  pattern-regex: export.*SurfaceTextModelMap
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/elements/index.ts'
    - '*/model/src/index.ts'
- id: detect-export-surface-text-model-from-index
  message: Detected export of SurfaceTextModel from index (new explicit export)
  severity: INFO
  languages:
  - typescript
  pattern-regex: export.*SurfaceTextModel
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/elements/index.ts'
    - '*/model/src/index.ts'
- id: detect-getlastpropskey-string-return
  message: Detected getLastPropsKey function with string parameter (refactored from
    BlockSuite.EdgelessModelKeys)
  severity: INFO
  languages:
  - typescript
  pattern: 'function getLastPropsKey($P1: string, $P2: $T): $RET

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/get-last-props-key.ts'
- id: detect-type-export-surface-element-model-map
  message: Detected explicit export of SurfaceElementModelMap type definition (new
    after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: export\s+type\s+SurfaceElementModelMap\s*=
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-type-export-surface-text-model-map
  message: Detected explicit export of SurfaceTextModelMap type definition (new after
    refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: export\s+type\s+SurfaceTextModelMap\s*=
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-type-export-surface-text-model
  message: Detected explicit export of SurfaceTextModel type definition (new after
    refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: export\s+type\s+SurfaceTextModel\s*=
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-element-model-map-exported
  message: Detected export of SurfaceElementModelMap type (new explicit export)
  severity: INFO
  languages:
  - typescript
  pattern-regex: ^\s*export\s+type\s+SurfaceElementModelMap\s*=
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-text-model-map-exported
  message: Detected export of SurfaceTextModelMap type (replaces BlockSuite.EdgelessTextModelMap)
  severity: INFO
  languages:
  - typescript
  pattern-regex: ^\s*export\s+type\s+SurfaceTextModelMap\s*=
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-text-model-exported
  message: Detected export of SurfaceTextModel type (new type after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: ^\s*export\s+type\s+SurfaceTextModel\s*=
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-string-param-in-getlastpropskey
  message: Detected getLastPropsKey with string parameter (changed from BlockSuite.EdgelessModelKeys)
  severity: INFO
  languages:
  - typescript
  pattern: "function getLastPropsKey(\n  modelType: string,\n  $PARAM\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-text-model-map-import-regex
  message: Detected explicit SurfaceTextModelMap import (replaces BlockSuite.EdgelessTextModelMap)
  severity: INFO
  languages:
  - typescript
  pattern-regex: import\s+(?:type\s+)?\{[^}]*SurfaceTextModelMap[^}]*\}
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-text-model-import-regex
  message: Detected explicit SurfaceTextModel import (new type after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: import\s+(?:type\s+)?\{[^}]*SurfaceTextModel[^}]*\}
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-text-model-map-indexed-access
  message: Detected indexed access to SurfaceTextModelMap (explicit type map usage
    after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: SurfaceTextModelMap\[.*\]
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-model-param-without-blocksuite-prefix
  message: Detected modelType parameter without BlockSuite namespace (refactored pattern)
  severity: INFO
  languages:
  - typescript
  pattern-regex: \bmodelType:\s*(?!BlockSuite\.)\w+
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-element-model-map-type-definition
  message: Detected SurfaceElementModelMap type definition (new explicit type export)
  severity: INFO
  languages:
  - typescript
  pattern-regex: type\s+SurfaceElementModelMap\s*=\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-text-model-map-type-definition
  message: Detected SurfaceTextModelMap type definition (replaces BlockSuite.EdgelessTextModelMap)
  severity: INFO
  languages:
  - typescript
  pattern-regex: type\s+SurfaceTextModelMap\s*=\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-text-model-keyof-usage
  message: Detected SurfaceTextModelMap keyof indexed access (new pattern after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: SurfaceTextModelMap\[keyof\s+SurfaceTextModelMap\]
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-no-declare-global-in-text-element
  message: Text element model file without BlockSuite namespace declaration (refactored)
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A(?![\s\S]*declare\s+global[\s\S]*namespace\s+BlockSuite)[\s\S]+class\s+TextElementModel
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '*/elements/text/text.ts'
