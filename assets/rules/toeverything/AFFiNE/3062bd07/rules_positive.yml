  severity: INFO
  languages:
  - typescript
  pattern-regex: type\s+SurfaceTextModelMap[\s\S]{0,300}text[\s\S]{0,100}connector
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-text-model-definition
  message: Detected SurfaceTextModel type definition (new type alias after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: type\s+SurfaceTextModel\s*=\s*SurfaceTextModelMap
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
