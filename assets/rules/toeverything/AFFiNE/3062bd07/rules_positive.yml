  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-getlastpropskey-first-param-string
  message: Detected getLastPropsKey with first parameter as string type (changed signature)
  severity: INFO
  languages:
  - typescript
  pattern-regex: function\s+getLastPropsKey\s*\(\s*\w+:\s*string
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-text-model-union-type
  message: Detected SurfaceTextModel as indexed union type (new pattern after refactoring)
  severity: INFO
  languages:
  - typescript
  pattern-regex: SurfaceTextModelMap\[keyof\s+SurfaceTextModelMap\]
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-element-model-map-with-all-elements
  message: Detected complete SurfaceElementModelMap definition with all elements (new
    type definition)
  severity: INFO
  languages:
  - typescript
  pattern-regex: type\s+SurfaceElementModelMap[\s\S]{0,300}brush[\s\S]{0,100}connector[\s\S]{0,100}group
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: detect-surface-text-model-map-with-elements
