rules:
- id: external-reference-in-import-top-level
  message: External reference path in top-level import
  severity: INFO
  languages:
  - go
  pattern-regex: '"github\.com/distribution/reference"'
  metadata:
    category: api
    nr_refactored_patterns: 39
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.go'
    exclude:
    - vendor/**
- id: import-statement-new-path-any-go-file
  message: New external reference import path found
  severity: INFO
  languages:
  - go
  pattern-regex: '"github\.com/distribution/reference"'
  metadata:
    category: api
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.go'
    - registry/**/*.go
    - notifications/**/*.go
    exclude:
    - reference/*.go
    - vendor/**
- id: multiline-import-new-reference-path
  message: New reference path in multiline import
  severity: INFO
  languages:
  - go
  pattern-regex: ^\s*"github\.com/distribution/reference"$
  metadata:
    category: api
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.go'
    - registry/**/*.go
    - notifications/**/*.go
    exclude:
    - reference/*.go
    - vendor/**
- id: import-reference-and-context
  message: Import block includes context and new reference module
  severity: INFO
  languages:
  - go
  pattern-regex: import\s*\([^)]*"context"[^)]*"github\.com/distribution/reference"[^)]*\)
  metadata:
    category: dependency
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.go'
    - registry/**/*.go
    exclude:
    - reference/*.go
    - vendor/**
- id: import-reference-and-digest
  message: Import block includes reference and digest modules
  severity: INFO
  languages:
  - go
  pattern-regex: import\s*\([^)]*"github\.com/distribution/reference"[^)]*"github\.com/opencontainers/go-digest"[^)]*\)
  metadata:
    category: dependency
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.go'
    - registry/**/*.go
    exclude:
    - reference/*.go
    - vendor/**
- id: import-context-and-reference-together
  message: Import block contains both context and new reference module
  severity: INFO
  languages:
  - go
  pattern-regex: import\s*\([^)]*"context"[^)]*"github\.com/distribution/reference"[^)]*\)
  metadata:
    category: dependency
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
  paths:
    include:
    - registry/**/*.go
- id: reference-import-in-test-files
  message: Test file imports external reference module
  severity: INFO
  languages:
  - go
  pattern: 'import "github.com/distribution/reference"

    '
  metadata:
    category: api
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*_test.go'
    exclude:
    - reference/*_test.go
    - vendor/**
- id: single-line-import-external-reference-storage
  message: Single-line import of external reference in storage
  severity: INFO
  languages:
  - go
  pattern: 'import "github.com/distribution/reference"

    '
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
