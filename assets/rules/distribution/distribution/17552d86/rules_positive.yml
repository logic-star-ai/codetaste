    category: dependency
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - registry/storage/*.go
- id: error-variable-forwarding-in-deprecated
  message: Error variable forwarding detected in deprecation wrapper
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: var ErrReferenceInvalidFormat = $PKG.ErrReferenceInvalidFormat
  - pattern: var ErrTagInvalidFormat = $PKG.ErrTagInvalidFormat
  - pattern: var ErrDigestInvalidFormat = $PKG.ErrDigestInvalidFormat
  - pattern: var ErrNameContainsUppercase = $PKG.ErrNameContainsUppercase
  - pattern: var ErrNameEmpty = $PKG.ErrNameEmpty
  - pattern: var ErrNameTooLong = $PKG.ErrNameTooLong
  - pattern: var ErrNameNotCanonical = $PKG.ErrNameNotCanonical
  metadata:
    category: api
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - reference/reference_deprecated.go
- id: wrapper-var-regexp-forward
  message: Regexp variable forwarding in deprecation wrapper
  severity: INFO
  languages:
  - go
  pattern-regex: var\s+\w+Regexp\s*=\s*\w+\.\w+Regexp
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - reference/regexp_deprecated.go
- id: regexp-variable-forwarding
  message: Regexp variable forwarding detected in regexp_deprecated.go
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: var NameRegexp = $PKG.NameRegexp
  - pattern: var TagRegexp = $PKG.TagRegexp
  - pattern: var DigestRegexp = $PKG.DigestRegexp
  - pattern: var DomainRegexp = $PKG.DomainRegexp
  - pattern: var IdentifierRegexp = $PKG.IdentifierRegexp
  - pattern: var AnchoredNameRegexp = $PKG.AnchoredNameRegexp
  - pattern: var AnchoredTagRegexp = $PKG.AnchoredTagRegexp
  - pattern: var AnchoredDigestRegexp = $PKG.AnchoredDigestRegexp
  - pattern: var ReferenceRegexp = $PKG.ReferenceRegexp
  - pattern: var AnchoredIdentifierRegexp = $PKG.AnchoredIdentifierRegexp
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - reference/regexp_deprecated.go
