rules:
- id: dispatch-in-callback-function
  message: dispatch() in callback function detected. Replace with Zustand action function
    calls
  severity: ERROR
  languages:
  - typescript
  pattern: "() => {\n  ...\n  dispatch($ACTION)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 54
- id: dispatch-in-async-function
  message: dispatch() in async function detected. Use Zustand async actions
  severity: ERROR
  languages:
  - typescript
  pattern: "async () => {\n  ...\n  dispatch($ACTION)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 54
- id: import-from-store-file
  message: Import from old Redux store detected. Replace with imports from zustand/*
    stores
  severity: ERROR
  languages:
  - typescript
  patterns:
  - pattern: import { ..., $FUNC, ... } from '@/store'
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(useStoreSelector|useStoreDispatch|RootState)$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
- id: action-payload-access
  message: Redux action.payload access detected. In Zustand, actions receive values
    directly as parameters
  severity: WARNING
  languages:
  - typescript
  pattern: action.payload
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: use-store-dispatch-hook
  message: useStoreDispatch() detected. Replace with Zustand action hooks (e.g., useSystemActions())
  severity: ERROR
  languages:
  - typescript
  pattern: useStoreDispatch()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: dispatch-variable-declaration
  message: Redux dispatch declaration detected. Replace with Zustand action hooks
    (e.g., const { setTheme } = useSystemActions())
  severity: ERROR
  languages:
  - typescript
  pattern: 'const $DISPATCH = useStoreDispatch()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: reducer-export-default
  message: Default export of reducer function detected. Replace with Zustand store
    export
  severity: ERROR
  languages:
  - typescript
  pattern: "export default function $REDUCER(state, action) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 27
- id: use-store-selector-hook
  message: useStoreSelector() detected. Replace with Zustand store hooks (e.g., useSystemStore((state)
    => state.theme))
  severity: ERROR
  languages:
  - typescript
  pattern: useStoreSelector($SELECTOR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: state-selector-with-arrow-function
  message: Complex Redux selector with arrow function detected. Replace with Zustand
    store selector
  severity: ERROR
  languages:
  - typescript
  pattern: "useStoreSelector((state) => {\n  ...\n  return $VALUE\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: use-store-selector-state-param
  message: useStoreSelector with state parameter detected. Replace with Zustand store
    hooks (e.g., useSystemStore((state) => ...))
  severity: ERROR
  languages:
  - typescript
  pattern: useStoreSelector((state) => ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: dispatch-in-event-handler
  message: dispatch() in event handler detected. Replace with Zustand action calls
  severity: ERROR
  languages:
  - typescript
  pattern: "const $HANDLER = () => {\n  ...\n  dispatch(...)\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: import-global-status-slice-actions
  message: Import from old globalStatus slice detected. Replace with imports from
    zustand/auth.ts or zustand/component.ts
  severity: ERROR
  languages:
  - typescript
  pattern-either:
  - pattern: import { ..., setAlert, ... } from '@/slices/globalStatus'
  - pattern: import { ..., setConfirm, ... } from '@/slices/globalStatus'
  - pattern: import { ..., setTokens, ... } from '@/slices/globalStatus'
  - pattern: import { ..., setNameSpace, ... } from '@/slices/globalStatus'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: destructure-from-use-store-selector
  message: Destructuring from useStoreSelector detected. Replace with Zustand store
    hooks
  severity: ERROR
  languages:
  - typescript
  pattern: 'const { $FIELD } = useStoreSelector(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: selector-with-destructuring-assignment
  message: Destructuring from useStoreSelector detected. Replace with individual Zustand
    store selectors
  severity: ERROR
  languages:
  - typescript
  pattern: 'const { ..., $FIELD, ... } = useStoreSelector($SELECTOR)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: dispatch-set-alert-action
  message: Redux dispatch(setAlert()) detected. Replace with useComponentActions().setAlert()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setAlert(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: state-destructuring-from-selector
  message: Redux state destructuring detected. Replace with individual Zustand store
    hooks
  severity: ERROR
  languages:
  - typescript
  patterns:
  - pattern: const { ..., $FIELD, ... } = useStoreSelector((state) => state.$SLICE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: redux-store-default-export
  message: Redux store default export detected. Remove store.ts file and use Zustand
    stores instead
  severity: ERROR
  languages:
  - typescript
  pattern: 'export default store

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - ui/app/src/store.ts
- id: dispatch-set-confirm-action
  message: Redux dispatch(setConfirm()) detected. Replace with useComponentActions().setConfirm()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setConfirm(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: payload-action-type-usage
  message: PayloadAction type usage in reducer detected. In Zustand, actions use direct
    parameter types
  severity: ERROR
  languages:
  - typescript
  pattern: "$REDUCER(state, action: PayloadAction<$TYPE>) {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: state-mutation-in-reducer
  message: Redux reducer with state mutation detected. Replace with Zustand set()
    function
  severity: ERROR
  languages:
  - typescript
  pattern: "$REDUCER(state, action) {\n  state.$FIELD = action.payload\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: state-selector-settings
  message: Redux selector for settings detected. Replace with zustand/system.ts or
    zustand/setting.ts store selectors
  severity: ERROR
  languages:
  - typescript
  pattern: useStoreSelector((state) => state.settings)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: multiple-dispatch-calls
  message: Multiple sequential dispatch calls detected. In Zustand, call actions directly
  severity: ERROR
  languages:
  - typescript
  pattern: 'dispatch($ACTION1)

    ...

    dispatch($ACTION2)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: multiple-fields-from-selector
  message: Multiple fields destructured from Redux selector. Replace with individual
    Zustand store selectors
  severity: ERROR
  languages:
  - typescript
  pattern: 'const { $FIELD1, ..., $FIELD2 } = useStoreSelector((state) => state.$SLICE)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: dispatch-in-switch-case
  message: dispatch() in switch case detected. Replace with Zustand action calls
  severity: ERROR
  languages:
  - typescript
  pattern: "case $CASE:\n  ...\n  dispatch(...)\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: redux-toolkit-import-detected
  message: Redux Toolkit import detected. Replace with Zustand stores (zustand/auth.ts,
    zustand/component.ts, etc.)
  severity: ERROR
  languages:
  - typescript
  pattern: import { ..., $FUNC, ... } from '@reduxjs/toolkit'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: state-selector-experiments
  message: Redux selector for experiments state detected. Replace with useExperimentStore()
    from zustand/experiment.ts
  severity: ERROR
  languages:
  - typescript
  pattern: useStoreSelector((state) => state.experiments)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: store-dispatch-direct-call
  message: Direct store.dispatch() call detected. In Zustand, call actions from hooks
  severity: ERROR
  languages:
  - typescript
  pattern: store.dispatch($ACTION)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: create-slice-usage
  message: createSlice() detected. Replace with Zustand create() function for store
    definition
  severity: ERROR
  languages:
  - typescript
  pattern: createSlice({ ... })
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: slice-actions-export
  message: Redux slice actions export detected. Replace with Zustand store actions
  severity: ERROR
  languages:
  - typescript
  pattern: 'export const { ..., $ACTION, ... } = $SLICE.actions

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: state-selector-global-status
  message: Redux selector for globalStatus detected. Replace with appropriate zustand/component.ts
    or zustand/auth.ts store selectors
  severity: ERROR
  languages:
  - typescript
  pattern: useStoreSelector((state) => state.globalStatus)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: redux-slice-name-property
  message: Redux createSlice with name property detected. Replace with Zustand store
  severity: ERROR
  languages:
  - typescript
  pattern: "createSlice({\n  name: $NAME,\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: redux-slice-initial-state
  message: Redux createSlice with initialState detected. Replace with Zustand create()
    with initial state
  severity: ERROR
  languages:
  - typescript
  pattern: "createSlice({\n  ...,\n  initialState: $STATE,\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: redux-slice-reducers-property
  message: Redux createSlice with reducers detected. Replace with Zustand store actions
  severity: ERROR
  languages:
  - typescript
  pattern: "createSlice({\n  ...,\n  reducers: {\n    ...\n  },\n  ...\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: import-create-slice
  message: createSlice import detected. Use Zustand create() instead
  severity: ERROR
  languages:
  - typescript
  pattern: import { ..., createSlice, ... } from '@reduxjs/toolkit'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: slice-reducer-property
  message: Slice reducer property access detected. Replace with Zustand store
  severity: ERROR
  languages:
  - typescript
  pattern: $SLICE.reducer
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: initial-state-constant
  message: initialState constant in Redux slice/reducer detected. In Zustand, define
    state in create() call
  severity: WARNING
  languages:
  - typescript
  pattern: "const initialState = {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/slices/*.ts'
    - '**/reducers/*.ts'
- id: named-export-of-slice-actions
  message: Named export of Redux slice actions detected. Export Zustand action hooks
    instead
  severity: ERROR
  languages:
  - typescript
  pattern: "export const {\n  $ACTION1,\n  $ACTION2,\n  ...\n} = $SLICE.actions\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: dispatch-set-auth-open-action
  message: Redux dispatch(setAuthOpen()) detected. Replace with useAuthActions().setAuthOpen()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setAuthOpen(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: dispatch-set-token-name-action
  message: Redux dispatch(setTokenName()) detected. Replace with useAuthActions().setTokenName()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setTokenName(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: payload-action-type-import
  message: PayloadAction type import detected. Remove Redux types and use direct parameter
    types in Zustand
  severity: ERROR
  languages:
  - typescript
  pattern: import { ..., PayloadAction, ... } from '@reduxjs/toolkit'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: use-store-selector-with-entire-state
  message: Selecting entire Redux state detected. Replace with individual Zustand
    store hooks for each domain
  severity: ERROR
  languages:
  - typescript
  pattern: 'const $STATE = useStoreSelector((state) => state)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: react-redux-import-detected
  message: react-redux import detected. Replace with Zustand hooks (useSystemStore,
    useAuthStore, etc.)
  severity: ERROR
  languages:
  - typescript
  pattern: import { ..., $FUNC, ... } from 'react-redux'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dispatch-set-namespace-action
  message: Redux dispatch(setNameSpace()) detected. Replace with useAuthActions().setNameSpace()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setNameSpace(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dispatch-set-tokens-action
  message: Redux dispatch(setTokens()) detected. Replace with useAuthActions().setTokens()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setTokens(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dispatch-remove-token-action
  message: Redux dispatch(removeToken()) detected. Replace with useAuthActions().removeToken()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(removeToken())
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: state-selector-workflows
  message: Redux selector for workflows state detected. Replace with useWorkflowStore()
    from zustand/workflow.ts
  severity: ERROR
  languages:
  - typescript
  pattern: useStoreSelector((state) => state.workflows)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: dispatch-in-useeffect-dependencies
  message: dispatch in useEffect dependencies detected. With Zustand, action functions
    are stable and don't need to be in dependencies
  severity: ERROR
  languages:
  - typescript
  pattern: "useEffect(() => {\n  ...\n}, [..., dispatch, ...])\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: redux-import-detected
  message: redux import detected. Replace with Zustand for state management
  severity: ERROR
  languages:
  - typescript
  pattern: import { ..., $FUNC, ... } from 'redux'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: configure-store-usage
  message: configureStore() usage detected. Remove Redux store configuration and use
    Zustand stores instead
  severity: ERROR
  languages:
  - typescript
  pattern: configureStore({ ... })
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: combine-reducers-usage
  message: combineReducers() detected. Replace with separate Zustand stores per domain
  severity: ERROR
  languages:
  - typescript
  pattern: combineReducers({ ... })
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: use-dispatch-hook
  message: useDispatch() detected. Replace with Zustand action hooks (e.g., useSystemActions())
  severity: ERROR
  languages:
  - typescript
  pattern: useDispatch()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: typed-use-selector-hook-type
  message: TypedUseSelectorHook usage detected. Remove Redux typed hooks and use Zustand
    stores
  severity: ERROR
  languages:
  - typescript
  pattern: 'const $HOOK: TypedUseSelectorHook<$TYPE> = useSelector

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: get-default-middleware-usage
  message: getDefaultMiddleware() detected. Remove Redux middleware configuration,
    not needed with Zustand
  severity: ERROR
  languages:
  - typescript
  pattern: getDefaultMiddleware(...)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: store-dispatch-type
  message: Redux store.dispatch type detected. Remove Redux-specific types and use
    Zustand action types
  severity: ERROR
  languages:
  - typescript
  pattern: 'type $TYPE = typeof $STORE.dispatch

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: root-state-type-from-reducer
  message: RootState type from reducer detected. Replace with individual Zustand store
    state types
  severity: ERROR
  languages:
  - typescript
  pattern: 'type RootState = ReturnType<typeof $REDUCER>

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dispatch-set-theme-action
  message: Redux dispatch(setTheme()) detected. Replace with useSystemActions().setTheme()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setTheme(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dispatch-set-lang-action
  message: Redux dispatch(setLang()) detected. Replace with useSystemActions().setLang()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setLang(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dispatch-set-debug-mode-action
  message: Redux dispatch(setDebugMode()) detected. Replace with useSettingActions().setDebugMode()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setDebugMode(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dispatch-set-alert-open-action
  message: Redux dispatch(setAlertOpen()) detected. Replace with useComponentActions().setAlertOpen()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setAlertOpen(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dispatch-set-confirm-open-action
  message: Redux dispatch(setConfirmOpen()) detected. Replace with useComponentActions().setConfirmOpen()
  severity: ERROR
  languages:
  - typescript
  pattern: $DISPATCH(setConfirmOpen(...))
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-store-ts-file-exists
  message: Old Redux store.ts file detected. This file should be removed after migrating
    to Zustand
  severity: ERROR
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - ui/app/src/store.ts
- id: old-reducers-index-file-exists
  message: Old Redux reducers/index.ts file detected. This file should be removed
    after migrating to Zustand
  severity: ERROR
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - ui/app/src/reducers/index.ts
- id: old-slice-experiments-file-exists
  message: Old Redux slice experiments.ts file detected. This should be replaced with
    zustand/experiment.ts
  severity: ERROR
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - ui/app/src/slices/experiments.ts
- id: old-slice-global-status-file-exists
  message: Old Redux slice globalStatus.ts file detected. This should be replaced
    with zustand/auth.ts and zustand/component.ts
  severity: ERROR
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - ui/app/src/slices/globalStatus.ts
- id: old-slice-settings-file-exists
  message: Old Redux slice settings.ts file detected. This should be replaced with
    zustand/system.ts and zustand/setting.ts
  severity: ERROR
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - ui/app/src/slices/settings.ts
- id: old-slice-workflows-file-exists
  message: Old Redux slice workflows.ts file detected. This should be replaced with
    zustand/workflow.ts
  severity: ERROR
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - ui/app/src/slices/workflows.ts
- id: redux-middleware-configuration
  message: Redux middleware configuration detected. Zustand doesn't require middleware
    for most use cases
  severity: ERROR
  languages:
  - typescript
  pattern: "configureStore({\n  ...,\n  middleware: $MIDDLEWARE,\n  ...\n})\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: redux-dev-tools-configuration
  message: Redux DevTools configuration detected. Zustand has simpler DevTools integration
    with devtools() middleware
  severity: ERROR
  languages:
  - typescript
  pattern: "configureStore({\n  ...,\n  devTools: $VALUE,\n  ...\n})\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: use-dispatch-with-type
  message: Typed useDispatch() detected. Replace with Zustand action hooks
  severity: ERROR
  languages:
  - typescript
  pattern: useDispatch<$TYPE>()
  metadata:
