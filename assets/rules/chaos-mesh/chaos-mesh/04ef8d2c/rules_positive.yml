rules:
- id: zustand-state-selector-dataflow
  message: State value flows from Zustand store selector to usage
  severity: INFO
  languages:
  - typescript
  - javascript
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $HOOK(($STATE) => $STATE.$FIELD)
    - metavariable-regex:
        metavariable: $HOOK
        regex: ^use[A-Z][a-zA-Z]*Store$
  pattern-sinks:
  - pattern: $SINK
  metadata:
    nr_refactored_patterns: 130
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-any-import-from-zustand
  message: Import from zustand package detected
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: import.*zustand
  metadata:
    nr_refactored_patterns: 71
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-action-call-without-dispatch
  message: Direct action call detected - no dispatch wrapper needed with Zustand
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $ACTION($...ARGS)
  - pattern-either:
    - pattern-inside: 'const { $ACTION } = $HOOK()

        ...

        '
    - pattern-inside: 'const { ..., $ACTION, ... } = $HOOK()

        ...

        '
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^use[A-Z][a-zA-Z]*Actions$
  - pattern-not: dispatch($ACTION(...))
  metadata:
    nr_refactored_patterns: 66
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-action-direct-invocation
  message: Zustand action invoked directly without dispatch
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'const { $ACTION } = $HOOK()

      ...

      $ACTION($ARG)

      '
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^use[A-Z][a-zA-Z]*Actions$
  metadata:
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-action-hook-call
  message: Zustand actions hook called to get action functions
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $ACTIONS()
  - metavariable-regex:
      metavariable: $ACTIONS
      regex: ^use[A-Z][a-zA-Z]*Actions$
  metadata:
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-actions-import-pattern
  message: Zustand actions hook imported in component
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { $ACTIONS } from '$PATH'
  - metavariable-regex:
      metavariable: $ACTIONS
      regex: ^use[A-Z][a-zA-Z]*Actions$
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-actions-hook-usage
  message: Zustand actions hook used for state mutations
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: const { $ACTION } = $HOOK()
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^use[A-Z][a-zA-Z]*Actions$
  - pattern-not: const { ... } = useStoreDispatch()
  metadata:
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-store-import-pattern
  message: Zustand store imported in component
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { $HOOK } from '$PATH'
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^use[A-Z][a-zA-Z]*Store$
  - metavariable-regex:
      metavariable: $PATH
      regex: .*zustand.*
  metadata:
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-hook-call-in-component
  message: Zustand hook called in component function
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: "const $COMP = (...) => {\n  ...\n  $HOOK(...)\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $HOOK
      regex: ^use[A-Z][a-zA-Z]*Store$
  metadata:
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-multiple-hooks-in-component
  message: Multiple Zustand hooks used in single component
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '$HOOK1(...)

      ...

      $HOOK2(...)

      '
  - metavariable-regex:
      metavariable: $HOOK1
      regex: ^use[A-Z][a-zA-Z]*Store$
  - metavariable-regex:
      metavariable: $HOOK2
      regex: ^use[A-Z][a-zA-Z]*Actions$
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-import-detected
  message: Zustand import detected - state management migrated from Redux
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { create } from 'zustand'
    - pattern: import { $FUNC } from 'zustand'
    - pattern: import $X from 'zustand'
  - pattern-not-inside: 'import { ... } from ''@reduxjs/toolkit''

      ...

      '
  - pattern-not-inside: 'import { ... } from ''react-redux''

      ...

      '
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: zustand-store-file-in-directory
  message: Zustand store file detected in zustand directory
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-inside: 'import { createSlice } from ''@reduxjs/toolkit''

      ...

      '
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/zustand/*.ts'
    - '**/zustand/*.tsx'
