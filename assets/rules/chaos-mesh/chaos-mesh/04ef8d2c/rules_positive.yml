    - pattern: useSystemStore(...)
    - pattern: useAuthStore(...)
    - pattern: useComponentStore(...)
    - pattern: useExperimentStore(...)
    - pattern: useWorkflowStore(...)
    - pattern: useSettingStore(...)
  metadata:
    category: basic
    nr_refactored_patterns: 44
    nr_legacy_patterns: 0
