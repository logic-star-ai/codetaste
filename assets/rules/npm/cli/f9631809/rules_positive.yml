rules:
- id: refactor-chdir-option-with-function
  message: Detected chdir option with function that receives dirs object
  severity: INFO
  languages:
  - javascript
  pattern: 'chdir: ($DIRS) => $EXPR

    '
  metadata:
    category: config
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-chdir-arrow-simple
  message: Detected chdir option with arrow function expression
  severity: INFO
  languages:
  - javascript
  pattern: 'chdir: $DIRS => $EXPR

    '
  metadata:
    category: config
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-chdir-option-arrow-function-body
  message: Detected chdir with arrow function containing block body
  severity: INFO
  languages:
  - javascript
  pattern: "chdir: ($PARAM) => {\n  ...\n  return $EXPR\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-chdir-single-param-arrow
  message: Detected chdir with single parameter arrow function
  severity: INFO
  languages:
  - javascript
  pattern: 'chdir: $PARAM => $EXPR

    '
  metadata:
    category: config
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: refactor-chdir-option-with-arrow-function-destructuring
  message: Detected chdir option with destructured dirs parameter
  severity: INFO
  languages:
  - javascript
  pattern: 'chdir: ({ $PROP, ... }) => $EXPR

    '
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: refactor-chdir-option-with-path-join
  message: Detected chdir option with path.join for directory path
  severity: INFO
  languages:
  - javascript
  pattern: 'chdir: ($PARAM) => path.join($ARG, ...)

    '
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: refactor-chdir-option-any-dir-path-join
  message: Detected chdir option using path.join with any standard directory
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: 'chdir: ({ $DIR }) => path.join($DIR, ...)

      '
  - metavariable-regex:
      metavariable: $DIR
      regex: (prefix|other|testdir|home|cache|globalPrefix)
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: refactor-chdir-in-mock-config-object
  message: Detected chdir in mock configuration object passed to async function
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: "{\n  ...,\n  chdir: $VALUE,\n  ...,\n  $OTHER: $VAL2,\n  ...\n}\n"
  - pattern-inside: 'await $FUNC($T, ...)

      '
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: refactor-chdir-value-from-dirs
  message: Detected chdir extracting value from dirs object
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: 'chdir: $FUNC

      '
  - metavariable-pattern:
      metavariable: $FUNC
      patterns:
      - pattern-either:
        - pattern: ({ prefix }) => $E
        - pattern: ({ other }) => $E
        - pattern: ({ testdir }) => $E
        - pattern: ({ home }) => $E
        - pattern: ({ cache }) => $E
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: refactor-chdir-using-dirs-parameter
  message: Detected chdir with function parameter in mock setup
  severity: INFO
  languages:
  - javascript
  patterns:
