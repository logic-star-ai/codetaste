      '
  - metavariable-pattern:
      metavariable: $FUNC
      pattern: ($PARAM) => $EXPR
  - pattern-inside: 'await $MOCK($T, { ... })

      '
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: refactor-chdir-using-path-module
  message: Detected chdir using path module join method
  severity: INFO
  languages:
  - javascript
  patterns:
  - pattern: 'chdir: $FUNC

      '
  - metavariable-pattern:
      metavariable: $FUNC
      pattern: '({ $DIR }) => path.join($DIR, ...)

        '
  metadata:
    category: config
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: refactor-chdir-function-any-dirs-property
  message: Detected chdir extracting property from dirs in mock call
