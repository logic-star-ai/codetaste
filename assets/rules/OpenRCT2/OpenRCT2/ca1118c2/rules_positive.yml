rules:
- id: config-types-lightweight-header
  message: ConfigTypes.h is a lightweight header without heavy dependencies
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-regex: enum\s+class\s+\w+
  - pattern-not: '#include "Drawing.h"

      '
  - pattern-not: '#include "../drawing/Drawing.h"

      '
  metadata:
    category: structural
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config/ConfigTypes.h'
- id: type-header-enum-only
  message: ConfigTypes.h contains only enum definitions, no complex types
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-regex: enum\s+class
  - pattern-not-regex: struct\s+\w+\s*\{
  - pattern-not-regex: class\s+\w+\s*\{
  metadata:
    category: abstraction
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config/ConfigTypes.h'
- id: type-headers-minimal-includes
  message: Type headers have minimal includes - only enum definitions
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-regex: enum\s+class
  - pattern-not-regex: '#include\s*<vector>'
  - pattern-not-regex: '#include\s*<string>'
  - pattern-not-regex: '#include\s*<memory>'
  metadata:
    category: architecture
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config/ConfigTypes.h'
- id: config-types-as-lightweight-interface
  message: ConfigTypes.h provides lightweight interface for config enums
  severity: INFO
  languages:
  - cpp
  pattern-regex: enum\s+class
  metadata:
    category: architecture
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
  paths:
    include:
    - src/openrct2/config/ConfigTypes.h
- id: config-types-multiple-enums-extracted
  message: ConfigTypes.h contains multiple extracted enum definitions
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-regex: enum\s+class\s+\w+\s*:\s*int32_t
  - pattern-regex: (?s).*enum\s+class.*enum\s+class.*
  metadata:
    category: structural
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config/ConfigTypes.h'
- id: config-types-enum-class-declarations
  message: ConfigTypes.h declares enum classes with int32_t base type
  severity: INFO
  languages:
  - cpp
  pattern-regex: enum\s+class\s+\w+\s*:\s*int32_t\s*[{;]
  metadata:
    category: basic
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config/ConfigTypes.h'
- id: lightweight-header-pattern
  message: Lightweight type headers without heavy standard library includes
  severity: INFO
  languages:
  - cpp
  patterns:
  - pattern-regex: enum\s+class.*:\s*int32_t
  - pattern-not-regex: '#include.*Drawing\.h'
  - pattern-not: '#include <vector>

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config/ConfigTypes.h'
    - '**/localisation/CurrencyTypes.h'
- id: type-extraction-pattern
  message: Config enum types extracted to ConfigTypes.h
  severity: INFO
  languages:
  - cpp
  pattern-regex: enum\s+class\s+(Sort|TemperatureUnit|ScaleQuality|MeasurementFormat|TitleMusicKind|VirtualFloorStyles|DrawingEngine)\s*:\s*int32_t
  metadata:
    category: abstraction
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config/ConfigTypes.h'
- id: extracted-types-reusable
  message: Extracted types are reusable across modules
  severity: INFO
  languages:
  - cpp
  pattern-regex: enum\s+class\s+\w+\s*:\s*int32_t\s*[{;]
  metadata:
    category: abstraction
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/config/ConfigTypes.h'
    - '**/localisation/CurrencyTypes.h'
- id: header-file-type-extraction-pattern
  message: Type extraction pattern - enum classes extracted to dedicated header
  severity: INFO
  languages:
  - cpp
  pattern-regex: enum\s+class\s+\w+\s*:\s*int32_t
  metadata:
    category: abstraction
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - src/openrct2/config/ConfigTypes.h
