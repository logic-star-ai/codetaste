rules:
- id: config-defines-enums-inline-not-in-types-file
  message: Config.h should not forward-declare enums inline if ConfigTypes.h doesn't
    exist - enums should be in ConfigTypes.h
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: enum\s+class\s+(MeasurementFormat|TemperatureUnit|ScaleQuality|Sort|VirtualFloorStyles|DrawingEngine|TitleMusicKind)\s*:\s*int32_t\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/openrct2/config/Config.h
- id: config-forward-declares-all-config-enums
  message: Config.h forward-declares config enums - should include ConfigTypes.h with
    actual definitions
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: enum\s+class\s+(MeasurementFormat|TemperatureUnit|ScaleQuality|Sort|VirtualFloorStyles|DrawingEngine|TitleMusicKind)\s*:\s*int32_t\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - src/openrct2/config/Config.h
- id: config-h-has-inline-enum-definitions
  message: Config.h has inline enum definitions - these should be moved to ConfigTypes.h
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: enum\s+class\s+(MeasurementFormat|TemperatureUnit|ScaleQuality|Sort|VirtualFloorStyles|DrawingEngine|TitleMusicKind)\s*:\s*int32_t\s*\{[^}]+\}
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - src/openrct2/config/Config.h
- id: config-missing-gx-forward-declaration
  message: Config.h should have forward declaration `struct Gx;` after removing Drawing.h
    include
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \A(?![\s\S]*struct\s+Gx\s*;)[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/openrct2/config/Config.h
- id: config-missing-configtypes-include
  message: Config.h should include ConfigTypes.h for enum definitions
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \A(?![\s\S]*#include.*ConfigTypes\.h)[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/openrct2/config/Config.h
- id: config-missing-currencytypes-include
  message: Config.h should include CurrencyTypes.h for currency enum definitions
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \A(?![\s\S]*#include.*CurrencyTypes\.h)[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/openrct2/config/Config.h
- id: platform-missing-string-include
  message: Platform.h should explicitly include String.hpp (was transitive through
    Config.h)
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \A(?![\s\S]*#include.*String\.hpp)[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/openrct2/platform/Platform.h
- id: platform-missing-ttfont-forward-declaration
  message: Platform.h should have forward declaration for TTFFontDescriptor
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \A(?![\s\S]*struct\s+TTFFontDescriptor)[\s\S]*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - src/openrct2/platform/Platform.h
