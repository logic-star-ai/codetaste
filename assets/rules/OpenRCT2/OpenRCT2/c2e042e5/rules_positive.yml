rules:
- id: context-interface-ref-local-var
  message: Detected local reference variable from context getter
  severity: INFO
  languages:
  - cpp
  pattern-regex: (auto|IUiContext|IAudioContext|IPlatformEnvironment|Ui::IUiContext|Audio::IAudioContext)\s*&\s*\w+\s*=\s*[^;]+Get(?:UiContext|AudioContext|PlatformEnvironment)\(\)\s*;
