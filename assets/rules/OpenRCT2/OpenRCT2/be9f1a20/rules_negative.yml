rules:
- id: detect-titleload-pattern-generic
  message: Call to TitleLoad function. Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern-either:
    - pattern: TitleLoad()
    - pattern: TitleLoad(...)
    - pattern: 'TitleLoad();

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: detect-intro-state-in-comment-block
  message: Reference to gIntroState found. Should use IntroIsPlaying() or Scene abstraction
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: gIntroState
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: detect-gintrostate-usage
  message: Usage of global gIntroState variable detected. Should use IntroIsPlaying()
    or Scene-based state management
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: gIntroState
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-titlescreen-namespace-prefix
  message: Reference to TitleScreen namespace/class. Should use TitleScene
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: TitleScreen::\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-titlescreen-method-call
  message: Call to TitleScreen method. Should use TitleScene
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: TitleScreen::[A-Za-z_]\w*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-gintrostate-assignment
  message: Assignment to gIntroState detected. State should be managed internally
    by IntroScene
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: gIntroState = $VALUE
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-intro-state-modification-assign
  message: Assignment to gIntroState. State should be managed internally by IntroScene
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: gIntroState = $EXPR
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-gintrostate-space-equals
  message: Assignment to gIntroState (with spaces). State should be managed by IntroScene
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: gIntroState = $VAL
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-title-load-call
  message: Direct call to TitleLoad() detected. Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: TitleLoad(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-titleload-standalone
  message: Standalone TitleLoad() call. Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: 'TitleLoad();

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-titleload-with-semicolon
  message: Call to TitleLoad(). Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: TitleLoad()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-title-load-any-context
  message: Call to TitleLoad(). Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern-either:
    - pattern: TitleLoad()
    - pattern: TitleLoad(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-titleload-call-simple
  message: Call to TitleLoad(). Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: TitleLoad()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-title-load-conditional
  message: Conditional TitleLoad() call. Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "if ($COND)\n{\n  ...\n  TitleLoad();\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-titleload-in-conditional-single-line
  message: Single-line conditional TitleLoad(). Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: if ($COND) TitleLoad();
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-titleload-after-condition
  message: Conditional TitleLoad() without braces. Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "if ($COND)\n  TitleLoad();\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-intro-header-path-include
  message: Include of Intro.h file. Should use IntroScene.h from scenes/
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+".*Intro\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-titlescreen-header-path-include
  message: Include of TitleScreen.h file. Should use TitleScene.h from scenes/title/
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+".*TitleScreen\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-main-loop-with-title
  message: Function with TitleLoad() call. Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "$TYPE $FUNC(...)\n{\n  ...\n  TitleLoad();\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-titleload-before-statement
  message: TitleLoad() before statement. Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: 'TitleLoad();

    $STMT;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-gintrostate-comparison
  message: Comparison with gIntroState detected. Should use IntroIsPlaying() instead
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern-either:
    - pattern: gIntroState == $VALUE
    - pattern: gIntroState != $VALUE
    - pattern: $VALUE == gIntroState
    - pattern: $VALUE != gIntroState
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-gintrostate-inequality-check
  message: Inequality check with gIntroState. Should use IntroIsPlaying() or Scene-based
    logic
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern-either:
    - pattern: gIntroState != $VAL
    - pattern: $VAL != gIntroState
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-titleload-sequential-calls
  message: Sequential code with TitleLoad(). Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: '$STMT1;

    TitleLoad();

    $STMT2;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-titleload-call-in-func
  message: Function calling TitleLoad(). Should use SetActiveScene(GetTitleScene())
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "void $FUNC(...)\n{\n  ...\n  TitleLoad();\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-titlescreen-header-include
  message: Include of old title/TitleScreen.h detected. Should include scenes/title/TitleScene.h
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern-either:
    - pattern: '#include "title/TitleScreen.h"'
    - pattern: '#include <title/TitleScreen.h>'
    - pattern: '#include "title/TitleScreen.h"

        '
    - pattern: '#include <title/TitleScreen.h>

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-gintrostate-in-window-code
  message: Window code checking gIntroState. Should use IntroIsPlaying() or remove
    intro state checks
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "if (gIntroState != ...)\n{\n  ...\n}\n"
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
