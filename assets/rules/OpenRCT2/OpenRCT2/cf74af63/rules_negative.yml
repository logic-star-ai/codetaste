rules:
- id: scenario-include-in-any-window-file
  message: Remove unnecessary
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#include\s*[<"].*scenario/Scenario\.h[>"]'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '*/windows/*.cpp'
    exclude:
    - '*/windows/ScenarioSelect.cpp'
    - '*/windows/Options.cpp'
    - '*/windows/Objective.cpp'
