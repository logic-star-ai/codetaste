rules:
- id: rect-initialized-from-four-separate-values
  message: Ensure Rect is used consistently throughout codebase for rectangular regions.
  severity: INFO
  languages:
  - python
  pattern: '$VAR = Rect($A, $B, $C, $D)

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: gui-rect-usage-pattern
  message: Use arcade.gui.GUIRect instead of arcade.gui.Rect.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: arcade.gui.Rect(...)
  - pattern-not: arcade.gui.GUIRect(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: camera-method-tuple-return-annotation
  message: Camera methods should return Vec2 instead of Tuple for consistency.
  severity: WARNING
  languages:
  - python
  pattern-regex: def\s+\w+\s*\([^)]*\)\s*->\s*Tuple\[(?:float|int),\s*(?:float|int)\]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '**/camera/*.py'
- id: intrect-in-union-type
  message: IntRect in type annotation is obsolete. Use Rect or tuple type instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: ': .*\bIntRect\b'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: import-intrect-usage
  message: IntRect was removed. Use Rect or tuple types instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: import.*IntRect|IntRect.*=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: camera-viewport-stored-as-tuple
  message: Camera viewport should be stored as Rect object, not tuple.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: '$SELF.viewport = ($X, $Y, $WIDTH, $HEIGHT)

      '
  - pattern-inside: "class $CAMERA:\n  ...\n"
  - metavariable-pattern:
      metavariable: $CAMERA
      pattern-regex: .*Camera.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/camera/*.py'
- id: camera-method-project-returns-tuple
  message: Camera project method should return Vec2, not Tuple.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def project(self, ...) -> Tuple[$T1, $T2]:\n  ...\n"
  - pattern-inside: "class $CAMERA:\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/camera/*.py'
- id: obsolete-intrect-function-param
  message: IntRect parameter type is obsolete. Use Rect or tuple type instead.
  severity: WARNING
  languages:
  - python
  pattern: 'def $FUNC(..., $PARAM: IntRect, ...): ...

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: camera-method-tuple-return-type
  message: Camera methods should return Vec2/Vec3 instead of Tuple type annotations.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def $METHOD($SELF, ...) -> Tuple[$TYPE, $TYPE2]:\n  ...\n"
  - pattern-inside: "class $CAMERA:\n  ...\n"
  - metavariable-pattern:
      metavariable: $CAMERA
      pattern-regex: .*Camera.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/camera/*.py'
- id: camera-returning-tuple-in-method
  message: Camera methods should return Vec2/Vec3 types instead of Tuple.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def $METHOD(self, ...) -> Tuple[$T1, $T2]:\n  ...\n  return ...\n"
  - pattern-inside: "class $CAMERA:\n  ...\n"
  - metavariable-regex:
      metavariable: $CAMERA
      regex: .*Camera.*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/camera/*.py'
- id: intrect-in-type-annotation
  message: IntRect type annotation is obsolete. Use Rect or appropriate tuple type
    instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: :\s*IntRect\s*(?:[,=\)])
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: camera-method-with-tuple-vec2-return
  message: Camera method should return Vec2 instead of Tuple[float, float].
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def $METHOD(self, ...) -> Tuple[float, float]:\n  ...\n"
  - pattern-inside: "class $CAMERA:\n  ...\n"
  - metavariable-regex:
      metavariable: $CAMERA
      regex: .*Camera.*
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?!__init__).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '**/camera/*.py'
- id: accessing-viewport-by-index
  message: Viewport should use Rect properties (x, y, width, height) instead of tuple
    indexing.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $VAR.viewport[0]
    - pattern: $VAR.viewport[1]
    - pattern: $VAR.viewport[2]
    - pattern: $VAR.viewport[3]
  - metavariable-pattern:
      metavariable: $VAR
      pattern-regex: .*[Cc]amera.*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: import-floatrect-usage
  message: FloatRect was removed. Use Rect or tuple types instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: import.*FloatRect|FloatRect.*=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: rect-type-alias-definitions-in-types
  message: Old Rect type aliases (IntRect, FloatRect, RectList) should be removed.
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: 'IntRect = Union[Tuple[int, int, int, int], List[int]]

      '
  - pattern: 'FloatRect = Union[Tuple[AsFloat, AsFloat, AsFloat, AsFloat], List[AsFloat]]

      '
  - pattern: 'RectList = Union[Tuple[IntRect, ...], List[IntRect]]

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/types/__init__.py'
- id: types-module-exports-obsolete-aliases
  message: Types module should not define obsolete rect aliases (IntRect, FloatRect,
    RectList).
  severity: WARNING
  languages:
  - python
  pattern-regex: (IntRect|FloatRect|RectList)\s*=\s*Union
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/types/__init__.py'
- id: obsolete-rect-alias-in-union
  message: Union types should not use obsolete rect aliases (IntRect, FloatRect, RectList).
  severity: WARNING
  languages:
  - python
  pattern-regex: Union\[.*(?:IntRect|FloatRect|RectList).*\]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: camera-viewport-attribute-tuple-type
  message: Camera viewport attribute should be typed as Rect, not Tuple[int, int,
    int, int].
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: 'self.viewport: Tuple[int, int, int, int]

      '
  - pattern-inside: "class $CAMERA:\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/camera/*.py'
- id: import-rectlist-usage
  message: RectList was removed. Use list[Rect] or sequence types instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: import.*RectList|RectList.*=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: projector-init-with-viewport-tuple
  message: Projector __init__ should accept viewport as Rect, not Tuple[int, int,
    int, int].
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "def __init__(self, ..., viewport: Tuple[int, int, int, int], ...):\n\
      \  ...\n"
  - pattern-inside: "class $PROJECTOR:\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/camera/*.py'
- id: obsolete-rectlist-function-param
  message: RectList parameter type is obsolete. Use list[Rect] or sequence type instead.
  severity: WARNING
  languages:
  - python
  pattern: 'def $FUNC(..., $PARAM: RectList, ...): ...

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: floatrect-in-union-type
  message: FloatRect in type annotation is obsolete. Use Rect or tuple type instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: ': .*\bFloatRect\b'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rectlist-in-union-type
  message: RectList in type annotation is obsolete. Use list[Rect] or sequence type
