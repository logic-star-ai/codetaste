    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: projection-data-with-viewport
  message: ProjectionData protocol should not contain viewport field (it was removed).
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "class $CLASS(ProjectionData):\n  ...\n  viewport = ...\n"
    - pattern: "class $CLASS(Protocol):\n  ...\n  viewport: $TYPE\n"
  - pattern-inside: "class $NAME:\n  ...\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: rect-missing-contains-dunder
  message: Rect class should implement __contains__ for 'point in rect' checks.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "class Rect:\n  ...\n"
  - pattern-not: "class Rect:\n  ...\n  def __contains__($SELF, $POINT):\n    ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/types/rect.py'
- id: rect-missing-mul-dunder
  message: Rect class should implement __mul__ for scaling relative to (0,0).
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "class Rect:\n  ...\n"
  - pattern-not: "class Rect:\n  ...\n  def __mul__($SELF, $SCALAR):\n    ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/types/rect.py'
