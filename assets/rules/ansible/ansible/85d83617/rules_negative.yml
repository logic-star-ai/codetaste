- id: ansible-tls-old-ssl-rootcert-in-module-params
  message: Old TLS parameter 'ssl_rootcert' accessed from module.params. Refactor
    to use 'ca_cert' instead.
  severity: WARNING
  languages:
  - python
  pattern-either:
