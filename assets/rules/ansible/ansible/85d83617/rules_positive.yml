  severity: INFO
  languages:
  - python
  pattern: $MODULE.params["ca_cert"]
  metadata:
    category: api
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  paths:
    exclude:
    - lib/ansible/modules/clustering/etcd3.py
