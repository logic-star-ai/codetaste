  patterns:
  - pattern-regex: client_key
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/modules/notification/**/*.py'
    exclude:
    - '**/test_*.py'
- id: client-cert-in-inventory-plugins
  message: Detected 'client_cert' in inventory plugin
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: client_cert
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
