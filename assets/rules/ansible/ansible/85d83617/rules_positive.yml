    nr_legacy_patterns: 0
  paths:
    include:
    - '**/connection/psrp.py'
- id: client-key-get-with-default
  message: Detected get() method with default for 'client_key'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $PARAMS.get('client_key', $DEFAULT)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/test_*.py'
    - '**/tests/*.py'
- id: client-cert-in-notification-modules
  message: Detected 'client_cert' in notification modules
  severity: INFO
