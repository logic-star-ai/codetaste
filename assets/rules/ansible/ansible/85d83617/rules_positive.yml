- id: ca-cert-string-in-list
  message: Detected 'ca_cert' string in a list
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: '[..., ''ca_cert'', ...]

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/openssl_certificate.py'
    - '**/test_*.py'
- id: client-cert-in-lookup-plugins
  message: Detected 'client_cert' in lookup plugin
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: client_cert
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plugins/lookup/*.py'
    exclude:
    - '**/consul_kv.py'
    - '**/test_*.py'
- id: client-key-in-lookup-plugins
  message: Detected 'client_key' in lookup plugin
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: client_key
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plugins/lookup/*.py'
    exclude:
    - '**/consul_kv.py'
    - '**/test_*.py'
- id: ca-cert-attribute-access
  message: Detected attribute access for ca_cert
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OBJ.ca_cert
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test_*.py'
    - '**/openssl_certificate.py'
- id: client-key-dataflow-to-ssl-context
  message: Detected 'client_key' flowing to SSL/TLS context
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: $X['client_key']
  - pattern: $X.get('client_key', ...)
  pattern-sinks:
  - pattern: $OBJ.load_cert_chain(..., keyfile=$SINK, ...)
  - pattern: $OBJ.key(..., $SINK, ...)
  - pattern: $FUNC(key=$SINK, ...)
  - pattern: $FUNC(keyfile=$SINK, ...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/test_*.py'
  options:
    symbolic_propagation: true
- id: ca-cert-none-check-with-access
  message: Detected ca_cert None check followed by usage
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - patterns:
      - pattern-inside: "$CA = $P.get('ca_cert', ...)\n...\nif $CA:\n  ...\n"
    - patterns:
      - pattern-inside: "$CA = $P['ca_cert']\n...\nif $CA:\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/openssl_certificate.py'
    - '**/test_*.py'
  options:
    symbolic_propagation: true
