rules:
- id: ca-cert-in-database-modules
  message: Detected 'ca_cert' in database modules
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: ca_cert
  metadata:
    nr_refactored_patterns: 68
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/modules/database/**/*.py'
    exclude:
    - '**/test_*.py'
- id: ca-cert-string-literal
  message: Detected 'ca_cert' string literal
  severity: INFO
  languages:
  - python
  pattern: '''ca_cert'''
  metadata:
    nr_refactored_patterns: 58
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/openssl_certificate.py'
    - '**/test_*.py'
    - '**/tests/*.py'
- id: ca-cert-kwarg-call-exclude-docker-contrib
  message: Detected function call with ca_cert keyword argument (excluding docker)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $FUNC(..., ca_cert=$ARG, ...)
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/docker.py'
    - '**/docker/**'
    - '**/contrib/**'
    - '**/test_*.py'
- id: ca-cert-in-dict-constructor
  message: Detected 'ca_cert' key in dict() constructor
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: dict(..., ca_cert=$VALUE, ...)
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/openssl_certificate.py'
    - '**/docker.py'
    - '**/contrib/**'
    - '**/test_*.py'
- id: client-cert-in-dict-exclude-urls-bigip
  message: Detected 'client_cert' key in dict() constructor (refined)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: dict(..., client_cert=$VALUE, ...)
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/urls.py'
    - '**/bigip_gtm_monitor_https.py'
    - '**/test_*.py'
- id: ca-cert-in-lookup-exclude-k8s
  message: Detected 'ca_cert' in lookup plugin (excluding k8s)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: ca_cert
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plugins/lookup/*.py'
    exclude:
    - '**/k8s.py'
    - '**/test_*.py'
- id: ca-cert-dataflow-to-ssl-context
  message: Detected 'ca_cert' flowing to SSL/TLS verification
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: $X['ca_cert']
  - pattern: $X.get('ca_cert', ...)
  pattern-sinks:
  - pattern: $OBJ.load_verify_locations($SINK, ...)
  - pattern: $OBJ.ca_certs = $SINK
  - pattern: $FUNC(ca_bundle=$SINK, ...)
  - pattern: $FUNC(verify=$SINK, ...)
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/openssl_certificate.py'
    - '**/test_*.py'
  options:
    symbolic_propagation: true
- id: client-cert-in-connection-plugins
  message: Detected 'client_cert' in connection plugin
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: client_cert
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plugins/connection/*.py'
    exclude:
    - '**/test_*.py'
- id: client-key-in-connection-plugins
  message: Detected 'client_key' in connection plugin
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: client_key
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plugins/connection/*.py'
    exclude:
    - '**/test_*.py'
- id: client-cert-variable-assignment
  message: Detected assignment to 'client_cert' variable
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $VAR = $X['client_cert']
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/test_*.py'
- id: client-key-variable-assignment
  message: Detected assignment to 'client_key' variable
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $VAR = $X['client_key']
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/etcd3.py'
    - '**/test_*.py'
- id: ca-cert-doc-exclude-k8s-docker
  message: Detected 'ca_cert' in documentation (excluding k8s and docker)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: ca_cert
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/doc_fragments/**/*.py'
    exclude:
    - '**/k8s_auth_options.py'
    - '**/docker.py'
    - '**/test_*.py'
- id: validate-certs-in-kubectl-connection
  message: Detected validate_certs in kubectl/oc connection plugin
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: validate_certs
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/connection/kubectl.py'
    - '**/connection/oc.py'
- id: ca-cert-get-method
  message: Detected get() call for 'ca_cert' parameter
  severity: INFO
  languages:
  - python
  pattern: $X.get('ca_cert', ...)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: client-key-in-plugins-dir
  message: Detected 'client_key' in plugins directory
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: '''client_key'''
    - pattern: '"client_key"'
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/plugins/**/*.py'
    exclude:
    - '**/test_*.py'
    - '**/tests/*.py'
- id: client-cert-multiline-doc
  message: Detected 'client_cert' in documentation strings
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: client_cert
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/doc_fragments/**/*.py'
    exclude:
    - '**/url.py'
    - '**/docker.py'
    - '**/test_*.py'
- id: client-key-multiline-doc
  message: Detected 'client_key' in documentation strings
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: client_key
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/doc_fragments/**/*.py'
    exclude:
    - '**/url.py'
    - '**/docker.py'
    - '**/test_*.py'
- id: ca-cert-in-psrp-connection
  message: Detected ca_cert in psrp connection plugin
  severity: INFO
  languages:
  - python
  patterns:
