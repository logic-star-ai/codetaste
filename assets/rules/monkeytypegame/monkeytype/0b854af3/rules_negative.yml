- id: frontend-date-time-uses-date-now
  message: Date functions using Date.now() should be removed - import from @monkeytype/util/date-and-time
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: "export function getCurrentDayTimestamp(...): number {\n  ...\n  Date.now()\n\
      \  ...\n}\n"
  - pattern: "export function isToday($TS: $T, ...): boolean {\n  ...\n  Date.now()\n\
      \  ...\n}\n"
  - pattern: "export function isYesterday($TS: $T, ...): boolean {\n  ...\n  Date.now()\n\
      \  ...\n}\n"
