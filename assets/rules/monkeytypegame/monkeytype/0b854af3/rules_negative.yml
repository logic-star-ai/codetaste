rules:
- id: frontend-import-numbers-relative-path
  message: Import from '@monkeytype/util/numbers' instead of relative utils/numbers
    path
  severity: WARNING
  languages:
  - typescript
  pattern-either:
  - pattern: 'import * as Numbers from "../utils/numbers"

      '
  - pattern: 'import * as Numbers from "../../utils/numbers"

      '
  - pattern: 'import * as $VAR from "../utils/numbers"

      '
  - pattern: 'import * as $VAR from "../../utils/numbers"

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: backend-misc-export-date-utils
  message: Date/time utility functions should be removed from misc.ts and imported
    from @monkeytype/util/date-and-time
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export function (getCurrentDayTimestamp|getStartOfDayTimestamp|isToday|isYesterday|getStartOfWeekTimestamp|getCurrentWeekTimestamp)\s*\(
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - backend/src/utils/misc.ts
- id: frontend-numbers-export-shared-utils
  message: Shared number utility functions should be removed and imported from @monkeytype/util/numbers
  severity: WARNING
  languages:
  - typescript
  pattern-regex: export function (roundTo1|roundTo2|stdDev|mean|median|randomIntFromRange)\s*\(
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - frontend/src/ts/utils/numbers.ts
