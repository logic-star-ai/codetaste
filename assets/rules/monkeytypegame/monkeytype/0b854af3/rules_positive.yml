rules:
- id: util-spread-operator
  message: Spread operator in util package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: '...$ARR'
  metadata:
    nr_refactored_patterns: 486
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/**/*.ts'
- id: util-function-call-statement
  message: Function call in util package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: $FUNC(...)
  metadata:
    nr_refactored_patterns: 141
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/**/*.ts'
- id: util-export-multiple-functions
  message: Multiple exports in util module
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'export function $F1(...) { ... }

      ...

      export function $F2(...) { ... }

      '
  metadata:
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/**/*.ts'
- id: import-from-monkeytype-util-numbers
  message: Detected import from new shared @monkeytype/util/numbers package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $UTIL, ... } from '$PKG'
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@monkeytype/util/(numbers|number)$
  - pattern-not-inside: 'import { ..., $UTIL, ... } from ''./utils/...''

      ...

      '
  - pattern-not-inside: 'import { ..., $UTIL, ... } from ''../utils/...''

      ...

      '
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: number-util-from-shared-in-calculation
  message: Number utility from shared package used in calculation
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { ..., $NUM_FUNC, ... } from ''@monkeytype/util/numbers'';

        ...

        $VAR = $NUM_FUNC(...)

        '
    - pattern: 'import { ..., $NUM_FUNC, ... } from ''@monkeytype/util/numbers'';

        ...

        const $VAR = $NUM_FUNC(...)

        '
  - metavariable-regex:
      metavariable: $NUM_FUNC
      regex: .*
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: shared-util-individual-module-export
  message: Individual module export pattern in shared util package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export function $FUNC(...) { ... }
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/src/*.ts'
    - '**/packages/util/*.ts'
- id: it-test-in-util-tests
  message: Individual test case in shared util tests
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: it($STR, ...)
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/__test__/**/*.spec.ts'
    - '**/packages/util/__tests__/**/*.spec.ts'
- id: import-from-monkeytype-util-datetime
  message: Detected import from new shared @monkeytype/util date-and-time package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $UTIL, ... } from '$PKG'
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@monkeytype/util/(date-and-time|datetime|date)$
  - pattern-not-inside: 'import { ..., $UTIL, ... } from ''./utils/...''

      ...

      '
  - pattern-not-inside: 'import { ..., $UTIL, ... } from ''../utils/...''

      ...

      '
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: shared-util-test-files-exist
  message: New shared util package test files detected
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/__test__/*.spec.ts'
    - '**/packages/util/__tests__/*.spec.ts'
    - '**/packages/util/test/*.spec.ts'
- id: any-util-package-src-file
  message: Any source file in util package detected
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: ^[\s\S]*$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/src/**/*.ts'
- id: import-from-monkeytype-util-arrays
  message: Detected import from new shared @monkeytype/util/arrays package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $UTIL, ... } from '$PKG'
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@monkeytype/util/(arrays|array)$
  - pattern-not-inside: 'import { ..., $UTIL, ... } from ''./utils/...''

      ...

      '
  - pattern-not-inside: 'import { ..., $UTIL, ... } from ''../utils/...''

      ...

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: shared-util-const-export
  message: Constant export in shared util package
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: export const $CONST = $VAL
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/src/*.ts'
    - '**/packages/util/*.ts'
- id: package-util-in-dependencies
  message: Package.json referencing @monkeytype/util
  severity: INFO
  languages:
  - json
  patterns:
  - pattern: "{\n  ...,\n  \"dependencies\": {\n    ...,\n    \"@monkeytype/util\"\
      : $VERSION,\n    ...\n  },\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
