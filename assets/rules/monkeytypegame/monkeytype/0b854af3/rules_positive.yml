rules:
- id: util-package-new-date-usage
  message: 'Refactoring detected: new Date() in shared util'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: new Date($ARG)
  metadata:
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/**/*.ts'
- id: shared-util-function-call-after-import
  message: 'Refactoring detected: Function from shared util package being called'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { ..., $FUNC, ... } from ''$PKG'';

        ...

        $FUNC(...);

        '
    - pattern: 'import { ..., $FUNC, ... } from ''$PKG'';

        ...

        const $VAR = $FUNC(...);

        '
    - pattern: 'import { ..., $FUNC, ... } from ''$PKG'';

        ...

        return $FUNC(...);

        '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@[a-zA-Z0-9_-]+/util(s)?(/.*)?$
  metadata:
    nr_refactored_patterns: 34
    nr_legacy_patterns: 0
- id: util-namespace-usage-roundto2
  message: 'Refactoring detected: roundTo2 used via namespace import'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: 'import * as $NS from ''$PKG'';

      ...

      $NS.$FUNC(...)

      '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@[a-zA-Z0-9_-]+/util(s)?(/.*)?$
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(round|mean|std|median|intersect|timestamp|day|week|kogasa|random|map).*
  metadata:
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: util-package-import-numbers-detection
  message: 'Refactoring detected: Import from shared utility package for number operations'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $FUNC, ... } from '$PKG'
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@[a-zA-Z0-9_-]+/util(s)?(/numbers)?$
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(round|std|dev|standard|deviation|mean|average|median|kogasa|random|range|map).*
  - pattern-not-inside: 'import { ... } from ''./utils/...''

      ...

      '
  metadata:
    nr_refactored_patterns: 18
    nr_legacy_patterns: 0
- id: util-package-jsdoc-comment
  message: 'Refactoring detected: JSDoc comments in shared util functions'
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: \/\*\*[\s\S]*?\*\/[\s\S]*?export\s+(function|const)
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/**/*.ts'
- id: util-package-namespace-import-detection
  message: 'Refactoring detected: Namespace import from shared utility package'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import * as $NS from '$PKG'
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@[a-zA-Z0-9_-]+/util(s)?(/.*)?$
  - pattern-not: import * as $X from './utils/...'
  - pattern-not: import * as $Y from '../utils/...'
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: util-package-test-it-call
  message: 'Refactoring detected: Test it block in util package'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: it($NAME, ...)
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/**/*.spec.ts'
    - '**/packages/util/**/*.test.ts'
- id: util-package-import-datetime-detection
  message: 'Refactoring detected: Import from shared utility package for date/time
    operations'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern: import { ..., $FUNC, ... } from '$PKG'
  - metavariable-regex:
      metavariable: $PKG
      regex: ^@[a-zA-Z0-9_-]+/util(s)?(/date|/time|/datetime|/date-and-time)?$
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(timestamp|today|yesterday|week|day|start|current|get).*
  - pattern-not-inside: 'import { ... } from ''../utils/...''

      ...

      '
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: util-package-timestamp-export
  message: 'Refactoring detected: Timestamp function exported from shared package'
  severity: INFO
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'export function $FUNC(...) { ... }

        '
    - pattern: 'export const $FUNC = (...) => ...

        '
  - metavariable-regex:
      metavariable: $FUNC
      regex: (?i).*(timestamp|day).*
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/packages/util/**/*.ts'
