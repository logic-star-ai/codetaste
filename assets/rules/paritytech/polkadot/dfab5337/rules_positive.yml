rules:
- id: common-exports-executor-params
  message: Detected pvf-common contains ExecutorParams types
  severity: INFO
  languages:
  - rust
  pattern-regex: ExecutorParams|ExecutorParam
  metadata:
    category: api
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/common/src/**/*.rs
- id: import-pvf-common-crate
  message: Detected import from new pvf-common crate
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: use polkadot_node_core_pvf_common::$X;
    - pattern: use polkadot_node_core_pvf_common::$X::$Y;
    - pattern: use polkadot_node_core_pvf_common::{ $...ITEMS };
  metadata:
    category: structural
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: any-file-imports-common-crate
  message: Detected any file imports from new pvf-common crate
  severity: INFO
  languages:
  - rust
  pattern: use polkadot_node_core_pvf_common::$X;
  metadata:
    category: structural
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: multiline-import-from-common
  message: Detected multi-line import from pvf-common crate
  severity: INFO
  languages:
  - rust
  pattern-regex: use\s+polkadot_node_core_pvf_common::\{[\s\S]*?\}
  metadata:
    category: api
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: new-crates-have-copyright-headers
  message: Detected new crate files have copyright headers
  severity: INFO
  languages:
  - rust
  pattern-regex: Copyright.*Parity Technologies
  metadata:
    category: basic
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/common/src/**/*.rs
    - node/core/pvf/execute-worker/src/**/*.rs
    - node/core/pvf/prepare-worker/src/**/*.rs
- id: host-imports-from-common-multiple
  message: Detected host imports multiple items from pvf-common
  severity: INFO
  languages:
  - rust
  pattern-regex: use\s+polkadot_node_core_pvf_common::\{[^}]+\}
  metadata:
    category: dependency
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/src/**/*.rs
- id: common-has-common-utilities
  message: Detected pvf-common contains common utilities (timeout, process time, etc)
  severity: INFO
  languages:
  - rust
  pattern-regex: JOB_TIMEOUT_OVERHEAD|ProcessTime|UnixStream
  metadata:
    category: basic
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/common/src/**/*.rs
- id: host-imports-from-common
  message: Detected host crate imports from pvf-common crate
  severity: INFO
  languages:
  - rust
  pattern: use polkadot_node_core_pvf_common::$X;
  metadata:
    category: dependency
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/src/**/*.rs
- id: common-crate-structure
  message: Detected pvf-common crate source files exist
  severity: INFO
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/common/src/*.rs
- id: common-crate-has-multiple-modules
  message: Detected pvf-common lib.rs declares multiple core modules
  severity: INFO
  languages:
  - rust
  pattern-regex: (mod\s+(error|execute|prepare|pvf|worker|executor_intf|memory_stats|common)\s*;)
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/common/src/lib.rs
- id: prepare-worker-logs-with-worker-target
  message: Detected prepare-worker uses gum logging macros
  severity: INFO
  languages:
  - rust
  pattern-regex: gum::(trace|debug|info|warn|error)
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/prepare-worker/src/**/*.rs
- id: pvf-common-exports-modules
  message: Detected pvf-common exports core modules
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: pub use $X::error;
    - pattern: pub use $X::execute;
    - pattern: pub use $X::prepare;
    - pattern: pub use $X::pvf;
    - pattern: pub use $X::worker;
    - pattern: pub mod error;
    - pattern: pub mod execute;
    - pattern: pub mod prepare;
    - pattern: pub mod pvf;
    - pattern: pub mod worker;
  metadata:
    category: structural
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/common/src/lib.rs
- id: execute-worker-imports-from-common
  message: Detected execute-worker imports from pvf-common crate
  severity: INFO
  languages:
  - rust
  pattern: use polkadot_node_core_pvf_common::$X;
  metadata:
    category: dependency
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/execute-worker/src/**/*.rs
- id: execute-worker-uses-common-types
  message: Detected execute-worker uses types from pvf-common
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-either:
    - pattern: polkadot_node_core_pvf_common::$TYPE
    - pattern: use polkadot_node_core_pvf_common::{ $...ITEMS };
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/execute-worker/src/**/*.rs
- id: cargo-toml-pvf-prepare-worker-dependency
  message: Detected Cargo.toml dependency on pvf-prepare-worker with path
  severity: INFO
  languages:
  - generic
  pattern-regex: polkadot-node-core-pvf-prepare-worker\s*=\s*\{[^}]*path\s*=\s*["\x27]([^"\x27]*prepare-worker|\.\.\/prepare-worker)
  metadata:
    category: dependency
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: common-wasmtime-config-types
  message: Detected pvf-common contains wasmtime/executor config types
  severity: INFO
  languages:
  - rust
  pattern-regex: (WasmtimeRuntime|RuntimeBlob|HeapAllocStrategy|InvokeMethod|DeterministicStackLimit)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - node/core/pvf/common/src/**/*.rs
