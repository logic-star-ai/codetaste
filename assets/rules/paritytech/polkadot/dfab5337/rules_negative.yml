rules:
- id: pvf-old-worker-crate-name-in-toml
  message: Old unified worker crate name 'polkadot-node-core-pvf-worker' detected.
    After refactoring, this should be split into 'polkadot-node-core-pvf-common',
    'polkadot-node-core-pvf-execute-worker', and 'polkadot-node-core-pvf-prepare-worker'.
  severity: WARNING
  languages:
  - generic
  pattern-regex: polkadot-node-core-pvf-worker
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '*.toml'
- id: pvf-test-helper-worker-spawn
  message: Direct call to function in old unified worker crate. After refactoring,
    should call functions from appropriate split crate.
  severity: WARNING
  languages:
  - rust
  pattern: polkadot_node_core_pvf_worker::$FUNC(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: pvf-old-worker-cargo-dependency-line
  message: Dependency line for old unified worker crate in Cargo.toml. After refactoring,
    should depend on split crates.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ^polkadot-node-core-pvf-worker\s*=
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*.toml'
- id: pvf-old-worker-crate-path-reference
  message: Old worker crate path 'node/core/pvf/worker'. Should be updated to reference
    'node/core/pvf/common', 'node/core/pvf/execute-worker', or 'node/core/pvf/prepare-worker'.
  severity: WARNING
  languages:
  - generic
  pattern-regex: node/core/pvf/worker(?!/)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*.toml'
- id: pvf-workspace-members-missing-split-crates
  message: Workspace member references old unified worker path. After refactoring,
    workspace should include node/core/pvf/common, node/core/pvf/execute-worker, and
    node/core/pvf/prepare-worker.
  severity: WARNING
  languages:
  - generic
  pattern-regex: node/core/pvf/worker
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - Cargo.toml
- id: pvf-old-worker-path-in-deps
  message: Dependency path points to old unified worker directory. After refactoring,
    should point to common, execute-worker, or prepare-worker.
  severity: WARNING
  languages:
  - generic
  pattern-regex: path\s*=\s*".*node/core/pvf/worker"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*.toml'
- id: pvf-lib-rs-exports-both-workers
  message: lib.rs exports both prepare and execute worker entrypoints. After refactoring,
    these should be in separate crates.
  severity: WARNING
  languages:
  - rust
  pattern-regex: prepare_worker_entrypoint|execute_worker_entrypoint
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-host-reexports-worker-common-types
  message: Host crate re-exports types from worker_common module. After refactoring,
    these should be re-exported from the separate pvf-common crate.
  severity: WARNING
  languages:
  - rust
  pattern: pub use worker_common::$TYPE;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - node/core/pvf/src/lib.rs
- id: pvf-worker-depends-on-host-types
  message: Worker module uses 'crate::' indicating potential dependency on host. After
    refactoring, workers should not depend on host.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'use\s+crate::.*::'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - node/core/pvf/worker/src/*.rs
- id: pvf-old-worker-tests-directory
  message: Tests in unified worker directory. After refactoring, tests should be in
    separate worker crate directories.
  severity: INFO
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - node/core/pvf/worker/tests/*
- id: pvf-old-prepare-worker-entrypoint-call
  message: Old prepare_worker_entrypoint call from unified worker crate. Should use
    'polkadot_node_core_pvf_prepare_worker::worker_entrypoint' instead.
  severity: WARNING
  languages:
  - rust
  pattern: polkadot_node_core_pvf_worker::prepare_worker_entrypoint(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pvf-old-execute-worker-entrypoint-call
  message: Old execute_worker_entrypoint call from unified worker crate. Should use
    'polkadot_node_core_pvf_execute_worker::worker_entrypoint' instead.
  severity: WARNING
  languages:
  - rust
  pattern: polkadot_node_core_pvf_worker::execute_worker_entrypoint(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pvf-old-log-target-unified-worker
  message: Old unified worker log target 'parachain::pvf-worker' detected. Should
    be split into worker-specific targets like 'parachain::pvf-execute-worker' and
    'parachain::pvf-prepare-worker'.
  severity: WARNING
  languages:
  - rust
  pattern-regex: parachain::pvf-worker
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.rs'
- id: pvf-decl-worker-main-macro-definition
  message: Old 'decl_worker_main!' macro definition in worker lib.rs. After refactoring,
    this macro should be moved to the common crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: macro_rules!\s+decl_worker_main
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-comment-references-pvf-worker
  message: Comment or string references old 'parachain::pvf-worker' log target or
    path. After refactoring, references should be to specific worker types (execute-worker,
    prepare-worker).
  severity: WARNING
  languages:
  - rust
  pattern-regex: parachain::pvf-worker
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.rs'
- id: pvf-old-worker-lib-exports-multiple-entrypoints
  message: Multiple worker entrypoints exported from single lib.rs. After refactoring,
    each worker should have its own crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: worker_entrypoint.*worker_entrypoint
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-host-uses-worker-common-internal
  message: Internal use of worker_common from host crate. After refactoring, should
    import from pvf-common crate.
  severity: WARNING
  languages:
  - rust
  pattern: use crate::worker_common::$ITEM;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pvf-host-testing-exports-worker-common
  message: Testing module exports items from worker_common. After refactoring, testing
    should import from pvf-common crate.
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: pub use crate::worker_common::$ITEM;
  - pattern-inside: "pub mod testing {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pvf-workspace-single-worker-member
  message: Workspace has single unified worker member. After refactoring, should have
    separate members for common, execute-worker, and prepare-worker.
  severity: WARNING
  languages:
  - generic
  pattern-regex: '"node/core/pvf/worker"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - Cargo.toml
- id: pvf-worker-crate-in-use-statement
  message: Use statement imports from old unified worker crate. After refactoring,
    should import from common, execute-worker, or prepare-worker.
  severity: WARNING
  languages:
  - rust
  pattern-regex: use\s+polkadot_node_core_pvf_worker::[a-zA-Z_]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pvf-fully-qualified-worker-call
  message: Fully qualified path through old unified worker crate. After refactoring,
    should use path through split crates.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'polkadot_node_core_pvf_worker::[a-zA-Z_]+::'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pvf-worker-lib-rs-exists
  message: Old worker lib.rs file exists. After refactoring, this file should be removed
    as the worker crate is split into separate execute-worker and prepare-worker crates.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-old-worker-dependency-in-workspace
  message: Old workspace dependency on unified worker crate. Should be split into
    separate dependencies for common, execute-worker, and prepare-worker crates.
  severity: WARNING
  languages:
  - generic
  pattern-regex: polkadot-node-core-pvf-worker\s*=\s*\{\s*path\s*=\s*"node/core/pvf/worker"\s*\}
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - Cargo.toml
- id: pvf-old-worker-feature-flag
  message: Old worker crate feature flag reference. After refactoring, feature flags
    should reference the split worker crates.
  severity: WARNING
  languages:
  - generic
  pattern-regex: polkadot-node-core-pvf-worker/[a-zA-Z0-9_-]+
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.toml'
- id: pvf-old-worker-common-rs-file
  message: Old common.rs file in worker crate. After refactoring, common functionality
    should be in a separate 'polkadot-node-core-pvf-common' crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/common.rs
- id: pvf-old-worker-execute-rs-file
  message: Old execute.rs file in worker crate. After refactoring, this should be
    in a separate 'polkadot-node-core-pvf-execute-worker' crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/execute.rs
- id: pvf-old-worker-prepare-rs-file
  message: Old prepare.rs file in worker crate. After refactoring, this should be
    in a separate 'polkadot-node-core-pvf-prepare-worker' crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/prepare.rs
- id: pvf-old-worker-executor-intf-rs-file
  message: Old executor_intf.rs file in worker crate. After refactoring, this should
    be split between the common crate and worker crates.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/executor_intf.rs
- id: pvf-old-worker-testing-rs-file
  message: Old testing.rs file in worker crate. After refactoring, test utilities
    should be moved to the host crate's testing module.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/testing.rs
- id: pvf-old-worker-memory-stats-rs-file
  message: Old memory_stats.rs file in unified worker crate. After refactoring, this
    should be moved to the common crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/memory_stats.rs
- id: pvf-worker-exports-prepare-entrypoint
  message: Old re-export pattern for prepare_worker_entrypoint in unified worker crate.
    After refactoring, this should be in a separate prepare-worker crate.
  severity: WARNING
  languages:
  - rust
  pattern: pub use prepare::worker_entrypoint as prepare_worker_entrypoint;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: pvf-worker-exports-execute-entrypoint
  message: Old re-export pattern for execute_worker_entrypoint in unified worker crate.
    After refactoring, this should be in a separate execute-worker crate.
  severity: WARNING
  languages:
  - rust
  pattern: pub use execute::worker_entrypoint as execute_worker_entrypoint;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: pvf-decl-worker-main-command-macro
  message: Old 'decl_worker_main_command!' macro definition in worker lib.rs. After
    refactoring, this macro should be moved to the common crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: macro_rules!\s+decl_worker_main_command
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-old-worker-log-target-const
  message: Old unified worker log target constant. After refactoring, each worker
    should have its own specific log target.
  severity: WARNING
  languages:
  - rust
  pattern: 'const LOG_TARGET: $T = $V

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-worker-sp-tracing-reexport
  message: Old sp_tracing re-export in worker lib.rs. After refactoring, this should
    be in the common crate.
  severity: WARNING
  languages:
  - rust
  pattern: pub use sp_tracing;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-old-unified-worker-cargo-package
  message: Old unified worker crate package definition. After refactoring, this should
    be split into separate crates.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[package\]\s*\nname\s*=\s*"polkadot-node-core-pvf-worker"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/Cargo.toml
- id: pvf-worker-testing-module-public
  message: Old public testing module in worker lib.rs. After refactoring, testing
    utilities should be in the host crate.
  severity: WARNING
  languages:
  - rust
  pattern: pub mod testing;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-worker-common-module-declaration
  message: Old 'common' module declaration in worker lib.rs. This should be extracted
    into a separate 'polkadot-node-core-pvf-common' crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*mod\s+common\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-worker-execute-module-declaration
  message: Old 'execute' module declaration in worker lib.rs. This should be moved
    to a separate 'polkadot-node-core-pvf-execute-worker' crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*mod\s+execute\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-worker-prepare-module-declaration-2
  message: Old 'prepare' module declaration in worker lib.rs. This should be moved
    to a separate 'polkadot-node-core-pvf-prepare-worker' crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*mod\s+prepare\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-worker-executor-intf-module-declaration
  message: Old 'executor_intf' module declaration in worker lib.rs. This should be
    split between common crate and worker crates.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*mod\s+executor_intf\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-worker-memory-stats-module-declaration
  message: Old 'memory_stats' module declaration in worker lib.rs. This should be
    moved to the common crate.
  severity: WARNING
  languages:
  - rust
  pattern-regex: ^\s*mod\s+memory_stats\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-old-cargo-bin-puppet-worker
  message: Old puppet_worker binary definition in unified worker Cargo.toml. After
    refactoring, this should be split between execute-worker and prepare-worker crates.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \[\[bin\]\]\s*\nname\s*=\s*"puppet_worker"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/Cargo.toml
- id: pvf-malus-depends-on-unified-worker
  message: Malus crate depends on old unified worker crate. After refactoring, it
    should depend on the split worker crates.
  severity: WARNING
  languages:
  - generic
  pattern-regex: polkadot-node-core-pvf-worker\s*=\s*\{[^\}]*path\s*=\s*"\.\./core/pvf/worker"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/malus/Cargo.toml
- id: pvf-test-performance-depends-on-unified-worker
  message: Performance test crate depends on old unified worker crate. After refactoring,
    it should depend on the split worker crates.
  severity: WARNING
  languages:
  - generic
  pattern-regex: polkadot-node-core-pvf-worker\s*=\s*\{[^\}]*path\s*=\s*"\.\./\.\./core/pvf/worker"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/test/performance-test/Cargo.toml
- id: pvf-cli-depends-on-unified-worker
  message: CLI crate depends on old unified worker crate. After refactoring, it should
    depend on the split worker crates if needed.
  severity: WARNING
  languages:
  - generic
  pattern-regex: polkadot-node-core-pvf-worker\s*=.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - cli/Cargo.toml
- id: pvf-old-worker-dir-structure-cargo-toml
  message: Old unified worker crate Cargo.toml exists at node/core/pvf/worker/Cargo.toml.
    After refactoring, there should be separate Cargo.toml files for common, execute-worker,
    and prepare-worker.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/Cargo.toml
- id: pvf-old-worker-build-rs
  message: Old build.rs in unified worker crate. After refactoring, each split crate
    should have its own build script if needed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/build.rs
- id: pvf-old-worker-crate-feature-jemalloc
  message: Old worker crate feature flag for jemalloc. After refactoring, feature
    flags should reference the appropriate split crate.
  severity: WARNING
  languages:
  - generic
  pattern-regex: polkadot-node-core-pvf-worker/jemalloc-allocator
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*.toml'
- id: pvf-doc-comment-worker-spawning
  message: Documentation in unified worker lib.rs mentions worker spawning. After
    refactoring, such docs should be in the common crate or individual worker crates.
  severity: INFO
  languages:
  - rust
  pattern-regex: spawning.*worker|worker.*spawn
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-prepare-entrypoint-in-same-crate-as-execute
  message: Prepare worker entrypoint exported from same crate as execute. After refactoring,
    these should be in separate crates.
  severity: WARNING
  languages:
  - rust
  pattern: pub use prepare::worker_entrypoint
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-execute-entrypoint-in-same-crate-as-prepare
  message: Execute worker entrypoint exported from same crate as prepare. After refactoring,
    these should be in separate crates.
  severity: WARNING
  languages:
  - rust
  pattern: pub use execute::worker_entrypoint
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - node/core/pvf/worker/src/lib.rs
- id: pvf-common-module-in-worker-lib
  message: Common module declared in worker lib.rs. After refactoring, common functionality
    should be a separate crate.
  severity: WARNING
  languages:
  - rust
  pattern: mod common;
  metadata:
    category: structural
