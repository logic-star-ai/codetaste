  languages:
  - rust
  pattern-regex: frame_support\s*::\s*codec\s*::\s*Encode
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: frame-support-codec-import-old-pattern
  message: 'Old pattern: importing ''codec'' from frame_support. After refactoring,
    codec should be imported directly from the ''codec'' crate or via frame_support::__private::codec'
  severity: WARNING
  languages:
  - rust
  pattern: use frame_support::codec
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: frame-support-log-import-old-pattern
