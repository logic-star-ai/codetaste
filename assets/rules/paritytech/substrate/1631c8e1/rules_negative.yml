rules:
- id: frame-support-runtime-debug-qualified-old-pattern
  message: 'Old pattern: using frame_support::RuntimeDebug. After refactoring, should
    use sp_runtime::RuntimeDebug or frame_support::__private::RuntimeDebug'
  severity: WARNING
  languages:
  - rust
  pattern: frame_support::RuntimeDebug
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: frame-support-log-macro-qualified-old-pattern
  message: 'Old pattern: using frame_support::log macros. After refactoring, should
    use log crate directly or frame_support::__private::log'
  severity: WARNING
  languages:
  - rust
  pattern: frame_support::log::$LEVEL
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: sp-std-vec-import-old-pattern
  message: 'Old pattern: using frame_support::sp_std::vec. After refactoring, should
    use sp_std directly or frame_support::__private::sp_std'
  severity: WARNING
  languages:
  - rust
  pattern-regex: frame_support\s*::\s*sp_std\s*::\s*vec
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: log-target-macro-old-pattern
  message: 'Old pattern: using frame_support::log macros with target. After refactoring,
    should use log crate directly or frame_support::__private::log'
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'frame_support\s*::\s*log\s*::\s*(trace|debug|info|warn|error)\s*!\s*\(\s*target\s*:'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: derive-macro-codec-encode-trait-old-pattern
