rules:
- id: detect-sp-api-transaction-for-usage
  message: sp_api::TransactionFor should be replaced with BackendTransaction<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: sp_api::TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: detect-sp-api-transaction-for-client
  message: sp_api::TransactionFor should be replaced with direct BackendTransaction
    usage.
  severity: WARNING
  languages:
  - rust
  pattern-regex: sp_api::TransactionFor\s*<\s*\w+,
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: detect-transaction-for-in-where-clause
  message: TransactionFor in where clause should be removed. Use BackendTransaction<H>
    instead.
  severity: WARNING
  languages:
  - rust
  pattern-regex: where\s+[^;{]*TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: detect-block-import-two-generics-in-type-bound
  message: BlockImport type bound with Transaction generic should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: :\s*BlockImport\s*<\s*\w+\s*,\s*[^>]*Transaction[^>]*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: detect-block-import-params-two-type-params
  message: BlockImportParams should only have one generic parameter (Block). Remove
    Transaction parameter.
  severity: WARNING
  languages:
  - rust
  pattern-regex: BlockImportParams\s*<\s*\w+\s*,\s*\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-where-transaction-send-bound
  message: 'Where clause with Transaction: Send should be removed.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: Transaction\s*:\s*[^,;]*Send
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: detect-block-import-params-in-fn-signature
  message: BlockImportParams with Transaction parameter in function signature should
    be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+\w+[^{;]*BlockImportParams\s*<\s*\w+\s*,\s*[^>]*Transaction
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: detect-box-block-import-two-type-params
  message: BoxBlockImport should only have one generic parameter. Remove Transaction
    parameter.
  severity: WARNING
  languages:
  - rust
  pattern-regex: BoxBlockImport\s*<\s*\w+\s*,\s*\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-fn-returning-block-import-params-transaction
  message: Function returning BlockImportParams with Transaction should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+\w+[^{;]*->\s*[^{;]*BlockImportParams\s*<[^,>]+,\s*[^>]+>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: detect-boxed-block-import-field
  message: Field with BoxBlockImport<Block, Transaction> should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \w+\s*:\s*[^,}]*BoxBlockImport\s*<[^,>]+,\s*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-transaction-for-in-impl-where
  message: Impl block where clause with TransactionFor should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: impl<[^>]*>\s+\w+[^{]*where[^{]*TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: detect-async-block-import-transaction
  message: async import_block with BlockImportParams<Block, Transaction> should be
    updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: async\s+fn\s+import_block[^{]*BlockImportParams\s*<[^,>]+,\s*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: detect-impl-block-import-with-transaction-assoc
  message: BlockImport implementation defining Transaction associated type should
    be removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: impl[^{]*BlockImport<[^{]*\{[^}]*type\s+Transaction\s*=
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: detect-proposer-two-type-params-bound
  message: Proposer type bound with Transaction generic should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: :\s*Proposer\s*<\s*\w+\s*,\s*[^>]*Transaction[^>]*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-state-backend-for-in-impl-signature
  message: Impl block with StateBackendFor generic should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: impl[^{]*<[^>]*StateBackendFor
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: detect-storage-changes-two-type-params
  message: StorageChanges should only have one generic parameter (H). Change from
    StorageChanges<Transaction, H> to StorageChanges<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: StorageChanges\s*<\s*\w+\s*,\s*\w+\s*>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-state-backend-for-in-bounds
  message: StateBackendFor in where clause should be removed or updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: where\s+[^;{]*StateBackendFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: detect-basic-queue-two-type-params
  message: BasicQueue should only have one generic parameter (Block) after refactoring.
  severity: WARNING
  languages:
  - rust
  pattern-regex: BasicQueue\s*<\s*\w+\s*,\s*\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-client-backend-transaction-for
  message: TransactionFor with Backend should be replaced with BackendTransaction<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: TransactionFor\s*<\s*[^,>]*Backend
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-transaction-in-generic-struct-field
  message: Struct with TransactionFor field should be updated to use BackendTransaction<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: struct\s+\w+[^{]*\{[^}]*:\s*[^}]*TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-transaction-for-in-associated-type
  message: Associated type using TransactionFor should be updated to use BackendTransaction<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: type\s+\w+\s*=\s*TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-storage-changes-pattern-match
  message: StorageChanges pattern match with two generics should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: StorageChanges\s*<[^,>]+,\s*[^>]+>\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-transaction-for-sb-alias-usage
  message: TransactionForSB type alias should be removed. Use BackendTransaction<H>
    directly.
  severity: WARNING
  languages:
  - rust
  pattern-regex: TransactionForSB\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-default-import-queue-two-type-params
  message: DefaultImportQueue should only have one generic parameter (Block). Remove
    Client parameter.
  severity: WARNING
  languages:
  - rust
  pattern-regex: DefaultImportQueue\s*<\s*\w+\s*,\s*\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-clear-storage-changes-and-mutate
  message: clear_storage_changes_and_mutate may need updating due to transaction type
    simplification.
  severity: INFO
  languages:
  - rust
  pattern: '$OBJ.clear_storage_changes_and_mutate()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-impl-proposer-with-transaction-assoc
  message: Proposer implementation defining Transaction associated type should be
    removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: impl[^{]*Proposer<[^{]*\{[^}]*type\s+Transaction\s*=
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-block-import-params-in-struct-field
  message: Struct field with BlockImportParams<Block, Transaction> should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: struct\s+\w+[^{]*\{[^}]*:\s*[^}]*BlockImportParams\s*<[^,>]+,\s*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-storage-changes-import
  message: sp_state_machine::StorageChanges with two generics should use single generic.
  severity: WARNING
  languages:
  - rust
  pattern-regex: sp_state_machine::StorageChanges\s*<[^,>]+,\s*[^>]+>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-state-action-two-type-params
  message: StateAction should not have Transaction generic parameter. Update to new
    signature.
  severity: WARNING
  languages:
  - rust
  pattern-regex: StateAction\s*<\s*\w+\s*,\s*\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-backend-transaction-type-definition
  message: Transaction associated type definition should be removed from Backend or
    related traits.
  severity: WARNING
  languages:
  - rust
  pattern-regex: type\s+Transaction\s*:\s*[^;]*Send\s*\+
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-transaction-for-in-result-type
  message: Result type with TransactionFor should be updated to use BackendTransaction<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Result\s*<[^>]*TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-transaction-for-in-box-type
  message: Box type with TransactionFor should be updated to use BackendTransaction<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Box\s*<[^>]*TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-storage-changes-in-struct-field
  message: Struct field with StorageChanges<Transaction, H> should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: struct\s+\w+[^{]*\{[^}]*:\s*[^}]*StorageChanges\s*<[^,>]+,\s*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-transaction-for-in-trait-method
  message: Trait method returning Result with TransactionFor should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+\w+[^{;]*->\s*[^{;]*Result\s*<[^>]*TransactionFor
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-proposer-propose-method-transaction
  message: propose method returning Proposal with Transaction should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: fn\s+propose[^{;]*->[^{;]*Proposal\s*<[^,>]+,\s*[^,>]+,
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-contextual-call-signature
  message: contextual_call with storage_transaction_cache parameter should be removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'fn\s+contextual_call[^{;]*storage_transaction_cache\s*:'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-mutex-transaction-for
  message: Mutex with TransactionFor should be updated to use BackendTransaction<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Mutex\s*<[^>]*TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-block-import-trait-with-transaction-associated-type
  message: BlockImport trait should not have Transaction associated type. This has
    been removed.
  severity: WARNING
  languages:
  - rust
  pattern: "trait BlockImport<$BLOCK> {\n  ...\n  type Transaction: $...BOUNDS;\n\
    \  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-proposer-trait-with-transaction-type
  message: Proposer trait should not have Transaction associated type. This has been
    removed.
  severity: WARNING
  languages:
  - rust
  pattern: "trait Proposer<$BLOCK> {\n  ...\n  type Transaction: $...BOUNDS;\n  ...\n\
    }\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-transaction-for-sb-type-alias-definition
  message: TransactionForSB type alias definition should be removed.
  severity: WARNING
  languages:
  - rust
  pattern-regex: pub\s+type\s+TransactionForSB\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-transaction-type-in-proposer
  message: Proposer trait should not have Transaction associated type.
  severity: WARNING
  languages:
  - rust
  pattern: "pub trait Proposer<$B> {\n  ...\n  type Transaction\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-transaction-type-in-block-import
  message: BlockImport trait should not have Transaction associated type.
  severity: WARNING
  languages:
  - rust
  pattern: "pub trait BlockImport<$B> {\n  ...\n  type Transaction\n  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-import-queue-basic-queue-generic
  message: Import queue types with Transaction generic should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: import_queue::\w+\s*<[^>]*,\s*[^>]*Transaction
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-transaction-in-enum-variant
  message: Enum variant with TransactionFor should be updated to use BackendTransaction<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: enum\s+\w+[^{]*\{[^}]*\([^)]*TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-transaction-for-in-trait-object
  message: Trait object with TransactionFor bound should be updated to use BackendTransaction<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: dyn\s+[^+]*\+[^>]*TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-backend-transaction-in-fn-call
  message: update_db_storage call with TransactionFor should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: update_db_storage\s*\([^)]*TransactionFor
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-block-import-params-state-action
  message: state_action field with StateAction<Block, Transaction> should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: state_action\s*:\s*StateAction\s*<[^,>]+,\s*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-default-import-queue-field
  message: Field with DefaultImportQueue<Block, Client> should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \w+\s*:\s*[^,}]*DefaultImportQueue\s*<[^,>]+,\s*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-arc-transaction-for
  message: Arc with TransactionFor should be updated to use BackendTransaction<H>.
  severity: WARNING
  languages:
  - rust
  pattern-regex: Arc\s*<[^>]*TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-proposer-future-transaction
  message: Proposer::Proposal associated type with Transaction should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: type\s+Proposal\s*:\s*Future<Output\s*=\s*Result<Proposal<[^,>]+,\s*[^,>]+,
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-client-block-import-transaction
  message: Client module BlockImport with Transaction should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: client[^:]*::[^:]*BlockImport\s*<[^,>]+,\s*[^>]+>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-transaction-in-trait-where
  message: Trait with Transaction constraint in where clause should be updated.
  severity: WARNING
  languages:
  - rust
  pattern-regex: 'trait\s+\w+[^{]*where[^{]*Transaction\s*:'
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
