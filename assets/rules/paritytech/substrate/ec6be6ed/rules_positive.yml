  - rust
  pattern-regex: pub\s+enum\s+StateAction\s*<\s*\w+\s*:\s*BlockT\s*>\s*\{[^}]*ApplyChanges\s*\(\s*StorageChanges\s*<\s*\w+\s*>\s*\)
