  languages:
  - rust
  pattern-regex: type\s+Proposal\s*:\s*Future\s*<\s*Output\s*=\s*Result\s*<\s*Proposal\s*<\s*\w+\s*,\s*[^,>]+\s*>
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: storage-changes-impl-debug-single-generic
  message: Detected trait impl for StorageChanges with single generic
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s*<\s*H\s*:\s*Hasher\s*>\s+(?:Debug|Clone|Default)\s+for\s+StorageChanges\s*<\s*H\s*>
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: box-block-import-type-alias
  message: Detected BoxBlockImport type alias with single generic
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+type\s+BoxBlockImport\s*<\s*\w+\s*>\s*=
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: basic-queue-struct-single-generic
  message: Detected BasicQueue struct with single generic parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+struct\s+BasicQueue\s*<\s*\w+\s*:\s*BlockT\s*>\s*\{
