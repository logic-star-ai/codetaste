  message: Detected verify method with BlockImportParams having single generic
  severity: INFO
  languages:
  - rust
  pattern-regex: async\s+fn\s+verify\s*\([^)]{0,300}BlockImportParams\s*<\s*\w+\s*>(?!\s*,)
