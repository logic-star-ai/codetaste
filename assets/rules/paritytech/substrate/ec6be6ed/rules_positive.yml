rules:
- id: async-import-block-simplified-params
  message: Detected async import_block with simplified BlockImportParams
  severity: INFO
  languages:
  - rust
  pattern-regex: async\s+fn\s+import_block\s*\(\s*&\s*mut\s+self\s*,\s*[^:]+:\s*BlockImportParams\s*<\s*\w+\s*>
  metadata:
    category: api
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: backend-transaction-hash-for-generic
  message: Detected BackendTransaction with HashingFor generic parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: BackendTransaction\s*<\s*HashingFor\s*<\s*\w+\s*>\s*>
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: verifier-verify-returning-block-import-params
  message: Detected verify method returning Result with single-generic BlockImportParams
  severity: INFO
  languages:
  - rust
  pattern-regex: async\s+fn\s+verify\s*\([^)]{0,500}\)\s*->\s*Result\s*<\s*BlockImportParams\s*<\s*\w+\s*>
  metadata:
    category: api
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: basic-queue-single-generic-parameter
  message: Detected BasicQueue with single generic (Transaction removed)
  severity: INFO
  languages:
  - rust
  pattern-regex: BasicQueue\s*<\s*\w+\s*>(?!\s*,)
  metadata:
    category: api
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: box-block-import-single-transaction
  message: Detected BoxBlockImport with single generic parameter (Transaction removed)
  severity: INFO
  languages:
  - rust
  pattern-regex: BoxBlockImport\s*<\s*\w+\s*>(?!\s*,)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: backend-transaction-hasher-generic
  message: Detected BackendTransaction with single Hasher generic parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: BackendTransaction\s*<\s*H\s*>(?!\s*,)
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: backend-transaction-prefixed-memory-db-usage
  message: Detected BackendTransaction usage with HashingFor
  severity: INFO
  languages:
  - rust
  pattern-regex: :\s*BackendTransaction\s*<\s*HashingFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: update-db-storage-with-backend-transaction
  message: Detected update_db_storage using BackendTransaction instead of generic
    Transaction
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+update_db_storage\s*\([^)]*update:\s*BackendTransaction\s*<
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: block-import-params-in-function-single-generic
  message: Detected BlockImportParams usage with single generic parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: BlockImportParams\s*<\s*\w+\s*>(?!\s*,)
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: backend-transaction-import-statement
  message: Detected import of BackendTransaction type alias
  severity: INFO
  languages:
  - rust
  pattern-regex: use\s+.*BackendTransaction
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: backend-transaction-with-hashing-for-block
  message: Detected BackendTransaction<HashingFor<Block>> in type position
  severity: INFO
  languages:
  - rust
  pattern-regex: BackendTransaction\s*<\s*HashingFor\s*<\s*Block\s*>\s*>\s*[,;)]
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: backend-transaction-in-impl-block
  message: Detected impl block with Hasher bound using BackendTransaction
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s*<[^>]*H[^>]*Hasher[^>]*>[^{]*\{[^}]{0,300}BackendTransaction\s*<\s*H\s*>
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: backend-transaction-type-alias-introduced
  message: Detected new BackendTransaction type alias introduced as part of refactoring
  severity: INFO
  languages:
  - rust
  pattern: 'type BackendTransaction<$H> = PrefixedMemoryDB<$H>;

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: block-import-params-single-generic
  message: Detected BlockImportParams with single generic parameter (Transaction removed)
  severity: INFO
  languages:
  - rust
  pattern: 'pub struct BlockImportParams<$BLOCK: BlockT> { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: storage-changes-single-generic
  message: Detected StorageChanges with single generic parameter (Transaction removed)
  severity: INFO
  languages:
  - rust
  pattern: 'pub struct StorageChanges<$H: Hasher> { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: backend-transaction-type-alias-with-prefixed-memory-db
  message: Detected new BackendTransaction type alias pointing to PrefixedMemoryDB
  severity: INFO
  languages:
  - rust
  pattern-regex: type\s+BackendTransaction\s*<\s*\w+\s*>\s*=\s*PrefixedMemoryDB\s*<
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: block-import-params-struct-definition-single-generic
  message: Detected BlockImportParams struct with single generic parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+struct\s+BlockImportParams\s*<\s*\w+\s*:\s*BlockT\s*>\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: storage-changes-struct-definition-single-generic
  message: Detected StorageChanges struct with single generic parameter (Transaction
    removed)
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+struct\s+StorageChanges\s*<\s*\w+\s*:\s*Hasher\s*>\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: proposal-struct-two-generics-only
  message: Detected Proposal struct with two generics (Block and Proof, Transaction
    removed)
  severity: INFO
  languages:
  - rust
  pattern-regex: struct\s+Proposal\s*<\s*\w+\s*:\s*BlockT\s*,\s*\w+\s*>\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: storage-changes-in-proposal-without-transaction
  message: Detected StorageChanges in Proposal without Transaction generic
  severity: INFO
  languages:
  - rust
  pattern-regex: storage_changes:\s*(?:sp_state_machine::)?StorageChanges\s*<\s*HashingFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: backend-transaction-in-function-signature
  message: Detected function using BackendTransaction type directly
  severity: INFO
  languages:
  - rust
  pattern-regex: fn\s+\w+\s*\([^)]*:\s*BackendTransaction\s*<\w+>
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: state-action-enum-single-generic
  message: Detected StateAction enum with single generic parameter (Transaction removed)
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+enum\s+StateAction\s*<\s*\w+\s*:\s*BlockT\s*>\s*\{
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: state-action-apply-changes-without-transaction
  message: Detected StateAction::ApplyChanges variant with StorageChanges without
    Transaction generic
  severity: INFO
  languages:
  - rust
  pattern-regex: ApplyChanges\s*\(\s*StorageChanges\s*<\s*\w+\s*>\s*\)
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: proposer-future-without-transaction
  message: Detected Proposer::Proposal future type without Transaction generic
  severity: INFO
  languages:
  - rust
  pattern-regex: type\s+Proposal[^=]*Future\s*<\s*Output\s*=\s*Result\s*<\s*Proposal\s*<[^,>]+,\s*[^,>]+\s*>
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: storage-changes-transaction-field-backend-transaction
  message: Detected transaction field in StorageChanges using BackendTransaction type
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+transaction:\s*BackendTransaction\s*<
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: import-queue-basic-queue-simplified
  message: Detected function returning BasicQueue with single generic
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+fn\s+\w+\s*<[^>]*>\s*\([^)]*\)\s*->\s*BasicQueue\s*<\s*\w+\s*>
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: block-import-params-state-action-field
  message: Detected state_action field in BlockImportParams with single generic
  severity: INFO
  languages:
  - rust
  pattern-regex: pub\s+state_action:\s*StateAction\s*<\s*\w+\s*>
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: no-transaction-for-type-alias-definition
  message: Detected backend.rs file without TransactionFor type alias definition
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: pub\s+type\s+TransactionFor\s*<
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - client/api/src/backend.rs
- id: no-transaction-for-sb-type-alias-definition
  message: Detected backend.rs file without TransactionForSB type alias definition
  severity: INFO
  languages:
  - rust
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: pub\s+type\s+TransactionForSB\s*<
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - client/api/src/backend.rs
- id: storage-changes-with-hasher-bound-only
  message: Detected StorageChanges impl with only Hasher bound (Transaction removed)
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s*<\s*H\s*:\s*Hasher\s*>\s+StorageChanges\s*<\s*H\s*>
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: block-import-params-impl-single-generic
  message: Detected BlockImportParams impl block with single generic parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s*<\s*\w+\s*:\s*BlockT\s*>\s+BlockImportParams\s*<\s*\w+\s*>
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: state-action-impl-single-generic
  message: Detected StateAction impl block with single generic parameter
  severity: INFO
  languages:
  - rust
  pattern-regex: impl\s*<\s*\w+\s*:\s*BlockT\s*>\s+StateAction\s*<\s*\w+\s*>
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: proposer-proposal-type-two-generics
