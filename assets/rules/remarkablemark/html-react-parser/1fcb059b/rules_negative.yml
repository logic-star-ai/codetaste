rules:
- id: jsdoc-param-type
  message: TypeScript migration replaces JSDoc type annotations with proper TypeScript
    types
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: '@param\s+\{[^}]+\}\s+\[?\w+\]?'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: jsdoc-function-comment
  message: Replace JSDoc comments with TypeScript type annotations
  severity: WARNING
  languages:
  - javascript
  pattern-regex: /\*\*[\s\S]*?@param\s+\{[^}]+\}\s+[^\n]*[\s\S]*?\*/
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: function-property-export
  message: After TypeScript migration, use ES6 named exports instead of assigning
    to export object
  severity: WARNING
  languages:
  - javascript
  pattern: '$OBJ.$FUNC = $FUNC_REF;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - index.js
    exclude:
    - test/**
- id: var-multiple-declarations
  message: Use const or let instead of var for variable declarations
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern: var $VAR1, $VAR2;
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: commonjs-module-exports-direct
  message: After TypeScript migration, exports may need to use ES modules or require
    .default for CommonJS
  severity: WARNING
  languages:
  - javascript
  pattern: module.exports = $EXPR;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: continue-in-loop
  message: Source code should be in TypeScript files after migration
  severity: INFO
  languages:
  - javascript
  pattern: continue;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
    - '*.tsx'
- id: property-access-with-bracket
  message: Consider using proper TypeScript types and interfaces after migration
  severity: INFO
  languages:
  - javascript
  pattern: $OBJ[$PROP] = $VALUE;
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - lib/**
    exclude:
    - test/**
- id: object-assign-props
  message: attributes-to-props.js should be migrated to TypeScript with proper type
    definitions
  severity: WARNING
  languages:
  - javascript
  pattern: $OBJ[$KEY] = $VALUE;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - lib/attributes-to-props.js
- id: node-name-property
  message: Code should be in TypeScript source files with proper type checking after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: node.name
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: options-param-jsdoc
  message: Replace JSDoc object type annotation with TypeScript interface type
  severity: WARNING
  languages:
  - javascript
  pattern-regex: '@param\s+\{object\}\s+\[?options\]?'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: jsdoc-returns-type
  message: TypeScript migration replaces JSDoc return type annotations with TypeScript
    return types
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: '@returns\s+\{[^}]+\}'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: test-file-javascript
  message: Test files should be migrated to TypeScript after migration
  severity: INFO
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - test/*.test.js
    exclude:
    - test/integration/**
    - test/esm/**
- id: node-children-zero-index
  message: Code should be in TypeScript source files with proper type checking after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: node.children[0]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: break-statement-in-switch
  message: Code should be in TypeScript source files after migration
  severity: INFO
  languages:
  - javascript
  pattern: break;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: js-source-file-in-lib
  message: Source file should be TypeScript (.ts) and located in src/ directory after
    migration
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - lib/*.js
    exclude:
    - lib/*.d.ts
- id: module-exports-assignment
  message: After TypeScript migration, use ES6 export default instead of CommonJS
    module.exports
  severity: WARNING
  languages:
  - javascript
  pattern: 'module.exports = $FUNC;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - lib/**
    exclude:
    - test/**
- id: options-default-empty-object
  message: After TypeScript migration, use default parameters instead of || operator
  severity: WARNING
  languages:
  - javascript
  pattern: '$OPTIONS = $OPTIONS || {};

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: result-push-transform
  message: Code should be in TypeScript source files with proper type checking after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: result.push(transform(...));
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: attributes-type-property
  message: Code should be in TypeScript source files with proper type checking after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: $ATTRIBUTES.type
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - lib/attributes-to-props.js
- id: props-style-property
  message: Code should be in TypeScript source files with proper type checking after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: props.style
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: array-push-method
  message: Code should be in TypeScript source files with proper array typing after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: $ARR.push($ITEM);
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: lib-directory-js-files
  message: JavaScript files in lib/ should be compiled output from TypeScript source
    in src/ after migration
  severity: INFO
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - lib/*.js
    exclude:
    - lib/*.d.ts
- id: or-assignment-operator
  message: Consider using TypeScript default parameters or nullish coalescing after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: '$VAR = $VAR || $DEFAULT;

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - lib/**
    - index.js
    exclude:
    - test/**
- id: require-without-default-domhandler
  message: After TypeScript migration, some require() calls may need .default accessor
  severity: WARNING
  languages:
  - javascript
  patterns:
  - pattern: var $VAR = require('domhandler');
  - pattern-not: var $VAR = require('domhandler').default;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: commonjs-require-default-property
  message: After TypeScript migration, compiled output handles default exports differently
  severity: INFO
  languages:
  - javascript
  pattern: require(...).default
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - index.js
    - lib/**
    exclude:
    - test/**
- id: package-json-prepublish-lint-dts
  message: After TypeScript migration, replace dtslint with TypeScript compiler checking
  severity: WARNING
  languages:
  - json
  pattern-regex: lint:dts
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - package.json
- id: typeof-function-check
  message: After TypeScript migration, type checking is handled by TypeScript type
    system
  severity: INFO
  languages:
  - javascript
  pattern: typeof $VAR === 'function'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - index.js
    - lib/**
    exclude:
    - test/**
- id: switch-case-without-braces
  message: After TypeScript migration, code should be in TypeScript files with proper
    type checking
  severity: INFO
  languages:
  - javascript
  pattern: "switch ($EXPR) {\n  case $CASE:\n    ...\n    break;\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
    - '*.tsx'
- id: react-library-import
  message: Use ES6 imports instead of require after TypeScript migration
  severity: WARNING
  languages:
  - javascript
  pattern: var React = require('react');
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/**
    exclude:
    - test/**
- id: negative-one-indexof
  message: Code should be in TypeScript files after migration, consider using .includes()
    method
  severity: INFO
  languages:
  - javascript
  pattern: $ARR.indexOf($VAL) !== -1
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: object-literal-with-true-value
  message: Source code should be in TypeScript files with proper type definitions
    after migration
  severity: INFO
  languages:
  - javascript
  pattern: '{ $KEY: true }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: node-data-access
  message: Code should be in TypeScript source files with proper type checking after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: node.data
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: node-parent-access
  message: Code should be in TypeScript source files with proper type checking after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: node.parent
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: getPropName-function-call
  message: Code should be in TypeScript source files after migration
  severity: INFO
  languages:
  - javascript
  pattern: getPropName($ATTR)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: replace-element-key-check
  message: Code should be in TypeScript source files with proper type checking after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: $ELEMENT.key
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: preserve-custom-attributes-check
  message: Code should be in TypeScript source files with proper module imports after
    migration
  severity: INFO
  languages:
  - javascript
  pattern: utilities.PRESERVE_CUSTOM_ATTRIBUTES
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - lib/**
    exclude:
    - test/**
    - '*.ts'
- id: var-utilities-require
  message: Use const instead of var and consider ES6 imports after TypeScript migration
  severity: WARNING
  languages:
  - javascript
  pattern: var utilities = require('./utilities');
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: var-htmlToDOM-require
  message: Use const instead of var and consider ES6 imports after TypeScript migration
  severity: WARNING
  languages:
  - javascript
  pattern: var htmlToDOM = require('html-dom-parser').default;
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: var-domhandler-require
  message: Use const instead of var and consider ES6 imports after TypeScript migration
  severity: WARNING
  languages:
  - javascript
  pattern: var domhandler = require('domhandler');
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: commonjs-exports-property
  message: After TypeScript migration, module export structure changes - .default
    assignment pattern indicates old export style
  severity: WARNING
  languages:
  - javascript
  pattern: '$OBJ.default = $OBJ;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dtslint-npm-script
  message: dtslint should be replaced with TypeScript compiler type checking (lint:tsc)
    after migration
  severity: WARNING
  languages:
  - json
  pattern-regex: lint:dts.*dtslint
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - package.json
- id: tslint-config-file
  message: tslint.json should be removed and replaced with TypeScript compiler checking
    after migration
  severity: WARNING
  languages:
  - json
  pattern-regex: \A[\s\S]*
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - tslint.json
- id: source-file-in-root
  message: Main source file should be TypeScript in src/ directory after migration
  severity: WARNING
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - index.js
    exclude:
    - test/**
    - examples/**
    - benchmark/**
- id: typeof-check-for-default-export
  message: After TypeScript migration, default export handling changes - this compatibility
    pattern not needed
  severity: WARNING
  languages:
  - javascript
  pattern: 'typeof $VAR.default === ''function'' ? $VAR.default : $VAR

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: package-json-main-index-js
  message: After TypeScript migration, main entry should point to compiled lib/ output
  severity: WARNING
  languages:
  - json
  pattern-regex: '"main":\s*"index\.js"'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - package.json
- id: rollup-input-index-js
  message: After TypeScript migration, Rollup input should be TypeScript source file
  severity: WARNING
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: 'input: ''index.js''

      '
  - pattern-not: 'input: ''src/index.ts''

      '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - rollup.config.*
- id: attributes-to-props-js-file
