- id: typescript-namespace-declaration
  message: TypeScript namespace declaration in source
  severity: INFO
  languages:
  - typescript
  pattern: 'declare namespace $NAME { ... }

    '
  metadata:
    category: basic
    nr_refactored_patterns: 170
    nr_legacy_patterns: 0
