rules:
- id: namespace-declaration
  message: Namespace declaration detected - TypeScript migration successful
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: "namespace $NAME {\n  ...\n}\n"
  - pattern: "export namespace $NAME {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 192
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/examples/**'
- id: typescript-file-without-var
  message: TypeScript file without var declarations detected - migration successful
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: (const|let|function|class|import|export)
  - pattern-not-regex: \bvar\s+
  metadata:
    nr_refactored_patterns: 77
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.ts'
    - '**/src/**/*.tsx'
    exclude:
    - '**/test/**'
    - '**/examples/**'
- id: type-assertion-with-as
  message: Type assertion using 'as' keyword detected - TypeScript migration successful
  severity: INFO
  languages:
  - typescript
  pattern: $EXPR as $TYPE
  metadata:
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
- id: typescript-import-in-source
  message: TypeScript import statement in source detected - migration successful
  severity: INFO
  languages:
  - typescript
  pattern: 'import { ..., $NAME, ... } from ''...''

    '
  metadata:
    nr_refactored_patterns: 24
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.ts'
    - '**/src/**/*.tsx'
    exclude:
    - '**/test/**'
    - '**/examples/**'
- id: type-only-import-statement
  message: Type-only import detected - TypeScript migration successful
  severity: INFO
  languages:
  - typescript
  pattern-regex: import\s+type\s+\{[^}]+\}\s+from
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/examples/**'
- id: function-return-type-annotation
  message: Function return type annotation detected - migration successful
  severity: INFO
  languages:
  - typescript
  pattern: "function $FUNC(...): $TYPE {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: multiple-imports-without-require
  message: Multiple ES6 imports without require - migration complete
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-either:
    - pattern: 'import $A from ''$MOD1''

        ...

        import $B from ''$MOD2''

        '
    - pattern: 'import { $X, $Y } from ''$MOD''

        '
  - pattern-not-regex: require
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**'
    exclude:
    - '**/test/**'
    - '**/examples/**'
- id: test-file-in-typescript
  message: Test file migrated to TypeScript
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/**/*.test.ts'
    - '**/test/**/*.spec.ts'
    exclude:
    - '**/examples/**'
- id: generic-arrow-function-syntax
  message: Generic arrow function detected - TypeScript migration successful
  severity: INFO
  languages:
  - typescript
  pattern: <$T>(...) => ...
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/**'
    - '**/examples/**'
- id: ts-jest-in-jest-config
  message: ts-jest configuration detected - test migration successful
  severity: INFO
  languages:
  - json
  - javascript
  pattern-regex: (ts-jest|preset.*ts-jest)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/jest.config.*'
    - '**/package.json'
- id: typescript-build-config-file
  message: TypeScript build configuration detected - migration successful
  severity: INFO
  languages:
  - json
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsconfig.build.json'
- id: exported-interface-from-source
  message: Exported interface from source directory detected - migration successful
  severity: INFO
  languages:
  - typescript
  pattern-regex: export\s+(interface)\s+\w+
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.ts'
    - '**/src/**/*.tsx'
    exclude:
    - '**/test/**'
    - '**/examples/**'
- id: rollup-typescript-plugin-usage
  message: Rollup TypeScript plugin detected - build system migrated
  severity: INFO
  languages:
  - javascript
  pattern-either:
  - pattern: 'import $TS from ''@rollup/plugin-typescript''

      '
  - pattern: 'require(''@rollup/plugin-typescript'')

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/rollup.config.*'
- id: lint-tsc-script
  message: lint:tsc script detected in package.json - TypeScript linting added
  severity: INFO
  languages:
  - json
  pattern-regex: '"lint:tsc"\s*:'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/package.json'
- id: source-map-generation
  message: Source map generation configured - TypeScript build setup complete
  severity: INFO
  languages:
  - json
  pattern-regex: '"sourceMap"\s*:\s*true'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsconfig*.json'
- id: out-dir-configuration
  message: outDir configuration in tsconfig - TypeScript build setup
  severity: INFO
  languages:
  - json
  pattern-regex: '"outDir"\s*:'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsconfig*.json'
- id: declaration-generation-config
  message: Declaration file generation configured - TypeScript migration
  severity: INFO
  languages:
  - json
  pattern-regex: '"declaration"\s*:\s*true'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsconfig*.json'
- id: main-field-lib-directory
  message: Main field pointing to lib - TypeScript build output
  severity: INFO
  languages:
  - json
  pattern-regex: '"main"\s*:\s*"(\./)?lib/[^"]*\.js"'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/package.json'
- id: tsc-build-script
  message: tsc build script in package.json - TypeScript build setup
  severity: INFO
  languages:
  - json
  pattern-regex: '"(build|compile)"[^}]*tsc'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/package.json'
- id: declaration-map-generation
  message: declarationMap enabled - source map for types
  severity: INFO
  languages:
  - json
  pattern-regex: '"declarationMap"\s*:\s*true'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsconfig*.json'
