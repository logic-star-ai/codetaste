rules:
- id: default-export-identifier
  message: 'TypeScript migration detected: default export of identifier'
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: export default $ID
  - pattern-not: export default function $F(...) { ... }
  - pattern-not: export default class $C { ... }
  metadata:
    nr_refactored_patterns: 183
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    - '**/*.tsx'
    exclude:
    - '**/examples/**'
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: named-exports-excluding-examples
  message: 'TypeScript migration detected: named export in src not examples'
  severity: INFO
  languages:
  - typescript
  pattern: export { $EXPORTS }
  metadata:
    nr_refactored_patterns: 170
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**'
    exclude:
    - '**/examples/**'
    - '**/test/**'
  options:
    symbolic_propagation: true
- id: as-type-assertion
  message: 'TypeScript migration detected: type assertion with ''as'' keyword'
  severity: INFO
  languages:
  - typescript
  pattern: $EXPR as $TYPE
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**'
  options:
    symbolic_propagation: true
- id: function-return-type-annotation
  message: 'TypeScript migration detected: function with return type annotation'
  severity: INFO
  languages:
  - typescript
  pattern-either:
  - pattern: "function $FUNC(...): $TYPE {\n  ...\n}\n"
  - pattern: 'const $FUNC = (...): $TYPE => { ... }

      '
  - pattern: "export function $FUNC(...): $TYPE {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**'
  options:
    symbolic_propagation: true
- id: type-with-colon-syntax
  message: 'TypeScript migration detected: type annotation syntax present'
  severity: INFO
  languages:
  - typescript
  pattern-regex: (?s).*\w+\s*:\s*\w+.*
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.ts'
    exclude:
    - '**/examples/**'
    - '**/test/**'
    - '**/*.d.ts'
- id: typescript-source-in-src-not-examples
  message: 'TypeScript migration detected: source file in src/ directory'
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**/*.ts'
    - '**/src/**/*.tsx'
    exclude:
    - '**/examples/**'
    - '**/*.test.ts'
    - '**/*.spec.ts'
    - '**/*.d.ts'
- id: import-from-module-not-require
  message: 'TypeScript migration detected: import statement in source'
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern: import $X from '$MODULE'
  - pattern-not-inside: 'const $Y = require(...);

      ...

      '
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**'
    exclude:
    - '**/examples/**'
  options:
    symbolic_propagation: true
- id: esm-wrapper-in-esm-directory
  message: 'TypeScript migration detected: ESM wrapper file'
  severity: INFO
  languages:
  - javascript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/esm/*.mjs'
    exclude:
    - '**/test/**'
    - '**/tests/**'
- id: typescript-test-files
  message: 'TypeScript migration detected: test files migrated to TypeScript'
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.test.ts'
    - '**/*.spec.ts'
    exclude:
    - '**/*.test.js'
    - '**/*.spec.js'
- id: boolean-type-annotation
  message: 'TypeScript migration detected: boolean type annotation'
  severity: INFO
  languages:
  - typescript
  pattern-regex: (?s).*:\s*boolean.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**'
- id: index-file-typescript
  message: 'TypeScript migration detected: index TypeScript file'
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/index.ts'
    - '**/index.tsx'
    exclude:
    - '**/examples/**'
    - '**/test/**'
- id: export-type-alias
  message: 'TypeScript migration detected: exported type alias'
  severity: INFO
  languages:
  - typescript
  pattern: export type $NAME = $TYPE
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**'
- id: union-type-definition
  message: 'TypeScript migration detected: union type with | operator'
  severity: INFO
  languages:
  - typescript
  pattern-regex: (?s).*:\s*\w+\s*\|\s*\w+.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/src/**'
- id: typescript-config-file-exists
  message: 'TypeScript migration detected: tsconfig.build.json configuration file'
  severity: INFO
  languages:
  - json
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsconfig.build.json'
- id: rollup-typescript-plugin-import
  message: 'TypeScript migration detected: Rollup TypeScript plugin imported'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern-either:
    - pattern: import $PLUGIN from '@rollup/plugin-typescript'
    - pattern: import { $PLUGIN } from '@rollup/plugin-typescript'
    - pattern: 'const $PLUGIN = require(''@rollup/plugin-typescript'')

        '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/rollup.config.*'
- id: ts-jest-configuration
  message: 'TypeScript migration detected: ts-jest configured in tests'
  severity: INFO
  languages:
  - json
  pattern-regex: (?s).*ts-jest.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/jest.config.*'
    - '**/package.json'
- id: tsconfig-outdir-lib
  message: 'TypeScript migration detected: tsconfig with outDir pointing to lib'
  severity: INFO
  languages:
  - json
  pattern-regex: (?s).*"outDir"\s*:.*lib.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tsconfig*.json'
- id: rollup-plugin-typescript-usage
  message: 'TypeScript migration detected: TypeScript plugin used in Rollup config'
  severity: INFO
  languages:
  - javascript
  - typescript
  patterns:
  - pattern: $PLUGIN(...)
  - metavariable-regex:
      metavariable: $PLUGIN
      regex: (?i).*(typescript|ts).*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/rollup.config.*'
  options:
    symbolic_propagation: true
