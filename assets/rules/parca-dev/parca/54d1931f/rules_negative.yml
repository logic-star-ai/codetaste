  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { $A, $B } from '@parca/functions'
    - pattern: import { $A, $B, $C } from '@parca/functions'
    - pattern: import { $A, $B, $C, $D } from '@parca/functions'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
