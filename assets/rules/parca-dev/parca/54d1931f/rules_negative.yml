rules:
- id: parca-functions-named-import
  message: Import from '@parca/functions' should be migrated to '@parca/utilities'
    for utility functions or '@parca/hooks' for React hooks
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { ..., $FUNC, ... } from '@parca/functions'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
- id: parca-functions-wildcard-import
  message: All imports from '@parca/functions' should be migrated to '@parca/utilities'
    or '@parca/hooks'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'import {...} from ''@parca/functions''

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
- id: parca-functions-side-effect-import
  message: Side-effect import from '@parca/functions' should be migrated to '@parca/utilities'
    or '@parca/hooks'
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import '@parca/functions'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
- id: parca-functions-exportimport-combo
  message: Import and re-export pattern from '@parca/functions' should be updated
    to '@parca/utilities' or '@parca/hooks'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: 'import { ..., $FUNC, ... } from ''@parca/functions'';

        export { $FUNC };

        '
    - pattern: 'import * as $NAME from ''@parca/functions'';

        export { $NAME };

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
