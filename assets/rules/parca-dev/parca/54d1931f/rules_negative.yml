- id: parca-functions-value-formatter-import
  message: Utility functions (valueFormatter, isDevMode, NavigateFunction) should
    be imported from '@parca/utilities' instead of '@parca/functions'
  severity: WARNING
  languages:
  - typescript
  - javascript
  patterns:
  - pattern-either:
    - pattern: import { ..., valueFormatter, ... } from '@parca/functions'
    - pattern: import { ..., isDevMode, ... } from '@parca/functions'
    - pattern: import { ..., NavigateFunction, ... } from '@parca/functions'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: parca-functions-multiple-imports-same-line
  message: Multiple imports from '@parca/functions' detected. Split imports between
    '@parca/utilities' for utilities and '@parca/hooks' for React hooks
