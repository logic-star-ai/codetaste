    after migrating to @reactioncommerce/api-plugin-carts
  severity: ERROR
  languages:
  - javascript
  pattern: 'export { Cart, CartItem }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 185
  paths:
    include:
    - src/core-services/cart/simpleSchemas.js
