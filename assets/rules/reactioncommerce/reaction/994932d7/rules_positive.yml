rules:
- id: cart-mock-section-header-added
  message: Detected api-plugin-carts section in mockTypes.graphql comments
  severity: INFO
  languages:
  - generic
  pattern-regex: api-plugin-carts
  metadata:
    category: config
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-mock-comment-with-plugin-name
  message: Comment mentioning plugin and carts in mockTypes
  severity: INFO
  languages:
  - generic
  pattern-regex: plugin.*carts|carts.*plugin
  metadata:
    category: config
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-mock-comment-lives-in-plugin
  message: Detected comment indicating type lives in api-plugin-carts
  severity: INFO
  languages:
  - generic
  pattern-regex: lives in.*api-plugin-carts
  metadata:
    category: config
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-mock-triple-quote-comment
  message: Triple-quote comment mentioning cart in mockTypes
  severity: INFO
  languages:
  - generic
  pattern-regex: '"""[^"]*[Cc]art[^"]*"""'
  metadata:
    category: config
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-npm-package-name-full
  message: Full cart npm package name detected
  severity: INFO
  languages:
  - js
  - json
  - yaml
  pattern-regex: '@reactioncommerce/api-plugin-carts'
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: cart-npm-package-with-org-scope
  message: Cart package with @reactioncommerce organization scope
  severity: INFO
  languages:
  - js
  - json
  - typescript
  pattern-regex: '@reactioncommerce/.*carts'
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: cart-npm-package-hyphenated-name
  message: Cart npm package with hyphenated naming convention
  severity: INFO
  languages:
  - js
  - json
  - typescript
  - yaml
  pattern-regex: api-plugin-carts
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: cart-mock-type-declaration-pattern
  message: Cart-related type declaration in mockTypes
  severity: INFO
  languages:
  - generic
  pattern-regex: ^\s*type\s+(Cart|CartItem|CartSummary|FulfillmentOption)\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-package-name-pattern
  message: Cart package follows @org/api-plugin-carts naming pattern
  severity: INFO
  languages:
  - js
  - json
  - typescript
  pattern-regex: '@[a-z]+/api-plugin-carts'
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: cart-mock-type-with-curly-brace
  message: Cart-related type with curly brace in mockTypes
  severity: INFO
  languages:
  - generic
  pattern-regex: type\s+(Cart|CartItem|CartSummary|FulfillmentOption)\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-mock-type-with-description
  message: Cart mock type with description comment in mockTypes.graphql
  severity: INFO
  languages:
  - generic
  pattern-regex: '"""[^"]*[Cc]art[^"]*"""[\s\n]+type\s+Cart'
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-npm-package-scoped-name
  message: Scoped npm package name for cart plugin detected
  severity: INFO
  languages:
  - js
  - json
  - typescript
  pattern-regex: '@reactioncommerce/api-plugin-carts["\s,}]'
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: cart-mock-types-has-cart-keyword
  message: MockTypes file contains cart keyword
  severity: INFO
  languages:
  - generic
  pattern-regex: \bcart\b|\bCart\b
  metadata:
    category: structural
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-npm-api-plugin-naming
  message: Uses api-plugin naming convention for carts
  severity: INFO
  languages:
  - js
  - json
  - typescript
  pattern-regex: api-plugin-carts["\s,})]
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: cart-npm-package-double-quotes
  message: Cart npm package name in double quotes
  severity: INFO
  languages:
  - json
  - js
  pattern-regex: '"@reactioncommerce/api-plugin-carts"'
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: cart-plugin-carts-suffix
  message: Package name with plugin-carts suffix
  severity: INFO
  languages:
  - js
  - json
  - typescript
  pattern-regex: plugin-carts["\s]
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: cart-npm-package-name-literal
  message: Literal cart npm package name reference
  severity: INFO
  languages:
  - js
  - json
  - typescript
  - yaml
  pattern-regex: '@reactioncommerce/api-plugin-carts'
  metadata:
    category: dependency
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - plugins.json
    - package.json
    - tests/util/factory.js
- id: cart-mock-comment-header-section
  message: Comment header section for api-plugin-carts
  severity: INFO
  languages:
  - generic
  pattern-regex: '#\s*={10,}[^=]*api-plugin-carts'
  metadata:
    category: config
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-plugin-npm-package-in-plugins-json
  message: Detected cart plugin configured to use npm package @reactioncommerce/api-plugin-carts
  severity: INFO
  languages:
  - json
  pattern-regex: '"cart"\s*:\s*"@reactioncommerce/api-plugin-carts"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - plugins.json
- id: cart-npm-package-simpleschemas-import
  message: Detected import from @reactioncommerce/api-plugin-carts simpleSchemas
  severity: INFO
  languages:
  - js
  pattern: 'import { ... } from "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-package-in-package-json
  message: Detected @reactioncommerce/api-plugin-carts npm package dependency in package.json
  severity: INFO
  languages:
  - json
  pattern-regex: '"@reactioncommerce/api-plugin-carts"\s*:\s*"[^"]+"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: cart-npm-package-version-constraint
  message: Detected correct version constraint for @reactioncommerce/api-plugin-carts
  severity: INFO
  languages:
  - json
  pattern-regex: '"@reactioncommerce/api-plugin-carts"\s*:\s*"\^1\.\d+\.\d+"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: factory-uses-cart-npm-package-imports
  message: Factory imports cart schemas from npm package
  severity: INFO
  languages:
  - js
  patterns:
  - pattern-either:
    - pattern: 'import { $CART, ... } from "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"

        '
    - pattern: 'import { Cart } from "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"

        '
    - pattern: 'import { CartItem } from "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"

        '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/util/factory.js
- id: cart-mock-type-cart-added
  message: Detected Cart mock type declaration in mockTypes.graphql
  severity: INFO
  languages:
  - generic
  pattern-regex: type\s+Cart\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-mock-type-cartitem-added
  message: Detected CartItem mock type declaration in mockTypes.graphql
  severity: INFO
  languages:
  - generic
  pattern-regex: type\s+CartItem\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-mock-type-cartsummary-added
  message: Detected CartSummary mock type declaration in mockTypes.graphql
  severity: INFO
  languages:
  - generic
  pattern-regex: type\s+CartSummary\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-mock-type-fulfillmentoption-added
  message: Detected FulfillmentOption mock type declaration in mockTypes.graphql
  severity: INFO
  languages:
  - generic
  pattern-regex: type\s+FulfillmentOption\s*\{
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-npm-package-import-with-path
  message: Detected import from @reactioncommerce/api-plugin-carts with source path
  severity: INFO
  languages:
  - js
  - typescript
  pattern-regex: '@reactioncommerce/api-plugin-carts/src/'
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-simpleschemas-cart-import
  message: Detected Cart import from npm package simpleSchemas
  severity: INFO
  languages:
  - js
  pattern: import { Cart, ... } from "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-simpleschemas-cartitem-import
  message: Detected CartItem import from npm package simpleSchemas
  severity: INFO
  languages:
  - js
  pattern: import { CartItem, ... } from "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-simpleschemas-cartaddress-import
  message: Detected CartAddress import from npm package simpleSchemas
  severity: INFO
  languages:
  - js
  pattern: import { CartAddress, ... } from "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-simpleschemas-cartinvoice-import
  message: Detected CartInvoice import from npm package simpleSchemas
  severity: INFO
  languages:
  - js
  pattern: import { CartInvoice, ... } from "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-simpleschemas-shipmentquote-import
  message: Detected ShipmentQuote import from npm package simpleSchemas
  severity: INFO
  languages:
  - js
  pattern: import { ShipmentQuote, ... } from "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-plugin-npm-in-plugins-json-generic
  message: Detected api-plugin-carts package reference in plugins configuration
  severity: INFO
  languages:
  - json
  pattern-regex: api-plugin-carts
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - plugins.json
- id: cart-npm-multiple-schema-imports
  message: Detected multi-line import from cart npm package simpleSchemas
  severity: INFO
  languages:
  - js
  pattern: "import {\n  ...\n} from \"@reactioncommerce/api-plugin-carts/src/simpleSchemas.js\"\
    \n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: factory-cart-npm-import-line
  message: Factory file imports from cart npm package
  severity: INFO
  languages:
  - js
  pattern-regex: from\s+"@reactioncommerce/api-plugin-carts/src/simpleSchemas\.js"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/util/factory.js
- id: plugins-json-cart-line-with-npm
  message: Cart plugin configured with npm package in plugins.json
  severity: INFO
  languages:
  - json
  pattern-regex: '"cart"\s*:\s*"@reactioncommerce/api-plugin-carts"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - plugins.json
- id: cart-npm-version-1-x-constraint
  message: Cart npm package version constraint starts with ^1.x
  severity: INFO
  languages:
  - json
  pattern-regex: '"@reactioncommerce/api-plugin-carts"\s*:\s*"\^1\.'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: cart-mock-fake-field-for-cart-type
  message: Cart mock type with fake field for linting in mockTypes.graphql
  severity: INFO
  languages:
  - generic
  pattern-regex: type\s+Cart\s*\{[^}]*fakeField[^}]*\}
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-npm-simpleschemas-multiple-cart-types
  message: Import Cart and CartItem together from npm package
  severity: INFO
  languages:
  - js
  pattern: 'import { Cart, CartItem, ... } from "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-simpleschemas-all-five-types
  message: Import all five cart schema types from npm package
  severity: INFO
  languages:
  - js
  pattern: 'import { Cart, CartAddress, CartInvoice, CartItem, ShipmentQuote } from
    "@reactioncommerce/api-plugin-carts/src/simpleSchemas.js"

    '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-package-dependency-added
  message: Cart npm package reference detected in dependencies
  severity: INFO
  languages:
  - json
  pattern-regex: '"@reactioncommerce/api-plugin-carts"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: plugins-json-uses-npm-package-pattern
  message: Cart configured as npm package with @ prefix in plugins.json
  severity: INFO
  languages:
  - json
  pattern-regex: '"cart"\s*:\s*"@[^"]+api-plugin-carts[^"]*"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - plugins.json
- id: cart-npm-src-path-usage
  message: Direct src path import from cart npm package
  severity: INFO
  languages:
  - js
  - typescript
  pattern-regex: api-plugin-carts/src/
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-package-with-version
  message: Cart npm package with version specification
  severity: INFO
  languages:
  - json
  pattern-regex: '"@reactioncommerce/api-plugin-carts"\s*:\s*"[~^]?\d+\.\d+'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: cart-mock-extend-fakedata-for-cart
  message: FakeData extended with cart-related field in mockTypes.graphql
  severity: INFO
  languages:
  - generic
  pattern-regex: extend\s+type\s+FakeData\s*\{[^}]*cart[^}]*\}
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-npm-simpleschemas-js-extension
  message: Import from simpleSchemas.js with .js extension from cart package
  severity: INFO
  languages:
  - js
  - typescript
  pattern-regex: api-plugin-carts/src/simpleSchemas\.js
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-mock-cartsummary-with-fake-field
  message: CartSummary mock type with fake field in mockTypes.graphql
  severity: INFO
  languages:
  - generic
  pattern-regex: type\s+CartSummary\s*\{[^}]*fakeField
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-mock-fulfillmentoption-with-fake-field
  message: FulfillmentOption mock type with fake field in mockTypes.graphql
  severity: INFO
  languages:
  - generic
  pattern-regex: type\s+FulfillmentOption\s*\{[^}]*fakeField
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: plugins-json-cart-npm-full-line
  message: Complete cart plugin line with npm package in plugins.json
  severity: INFO
  languages:
  - json
  pattern-regex: '"cart"\s*:\s*"@reactioncommerce/api-plugin-carts"[,\s]*$'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - plugins.json
- id: cart-import-curly-braces-npm
  message: Destructured import with Cart from npm package
  severity: INFO
  languages:
  - js
  - typescript
  pattern-regex: \{\s*Cart[^}]*\}\s*from\s+"@reactioncommerce/api-plugin-carts
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-package-major-version-1
  message: Cart npm package using major version 1.x
  severity: INFO
  languages:
  - json
  pattern-regex: '"@reactioncommerce/api-plugin-carts"\s*:\s*"[\^~]?1\.'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: factory-imports-from-reactioncommerce-scope
  message: Factory imports from @reactioncommerce scoped package
  severity: INFO
  languages:
  - js
  pattern-regex: from\s+"@reactioncommerce/api-plugin-carts
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - tests/util/factory.js
- id: cart-mock-type-cart-singular
  message: Cart type declaration in mockTypes.graphql
  severity: INFO
  languages:
  - generic
  pattern-regex: ^\s*type\s+Cart\s*\{[\s\S]*?\}
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: plugins-json-cart-as-npm-not-relative
  message: Cart plugin path is not a relative path (uses npm package)
  severity: INFO
  languages:
  - json
  patterns:
  - pattern-regex: '"cart"\s*:\s*"[^"]*"'
  - pattern-not-regex: \.\/
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - plugins.json
- id: cart-npm-import-with-slash-src
  message: Import from cart npm package with /src/ subdirectory
  severity: INFO
  languages:
  - js
  - typescript
  pattern-regex: api-plugin-carts/src/
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-in-json-dependencies
  message: Cart npm package as dependency key in JSON
  severity: INFO
  languages:
  - json
  pattern-regex: '"\s*@reactioncommerce/api-plugin-carts\s*"\s*:'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-mock-cart-with-fake
  message: Cart mock type contains fake field
  severity: INFO
  languages:
  - generic
  pattern-regex: type\s+Cart\s*\{[^}]*fake
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-mock-cartitem-with-fake
  message: CartItem mock type contains fake field
  severity: INFO
  languages:
  - generic
  pattern-regex: type\s+CartItem\s*\{[^}]*fake
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/mockTypes.graphql
- id: cart-npm-package-caret-version
  message: Cart npm package with caret version constraint
  severity: INFO
  languages:
  - json
  pattern-regex: '"@reactioncommerce/api-plugin-carts"\s*:\s*"\^'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: plugins-json-cart-key-npm-value
  message: Cart key mapped to npm package value in plugins.json
  severity: INFO
  languages:
  - json
  pattern-regex: '"cart"[^:]*:[^"]*"@reactioncommerce/api-plugin-carts"'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - plugins.json
- id: cart-npm-version-range-1-0-0-plus
  message: Cart npm package version ^1.0.x or higher
  severity: INFO
  languages:
  - json
  pattern-regex: '"@reactioncommerce/api-plugin-carts"\s*:\s*"\^1\.0\.'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - package.json
- id: cart-plugin-external-package-pattern
  message: Cart plugin uses external package (starts with @)
  severity: INFO
  languages:
  - json
  pattern-regex: '"cart"\s*:\s*"@[^/]+'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - plugins.json
- id: cart-npm-import-statement-cart
  message: Import Cart from api-plugin-carts npm package
  severity: INFO
  languages:
  - js
  patterns:
  - pattern: import { Cart, ... } from $PKG
  - metavariable-regex:
      metavariable: $PKG
      regex: .*api-plugin-carts.*
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: cart-npm-import-statement-cartitem
