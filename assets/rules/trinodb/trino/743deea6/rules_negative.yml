- id: detect-getloadedblock-nested-call
  message: Nested getLoadedBlock() call should be removed - lazy blocks are obsolete
  severity: WARNING
  languages:
  - java
  pattern: $OBJ.$METHOD1(..., $BLOCK.getLoadedBlock(), ...)
  metadata:
