- id: detect-lazyblock-return-type
  message: LazyBlock return type should be removed - use SourcePage for lazy materialization
  severity: WARNING
  languages:
  - java
  pattern: 'LazyBlock $METHOD(...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-override-isloaded-method
  message: Override of isLoaded() method should be removed - lazy blocks are obsolete
  severity: WARNING
  languages:
  - java
  pattern: '@Override

    $RET isLoaded() { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-override-getloadedblock-method
  message: Override of getLoadedBlock() method should be removed - lazy blocks are
    obsolete
  severity: WARNING
