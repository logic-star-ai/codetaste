    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-isloaded-conditional-check
  message: Conditional check on Block.isLoaded() should be removed - lazy blocks are
    obsolete
  severity: WARNING
  languages:
  - java
  pattern-either:
  - pattern: if ($BLOCK.isLoaded()) { ... }
  - pattern: if (!$BLOCK.isLoaded()) { ... }
  - pattern: while ($BLOCK.isLoaded()) { ... }
  - pattern: while (!$BLOCK.isLoaded()) { ... }
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-getloadedblock-in-method-call
