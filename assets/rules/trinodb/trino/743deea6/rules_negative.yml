rules:
- id: detect-block-getloadedblock-call
  message: Block.getLoadedBlock() call should be removed - lazy blocks are obsolete
    with SourcePage
  severity: WARNING
  languages:
  - java
  pattern: $BLOCK.getLoadedBlock()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
- id: detect-getloadedblock-assignment
  message: Assignment from getLoadedBlock() should be removed - lazy blocks are obsolete
  severity: WARNING
  languages:
  - java
  pattern: $VAR = $BLOCK.getLoadedBlock()
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: detect-lazyblock-instantiation
  message: LazyBlock instantiation should be removed - use SourcePage for lazy materialization
  severity: WARNING
  languages:
  - java
  pattern: new LazyBlock(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: detect-block-isloaded-call
  message: Block.isLoaded() call should be removed - lazy blocks are obsolete with
    SourcePage
  severity: WARNING
  languages:
  - java
  pattern: $BLOCK.isLoaded()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: detect-lazyblock-import
  message: Import of LazyBlock should be removed - lazy materialization is now handled
    by SourcePage
  severity: WARNING
  languages:
  - java
  pattern: import $PACKAGE.LazyBlock;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: detect-lazyblock-variable-declaration
  message: LazyBlock variable should be removed - lazy blocks are obsolete
  severity: WARNING
  languages:
  - java
  pattern: LazyBlock $VAR = ...;
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: detect-page-getloadedpage-no-args
  message: Page.getLoadedPage() call should be removed - lazy blocks are obsolete
    with SourcePage
  severity: WARNING
  languages:
  - java
  pattern: $PAGE.getLoadedPage()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-page-getloadedpage-assignment
  message: Assignment from Page.getLoadedPage() should be removed - lazy blocks are
    obsolete
  severity: WARNING
  languages:
  - java
  pattern: $VAR = $PAGE.getLoadedPage(...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: detect-lazyblock-instanceof
  message: instanceof check for LazyBlock should be removed - lazy materialization
    now handled by SourcePage
  severity: WARNING
  languages:
  - java
  pattern: $EXPR instanceof LazyBlock
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: detect-lazyblock-class-reference
  message: LazyBlock.class reference should be removed - lazy blocks are obsolete
  severity: WARNING
