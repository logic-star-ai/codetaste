rules:
- id: valueblock-implementations-no-isloaded
  message: ValueBlock implementation does not have isLoaded() method - lazy support
    removed
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: "class $NAME implements ValueBlock {\n  ...\n}\n"
    - pattern: "final class $NAME implements ValueBlock {\n  ...\n}\n"
  - pattern-not: "class $NAME implements ValueBlock {\n  ...\n  public boolean isLoaded()\
      \ {\n    ...\n  }\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $NAME
      regex: ^(ArrayBlock|MapBlock|RowBlock)$
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: block-encoding-manager-without-lazy-encoding
  message: BlockEncodingManager does not register LazyBlockEncoding after removal
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class BlockEncodingManager {\n  ...\n  $CTOR(...) {\n    ...\n    addBlockEncoding(...);\n\
      \    ...\n  }\n  ...\n}\n"
  - pattern-not: "class BlockEncodingManager {\n  ...\n  $CTOR(...) {\n    ...\n \
      \   addBlockEncoding(new LazyBlockEncoding());\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: orc-writer-direct-page-write
  message: OrcWriter writes page directly without getLoadedPage() after LazyBlock
    removal
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: "class OrcWriter {\n  ...\n  void write(..., Page $PAGE) {\n    ...\n\
      \    $THIS.$METHOD($PAGE, ...);\n    ...\n  }\n  ...\n}\n"
  - pattern-not: "class OrcWriter {\n  ...\n  void write(..., Page $PAGE) {\n    ...\n\
      \    $PAGE = $PAGE.getLoadedPage();\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
