  - pattern-not: "class ParquetWriter {\n  ...\n  void write(Page $PAGE) {\n    ...\n\
      \    $PAGE = $PAGE.getLoadedPage();\n    ...\n  }\n  ...\n}\n"
  metadata:
    category: api
