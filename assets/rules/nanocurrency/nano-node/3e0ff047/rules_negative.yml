- id: old-mdb-val-type
  message: 'Old database value type: use ''nano::store::lmdb::db_val'' instead of
    ''nano::mdb_val'''
  severity: WARNING
  languages:
  - cpp
  pattern: nano::mdb_val
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
- id: old-mdb-val-constructor-call
  message: 'Old mdb_val constructor: use nano::store::lmdb::db_val instead'
  severity: WARNING
  languages:
  - cpp
  pattern: nano::mdb_val($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
- id: old-include-secure-store
  message: 'Including old store header from nano/secure/: interfaces should be in
    nano/store/'
  severity: WARNING
  languages:
  - cpp
  pattern: '#include <nano/secure/store.hpp>'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
