  message: 'Old iterator type: use ''nano::store::iterator<K,V>'' instead of ''nano::store_iterator<K,V>'''
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: nano::store_iterator<$K, $V>
  - pattern-not: nano::store::iterator<$K, $V>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 29
