  severity: ERROR
  languages:
  - cpp
  patterns:
  - pattern: boost::polymorphic_downcast<$TYPE *>(&$ARG)
  - metavariable-regex:
      metavariable: $TYPE
      regex: .*iterator.*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
