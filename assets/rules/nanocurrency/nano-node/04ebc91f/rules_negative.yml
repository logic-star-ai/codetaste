  severity: ERROR
  languages:
  - cpp
  pattern: '#include <nano/store/iterator_impl.hpp>

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: detect-iterator-current-member
