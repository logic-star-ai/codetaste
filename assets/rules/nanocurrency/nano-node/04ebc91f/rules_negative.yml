rules:
- id: detect-make-iterator-call
  message: make_iterator() call - old factory pattern for heap-allocated iterators
  severity: ERROR
  languages:
  - cpp
  pattern-either:
  - pattern: $STORE.make_iterator<$T, $U>($TXN, $TABLE)
  - pattern: store.make_iterator<$T, $U>($TXN, $TABLE, $ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: detect-nullptr-return-iterator
  message: Returning iterator constructed with nullptr - should return proper end()
    sentinel
  severity: ERROR
  languages:
  - cpp
  pattern-either:
  - pattern: return iterator{nullptr};
  - pattern: return iterator(nullptr);
  - pattern: return store::iterator<$T, $U>{nullptr};
  - pattern: return nano::store::iterator<$T, $U>{nullptr};
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-end-returning-nullptr-iterator
  message: end() method returning iterator{nullptr} - old polymorphic end sentinel
    pattern
  severity: ERROR
  languages:
  - cpp
  pattern: "auto $CLASS::end(...) const -> iterator\n{\n  return iterator{nullptr};\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-make-iterator-with-db-arg
  message: make_iterator() with multiple arguments - old factory method pattern
  severity: ERROR
  languages:
  - cpp
  pattern: '$STORE.make_iterator<$KEY, $VALUE>($TXN, $TABLE, $ARG)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-iterator-return-nullptr
  message: Returning iterator{nullptr} - old end sentinel construction
  severity: ERROR
  languages:
  - cpp
  pattern: return iterator{nullptr};
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-store-end-method
  message: Store end() method returning nullptr iterator - old pattern
  severity: ERROR
  languages:
  - cpp
  pattern: "auto $CLASS::end(...) const -> iterator\n{\n  return iterator{nullptr};\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-tables-enum-in-make-iterator
  message: 'make_iterator with tables:: enum - old factory pattern'
  severity: ERROR
  languages:
  - cpp
  patterns:
  - pattern: $STORE.make_iterator<$K, $V>($TXN, tables::$TABLE)
  - metavariable-regex:
      metavariable: $TABLE
      regex: .*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: detect-is-end-sentinal-method
  message: is_end_sentinal() method usage - should use iterator comparison with end()
    sentinel
  severity: ERROR
  languages:
  - cpp
  pattern-either:
  - pattern: "bool is_end_sentinal() const\n{\n  ...\n}\n"
  - pattern: $X.is_end_sentinal()
  - pattern: $X->is_end_sentinal()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-mdb-cursor-comparison
  message: MDB cursor comparison functions - old LMDB iterator pattern
  severity: WARNING
  languages:
  - cpp
  pattern-either:
  - pattern: mdb_cmp(mdb_cursor_txn($C1), mdb_cursor_dbi($C1), $K1, $K2)
  - pattern: mdb_cursor_txn($CURSOR)
  - pattern: mdb_cursor_dbi($CURSOR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-store-iterator-template-usage
  message: Use of store::iterator<T,U> template - verify this is used correctly with
    variant design
  severity: INFO
  languages:
  - cpp
  pattern-either:
  - pattern: store::iterator<$T, $U>
  - pattern: nano::store::iterator<$T, $U>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-current-value-assignment
  message: Assigning to current.first - old iterator value storage pattern
  severity: WARNING
  languages:
  - cpp
  pattern: current.first = $VAL
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: detect-make-unique-iterator-construction
  message: Iterator heap allocation with make_unique - should use stack-allocated
    variant-based iterators
  severity: ERROR
  languages:
  - cpp
  pattern-either:
  - pattern: std::make_unique<nano::store::lmdb::iterator<$T, $U>>(...)
  - pattern: std::make_unique<nano::store::rocksdb::iterator<$T, $U>>(...)
  - pattern: std::make_unique<$NS::iterator<$T, $U>>(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-current-second-assignment
  message: Assigning to current.second - old iterator value storage pattern
  severity: WARNING
  languages:
  - cpp
  pattern: current.second = $VAL
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: detect-rbegin-returning-forward-iterator
  message: rbegin() returning forward iterator - should return proper reverse_iterator
  severity: ERROR
  languages:
  - cpp
  pattern: "auto $FUNC::rbegin(...) const -> iterator\n{\n  return $X.make_iterator<$T,\
    \ $U>($TXN, $TABLE, false);\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-iterator-returning-store-iterator
  message: Returning store::iterator with make_unique - old heap-allocated iterator
    pattern
  severity: ERROR
  languages:
  - cpp
  pattern: 'return store::iterator<$T, $U>(std::make_unique<$IMPL>(...));

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-cursor-nullptr-check
  message: Checking cursor pointer against nullptr - old manual resource management
  severity: WARNING
  languages:
  - cpp
  pattern-either:
  - pattern: if (cursor != nullptr)
  - pattern: if (cursor == nullptr)
  - pattern: cursor != nullptr
  - pattern: cursor == nullptr
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-release-assert-notfound
  message: release_assert with MDB_NOTFOUND - old LMDB iterator error handling
  severity: WARNING
  languages:
  - cpp
  pattern: release_assert($STATUS == 0 || $STATUS == MDB_NOTFOUND)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-data-pointer-equality
  message: Comparing data pointers - check if old iterator pattern
  severity: WARNING
  languages:
  - cpp
  pattern: $A.data() == $B.data()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-value-pair-static-cast-pattern
  message: static_cast from current field - old value extraction pattern
  severity: WARNING
  languages:
  - cpp
  pattern: static_cast<$TYPE>(current.$FIELD)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-current-value-cast-assignment
  message: Assigning static_cast from current - old fill pattern
  severity: ERROR
  languages:
  - cpp
  pattern: $VAR.$FIELD = static_cast<$T>(current.$FIELD);
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: detect-polymorphic-downcast-iterator
  message: boost::polymorphic_downcast used for iterator comparison - should use variant-based
    equality
  severity: ERROR
  languages:
  - cpp
  pattern-either:
  - pattern: boost::polymorphic_downcast<iterator<$T, $U> const *>($ARG)
  - pattern: boost::polymorphic_downcast<$ITER const *>(&$BASE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-impl-fill-call
  message: Calling fill() on impl pointer - old polymorphic iterator pattern
  severity: ERROR
  languages:
  - cpp
  pattern: impl->fill(current)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-fill-with-static-cast
  message: fill() method with static_cast - old iterator value population pattern
  severity: ERROR
  languages:
  - cpp
  patterns:
  - pattern: "void fill(...)\n{\n  ...\n  $VAR = static_cast<$T>($CURRENT);\n  ...\n\
      }\n"
  - metavariable-regex:
      metavariable: $VAR
      regex: .*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-fill-with-value-pair
  message: fill() method taking std::pair reference - old iterator pattern
  severity: ERROR
  languages:
  - cpp
  pattern: "void fill(std::pair<$T, $U> & value_a) const\n{\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-operator-arrow-returning-db-val-pair
  message: operator->() returning db_val pair pointer - old iterator accessor pattern
  severity: WARNING
  languages:
  - cpp
  pattern: "std::pair<$DB_VAL, $DB_VAL> * operator->()\n{\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-polymorphic-equality-implementation
  message: Override of operator== with iterator_impl parameter - old polymorphic pattern
  severity: ERROR
  languages:
  - cpp
  pattern: "bool operator==(iterator_impl<$T, $U> const & $ARG) const override\n{\n\
    \  ...\n}\n"
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-current-pair-initialization
  message: current pair member in iterator - old pattern where iterator stores current
