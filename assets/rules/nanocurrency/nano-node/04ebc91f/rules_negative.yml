  severity: WARNING
  languages:
  - cpp
  pattern: 'std::pair<$KEY_TYPE, $VAL_TYPE> current;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: detect-impl-fill-pattern
  message: Calling fill() via impl pointer - old polymorphic iterator pattern
