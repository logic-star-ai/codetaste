rules:
- id: prompt-without-langchain-prompt-selector
  message: Detected prompt instantiation without langchain_prompt_selector parameter
    (removed in new architecture)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: PromptTemplate($TEMPLATE, ...)
    - pattern: ChatPromptTemplate(...)
  - pattern-not: $X(langchain_prompt_selector=...)
  - pattern-not: $X.from_langchain_prompt(...)
  metadata:
    nr_refactored_patterns: 99
    nr_legacy_patterns: 0
- id: broad-new-template-usage
  message: Detected new template usage anywhere
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: PromptTemplate(...)
    - pattern: ChatPromptTemplate(...)
    - pattern: SelectorPromptTemplate(...)
    - pattern: LangchainPromptTemplate(...)
  - pattern-not: $X.from_messages(...)
  metadata:
    nr_refactored_patterns: 80
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tests/**'
    - '**/bridge/**'
- id: refactored-prompt-class-removed
  message: Import does not include removed specific prompt classes
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from llama_index.prompts import $IMPORTS
  - pattern-not: from llama_index.prompts import SummaryPrompt
  - pattern-not: from llama_index.prompts import RefinePrompt
  - pattern-not: from llama_index.prompts import QuestionAnswerPrompt
  - pattern-not: from llama_index.prompts import TreeInsertPrompt
  - pattern-not: from llama_index.prompts import TreeSelectPrompt
  - pattern-not: from llama_index.prompts import KeywordExtractPrompt
  - metavariable-regex:
      metavariable: $IMPORTS
      regex: .*(BasePromptTemplate|PromptTemplate|ChatPromptTemplate).*
  metadata:
    nr_refactored_patterns: 79
    nr_legacy_patterns: 0
- id: prompt-template-in-production-code
  message: Detected PromptTemplate in production code (not tests)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $TEMPLATE = PromptTemplate(...)
  - pattern-not-inside: '$X.from_langchain_prompt(...)

      ...

      '
  metadata:
    nr_refactored_patterns: 64
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tests/**'
    - '**/test_*.py'
- id: import-base-prompt-template
  message: Detected import of new BasePromptTemplate base class
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MOD import BasePromptTemplate
    - pattern: from $MOD import $X, BasePromptTemplate, $Y
    - pattern: from $MOD import $X, BasePromptTemplate
    - pattern: from $MOD import BasePromptTemplate, $Y
  - metavariable-regex:
      metavariable: $MOD
      regex: .*prompt.*
  - pattern-not: from $OLD import SummaryPrompt
  - pattern-not: from $OLD import RefinePrompt
  metadata:
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
- id: base-template-in-function-signature
  message: Detected BasePromptTemplate in function signature
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "def $FUNC(..., template: BasePromptTemplate, ...):\n  ...\n"
    - pattern: "def $FUNC(..., prompt: BasePromptTemplate, ...):\n  ...\n"
    - pattern: "def $FUNC(..., $PARAM: PromptTemplate, ...):\n  ...\n"
  metadata:
    nr_refactored_patterns: 44
    nr_legacy_patterns: 0
- id: import-prompt-template-class
  message: Detected import of new PromptTemplate class
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MOD import PromptTemplate
    - pattern: from $MOD import $X, PromptTemplate, $Y
    - pattern: from $MOD import $X, PromptTemplate
    - pattern: from $MOD import PromptTemplate, $Y
  - metavariable-regex:
      metavariable: $MOD
      regex: .*prompt.*
  metadata:
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: optional-base-prompt-parameter
  message: Detected Optional[BasePromptTemplate] parameter
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def $FUNC(..., $PARAM: Optional[$TYPE], ...):\n  ...\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (BasePromptTemplate|PromptTemplate|ChatPromptTemplate)
  metadata:
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: base-prompt-in-init-params
  message: Detected BasePromptTemplate in __init__ parameters
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def __init__(self, ..., $PARAM: $TYPE, ...):\n  ...\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: .*BasePromptTemplate.*
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
- id: isinstance-check-specific-templates
  message: Detected isinstance check for specific template types
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: isinstance($VAR, PromptTemplate)
    - pattern: isinstance($VAR, ChatPromptTemplate)
    - pattern: isinstance($VAR, SelectorPromptTemplate)
  - pattern-not: isinstance($VAR, Prompt)
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: instantiate-chat-prompt-template
  message: Detected instantiation of new ChatPromptTemplate class
  severity: INFO
  languages:
  - python
  pattern: $VAR = ChatPromptTemplate(...)
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: import-selector-prompt-template
  message: Detected import of new SelectorPromptTemplate class
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MOD import SelectorPromptTemplate
    - pattern: from $MOD import $X, SelectorPromptTemplate, $Y
    - pattern: from $MOD import $X, SelectorPromptTemplate
    - pattern: from $MOD import SelectorPromptTemplate, $Y
  - metavariable-regex:
      metavariable: $MOD
      regex: .*prompt.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: instantiate-selector-prompt-template
  message: Detected instantiation of new SelectorPromptTemplate class
  severity: INFO
  languages:
  - python
  pattern: $VAR = SelectorPromptTemplate(...)
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: base-template-as-function-arg
  message: Detected BasePromptTemplate as function argument
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def $FUNC($ARG: BasePromptTemplate, ...):\n  ...\n"
  - pattern-not-inside: "class Prompt:\n  ...\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: template-vars-property-access
  message: Detected template_vars property access (new architecture)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $TEMPLATE.template_vars
  - metavariable-regex:
      metavariable: $TEMPLATE
      regex: (?i).*(template|prompt).*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: class-inherits-base-prompt-template
  message: Detected class inheriting from BasePromptTemplate
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(BasePromptTemplate):\n  ...\n"
  - pattern-not: "class $OLD(SummaryPrompt):\n  ...\n"
  - pattern-not: "class $OLD(RefinePrompt):\n  ...\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: template-parameter-in-function
  message: Detected template parameter using new template types
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "def $FUNC(..., template: $TYPE, ...) -> $RET:\n  ...\n"
    - pattern: "def $FUNC(..., $PARAM: $TYPE = ..., ...) -> $RET:\n  ...\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: (PromptTemplate|ChatPromptTemplate|BasePromptTemplate|SelectorPromptTemplate)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: output-parser-in-new-template
  message: Detected output_parser parameter in new template (maintained support)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: PromptTemplate(..., output_parser=$PARSER, ...)
    - pattern: ChatPromptTemplate(..., output_parser=$PARSER, ...)
    - pattern: BasePromptTemplate(..., output_parser=$PARSER, ...)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: template-in-return-statement
  message: Detected template in return statement
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: return $TPL(...)
  - metavariable-regex:
      metavariable: $TPL
      regex: (PromptTemplate|ChatPromptTemplate|SelectorPromptTemplate)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: langchain-prompt-template-wrapper-usage
  message: Detected use of LangchainPromptTemplate wrapper (replacement for from_langchain_prompt)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: template=LangchainPromptTemplate($LC_TEMPLATE)
    - pattern: $VAR = LangchainPromptTemplate($LC_TEMPLATE)
  - pattern-not: $X.from_langchain_prompt(...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: abstract-base-prompt-template-class
  message: Detected abstract BasePromptTemplate class definition
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class BasePromptTemplate($BASE):\n  ...\n"
  - pattern-inside: 'from abc import $ABC

      ...

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: type-alias-for-backward-compatibility
  message: Detected type alias for backward compatibility (e.g., Prompt = PromptTemplate)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OLD = PromptTemplate
  - metavariable-regex:
      metavariable: $OLD
      regex: Prompt
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: template-instantiation-with-metadata
  message: Detected template instantiation with metadata dict
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $CLS(..., metadata={...}, ...)
  - metavariable-regex:
      metavariable: $CLS
      regex: (PromptTemplate|ChatPromptTemplate|SelectorPromptTemplate)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: template-with-f-string
  message: Detected template using f-string format
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: PromptTemplate(template=f"...", ...)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: base-template-list-parameter
  message: Detected List[BasePromptTemplate] in function parameter
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def $FUNC(..., $PARAM: List[BasePromptTemplate], ...):\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
