rules:
- id: type-annotation-base-template-not-selector
  message: Detected type annotation using base template (excluding selector module)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: '$VAR: $TYPE = ...

        '
    - pattern: 'def $FUNC(..., $ARG: $TYPE, ...): ...

        '
    - pattern: 'def $FUNC(...) -> $TYPE: ...

        '
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*base.*template.*
  metadata:
    nr_refactored_patterns: 96
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/prompt_selector.py'
    - '**/bridge/**'
  options:
    symbolic_propagation: true
- id: prompt-template-instantiation-exclude-tests
  message: Detected PromptTemplate instantiation (not in tests)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: PromptTemplate(...)
  - pattern-not: PromptTemplate.from_template(...)
  metadata:
    nr_refactored_patterns: 70
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/tests/**'
  options:
    symbolic_propagation: true
- id: template-with-prompt-type-param
  message: Detected template with prompt_type parameter
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $TEMPLATE(..., prompt_type=$TYPE, ...)
  - metavariable-regex:
      metavariable: $TEMPLATE
      regex: (?i).*template.*
  metadata:
    nr_refactored_patterns: 54
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-base-template-not-from-bridge
  message: Detected import of base template class from internal module (not langchain
    bridge)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MODULE import $CLS
    - pattern: from $MODULE import $X, ..., $CLS, ...
  - metavariable-regex:
      metavariable: $CLS
      regex: (?i)^(base.*template|.*base.*prompt.*template)$
  - metavariable-regex:
      metavariable: $MODULE
      regex: .*prompt.*
  metadata:
    nr_refactored_patterns: 51
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/bridge/**'
    - '**/langchain/**'
  options:
    symbolic_propagation: true
- id: prompt-template-import-generic
  message: Detected PromptTemplate import (generic, not specific type)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MODULE import PromptTemplate
    - pattern: from $MODULE import $X, ..., PromptTemplate, ...
  - metavariable-regex:
      metavariable: $MODULE
      regex: .*prompt.*
  metadata:
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/bridge/**'
    - '**/tests/prompts/test_guidance_utils.py'
  options:
    symbolic_propagation: true
- id: template-type-alias-assignment
  message: Detected type alias for backward compatibility (old name = new class)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $OLD = $NEW
  - metavariable-regex:
      metavariable: $OLD
      regex: (?i)^(.*prompt)$
  - metavariable-regex:
      metavariable: $NEW
      regex: (?i)^(?:.*template|.*prompt.*template)$
  - pattern-not: $X = Prompt
  metadata:
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: updated-default-prompts-module
  message: Detected updates in default prompts module
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MODULE import $CLS
    - pattern: $VAR = $CLS(...)
  - metavariable-regex:
      metavariable: $CLS
      regex: (?i)^(?!.*summary|.*refine|.*question).*template$
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/prompts/default*.py'
- id: template-isinstance-check
  message: Detected isinstance check for template types
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: isinstance($VAR, $TYPE)
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i).*template.*
  metadata:
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: template-dataflow-to-llm-predict
  message: Detected template flowing to LLM predictor
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $TEMPLATE(...)
    - metavariable-regex:
        metavariable: $TEMPLATE
        regex: (?i)^(?!Prompt$).*template$
  pattern-sinks:
  - pattern: $PRED.predict($SINK, ...)
  - pattern: $PRED.apredict($SINK, ...)
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: type-annotation-generic-template-not-selector
  message: Detected type annotation using generic template
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: '$VAR: $TYPE = ...

        '
    - pattern: 'def $FUNC(..., $ARG: $TYPE, ...): ...

        '
    - pattern: 'def $FUNC(...) -> $TYPE: ...

        '
  - metavariable-regex:
      metavariable: $TYPE
      regex: (?i)^(?:Optional\[)?(?:prompt.*template)(?:\])?$
  - pattern-not: '$X: Prompt = ...

      '
  - pattern-not: 'def $F(..., $A: Prompt, ...): ...

      '
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/prompt_selector.py'
    - '**/bridge/**'
  options:
    symbolic_propagation: true
- id: chat-prompt-template-instantiation
  message: Detected ChatPromptTemplate instantiation
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: ChatPromptTemplate(...)
  - pattern-not: ChatPromptTemplate.from_messages(...)
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: selector-template-instantiation
  message: Detected SelectorPromptTemplate instantiation
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: SelectorPromptTemplate(...)
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: import-selector-template-class
  message: Detected import of new selector template class for conditional template
    selection
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MODULE import $CLS
    - pattern: from $MODULE import $X, ..., $CLS, ...
  - metavariable-regex:
      metavariable: $CLS
      regex: (?i)^(?:selector.*template|.*selector.*prompt)$
  - metavariable-regex:
      metavariable: $MODULE
      regex: .*prompt.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: format-method-with-llm-optional
  message: Detected format method accepting optional LLM parameter
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'def format(self, ..., llm: Optional[$LLM] = None, ...): ...

      '
  - pattern-inside: "class $CLS:\n    ...\n"
  - metavariable-regex:
      metavariable: $CLS
      regex: (?i).*template.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: format-messages-returns-chat-messages
  message: Detected format_messages returning chat message list
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "def format_messages(self, ...) -> List[$MSG]:\n    ...\n"
  - pattern-inside: "class $CLS:\n    ...\n"
  - metavariable-regex:
      metavariable: $CLS
      regex: (?i).*template.*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: no-from-langchain-prompt-classmethod
  message: Detected template class without from_langchain_prompt classmethod
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLS:\n    ...\n    def format(...): ...\n    ...\n"
  - metavariable-regex:
      metavariable: $CLS
      regex: (?i)^(?!Prompt$).*template.*
  - pattern-not-inside: "class $C:\n    ...\n    @classmethod\n    def from_langchain_prompt(...):\
      \ ...\n    ...\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: chat-prompt-template-import
  message: Detected ChatPromptTemplate import from internal module
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MODULE import ChatPromptTemplate
    - pattern: from $MODULE import $X, ..., ChatPromptTemplate, ...
  - metavariable-regex:
      metavariable: $MODULE
      regex: .*prompt.*
  - pattern-not: from llama_index.bridge.langchain import ChatPromptTemplate
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/bridge/**'
  options:
    symbolic_propagation: true
- id: base-template-class-inheritance
  message: Detected new class inheriting from base prompt template
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLS($BASE):\n    ...\n"
  - metavariable-regex:
      metavariable: $BASE
      regex: (?i)^(?:base.*template|abstract.*template|.*base.*prompt.*template)$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: template-dataflow-to-format-messages
  message: 'Detected dataflow: new template instance flows to format_messages() call'
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $TEMPLATE(...)
    - metavariable-regex:
        metavariable: $TEMPLATE
        regex: (?i)^(?!.*summary|.*refine|.*question|.*keyword).*(?:template|prompt)$
  pattern-sinks:
  - pattern: $SINK.format_messages(...)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: compatibility-wrapper-instantiation-pattern
  message: Detected compatibility wrapper for LangChain templates
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $WRAPPER($PARAM)
  - metavariable-regex:
      metavariable: $WRAPPER
      regex: (?i)^langchain.*(?:template|prompt)$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/bridge/**'
  options:
    symbolic_propagation: true
- id: template-format-messages-method-usage
  message: Detected usage of unified format_messages() method
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $TEMPLATE.format_messages(...)
  - metavariable-regex:
      metavariable: $TEMPLATE
      regex: (?i).*template.*
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: updated-query-transform-with-templates
  message: Detected query transform module updated with new templates
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from $MODULE import $TEMPLATE
  - metavariable-regex:
      metavariable: $TEMPLATE
      regex: (?i)^(?!Prompt$).*template$
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/query/query_transform/**/*.py'
    - '**/indices/query/query_transform/**/*.py'
  options:
    symbolic_propagation: true
- id: new-template-classes-in-init-exports
  message: Detected new template classes exported in __init__.py
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: __all__ = [..., "$CLS", ...]
    - pattern: from $MODULE import $CLS
  - metavariable-regex:
      metavariable: $CLS
      regex: (?i)^(?!Prompt$)(?!.*summary|.*refine|.*question).*template$
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/prompts/__init__.py'
  options:
    symbolic_propagation: true
- id: template-with-output-parser-usage
  message: Detected template used with output_parser
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $TEMPLATE(..., output_parser=$PARSER, ...)
  - metavariable-regex:
      metavariable: $TEMPLATE
      regex: (?i).*template.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: template-call-with-llm-arg
  message: Detected template method called with llm argument
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $TEMPLATE.$METHOD(..., llm=$LLM, ...)
  - metavariable-regex:
      metavariable: $TEMPLATE
      regex: (?i).*template.*
  - metavariable-regex:
      metavariable: $METHOD
      regex: (?i)(format|format_messages|partial_format)
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: abc-import-in-template-module
  message: Detected ABC import in template module for abstract base class
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from abc import $ABC
    - pattern: from abc import $X, ..., $ABC, ...
  - metavariable-regex:
      metavariable: $ABC
      regex: (?i)(ABC|abstractmethod|abstractproperty)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/prompts/**/*.py'
  options:
    symbolic_propagation: true
- id: template-constructed-with-dict-literal
  message: Detected template constructed with dict literal for metadata
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $TEMPLATE(..., metadata={...}, ...)
  - metavariable-regex:
      metavariable: $TEMPLATE
      regex: (?i)^(?!Prompt$).*template$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
