rules:
- id: deprecated-prompt-class-docstring-reference
  message: Docstring or comment references deprecated specific prompt class. Update
    documentation to reference generic Prompt or BasePromptTemplate.
  severity: INFO
  languages:
  - python
  pattern-regex: (QuestionAnswerPrompt|RefinePrompt|SummaryPrompt|KeywordExtractPrompt|TreeInsertPrompt|TreeSelectPrompt|TreeSelectMultiplePrompt|SimpleInputPrompt|PandasPrompt|SchemaExtractPrompt|TableContextPrompt|RefineTableContextPrompt|KnowledgeGraphPrompt|QueryKeywordExtractPrompt)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 147
  paths:
    exclude:
    - llama_index/__init__.py
    - llama_index/prompts/prompts.py
    - llama_index/prompts/chat_prompts.py
    - llama_index/prompts/default_prompts.py
- id: deprecated-llama-index-specific-prompt-import
  message: Specific prompt subclass imported from llama_index is deprecated. Import
    generic Prompt class instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from llama_index import SummaryPrompt
    - pattern: from llama_index import RefinePrompt
    - pattern: from llama_index import QuestionAnswerPrompt
    - pattern: from llama_index import KeywordExtractPrompt
    - pattern: from llama_index import TreeInsertPrompt
    - pattern: from llama_index import TreeSelectPrompt
    - pattern: from llama_index import TreeSelectMultiplePrompt
    - pattern: from llama_index import QueryKeywordExtractPrompt
    - pattern: from llama_index import SchemaExtractPrompt
    - pattern: from llama_index import TextToSQLPrompt
    - pattern: from llama_index import TableContextPrompt
    - pattern: from llama_index import RefineTableContextPrompt
    - pattern: from llama_index import KnowledgeGraphPrompt
    - pattern: from llama_index import SimpleInputPrompt
    - pattern: from llama_index import PandasPrompt
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
  paths:
    exclude:
    - llama_index/__init__.py
