- id: storage-replication-state-member-declaration
  message: Detected repl_state_ member declaration in storage (pure state member)
  severity: INFO
  languages:
  - cpp
  pattern-regex: (?:replication::)?ReplicationState\s+repl_state_\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/storage/**/*.hpp
- id: replication-kvstore-include
  message: Detected kvstore include in replication module (persistence dependency)
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#include\s+"kvstore/'
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/replication/**
- id: storage-role-methods-delegation
  message: Detected role management delegation to repl_state_ (role through pure state)
  severity: INFO
  languages:
  - cpp
  pattern-regex: return\s+repl_state_\.(?:Set|Get).*Role
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - src/storage/**/*.cpp
- id: cmake-replication-static-library
  message: Detected mg-replication as static library (library type)
  severity: INFO
  languages:
  - generic
  pattern-regex: add_library\s*\(\s*mg-replication\s+STATIC
  metadata:
    category: config
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
