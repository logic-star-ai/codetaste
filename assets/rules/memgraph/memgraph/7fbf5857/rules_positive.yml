rules:
- id: replication-include-from-src-replication
  message: Detected include from new replication module (src/replication/)
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#include\s+"replication/[^"]+\.hpp"'
  metadata:
    category: structural
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
- id: replication-state-without-storage-path
  message: Detected include from replication/ without storage in path (new module
    structure)
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#include\s+"replication/(?!.*storage)'
  metadata:
    category: structural
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - src/**/*.cpp
    - src/**/*.hpp
- id: replication-state-member-without-storage-prefix
  message: Detected repl_state_ member name in storage (renamed from replication_state_)
  severity: INFO
  languages:
  - cpp
  pattern-regex: \brepl_state_\b
  metadata:
    category: structural
    nr_refactored_patterns: 23
    nr_legacy_patterns: 0
  paths:
    include:
    - src/storage/**/*.cpp
    - src/storage/**/*.hpp
- id: storage-repl-state-member
  message: Detected repl_state_ member access in storage (new member naming for pure
    replication state)
  severity: INFO
  languages:
  - cpp
  pattern-regex: repl_state_\.
  metadata:
    category: structural
    nr_refactored_patterns: 22
    nr_legacy_patterns: 0
- id: storage-calls-repl-state-methods
  message: Detected method call on repl_state_ member (pure state API usage)
  severity: INFO
  languages:
  - cpp
  pattern-regex: repl_state_\.\w+\(
  metadata:
    category: api
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  paths:
    include:
    - src/storage/**/*.cpp
- id: storage-includes-from-parent-replication
  message: Detected storage including from parent replication directory (module decoupling)
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#include\s+"(?:\.\./)*replication/'
  metadata:
    category: dependency
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    include:
    - src/storage/**/*.cpp
    - src/storage/**/*.hpp
- id: replication-storage-state-type-regex
  message: Detected ReplicationStorageState type (storage-specific replication state)
  severity: INFO
  languages:
  - cpp
  pattern-regex: \bReplicationStorageState\b
  metadata:
    category: structural
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: replication-header-include-config
  message: Detected include of replication/config.hpp from new module
  severity: INFO
  languages:
  - cpp
  pattern-regex: '#include\s+"replication/config\.hpp"'
  metadata:
    category: structural
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
- id: replication-namespace-declaration
  message: Detected namespace declaration for memgraph::replication (new replication
    module)
  severity: INFO
  languages:
  - cpp
  pattern: namespace memgraph::replication { ... }
  metadata:
    category: structural
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: new-replication-directory-files-any
  message: Detected file in new src/replication directory (new replication module
    created)
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - src/replication/**/*.hpp
    - src/replication/**/*.cpp
- id: replication-state-without-storage-in-name
  message: Detected ReplicationState type without storage qualifier (pure state in
    new module)
  severity: INFO
  languages:
  - cpp
  pattern-regex: \bReplicationState\b(?!\w)
  metadata:
    category: structural
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
  paths:
    include:
    - src/replication/**/*.hpp
- id: storage-replication-clients-synchronized
  message: Detected synchronized access to replication_clients_ (thread-safe client
    management)
  severity: INFO
  languages:
  - cpp
  pattern-regex: replication_clients_\.WithLock
  metadata:
    category: structural
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: replication-client-lifecycle-in-storage-state
