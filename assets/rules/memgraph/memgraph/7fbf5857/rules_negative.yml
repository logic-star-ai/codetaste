rules:
- id: storage-forward-declaration-in-replication
  message: ReplicationState should not need Storage forward declaration after decoupling
  severity: WARNING
  languages:
  - cpp
  pattern: class Storage;
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
  paths:
    include:
    - '**/replication/replication.hpp'
- id: direct-storage-register-replica-call
  message: Should use ReplicationHandler::RegisterReplica instead of direct storage
    call
  severity: WARNING
  languages:
  - cpp
  pattern: $STORAGE->RegisterReplica($...ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: storage-register-replica-direct-call
  message: Direct call to Storage::RegisterReplica should use ReplicationHandler instead
  severity: WARNING
  languages:
  - cpp
  pattern: $DB->RegisterReplica($MODE, $CONFIG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: test-storage-register-replica
  message: Tests should use ReplicationHandler instead of direct Storage::RegisterReplica
  severity: WARNING
  languages:
  - cpp
  pattern: $STORE->RegisterReplica(RegistrationMode::$MODE, ReplicationClientConfig{$...FIELDS})
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: direct-storage-set-replica-role-call
  message: Should use ReplicationHandler to manage replication role instead of direct
    storage call
  severity: WARNING
  languages:
  - cpp
  pattern: $STORAGE->SetReplicaRole($...ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: storage-set-replica-role-direct-call
  message: Direct call to Storage::SetReplicaRole should use ReplicationHandler instead
  severity: WARNING
  languages:
  - cpp
  pattern: $DB->SetReplicaRole($CONFIG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: call-storage-set-replica-role-method
  message: Should use ReplicationHandler to manage role instead of direct storage
    call
  severity: WARNING
  languages:
  - cpp
  pattern-either:
  - pattern: $STORAGE->SetReplicaRole($CONFIG)
  - pattern: $OBJ.SetReplicaRole($CONFIG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: test-storage-set-replica-role
  message: Tests should use ReplicationHandler instead of direct Storage::SetReplicaRole
  severity: WARNING
  languages:
  - cpp
  pattern: $STORE->SetReplicaRole(ReplicationServerConfig{$...FIELDS})
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: replication-state-member-any-method
  message: Direct access to replication_state_ member should go through ReplicationHandler
  severity: WARNING
  languages:
  - cpp
  pattern-either:
  - pattern: replication_state_.$METHOD($ARG)
  - pattern: replication_state_.$METHOD($ARG1, $ARG2)
  - pattern: replication_state_.$METHOD($ARG1, $ARG2, $ARG3)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: direct-storage-unregister-replica-call
  message: Should use ReplicationHandler::UnregisterReplica instead of direct storage
    call
  severity: WARNING
  languages:
  - cpp
  pattern: $STORAGE->UnregisterReplica($...ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: storage-unregister-replica-direct-call
  message: Direct call to Storage::UnregisterReplica should use ReplicationHandler
    instead
  severity: WARNING
  languages:
  - cpp
  pattern: $DB->UnregisterReplica($NAME)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: storage-pass-this-to-replication-state
  message: Passing Storage 'this' pointer to ReplicationState indicates coupling that
    should be removed via ReplicationHandler
  severity: WARNING
  languages:
  - cpp
  pattern-either:
  - pattern: replication_state_.$METHOD($X, this)
  - pattern: replication_state_.$METHOD(this)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: storage-get-replication-role-direct-call
  message: Direct call to Storage::GetReplicationRole should use ReplicationHandler
    instead
  severity: WARNING
  languages:
  - cpp
  pattern: $DB->GetReplicationRole()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: call-storage-get-role-method
  message: Should use ReplicationHandler to query role instead of direct storage call
  severity: WARNING
  languages:
  - cpp
  pattern-either:
  - pattern: $STORAGE->GetReplicationRole()
  - pattern: $OBJ.GetReplicationRole()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: storage-pass-this-pointer-pattern
  message: Passing 'this' pointer suggests tight coupling that ReplicationHandler
    should eliminate
  severity: WARNING
  languages:
  - cpp
  pattern: $METHOD(this)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '**/storage.hpp'
- id: old-replication-state-member-access
  message: Direct access to replication_state_ should be refactored to use ReplicationHandler
  severity: WARNING
  languages:
  - cpp
  pattern: $OBJ.replication_state_.$METHOD($...ARGS)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: replication-state-member-no-arg-method
  message: Direct access to replication_state_ member should go through ReplicationHandler
  severity: WARNING
  languages:
  - cpp
  pattern: replication_state_.$METHOD()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: include-replication-header-from-storage
  message: Core replication types should be included from replication/ directory after
    decoupling
  severity: WARNING
  languages:
  - cpp
  pattern: '#include "storage/v2/replication/replication.hpp"'
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: storage-set-main-replication-role-call
  message: Direct call to Storage::SetMainReplicationRole should use ReplicationHandler
    instead
  severity: WARNING
  languages:
  - cpp
  pattern: $DB->SetMainReplicationRole()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-pass-to-set-replica-role
  message: Passing Storage pointer to ReplicationState method indicates coupling that
    should be removed via ReplicationHandler
  severity: WARNING
  languages:
  - cpp
  pattern: replication_state_.SetReplicaRole($CONFIG, this)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-pass-to-set-main-role
  message: Passing Storage pointer to ReplicationState method indicates coupling that
    should be removed via ReplicationHandler
  severity: WARNING
  languages:
  - cpp
  pattern: replication_state_.SetMainReplicationRole(this)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-pass-to-register-replica
  message: Passing Storage pointer to ReplicationState method indicates coupling that
    should be removed via ReplicationHandler
  severity: WARNING
  languages:
  - cpp
  pattern: replication_state_.RegisterReplica($MODE, $CONFIG, this)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-pass-to-restore-replicas
  message: Passing Storage pointer to ReplicationState method indicates coupling that
    should be removed via ReplicationHandler
  severity: WARNING
  languages:
  - cpp
  pattern: replication_state_.RestoreReplicas(this)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-pass-to-restore-replication-role
  message: Passing Storage pointer to ReplicationState method indicates coupling that
    should be removed via ReplicationHandler
  severity: WARNING
  languages:
  - cpp
  pattern: replication_state_.RestoreReplicationRole(this)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: replication-state-get-role-call
  message: Direct access to replication_state_ should go through ReplicationHandler
    interface
  severity: WARNING
  languages:
  - cpp
  pattern: replication_state_.GetRole()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: replication-state-replicas-info-call
  message: Direct access to replication_state_ should go through ReplicationHandler
    interface
  severity: WARNING
  languages:
  - cpp
  pattern: replication_state_.ReplicasInfo()
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: replication-state-get-replica-state-call
  message: Direct access to replication_state_ should go through ReplicationHandler
    interface
  severity: WARNING
  languages:
  - cpp
  pattern: replication_state_.GetReplicaState($NAME)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: replication-state-unregister-replica-call
  message: Direct access to replication_state_ should go through ReplicationHandler
    interface
  severity: WARNING
  languages:
  - cpp
  pattern: replication_state_.UnregisterReplica($NAME)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-method-set-main-role-impl
  message: Storage method should delegate to ReplicationHandler instead of directly
    accessing replication_state_
  severity: WARNING
  languages:
  - cpp
  pattern: "bool SetMainReplicationRole() { \n  return replication_state_.SetMainReplicationRole(this);\
    \ \n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-method-get-replication-role-impl
  message: Storage method should delegate to ReplicationHandler instead of directly
    accessing replication_state_
  severity: WARNING
  languages:
  - cpp
  pattern: "replication::ReplicationRole GetReplicationRole() const { \n  return replication_state_.GetRole();\
    \ \n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-method-replicas-info-impl
  message: Storage method should delegate to ReplicationHandler instead of directly
    accessing replication_state_
  severity: WARNING
  languages:
  - cpp
  pattern: "auto ReplicasInfo() { \n  return replication_state_.ReplicasInfo(); \n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-method-restore-replicas-impl
  message: Storage method should delegate to ReplicationHandler instead of directly
    accessing replication_state_
  severity: WARNING
  languages:
  - cpp
  pattern: "void RestoreReplicas() { \n  return replication_state_.RestoreReplicas(this);\
    \ \n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-method-restore-replication-role-impl
  message: Storage method should delegate to ReplicationHandler instead of directly
    accessing replication_state_
  severity: WARNING
  languages:
  - cpp
  pattern: "void RestoreReplicationRole() { \n  return replication_state_.RestoreReplicationRole(this);\
    \ \n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: replication-state-member-declaration
  message: Storage should use ReplicationHandler and split state into ReplicationState
    and ReplicationStorageState
  severity: WARNING
  languages:
  - cpp
  pattern: ReplicationState replication_state_;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-inline-restore-replicas-method
  message: Storage should delegate to ReplicationHandler instead of directly accessing
    replication_state_ with 'this' pointer
  severity: WARNING
  languages:
  - cpp
  pattern: 'void RestoreReplicas() { return replication_state_.RestoreReplicas(this);
    }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-inline-restore-role-method
  message: Storage should delegate to ReplicationHandler instead of directly accessing
    replication_state_ with 'this' pointer
  severity: WARNING
  languages:
  - cpp
  pattern: 'void RestoreReplicationRole() { return replication_state_.RestoreReplicationRole(this);
    }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: call-storage-set-main-role-method
  message: Should use ReplicationHandler to manage role instead of direct storage
    call
  severity: WARNING
  languages:
  - cpp
  pattern-either:
  - pattern: $STORAGE->SetMainReplicationRole()
  - pattern: $OBJ.SetMainReplicationRole()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-replication-state-member-field
  message: Storage should use ReplicationHandler and split state into ReplicationState
    and ReplicationStorageState
  severity: WARNING
  languages:
  - cpp
  pattern: ReplicationState replication_state_;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: replication-config-restore-state-on-startup
  message: Replication state restoration should be coordinated by ReplicationHandler,
    not directly via config field
  severity: WARNING
  languages:
  - cpp
  pattern: config_.durability.restore_replication_state_on_startup
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-inline-get-replication-role
  message: Storage should delegate to ReplicationHandler instead of directly accessing
    replication_state_
  severity: WARNING
  languages:
  - cpp
  pattern: 'replication::ReplicationRole GetReplicationRole() const { return replication_state_.GetRole();
    }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-inline-unregister-replica
  message: Storage should delegate to ReplicationHandler instead of directly accessing
    replication_state_
  severity: WARNING
  languages:
  - cpp
  pattern: 'bool UnregisterReplica(const std::string &$NAME) { return replication_state_.UnregisterReplica($NAME);
    }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-inline-replicas-info
  message: Storage should delegate to ReplicationHandler instead of directly accessing
    replication_state_
  severity: WARNING
  languages:
  - cpp
  pattern: 'auto ReplicasInfo() { return replication_state_.ReplicasInfo(); }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: storage-inline-get-replica-state
  message: Storage should delegate to ReplicationHandler instead of directly accessing
    replication_state_
  severity: WARNING
  languages:
  - cpp
  pattern: "std::optional<replication::ReplicaState> GetReplicaState(std::string_view\
    \ $NAME) {\n  return replication_state_.GetReplicaState($NAME);\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: comment-todo-replication-namespace
  message: TODO comment indicates replication should use separate namespace - refactoring
    not complete
  severity: WARNING
  languages:
  - cpp
  pattern-regex: //\s*TODO.*use replication namespace
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: replication-state-durability-member
  message: Direct durability management in ReplicationState should be coordinated
    by ReplicationHandler
  severity: WARNING
  languages:
  - cpp
  pattern: durability_
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/replication/replication.hpp'
    - '**/replication/replication.cpp'
- id: storage-establish-new-epoch-method
  message: Epoch management should go through ReplicationHandler, not be a Storage
    virtual method
  severity: WARNING
  languages:
  - cpp
  pattern: virtual void EstablishNewEpoch() = 0;
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: replication-clients-list-typedef
  message: ReplicationClientList should be in ReplicationStorageState, not in ReplicationState
  severity: WARNING
  languages:
  - cpp
  pattern: using ReplicationClientList = $TYPE;
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/replication/replication.hpp'
- id: replication-durability-kvstore
  message: Durability management should be coordinated by ReplicationHandler, not
    owned by ReplicationState
  severity: WARNING
  languages:
  - cpp
  pattern: std::unique_ptr<kvstore::KVStore> durability_;
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/replication/replication.hpp'
- id: replication-epoch-member-field
  message: Epoch should remain in pure ReplicationState but storage-specific operations
    should use ReplicationHandler
  severity: INFO
  languages:
  - cpp
  pattern: ReplicationEpoch epoch_;
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/replication/replication.hpp'
- id: replication-clients-member-field
  message: replication_clients_ is storage-specific and should be in ReplicationStorageState,
    not ReplicationState
  severity: WARNING
  languages:
  - cpp
  pattern: ReplicationClientList replication_clients_;
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/replication/replication.hpp'
