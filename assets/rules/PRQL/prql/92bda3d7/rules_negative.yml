  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    include:
    - '*/src/ast/*.rs'
    - '*/src/ast/**/*.rs'
