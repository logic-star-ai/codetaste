rules:
- id: detect-pub-use-from-ast
  message: Public re-export from 'crate::ast' should be changed to 'crate::ir'
  severity: WARNING
  languages:
  - rust
  pattern: 'pub use crate::ast::$X;

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 156
- id: detect-use-crate-ast-any-path
  message: Import from 'crate::ast' should be changed to 'crate::ir'
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: use crate::ast::$X
  - pattern: use crate::ast::$X::$Y
  - pattern: use crate::ast::$X::$Y::$Z
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 156
- id: detect-ast-pl-module-reference
  message: Import from 'ast::pl' module should be changed to 'ir::pl'
  severity: WARNING
  languages:
  - rust
  pattern: 'use $PKG::ast::pl::$X;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 72
