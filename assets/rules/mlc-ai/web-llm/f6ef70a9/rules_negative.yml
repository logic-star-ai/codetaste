- id: chatmodule-property-access
  message: ChatModule has been renamed to Engine. Update property/module access to
    use 'Engine'.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $OBJ.ChatModule
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
