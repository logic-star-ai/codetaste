- id: ffi-grammar-state-matcher-old-namespace-funcs
  message: GrammarStateMatcher FFI API should use mlc.grammar.* namespace instead
    of mlc.serve.*
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherFromTokenizer")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherFromTokenTable")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherDebugAcceptChar")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherAcceptToken")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherRollback")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherMaxRollbackSteps")
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: web-config-old-grammar-path
  message: Web configuration should reference cpp/grammar instead of cpp/serve/grammar
  severity: WARNING
  languages:
  - generic
  pattern-regex: serve/grammar
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - web/**
- id: ffi-bnf-grammar-from-ebnf-old-namespace
  message: BNFGrammar FFI API should use mlc.grammar.* namespace instead of mlc.serve.*
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.BNFGrammarFromEBNFString")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.BNFGrammarDebugFromEBNFStringNoNormalize")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.BNFGrammarFromJSON")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.BNFGrammarFromSchema")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.BNFGrammarGetGrammarOfJSON")
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: ffi-grammar-state-matcher-old-namespace-more
  message: GrammarStateMatcher FFI API should use mlc.grammar.* namespace instead
    of mlc.serve.*
  severity: WARNING
  languages:
