  - cpp
  pattern-either:
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherIsTerminated")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherResetState")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherDebugMatchCompleteString")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherFindNextRejectedTokens")
  - pattern: TVM_REGISTER_GLOBAL("mlc.serve.GrammarStateMatcherFindNextTokenBitmaskAsNDArray")
  metadata:
