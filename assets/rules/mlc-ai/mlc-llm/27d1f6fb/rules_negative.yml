rules:
- id: cpp-forward-declaration-in-old-grammar-location
  message: Forward declarations in cpp/serve/grammar should be moved to cpp/grammar/
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: class $CLASS;
  - pattern: struct $STRUCT;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1620
  paths:
    include:
    - cpp/serve/grammar/**
- id: multiple-conv-template-registrations-in-one-file
  message: Multiple conversation template registrations indicate file should be split
    into per-model-family modules
  severity: WARNING
  languages:
  - python
  pattern: 'ConvTemplateRegistry.register_conv_template(...)

    ...

    ConvTemplateRegistry.register_conv_template(...)

    ...

    ConvTemplateRegistry.register_conv_template(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 378
  paths:
    include:
    - python/mlc_llm/conversation_template.py
- id: cpp-function-definition-in-old-conv-templates-file
  message: Function definition in stale conv_templates.cc that should be removed
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: "$RET $FUNC(...) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
  paths:
    include:
    - cpp/conv_templates.cc
- id: old-grammar-location-in-serve
  message: Grammar files should be moved from cpp/serve/grammar/* to cpp/grammar/*
    (root level)
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
  paths:
    include:
    - cpp/serve/grammar/*
