rules:
- id: integration-manual-tab-selection-by-maintabs
  message: Test uses manual tab selection with 'MainTabs'. Refactor to inherit from
    TestBase which handles page selection automatically.
  severity: WARNING
  languages:
  - csharp
  pattern: 'var $TABS = $SESSION.FindElementByAccessibilityId("MainTabs");

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: integration-manual-maintabs-lookup
  message: Manual lookup of 'MainTabs' element. After refactoring to ListBox pager,
    use 'Pager' instead and let TestBase handle selection.
  severity: WARNING
  languages:
  - csharp
  pattern: 'var $TABS = $EXPR.FindElementByAccessibilityId("MainTabs");

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: integration-find-element-by-name-for-tab
  message: Finding tab by name from MainTabs. Refactor to use TestBase which handles
    page selection through Pager.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern: '$TABS.FindElementByName($NAME);

      '
  - pattern-inside: 'var $TABS = $SESSION.FindElementByAccessibilityId("MainTabs");

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: integration-var-tabs-from-maintabs
  message: Variable 'tabs' assigned from MainTabs lookup. Refactor to use TestBase
    which handles page selection internally.
  severity: WARNING
  languages:
  - csharp
  pattern: 'var tabs = $SESSION.FindElementByAccessibilityId("MainTabs");

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: integration-findelementbyaccessibilityid-maintabs
  message: Finding element by 'MainTabs' accessibility ID. After refactoring, use
    'Pager' element instead and let TestBase handle selection.
  severity: WARNING
  languages:
  - csharp
  pattern: '$VAR.FindElementByAccessibilityId("MainTabs")

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: integration-session-field-from-fixture
  message: Assigning _session from fixture.Session. Refactor to inherit from TestBase
    which provides Session property.
  severity: WARNING
  languages:
  - csharp
  pattern: '_session = fixture.Session;

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: integration-test-class-with-readonly-session
  message: Test class declares readonly _session field. Refactor to inherit from TestBase
    which provides Session property.
  severity: WARNING
  languages:
  - csharp
  pattern: 'private readonly AppiumDriver _session;

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: integration-var-tab-click-pattern
  message: 'Pattern: find tab variable and click. Refactor to use TestBase constructor
    which encapsulates tab/page selection.'
  severity: WARNING
  languages:
  - csharp
  pattern: 'var tab = $TABS.FindElementByName($NAME);

    tab.Click();

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: integration-tabitem-definitions-in-mainwindow
  message: MainWindow.axaml contains TabItem definitions. Extract content into separate
    Page UserControl files.
  severity: WARNING
  languages:
  - generic
  pattern-regex: <TabItem\s+Header\s*=\s*"[^"]+"\s*>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - '*/IntegrationTestApp/MainWindow.axaml'
- id: integration-tabitem-opening-tag
  message: TabItem element found in MainWindow.axaml. Refactor to extract tab content
    into separate Page UserControl files and use ListBox pager.
  severity: WARNING
  languages:
  - generic
  pattern-regex: <TabItem\s+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - '*/IntegrationTestApp/MainWindow.axaml'
- id: integration-closing-tabitem-tag
  message: Closing TabItem tag in MainWindow. Content should be extracted to separate
    Page UserControl files.
  severity: WARNING
  languages:
  - generic
  pattern-regex: </TabItem>
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - '*/IntegrationTestApp/MainWindow.axaml'
- id: integration-tabitem-any-header-pattern
  message: TabItem with Header attribute found. Extract tab content to separate Page
    UserControl and use ListBox pager navigation.
  severity: WARNING
  languages:
  - generic
  pattern-regex: <TabItem\s+Header\s*=
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - '*/IntegrationTestApp/MainWindow.axaml'
- id: integration-control-with-name-attribute-in-tabitem
  message: TabItem contains control with Name attribute. Extract tab content into
    separate Page UserControl file.
  severity: WARNING
  languages:
  - generic
  pattern-regex: (?s)<TabItem[^>]*>[\s\S]*?<\w+\s+Name\s*=\s*"[A-Z]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - '*/IntegrationTestApp/MainWindow.axaml'
- id: integration-nested-controls-in-stackpanel-in-tabitem
  message: TabItem with StackPanel containing named controls. Extract to separate
    Page UserControl for better organization.
  severity: WARNING
  languages:
  - generic
  pattern-regex: (?s)<TabItem[^>]*>[\s\S]*?<StackPanel[^>]*>[\s\S]*?<\w+\s+Name\s*=
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - '*/IntegrationTestApp/MainWindow.axaml'
- id: integration-header-attribute-on-tabitem
  message: TabItem with Header attribute for page name. Extract this tab content into
    separate {Header}Page.axaml UserControl.
  severity: WARNING
  languages:
  - generic
  pattern-regex: Header\s*=\s*"(Automation|Button|CheckBox|ComboBox|ListBox|Menu|Slider|RadioButton|Pointer|ContextMenu|ScrollBar)"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*/IntegrationTestApp/MainWindow.axaml'
- id: integration-grid-or-stackpanel-direct-in-tabitem
  message: TabItem contains StackPanel/Grid content directly. Extract this content
    into a separate Page UserControl file.
  severity: WARNING
  languages:
  - generic
  pattern-regex: (?s)<TabItem[^>]*>[\s\n]*<(StackPanel|Grid)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
  paths:
    include:
    - '*/IntegrationTestApp/MainWindow.axaml'
- id: integration-stackpanel-inside-tabitem
  message: TabItem contains inline StackPanel content. Extract to separate Page UserControl
    file (e.g., ButtonPage.axaml).
  severity: WARNING
  languages:
  - generic
  pattern-regex: (?s)<TabItem\s+Header\s*=\s*"[^"]+"\s*>\s*<StackPanel
