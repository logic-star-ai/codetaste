rules:
- id: wasi-namespace-reference-regex
  message: WASI Preview 1 constant reference should use `wasip1::` instead of `wasi::`
  severity: WARNING
  languages:
  - rust
  pattern-regex: wasi::[A-Z_][A-Z0-9_]*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - crates/test-programs/src/preview1.rs
    - crates/test-programs/src/bin/preview1_*.rs
- id: wasi-type-reference-regex
  message: WASI Preview 1 type reference should use `wasip1::` instead of `wasi::`
  severity: WARNING
  languages:
  - rust
  pattern-regex: wasi::[A-Z][a-zA-Z0-9_]*(?!\()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - crates/test-programs/src/preview1.rs
    - crates/test-programs/src/bin/preview1_*.rs
