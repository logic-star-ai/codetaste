rules:
- id: unordered-map-idptr-key-refactored
  message: Detected unordered_map with IDPtr as key type
  severity: INFO
  languages:
  - cpp
  pattern-regex: std::unordered_map<IDPtr\s*,\s*\w+
  metadata:
    category: structural
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    exclude:
    - src/script_opt/Expr.cc
- id: usedefs-id-methods-idptr
  message: Detected UseDefs method signature changed to accept IDPtr
  severity: INFO
  languages:
  - cpp
  pattern-regex: (?:HasID|AddID|RemoveID|RemoveUDFrom|CheckIfUnused)\s*\(\s*[^)]*(?:const\s+)?IDPtr
  metadata:
    category: api
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
- id: unordered-set-idptr-type-declaration
  message: Detected variable of type std::unordered_set<IDPtr> (refactored IDSet)
  severity: INFO
  languages:
  - cpp
  pattern-regex: std::unordered_set<IDPtr>\s+\w+
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: unordered-set-idptr-declaration
  message: Detected unordered_set<IDPtr> variable declaration
  severity: INFO
  languages:
  - cpp
  pattern-regex: std::unordered_set<IDPtr>\s+\w+(?:\s*=|\s*;|\s*\{)
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: frame1-slot-idptr-param
  message: Detected Frame1Slot changed to accept const IDPtr&
  severity: INFO
  languages:
  - cpp
  pattern-regex: int\s+Frame1Slot\s*\(\s*const\s+IDPtr\s*&
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: frame-ids-member-vector-idptr
  message: Detected ids member variable as vector<IDPtr> in Frame
  severity: INFO
  languages:
  - cpp
  pattern-regex: std::vector<IDPtr>\s+ids;
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: idset-find-operation
  message: Detected find operation on IDSet (now uses IDPtr)
  severity: INFO
  languages:
  - cpp
  pattern-regex: \w+\.find\s*\(\s*\w+\s*\)\s*!=\s*\w+\.end\(\)
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: pair-with-idptr
  message: Detected std::pair with IDPtr
  severity: INFO
