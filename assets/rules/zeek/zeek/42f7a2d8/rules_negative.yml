rules:
- id: unordered-map-const-id-key-int-value
  message: Map key should use IDPtr instead of raw const ID* pointer
  severity: ERROR
  languages:
  - c
  - cpp
  pattern: std::unordered_map<const ID*, int> $VAR;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: vector-const-id-star
  message: Vector should use std::vector<IDPtr> instead of raw const ID* pointers
  severity: ERROR
  languages:
  - c
  - cpp
  pattern: std::vector<const ID*> $VAR;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: checker-method-impl-with-raw-id-pointer
  message: Checker method should accept const IDPtr& instead of raw const ID* pointer
  severity: ERROR
  languages:
  - c
  - cpp
  patterns:
  - pattern: bool $METHOD(const ID* $PARAM, ...) { ... }
  - metavariable-pattern:
      metavariable: $METHOD
      pattern-regex: ^(Check|Is).*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
