    'MARLIN_BTT_OCTOPUS'
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - '**/MARLIN_BIGTREE_OCTOPUS_V1/**'
    - '**/MARLIN_BIGTREE_OCTOPUS_PRO_V1_F429/**'
