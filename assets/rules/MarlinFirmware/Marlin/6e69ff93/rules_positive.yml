rules:
- id: btt-board-stm32f4-platform
  message: Detected BTT board identifier in STM32F4 platform (standardized naming)
  severity: INFO
  languages:
  - generic
  pattern-regex: (BTT_[A-Z0-9_]+|STM32F4[0-9]+VG_btt[A-Z0-9_]*)
  metadata:
    category: config
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/stm32f4.ini'
- id: stm32f407vg-btt-usb-multiline
  message: Detected STM32F407VG_btt_USB reference (refactored from BIGTREE_SKR_2_USB)
  severity: INFO
  languages:
  - generic
  pattern-regex: STM32F407VG_btt_USB
  metadata:
    category: architecture
    nr_refactored_patterns: 11
    nr_legacy_patterns: 0
  paths:
    include:
    - '*.ini'
    - '**/pins/pins.h'
