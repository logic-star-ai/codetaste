rules:
- id: detect-or-expression-in-identifier
  message: Detected refactored identifier with __OR__ pattern (was $expr_...)
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: \$\w+__OR__\w+
  metadata:
    category: other
    nr_refactored_patterns: 478
    nr_legacy_patterns: 0
