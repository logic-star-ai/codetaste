rules:
- id: cpd-report-test-migrated-assertions
  message: CPDReportTest successfully migrated assertions to JUnit5
  severity: INFO
  languages:
  - java
  patterns:
  - pattern-either:
    - pattern: import static org.junit.jupiter.api.Assertions.assertEquals;
    - pattern: import static org.junit.jupiter.api.Assertions.assertTrue;
  - pattern-not-inside: 'import org.junit.Test;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/CPDReportTest.java'
