rules:
- id: junit4-assert-class-usage
  message: 'Qualified JUnit4 Assert usage detected: Replace ''org.junit.Assert.*''
    with ''org.junit.jupiter.api.Assertions.*'''
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: org.junit.Assert.$METHOD(...)
  - pattern-not-inside: 'import static org.junit.Assert.*;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 77
- id: public-test-method
  message: 'Public test method detected: Test methods can be package-private in JUnit5
    (consider removing ''public'' modifier)'
  severity: INFO
  languages:
  - java
  patterns:
  - pattern: '@Test

      public $RET $METHOD(...) { ... }

      '
  - pattern-inside: 'import org.junit.jupiter.api.Test;

      ...

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
- id: assert-equals-with-three-args-qualified
  message: 'Qualified JUnit4 assertEquals with delta detected: Replace ''org.junit.Assert.assertEquals''
    with ''org.junit.jupiter.api.Assertions.assertEquals'''
  severity: WARNING
  languages:
  - java
  pattern: org.junit.Assert.assertEquals($EXPECTED, $ACTUAL, $DELTA)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: assert-equals-with-message-qualified
  message: 'Qualified JUnit4 assertEquals with message detected: In JUnit5, message
    parameter is last'
  severity: WARNING
  languages:
  - java
  pattern: org.junit.Assert.assertEquals($MSG, $EXPECTED, $ACTUAL)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: assert-equals-with-delta
  message: 'JUnit4 assertEquals with delta detected: Ensure using org.junit.jupiter.api.Assertions.assertEquals'
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: assertEquals($EXPECTED, $ACTUAL, $DELTA)
  - pattern-not-inside: 'import static org.junit.jupiter.api.Assertions.*;

      ...

      '
  - pattern-inside: 'import static org.junit.Assert.assertEquals;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: assert-equals-message-three-params
  message: 'JUnit4 assertEquals with message as first parameter detected: In JUnit5,
    message parameter is last'
  severity: WARNING
  languages:
  - java
  patterns:
  - pattern: assertEquals($MSG, $EXPECTED, $ACTUAL)
  - pattern-not-inside: 'import static org.junit.jupiter.api.Assertions.*;

      ...

      '
  - pattern-inside: 'import static org.junit.Assert.assertEquals;

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
