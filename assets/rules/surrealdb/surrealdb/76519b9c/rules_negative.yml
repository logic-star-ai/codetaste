rules:
- id: old-dbs-cl-path
  message: Reference to old 'dbs::cl' module - should use 'dbs::node' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: crate::dbs::cl::$ITEM
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: old-flat-key-lq-path
  message: Reference to old flat 'key::lq' - should use nested structure after restructuring
  severity: WARNING
  languages:
  - rust
  pattern: crate::key::lq::$ITEM
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: old-dbs-cl-import
  message: Import from old 'dbs::cl' module - should use 'dbs::node' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::dbs::cl::$ITEM
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-key-cl-encode-unwrap
  message: Verify kv encoding is used correctly in key module after refactoring
  severity: INFO
  languages:
  - rust
  pattern: super::kv::new().encode().unwrap()
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-dbs-cl-import-any
  message: Import from 'dbs::cl' module should use 'dbs::node' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: use\s+crate::dbs::cl
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-key-lq-new-call
  message: Call to flat 'key::lq::new()' should use nested structure after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: crate::key::lq::new($A, $B, $C, $D)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-key-lq-new-four-params
  message: Call to flat 'key::lq::new()' with 4 params - should use nested structure
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: crate::key::lq::new($A, $B, $C, $D)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-timestamp-import-from-cl
  message: Import 'Timestamp' from 'dbs::cl' should use 'dbs::node::Timestamp' after
    refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::dbs::cl::Timestamp
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-key-cl-new-call
  message: Call to old 'key::cl::Cl::new()' - should use 'key::root::nd::Nd::new()'
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: crate::key::cl::Cl::new($ARG)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-del-cl-call
  message: Call to old 'del_cl()' method - should use 'del_nd()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.del_cl($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-del-cl-await-call
  message: Call to old 'del_cl()' method - should use 'del_nd()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.del_cl($ARG).await
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-flat-key-lq-import
  message: Import uses flat key structure 'key::lq' - should use nested structure
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::key::lq
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-key-cl-new-with-uuid
  message: Call to old 'key::cl::Cl::new()' with UUID - should use 'key::root::nd::Nd::new()'
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: crate::key::cl::Cl::new($UUID)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: old-set-cl-call
  message: Call to old 'set_cl()' method - should use 'set_nd()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.set_cl($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-set-cl-await-call
  message: Call to old 'set_cl()' method - should use 'set_nd()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.set_cl($ARG).await
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-flat-key-hb-import
  message: Import uses flat key structure 'key::hb' - should use 'key::root::hb' after
    refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::key::hb
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-cl-prefix-in-test
  message: Test or code contains old '!cl' prefix - should use new node prefix after
    refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: '!cl'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-flat-key-hb-import-struct
  message: Import uses flat key structure 'key::hb::Hb' - should use 'key::root::hb::Hb'
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::key::hb::Hb
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-flat-key-lv-import-struct
  message: Import uses flat key structure 'key::lv::Lv' - should use nested structure
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::key::lv::Lv
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-mod-cl-declaration
  message: Module declaration 'pub mod cl;' should be updated to 'pub mod node;' or
    removed if using nested structure
  severity: WARNING
  languages:
  - rust
  pattern: 'pub mod cl;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-mod-cl-use
  message: Module declaration 'mod cl;' should be updated to 'mod node;' or removed
    if using nested structure
  severity: WARNING
  languages:
  - rust
  pattern: 'mod cl;

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-key-cl-string-literal
  message: String literal with '/!cl' key prefix should be updated to match new node
    structure
  severity: WARNING
  languages:
  - rust
  pattern-regex: '"/!cl'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-key-cl-prefix-extend
  message: Byte slice extension with old '!cl' prefix pattern - should use new node
    prefix
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.extend_from_slice(&[b'!', b'c', b'l', $REST])
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-key-lq-lv-combined-import
  message: Import uses flat key structure 'key::lv::Lv' - should use nested structure
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::key::lv::Lv
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-key-cl-prefix
  message: Call to old 'key::cl::Cl::prefix()' - should use 'key::root::nd::Nd::prefix()'
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: crate::key::cl::Cl::prefix()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-key-cl-suffix
  message: Call to old 'key::cl::Cl::suffix()' - should use 'key::root::nd::Nd::suffix()'
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: crate::key::cl::Cl::suffix()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-get-cl-call
  message: Call to old 'get_cl()' method - should use 'get_nd()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.get_cl($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-encode-call
  message: Call to 'Cl::encode()' - should use 'Nd::encode()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: Cl::encode($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-decode-call
  message: Call to 'Cl::decode()' - should use 'Nd::decode()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: Cl::decode($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-not-found-error
  message: Error variant 'ClNotFound' should be renamed to 'NdNotFound' (cluster →
    node refactoring)
  severity: WARNING
  languages:
  - rust
  pattern: Error::ClNotFound
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-get-cl-await-call
  message: Call to old 'get_cl()' method - should use 'get_nd()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.get_cl($ARG).await
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-key-cl-file-exists
  message: File 'lib/src/key/cl.rs' should be moved to 'lib/src/key/root/nd.rs' as
    part of key module restructuring
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - lib/src/key/cl.rs
- id: old-dbs-cl-file-exists
  message: File 'lib/src/dbs/cl.rs' should be renamed to 'lib/src/dbs/node.rs' (cluster
    → node refactoring)
  severity: WARNING
  languages:
  - rust
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - lib/src/dbs/cl.rs
- id: old-cl-new-constructor
  message: Constructor 'Cl::new()' should be 'Nd::new()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: Cl::new($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-flat-key-lq-import-struct
  message: Import uses flat key structure 'key::lq::Lq' - should use nested structure
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::key::lq::Lq
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-key-tb-import-struct
  message: Import uses flat key structure 'key::tb::Tb' - should use nested structure
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::key::tb::Tb
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-struct-key-derive
  message: Struct 'Cl' with Key derive should be renamed to 'Nd' (cluster → node refactoring)
  severity: WARNING
  languages:
  - rust
  pattern: "#[derive(..., Key)]\npub struct Cl {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-key-hb-prefix-call
  message: Call to flat 'key::hb::Hb::prefix()' should use 'key::root::hb::Hb::prefix()'
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: crate::key::hb::Hb::prefix()
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-key-cl-test-module
  message: Test module references old 'Cl' struct - should be updated to 'Nd' after
    refactoring
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[cfg\(test\)\]\s+mod tests\s*\{[^}]*Cl::'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-new-call-assignment
  message: Constructor 'Cl::new()' should be 'Nd::new()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: 'let $VAR = Cl::new($ARG);

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-del-cllv-reference
  message: Method 'del_cllv' references old cluster (cl) naming - should be updated
    to use node (nd) naming
  severity: WARNING
  languages:
  - rust
  pattern-regex: del_cllv
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-keytimestamp-import-from-cl
  message: Import 'KeyTimestamp' from 'dbs::cl' should use 'dbs::node::KeyTimestamp'
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::dbs::cl::KeyTimestamp
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-clustermembership-import-from-cl
  message: Import 'ClusterMembership' from 'dbs::cl' should use 'dbs::node::ClusterMembership'
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: use crate::dbs::cl::ClusterMembership
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-key-cl-prefix-comparison
  message: Test assertion checks old '/!cl' prefix - should be updated to new node
    prefix
  severity: WARNING
  languages:
  - rust
  pattern: 'assert_eq!($VAR, b"/!cl\0")

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-key-cl-suffix-comparison
  message: Test assertion checks old '/!cl' suffix - should be updated to new node
    suffix
  severity: WARNING
  languages:
  - rust
  pattern: 'assert_eq!($VAR, b"/!cl\xff")

    '
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-key-prefix-bytes-0x00
  message: Byte slice extension with old '!cl' prefix and 0x00 - should use new node
    prefix
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.extend_from_slice(&[b'!', b'c', b'l', 0x00])
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-key-prefix-bytes-0xff
  message: Byte slice extension with old '!cl' prefix and 0xff - should use new node
    prefix
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.extend_from_slice(&[b'!', b'c', b'l', 0xff])
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-key-hb-new-with-timestamp
  message: Call to flat 'key::hb::Hb::new()' should use 'key::root::hb::Hb::new()'
    after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: crate::key::hb::Hb::new($TS, $UUID)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-key-cl-literal-b
  message: 'Key encoding field ''_b: b''c'''' indicates old ''cl'' prefix - should
    be updated for node'
  severity: WARNING
  languages:
  - rust
  pattern-regex: _b:\s*b'c'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-struct-with-nd-field
  message: Struct 'Cl' should be renamed to 'Nd' (cluster → node refactoring)
  severity: WARNING
  languages:
  - rust
  pattern: "pub struct Cl {\n  __: $T1,\n  _a: $T2,\n  _b: $T3,\n  _c: $T4,\n  pub\
    \ nd: $T5,\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-super-prefix-call
  message: Call to 'super::Cl::prefix()' should be 'super::Nd::prefix()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: super::Cl::prefix()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-super-suffix-call
  message: Call to 'super::Cl::suffix()' should be 'super::Nd::suffix()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: super::Cl::suffix()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-self-new-impl
  message: Implementation 'impl Cl' should be 'impl Nd' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: "impl Cl {\n  pub fn new($PARAM: $TYPE) -> Self {\n    ...\n  }\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-prefix-impl-method
  message: prefix() method using old '!cl' bytes should be updated to new node prefix
  severity: WARNING
  languages:
  - rust
  pattern: "pub fn prefix() -> Vec<u8> {\n  let mut k = super::kv::new().encode().unwrap();\n\
    \  k.extend_from_slice(&[b'!', b'c', b'l', $X]);\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-suffix-impl-method
  message: suffix() method using old '!cl' bytes should be updated to new node suffix
  severity: WARNING
  languages:
  - rust
  pattern: "pub fn suffix() -> Vec<u8> {\n  let mut k = super::kv::new().encode().unwrap();\n\
    \  k.extend_from_slice(&[b'!', b'c', b'l', $X]);\n  ...\n}\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-beg-end-scan-pattern
  message: Scan range using old 'key::cl::Cl' prefix/suffix - should use 'key::root::nd::Nd'
    after refactoring
  severity: WARNING
  languages:
  - rust
  patterns:
  - pattern: 'let beg = crate::key::cl::Cl::prefix();

      ...

      let end = crate::key::cl::Cl::suffix();

      '
  - pattern-not-inside: 'mod tests { ... }

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-error-construction-not-found
  message: Error construction 'ClNotFound' should be renamed to 'NdNotFound' (cluster
    → node refactoring)
  severity: WARNING
  languages:
  - rust
  pattern: "Error::ClNotFound {\n  value: $EXPR,\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-set-cl-method-definition
  message: Method 'set_cl' should be renamed to 'set_nd' (cluster → node refactoring)
  severity: WARNING
  languages:
  - rust
  pattern: "pub async fn set_cl(&mut self, id: $TYPE) -> $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-get-cl-method-definition
  message: Method 'get_cl' should be renamed to 'get_nd' (cluster → node refactoring)
  severity: WARNING
  languages:
  - rust
  pattern: "pub async fn get_cl(&mut self, id: $TYPE) -> $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-del-cl-method-definition
  message: Method 'del_cl' should be renamed to 'del_nd' (cluster → node refactoring)
  severity: WARNING
  languages:
  - rust
  pattern: "pub async fn del_cl(&mut self, $PARAM: $TYPE) -> $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-del-cllv-method-definition
  message: Method 'del_cllv' references old cluster (cl) naming - should be updated
    to use node (nd) naming
  severity: WARNING
  languages:
  - rust
  pattern: "pub async fn del_cllv(&mut self, $PARAM: $TYPE) -> $RET {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-assert-decode
  message: Decode call 'Cl::decode()' should be 'Nd::decode()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: 'let dec = Cl::decode($ARG).unwrap();

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-assert-encode
  message: Encode call 'Cl::encode()' should be 'Nd::encode()' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: 'let enc = Cl::encode($ARG).unwrap();

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-cl-uuid-parameter
  message: Constructor implementation for 'Cl' struct should be renamed to 'Nd' and
    update key bytes
  severity: WARNING
  languages:
  - rust
  pattern: "pub fn new(nd: Uuid) -> Self {\n  Self {\n    __: b'/',\n    _a: b'!',\n\
    \    _b: b'c',\n    _c: b'l',\n    nd,\n  }\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-key-cl-default-test
  message: Test creates Cl with Uuid::default() - should be Nd::new() after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: 'let val = Cl::new(Uuid::default());

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-set-cl-call-with-await-question
  message: Call to 'set_cl().await?' - should use 'set_nd().await?' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.set_cl($ARG).await?
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-get-cl-call-with-await-question
  message: Call to 'get_cl().await?' - should use 'get_nd().await?' after refactoring
  severity: WARNING
  languages:
  - rust
  pattern: $VAR.get_cl($ARG).await?
  metadata:
    category: api
