rules:
- id: key-root-path-reference
  message: Detected crate::key::root path reference (new nested structure)
  severity: INFO
  languages:
  - rust
  pattern-regex: 'crate::key::root::'
  metadata:
    category: structural
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
- id: key-node-path-reference
  message: Detected crate::key::node path reference (new nested structure, renamed
    from cluster)
  severity: INFO
  languages:
  - rust
  pattern-regex: 'crate::key::node::'
  metadata:
    category: structural
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
- id: key-database-path-in-key-mod
  message: Detected crate::key::database path reference in key modules (new nested
    structure)
  severity: INFO
  languages:
  - rust
  pattern-regex: 'crate::key::database::'
  metadata:
    category: structural
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - lib/src/key/**
    exclude:
    - lib/src/sql/statements/remove.rs
    - lib/src/sql/statements/define.rs
- id: import-key-index-modules-regex
  message: Detected import from new nested key module - key::index::*
  severity: INFO
  languages:
  - rust
  pattern-regex: use\s+.*::key::index::(bc|bd|bf|bi|bk|bl|bo|bp|bs|bt|bu|all)
  metadata:
