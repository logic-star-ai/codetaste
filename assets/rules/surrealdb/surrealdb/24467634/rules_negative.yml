rules:
- id: test-assert-is-ok-simple
  message: Test uses assert!(expr.is_ok()) which hides error details. Replace with
    expr.unwrap() for better error visibility.
  severity: WARNING
  languages:
  - rust
  pattern: assert!($EXPR.is_ok())
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 107
  paths:
    include:
    - '*/tests/*.rs'
    - '*/tests/**/*.rs'
    - '*/src/**/tests/*.rs'
    - '*/src/**/tests/**/*.rs'
- id: test-include-macro-in-module
  message: Test file uses include! macro instead of proper module structure. Refactor
    to use define_tests! and include_tests! macros.
  severity: WARNING
  languages:
  - rust
  pattern: 'include!($PATH)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 74
  paths:
    include:
    - '*/tests/*.rs'
    - '*/tests/**/*.rs'
    - '*/src/**/tests/*.rs'
    - '*/src/**/tests/**/*.rs'
- id: test-include-statement-any-rs-file
  message: Test file uses include! statement. Refactor to use proper module structure
    with define_tests! or include_tests! macros.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \binclude!\s*\(\s*"[^"]+"\s*\)\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 74
  paths:
    include:
    - '*/tests/*.rs'
    - '*/kvs/tests/*.rs'
- id: test-include-macro-with-string-literal
  message: Test module uses include! macro with string literal. Refactor to use include_tests!
    or define_tests! macros.
  severity: WARNING
  languages:
  - rust
  pattern-regex: include!\s*\(\s*"[^"]+\.rs"\s*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
  paths:
    include:
    - '*/kvs/tests/mod.rs'
    - '*/ws_integration.rs'
- id: test-include-any-test-file-rs
  message: Test module file uses include! to include test files. Refactor to use include_tests!
    macro with proper module structure.
  severity: WARNING
  languages:
  - rust
  pattern-regex: include!\s*\(\s*"[a-z_]+\.rs"\s*\)\s*;
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
  paths:
    include:
    - '*/kvs/tests/mod.rs'
    - '*/tests/mod.rs'
- id: test-include-macro-usage
  message: KVS test mod.rs contains include! macro usage. Refactor to use include_tests!
    macro for all backend test instantiation.
  severity: WARNING
  languages:
  - rust
  pattern-regex: \binclude!\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 35
  paths:
    include:
    - '*/kvs/tests/mod.rs'
- id: test-multiple-sequential-includes
  message: File uses multiple sequential include! statements. Refactor to use include_tests!
    macro for batch test instantiation.
  severity: WARNING
  languages:
  - rust
  pattern-regex: include!\s*\([^)]+\)\s*;\s*include!\s*\([^)]+\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: test-assert-result-method-await-is-ok
  message: Test uses assert with is_ok() on async method call. Replace with .unwrap()
    for better error visibility.
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: assert!($X.$M1($A1).await.is_ok())
  - pattern: assert!($X.$M1($A1, $A2).await.is_ok())
  - pattern: assert!($X.$M1($A1, $A2, $A3).await.is_ok())
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
  paths:
    include:
    - '*/kvs/tests/*.rs'
- id: test-assert-tx-operation-await-simple
  message: Test uses assert with is_ok() on transaction operation. Replace with .unwrap()
    for better error visibility.
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: assert!(tx.put($A, $B, $C).await.is_ok())
  - pattern: assert!(tx.set($A, $B, $C).await.is_ok())
  - pattern: assert!(tx.del($A).await.is_ok())
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 25
- id: test-assert-put-string-literals
  message: Test in raw.rs uses assert with is_ok(). Replace with .unwrap() for better
    error visibility.
  severity: WARNING
  languages:
  - rust
  pattern-either:
  - pattern: assert!(tx.put($K, $V, None).await.is_ok())
  - pattern: assert!(tx.set($K, $V, None).await.is_ok())
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - '*/kvs/tests/raw.rs'
- id: test-assert-put-is-ok
  message: Test uses assert!(tx.put(...).await.is_ok()). Replace with tx.put(...).await.unwrap()
    for better error visibility.
  severity: WARNING
  languages:
  - rust
  pattern: assert!(tx.put($KEY, $VALUE, $OPT).await.is_ok())
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: test-assert-put-with-none-is-ok
  message: Test uses assert with is_ok() on put operation with None. Replace with
    .unwrap() for better error visibility.
  severity: WARNING
  languages:
  - rust
  pattern: 'assert!($TX.put($KEY, $VALUE, None).await.is_ok())

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: test-tokio-test-with-serial-attribute
  message: 'Test function uses #[tokio::test] with #[serial]. In refactored code,
    use pub async fn and define_tests! macro.'
  severity: WARNING
  languages:
  - rust
  pattern: '#[tokio::test]

    #[serial]

    async fn $NAME() { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - '*/tests/raw.rs'
    - '*/tests/snapshot.rs'
    - '*/tests/multireader.rs'
    - '*/tests/multiwriter*.rs'
    - '*/tests/timestamp*.rs'
    - '*/kvs/tests/*.rs'
- id: test-pattern-tokio-test-serial
  message: 'Test file contains #[tokio::test] #[serial] attributes. After refactoring,
    these should be pub async fn with define_tests! macro.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[tokio::test\]\s+#\[serial\]'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
