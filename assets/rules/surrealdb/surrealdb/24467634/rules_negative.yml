    - '*/kvs/tests/raw.rs'
    - '*/kvs/tests/snapshot.rs'
    - '*/kvs/tests/multireader.rs'
    - '*/kvs/tests/multiwriter*.rs'
    - '*/kvs/tests/timestamp*.rs'
- id: test-serial-attribute-usage
  message: 'Test file contains #[serial] attribute. After refactoring to pub async
    fn, these attributes should be handled by macro-generated test functions.'
  severity: WARNING
  languages:
  - rust
  pattern-regex: '#\[serial\]'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
