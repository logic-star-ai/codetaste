    Replace with direct import from ''react-reconciler/src/ReactFiberReconciler'''
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: \{[^}]*updateContainer[^}]*\}\s*from\s*['"]react-reconciler/inline\.
