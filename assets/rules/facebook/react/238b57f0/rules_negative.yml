rules:
- id: comment-references-inline-typed
  message: 'Documentation update needed: Comment references inline-typed which is
    being removed. Update documentation.'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: //.*inline-typed|/\*.*inline-typed
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: string-ref-inline-reconciler
  message: 'Refactoring needed: String reference to inline file detected. Replace
    with ''react-reconciler/src/ReactFiberReconciler'''
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: '[''"]react-reconciler/inline\.(dom|art|fabric|native|test|fire|dom-browser)[''"]'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: dom-renderer-inline-import
  message: 'Refactoring needed: React DOM renderer imports from inline.dom. Update
    to direct src imports.'
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: from\s*['"]react-reconciler/inline\.dom['"]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '**/react-dom/**'
- id: comment-references-inline-dom
  message: 'Documentation update needed: Comment references inline.dom which is being
    removed. Update documentation to reference direct imports.'
  severity: INFO
  languages:
  - javascript
  - typescript
  pattern-regex: //.*inline\.dom|/\*.*inline\.dom
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: inline-file-export-all-pattern
  message: 'File should be deleted: This inline file just re-exports from source.
    The file itself should be removed.'
  severity: WARNING
  languages:
  - javascript
  pattern-regex: ^export\s+\*\s+from\s+['"]\./src/ReactFiberReconciler['"];?$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    include:
    - '**/inline.*.js'
- id: string-ref-persistent
  message: 'Refactoring needed: String reference to persistent entry point detected.
    This entry point has been removed.'
  severity: WARNING
  languages:
  - javascript
  - typescript
  pattern-regex: '[''"]react-reconciler/persistent[''"]'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: import-update-container-from-inline
