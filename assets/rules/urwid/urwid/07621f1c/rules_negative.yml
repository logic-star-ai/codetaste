rules:
- id: urwid-compat-b-function-usage
  message: Remove Python 2 compatibility - replace 'B($ARG)' with direct byte string
    literal or .encode()
  severity: WARNING
  languages:
  - python
  pattern: B($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 274
- id: urwid-b-function-call-single-char
  message: Remove Python 2 compatibility - replace 'B($CHAR)' helper with byte string
    literal or .encode()
  severity: WARNING
  languages:
  - python
  pattern: B($CHAR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 274
- id: old-urwid-website-url
  message: Update URL - replace 'http://excess.org/urwid/' with 'https://urwid.org/'
  severity: WARNING
  languages:
  - python
  pattern-regex: http://excess\.org/urwid/
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
- id: python-old-url-in-comment
  message: Update URL - replace 'http://excess.org' with 'https://urwid.org'
  severity: WARNING
  languages:
  - python
  pattern-regex: http://excess\.org
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
- id: python2-future-print-function-import
  message: Remove Python 2 compatibility - '__future__.print_function' is not needed
    in Python 3
  severity: WARNING
  languages:
  - python
  pattern: from __future__ import print_function
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: python2-future-print-specific
  message: Remove Python 2 compatibility - '__future__' print_function import is not
    needed in Python 3
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from __future__ import $IMPORT
  - metavariable-regex:
      metavariable: $IMPORT
      regex: .*print_function.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: python2-xrange-builtin-usage
  message: Remove Python 2 compatibility - replace 'xrange' with 'range' (Python 3+)
  severity: WARNING
  languages:
  - python
  pattern: xrange(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: python2-explicit-object-inheritance
  message: Remove Python 2 compatibility - explicit 'object' inheritance is unnecessary
    in Python 3
  severity: WARNING
  languages:
  - python
  pattern: "class $CLASS(object):\n    ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: python2-future-division-import
  message: Remove Python 2 compatibility - '__future__.division' is not needed in
    Python 3
  severity: WARNING
  languages:
  - python
  pattern: from __future__ import division
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: python2-future-import-combined
  message: Remove Python 2 compatibility - '__future__' imports are not needed in
    Python 3
  severity: WARNING
  languages:
  - python
  pattern: from __future__ import division, print_function
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: python2-future-division-specific
  message: Remove Python 2 compatibility - '__future__' division import is not needed
    in Python 3
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from __future__ import $IMPORT
  - metavariable-regex:
      metavariable: $IMPORT
      regex: .*division.*
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: python2-empty-bytes-constructor
  message: Consider modernizing - use b'' literal instead of bytes() constructor for
    empty bytes
  severity: INFO
  languages:
  - python
  pattern: bytes()
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
- id: urwid-compat-ord2-usage
  message: Remove Python 2 compatibility - replace 'ord2($ARG)' with direct usage
    (in Python 3, bytes are already integers)
  severity: WARNING
  languages:
  - python
  pattern: ord2($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: urwid-compat-text-type-usage
  message: Remove Python 2 compatibility - replace 'text_type' with 'str'
  severity: WARNING
  languages:
  - python
  pattern: text_type
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: urwid-text-type-isinstance
  message: Remove Python 2 compatibility - replace 'text_type' with 'str' in isinstance
    checks
  severity: WARNING
  languages:
  - python
  pattern: isinstance($VAR, text_type)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: urwid-compat-chr2-usage
  message: Remove Python 2 compatibility - replace 'chr2($ARG)' with 'bytes([$ARG])'
  severity: WARNING
  languages:
  - python
  pattern: chr2($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: python2-set-from-list
  message: Modernize Python - use set literal '{$ITEM, ...}' instead of 'set([...])'
    constructor
  severity: WARNING
  languages:
  - python
  pattern: set([$ITEM, ...])
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: python2-classmethod-decorator-missing
  message: Modernize Python - use @classmethod decorator instead of classmethod()
    function
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: '$METHOD = classmethod($METHOD)

      '
  - pattern-inside: "class $CLASS:\n    ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: urwid-compat-with-metaclass-usage
  message: Remove Python 2 compatibility - replace 'with_metaclass($META, ...)' with
    direct metaclass syntax 'metaclass=$META'
  severity: WARNING
  languages:
  - python
  pattern: "class $CLASS(with_metaclass($META, ...)):\n  ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: urwid-widget-update-wrapper
  message: Remove Python 2 compatibility - ensure using 'functools.update_wrapper'
    not 'widget.update_wrapper'
  severity: WARNING
  languages:
  - python
  pattern: update_wrapper(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: python2-select-error-in-except
  message: Modernize Python - replace 'select.error' with 'OSError' (Python 3+ unification)
  severity: WARNING
  languages:
  - python
  pattern: "try:\n    ...\nexcept select.error as $E:\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: python2-sys-version-check
  message: Remove Python 2 compatibility - version checks for Python 2 vs 3 are no
    longer needed
  severity: WARNING
  languages:
  - python
  pattern: sys.version_info > (3, 0)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: urwid-compat-bytes3-usage
  message: Remove Python 2 compatibility - replace 'bytes3($ARG)' with native 'bytes($ARG)'
  severity: WARNING
  languages:
  - python
  pattern: bytes3($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: python2-ioerror-in-except-clause
  message: Modernize Python - replace 'IOError' with 'OSError' (IOError is an alias
    in Python 3)
  severity: WARNING
  languages:
  - python
  pattern: "try:\n    ...\nexcept IOError as $E:\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: python2-version-if-else-block
  message: Remove Python 2 compatibility - remove PYTHON3 version branching, keep
    Python 3 code only
  severity: WARNING
  languages:
  - python
  pattern: "if PYTHON3:\n    ...\nelse:\n    ...\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: python2-conditional-import-sys-version
  message: Remove Python 2 compatibility - conditional imports based on Python version
    are no longer needed
  severity: WARNING
  languages:
  - python
  pattern: "if sys.version_info > (3, 0):\n    ...\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: setup-py-python2-classifier
  message: Remove Python 2 compatibility - remove Python 2 classifiers from setup.py
  severity: WARNING
  languages:
  - python
  pattern-regex: 'Programming Language :: Python :: 2'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - setup.py
- id: urwid-bytes3-call-single-arg
  message: Remove Python 2 compatibility - replace 'bytes3($ARG)' with 'bytes($ARG)'
  severity: WARNING
  languages:
  - python
  pattern: bytes3($ARG)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: python2-delslice-method
  message: Remove Python 2 compatibility - '__delslice__' is obsolete in Python 3,
    use '__delitem__' with slice
  severity: WARNING
  languages:
  - python
  pattern: "def __delslice__($SELF, $I, $J):\n    ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python2-setslice-method
  message: Remove Python 2 compatibility - '__setslice__' is obsolete in Python 3,
    use '__setitem__' with slice
  severity: WARNING
  languages:
  - python
  pattern: "def __setslice__($SELF, $I, $J, $VALUE):\n    ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python2-exec-statement
  message: Remove Python 2 compatibility - use exec() function instead of exec statement
  severity: WARNING
  languages:
  - python
  pattern-regex: exec\s+[^(]
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python2-raise-with-comma
  message: Remove Python 2 compatibility - use 'raise Exception(args)' instead of
    'raise Exception, args'
  severity: WARNING
  languages:
  - python
  pattern-regex: raise\s+\w+\s*,\s*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: python2-version-constant-check
  message: Remove Python 2 compatibility - PYTHON3 version check constant is no longer
    needed
  severity: WARNING
  languages:
  - python
  pattern: PYTHON3 = sys.version_info > (3, 0)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: travis-ci-python2-version
  message: Remove Python 2 compatibility - remove Python 2.x from Travis CI configuration
  severity: WARNING
  languages:
  - yaml
  pattern-regex: python:\s*2\.
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .travis.yml
- id: setup-py-classifier-python2-specific
  message: Remove Python 2 compatibility - remove Python 2.x classifiers from setup.py
  severity: WARNING
  languages:
  - python
  pattern-regex: 'Python :: 2\.'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - setup.py
