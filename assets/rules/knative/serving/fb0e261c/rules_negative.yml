  severity: WARNING
  languages:
  - bash
  pattern-regex: pkg/controller
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*.sh'
- id: old-controller-configuration-resources-names-import-aliased
  message: Import should be 'github.com/knative/serving/pkg/reconciler/v1alpha1/configuration/resources/names'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'import $ALIAS "github.com/knative/serving/pkg/controller/configuration/resources/names"

      '
  - metavariable-pattern:
      metavariable: $ALIAS
      patterns:
      - pattern-not: '_

          '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-controller-with-alias-configuration-block
  message: Aliased import of controller/configuration should be reconciler/v1alpha1/configuration
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  $ALIAS \"github.com/knative/serving/pkg/controller/configuration\"\
    \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
