rules:
- id: old-controller-package-import
  message: Import path should be 'github.com/knative/serving/pkg/reconciler/v1alpha1'
    instead of 'pkg/controller'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/knative/serving/pkg/controller"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 107
- id: old-controller-import-in-block
  message: Import path 'github.com/knative/serving/pkg/controller/...' should be changed
    to 'github.com/knative/serving/pkg/reconciler/v1alpha1/...'
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: "import (\n  ...\n  \"github.com/knative/serving/pkg/controller\"\n \
      \ ...\n)\n"
  - pattern: "import (\n  ...\n  \"github.com/knative/serving/pkg/controller/$SUBPATH\"\
      \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 107
- id: old-controller-simple-import-block-pattern
  message: Import block contains old controller package path; should be reconciler/v1alpha1
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/knative/serving/pkg/controller\"\n  ...\n\
    )\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 107
- id: controller-directory-check-any-subdir
  message: Files still exist in pkg/controller directory; entire directory should
    be moved to pkg/reconciler/v1alpha1
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 102
  paths:
    include:
    - pkg/controller/*
- id: check-old-controller-any-go-file
  message: Go file still exists in old pkg/controller/ directory; should be moved
    to pkg/reconciler/v1alpha1/
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
  paths:
    include:
    - pkg/controller/**/*.go
- id: old-controller-go-files-in-subdirs
  message: Go files in old controller subdirectories should be moved to pkg/reconciler/v1alpha1/
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 89
  paths:
    include:
    - pkg/controller/route/**/*.go
    - pkg/controller/revision/**/*.go
    - pkg/controller/configuration/**/*.go
    - pkg/controller/service/**/*.go
    - pkg/controller/autoscaling/**/*.go
- id: old-controller-multiline-imports
  message: Import statement references old controller package; should use reconciler/v1alpha1
  severity: WARNING
  languages:
  - go
  pattern-regex: ^\s*"github\.com/knative/serving/pkg/controller(?:/[^"]*)?"\s*$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 71
- id: old-controller-import-with-version-missing
  message: Import path missing v1alpha1 version in path; should be 'pkg/reconciler/v1alpha1/...'
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: 'import "github.com/knative/serving/pkg/controller/route"

      '
  - pattern: 'import "github.com/knative/serving/pkg/controller/revision"

      '
  - pattern: 'import "github.com/knative/serving/pkg/controller/configuration"

      '
  - pattern: 'import "github.com/knative/serving/pkg/controller/service"

      '
  - pattern: 'import "github.com/knative/serving/pkg/controller/autoscaling"

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 65
- id: old-controller-any-test-file
  message: Test file in old controller directory; should be moved to pkg/reconciler/v1alpha1/
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
  paths:
    include:
    - pkg/controller/**/*_test.go
