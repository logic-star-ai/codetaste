    - pattern: test.IsRevisionReady
    - pattern: test.IsRouteReady
    - pattern: test.ConfigurationHasCreatedRevision
    - pattern: test.IsConfigRevisionCreationFailed
  - pattern-not-inside: 'package test

      ...

      '
  - pattern-not: v1a1test.$ANY
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
