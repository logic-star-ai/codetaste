- id: old-conformance-api-files-exist
  message: API conformance test files should be moved to test/conformance/api/v1alpha1/
    subdirectory
  severity: ERROR
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - test/conformance/api/blue_green_test.go
    - test/conformance/api/cmd_args_test.go
    - test/conformance/api/configuration_test.go
    - test/conformance/api/errorcondition_test.go
    - test/conformance/api/generatename_test.go
    - test/conformance/api/protocol_test.go
    - test/conformance/api/resources_test.go
    - test/conformance/api/revision_timeout_test.go
    - test/conformance/api/route_test.go
    - test/conformance/api/service_test.go
    - test/conformance/api/single_threaded_test.go
    - test/conformance/api/util.go
    - test/conformance/api/volumes_test.go
    - test/conformance/api/workingdir_test.go
