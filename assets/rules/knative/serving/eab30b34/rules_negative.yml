rules:
- id: options-type-from-test-package
  message: Options type should be used from v1a1test package (test/v1alpha1), not
    test package
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern: test.Options{ ... }
  - pattern-not: v1a1test.Options{ ... }
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
- id: test-package-resource-creation-call
  message: Resource creation functions should be called from v1a1test package (test/v1alpha1),
    not test package
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: test.CreateRunLatestServiceReady(...)
    - pattern: test.CreateRunLatestServiceLegacyReady(...)
    - pattern: test.CreateLatestService(...)
    - pattern: test.CreateLatestServiceLegacy(...)
    - pattern: test.CreateConfiguration(...)
    - pattern: test.CreateRoute(...)
  - pattern-not: v1a1test.$ANY(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: resourcenames-import-from-test
  message: ResourceNames should be imported from test/v1alpha1 package (use v1a1test
    alias)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'import "github.com/knative/serving/test"

        ...

        test.ResourceNames{ ... }

        '
    - pattern: "import (\n  ...\n  \"github.com/knative/serving/test\"\n  ...\n)\n\
        ...\ntest.ResourceNames{ ... }\n"
  - pattern-not: 'import "github.com/knative/serving/test/v1alpha1"

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 49
- id: pass-servingclients-to-function
  message: Function call should pass clients.ServingAlphaClient instead of clients.ServingClient
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern: '$FUNC(..., clients.ServingClient, ...)

      '
  - pattern-not: '$FUNC(..., clients.ServingAlphaClient, ...)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: test-package-state-function-call
  message: State checking functions should be called from v1a1test package (test/v1alpha1),
    not test package
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: test.WaitForServiceState(...)
    - pattern: test.WaitForRouteState(...)
    - pattern: test.WaitForRevisionState(...)
    - pattern: test.WaitForConfigurationState(...)
    - pattern: test.CheckServiceState(...)
    - pattern: test.CheckRouteState(...)
    - pattern: test.CheckRevisionState(...)
    - pattern: test.CheckConfigurationState(...)
  - pattern-not: v1a1test.$ANY(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: createrunlatestserviceready-call-without-v1a1test
