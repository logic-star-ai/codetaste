- id: clients-servingclient-field-access
  message: Field access should use '.ServingAlphaClient' instead of '.ServingClient'
  severity: ERROR
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: clients.ServingClient.$FIELD
    - pattern: $VAR.ServingClient.$FIELD
  - pattern-not: $VAR.ServingAlphaClient.$FIELD
  - metavariable-pattern:
      metavariable: $FIELD
      pattern-either:
      - pattern: Routes
      - pattern: Configs
      - pattern: Revisions
      - pattern: Services
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
