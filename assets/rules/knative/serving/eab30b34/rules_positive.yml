    - '**/test/v1alpha1/*.go'
    exclude:
    - '**/vendor/**'
- id: import-serving-api-v1alpha1-context
  message: Detected serving API import in v1alpha1 context
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import $ALIAS "$PATH"
  - metavariable-regex:
      metavariable: $PATH
      regex: .*serving.*/v1alpha1$
