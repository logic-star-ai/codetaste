- id: type-definitions-in-v1alpha1
  message: Detected type definition in v1alpha1 package
  severity: INFO
  languages:
  - go
  pattern: 'type $TYPE $DEF

    '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/v1alpha1/*.go'
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: serving-alpha-clients-type-usage
  message: Detected use of ServingAlphaClients type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "type $X struct {\n  ...\n  $FIELD *ServingAlphaClients\n  ...\n}\n"
    - pattern: 'var $VAR *ServingAlphaClients

        '
    - pattern: 'func $FUNC(..., $ARG *ServingAlphaClients, ...) $RET { ... }

        '
    - pattern: '$VAR := &ServingAlphaClients{ ... }

        '
  - pattern-not-inside: '// Old pattern

      type ServingClients struct { ... }

      '
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
