rules:
- id: serving-alpha-client-dataflow
  message: Detected dataflow from ServingAlphaClients to function call
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $CLIENTS.ServingAlphaClient
  - pattern: '&ServingAlphaClients{ ... }

      '
  pattern-sinks:
  - pattern: $FUNC($SINK, ...)
  metadata:
    nr_refactored_patterns: 163
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: service-functions-from-v1alpha1
  message: Detected Service function call from v1alpha1 package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.$FUNC(...)
    - pattern: $PKG.$FUNC
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(Create|Patch|Wait|Get|Update|Validate).*Service.*
  - metavariable-regex:
      metavariable: $PKG
      regex: ^v1a1test$
  metadata:
    nr_refactored_patterns: 156
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: v1alpha1-dot-function-call
  message: Detected function call on v1alpha1 test package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^v1a1test$
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^[A-Z]
  metadata:
    nr_refactored_patterns: 155
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/v1alpha1/*.go'
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: client-field-access-alpha
  message: Detected client field access with ServingAlphaClient
  severity: INFO
  languages:
  - go
  mode: taint
  pattern-sources:
  - pattern: $CLIENTS.ServingAlphaClient
  pattern-sinks:
  - pattern: $SINK.$FIELD
  metadata:
    nr_refactored_patterns: 120
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: inline-comment-v1alpha1
  message: Detected inline comment in v1alpha1
  severity: INFO
  languages:
  - go
  pattern-regex: \s+//.*$
  metadata:
    nr_refactored_patterns: 97
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/v1alpha1/*.go'
- id: assignment-operator-v1alpha1
  message: Detected assignment operator in v1alpha1
  severity: INFO
  languages:
  - go
  pattern: $VAR = $EXPR
  metadata:
    nr_refactored_patterns: 89
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/v1alpha1/*.go'
  options:
    symbolic_propagation: true
- id: options-usage-from-v1alpha1
  message: Detected Options type usage from v1alpha1 package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.Options{ ... }
    - pattern: 'var $VAR *$PKG.Options

        '
    - pattern: 'func $FUNC(..., $ARG *$PKG.Options, ...) $RET { ... }

        '
  - metavariable-regex:
      metavariable: $PKG
      regex: ^v1a1test$
  metadata:
    nr_refactored_patterns: 69
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: revision-functions-from-v1alpha1
  message: Detected Revision function call from v1alpha1 package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $PKG.$FUNC(...)
    - pattern: $PKG.$FUNC
  - metavariable-regex:
      metavariable: $FUNC
      regex: ^(Create|Patch|Wait|Get|Update|Check|Is).*Revision.*
  - metavariable-regex:
      metavariable: $PKG
      regex: ^v1a1test$
  metadata:
    nr_refactored_patterns: 65
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: godoc-comment-v1alpha1
  message: Detected godoc comment in v1alpha1
  severity: INFO
  languages:
  - go
  pattern-regex: ^// [A-Z].*\n
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/v1alpha1/*.go'
- id: v1a1test-import-alias
  message: Detected v1a1test import alias for v1alpha1 package
  severity: INFO
  languages:
  - go
  pattern-regex: v1a1test\s+".*?/test/v1alpha1"
  metadata:
    nr_refactored_patterns: 47
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: v1alpha1-package-function-definitions
  message: Detected function definition in v1alpha1 package
  severity: INFO
  languages:
  - go
  pattern: "func $FUNC(...) $RET {\n  ...\n}\n"
  metadata:
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/v1alpha1/*.go'
    exclude:
    - '**/*_test.go'
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: type-conversion-v1alpha1
  message: Detected type conversion in v1alpha1
  severity: INFO
  languages:
  - go
  pattern: $TYPE($EXPR)
  metadata:
    nr_refactored_patterns: 37
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/v1alpha1/*.go'
  options:
    symbolic_propagation: true
- id: configuration-functions-from-v1alpha1
  message: Detected Configuration function call from v1alpha1 package
  severity: INFO
