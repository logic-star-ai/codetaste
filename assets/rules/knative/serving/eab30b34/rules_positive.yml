- id: conformance-api-v1alpha1-tests
  message: Detected API conformance tests in v1alpha1 subdirectory
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/conformance/api/v1alpha1/*.go'
- id: conformance-api-v1alpha1-package
  message: Detected v1alpha1 package in conformance API tests
  severity: INFO
  languages:
  - go
  pattern: package v1alpha1
  metadata:
    nr_refactored_patterns: 14
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test/conformance/api/v1alpha1/*.go'
- id: function-params-with-v1alpha1-type
  message: Detected function parameter with v1alpha1 type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(..., $ARG *$PKG.$TYPE, ...) $RET {\n  ...\n}\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: ^v1a1test$
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/test/v1alpha1/*.go'
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: v1alpha1-package-declaration
  message: Detected package declaration in v1alpha1 test utilities
  severity: INFO
