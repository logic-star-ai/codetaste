rules:
- id: sudoclean-return
  message: sudoclean followed by return (refactored from goto ret)
  severity: INFO
  languages:
  - go
  pattern: 'sudoclean()

    return

    '
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/5g/*.go
    - src/cmd/6g/*.go
    - src/cmd/8g/*.go
    - src/cmd/9g/*.go
- id: gmove-regfree-regfree-return
  message: gmove, double regfree, then return (refactored from goto ret)
  severity: INFO
  languages:
  - go
  pattern: 'gmove($SRC, $DST)

    regfree(&$REG1)

    regfree(&$REG2)

    return

    '
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/5g/cgen.go
    - src/cmd/6g/cgen.go
    - src/cmd/8g/cgen.go
    - src/cmd/9g/cgen.go
- id: bgen-return
  message: bgen followed by return (refactored from goto ret)
  severity: INFO
  languages:
  - go
  pattern: 'bgen($A, $B, $C, $D)

    return

    '
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/5g/*.go
    - src/cmd/6g/*.go
    - src/cmd/8g/*.go
    - src/cmd/9g/*.go
- id: gmove-gmove-regfree-regfree-return
  message: Double gmove, double regfree, return (refactored from goto ret)
  severity: INFO
  languages:
  - go
  pattern: 'gmove($A, $B)

    gmove($C, $D)

    regfree(&$REG1)

    regfree(&$REG2)

    return

    '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/5g/cgen.go
    - src/cmd/6g/cgen.go
    - src/cmd/8g/cgen.go
    - src/cmd/9g/cgen.go
- id: cgen-gens-gmove-regfree-return
  message: cgen, gins, gmove, regfree, return (refactored from goto ret)
  severity: INFO
  languages:
  - go
  pattern: 'cgen($A, $B)

    gins($OP, $C, $D)

    gmove($E, $F)

    regfree(&$REG)

    return

    '
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/5g/cgen.go
    - src/cmd/6g/cgen.go
    - src/cmd/8g/cgen.go
    - src/cmd/9g/cgen.go
