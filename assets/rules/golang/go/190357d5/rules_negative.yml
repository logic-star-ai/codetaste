rules:
- id: goto-ret-with-switch-on-op
  message: goto ret after switch on Op should be replaced with return
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "switch $N.Op {\ncase $OP1:\n  $BODY1\n}\n...\ngoto ret\n"
  - pattern-inside: "func $FUNC(...) {\n  ...\n  ret:\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 81
- id: goto-ret-codegen-utility-functions
  message: goto ret in code generation utility functions should be refactored
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goto ret
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 60
  paths:
    include:
    - src/cmd/5g/cgen.go
    - src/cmd/6g/cgen.go
    - src/cmd/5g/ggen.go
    - src/cmd/6g/ggen.go
- id: goto-ret-pattern-in-cgen
  message: goto ret in cgen function should be replaced with direct return
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goto ret
  - pattern-inside: "func cgen(...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 52
- id: goto-ret-after-convnop-loop
  message: OCONVNOP loop followed by goto ret should be followed by return
  severity: WARNING
  languages:
  - go
  pattern: "for $N.Op == gc.OCONVNOP {\n  $N = $N.Left\n}\n...\ngoto ret\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: goto-ret-early-return-if-condition
  message: Early return with goto ret should use direct return
  severity: WARNING
  languages:
  - go
  pattern: "if $COND {\n  ...\n  goto ret\n  ...\n}\n...\nret:\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
- id: goto-ret-in-cmd-6g-package
  message: goto ret in cmd/6g package should be replaced with direct return
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goto ret
  - pattern-inside: 'package main

      ...

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
  paths:
    include:
    - src/cmd/6g/*.go
- id: goto-ret-in-6g-cgen
