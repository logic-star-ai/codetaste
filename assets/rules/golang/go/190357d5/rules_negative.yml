    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
  paths:
    include:
    - src/cmd/5g/*.go
- id: goto-ret-in-5g-cgen
  message: goto ret in 5g/cgen.go should be replaced with direct return
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goto ret
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - src/cmd/5g/cgen.go
- id: goto-out-pattern
  message: goto out to end-of-function label should be replaced with direct return
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goto out
  - pattern-inside: "func $FUNC(...) {\n  ...\n  out:\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: goto-ret-after-regalloc-regfree-pair
  message: regalloc/regfree pair followed by goto ret should be followed by return
  severity: WARNING
  languages:
  - go
  pattern: 'regalloc($REG1, $TYPE, $RES)

    ...

    regfree($REG1)

    goto ret

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: goto-ret-architecture-specific-code
  message: goto ret in architecture-specific cgen should be replaced with direct return
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'goto ret

      ...

      ret:

      '
  - pattern-inside: "func $FUNC(...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - src/cmd/5g/cgen.go
    - src/cmd/6g/cgen.go
    - src/cmd/8g/cgen.go
    - src/cmd/9g/cgen.go
- id: ret-label-at-end-of-function
  message: ret label at end of function should be removed and replaced with direct
    returns
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(...) {\n  ...\n  ret:\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: ret-label-only-closing-brace
  message: ret label with only closing brace should be removed
  severity: WARNING
  languages:
  - go
  pattern-regex: ret:\s*\n\s*\}
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: ret-label-in-cmd-directories
  message: ret label should be removed from architecture-specific code generators
  severity: WARNING
  languages:
  - go
  pattern-regex: ret:\s*\n\s*\}
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - src/cmd/5g/*.go
    - src/cmd/6g/*.go
    - src/cmd/9g/*.go
- id: empty-ret-label-pattern
  message: Empty ret label before closing brace should be removed
  severity: WARNING
  languages:
  - go
  pattern-regex: \n\s*ret:\s*\n\s*\}\s*\n
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: ret-label-no-code-before-brace
  message: ret label immediately before closing brace should be removed
  severity: WARNING
  languages:
  - go
  pattern-regex: ret:\s*\n\}
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: ret-label-compiler-pattern
  message: ret label at end of function in compiler code should be removed
  severity: WARNING
  languages:
  - go
  pattern-regex: \n\s*ret:\s*\n\s*\}\s*$
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
  paths:
    include:
    - src/cmd/*/cgen.go
    - src/cmd/*/ggen.go
    - src/cmd/internal/gc/*.go
- id: multiple-goto-same-ret
  message: Multiple gotos to same ret label should all be replaced with direct returns
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(...) {\n  ...\n  goto ret\n  ...\n  goto ret\n  ...\n  ret:\n\
    }\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: goto-ret-in-architecture-cgen-files
  message: goto ret in architecture-specific cgen.go files should be replaced with
    direct return
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'goto ret

      ...

      ret:

      '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - src/cmd/5g/cgen.go
    - src/cmd/6g/cgen.go
- id: goto-ret-in-specific-cgen-function
  message: goto ret in cgen(Node, Node) function should be replaced with direct return
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'goto ret

      ...

      ret:

      '
  - pattern-inside: "func cgen($N *gc.Node, $RES *gc.Node) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: goto-ret-after-tempname
  message: goto ret after Tempname should be replaced with return
  severity: WARNING
  languages:
  - go
  pattern: 'gc.Tempname($VAR, $TYPE)

    ...

    goto ret

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: ret-label-in-cgen-files
  message: ret label in cgen.go files should be removed
  severity: WARNING
  languages:
  - go
  pattern-regex: ret:\s*\n\s*\}
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - src/cmd/*/cgen.go
- id: goto-ret-after-cgen-call
  message: cgen call followed by goto ret should be followed by return
  severity: WARNING
  languages:
  - go
  pattern: 'cgen($N, $RES)

    goto ret

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
