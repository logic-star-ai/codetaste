  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: goto ret
  - pattern-inside: "func bgen(...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: goto-ret-in-cmd-5g-package
