rules:
- id: any-file-in-old-http-root
  message: File found in old http package location - entire package should be moved
    to net/http/
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 39
  paths:
    include:
    - src/pkg/http/*
    exclude:
    - src/pkg/http/cgi/*
    - src/pkg/http/fcgi/*
    - src/pkg/http/pprof/*
    - src/pkg/http/httptest/*
    - src/pkg/http/testdata/*
    - src/pkg/net/http/*
- id: http-source-file-at-old-location
  message: HTTP package Go source files found at old location 'src/pkg/http/' - should
    be moved to 'src/pkg/net/http/'
