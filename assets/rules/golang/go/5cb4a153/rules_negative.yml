  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
  paths:
    include:
    - src/pkg/http/*.go
- id: copyright-header-in-old-http-location
