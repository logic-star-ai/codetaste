rules:
- id: detect-net-hierarchy-architecture
  message: Detected net/ hierarchy directories - architectural reorganization to group
    network-related packages
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: architecture
    nr_refactored_patterns: 77
    nr_legacy_patterns: 0
  paths:
    include:
    - src/pkg/net/http
    - src/pkg/net/mail
    - src/pkg/net/rpc
    - src/pkg/net/smtp
    - src/pkg/net/url
- id: detect-any-go-file-in-net-http
  message: Detected Go source files in net/http directory - HTTP package reorganization
    complete
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
  paths:
    include:
    - src/pkg/net/http/*.go
- id: detect-any-test-file-in-net-http
