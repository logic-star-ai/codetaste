- id: arch-family-in-multi-condition
  message: Detected Family field in compound boolean expression - architecture check
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: $X.Family == sys.AMD64 && $COND
  - pattern: $X.Family == sys.ARM && $COND
  - pattern: $X.Family == sys.I386 && $COND
  - pattern: $X.Family == sys.ARM64 && $COND
  - pattern: $X.Family == sys.PPC64 && $COND
  - pattern: $X.Family == sys.MIPS64 && $COND
  - pattern: $X.Family == sys.S390X && $COND
