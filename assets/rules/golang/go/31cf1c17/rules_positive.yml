rules:
- id: sys-package-dot-identifier
  message: Detected usage of sys package identifier - consolidated architecture system
  severity: INFO
  languages:
  - go
  pattern-regex: sys\.(Arch|ArchFamily|AMD64|ARM|I386|ARM64|PPC64|MIPS64|S390X|Arch386|ArchAMD64|ArchARM|ArchARM64|ArchPPC64|ArchMIPS64|ArchS390X)
  metadata:
    category: api
    nr_refactored_patterns: 282
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/**/*.go
- id: architecture-family-constants-group
  message: Detected sys architecture family constant usage - named arch identifiers
  severity: INFO
  languages:
  - go
  pattern-regex: (sys\.AMD64|sys\.ARM|sys\.I386|sys\.ARM64|sys\.PPC64|sys\.MIPS64|sys\.S390X)
  metadata:
    category: api
    nr_refactored_patterns: 254
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/**/*.go
- id: arch-family-in-parentheses
  message: Detected parenthesized Family field access - architecture type casting
    or precedence
  severity: INFO
  languages:
  - go
  pattern: ($X.Family)
  metadata:
    category: basic
    nr_refactored_patterns: 136
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/**/*.go
- id: sys-constants-in-link-internal
  message: Detected sys architecture constants in link internal - consolidated arch
    identification
  severity: INFO
  languages:
  - go
  pattern-regex: sys\.(AMD64|ARM|I386|ARM64|PPC64|MIPS64|S390X)
  metadata:
    category: api
    nr_refactored_patterns: 110
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/link/internal/**/*.go
- id: sys-constants-in-compile-internal
  message: Detected sys architecture constants in compile internal - consolidated
    arch identification
  severity: INFO
  languages:
  - go
  pattern-regex: sys\.(AMD64|ARM|I386|ARM64|PPC64|MIPS64|S390X)
  metadata:
    category: api
    nr_refactored_patterns: 104
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/compile/internal/**/*.go
- id: arch-family-field-comparison
  message: Detected comparison using Arch.Family field (replaces Thechar comparisons)
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: $ARCH.Family == $CONST
  - pattern: $CONST == $ARCH.Family
  metadata:
    category: api
    nr_refactored_patterns: 85
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/**/*.go
- id: family-comparison-with-parentheses
  message: Detected parenthesized Family comparison - architecture check with precedence
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: ($X.Family == sys.$ARCH)
  - pattern: (sys.$ARCH == $X.Family)
  metadata:
    category: basic
    nr_refactored_patterns: 84
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/**/*.go
- id: sys-arm-family-constant
  message: Detected usage of sys.ARM architecture family constant (replaces '5')
  severity: INFO
  languages:
  - go
  pattern: sys.ARM
  metadata:
    category: api
    nr_refactored_patterns: 53
    nr_legacy_patterns: 0
  paths:
