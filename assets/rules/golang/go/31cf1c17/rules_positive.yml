    - src/cmd/**/*.go
- id: arch-family-in-if-condition
  message: Detected architecture family constant in if condition - replaces char-based
    comparisons
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: "if $EXPR == sys.AMD64 {\n  ...\n}\n"
  - pattern: "if sys.AMD64 == $EXPR {\n  ...\n}\n"
  - pattern: "if $EXPR == sys.ARM {\n  ...\n}\n"
  - pattern: "if sys.ARM == $EXPR {\n  ...\n}\n"
  - pattern: "if $EXPR == sys.I386 {\n  ...\n}\n"
  - pattern: "if $EXPR == sys.ARM64 {\n  ...\n}\n"
  - pattern: "if $EXPR == sys.PPC64 {\n  ...\n}\n"
  - pattern: "if $EXPR == sys.MIPS64 {\n  ...\n}\n"
  - pattern: "if $EXPR == sys.S390X {\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 48
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/**/*.go
