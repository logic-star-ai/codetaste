  severity: WARNING
  languages:
  - go
  pattern: "type LinkArch struct {\n  ...\n  Ptrsize int\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-linkarch-regsize-field-struct
  message: LinkArch struct with Regsize field should use sys.Arch.RegSize
  severity: WARNING
  languages:
  - go
  pattern: "type LinkArch struct {\n  ...\n  Regsize int\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-linkarch-name-field-struct
  message: LinkArch struct with Name and Thechar should use Family field from sys
  severity: WARNING
  languages:
  - go
  pattern: "type LinkArch struct {\n  ...\n  Name string\n  Thechar $TYPE\n  ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-thestring-as-function-argument
  message: Passing Thestring as function argument should pass Name from sys.Arch
  severity: WARNING
  languages:
  - go
  pattern: $FUNC(..., $X.Thestring, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-thelinkarch-field-declaration
  message: Old 'Thelinkarch' field should be replaced with 'LinkArch.Arch' from sys
    package
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  Thelinkarch $FIELDTYPE\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-ptrsize-intsize-regsize-struct-fields
  message: Struct with Ptrsize/Intsize/Regsize fields should use sys.Arch instead
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  Ptrsize int\n  Intsize int\n  Regsize int\n\
    \  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-arch-struct-with-sizes
  message: Struct with size fields should consider using sys.Arch instead
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  Ptrsize int\n  Intsize int\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-arch-check-multiple-or
  message: Multiple Thechar checks with OR should use InFamily() method or Family
    comparison
  severity: WARNING
  languages:
  - go
  pattern: $X.Arch.Thechar == $A || $X.Arch.Thechar == $B || $X.Arch.Thechar == $C
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-objfile-thechar-check
  message: Conditional with multiple Thechar checks should use InFamily() or Family
    comparison
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "if ctxt.Arch.Thechar == $RUNE || ctxt.Arch.Thechar == $RUNE2 {\n  ...\n\
      }\n"
  - metavariable-pattern:
      metavariable: $RUNE
      pattern-regex: '''[0-9a-z]'''
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-thelinkarch-as-function-argument
  message: Passing Thelinkarch as function argument should pass LinkArch.Arch from
    sys
  severity: WARNING
  languages:
  - go
  pattern: $FUNC(..., $X.Thelinkarch, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
