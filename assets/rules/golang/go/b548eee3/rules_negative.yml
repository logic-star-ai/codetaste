    - pattern: "func ($PD *pollDesc) init($FD $TYPE) error {\n  ...\n}\n"
    - pattern: "func ($PD *pollDesc) close() {\n  ...\n}\n"
    - pattern: "func ($PD *pollDesc) wait($MODE int) error {\n  ...\n}\n"
    - pattern: "func ($PD *pollDesc) waitRead() error {\n  ...\n}\n"
    - pattern: "func ($PD *pollDesc) waitWrite() error {\n  ...\n}\n"
    - pattern: "func ($PD *pollDesc) prepareRead() error {\n  ...\n}\n"
    - pattern: "func ($PD *pollDesc) prepareWrite() error {\n  ...\n}\n"
