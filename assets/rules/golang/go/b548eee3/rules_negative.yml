rules:
- id: net-errtimeout-usage
  message: Usage of 'errTimeout' in net package should be replaced with 'poll.ErrTimeout'
    after refactoring to internal/poll
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: net.errTimeout
    - pattern: errTimeout
  - pattern-inside: 'package net

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
