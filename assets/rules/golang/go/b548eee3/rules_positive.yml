rules:
- id: net-uses-poll-qualified-identifier
  message: Detected poll package qualified identifier usage in net - net uses poll
    API
  severity: INFO
  languages:
  - go
  pattern-regex: poll\.\w+
  metadata:
    category: api
    nr_refactored_patterns: 76
    nr_legacy_patterns: 0
  paths:
    include:
    - src/net/*.go
- id: net-uses-poll-errtimeout
  message: Detected usage of poll.ErrTimeout in net package - timeout error migrated
    to poll
  severity: INFO
  languages:
  - go
  pattern-either:
  - pattern: poll.ErrTimeout
  - pattern: return poll.ErrTimeout
  - pattern: return $X, poll.ErrTimeout
  - pattern: "if $COND {\n  ...\n  poll.ErrTimeout\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
    include:
    - src/net/*.go
- id: poll-package-decref-usage
  message: Detected decref call in poll package - reference counting for FD
  severity: INFO
  languages:
  - go
  pattern: $X.decref()
  metadata:
    category: basic
    nr_refactored_patterns: 30
    nr_legacy_patterns: 0
  paths:
