rules:
- id: old-typecheck-call-gc-package
  message: Old typecheck() call with context parameter found in gc package. Should
    be refactored to typecheck.Expr(), typecheck.Stmt(), or typecheck.AssignExpr().
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: typecheck($ARG, $CTX)
  - metavariable-pattern:
      metavariable: $CTX
      patterns:
      - pattern-either:
        - pattern: ctxExpr
        - pattern: ctxStmt
        - pattern: ctxType
        - pattern: ctxAssign
        - pattern: ctxCallee
        - pattern: ctxMultiOK
        - pattern: $X | $Y
        - pattern: $X & $Y
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 221
  paths:
    include:
    - src/cmd/compile/internal/gc/*.go
