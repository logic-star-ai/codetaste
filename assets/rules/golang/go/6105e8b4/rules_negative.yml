rules:
- id: cgo-test-multiple-files-import-c-pattern
  message: Multiple basic test files with import "C" still exist - consolidation not
    complete
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: 'import "C"

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - misc/cgo/test/align.go
    - misc/cgo/test/api.go
    - misc/cgo/test/basic.go
    - misc/cgo/test/cflags.go
    - misc/cgo/test/checkconst.go
    - misc/cgo/test/complex.go
- id: cgo-test-unconsolidated-issue3945
  message: issue3945.go should be consolidated into test.go
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - misc/cgo/test/issue3945.go
