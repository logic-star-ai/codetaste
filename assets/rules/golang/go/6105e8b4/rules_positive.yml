rules:
- id: multiple-test-functions-single-file
  message: Detected multiple test functions in single cgo file (consolidation)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'import "C"

      ...

      '
  - pattern-regex: (?s).*func\s+test\w+\s*\([^)]*\*testing\.T[^)]*\).*func\s+test\w+\s*\([^)]*\*testing\.T[^)]*\).*func\s+test\w+\s*\([^)]*\*testing\.T[^)]*\).*
  metadata:
    nr_refactored_patterns: 183
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/**/test*.go'
- id: consolidated-cgo-file-multiple-issues
  message: Detected consolidated cgo file with multiple issue references
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: 'import "C"

      '
  - pattern-regex: (?s).*//\s*[Ii]ssue\s+\d+.*//\s*[Ii]ssue\s+\d+.*//\s*[Ii]ssue\s+\d+.*
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/**/test*.go'
- id: c-preamble-multiple-includes
  message: 'Detected C preamble with multiple #include directives (consolidation)'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: (?s)/\*.*#include.*#include.*#include.*\*/\s*import\s+"C"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/**/test*.go'
- id: unix-specific-consolidated-file
  message: Detected Unix-specific consolidated cgo test file
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/test_unix.go'
- id: windows-specific-consolidated-file
  message: Detected Windows-specific consolidated cgo test file
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/test_windows.go'
- id: multiple-export-with-c-declarations
  message: Detected multiple Go export functions with corresponding C declarations
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: (?s).*//export\s+\w+.*//export\s+\w+.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/testx.go'
- id: test-go-consolidated-main-file
  message: Detected main consolidated test.go file
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/test.go'
