rules:
- id: consolidated-issue-organized-comments
  message: Detected issue number organization comments indicating consolidated code
    structure
  severity: INFO
  languages:
  - go
  pattern-regex: //\s*(issue|Issue|ISSUE)\s*#?[0-9]+.*\n[^/]*(//\s*(issue|Issue|ISSUE)\s*#?[0-9]+|func\s+test[0-9]+)
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/*.go'
- id: consolidated-issue-number-comment-sections
  message: Detected issue number comment organizing sections in C preamble
  severity: INFO
  languages:
  - go
  pattern-regex: (?s)/\*.*?//\s*issue\s*[0-9]+.*?//\s*issue\s*[0-9]+.*?//\s*issue\s*[0-9]+.*?\*/
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/*.go'
- id: consolidated-test-file-large-size
  message: Detected large consolidated test file (1000+ lines)
  severity: INFO
  languages:
  - go
  pattern-regex: (?s)(.{10000,})
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/test.go'
    - '**/cgo/test/testx.go'
- id: consolidated-test-go-file-exists
  message: Detected test.go file in cgo test directory indicating consolidation
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/test.go'
- id: consolidated-testx-go-file-exists
  message: Detected testx.go file in cgo test directory indicating export consolidation
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/testx.go'
- id: consolidated-test-unix-file-exists
  message: Detected test_unix.go file indicating platform-specific consolidation
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/test_unix.go'
- id: consolidated-test-windows-file-exists
  message: Detected test_windows.go file indicating platform-specific consolidation
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/test_windows.go'
- id: consolidated-ten-plus-test-functions
  message: Detected 10+ test functions in single file, indicating massive consolidation
  severity: INFO
  languages:
  - go
  pattern-regex: (?s)(func\s+test\w+\s*\([^)]*\)\s*\{.*?\n\}.*?){10,}
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/*.go'
    exclude:
    - '**/cgo/test/*_test.go'
    - '**/testdata/**'
- id: consolidated-build-constraints-pattern
  message: Detected build constraints in consolidated platform file
  severity: INFO
  languages:
  - go
  pattern-regex: //\s*\+build\s+
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/cgo/test/test_unix.go'
    - '**/cgo/test/test_windows.go'
    - '**/cgo/test/test_darwin.go'
    - '**/cgo/test/test_linux.go'
