- id: delayed-declaration-with-tempname
  message: Variable $VAR2 declared after tempname or regalloc call (delayed pattern)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'gc.Tempname(&$VAR, $TYPE)

        ...

        $VAR2 := ...

        '
    - pattern: 'regalloc(&$VAR, $TYPE, ...)

        ...

        $VAR2 := ...

        '
  - metavariable-regex:
      metavariable: $VAR2
      regex: ^(n1|n2|n3|n4|reg|reg1)$
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
