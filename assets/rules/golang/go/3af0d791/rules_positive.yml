rules:
- id: delayed-var-after-fatal
  message: Variable $VAR declared after Fatal check (delayed declaration)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func $FUNC(...) {\n  ...\n  if $COND {\n    gc.Fatal(...)\n \
      \ }\n  ...\n  $VAR := $EXPR\n  ...\n}\n"
  - pattern: $VAR := $EXPR
  - metavariable-regex:
      metavariable: $VAR
      regex: ^(n|nl|nr|n1|n2|n3|n4|r|t|l|p1|p2|p3|a|f|w|o|i|j)$
  metadata:
    category: basic
    nr_refactored_patterns: 82
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/5g/*.go
    - src/cmd/6g/*.go
    - src/cmd/8g/*.go
    - src/cmd/internal/gc/*.go
- id: delayed-var-in-bgen-function
  message: Variable $VAR declared in bgen function (delayed to point of use)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-inside: "func bgen($N *gc.Node, $TRUE $BOOL, $LIKELY int, $TO *obj.Prog)\
      \ {\n  ...\n  $VAR := $EXPR\n  ...\n}\n"
  - pattern: $VAR := $EXPR
  - metavariable-regex:
      metavariable: $VAR
      regex: ^(nl|nr|n1|n2|a|ll|lr|t|p1|p2)$
  metadata:
    category: basic
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - src/cmd/5g/*.go
    - src/cmd/6g/*.go
    - src/cmd/8g/*.go
