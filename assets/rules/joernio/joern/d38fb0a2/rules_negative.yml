rules:
- id: config-withinheritedfields-in-method
  message: Remove .withInheritedFields() call - use genericConfig member pattern
  severity: WARNING
  languages:
  - scala
  pattern: "def $METHOD(...): $R = {\n  ...\n  .withInheritedFields($ARG)\n  ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 56
- id: with-inherited-fields-in-copy
  message: Remove .withInheritedFields() call - configs should use genericConfig member
    with .copy() instead
  severity: WARNING
  languages:
  - scala
  pattern: copy(...).withInheritedFields($ARG)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: config-with-method-chaining-inherited
  message: Remove .withInheritedFields() - use genericConfig member pattern instead
  severity: WARNING
  languages:
  - scala
  patterns:
  - pattern-either:
    - pattern: copy(...).withInheritedFields(this)
    - pattern: copy(...).withInheritedFields($ARG)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: config-copy-withinheritedfields-pattern
  message: Remove .withInheritedFields() - return immutable copy with genericConfig
    member
  severity: WARNING
  languages:
  - scala
  patterns:
  - pattern-either:
    - pattern: copy($ARGS).withInheritedFields(this)
    - pattern: copy($ARGS).withInheritedFields($VAR)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
- id: config-case-class-no-genericconfig
  message: 'Config should have genericConfig: GenericConfig member instead of inheriting
    fields'
  severity: WARNING
  languages:
  - scala
  patterns:
  - pattern: "case class $CONFIG(...) extends X2CpgConfig[$CONFIG] {\n  ...\n}\n"
  - pattern-not: "case class $CONFIG(..., genericConfig: $GC, ...) extends X2CpgConfig[$CONFIG]\
      \ {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: extends-x2cpg-frontend-with-type-param
  message: Frontend should use dependent type member instead of type parameter in
    X2CpgFrontend
  severity: WARNING
  languages:
  - scala
  pattern: 'class $CLASS extends X2CpgFrontend[$CONFIG]

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: x2cpg-main-startup-method-call
  message: startup() method call indicates old HTTP server pattern - should use new
    server member
  severity: WARNING
  languages:
  - scala
  pattern: startup()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: object-extends-http-server-with-generics
  message: FrontendHTTPServer mixin should use dependent types instead of generic
    parameters
  severity: WARNING
  languages:
  - scala
  pattern: 'object $NAME extends X2CpgMain(...) with FrontendHTTPServer[$T, $X]

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: frontend-class-extends-x2cpgfrontend-generic
  message: Frontend class should use dependent type pattern instead of generic parameter
  severity: WARNING
  languages:
  - scala
  pattern: 'class $FRONTEND extends X2CpgFrontend[$CONFIG]

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: frontend-http-server-newdefaultconfig
  message: newDefaultConfig() method indicates old FrontendHTTPServer pattern
  severity: WARNING
  languages:
  - scala
  pattern: 'def newDefaultConfig(): $CONFIG = ...

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: with-method-mutation-return-this
  message: with* methods should return case class .copy() instead of mutating and
    returning this.asInstanceOf[R]
  severity: WARNING
  languages:
  - scala
  pattern: "def $METHOD($PARAMS): $R = {\n  ...\n  this.asInstanceOf[$R]\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: frontend-http-server-new-default-config
  message: 'Frontend should define ''val defaultConfig: ConfigType'' instead of newDefaultConfig()
    method'
  severity: WARNING
  languages:
  - scala
  pattern: 'override protected def newDefaultConfig(): $CONFIG = $CONFIG()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: config-inherits-x2cpgconfig-fields-directly
  message: Config should have genericConfig member instead of inheriting X2CpgConfig
    fields directly
  severity: WARNING
  languages:
  - scala
  patterns:
  - pattern: "case class $CONFIG(...) extends X2CpgConfig[$CONFIG] {\n  ...\n  def\
      \ $METHOD(...): $CONFIG = {\n    ...\n    copy(...).withInheritedFields(...)\n\
      \    ...\n  }\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: astgen-runner-base-extends
