rules:
- id: import-ray-util-sgd-v2-module
  message: Import of ray.util.sgd.v2 module should be changed to ray.train
  severity: WARNING
  languages:
  - python
  pattern: import ray.util.sgd.v2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 106
- id: import-from-sgd-v2-module-regex
  message: Import from ray.util.sgd.v2 should be changed to ray.train
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 96
- id: sgd-module-string-literal
  message: String literal 'ray.util.sgd.v2' should be 'ray.train'
  severity: WARNING
  languages:
  - python
  pattern: ray.util.sgd.v2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 80
- id: sgd-class-name-in-error-message
  message: Error message or string mentioning SGD* class should use Training*/Train*
    equivalent
  severity: INFO
  languages:
  - python
  pattern-regex: SGD(Iterator|WorkerGroup|Callback|BackendError)
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
- id: sgd-v2-in-toctree
  message: Sphinx toctree entry for raysgd/v2 should reference train
  severity: WARNING
  languages:
  - generic
  pattern-regex: raysgd/v2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - '*.rst'
- id: sgd-v2-backends-import
  message: Import from ray.util.sgd.v2.backends should be changed to ray.train.backends
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2\.backends
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: import-from-ray-util-sgd-v2-trainer
  message: Import Trainer from ray.train instead of ray.util.sgd.v2
  severity: WARNING
  languages:
  - python
  pattern: from ray.util.sgd.v2 import Trainer
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: sgd-v2-path-in-example-filename
  message: Example file in ray/util/sgd/v2/examples should be moved to ray/train/examples
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
  paths:
    include:
    - python/ray/util/sgd/v2/examples/**
- id: sgd-v2-path-generic
  message: Path reference ray/util/sgd/v2 should be changed to ray/train
  severity: WARNING
  languages:
  - generic
  pattern-regex: ray/util/sgd/v2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - '*.md'
    - '*.rst'
    - '*.txt'
- id: sgd-class-names-in-docs-generic
  message: SGD* class name in documentation should use Training*/Train* equivalent
  severity: WARNING
  languages:
  - generic
  pattern-regex: SGD(Iterator|WorkerGroup|Callback|BackendError)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - '*.md'
    - '*.rst'
- id: sgd-callback-docstring
  message: Reference to SGDCallback in code or docstring should use TrainingCallback
  severity: WARNING
  languages:
  - python
  pattern-regex: SGDCallback
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: sgd-backend-error-docstring
  message: Reference to SGDBackendError in code or docstring should use TrainBackendError
  severity: WARNING
  languages:
  - python
  pattern-regex: SGDBackendError
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: sgd-v2-examples-import
  message: Import from ray.util.sgd.v2.examples should be changed to ray.train.examples
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2\.examples
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: sgd-v2-callbacks-import
  message: Import from ray.util.sgd.v2.callbacks should be changed to ray.train.callbacks
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2\.callbacks
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: sgd-backend-error-class-usage
  message: SGDBackendError has been renamed to TrainBackendError in Ray Train refactoring
  severity: WARNING
  languages:
  - python
  pattern: SGDBackendError
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: sgd-v2-worker-group-import
  message: Import from ray.util.sgd.v2.worker_group should be changed to ray.train.worker_group
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2\.worker_group
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: sgd-class-string-literal-backend-error
  message: String literal 'SGDBackendError' should be 'TrainBackendError'
  severity: WARNING
  languages:
  - python
  pattern: SGDBackendError
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: import-sgd-v2-as-module-regex
  message: Import of ray.util.sgd.v2 module should be changed to ray.train
  severity: WARNING
  languages:
  - python
  pattern-regex: import\s+ray\.util\.sgd\.v2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: sgd-v2-constants-import
  message: Import from ray.util.sgd.v2.constants should be changed to ray.train.constants
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2\.constants
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: sgd-v2-utils-import
  message: Import from ray.util.sgd.v2.utils should be changed to ray.train.utils
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2\.utils
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: import-sgd-v2-with-alias
  message: Import ray.util.sgd.v2 module should import ray.train instead
  severity: WARNING
  languages:
  - python
  pattern: import ray.util.sgd.v2 as $ALIAS
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: import-specific-sgd-classes
  message: Import of SGD* class should import corresponding Training*/Train* class
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from $MOD import SGDIterator
    - pattern: from $MOD import SGDWorkerGroup
    - pattern: from $MOD import SGDCallback
    - pattern: from $MOD import SGDBackendError
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: sgd-v2-tests-path-filename
  message: Test file in ray/util/sgd/v2/tests should be moved to ray/train/tests
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - python/ray/util/sgd/v2/tests/**
- id: sgd-v2-in-sphinx-ref
  message: Sphinx reference to sgd v2 should reference train instead
  severity: WARNING
  languages:
  - generic
  pattern-regex: :ref:`[^`]*sgd[^`]*v2[^`]*`
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '*.rst'
    - '*.py'
- id: sgd-backend-error-raise
  message: Should raise TrainBackendError instead of SGDBackendError
  severity: WARNING
  languages:
  - python
  pattern: raise SGDBackendError(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: sgd-class-in-multi-import
  message: Import contains SGD* class name that should be renamed to Training*/Train*
    equivalent
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+\S+\s+import\s+.*SGD(Iterator|WorkerGroup|Callback|BackendError)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: sgd-callback-in-import-list
  message: Import list includes SGDCallback which should be TrainingCallback
  severity: WARNING
  languages:
  - python
  pattern-regex: import\s+[^\\n]*SGDCallback
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: sgd-iterator-docstring
  message: Reference to SGDIterator in code or docstring should use TrainingIterator
  severity: WARNING
  languages:
  - python
  pattern-regex: SGDIterator
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: sgd-callback-class-usage
  message: SGDCallback has been renamed to TrainingCallback in Ray Train refactoring
  severity: WARNING
  languages:
  - python
  pattern: SGDCallback
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sgd-v2-session-import
  message: Import from ray.util.sgd.v2.session should be changed to ray.train.session
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2\.session
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: import-sgd-callback-specific
  message: Import SGDCallback should import TrainingCallback instead
  severity: WARNING
  languages:
  - python
  pattern: from $MOD import SGDCallback
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sgd-v2-path-in-backends-filename
  message: Backend file in ray/util/sgd/v2/backends should be moved to ray/train/backends
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - python/ray/util/sgd/v2/backends/**
- id: sgd-callback-attribute-access
  message: Attribute access to SGDCallback should access TrainingCallback
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.SGDCallback
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sgd-class-string-literal-callback
  message: String literal 'SGDCallback' should be 'TrainingCallback'
  severity: WARNING
  languages:
  - python
  pattern: SGDCallback
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: sgd-backend-error-attribute-access
  message: Attribute access to SGDBackendError should access TrainBackendError
  severity: WARNING
  languages:
  - python
  pattern: $OBJ.SGDBackendError
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: sgd-v2-checkpoint-import
  message: Import from ray.util.sgd.v2.checkpoint should be changed to ray.train.checkpoint
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2\.checkpoint
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: sgd-worker-group-docstring
  message: Reference to SGDWorkerGroup in code or docstring should use TrainWorkerGroup
  severity: WARNING
  languages:
  - python
  pattern-regex: SGDWorkerGroup
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: sgd-v2-path-in-callbacks-filename
  message: Callback file in ray/util/sgd/v2/callbacks should be moved to ray/train/callbacks
  severity: WARNING
  languages:
  - python
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - python/ray/util/sgd/v2/callbacks/**
- id: sgd-iterator-class-usage
  message: SGDIterator has been renamed to TrainingIterator in Ray Train refactoring
  severity: WARNING
  languages:
  - python
  pattern: SGDIterator
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: sgd-callback-inheritance
  message: Class inheriting from SGDCallback should inherit from TrainingCallback
    instead
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(SGDCallback):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: sgd-datestring-comment
  message: Comment reference to 'sgd_<datestring>' pattern should use 'train_<datestring>'
  severity: WARNING
  languages:
  - python
  pattern-regex: sgd_<datestring>
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: ray-results-sgd-path
  message: Path reference to '~/ray_results/sgd_' should use 'train_' prefix
  severity: WARNING
  languages:
  - python
  pattern-regex: ~/ray_results/sgd_
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: sgd-v2-trainer-import
  message: Import from ray.util.sgd.v2.trainer should be changed to ray.train.trainer
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2\.trainer
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: multi-inheritance-with-sgd-callback
  message: Class inheriting from SGDCallback should inherit from TrainingCallback
  severity: WARNING
  languages:
  - python
  pattern: "class $CLASS($PARENT, SGDCallback):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: import-sgd-backend-error-specific
  message: Import SGDBackendError should import TrainBackendError instead
  severity: WARNING
  languages:
  - python
  pattern: from $MOD import SGDBackendError
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: sgd-class-string-literal-iterator
  message: String literal 'SGDIterator' should be 'TrainingIterator'
  severity: WARNING
  languages:
  - python
  pattern: SGDIterator
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: import-multiple-from-sgd-v2
  message: Multi-item import from ray.util.sgd.v2 should import from ray.train
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+ray\.util\.sgd\.v2\s+import\s+\w+,\s*\w+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: sgd-worker-group-class-usage
  message: SGDWorkerGroup has been renamed to TrainWorkerGroup in Ray Train refactoring
  severity: WARNING
  languages:
  - python
  pattern: SGDWorkerGroup
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-iterator-instantiation
  message: SGDIterator instantiation should use TrainingIterator instead
  severity: WARNING
  languages:
  - python
  pattern: $VAR = SGDIterator(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-callback-list-type-annotation
  message: Type annotation List[SGDCallback] should be changed to List[TrainingCallback]
  severity: WARNING
  languages:
  - python
  pattern: List[SGDCallback]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-callback-optional-list-type-annotation
  message: Type annotation Optional[List[SGDCallback]] should be changed to Optional[List[TrainingCallback]]
  severity: WARNING
  languages:
  - python
  pattern: Optional[List[SGDCallback]]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-iterator-return-statement
  message: Should return TrainingIterator instance instead of SGDIterator
  severity: WARNING
  languages:
  - python
  pattern: return SGDIterator(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-result-detailed-env-var
  message: Environment variable SGD_RESULT_ENABLE_DETAILED_AUTOFILLED_METRICS should
    be renamed to TRAIN_RESULT_ENABLE_DETAILED_AUTOFILLED_METRICS
  severity: WARNING
  languages:
  - python
  pattern-regex: SGD_RESULT_ENABLE_DETAILED_AUTOFILLED_METRICS
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-share-cuda-env-var
  message: Environment variable SGD_ENABLE_SHARE_CUDA_VISIBLE_DEVICES should be renamed
    to TRAIN_ENABLE_SHARE_CUDA_VISIBLE_DEVICES
  severity: WARNING
  languages:
  - python
  pattern-regex: SGD_ENABLE_SHARE_CUDA_VISIBLE_DEVICES
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-log-dir-fstring-literal
  message: Log directory f-string with 'sgd_' prefix should use 'train_' prefix instead
  severity: WARNING
  languages:
  - python
  pattern-regex: f"sgd_\{[^}]+\}"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-log-dir-path-string
  message: Log directory format string with 'sgd_' prefix should use 'train_' prefix
  severity: WARNING
  languages:
  - python
  pattern-regex: sgd_\{
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-training-execution-comment
  message: Comment about 'SGD training execution' should reference 'Train execution'
    or 'training execution'
  severity: WARNING
  languages:
  - python
  pattern-regex: SGD\s+training\s+execution
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: class-definition-sgd-iterator
  message: Class definition SGDIterator should be renamed to TrainingIterator
  severity: WARNING
  languages:
  - python
  pattern: "class SGDIterator:\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: class-definition-sgd-worker-group
  message: Class definition SGDWorkerGroup should be renamed to TrainWorkerGroup
  severity: WARNING
  languages:
  - python
  pattern: "class SGDWorkerGroup:\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: class-definition-sgd-callback
  message: Class definition SGDCallback should be renamed to TrainingCallback
  severity: WARNING
  languages:
  - python
  pattern: "class SGDCallback:\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: class-definition-sgd-backend-error
  message: Class definition SGDBackendError should be renamed to TrainBackendError
  severity: WARNING
  languages:
  - python
  pattern: "class SGDBackendError(...):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-v2-path-in-yaml
  message: Path reference ray/util/sgd/v2 should be changed to ray/train
  severity: WARNING
  languages:
  - yaml
  pattern-regex: ray/util/sgd/v2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-result-env-constant-assignment
  message: Environment variable constant SGD_RESULT_ENABLE_DETAILED_AUTOFILLED_METRICS
    should be TRAIN_RESULT_ENABLE_DETAILED_AUTOFILLED_METRICS
  severity: WARNING
  languages:
  - python
  pattern: $VAR = "SGD_RESULT_ENABLE_DETAILED_AUTOFILLED_METRICS"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-cuda-env-constant-assignment
  message: Environment variable constant SGD_ENABLE_SHARE_CUDA_VISIBLE_DEVICES should
    be TRAIN_ENABLE_SHARE_CUDA_VISIBLE_DEVICES
  severity: WARNING
  languages:
  - python
  pattern: $VAR = "SGD_ENABLE_SHARE_CUDA_VISIBLE_DEVICES"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-iterator-function-return
  message: Function returning SGDIterator instance should return TrainingIterator
  severity: WARNING
  languages:
  - python
  pattern: "def $FUNC(...):\n    ...\n    return SGDIterator(...)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-worker-group-function-return
  message: Function returning SGDWorkerGroup instance should return TrainWorkerGroup
  severity: WARNING
  languages:
  - python
  pattern: "def $FUNC(...):\n    ...\n    return SGDWorkerGroup(...)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-callback-optional-parameter
  message: Parameter with type Optional[List[SGDCallback]] should use Optional[List[TrainingCallback]]
  severity: WARNING
  languages:
  - python
  pattern: "def $FUNC(..., callbacks: Optional[List[SGDCallback]], ...):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: iterator-equals-sgd-iterator
  message: Variable assignment to SGDIterator should use TrainingIterator
  severity: WARNING
  languages:
  - python
  pattern: $VAR = SGDIterator(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: import-sgd-iterator-specific
  message: Import SGDIterator should import TrainingIterator instead
  severity: WARNING
  languages:
  - python
  pattern: from $MOD import SGDIterator
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-prefix-format-string
  message: String literal with sgd_ prefix should use train_ prefix
  severity: WARNING
  languages:
  - python
  pattern-regex: '"sgd_\{[^}]+\}"'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sgd-class-in-all-export
  message: __all__ export list includes SGD* class names that should be updated to
    Training*/Train* equivalents
  severity: WARNING
  languages:
  - python
  pattern-regex: __all__.*SGD(Iterator|WorkerGroup|Callback|BackendError)
  metadata:
