rules:
- id: kwarg-policy-graph
  message: Function called with keyword argument 'policy_graph'. Should use 'policy'
    instead.
  severity: WARNING
  languages:
  - python
  pattern: $FUNC(..., policy_graph=$VAL, ...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: class-definition-policy-graph
  message: Class inherits from old 'PolicyGraph' class. Should inherit from 'Policy'
    instead.
  severity: WARNING
  languages:
  - python
  pattern: "class $CLASS(PolicyGraph):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: function-call-with-policy-graph-arg
  message: Function call passing 'policy_graph' as positional argument. Variable should
    be renamed to 'policy'.
  severity: WARNING
  languages:
  - python
  pattern: $FUNC(..., policy_graph, ...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: function-param-policy-graph
  message: Function parameter 'policy_graph' detected. Should be renamed to 'policy'.
  severity: WARNING
  languages:
  - python
  pattern: "def $FUNC(..., policy_graph, ...):\n    ...\n"
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: attribute-underscore-policy-graph
  message: Private attribute '_policy_graph' detected. Should be renamed to '_policy'.
  severity: WARNING
  languages:
  - python
  pattern: $OBJ._policy_graph
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: init-method-tfpolicygraph-super
  message: Direct call to 'TFPolicyGraph.__init__'. Should call 'TFPolicy.__init__'
    instead.
  severity: WARNING
  languages:
  - python
  pattern: "def __init__(...):\n    ...\n    TFPolicyGraph.__init__(...)\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: import-learningrateschedule-from-evaluation-tf
  message: Import of 'LearningRateSchedule' from old 'evaluation.tf_policy_graph'
    module. Should import from 'policy.tf_policy' instead.
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: from ray.rllib.evaluation.tf_policy_graph import LearningRateSchedule
  - pattern: from ray.rllib.evaluation.tf_policy_graph import $X, LearningRateSchedule
  - pattern: from ray.rllib.evaluation.tf_policy_graph import $X, LearningRateSchedule,
      $Y
  - pattern: from ray.rllib.evaluation.tf_policy_graph import LearningRateSchedule,
      $X
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: call-with-underscore-policy-graph
  message: Function call with 'self._policy_graph' argument. Should use 'self._policy'
    instead.
  severity: WARNING
  languages:
  - python
  pattern: $FUNC(..., self._policy_graph, ...)
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: assignment-policy-graph
  message: Variable assignment to 'policy_graph' detected. Should use 'policy' instead.
  severity: WARNING
  languages:
  - python
  pattern: 'policy_graph = ...

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
