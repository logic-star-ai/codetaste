rules:
- id: ppo-trainer-reference-non-stub
  message: Reference to 'PPOTrainer' should use new class name 'PPO'
  severity: WARNING
  languages:
  - python
  pattern-regex: \bPPOTrainer\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 105
  paths:
    exclude:
    - rllib/agents/ppo/__init__.py
    - rllib/agents/*/tests/*
- id: import-multiple-from-agents-ppo
  message: Import from 'ray.rllib.agents.ppo' should use 'ray.rllib.algorithms.ppo'
    or appropriate algorithm subdirectory
  severity: WARNING
  languages:
  - python
  pattern: from ray.rllib.agents.ppo import $X
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
- id: trainers-dir-bazel-tag
  message: Bazel tag 'trainers_dir' should be renamed to 'algorithms_dir'
  severity: WARNING
  languages:
  - generic
  pattern-regex: trainers_dir
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
  paths:
    include:
    - '*.bazel'
    - BUILD
    - BUILD.bazel
- id: vtrace-functions-in-agents-impala
  message: VTrace functions in agents/impala should be moved to algorithms/impala
  severity: INFO
  languages:
  - python
  pattern-regex: \bvtrace_\w+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - rllib/agents/impala/vtrace*.py
- id: import-ppo-trainer-from-agents
  message: Import 'PPOTrainer' from 'ray.rllib.agents.ppo' should be changed to import
    'PPO' from 'ray.rllib.algorithms.ppo'
  severity: WARNING
  languages:
  - python
  pattern: from ray.rllib.agents.ppo import PPOTrainer
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: import-agents-impala-module
  message: Import 'ray.rllib.agents.impala' should be changed to 'ray.rllib.algorithms.impala'
  severity: WARNING
  languages:
  - python
  pattern: import ray.rllib.agents.impala
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
- id: ppo-trainer-in-comment
  message: Comment/docstring reference to 'PPOTrainer' should use 'PPO'
  severity: INFO
  languages:
  - python
  pattern-regex: (#|"""|'\').*PPOTrainer
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 18
  paths:
    exclude:
    - rllib/agents/ppo/__init__.py
    - rllib/agents/*/tests/*
- id: import-agents-ppo-as-alias
  message: Import 'ray.rllib.agents.ppo' should be changed to 'ray.rllib.algorithms.ppo'
  severity: WARNING
  languages:
  - python
