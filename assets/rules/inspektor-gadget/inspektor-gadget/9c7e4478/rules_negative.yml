rules:
- id: arch-specific-ifdef-vmlinux-old
  message: Architecture-specific vmlinux includes should use <gadget/{amd64,arm64}/vmlinux.h>
  severity: WARNING
  languages:
  - c
  pattern: '#ifdef __TARGET_ARCH_$ARCH

    ...

    #include <vmlinux/vmlinux.h>

    ...

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 849
  paths:
    include:
    - '**/*.bpf.c'
- id: bpf-with-bpf-helpers-and-old-vmlinux
  message: Standard BPF includes should use <gadget/{amd64,arm64}/vmlinux.h>
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: '#include <vmlinux/vmlinux.h>

      #include <bpf/bpf_helpers.h>

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 746
  paths:
    include:
    - '**/*.bpf.c'
- id: bpf-file-with-ifdef-old-includes
  message: Conditional includes should use <gadget/mntns_filter.h> format
  severity: WARNING
  languages:
  - c
  pattern: '#ifdef $COND

    #include "mntns_filter.h"

    ...

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 446
  paths:
    include:
    - '**/*.bpf.c'
- id: bpf-file-with-ifdef-filesystem-old
  message: Conditional includes should use <gadget/filesystem.h> format
  severity: WARNING
  languages:
  - c
  pattern: '#ifdef $COND

    #include "filesystem.h"

    ...

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
  paths:
    include:
    - '**/*.bpf.c'
- id: bpf-include-common-header-any-variant
  message: All common header includes should use <gadget/*.h> format
  severity: WARNING
  languages:
  - c
  pattern-regex: '#include\s+[<"](?!gadget/)(types|mntns_filter|maps\.bpf|bits\.bpf|core_fixes\.bpf|filesystem)\.h[>"]'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
  paths:
    include:
    - '**/*.bpf.c'
- id: old-include-vmlinux-h
  message: Header include path should be updated to <gadget/amd64/vmlinux.h> or <gadget/arm64/vmlinux.h>
  severity: WARNING
  languages:
  - c
  pattern: '#include <vmlinux/vmlinux.h>'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: old-include-pattern-vmlinux-any-path
  message: vmlinux.h include should use <gadget/amd64/vmlinux.h> or <gadget/arm64/vmlinux.h>
  severity: WARNING
  languages:
  - c
  pattern-regex: '#include\s+<vmlinux/vmlinux\.h>'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
- id: bpf-file-vmlinux-before-helpers
  message: vmlinux include should use <gadget/{amd64,arm64}/vmlinux.h> format
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: '#include <vmlinux/vmlinux.h>

      ...

      #include <bpf/bpf_helpers.h>

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
  paths:
    include:
    - '**/*.bpf.c'
- id: vmlinux-slash-pattern-anywhere
  message: All vmlinux includes should use <gadget/{amd64,arm64}/vmlinux.h> format
  severity: WARNING
  languages:
  - c
  pattern-regex: '#include\s+<vmlinux/vmlinux\.h>'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 34
  paths:
    include:
    - '**/*.c'
    - '**/*.h'
- id: bpf-c-file-includes-vmlinux-old-format
  message: 'vmlinux include should use new format: <gadget/{amd64,arm64}/vmlinux.h>'
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: '#include <vmlinux/vmlinux.h>'
  - pattern-inside: '...

      #include <bpf/bpf_helpers.h>

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - '**/*.bpf.c'
- id: any-bpf-file-vmlinux-slash-path
  message: All BPF files should use <gadget/{amd64,arm64}/vmlinux.h> instead of <vmlinux/vmlinux.h>
  severity: WARNING
  languages:
  - c
  pattern: '#include <vmlinux/vmlinux.h>'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - '**/*.bpf.c'
    - '**/*.bpf.h'
- id: go-generate-with-target-arch-path
  message: go:generate directives should use ${CFLAGS} variable for architecture-specific
    includes
  severity: WARNING
  languages:
  - go
  pattern-regex: //go:generate.*-I.*\$\{TARGET\}
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: bpf-c-file-includes-common-header-old
  message: 'Common gadget headers should use new include format: <gadget/*.h>'
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: '#include "mntns_filter.h"'
    - pattern: '#include "maps.bpf.h"'
    - pattern: '#include "bits.bpf.h"'
    - pattern: '#include "core_fixes.bpf.h"'
  - pattern-inside: '...

      #include <bpf/bpf_helpers.h>

      ...

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
  paths:
    include:
    - '**/*.bpf.c'
- id: gadget-bpf-includes-quoted-common-header
  message: Gadget BPF files should use <gadget/*.h> format instead of quoted includes
    for common headers
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern-either:
    - pattern: '#include "types.h"'
    - pattern: '#include "mntns_filter.h"'
    - pattern: '#include "maps.bpf.h"'
    - pattern: '#include "bits.bpf.h"'
    - pattern: '#include "core_fixes.bpf.h"'
    - pattern: '#include "filesystem.h"'
  - pattern-not: '#include <gadget/$FILE>'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
  paths:
    include:
    - pkg/gadgets/**/*.bpf.c
- id: any-gadget-vmlinux-old-format
  message: Gadget BPF files should use <gadget/{amd64,arm64}/vmlinux.h> instead of
    <vmlinux/vmlinux.h>
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: '#include <vmlinux/vmlinux.h>'
  - pattern-not: '#include <gadget/amd64/vmlinux.h>'
  - pattern-not: '#include <gadget/arm64/vmlinux.h>'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
  paths:
    include:
    - pkg/gadgets/**/*.bpf.c
- id: gadget-tracer-bpf-dir-old-includes
  message: All gadget tracer BPF files should use <gadget/*.h> format
  severity: WARNING
  languages:
  - c
  pattern-either:
  - pattern: '#include "types.h"'
  - pattern: '#include "mntns_filter.h"'
  - pattern: '#include "filesystem.h"'
  - pattern: '#include "maps.bpf.h"'
  - pattern: '#include "bits.bpf.h"'
  - pattern: '#include "core_fixes.bpf.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
  paths:
    include:
    - pkg/gadgets/**/tracer/bpf/*.bpf.c
- id: bpf-tracing-header-with-vmlinux-old
  message: Files with bpf_tracing.h should use <gadget/{amd64,arm64}/vmlinux.h>
  severity: WARNING
  languages:
  - c
  patterns:
  - pattern: '#include <vmlinux/vmlinux.h>

      ...

      #include <bpf/bpf_tracing.h>

