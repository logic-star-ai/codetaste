rules:
- id: android-widget-package-import
  message: android.widget or android.view import suggests XML View usage - migrate
    to Compose UI
  severity: WARNING
  languages:
  - kotlin
  patterns:
  - pattern-either:
    - pattern: import android.widget.$_
    - pattern: import android.view.$_
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: view-import-android
  message: android.view.View import suggests XML/Fragment usage - migrate to Compose
    UI
  severity: WARNING
  languages:
  - kotlin
  pattern: import android.view.View
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: navigation-component-fragment-import
  message: Navigation Component Fragment imports - migrate to Compose Navigation
  severity: WARNING
  languages:
  - kotlin
  patterns:
  - pattern-either:
    - pattern: import androidx.navigation.fragment.$_
    - pattern: import androidx.navigation.NavDirections
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: fragment-inheritance
  message: Fragment inheritance detected - migrate to Compose Screen pattern
  severity: WARNING
  languages:
  - kotlin
  pattern: 'class $CLASS : BaseFragment()

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: composeview-in-fragment
  message: ComposeView usage in Fragment detected - migrate to pure Composable
  severity: WARNING
  languages:
  - kotlin
  pattern: 'ComposeView(requireContext())

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: require-context-in-fragment
  message: requireContext() suggests Fragment usage - migrate to Compose with context
    from LocalContext
  severity: WARNING
  languages:
  - kotlin
  pattern: requireContext()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: fragment-inheritance-basefragment
  message: Fragment inheritance detected - migrate to Compose Screen pattern
  severity: WARNING
  languages:
  - kotlin
  patterns:
  - pattern: 'class $CLASS : BaseFragment()

      '
  - pattern-not: 'class $CLASS : ComponentActivity()

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: composeview-fragment
  message: ComposeView usage in Fragment detected - migrate to pure Composable
  severity: WARNING
  languages:
  - kotlin
  pattern: ComposeView(requireContext())
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: require-context
  message: requireContext() suggests Fragment usage - migrate to Compose with context
    from LocalContext
  severity: WARNING
  languages:
  - kotlin
  pattern: requireContext()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: navmanager-import
  message: NavManager import should be removed - use Compose Navigation
  severity: WARNING
  languages:
  - kotlin
  pattern: import com.igorwojda.showcase.feature.base.presentation.nav.NavManager
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: basefragment-import
  message: BaseFragment import should be removed - use @Composable functions
  severity: WARNING
  languages:
  - kotlin
  pattern: import $PKG.BaseFragment
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: viewgroup-import
  message: ViewGroup import suggests Fragment usage - migrate to Compose layout system
  severity: WARNING
  languages:
  - kotlin
  pattern: import android.view.ViewGroup
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: compose-composeview-import
  message: ComposeView import suggests Fragment wrapping Compose - migrate to pure
    Composable
  severity: WARNING
  languages:
  - kotlin
  pattern: import androidx.compose.ui.platform.ComposeView
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: material-components-view-import
  message: Material Components View import - migrate to Compose Material3 components
  severity: WARNING
  languages:
  - kotlin
  pattern: import com.google.android.material.$PKG.$VIEW
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: fragment-import-androidx
  message: Fragment import detected - migrate to Compose navigation
  severity: WARNING
  languages:
  - kotlin
  pattern: 'import androidx.fragment.app.Fragment

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: fragment-ktx-import
  message: Fragment KTX import detected - remove Fragment dependency
  severity: WARNING
  languages:
  - kotlin
  pattern: 'import androidx.fragment.app.Fragment

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: fragment-import
  message: Fragment import detected - migrate to Compose navigation
  severity: WARNING
  languages:
  - kotlin
  patterns:
  - pattern-either:
    - pattern: import androidx.fragment.app.Fragment
    - pattern: import androidx.fragment.app.$_
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: core-view-isvisible-usage
  message: View.isVisible extension suggests XML View usage - use conditional rendering
    in Compose
  severity: WARNING
  languages:
  - kotlin
  pattern: $VIEW.isVisible
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: navdirections-import
  message: NavDirections import suggests SafeArgs usage - migrate to NavigationRoute
    sealed interface
  severity: WARNING
  languages:
  - kotlin
  pattern: import androidx.navigation.NavDirections
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: safeargs-plugin-dependency
  message: SafeArgs plugin should be removed - use Compose Navigation with NavigationRoute
  severity: WARNING
  languages:
  - generic
  pattern-regex: safeArgs|safe-args|androidx\.navigation\.safeargs
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '**/*.gradle.kts'
    - '**/*.gradle'
- id: baseviewmodel-generic-types
  message: BaseViewModel with generic types detected - verify migration to proper
    state management
  severity: WARNING
  languages:
  - kotlin
  patterns:
  - pattern: 'class $VM(...) : BaseViewModel<UiState, Action>(...)

      '
  - pattern-not: 'class $VM(...) : ViewModel(...)

      '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: safeargs-generated-directions-class
  message: SafeArgs generated Directions class should be replaced with NavigationRoute
    sealed interface
  severity: WARNING
  languages:
  - kotlin
  pattern: 'AlbumListFragmentDirections

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: safeargs-directions-action-call
  message: SafeArgs action call should be replaced with type-safe NavigationRoute
  severity: WARNING
  languages:
  - kotlin
  patterns:
  - pattern-either:
    - pattern: AlbumListFragmentDirections.actionAlbumListToAlbumDetail(...)
    - pattern: AlbumDetailFragmentDirections.$ACTION(...)
    - pattern: FavouriteFragmentDirections.$ACTION(...)
    - pattern: ProfileFragmentDirections.$ACTION(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: baseactivity-import
  message: BaseActivity import should be removed - extend ComponentActivity directly
  severity: WARNING
  languages:
  - kotlin
  pattern: import $PKG.BaseActivity
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: r-id-reference-navigation
  message: R.id reference to navigation graph suggests SafeArgs usage - migrate to
    Compose Navigation
  severity: WARNING
  languages:
  - kotlin
  patterns:
  - pattern-either:
    - pattern: R.id.albumNavGraph
    - pattern: R.id.profileNavGraph
    - pattern: R.id.favouriteNavGraph
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: searchview-import
  message: SearchView import should be removed - use SearchBar composable
  severity: WARNING
  languages:
  - kotlin
  pattern: import android.widget.SearchView
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: koin-navgraph-viewmodel-import
  message: koinNavGraphViewModel import for Fragment navigation - use koinViewModel()
    with Compose Navigation
  severity: WARNING
  languages:
  - kotlin
  pattern: import org.koin.androidx.navigation.koinNavGraphViewModel
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: findnavcontroller-call
  message: findNavController() suggests Fragment navigation - use NavController from
    Compose rememberNavController()
  severity: WARNING
  languages:
  - kotlin
  pattern: findNavController()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: view-updatelayoutparams-usage
  message: View.updateLayoutParams suggests XML View manipulation - use Compose modifiers
  severity: WARNING
  languages:
  - kotlin
  pattern: $VIEW.updateLayoutParams
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: androidx-core-view-import
  message: androidx.core.view import suggests View extensions usage - migrate to Compose
  severity: WARNING
  languages:
  - kotlin
  pattern: import androidx.core.view.$_
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: appcompat-activity-import
  message: AppCompatActivity import - use ComponentActivity with Compose
  severity: WARNING
  languages:
  - kotlin
  pattern: import androidx.appcompat.app.AppCompatActivity
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: fragment-oncreateview-method
  message: Fragment onCreateView detected - migrate to @Composable function
  severity: WARNING
  languages:
  - kotlin
  pattern: 'override fun onCreateView(...): View = ...

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fragment-onviewcreated-method
  message: Fragment onViewCreated detected - migrate to @Composable function
  severity: WARNING
  languages:
  - kotlin
  pattern: "override fun onViewCreated($VIEW: View, $BUNDLE: Bundle?) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: fragment-extension-file
  message: FragmentExt.kt should be removed - Fragment extensions no longer needed
    with Compose
  severity: WARNING
  languages:
  - kotlin
  pattern-regex: \A[\s\S]*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/FragmentExt.kt'
- id: fragment-class-albumlist
