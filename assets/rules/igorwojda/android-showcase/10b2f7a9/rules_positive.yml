rules:
- id: compose-navigation-import
  message: Detected androidx.navigation.compose import - Compose navigation library
  severity: INFO
  languages:
  - kotlin
  pattern: 'import androidx.navigation.compose.$ITEM

    '
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: icon-with-content-description
  message: Detected Icon with contentDescription - accessibility in Compose
  severity: INFO
  languages:
  - kotlin
  patterns:
  - pattern: "Icon(\n  ...,\n  contentDescription = $DESC\n)\n"
  - pattern-inside: "@Composable\nfun $FUNC(...) {\n  ...\n}\n"
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
