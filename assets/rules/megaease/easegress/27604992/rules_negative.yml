rules:
- id: proxy-server-url-field-usage
  message: Server URL field access should use unified Server from proxies package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $SRV.URL
  - metavariable-regex:
      metavariable: $SRV
      regex: .*
  metadata:
    category: abstraction
    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
  paths:
    include:
    - pkg/filters/proxy/*.go
