    category: api
    nr_refactored_patterns: 20
    nr_legacy_patterns: 0
- id: commands-method-call-in-tests
  message: Detected Commands method call in test files (refactored from GitCommandHelpers)
  severity: INFO
  languages:
  - csharp
  pattern-either:
  - pattern: Commands.CherryPick(...)
  - pattern: Commands.SubmoduleUpdate(...)
  - pattern: Commands.Reset(...)
  - pattern: Commands.Clone(...)
  - pattern: Commands.Branch(...)
  metadata:
    category: api
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
