rules:
- id: commands-in-formprocess-arguments-named
  message: Detected Commands method as named arguments parameter (refactored from
    GitCommandHelpers)
  severity: INFO
  languages:
  - csharp
  pattern: 'FormProcess.ShowDialog(..., arguments: Commands.$METHOD(...), ...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: commands-with-gitargumentbuilder-return
  message: Detected Commands method returning GitArgumentBuilder (refactored from
    GitCommandHelpers)
  severity: INFO
  languages:
  - csharp
  pattern: "public static ArgumentString $METHOD(...)\n{\n  return new GitArgumentBuilder(...)\
    \ { ... };\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 26
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/Commands*.cs'
- id: commands-rebase-method-call
  message: Detected Commands.Rebase() call (refactored from GitCommandHelpers.RebaseCmd)
  severity: INFO
  languages:
