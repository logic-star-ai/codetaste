  severity: WARNING
  languages:
  - csharp
  pattern: "namespace $NAMESPACE\n{\n  ...\n  public static class GitCommandHelpers\
    \ { ... }\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: skip-cmd-suffix
  message: Method 'SkipCmd' should be renamed to 'Skip' and class should be 'Commands'
  severity: WARNING
  languages:
  - csharp
  pattern: 'GitCommandHelpers.SkipCmd(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: gitcommandhelpers-constructor-call
  message: Constructor call with 'GitCommandHelpers' should use 'Commands' class instead
  severity: WARNING
  languages:
  - csharp
  pattern: 'new $TYPE(..., GitCommandHelpers.$METHOD(...), ...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: gitcommandhelpers-class-name-in-path
  message: File named 'GitCommandHelpers.cs' should be renamed to match the new class
    structure (Commands.Arguments.cs)
  severity: WARNING
  languages:
  - csharp
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/GitCommandHelpers.cs'
