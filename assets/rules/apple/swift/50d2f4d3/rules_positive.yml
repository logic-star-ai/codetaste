rules:
- id: llvm-optional-raw-pointer
  message: llvm::Optional with raw pointer type (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern-regex: llvm::Optional<\w+\s+\*>
  metadata:
    category: basic
    nr_refactored_patterns: 98
    nr_legacy_patterns: 0
- id: llvm-none-comparison-not-equal
  message: Not-equal comparison with llvm::None using explicit namespace (refactoring
    applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: $VAR != llvm::None
  metadata:
    category: basic
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: llvm-optional-with-bool
  message: llvm::Optional with bool type (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: llvm::Optional<bool>
  metadata:
    category: basic
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: llvm-none-comparison-regex
  message: Comparison with llvm::None (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern-regex: \w+\s*(==|!=)\s*llvm::None
  metadata:
    category: basic
    nr_refactored_patterns: 13
    nr_legacy_patterns: 0
- id: llvm-none-comparison-equal
  message: Comparison with llvm::None using explicit namespace (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: $VAR == llvm::None
  metadata:
    category: basic
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: llvm-optional-reference-return-type
  message: Function returns llvm::Optional reference with explicit namespace (refactoring
    applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: llvm::Optional<$TYPE> &$FUNC(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: llvm-optional-vector-element
  message: Vector or array element assigned llvm::None (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: $VEC[$IDX] = llvm::None
  metadata:
    category: basic
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: llvm-optional-const-reference-return-type
  message: Function returns const llvm::Optional reference with explicit namespace
    (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: const llvm::Optional<$TYPE> &$FUNC(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: llvm-optional-const-return-type
  message: Function returns const llvm::Optional with explicit namespace (refactoring
    applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: const llvm::Optional<$TYPE> $FUNC(...) { ... }
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: llvm-optional-with-unsigned
  message: llvm::Optional with unsigned type (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: llvm::Optional<unsigned>
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: llvm-optional-template-arg-regex
  message: Template with llvm::Optional parameter (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern-regex: template\s*<[^>]*llvm::Optional<[^>]+>[^>]*>
  metadata:
    category: basic
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: llvm-optional-return-type-with-const-regex
  message: Const llvm::Optional return type with explicit namespace (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern-regex: const\s+llvm::Optional<[^>]+>\s*&?\s+\w+\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: llvm-optional-with-identifier
  message: llvm::Optional with Swift Identifier (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: llvm::Optional<Identifier>
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: llvm-optional-with-stringref
  message: llvm::Optional with StringRef (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: llvm::Optional<StringRef>
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: llvm-optional-push-back
  message: Vector push_back with llvm::None (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: $VEC.push_back(llvm::None)
  metadata:
    category: basic
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: llvm-optional-platformkind
  message: llvm::Optional with PlatformKind (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: llvm::Optional<PlatformKind>
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: llvm-optional-emplace-back
  message: Vector emplace_back with llvm::None (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: $VEC.emplace_back(llvm::None)
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: llvm-optional-array-initializer
  message: Array initializer with multiple llvm::None values (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern-regex: \{\s*llvm::None\s*,\s*llvm::None\s*
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: llvm-optional-arrayref-type
  message: llvm::Optional with llvm::ArrayRef (refactoring applied)
  severity: INFO
  languages:
  - cpp
  - c
  pattern: llvm::Optional<llvm::ArrayRef<$TYPE>>
  metadata:
    category: basic
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
