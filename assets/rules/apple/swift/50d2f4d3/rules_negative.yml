rules:
- id: none-literal-return-statement
  message: Use llvm::None instead of None in return statements
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: return None;
  - pattern-not: return llvm::None;
  - pattern-not: return std::nullopt;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1420
  paths:
    exclude:
    - stdlib/
    - tools/SourceKit/tools/sourcekitd/
    - tools/SourceKit/lib/SwiftLang/CodeCompletionOrganizer.cpp
- id: optional-variable-no-init
  message: Use llvm::Optional<T> instead of Optional<T> in variable declarations
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: Optional<$TYPE> $VAR;
  - pattern-not: llvm::Optional<$TYPE> $VAR;
  - pattern-not: std::optional<$TYPE> $VAR;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 641
  paths:
    include:
    - include/swift/
    - lib/
    exclude:
    - stdlib/
    - lib/Demangling/Demangler.cpp
    - lib/Frontend/CachingUtils.cpp
    - tools/
- id: optional-variable-with-init
  message: Use llvm::Optional<T> instead of Optional<T> in variable declarations with
    initialization
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: Optional<$TYPE> $VAR = $INIT;
  - pattern-not: llvm::Optional<$TYPE> $VAR = $INIT;
  - pattern-not: std::optional<$TYPE> $VAR = $INIT;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 205
  paths:
    include:
    - include/swift/
    - lib/
    exclude:
    - stdlib/
    - tools/
- id: none-literal-assignment-swift-code
  message: Use llvm::None instead of None to make namespace explicit
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: $VAR = None
  - pattern-not: $VAR = llvm::None
  - pattern-not: $VAR = std::nullopt
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 137
  paths:
    exclude:
    - stdlib/
    - tools/SourceKit/lib/SwiftLang/CodeCompletionOrganizer.cpp
    - lib/Demangling/Demangler.cpp
    - include/swift/AST/DeclContext.h
- id: none-as-third-call-arg
  message: Use llvm::None instead of None in function calls
  severity: WARNING
  languages:
  - cpp
  pattern: $FUNC($ARG1, $ARG2, None, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 82
  paths:
    exclude:
    - stdlib/
    - tools/SourceKit/
    - lib/Serialization/
- id: none-as-second-call-arg
  message: Use llvm::None instead of None in function calls
