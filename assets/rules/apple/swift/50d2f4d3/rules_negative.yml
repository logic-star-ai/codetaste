- id: optional-in-using-declaration
  message: Use llvm::Optional<T> instead of Optional<T> in using declarations
  severity: WARNING
  languages:
  - cpp
  patterns:
  - pattern: using $NAME = Optional<$TYPE>;
  - pattern-not: using $NAME = llvm::Optional<$TYPE>;
  - pattern-not: using $NAME = std::optional<$TYPE>;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    exclude:
    - stdlib/
