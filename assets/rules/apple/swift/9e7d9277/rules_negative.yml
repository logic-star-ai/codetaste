  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: size_t\s+numElements\s*;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: swift-bridgeddiagengine-old-type
