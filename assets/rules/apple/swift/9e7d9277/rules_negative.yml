rules:
- id: cpp-old-style-bridged-function-definition
  message: 'Old C-style bridging function definition detected: should use C++ methods
    after consolidation'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: ^\s*Bridged\w+\s+\w+_\w+\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
  paths:
    include:
    - '*/CASTBridging.cpp'
    - '*/CBasicBridging.cpp'
- id: swift-old-bridging-mode-comment
  message: 'Reference to old bridging module detected in comments: should be updated
    to ASTBridging or BasicBridging'
  severity: INFO
  languages:
  - swift
  pattern-regex: CASTBridging|CBasicBridging
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - '*.swift'
- id: swift-import-castbridging-module
  message: 'Old import detected: ''import CASTBridging'' should be replaced with ''import
    ASTBridging'' after module consolidation'
  severity: WARNING
  languages:
  - swift
  pattern: import CASTBridging
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: swift-castbridging-string-reference
  message: 'Reference to CASTBridging detected: should be replaced with ASTBridging'
  severity: WARNING
  languages:
  - swift
  pattern-regex: CASTBridging
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: swift-import-swiftsyntax-with-old-bridging
  message: 'Old bridging import pattern with SwiftSyntax detected: should use new
    module names'
  severity: WARNING
  languages:
  - swift
  pattern-regex: import\s+CASTBridging[\s\S]{0,200}import\s+SwiftSyntax
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: cpp-bridgedstring-usage-old
  message: 'Old type name detected: ''BridgedString'' should be renamed to ''BridgedStringRef'''
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: BridgedString\s+\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: cpp-bridgeddiagengine-old-type
  message: 'Old type name detected: ''BridgedDiagEngine'' should be renamed to ''BridgedDiagnosticEngine'''
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: BridgedDiagEngine\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: cpp-function-bridgedstring-parameter
  message: 'Function with BridgedString parameter detected: should be updated to BridgedStringRef'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: \w+\s*\([^)]*BridgedString\s+\w+[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: swift-import-cbasicbridging-module
  message: 'Old import detected: ''import CBasicBridging'' should be replaced with
    ''import BasicBridging'' after module consolidation'
  severity: WARNING
  languages:
  - swift
  pattern: import CBasicBridging
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: cpp-comment-castbridging-reference
  message: 'Reference to old CASTBridging file detected in code or comments: should
    be updated to ASTBridging'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: CASTBridging\.(h|cpp)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: swift-cbasicbridging-string-reference
  message: 'Reference to CBasicBridging detected: should be replaced with BasicBridging'
  severity: WARNING
  languages:
  - swift
  pattern-regex: CBasicBridging
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: cpp-return-bridged-struct-initializer
  message: 'Old C-style struct initializer return detected: verify C++ compatibility
    after consolidation'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: return\s+\{[^}]*\}\s*;
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*/CASTBridging.cpp'
    - '*/CBasicBridging.cpp'
- id: swift-import-swiftdiagnostics-with-old-bridging
  message: 'Old bridging import pattern with SwiftDiagnostics detected: should use
    new module names'
  severity: WARNING
  languages:
  - swift
  pattern-regex: import\s+CASTBridging[\s\S]{0,200}import\s+SwiftDiagnostics
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: cpp-bridged-raw-pointer-cast
  message: 'Old-style raw pointer cast pattern detected: verify C++ interop compatibility'
  severity: INFO
  languages:
  - cpp
  pattern-regex: static_cast<\w+\s*\*>\s*\(\w+\.raw\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '*/CASTBridging.cpp'
- id: cpp-include-castbridging-header
  message: 'Old include detected: CASTBridging.h header has been merged into ASTBridging.h'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: '#include "swift/AST/CASTBridging.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: cpp-include-castbridging-in-cpp-file
  message: 'Include of CASTBridging.h detected: should be replaced with ASTBridging.h'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+"swift/AST/CASTBridging\.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: cpp-cast-unbridged-pattern
  message: 'Old-style cast with unbridged() pattern detected: verify C++ interop compatibility'
  severity: INFO
  languages:
  - cpp
  pattern-regex: static_cast<[^>]+>\s*\(\s*unbridged\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*/CASTBridging.cpp'
- id: cpp-bridged-helper-return-pattern
  message: 'Old-style bridged() helper return pattern detected: verify C++ interop
    compatibility'
  severity: INFO
  languages:
  - cpp
  pattern-regex: return\s+bridged\s*\(\s*static_cast
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*/CASTBridging.cpp'
- id: cpp-nullable-annotation-bridging
  message: 'Nullability annotations in old bridging code: verify if needed with C++
    interop'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: _Nullable|_Nonnull
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - '*/CASTBridging.h'
    - '*/CBasicBridging.h'
- id: cpp-ast-bridging-wrapper-macro-usage
  message: 'Old AST_BRIDGING_WRAPPER macro definition detected: should be replaced
    with BRIDGING_WRAPPER_* macros'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: '#define\s+AST_BRIDGING_WRAPPER'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*/CASTBridging.*'
- id: swift-bridgedstring-old-type
  message: 'Old type name detected: ''BridgedString'' should be renamed to ''BridgedStringRef'''
  severity: WARNING
  languages:
  - swift
  pattern: 'BridgedString

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: cpp-comment-cbasicbridging-reference
  message: 'Reference to old CBasicBridging file detected in code or comments: should
    be updated to BasicBridging'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: CBasicBridging\.(h|cpp)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: cpp-swift-c-basic-basicbridging-h-guard
  message: 'Old header guard ''SWIFT_C_BASIC_BASICBRIDGING_H'' detected: should be
    updated for consolidated header'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: SWIFT_C_BASIC_BASICBRIDGING_H
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/CBasicBridging.h'
- id: cpp-astbridgingwrappers-def-include-old
  message: 'Include of ASTBridgingWrappers.def in old context: verify usage after
    C++ interop consolidation'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+"swift/AST/ASTBridgingWrappers\.def"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/CASTBridging.*'
- id: cpp-maybe-unused-attribute
  message: '[[maybe_unused]] attribute in old bridging code: verify if still needed
    after consolidation'
  severity: INFO
  languages:
  - cpp
  pattern-regex: \[\[maybe_unused\]\]
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - '*/CASTBridging.cpp'
- id: cmake-cbasicbridging-target
  message: 'Old CMake target detected: ''CBasicBridging'' references should be updated
    to ''BasicBridging'''
  severity: WARNING
  languages:
  - generic
  pattern-regex: CBasicBridging
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - CMakeLists.txt
    - '*.cmake'
- id: cpp-bridged-unbridged-functions
  message: 'Old unbridged() function pattern detected: verify if this needs updating
    for C++ interop'
  severity: INFO
  languages:
  - cpp
  pattern-regex: static\s+\w+\s+\*\s*unbridged\s*\(\s*Bridged
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/CASTBridging.cpp'
- id: cpp-module-name-cbasicbridging-comment
  message: 'Comment references old CBasicBridging file: should be updated to BasicBridging'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: //.*CBasicBridging\.(h|cpp)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: generic-text-cbasicbridging-reference
  message: 'Text reference to ''CBasicBridging'' detected: should be updated to ''BasicBridging'''
  severity: INFO
  languages:
  - generic
  pattern-regex: \bCBasicBridging\b
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*.txt'
    - '*.md'
    - '*.rst'
- id: cmake-cbasicbridging-cpp-source-generic
  message: 'CMake references CBasicBridging.cpp source file: file should be removed
    after consolidation'
  severity: WARNING
  languages:
  - generic
  pattern-regex: CBasicBridging\.cpp
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - CMakeLists.txt
    - '*.cmake'
- id: cpp-inflightdiagnostic-usage-in-bridging
  message: 'InFlightDiagnostic usage in old bridging detected: verify implementation
    after consolidation'
  severity: INFO
  languages:
  - cpp
  pattern-regex: InFlightDiagnostic\s+\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/CASTBridging.cpp'
- id: cpp-declnodes-def-include-bridging
  message: 'Include of DeclNodes.def in old bridging context: verify usage after consolidation'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '#include\s+"swift/AST/DeclNodes\.def"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/CASTBridging.*'
- id: cpp-stringref-textblobs-vector
  message: 'textBlobs vector usage in old bridging implementation: verify if needed
    after consolidation'
  severity: INFO
  languages:
  - cpp
  pattern-regex: std::vector<StringRef>\s+textBlobs
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/CASTBridging.cpp'
- id: cpp-old-c-bridging-layer-file-header
  message: 'Old bridging file header detected: file should be consolidated'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-regex: ===---\s*[CBasicBridging|CASTBridging]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/CASTBridging.*'
    - '*/CBasicBridging.*'
- id: cpp-decl-macro-expansion-pattern
  message: 'DECL macro pattern in old bridging: verify if needs updating for C++ interop'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '#define\s+DECL\s*\(\s*Id\s*,\s*Parent\s*\)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/CASTBridging.*'
- id: cpp-typerepr-macro-expansion-pattern
  message: 'TYPEREPR macro pattern in old bridging: verify if needs updating for C++
    interop'
  severity: INFO
  languages:
  - c
  - cpp
  pattern-regex: '#define\s+TYPEREPR\s*\(\s*Id\s*,\s*Parent\s*\)'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/CASTBridging.*'
- id: cpp-include-cbasicbridging-header
  message: 'Old include detected: CBasicBridging.h header has been merged into BasicBridging.h'
  severity: WARNING
  languages:
  - c
  - cpp
  pattern: '#include "swift/Basic/CBasicBridging.h"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: detect-removed-cbasicbridging-header-file
  message: 'Removed file detected: CBasicBridging.h should be deleted as part of module
    consolidation'
  severity: ERROR
  languages:
  - c
  - cpp
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - include/swift/Basic/CBasicBridging.h
- id: detect-removed-castbridging-cpp-file
  message: 'Removed file detected: CASTBridging.cpp should be deleted as part of module
    consolidation'
  severity: ERROR
  languages:
  - cpp
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - lib/AST/CASTBridging.cpp
- id: detect-removed-cbasicbridging-cpp-file
  message: 'Removed file detected: CBasicBridging.cpp should be deleted as part of
    module consolidation'
  severity: ERROR
  languages:
  - cpp
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - lib/Basic/CBasicBridging.cpp
- id: cpp-struct-field-numelements
