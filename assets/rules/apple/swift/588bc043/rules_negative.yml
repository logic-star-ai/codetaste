rules:
- id: old-dak-enum-usage
  message: Replace unscoped enum 'DAK_*' with scoped enum 'DeclAttrKind::*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bDAK_[A-Z][A-Za-z0-9_]*\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 501
- id: old-tak-enum-usage
  message: Replace unscoped enum 'TAK_*' with scoped enum 'TypeAttrKind::*'
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bTAK_[a-z_][A-Za-z0-9_]*\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 103
- id: old-attr-def-include
  message: Replace 'Attr.def' include with 'DeclAttr.def' or 'TypeAttr.def' based
    on usage
  severity: WARNING
  languages:
  - cpp
  pattern-regex: '#\s*include\s+"swift/AST/Attr\.def"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
- id: old-dak-count-usage
  message: Replace 'DAK_Count' with 'NumDeclAttrKinds' constant or use 'llvm::Optional<DeclAttrKind>'
    for invalid values
  severity: WARNING
  languages:
  - cpp
  pattern-regex: \bDAK_Count\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 37
