- id: swifttool-guard-binding
  message: Guard binding 'guard let ... = swiftTool' should use 'swiftCommandState'
  severity: WARNING
  languages:
  - swift
  pattern-regex: \bguard\s+let\s+\w+\s*=\s*swiftTool\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: swifttool-single-line-comment
  message: Single-line comment containing 'SwiftTool' should be updated to 'SwiftCommandState'
  severity: INFO
  languages:
  - swift
  pattern-regex: //.*\bSwiftTool\b
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: swifttool-filter-transformation
  message: Filter closure with swiftTool should use swiftCommandState
  severity: INFO
  languages:
  - swift
  pattern-regex: \.filter\s*\{[^}]*swiftTool[^}]*\}
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: swifttool-first-where-closure
  message: First(where:) closure with swiftTool should use swiftCommandState
