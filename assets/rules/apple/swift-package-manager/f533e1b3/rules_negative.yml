- id: swifttool-return-type
  message: Function return type '-> SwiftTool' should be changed to '-> SwiftCommandState'
  severity: WARNING
  languages:
  - swift
  pattern-regex: ->\s*SwiftTool\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: swifttool-throws-return-type
  message: Throwing function return type 'throws -> SwiftTool' should be changed to
    'throws -> SwiftCommandState'
  severity: WARNING
  languages:
  - swift
  pattern-regex: throws\s+->\s*SwiftTool\b
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
