  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 82
- id: swifttool-function-call-argument
  message: 'swiftTool: SwiftTool parameter should be renamed to swiftCommandState:
    SwiftCommandState'
  severity: WARNING
  languages:
  - swift
  pattern-regex: \bswiftTool\s*:\s*SwiftTool\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 80
- id: swifttool-protocol-method-requirement
