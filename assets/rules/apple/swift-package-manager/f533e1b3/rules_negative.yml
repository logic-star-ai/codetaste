  severity: WARNING
  languages:
  - swift
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/SwiftSDKTool.swift'
