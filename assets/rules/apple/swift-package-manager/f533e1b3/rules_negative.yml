    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: packagetools-cmake-add-library
  message: CMake add_library with PackageTools should use PackageCommands
  severity: WARNING
  languages:
  - generic
  pattern-regex: add_library\([^)]*PackageTools[^)]*\)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/CMakeLists.txt'
- id: swifttool-try-optional
  message: Try? expression with swiftTool should use swiftCommandState
  severity: INFO
  languages:
  - swift
  pattern-regex: \btry\?\s+.*swiftTool
  metadata:
