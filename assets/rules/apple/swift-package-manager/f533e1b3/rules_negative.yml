  message: Try expression with swiftTool should use swiftCommandState
  severity: INFO
  languages:
  - swift
  pattern-regex: \btry\s+.*swiftTool
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 157
- id: swifttool-parameter-name
  message: swiftTool parameter should be renamed to swiftCommandState
  severity: WARNING
  languages:
  - swift
  pattern-regex: '\bswiftTool\s*:'
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 118
- id: swifttool-any-context
  message: SwiftTool reference should be renamed to SwiftCommandState
  severity: WARNING
