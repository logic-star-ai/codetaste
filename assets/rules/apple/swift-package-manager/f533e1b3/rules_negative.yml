rules:
- id: swifttool-member-access
  message: swiftTool member access should use swiftCommandState instead
  severity: WARNING
  languages:
  - swift
  pattern-regex: \bswiftTool\.
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 282
