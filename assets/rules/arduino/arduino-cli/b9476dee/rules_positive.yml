rules:
- id: internalized-i18n-import-detected
  message: Detected import of internalized i18n module at new path internal/i18n
  severity: INFO
  languages:
  - go
  pattern: 'import "github.com/arduino/arduino-cli/internal/i18n"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 64
    nr_legacy_patterns: 0
- id: internal-i18n-import-in-multiline-block
  message: Detected internal/i18n import in multi-import block
  severity: INFO
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/arduino/arduino-cli/internal/i18n\"\n\
    \  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 64
    nr_legacy_patterns: 0
- id: any-go-file-imports-internal-i18n
  message: Detected any Go file importing i18n from internal path
  severity: INFO
  languages:
  - go
  pattern: 'import "github.com/arduino/arduino-cli/internal/i18n"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 64
    nr_legacy_patterns: 0
- id: internal-i18n-import-multiline-with-other-imports
  message: Detected internal/i18n in multiline import block (not old path)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"github.com/arduino/arduino-cli/internal/i18n\"\n\
      \  ...\n)\n"
  - pattern-not: "import (\n  \"github.com/arduino/arduino-cli/i18n\"\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 64
    nr_legacy_patterns: 0
- id: go-files-with-internal-i18n-import-path
  message: Detected Go file with internal/i18n import path string
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/arduino/arduino-cli/internal/i18n
  metadata:
    category: structural
    nr_refactored_patterns: 64
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
- id: internal-i18n-go-mod-style-path-reference
  message: Detected reference to internal/i18n module path
  severity: INFO
  languages:
  - generic
