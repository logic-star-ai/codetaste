  metadata:
    category: structural
    nr_refactored_patterns: 64
    nr_legacy_patterns: 0
- id: any-import-from-internal-directory-i18n
  message: Detected import from internal/i18n (any format)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'import "github.com/arduino/arduino-cli/internal/i18n"

        '
    - pattern: "import (\n  ...\n  \"github.com/arduino/arduino-cli/internal/i18n\"\
        \n  ...\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 64
    nr_legacy_patterns: 0
