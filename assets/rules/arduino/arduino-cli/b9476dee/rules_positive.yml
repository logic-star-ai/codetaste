  severity: INFO
  languages:
  - go
  pattern: 'import "github.com/arduino/arduino-cli/internal/i18n"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - internal/arduino/security/signatures*.go
