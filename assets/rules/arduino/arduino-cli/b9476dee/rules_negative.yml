rules:
- id: old-i18n-import-path
  message: Import path 'github.com/arduino/arduino-cli/i18n' should be updated to
    'github.com/arduino/arduino-cli/internal/i18n'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/arduino/arduino-cli/i18n"

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
- id: old-i18n-import-in-block
  message: Import path 'github.com/arduino/arduino-cli/i18n' in import block should
    be updated to 'github.com/arduino/arduino-cli/internal/i18n'
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/arduino/arduino-cli/i18n\"\n  ...\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
- id: i18n-import-block-with-other-imports
  message: Import block contains old 'i18n' path without new 'internal/i18n' path
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"github.com/arduino/arduino-cli/i18n\"\n  ...\n\
      )\n"
  - pattern-not: "import (\n  ...\n  \"github.com/arduino/arduino-cli/internal/i18n\"\
      \n  ...\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
- id: any-go-file-old-i18n-single-import
  message: Go file contains old 'i18n' import path, should use 'internal/i18n'
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/arduino/arduino-cli/i18n"

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
- id: any-go-file-old-i18n-import-in-multiline
