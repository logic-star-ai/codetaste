  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/arduino/arduino-cli/i18n\"\n  ...\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
- id: old-i18n-import-parenthesized
  message: Single-line import block with old 'i18n' path, should use 'internal/i18n'
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "import (\n  \"github.com/arduino/arduino-cli/i18n\"\n)\n"
  - pattern-not: "import (\n  \"github.com/arduino/arduino-cli/internal/i18n\"\n)\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
