rules:
- id: gradle-source-target-compatibility-8
  message: Gradle file sets Java compatibility to 1.8. Should be updated to Java 11
    compatibility.
  severity: ERROR
  languages:
  - generic
  pattern-regex: (sourceCompatibility|targetCompatibility)\s*=\s*["\x27]?1\.8["\x27]?
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
  paths:
    include:
    - '**/*.gradle'
- id: circleci-machine-executor-ubuntu-old
  message: CircleCI config uses old Ubuntu 20.04 image. Should be updated to Ubuntu
    22.04 or use docker executor instead.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: 'image:\s*ubuntu-2004:'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - .circleci/config.yml
- id: circleci-ubuntu-2004-image
  message: CircleCI config uses Ubuntu 20.04 machine image. Should be updated to Ubuntu
    22.04 or converted to docker executor.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: 'image:\s*ubuntu-2004:'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - .circleci/config.yml
- id: circleci-machine-with-image
  message: CircleCI job uses machine executor with Ubuntu 20.04 image. Should be converted
    to docker executor with Ubuntu 22.04 base image.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: 'machine:\s*\n\s+image:\s*ubuntu-2004:'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - .circleci/config.yml
- id: circleci-ubuntu-2004-202201-image
  message: CircleCI uses specific Ubuntu 20.04 image from 2022-01. Should be updated
    to Ubuntu 22.04 or docker executor.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: ubuntu-2004:202201-02
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - .circleci/config.yml
- id: gradle-no-daemon-option
  message: Gradle execution uses --no-daemon option. Ensure this is appropriate for
    new docker executor environment.
  severity: INFO
  languages:
  - yaml
  pattern-regex: --no-daemon
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - .circleci/config.yml
- id: gradle-stacktrace-info-options
  message: Gradle execution uses --stacktrace --info for verbose output. Verify this
    is needed in new pipeline.
  severity: INFO
  languages:
  - yaml
  pattern-regex: --stacktrace\s+--info
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - .circleci/config.yml
- id: old-scripts-in-root-scripts-dir
  message: Old helper script exists in scripts/ directory. Should be reorganized into
    scripts/circleci/ modular structure or moved to scripts/old/.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - scripts/circle-helpers.sh
    - scripts/circle-build.sh
- id: gradle-parallel-option
  message: Gradle execution uses --parallel option. Ensure this works correctly with
    new docker executor resources.
  severity: INFO
  languages:
  - yaml
  pattern-regex: --parallel
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - .circleci/config.yml
- id: circleci-working-directory-repo
  message: CircleCI job sets working_directory to ~/repo. Ensure this is consistent
    across new docker executors.
  severity: INFO
  languages:
  - yaml
  pattern-regex: working_directory:\s*~/repo
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - .circleci/config.yml
- id: shell-script-old-helper-functions-reference
  message: Script references old helper scripts (circle-helpers.sh or circle-build.sh).
    These should be reorganized into scripts/circleci/ modular structure.
  severity: WARNING
  languages:
  - bash
  pattern-regex: (circle-helpers\.sh|circle-build\.sh)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/*.sh
    - scripts/*.sh
- id: circleci-resource-class-undefined
  message: Job uses gradle-docker executor which references deprecated rundeck/ci
    image. Should be converted to use docker executor with cimg images.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: executor:\s*gradle-docker
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/config.yml
- id: circleci-job-uses-gradle-docker-executor
  message: Job uses 'gradle-docker' executor which is deprecated (uses rundeck/ci
    image). Convert to use docker executor with cimg/base:2023.09-22.04 or similar.
  severity: ERROR
  languages:
  - yaml
  pattern-regex: ^\s{4}executor:\s*gradle-docker
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/config.yml
- id: old-scripts-circle-build-file-exists
  message: Old circle-build.sh script exists in scripts/ directory. Should be moved
    to scripts/old/ and functionality migrated to scripts/circleci/build-functions.sh.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - scripts/circle-build.sh
- id: circleci-cimg-node-lts-unversioned
  message: CircleCI job uses unversioned 'cimg/node:lts' image. Should use specific
    version like node:16.20.2 or cimg/base with explicit Node installation.
  severity: INFO
  languages:
  - yaml
  pattern-regex: image:\s*cimg/node:lts\s*$
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/config.yml
- id: circleci-gradle-opts-in-executor
  message: CircleCI executor defines RUNDECK_GRADLE_OPTS. Verify this is needed in
    new docker-based executors vs old gradle-docker executor.
  severity: INFO
  languages:
  - yaml
  pattern-regex: RUNDECK_GRADLE_OPTS:[\s\S]{0,200}--no-daemon --max-workers
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/config.yml
- id: circleci-job-definition-with-machine-true
  message: 'Job definition uses ''machine: true''. Should be converted to docker executor
    for consistency and performance.'
  severity: WARNING
  languages:
  - yaml
  pattern-regex: ^\s{2}[a-z][a-z0-9-]+:\s*\n[\s\S]{0,50}machine:\s*true
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/config.yml
- id: circleci-job-attach-workspace-artifacts
  message: Job attaches workspace at 'artifacts' directory. Ensure this is compatible
    with new artifact handling (removed S3 syncing).
  severity: INFO
  languages:
  - yaml
  pattern-regex: attach_workspace:[\s\S]{0,50}at:\s*artifacts
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/config.yml
- id: circleci-find-artifacts-war-files
  message: CircleCI step finds war files in artifacts directory. Ensure this works
    with new artifact handling via workspaces.
  severity: INFO
  languages:
  - yaml
  pattern-regex: find\s+artifacts.*\.war
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/config.yml
- id: gradle-publish-to-maven-local
  message: Gradle command includes publishToMavenLocal. Ensure this works correctly
    with Java 11 build artifacts.
  severity: INFO
  languages:
  - yaml
  pattern-regex: publishToMavenLocal
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/config.yml
- id: gradle-x-check-option
  message: Gradle execution uses '-x check' option to skip checks. Verify this is
    appropriate for new Java 11 build.
  severity: INFO
  languages:
  - yaml
  pattern-regex: -x\s+check
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/config.yml
- id: circleci-filters-tags-only
  message: CircleCI workflow uses tag filters. Ensure tag-based builds work correctly
    in new pipeline.
  severity: INFO
  languages:
  - yaml
  pattern-regex: 'filters:[\s\S]{0,50}tags:[\s\S]{0,50}only:'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - .circleci/config.yml
- id: circleci-rundeck-ci-image-reference
  message: CircleCI config uses deprecated 'rundeck/ci' Docker image. Should be replaced
    with 'cimg/base:2023.09-22.04' or similar.
  severity: ERROR
  languages:
  - yaml
  pattern-regex: image:\s*rundeck/ci
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-old-browser-tools-orb
  message: CircleCI config uses old browser-tools orb version (1.4.3 or earlier).
    Should be updated to 1.4.6 or later.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: browser-tools:\s*circleci/browser-tools@1\.4\.[0-5]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: dockerfile-java8-jdk-headless
  message: Dockerfile installs openjdk-8 headless packages. Should be updated to openjdk-11-jdk-headless
    or openjdk-11-jre-headless.
  severity: ERROR
  languages:
  - dockerfile
  pattern-regex: openjdk-8-jdk-headless|openjdk-8-jre-headless
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/Dockerfile*'
- id: shell-script-java8-home-path
  message: Script references Java 8 home directory. Should be updated to Java 11 path
    (e.g., /usr/lib/jvm/java-11).
  severity: WARNING
  languages:
  - bash
  pattern-regex: (JAVA_HOME.*java-8|/usr/lib/jvm/java-8|/usr/lib/jvm/java-1\.8\.0)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*.sh'
- id: circleci-executor-definition-rundeck-ci
  message: CircleCI executor definition uses 'rundeck/ci' image. Should be replaced
    with standard cimg images like 'cimg/base:2023.09-22.04'.
  severity: ERROR
  languages:
  - yaml
  pattern-regex: executors:[\s\S]{0,500}image:\s*rundeck/ci@sha256:[a-f0-9]+
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: gradle-node-plugin-version-3-1-1
  message: Gradle build uses node-gradle plugin version 3.1.1. Should be updated to
    version 7.0.1 for Java 11 compatibility.
  severity: WARNING
  languages:
  - generic
  pattern-regex: id\s+"com\.github\.node-gradle\.node"\s+version\s+"3\.1\.1"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*.gradle'
- id: gradle-node-plugin-old-version-pattern
  message: Gradle build uses old node-gradle plugin version (1.x, 2.x, or 3.x). Should
    be updated to version 7.0.1.
  severity: WARNING
  languages:
  - generic
  pattern-regex: id\s+"com\.github\.node-gradle\.node"\s+version\s+"[123]\.
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*.gradle'
- id: gradle-buildscript-old-node-plugin
  message: Gradle buildscript uses old node-gradle plugin version 3.0.x or 3.1.x.
    Should be updated to 7.0.1.
  severity: WARNING
  languages:
  - generic
  pattern-regex: classpath\s+"com\.github\.node-gradle:gradle-node-plugin:3\.[01]\.
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*.gradle'
- id: circleci-browser-tools-1-4-3
  message: CircleCI config uses browser-tools orb version 1.4.3. Should be updated
    to 1.4.6 or later.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: browser-tools:\s*circleci/browser-tools@1\.4\.3
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-nightly-workflow-duplicate
  message: CircleCI config contains separate nightly workflow. Should be consolidated
    with main workflows.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: nightly:[\s\S]{200,}
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: shell-script-hardcoded-jvm-path
  message: Script contains hardcoded JVM path that may reference Java 8. Should be
    updated to dynamically detect Java 11.
  severity: WARNING
  languages:
  - bash
  pattern-regex: (/usr/lib/jvm/java-8|/usr/java/jdk1\.8|JAVA_HOME=/usr/lib/jvm/default-java\s+)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '**/*.sh'
- id: circleci-config-rundeck-ci-sha-reference
  message: CircleCI config references rundeck/ci Docker image with SHA256. This custom
    image should be replaced with cimg/base:2023.09-22.04.
  severity: ERROR
  languages:
  - yaml
  pattern-regex: rundeck/ci@sha256:[a-f0-9]{64}
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-executor-gradle-docker-definition
  message: Executor 'gradle-docker' defined using rundeck/ci image. Should be removed
    and replaced with standard docker executors using cimg images.
  severity: ERROR
  languages:
  - yaml
  pattern-regex: 'gradle-docker:[\s\S]{0,300}docker:[\s\S]{0,100}- image: rundeck/ci'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-docker-publish-old-orb
  message: CircleCI config uses old docker-publish orb version 0.1.x. Should be updated
    to newer version or replaced with standard docker commands.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: docker-publish:\s*circleci/docker-publish@0\.1\.
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-workflow-complex-nightly-jobs
  message: CircleCI config has complex workflow structure with separate nightly workflow.
    Should be consolidated per the refactoring (~1000 → ~700 lines).
  severity: WARNING
  languages:
  - yaml
  pattern-regex: workflows:[\s\S]{500,}nightly:[\s\S]{300,}
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-executors-section-with-rundeck-ci
  message: CircleCI executors section defines 'gradle-docker' executor using deprecated
    rundeck/ci image. Should be removed and jobs converted to use docker executor.
  severity: ERROR
  languages:
  - yaml
  pattern-regex: 'executors:\s*\n\s+gradle-docker:'
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: old-scripts-circle-helpers-file-exists
  message: Old circle-helpers.sh script exists in scripts/ directory. Should be moved
    to scripts/old/ and functionality migrated to scripts/circleci/ modular structure.
  severity: WARNING
  languages:
  - bash
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - scripts/circle-helpers.sh
- id: circleci-workflow-filters-main-branch
  message: CircleCI workflow uses branch filters. Ensure workflow consolidation is
    complete and filters are properly maintained in new structure.
  severity: INFO
  languages:
  - yaml
  pattern-regex: filters:[\s\S]{0,100}branches:[\s\S]{0,50}only:[\s\S]{0,50}- main
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-job-twistlock-scan-machine
  message: 'Twistlock scan job uses ''machine: true'' executor. Should be converted
    to docker executor per the refactoring.'
  severity: WARNING
  languages:
  - yaml
  pattern-regex: twistlock-scan.*:[\s\S]{0,200}machine:\s*true
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-parameters-unused-upstream
  message: CircleCI config defines upstream parameters. Verify these are still needed
    with new simplified pipeline structure.
  severity: INFO
  languages:
  - yaml
  pattern-regex: parameters:[\s\S]{0,300}CIRCLE_UPSTREAM_PIPELINE_NUMBER
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-working-directory-defaults
  message: CircleCI config uses 'defaults' anchor with working_directory. Verify this
    pattern is needed in new docker-based pipeline structure.
  severity: INFO
  languages:
  - yaml
  pattern-regex: defaults:\s*&defaults[\s\S]{0,100}working_directory:\s*~/repo
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-environment-in-defaults
  message: CircleCI defaults section defines environment variables. Should be simplified
    in new pipeline structure.
  severity: INFO
  languages:
  - yaml
  pattern-regex: defaults:\s*&defaults[\s\S]{0,200}environment:[\s\S]{0,100}CIRCLE_PIPELINE_NUM
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-resource-class-in-executor-params
  message: Executor defines resourceClass parameter. Verify this is needed in new
    docker-based executors replacing gradle-docker.
  severity: INFO
  languages:
  - yaml
  pattern-regex: parameters:[\s\S]{0,200}resourceClass:[\s\S]{0,100}default:\s*medium
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-rundeck-gradle-opts-parameter
  message: Executor defines RUNDECK_GRADLE_OPTS parameter. Should be simplified in
    new docker executor structure.
  severity: INFO
  languages:
  - yaml
  pattern-regex: RUNDECK_GRADLE_OPTS:[\s\S]{0,50}type:\s*string
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-command-aws-install
  message: CircleCI defines 'aws-install' command. Machine-wide AWS CLI should be
    removed - only ECR is needed for Docker registry.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: ^\s{2}aws-install:\s*$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-command-package-cloud-install
  message: CircleCI defines 'package-cloud-install' command. Verify this is needed
    in new docker-based executors.
  severity: INFO
  languages:
  - yaml
  pattern-regex: ^\s{2}package-cloud-install:\s*$
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-command-install-java
  message: CircleCI defines 'install-java' command. With Java 11 base images, this
    should be built into docker images instead.
  severity: WARNING
  languages:
  - yaml
  pattern-regex: ^\s{2}install-java:\s*$
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-command-setup-environment
  message: CircleCI defines 'setup-environment' command. This should be simplified
    in new modular script structure (scripts/circleci/setup.sh).
  severity: INFO
  languages:
  - yaml
  pattern-regex: ^\s{2}setup-environment:\s*$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-command-fetch-ci-resources
  message: CircleCI defines 'fetch-ci-resources' command. Verify this is compatible
    with new workspace-based artifact handling (no S3).
  severity: INFO
  languages:
  - yaml
  pattern-regex: ^\s{2}fetch-ci-resources:\s*$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-build-job-name
  message: CircleCI defines generic 'build' job. Ensure job naming is clear and consistent
    with new pipeline structure.
  severity: INFO
  languages:
  - yaml
  pattern-regex: ^\s{2}build:\s*$
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-upstream-env-anchor
  message: CircleCI defines upstream-env anchor. Verify this is needed in simplified
    pipeline without complex upstream parameters.
  severity: INFO
  languages:
  - yaml
  pattern-regex: upstream-env:\s*&upstream
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - .circleci/config.yml
- id: circleci-command-restore-gradle-cache
  message: CircleCI defines 'restore-gradle-cache' command. Verify cache keys are
    compatible with new Java 11 builds.
  severity: INFO
  languages:
  - yaml
  pattern-regex: ^\s{2}restore-gradle-cache:\s*$
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
