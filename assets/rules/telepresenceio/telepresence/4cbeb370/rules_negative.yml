  severity: WARNING
  languages:
  - go
  pattern: $CACHE.Intercept
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - pkg/client/cli/**/*.go
    exclude:
    - pkg/client/cli/cloud/*.go
    - pkg/client/cli/intercept/*.go
- id: cli-util-nextcheck-field-assignment
  message: NextCheck field assignment in util. Should be in cloud package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CHECKER.NextCheck = $VALUE
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - pkg/client/cli/util/*.go
- id: cli-util-url-field-on-updatechecker
  message: url field access on UpdateChecker in util. Should be in cloud package
  severity: WARNING
  languages:
  - go
  pattern: $CHECKER.url
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - pkg/client/cli/util/*.go
- id: cli-util-socket-daemon-name-usage
  message: DaemonName socket reference in util. Daemon management should be in connect
    or daemon package
  severity: WARNING
  languages:
  - go
  pattern: socket.DaemonName
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - pkg/client/cli/util/*.go
- id: cli-userdaemon-return-type
  message: Function return type UserDaemon. Should use daemon.UserClient instead
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func $FUNC(...) UserDaemon { ... }

        '
    - pattern: 'func $FUNC(...) *UserDaemon { ... }

        '
    - pattern: 'func $FUNC(...) (..., UserDaemon, ...) { ... }

        '
    - pattern: 'func $FUNC(...) (..., *UserDaemon, ...) { ... }

        '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - pkg/client/cli/**/*.go
- id: cli-util-intercept-field-assignment
  message: Intercept field assignment on cache in util. Should be in cloud package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $CACHE.Intercept = $VALUE
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - pkg/client/cli/util/*.go
- id: cli-util-context-value-userdaemon-key
  message: Context usage with userDaemonKey in util. Should be in connect or daemon
    package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: context.WithValue($CTX, userDaemonKey{}, $VAL)
    - pattern: $CTX.Value(userDaemonKey{})
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - pkg/client/cli/util/*.go
