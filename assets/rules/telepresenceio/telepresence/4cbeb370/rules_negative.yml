rules:
- id: cli-util-getuserdaemon-call
  message: Call to util.GetUserDaemon. Should use daemon package functions instead
  severity: WARNING
  languages:
  - go
  pattern: 'util.GetUserDaemon(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: cli-util-import-statement
  message: Import of cli/util package detected. Replace with imports from semantic
    packages (cloud, connect, daemon, flags, intercept)
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'import "github.com/telepresenceio/telepresence/v2/pkg/client/cli/util"

        '
    - pattern: 'import $ALIAS "github.com/telepresenceio/telepresence/v2/pkg/client/cli/util"

        '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: cli-util-import-in-import-block
  message: Import of cli/util package in import block. Replace with imports from semantic
    packages
  severity: WARNING
  languages:
  - go
  pattern: "import (\n  ...\n  \"github.com/telepresenceio/telepresence/v2/pkg/client/cli/util\"\
    \n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
- id: cli-util-initcommand-call
  message: Call to util.InitCommand. Should use connect.InitCommand instead
  severity: WARNING
  languages:
  - go
  pattern: 'util.InitCommand(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: cli-util-package-exists
  message: File in cli/util/ package detected. The util/ anti-pattern package should
    be eliminated and code moved to semantic packages (cloud/, connect/, daemon/,
    flags/, intercept/)
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - pkg/client/cli/util/*.go
- id: cli-cmd-file-prefix-in-root
  message: Command file with cmd_*.go naming in cli root detected. Command files should
    be moved to cli/cmd/ subdirectory
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - pkg/client/cli/cmd_*.go
- id: cli-util-package-declaration
  message: Package util declaration found. The util anti-pattern package should be
    eliminated
  severity: WARNING
  languages:
  - go
  pattern: 'package util

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
  paths:
    include:
    - pkg/client/cli/**/*.go
- id: cli-util-messages-delivered-field-access
  message: MessagesDelivered field access in util. Should be in cloud package messageCache
  severity: WARNING
  languages:
  - go
  pattern: $VAR.MessagesDelivered
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - pkg/client/cli/util/*.go
- id: cli-newupdatechecker-call
  message: Call to exported NewUpdateChecker function. Should be unexported as newUpdateChecker
  severity: WARNING
  languages:
  - go
  pattern: 'NewUpdateChecker(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - pkg/client/cli/**/*.go
- id: cli-util-new-userdaemon-call
  message: Call to newUserDaemon in util. Should be in daemon package as newUserClient
  severity: WARNING
  languages:
  - go
  pattern: 'newUserDaemon(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - pkg/client/cli/util/*.go
- id: cli-updatechecker-time-to-check-method
  message: timeToCheck method call. Should use cloud.updateChecker methods
  severity: WARNING
  languages:
  - go
  pattern: $OBJ.timeToCheck(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - pkg/client/cli/**/*.go
    exclude:
    - pkg/client/cli/cloud/*.go
- id: cli-connect-getrequest-call-in-util
  message: Call to connect.GetRequest in util. Request handling should be in daemon
    package
  severity: WARNING
  languages:
  - go
  pattern: connect.GetRequest(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - pkg/client/cli/util/*.go
- id: cli-newcloudmessagecache-call
  message: Call to newCloudMessageCache function. Should be renamed to newMessageCache
  severity: WARNING
  languages:
  - go
  pattern: 'newCloudMessageCache(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: cli-util-flagmap-call
  message: Call to util.FlagMap. Should use flags package instead
  severity: WARNING
  languages:
  - go
  pattern: 'util.FlagMap(...)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: cli-updatechecker-store-next-check-method
  message: StoreNextCheck method call on UpdateChecker. Should use cloud.updateChecker
