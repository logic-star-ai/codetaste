  severity: WARNING
  languages:
  - go
  pattern: $OBJ.StoreNextCheck(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - pkg/client/cli/**/*.go
    exclude:
    - pkg/client/cli/cloud/*.go
- id: cli-updatechecker-update-available-method
  message: UpdateAvailable method call. Should use cloud.updateChecker methods
