    nr_legacy_patterns: 4
  paths:
    include:
    - pkg/client/cli/**/*.go
    exclude:
    - pkg/client/cli/cloud/*.go
- id: cli-util-intercept-field-on-cloudmessagecache
  message: Direct access to Intercept field on cloudMessageCache. Should use messageCache
