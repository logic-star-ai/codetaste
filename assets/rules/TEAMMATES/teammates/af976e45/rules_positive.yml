  message: SimpleModalService used in component - modal refactoring applied to component
  severity: INFO
  languages:
  - typescript
  pattern: '$SERVICE.openConfirmationModal($...ARGS)

    '
  metadata:
    category: abstraction
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
