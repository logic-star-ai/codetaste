rules:
- id: simple-modal-type-enum-reference
  message: SimpleModalType enum member accessed - modal type system in use
  severity: INFO
  languages:
  - typescript
  pattern-regex: SimpleModalType\.[A-Z_]+
  metadata:
    category: api
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: simple-modal-type-all-four-types-used
  message: One of the four SimpleModalType enum values used - modal type system in
    use
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: SimpleModalType\.(WARNING|DANGER|INFO|NEUTRAL)
  metadata:
    category: api
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: simple-modal-type-used-as-parameter
  message: SimpleModalType used as function parameter - modal type passed to functions
  severity: INFO
  languages:
  - typescript
  pattern: '$FUNC($...ARGS, SimpleModalType.$TYPE, $...REST)

    '
  metadata:
    category: api
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
- id: simple-modal-service-method-signature-confirmation
  message: openConfirmationModal method signature detected - new modal API in use
  severity: INFO
  languages:
  - typescript
  pattern-regex: openConfirmationModal\s*\([^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 32
    nr_legacy_patterns: 0
