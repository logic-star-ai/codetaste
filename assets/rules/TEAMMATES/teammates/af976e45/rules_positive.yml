    category: api
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
- id: simple-modal-with-html-content
  message: openConfirmationModal called with content parameter - supports HTML/TemplateRef
    as per refactoring
  severity: INFO
  languages:
  - typescript
  pattern: '$SERVICE.openConfirmationModal($TITLE, $TYPE, $CONTENT)

    '
