rules:
- id: old-copied-from-any-unet-path
  message: Comment contains 'Copied from' reference to old UNet/UVit path. Should
    reference 'diffusers.models.unets.*' instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: '# Copied from diffusers\.models\.u\w+it'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
  paths:
    exclude:
    - '*/diffusers/models/unets/**'
- id: old-copied-from-comment-unet-2d-condition
  message: Comment references old path 'diffusers.models.unet_2d_condition'. Should
    reference 'diffusers.models.unets.unet_2d_condition' instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: '# Copied from diffusers\.models\.unet_2d_condition\.'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 40
- id: old-relative-import-unet-models-init
  message: Relative import from old location detected in models/__init__.py. Should
    import from '.unets.unet_*' instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from .unet_1d import $IMPORT
    - pattern: from .unet_2d import $IMPORT
    - pattern: from .unet_2d_condition import $IMPORT
    - pattern: from .unet_3d_condition import $IMPORT
    - pattern: from .unet_kandinsky3 import $IMPORT
    - pattern: from .unet_motion_model import $IMPORT
    - pattern: from .unet_spatio_temporal_condition import $IMPORT
    - pattern: from .uvit_2d import $IMPORT
    - pattern: from .unet_1d_blocks import $IMPORT
    - pattern: from .unet_2d_blocks import $IMPORT
    - pattern: from .unet_3d_blocks import $IMPORT
    - pattern: from .unet_2d_blocks_flax import $IMPORT
    - pattern: from .unet_2d_condition_flax import $IMPORT
  - pattern-not: from .unets.$MODULE import $IMPORT
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - '*/diffusers/models/__init__.py'
- id: old-lazy-import-from-unet-module
  message: Relative import from UNet module '.$MODULE' detected in models/__init__.py.
    Should import from '.unets.$MODULE' instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from .$MODULE import $IMPORT
  - metavariable-regex:
      metavariable: $MODULE
      regex: unet_\w+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - '*/diffusers/models/__init__.py'
- id: old-import-unet-2d-blocks
  message: Import from old location 'diffusers.models.unet_2d_blocks' detected. Should
    import from 'diffusers.models.unets.unet_2d_blocks' instead.
  severity: WARNING
  languages:
  - python
  pattern: from diffusers.models.unet_2d_blocks import $IMPORT
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-import-multiple-classes-unet-blocks
  message: Multiple class imports from old location 'diffusers.models.unet_2d_blocks'.
    Should import from 'diffusers.models.unets.unet_2d_blocks' instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'from diffusers.models.unet_2d_blocks import $A, $B, $C

        '
    - pattern: "from diffusers.models.unet_2d_blocks import (\n    $IMPORTS\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: old-import-blocks-simple-pattern
  message: Import from old UNet blocks location. Should import from 'diffusers.models.unets.unet_2d_blocks'
    instead.
  severity: WARNING
  languages:
  - python
  pattern: from diffusers.models.unet_2d_blocks import $BLOCK
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - '*/diffusers/models/__init__.py'
    - '*/diffusers/models/unets/**'
- id: old-copied-from-comment-unet-2d-blocks
  message: Comment references old path 'diffusers.models.unet_2d_blocks'. Should reference
    'diffusers.models.unets.unet_2d_blocks' instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: '# Copied from diffusers\.models\.unet_2d_blocks\.'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-copied-from-blocks-unet-generalized
  message: Comment references old UNet blocks path. Should reference 'diffusers.models.unets.unet_*d_blocks'
    instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: '# Copied from diffusers\.models\.unet_\wd_blocks\.'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-multi-import-unet-blocks
  message: Multiple imports from old location 'diffusers.models.unet_2d_blocks'. Should
    import from 'diffusers.models.unets.unet_2d_blocks' instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from diffusers.models.unet_2d_blocks import $A, $B
  - pattern-not: from diffusers.models.unets.unet_2d_blocks import $A, $B
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: old-relative-import-between-unet-files
  message: Relative import between UNet files detected. Should be updated for new
    unets/ structure.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from .unet_1d_blocks import $IMPORT
    - pattern: from .unet_3d_blocks import $IMPORT
  - pattern-not-inside: 'from .unets.$MODULE import $IMPORT

      '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - '*/diffusers/models/unet_*.py'
    exclude:
    - '*/diffusers/models/unets/**'
- id: old-import-unet-blocks-in-examples
  message: Example imports from old location 'diffusers.models.unet_2d_blocks'. Should
    import from 'diffusers.models.unets.unet_2d_blocks' instead.
  severity: WARNING
  languages:
  - python
  pattern: from diffusers.models.unet_2d_blocks import $IMPORT
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    include:
    - examples/**
- id: old-import-specific-unet-blocks
  message: Import of specific UNet block from old location. Should import from 'diffusers.models.unets.unet_2d_blocks'
    instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from diffusers.models.unet_2d_blocks import DownBlock2D
    - pattern: from diffusers.models.unet_2d_blocks import UpBlock2D
    - pattern: from diffusers.models.unet_2d_blocks import CrossAttnDownBlock2D
    - pattern: from diffusers.models.unet_2d_blocks import CrossAttnUpBlock2D
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: old-relative-import-any-unet-three-dots
  message: Relative import (3 dots) from old UNet location detected. Should import
    from '...models.unets.unet_*' instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: from \.\.\.models\.unet_\w+ import
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
  paths:
    exclude:
    - '*/diffusers/models/unets/**'
- id: old-copied-from-comment-unet-3d
