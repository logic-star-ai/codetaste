- id: old-import-multiple-unet-classes-2d-condition
  message: Multiple class imports from old location 'diffusers.models.unet_2d_condition'.
    Should import from 'diffusers.models.unets.unet_2d_condition' instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: 'from diffusers.models.unet_2d_condition import $A, $B, $C

        '
    - pattern: "from diffusers.models.unet_2d_condition import (\n    $IMPORTS\n)\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-import-uvit-from-old-path
  message: Import of UVit2DModel from old location 'diffusers.models.uvit_2d'. Should
    import from 'diffusers.models.unets.uvit_2d' instead.
  severity: WARNING
  languages:
  - python
  pattern: from diffusers.models.uvit_2d import UVit2DModel
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-import-resnet-blocks-from-unet
  message: Import of ResNet block from old location. Should import from 'diffusers.models.unets.unet_2d_blocks'
    instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from diffusers.models.unet_2d_blocks import ResnetDownsampleBlock2D
    - pattern: from diffusers.models.unet_2d_blocks import ResnetUpsampleBlock2D
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-import-unet-config-class
  message: Import of UNet model class from old location. Should import from 'diffusers.models.unets.unet_*'
    instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from diffusers.models.unet_2d_condition import UNet2DConditionModel
    - pattern: from diffusers.models.unet_2d import UNet2DModel
    - pattern: from diffusers.models.unet_1d import UNet1DModel
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - '*/diffusers/models/__init__.py'
    - '*/diffusers/models/unets/**'
- id: old-import-any-uvit-module
  message: Import from old UVit module location 'diffusers.models.uvit_*' detected.
    Should import from 'diffusers.models.unets.uvit_*' instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: from diffusers\.models\.uvit_\w+ import
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - '*/diffusers/models/__init__.py'
    - '*/diffusers/models/unets/**'
- id: old-relative-import-any-unet-four-dots
  message: Relative import (4 dots) from old UNet location detected. Should import
    from '....models.unets.unet_*' instead.
  severity: WARNING
  languages:
  - python
  pattern-regex: from \.\.\.\.models\.unet_\w+ import
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: old-lazy-import-from-uvit-module
  message: Relative import from UVit module '.$MODULE' detected in models/__init__.py.
    Should import from '.unets.$MODULE' instead.
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: from .$MODULE import $IMPORT
  - metavariable-regex:
      metavariable: $MODULE
      regex: uvit_\w+
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/diffusers/models/__init__.py'
- id: old-import-condition-simple-pattern
  message: Import from old UNet condition model location. Should import from 'diffusers.models.unets.unet_2d_condition'
    instead.
  severity: WARNING
  languages:
  - python
  pattern: from diffusers.models.unet_2d_condition import $CLASS
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - '*/diffusers/models/__init__.py'
    - '*/diffusers/models/unets/**'
- id: old-import-uvit-simple-pattern
  message: Import from old UVit model location. Should import from 'diffusers.models.unets.uvit_2d'
    instead.
  severity: WARNING
  languages:
  - python
  pattern: from diffusers.models.uvit_2d import $CLASS
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - '*/diffusers/models/__init__.py'
    - '*/diffusers/models/unets/**'
- id: old-import-multiple-relative-unet-blocks
  message: Multiple imports using relative path from old UNet blocks location. Should
    import from '...models.unets.unet_2d_blocks' instead.
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: from ...models.unet_2d_blocks import $A, $B
  - pattern: from ....models.unet_2d_blocks import $A, $B
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
