    - pattern: from diffusers.models.unet_2d_blocks import UNetMidBlock2D
    - pattern: from diffusers.models.unet_2d_blocks import UNetMidBlock2DCrossAttn
    - pattern: from diffusers.models.unet_2d_blocks import UNetMidBlock2DSimpleCrossAttn
  metadata:
