- id: docstring-references-unets-module
  message: Docstring or comment references unets submodule path
  severity: INFO
  languages:
  - python
  pattern-regex: diffusers\.models\.unets\.\w+
  metadata:
    category: other
    nr_refactored_patterns: 114
    nr_legacy_patterns: 0
- id: string-literal-unets-path
