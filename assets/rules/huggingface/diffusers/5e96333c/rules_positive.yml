  severity: INFO
  languages:
  - python
  pattern-regex: diffusers\.models\.unets\.\w+
  metadata:
    category: other
    nr_refactored_patterns: 114
    nr_legacy_patterns: 0
- id: unet-class-definition-in-unets-directory
  message: UNet model class defined in unets directory
  severity: INFO
  languages:
  - python
  pattern: "class $CLASSNAME(...):\n    ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 96
    nr_legacy_patterns: 0
  paths:
    include:
    - src/diffusers/models/unets/*.py
