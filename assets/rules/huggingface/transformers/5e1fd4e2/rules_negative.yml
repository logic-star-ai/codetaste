rules:
- id: subconfig-cls-reference-in-from-pretrained
  message: cls method call in from_pretrained with sub-config extraction - centralize
    pattern
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: cls.$METHOD(...)
  - pattern-inside: "@classmethod\ndef from_pretrained(cls, $PATH, **kwargs):\n  ...\n\
      \  if config_dict.get(\"model_type\") == $PARENT:\n    config_dict = config_dict[$KEY]\n\
      \  ...\n"
  - metavariable-regex:
      metavariable: $METHOD
      regex: ^(from_dict|get_config_dict)$
  - pattern-not-inside: "class JukeboxVQVAEConfig(...):\n  ...\n"
  - pattern-not-inside: "class JukeboxPriorConfig(...):\n  ...\n"
  - pattern-not-inside: "class Pix2StructTextConfig(...):\n  ...\n"
  - pattern-not-inside: "class Pix2StructVisionConfig(...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
  paths:
    exclude:
    - '**/deprecated/**'
    - '**/clvp/**'
- id: subconfig-pretrainedconfig-subclass-from-pretrained
  message: PretrainedConfig subclass with from_pretrained override - verify if sub-config
    to centralize
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CONFIG(PretrainedConfig):\n  ...\n  @classmethod\n  def from_pretrained(cls,\
      \ $PATH, **kwargs) -> \"PretrainedConfig\":\n    ...\n"
  - pattern-not-inside: "class PretrainedConfig:\n  ...\n"
  - pattern-not-inside: "class JukeboxVQVAEConfig(...):\n  ...\n"
  - pattern-not-inside: "class JukeboxPriorConfig(...):\n  ...\n"
  - pattern-not-inside: "class Pix2StructTextConfig(...):\n  ...\n"
  - pattern-not-inside: "class Pix2StructVisionConfig(...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
  paths:
    include:
    - '**/models/**/configuration_*.py'
    exclude:
    - '**/deprecated/**'
    - '**/clvp/**'
- id: subconfig-from-pretrained-override-model-type-check-general
  message: Sub-config from_pretrained override with model_type check detected - refactor
    to use base_config_key
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "@classmethod\ndef from_pretrained(cls, $PRETRAINED, **kwargs):\n  ...\n\
      \  if config_dict.get(\"model_type\") == $PARENT:\n    config_dict = config_dict[$KEY]\n\
      \  ...\n"
  - pattern-not-inside: "class JukeboxVQVAEConfig(...):\n  ...\n"
  - pattern-not-inside: "class JukeboxPriorConfig(...):\n  ...\n"
  - pattern-not-inside: "class Pix2StructTextConfig(...):\n  ...\n"
  - pattern-not-inside: "class Pix2StructVisionConfig(...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
- id: subconfig-model-type-warning-in-from-pretrained
  message: Model type validation in sub-config from_pretrained - should be removed
    with centralized loading
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: "if \"model_type\" in config_dict and hasattr(cls, \"model_type\") and\
      \ config_dict[\"model_type\"] != cls.model_type:\n  logger.warning(\n    $MSG\n\
      \  )\n"
  - pattern-inside: "@classmethod\ndef from_pretrained(cls, $PATH, **kwargs):\n  ...\n\
      \  if config_dict.get(\"model_type\") == $PARENT:\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
  paths:
    exclude:
    - '**/deprecated/**'
    - '**/pix2struct/**'
- id: subconfig-config-dict-key-extraction-generic
  message: Sub-config extraction using model_type check - centralize using base_config_key
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "if config_dict.get(\"model_type\") == $PARENT:\n  config_dict = config_dict[$KEY]\n"
    - pattern: "if config_dict.get(\"model_type\") == $PARENT:\n  config_dict = config_dict.get($KEY)\n"
  - metavariable-regex:
      metavariable: $KEY
      regex: '".*_config"'
  - pattern-not-inside: "class JukeboxVQVAEConfig(...):\n  ...\n"
  - pattern-not-inside: "class JukeboxPriorConfig(...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
  paths:
    exclude:
    - '**/pix2struct/**'
    - '**/deprecated/**'
- id: subconfig-config-dict-bracket-access
  message: Direct config_dict bracket access for sub-config extraction - check if
    part of old pattern
  severity: INFO
  languages:
  - python
  pattern: 'config_dict = config_dict[$KEY]

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
  paths:
    include:
    - '**/models/**/configuration_*.py'
    exclude:
    - '**/deprecated/**'
    - '**/pix2struct/**'
    - '**/clvp/**'
