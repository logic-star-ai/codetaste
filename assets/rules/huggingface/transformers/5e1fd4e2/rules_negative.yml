    base_config_key
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "if config_dict.get(\"model_type\") == \"$MODEL\":\n  config_dict =\
        \ config_dict[\"$KEY\"]\n"
    - pattern: "if config_dict.get(\"model_type\") == '$MODEL':\n  config_dict = config_dict['$KEY']\n"
  - metavariable-regex:
      metavariable: $KEY
      regex: ^[a-z_]+_config$
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
  paths:
    exclude:
    - '**/deprecated/**'
    - '**/pix2struct/**'
