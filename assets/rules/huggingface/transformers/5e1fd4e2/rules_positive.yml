rules:
- id: class-with-pretrainedconfig-and-sub-configs
  message: Detected PretrainedConfig subclass with sub_configs - refactoring applied
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $C(PretrainedConfig):\n  ...\n"
  - pattern-inside: '...

      sub_configs = ...

      ...

      '
  metadata:
    nr_refactored_patterns: 105
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/configuration_*.py'
- id: class-inherits-pretrainedconfig
  message: Detected class inheriting PretrainedConfig - refactoring applied
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $C(PretrainedConfig):\n  ...\n"
  - pattern-inside: '...

      base_config_key = ...

      ...

      '
  metadata:
    nr_refactored_patterns: 87
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/configuration_*.py'
- id: base-config-key-class-attribute-any
  message: Detected base_config_key as class attribute - refactoring applied
  severity: INFO
  languages:
  - python
  pattern: "class $CLASS(...):\n  ...\n  base_config_key = $VALUE\n  ...\n"
  metadata:
    nr_refactored_patterns: 57
    nr_legacy_patterns: 0
- id: config-base-config-key-assignment
  message: Detected base_config_key assignment in PretrainedConfig subclass - refactoring
    applied
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(...):\n  ...\n  $KEY = \"$VALUE\"\n  ...\n"
  - metavariable-regex:
      metavariable: $KEY
      regex: ^base_config_key$
  - metavariable-regex:
      metavariable: $VALUE
      regex: .*_config$
  - pattern-inside: "class $CLASS($BASE):\n  ...\n"
  - metavariable-regex:
      metavariable: $BASE
      regex: (?i).*(config|pretrained).*
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
- id: config-sub-configs-dict-assignment
  message: Detected sub_configs dictionary assignment in composite config - refactoring
    applied
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(...):\n  ...\n  sub_configs = {...}\n  ...\n"
  - pattern-inside: "class $CLASS($BASE):\n  ...\n"
  - metavariable-regex:
      metavariable: $BASE
      regex: (?i).*(config|pretrained).*
  metadata:
    nr_refactored_patterns: 47
    nr_legacy_patterns: 0
- id: taint-sub-configs-dict-to-config-class
  message: 'Dataflow: sub_configs dict values used as config classes - refactoring
    applied'
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: $OBJ.sub_configs
  pattern-sinks:
  - pattern: $CLS(...)
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
- id: pretrainedconfig-sub-configs-access
  message: Detected sub_configs attribute access in config loading - refactoring applied
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $CONFIG.sub_configs
    - pattern: getattr($CONFIG, "sub_configs", ...)
    - pattern: hasattr($CONFIG, "sub_configs")
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: taint-base-config-key-to-dict-access
  message: 'Dataflow: base_config_key used to extract sub-config dict - refactoring
    applied'
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - patterns:
    - pattern: $CONFIG.base_config_key
    - pattern-not: None
  pattern-sinks:
  - pattern: $DICT[$KEY]
  - pattern: $DICT.get($KEY, ...)
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: pretrainedconfig-base-config-key-access
  message: Detected base_config_key attribute access in config loading - refactoring
    applied
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $CONFIG.base_config_key
    - pattern: getattr($CONFIG, "base_config_key", ...)
    - pattern: hasattr($CONFIG, "base_config_key")
  - pattern-inside: "def $FUNC(...):\n  ...\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: taint-sub-configs-to-instantiation
  message: 'Dataflow: sub_configs registry used for config instantiation - refactoring
    applied'
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: $CONFIG.sub_configs
  pattern-sinks:
  - pattern: $CLASS.from_dict(...)
  - pattern: $CLASS.from_pretrained(...)
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: taint-subconfigs-dict-to-iteration
  message: 'Dataflow: sub_configs dictionary used in iteration - refactoring applied'
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: $OBJ.sub_configs
  pattern-sinks:
  - patterns:
    - pattern: "for $K in $SINK:\n  ...\n"
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
- id: config-tester-with-subconfig-support
  message: Detected ConfigTester with sub-config support - refactoring applied
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class ConfigTester:\n  ...\n  def $METHOD(...):\n    ...\n    $OBJ.sub_configs\n\
      \    ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test_configuration_common.py'
