  severity: INFO
  languages:
  - python
  pattern: "class $CLASS(PretrainedConfig):\n  ...\n  base_config_key = $KEY\n"
  metadata:
    category: structural
    nr_refactored_patterns: 53
    nr_legacy_patterns: 0
  paths:
