- id: sub-configs-property-access
  message: Detected property-style access to sub_configs
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $X = $OBJ.sub_configs
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: sub-configs-in-conditional
  message: Detected conditional checking sub_configs
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "if $X.sub_configs:\n    ...\n"
    - pattern: "if hasattr($X, \"sub_configs\"):\n    ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: base-config-key-docstring-mention
  message: Detected docstring mentioning base_config_key
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: '"""[\s\S]*base_config_key[\s\S]*"""'
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_utils.py'
- id: config-property-with-base-key
  message: Detected config with property decorator and base_config_key
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(PretrainedConfig):\n    ...\n    base_config_key = $KEY\n\
      \    ...\n    @property\n    def $PROP(...):\n        ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
