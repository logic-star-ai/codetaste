    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: sub-configs-in-encoder-decoder-models
  message: Detected sub_configs in encoder-decoder models
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: sub_configs = {...}
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/encoder_decoder/configuration_*.py'
    - '**/models/*2*/configuration_*.py'
- id: sub-configs-dict-with-three-components
  message: Detected sub_configs with three config components
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'sub_configs = {$K1: $V1, $K2: $V2, $K3: $V3}'
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: sub-configs-with-autoconfig-import
  message: Detected sub_configs using AutoConfig in same file
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'from ..auto.configuration_auto import AutoConfig

      ...

      sub_configs = {...}

      '
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: sub-configs-single-key-dict
  message: Detected sub_configs with single component
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'sub_configs = {$KEY: $VALUE}'
  - pattern-not: 'sub_configs = {$K1: $V1, $K2: $V2}'
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: config-tester-sub-config-check
  message: Detected ConfigTester validation for sub-configs
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: '$X.sub_configs

      '
  - pattern-inside: "class $TESTER:\n    ...\n"
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/tests/**/test_*.py'
