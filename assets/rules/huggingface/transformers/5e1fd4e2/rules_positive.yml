rules:
- id: comment-mentions-base-config-key
  message: Documentation or comment mentioning base_config_key
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: .*base_config_key.*
  metadata:
    nr_refactored_patterns: 61
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration*.py'
- id: sub-config-base-config-key-attribute
  message: Detected sub-config with base_config_key attribute set
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "class $CLASS(...):\n  ...\n"
  - pattern: base_config_key = $KEY
  - metavariable-regex:
      metavariable: $KEY
      regex: ^"[a-z_]+"$
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/configuration_*.py'
    - '**/transformers/**/configuration_*.py'
  options:
    symbolic_propagation: true
- id: config-with-both-base-and-model-type
  message: Config class with both base_config_key and model_type attributes
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "class $CLASS(...):\n  ...\n  model_type = $TYPE\n  ...\n"
  - pattern: base_config_key = $KEY
  metadata:
    nr_refactored_patterns: 54
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration*.py'
  options:
    symbolic_propagation: true
- id: composite-config-sub-configs-dict
  message: Detected composite config with sub_configs dictionary
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-inside: "class $CLASS(...):\n  ...\n"
  - pattern: sub_configs = {...}
  metadata:
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/configuration_*.py'
    - '**/transformers/**/configuration_*.py'
  options:
    symbolic_propagation: true
- id: file-contains-sub-configs-pattern
  message: File contains sub_configs pattern
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: \A[\s\S]*sub_configs[\s\S]*
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/configuration_*.py'
- id: file-contains-base-config-key
  message: File contains base_config_key pattern
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: \A[\s\S]*base_config_key[\s\S]*
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/models/**/configuration_*.py'
- id: docstring-mentions-sub-configs
  message: Docstring documenting sub_configs
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: '"""[\s\S]*sub_configs[\s\S]*"""'
  metadata:
    nr_refactored_patterns: 28
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration*.py'
- id: config-attribute-taint-flow
  message: Configuration attribute flows through code
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: $OBJ.sub_configs
  pattern-sinks:
  - pattern: $SINK
  metadata:
    nr_refactored_patterns: 25
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
  options:
    symbolic_propagation: true
- id: base-config-key-to-dict-access-taint
  message: base_config_key value used for dictionary access
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: cls.base_config_key
  pattern-sinks:
  - pattern: $DICT[$SINK]
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
  options:
    symbolic_propagation: true
- id: test-create-composite-config
  message: Test method for composite config creation
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: create_and_test.*composite
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/test*.py'
- id: accessing-sub-configs-attribute
  message: Accessing sub_configs attribute from config object
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: $CONFIG.sub_configs
    - pattern: $VAR = $X.sub_configs
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
    exclude:
    - '**/test*.py'
  options:
    symbolic_propagation: true
- id: sub-configs-taint-flow
  message: sub_configs dictionary flows from definition to usage
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: sub_configs = $DICT
  pattern-sinks:
  - pattern: $SINK.sub_configs
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
  options:
    symbolic_propagation: true
- id: config-dict-via-base-config-key
  message: Extracting config dict using base_config_key value
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: $DICT[$OBJ.base_config_key]
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
  options:
    symbolic_propagation: true
- id: config-conditional-attribute-check
  message: Conditional checking config attributes
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "if $OBJ.sub_configs:\n  ...\n"
    - pattern: "if $OBJ.base_config_key:\n  ...\n"
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.py'
  options:
    symbolic_propagation: true
