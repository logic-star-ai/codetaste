rules:
- id: base-config-key-class-attribute
  message: Detected base_config_key class attribute in config class
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(...):\n    ...\n    base_config_key = $VALUE\n    ...\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(config|configuration).*
  - metavariable-regex:
      metavariable: $VALUE
      regex: .*config.*
  metadata:
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
    - '**/config*.py'
- id: base-config-key-rewritten-config
  message: Detected base_config_key for rewritten config pattern
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: base_config_key = "$VALUE"
  - metavariable-regex:
      metavariable: $VALUE
      regex: (?i).*(config|conf)$
  metadata:
    nr_refactored_patterns: 55
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: base-config-key-with-model-type
  message: Detected config class with both base_config_key and model_type
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(...):\n    ...\n    model_type = $TYPE\n    ...\n    base_config_key\
      \ = $KEY\n    ...\n"
  metadata:
    nr_refactored_patterns: 54
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: base-config-key-generic-pattern
  message: Detected base_config_key with generic config pattern
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: base_config_key = "$KEY"
  - pattern-inside: "class $CLASS(PretrainedConfig):\n    ...\n"
  metadata:
    nr_refactored_patterns: 52
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: config-class-with-model-type-and-base-key
  message: Detected config with model_type and base_config_key set
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(PretrainedConfig):\n    ...\n    model_type = \"$TYPE\"\
      \n    ...\n    base_config_key = \"$KEY\"\n    ...\n"
  - metavariable-regex:
      metavariable: $TYPE
      regex: .+
  - metavariable-regex:
      metavariable: $KEY
      regex: .+config.*
  metadata:
    nr_refactored_patterns: 49
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: sub-configs-dict-literal-pattern
  message: Detected sub_configs as dict literal
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'sub_configs = {$KEY1: $VAL1, ...}

      '
  metadata:
    nr_refactored_patterns: 47
    nr_legacy_patterns: 0
- id: sub-configs-dict-class-attribute
  message: Detected sub_configs dictionary class attribute in composite config
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(...):\n    ...\n    sub_configs = {...}\n    ...\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(config|configuration).*
  metadata:
    nr_refactored_patterns: 46
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
    - '**/config*.py'
- id: base-config-key-string-assignment
  message: Detected base_config_key string assignment in config
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: base_config_key = "$KEY"
  - metavariable-regex:
      metavariable: $KEY
      regex: (?i).*(text|vision|encoder|decoder|audio|video|image|language|qformer|perceiver).*config.*
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
    - '**/config*.py'
- id: sub-configs-dict-assignment-in-class
  message: Detected sub_configs dictionary with config class references
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'sub_configs = {$KEY: $CONFIG_CLASS, ...}

      '
  - metavariable-regex:
      metavariable: $CONFIG_CLASS
      regex: (?i).*(config|configuration).*
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: sub-configs-in-pretrainedconfig-subclass
  message: Detected sub_configs in PretrainedConfig subclass
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(PretrainedConfig):\n    ...\n    sub_configs = {...}\n\
      \    ...\n"
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: config-class-sub-config-pattern
  message: Detected config class acting as sub-config with base_config_key
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(PretrainedConfig):\n    ...\n    model_type = $MT\n   \
      \ ...\n    base_config_key = $BCK\n    ...\n"
  - metavariable-regex:
      metavariable: $CLASS
      regex: (?i).*(text|vision|audio|encoder|decoder|qformer).*config
  metadata:
    nr_refactored_patterns: 44
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: config-model-type-with-sub-configs-composite
  message: Detected composite model_type with sub_configs
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLASS(PretrainedConfig):\n    ...\n    model_type = $TYPE\n \
      \   ...\n    sub_configs = {$K1: $V1, $K2: $V2, ...}\n    ...\n"
  metadata:
    nr_refactored_patterns: 40
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: sub-configs-two-item-dict
  message: Detected sub_configs with exactly two components
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'sub_configs = {$KEY1: $VAL1, $KEY2: $VAL2}'
  - pattern-not: 'sub_configs = {$KEY1: $VAL1, $KEY2: $VAL2, $KEY3: $VAL3}'
  metadata:
    nr_refactored_patterns: 31
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: sub-configs-with-text-and-vision
  message: Detected sub_configs with text and vision components
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'sub_configs = {"text_config": $TEXT, "vision_config": $VISION, ...}

      '
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: sub-configs-with-autoconfig
  message: Detected sub_configs using AutoConfig for pluggable components
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: 'sub_configs = {$KEY: AutoConfig, ...}

      '
  - metavariable-regex:
      metavariable: $KEY
      regex: .*
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: base-config-key-vision-config
  message: Detected base_config_key for vision config component
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: base_config_key = "$VALUE"
  - metavariable-regex:
      metavariable: $VALUE
      regex: (?i).*vision.*config.*
  metadata:
    nr_refactored_patterns: 21
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/configuration_*.py'
- id: base-config-key-text-config
  message: Detected base_config_key for text config component
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: base_config_key = "$VALUE"
  - metavariable-regex:
      metavariable: $VALUE
      regex: (?i).*text.*config.*
