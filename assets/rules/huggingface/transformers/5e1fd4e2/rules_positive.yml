rules:
- id: subconfig-base-config-key-assignment
  message: base_config_key attribute assigned in config class - refactoring applied
  severity: INFO
  languages:
  - python
  pattern: 'base_config_key = "$KEY"

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 56
    nr_legacy_patterns: 0
