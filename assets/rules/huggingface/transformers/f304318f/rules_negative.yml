rules:
- id: llama-return-dict-parameter
  message: Remove return_dict parameter from forward method in Llama-family models
  severity: WARNING
  languages:
  - python
  pattern: "def forward(self, ..., return_dict: Optional[bool] = None, ...):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - '*/models/llama/*.py'
    - '*/models/gemma/*.py'
    - '*/models/gemma2/*.py'
    - '*/models/gemma3/*.py'
    - '*/models/mistral/*.py'
    - '*/models/diffllama/*.py'
- id: llama-return-dict-init
  message: Remove return_dict initialization in Llama-family models
  severity: WARNING
  languages:
  - python
  pattern: 'return_dict = return_dict if return_dict is not None else self.config.use_return_dict

    '
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 32
  paths:
    include:
    - '*/models/llama/*.py'
    - '*/models/gemma/*.py'
    - '*/models/gemma2/*.py'
    - '*/models/gemma3/*.py'
    - '*/models/mistral/*.py'
    - '*/models/diffllama/*.py'
- id: clip-return-dict-init-pytorch-only
