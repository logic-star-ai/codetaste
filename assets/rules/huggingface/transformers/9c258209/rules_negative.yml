rules:
- id: torch-dtype-in-method-signature
  message: Replace 'torch_dtype' parameter with 'dtype' in method signature
  severity: WARNING
  languages:
  - python
  pattern: "def $METHOD(..., torch_dtype=$DEFAULT, ...):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 74
- id: torch-dtype-from-pretrained-regex
  message: Replace 'torch_dtype' parameter with 'dtype' in from_pretrained() call
  severity: WARNING
  languages:
  - python
  pattern-regex: \.from_pretrained\([^)]*torch_dtype\s*=
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 64
  paths:
    exclude:
    - tests/
- id: torch-dtype-parameter-regex
  message: Replace 'torch_dtype' parameter with 'dtype' in function definition
  severity: WARNING
  languages:
  - python
  pattern-regex: def\s+\w+\([^)]*torch_dtype\s*[:=]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 59
  paths:
    exclude:
    - tests/
- id: torch-dtype-kwarg-excluding-tests
  message: Replace 'torch_dtype' keyword argument with 'dtype'
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $FUNC(..., torch_dtype=$VALUE, ...)
  - pattern-not: $FUNC(..., dtype=..., torch_dtype=$VALUE, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 47
  paths:
    exclude:
    - tests/
- id: torch-dtype-function-parameter
  message: Replace function parameter 'torch_dtype' with 'dtype'
  severity: WARNING
  languages:
  - python
  pattern: "def $FUNC(..., torch_dtype: $TYPE = $DEFAULT, ...):\n    ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
  paths:
    exclude:
    - tests/
- id: torch-dtype-function-parameter-no-annotation
