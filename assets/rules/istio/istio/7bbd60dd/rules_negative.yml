    nr_refactored_patterns: 0
    nr_legacy_patterns: 30
- id: detect-runtime2-import-multiline-block
  message: Import block contains old 'runtime2' package path
  severity: WARNING
  languages:
  - go
  pattern-regex: import\s*\(\s*[^)]*"istio\.io/istio/mixer/pkg/runtime2[^)]*\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: detect-runtime2-inside-import-parenthesis
  message: Import block contains 'runtime2' package reference
  severity: WARNING
  languages:
  - go
  pattern-regex: import\s*\([^)]*istio\.io/istio/mixer/pkg/runtime2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: detect-runtime2-import-with-newline
  message: Import block with newlines contains 'runtime2' package
  severity: WARNING
  languages:
  - go
  pattern-regex: import\s+\(\s*[^)]*"istio\.io/istio/mixer/pkg/runtime2[^)]*\)\s*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: detect-runtime2-import-in-test-files
  message: Test file imports 'runtime2' package, should be changed to 'runtime'
  severity: WARNING
  languages:
  - go
  pattern-regex: '"istio\.io/istio/mixer/pkg/runtime2'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - '**/*_test.go'
- id: detect-runtime2-import-config
  message: 'Old import detected: ''istio.io/istio/mixer/pkg/runtime2/config'' should
