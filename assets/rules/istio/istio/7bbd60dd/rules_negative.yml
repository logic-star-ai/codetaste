rules:
- id: detect-runtime2-word-boundary-anywhere
  message: Word 'runtime2' with word boundaries detected
  severity: WARNING
  languages:
  - generic
  pattern-regex: \bruntime2\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 59
- id: detect-runtime2-files-exist
  message: Files still exist in old 'mixer/pkg/runtime2' directory, should be moved
    to 'mixer/pkg/runtime'
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 56
  paths:
    include:
    - mixer/pkg/runtime2/*
    - mixer/pkg/runtime2/**/*
- id: detect-runtime2-with-forward-slash
  message: Path segment 'mixer/pkg/runtime2' detected
  severity: WARNING
  languages:
  - generic
  pattern-regex: mixer/pkg/runtime2(?:/\w+)?
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 54
- id: detect-runtime2-partial-path-match
  message: Partial path 'pkg/runtime2' detected
  severity: WARNING
  languages:
  - generic
  pattern-regex: pkg/runtime2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 54
- id: detect-runtime2-word-in-text
  message: Word 'runtime2' detected (possibly in path or variable name)
  severity: WARNING
  languages:
  - go
  pattern-regex: \bruntime2(?:/\w+)*\b
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 51
- id: detect-runtime2-trailing-slash
  message: Path with 'runtime2' and trailing slash detected
  severity: WARNING
  languages:
  - generic
  pattern-regex: mixer/pkg/runtime2/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 49
- id: detect-runtime2-path-with-subdir
  message: Path includes 'runtime2' with known subdirectory
  severity: WARNING
  languages:
  - generic
  pattern-regex: runtime2/(?:config|dispatcher|handler|routing|validator|testing)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 49
- id: detect-runtime2-import-base
  message: 'Old import detected: ''istio.io/istio/mixer/pkg/runtime2'' should be renamed
    to ''istio.io/istio/mixer/pkg/runtime'''
  severity: WARNING
  languages:
  - go
  pattern: 'import "istio.io/istio/mixer/pkg/runtime2"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-in-string-literal
  message: 'Old import path detected in string literal: ''istio.io/istio/mixer/pkg/runtime2''
    should be renamed to ''istio.io/istio/mixer/pkg/runtime'''
  severity: WARNING
  languages:
  - go
  pattern-regex: '"istio\.io/istio/mixer/pkg/runtime2(?:/[^"]*)?"\s*'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-in-file-path-string
  message: String literal contains file path with 'runtime2' which should be updated
    to 'runtime'
  severity: WARNING
  languages:
  - go
  pattern-regex: '"[^"]*mixer/pkg/runtime2[^"]*"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-directory-reference
  message: Directory path reference contains 'runtime2' which should be updated to
    'runtime'
  severity: WARNING
  languages:
  - go
  pattern-regex: mixer/pkg/runtime2(?:/[^\s"\)]*)?
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-path-anywhere
  message: Reference to 'istio.io/istio/mixer/pkg/runtime2' path detected anywhere
    in Go code
  severity: WARNING
  languages:
  - go
  pattern-regex: istio\.io/istio/mixer/pkg/runtime2(?:/\w+(?:/\w+)*)?
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-import-statement-with-spaces
  message: Spaced import statement with 'runtime2' detected, update to 'runtime'
  severity: WARNING
  languages:
  - go
  pattern-regex: \s+"istio\.io/istio/mixer/pkg/runtime2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-quoted-path
  message: Quoted path reference to 'runtime2' detected, should be changed to 'runtime'
  severity: WARNING
  languages:
  - go
  pattern-regex: '["'']istio\.io/istio/mixer/pkg/runtime2'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-full-path-in-code
  message: Full package path with 'runtime2' detected in code
  severity: WARNING
  languages:
  - go
  pattern-regex: istio\.io/istio/mixer/pkg/runtime2(?:/[a-zA-Z0-9/_-]+)?
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-path-no-quotes
  message: Unquoted reference to 'runtime2' package path
  severity: WARNING
  languages:
  - go
  pattern-regex: \bistio\.io/istio/mixer/pkg/runtime2\b
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-import-ending-quote
  message: Import path ending with 'runtime2' or its subpackages detected
  severity: WARNING
  languages:
  - go
  pattern-regex: mixer/pkg/runtime2(?:/[^"]*)?"\s*$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-in-quotes
  message: Quoted import path for 'runtime2' or its known subpackages
  severity: WARNING
  languages:
  - go
  pattern-regex: '"istio\.io/istio/mixer/pkg/runtime2(?:/(?:config|dispatcher|handler|routing|validator|testing/(?:data|util)))?"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-url-like-path
  message: URL-like path reference to 'runtime2' detected
  severity: WARNING
  languages:
  - go
  pattern-regex: istio\.io/istio/mixer/pkg/runtime2(?:/\w+){0,3}
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-double-quoted
  message: Double-quoted 'runtime2' package path
  severity: WARNING
  languages:
  - go
  pattern-regex: '"istio\.io/istio/mixer/pkg/runtime2'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-multiline-any-reference
  message: Multi-line match for 'runtime2' package path
  severity: WARNING
  languages:
  - go
  pattern-regex: (?m)istio\.io/istio/mixer/pkg/runtime2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-import-whitespace-before
  message: Import with whitespace before 'runtime2' package
  severity: WARNING
  languages:
  - go
  pattern-regex: \s"istio\.io/istio/mixer/pkg/runtime2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
- id: detect-runtime2-all-subpackages-generic
  message: Import of any 'runtime2' subpackage detected, should be changed to 'runtime'
  severity: WARNING
  languages:
  - go
  pattern-regex: '"istio\.io/istio/mixer/pkg/runtime2/[^"]+"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: detect-runtime2-path-separator
  message: File path with 'runtime2' directory separator detected
  severity: WARNING
  languages:
  - go
  pattern-regex: mixer/pkg/runtime2(?:/|\\)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: detect-runtime2-specific-subpkg-pattern
  message: Specific known subpackage of 'runtime2' detected in import
  severity: WARNING
  languages:
  - go
  pattern-regex: '"istio\.io/istio/mixer/pkg/runtime2/(config|dispatcher|handler|routing|validator|testing/data|testing/util)"'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: detect-runtime2-short-path
  message: Short path with '/runtime2/' detected
  severity: WARNING
  languages:
  - go
  pattern-regex: /runtime2/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 42
- id: detect-runtime2-in-go-import-block
  message: 'Old import path detected in import block: ''istio.io/istio/mixer/pkg/runtime2''
