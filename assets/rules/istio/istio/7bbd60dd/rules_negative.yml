  languages:
  - go
  pattern-regex: \t+"istio\.io/istio/mixer/pkg/runtime2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: detect-runtime2-in-import-group
  message: Import in grouped imports contains 'runtime2'
  severity: WARNING
  languages:
  - go
  pattern-regex: ^\s+"istio\.io/istio/mixer/pkg/runtime2
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: detect-runtime2-import-block-entry
  message: Entry in import block for 'runtime2' package
