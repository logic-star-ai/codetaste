  - go
  pattern-regex: ^\s*"istio\.io/istio/mixer/pkg/runtime2(?:/[^"]+)?"\s*$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
- id: detect-runtime2-newline-before-import
