  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "Inputs: collection.Names{\n  ...,\n  metadata.$COLLECTION,\n  ...\n\
      }\n"
  - pattern-inside: 'import "istio.io/istio/galley/pkg/config/meta/metadata"

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: galley-collection-in-inputs-array-element
