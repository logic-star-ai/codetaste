rules:
- id: galley-old-metadata-import-with-usage
  message: Using metadata package collection constants. Refactor to use collections
    package.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'import "istio.io/istio/galley/pkg/config/meta/metadata"

      ...

      '
  - pattern: metadata.$X
  - metavariable-regex:
      metavariable: $X
      regex: ^(Istio|K8S)[A-Z].*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 312
- id: galley-collection-name-passed-to-function
  message: Passing metadata.$COLLECTION to function. Update to use collections.$COLLECTION
    or .Name() as needed.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $FUNC(..., metadata.$COLLECTION, ...)
  - pattern-inside: 'import "istio.io/istio/galley/pkg/config/meta/metadata"

      ...

      '
  - metavariable-regex:
      metavariable: $COLLECTION
      regex: ^(Istio|K8S)[A-Z].*
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 195
- id: galley-test-file-metadata-collection
  message: Test file using metadata.$COLLECTION. Update to use collections package.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'import "istio.io/istio/galley/pkg/config/meta/metadata"

      ...

      '
  - pattern: metadata.$COLLECTION
  - metavariable-regex:
      metavariable: $COLLECTION
      regex: ^(Istio|K8S)[A-Z].*
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 145
  paths:
    include:
    - '*_test.go'
    exclude:
    - galley/pkg/config/meta/metadata/*_test.go
- id: galley-ingress-transform-metadata
  message: Ingress transform using metadata.$COLLECTION. Update to use collections
    package.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'package ingress

      ...

      '
  - pattern: metadata.$COLLECTION
  - metavariable-regex:
      metavariable: $COLLECTION
      regex: ^(K8S|Istio)[A-Z].*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 92
- id: galley-collection-string-method
  message: .String() method on collection detected. If this is a collection, use .Name()
    method on collection.Schema objects instead.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: $COL.String()
  - pattern-inside: 'import "istio.io/istio/galley/pkg/config/meta/metadata"

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
- id: galley-collection-name-in-metadata-context
  message: collection.NewName in metadata package context. Collections should be collection.Schema
    objects.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: 'package metadata

      ...

      '
  - pattern: collection.NewName($STR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 58
- id: galley-generated-collection-var-comment
  message: Old collection variable comment pattern. Collections should be schema objects
    not just names.
  severity: WARNING
  languages:
  - go
  pattern-regex: ^\s*//\s+\w+\s+is the name of collection\s+\w+.*$
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 58
  paths:
    include:
    - galley/pkg/config/meta/metadata/collections.gen.go
- id: galley-event-full-sync-metadata
  message: Event.FullSyncFor with metadata.$COLLECTION. Update to collections.$COLLECTION.Name().
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: event.FullSyncFor(metadata.$COLLECTION)
  - pattern-inside: 'import "istio.io/istio/galley/pkg/config/meta/metadata"

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 56
- id: galley-old-metadata-package-import
  message: Old metadata package import detected. Refactor to use galley/pkg/config/schema/collections
    package instead.
  severity: WARNING
  languages:
  - go
  pattern: import "istio.io/istio/galley/pkg/config/meta/metadata"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 55
- id: galley-old-metadata-package-reference
  message: Reference to old metadata package path. Update to use galley/pkg/config/schema/collections.
  severity: WARNING
  languages:
  - go
  pattern-regex: istio\.io/istio/galley/pkg/config/meta/metadata
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 55
  paths:
    include:
    - '*.go'
    exclude:
    - galley/pkg/config/meta/metadata/*.go
    - galley/pkg/config/testing/**/*.go
- id: galley-metadata-collection-report
  message: Report using metadata.$COLLECTION. Update to use collections.$COLLECTION.Name().
  severity: WARNING
  languages:
  - go
  pattern: $CTX.Report(metadata.$COLLECTION, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
- id: galley-metadata-k8s-extensions-collections
  message: Using metadata.K8S extensions/service-api collection. Update to use collections
    package.
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: metadata.K8SExtensionsV1Beta1Ingresses
  - pattern: metadata.K8SServiceApiV1Alpha1Gatewayclasses
  - pattern: metadata.K8SServiceApiV1Alpha1Gateways
  - pattern: metadata.K8SServiceApiV1Alpha1Httproutes
  - pattern: metadata.K8SServiceApiV1Alpha1Tcproutes
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
- id: galley-collection-schema-name-func-call
  message: Creating collection.Name outside metadata package. Collections should be
    schema objects from collections package.
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-inside: "import (\n  ...\n  \"istio.io/istio/galley/pkg/config/meta/schema/collection\"\
      \n  ...\n)\n...\n"
  - pattern: $VAR = collection.NewName(...)
  - pattern-not-inside: 'package metadata

      ...

      '
  - pattern-not-inside: 'package testing

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: galley-collection-names-type-with-metadata
