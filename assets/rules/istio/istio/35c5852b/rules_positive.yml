rules:
- id: snapshots-package-usage
  message: Detected usage of snapshots package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $SNAPSHOTS.$ITEM
  - metavariable-regex:
      metavariable: $SNAPSHOTS
      regex: ^(snapshots|[a-zA-Z0-9_]+)$
  - pattern-inside: 'import "$PATH"

      ...

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/galley/pkg/config/schema/snapshots.*
  metadata:
    nr_refactored_patterns: 644
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/meta/metadata/**'
    - '**/vendor/**'
- id: schema-equal-comparison
  message: Detected schema equality comparison
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: $SCHEMA1 == $SCHEMA2
    - pattern: $SCHEMA1 != $SCHEMA2
  - pattern-inside: 'import "$PATH"

      ...

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/galley/pkg/config/schema.*
  metadata:
    nr_refactored_patterns: 545
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/meta/metadata/**'
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: direct-collections-dot-access
  message: Detected direct access to collections package variable
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: collections.$ITEM
  - pattern-inside: 'import "$PATH"

      ...

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/galley/pkg/config/schema/collections
  metadata:
    nr_refactored_patterns: 312
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/meta/metadata/**'
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: collection-specs-iterate
  message: Detected iteration over collection specs
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "for $KEY, $VAL := range $SCHEMAS {\n  ...\n}\n"
  - pattern-inside: 'import "$PATH"

      ...

      '
  - metavariable-regex:
      metavariable: $PATH
      regex: .*/galley/pkg/config/schema.*
  metadata:
    nr_refactored_patterns: 255
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/meta/metadata/**'
    - '**/vendor/**'
  options:
    symbolic_propagation: true
- id: collection-with-build-method
