    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: buildsidecaroutboundhttproute-env-param
  message: buildSidecarOutboundHTTPRouteConfig should remove env parameter
  severity: WARNING
  languages:
  - go
  pattern: configgen.buildSidecarOutboundHTTPRouteConfig($ENV, $NODE, $PUSH, $PROXYINSTANCES,
    $REGISTRIES)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: buildgatewaynetworkfilters-env-param
  message: buildGatewayNetworkFiltersFromTCPRoutes should remove env parameter
  severity: WARNING
  languages:
  - go
  pattern: buildGatewayNetworkFiltersFromTCPRoutes($NODE, $ENV, $PUSH, $SERVER, $GATEWAYSERVERS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: function-def-buildgatewaynetworkfilters-env-param
  message: Gateway network filter builders should accept push parameter instead of
    env
  severity: WARNING
  languages:
  - go
  pattern-regex: func\s+buildGatewayNetworkFiltersFrom(TCP|TLS)Routes\s*\([^)]*env\s+\*model\.Environment[^)]*\)\s*[^{]*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: opts-env-mesh-field-access
  message: Should use push.Mesh.$FIELD instead of opts.env.Mesh.$FIELD
  severity: WARNING
  languages:
  - go
  pattern: $OPTS.env.Mesh.$FIELD
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: inputparams-env-field-should-be-removed
  message: InputParams.Env field should be removed after refactoring - fields moved
    to PushContext
  severity: WARNING
  languages:
  - go
  pattern: "type InputParams struct {\n  ...\n  Env *model.Environment\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: pushcontext-env-field-should-be-removed
  message: PushContext.Env field should be removed after refactoring to break circular
    dependency
  severity: WARNING
  languages:
  - go
  pattern: "type PushContext struct {\n  ...\n  Env *Environment\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: plugin-inputparams-has-env-field
  message: InputParams should not have Env field - use Push field instead after refactoring
  severity: WARNING
  languages:
  - go
  pattern: "type InputParams struct {\n  ...\n  Env *model.Environment\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pilot/pkg/networking/plugin/plugin.go
- id: pushcontext-has-env-field
  message: PushContext should not have Env field to break circular dependency
  severity: WARNING
  languages:
  - go
  pattern: "type PushContext struct {\n  ...\n  Env *Environment\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
