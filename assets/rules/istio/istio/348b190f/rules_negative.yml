    - pilot/pkg/model/push_context.go
- id: read-mesh-config-in-pilot-cmd
  message: ReadMeshConfig should be moved from pilot/cmd/cmd.go to pkg/config/mesh/mesh.go
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-regex: func\s+ReadMeshConfig\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pilot/cmd/cmd.go
- id: resolve-hosts-in-networks-config-wrong-location
  message: ResolveHostsInNetworksConfig should be moved from pilot/pkg/networking/util
    to pkg/config/mesh
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-regex: func\s+ResolveHostsInNetworksConfig\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pilot/pkg/networking/util/*.go
- id: struct-inputparams-env-field
  message: InputParams should not have Env field - use Push field to access PushContext
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-regex: Env\s+\*model\.Environment
  - pattern-inside: "type InputParams struct {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pilot/pkg/networking/plugin/plugin.go
- id: struct-pushcontext-env-field
  message: PushContext should not have Env *Environment field to eliminate circular
    dependency
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-regex: Env\s+\*Environment
  - pattern-inside: "type PushContext struct {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pilot/pkg/model/push_context.go
- id: listenerfilter-timeout-from-env-mesh
  message: Should use push.Mesh.ProtocolDetectionTimeout instead of env.Mesh.ProtocolDetectionTimeout
  severity: WARNING
  languages:
  - go
  pattern: gogo.DurationToProtoDuration($OPTS.env.Mesh.ProtocolDetectionTimeout)
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: readmeshconfig-function-definition
  message: ReadMeshConfig should be moved to pkg/config/mesh/mesh.go
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-regex: func\s+ReadMeshConfig\s*\(
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pilot/cmd/
