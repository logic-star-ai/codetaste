rules:
- id: function-signature-env-without-push
  message: Function should accept push *model.PushContext for snapshot semantics
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+(\w+)\s*\([^)]*env\s+\*model\.Environment[^)]*\)\s*[^{]*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
  paths:
    include:
    - pilot/pkg/networking/core/v1alpha3/
- id: method-signature-has-env-param
  message: Method with env parameter should be refactored to use push
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+\(\w+\s+\*\w+\)\s+\w+\s*\([^)]*env\s+\*model\.Environment[^)]*\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
  paths:
    include:
    - pilot/pkg/networking/core/v1alpha3/
- id: function-param-environment-should-be-pushcontext
  message: Function $FUNC should accept *model.PushContext instead of *model.Environment
    after refactoring
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "func $FUNC(..., $ENV *model.Environment, ...) $RET {\n  ...\n}\n"
  - metavariable-pattern:
      metavariable: $FUNC
      patterns:
      - pattern-regex: (buildGatewayListeners|buildSidecarOutboundListeners|buildSidecarInboundListeners|buildInboundNetworkFilters|buildOutboundNetworkFilters|BuildClusters|BuildListeners|BuildHTTPRoutes)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: pluginparams-env-field-access
  message: Access to pluginParams.Env should be replaced with pluginParams.Push after
    refactoring
  severity: WARNING
  languages:
  - go
  pattern: pluginParams.Env
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: pluginparams-env-direct-access
  message: Access to pluginParams.Env should be replaced with pluginParams.Push
  severity: WARNING
  languages:
  - go
  pattern: pluginParams.Env
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: env-param-before-push-in-function
  message: Function should accept *model.PushContext parameter for snapshot semantics
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-regex: func\s+\w+\([^)]*\*model\.Environment[^)]*\*model\.Proxy[^)]*\)\s+[^{]*\{
  - pattern-not-regex: func\s+\w+\([^)]*\*model\.PushContext[^)]*\)\s+[^{]*\{
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - pilot/pkg/networking/core/
- id: pluginparams-env-getter-access
  message: Should use pluginParams.Push instead of pluginParams.Env
  severity: WARNING
  languages:
  - go
  pattern: pluginParams.Env
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
- id: function-signature-has-env-param-typed
  message: Function with env parameter should be refactored to use push
  severity: INFO
  languages:
  - go
  pattern-regex: func\s+\w+\s*\([^)]*env\s+\*model\.Environment[^)]*\)\s+\*?\w+
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
  paths:
    include:
    - pilot/pkg/networking/core/v1alpha3/
- id: listener-opts-env-field-access
  message: listenerOpts should use push field instead of env field
  severity: WARNING
  languages:
  - go
  pattern: $OPTS.env
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - pilot/pkg/networking/core/v1alpha3/
- id: function-accepts-env-only-not-push
  message: Function should accept push *model.PushContext parameter for snapshot semantics
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC($ENV *model.Environment, $PROXY *model.Proxy) $RET {\n  $...BODY\n\
    }\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: listener-opts-env-mesh-access
  message: listenerOpts should use push.Mesh instead of env.Mesh
  severity: WARNING
  languages:
  - go
  pattern: $OPTS.env.Mesh
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
  paths:
    include:
    - pilot/pkg/networking/core/v1alpha3/
- id: pluginparams-env-mesh-should-use-push
  message: Access to pluginParams.Env.Mesh should be changed to pluginParams.Push.Mesh
    after refactoring
  severity: WARNING
  languages:
  - go
  pattern: pluginParams.Env.Mesh
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: access-pluginparams-env-mesh-field
  message: Should access pluginParams.Push.Mesh instead of pluginParams.Env.Mesh after
    refactoring
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: pluginParams.Env.Mesh.$FIELD
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pluginparams-env-mesh-any-field-access
  message: Access to pluginParams.Env.Mesh should be changed to pluginParams.Push.Mesh
  severity: WARNING
  languages:
  - go
  pattern: pluginParams.Env.Mesh.$FIELD
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: access-pluginparams-env-mesh
  message: Should use pluginParams.Push.Mesh instead of pluginParams.Env.Mesh
  severity: WARNING
  languages:
  - go
  pattern: pluginParams.Env.Mesh
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pluginparams-env-mesh-inboundcluster-statname
  message: Should use pluginParams.Push.Mesh.InboundClusterStatName instead
  severity: WARNING
  languages:
  - go
  pattern: pluginParams.Env.Mesh.InboundClusterStatName
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: pluginparams-env-mesh-inboundclusterstatname-access
  message: Should use pluginParams.Push.Mesh.InboundClusterStatName
  severity: WARNING
  languages:
  - go
  pattern: pluginParams.Env.Mesh.InboundClusterStatName
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: build-inbound-network-filters-with-pluginparams-env
  message: Should use pluginParams.Push instead of pluginParams.Env in buildInboundNetworkFilters
  severity: WARNING
  languages:
  - go
  pattern: buildInboundNetworkFilters(pluginParams.Env, $NODE, $INSTANCE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: appendlistenerfallthrough-env-param
  message: appendListenerFallthroughRoute should use push instead of env
  severity: WARNING
  languages:
  - go
  pattern: appendListenerFallthroughRoute($L, $OPTS, $NODE, $ENV, $ENTRY)
  metadata:
