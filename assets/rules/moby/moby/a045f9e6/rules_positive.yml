rules:
- id: storage-package-import
  message: Detected import of new storage package - refactoring applied
  severity: INFO
  languages:
  - go
  pattern: 'import "github.com/docker/docker/api/types/storage"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: storage-driver-data-field
  message: Detected storage.DriverData field in struct - refactoring applied
  severity: INFO
  languages:
  - go
  pattern: "type $STRUCT struct {\n  ...\n  $FIELD storage.DriverData\n  ...\n}\n"
  metadata:
    category: api
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: image-rootfs-doc-comment
  message: Detected RootFS documentation in image package - refactoring applied
  severity: INFO
  languages:
  - go
  pattern-regex: (?s)// RootFS (contains|describes|returns|holds)
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - api/types/image/*.go
- id: network-endpoint-settings-map-field
  message: Detected Networks map field in container network types - refactoring applied
  severity: INFO
  languages:
  - go
  pattern: "type $STRUCT struct {\n  ...\n  Networks map[string]*$ENDPT\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - api/types/container/*.go
- id: container-summary-usage
  message: Detected usage of container.Summary (renamed from Container) - refactoring
    applied
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: container.Summary
  - pattern-not: 'type $X = container.Summary

      '
  - pattern-not-inside: 'type Summary struct { ... }

      '
  - pattern-not-inside: 'func ($X *Summary) $METHOD(...) { ... }

      '
  metadata:
    category: api
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
