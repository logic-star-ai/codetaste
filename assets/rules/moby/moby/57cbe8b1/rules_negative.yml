  message: Function call with 'Runtime' in name should use 'Daemon' instead
  severity: WARNING
  languages:
  - go
  pattern-regex: (mkRuntime|NewRuntime|mkRuntimeFromEngine|NewRuntimeFromDirectory)\s*\(
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 109
