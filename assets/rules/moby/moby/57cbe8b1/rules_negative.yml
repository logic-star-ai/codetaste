- id: old-runtime-dot-runtime-call
  message: Field access '.runtime.' should be changed to '.daemon.'
  severity: WARNING
  languages:
  - go
  pattern-regex: \.runtime\.
  metadata:
    category: basic
    nr_refactored_patterns: 0
    nr_legacy_patterns: 136
