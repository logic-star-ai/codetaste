  severity: INFO
  languages:
  - go
  pattern: "type Client struct {\n  ...\n  client *http.Client\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: transport-func-type-exists
  message: New transportFunc type exists for test mocking
  severity: INFO
  languages:
  - go
  pattern: 'type transportFunc func(*http.Request) (*http.Response, error)

    '
  metadata:
