rules:
- id: client-struct-literal-with-client
  message: Client struct literal includes client field
  severity: INFO
  languages:
  - go
  pattern-regex: '&Client\{[^}]*client:'
  metadata:
    category: structural
    nr_refactored_patterns: 191
    nr_legacy_patterns: 0
  paths:
    include:
    - client/*.go
- id: test-client-initialized-with-newmock
  message: Test initializes client field with newMockClient
  severity: INFO
  languages:
  - go
  pattern-regex: client:\s*newMockClient
  metadata:
    category: architecture
    nr_refactored_patterns: 190
    nr_legacy_patterns: 0
  paths:
    include:
    - client/*_test.go
- id: test-client-struct-with-http-client
  message: Test creates Client struct with http.Client in client field
  severity: INFO
  languages:
  - go
  pattern-regex: '&Client\{[^}]*client:\s*(?:newMockClient|&http\.Client)'
  metadata:
    category: architecture
    nr_refactored_patterns: 190
    nr_legacy_patterns: 0
  paths:
    include:
    - client/*_test.go
- id: test-client-with-newmock-field
  message: Test initializes Client.client with newMockClient
  severity: INFO
  languages:
  - go
  pattern-regex: client:\s*newMockClient
  metadata:
    category: architecture
    nr_refactored_patterns: 190
    nr_legacy_patterns: 0
  paths:
    include:
    - client/*_test.go
- id: resolve-functions-usage-pattern
  message: Using resolve helper functions with arguments
  severity: INFO
  languages:
  - go
  pattern-regex: resolve(Scheme|TLSConfig)\([^)]+\)
  metadata:
    category: api
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - client/*.go
- id: resolve-tls-config-function-call-any
  message: Calling resolveTLSConfig function
  severity: INFO
  languages:
  - go
  pattern-regex: resolveTLSConfig\(
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - client/*.go
- id: transport-go-helper-functions-exist
  message: transport.go contains new helper functions and types
  severity: INFO
  languages:
  - go
  pattern-regex: (func resolveScheme|func resolveTLSConfig|type transportFunc)
  metadata:
    category: api
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    include:
    - client/transport.go
- id: access-client-field-transport
  message: Accessing Transport from cli.client field
  severity: INFO
  languages:
  - go
  pattern: $CLI.client.Transport
  metadata:
    category: structural
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - client/*.go
