rules:
- id: newmockclient-with-tls-param
  message: Call to newMockClient() with TLS parameter. After refactoring, this should
    return *http.Client without TLS param
  severity: WARNING
  languages:
  - go
  pattern: 'newMockClient($TLS, $DOER)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 190
- id: old-transport-package-import
  message: Old transport package import detected. Replace with direct *http.Client
    usage and helper functions in transport.go
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/docker/docker/client/transport"

    '
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: import-block-with-transport
  message: Import block contains old transport or cancellable package. Remove these
    imports
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: "import (\n  ...\n  \"github.com/docker/docker/client/transport\"\n\
        \  ...\n)\n"
    - pattern: "import (\n  ...\n  \"github.com/docker/docker/client/transport/cancellable\"\
        \n  ...\n)\n"
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: transport-import-godoc-link
  message: Reference to transport package path. Update or remove
  severity: INFO
  languages:
  - go
  pattern-regex: github\.com/docker/docker/client/transport
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: import-transport-package-path
  message: Import path referencing transport package. This package should be removed
  severity: WARNING
  languages:
  - go
  pattern-regex: github\.com/docker/docker/client/transport["\s]
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: transport-sender-interface-usage
  message: Function using transport.Sender interface parameter. After refactor, use
    transportFunc or *http.Client
  severity: WARNING
  languages:
  - go
  pattern: 'func $FUNC(..., $PARAM transport.Sender, ...) { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: package-cancellable-declaration
  message: Package cancellable declaration. This forked ctxhttp package should be
    deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: ^package\s+cancellable\s*$
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: tlsinfo-pointer-receiver
  message: Method with tlsInfo receiver. Remove as part of transport package deletion
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func ($T *tlsInfo) $METHOD(...) { ... }

        '
    - pattern: 'func ($T *tlsInfo) $METHOD(...) $RET { ... }

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: transport-test-hook-call
  message: Test hook call from forked ctxhttp. Remove when using upstream
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: testHookContextDoneBeforeHeaders()
    - pattern: testHookDoReturned()
    - pattern: testHookDidBodyClose()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: transport-tlsconfig-method-comment
  message: Comment for TLSConfig() method from transport package. Remove with package
  severity: INFO
  languages:
  - go
  pattern-regex: TLSConfig.*returns.*TLS\s+configuration
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: transport-secure-method-call
  message: Call to transport.Secure() method detected. Replace with logic based on
    TLS config
  severity: WARNING
  languages:
  - go
  pattern: '$CLIENT.transport.Secure()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: transport-apitransport-struct-usage
  message: Direct usage of apiTransport struct detected. This should be replaced with
    *http.Client
  severity: WARNING
  languages:
  - go
  pattern: "apiTransport{\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: mock-client-tlsconfig-method
  message: Mock client implementing TLSConfig() method. After refactoring, mocks should
    use http.RoundTripper interface
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) TLSConfig() *tls.Config {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: mock-client-secure-method
  message: Mock client implementing Secure() method. After refactoring, this should
    be removed from mocks
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *$TYPE) Secure() bool {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: cancellable-package-comment-fork
  message: Fork information comment detected. These comments should be removed after
    adopting upstream ctxhttp
  severity: INFO
  languages:
  - go
  pattern-regex: (?i)FORK\s+INFORMATION|forked.*ctxhttp|deviates\s+from.*upstream.*golang\.org/x/net
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: notifyingreader-pointer-receiver
  message: Method with notifyingReader receiver from forked ctxhttp. Remove when using
    upstream
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: 'func ($R *notifyingReader) $METHOD(...) { ... }

        '
    - pattern: 'func ($R *notifyingReader) $METHOD(...) $RET { ... }

        '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: transport-secure-method-comment
  message: Comment for Secure() method from transport package. Remove with package
  severity: INFO
  languages:
  - go
  pattern-regex: Secure.*returns.*true.*TLS\s+configuration
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: transport-scheme-method-comment
  message: Comment for Scheme() method from transport package. Remove with package
  severity: INFO
  languages:
  - go
  pattern-regex: Scheme.*returns.*protocol\s+scheme
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: notifyonce-close-notify
  message: notifyOnce pattern from forked ctxhttp notifyingReader. Remove with package
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: "$R.notifyOnce.Do(func() {\n  close($R.notify)\n})\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: old-cancellable-package-import
  message: Forked ctxhttp import detected. Replace with upstream golang.org/x/net/context/ctxhttp
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/docker/docker/client/transport/cancellable"

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-client-interface-field
  message: Client struct using transport.Client field. Replace with *http.Client field
    named 'client'
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  transport transport.Client\n  ...\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-newtransportwithhttp-call
  message: Call to transport.NewTransportWithHTTP() detected. Replace with direct
    http.Client setup
  severity: WARNING
  languages:
  - go
  pattern: 'transport.NewTransportWithHTTP($PROTO, $ADDR, $CLIENT)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cancellable-do-call
  message: Call to forked cancellable.Do() detected. Replace with upstream ctxhttp.Do()
  severity: WARNING
  languages:
  - go
  pattern: 'cancellable.Do($CTX, $TRANSPORT, $REQ)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-tlsconfig-method-call
  message: Call to transport.TLSConfig() method detected. Replace with resolveTLSConfig()
    helper function
  severity: WARNING
  languages:
  - go
  pattern: '$CLIENT.transport.TLSConfig()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-scheme-method-call
  message: Call to transport.Scheme() method detected. Replace with resolveScheme()
    helper function
  severity: WARNING
  languages:
  - go
  pattern: '$CLIENT.transport.Scheme()

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mock-client-implements-transport-client
  message: Function returning transport.Client (likely mock setup). Update to return
    *http.Client with custom RoundTripper
  severity: WARNING
  languages:
  - go
  pattern: "func $FUNC(...) transport.Client {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-tlsinfo-struct-usage
  message: Direct usage of tlsInfo struct detected. This should be removed as part
    of transport package removal
  severity: WARNING
  languages:
  - go
  pattern: "tlsInfo{\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-defaulttransport-call
  message: Call to defaultTransport() helper detected. This should be inlined or replaced
    with direct http.Transport setup
  severity: WARNING
  languages:
  - go
  pattern: 'defaultTransport($PROTO, $ADDR)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-client-interface-definition
  message: transport.Client interface definition detected. This entire interface should
    be removed
  severity: WARNING
  languages:
  - go
  pattern: "type Client interface {\n  Sender\n  Secure() bool\n  Scheme() string\n\
    \  TLSConfig() *tls.Config\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-sender-interface-definition
  message: transport.Sender interface definition detected. This should be removed
    or replaced with transportFunc type
  severity: WARNING
  languages:
  - go
  pattern: "type Sender interface {\n  Do(*http.Request) (*http.Response, error)\n\
    }\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-notifyingreader-struct
  message: notifyingReader struct from forked ctxhttp detected. Should be removed
    with upstream ctxhttp adoption
  severity: WARNING
  languages:
  - go
  pattern: "type notifyingReader struct {\n  ...\n  notify $TYPE\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-package-doc-comment
  message: Transport package documentation detected. This package should be removed
    entirely
  severity: WARNING
  languages:
  - go
  pattern-regex: (?i)Package\s+transport\s+provides.*remote\s+endpoints
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: client-struct-transport-field-comment
  message: Comment referencing transport.Client interface in struct. Update to reference
    *http.Client
  severity: INFO
  languages:
  - go
  pattern-regex: transport\s+is\s+the\s+interface.*transport\.Client
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-package-client-file-exists
  message: File client/transport/client.go exists. This entire transport package should
    be deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - client/transport/client.go
- id: transport-package-transport-file-exists
  message: File client/transport/transport.go exists. This entire transport package
    should be deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - client/transport/transport.go
- id: cancellable-package-cancellable-file-exists
  message: File client/transport/cancellable/cancellable.go exists. Forked ctxhttp
    should be deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - client/transport/cancellable/cancellable.go
- id: cancellable-package-canceler-file-exists
  message: File client/transport/cancellable/canceler.go exists. Forked ctxhttp should
    be deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - client/transport/cancellable/canceler.go
- id: cancellable-package-canceler-go14-file-exists
  message: File client/transport/cancellable/canceler_go14.go exists. Forked ctxhttp
    should be deleted
  severity: WARNING
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - client/transport/cancellable/canceler_go14.go
- id: url-scheme-from-transport-scheme
  message: Setting URL scheme from transport.Scheme(). Use resolveScheme() helper
    instead
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$REQ.URL.Scheme = $CLI.transport.Scheme()

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tls-config-from-transport-tls
  message: Passing transport.TLSConfig() to function. Use resolveTLSConfig() helper
    instead
  severity: WARNING
  languages:
  - go
  patterns:
  - pattern: '$FUNC(..., $CLI.transport.TLSConfig())

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mock-do-method-field
  message: Mock struct with 'do' field implementing transport.Client. Update to use
    http.RoundTripper pattern
  severity: WARNING
  languages:
  - go
  pattern: "type $TYPE struct {\n  ...\n  do func(*http.Request) (*http.Response,\
    \ error)\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cancellable-do-function-signature
  message: cancellable.Do function signature detected. Should be removed in favor
    of upstream ctxhttp
  severity: WARNING
  languages:
  - go
  pattern: "func Do(ctx context.Context, client transport.Sender, req *http.Request)\
    \ (*http.Response, error) {\n  ...\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-interface-check
  message: Interface check for transport Client. Remove this as transport package
    should be deleted
  severity: WARNING
  languages:
  - go
  pattern: 'var _ Client = &apiTransport{}

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: apitransport-struct-definition
  message: apiTransport struct definition detected. This should be removed as part
    of transport package removal
  severity: WARNING
  languages:
  - go
  pattern: "type apiTransport struct {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tlsinfo-struct-definition
  message: tlsInfo struct definition detected. This should be removed as part of transport
    package removal
  severity: WARNING
  languages:
  - go
  pattern: "type tlsInfo struct {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cancellable-context-done-before-headers-hook
  message: Test hook from forked ctxhttp detected. Remove when switching to upstream
    ctxhttp
  severity: INFO
  languages:
  - go
  pattern: 'testHookContextDoneBeforeHeaders = nop

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cancellable-do-returned-hook
  message: Test hook from forked ctxhttp detected. Remove when switching to upstream
    ctxhttp
  severity: INFO
  languages:
  - go
  pattern: 'testHookDoReturned = nop

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cancellable-body-close-hook
  message: Test hook from forked ctxhttp detected. Remove when switching to upstream
    ctxhttp
  severity: INFO
  languages:
  - go
  pattern: 'testHookDidBodyClose = nop

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: notifyingreader-read-method
  message: notifyingReader.Read method from forked ctxhttp. Remove when using upstream
    ctxhttp
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *notifyingReader) Read($P []byte) (int, error) {\n  ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: notifyingreader-close-method
  message: notifyingReader.Close method from forked ctxhttp. Remove when using upstream
    ctxhttp
  severity: WARNING
  languages:
  - go
  pattern: "func ($RECV *notifyingReader) Close() error {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tlsinfo-tlsconfig-method
  message: tlsInfo.TLSConfig method implementation. Remove as part of transport package
    removal
  severity: WARNING
  languages:
  - go
  pattern: "func ($T *tlsInfo) TLSConfig() *tls.Config {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tlsinfo-scheme-method
  message: tlsInfo.Scheme method implementation. Remove as part of transport package
    removal
  severity: WARNING
  languages:
  - go
  pattern: "func ($T *tlsInfo) Scheme() string {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: tlsinfo-secure-method
  message: tlsInfo.Secure method implementation. Remove as part of transport package
    removal
  severity: WARNING
  languages:
  - go
  pattern: "func ($T *tlsInfo) Secure() bool {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: apitransport-cancelrequest-method
  message: apiTransport.CancelRequest method. Remove as part of transport package
    removal
  severity: WARNING
  languages:
  - go
  pattern: "func ($A *apiTransport) CancelRequest($REQ *http.Request) {\n  ...\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: defaulttransport-function
  message: defaultTransport helper function from transport package. Should be inlined
    or removed
  severity: WARNING
  languages:
  - go
  pattern: "func defaultTransport($PROTO, $ADDR string) *http.Transport {\n  ...\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: newtransportwithhttp-function
  message: NewTransportWithHTTP function from transport package. Should be removed
    and replaced with direct http.Client setup
  severity: WARNING
  languages:
  - go
  pattern: "func NewTransportWithHTTP($PROTO, $ADDR string, $CLIENT *http.Client)\
    \ (Client, error) {\n  ...\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cancellable-nop-function
  message: nop() function from forked ctxhttp. Remove when switching to upstream ctxhttp
  severity: INFO
  languages:
  - go
  pattern: 'func nop() {}

    '
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cancellable-responseAndError-type
  message: responseAndError type from forked ctxhttp. Remove when using upstream ctxhttp
  severity: WARNING
  languages:
  - go
  pattern: "type responseAndError struct {\n  resp *http.Response\n  err  error\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mock-client-struct-with-do-field
  message: mockClient struct implementing transport.Client. Replace with *http.Client
    and custom RoundTripper
  severity: WARNING
  languages:
  - go
  pattern: "type mockClient struct {\n  do func(*http.Request) (*http.Response, error)\n\
    }\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: mock-client-do-method
  message: mockClient.Do method implementation. Replace with http.RoundTripper pattern
    for mocking
  severity: WARNING
  languages:
  - go
  pattern: "func ($M mockClient) Do($REQ *http.Request) (*http.Response, error) {\n\
    \  return $M.do($REQ)\n}\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-secure-error-message-check
  message: Check for !transport.Secure() in conditional. Replace with TLS config check
  severity: WARNING
  languages:
  - go
  pattern-regex: if\s+!\w+\.transport\.Secure\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: transport-secure-error-message-check-positive
  message: Check for transport.Secure() in conditional. Replace with TLS config check
  severity: WARNING
  languages:
  - go
  pattern-regex: if\s+\w+\.transport\.Secure\(\)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: cancellable-import-in-comment
  message: Reference to client/transport/cancellable path. Update to reference upstream
    ctxhttp
  severity: INFO
  languages:
  - go
  pattern-regex: client/transport/cancellable
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: newmockclient-function-declaration
  message: newMockClient function returning transport.Client. Should return *http.Client
    after refactoring
  severity: WARNING
  languages:
  - go
  pattern: "func newMockClient($TLS *tls.Config, $DOER func(*http.Request) (*http.Response,\
    \ error)) transport.Client {\n  ...\n}\n"
  metadata:
    category: architectural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: newmockclient-tls-panic-check
  message: TLS panic check in newMockClient. Remove this check after refactoring to
    simpler mock pattern
  severity: INFO
  languages:
  - go
  pattern: "if $TLS != nil {\n  panic(\"this actually gets set!\")\n}\n"
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: client-new-with-transport-field-init
  message: Client initialization with transport field. Should use 'client' field with
    *http.Client
  severity: WARNING
  languages:
  - go
  pattern: "return &Client{\n  host: $HOST,\n  proto: $PROTO,\n  addr: $ADDR,\n  basePath:\
    \ $BASE,\n  transport: $TRANSPORT,\n  version: $VERSION,\n  customHTTPHeaders:\
    \ $HEADERS,\n}, nil\n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: dial-with-transport-tlsconfig
  message: Calling dial() with transport.TLSConfig(). Use resolveTLSConfig() helper
    instead
  severity: WARNING
  languages:
