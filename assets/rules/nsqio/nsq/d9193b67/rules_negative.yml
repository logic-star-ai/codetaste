rules:
- id: detect-util-fatalclienterr-usage
  message: Usage of util.FatalClientErr detected. This type has moved to internal/protocol.
    Update import to 'github.com/bitly/nsq/internal/protocol' and use protocol.FatalClientErr.
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: util.NewFatalClientErr(...)
  - pattern: '*util.FatalClientErr'
  - pattern: util.FatalClientErr
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 83
