rules:
- id: mobx-react-lite-observer-import
  message: MobX observer import detected. Remove mobx-react-lite imports as part of
    MobX cleanup.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { observer } from 'mobx-react-lite'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 52
  paths:
    exclude:
    - src/view/com/composer/Composer.tsx
    - src/view/com/composer/photos/Gallery.tsx
    - src/view/com/modals/EditImage.tsx
    - src/view/shell/Composer.tsx
- id: observer-wrapper-export-const
  message: Exported constant with observer wrapper. Remove observer() wrapper.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: export const $NAME = observer($COMPONENT)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
  paths:
    exclude:
    - src/view/com/composer/Composer.tsx
    - src/view/com/composer/photos/Gallery.tsx
    - src/view/com/modals/EditImage.tsx
    - src/view/shell/Composer.tsx
- id: observer-const-function-declaration
  message: Constant function wrapped with observer(). Remove observer() wrapper.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'const $NAME = observer(function $FNAME($ARGS) { ... })

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
  paths:
    exclude:
    - src/view/com/composer/Composer.tsx
    - src/view/com/composer/photos/Gallery.tsx
    - src/view/com/modals/EditImage.tsx
    - src/view/shell/Composer.tsx
- id: root-store-model-parameter-type
  message: Function parameter typed as RootStoreModel. Update function signature to
    use BskyAgent or remove.
  severity: WARNING
  languages:
  - typescript
  pattern: 'function $NAME($ARG: RootStoreModel, ...) { ... }

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: model-with-root-store-reference
  message: Reference to this.rootStore in model. Remove RootStoreModel dependencies.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: 'this.rootStore

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - src/state/models/**
    exclude:
    - src/state/models/media/**
- id: store-me-access
  message: Direct store.me access. Remove MeModel usage and use current profile data.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: $STORE.me
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: use-stores-import
  message: useStores import detected. Remove useStores hook imports.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { useStores } from '$PATH'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: use-stores-hook-call
  message: useStores() hook detected. Replace with direct session/agent access or
    React Query.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: useStores()
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: mobx-make-auto-observable-import
  message: makeAutoObservable import from mobx detected. Remove mobx imports from
    models.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { makeAutoObservable } from 'mobx'
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - src/state/models/media/gallery.ts
    - src/state/models/media/image.ts
- id: use-stores-from-state-import
  message: useStores imported from state. Remove useStores hook imports.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { useStores } from 'state'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: use-stores-from-state-index
  message: useStores imported from state/index. Remove useStores hook imports.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { useStores } from 'state/index'
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: models-directory-reference
  message: Reference to state/models (non-media). Most models should be deleted.
  severity: INFO
  languages:
  - typescript
  - javascript
  pattern-regex: state/models/(?!media)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    exclude:
    - src/state/models/media/**
- id: models-cache-directory-exists
  message: Cache models directory should be cleaned up. Remove cache models except
    image-sizes (which should move).
  severity: INFO
  languages:
  - typescript
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
  paths:
    include:
    - src/state/models/cache
- id: models-session-import-statement
  message: Import statement from models/session. Remove SessionModel imports.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import.*from.*'.*models/session'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: root-store-from-state-import
  message: RootStoreModel imported from state. Remove RootStoreModel imports.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern: import { RootStoreModel } from 'state'
  metadata:
