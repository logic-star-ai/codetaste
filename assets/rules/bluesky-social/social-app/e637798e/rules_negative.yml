    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: root-store-logger-debug-call
  message: Logger debug call for RootStoreModel. Remove RootStoreModel logging.
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: 'logger\.debug\(''RootStoreModel:'
