- id: refactor-detect-block-and-mute-state-import
  message: Detected BlockAndMuteState import - new unified state class
  severity: INFO
  languages:
  - typescript
  pattern: 'import { ..., BlockAndMuteState, ... } from $MOD

    '
  metadata:
    category: dependency
    nr_refactored_patterns: 10
    nr_legacy_patterns: 0
- id: refactor-detect-get-block-and-mute-state-call
  message: Detected call to unified getBlockAndMuteState() method - new pipeline pattern
