rules:
- id: sklearn-multi-import-from-arpack
  message: 'Refactor required: Import sparse linear algebra functions from ''scipy.sparse.linalg''
    instead of ''sklearn.utils.arpack'''
  severity: WARNING
  languages:
  - python
  pattern: from ..utils.arpack import $X, ...
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 41
  paths:
    exclude:
    - sklearn/utils/arpack.py
    - sklearn/utils/tests/
- id: sklearn-pinvh-usage-with-utils-extmath-import
  message: 'Refactor required: Use ''scipy.linalg.pinvh'' instead of ''sklearn.utils.extmath.pinvh'''
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: 'from ..utils.extmath import pinvh

      ...

      pinvh($X)

      '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
  paths:
    exclude:
    - sklearn/utils/extmath.py
    - sklearn/utils/tests/
