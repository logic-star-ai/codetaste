- id: sklearn-scipy-version-check-013
  message: 'Refactor required: Remove SciPy version check for < 0.13 as it is now
    the minimum supported version'
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: scipy_version < (0, 13)
  - pattern: scipy_version < (0, 13, 0)
  - pattern: sp_version < (0, 13)
  - pattern: sp_version < (0, 13, 0)
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: sklearn-arpack-module-qualified-call
  message: 'Refactor required: Replace ''arpack.$FUNC'' with ''scipy.sparse.linalg.$FUNC'''
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: $ARPACK.$FUNC(...)
  - metavariable-pattern:
      metavariable: $ARPACK
      pattern: arpack
  - metavariable-pattern:
      metavariable: $FUNC
      patterns:
      - pattern-either:
        - pattern: eigsh
        - pattern: eigs
        - pattern: svds
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    exclude:
    - sklearn/utils/arpack.py
    - sklearn/utils/tests/
