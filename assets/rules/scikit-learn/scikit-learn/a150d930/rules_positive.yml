rules:
- id: scipy-linalg-pinvh-taint
  message: 'Refactoring detected: Using scipy.linalg.pinvh in computation'
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: scipy.linalg.pinvh
  - pattern: scipy.linalg.pinvh(...)
  pattern-sinks:
  - pattern: $VAR = $SINK
  - pattern: return $SINK
  metadata:
    nr_refactored_patterns: 68
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: scipy-misc-logsumexp-taint
  message: 'Refactoring detected: Using scipy.misc.logsumexp'
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: scipy.misc.logsumexp
  - pattern: scipy.misc.logsumexp(...)
  pattern-sinks:
  - pattern: $VAR = $SINK
  - pattern: return $SINK
  metadata:
    nr_refactored_patterns: 27
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: sklearn-module-scipy-import-refined
  message: 'Refactoring detected: sklearn module with new scipy imports'
  severity: INFO
  languages:
  - python
  pattern-regex: (from scipy\.(special|misc|linalg|stats|sparse\.(linalg|csgraph))
    import .*(expit|logsumexp|norm|pinvh|eigsh|eigs|svds|rankdata|connected_components).*)
  metadata:
    nr_refactored_patterns: 19
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sklearn/linear_model/*.py'
    - '**/sklearn/neural_network/*.py'
    - '**/sklearn/mixture/*.py'
    - '**/sklearn/manifold/*.py'
    - '**/sklearn/cluster/*.py'
    - '**/sklearn/metrics/*.py'
    - '**/sklearn/ensemble/*.py'
    - '**/sklearn/covariance/*.py'
    - '**/sklearn/cross_decomposition/*.py'
    - '**/sklearn/feature_extraction/*.py'
    exclude:
    - '**/tests/**'
    - '**/sklearn/decomposition/truncated_svd.py'
  options:
    symbolic_propagation: true
- id: scipy-csgraph-connected-components-taint
  message: 'Refactoring detected: Using scipy.sparse.csgraph.connected_components'
  severity: INFO
  languages:
  - python
  mode: taint
  pattern-sources:
  - pattern: scipy.sparse.csgraph.connected_components
  - pattern: scipy.sparse.csgraph.connected_components(...)
  pattern-sinks:
  - pattern: $VAR = $SINK
  - pattern: return $SINK
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: migrated-function-logsumexp-import
  message: 'Refactoring detected: logsumexp function imported from scipy.misc'
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: from scipy.misc import logsumexp
  - pattern: from scipy.misc import $X, logsumexp
  - pattern: from scipy.misc import logsumexp, $Y
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sklearn/utils/extmath.py'
    - '**/sklearn/utils/tests/**'
  options:
    symbolic_propagation: true
- id: migrated-function-expit-import
  message: 'Refactoring detected: expit function imported from scipy'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: from scipy.special import expit
    - pattern: from scipy.special import $X, expit
    - pattern: from scipy.special import expit, $Y
    - pattern: from scipy.special import $X, expit, $Y
  - pattern-not-inside: "from scipy.special import expit\nwith np.errstate(...):\n\
      \  ...\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sklearn/utils/fixes.py'
  options:
    symbolic_propagation: true
- id: migrated-function-eigsh-import
  message: 'Refactoring detected: eigsh function imported from scipy.sparse.linalg'
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: from scipy.sparse.linalg import eigsh
  - pattern: from scipy.sparse.linalg import $X, eigsh
  - pattern: from scipy.sparse.linalg import eigsh, $Y
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sklearn/utils/arpack.py'
    - '**/sklearn/utils/tests/**'
  options:
    symbolic_propagation: true
- id: scipy-qualified-svds-usage
  message: 'Refactoring detected: Using scipy.sparse.linalg.svds directly'
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: $VAR = scipy.sparse.linalg.svds(...)
  - pattern: $U, $S, $V = scipy.sparse.linalg.svds(...)
  - pattern: return scipy.sparse.linalg.svds(...)
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sklearn/utils/**'
    - '**/benchmarks/**'
  options:
    symbolic_propagation: true
- id: scipy-sparse-linalg-svds-at-module-level
  message: 'Refactoring detected: scipy.sparse.linalg.svds imported at module level'
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: from scipy.sparse.linalg import svds
  - pattern-not-inside: "try:\n  ...\nexcept ImportError:\n  ...\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sklearn/utils/arpack.py'
    - '**/benchmarks/**'
  options:
    symbolic_propagation: true
- id: scipy-sparse-csgraph-import-generic
  message: 'Refactoring detected: Import from scipy.sparse.csgraph module'
  severity: INFO
  languages:
  - python
  pattern: from scipy.sparse.csgraph import $FUNC
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sklearn/utils/sparsetools/**'
    - '**/sklearn/utils/tests/**'
  options:
    symbolic_propagation: true
- id: migrated-function-pinvh-import
  message: 'Refactoring detected: pinvh function imported from scipy.linalg'
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: from scipy.linalg import pinvh
  - pattern: from scipy.linalg import $X, pinvh
  - pattern: from scipy.linalg import pinvh, $Y
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/sklearn/utils/extmath.py'
    - '**/sklearn/utils/tests/**'
  options:
    symbolic_propagation: true
- id: any-scipy-import-cross-decomposition
  message: 'Refactoring detected: cross_decomposition with scipy import'
  severity: INFO
  languages:
  - python
  pattern-either:
  - pattern: from scipy.$M1 import $F
  - pattern: from scipy.$M1.$M2 import $F
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sklearn/cross_decomposition/pls_.py'
  options:
    symbolic_propagation: true
- id: metrics-rankdata-from-scipy
  message: 'Refactoring detected: metrics importing rankdata from scipy'
  severity: INFO
  languages:
  - python
  pattern: from scipy.stats import rankdata
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sklearn/metrics/**'
  options:
    symbolic_propagation: true
