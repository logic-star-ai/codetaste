- id: detect-no-six-externals-import
  message: Key utility file no longer imports six from externals (refactored)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: from.*sklearn\.externals.*six.*import|from.*externals.*six
  metadata:
    category: dependency
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - sklearn/utils/validation.py
    - sklearn/utils/metaestimators.py
