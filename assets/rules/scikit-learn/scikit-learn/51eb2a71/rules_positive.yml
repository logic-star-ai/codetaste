rules:
- id: detect-stringio-write-pattern
  message: Detected StringIO instantiation from io (refactored from six.moves.cStringIO)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: '$VAR = StringIO()

      ...

      '
  - pattern-inside: 'from io import StringIO

      ...

      '
  metadata:
    category: api
    nr_refactored_patterns: 192
    nr_legacy_patterns: 0
- id: detect-metaclass-kwarg-syntax
  message: Detected metaclass= syntax (refactored from six.with_metaclass)
  severity: INFO
  languages:
  - python
  pattern: "class $CLASS(..., metaclass=$META):\n  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
