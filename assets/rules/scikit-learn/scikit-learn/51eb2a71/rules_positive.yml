rules:
- id: py3-metaclass-in-sklearn
  message: Detected Python 3 metaclass syntax in sklearn
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "class $CLS(..., metaclass=$META):\n    ...\n"
  - pattern-not-inside: 'from $X import six

      ...

      '
  metadata:
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sklearn/**/*.py'
  options:
    symbolic_propagation: true
- id: str-check-without-string-types
  message: str type check without six.string_types
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: isinstance($VAR, str)
  - pattern-not-inside: 'from $X.externals import six

      ...

      '
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sklearn/utils/*.py'
    - '**/sklearn/ensemble/*.py'
    - '**/sklearn/svm/*.py'
    exclude:
    - '**/sklearn/externals/**'
    - '**/sklearn/utils/deprecation.py'
  options:
    symbolic_propagation: true
- id: items-loop-no-iteritems
  message: for loop with .items() - migrated from six.iteritems
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: "for $K, $V in $D.items():\n    ...\n"
  - pattern-not-inside: 'from $X.externals import six

      ...

      '
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sklearn/base.py'
    - '**/sklearn/ensemble/*.py'
    - '**/sklearn/utils/metaestimators.py'
  options:
    symbolic_propagation: true
- id: items-in-enumerate-sorted
  message: Detected sorted enumerate with .items() - migrated from six
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: enumerate(sorted($DICT.items()))
  - pattern-not-inside: 'from ... import six

      ...

      '
  metadata:
    nr_refactored_patterns: 3
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: manifold-no-six-string-types
  message: manifold checks str without six.string_types
  severity: INFO
  languages:
  - python
  patterns:
  - pattern: isinstance($VAR, str)
  - pattern-not-inside: 'from ... import six

      ...

      '
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sklearn/manifold/*.py'
  options:
    symbolic_propagation: true
- id: no-py3-check-in-file
  message: File exists without PY3 conditional - Python 2 code removed
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-regex: \A[\s\S]*
  - pattern-not-regex: .*six\.PY3.*
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/sklearn/datasets/kddcup99.py'
  options:
    symbolic_propagation: true
