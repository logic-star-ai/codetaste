- id: detect-abc-import-with-metaclass
  message: Detected abc import with metaclass= syntax (refactored from six.with_metaclass)
  severity: INFO
  languages:
  - python
  patterns:
  - pattern-either:
    - pattern: "from abc import ABCMeta\n...\nclass $CLASS(..., metaclass=ABCMeta):\n\
        \  ...\n"
    - pattern: "from abc import ABCMeta, abstractmethod\n...\nclass $CLASS(..., metaclass=ABCMeta):\n\
        \  ...\n"
  metadata:
    category: structural
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
