rules:
- id: six-attribute-access
  message: Remove six library usage - replace with Python 3 native equivalents
  severity: WARNING
  languages:
  - python
  pattern: six.$ATTR
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 135
- id: sklearn-externals-six-import
  message: Remove sklearn.externals.six import - Python 2 compatibility is no longer
    needed
  severity: WARNING
  languages:
  - python
  pattern: from sklearn.externals import six
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 54
- id: six-string-types-usage
  message: Replace six.string_types with str - Python 3 uses str for all strings
  severity: WARNING
  languages:
  - python
  pattern: six.string_types
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 53
- id: isinstance-six-string-types
  message: Replace isinstance($OBJ, six.string_types) with isinstance($OBJ, str) -
    Python 3 uses str for all strings
  severity: WARNING
  languages:
  - python
  pattern: isinstance($OBJ, six.string_types)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 50
- id: xrange-usage-excluding-externals
  message: Replace xrange() with range() - Python 3 range is an iterator
  severity: WARNING
  languages:
  - python
  pattern: xrange($ARGS)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
  paths:
    exclude:
    - sklearn/externals/*
- id: six-string-types-if-check
  message: Replace isinstance($VAR, six.string_types) with isinstance($VAR, str) in
    conditional
  severity: WARNING
  languages:
  - python
  pattern: "if isinstance($VAR, six.string_types):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 28
- id: sklearn-externals-six-b-function
  message: Replace sklearn.externals.six.b() with b'' prefix - Python 3 bytes literal
  severity: WARNING
  languages:
  - python
  pattern: sklearn.externals.six.b($STR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: six-iteritems-call
  message: Replace six.iteritems($DICT) with $DICT.items() - Python 3 dict method
  severity: WARNING
  languages:
  - python
  pattern: six.iteritems($DICT)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 21
- id: six-with-metaclass-usage
  message: Replace six.with_metaclass() with Python 3 metaclass= syntax in class definition
  severity: WARNING
  languages:
  - python
  pattern: six.with_metaclass($META, $BASE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: six-with-metaclass-in-class
  message: 'Replace six.with_metaclass() with metaclass= syntax: class $CLASS($BASE,
    metaclass=$META)'
  severity: WARNING
  languages:
  - python
  pattern: "class $CLASS(six.with_metaclass($META, $BASE)):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 17
- id: six-with-metaclass-abcmeta-densitymixin
  message: Replace six.with_metaclass(ABCMeta, ...) with Python 3 metaclass=ABCMeta
    syntax
  severity: WARNING
  languages:
  - python
  pattern: "class $CLASS(six.with_metaclass(ABCMeta, $BASE1, $BASE2)):\n  ...\n"
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: six-string-types-logical-check
  message: Replace isinstance() check with six.string_types to str - Python 3 uses
    str
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: isinstance($V, six.string_types) or $REST
  - pattern: isinstance($V, six.string_types) and $REST
  - pattern: $REST or isinstance($V, six.string_types)
  - pattern: $REST and isinstance($V, six.string_types)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: six-with-metaclass-multiple-bases
  message: Replace six.with_metaclass() with Python 3 metaclass= syntax for multiple
    bases
  severity: WARNING
  languages:
  - python
  pattern: six.with_metaclass($META, $BASE1, $BASE2)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: sklearn-externals-six-moves-cstringio-import
  message: Replace sklearn.externals.six.moves.cStringIO with io.StringIO - use Python
    3 native io module
  severity: WARNING
  languages:
  - python
  pattern: from sklearn.externals.six.moves import cStringIO as StringIO
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: six-string-types-and-condition
  message: Replace isinstance($V, six.string_types) with isinstance($V, str) in and
    condition
  severity: WARNING
  languages:
  - python
  pattern: isinstance($V, six.string_types) and $COND
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: six-string-types-equality-check
  message: Replace isinstance($VAR, six.string_types) with isinstance($VAR, str) in
    equality check
  severity: WARNING
  languages:
  - python
  pattern: isinstance($VAR, six.string_types) and $VAR == $STR
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
- id: sklearn-externals-six-u-function
  message: Remove sklearn.externals.six.u() - Python 3 strings are unicode by default
  severity: WARNING
  languages:
  - python
  pattern: sklearn.externals.six.u($STR)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
