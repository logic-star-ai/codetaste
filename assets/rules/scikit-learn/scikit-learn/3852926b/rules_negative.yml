rules:
- id: old-autosummary-toctree-generated
  message: autosummary toctree references 'generated' directory. New API structure
    should use 'api' directory.
  severity: WARNING
  languages:
  - generic
  pattern-regex: :toctree:.*generated
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 99
  paths:
    include:
    - doc/modules/*.rst
- id: classes-rst-has-autosummary-with-old-template
  message: Old autosummary template reference found in classes.rst. Should be replaced
    with new template system.
  severity: WARNING
  languages:
  - generic
  pattern-regex: :template:\s+(class|function|deprecated_)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 96
  paths:
    include:
    - doc/modules/classes.rst
- id: classes-rst-references-generated-toctree
  message: Toctree reference to 'generated/' directory in classes.rst indicates old
    build structure. New structure should use api/ directory.
  severity: WARNING
  languages:
  - generic
  pattern-regex: :toctree:\s+generated/
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 96
  paths:
    include:
    - doc/modules/classes.rst
- id: old-autosummary-with-toctree-and-template
  message: autosummary block with both toctree and template directives indicates old
    structure. New structure uses modular pages.
  severity: WARNING
  languages:
  - generic
  pattern-regex: '\.\.\s+autosummary::[\s\S]*?:toctree:\s+generated/[\s\S]*?:template:'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 95
  paths:
    include:
    - doc/modules/classes.rst
- id: classes-rst-has-sklearn-module-automodule
  message: automodule directive in classes.rst indicates old API structure. Should
    be migrated to modular pages.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \.\.\s+automodule::\s+sklearn\.
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 57
  paths:
    include:
    - doc/modules/classes.rst
- id: old-autosummary-template-function-reference
  message: autosummary template reference to 'function.rst'. New structure should
    use 'base.rst' template.
  severity: WARNING
  languages:
  - generic
  pattern: ':template: function.rst

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 48
  paths:
    include:
    - doc/modules/*.rst
- id: old-autosummary-template-class-reference
  message: autosummary template reference to 'class.rst'. New structure should use
    'base.rst' template.
  severity: WARNING
  languages:
  - generic
  pattern: ':template: class.rst

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 46
  paths:
    include:
    - doc/modules/*.rst
- id: classes-rst-has-module-section-header
  message: Module section in classes.rst indicates old API structure. Each module
    should have dedicated page.
  severity: WARNING
  languages:
  - generic
  pattern-regex: :mod:`sklearn\.\w+`
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 38
  paths:
    include:
    - doc/modules/classes.rst
- id: classes-rst-no-module-descriptions
  message: classes.rst has minimal module descriptions. New structure in api_reference.py
    includes rich descriptions and cross-references.
  severity: WARNING
  languages:
  - generic
  pattern-regex: ':mod:`sklearn\.\w+`:\s+[\w\s]+\n={3,}\n\n\.\.\s+automodule::'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 36
  paths:
    include:
    - doc/modules/classes.rst
- id: classes-rst-currentmodule-switches
  message: classes.rst switches currentmodule multiple times. Indicates monolithic
    file covering many modules.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \.\.\s+currentmodule::\s+sklearn[\s\S]{0,500}\.\.\s+currentmodule::\s+sklearn
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 24
  paths:
    include:
    - doc/modules/classes.rst
- id: classes-rst-has-logisticregression-reference
  message: classes.rst references linear models, indicating old structure. Should
    be in api/linear_model.rst.
  severity: WARNING
  languages:
  - generic
  pattern-regex: LogisticRegression|LinearRegression|Ridge|Lasso
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 19
  paths:
    include:
    - doc/modules/classes.rst
- id: old-template-directory-structure
  message: Multiple specific template files exist in doc/templates/. New structure
    consolidates these into base.rst and deprecated.rst.template.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - doc/templates/class.rst
    - doc/templates/function.rst
    - doc/templates/deprecated_class.rst
    - doc/templates/deprecated_function.rst
    - doc/templates/class_with_call.rst
    - doc/templates/deprecated_class_with_call.rst
    - doc/templates/deprecated_class_without_init.rst
    - doc/templates/display_all_class_methods.rst
    - doc/templates/display_only_from_estimator.rst
- id: old-template-rst-raw-includes
  message: Old templates use raw HTML directives. Should be modernized in new template
    system.
  severity: WARNING
  languages:
  - generic
  pattern-regex: \.\.\s+raw::\s+html
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 9
  paths:
    include:
    - doc/templates/*.rst
