rules:
- id: detect-globalutils-usage
  message: Detected GlobalUtils usage - new extracted utility infrastructure
  severity: INFO
  languages:
  - csharp
  pattern-either:
  - pattern: GlobalUtils.$METHOD(...)
  - pattern: using ICSharpCode.ILSpy.Util.GlobalUtils;
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-globalutils-static-method-call
  message: Detected GlobalUtils static method call - using extracted utility
  severity: INFO
  languages:
  - csharp
  pattern-either:
  - pattern: GlobalUtils.ExecuteCommand(...)
  - pattern: GlobalUtils.OpenLink(...)
  - pattern: GlobalUtils.StartProcess(...)
  metadata:
    category: structural
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: detect-globalutils-openlink
