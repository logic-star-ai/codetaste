rules:
- id: detect-contrib-metrics-update-method-call
  message: Metric update call in deprecated test location. Ensure test is migrated.
  severity: INFO
  languages:
  - python
  pattern: $METRIC.update(...)
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 149
  paths:
    include:
    - tests/ignite/contrib/metrics/
- id: detect-contrib-metrics-module-path-access
  message: Accessing class from deprecated module path 'ignite.contrib.metrics'. Should
    use 'ignite.metrics' instead.
  severity: WARNING
  languages:
  - python
  pattern: ignite.contrib.metrics.$MODULE.$CLASS(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 113
- id: detect-contrib-metrics-regression-alias-usage
