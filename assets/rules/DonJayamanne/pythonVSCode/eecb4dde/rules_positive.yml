rules:
- id: refactor-comment-reference-to-common-utils
  message: Detected reference to common/utils path (possibly in comments or strings)
  severity: INFO
  languages:
  - typescript
  pattern-regex: .*common\/utils\/(async|decorators|enum|fs|localize|logging|misc|platform|random|stopWatch|string|sysTypes|text|version).*
  metadata:
    category: other
    nr_refactored_patterns: 129
    nr_legacy_patterns: 0
- id: refactor-single-quote-import-from-common-utils
  message: Detected single-quoted import from common/utils
  severity: INFO
  languages:
  - typescript
  pattern-regex: from\s+'.*\/common\/utils\/[a-zA-Z]+'
  metadata:
    category: structural
    nr_refactored_patterns: 128
    nr_legacy_patterns: 0
- id: refactor-test-file-references-client-common-utils
  message: Detected test file referencing client/common/utils path
  severity: INFO
  languages:
  - typescript
  pattern-regex: '[''"].*client\/common\/utils\/[a-zA-Z]+[''"]'
  metadata:
    category: structural
    nr_refactored_patterns: 76
    nr_legacy_patterns: 0
  paths:
    include:
    - src/test/**/*.ts
