rules:
- id: import-utils-single-quotes
  message: Import with single quotes from old utils location. Should use client/common/utils/
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import\s+.*\s+from\s+'(?!.*\/common\/utils\/).*\/utils\/(async|decorators|enum|fs|localize|logging|misc|platform|random|stopWatch|string|sysTypes|text|version)'
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 127
  paths:
    exclude:
    - src/client/common/
- id: import-utils-any-module-two-levels
  message: Import from old utils directory (2 levels up). Should use ../common/utils/
    or appropriate path
  severity: WARNING
  languages:
  - typescript
  - javascript
  pattern-regex: import.*from\s+['"]\.\.\/\.\.\/utils\/(?!.*common)[a-zA-Z]+['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 66
  paths:
    exclude:
    - src/client/common/
- id: import-utils-any-module-three-levels
