rules:
- id: old-conda-import-path
  message: 'Old import path detected: Update import from ''discovery/locators/services/conda''
    to new location ''common/environmentManagers/conda'''
  severity: WARNING
  languages:
  - typescript
  pattern-regex: from\s+['"].*discovery/locators/services/conda['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: multiline-import-old-conda-path
  message: Multiline import from old path 'discovery/locators/services/conda'. Update
    to 'common/environmentManagers/conda'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-regex: import\s*\{[\s\S]{0,200}\}\s*from\s*['"][^'"]*discovery/locators/services/conda['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
- id: relative-sibling-import-to-services-modules
  message: Sibling import within old 'services' directory. Verify both files should
    be moved as part of refactoring
  severity: INFO
  languages:
  - typescript
  patterns:
  - pattern-regex: from\s+['"]\.\/(conda|poetry|pyenvLocator|virtualEnvironmentIdentifier|customVirtualEnvLocator|globalVirtualEnvronmentLocator|posixKnownPathsLocator|windowsRegistryLocator|windowsStoreLocator|poetryLocator|condaLocator|pipEnvHelper)['"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
  paths:
    include:
    - src/client/pythonEnvironments/discovery/locators/services/*.ts
- id: import-all-conda-types-from-old-path
  message: Import of Conda types/classes from old path 'discovery/locators/services/conda'.
    Update to 'common/environmentManagers/conda'
  severity: WARNING
  languages:
  - typescript
  patterns:
  - pattern-regex: import\s*\{[^}]*(CondaEnvironmentInfo|CondaInfo|Conda|AnacondaCompanyName|isCondaEnvironment)[^}]*\}\s*from\s*['"].*discovery/locators/services/conda['"]
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 13
