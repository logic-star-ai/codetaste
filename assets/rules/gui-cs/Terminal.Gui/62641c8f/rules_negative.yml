rules:
- id: keybindingscope-enum-usage
  message: KeyBindingScope enum has been removed in the refactoring. Use separate
    KeyBindings, HotKeyBindings, and Application.KeyBindings collections instead.
  severity: WARNING
  languages:
  - csharp
  pattern: KeyBindingScope
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 147
- id: keybindingscope-enum-reference
  message: KeyBindingScope enum member reference detected. The enum has been removed
    - use separate binding collections.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern: KeyBindingScope.$MEMBER
  - metavariable-regex:
      metavariable: $MEMBER
      regex: ^(Focused|HotKey|Application|Disabled)$
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 131
- id: application-scope-keybinding
  message: KeyBindingScope.Application is obsolete. Use Application.KeyBindings for
    application-scoped bindings.
  severity: WARNING
  languages:
  - csharp
  pattern: KeyBindingScope.Application
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 61
- id: keybindings-add-with-enum-scope-literal
  message: KeyBindings.Add with KeyBindingScope enum literal. Use View.KeyBindings,
    View.HotKeyBindings, or Application.KeyBindings collections.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: $BINDINGS.Add($KEY, KeyBindingScope.HotKey, ...)
    - pattern: $BINDINGS.Add($KEY, KeyBindingScope.Focused, ...)
    - pattern: $BINDINGS.Add($KEY, KeyBindingScope.Application, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 61
- id: hotkey-scope-keybinding
  message: KeyBindingScope.HotKey is obsolete. Use View.HotKeyBindings for hotkey
    bindings.
  severity: WARNING
  languages:
  - csharp
  pattern: KeyBindingScope.HotKey
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 45
- id: unittest-keybindingscope-test
  message: Unit test uses KeyBindingScope. Update test for refactored architecture.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-inside: '[Fact]

      public void $METHOD() { ... }

      '
  - pattern: KeyBindingScope
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 43
- id: application-keybindings-scope-check
  message: Application-scoped KeyBindings should use Application.KeyBindings collection
    directly without scope parameter.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: Application.KeyBindings.Add($KEY, KeyBindingScope.Application, ...)
    - pattern: $BINDINGS.Add($KEY, KeyBindingScope.Application, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 33
- id: getkeyfrommcommands-method
  message: GetKeyFromCommands has been renamed to GetFirstFromCommands in the refactored
    API.
  severity: WARNING
  languages:
  - csharp
  pattern: $OBJ.GetKeyFromCommands(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 26
- id: test-command-hotkey-with-scope
  message: Test adds command with scope parameter. Update for refactored API.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: keyBindings.Add($KEY, KeyBindingScope.$SCOPE, Command.HotKey)
    - pattern: keyBindings.Add($KEY, KeyBindingScope.$SCOPE, Command.Accept)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 23
- id: focused-scope-keybinding
  message: KeyBindingScope.Focused is obsolete. Use View.KeyBindings for focused bindings.
  severity: WARNING
  languages:
  - csharp
  pattern: KeyBindingScope.Focused
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: keybindingscope-in-string-literal
  message: String literal contains 'KeyBindingScope'. May need updating for refactored
    code.
  severity: INFO
  languages:
  - csharp
  pattern-regex: '".*KeyBindingScope.*"'
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
- id: keybindings-getkeyfromcommands-static
  message: Static KeyBindings.GetKeyFromCommands should be renamed to GetFirstFromCommands.
  severity: WARNING
  languages:
  - csharp
  pattern: KeyBindings.GetKeyFromCommands(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: commandcontext-keybinding-property-access
  message: CommandContext.KeyBinding property suggests non-generic CommandContext.
    Use CommandContext<TBinding> in refactored code.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern: $CTX.KeyBinding
  - pattern-not-inside: CommandContext<$TYPE>
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: key-a-with-scope-test
  message: 'Test pattern: Add Key.A with scope. Update for refactored API without
    scope parameter.'
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern: keyBindings.Add(Key.A, KeyBindingScope.$SCOPE, Command.$CMD)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 15
- id: keybindings-boundview-property
  message: KeyBindings.BoundView property access. Verify usage in refactored architecture.
  severity: INFO
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: $BINDINGS.BoundView
    - pattern: $BINDINGS.BoundView = $VALUE
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 14
- id: keybinding-boundview-property
  message: KeyBinding.BoundView property may be obsolete pattern. Check if this should
    use Target property in refactored code.
  severity: WARNING
  languages:
  - csharp
  pattern: $BINDING.BoundView
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: xml-doc-keybindingscope-reference
  message: XML documentation references KeyBindingScope which has been removed.
  severity: WARNING
  languages:
  - csharp
  pattern-regex: (cref|see)="KeyBindingScope
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 12
- id: keybindings-replacekey
  message: KeyBindings.ReplaceKey call. Verify behavior across separate binding collections
    in refactored code.
  severity: INFO
  languages:
  - csharp
  pattern: $BINDINGS.ReplaceKey($OLDKEY, $NEWKEY)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 11
- id: throw-invalidoperation-keybindingscope
  message: InvalidOperationException in KeyBindings/KeyBinding files. Check if message
    references removed KeyBindingScope.
  severity: INFO
  languages:
  - csharp
  pattern: throw new InvalidOperationException($MSG)
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 10
  paths:
    include:
    - '**/KeyBindings.cs'
    - '**/KeyBinding.cs'
- id: keybindingscope-flags-check
  message: KeyBindingScope flag checking is obsolete. Use separate binding collections
    instead.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: $SCOPE.FastHasFlags(KeyBindingScope.$FLAG)
    - pattern: $SCOPE.HasFlag(KeyBindingScope.$FLAG)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 8
- id: keybindings-add-key-b-scope
  message: 'Test pattern: Add Key.B with scope. Update for refactored API without
    scope parameter.'
  severity: WARNING
  languages:
  - csharp
  pattern: keyBindings.Add(Key.B, KeyBindingScope.$SCOPE, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 7
- id: keybindingscope-in-error-message
  message: Error message mentions 'scope' which may reference old KeyBindingScope
    pattern.
  severity: INFO
  languages:
  - csharp
  pattern-regex: throw.*".*scope.*"
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: throw-argumentexception-keybindings
  message: ArgumentException in KeyBindings/KeyBinding files. Check if message references
    removed KeyBindingScope.
  severity: INFO
  languages:
  - csharp
  pattern: throw new ArgumentException($MSG, ...)
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
  paths:
    include:
    - '**/KeyBindings.cs'
    - '**/KeyBinding.cs'
- id: keybindings-add-throws-scope-check
  message: Test expects exception when adding with scope parameter. Update for refactored
    API without scope.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern: Assert.Throws<$EXCEPTION>(() => keyBindings.Add($KEY, KeyBindingScope.$SCOPE,
      ...))
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 6
- id: keybindings-scope-comparison
  message: KeyBindingScope comparison detected. Use separate binding collections instead.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: $SCOPE == KeyBindingScope.$VALUE
    - pattern: $SCOPE != KeyBindingScope.$VALUE
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: keybindings-application-scoped-error
  message: Reference to 'Application scoped KeyBindings'. Should use Application.KeyBindings
    collection directly.
  severity: INFO
  languages:
  - csharp
  pattern-regex: Application scoped KeyBindings
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: keybindings-application-check-throw
  message: Error message about Application scoped KeyBindings. Update for refactored
    architecture with separate collections.
  severity: INFO
  languages:
  - csharp
  pattern-regex: throw.*"Application scoped KeyBindings must
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 5
- id: keybindings-remove-with-scope
  message: KeyBindings.Remove with scope parameter is old API pattern. Check refactored
    API.
  severity: WARNING
  languages:
  - csharp
  pattern: $BINDINGS.Remove($KEY, $SCOPE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 4
- id: commandcontext-non-generic
  message: CommandContext should be generic CommandContext<TBinding> in the refactored
    code.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-not: CommandContext<$TYPE>
  - pattern-either:
    - pattern: CommandContext $VAR
    - pattern: new CommandContext(...)
    - pattern: CommandContext(...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: keybindingscope-variable-declaration
  message: KeyBindingScope variable declaration detected. The enum has been removed
    from the refactored code.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: KeyBindingScope $VAR = $VALUE;
    - pattern: KeyBindingScope $VAR;
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: disabled-scope-keybinding
  message: KeyBindingScope.Disabled is obsolete. Remove or disable bindings differently
    in refactored code.
  severity: WARNING
  languages:
  - csharp
  pattern: KeyBindingScope.Disabled
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: keybindings-get-with-scope
  message: KeyBindings.Get with scope parameter is old API pattern. Check refactored
    API.
  severity: WARNING
  languages:
  - csharp
  pattern: $BINDINGS.Get($KEY, $SCOPE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: argumentexception-scope-message
  message: Exception message references 'scope'. May need updating for refactored
    API without KeyBindingScope.
  severity: INFO
  languages:
  - csharp
  pattern-regex: ArgumentException.*scope
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: keybindings-get-two-params
  message: KeyBindings.Get with out parameter. Verify signature matches refactored
    API.
  severity: INFO
  languages:
  - csharp
  pattern: $BINDINGS.Get($KEY, out $BINDING)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: keybindingscope-disabled-reference
  message: Reference to KeyBindingScope.Disabled detected. The enum has been removed.
  severity: WARNING
  languages:
  - csharp
  pattern-regex: KeyBindingScope\.Disabled
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 3
- id: commandcontext-with-key-keybinding
  message: CommandContext constructor with Key and KeyBinding parameters is old pattern.
    Use generic CommandContext<TBinding>.
  severity: WARNING
  languages:
  - csharp
  pattern: new CommandContext($CMD, $KEY, $KEYBINDING, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: commandcontext-old-constructor-three-args
  message: Old CommandContext constructor signature detected. Refactor to use CommandContext<TBinding>.
  severity: WARNING
  languages:
  - csharp
  pattern: new CommandContext($CMD, $KEY, $KEYBINDING)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: keybinding-constructor-scope-first-param
  message: KeyBinding constructor with KeyBindingScope as second parameter is old
    API.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern: new KeyBinding($COMMANDS, KeyBindingScope.$SCOPE)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: keybinding-constructor-with-boundview
  message: KeyBinding constructor with scope and boundView parameters is old API.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern: new KeyBinding($COMMANDS, KeyBindingScope.$SCOPE, $VIEW, ...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: test-assert-keybindingscope
  message: Test assertion on KeyBindingScope. The enum has been removed.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: Assert.$METHOD(..., KeyBindingScope.$VALUE, ...)
    - pattern: Assert.Equal(KeyBindingScope.$VAL1, KeyBindingScope.$VAL2)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: keybinding-constructor-with-enum
  message: KeyBinding constructor with KeyBindingScope enum. The Scope parameter has
    been removed.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: new KeyBinding($CMDS, KeyBindingScope.HotKey)
    - pattern: new KeyBinding($CMDS, KeyBindingScope.Focused)
    - pattern: new KeyBinding($CMDS, KeyBindingScope.Application)
    - pattern: new KeyBinding($CMDS, KeyBindingScope.Disabled)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: test-assert-throws-app-scope
  message: Test assertion references KeyBindingScope.Application. Update test for
    refactored architecture.
  severity: WARNING
  languages:
  - csharp
  pattern-regex: Assert\.Throws.*KeyBindingScope\.Application
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: invalidoperationexception-app-scope-message
  message: Exception message references 'Application scoped' KeyBindings. Update for
    refactored architecture.
  severity: INFO
  languages:
  - csharp
  pattern-regex: InvalidOperationException.*Application scoped
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: keybindingscope-bitwise-or
  message: Bitwise OR operation on KeyBindingScope flags. The enum has been removed.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: KeyBindingScope.$VAL1 | KeyBindingScope.$VAL2
    - pattern: $SCOPE | KeyBindingScope.$VAL
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: keybindings-add-empty-key
  message: Adding binding with Key.Empty and scope parameter. Update for refactored
    API.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-either:
    - pattern: keyBindings.Add(Key.Empty, KeyBindingScope.$SCOPE, ...)
    - pattern: $BINDINGS.Add(Key.Empty, KeyBindingScope.$SCOPE, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
- id: invokecommand-old-signature-key-keybinding
  message: InvokeCommand with Key and KeyBinding parameters is old signature. Use
    InvokeCommand<TBinding>(Command, TBinding) instead.
  severity: WARNING
  languages:
  - csharp
  pattern: '$OBJ.InvokeCommand($COMMAND, $KEY, $KEYBINDING)

    '
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: keybindingscope-enum-declaration
  message: KeyBindingScope enum declaration found. This enum should be removed in
    refactored code.
  severity: ERROR
  languages:
  - csharp
  pattern: 'public enum KeyBindingScope { ... }

    '
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: keybindingscope-property-in-class
  message: Class has KeyBindingScope property. The enum has been removed in refactored
    code.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-inside: 'class $CLASS { ... }

      '
  - pattern: KeyBindingScope $PROP
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: keybindingscope-field-in-struct
  message: Struct has KeyBindingScope field. The enum has been removed in refactored
    code.
  severity: WARNING
  languages:
  - csharp
  patterns:
  - pattern-inside: 'struct $STRUCT { ... }

      '
  - pattern: KeyBindingScope $FIELD
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: keybindingscope-file-exists
  message: KeyBindingScope.cs file should not exist in refactored code. The enum has
    been removed.
  severity: ERROR
  languages:
  - csharp
  pattern-regex: \A[\s\S]*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - Terminal.Gui/Input/KeyBindingScope.cs
- id: keybindingscopeextensions-file-exists
  message: KeyBindingScopeExtensions.cs file should not exist. KeyBindingScope enum
    has been removed.
  severity: ERROR
  languages:
  - csharp
  pattern-regex: \A[\s\S]*
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - Terminal.Gui/EnumExtensions/KeyBindingScopeExtensions.cs
- id: keybinding-scope-fasthasflags
  message: FastHasFlags check on KeyBinding.Scope. The Scope property has been removed.
  severity: WARNING
  languages:
  - csharp
  pattern: $BINDING.Scope.FastHasFlags(...)
  metadata:
    category: api
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: keybindings-add-key-c-scope
  message: 'Test pattern: Add Key.C with scope. Update for refactored API without
    scope parameter.'
  severity: WARNING
  languages:
  - csharp
  pattern: keyBindings.Add(Key.C, KeyBindingScope.$SCOPE, ...)
  metadata:
    category: architecture
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
- id: keybindings-boundview-null-check-throw
  message: Error message about BoundView being null. May need updating for refactored
    architecture.
  severity: INFO
  languages:
  - csharp
  pattern-regex: throw.*".*BoundView cannot be null
  metadata:
    category: other
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
