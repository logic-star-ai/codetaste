- id: slices-sort-function-call
  message: Detected usage of slices.Sort from stdlib (replaces sort.Ints)
  severity: INFO
  languages:
  - go
  pattern: slices.Sort($ARG)
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
- id: go-version-120-or-higher
  message: Detected Go version 1.20 or higher in go.mod
  severity: INFO
  languages:
  - generic
  pattern-regex: (?m)^go 1\.(2[0-9]|[3-9][0-9])(\.[0-9]+)?$
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/go.mod'
- id: iox-package-usage
