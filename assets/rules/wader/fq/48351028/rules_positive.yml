rules:
- id: mathx-type-reference
  message: 'Refactoring detected: Type reference from mathx package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$TYPE
  - metavariable-regex:
      metavariable: $PKG
      regex: ^mathx$
  metadata:
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/internal/mathx/**'
- id: mathx-function-call
  message: 'Refactoring detected: Function call on mathx package member'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^mathx$
  metadata:
    nr_refactored_patterns: 41
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/internal/mathx/**'
- id: gojqx-type-reference
  message: 'Refactoring detected: Type reference from gojqx package'
