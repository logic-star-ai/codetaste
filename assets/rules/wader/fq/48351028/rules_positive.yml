  patterns:
  - pattern-either:
    - pattern: import "$PKG"
    - pattern: import $ALIAS "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: ^cmp$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: file-exists-in-gojqx-dir
  message: 'Refactoring detected: File exists in renamed gojqx directory'
  severity: INFO
  languages:
  - generic
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/internal/gojqx/*.go'
