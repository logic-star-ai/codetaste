    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/internal/bitiox/**'
- id: gojqx-function-call
  message: 'Refactoring detected: Function call on gojqx package member'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^gojqx$
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/internal/gojqx/**'
- id: function-definition-in-mathx
  message: 'Refactoring detected: Function definition in mathx package'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: func $NAME(...) { ... }
  metadata:
    nr_refactored_patterns: 29
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/internal/mathx/*.go'
- id: mathx-in-import-path-comment
  message: 'Refactoring detected: mathx mentioned in import or comment'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: import "$PKG"
    - pattern: import $ALIAS "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*/mathx$
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/internal/mathx/**'
- id: gojqx-in-import-path-comment
  message: 'Refactoring detected: gojqx mentioned in import or comment'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: import "$PKG"
    - pattern: import $ALIAS "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*/gojqx$
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/internal/gojqx/**'
- id: multiple-new-package-imports
  message: 'Refactoring detected: Multiple renamed packages imported'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"$PKG1\"\n  ...\n  \"$PKG2\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PKG1
      regex: .*/internal/(bitiox|gojqx|iox|mathx|sortx|stringsx)$
  - metavariable-regex:
      metavariable: $PKG2
      regex: .*/internal/(bitiox|gojqx|iox|mathx|sortx|stringsx)$
  metadata:
    nr_refactored_patterns: 9
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/internal/bitiox/**'
    - '**/internal/gojqx/**'
    - '**/internal/iox/**'
    - '**/internal/mathx/**'
    - '**/internal/sortx/**'
    - '**/internal/stringsx/**'
- id: bitiox-in-import-path-comment
  message: 'Refactoring detected: bitiox mentioned in import or comment'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern-either:
    - pattern: import "$PKG"
    - pattern: import $ALIAS "$PKG"
  - metavariable-regex:
      metavariable: $PKG
