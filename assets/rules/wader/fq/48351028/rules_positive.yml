  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$ANYTHING
  - metavariable-regex:
      metavariable: $PKG
      regex: ^gojqx$
  metadata:
    nr_refactored_patterns: 17
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/**/*.go'
- id: renamed-packages-files-existence
  message: Detected file in renamed package directory structure
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/internal/bitiox/**'
    - '**/internal/gojqx/**'
    - '**/internal/iox/**'
    - '**/internal/mathx/**'
    - '**/internal/sortx/**'
    - '**/internal/stringsx/**'
- id: renamed-package-mathx-import-block
  message: Detected mathx in import block
  severity: INFO
  languages:
  - go
  pattern-regex: ^\s*"[^"]+/mathx"\s*$
  metadata:
    nr_refactored_patterns: 15
    nr_legacy_patterns: 0
