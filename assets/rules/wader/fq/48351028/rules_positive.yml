rules:
- id: any-code-in-renamed-mathx
  message: Any line in mathx directory
  severity: INFO
  languages:
  - go
  pattern-regex: .*
  metadata:
    nr_refactored_patterns: 868
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/internal/mathx/*.go'
- id: renamed-package-composite-literal
  message: Detected composite literal with renamed package type
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$TYPE{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(bitiox|gojqx|iox|mathx|sortx|stringsx)$
  metadata:
    nr_refactored_patterns: 45
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: mathx-package-usage
  message: Detected usage of renamed mathx package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(...)
  - metavariable-regex:
      metavariable: $PKG
      regex: ^mathx$
  metadata:
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
  options:
    symbolic_propagation: true
- id: bitiox-package-usage
  message: Detected usage of renamed bitiox package
