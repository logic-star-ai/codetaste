    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/internal/bitiox/**'
- id: cmp-compare-direct-return
  message: 'Refactoring detected: cmp.Compare result returned directly'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: return $CMP.Compare($X, $Y)
  - metavariable-regex:
      metavariable: $CMP
      regex: ^cmp$
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: cmp-import-qualified
  message: 'Refactoring detected: Import of cmp package (qualified or aliased)'
  severity: INFO
