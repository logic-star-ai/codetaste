    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/internal/gojqx/**'
- id: composite-literal-gojqx
  message: 'Refactoring detected: Composite literal using gojqx package type'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$TYPE{...}
  - metavariable-regex:
      metavariable: $PKG
      regex: ^gojqx$
  metadata:
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
  paths:
    exclude:
    - '**/internal/gojqx/**'
- id: bitiox-function-call
  message: 'Refactoring detected: Function call on bitiox package member'
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: $PKG.$FUNC(...)
