rules:
- id: function-call-any-renamed-package
  message: Detected function call from any renamed internal package
  severity: INFO
  languages:
  - go
  pattern-regex: (bitiox|gojqx|iox|mathx|sortx|stringsx)\.\w+
  metadata:
    nr_refactored_patterns: 168
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
- id: any-usage-in-pkg-directory
  message: Detected renamed package usage in pkg directory
  severity: INFO
  languages:
  - go
  pattern-regex: (bitiox|gojqx|iox|mathx|sortx|stringsx)\.
  metadata:
    nr_refactored_patterns: 126
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/pkg/**/*.go'
- id: any-gojqx-reference
  message: Detected any reference to gojqx package
  severity: INFO
  languages:
  - go
  pattern-regex: gojqx
  metadata:
    nr_refactored_patterns: 94
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
    exclude:
    - '**/internal/gojqex/*.go'
- id: package-gojqx-anywhere
  message: Detected gojqx package reference
  severity: INFO
  languages:
  - go
  pattern-regex: package gojqx|gojqx\.
  metadata:
    nr_refactored_patterns: 82
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/*.go'
- id: import-internal-package-x-suffix
  message: Detected import from internal package with x suffix (refactored naming)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: import "$PKG"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*/internal/[a-z]+x$
  - metavariable-regex:
      metavariable: $PKG
      regex: ^(?!.*/internal/[a-z]+ex$).*
  metadata:
    nr_refactored_patterns: 44
    nr_legacy_patterns: 0
- id: mathx-type-usage
  message: Detected mathx type usage (refactored package type)
  severity: INFO
  languages:
  - go
  pattern: mathx.$TYPE
  metadata:
    nr_refactored_patterns: 43
    nr_legacy_patterns: 0
- id: mathx-package-usage
  message: Detected usage of mathx package member (refactored package)
  severity: INFO
  languages:
  - go
  pattern: mathx.$METHOD(...)
  metadata:
    nr_refactored_patterns: 42
    nr_legacy_patterns: 0
- id: gojqx-type-usage
  message: Detected gojqx type usage (refactored package type)
  severity: INFO
  languages:
  - go
  pattern: gojqx.$TYPE
  metadata:
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
- id: gojqx-composite-literal
  message: Detected composite literal of gojqx package type
  severity: INFO
  languages:
  - go
  pattern: gojqx.$TYPE{...}
  metadata:
    nr_refactored_patterns: 38
    nr_legacy_patterns: 0
- id: bitiox-package-usage
  message: Detected usage of bitiox package member (refactored package)
  severity: INFO
  languages:
  - go
  pattern: bitiox.$METHOD(...)
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: gojqx-package-usage
  message: Detected usage of gojqx package member (refactored package)
  severity: INFO
  languages:
  - go
  pattern: gojqx.$METHOD(...)
  metadata:
    nr_refactored_patterns: 36
    nr_legacy_patterns: 0
- id: import-block-with-mathx
  message: Detected import block containing mathx package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"$PKG\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*github\.com/wader/[^/]+/internal/mathx$
  metadata:
    nr_refactored_patterns: 16
    nr_legacy_patterns: 0
- id: import-block-with-gojqx
  message: Detected import block containing gojqx package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"$PKG\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*github\.com/wader/[^/]+/internal/gojqx$
  metadata:
    nr_refactored_patterns: 12
    nr_legacy_patterns: 0
- id: import-block-with-bitiox
  message: Detected import block containing bitiox package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"$PKG\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*github\.com/wader/[^/]+/internal/bitiox$
  metadata:
    nr_refactored_patterns: 8
    nr_legacy_patterns: 0
- id: cmp-compare-function-call
  message: Detected usage of cmp.Compare from stdlib (replaces custom implementation)
  severity: INFO
  languages:
  - go
  pattern: cmp.Compare($A, $B)
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: iox-composite-literal
  message: Detected composite literal of iox package type
  severity: INFO
  languages:
  - go
  pattern: iox.$TYPE{...}
  metadata:
    nr_refactored_patterns: 7
    nr_legacy_patterns: 0
- id: import-stdlib-cmp-package
  message: Detected import of stdlib cmp package (Go 1.20+ feature)
  severity: INFO
  languages:
  - go
  pattern: import "cmp"
  metadata:
    nr_refactored_patterns: 6
    nr_legacy_patterns: 0
- id: import-block-with-iox
  message: Detected import block containing iox package
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "import (\n  ...\n  \"$PKG\"\n  ...\n)\n"
  - metavariable-regex:
      metavariable: $PKG
      regex: .*github\.com/wader/[^/]+/internal/iox$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
- id: package-declaration-gojqx
  message: Detected package declaration for gojqx (renamed from gojqex)
  severity: INFO
  languages:
  - go
  pattern-regex: ^package gojqx$
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/internal/gojqx/*.go'
- id: file-in-mathx-directory
  message: Detected Go file in mathx directory (renamed package)
  severity: INFO
  languages:
  - go
  pattern-regex: \A[\s\S]*
  metadata:
    nr_refactored_patterns: 5
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/internal/mathx/*.go'
- id: slices-sortfunc-with-cmp-compare
  message: Detected slices.SortFunc with cmp.Compare (modern Go 1.20+ pattern)
  severity: INFO
  languages:
  - go
  patterns:
  - pattern: "slices.SortFunc($SLICE, func($A, $B $TYPE) int {\n  ...\n  cmp.Compare(...)\n\
      \  ...\n})\n"
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
- id: package-declaration-mathx
  message: Detected package declaration for mathx (renamed from mathex)
  severity: INFO
  languages:
  - go
  pattern-regex: ^package mathx$
  metadata:
    nr_refactored_patterns: 4
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/internal/mathx/*.go'
- id: import-stdlib-slices-package
  message: Detected import of stdlib slices package (Go 1.20+ feature)
  severity: INFO
  languages:
  - go
  pattern: import "slices"
  metadata:
    nr_refactored_patterns: 2
    nr_legacy_patterns: 0
- id: sortx-package-usage
  message: Detected usage of sortx package member (refactored package)
