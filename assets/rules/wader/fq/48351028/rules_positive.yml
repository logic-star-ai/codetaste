- id: go-version-1-20-in-gomod
  message: Detected Go 1.20+ version requirement in go.mod
  severity: INFO
  languages:
  - generic
  pattern-regex: go\s+1\.(2[0-9]|[3-9][0-9])
  metadata:
    nr_refactored_patterns: 1
    nr_legacy_patterns: 0
  paths:
    include:
    - '**/go.mod'
