rules:
- id: detect-mathex-package-usage
  message: Using mathex package. Should be renamed to mathx as part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: mathex.$METHOD(...)
  - pattern: mathex.$FIELD
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 85
- id: detect-gojqex-package-usage
  message: Using gojqex package. Should be renamed to gojqx as part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: gojqex.$METHOD(...)
  - pattern: gojqex.$FIELD
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 74
- id: detect-bitioex-package-usage
  message: Using bitioex package. Should be renamed to bitiox as part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern-either:
  - pattern: bitioex.$METHOD(...)
  - pattern: bitioex.$FIELD
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 72
- id: detect-bitioex-short-var-decl
  message: Variable declaration with bitioex function call. Package should be renamed
    to bitiox as part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern: '$VAR := bitioex.$FUNC(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: detect-bitioex-assignment-with-error
  message: Assignment from bitioex function with error. Package should be renamed
    to bitiox as part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern: '$VAR, $ERR = bitioex.$FUNC(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: detect-bitioex-multiple-assignment
  message: Multiple assignment from bitioex function. Package should be renamed to
    bitiox as part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern: '$VAR1, $VAR2 := bitioex.$FUNC(...)

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: detect-bitioex-call-in-expression
  message: Bitioex function in assignment expression. Package should be renamed to
    bitiox as part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern: "$LEFT = bitioex.$FUNC(...) \n"
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 31
- id: detect-gojqex-composite-literal
  message: Creating pointer to gojqex type. Package should be renamed to gojqx as
    part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern: '&gojqex.$TYPE{...}

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 22
- id: detect-old-mathex-import
  message: Old package 'mathex' is imported. Should be renamed to 'mathx' as part
    of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern: 'import "github.com/wader/fq/internal/mathex"

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-old-internal-package-path-mathex
  message: Old package path 'internal/mathex' referenced. Should be 'internal/mathx'
    as part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - generic
  pattern-regex: internal/mathex[/"]
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
  paths:
    include:
    - '*.go'
- id: detect-bitioex-in-if-statement
  message: Using bitioex function in if statement. Package should be renamed to bitiox
    as part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern: 'if $VAR, $ERR := bitioex.$FUNC(...); $COND { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
- id: detect-bitioex-error-check
  message: Error check with bitioex function. Package should be renamed to bitiox
    as part of Go 1.20 refactoring.
  severity: WARNING
  languages:
  - go
  pattern: 'if _, $ERR := bitioex.$FUNC(...); $ERR != nil { ... }

    '
  metadata:
    category: structural
    nr_refactored_patterns: 0
    nr_legacy_patterns: 16
