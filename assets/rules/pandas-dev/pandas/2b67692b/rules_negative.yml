rules:
- id: compat-import-range-regex
  message: Remove import of 'range' from pandas.compat - use builtin 'range' instead
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+pandas\.compat\s+import\s+.*\brange\b
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 98
- id: compat-import-zip-regex
  message: Remove import of 'zip' from pandas.compat - use builtin 'zip' instead
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+pandas\.compat\s+import\s+.*\bzip\b
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 44
- id: compat-import-map-regex
  message: Remove import of 'map' from pandas.compat - use builtin 'map' instead
  severity: WARNING
  languages:
  - python
  pattern-regex: from\s+pandas\.compat\s+import\s+.*\bmap\b
  metadata:
    category: dependency
    nr_refactored_patterns: 0
    nr_legacy_patterns: 20
