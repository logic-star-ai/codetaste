- id: compat-definition-filter-py3
  message: Remove redundant 'filter = filter' definition from pandas.compat for Python
    3
  severity: WARNING
  languages:
  - python
  patterns:
  - pattern: filter = filter
  - pattern-inside: "if PY3:\n    ...\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - pandas/compat/__init__.py
