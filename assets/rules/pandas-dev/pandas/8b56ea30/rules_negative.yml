- id: pandas-test-expected-value-py2
  message: Simplify expected value assignment removing PY2/PY3 condition - Python
    2 support has been dropped
  severity: WARNING
  languages:
  - python
  pattern-either:
  - pattern: expected = ... if PY2 else ...
  - pattern: expected = ... if PY3 else ...
  - pattern: expected = ... if not PY2 else ...
  - pattern: expected = ... if not PY3 else ...
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/tests/*'
