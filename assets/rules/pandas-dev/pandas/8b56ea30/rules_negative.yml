  severity: WARNING
  languages:
  - python
  pattern: pytest.param(..., marks=pytest.mark.skipif(compat.PY2, ...))
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 2
  paths:
    include:
    - '*/tests/*'
- id: pandas-test-if-not-py2-condition
  message: Remove 'if not PY2:' conditional and keep only the code block - Python
    2 support has been dropped
  severity: WARNING
  languages:
  - python
  pattern: "if not PY2:\n    ...\n"
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/tests/*'
- id: pandas-test-ternary-not-py3
  message: Remove 'not PY3' ternary expression - Python 2 support has been dropped,
    keep only the else branch
  severity: WARNING
  languages:
  - python
  pattern: $X if not PY3 else $Y
  metadata:
    category: config
    nr_refactored_patterns: 0
    nr_legacy_patterns: 1
  paths:
    include:
    - '*/tests/*'
